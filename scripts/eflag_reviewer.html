IA ודימומים — ניטור MRI תקופתי הכרחי.", "reason": "Explanation supports answer D, not marked answer"}, {"idx": 594, "ti": 11, "t": "2025-Jun", "q": "איזה מהשינויים הפיזיולוגיים בהזדקנות הוא הנכון", "o": ["יש תגובה מופחתת לסטרס פיזי או נפשי (\\\"Fight or Flight\\\") ללא עליה משמעותית ברמות קורטיזול", "יש תגובה מופחתת להתייבשות, עם שמירה של נפח הפלסמה בגוף וירידה ב-GFR", "יש תגובה מופחתת לשינויים ברמת גלוקוז בדם, עם רגישות גבוהה לתסמיני היפרגליקמיה", "יש תגובה מופחתת למלאות בשלפוחית השתן, עם ירידה ביכולת ההתכווצות של שריר ה- Detrusor"], "c": 3, "e": "התשובה הנכונה היא C, אך יש לדייק: בהזדקנות חלה ירידה ברגישות לתסמיני היפו- והיפרגליקמיה, ותגובה מופחתת לשינויים ברמת הגלוקוז. עם הגיל חלה עלייה בתנגודת לאינסולין וירידה בהפרשת אינסולין, מה שמוביל לנטייה להיפרגליקמיה. במקביל, התגובה הקאונטר-רגולטורית להיפוגליקמיה (הפרשת גלוקגון, אפינפרין) נחלשת, והמודעות לתסמינים פוחתת – תופעה המכונה \"hypoglycemia unawareness.\" מנגנון זה מתואר ב-Hazzard's כחלק מהשינויים האנדוקריניים בהזדקנות.\n\nתשובה A שגויה – בהזדקנות דווקא **עולות** רמות הקורטיזול הבזאליות, והציר ההיפותלמי-יותרת המוח-אדרנל מגיב בצורה מוגברת או ממושכת לסטרס, עם פגיעה במנגנון המשוב השלילי.\n\nתשובה B שגויה – בהזדקנות יש אמנם ירידה ב-GFR, אך יכולת שימור נפח הפלסמה דווקא **נפגעת** (ירידה בי��ולת ריכוז השתן, ירידה בתחושת הצמא, ותגובה מופחתת ל-ADH), כך שהמטופל חשוף יותר להתייבשות.\n\nתשובה D שגויה חלקית – אמנם יש ירידה בתחושת מלאות, אך שריר ה-Detrusor דווקא נוטה ל**פעילות-יתר** (overactivity) ולא לירידה בהתכווצות בלבד.\n\n**פנינה קלינית:** בקשישים, יש להיזהר במיוחד מהיפוגליקמיה – התסמינים מוסווים, והסיכון לנפילות ואירועים ק", "reason": "Explanation discusses answer C (glucose/insulin), not marked answer"}, {"idx": 593, "ti": 22, "t": "2025-Jun", "q": "איזה מהשינויים הפיזיולוגיים הבאים בהזדקנות מהווה גורם סיכון להיפוגליקמיה", "o": ["הפרשת גלוקגון מוגברת", "עליה בתפקוד הרצפטורים הבטא אדרנרגיים", "עליה בתגובת הורמון גדילה להיפוגליקמיה", "פגיעה במערכת העצבית האוטונומית"], "c": 3, "e": "התשובה הנכונה היא D – פגיעה במערכת העצבים האוטונומית, ולא A כפי שצוין.\n\nעם זאת, אם נדרשים לנמק את התשובה A כנכונה, יש לציין שבהזדקנות חלים שינויים במנגנוני הוויסות ההורמונלי. בפועל, בקשישים קיימת **ירידה** (ולא עלייה) בהפרשת גלוקגון כתגובה להיפוגליקמיה, מה שפוגע ביכולת הנגדית (counter-regulatory response) ומגביר את הסיכון להיפוגליקמיה. ייתכן שניסוח השאלה מטעה, שכן הפרשת גלוקגון **פגומה** היא גורם סיכון – לא הפרשה מוגברת.\n\n**לגבי התשובות האחרות:**\n- **B** – בהזדקנות חלה דווקא **ירידה** בתפקוד הרצפטורים הבטא-אדרנרגיים, מה שמפחית את תסמיני האזהרה של היפוגליקמיה (רעד, טכיקרדיה) – זהו גורם סיכון אמיתי.\n- **C** – תגובת הורמון הגדילה להיפוגליקמיה **יורדת** עם הגיל, לא עולה.\n- **D** – פגיעה במערכת העצבים האוטונ��מית היא גורם סיכון מרכזי להיפוגליקמיה בקשישים, בעיקר בשל hypoglycemia unawareness.\n\n**פנינה קלינית:** בקשישים סוכרתיים, היעד הגליקמי צריך להיות מתון יותר (HbA1c 7.5-8%) בשל הסיכון המוגבר להיפוגליקמיה על רקע פגיעה במנגנוני הוויסות הנגדיים (Hazzard's, פרק סוכרת בקשיש).", "reason": "Explanation states D is correct, not marked answer"}, {"idx": 596, "ti": 27, "t": "2025-Jun", "q": "בת78, התקבלה למחלקת שיקום לאחר אשפוז עקב אירוע מוחי עם שיתוק בפלג גוף ימין בבדיקתה פצע לחץ דרגה 3 בעכוז איזו מההתערבויות הבאות הוכחה כמשפרת ריפוי של פצע הלחץ באופן משמעותי?", "o": ["שימוש במזרון דינמי", "טיפול בחמצן היפרבארי", "תוספת טיפול בוויטמינים A,E,C IRON", "אנטיביוטיקה סיסטמית"], "c": 0, "e": "אני צריך לציין שהתשובה המסומנת כנכונה (D - אנטיביוטיקה סיסטמית) אינה עולה בקנה אחד עם הספרות הגריאטרית המקובלת. למעשה, אנטיביוטיקה סיסטמית מומלצת רק כאשר יש סימני זיהום מערכתי (ספסיס, צלוליטיס, אוסטאומיאליטיס) ולא כטיפול שגרתי לשיפור ריפוי פצעי לחץ. מתן אנטיביוטיקה ללא אינדיקציה ברורה עלול לגרום לעמידות חיידקית ולתופעות לוואי.\n\nלגבי האפשרויות האחרות: **מזרון דינמי (A)** הוא התערבות מרכזית ומבוססת ראיות להפחתת לחץ (pressure redistribution), שהיא אבן הפינה בטיפול בפצעי לחץ בדרגה 3. לפי Hazzard's Geriatric Medicine, הפחתת לחץ באמצעות משטחי תמיכה דינמיים הוכחה כמשפרת ריפוי באופן משמעותי. **חמצן היפרבארי (B)** אינו מומלץ באופן שגרתי לפצעי לחץ; הראיות לגביו מוגבלות בעיקר לפצעים סוכרתיים. **תוספת ויטמינים (C)** חשובה בחולים עם חסר תזונתי, אך לא הוכחה כמשפרת ריפוי באופן משמעותי במטופלים ללא חסר מתועד.\n\n**פנינה קלינית:** בפצעי לחץ דרגה 3, הגישה הטיפולית כוללת: הפחתת לחץ, חבישות לחות, תזונה מאוזנת, ודיברידמנט - ולא אנטיביוטיקה סיסטמית שגרתית.", "reason": "Explanation supports מזרון דינמי, contradicts marked answer"}, {"idx": 599, "ti": 13, "t": "2024-Sep", "q": "מה מאפיין הפרעות שינה בפיברומיילגיה", "o": ["עליה במשך השינה הכללי", "ירידה במשך שנת REM", "EEG יראה ירידה בכמות של גלי אלפא", "הירדמות מהירה ויקיצה איטית"], "c": 1, "e": "בפיברומיאלגיה, הפרעות השינה מהוות מאפיין קליני מרכזי. מחקרי פוליסומנוגרפיה הראו כי חולים אלו סובלים מירידה במשך שנת REM, כמו גם משיבוש בארכיטקטורת השינה הכללית. הממצא הקלאסי ב-EEG הוא דווקא **חדירת גלי אלפא לתוך שנת NREM** (תופעת alpha-delta sleep או \"alpha intrusion\"), כלומר עלייה בגלי אלפא בשלבי שינה עמוקה, מה שמוביל לשינה לא מרעננת (non-restorative sleep). הירידה ב-REM תורמת לתחושת העייפות הכרונית, לפגיעה קוגניטיבית (\"fibro fog\") ולהחמרת תפיסת הכאב.\n\n**תשובה A שגויה** — בפיברומיאלגיה לא נצפית עלייה במשך השינה הכללי; להיפך, חולים מדווחים על קושי בהירדמות, יקיצות תכופות וירידה ביעילות השינה. **תשובה C שגויה** — כאמור, הממצא האופייני הוא דווקא עלייה בגלי אלפא (alpha intrusion) בזמן שינה, ולא ירידה בהם. **תשובה D שגויה** — חולי פיברומיאלגיה מתאפיינים בקושי בהירדמות (latency מוארכת) וביקיצות תכופות, לא בהירדמות מהירה.\n\n**פנינה קלינית:** הממצא הפתוגנומוני בפיברומיאלגיה הוא alpha-delta sleep — זכרו שזו חדירת ערנות לתוך שינה עמוקה, המסבירה את תלונת השינה הלא מרעננת.", "reason": "Explanation describes alpha intrusion, not REM reduction"}, {"idx": 598, "ti": 3, "t": "2025-Jun", "q": "במרפאה קרדיולוגיתמעוניינים להכניס בדיקה לאבחון שבריריות שתתבצע לפני החלטה על פרוצדורת החלפת מסתם אאורטלי בצינתור Transcatheter Aortic-Valve Implantation (TAVI) . מה ההמלצה המתאימה בהתייחס למדדי שבריריות שונים", "o": ["מדד FRIED ניתן לבצע בתשאול טלפוני", "ניתן לבצע מדדDeficit Accumulation Index or Frailty Index (FI) אחרי הערכה כוללנית של גריאטר בקהילה", "במידה ורוצים להשתמש באבחון שבריריות מתוך תיק רפואי מומלץ להשתמש במדד Clinical Frailty Scale (CFS) שלRockwood", "מדדFRAIL מחייב בדיקה גופנית במרפאה"], "c": 1, "e": "**תשובה נכונה: A**\n\nמדד Fried (הפנוטיפ של שבריריות) כולל חמישה קריטריונים: ירידה בלתי מכוונת במשקל, תשישות עצמית (self-reported exhaustion), חולשה (כוח אחיזה), איטיות הליכה ורמת פעילות גופנית נמוכה. חלק מהקריטריונים הללו – ירידה במשקל, תשישות ורמת פעילות – ניתנים לדיווח עצמי ולתשאול טלפוני, ולכן בגרסאות מותאמות ניתן לבצע סקירה ראשונית טלפונית. **זו התשובה הנכונה** בהקשר של מרפאה קרדיולוגית המעוניינת בכלי סינון נגיש לפני TAVI.\n\n**תשובה B שגויה** – מדד Frailty Index (Deficit Accumulation) אכן מבוסס על צבירת ליקויים מתוך הערכה גריאטרית מקיפה, אך ניתן לבנותו גם מנתוני תיק רפואי ולא רק לאחר הערכה כוללנית בקהילה.\n\n**תשובה C שגויה** – ה-Clinical Frailty Scale (CFS) של Rockwood מבוסס על שיפוט קליני ולא על חילוץ נתונים מתיק רפואי בלבד; הוא דורש הערכה קלינית של מצב תפקודי. לעומתו, ה-FI דווקא ניתן לחילוץ מתיקים רפואיים.\n\n**תשובה D שגויה** – מדד FRAIL (Fatigue, Resistance, Ambulation, Illness, Loss of weight) הוא שאלון בן חמישה פריטים המבוסס על דיווח עצמי ואינו מחייב בדיקה גופנית.\n\n**פנינה קלינית:** בהקשר TAVI, הנחיות עדכניות ממליצות על הערכת שבריריות כחלק מההחלטה הטיפולית; בחירת הכלי תלויה במשאבים הזמינים במרפאה", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 597, "ti": 17, "t": "2025-Jun", "q": "באקו לב שטח מסתם 20.6 cm, מפל לחצים 50 mmHg, מהירות זרימה 5 m/s . מה הגישה הטיפולית הנכונה למטופל?", "o": ["Surgical Aortic Valve Replacement (SAVR)", "Transcatheter Aortic Valve Replacement (TAVR)", "טיפול פליאטיבי לצורך הקלת התסמינים", "בהעדר קריטריונים להתערבות לבצע בדיקה חוזרת בעוד שנה"], "c": 2, "e": "הנתונים המוצגים מתארים היצרות אאורטלית חמורה מאוד (critical aortic stenosis): שטח מסתם 0.6 סמ\"ר (מתחת ל-1.0 סמ\"ר), מפל לחצים ממוצע של 50 מ\"מ כספית (מעל 40), ומהירות זרימה של 5 מ/ש (מעל 4). לפי הנחיות ACC/AHA וכפי שמתואר ב-Harrison's Internal Medicine, פרמטרים אלו מצביעים על היצרות חמורה הדורשת התערבות.\n\nלמרות זאת, התשובה הנכונה היא טיפול פליאטיבי. המפתח להבנת השאלה הוא שלא כל מטופל עם היצרות אאורטלית חמורה מתאים להתערבות כירורגית או צנתורית. בגריאטריה, כאשר מטופל אינו מועמד ל-SAVR (בשל סיכון ניתוחי גבוה מאוד, תחלואה נלווית קשה, תוחלת חיים מוגבלת) וגם אינו מועמד ל-TAVR (למשל בשל אנטומיה לא מתאימה, שבריריות קשה, או דמנציה מתקדמת), הגישה הנכונה היא טיפול פליאטיבי להקלת תסמינים.\n\nSAVR (תשובה A) ו-TAVR (תשובה B) שגויות כי השאלה מרמזת שהמטופל אינו מועמד לאף אחת מהן. תשובה D שגויה כי הנתונים מצביעים בבירור על היצרות חמורה – אין מקום להמתנה ומעקב בלבד.\n\n**פנינה קלינית:** בגריאטריה, החלטה על התערבות במסתם אאורטלי חייבת לשקול לא רק חומרת ההיצרות אלא גם שבריריות, תוחלת חיים, מצב קוגניטיבי ורצון המטופל – בהתאם לעקרונות הטיפול המותאם-מטופל", "reason": "Explanation describes severe stenosis needing intervention, contradicts palliative"}, {"idx": 601, "ti": 37, "t": "2025-Jun", "q": "בזקן עם בעיית שמיעה על רקע הגיל, איזה מהמילים הבאות יתקשה לזהות", "o": ["גלידה", "שלום", "ארון", "ספר"], "c": 3, "e": "בפרסביקוזיס (presbycusis), ירידת השמיעה הקשורה לגיל, הפגיעה הראשונית היא בתדרים הגבוהים. הסיבה לכך היא ניוון של תאי השיער החיצוניים באזור הבסיסי של השבלול (cochlea), האחראי על קליטת תדרים גבוהים. עיצורים כמו \"ג\", \"ד\" ו-\"ה\" (fricatives ו-plosives) מכילים מרכיבי תדר גבוה יותר בהשוואה לתנועות ולעיצורים נמוכים. המילה **\"גלידה\"** מכילה שילוב של עיצורים בתדרים גבוהים יחסית, כולל הצליל \"ג\" והעיצורים החדים, מה שהופך אותה לקשה יותר לזיהוי עבור מטופל עם פרסביקוזיס.\n\nהמילים **\"שלום\"** (B), **\"ארון\"** (C) ו-**\"ספר\"** (D) מכילות תנועות בולטות ומרכיבי תדר נמוך-בינוני דומיננטיים יותר, מה שמקל על זיהוין גם כאשר קיימת ירידה בתדרים הגבוהים. בנוסף, \"שלום\" היא מילה שכיחה מאוד שהמוח מזהה בקלות מההקשר.\n\n**פנינה קלינית:** בפרסביקוזיס, המטופלים מתלוננים שהם \"שומעים אבל לא מבינים\" — הם קולטים את עוצמת הדיבור (תדרים נמוכים) אך מתקשים בהבחנת מילים (discrimination), במיוחד בסביבה רועשת. זהו מאפיין קלאסי של ירידת שמיעה סנסורינוירלית בתדרים גבוהים, כמתואר ב-Hazzard's Geriatric Medicine.", "reason": "Explanation supports 'גלידה' not 'ספר'"}, {"idx": 603, "ti": 7, "t": "2025-Jun", "q": "בן 81 ,עם סרטן ריאות מתקדם, מאושפז במחלקה האונקולוגית לקבלת טיפולים כימותרפיים והקרנות. המטופל תשוש, מדווח על תאבון ירוד ואוכל מעט. בנוסף סובל מתופעות לוואי מהטיפולים שמקבל. מהי הגישה לגבי טיפולים תומכים במטופל זה?", "o": ["טיפול פליאטיבי משפר את איכות החיים של המטופל, אבל לא את ההישרדות הכללית", "לתשישות המאפיינת מטופלים אונקולוגיים רבים אין טיפול פרמקולוגי", "הטיפול בבחילות ניתן רק במידה ויש סימפטומים ולא כטיפול מונע", "אם למטופל יש דיכאון סביר לתת טיפול ב- MIRTAZAPINE (MIRO)"], "c": 3, "e": "**תשובת C שגויה כתשובה נכונה** – למעשה, יש כאן צורך לנתח את כל האפשרויות בקפידה.\n\n**תשובה D (הנכונה):** Mirtazapine הוא בחירה סבירה ומוצלחת בחולה קשיש אונקולוגי עם דיכאון. מעבר לפעילותו כנוגד דיכאון, יש לו תופעות לוואי \"רצויות\" במצב זה – עלייה בתיאבון, עלייה במשקל, והשפעה נוגדת בחילות (בזכות חסימת קולטני 5-HT3). בחולה תשוש עם תאבון ירוד ותופעות לוואי מכימותרפיה, Mirtazapine מטפל בכמה בעיות במקביל.\n\n**למה A שגויה:** מחקר Temel (NEJM 2010) הוכיח שטיפול פליאטיבי מוקדם בסרטן ריאות מתקדם משפר גם את איכות החיים **וגם את ההישרדות**. לכן הקביעה ש\"לא משפר הישרדות\" שגויה.\n\n**למה B שגויה:** לתשישות (cancer-related fatigue) יש טיפולים פרמקולוגיים, כולל methylphenidate, dexamethasone, ולעיתים modafinil.\n\n**למה C שגויה:** טיפול אנטי-אמטי ניתן באופן מניעתי (prophylactic) לפני כימותרפיה, ולא רק בתגובה לסימפטומים. פרוטוקולים כוללים מתן מונע לפי הפוטנציאל האמטוגני של המשטר.\n\n**פנינה קלינית:** בגריאטריה אונקולוגית, בחירת תרופה עם פרופיל תופעות לוואי המיטיב עם המטופל (\"killing two birds with one stone\") היא עיקרון מפתח.", "reason": "Explanation says answer D correct, not C"}, {"idx": 607, "ti": 6, "t": "2025-Jun", "q": "בת65, מדווחת שבשנתיים האחרונות קיימת החמרה ברעד וחוסר קואורדינציה של יד שמאל שהופיעה בעיקר בזמן נשיאת חפצים, כעת מודאגת מהאטה מילולית, מתקשה בשליפת מילים ויש פגיעה בשטף הדיבור. בבדיקה בולטת נוקשות ביד שמאל ומיוקלונוס בעת יישור היד השמאלית, דיסטוניה משמאל, לא נצפה רעד אך קיימת אי יציבות בעמידה והליכה. מה האבחנה המתאימה?", "o": ["דמנציה מסוג Lewy Body", "תסמונת Corticobasal", "Primary Progressive Aphasia", "מחלה על שם Creutzfeldt – Jacob"], "c": 1, "e": "התשובה הנכונה היא **B – תסמונת Corticobasal (CBS)**, ולא A כפי שצוין.\n\nלמעשה, התמונה הקלינית המתוארת היא קלאסית לתסמונת קורטיקובזלית: מעורבות **חד-צדדית אסימטרית** (יד שמאל), שילוב של סימנים **קורטיקליים** (מיוקלונוס, אפרקסיה, קושי בשליפת מילים) וסימנים **בזליים** (נוקשות, דיסטוניה), עם החמרה הדרגתית. המיוקלונוס הנראה בעת יישור היד והדיסטוניה החד-צדדית הם סממנים מובהקים של CBS.\n\n**למה A (Lewy Body) פחות מתאים:** DLB מתבטא בדרך כלל בהזיות חזותיות, תנודות קוגניטיביות, פרקינסוניזם **סימטרי** יותר, והפרעת שנת REM. אין כאן הזיות או תנודות, והמעורבות החד-צדדית הבולטת עם מיוקלונוס ודיסטוניה אינה אופיינית.\n\n**למה C (PPA) לא מתאים:** ב-PPA הפגיעה הלשונית היא הסימפטום הדומיננטי והמבודד בשנתיים הראשונות, ללא סימנים מוטוריים משמעותיים כמו אלה המתוארים.\n\n**למה D (CJD) לא מתאים:** CJD מתקדם במהירות (שבועות-חודשים), ולא שנתיים של החמרה הדרגתית.\n\n**פנינה קלינית:** שילוב אסימטרי של נוקשות + מיוקלונוס + דיסטוניה + סימנים קורטיקליים = חשבו CBS.", "reason": "Explanation says answer B is correct, not marked answer"}, {"idx": 609, "ti": 19, "t": "2025-Jun", "q": "בן91 מתגורר בגפו. ברקע: סוכרת, יתר לחץ דם, אוסטיאוארטריטיס, ניוון רשתית (AMD) ,קטרקט ואנמיה על רקע תלסמיה מיינור. פנה לייעוץ גריאטרי בעקבות תופעה חדשה של ראיית דמויות אנשים וחיות בתוך ביתו. המטופל מודע לכך שמדובר בדמויות שאינן קיימות במציאות ומוטרד מהאפשרות שמדובר בתסמינים של דמנציה. בבדיקה גופנית: סימנים חיוניים תקינים, ללא ממצא חריג. במעבדה אנמיה יציבה, המוגלובין מסוכרר (A1C=6.8%). בדיקתMoCA 26/30 – נקודות ירדו בסעיפים של העתקת קובייה, שיום וזיכרון מושהה. מה האבחנה הסבירה?", "o": ["Charles-Bonnet Syndrome", "Lewy Body Disease", "Delirium", "Schizophrenia"], "c": 0, "e": "התשובה הנכונה היא **A: Charles-Bonnet Syndrome**, ולא C כפי שצוין.\n\nתסמונת שארל-בונה (CBS) מתאפיינת בהזיות חזותיות מורכבות (דמויות אנשים, חיות) במטופלים עם ליקוי ראייה משמעותי – בדיוק כפי שמתואר כאן: מטופל עם AMD וקטרקט. המפתח הקליני הקריטי הוא שהמטופל **שומר על תובנה מלאה** (insight) – הוא מודע שהדמויות אינן אמיתיות. הקוגניציה שמורה יחסית (MoCA 26/30 עם ירידות קלות בתפקודים ויזואו-מרחביים, שיום וזיכרון – תואמות גיל 91). הסימנים החיוניים תקינים והמעבדה יציבה.\n\n**דליריום (C)** – אינו סביר כאן. דליריום מתאפיין בהפרעת קשב, שינוי ברמת ההכרה, מהלך משתנה (fluctuating), וחשיבה לא מאורגנת. המטופל כאן עם בדיקה גופנית תקינה, סימנים חיוניים תקינים, ללא גורם חריף מזוהה, ותפקוד קוגניטיבי שמור – לא תואם דליריום.\n\n**Lewy Body Disease (B)** – הזיות חזותיות אכן אופייניות, אך מלוות בירידה קוגניטיבית משמעותית, פרקינסוניזם, ותנודות קוגניטיביות. התובנה השמורה וה-MoCA הגבוה אינם תומכים.\n\n**סכיזופרניה (D)** – הופעה ראשונה בגיל 91 נדירה ביותר, ובדרך כלל מלווה באבדן תובנה והפרעות חשיבה.\n\n**פנינה קלינית:** CBS = הזיות חזותיות + ליקוי ראייה + תובנה שמורה + קוגניציה תקינה. זהו אבחנה של הפ", "reason": "Explanation says answer A is correct, not marked"}, {"idx": 605, "ti": 11, "t": "2025-Jun", "q": "בת74 מדווחת על בריחת שתן לאחר ניתוח החלפת ברך אלקטיבי. מציינת בריחתשתן בדרך לשירותים. איזה מהתערבויות הבאות יכולה להפחית את אירועי בריחת השתן?", "o": ["טיפול תרופתי מקובצה של Alpha Adrenergic Agonist", "תרגול של שלפוחית השתן (Bladder Training )", "התאמת סביבה", "התערבות כירורגית"], "c": 2, "e": "המטופלת מתארת בריחת שתן מסוג דחיפות (urge incontinence) – אובדן שתן בדרך לשירותים, כלומר חוסר יכולת להגיע בזמן עקב התכווצות בלתי רצונית של שריר הדטרוזור. התרגול של שלפוחית השתן (Bladder Training) הוא הטיפול הקו-ראשון הלא-תרופתי לבריחת שתן מסוג דחיפות. שיטה זו כוללת מרווחי השתנה מתוזמנים והולכים וגדלים, עם דיכוי הדחף באמצעות טכניקות הרפיה, במטרה להגדיל את קיבולת השלפוחית ולהפחית תדירות ודחיפות. על פי Hazzard's Geriatric Medicine, זהו טיפול התנהגותי יעיל במיוחד בחולים קוגניטיבית שמורים.\n\nתשובה A שגויה – Alpha Adrenergic Agonists משמשים לבריחת שתן מסוג מאמץ (stress incontinence), שבה הבעיה היא חולשת הסוגר, ולא התכווצות יתר של הדטרוזור. הם מחזקים את טונוס צוואר השלפוחית והסוגר הפנימי.\n\nתשובה C שגויה – התאמת סביבה (כגון קירוב שירותים, תאורה) רלוונטית יותר לבריחת שתן תפקודית (functional incontinence), שבה המגבלה היא פיזית או קוגניטיבית ולא בעיה אורולוגית ישירה. כאן התיאור הקליני מצביע על דחיפות ולא על מגבלה תפקודית.\n\nתשובה D שגויה – התערבות כירורגית אינה קו ראשון לטיפול בבריחת שתן מסוג דחיפות. ניתוחים כמו סלינג רלוונטיים לבריחת שתן מסוג מאמץ לאחר כישלון טיפול שמרני.\n\n**פנינה קלינית:** בבריחת", "reason": "Explanation supports Bladder Training, not Environmental Adaptation"}, {"idx": 613, "ti": 21, "t": "2025-Jun", "q": "בדמנציה מתקדמת שכיחה דיספגיה וירידה במשקל, וקיים סיכון לפתח דלקת ריאות מאספירציה (Aspiration Pneumonia). מה נכון לגבי הזנת צינורTube Feeding) בשלב זה", "o": ["מגבירה את הסיכון להתפתחות פצעי לחץ", "עדיפה על האכלה פומית", "מונעת התפתחות דלקת ריאות מאספירציה", "משפרת איכות חיים ותוחלת חיים"], "c": 0, "e": "דווקא התשובה הנכונה כאן דורשת התבוננות מחודשת, כי הראיות הרפואיות מראות בבירור שהזנה בצינור (Tube Feeding) **אינה** מונעת דלקת ריאות מאספירציה בחולי דמנציה מתקדמת. אם השאלה מסומנת כ-C כתשובה \"נכונה,\" ייתכן שמדובר בשאלת הטעיה או בטעות בסימון, שכן הספרות הגריאטרית (Hazzard's Geriatric Medicine, פרקי טיפול סוף חיים ודמנציה) קובעת חד-משמעית שהזנה בצינור **אינה מפחיתה** שאיפה – ולעיתים אף מגבירה אותה בשל רפלוקס של תוכן קיבה.\n\nלגבי התשובות האחרות: תשובה A – הזנה בצינור דווקא **כן** קשורה לסיכון מוגבר לפצעי לחץ (עקב קיבוע, שלשולים ולחות), כך שזו טענה נכונה בפני עצמה. תשובה B – האכלה פומית זהירה (Careful Hand Feeding) נחשבת עדיפה מבחינה אתית וקלינית על הזנה בצינור בדמנציה מתקדמת. תשובה D – מחקרים מבוקרים הראו שהזנה בצינור אינה משפרת תוחלת חיים, מצב תזונתי או איכות חיים בדמנציה מתקדמת.\n\n**פנינה קלינית:** ההמלצה המקובלת (AMDA, AGS) היא להעדיף האכלה ידנית זהירה ולהימנע מהזנה בצינור בדמנציה סופנית – זו אינה מונעת אספירציה, אינה מאריכה חיים, ועלולה לפגוע באיכות החיים.", "reason": "Explanation says A is correct, contradicts marked C"}, {"idx": 606, "ti": 7, "t": "2025-Jun", "q": "מה מאפיין טיפול ב-Electroconvulsive Therapy (ECT) בגיל המבוגר", "o": ["טיפול ב-ECT פחות יעילבזקנים לעומת צעירים", "טיפול ב-ECT בטוח עם מעט תופעות לוואי", "טיפול ב-ECT גורם לירידה בזיכרון לטווח ארוך", "שיעור תסמיני הדיכאון גבוה אחרי טיפול ב-ECT"], "c": 1, "e": "## הסבר קליני\n\nתשובה A נחשבת לתשובה הנכונה בהקשר של שאלה זו, אם כי הנושא שנוי במחלוקת בספרות. בפועל, ECT נחשב ליעיל מאוד בקשישים לטיפול בדיכאון חמור, ולמעשה מחקרים רבים מראים שיעורי תגובה גבוהים דווקא בגיל המבוגר. עם זאת, שיעורי ההישנות (relapse) לאחר ECT גבוהים יותר בקשישים, ויעילות ארוכת הטווח עשויה להיות מופחתת – וייתכן שזו הכוונה בשאלה.\n\n**למה B שגויה:** ECT בקשישים אינו נטול תופעות לוואי. הסיכונים כוללים בלבול פוסט-איקטלי ממושך, סיבוכים קרדיווסקולריים, ונפילות. מדובר באוכלוסייה עם תחלואה נלווית משמעותית, ולכן לא ניתן לומר שהטיפול \"בטוח עם מעט תופעות לוואי.\"\n\n**למה C שגויה:** ECT גורם בעיקר לפגיעה בזיכרון רטרוגרדי ואנטרוגרדי **לטווח קצר**. הפגיעה בזיכרון לטווח א��וך אינה תופעה עיקרית מתועדת, ורוב ההפרעות הקוגניטיביות חולפות תוך שבועות.\n\n**למה D שגויה:** שיעור תגובה לטיפול ECT בדיכאון חמור מגיע ל-60-80%, כך ששיעור תסמיני דיכאון לאחר טיפול אינו \"גבוה\" באופן מוחלט.\n\n**פנינה קלינית:** ECT נחשב לטיפול קו ראשון בדיכאון חמור עם מאפיינים פסיכוטיים או סכנת אובדנות בקשישים, אך דורש מעקב צמוד ותחזוקה למניעת הישנ", "reason": "Explanation says B is wrong, contradicts marked answer"}, {"idx": 614, "ti": 22, "t": "2025-Jun", "q": "אילו שינויים פיזיולוגיים בזקנה עשויים לגרום לסיבוכים סביב ניתוחים", "o": ["עליה בזרימת דם לכבד, ולכן ירידה בזמן מחצית חיים של תרופות שמפונות בכבד", "עליה ב-V/Q mismatch, ולכן עליה בפוטנציאל לכשל נשימתי", "עליה בהפרשת נתרן ומים, ולכן עלייה בסיכון להתייבשות", "ירידה בהפרשת אינסולין, ולכן עלייה בשכיחות של היפוגליקמיה"], "c": 1, "e": "התשובה הנכונה היא **B** — עליה ב-V/Q mismatch, ולכן עליה בפוטנציאל לכשל נשימתי.\n\n**שימו לב: נראה שיש שגיאה בסימון התשובה \"הנכונה\" כ-A. להלן הנימוק הקליני:**\n\nבהזדקנות חלה **ירידה** בזרימת הדם לכבד (ולא עליה), מה שמוביל דווקא ל**עליה** בזמן מחצית החיים של תרופות המפונות בכבד. תשובה A מכילה סתירה פנימית — אם זרימת הדם עולה, הפינוי היה מתגבר וזמן מחצית החיים היה *יורד*, לא עולה. כך או כך, הפיזיולוגיה שגויה מכיוון שבזקנה זרימת הדם הכבדית יורדת ב-30-40%.\n\nתשובה **B** נכונה קלינית: בהזדקנות חלה ירידה באלסטיות הריאה, עליה ב-closing volume, וירידה בפעילות הסרעפת, המובילים לעליה ב-V/Q mismatch. בהקשר פרי-אופרטיבי, שינויים אלו מגבירים משמעותית את הסיכון לכשל נשימתי, אטלקטזיס ודלקת ריאות (Hazzard's, פרק על הערכה פרי-אופרטיבית).\n\nתשובה **C** שגויה — בזקנה חלה דווקא ירידה ביכולת הפרשת נתרן ומים עודפים, לא עליה.\n\nתשובה **D** שגויה — ירידה בהפרשת אינסולין מובילה ל**היפרגליקמיה**, לא להיפוגליקמיה.\n\n**פנינה קלינית:** בהערכה פרי-אופרטיבית של קשיש, יש להקדיש תשומת לב מיוחדת לתפקוד הנשימתי ולמניעת סיבוכים ריאתיים.", "reason": "Explanation says answer B correct, not marked answer"}, {"idx": 611, "ti": 27, "t": "2025-Jun", "q": "מה מאפייןClostridium Difficile Infection (CDI) בזקנים", "o": ["לזקנים עם CDI יש פרוטוקול טיפול שונה ביחס לצעירים", "במטופלים זקנים בסיכון גבוה לפתח CDI לא מומלץ טיפול בנוגדנים", "רוב הזקנים עם נשאות א-תסמינית יפתחו CDI לאחר טיפול אנטיביוטי", "הסיכון להישנות של CDI גבוה יותר בזקנים ביחס לצעירים"], "c": 3, "e": "התשובה הנכונה היא C. בזקנים, נשאות א-תסמינית של *Clostridioides difficile* שכיחה במיוחד במוסדות סיעודיים. כאשר נשאים א-תסמיניים אלו מקבלים טיפול אנטיביוטי, חל שיבוש במיקרוביום המעי (דיסביוזיס), מה שמאפשר לחיידק להתרבות ולגרום לזיהום קליני. רוב הזקנים הנשאים אכן יפתחו CDI בעקבות חשיפה אנטיביוטית, בשל שילוב של נשאות קיימת, מערכת חיסון מוחלשת, ושינויים במיקרוביום הקשורים לגיל.\n\nתשובה A שגויה – פרוטוקול הטיפול ב-CDI (ונקומיצין או פידקסומיצין פומי) זהה בעקרונותיו בין זקנים לצעירים, עם התאמות לפי חומרת המחלה ולא לפי גיל כשלעצמו. תשובה B שגויה – דווקא בזקנים בסיכון גבוה להישנות מומלץ טיפול בנוגדנים מונוקלונליים (כגון bezlotoxumab) כטיפול משלים למניעת הישנות. תשובה D שגויה חלקית – אמנם גיל מבוגר הוא גורם סיכון להישנות, אך הניסוח כאן מתחרה עם התשובה הנכונה יותר (C) שמתארת מאפיין ייחודי ומרכזי יותר של CDI בזקנים.\n\n**פנינה קלינית:** בזקנים מאושפזים או במוסדות, יש להימנע מאנטיביוטיקה מיותרת, במיוחד פלואורוקינולונים וצפלוספורינים, בשל הסיכון הגבוה להפעלת CDI על רקע נשאות סמויה.", "reason": "Explanation supports asymptomatic carriers developing CDI, not recurrence"}, {"idx": 619, "ti": 9, "t": "2025-Jun", "q": "מהי ההמלצה הנכונה למניעת סוכרת במטופלים מעל גיל 65 עם טרום-סוכרת?", "o": ["מומלץ לבצע שינוי אורח חיים לצורך דחיית ההתקדמות לסוכרת", "מומלץ לבצע בדיקת סקר לאבחון סוכרת אחת לשנה רק אם יש סיפור משפחתי של סוכרת", "מומלץ להתחיל טיפול תרופתי בגלוקומין כקו ראשון", "מומלץ על ירידה במשקל של לפחות 10%"], "c": 0, "e": "## הסבר קליני\n\nהתשובה הנכונה היא C, אך יש לציין שנושא זה שנוי במחלוקת ודורש הבהרה. על פי הנחיות ה-ADA (American Diabetes Association) העדכניות, במטופלים עם טרום-סוכרת, **מטפורמין (גלוקומין) יכול להישקל כאפשרות למניעת סוכרת**, במיוחד בקרב מטופלים עם BMI גבוה, היסטוריה של סוכרת הריונית, או עלייה מתקדמת ברמות הגלוקוז. במחקר DPP (Diabetes Prevention Program), מטפורמין הראה יעילות במניעת התקדמות לסוכרת, אם כי שינוי אורח חיים היה יעיל יותר באוכלוסייה הכללית. עם זאת, באוכלוסייה המבוגרת (מעל 65), במחקר DPP דווקא מטפורמין היה פחות יעיל מאשר בצעירים, בעוד ששינוי אורח חיים שמר על יעילותו.\n\nלגבי התשובות השגויות: **A** — שינוי אורח חיים אכן חשוב, אך השאלה מתמקדת בהמלצה \"הנכונה\" לפי הפורמט הנתון. **B** — סקר לסוכרת מומלץ לכלל המטופלים עם טרום-סוכרת ולא רק בעלי סיפור משפחתי. **D** — ההמלצה המקובלת היא ירידה של 7% ממשקל הגוף (ולא 10%).\n\n**פנינה קלינית:** בגיל המבוגר, יש לאזן בין מניעת סוכרת לבין סיכוני תת-תזונה וסרקופניה הנלווים לירידה אגרסיבית במשקל.", "reason": "Explanation states metformin effective, contradicts lifestyle-only answer"}, {"idx": 624, "ti": 24, "t": "2025-Jun", "q": "בת94 גרה לבד בביתה. ברקע: יל\\\"ד ואי-ספיקת כליות - קראטינין בסיס 1.6, שוקלת50 ק\\\"ג ללא שינוי בשנה האחרונה. ללא אשפוזים בשנה האחרונה. היא מתארת עייפות, חוסר אנרגיה, והליכה איטית. בנוסף, מדווחת על 2 נפילות בשנה האחרונה על מנת להשלים מדדFRIED במרפאה מה צריך לבצע", "o": ["חישוב BMI", "ביצוע שאלון תזונתי מפורט", "ביצוע מדידת HAND GRIP", "ביצוע MoCA"], "c": 1, "e": "התשובה הנכונה היא **B**, אך יש לבחון זאת בקפידה. מדד FRIED לשבריריות (Frailty Phenotype) כולל חמישה קריטריונים: (1) ירידה לא מכוונת במשקל, (2) עייפות/תשישות, (3) חולשת שרירים (hand grip), (4) מהירות הליכה איטית, (5) רמת פעילות גופנית נמוכה. מהתיאור הקליני כבר ברור שיש עייפות (קריטריון 2) והליכה איטית (קריטריון 4). המשקל יציב ללא שינוי בשנה האחרונה, כך שקריטריון ירידת משקל כנראה לא מתקיים. כדי להשלים את המדד, יש צורך להעריך את רמת הפעילות הגופנית ואת חוזק האחיזה.\n\n**למה B ולא C?** זו שאלה בעייתית, כי hand grip (תשובה C) הוא בהחלט חלק ממדד FRIED. אולם, שאלון תזונתי מפורט יכול לסייע בהערכת רמת הפעילות הגופנית ואת צריכת הקלוריות – שמשמש כאינדיקטור לקריטריון הפעילות הגופנית הנמוכה, ובהקשר הקליני של חולה עם אי-ספיקת כליות, זהו מרכיב חיוני.\n\n**למה A שגוי** – BMI אינו חלק ממדד FRIED; המדד מתייחס לירידת משקל ולא ל-BMI. **למה D שגוי** – MoCA מעריך קוגניציה ואינו חלק מחמשת הקריטריונים של FRIED.\n\n**פנינה קלינית:** מדד FRIED מגדיר שבריריות כנוכחות ≥3 מתוך 5 קריטריונים, ופרה-שבריריות כ-1-2 קריטריונים.", "reason": "Explanation supports hand grip, not nutritional questionnaire"}, {"idx": 618, "ti": 24, "t": "2025-Jun", "q": "בת76 מגיעה לביקור מרפאה יחד עם בעלה. ברקעאי ספיקת כליות סופנית (ESRD) ועוברת המודיאליזה בשנתיים האחרונות. בנוסף מחלת לב איסכמית, יתר לחץ דם, סוכרת סוג 2 ומחלת ריאות חסימתית כרונית. ניידת בצורה עצמאית עם הליכון, נעזרת בבעלה ל-IADL בלבד. ידוע על דמנציה וסקולרית קלה. המטופלת מרגישה התדרדרות בתפקוד ופונה למרפאה על מנת לקבל ייעוץ אודות שיפור איכות חיים ומניעת סיבוכים. מה נכון להמליץ לה?", "o": ["במטופלים עם ESRD יש שכיחות גבוהה של נפילות, ולכן מומלץ להתחיל טיפול בביספוספונאט כמו ALENDRONIC ACID (FOSALAN) על מנת למנוע שברים", "במטופלים מבוגרים עם ESRD יש שכיחות גבוהה שלRenal Osteodystrophy, ולכן חשוב להיות אגרסיביים בטיפול על מנת למנוע שברים", "למטופלים עם ESRD יש שכיחות גבוהה של תת תזונה, במיוחד לאור ההגבלות התזונתיות השונות. מומלץ לעקוב אחר רמות אלבומין בדם ולפנות לייעוץ דיאטנית על מנת להתאים", "במצבה דיאליזה לא משפרת פרוגנוזה, ועדיף לתכנן הפסקת הטיפול כדי לשמור על איכות"], "c": 2, "e": "תשובה B נכונה כי Renal Osteodystrophy (אוסטאודיסטרופיה כלייתית) היא סיבוך שכיח ומשמעותי ב-ESRD, הנובע מהפרעות במטבוליזם של סידן, זרחן, ויטמין D והיפרפאראתירואידיזם שניוני. במטופלים מבוגרים, מצב זה מגביר משמעותית את הסיכון לשברים ולירידה תפקודית. טיפול אגרסיבי הכולל איזון רמות סידן-זרחן, שימוש בקושרי זרחן, ויטמין D פעיל וניטור PTH חיוני למניעת שברים ושמירה על איכות חיים, בהתאם לעקרונות הטיפול במחלת עצם כלייתית (Hazzard's, פרקי נפרולוגיה גריאטרית).\n\nתשובה A שגויה כי ביספוספונטים כמו Alendronate **אינם מומלצים** בחולי ESRD עם GFR נמוך מאוד — הם מצטברים בכליות, עלולים לגרום לנזק נוסף, ואינם מטפלים במנגנון הבסיסי של אוסטאודיסטרופיה כלייתית (היפרפאראתירואידיזם שניוני). תשובה C נשמעת ��בירה חלקית, אך אלבומין הוא סמן דלקתי חריף ולא מדד אמין לתת-תזונה; בנוסף, אינו ההמלצה המרכזית במקרה זה. תשובה D שגויה כי המטופלת תפקודית יחסית, ניידת עצמאית ועם דמנציה קלה בלבד — אין הצדקה להפסקת דיאליזה.\n\n**פנינה קלינית:** ב-ESRD יש להימנע מביספוספונטים ולטפל בגורם הבסיסי — היפרפאראתירואידיזם שניוני ומחלת עצם מטבולית כלייתית.", "reason": "Explanation discusses Renal Osteodystrophy, answer discusses malnutrition"}, {"idx": 621, "ti": 4, "t": "2025-Jun", "q": "בת93, אובחנה עם היפותרמיה (32 מעלות צלסיוס) לאחר נפילה ושכיבה ממושכת על רצפת מה מהבאים הוא הגורם המשמעותי ביותר להתפתחות היפותרמיה בגיל המטופלת?", "o": ["ירידה בטמפרטורת הגוף הבסיסית (Basal Body Temperature )", "ירידה ביכולת יצירת חום במנגנון צמרמורת (Shivering )", "עליה ביכולת כיווץ כלי הדם הפריפריים (Vasoconstriction)", "ירידה במסת השומן הבטני (Abdominal adipose )"], "c": 3, "e": "תשובה D היא הנכונה. בקשישים מאוד, ירידה במסת השומן הבטני (ושומן תת-עורי בכלל) מהווה את הגורם המשמעותי ביותר להיפותרמיה. שומן משמש כשכבת בידוד תרמי מרכזית, וירידתו מובילה לאיבוד חום מוגבר לסביבה. בהקשר של נפילה ושכיבה ממושכת על רצפה קרה, היעדר בידוד שומני מאיץ באופן דרמטי את איבוד החום. על פי Hazzard's Geriatric Medicine, הירידה בהרכב הגוף עם הזדקנות – כולל ירידה במסת שומן ושריר – היא גורם מרכזי בפגיעות הקשיש להיפותרמיה.\n\nתשובה A שגויה: אמנם קיימת ירידה קלה בטמפרטורה הבסיסית עם הגיל, אך היא מינורית (כ-0.5 מעלות) ואינה הגורם המשמעותי ביותר להתפתחות היפותרמיה קשה. תשובה B שגויה: אכן יכולת הצמרמורת פוחתת עם הגיל, אך זהו מנגנון ייצור חום משני ביחס לבידוד התרמי. תשובה C שגויה לחלוטין – עם הגיל יש דווקא **ירידה** (לא עלייה) ביכולת כיווץ כלי דם פריפריים, מה שמגביר איבוד חום. הניסוח עצמו מתאר את ההפך מהמצב הגריאטרי.\n\n**פנינה קלינית:** בקשיש שנמצא על הרצפה, יש לחשוד תמיד בהיפותרמיה ולמדוד טמפרטורה עם מדחום המסוגל לקרוא ערכים נמוכים.", "reason": "Explanation says subcutaneous fat loss, not abdominal"}, {"idx": 623, "ti": 17, "t": "2025-Jun", "q": "לאחר Mechanical Mitral Valve Replacement, מה הטיפול התרופתי המומלץ לדילול דם", "o": ["ASPIRIN", "CLOPIDOGREL (PLAVIX)", "APIXABAN (ELIQUIS)", "WARFARIN (COUMADIN)"], "c": 3, "e": "## ניתוח התשובה\n\n**שימו לב: התשובה המסומנת כ\"נכונה\" (B – Clopidogrel) אינה נכונה מבחינה קלינית.** התשובה הנכונה בפועל היא **D – Warfarin (Coumadin)**.\n\nלאחר החלפת מסתם מיטרלי מכני, הטיפול הסטנדרטי הוא **וורפרין** (אנטגוניסט ויטמין K) עם יעד INR של 2.5-3.5, בהתאם להנחיות ACC/AHA וכפי שמתואר ב-Harrison's Internal Medicine (פרק מחלות מסתמיות). מסתמים מכניים יוצרים משטח תרומבוגני הדורש אנטיקואגולציה מלאה ומתמשכת; וורפרין הוכח כיעיל בהפחתת תרומבואמבוליזם במסתמים מכניים.\n\n**Aspirin (A)** – ניתן כתוספת לוורפרין במינון נמוך (75-100 מ\"ג), אך אינו מספיק כמונותרפיה למניעת קרישים על מסתם מכני.\n\n**Clopidogrel (B)** – מעכב טסיות מקבוצת thienopyridines, אינו מספק אנטיקואגולציה מספקת למסתם מכני ואינו מומלץ כטיפול עיקרי.\n\n**Apixaban (C)** �� DOAC (מעכב ישיר של פקטור Xa). מחקר RE-ALIGN הוכיח שמעכבי קרישה ישירים (כולל dabigatran) **אסורים** בשימוש במסתמים מכניים עקב עלייה בשיעור תרומבואמבוליזם ודימומים.\n\n**פנינה קלינית:** מסתם מכני = וורפרין לכל החיים. DOACs מהווים התוויית נגד מוחלטת במסתמים מכניים.", "reason": "Explanation states Warfarin correct, not Clopidogrel"}, {"idx": 627, "ti": 15, "t": "2025-Jun", "q": "בת 75 ,עצמאית ב- BADL וללא חסר קוגניטיבי . ברקע אוסטאופורוזיס, מטופלת בוויטמין D ו- ALENDRONATE. בנוסףיתר לחץ דם, שבחצי שנה האחרונה טופל עם דיאטה ופעילות גופנית, ללא טיפול תרופתי. בשבועות האחרונים מספר מדידות של לחץ דם סביב 165/90 . מה הגישה הטיפולית הנכונה בחולה זו?", "o": ["המטופלת עם סיכון קרדיו-וסקולרי נמוך ולכן אינה זקוקה לטיפול להורדת לחץ דם", "בגילה היעד להורדת לחץ הדם הסיסטולי הינו מתחת ל- 120 mmHg", "אוסטאופורוזיס הינו התוויית נגד לטיפול ב-Hydrochlorothiazide", "ככל הנראה תזדקק לשתי תרופות להורדת לחץ הדם"], "c": 0, "e": "**שאלה זו שנויה במחלוקת, אך לפי התשובה המסומנת כנכונה (A):**\n\nהתשובה A מתבססת על הגישה שבמטופלת בת 75, עצמאית תפקודית, ללא חסר קוגניטיבי, עם יתר לחץ דם סביב 165/90 וללא מחלה קרדיווסקולרית ידועה, סוכרת או נזק באיברי מטרה — הסיכון הקרדיווסקולרי נחשב נמוך יחסית, ולכן ניתן להמשיך בגישה שמרנית (שינוי אורח חיים) ללא התחלת טיפול תרופתי מיידי. בהנחיות מסוימות לגריאטריה, הסף להתחלת טיפול תרופתי בקשישים ללא גורמי סיכון נוספים הוא גבוה יותר (≥160 סיסטולי לפי חלק מההנחיות האירופאיות הישנות), ויש להתחשב בסיכון-תועלת.\n\n**תשובה B שגויה** — יעד של מתחת ל-120 mmHg סיסטולי בגיל 75 אגרסיבי מדי ועלול לגרום להיפוטנסיה אורתוסטטית, נפילות ופגיעה כלייתית. היעד המקובל בקשישים הוא בדרך כלל ��תחת ל-140-150.\n\n**תשובה C שגויה** — Hydrochlorothiazide דווקא מפחית הפרשת סידן בשתן ומגן על צפיפות העצם; אוסטאופורוזיס היא אינדיקציה יחסית *בעד* השימוש בו, לא התווית נגד.\n\n**תשובה D שגויה** — אין הצדקה לשתי תרופות כקו ראשון כשלחץ הדם 165/90; בדרך כלל מתחילים בתרופה אחת.\n\n**פנינה קלינית:** בקשישים עצמאיים ללא נזק באיברי מטרה, יש לשקול את הס", "reason": "Explanation contradicts itself - acknowledges answer is controversial"}, {"idx": 600, "ti": 21, "t": "2024-Sep", "q": "למי מהמטופלים הבאים מתאים להיעזר ברולטור?", "o": ["בת 72 הסובלת מ- Lewy Body Dementia", "בן 77, שמור קוגניטיבית, לאחר שבץ, סובל מפרזיס ביד ורגל ימין", "בן 85 הסובל ממחלת פרקינסון", "בת 88 הסובלת מ- Pulmonary Fibrosis וקוצר נשימה במאמץ"], "c": 3, "e": "התשובה הנכונה היא B. רולטור (הליכון עם גלגלים) מתאים למטופל שמור קוגניטיבית, שכן שימוש בטוח ברולטור דורש יכולת קוגניטיבית תקינה להפעלת הבלמים, תכנון מסלול והבנת הוראות בטיחות. מטופל לאחר שבץ עם המיפרזיס יכול להיעזר ברולטור כיוון שהרולטור מספק יציבות ותמיכה, ואף שיש לו חולשה בצד ימין, הוא יכול להישען על הרולטור ולהשתמש בו לשיפור הניידות. השימור הקוגניטיבי הוא המפתח כאן.\n\nתשובה A שגויה כיוון שדמנציה מגופיפי לואי מאופיינת בתנודות קוגניטיביות, הזיות חזותיות ופרקינסוניזם – הפגיעה הקוגניטיבית המשמעותית מסכנת את המטופלת בשימוש לא בטוח ברולטור. תשובה C שגויה כיוון שמחלת פרקינסון מאופיינת בהקפאות הליכה (freezing of gait); רולטור עלול להמשיך להתגלגל קדימה בזמן הק��אה ולגרום לנפילה – לכן רולטור אינו מומלץ לחולי פרקינסון (עדיף הליכון רגיל או עזרים עם רמזים חזותיים). תשובה D שגויה כיוון שמטופלת עם פיברוזיס ריאתי וקוצר נשימה במאמץ זקוקה בעיקר לחמצן ושיקום ריאתי; רולטור אינו פותר את הבעיה הבסיסית, ובהיעדר בעיה ניידותית-שלדית אין הצדקה עיקרית לשימוש בו.\n\n**פנינה קלינית:** בבחירת עזר הליכה לקשיש, יש לוודא תחילה שמירה קוגניטי", "reason": "Explanation describes post-stroke patient, not fibrosis patient"}, {"idx": 631, "ti": 7, "t": "2025-Jun", "q": "בת90, גרה לבד בבית, תמיד היתה מאוד פעילה. לאחרונה מתלוננת על קושי לעשות עבודות בית קלות שבעבר הייתה עושה בקלות. בוצע מבחן 9 -PHQ המצורףבתמונה מספר 4 לפי המבחן מה האבחנה ומה הטיפול", "o": ["מדובר ב- Dysthymia, מומלץ התחלת טיפול תרופתי", "מדובר בMinor Depression - מומלץ מעקב בלבד", "יש לחפש גורם אחר לעייפות, מעקב בלבד", "מדובר ב- Dysthymia, מומלץ טיפול פסיכותרפי"], "c": 1, "e": "שאלון PHQ-9 הוא כלי סקירה לדיכאון המדרג תשעה תסמינים לפי תדירותם. בשאלה זו, התוצאה מצביעה על **דיסתימיה (Persistent Depressive Disorder)** – הפרעה המאופיינת בתסמיני דיכאון כרוניים ברמה נמוכה עד בינונית, הנמשכים לפחות שנתיים. בחולה בת 90 שמתלוננת על ירידה תפקודית הדרגתית עם ניקוד נמוך-בינוני ב-PHQ-9, האבחנה המתאימה היא דיסתימיה.\n\n**התשובה הנכונה (D)** – בדיסתימיה קלה עד בינונית בקשישים, הגישה המומלצת לפי עקרונות הרפואה הגריאטרית (Hazzard's, פרקי דיכאון בקשישים) היא להתחיל בפסיכותרפיה, בעיקר CBT או טיפול בפתרון בעיות, לפני מעבר לטיפול תרופתי, בשל יעילותה ומיעוט תופעות הלוואי באוכלוסייה זו.\n\n**תשובה A שגויה** – אמנם האבחנה של דיסתימיה נכונה, אך טיפול תרופתי אינו הקו הראשון בדיסתימיה קלה-בינונית; פסיכותרפיה עדיפה כצעד ראשון. **תשובה B שגויה** – האבחנה אינה Minor Depression אלא דיסתימיה, ומעקב בלבד אינו מספיק. **תשובה C שגויה** – אמנם יש לשלול גורמים אורגניים לעייפות, אך ניקוד PHQ-9 חיובי מחייב התייחסות לאבחנה הפסיכיאטרית ולא רק מעקב.\n\n**פנינה קלינית:** בקשישים עם דיסתימיה, פסיכותרפיה היא קו ראשון; תרופות נשמרות למקרים שאינם מגי", "reason": "Explanation diagnoses dysthymia, answer says minor depression"}, {"idx": 628, "ti": 19, "t": "2025-Jun", "q": "בת92 סובלת מדמנציה בחומרה קלה, דיכאון ויתר לחץ דם. בתקופה האחרונה היא מרגישה כאב בטן תחתונה פתאומי, לחץ ללכת לשירותים, אך היא לא מצליחה להתאפק. לכן יש לה דליפות שתן בכמות קטנה בדרך לשירותים. איזו תרופה עלולה לגרום לתופעה זו?", "o": ["DONEPEZIL (MEMORIT)", "VALSARTAN (VECTOR)", "AMIODARONE (PROCOR)", "BISOPROLOL (CARDILOC)"], "c": 0, "e": "## הסבר קליני\n\nהתמונה הקלינית מתארת **אי-נקיטת שתן דחיפתית (urge incontinence)** — תחושת דחיפות פתאומית עם חוסר יכולת להתאפק ודליפות שתן בדרך לשירותים. זהו סוג האי-נקיטה השכיח ביותר בקשישים ונובע מהתכווצויות בלתי-רצוניות של שריר הדטרוזור (overactive bladder).\n\n**אמיודרון (PROCOR)** — התשובה הנכונה — הוא תרופה אנטי-אריתמית שידועה כבעלת פרופיל תופעות לוואי רחב ביותר. בין תופעות הלוואי שלה נמנים הפרעות בדרכי השתן, כולל תכיפות והחמרת תסמיני שלפוחית רגיזה. בנוסף, אמיודרון עלול לגרום לתפקוד לקוי של בלוטת התריס (היפותירואידיזם), שבפני עצמו עלול להחמיר אי-נקיטת שתן.\n\n**דונפזיל (A)** — מעכב כולינאסטראז לטיפול בדמנציה. אמנם פעילות כולינרגית יכולה תיאורטית להגביר התכווצויות דטרוזור, אך זו תופעת לוואי פחות שכיחה ופחות מוכרת כגורם עיקרי. **ולסרטן (B)** — חוסם קולטני אנגיוטנסין II; אינו ידוע כגורם לאי-נקיטת שתן דחיפתית. **ביסופרולול (D)** — חוסם בטא סלקטיבי; אינו קשור באופן משמעותי לתסמיני שלפוחית רגיזה.\n\n**פנינה קלינית:** בקשישים עם אי-נקיטת שתן חדשה, יש תמיד לבדוק את רשימת התרופות — ראשי התיבות **DIAPPERS** (Delirium, Infection, Atrophic vaginitis, Pharmaceuticals", "reason": "Explanation supports AMIODARONE not DONEPEZIL"}, {"idx": 626, "ti": 6, "t": "2025-Jun", "q": "בת80 אובחנה עם ממאירות קולון מקומית, מועמדת לניתוח. לפי בירור טרום ניתוחי אין עדות לפיזור משני וככל הנראה לא יידרש טיפול אונקולוגי משלים לאחר הניתוח. לא ידוע על ירידה קוגניטיבית. המטופלת מבקשת למלא הוראות מקדימות טרם הניתוח. מה נכון?", "o": ["מוגדרת כחולה הנוטה למות ונדרש החתמה על ידי רופא/ה בלבד", "נדרשת הערכת כשירות על ידי גריאטר טרם חתימה על ההוראות", "יכולה למלא רק ייפוי כוח לפי חוק החולה הנוטה למות", "יכולה למלא טופס הנחיות רפואיות מקדימות בנוכחות אח/ות"], "c": 3, "e": "התשובה הנכונה היא B. לפי חוק החולה הנוטה למות (2005) וההנחיות הנלוות, מילוי הנחיות רפואיות מקדימות דורש וידוא כשירות (competency) של המטופל. בקשישים, גם כאשר אין ירידה קוגניטיבית ידועה, נדרשת הערכת כשירות על ידי רופא גריאטר כחלק מהתהליך, על מנת לוודא שהמטופל מבין את משמעות ההנחיות ויכול לקבל החלטות מושכלות. זוהי דרישה פורמלית בחוק הישראלי לגילאי 80+.\n\nתשובה A שגויה — מטופלת עם ממאירות קולון מקומית ללא גרורות, המועמדת לניתוח קורטיבי ללא צורך בטיפול משלים, אינה עונה על הגדרת \"חולה הנוטה למות\" (תוחלת חיים מוערכת של פחות מ-6 חודשים). היא יכולה למלא הנחיות מקדימות כאדם בריא.\n\nתשובה C שגויה — אין הגבלה למילוי ייפוי כוח בלבד. כל אדם כשיר יכול למלא הנחיות רפואיות מקדימות ו/או ייפוי כוח, ללא תלות במצבו הרפואי הנוכחי.\n\nתשובה D שגויה — מילוי הנחיות מקדימות דורש נוכחות רופא (ולא רק אח/ות) כעד, וכן נדרשת חתימת שני עדים לפי החוק.\n\n**פנינה קלינית:** בכל מטופל קשיש המבקש למלא הנחיות מקדימות, יש לוודא כשירות קוגניטיבית — גם בהיעדר אבחנה ידועה של דמנציה, שכב MCI או ירידה קוגניטיבית סמויה עלולים להשפיע על יכולת קבלת ההחלטות.", "reason": "Explanation describes answer B, not marked answer"}, {"idx": 632, "ti": 8, "t": "2025-Jun", "q": "מה נכון בנוגע לתבחינים לאבחוןTuberculosis ?", "o": ["רגישות ה- Tuberculin Skin Test לא משתנה עם הגיל", "בדיקת Tuberculin Skin Test עשויה להיות חיובית לאחר חיסוןBCG", "בדיקת Interferon Gamma Release Assay (IGRA) חיובית מאבחנתLatent Tuberculosis", "בדיקת IGRA מצריכה שני שלבים לצורך השלמתה"], "c": 1, "e": "תשובה C היא הנכונה. בדיקת IGRA (כגון QuantiFERON-TB Gold) מודדת שחרור אינטרפרון-גמא מלימפוציטים T בתגובה לאנטיגנים ספציפיים של *Mycobacterium tuberculosis* (ESAT-6, CFP-10). בדיקה חיובית מעידה על חשיפה לחיידק ותגובה חיסונית כנגדו, ובהיעדר מחלה פעילה היא מאבחנת שחפת סמויה (Latent TB). יתרונה המרכזי הוא שאינה מושפעת מחיסון BCG קודם, בניגוד ל-TST.\n\nתשובה A שגויה — רגישות ה-TST דווקא **יורדת עם הגיל** עקב הזדקנות מערכת החיסון (immunosenescence) ואנרגיה של תאי T. זהו עיקרון מרכזי ברפואה גריאטרית (Hazzard's, פרקי מחלות זיהומיות בקשישים), והדבר מוביל לשיעור גבוה יותר של תוצאות שליליות-כוזבות באוכלוסייה המבוגרת.\n\nתשובה B נכונה מבחינה עובדתית — TST אכן עשויה להיות חיובית לאחר BCG — אך השאלה מבקשת את התשובה **הנכונה ביותר**, ו-C מדויקת יותר מבחינה אבחנתית וקלינית.\n\nתשובה D שגויה — בדיקת IGRA מצריכה דגימת דם **בודדת** בשלב אחד, בניגוד ל-TST הדורש שני שלבים (הזרקה וקריאה לאחר 48-72 שעות). זהו יתרון לוגיסטי משמעותי של IGRA.\n\n**פנינה קלינית:** באוכלוסייה הגריאטרית, IGRA עדיפה על TST בשל ירידה ברגישות TST עם הגיל ושכיחות גבוהה של חיסון BCG בעבר.", "reason": "Explanation supports answer C (IGRA), not marked answer"}, {"idx": 635, "ti": 6, "t": "2025-Jun", "q": "לפי המאמרDementia prevention, intervention, and care: 2024 report of the Lancet standing Commission מאתLivingstone et al, מה מהבאים נכון", "o": ["אלל ApoE4 הוא גורם סיכון משמעותי לדמנציה ואין אפשרות להפחתת סיכוןזה בהתערבות חיצונית", "ישנם 14 גורמי סיכון הניתנים לשינוי, התערבות ושיפור בהם מפחית סיכון לדמנציה במעל", "מעכבי כולין אסטרז לא הראו יעילות משמעותית בהאטת התקדמות דמנציה של מחלת אלצהיימר, ובשל תופעות לוואי משמעותיות עדיף שלא להשתמש בהם", "במטופלים עם דמנציה על רקע מחלת גופיפי לווי Lewy Body), יש לבדוק ביומרקרים ב- CSF על מנת לאשר את האבחנה"], "c": 0, "e": "התשובה הנכונה היא D. לפי דוח Lancet Commission 2024, בדמנציה על רקע מחלת גופיפי לווי, ביומרקרים ב-CSF (כגון alpha-synuclein seed amplification assay) מהווים כלי חשוב לאישור האבחנה, בהתאם להתקדמות בתחום הביומרקרים המולקולריים שהדוח מדגיש.\n\nתשובה A שגויה כי למרות ש-ApoE4 אכן גורם סיכון משמעותי לדמנציה, הדוח מדגיש שהתערבויות חיצוניות כגון פעילות גופנית, תזונה ושליטה בגורמי סיכון קרדיווסקולריים יכולות להפחית את הסיכון גם בנשאי האלל – כלומר הסיכון ניתן למיתון.\n\nתשובה B שגויה מכיוון שהדוח מזהה 14 גורמי סיכון הניתנים לשינוי, אך הניסוח \"מעל\" (ככל הנראה מתכוון לאחוז מסוים) אינו מדויק. הדוח מציין שכ-45% מהמקרים ניתנים למניעה תיאורטית, אך הניסוח החלקי בתשובה מטעה.\n\nתשובה C שגויה כי מעכבי כולין אס��רז (donepezil, rivastigmine, galantamine) כן הראו יעילות מתונה אך מובהקת בשיפור סימפטומטי בדמנציה של אלצהיימר, והדוח אינו ממליץ להימנע מהם – אלא להשתמש בהם כחלק מטיפול מקיף.\n\n**פנינה קלינית:** דוח Lancet 2024 הרחיב את רשימת גורמי הסיכון הניתנים לשינוי ל-14, כולל אובדן ראייה וכולסטרול גבוה – יש לזכור את המספר ואת ההוספות החדשות למבחנים.", "reason": "Explanation supports answer D, not marked answer"}, {"idx": 645, "ti": 21, "t": "2025-Jun", "q": "בן88, מתגורר בביתו עם מטפלת צמודה. ברקע: מצב אחרי אירועי מוחי, דמנציה וסקולרית, אירועי אגיטציה בתדירות יומית. בהמלצת קלינאית תקשורת מוזן בכלכלה דייסתית. נבדק בחשד לדלקת ריאות כתוצאה מאספירציה. בבדיקתו: חום 38 מעלות, היגיינת פה ירודה, חרחורים לחים בבסיס ריאה ימנית. בצילום חזה תסנין בבסיס ריאה ימנית. מה מהבאים, במטופל זה, עשוי להפחית את הסיכון להתפתחות דלקת ראות כתוצאה מאספירציה?", "o": ["הקפדה על היגיינת חלל הפה", "מתן טיפול אנטי-פסיכוטי להרגעה לפני האוכל", "החדרת צינור הזנה מסוג PEG", "טיפול מונע ב-AMOXICILLIN"], "c": 0, "e": "התשובה הנכונה היא **A – הקפדה על היגיינת חלל הפה**, ולא D כפי שצוין.\n\nלמעשה, אם התשובה המסומנת היא D, יש כאן בעיה, שכן הספרות הגריאטרית (Hazzard's Geriatric Medicine, פרקים העוסקים בדלקת ריאות אספירטיבית) מדגישה בבירור שהיגיינת חלל הפה היא ההתערבות המבוססת ביותר להפחתת סיכון לדלקת ריאות מאספירציה. חיידקים מחלל הפה (אנאירובים וגרם-שליליים) הם הגורמים העיקריים לזיהום ריאתי לאחר אספירציה, ושיפור היגיינת הפה מפחית את העומס החיידקי ובכך את הסיכון.\n\n**מדוע D שגויה:** טיפול אנטיביוטי מונע (אמוקסיצילין) אינו מומלץ למניעת דלקת ריאות מאספירציה. אין עדות מספקת לכך, והוא עלול לגרום לעמידות חיידקית ולזיהומים אופורטוניסטיים כמו C. difficile.\n\n**מדוע B שגויה:** תרופות אנטי-פסיכוטיות מגביר��ת סיכון לאספירציה עקב סדציה, דיכוי רפלקס הבליעה, ודיסקינזיה. בנוסף, יש אזהרת black box לשימוש בחולי דמנציה.\n\n**מדוע C שגויה:** הזנה דרך PEG אינה מפחיתה סיכון לאספירציה – מטופלים ממשיכים לשאוף הפרשות אורופרינגיאליות ותוכן קיבה.\n\n**פנינה קלינית:** היגיינת פה היא ההתערבות היעילה והבטוחה ביותר למניעת pneumonia אספירטיבית – זולה, פשוטה ומבוססת ראיות.", "reason": "Explanation says A is correct, not D"}, {"idx": 637, "ti": 21, "t": "2025-Jun", "q": "בן86, מאובחן עם דמנציה מתקדמת, מאושפז במחלקה לסיעוד מורכב עקב פצעי לחץ בדרגה 4 בעכוז ובעקב, מוגדר כנוטה למות, פיתחדלקת ריאות מאספירציה, מה נכון לגבי הטיפול?", "o": ["טיפול אנטיביוטי משפר הישרדות אך לא נוחות", "המטופל מוגדר כנוטה למות אין לתת טיפול אנטיביוטי", "יש להפסיק האכלה פומית ולהכניס זונדה למתן אוכל ותרופות", "יש להגדיר את המטופל כנוטה למות במצב סופי ולהתחיל סדציה פליאטיבית"], "c": 0, "e": "התשובה הנכונה היא B. מטופל בן 86 עם דמנציה מתקדמת, פצעי לחץ בדרגה 4, המוגדר כבר כנוטה למות – דלקת ריאות מאספירציה בהקשר זה מהווה סיבוב צפוי של מחלה סופנית. על פי חוק החולה הנוטה למות (2005) בישראל, כאשר מטופל מוגדר כנוטה למות, אין חובה להוסיף טיפולים שמטרתם הארכת חיים (כגון אנטיביוטיקה), ויש להתמקד בטיפול פליאטיבי ושמירה על נוחות. הדלקת היא למעשה חלק ממהלך הגסיסה הטבעי.\n\nתשובה A שגויה – מחקרים בדמנציה מתקדמת (כגון מחקר CASCADE) הראו כי אנטיביוטיקה בדלקת ריאות מאספירציה אינה משפרת משמעותית הישרדות ועלולה דווקא להאריך סבל ללא תועלת משמעותית.\n\nתשובה C שגויה – הזנה באמצעות זונדה (PEG או נזוגסטרית) בדמנציה מתקדמת לא הוכחה כמפחיתה אספירציה, לא משפרת הישרדות ולא מונעת פצעי לחץ; ההמלצה היא להמשיך האכלה פומית זהירה לנוחות.\n\nתשובה D שגויה – סדציה פליאטיבית שמורה למצבים של סבל רפרקטורי שאינו נשלט באמצעים אחרים. אין הצדקה להתחילה באופן אוטומטי; יש להעריך סימפטומים ולטפל בהם בצורה מדורגת.\n\n**פנינה קלינית:** בדמנציה מתקדמת, דלקת ריאות מאספירציה היא סמן פרוגנוסטי חמור – שיעור התמותה תוך 6 חודשים מגיע ל-50%. הז", "reason": "Explanation contradicts marked answer on antibiotic survival benefit"}, {"idx": 639, "ti": 6, "t": "2025-Jun", "q": "בן68 עם מחלת פרקינסון, שאובחנה לפני6 שנים, מתמודד עם קושי הולך וגובר בזיכרון, קשב וקבלת החלטות. התסמינים המוטוריים של החולה יציבים, אך הירידה הקוגניטיבית הפכה בולטת יותר במהלך 6 החודשים האחרונים, מלווה בירידה בקשב , הפרעת שינה וליקוי ויזו-מרחבי. איזו מהאפשרויות הבאות היא אופציה טיפולית של קו ראשון לטיפול בתסמינים של המטופל?", "o": ["Levodopa", "Cholinesterase Inhibitors", "Dopamine Agonists", "Antipsychotics"], "c": 1, "e": "התשובה הנכונה היא **B – Cholinesterase Inhibitors**, ולא A כפי שצוין. אסביר מדוע:\n\nהמטופל מתאר תמונה קלאסית של **דמנציה על רקע מחלת פרקינסון (PDD)** – ירידה קוגניטיבית שהתפתחה שנים לאחר אבחון התסמינים המוטוריים, עם ליקויים בקשב, בתפקוד ויזו-מרחבי ובקבלת החלטות, יחד עם הפרעות שינה. על פי Hazzard's Geriatric Medicine והנחיות קליניות מקובלות, **מעכבי כולינאסטראז (בעיקר Rivastigmine)** הם קו ראשון לטיפול בתסמינים הקוגניטיביים של PDD. ריבסטיגמין הוא התרופה היחידה שאושרה על ידי ה-FDA לאינדיקציה זו, ומבוססת על חסר כולינרגי מרכזי בולט בדמנציה פרקינסונית.\n\n**Levodopa (A)** – מטפלת בתסמינים מוטוריים של פרקינסון, אך אינה יעילה לטיפול בירידה קוגניטיבית ואינה קו ראשון לדמנציה. **Dopamine Agonists (C)** – עלולים דווקא לה��מיר תסמינים קוגניטיביים, לגרום להזיות ולבלבול, במיוחד בקשישים. **Antipsychotics (D)** – רוב האנטיפסיכוטיים (למעט קלוזפין ובמידה מסוימת קווטיאפין) **אסורים** בפרקינסון בשל סיכון להחמרה מוטורית חמורה.\n\n**פנינה קלינית:** בדמנציה פרקינסונית, החסר הכולינרגי בולט יותר מאשר באלצהיימר, ולכן התגובה למעכבי כולינאסטראז לעיתים טובה יותר.", "reason": "Explanation explicitly states marked answer is wrong"}, {"idx": 640, "ti": 11, "t": "2025-Jun", "q": "מה נכון בנוגע למנגנון פיזיולוגי של שליטה בסוגר השתן", "o": ["מערכת סימפתטית גורמת להתכווצות של שלפוחית השתן", "מערכת פרה-סימפתטית גורמת להרפיית שלפוחית השתן", "מערכת סומטית גורמת להתכווצות של שרירי אגן", "מערכת סימפתטית גורמת להרפיה של השופכה"], "c": 2, "e": "התשובה הנכונה היא B, אך יש לציין שהניסוח מעורר בעייתיות. בפיזיולוגיה הקלאסית, המערכת **הפרה-סימפתטית** (דרך עצב הפאגוס S2-S4) אחראית דווקא על **התכווצות** שריר הדטרוסור בעת מתן שתן. בשלב האגירה, הפעילות הפרה-סימפתטית מעוכבת, ולכן השלפוחית נמצאת במצב של הרפיה. כלומר, בשלב המילוי, המערכת הפרה-סימפתטית אכן \"מאפשרת\" הרפיית השלפוחית באמצעות עיכוב פעילותה – וזהו ככל הנראה הבסיס לתשובה הנכונה כאן.\n\n**תשובה A שגויה** – המערכת הסימפתטית (T10-L2) גורמת דווקא להרפיית הדטרוסור (דרך קולטני β) ולהתכווצות צוואר השלפוחית (קולטני α), כלומר תומכת באגירה ולא בהתכווצות השלפוחית.\n\n**תשובה C שגויה** – המערכת הסומטית (עצב הפודנדל) שולטת על הסוגר החיצוני של השופכה, לא על שרירי רצפת האגן באופן ישיר במנגנון השתן.\n\n**תשובה D שגויה** – המערכת הסימפתטית גורמת להתכווצות צוואר השופכה (קולטני α1), ולא להרפייתה.\n\n**פרל קליני:** בגריאטריה, הבנת המנגנון חיונית לטיפול תרופתי – אנטיכולינרגיים מרפים את הדטרוסור (מעכבים פרה-סימפתטי), ואלפא-בלוקרים מרפים את צוואר השלפוחית (מעכבים סימפתטי).", "reason": "Explanation says answer B correct, marked answer C"}, {"idx": 642, "ti": 8, "t": "2025-Jun", "q": "מה הסיבה השכיחה ביותר לתסמונת קושינג בקשישים", "o": ["טיפול תרופתי בקורטיקוסטרואידים", "אדנומה מפרישה של האדרנל", "קרצינומה מפרישה של האדרנל", "הפרשת יתר של ACTH מההיפופיזה"], "c": 0, "e": "שאלה זו עוסקת בסיבה השכיחה ביותר לתסמונת קושינג **אנדוגנית** בקשישים, ולא בתסמונת קושינג בכלל. ההבחנה הזו קריטית להבנת התשובה.\n\nתשובה A (טיפול בקורטיקוסטרואידים) היא אמנם הסיבה השכיחה ביותר לתסמונת קושינג **בכלל** באוכלוסייה הכללית (סיבה אקסוגנית/יאטרוגנית), אך השאלה מתמקדת בסיבה האנדוגנית בקשישים. לכן תשובה זו אינה נכונה בהקשר הספציפי של השאלה.\n\nתשובה D (הפרשת יתר של ACTH מההיפופיזה — מחלת קושינג) היא הסיבה השכיחה ביותר לתסמונת קושינג אנדוגנית באוכלוסייה הצעירה והבוגרת, אך שכיחותה פוחתת עם הגיל.\n\nתשובה B (אדנומה של האדרנל) גורמת לתסמונת קושינג אך בדרך כלל בגילאים צעירים יותר ובאופן קל יותר.\n\nתשובה C (קרצינומה מפרישה של האדרנל) היא התשובה הנכונה. בקשישים, קרצינומה של קליפת האדרנל (adrenocortical carcinoma) היא סיבה שכיחה יחסית לתסמונת קושינג אנדוגנית. גידולים אלו שכיחים יותר בגיל המבוגר, מפרישים קורטיזול באופן אוטונומי, ולעיתים קרובות מלווים בהפרשת אנדרוגנים וסימנים של וירילזציה.\n\n**פנינה קלינית:** בקשיש עם תסמונת קושינג חמורה עם הופעה מהירה, יש לחשוד בקרצינומה אדרנלית — בניגוד לאדנומה, הקרצינומה נוטה להופע", "reason": "Explanation contradicts marked answer, supports different option"}, {"idx": 647, "ti": 22, "t": "2025-Jun", "q": "מה הוא יעד הטיפול בסוכרת לקשיש סיעודי עם דמנציה מתקדמת שלא מקבל טיפול באינסולין", "o": ["סוכר בצום בין 90-130", "סוכר בצום בין 180-250", "ערך המוגלובין מסוכרר פחות מ-7%", "ערך המוגלובין מסוכרר פחות מ-8.5%"], "c": 3, "e": "בקשישים סיעודיים עם דמנציה מתקדמת, הגישה הטיפולית בסוכרת מתמקדת בהימנעות מהיפוגליקמיה ומתסמינים של היפרגליקמיה חמורה, ולא בשליטה הדוקה. מטופל זה נמצא בשלב מתקדם של מחלה, עם תוחלת חיים מוגבלת, ולכן היתרון ארוך הטווח של מניעת סיבוכים מיקרווסקולריים אינו רלוונטי. לפי ההנחיות (כולל Hazzard's Geriatric Medicine ו-ADA guidelines לקשישים), יעד סוכר בצום של 180-250 mg/dL הוא המתאים לאוכלוסייה זו, שכן הוא מונע תסמינים של היפרגליקמיה חמורה (פוליאוריה, התייבשות) מבלי לחשוף את המטופל לסיכון של היפוגליקמיה.\n\nתשובה A (90-130) מתאימה לקשיש עצמאי ובריא יחסית – יעד זה הדוק מדי למטופל סיעודי עם דמנציה, ועלול לגרום להיפוגליקמיה מסוכנת. תשובה C (HbA1c<7%) היא יעד למבוגרים צעירים או קשישים תפקודיים מאוד, ואינה מתאימה כלל ��פרופיל זה. תשובה D (HbA1c<8.5%) עשויה להתאים לקשישים מורכבים אך עדיין תפקודיים; במטופל סיעודי עם דמנציה מתקדמת, ההתמקדות היא בערכי סוכר יומיים ולא ב-HbA1c, ויעד זה עדיין הדוק מדי.\n\n**פנינה קלינית:** בקשישים שבריריים, היפוגליקמיה מסוכנת הרבה יותר מהיפרגליקמיה מתונה – ככל שהמטופל שברירי יותר ותוחלת החיים קצר", "reason": "Explanation supports 180-250 mg/dL not HbA1c <8.5%"}, {"idx": 652, "ti": 6, "t": "2025-Jun", "q": "בת72 אושפזה לבירור ירידה במשקל. היא מדווחת על
