ion, and bilateral fine end-inspiratory crackles — is classic for **nitrofurantoin-induced pulmonary fibrosis**. The mechanism involves direct oxidative damage to alveolar epithelium and immune-mediated inflammation. Hazzard's Geriatric Medicine emphasizes that nitrofurantoin should be avoided in patients with CrCl <30 mL/min (common in elderly) and that chronic use carries significant pulmonary risk. Harrison's Internal Medicine (Chapter on Interstitial Lung Diseases) lists nitrofurantoin among the most common drug causes of pulmonary fibrosis.\n\n**Why the other answers are incorrect:** **Amlodipine** (A) can cause peripheral edema but does not cause interstitial lung disease. **Metformin** (B) carries risk of lactic acidosis but has no association with pulmonary fibrosis. **Spironolactone** (C) may cause hyperkalemia and gynecomastia but is not a known cause of interstitial lung disease; in fact, it is a mainstay of heart failure treatment.\n\n**Clinical Pearl:** In any elderly patient on chronic nitrofurantoin prophylaxis presenting with progressive dyspnea and bibasilar crackles, always suspect drug-induced pulmonary fibrosis — this is a high-yield exam topic.", "reason": "Explanation supports NITROFURANTOIN not marked answer"}, {"idx": 888, "ti": 2, "t": "2021-Jun", "q": "בת60, סובלת בחודשים האחרונים משינויים קוגניטיביים ושינויים התנהגותיים. מדברת באופן בוטה , לא מתעניינת בדברים שעינינו אותה בעבר , חוזרת פעמים רבות על אותם משפטים. בבדיקה הקוגניטיבית בולטת פגיעה בתפקודים הניהוליים (Executive functions ) והזיכרון יחסית שמור מה הממצא ההדמייתי האופייני במצב זה?", "o": ["MRI מוח יראה ירידה בנפח המוח", "CT אנגיוגרפיה יראה אוטמים מרובים ופגיעה ווסקולרית", "מיפוי PET FDG יראה ירידה במטבוליזם באונות הפרונטליות", "CT יראה נפח חדרים מוגבר עם השטחה של הסולקים"], "c": 2, "e": "התמונה הקלינית מתארת באופן קלאסי דמנציה פרונטוטמפורלית (FTD) מהווריאנט ההתנהגותי (behavioral variant): שינויים התנהגותיים בולטים כגון חוסר עכבות (דיבור בוטה), אפתיה, התנהגויות סטריאוטיפיות (חזרה על משפטים), פגיעה בתפקודים ניהוליים עם שימור יחסי של הזיכרון – כל אלה אופייניים ל-bvFTD.\n\n**התשובה הנכונה (A):** ב-MRI מוח הממצא האופייני ביותר הוא אטרופיה (ירידה בנפח) של האונות הפרונטליות והטמפורליות הקדמיות. זהו הממצא ההדמייתי המובהק ביותר ב-FTD. MRI הוא כלי ההדמיה המבנית המועדף להערכת דמנציה, ואטרופיה פרונטוטמפורלית מוקדית היא סימן ההיכר של המחלה (Hazzard's, פרקי דמנציה).\n\n**תשובה B שגויה:** אוטמים מרובים ופגיעה וסקולרית אופייניים לדמנציה וסקולרית, שמתאפיינת בדרך כלל במהלך מדרגתי ובגורמי סיכון וסקולריים – לא מתאים לתמונה כאן.\n\n**תשובה C שגויה:** אמנם PET-FDG אכן מראה היפומטבוליזם פרונטלי ב-FTD, אך זהו לא הממצא ההדמייתי הראשוני/האופייני ביותר – MRI מבני הוא בדיקת הבחירה הראשונה.\n\n**תשובה D שגויה:** הרחבת חדרים עם השטחת סולקי (sulci) אופיינית להידרוצפלוס בלחץ תקין (NPH), המתבטא בשלישייה של הפרעת הליכה, אי-שליטה על סוגרים ודמנציה.\n\n**פנ", "reason": "Explanation describes MRI atrophy, answer states PET FDG"}, {"idx": 883, "ti": 20, "t": "2021-Jun", "q": "בת75 , עצמאית בתפקודה, מעשנת כבדה. אובחנה כסובלת מ- CAROTID ARTERY STENOSIS עקב ממצא מקרי של אוושה בצוואר בבדיקה גופנית. בדופלקס נמצא חסימה של 80% . מה הטיפול במצבה", "o": ["התחלת טיפול בסטטינים רק במידה ויש לה היפרליפידמיה", "ניתוח carotid endarterectomy", "שינוי אורחות חיים כולל הפסקת עישון ומעקב לחצי שנה", "צנתור וסטנט לעורק הקרוטידי"], "c": 1, "e": "היצרות א-סימפטומטית של עורק הקרוטיד (asymptomatic carotid stenosis) בדרגה של 80% מהווה דילמה קלינית חשובה. על פי ההנחיות העדכניות וכפי שמתואר ב-Harrison's Internal Medicine, הטיפול בהיצרות א-סימפטומטית מבוסס בראש ובראשונה על טיפול שמרני אופטימלי (Best Medical Therapy - BMT): הפסקת עישון, טיפול נוגד טסיות, סטטינים, שליטה בלחץ דם ומעקב תקופתי. מחקרים כמו CREST-2 מדגישים שהטיפול התרופתי המודרני צמצם משמעותית את הסיכון לשבץ בחולים א-סימפטומטיים, כך שהתועלת מניתוח endarterectomy בחולים אלו הפכה שולית.\n\n**תשובה B שגויה** — endarterectomy מומלץ בעיקר בהיצרות סימפטומטית (≥70%). בהיצרות א-סימפטומטית, התועלת מניתוח שנויה במחלוקת והמגמה העדכנית מעדיפה טיפול שמרני. **תשובה A שגויה** — סטטינים מומלצים לכל חולה עם מחלה טרשת��ת (atherosclerotic disease) ללא קשר לרמת השומנים, כחלק מהטיפול התרופתי האופטימלי. **תשובה D שגויה** — סטנט לקרוטיד בחולים א-סימפטומטיים אינו מומלץ כקו ראשון ונושא סיכון לאירועים אמבוליים.\n\n**פנינה קלינית:** בהיצרות קרוטיד א-סימפטומטית, הטיפול השמרני המודרני הפחית את שיעור השבץ השנתי ל-<1%, מה שמקשה להצדיק התערבות פולשנית.", "reason": "Explanation contradicts marked answer, recommends medical therapy"}, {"idx": 894, "ti": 28, "t": "2021-Jun", "q": "בת85, הסובלת מסרטן גרורתי ודמנציה מתקדמת הוכרזה כחולה נוטה למות שאינה כשירה. בברור רצונה נמצא כי תוקף ייפוי הכוח עליו חתמה ובו מינתה את שכנתה, פג לפני שנתיים, אך לאחרונה מונה לה אפוטרופוס מטעם המדינה. מי צריך להיות מקבל ההחלטה בעניין הטיפול בסוף החיים?", "o": ["האפוטרופוס", "אחייניתה שהינה קרובת המשפחה היחידה שלה", "הרופא האחראי בהתייעצות עם השכנה", "הרופא האחראי בהתייעצות עם האפוטרופוס"], "c": 2, "e": "התשובה הנכונה היא D, מכיוון שעל פי חוק החולה הנוטה למות (2005) בישראל, כאשר חולה נוטה למות אינו כשיר לקבל החלטות, הסמכות לקבלת החלטות רפואיות בסוף החיים מוטלת על **הרופא האחראי בהתייעצות** עם הגורם המייצג את רצון החולה. במקרה זה, ייפוי הכוח לשכנה פג תוקפו, ולכן השכנה אינה מייצגת חוקית עוד. עם זאת, מונה אפוטרופוס מטעם המדינה, שהוא הגורם המוסמך כעת לייצג את החולה. על פי החוק, ההחלטה הסופית היא של הרופא האחראי, אך עליו להתייעץ עם האפוטרופוס.\n\nתשובה A שגויה כי האפוטרופוס אינו מקבל ההחלטה הבלעדי — החוק מעניק את הסמכות הסופית לרופא, בהתייעצות עם האפוטרופוס. תשובה B שגויה כי אחייניתה, גם אם היא קרובת משפחה יחידה, אינה הגורם המוסמך כשמונה אפוטרופוס רשמי. תשובה C שגויה כי ייפוי הכוח של השכנה פג, ולכן אין לה מעמד חוקי בהחלטות אלו.\n\n**פנינה קלינית:** בחוק החולה הנוטה למות, ההיררכיה ברורה — הנחיות מקדימות גוברות, אחריהן מיופה כוח בתוקף, ואם אין — אפוטרופוס. הרופא תמיד הוא מקבל ההחלטה הסופי, בהתייעצות עם הגורם המייצג.", "reason": "Explanation says consult guardian, answer says neighbor"}, {"idx": 892, "ti": 6, "t": "2021-Jun", "q": "בת84, עצמאית בתפקודה וללא ירידה קוגניטיבית יד  ORPHENADRINE) )MUSCOL", "DIPYRONE (OPTALGIN)"], "c": 2, "e": "**תשובה נכונה: D – DIPYRONE (OPTALGIN)**\n\nדיפירון (אופטלגין) הוא הבחירה הנכונה כי מדובר בתרופה ממשפחת הפירזולונים, שבמינונים גבוהים או בשימוש ממושך, במיוחד בקשישים, עלולה לגרום לדיכוי מערכת העצבים המרכזית, ישנוניות משמעותית ושקיעה הכרתית. בנוסף, דיפירון עלול לגרום להיפותנזיה, שבקשישה בת 88 יכולה להחמיר את המצב ההכרתי. חשוב לציין שבמבחנים ישראליים, דיפירון נחשב לתרופה עם פרופיל תופעות לוואי משמעותי יותר מבחינת CNS בהשוואה לאנלגטיקות אחרות שאינן אופיואידיות.\n\n**מדוע התשובות האחרות שגויות:**\n\n**A – Acamol Focus** מכיל פרצטמול, אספירין וקפאין. הקפאין דווקא מעורר את מערכת העצבים המרכזית, ושילוב זה אינו צפוי לגרום לשקיעה הכרתית.\n\n**B – Combodex** מכיל פרצטמול ואיבופרופן – שתי תרופות אנלגטיות שאינן גורמות לדיכוי הכרתי משמעותי.\n\n**C – Muscol** מכיל פרצטמול ואורפנדרין. אורפנדרין הוא מרפה שרירים עם תכונות אנטיכולינרגיות שאמנם עלול לגרום לבלבול בקשישים, אך הפרופיל שלו נוטה יותר לדליריום היפראקטיבי (אנטיכולינרגי) מאשר לשקיעה הכרתית טהורה.\n\n**פנינה קלינית:** בקשישים, יש להעדיף פרצטמול כמשכך כאבים ראשוני ולהימנע מדיפירון עקב סיכון ל-", "reason": "Explanation supports DIPYRONE, not PARACETAMOL+ORPHENADRINE"}, {"idx": 898, "ti": 35, "t": "2021-Jun", "q": "מה מאפייןאת הזקנים בארץ מבחינה פסיכו-סוציאלית לפי לקט הנתונים האינפוגרפי של השנתון הסטטיסטי?", "o": ["אחוז בני 65+ בקרב הרוגים ופצועים קשה בתאונות דרכים גדול מחלקם באוכלוסייה", "קופת חולים מכבי היא בעלת אחוז הזקנים הגבוה ביותר", "כ- 8% מבני 75 ומעלה שוהים במוסד", "רוב הנשים בנות 70 ומעלה מקבלות \\\"גמלת סיעוד"], "c": 0, "e": "התשובה הנכונה היא D, שכן לפי הנתונים האינפוגרפיים מהשנתון הסטטיסטי, רוב הנשים בנות 70 ומעלה מקבלות גמלת סיעוד. נתון זה משקף את המציאות הפסיכו-סוציאלית של נשים זקנות בישראל, הנוטות לחיות יותר מגברים אך עם שיעורי תחלואה ומוגבלות תפקודית גבוהים יותר, מה שמוביל לתלות רבה יותר בשירותי סיעוד. תופעה זו עולה בקנה אחד עם מושג ה-\"פרדוקס של התמותה-תחלואה\" (mortality-morbidity paradox) המוכר בגריאטריה.\n\nתשובה A שגויה — אף שזקנים פגיעים יותר בתאונות דרכים, הנתון כפי שמוצג אינו המאפיין הפסיכו-סוציאלי המרכזי שהשנתון מדגיש. תשובה B שגויה — קופת החולים בעלת אחוז הזקנים הגבוה ביותר אינה בהכרח מכבי; לרוב מדובר בקופות אחרות (כללית או לאומית) בהתאם לנתונים העדכניים. תשובה C שגויה — שיעור השוהים במוסד בק��ב בני 75+ בישראל נמוך מ-8%, כיוון שהמדיניות הישראלית מעודדת טיפול קהילתי.\n\n**פנינה קלינית:** נשים זקנות בישראל מהוות אוכלוסייה פגיעה במיוחד — תוחלת חיים ארוכה יותר אך עם מוגבלות רבה יותר, בדידות, ותלות כלכלית, מה שמחייב הערכה גריאטרית מקיפה הכוללת ממדים פסיכו-סוציאליים.", "reason": "Explanation supports answer D, not marked answer"}, {"idx": 890, "ti": 21, "t": "2021-Jun", "q": "אילו מבין השינויים הבאיםשל ההזדקנות קשורים להתמודדות אדם זקן עם COPD ?", "o": ["עליה ב- cardiac output", "ירידה ב- peripheral vascular resistance", "ירידה בלחץ בעורקי הריאה", "סיכון מוגבר לאוסטאופורוזיס"], "c": 3, "e": "התשובה הנכונה היא B — ירידה ב-peripheral vascular resistance. בהזדקנות תקינה חלה עלייה בנוקשות כלי הדם (arterial stiffness) ועלייה ב-PVR, אולם בהקשר של COPD, ישנם מנגנונים המובילים לירידה ב-PVR כחלק מההתמודדות הפיזיולוגית. בחולי COPD מזדקנים, היפוקסמיה כרונית והיפרקפניה גורמות להרחבת כלי דם פריפריים (vasodilatation) כמנגנון פיצוי, מה שמוריד את ההתנגדות הפריפרית. CO2 מוגבר פועל כמרחיב כלי דם סיסטמיים. שינוי זה קשור ישירות לפתופיזיולוגיה של COPD בגיל המבוגר.\n\nתשובה A שגויה — ב-COPD ובהזדקנות חלה ירידה בתפוקת הלב (cardiac output) ולא עלייה, עקב ירידה בתפקוד החדר השמאלי והימני (cor pulmonale). תשובה C שגויה — ב-COPD חלה דווקא עלייה בלחץ בעורקי הריאה (pulmonary hypertension) עקב vasoconstriction היפוקסי ושיפוץ כלי הדם הריאתיים. תשובה D — אוסטאופורוזיס אמנם שכיח ב-COPD (סטרואידים, חוסר פעילות), אך זהו סיבוך של המחלה/טיפול ולא שינוי הזדקנות הקשור להתמודדות הפיזיולוגית עם המחלה.\n\n**פנינה קלינית:** היפרקפניה כרונית ב-COPD גורמת להרחבת כלי דם פריפריים — זהו הסבר לידיים החמות והאדומות של חולי COPD מתקדם (\"CO2 retainers\").", "reason": "Explanation supports answer B, not osteoporosis risk"}, {"idx": 899, "ti": 21, "t": "2021-Jun", "q": "בת 75, אושפזה בשל חשד לדלקת ריאות במחלקה הפנימית, בשל שיעול של כשבועיים. במהלך אשפוזה בוצע CT ריאות, ללא לתסנין, אולם הודגמו ממצאים בבלוטת התריס. תפקודי תריס נלקחו, אשר תקינים. באיזה ממצא בתירואיד יש להמשיך בברור על ידי FNA ?", "o": ["יש לדגום כל Multinodular Goiter (MNG) בשל סיכון לממאירות", "נודול סולידי (Solid )בגודל של 2 ס\\\"מ, עם מיקרוקלציפיקציות", "יש לדגום כל נודול ציסטי (Purely cystic nodules), לשלילתCystic Carcinoma", "גוש \\\"חם\\\" במיפוי תירואיד"], "c": 1, "e": "## ניתוח התשובות\n\n**תשובה B היא למעשה התשובה הנכונה מבחינה קלינית**, ולא תשובה C כפי שצוין. נודול סולידי בגודל 2 ס\"מ עם מיקרוקלציפיקציות מהווה ממצא חשוד ביותר לממאירות (קרצינומה פפילרית של התריס). מיקרוקלציפיקציות הן אחד הסממנים האולטרסונוגרפיים המחשידים ביותר, והגודל מעל 1 ס\"מ מחייב דגימה על פי הנחיות ATA. לפי Hazzard's, נודולים עם מאפיינים חשודים (סולידיים, היפואקואיים, מיקרוקלציפיקציות, גבולות לא סדירים) דורשים FNA.\n\n**תשובה A שגויה** — לא כל MNG דורש דגימה; יש להעריך כל נודול בנפרד לפי מאפייניו האולטרסונוגרפיים.\n\n**תשובה C שגויה** — נודולים ציסטיים טהורים (purely cystic) הם כמעט תמיד שפירים, והסיכון לממאירות בהם נמוך מאוד (<1%). אין המלצה לדגום אותם באופן שגרתי.\n\n**תשובה D שגויה** — גוש \"חם\" (היפרפונקציונלי) במיפוי נושא סיכון נמוך מאוד לממאירות ואינו דורש FNA.\n\n**פנינה קלינית:** נודול תריס שהתגלה באופן אינצידנטלי (incidentaloma) ב-CT מחייב המשך הערכה באולטרסאונד ייעודי, ורק לאחר מכן החלטה על FNA בהתאם למאפיינים ולגודל.", "reason": "Explanation says B is correct, not C"}, {"idx": 895, "ti": 26, "t": "2021-Jun", "q": "מה הייחוד שלטיפול פליאטיבי בחולי דמנציה מטיפול פליאטיבי בחולים אונקולוגים?", "o": ["בחולי דמנציה אין צורך בטיפול בכאב היות והשכיחות של כאב היא נמוכה", "טיפול פליאטיבי בחולי דמנציה יכול התבצע בצורה טובה על ידי הצוות המטפל ואין חשיבות להכנסה של מומחים בטיפול פליאטיבי", "חולי דמנציה מתקדמת סובלים מנטל סימפטומים גופניים משמעותי ובזה אינם שונים מחולים אונקולוגים", "שילוב של טיפול פליאטיבי בחולי דמנציה חשוב רק בשלבים המתקדמים של המחלה"], "c": 2, "e": "התשובה הנכונה היא C מכיוון שמחקרים רבים הוכיחו כי חולי דמנציה מתקדמת סובלים מנטל סימפטומים גופניים משמעותי הכולל כאב, קוצר נשימה, בעיות בליעה, זיהומים חוזרים ועוד — בדומה לחולים אונקולוגיים בשלבים מתקדמים. הייחוד בטיפול הפליאטיבי בדמנציה נובע מכך שלמרות שנטל הסימפטומים דומה, הזיהוי והטיפול בהם מורכבים יותר בשל קשיי התקשורת של החולה. עקרון זה מודגש ב-Hazzard's Geriatric Medicine בפרקים העוסקים בטיפול בסוף החיים בדמנציה.\n\nתשובה A שגויה — כאב שכיח מאוד בדמנציה מתקדמת, אך לעיתים קרובות אינו מזוהה ואינו מטופל כראוי בשל חוסר היכולת של החולה לדווח עליו. מדובר בבעיה מרכזית ולא בשכיחות נמוכה.\n\nתשובה B שגויה — דווקא בדמנציה יש חשיבות רבה לשילוב מומחים בטיפול פליאטיבי, כיוון שהמורכבות של זיהוי סימפטומים, קבלת החלטות אתיות וליווי המשפחה דורשים מומחיות ייעודית.\n\nתשובה D שגויה — הגישה המקובלת כיום היא שילוב מוקדם של טיפול פליאטיבי לאורך כל מסלול המחלה, ולא רק בשלבים הסופיים.\n\n**פנינה קלינית:** בחולי דמנציה, יש להשתמש בכלים מובנים להערכת כאב כגון PAINAD, מכיוון שהחולה אינו יכול לדווח באופן מילולי על סבלו.", "reason": "Explanation says they ARE similar, not unique"}, {"idx": 920, "ti": 15, "t": "Hazzard", "q": "A 76-year-old woman with T-score of -2.8 on DEXA scan and no prior fractures has FRAX calculated 10-year hip fracture risk of 2.8% and major osteoporotic fracture risk of 19%. Does she meet criteria for pharmacological treatment?", "o": ["No, because hip fracture risk is below 3% threshold", "Yes, because major fracture risk is above 20% threshold", "No, because she has no prior fracture", "Yes, because T-score is below -2.5"], "c": 0, "e": "The correct answer is **A**. According to the National Osteoporosis Foundation (NOF) guidelines, pharmacological treatment is recommended for postmenopausal women with osteopenia or osteoporosis when FRAX-calculated 10-year probability of hip fracture is **≥3%** OR major osteoporotic fracture is **≥20%**. This patient's hip fracture risk is 2.8% (below the 3% threshold) and her major osteoporotic fracture risk is 19% (below the 20% threshold). Since neither FRAX threshold is met, she does not qualify for treatment based on FRAX criteria alone, despite having a T-score in the osteoporotic range.\n\n**Option B** is incorrect because 19% is below, not above, the 20% threshold for major osteoporotic fracture. This is a close value designed to test precise knowledge of the cutoff.\n\n**Option C** is incorrect because prior fracture is not an absolute requirement for initiating treatment. Patients without fractures can qualify through FRAX thresholds or T-score criteria in certain guidelines.\n\n**Option D** is incorrect and represents a common misconception. While a T-score of -2.5 or below defines osteoporosis, the NOF/FRAX treatment algorithm specifically uses the calculated fracture probability thresholds rather than T-score alone when applying FRAX-based decision-making. The T-score is an input into FRAX, not an independent treatment trigger within this framework.\n\n**Clinical Pearl:** Memorize the two FRAX treatment thresholds: **≥3% hip** and **≥20% major osteoporotic fracture**. These cost-effectiveness-derived cutoffs appear frequently on board examinations.", "reason": "T-score -2.8 alone indicates treatment regardless FRAX"}, {"idx": 981, "ti": 6, "t": "2021-Jun", "q": "מה היעילות של MEMANTINE במחלת אלצהיימר?", "o": ["יעיל לטיפול באלצהיימר קלה-בינונית", "הוכח כמשפר ADL", "משפר למידה וזיכרון במינונים גבוהים", "יעילות עולה במתן יחד עם מעכבי כולין אסטרז"], "c": 0, "e": "התשובה הנכונה היא A, אך יש לציין שמדובר בשאלה בעייתית מבחינה קלינית. ממנטין (אנטגוניסט לקולטן NMDA) אושר בעיקר לטיפול באלצהיימר **בינונית עד חמורה**, לא קלה-בינונית. ייתכן שהשאלה מתייחסת לעובדה שממנטין הוכח כיעיל גם בשלבים בינוניים של המחלה, ולכן התשובה \"קלה-בינונית\" נחשבת הנכונה ביותר מבין האפשרויות. על פי Hazzard's Geriatric Medicine, ממנטין מפחית גלוטמט-טוקסיסיטי ומשפר תפקוד קוגניטיבי בצורה מתונה.\n\nתשובה B שגויה — ממנטין הראה שיפור צנוע בתפקוד הקוגניטיבי ובהתנהגות, אך ההוכחות לשיפור משמעותי ב-ADL (פעילויות יומיומיות) אינן חזקות ועקביות דיין. תשובה C שגויה — ממנטין אינו משפר למידה וזיכרון במינונים גבוהים; להפך, מינונים גבוהים מדי עלולים לחסום פעילות NMDA פיזיולוגית הנדרשת ללמידה. תשובה D שגויה — למרות שבפרקטיקה ממנטין ניתן לעיתים בשילוב עם מעכבי כולינאסטראז, המחקרים לא הוכיחו באופן חד-משמעי שהשילוב מעלה את היעילות בצורה משמעותית.\n\n**פנינה קלינית:** ממנטין הוא הקו הטיפולי העיקרי לאלצהיימר בינונית-חמורה, בעוד מעכבי כולינאסטראז (דונפזיל, ריבסטיגמין, גלנטמין) מיועדים לשלבים קלים-בינוניים.", "reason": "Explanation states approved for moderate-severe, not mild-moderate"}, {"idx": 1011, "ti": 11, "t": "2021", "q": "בת 89 בשיקום לאחר שבר RAMUS PUBIS. תרופות כוללות TARGIN, LORATADINE ועוד. בריחת שתן, זרם חלש, שארית 300cc. מה הצעד הראשון?", "o": ["הפסקת TARGIN ו-LORATADINE", "התרוקנויות יזומות לאימון שלפוחית", "הוספת חוסם אלפא", "המשך שיקום, ההפרעה תסתדר"], "c": 0, "e": "התשובה הנכונה היא הפסקת TARGIN ו-LORATADINE, מכיוון שמדובר באצירת שתן (retention) עם שארית של 300cc וזרם חלש – תמונה קלאסית של אצירה על רקע תרופתי. TARGIN מכיל אוקסיקודון (אופיואיד), אשר מפחית את התכווצות שריר הדטרוסור דרך קולטני מיו ועל ידי כך מעכב את התרוקנות השלפוחית. LORATADINE הוא אנטיהיסטמין בעל אפקט אנטיכולינרגי מסוים, שמוסיף לעיכוב התכווצות הדטרוסור. בגריאטריה, הצעד הראשון בכל בעיה חדשה הוא לבדוק האם תרופות גורמות לה – עיקרון מרכזי ב-Hazzard's Geriatric Medicine בפרקי הפרמקולוגיה ובריחת השתן. העומס האנטיכולינרגי המצטבר (anticholinergic burden) הוא גורם שכיח ובר-תיקון לאצירת שתן בקשישים.\n\nתשובה ב׳ (התרוקנויות יזומות) מתאימה לאי-נקיטה (urge incontinence) או לשלפוחית רפויה, אך לא תפתור אצירה על רקע תרופתי כשהגורם לא הוסר. תשובה ג׳ (חוסם אלפא) מתאימה לחסימה מכנית כמו BPH בגברים, לא לאישה עם אצירה תרופתית – ומלבד זאת אין מוסיפים תרופה לפני הסרת הגורם. תשובה ד׳ (המשך שיקום) מתעלמת מבעיה פעילה הדורשת התערבות; שארית 300cc עלולה לגרום לזיהום ולנזק כלייתי.\n\n**פנינה קלינית:** בגריאטריה – \"Start by stopping.\" כל סימפטום חדש בקשיש הוא תרופתי עד שהוכ", "reason": "Explanation describes retention, presentation suggests overflow incontinence"}, {"idx": 1019, "ti": 3, "t": "2021", "q": "בת 87, ירדה מ-65 ל-59 ק\"ג, הפסיקה פעילויות, הולכת עם מקל, נפלה, ירידה בזיכרון. מה מתאים ל-FRAILTY לפי FRIED?", "o": ["ירידה במשקל", "ירידה בזיכרון", "פחד מנפילות", "הליכה לא יציבה"], "c": 1, "e": "התשובה הנכונה היא **A: ירידה במשקל**.\n\nאני חולק על המפתח שמציין שהתשובה היא B. לפי קריטריוני Fried לשבריריות (Frailty Phenotype), חמשת הקריטריונים הם: (1) **ירידה לא מכוונת במשקל** (>4.5 ק\"ג או >5% בשנה), (2) תשישות/עייפות מדווחת עצמית, (3) חולשה (ירידה בכוח אחיזה), (4) מהירות הליכה איטית, (5) רמת פעילות גופנית נמוכה. שלושה קריטריונים או יותר מגדירים frailty. ירידה במשקל מ-65 ל-59 ק\"ג (6 ק\"ג, כ-9%) עונה בבירור על הקריטריון הראשון של Fried, כפי שמתואר ב-Hazzard's Geriatric Medicine and Gerontology.\n\n**ירידה בזיכרון (B)** אינה חלק מקריטריוני Fried כלל. ליקוי קוגניטיבי הוא מצב נפרד שיכול להתלוות לשבריריות אך אינו נכלל בפנוטיפ. **פחד מנפילות (C)** אף הוא אינו קריטריון של Fried — זהו תסמונת גריאטרית חשובה בפני עצמה. **הליכה לא יציב�� (D)** קרובה לקריטריון מהירות הליכה האיטית, אך Fried מודד ספציפית מהירות הליכה ולא יציבות כשלעצמה.\n\n**פנינה קלינית:** קריטריוני Fried הם פנוטיפיים-פיזיים במהותם — אין בהם מרכיב קוגניטיבי או רגשי. יש להבדיל בין frailty phenotype לבין מדדי frailty index (Rockwood) שכוללים תחומים רחבים יותר.", "reason": "Explanation supports weight loss, not memory decline"}, {"idx": 1020, "ti": 0, "t": "2021", "q": "מה מאפיין הזדקנות העור בנשים?", "o": ["עור כהה - סיכון ליובש וירידה בקולגן", "איבוד קולגן משמעותי ב-5 שנים לאחר מנופאוזה", "hypoandrogenism", "עליה באלסטין ובפעילות בלוטות זיעה"], "c": 0, "e": "התשובה הנכונה היא **A**, אך למעשה יש כאן בעיה – התשובה המדויקת ביותר מבחינה קלינית היא דווקא **B**. אסביר:\n\n**תשובה B** מתארת עובדה מבוססת היטב: נשים מאבדות כ-30% מהקולגן בעור ב-5 השנים הראשונות לאחר המנופאוזה, עקב ירידה חדה ברמות האסטרוגן. זהו ממצא קלאסי המתואר בספרות הגריאטרית (Hazzard's Geriatric Medicine, פרקי דרמטולוגיה גריאטרית). האסטרוגן משחק תפקיד מרכזי בשמירה על עובי העור, לחות, וייצור קולגן.\n\n**תשובה A** – עור כהה אכן עמיד יותר לנזקי שמש (פוטואייג'ינג) בזכות מלנין מגן, אך הקשר בין עור כהה לסיכון מוגבר ליובש וירידה בקולגן אינו מאפיין ייחודי להזדקנות **בנשים** דווקא. הניסוח מטעה.\n\n**תשובה C** – Hypoandrogenism אינו המנגנון המרכזי בהזדקנות עור בנשים; הירידה באסטרוגן (hypoestrogenism) היא הגורם העיקרי.\n\n**תשובה D** – שגויה לחלוטין. עם ההזדקנות חלה ירידה באלסטין תקין (ועלייה באלסטין פגום – אלסטוזיס), וירידה בפעילות בלוטות הזיעה.\n\n**פנינה קלינית:** ירידת האסטרוגן במנופאוזה היא הגורם המרכזי להזדקנות מואצת של העור בנשים – זהו \"חלון קריטי\" של 5 שנים שבו האיבוד המשמעותי ביותר מתרחש.", "reason": "Explanation states answer B is more accurate"}, {"idx": 1036, "ti": 14, "t": "2021", "q": "בת 67 עם Herpes Zoster. כאבים 5 ימים לפני פריחה. מה מגביר סיכון ל-PHN פרט ל:", "o": ["כאב לפני פריחה", "כאב חזק בזמן פריחה", "גיל מעל 70", "מעורבות intercostal nerve"], "c": 3, "e": "התשובה הנכונה היא D – מעורבות intercostal nerve. נוירלגיה פוסט-הרפטית (PHN) היא הסיבוך השכיח ביותר של Herpes Zoster, והסיכון לה עולה עם גורמים מוגדרים היטב. כאב פרודרומלי (כאב לפני הופעת הפריחה, תשובה A) הוא גורם סיכון מוכר ל-PHN, שכן הוא מעיד על פגיעה עצבית משמעותית כבר בשלב המוקדם. כאב עז בזמן הפריחה החריפה (תשובה B) הוא אחד מגורמי הסיכון החזקים ביותר, המשקף דרגת נזק נוירונלי גבוהה. גיל מעל 70 (תשובה C) הוא גורם הסיכון המשמעותי ביותר – שכיחות PHN עולה באופן דרמטי עם הגיל, כפי שמתואר ב-Hazzard's Geriatric Medicine, בשל ירידה בתפקוד החיסוני התאי והיכולת המופחתת לשקם עצבים פגועים.\n\nלעומת זאת, מעורבות עצב בין-צלעי (intercostal nerve, תשובה D) אינה נחשבת לגורם סיכון ספציפי מגביר ל-PHN. דווקא מעורבות אופתל��ית (V1 – עצב טריגמינלי) ומעורבות של dermatome sacral נחשבות לגורמי סיכון מוכרים יותר. הלוקליזציה התוראקלית היא אמנם השכיחה ביותר בזוסטר, אך אינה מגבירה סיכון ל-PHN באופן עצמאי.\n\n**פנינה קלינית:** גורמי הסיכון העיקריים ל-PHN: גיל מבוגר, עוצמת כאב חריף, פרודרום כאבי, פריחה נרחבת, ומעורבות אופתלמית. חיסון Shingrix מומלץ מגיל 50 למניעת זוסטר ו", "reason": "Explanation says intercostal nerve NOT risk factor"}, {"idx": 1054, "ti": 17, "t": "2021", "q": "בת 86, דמנציה, תשושה. מטופלת ב-ESCITALOPRAM, ASPIRIN, RAMIPRIL, BISOPROLOL. בלבול חריף. Na=126, Cr=0.6, BUN=11. אוסמולליות שתן 95, Na שתן 13. מה הסיבה?", "o": ["SIADH משני ל-ESCITALOPRAM", "החמרת אי ספיקת לב", "דהידרציה", "שתיה מרובה"], "c": 3, "e": "## הסבר קליני\n\nהתשובה הנכונה היא **שתיה מרובה (פולידיפסיה פסיכוגנית/ראשונית)**. המפתח לאבחנה נמצא בבדיקות השתן: אוסמולליות שתן **95 mOsm/kg** (נמוכה מאוד, שתן מדולל) ו-Na בשתן **13 mEq/L** (נמוך). בשתיה מרובה, עודף המים מדכא הפרשת ADH, והכליה מגיבה בצורה תקינה על ידי הפרשת שתן מדולל מאוד. זהו בדיוק המנגנון כאן – הכליה \"עושה את העבודה\" ומפרישה שתן מדולל, אך כמות הנוזלים עולה על יכולת הפינוי.\n\n**SIADH (תשובה A)** – ב-SIADH אוסמולליות השתן גבוהה מ-100 mOsm/kg (בדרך כלל >300) ו-Na בשתן גבוה (>30-40), כי ADH מונע דילול השתן. כאן השתן מדולל, מה ששולל SIADH.\n\n**אי-ספיקת לב (תשובה B)** – באי-ספיקת לב מוחמרת, Na בשתן נמוך אך אוסמולליות השתן גבוהה (הכליה שומרת על מים ומלחים). כאן אוסמולליות השתן נמוכה.\n\n**דהידרציה (תשובה C)** – בדהידרציה הכליה מרכזת שתן (אוסמולליות גבוהה, Na שתן נמוך). BUN/Cr ratio אינו מרמז על דהידרציה, ואוסמולליות שתן נמוכה שוללת זאת.\n\n**פנינה קלינית:** אוסמולליות שתן <100 mOsm/kg בהיפונתרמיה = דיכוי מתאים של ADH → חשבו שתיה מרובה או צריכת solute נמוכה (\"tea and toast\"). זהו המבחן המבדל הקריטי מול SIADH.", "reason": "Explanation supports psychogenic polydipsia not excessive drinking"}, {"idx": 1057, "ti": 4, "t": "2021", "q": "בת 78, סחרחורת שנה, 3 נפילות. מה נכון לגבי סיבות?", "o": ["BPPV מופיע פתאומי לאחר תנועת ראש", "Ménière - סחרחורת ממושכת יומיומית", "Acoustic Neuroma - TRUE VERTIGO", "Recurrent Vestibulopathy - ירידה בשמיעה"], "c": 0, "e": "**תשובה נכונה: A**\n\nBPPV (Benign Paroxysmal Positional Vertigo) הוא הגורם השכיח ביותר לוורטיגו בקשישים. המנגנון כולל תזוזה של אוטוליתים (גבישי סידן פחמתי) בתוך התעלות הפיקודיות של האוזן הפנימית, מה שמעורר תחושת סחרחורת אמיתית (true vertigo) פתאומית, קצרה (שניות עד דקה), המופעלת על ידי תנועות ראש ספציפיות – כגון סיבוב במיטה, הרמת ראש או כפיפה. בקשישים זוהי סיבה משמעותית לנפילות חוזרות. האפיון הקלאסי – הופעה פתאומית לאחר תנועת ראש – מדויק לחלוטין (Hazzard's, פרק על סחרחורת וחוסר שיווי משקל בקשישים).\n\n**B שגוי:** מחלת Ménière מאופיינת בהתקפים אפיזודיים (דקות עד שעות) של ורטיגו, ירידה בשמיעה, טינטון ותחושת מלאות באוזן – ולא בסחרחורת \"ממושכת יומיומית.\" בין ההתקפים יש תקופות ללא תסמינים.\n\n**C ש��וי:** Acoustic Neuroma (שוואנומה וסטיבולרית) גורם בדרך כלל לחוסר שיווי משקל כרוני והפרעת שמיעה חד-צדדית מתקדמת, ולא ל-true vertigo קלאסי, כיוון שהגידול גדל לאט ומאפשר פיצוי מרכזי.\n\n**D שגוי:** Recurrent Vestibulopathy מאופיין בהתקפי ורטיגו חוזרים **ללא** ירידה בשמיעה – זהו למעשה המאפיין המבדיל מ-Ménière.\n\n**פנינה קלינית:** בכל קשיש עם נפילות חוזרות, יש לבצע תמרון D", "reason": "Explanation says answer A, marked answer is different"}, {"idx": 1062, "ti": 32, "t": "2021", "q": "בת 85, סרטן גרורתי ודמנציה מתקדמת, חולה נוטה למות. ייפוי כוח פג, מונה אפוטרופוס. מי מחליט על טיפול סוף חיים?", "o": ["האפוטרופוס", "אחייניתה", "הרופא בהתייעצות עם השכנה", "הרופא בהתייעצות עם האפוטרופוס"], "c": 2, "e": "התשובה הנכונה היא C, אך יש לציין שזו תשובה בעייתית מבחינה קלינית ומשפטית. ככל הנראה, השאלה מתייחסת למצב בו אין בן משפחה זמין או אפוטרופוס פעיל, והשכנה משמשת כ\"אדם קרוב\" (לפי חוק החולה הנוטה למות, תשס\"ו-2005). החוק הישראלי מגדיר \"ידיד קרוב\" כמי שקרוב לחולה ומכיר את רצונותיו, גם אם אינו בן משפחה. במצב בו ייפוי הכוח פג והאפוטרופוס אינו זמין או שמינויו אינו מכסה החלטות רפואיות בסוף החיים, הרופא נדרש להתייעץ עם מי שמכיר את רצונות החולה.\n\n**מדוע A שגוי:** למרות שמונה אפוטרופוס, בחוק החולה הנוטה למות ההחלטה אינה של האפוטרופוס לבדו – נדרשת מעורבות הרופא. **מדוע B שגוי:** אחייניתה אינה בהכרח מעורבת או מוכרת כגורם מחליט ללא מעמד משפטי. **מדוע D שגוי:** ככל הנראה בתרחיש זה ה��פוטרופוס אינו זמין או מוסמך לעניין זה.\n\n**פנינה קלינית:** לפי חוק החולה הנוטה למות, ההיררכיה כוללת: הנחיות מקדימות > ייפוי כוח > \"אדם קרוב\" המכיר את רצונות החולה, בשיתוף הרופא המטפל.", "reason": "Explanation says guardian not available, contradicts appointed"}, {"idx": 1063, "ti": 26, "t": "2021", "q": "ייחוד טיפול פליאטיבי בדמנציה לעומת אונקולוגיה?", "o": ["אין צורך בטיפול בכאב", "הצוות המטפל מספיק ללא מומחים", "נטל סימפטומים גופניים משמעותי כמו באונקולוגיה", "פליאטיבי חשוב רק בשלבים מתקדמים"], "c": 2, "e": "התשובה הנכונה היא C. מחקרים רבים הוכיחו כי חולי דמנציה סובלים מנטל סימפטומים גופניים משמעותי – כולל כאב, קוצר נשימה, בעיות בליעה, זיהומים חוזרים ופצעי לחץ – בדומה לחולים אונקולוגיים. עם זאת, סימפטומים אלו מאובחנים ומטופלים בחסר (undertreated) בדמנציה, בין היתר בשל קושי התקשורת של החולים. לפי עקרונות הרפואה הפליאטיבית בגריאטריה (Hazzard's, פרקי טיפול פליאטיבי ודמנציה מתקדמת), יש להכיר בכך שדמנציה היא מחלה סופנית הדורשת ניהול סימפטומים אקטיבי לא פחות מאשר במחלות ממאירות.\n\nתשובה A שגויה – כאב שכיח מאוד בדמנציה, במיוחד בשלבים מתקדמים, והטיפול בו חיוני אך מאתגר בשל חוסר יכולת המטופל לדווח; יש להשתמש בכלי הערכה התנהגותיים (כגון PAINAD).\n\nתשובה B שגויה – טיפול פליאטיבי ��דמנציה דורש צוות רב-מקצועי הכולל מומחים בגריאטריה, פליאטיב, סיעוד, עבודה סוציאלית ועוד, ולא ניתן להסתפק בצוות בסיסי בלבד.\n\nתשובה D שגויה – גישה פליאטיבית צריכה להשתלב מוקדם במהלך המחלה (\"early palliative approach\") ולא רק בשלב הסופני.\n\n**פנינה קלינית:** דמנציה מתקדמת נושאת פרוגנוזה דומה לסרטן גרורתי, ויש לשקול הפניה לטיפול פליאטיבי כבר בשלבים בינוניים של המחלה.", "reason": "Explanation describes similarity, not uniqueness to dementia"}, {"idx": 1061, "ti": 6, "t": "2021", "q": "בת 96, דמנציה, הליכון בהשגחה, שבץ בעבר, 3 נפילות. ל\"ד שכיבה 145/80, עמידה 110/65. לאיזה גורם סיכון הקשר החלש ביותר לנפילות?", "o": ["גיל", "אורתוסטטיזם", "שבץ בעבר", "ירידה קוגניטיבית"], "c": 1, "e": "התשובה הנכונה היא **אורתוסטטיזם** (תשובה B), והסיבה היא שלמרות שתת-לחץ דם אורתוסטטי שכיח מאוד בקשישים, הקשר שלו עם נפילות בספרות הגריאטרית הוא דווקא **החלש ביותר** מבין הגורמים המוצגים. מחקרים רבים (כולל מטא-אנליזות שצוטטו ב-Hazzard's Geriatric Medicine, פרקי נפילות) הראו שאורתוסטטיזם כממצא מדיד אינו מנבא באופן עקבי נפילות, במיוחד כאשר הוא אסימפטומטי. רבים מהקשישים עם ירידת ל\"ד בעמידה אינם נופלים, והממצא לבדו אינו ספציפי.\n\n**גיל** (A) הוא גורם סיכון חזק ועקבי – גיל מעל 80 ובוודאי 96 מעלה משמעותית את הסיכון. **שבץ בעבר** (C) קשור לחולשת שרירים, הפרעות שיווי משקל והליכה אסימטרית – כולם גורמי סיכון משמעותיים ומוכחים לנפילות. **ירידה קוגניטיבית/דמנציה** (D) היא מגורמי הסיכון החזקים והעקביים ביותר לנפילות, בשל פגיעה בשיפוט, תשומת לב מחולקת, ואובדן יכולת תגובה לסכנות סביבתיות.\n\n**פנינה קלינית:** בבחינות גריאטריות, יש להבחין בין ממצא שכיח לבין גורם סיכון חזק. אורתוסטטיזם שכיח אך הקשר הסטטיסטי שלו לנפילות חלש יחסית – בניגוד לדמנציה, שהיא מנבא עצמאי חזק ביותר.", "reason": "Explanation contradicts question asking for WEAKEST risk"}, {"idx": 1089, "ti": 6, "t": "Hazzard-suppl", "q": "בן 69, MoCA 25/30, GDS 2/15. פנה לגבי טיפול ביולוגי. מה ההמלצה על פי המאמר \"Lecanemab in Early Alzheimer's Disease\" מאת van Dyck et al?", "o": ["יש לבצע בדיקה גנטית לאלל לגן ApoE4 ובמידה ונמצא הומוזיגוטי הטיפול מומלץ", "במידה ויקבל את הטיפול צפוי שיהיה שיפור ב-CDR-SB אך לא ברור אם תהיה לכך משמעות קלינית", "הטיפול אינו מתאים למצבו הקוגניטיבי הנוכחי, במידה ויפתח דמנציה יש להתחיל טיפול", "הטיפול מעלה תמותה בעקבות סיכון לדימום מוחי ולכן אינו מומלץ"], "c": 1, "e": "התשובה הנכונה היא B. במחקר CLARITY AD (van Dyck et al., NEJM 2023), לקנמאב הראה האטה סטטיστית מובהקת בקצב ההידרדרות ב-CDR-SB (סולם Clinical Dementia Rating – Sum of Boxes) בשיעור של כ-27% לעומת פלצבו לאחר 18 חודשים. עם זאת, ההבדל המוחלט היה קטן (כ-0.45 נקודות על סולם של 18), ונותרה שאלה פתוחה האם הבדל זה מתורגם לשיפור קליני משמעותי (clinically meaningful difference) עבור המטופל. המטופל עם MoCA 25/30 ו-GDS 2/15 מתאים לפרופיל של MCI או אלצהיימר מוקדם – בדיוק האוכלוסייה שנחקרה במחקר.\n\nתשובה A שגויה – אמנם נשאי ApoE4 הומוזיגוטיים נמצאו בסיכון מוגבר ל-ARIA (בצקת ודימומים מוחיים), ולכן יש לבצע בדיקה גנטית, אך הממצא של הומוזיגוטיות דווקא מעלה חשש ולא מהווה המלצה לטיפול. תשובה C שגויה – המחקר כלל דווקא חולים עם ליקוי קוגניטיבי קל (MCI) ודמנציה מוקדמת, כך שמצבו הנוכחי מתאים. תשובה D שגויה – אמנם ARIA-H (דימומים מיקרו-ווסקולריים) תועדו, אך לא הוכחה עלייה בתמותה המצדיקה שלילת הטיפול לחלוטין.\n\n**פנינה קלינית:** ההבדל בין מובהקות סטטיסטית למשמעות קלינית הוא מפתח בהערכת טיפולים ביולוגיים חדשים לאלצהיימר.", "reason": "Explanation says slowdown in deterioration, answer says improvement"}, {"idx": 1093, "ti": 17, "t": "2025-Jun", "q": "בן 75, דמנציה מתקדמת, Aortic Stenosis עם שטח מסתם 0.6 cm², מפל לחצים 50 mmHg, מהירות זרימה 5 m/s. מה הגישה הטיפולית הנכונה?", "o": ["Surgical Aortic Valve Replacement (SAVR)", "Transcatheter Aortic Valve Replacement (TAVR)", "טיפול פליאטיבי לצורך הקלת התסמינים", "בהעדר קריטריונים להתערבות לבצע בדיקה חוזרת בעוד שנה"], "c": 2, "e": "המטופל מציג היצרות אאורטלית חמורה (severe aortic stenosis) על פי כל הפרמטרים: שטח מסתם < 1.0 cm² (כאן 0.6), מפל לחצים ממוצע > 40 mmHg (כאן 50), ומהירות זרימה > 4 m/s (כאן 5). אין ספק שמדובר בהיצרות חמורה המצדיקה שקילת התערבות. עם זאת, הנתון הקריטי הוא שלמטופל **דמנציה מתקדמת** — מצב המשנה באופן מהותי את יחס התועלת-סיכון של כל התערבות פולשנית.\n\n**תשובה C נכונה** מכיוון שבמטופל עם דמנציה מתקדמת, תוחלת החיים המוגבלת ואיכות החיים הירודה מבססת הופכות את הניתוח או TAVR לבלתי מוצדקים. הנחיות ACC/AHA וגם עקרונות הרפואה הגריאטרית (Hazzard's, פרקי Shared Decision Making ו-Palliative Care) מדגישים כי \"futility\" קיימת כאשר הפרוצדורה לא תשפר משמעותית את איכות החיים או התפקוד. הגישה הנכונה היא טיפול פליאטיבי — משתנים, ניהול תסמינים, ותמיכה.\n\n**תשובה A (SAVR)** שגויה — ניתוח לב פתוח במטופל עם דמנציה מתקדמת נושא סיכון גבוה מאוד ללא תועלת צפויה משמעותית. **תשובה B (TAVR)** — אף שזו פרוצדורה פחות פולשנית, דמנציה מתקדמת נחשבת מצב שבו TAVR אינו מועיל (\"futile\"), וצוותי Heart Team לא ימליצו עליו. **תשובה D** שגויה מכיוון שברור שהמסתם חמור — הבעיה אינה בהעדר קריטריונים אלא בכושר המטופל.\n\n**פ", "reason": "Explanation cut off, cannot verify full reasoning"}, {"idx": 1094, "ti": 3, "t": "Hazzard-suppl", "q": "באיזה מדד שבריריות מומלץ להשתמש כשרוצים לבסס אבחון שבריריות מתוך תיק רפואי (TAVI pre-screening)?", "o": ["מדד FRIED ניתן לבצע בתשאול טלפוני", "ניתן לבצע מדד Deficit Accumulation Index (FI) אחרי הערכה כוללנית של גריאטר", "במידה ורוצים להשתמש באבחון שבריריות מתוך תיק רפואי מומלץ להשתמש במדד Clinical Frailty Scale (CFS) של Rockwood", "מדד FRAIL מחייב בדיקה גופנית במרפאה"], "c": 1, "e": "התשובה הנכונה היא B. מדד Deficit Accumulation Index (FI) מבוסס על ספירת ליקויים (deficits) מתוך רשימה רחבה של בעיות בריאותיות, תפקודיות, קוגניטיביות ופסיכו-סוציאליות. היתרון המרכזי של מדד זה הוא שניתן לחשב אותו רטרוספקטיבית מתוך נתונים שכבר נאספו בתיק הרפואי, במיוחד לאחר הערכה גריאטרית כוללנית (CGA) שמכסה תחומים מרובים. בהקשר של pre-screening ל-TAVI, כאשר יש צורך לבסס אבחון שבריריות מתוך תיעוד קיים, מדד ה-FI הוא הכלי המתאים ביותר כיוון שהוא מנצל מידע רב-ממדי שכבר תועד.\n\nתשובה A שגויה כיוון שמדד Fried דורש מדידות פיזיות (כוח אחיזה, מהירות הליכה) שאינן ניתנות לביצוע טלפונית. תשובה C שגויה כיוון ש-CFS של Rockwood הוא כלי קליני סובייקטיבי המבוסס על התרשמות קלינית ולא על חילוץ שיטתי של נתונים מתיק רפואי; הוא מתאים יותר להערכה בזמן אמת. תשובה D שגויה כיוון שמדד FRAIL הוא שאלון פשוט של חמישה פריטים שאינו מחייב בדיקה גופנית וניתן לביצוע בתשאול בלבד.\n\n**פרל קליני:** בהערכת שבריריות לפני TAVI, ה-FI מאפשר ניצול מיטבי של CGA קיימת ומספק ערך מספרי רציף (0-1) עם יכולת ניבוי פרוגנוסטית גבוהה.", "reason": "Explanation describes answer B, not marked answer"}, {"idx": 1130, "ti": 20, "t": "2025-Jun", "q": "בן 75, עם דומיננטיות ימנית, אוטם ב-MCA. לפי מאמר Stroke Rehabilitation Clinician Handbook 2020, מהי הפגיעה הצפויה?", "o": ["בפגיעה ב-RT MCA, בחלק המטופלים יתכן Neglect", "בפגיעה ב-RT MCA, צפויה אפאזיה גלובלית", "בפגיעה ב-LT MCA, צפויה פגיעה בראיה", "בפגיעה ב-LT MCA, צפויה פגיעה בולטת יותר ברגל בהשוואה ליד"], "c": 0, "e": "תשובה A היא הנכונה. בפגיעה בעורק המוחי האמצעי (MCA) הימני, אחד הממצאים הקלאסיים הוא **neglect חד-צדדי שמאלי** (hemispatial neglect), המופיע בחלק ניכר מהמטופלים. תופעה זו נובעת מפגיעה באונה הפריאטלית הימנית, האחראית על קשב מרחבי לשני צדדי המרחב. לפי ה-Stroke Rehabilitation Clinician Handbook 2020, neglect שכיח יותר בפגיעות בהמיספרה הימנית ומהווה ממצא צפוי באוטם של MCA ימני.\n\nתשובה B שגויה כיוון ש**אפאזיה גלובלית** מאפיינת פגיעה בהמיספרה **השמאלית** (הדומיננטית לשפה ברוב האנשים), ולא הימנית. פגיעה ב-RT MCA אינה גורמת לאפאזיה קלאסית באדם עם דומיננטיות ימנית (שההמיספרה השמאלית שלו דומיננטית לשפה).\n\nתשובה C שגויה כיוון שפגיעה ב-LT MCA מתבטאת בעיקר באפאזיה ובחולשה ימנית, ולא בפגיעה ראייתית ייחודית. פגיעות ראייה (המיאנופסיה) יכ��לות להופיע בשני הצדדים אך אינן הממצא הצפוי הבולט.\n\nתשובה D שגויה כיוון שפגיעה ב-MCA גורמת לחולשה בולטת יותר **ביד ובפנים** בהשוואה לרגל. פגיעה בולטת ברגל אופיינית לאוטם ב-**ACA** (העורק המוחי הקדמי).\n\n**פנינה קלינית:** MCA = פנים ויד; ACA = רגל. neglect = ימין; אפאזיה = שמאל (בדומיננטיות ימנית).", "reason": "Explanation describes LEFT neglect, answer says Neglect"}, {"idx": 1124, "ti": 6, "t": "Hazzard-suppl", "q": "לפי מאמר Lancet 2024 על מניעת דמנציה (Livingstone et al), מה מהבאים נכון?", "o": ["אלל ApoE4 הוא גורם סיכון משמעותי לדמנציה ואין אפשרות להפחתת סיכון זה בהתערבות חיצונית", "ישנם 14 גורמי סיכון הניתנים לשינוי, התערבות ושיפור בהם מפחית סיכון לדמנציה במעל 60%", "מעכבי כולין אסטרז לא הראו יעילות משמעותית בהאטת התקדמות דמנציה של מחלת אלצהיימר", "במטופלים עם דמנציה על רקע מחלת גופיפי לווי, יש לבדוק ביומרקרים ב-CSF על מנת לאשר את האבחנה"], "c": 0, "e": "התשובה הנכונה היא A, אך יש לציין שזהו נושא מורכב. לפי מאמר ה-Lancet 2024 של Livingston ועמיתיה, אלל ApoE4 הוא אכן גורם הסיכון הגנטי המשמעותי ביותר לדמנציה מסוג אלצהיימר, והוא מסווג כגורם סיכון **שאינו ניתן לשינוי** (non-modifiable risk factor). המאמר מבחין בין גורמי סיכון הניתנים לשינוי לבין גורמים שאינם ניתנים לשינוי, ו-ApoE4 נמצא בקטגוריה השנייה — כלומר, אין התערבות חיצונית ישירה שיכולה לשנות את הנוכחות הגנטית של האלל עצמו או לבטל באופן מלא את השפעתו.\n\nתשובה B שגויה: המאמר מזהה **14 גורמי סיכון הניתנים לשינוי**, אך ההפחתה המצטברת המשוערת היא כ-**45%** מהמקרים, ולא מעל 60%. זו הגזמה משמעותית.\n\nתשובה C שגויה: מעכבי כולין-אסטרז (donepezil, rivastigmine, galantamine) הראו יעילות מתונה אך מובהקת סטטיסטית בשיפור סימפטומטי ובהאטה זמנית של ירידה קוגניטיבית באלצהיימר, כפי שמתואר גם ב-Harrison's.\n\nתשובה D שגויה: אבחנת דמנציה על רקע גופיפי לווי (DLB) מבוססת בעיקר על קריטריונים קליניים (הזיות חזותיות, פרקינסוניזם, תנודתיות קוגניטיבית) ובדיקות עזר כמו DaT-SCAN, ולא על ביומרקרים ב-CSF.\n\n**פרל קליני:** יש לזכור שגם נשאי ApoE4 נהנים מאורח חיים בריא — אך האלל עצמו נש", "reason": "Explanation contradicts answer - mentions possible intervention"}, {"idx": 1153, "ti": 28, "t": "2025-Jun", "q": "?מה מאפיין הפרעות שינה בפיברומיילגיה", "o": ["עליה במשך השינה הכללי", "ירידה במשך  שנתREM", "EEG יראה ירידה בכמות של גלי אלפא", "הירדמות מהירה ויקיצה איטית 25. ל ?מי מהמטופלים הבאים מתאים להיעזר ברולטור"], "c": 1, "e": "בפיברומיאלגיה, הפרעות השינה מהוות מאפיין קליני מרכזי. מחקרי פוליסומנוגרפיה הראו כי חולים אלו סובלים מירידה במשך שנת REM, כמו גם משיבוש בארכיטקטורת השינה הכללית. הממצא הקלאסי ב-EEG הוא דווקא **חדירת גלי אלפא לתוך שנת NREM** (תופעת alpha-delta sleep או \"alpha intrusion\"), כלומר עלייה בגלי אלפא בשלבי שינה עמוקה, מה שמוביל לשינה לא מרעננת (non-restorative sleep). הירידה ב-REM תורמת לתחושת העייפות הכרונית, לפגיעה קוגניטיבית (\"fibro fog\") ולהחמרת תפיסת הכאב.\n\n**תשובה A שגויה** — בפיברומיאלגיה לא נצפית עלייה במשך השינה הכללי; להיפך, חולים מדווחים על קושי בהירדמות, יקיצות תכופות וירידה ביעילות השינה. **תשובה C שגויה** — כאמור, הממצא האופייני הוא דווקא עלייה בגלי אלפא (alpha intrusion) בזמן שינה, ולא ירידה בהם. **תשובה D שגויה** — חולי פיברומיאלגיה מתאפיינים בקושי בהירדמות (latency מוארכת) וביקיצות תכופות, לא בהירדמות מהירה.\n\n**פנינה קלינית:** הממצא הפתוגנומוני בפיברומיאלגיה הוא alpha-delta sleep — זכרו שזו חדירת ערנות לתוך שינה עמוקה, המסבירה את תלונת השינה הלא מרעננת.", "reason": "Explanation emphasizes alpha-delta intrusion, not REM reduction"}, {"idx": 1151, "ti": 15, "t": "2025-Jun", "q": "בת87 , ברקע : דמנציה על רקע אלצהיימר, לאחר תיקון שבר בצוואר הירך דו\"צ מרותקת .לאחרונה למיטה, היפות "], "c": 1, "e": "תשובה נכונה: **C – VALSARTAN**\n\nValsartan הוא חוסם קולטני אנגיוטנסין II (ARB) הגורם להורדת לחץ דם. במטופלים מבוגרים, תת-לחץ דם אורתוסטטי הוא מנגנון מרכזי לנפילות, ו-Valsartan מעלה משמעותית את הסיכון לכך. בהתאם לעקרונות ב-*Hazzard's Geriatric Medicine*, תרופות להורדת לחץ דם – כולל ARBs, מעכבי ACE, משתנים וחוסמי אלפא – נחשבות בין הגורמים התרופתיים העיקריים לנפילות בקשישים, בעיקר דרך היפוטנשן אורתוסטטי ופגיעה בפרפוזיה מוחית.\n\n**ASPIRIN (A)** – אינו גורם להיפוטנשן או לסחרחורת משמעותית, ולכן אינו נחשב גורם סיכון ישיר לנפילות.\n\n**ESCITALOPRAM (B)** – SSRIs אכן מופיעים ברשימות Beers כתרופות המעלות סיכון לנפילות (דרך היפונתרמיה, סדציה והיפוטנשן), וזו תשובה מסיחה חזקה. עם זאת, בהקשר של שאלה זו, Valsartan נבחר כתשובה הנכונה – ככל הנראה בשל המנגנון הישיר והבולט יותר של היפוטנשן אורתוסטטי.\n\n**MIRABEGRON (D)** – אגוניסט בטא-3 לטיפול בשלפוחית רגיזה. אינו גורם משמעותי להיפוטנשן או סדציה, ולכן סיכון הנפילות נמוך.\n\n**פנינה קלינית:** בכל הערכת נפילות בקשיש, יש לבצע מדידת לחץ דם בשכיבה ובעמידה ולבחון את כל התרופות ההיפוטנסיביות כגורם הפיך.", "reason": "Explanation supports VALSARTAN, not marked ESCITALOPRAM"}, {"idx": 1158, "ti": 6, "t": "2025-Jun", "q": "בן82 , מאושפז במחלקה לסיעוד מורכב עקב פצע לחץ בעכוז עם ריבוי הפרשות. מצור פת תמונה מספר 3 . מה הוא הטיפול המומלץ ?", "o": ["POVIDONE IODINE (POLYDINE)", "מדבקתHYDROCOLLOID", "משחה אנטיביוטית מקומית", "HYDROFIBER עם יוני כסף"], "c": 3, "e": "התשובה הנכונה היא מדבקת HYDROCOLLOID, המהווה את הטיפול המומלץ בפצעי לחץ בשלב מוקדם (שלב II) או בפצעים נקיים עם אקסודט מועט עד בינוני. מדבקות הידרוקולואיד יוצרות סביבה לחה המקדמת ריפוי, מגנות על הפצע מפני זיהום חיצוני, ומאפשרות החלפות פחות תכופות, מה שמפחית טראומה לרקמה המתחדשת. על פי עקרונות הטיפול בפצעי לחץ ב-Hazzard's Geriatric Medicine, שמירה על סביבה לחה היא אבן יסוד בריפוי פצעים.\n\nPOVIDONE IODINE (תשובה A) אינו מומלץ לשימוש שגרתי בפצעי לחץ כיוון שהוא ציטוטוקסי לפיברובלסטים וקרטינוציטים, ובכך מעכב את תהליך הריפוי. משחה אנטיביוטית מקומית (תשובה C) אינה מיועדת לשימו e": "## הסבר קליני\n\nהתשובה הנכונה היא **B – Raynaud's Phenomenon**.\n\nהממצאים המרכזיים הם **ציאנוזיס של האצבעות** ו-**Clubbing** בחולה פסיכיאטרית ללא מעקב רפואי. תופעת Raynaud מתבטאת בוזוספזם אפיזודי של כלי דם פריפריים, המוביל לציאנוזיס באצבעות. ב-Raynaud's שניוני (הקשור למחלות רקמת חיבור כמו סקלרודרמה), ייתכן Clubbing כתוצאה מאיסכמיה כרונית ושינויים טרופיים. בנוסף, חולי סכיזופרניה ללא מעקב חשופים לעישון כבד ולתרופות אנטיפסיכוטיות, שעלולים להחמיר וזוספזם פריפרי ולתרום ל-Clubbing.\n\n**A – Emphysema**: אמפיזמה גורמת לציאנוזיס מרכזית (שפתיים, לשון) ולא לציאנוזיס מבודד של אצבעות. כמו כן, אמפיזמה **אינה גורמת ל-Clubbing** – זהו כלל קלאסי חשוב: COPD/אמפיזמה אינם קשורים ל-Clubbing (בניגוד לסרטן ריאה או ברונכיאקטזיס).\n\n**C – Deep Vein Thrombosis**: DVT מתבטא בנפיחות, כאב וחום ביד/רגל, אך לא בציאנוזיס של אצבעות ידיים ולא ב-Clubbing.\n\n**D – Peripheral Vascular Disease**: מחלת כלי דם פריפרית גורמת לקלאודיקציה, חיוורון, ואיסכמיה בגפיים תחתונות בעיקר, אך **לא ל-Clubbing**.\n\n**פנינה קלינית**: Clubbing + ציאנוזיס פריפרית באצבעות מחייבים חשיבה על Raynaud's שניוני, במיוחד כאשר יש גור", "reason": "Explanation supports Raynaud's Phenomenon, not Emphysema"}, {"idx": 1171, "ti": 17, "t": "2025-Jun", "q": "מה מהבאים לא ?מוכר כסיבוך של האכלת צינור", "o": ["עצירות", "תמותה", "דלקת ריאות", "ירידה במשקל"], "c": 0, "e": "האכלת צינור (tube feeding) היא שיטה נפוצה להזנה אנטרלית בקשישים, במיוחד בחולי דמנציה מתקדמת ובחולים עם הפרעות בליעה. התשובה הנכונה היא **ירידה במשקל**, מכיוון שהאכלת צינור נועדה בדיוק למנוע ירידה במשקל ולספק תמיכה תזונתית. אמנם במציאות הקלינית האכלת צינור לא תמיד מצליחה למנוע ירידה במשקל (במיוחד בדמנציה מתקדמת), אך ירידה במשקל אינה מוכרת כ**סיבוך ישיר** של ההאכלה עצמה, אלא כביטוי של המחלה הבסיסית.\n\nלעומת זאת, **עצירות** (A) היא סיבוך מוכר הנובע מתכולת סיבים נמוכה בתרכובות ההזנה, חוסר תנועתיות והתייבשות. **תמותה** (B) מוכרת כסיבוך – מחקרים רבים, כולל אלה המצוטטים ב-Hazzard's Geriatric Medicine, הראו שהאכלת צינור בחולי דמנציה מתקדמת אינה מאריכה חיים ואף עלולה להגביר ט גרעיני הוא הגורם השכיח ביותר לירידה בתפיסת ראייה בקשישים. הופעת משקעות בעדשה ופגיעה בחדות ראייה תוך שמירה על אישי תקין אופיינית לקטרקט. הטיפול דרגתי עם הפניה לרופא עיניים אם יש פגיעה משמעותית.", "reason": "Discoid deposits suggest keratic precipitates, not cataract"}, {"idx": 1229, "ti": 28, "t": "Hazzard", "q": "גבר בן 75 עם דמנציה מתקדמת וכאב סיבי מנוון, אינו מוטל מדיבור, דורס טבליות. רופא הבית מעוניין להתחיל משכך כאב. מה הדרך הטובה ביותר?", "o": ["א. אופיואיד בתחזוקה PO או דחוף ללשון", "ב. טלאי פנטניל טרנסדרמי ודוקומנטציית החלטות מוקדמות", "ג. הזרקות בדלתא עמוד שדרה לשליטה בכאב", "ד. המתנה עד שיוכל לבטא כאב בדיבור"], "c": 1, "e": "טלאי פנטניל טרנסדרמי הוא בחירה מעולה לזקן שלא יכול לבלוע, מספק תיקיה דתקבעה לשבועות. מונע קשיזה. תיעוד החלטות מוקדמות משמעותי בדמנציה. הזרקות עמוד שדרה פולשניות; המתנה שלילית אתית.", "reason": "Patient CAN swallow tablets, contradicts explanation logic"}, {"idx": 1246, "ti": 23, "t": "Hazzard", "q": "אישה בת 78 עם היסטוריה של עלייה בדופק קל וירידה במשקל של 3 ק\"ג בחודשיים. בדיקה גופנית: דופק 92, פיברילציה פרוזדורית חדשה. TSH: 0.15 mIU/L, T4 חופשי: 18 pg/dL. מה הטיפול המוצע?", "o": ["א. התחלת טיפול בתירוקסין מיידי", "ב. תצפית בלבד ללא טיפול", "ג. טיפול בתירוקסין בהדרגה עם מעקב קרדיולוגי", "ד. בדיקה חוזרת של TSH בעוד 6 שבועות"], "c": 2, "e": "בקשישה עם תירוקסיניה סובקלינית וסימנים קליניים (דופק מוגבר, ירידה במשקל), יש סיכון מוגבר לפיברילציה פרוזדורית וכשל לב. טיפול בהדרגה עם מעקב קרדיולוגי חיוני למניעת סיבוכים קרדיאליים.", "reason": "Explanation describes hyperthyroidism treatment, answer says thyroxine"}, {"idx": 1249, "ti": 13, "t": "Hazzard", "q": "אישה בת 82 מדווחת על שינה קדומה חמורה למרות טיול יומי חוזר ויציאה. רופא קודם הוציא אבחנה של דיסומניה ראשונית. מה הצעד הבא המומלץ ביותר?", "o": ["התחל זולפידם (Zolpidem) 5 מ\"ג בערב", "בדוק עבור דום נשימה בשינה וSRBD עם פוליסומנוגרפיה", "תת-מינון של מלאטונין 0.5 מ\"ג בערב", "אישור עם אותו רופא לתרופות הרגעה נוספות"], "c": 1, "e": "לפני טיפול תרופתי בקשישים, יש להשמיט סיבות משניות חשובות. דום נשימה בשינה (OSA) וREM sleep behavior disorder שכיחים בגיל המתקדם ויכולים להסביר עירוניות. בנזודיאזפינים חוקרים נמנעים בקשישים בגלל סיכון לנפילות וקוגניציה.", "reason": "Explanation mentions REM behavior disorder, answer says SRBD"}, {"idx": 1254, "ti": 25, "t": "Hazzard", "q": "זקן בן 78 בעל היסטוריה של CKD שלב 3b מגיע עם תלונות על עייפות וקוצר נשימה. Hb=9.2 g/dL, MCV=88 fL, רטיקולוציטים=0.8%. איזה מהבאים הוא הצעד הטיפולי המתאים ביותר?", "o": ["א. חמצן משלים בלבד", "ב. טרנספוזיציה דם", "ג. ESA (erythropoiesis-stimulating agent) + iron supplementation", "ד. חקירה לחיפוש 출혈ת GI"], "c": 2, "e": "בזקן עם CKD, אנמיה נורמוציטית עם רטיקולוציטוזיס נמוך מצביעה על אי-ספיקות של erythropoietin. ESA הוא טיפול כלל-מקובל בשיטוגים של CKD. טרנספוזיציה שמורה למצבים חמורים יותר. חקירת GI לא מוצדקת ללא סימנים קליניים.", "reason": "Explanation says reticulocytosis, labs show reticulocytopenia"}, {"idx": 1282, "ti": 37, "t": "Hazzard", "q": "מטופל בן 74 עם ירידה משמעותי בשמיעה מתלונן על נפילות חוזרות. בבדיקה אין הפרעות קוגניטיביות ואין סחרחורת. מה הקשר הסביר בין ההפרעות?", "o": ["א. אובדן שמיעה גורם לפגיעה באיזון וסטי", "ב. אובדן שמיעה פוגע ביכולת לזהות סכנות סביבתיות", "ג. אובדן שמיעה מעמיס על משאבי הקשב והקוגניציה", "ד. כל התשובות נכונות"], "c": 3, "e": "אובדן שמיעה אצל קשישים מגביר סיכון לנפילות דרך מספר מנגנונים: פגיעה באיזון וסטיבולרי, הפחתת מודעות לסכנות סביבתיות, ועומס קוגניטיבי המפחית משאבים לשמירה על יציבות.", "reason": "Explanation lists specific mechanisms not all answers"}, {"idx": 1298, "ti": 38, "t": "Hazzard", "q": "אישה בת 78 עם שבר צוואר ירך לאחר נפילה. בהערכת Nottingham Hip Fracture Score - גיל 78, מגורים עצמאיים, ציון מיני מנטל 25, המוגלובין 10.2 g/dL. מה הציון?", "o": ["א. 3", "ב. 4", "ג. 5", "ד. 6"], "c": 1, "e": "גיל 66-85 = 1 נקודה, מגורים עצמאיים = 0, מיני מנטל >6 = 0, המוגלובין 10-11.9 אצל נשים = 1, שבר intracapsular = 2. סך הכל 4 נקודות.", "reason": "Explanation includes fracture type not in question"}, {"idx": 1347, "ti": 10, "t": "Hazzard", "q": "איזה מהבאים אינו חלק מסולם Norton להערכת סיכון לפצעי לחץ?", "o": ["תזונה", "מצב גופני כללי", "מצב נפשי", "ניידות"], "c": 0, "e": "סולם Norton כולל 5 פרמטרים: מצב גופני כללי, מצב נפשי, פעילות (ניידות), ניידות (mobility) ואי-נקיטת שלפוחית. תזונה נכללת בסולם Braden אך לא ב-Norton המקורי.", "reason": "Explanation says nutrition NOT in Norton scale"}, {"idx": 1481, "ti": 3, "t": "Hazzard", "q": "An 82-year-old woman presents to your geriatric clinic with a 6-month history of progressive weakness and difficulty rising from chairs. She reports two falls in the past month and has lost 8 kg over the past year. Physical examination reveals visible muscle wasting in her arms and legs. You decide to screen for sarcopenia using the SARC-F questionnaire. What is the most appropriate approach for interpreting SARC-F results in this clinical scenario?", "o": ["Use a cutoff of >1 point for high sensitivity screening given the high pretest probability", "Use a cutoff of >4 points for optimal specificity in this high-risk patient", "The SARC-F is not indicated since she already has obvious clinical signs of sarcopenia", "Combine SARC-F with calf circumference measurement for better accuracy"], "c": 1, "e": "In this clinical scenario with high pretest probability of sarcopenia (elderly patient with weakness, falls, weight loss, and visible muscle wasting), the SARC-F questionnaire should be interpreted using a cutoff of >4 points for good specificity. While low cutoffs (>1 point) provide high sensitivity, they are more appropriate for general screening in populations with lower pretest probability. In this case, where sarcopenia is already clinically suspected based on multiple classic symptoms, using the higher cutoff ensures better specificity and reduces false positives. The SARC-F remains useful even with obvious clinical signs as it provides standardized quantification of functional impact across five domains: perceived muscle strength, assistance in walking, rising from a chair, climbing stairs, and falls. This helps guide further diagnostic workup and monitoring. Modified versions incorporating calf circumference are being studied but are not yet standard practice. The systematic approach using validated screening tools like SARC-F, even in obviously symptomatic patients, ensures comprehensive assessment and provides baseline documentation for monitoring treatment response. Clinical Pearl: In geriatric patients with multiple sarcopenia-related symptoms, use SARC-F with higher cutoffs (>4) for specificity rather than lower cutoffs for sensitivity, as the pretest probability is already elevated based on clinical presentation.", "reason": "Explanation contradicts itself on cutoff values"}, {"idx": 1490, "ti": 3, "t": "Hazzard", "q": "A 77-year-old man undergoes comprehensive geriatric assessment in your clinic. He scores 3 points on the SARC-F questionnaire and has a handgrip strength of 28 kg (normal for his age/gender: >30 kg). His gait speed is 0.7 m/s over 4 meters, and DEXA scan shows normal muscle mass index. Based on these findings and considering the diagnostic criteria for sarcopenia, what is the most appropriate clinical approach?", "o": ["Diagnose confirmed sarcopenia and initiate immediate treatment interventions", "Rule out sarcopenia due to normal muscle mass despite functional limitations", "Consider probable sarcopenia and monitor for progression with repeat assessments", "Focus on other causes of functional decline since sarcopenia criteria aren't met"], "c": 3, "e": "Based on the assessment findings, this patient does not meet current diagnostic criteria for sarcopenia, and the focus should be on identifying other causes of functional decline. While the SARC-F score of 3 suggests some functional concerns and the handgrip strength is slightly below normal, the normal muscle mass index is a key finding. Modern sarcopenia definitions require at least two of three components: low muscle strength, low muscle mass, and impaired physical performance. This patient has borderline low muscle strength (28 kg vs >30 kg threshold) and impaired gait speed (0.7 m/s is below typical cutoffs of 0.8-1.0 m/s), but crucially has normal muscle mass. According to EWGSOP2 criteria, confirmed sarcopenia requires both low muscle strength AND low muscle mass. Without low muscle mass, the diagnosis cannot be confirmed even with functional impairment. The patient's slow gait speed and functional concerns (reflected in SARC-F score) suggest other potential causes of mobility limitations such as joint disease, cardiovascular deconditioning, neurological conditions, medication side effects, or other geriatric syndromes. 'Probable sarcopenia' (option C) would only apply if muscle strength was clearly low with pending muscle mass assessment. This case highlights the importance of comprehensive evaluation in geriatric patients with functional decline, as sarcopenia is just one of many potential contributors to weakness and mobility impairment. A thorough assessment should include evaluation for arthritis, cardiovascular disease, neurological conditions, medication review, and other reversible causes of functional decline. While muscle health remains important, meeting specific diagnostic criteria ensures appropriate resource allocation and treatment targeting. Clinical Pearl: Normal muscle mass excludes sarcopenia diagnosis even with functional limitations; comprehensive geriatric assessment should evaluate other causes of weakness and mobility impairment when sarcopenia criteria aren't met.", "reason": "Patient meets sarcopenia criteria with two components"}, {"idx": 1535, "ti": 11, "t": "Hazzard", "q": "A 71-year-old man reports difficulty reaching climax during sexual activity, though he maintains adequate erections. He states that when he does achieve orgasm, there is often no ejaculation. He is otherwise healthy and takes no medications. He is concerned this represents a serious medical problem. What should you tell him about this condition?", "o": ["This is abnormal and requires immediate urological evaluation", "This occurs in about 16% of men his age and represents normal aging", "This occurs in about 33% of men his age and represents normal aging", "This indicates probable prostate cancer and requires PSA testing"], "c": 2, "e": "The correct answer is that this occurs in about 33% of men his age and represents normal aging. The chapter specifically addresses this concern, stating that 'inability to reach climax or resolution of climax without ejaculation can occur. In the University of Chicago study, this occurred in about 16% in the 57- to 64-year age range, but increased to 33% in the 75-year and older age group.' At age 71, this patient falls into the older age group where this phenomenon affects approximately one-third of men and represents a normal part of aging rather than pathology. Option A is incorrect because this is a normal age-related change that doesn't require immediate urological intervention unless associated with other concerning symptoms. Option B uses the wrong percentage - 16% applies to the younger age group (57-64 years), not to men in their seventies. Option D is incorrect because delayed ejaculation or anejaculation in the absence of other symptoms is not indicative of prostate cancer. The chapter doesn't link this normal aging phenomenon to malignancy. The physiological basis involves age-related changes in the autonomic nervous system, decreased penile sensitivity, and changes in the ejaculatory reflex. This is distinct from erectile dysfunction and doesn't indicate underlying disease in an otherwise healthy man. Clinical Pearl: Reassure older men that delayed ejaculation or orgasm without ejaculation (anejaculation) is a common, normal part of male aging affecting up to one-third of men over 75, and doesn't indicate underlying pathology unless accompanied by other urological symptoms.", "reason": "Patient is 71, not 75+ years old"}, {"idx": 1533, "ti": 11, "t": "Hazzard", "q": "A 72-year-old man with Parkinson disease reports complete loss of libido and erectile dysfunction that began 2 months after starting a new medication for motor symptoms. His wife notes he has become increasingly depressed and withdrawn. He takes carbidopa-levodopa, ropinirole, and recently started taking a medication his neurologist added. Which medication is most likely responsible for his sexual dysfunction?", "o": ["Increased dose of carbidopa-levodopa", "Dopamine agonist (ropinirole)", "Anticholinergic medication (benztropine)", "MAO-B inhibitor (selegiline)"], "c": 2, "e": "The correct answer is anticholinergic medication (benztropine). While the chapter identifies Parkinson disease as a neurologic cause of ED, the temporal relationship between starting a new medication and the sudden onset of complete libido loss with depression suggests a medication-induced cause. Anticholinergics like benztropine, commonly added to Parkinson's regimens for tremor control, can significantly suppress sexual function through multiple mechanisms including effects on arousal, erectile function, and mood. They also commonly cause depression in elderly patients. Option A is incorrect because increasing carbidopa-levodopa typically improves rather than worsens sexual function in Parkinson's patients by enhancing dopaminergic activity. Option B is incorrect because ropinirole, a dopamine agonist, generally has neutral or positive effects on sexual function and can even cause hypersexuality in some patients. The patient was already on this medication without sexual problems. Option D is incorrect because MAO-B inhibitors like selegiline typically don't cause sexual dysfunction and may even improve libido through enhanced dopaminergic function. The anticholinergic's timing, mechanism, and association with depression make it the most likely culprit. Clinical Pearl: In elderly patients with Parkinson disease, anticholinergic medications should be used with extreme caution due to their high risk of cognitive impairment, depression, and sexual dysfunction - often the risks outweigh the modest motor benefits.", "reason": "Explanation contradicts itself - says answer is correct"}, {"idx": 1531, "ti": 11, "t": "Hazzard", "q": "A 68-year-old woman presents with a 1-year history of vulvar pruritus that has not responded to antifungal treatments. Examination reveals white, atrophic-appearing patches on the vulva with loss of normal labial architecture and clitoral hood phimosis. She also reports having Hashimoto's thyroiditis. What is the most appropriate initial treatment after confirming the diagnosis?", "o": ["High-potency topical corticosteroids for 4 weeks followed by maintenance emollient therapy", "Systemic corticosteroids for 2 weeks", "Topical calcineurin inhibitors twice daily", "Surgical excision of affected areas"], "c": 0, "e": "This clinical presentation is classic for lichen sclerosus: white atrophic patches, loss of labial architecture, clitoral hood phimosis, and association with autoimmune disease (Hashimoto's thyroiditis). After biopsy confirmation, the appropriate treatment involves moderate-strength topical corticosteroids (not high-potency as listed in option A, but this is the closest correct answer) for at least 4 weeks, then tapering to lower dosing frequency, followed by maintenance with daily or twice-daily emollient to reduce symptomatic flares. The textbook specifically states that typical regimens involve moderate-strength (not high-potency) topical glucocorticoids for at least 4 weeks, then tapering, followed by maintenance emollient therapy. Systemic corticosteroids are not first-line treatment for lichen sclerosus and carry significant risks in elderly patients including osteoporosis, diabetes, and immunosuppression. Topical calcineurin inhibitors may be used as second-line therapy but are not the initial treatment of choice. Surgical excision is not indicated for lichen sclerosus management and could worsen scarring. The autoimmune association (Hashimoto's thyroiditis) supports the diagnosis of lichen sclerosus, which frequently occurs with other autoimmune disorders. Treatment is necessary only to control symptoms, and the goal is to prevent progression of architectural changes while maintaining quality of life. The chronic nature of this condition requires long-term management with appropriate tapering of corticosteroids to avoid skin atrophy while maintaining symptom control. Clinical Pearl: Lichen sclerosus in elderly women with autoimmune conditions requires moderate-strength topical corticosteroids initially, not high-potency steroids which may cause skin atrophy - always taper to maintenance emollient therapy.", "reason": "Explanation contradicts high-potency corticosteroids recommendation explicitly"}, {"idx": 1560, "ti": 25, "t": "Hazzard", "q": "A 76-year-old woman with chronic kidney disease (eGFR 25 mL/min/1.73m²) and moderate anemia (hemoglobin 9.0 g/dL) is being considered for erythropoiesis-stimulating agents (ESAs). She also has unexplained weight loss over the past 3 months. What should be considered before initiating ESA therapy?", "o": ["ESAs are first-line therapy for all elderly patients with anemia", "ESAs are widely used and have extensive data for unexplained anemia of the elderly", "ESAs are appropriate for end-stage renal disease-related anemia", "ESAs should be started immediately due to her age"], "c": 2, "e": "The correct answer is that ESAs are appropriate for end-stage renal disease-related anemia. The chapter states that 'Erythropoiesis-stimulating agents (ESAs) are analogs of EPO and widely used in end-stage renal disease–related anemia and patients with MDS with moderate to severe anemia.' This patient has chronic kidney disease with eGFR 25 mL/min/1.73m², which is approaching end-stage renal disease (eGFR <15), making ESA therapy appropriate for her renal-related anemia. However, the unexplained weight loss raises concern for possible underlying malignancy that should be evaluated first. The statement that ESAs are first-line therapy for all elderly patients with anemia is incorrect. ESAs have specific indications and are not used as first-line treatment for all types of anemia in elderly patients. Treatment should be targeted to the underlying cause of anemia, and ESAs are not appropriate for conditions like iron deficiency or nutritional anemias. The claim that ESAs have extensive data for unexplained anemia of the elderly is incorrect. The chapter explicitly states that 'data on application of ESAs in other causes of anemia including UAE are limited.' This emphasizes that ESAs should not be routinely used for UAE without strong evidence. The statement that ESAs should be started immediately due to age is incorrect and potentially dangerous. The patient's unexplained weight loss could indicate underlying malignancy, and ESAs may be contraindicated in some cancers due to potential tumor progression. A thorough evaluation should be completed before ESA initiation. Clinical Pearl: Before initiating ESAs in elderly patients, ensure appropriate indication (CKD-related anemia or MDS) and rule out contraindications such as malignancy. Unexplained symptoms like weight loss warrant investigation before starting ESA therapy.", "reason": "Explanation contradicts answer - malignancy workup needed first"}, {"idx": 1584, "ti": 26, "t": "Hazzard", "q": "An 85-year-old man with metastatic lung cancer presents to the emergency department with bowel obstruction. He has multiple comorbidities including diabetes, peripheral vascular disease, and chronic kidney disease. The surgical team is debating between emergency surgery versus conservative management. Based on geriatric oncology principles, what factor most strongly supports proceeding with surgery?", "o": ["His advanced age requires immediate definitive treatment", "Emergency procedures have better outcomes than elective surgery in elderly patients", "Complications are more common with emergency surgical interventions in older adults", "Conservative management is always preferred in metastatic disease"], "c": 2, "e": "The correct answer is C. The text clearly states that 'complications are more common when surgical intervention is performed on an emergency basis' in older adults. This principle suggests that when possible, preventive or elective procedures should be considered before emergency situations arise. The text specifically mentions that it may be more appropriate to perform operations as preventive measures in older populations, such as performing a hemicolectomy even for patients with advanced colorectal cancer to prevent emergency operations for bowel perforation or obstruction. Option A is incorrect because advanced age alone doesn't dictate the urgency of treatment; rather, the overall clinical picture and goals of care should guide decisions. Option B is factually wrong as emergency procedures generally have worse outcomes than elective procedures, especially in elderly patients. Option D is too absolute; while conservative management may often be appropriate in metastatic disease, each case requires individualized assessment considering the patient's goals, prognosis, and quality of life. The decision should involve comprehensive geriatric assessment and consideration of the patient's functional status, comorbidities, and overall prognosis. Clinical Pearl: In elderly cancer patients, proactive surgical intervention may sometimes be preferred over waiting for emergency situations, as emergency procedures carry higher complication rates due to decreased physiologic reserve and impaired wound healing.", "reason": "Explanation supports avoiding emergency surgery, not proceeding"}, {"idx": 1590, "ti": 26, "t": "Hazzard", "q": "A 71-year-old woman with ovarian cancer is enrolled in a clinical trial that includes CGA-guided interventions with a multidisciplinary team approach. She undergoes CGA which identifies several geriatric deficits, and the multidisciplinary team implements tailored interventions based on the results. What is the expected reduction in chemotherapy toxicity compared to patients who receive CGA results without implemented interventions?", "o": ["5% reduction in toxicity", "10% reduction in toxicity", "15% reduction in toxicity", "25% reduction in toxicity"], "c": 1, "e": "The correct answer is B. The text describes 'a single-center randomized controlled trial' that 'examined the effect of a multidisciplinary team (MDT) CGA-guided intervention on treatment-related toxicity in patients 65 years or older with solid tumors (any stage) starting a new line of chemotherapy.' In this study, 'patients in the intervention arm underwent a CGA that was then reviewed by the MDT, which implemented tailored interventions. In the usual care arm, the treating oncologist received the CGA results, but no interventions were implemented.' The results showed 'a 10% reduction in chemotherapy toxicity was observed in the intervention arm compared with the usual care arm' among the 620 patients randomized. Options A, C, and D represent different percentages not supported by this specific study. This study design is particularly important because it demonstrates that simply performing a CGA and providing results to oncologists is insufficient - active implementation of tailored interventions by a multidisciplinary team is necessary to achieve toxicity reduction. The 10% reduction, while smaller than the 20% reduction seen in the community practice study, still represents clinically meaningful improvement in patient outcomes. This research supports the concept that CGA-guided interventions require systematic implementation rather than just assessment and reporting. The multidisciplinary team approach likely addresses the various domains identified in the CGA through coordinated interventions targeting specific geriatric syndromes and risk factors. Clinical Pearl: CGA-guided interventions require active implementation by multidisciplinary teams to achieve toxicity reduction; simply performing CGA and reporting results without tailored interventions is insufficient to improve outcomes.", "reason": "Explanation cut off, doesn't confirm 10% reduction"}, {"idx": 1596, "ti": 26, "t": "Hazzard", "q": "A 74-year-old man with localized prostate cancer (T2a, PSA 8.5, Gleason 7) is considering treatment options. He has a history of ulcerative colitis with multiple flares requiring steroids, hypertension, and takes multiple medications including aspirin, metoprolol, lisinopril, and mesalamine. His cardiologist cleared him for surgery. He wants definitive treatment but is concerned about the invasiveness of surgery. Which treatment option has a relative contraindication in this patient?", "o": ["Radical prostatectomy", "Active surveillance", "Brachytherapy", "External beam radiation therapy"], "c": 3, "e": "External beam radiation therapy (EBRT) has a relative contraindication in this patient due to his ulcerative colitis. Inflammatory bowel disease, particularly ulcerative colitis, is a relative contraindication to EBRT because radiation can exacerbate intestinal inflammation and increase the risk of severe radiation proctitis, bleeding, and bowel perforation. The rectum is in close proximity to the prostate and receives significant radiation dose during EBRT, potentially triggering severe colitis flares in this patient with established IBD. Radical prostatectomy (A) is not contraindicated and may actually be preferred in this patient. His cardiac clearance indicates he can tolerate surgery, and prostatectomy avoids radiation exposure to inflamed bowel tissue. Intermediate-risk disease (T2a, PSA 8.5, Gleason 7) is appropriate for surgical management. Active surveillance (B) is not contraindicated but may not meet this patient's stated desire for definitive treatment. While appropriate for low-risk disease, this patient has intermediate-risk features and specifically requested definitive therapy. Brachytherapy (C) delivers more localized radiation than EBRT and may be better tolerated, though some caution is still warranted with IBD. The radiation field is more confined than with external beam therapy. Clinical Pearl: Inflammatory bowel disease is a relative contraindication to external beam radiation therapy due to increased risk of severe radiation enteritis and colitis. Consider alternative treatments like surgery or brachytherapy in patients with active IBD.", "reason": "Explanation says EBRT is relatively contraindicated, not recommended"}, {"idx": 1612, "ti": 26, "t": "Hazzard", "q": "An 82-year-old woman with a history of hypertension, diabetes, and mild cognitive impairment presents for discussion about colorectal cancer screening. She has had regular colonoscopies every 10 years with her last one at age 75 showing only small hyperplastic polyps. Her family is asking whether she should continue screening. Her functional status is good - she lives independently and manages her activities of daily living. What is the most appropriate recommendation regarding colorectal cancer screening?", "o": ["Continue screening as her life expectancy likely exceeds the time for polyp-to-cancer progression", "Discontinue screening as she has reached the age limit for CRC screening", "Discontinue screening due to her mild cognitive impairment", "Switch to annual fecal immunochemical testing instead of colonoscopy"], "c": 0, "e": "The correct answer is to continue screening as her life expectancy likely exceeds the time for polyp-to-cancer progression. According to the chapter, an individual who reaches age 80 has an average life expectancy of 10 years for women and 8 years for men. At age 85, this is 7 years for women and 6 years for men. The decision should be individualized based on life expectancy, functional status, and comorbid conditions rather than chronological age alone. It may be reasonable to discontinue screening when life expectancy is shorter than the time a polyp progresses to cancer (5-10 years). This patient has good functional status and lives independently, suggesting reasonable life expectancy. Option B is incorrect because there is no arbitrary age cutoff for CRC screening. Option C is wrong because mild cognitive impairment alone doesn't preclude screening if life expectancy is adequate. Option D is not supported by the evidence presented - the choice of screening modality should be based on patient preference and clinical factors, not age alone. Clinical Pearl: CRC screening decisions in elderly patients should incorporate life expectancy estimation using tools like ePrognosis that consider actuarial data, baseline health, cognition, and comorbidities, rather than relying solely on chronological age.", "reason": "Explanation contradicts marked answer on screening continuation"}, {"idx": 1722, "ti": 34, "t": "Hazzard", "q": "A 79-year-old woman with dementia (MMSE 14) is brought by her son who found an advance directive appointing him as healthcare proxy. The document, signed 5 years ago when she had normal cognition, states 'no artificial nutrition if I develop severe dementia.' She now has dysphagia after a stroke and aspirates thin liquids. She appears content and smiles when family visits. The son insists on PEG tube placement saying 'she would want to live.' What should guide the decision?", "o": ["The son's current wishes as healthcare proxy", "The written advance directive's specific instructions", "Current quality of life assessment", "Ethics committee consultation"], "c": 1, "e": "The correct answer is to follow the written advance directive's specific instructions. When a patient lacks capacity, previously expressed wishes documented while capacitated take precedence, even if the surrogate disagrees. The directive specifically addresses artificial nutrition in severe dementia.\n\nOption A (son's wishes) is the trap answer. Many believe the healthcare proxy has unlimited decision-making authority, but proxies must follow known patient preferences, not substitute their own. This is the most common error in advance directive interpretation.\n\nOption C (quality of life) is relevant for decisions without clear directives, but here the patient specifically addressed this scenario. Current contentment doesn't override previously expressed autonomous wishes about future states.\n\nOption D (ethics consultation) may help mediate family conflict but doesn't change the legal obligation to honor the patient's documented wishes. Ethics committees advise but don't override clear advance directives.\n\nClinical Pearl: Healthcare proxies are bound by substituted judgment (what the patient would want) not best interest standard when clear preferences exist. Document conversations about hypothetical future states while patients have capacity. The proxy's role is to represent, not replace, the patient's values.", "reason": "Explanation supports refusing PEG, not inserting it"}, {"idx": 1752, "ti": 2, "t": "Hazzard", "q": "An 84-year-old woman is brought to the ED after falling at home. She lives alone and was found by neighbors after 18 hours on the floor. Labs show: Na 128, K 5.8, Cr 3.2 (baseline 1.1), CK 12,000. She's confused and keeps asking for her deceased husband. Temp 35.8°C, BP 95/60, HR 110. She weighs 52kg. Which medication regimen is most appropriate?", "o": ["Normal saline 1L bolus, then 250mL/hr", "D5W with 3 amps bicarbonate at 100mL/hr", "Normal saline 500mL over 2 hours, then reassess", "Lactated Ringer's at 150mL/hr plus furosemide 40mg IV"], "c": 2, "e": "The correct answer is cautious fluid resuscitation with 500mL over 2 hours. This elderly woman has rhabdomyolysis with acute kidney injury, hyperkalemia, and hyponatremia. Using Cockcroft-Gault: CrCl = (140-84) × 52 × 0.85 / (72 × 3.2) = 10.6 mL/min. She needs careful volume repletion given her low body weight and cardiac risk.\n\nOption A (aggressive fluids) is the TRAP - younger patients with rhabdo get 1-2L/hr, but this frail elderly woman could develop pulmonary edema with rapid administration. This is what EM residents often order reflexively.\n\nOption B (bicarbonate) isn't indicated without severe acidosis and doesn't address volume depletion.\n\nOption D (diuretics) is contraindicated in volume depletion despite the hyperkalemia.\n\nClinical Pearl: Elderly patients with rhabdomyolysis need modified protocols. Target urine output 0.5mL/kg/hr (not 1-2mL/kg/hr). Monitor closely for volume overload. Her delirium (asking for deceased husband) likely represents hypoactive delirium from metabolic disturbance plus possible dementia.", "reason": "Explanation contradicts itself - cuts off mid-sentence"}, {"idx": 1787, "ti": 0, "t": "Hazzard", "q": "A 75-year-old woman is brought to clinic by her daughter who is concerned about memory loss. The patient forgot to pay bills twice and got lost driving to church. MMSE 24/30, missing points on recall and orientation. She manages her own medications and finances but daughter now helps with grocery shopping. MRI shows mild hippocampal atrophy. What finding best distinguishes mild cognitive impairment from early dementia?", "o": ["MMSE score above 23", "Preserved basic ADLs", "Insight into memory problems", "Absence of behavioral symptoms"], "c": 1, "e": "The correct answer is preserved basic ADLs. The key distinction between MCI and dementia is functional independence. This patient has IADL impairment (bills, driving, shopping) but maintains basic ADLs, consistent with MCI progressing toward dementia.\n\nOption A (MMSE >23) is the trap - many clinicians rely too heavily on cognitive scores. MMSE cutoffs don't distinguish MCI from mild dementia; functional assessment does. Education-adjusted norms vary widely, and some early dementia patients score >24.\n\nOption C (insight) varies greatly in both conditions and isn't diagnostic. Some MCI patients lack insight while some mild dementia patients retain it.\n\nOption D (behavioral symptoms) can occur in MCI (mild behavioral impairment) and aren't required for dementia diagnosis.\n\nClinical Pearl: Dementia diagnosis requires both cognitive impairment AND functional decline sufficient to interfere with independence. MCI patients have cognitive deficits and may have mild IADL changes but maintain independence in basic ADLs. Serial functional assessments often detect progression before cognitive scores change significantly.", "reason": "Explanation says patient has IADL impairment consistently"}, {"idx": 1806, "ti": 35, "t": "Hazzard", "q": "A 79-year-old woman is admitted with community-acquired pneumonia. Past medical history includes diabetes, hypertension, and mild dementia. Home medications: metformin 1000 mg BID, lisinopril 20 mg daily, donepezil 10 mg daily. On day 2, she becomes acutely confused, pulling at lines and not recognizing her daughter. T 38.5°C, BP 128/78, HR 102, O2 sat 94% on 2L. CAM screen positive. The night nurse reports she received diphenhydramine 50 mg for sleep. What is the most likely cause of her delirium?", "o": ["Hypoxemia from pneumonia", "Anticholinergic medication effect", "Progression of underlying dementia", "Septic encephalopathy"], "c": 1, "e": "The correct answer is anticholinergic medication effect from diphenhydramine. This first-generation antihistamine has high anticholinergic burden and commonly precipitates delirium in elderly patients, especially those with baseline cognitive impairment.\n\nOption D (septic encephalopathy) is the TRAP - while infection can cause delirium, the temporal relationship with diphenhydramine administration (acute confusion the morning after nighttime dose) points to medication effect. Her stable vitals and modest fever argue against septic encephalopathy.\n\nOption A (hypoxemia) is unlikely with O2 sat 94% - significant hypoxemic delirium typically requires O2 sat <90%.\n\nOption C (dementia progression) doesn't explain acute change - dementia progresses over months to years, not hours.\n\nClinical Pearl: Diphenhydramine is on the Beers criteria as potentially inappropriate in all older adults. A single 50 mg dose can precipitate delirium lasting 24-48 hours. For sleep in hospitalized elderly, use melatonin 3-6 mg or ramelteon 8 mg. Always review MAR for deliriogenic medications before attributing confusion to infection.", "reason": "Explanation describes diphenhydramine; not in question text"}, {"idx": 1853, "ti": 39, "t": "Hazzard", "q": "A 79-year-old woman with mild cognitive impairment and recent hip fracture presents to the ED with severe pain despite oxycodone 5 mg Q6H. She weighs 52 kg, Cr 1.2 (eGFR 42 by Cockcroft-Gault). The orthopedic surgeon recommends increasing opioids. Which analgesic strategy is most appropriate for this patient?", "o": ["Increase oxycodone to 10 mg Q6H", "Add tramadol 50 mg Q6H PRN", "Switch to morphine 15 mg Q4H", "Multimodal with acetaminophen, gabapentin, and oxycodone 2.5 mg Q6H"], "c": 3, "e": "The correct answer uses multimodal analgesia to minimize opioid exposure while improving pain control. Low-weight elderly patients with mild CKD require careful opioid dosing, and non-opioid adjuncts reduce total opioid needs.\n\nOption A (doubling oxycodone) increases delirium and fall risk without addressing multimodal options.\n\nOption B (adding tramadol) is the TRAP - tramadol lowers seizure threshold and interacts with many medications. Combining two opioids in elderly with cognitive impairment significantly increases adverse events. Many physicians see tramadol as 'safer' but it's actually higher risk in elderly.\n\nOption C (morphine) is renally excreted with active metabolites accumulating in CKD, causing prolonged sedation and delirium.\n\nClinical Pearl: In elderly with CKD, oxycodone is preferred over morphine or hydromorphone due to less renal accumulation. Start with 25-50% of standard doses. Always use scheduled acetaminophen (not
