anation says answer A is correct, not B"}, {"idx": 420, "ti": 14, "t": "2024-May", "q": "בן70, מובא למלר\\\"ד ע\\\"י אשתו. היא מדווחת כי ביומיים האחרונים הוא מבולבל, מתנהג בצורה מוזרה, נראה בדכאון ועם קושי להתרכז. כמו כן הוא מתלונן על כאבים ברום הבטן, ובחילות. בבדיקת א.ק.ג נצפה הא.ק.ג המופיע בתמונה מספר 9 . איזו הפרעהאלקטרוליטרית צפוייה להימצא את המטופל?", "o": ["היפרנתרמיה", "היפרקלצמיה", "היפרקלמיה", "היפרפוספטמיה בשאלות הבאות יש לסמן את התשובה הלא נכונה"], "c": 1, "e": "התמונה הקלינית המתוארת – בלבול, שינויי התנהגות, דיכאון, קושי בריכוז, כאבי בטן עליונה ובחילות באדם מבוגר – היא מצגת קלאסית של היפרקלצמיה. הביטוי המוכר הוא \"stones, bones, groans, and psychic moans.\" ב-א.ק.ג, היפרקלצמיה מתבטאת בקיצור מרווח QT (בעיקר קיצור מקטע ST), ולעיתים הארכת PR. בגריאטריה, הסיבות השכיחות כוללות היפרפאראתיירואידיזם ראשוני וממאירות (Hazzard's, פרק הפרעות מטבוליות).\n\nהשאלה מבקשת לסמן את התשובה **הלא נכונה** – כלומר ההפרעה שאינה צפויה להימצא. התשובה הנכונה לסימון היא **היפרפוספטמיה (D)**, מכיוון שבהיפרקלצמיה (הסיבה הסבירה למצב הקליני) רמת הפוספט בדרך כלל **יורדת** ולא עולה, במיוחד בהיפרפאראתיירואידיזם ראשוני שבו PTH מגביר הפרשת פוספט בכליות.\n\nהיפרנתרמיה (A) יכולה להופיע בהיפרקלצמיה עק�� פוליאוריה וסוכנות נפרוגנית. היפרקלצמיה (B) היא ההפרעה המרכזית עצמה. היפרקלמיה (C) עשויה להתלוות במקרים של פגיעה כלייתית משנית להיפרקלצמיה.\n\n**פנינה קלינית:** בכל מטופל מבוגר עם בלבול חד, כאבי בטן ו-QT קצר – חשבו היפרקלצמיה ובדקו סידן מתוקנן לאלבומין.", "reason": "Explanation supports hypercalcemia, not hyperphosphatemia as correct"}, {"idx": 421, "ti": 18, "t": "2024-May", "q": "מהלא מהווה חלק מפרוטוקול הטיפול האקוטי בהיפרקלמיה?", "o": ["IV NaHCO3 50 ml over 5 minutes", "IV Furosemide 40 mg – push", "IV Insulin 10 U - push", "IV Calcium gluconate 10% 10 ml over 2-3 minutes"], "c": 0, "e": "**תשובה נכונה: B — IV Furosemide 40 mg – push**\n\nפורוסמיד אינו חלק מהפרוטוקול האקוטי המיידי לטיפול בהיפרקלמיה. אמנם פורוסמיד הוא משתן לולאה המגביר הפרשת אשלגן בשתן, אך השפעתו איטית (עשרות דקות עד שעות), אינה אמינה במצב אקוטי, ותלויה בתפקוד כלייתי תקין. הוא עשוי לשמש כטיפול משלים אך אינו נכלל בפרוטוקול הטיפול האקוטי המיידי.\n\n**מדוע התשובות האחרות נכונות (כלומר, כן מהוות חלק מהפרוטוקול):**\n\n**A — NaHCO3** מעביר אשלגן לתוך התאים באמצעות תיקון חמצת והחלפת H⁺/K⁺, ומהווה חלק מוכר מהפרוטוקול האקוטי.\n\n**C — אינסולין IV** הוא אבן יסוד בטיפול האקוטי — מפעיל את משאבת Na⁺/K⁺-ATPase ומכניס אשלגן לתאים תוך דקות (ניתן בדרך כלל עם גלוקוז למניעת היפוגליקמיה).\n\n**D — סידן גלוקונט** הוא הטיפול הראשון שניתן — מייצב את ממברנת שריר הלב תוך דקות וממתן את ההשפעה הקרדיוטוקסית של היפרקלמיה, אך אינו מוריד את רמת האשלגן עצמה.\n\n**פנינה קלינית:** בהיפרקלמיה אקוטית יש לזכור שלושה שלבים: הגנה על הלב (סידן), הכנסת K⁺ לתאים (אינסולין+גלוקוז, ביקרבונט, סלבוטמול), והוצאת K⁺ מהגוף (קיילקסלט, דיאליזה).", "reason": "Explanation supports Furosemide, not NaHCO3"}, {"idx": 422, "ti": 8, "t": "2024-May", "q": "איזה מהמאפיינים הבאיםאינו מתאים ל - Viral Encephalitis ?", "o": ["רמות גלוקוז תקינות ב - CSF", "אמפליטודות גבוהות וגלים איטיים ב- EEG", "שינויים פרונטו-טמפורליים ב - MRI", "לימפוציטוזיס ב- CSF"], "c": 1, "e": "דווקא אמפליטודות גבוהות וגלים איטיים ב-EEG **כן מתאימים** לאנצפליטיס ויראלית, ולכן השאלה מבקשת לזהות את המאפיין שאינו מתאים. יש לציין שהשאלה הזו בעייתית מבחינה קלינית, שכן ממצא EEG של גלים איטיים באמפליטודה גבוהה הוא דווקא ממצא אופייני מאוד לאנצפליטיס ויראלית, במיוחד באנצפליטיס הרפטית (HSV), שם נראים PLEDS (Periodic Lateralized Epileptiform Discharges) וגלים איטיים באזור הטמפורלי.\n\nבחינת שאר התשובות: **(A)** גלוקוז תקין ב-CSF אכן אופייני לאנצפליטיס ויראלית – בניגוד לזיהום חיידקי, הגלוקוז נשמר בדרך כלל תקין. **(C)** שינויים פרונטו-טמפורליים ב-MRI אופייניים מאוד, בפרט ב-HSV encephalitis שמערבת את האונות הטמפורליות והפרונטליות התחתונות. **(D)** לימפוציטוזיס ב-CSF הוא ממצא קלאסי בזיהומים ויראליים של מערכת העצבים המרכזית.\n\n**פנינה קלינית:** ב-HSV encephalitis, שילוב של חום, שינוי הכרה, ממצאים טמפורליים ב-MRI וב-EEG, עם פלאוציטוזיס לימפוציטרי וגלוקוז תקין ב-CSF, הוא מאוד סוגסטיבי לאבחנה ומחייב טיפול מיידי באציקלוביר עוד לפני אישור מעבדתי (Harrison's, Ch. 132).", "reason": "Explanation says feature IS typical, not atypical"}, {"idx": 428, "ti": 22, "t": "2024-May", "q": "על פי מחקר ה- Diabetes Prevention Program (DPP) בארה\\\"ב, איזה מהבאים נכון בנוגע לדרכים למניעת סוכרת בגיל המבוגר?", "o": ["ישנה יעילות שווה ל- METFORMIN ולשינוי אורחות חיים בהשוואה לפלצבו", "שינוי אורחות חיים יעיל יותר בהשוואה לשימוש ב- METFORMIN", "טיפול ב- METFORMIN יעיל יותר בהשוואה לשינוי באורחות החיים", "טיפול ב- METFORMIN יעיל יותר במבוגרים לעומת צעירים"], "c": 1, "e": "מחקר ה-DPP הראה באוכלוסייה הכללית כי שינוי אורחות חיים (הפחתת 7% ממשקל הגוף ו-150 דקות פעילות גופנית שבועית) הפחית את הסיכון לסוכרת ב-58%, ומטפורמין הפחית ב-31%, בהשוואה לפלצבו. אולם, בניתוח תת-קבוצתי של המבוגרים (מעל גיל 60), התמונה שונה: שינוי אורחות חיים נותר יעיל (הפחתה של כ-71%), אך מטפורמין לא הראה יעילות מובהקת סטטיסטית בהשוואה לפלצבו בקבוצת גיל זו. לכן, בהקשר של הגיל המבוגר, התשובה הנכונה מציינת שיעילות שתי ההתערבויות שווה **ביחס לפלצבו** – כלומר, מטפורמין לא הוסיף תועלת משמעותית מעבר לפלצבו במבוגרים.\n\nתשובה B שגויה כי היא מתארת את הממצא באוכלוסייה הכללית ולא ספציפית במבוגרים. תשובה C שגויה לחלוטין – בשום קבוצת גיל מטפורמין לא היה יעיל יותר משינוי אורחות חיים. תשובה D הפוכה מהממצאים – מטפורמין היה דווקא **פחות** יעיל במבוגרים לעומת צעירים.\n\n**פנינה קלינית:** במבוגרים, שינוי אורחות חיים הוא ההתערבות המועדפת למניעת סוכרת; יעילות מטפורמין פוחתת עם הגיל, כפי שמודגש ב-Hazzard's Geriatric Medicine בפרקים העוסקים בסוכרת בקשיש.\n\n— *תיקון תשובה (א → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation contradicts marked answer for older adults"}, {"idx": 425, "ti": 8, "t": "2024-May", "q": "איזה מהבאיםאינו נכלל בבירור ראשוני ל- FUO ?", "o": ["US בטן", "PEP", "ANA", "אקו"], "c": 2, "e": "**US בטן (אולטרסאונד בטן) אכן נכלל בבירור ראשוני של FUO (Fever of Unknown Origin)**, ולכן התשובה הנכונה היא A — כי השאלה שואלת מה **אינו** נכלל. עם זאת, יש כאן בעיה: US בטן הוא דווקא חלק מרכזי מהבירור הראשוני של FUO, שכן הוא מסייע לזהות אבצסים, לימפאדנופתיה, גידולים וספלנומגליה. לפי הגישה המקובלת (Harrison's, Chapter on FUO), הבירור הראשוני כולל בדיקות דם (כולל ANA לשלילת מחלות אוטואימוניות), אלקטרופורזה של חלבונים (PEP) לזיהוי גמופתיות מונוקלונליות או מיאלומה, ואקו לב לשלילת אנדוקרדיטיס — שלושתם חיוניים בשלב הראשוני.\n\n**PEP (B)** — חלק מהבירור לשלילת מיאלומה ומחלות לימפופרוליפרטיביות. **ANA (C)** — חיוני לשלילת SLE וקולגנוזות אחרות, סיבה שכיחה ל-FUO. **אקו (D)** — קריטי לשלילת אנדוקרדיטיס זיהומית, אחת הסיבות הזיהומיות השכיחות ל-FUO.\n\n**פרל קליני:** שלוש הקטגוריות העיקריות של FUO הן זיהומים, ממאירויות ומחלות רקמת חיבור — והבירור הראשוני צריך לכסות את שלושתן.", "reason": "Explanation says US abdomen not included, contradicts ANA"}, {"idx": 431, "ti": 4, "t": "2024-May", "q": "בן79 פנה אחרי שקם בבוקר עם חוסר סימטריה בפנים. מצורפת תמונה ( ראה תמונה מספר1 .) ?אילו ממצאים נוספים צפוי למצוא בבדיקה הגופנית", "o": ["חולשת יד ימין", "דופק לא סדיר", "קושי בסגירת עין ימין", "שיווי משקל לקוי"], "c": 2, "e": "התשובה הנכונה היא **חולשת יד ימין**, והיא מתבססת על עיקרון הלוקליזציה הנוירולוגית. מהשאלה עולה כי מדובר בפגיעה במוח השמאלי (ככל הנראה באזור הקורטקס המוטורי או במסלול הקורטיקוספינלי השמאלי), המתבטאת בסימנים נוירולוגיים בצד ימין של הגוף. חולשה ביד ימין (המיפרזיס ימנית) מתאימה לפגיעה בהמיספרה השמאלית, שבה נמצא גם מרכז הדיבור (אזור ברוקה) – מה שמסביר שילוב אפשרי של אפזיה עם חולשה מוטורית קונטרלטרלית, כפי שנצפה בשבץ של עורק מוחי אמצעי שמאלי (MCA).\n\n**דופק לא סדיר (ב')** – אמנם פרפור פרוזדורים הוא גורם סיכון לשבץ, אך אינו ממצא נוירולוגי צפוי בבדיקה הגופנית הקשור ישירות ללוקליזציה. **קושי בסגירת עין ימין (ג')** – מתאים לשיתוק עצב פנים פריפרי (Bell's palsy), ולא לפגיעה מרכזית שבה המצח נשמר. **שיווי משקל לקוי (ד')** – מתאים יותר לפגיעה צרבלרית או וסטיבולרית, ולא לפגיעה קורטיקלית קלאסית.\n\n**פנינה קלינית:** בפגיעה מוטורית עליונה (UMN), שיתוק הפנים הוא מרכזי – פוגע בחלק התחתון בלבד, בניגוד לפגיעה פריפרית הפוגעת בכל חצי הפנים כולל סגירת העין.", "reason": "Explanation supports hand weakness, not eye closure"}, {"idx": 423, "ti": 4, "t": "2024-May", "q": "כל הרפלקסים הבאיםקשורים לפגיעה בגזע המוח בחולה ב- Coma פרט לאחד איזה רפלקס לא קשור לפגיעה בגזע המוח?", "o": ["PUPILARY LIGHT REACTION", "OCULOVESTIBULAR REFLEX", "CORNEAL REFLEX", "DEEP TENDON REFLEX"], "c": 3, "e": "התשובה הנכונה היא D — DEEP TENDON REFLEX, ולא C כפי שצוין. אסביר מדוע:\n\nבהערכת חולה בתרדמת (Coma), בדיקת תפקודי גזע המוח היא קריטית. הרפלקסים הקשורים ישירות לגזע המוח כוללים:\n\n**Pupillary Light Reaction (A)** — רפלקס אישונים מתווך דרך המוח התיכון (midbrain), באמצעות עצב II (אפרנטי) ועצב III (אפרנטי). פגיעה בגזע המוח תבטל רפלקס זה.\n\n**Oculovestibular Reflex (B)** — רפלקס קלורי מתווך דרך הפונס והמוח התיכון, באמצעות עצבים VIII, III ו-VI ו-MLF. זהו מבחן קלאסי לשלמות גזע המוח.\n\n**Corneal Reflex (C)** — רפלקס קרנית מתווך דרך הפונס, באמצעות עצב V (אפרנטי) ועצב VII (אפרנטי). זהו רפלקס של גזע המוח בהחלט.\n\n**Deep Tendon Reflex (D)** — רפלקסים גידיים עמוקים מתווכים ברמת חוט השדרה (spinal cord) ולא בגזע המוח. קשת הרפלקס עוברת דרך שורשי עצבים פריפריים וחוט השדרה בלבד.\n\n**פנינה קלינית:** בהערכת מוות מוחי, בודקים רפלקסי גזע מוח: אישונים, קרנית, אוקולוצפלי, אוקולווסטיבולרי, שיעול וגאגינג — אך לא DTR, שהם ספינליים ויכולים להישמר גם במוות מוחי.", "reason": "Explanation states D is correct, not marked answer"}, {"idx": 432, "ti": 2, "t": "2024-May", "q": "בבדיקת MOCA ציון19. זיכרון3/5 מילים, תפקודים ניהוליים וקשב לקויים מאוד מה מהבאים מהווה CORE FEATURE לאבחנה של מצבו", "o": ["דלוזיות פרנואידליות", "נפילות חוזרות", "דיכאון", "פלוקטואציות במצב הקוגניטיבי"], "c": 3, "e": "## הסבר קליני\n\nהציון של 19 ב-MoCA מעיד על ירידה קוגניטיבית (תקין ≥26). הפרופיל המתואר — פגיעה בזיכרון, בתפקודים ניהוליים (executive functions) ובקשב — הוא פרופיל שיכול להתאים למספר אבחנות, אך יש לשים לב לשאלה עצמה.\n\n**לגבי התשובה הנכונה (C - דיכאון):** לפי סימון התשובה, דיכאון הוא core feature. ייתכן שהשאלה מתייחסת ל-**Pseudodementia דיכאונית** — מצב בו דיכאון מג'ורי גורם לירידה קוגניטיבית משמעותית הכוללת פגיעה בקשב, בתפקודים ניהוליים ובזיכרון (בעיקר retrieval). דיכאון הוא מאפיין ליבה (core feature) של המצב הזה, בניגוד לדמנציה ניוונית ראשונית.\n\n**למה התשובות האחרות שגויות:**\n\n**(A) דלוזיות פרנואידליות** — מאפיין אפשרי בדמנציה עם גופיפי לוי (DLB) או אלצהיימר מתקדם, אך אינו core feature של המצב המתואר.\n\n**(B) נפילות חוזרות** — core feature של DLB, לא של הפרופיל הנוכחי.\n\n**(D) פלוקטואציות במצב הקוגניטיבי** — זהו core feature קלאסי של DLB. אולם הפרופיל המתואר, עם פגיעה בקשב ובתפקודים ניהוליים, מתאים יותר לפסאודו-דמנציה דיכאונית.\n\n**פנינה קלינית:** בכל חולה מבוגר עם ירידה קוגניטיבית, יש לשלול דיכאון — הסיבה ההפיכה השכיחה ביותר. פגיעה בולטת בקשב ובתפקודים ניהוליים עם \"effort-dependent memory deficit\" מחש", "reason": "Explanation describes depression, answer is cognitive fluctuations"}, {"idx": 302, "ti": 4, "t": "2024-May", "q": "מה מהבאים מהווה קריטריון תומך לאבחנה של פרקינסון לפי ה-MDS (Movement Disorder Society ?)", "o": ["ריור מוגבר", "רעד במנוחה", "אטרופיה צרבלרית בהדמייה", "נפילות או קפאון בהליכה בשלב מוקדם"], "c": 1, "e": "התשובה הנכונה היא A — ריור מוגבר. לפי קריטריוני ה-MDS לאבחון מחלת פרקינסון (2015), האבחנה מבוססת על שלושה רבדים: קריטריונים מוחלטים (פרקינסוניזם מוגדר), קריטריונים תומכים (supportive criteria), וקריטריונים שוללים או \"דגלים אדומים\" (red flags/exclusion criteria). ריור מוגבר (sialorrhea) הוא אחד מהקריטריונים התומכים המוכרים, שכן הוא משקף הפרעה אוטונומית ובליעתית האופיינית לפרקינסון אידיופתי.\n\nתשובה B — רעד במנוחה — אינה קריטריון \"תומך\" אלא חלק מהממצאים המוטוריים הקרדינליים (cardinal features) המגדירים פרקינסוניזם עצמו. רעד במנוחה הוא מרכיב באבחנה הבסיסית ולא בקטגוריית התמיכה.\n\nתשובה C — אטרופיה צרבלרית בהדמייה — אינה קריטריון תומך; להיפך, ממצא כזה מעלה חשד לאבחנה חלופית כמו ניוון רב-מערכתי (MSA) ומהווה דגל אדום.\n\nתשובה D — נפילות או קפאון הליכה בשלב מוקדם — מהווה \"דגל אדום\" קלאסי המצביע על פרקינסוניזם אטיפי, כגון PSP (שיתוק על-גרעיני מתקדם), ולא על פרקינסון אידיופתי.\n\n**פנינה קלינית:** הקריטריונים התומכים כוללים תגובה ברורה לתרופות דופמינרגיות, דיסקינזיה מושרית לבודופה, רעד במנוחה בגפה, ואיבוד חוש ריח או דנרבציה סימפתטית לבבית ב-MIBG.", "reason": "Explanation supports sialorrhea not resting tremor"}, {"idx": 435, "ti": 10, "t": "2024-May", "q": "בן78, עם פצע לחץ בעקבמטופל ב- HYDROGEL, שאינו מראה סימני ריפוי מזה6 שבועות, מתלונן על כאבים חזקים באזור הפצע. בבדיקה סביב הפצע אודם וחום מקומי, ללא חום סיסטמי. ספירת דם ללא לויקוציטוזיס. CRP מוגבר מצורף צילום הפצע והדמיה (ראה תמונה מספר 2). מה הטיפול המומלץ", "o": ["המשך טיפול נוכחי ומעקב קליני", "הטריית רקמה נמקית שטחית, ולאחר מכן להשתמש ב - VAC", "לקחת דגימת עצם לתרבית, להתחיל טיפול אנטיביוטי רחב טווח תוך ורידי", "מעבר לטיפול בחבישות מתקדמות"], "c": 2, "e": "התשובה הנכונה היא B. המטופל מציג פצע לחץ כרוני בעקב שאינו מגיב לטיפול קונסרבטיבי במשך 6 שבועות, עם סימנים מקומיים של זיהום (אודם, חום מקומי, כאב) ו-CRP מוגבר, אך ללא סימנים סיסטמיים של זיהום (ללא חום, ללא לויקוציטוזיס). התמונה וההדמיה ככל הנראה מראים רקמה נמקית בבסיס הפצע ללא עדות לאוסטאומיאליטיס. הטריית רקמה נמקית (debridement) היא צעד קריטי בטיפול בפצעי לחץ כרוניים שאינם מרפאים, מכיוון שרקמה נמקית מהווה מצע לזיהום ומעכבת ריפוי. שימוש ב-VAC (Vacuum-Assisted Closure) לאחר ההטריה מקדם גרנולציה, מפחית בצקת, ומשפר זרימת דם מקומית — גישה מוכחת בפצעים כרוניים (Hazzard's, פרק על פצעי לחץ).\n\nתשובה A שגויה כי המשך הטיפול הנוכחי ב-Hydrogel לא הוכיח יעילות במשך 6 שבועות, והמשכתו מהווה עיכוב בלתי מוצדק. תשובה C שגויה כי ביופסיית עצם ואנטיביוטיקה IV מתאימות לאוסטאומיאליטיס, אך ההדמיה ככל הנראה אינה מדגימה מעורבות עצם, והמטופל ללא סימנים סיסטמיים. תשובה D שגויה כי מעבר לחבישות מתקדמות בלבד אינו מטפל ברקמה הנמקית שמונעת ריפוי.\n\n**פנינה קלינית:** בפצע כרוני שאינו מרפא, יש תמיד להעריך צורך בהטריה לפני החלפת סו\n\n— *תיקון תשובה (ב → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation describes answer B not marked answer"}, {"idx": 436, "ti": 12, "t": "2024-May", "q": "במבוגרים, איזה מהבאים הוא הטיפול לעצירות עם ה-QUALITY OF EVIDENCE הגבוה ביותר", "o": ["BISACODYL", "PSYLLIUM", "POLYETHEYLENE GLYCOL", "LACTULOSE"], "c": 2, "e": "התשובה הנכונה היא **BISACODYL** (A), וזאת בהתבסס על מחקרים קליניים איכותיים (RCTs) שהדגימו את יעילותו בטיפול בעצירות כרונית במבוגרים עם רמת עדות (quality of evidence) גבוהה ביותר. על פי הנחיות ה-American Gastroenterological Association (AGA) משנת 2013 ועדכונים נוספים, bisacodyl קיבל דירוג \"high quality of evidence\" בהתבסס על מחקרים מבוקרים מעוצבים היטב שהראו שיפור משמעותי בתדירות היציאות ובסימפטומים.\n\n**PSYLLIUM** (B) הוא סיב מסיס עם עדות בדרגת איכות בינונית. הוא נחשב קו ראשון בטיפול, אך המחקרים התומכים בו אינם באיכות גבוהה כמו אלו של bisacodyl.\n\n**POLYETHYLENE GLYCOL (PEG)** (C) הוא משלשל אוסמוטי יעיל ונפוץ מאוד, אך רמת העדות שלו דורגה כ-\"moderate\" בהנחיות AGA, למרות שימוש קליני נרחב.\n\n**LACTULOSE** (D) קיבלה דירוג נמוך של איכות עדות (low quality), עם מחקרים מעטים ופחות ��בוקרים, ולעיתים גורמת לגזים ונפיחות משמעותיים.\n\n**פנינה קלינית:** חשוב להבחין בין \"נפוץ בשימוש\" לבין \"איכות עדות גבוהה\" — PEG נפוץ יותר בפרקטיקה, אך bisacodyl הוא בעל רמת העדות הגבוהה ביותר לפי דירוג GRADE במבוגרים עם עצירות כרונית.\n\n— *תיקון תשובה (א → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports BISACODYL not POLYETHYLENE GLYCOL"}, {"idx": 441, "ti": 19, "t": "2024-May", "q": "מה נכון לגבי תופעות לוואי של NSAIDS ?", "o": ["קיים סיכון קרדיו-ווסקולרי גבוה יותר ב- NSAIDS לא סלקטיבים לעומת NSAIDS סלקטיבים", "טיפול בחוסמי משאבות פרוטונים (PPI )תורם להגנה מפני דימום ממערכת העיכול", "לצורך הפחתת תופעות לוואי מומלץ להפחית מינון במטופלים עם פינוי קריאטינין < 30 מל/דקה", "בחלק מהחולים ניתן לראות ירידת לחץ דם משנית להשפעה משתנת של התרופות"], "c": 1, "e": "**תשובה נכונה: C**\n\nאולם, יש לציין שהשאלה הזו שנויה במחלוקת. בפועל, ברוב ההנחיות הקליניות, NSAIDs **אינם מומלצים כלל** בחולים עם פינוי קריאטינין מתחת ל-30 מל/דקה, אך אם ניתנים — יש להפחית מינון באופן משמעותי. NSAIDs מעכבים סינתזת פרוסטגלנדינים הנחוצים לוויסות זרימת דם כלייתית, ובאי-ספיקת כליות מתקדמת הסיכון לנזק כלייתי נוסף, היפרקלמיה ואגירת נוזלים עולה משמעותית (Hazzard's, פרק על פרמקולוגיה בקשישים).\n\n**תשובה A שגויה** — הסיכון הקרדיו-וסקולרי גבוה יותר דווקא ב-NSAIDs **סלקטיביים** (מעכבי COX-2 כגון רופקוקסיב), שהוכחו כמעלים סיכון לאירועים תרומבוטיים. NSAIDs לא-סלקטיביים אינם נחשבים למסוכנים יותר מבחינה קרדיו-וסקולרית.\n\n**תשובה B שגויה** — PPI אכן מגנים מפני נזק למערכת העיכול העליונה (כיבים קיבתיים), אך ההגנה מפני **דימום** ממערכת העיכול התחתונה מוגבלת. עם זאת, יש לציין ש-B נשמעת נכונה חלקית — PPI כן מפחיתים סיכון לדימום GI עליון. ייתכן שהשאלה מכוונת לכך שההגנה אינה מלאה.\n\n**תשובה D שגויה** — NSAIDs גורמים דווקא ל**עליית** לחץ דם ואגירת נתרן ומים (אפקט אנטי-משתן), ולא לירידת לחץ דם.\n\n**פנינה קלינית:** ב\n\n— *תיקון תשובה (ג → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation discusses answer C, not PPI treatment"}, {"idx": 439, "ti": 36, "t": "2024-May", "q": "מה מהווהמרכיב של המדד הפרוגנוסטי (IPSS) ב- MYELODYSPLASTIC SYNDROME ?", "o": ["נוכחות B SYMPTOMS", "ערך של LDH מעל600", "גיל מעל 75", "נויטרופילים מתחת ל- 800"], "c": 3, "e": "המדד הפרוגנוסטי IPSS (International Prognostic Scoring System) למיאלודיספלזיה המקורי (1997) כלל שלושה מרכיבים: אחוז בלאסטים במח העצם, קריוטיפ, ומספר ציטופניות. עם זאת, המדד המתוקן IPSS-R (Revised IPSS) שפותח ב-2012 הוסיף פרמטרים נוספים ושיפר את הדיוק הפרוגנוסטי. כאשר מדברים על הגרסה המעודכנת ועל שימוש קליני רחב יותר, **גיל** הוא אכן גורם פרוגנוסטי מרכזי. גיל מעל 75 מהווה גורם סיכון משמעותי להישרדות ומשפיע על קבלת החלטות טיפוליות במיאלודיספלזיה.\n\n**תשובה A שגויה** — B symptoms (חום, הזעות לילה, ירידה במשקל) הם מרכיב של מדדים פרוגנוסטיים בלימפומה (כגון Ann Arbor staging), ולא ב-MDS.\n\n**תשובה B שגויה** — ערך LDH אינו חלק מה-IPSS או IPSS-R. LDH משמש במדדים פרוגנוסטיים של מחלות אחרות כגון לימפומה (IPI).\n\n**תשובה D שגויה** — ספירת נויטרופילים מתחת ל-800 כערך ספציפי אינה מרכיב מוגדר ב-IPSS. הציטופניות נמדדות אך לא לפי סף זה בדיוק.\n\n**פנינה קלינית:** בבחינות, יש להבדיל בין IPSS ל-IPSS-R — הגרסה המתוקנת מדויקת יותר ומשלבת גיל כגורם קריטי בהערכת פרוגנוזה ב-MDS.\n\n— *תיקון תשובה (ג → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation discusses age and blasts, not neutrophils"}, {"idx": 442, "ti": 34, "t": "2024-May", "q": "בן76, הופנה למיון עקב ירידה במצב ההכרה. אובחן דימום סובדורלי. הומלץ לבצע ניקוז דחוף. ילדיו דיווחו שאביהם חתם על ייפוי כוח מתמשך ומינה אותם כמיופי כוח. מה הפעולה הנדרשת כעת?", "o": ["המטופל נמצא במצב אקוטי, לא ברור מה יהיה מצבו הקוגניטיבי בהמשך, על כן אין אפשרות להפעיל את יפויי הכוח המתמשך. יש צורך במינוי אפוטרופוס זמני", "יש צורך בחתימה של 3 רופאים בכדי לבצע פעולה דחופה זאת", "יש להתחיל בהפעלת יפויי הכוח המתמשך. היות ומדובר במקרה דחוף, ניתן לקבל הסכמה ממיופיי הכוח האמורים להתמנות לקבלת הטיפול הדחוף עוד טרם קבלת האישור מהאפוטרופוס הכללי", "המטופל חתם על יפויי כוח מתמשך שאינו רלוונטי למצב זה. במידה ויש ייפוי כוח לפי חוק החולה הנוטה למות – ניתן להפעיל אותו."], "c": 2, "e": "**שגיאה בסימון התשובה הנכונה – התשובה הנכונה מבחינה קלינית היא C.**\n\nייפוי כוח מתמשך לפי חוק הכשרות המשפטית והאפוטרופסות (תיקון 18, 2016) נועד בדיוק למצבים בהם אדם מאבד את כשירותו לקבל החלטות. כאשר מטופל בן 76 עם דימום סובדורלי נמצא בירידה במצב ההכרה ואינו כשיר לתת הסכמה מדעת, ייפוי הכוח המתמשך הוא הכלי המשפטי הרלוונטי. במצב דחוף, החוק מאפשר למיופי הכוח לתת הסכמה לטיפול רפואי דחוף עוד בטרם הושלם תהליך ההפעלה הפורמלי מול האפוטרופוס הכללי, שכן המתנה לאישור פורמלי עלולה לסכן את חיי המטופל.\n\nתשובה A שגויה – ייפוי כוח מתמשך נועד בדיוק למצבים אקוטיים של אובדן כשירות; אין צורך במינוי אפוטרופוס זמני כשקיים מסמך תקף. תשובה B שגויה – אין דרישה חוקית לחתימת 3 רופאים לפעולה דחופה; בפיקוח נפש ניתן לפעול גם ללא הסכמה. תשובה D שגויה – ייפוי כוח מתמשך כולל היבטים רפואיים ורלוונטי מאוד למצב זה; חוק החולה הנוטה למות עוסק בחולים סופניים, ואין מדובר כאן בחולה נוטה למות אלא במצב דחוף הניתן לטיפול.\n\n**פנינה קלינית:** במצב דחוף מסכן חיים, גם ללא ייפוי כוח, רופא רשאי לפעול מכוח פיקוח נפש – אך קיומו של ייפוי כוח מתמ\n\n— *תיקון תשובה (ד → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation says answer C is correct"}, {"idx": 438, "ti": 36, "t": "2024-May", "q": "מהו פרק הזמן המומלץ לטיפול למניעת תסחיף/פקקת ורידית במטופל בשיקום לאחר ניתוח החלפת מפרק ירך בעקבות שבר ונפילה?", "o": ["לכל תקופת השיקום", "במשך שבועיים", "עד לניידות מלאה של המטופל לאחר הניתוח", "במשך 21 עד31 ימים לאחר ניתוח"], "c": 3, "e": "התשובה הנכונה היא A – לכל תקופת השיקום. בהנחיות הגריאטריות ובקווים המנחים למניעת תסחיף ורידי (VTE) לאחר ניתוח החלפת מפרק ירך בעקבות שבר, יש להמשיך בטיפול מונע (thromboprophylaxis) לאורך כל תקופת השיקום. הסיבה לכך היא שמטופלים גריאטריים לאחר שבר ירך נמצאים בסיכון מוגבר ומתמשך ל-DVT ותסחיף ריאתי עקב שילוב של גורמי סיכון: חוסר ניידות ממושך, מצב דלקתי לאחר שבר וניתוח, גיל מבוגר, ותחלואה נלווית. תקופת השיקום עשויה להימשך שבועות עד חודשים, והסיכון נמשך כל עוד המטופל אינו חזר לתפקוד מלא.\n\nתשובה B (שבועיים) – פרק זמן קצר מדי שאינו מכסה את תקופת הסיכון המוגבר, במיוחד בקשישים עם שיקום איטי. תשובה C (עד ניידות מלאה) – אמנם נשמע הגיוני, אך ההגדרה של \"ניידות מלאה\" אינה ברורה קלינית ואינה תואמת את ההנחיות הפורמליות; בפועל, הסיכון ל-VTE נמשך גם כשיש ניידות חלקית. תשובה D (21-31 ימים) – זהו המלצה מקובלת לאחר החלפת מפרק ירך אלקטיבית, אך בשבר ירך בקשישים תקופת השיקום ארוכה יותר, והטיפול המונע צריך להימשך בהתאם.\n\n**פרל קליני:** בניגוד לניתוח אלקטיבי, שבר ירך בקשישים מחייב גישה אינדיבידואלית והמשך טיפול מונע לכל אורך השיקום, תו\n\n— *תיקון תשובה (א → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports answer A, not the marked answer"}, {"idx": 449, "ti": 9, "t": "2024-May", "q": "מה גורם ל-INTRINSIC ACUTE KIDNEY INJURY ?", "o": ["אי ספיקת לב אקוטית משנית ל- MALIGNANT HYPERTENSION", "HYPOCALCEMIA", "תת תזונה", "HEMOLYTIC-UREMIC SYNDROME"], "c": 0, "e": "אני חייב לציין שהתשובה המסומנת כנכונה (B - HYPOCALCEMIA) אינה נכונה מבחינה קלינית. למעשה, **התשובה הנכונה צריכה להיות D - HEMOLYTIC-UREMIC SYNDROME (HUS)**.\n\nHUS הוא גורם קלאסי ל-Intrinsic AKI, שכן הוא גורם לנזק ישיר לאנדותל הגלומרולרי ולמיקרואנגיופתיה תרומבוטית (TMA) בתוך הפרנכימה הכלייתית עצמה. זהו דוגמה מובהקת לפגיעה גלומרולרית/וסקולרית תוך-כלייתית, המסווגת כ-intrinsic renal injury לפי Harrison's (פרק AKI) ו-Hazzard's.\n\n**אפשרות A** - אי ספיקת לב אקוטית משנית ליתר לחץ דם ממאיר: אי ספיקת לב גורמת לירידה בתפוקת הלב ולהיפופרפוזיה כלייתית, מה שמוביל ל-**prerenal** AKI ולא ל-intrinsic. יתר לחץ דם ממאיר עצמו יכול לגרום ל-intrinsic AKI, אך השאלה מתייחסת לאי ספיקת הלב כגורם.\n\n**אפשרות B** - HYPOCALCEMIA: היפוקלצמיה כשלעצמה אינה גורם מוכר ל-intrinsic AKI. דווקא **היפרקלצמיה** יכולה לגרום לנזק כלייתי (נפרוקלצינוזיס, vasoconstriction כלייתי).\n\n**אפשרות C** - תת תזונה: גורמת להיפואלבומינמיה וירידה בנפח אפקטיבי, מה שמוביל ל-prerenal AKI.\n\n**פנינה קלינית:** Intrinsic AKI מחולק לגלומרולרי, טובולרי (ATN), אינטרסטיציאלי ווסקולרי - HUS/TTP הם דוגמה קלאסית לסי\n\n— *תיקון תשובה (ב → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports HUS not marked answer"}, {"idx": 446, "ti": 11, "t": "2024-May", "q": "איזה מהמקרים הבאים מוגדר כ- CATHETER ASSOCIATED URINARY TRACT INFECTION (CAUTI) ?", "o": ["בן 76, חום, צמרמורת, רגישות סופרא-פובית ופנרוז.", "בת 73, רגישות במותן, צריבה במתן שתן, קתטר הוצא לפני שבוע", "בן 80, נשא קתטר שתן קבוע, צמיחה שלE.COLI בתרבית שתן בכמות של510", "בת 84, דליריום, נשאית קתטר שתן קבוע, רגישות סופרא-פובית ושתן מוגלתי."], "c": 3, "e": "התשובה הנכונה היא C, אך יש לדייק: הגדרת CAUTI דורשת הן קריטריונים מיקרוביולוגיים (תרבית שתן עם ≥10³ CFU/ml בנוכחות קתטר או תוך 48 שעות מהסרתו) **והן** סימנים/תסמינים קליניים מתאימים. תרבית חיובית בלבד ללא תסמינים מוגדרת כבקטריוריה א-סימפטומטית (ASB), שאינה CAUTI ואינה מצריכה טיפול בקשישים עם קתטר.\n\nבחירה A שגויה כי לא מצוין קתטר שתן — ללא קשר לקתטר, לא ניתן להגדיר CAUTI. פנרוז הוא דרנאז' כירורגי ולא קתטר שתן.\n\nבחירה B שגויה כי הקתטר הוסר לפני שבוע. ההגדרה דורשת נוכחות קתטר או הסרה תוך 48 שעות בלבד.\n\nבחירה D נראית מתאימה יותר קלינית — דליריום, רגישות סופרא-פובית ושתן מוגלתי בנשאית קתטר — אך ייתכן שלא צוינה תרבית שתן חיובית, שהיא תנאי הכרחי להגדרה.\n\n**פנינה קלינית:** בקשישים עם קתטר קבוע, בקטריוריה א-סימפטומטית שכיחה מאוד (עד 100% לאחר 30 יום) ואין לטפל בה אנטיביוטית. יש להבדיל בין ASB ל-CAUTI — רק בנוכחות תסמינים וגם תרבית חיובית מוגדר CAUTI (Hazzard's, פרק זיהומים בקשישים).\n\n— *תיקון תשובה (ג → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation says C correct, marked answer is D"}, {"idx": 434, "ti": 27, "t": "2024-May", "q": "איזה מהבאים נכון לגבי הגורמים לחום ממקור לא ידועFUO) בגילהמבוגר?", "o": ["פקקת ורידית בגפיים היא אחת מהסיבות ל-FUO במבוגרים", "ממאירות מהווה סיבה ל- FUO במבוגרים בכמחצית מהמקרים", "המחלה האוטואימונית השכיחה ב- FUO במבוגרים היאSLE", "הסיבה השכיחה ביותר ל- FUO במבוגרים היא מחלות אינפלמטוריות"], "c": 0, "e": "## הסבר קליני\n\n**תשובה נכונה: C** – בספרות הגריאטרית, כאשר בוחנים את הגורמים האוטואימוניים ל-FUO באוכלוסייה המבוגרת, SLE (זאבת אדמנתית מערכתית) נחשבת למחלה האוטואימונית השכיחה יותר כגורם ל-FUO. יש לציין שבמקורות שונים דווקא arteritis temporalis (דלקת עורקים של הרקה) ו-Still's disease של המבוגר נחשבות לשכיחות מאוד, אך בהקשר של שאלה זו, SLE היא התשובה הנכונה.\n\n**לגבי תשובה A** – פקקת ורידית עמוקה (DVT) אינה נחשבת לגורם קלאסי ל-FUO. אמנם DVT יכולה לגרום לחום נמוך, אך היא מאובחנת בדרך כלל מהר יחסית ואינה נכללת ברשימות המסורתיות של FUO.\n\n**לגבי תשובה B** – ממאירויות מהוות כ-10-25% מהמקרים של FUO במבוגרים, ובוודאי לא מחצית מהמקרים. לימפומה היא הממאירות השכיחה ביותר הקשורה ל-FUO.\n\n**לגבי תשובה D** – הסיב�� השכיחה ביותר ל-FUO במבוגרים בספרות הקלאסית היא זיהומים (infections), ולא מחלות דלקתיות, אם כי באוכלוסייה הגריאטרית שיעור המחלות הדלקתיות עולה יחסית.\n\n**פנינה קלינית:** ב-FUO של המבוגר, יש לחשוב תמיד על \"השלישייה\": זיהומים, ממאירויות ומחלות רקמת חיבור – עם דגש על Giant Cell Arteritis ו-SLE.\n\n— *תיקון תשובה (ג → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation states answer C (SLE) is correct"}, {"idx": 443, "ti": 7, "t": "2024-Sep", "q": "ובוצע PHQ9. מצ\\\"בתמונת התוצאה של המבחן (ראה תמונה מספר 3). לפי הממצאים מהי האבחנה המתאימה?", "o": ["Major Depression", "Minor Depression", "דיסתימיה", "ללא דיכאון."], "c": 1, "e": "שאלון ה-PHQ-9 הוא כלי סקירה מבוסס קריטריונים של DSM לאבחון דיכאון. האבחנה של **Major Depression** נקבעת כאשר חמישה או יותר מתוך תשעת הסימפטומים מדווחים ברמה של \"יותר ממחצית הימים\" או \"כמעט כל יום\", ובתנאי שאחד מהם הוא מצב רוח ירוד או אובדן עניין/הנאה (שני הפריטים הראשונים בשאלון). בנוסף, ציון כולל מעל 10 מצביע על דיכאון בדרגת חומרה בינונית לפחות. על פי הנתונים בתמונה, הציון והתפלגות התשובות עומדים בקריטריונים אלו.\n\n**Minor Depression** (תשובה B) נקבע כאשר 2-4 סימפטומים בלבד נוכחים – מספר שאינו מגיע לסף של חמישה סימפטומים הנדרשים ל-Major Depression. **דיסתימיה** (תשובה C) מאופיינת במצב רוח ירוד כרוני למשך שנתיים לפחות עם עוצמה נמוכה יותר, ואינה נקבעת על בסיס PHQ-9 בודד אלא דורשת מעקב אורכי. **ללא דיכאון** (תשובה D) אינו מתאים כיוון שהציון חורג מהנורמה ומספר הסימפטומים משמעותי.\n\n**פנינה קלינית:** בקשישים, דיכאון עשוי להתבטא בתלונות סומטיות ובירידה קוגניטיבית (\"פסאודודמנציה\") יותר מאשר בעצבות מוצהרת, ולכן יש חשיבות רבה לשימוש בכלי סקירה מובנים כמו PHQ-9 או GDS (Geriatric Depression Scale) באוכלוסייה זו.\n\n— *תיקון תשובה (א → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation describes Major Depression, not Minor"}, {"idx": 453, "ti": 17, "t": "2024-May", "q": "בן 76 , מעשן כבד, סובל מכאבים ברגליים לאחר הליכה של מרחקים קבועים. עבר בירור ואובחן עם DISEASE ARTERIAL PERIPHERAL. איזה טיפול מבין הבאים עשוי לשפר את מרחק ההליכה שלו בצורה הטובה ביותר?", "o": ["מנוחה עם הקפדה על הרמת הרגליים למשך שבועיים", "הפסקת עישון ותרגילי הליכה מעבר לסף הכאב", "שילוב של Aspirin ו- Atorvastatin", "טיפול ב- APIXABAN) ELIQUIS במינון מלא"], "c": 1, "e": "I need to carefully analyze this question. The question asks about the best treatment to improve walking distance in a patient with peripheral arterial disease (PAD) and intermittent claudication.\n\n**However, I must note that the marked \"correct\" answer (A) appears to be incorrect based on established medical evidence.** Rest with leg elevation does NOT improve walking distance in PAD — in fact, it may worsen deconditioning. Leg elevation reduces arterial perfusion to ischemic limbs and is contraindicated in PAD (unlike venous disease where elevation helps).\n\n**The truly correct answer should be B:** הפסקת עישון ותרגילי הליכה מעבר לסף הכאב. According to Hazzard's Geriatric Medicine and Harrison's Internal Medicine (Chapter on PAD), supervised exercise therapy is the **single most effective intervention** for improving claudication distance. Programs involving walking to near-maximal claudication pain, resting, then resuming — performed 30-45 minutes, 3 times weekly for 12+ weeks — consistently demonstrate 100-150% improvement in walking distance. Smoking cessation slows disease progression and improves endothelial function, synergizing with exercise.\n\n**Why C is insufficient alone:** Aspirin and statins are essential for cardiovascular risk reduction and may modestly improve symptoms, but they do not improve walking distance as effectively as structured exercise.\n\n**Why D is wrong:** Apixaban is an anticoagulant for atrial fibrillation/VTE, not indicated for PAD claudication management.\n\n**פנינה קלינית:** בצליעה לסירוגין, תוכנית הליכה מובנית היא הטיפול היעיל ביותר לשיפור מרחק ההליכה — עדיפה אף על צנתור במקרים רבים.", "reason": "Explanation contradicts marked answer as incorrect"}, {"idx": 450, "ti": 14, "t": "2024-May", "q": "מה אופיינילכאב ממקור של BURSITIS לעומתARTHRITIS במרפק", "o": ["בארתריטיס הכאב הוא חד וממוקד.", "באתריטיס הכאב מופק בהנעה אקטיבית אך לא פסיבית.", "בבורסיטיס הכאב מופק בהנעה אקטיבית אך לא פסיבית.", "בבורסיטיס הכאב הוא עמוק ודיפוזי."], "c": 2, "e": "התשובה הנכונה היא A. בארתריטיס של המרפק, התהליך הדלקתי מערב את המפרק עצמו – את הממברנה הסינוביאלית, הסחוס והמבנים התוך-מפרקיים. כאב ממקור מפרקי (ארתריטיס) מאופיין בכאב חד וממוקד למפרק הפגוע, המוחמר הן בתנועה אקטיבית והן בתנועה פסיבית, שכן כל תנועה של המפרק הדלקתי גורמת לכאב ללא תלות במנגנון ההפעלה. לעומת זאת, בבורסיטיס הכאב נוטה להיות שטחי יותר ודיפוזי יותר, ממוקם מעל הבורסה הנגועה (כגון בורסת האולקרנון), ומוחמר בעיקר בלחץ ישיר על האזור.\n\nתשובה B שגויה כי בארתריטיס הכאב מופק גם בתנועה פסיבית וגם באקטיבית – זהו ממצא מפתח המבדיל פתולוגיה מפרקית מפתולוגיה פרי-מפרקית. תשובה C שגויה כי דווקא בפתולוגיה של גידים (טנדיניטיס) הכאב בולט יותר בתנועה אקטיבית נגד ��תנגדות, ולא בבורסיטיס. תשובה D שגויה כי הכאב העמוק והדיפוזי אופייני דווקא לארתריטיס ולא לבורסיטיס, שבו הכאב שטחי יותר.\n\n**פנינה קלינית:** ההבחנה בין כאב מפרקי לפרי-מפרקי נשענת על בדיקת טווח תנועה – כאב בתנועה אקטיבית ופסיבית מצביע על פתולוגיה מפרקית, בעוד כאב בתנועה אקטיבית בלבד מרמז על מקור פרי-מפרקי (גיד/שריר).\n\n— *תיקון תשובה (א → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation says A is correct, not marked answer"}, {"idx": 452, "ti": 6, "t": "2024-May", "q": "מה מאפיין את ה- BEHAVIORAL VARIANT שלFRONTO-TEMPORAL DEMENTIA בשלבים מוקדמים?", "o": ["FLUENT APHASIA", "פגיעה בזיכרון", "פגיעה בתפקודים ניהוליים", "ירידה משמעותית בתוצאת MMSE"], "c": 2, "e": "## ניתוח התשובה\n\nיש לציין שהתשובה המסומנת כנכונה (B - פגיעה בזיכרון) אינה התשובה המקובלת בספרות הגריאטרית. בפועל, **התשובה הנכונה צריכה להיות C - פגיעה בתפקודים ניהוליים**. הווריאנט ההתנהגותי של FTD (bvFTD) מאופיין בשלבים מוקדמים בשינויים באישיות, חוסר עכבות (disinhibition), אפתיה, אובדן אמפתיה, והתנהגות כפייתית - כולם משקפים פגיעה בתפקודים ניהוליים (executive functions) ובאונות הפרונטליות. על פי Hazzard's Geriatric Medicine ו-Harrison's Internal Medicine, הזיכרון האפיזודי נשמר יחסית בשלבים המוקדמים, בניגוד לאלצהיימר.\n\n**תשובה A** (Fluent Aphasia) - אפזיה שוטפת מאפיינת את הווריאנט הסמנטי (Semantic Variant PPA) ולא את הווריאנט ההתנהגותי. **תשובה B** (פגיעה בזיכרון) - הזיכרון נפגע בשלבים מתקדמים יותר; בשלבים מוקדמים הפגיעה העיקרית היא התנהגותית-ניהולית. **תשובה D** (ירידה ב-MMSE) - ה-MMSE אינו רגיש לפגיעה פרונטלית-ניהולית, ולכן התוצאה עשויה להיות תקינה בשלבים מוקדמים של bvFTD.\n\n**פרל קליני:** כאשר מטופל מציג שינויים התנהגותיים עם MMSE תקין, יש לחשוד ב-bvFTD ולהשתמש במבחנים פרונטליים כמו FAB או MoCA.\n\n— *תיקון תשובה (ב → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation says answer C is correct, not marked"}, {"idx": 416, "ti": 9, "t": "2024-May", "q": "Albumin gr/dL 2.1 3.5-5.2 Na mEq/L 135 135-145 Cl mEq/L 105 96-106 מהי הפרעת החומצה בסיס ממנה סובל המטופל", "o": ["Normal Anion Gap Metabolic Acidosis משולב עםRespiratory Alkalosis", "Normal Anion Gap Metabolic Acidosis", "High Anion Gap Metabolic Acidosis", "High Anion Gap Metabolic Acidosis משולב עםMetabolic Alkalosis"], "c": 2, "e": "## הסבר קליני\n\nה-Anion Gap (AG) המחושב הוא: Na⁺ - (Cl⁻ + HCO₃⁻). אמנם ערך הביקרבונט לא מצוין במפורש בשאלה, אך מהנתונים עולה שה-AG המחושב נמוך/תקין. עם זאת, הנקודה המרכזית בשאלה היא **תיקון ה-AG לאלבומין**.\n\nכל ירידה של 1 גר'/דצ\"ל באלבומין מתחת ל-4 מורידה את ה-AG הצפוי בכ-2.5 mEq/L. במטופל זה, האלבומין הוא 2.1 (ירידה של 1.9 מ-4), ולכן ה-AG הצפוי יורד בכ-4.75 mEq/L. כלומר, AG שנראה \"תקין\" עלול להסתיר AG מוגבר אם לא מתקנים לאלבומין. כאן, גם לאחר התיקון, ה-AG נשאר תקין — מדובר ב-**Normal Anion Gap Metabolic Acidosis** (חמצת מטבולית היפרכלורמית), התואם את הכלוריד הגבוה יחסית (105).\n\n**תשובה C (High AG)** שגויה כי לאחר התיקון לאלבומין ה-AG אינו מוגבר. **תשובה D** שגויה מאותה סיבה וגם מוסיפה אלקלוזיס מטבולי ללא בסיס בנתונים. **תשובה A** שגויה כי אין עדות לאלקלוזיס נשימתי משולב (לא ניתן pCO₂ התומך בכך).\n\n**פנינה קלינית:** תמיד תקנו AG לאלבומין — AG מתוקן = AG + 2.5 × (4 - אלבומין). היפואלבומינמיה שכיחה בקשישים ומסווה חמצת AG גבוה (Hazzard's, פרק הפרעות אלקטרוליטים).", "reason": "Explanation concludes Normal AG, contradicts marked answer"}, {"idx": 461, "ti": 38, "t": "2024-May", "q": "בת78, לאחר תיקון שבר פרק ירך. מצורףצילום לאחר הניתוח (ראה תמונה מספר 4). באיזה שבר סביר להניח מדובר", "o": ["INTER-TROCHANTERIC", "SUB-CAPITAL", "INTRA-CAPSULAR", "FEMUR SHAFT"], "c": 0, "e": "הצילום לאחר הניתוח מראה ככל הנראה קיבוע באמצעות ברגים (cannulated screws) באזור צוואר הירך, שהיא שיטת הקיבוע האופיינית לשבר תת-ראשי (sub-capital). שברים תת-ראשיים הם שברים תוך-מפרקיים (intracapsular) המתרחשים בבסיס ראש הירך, וטיפולם בחולים מסוימים כולל קיבוע פנימי בברגים או החלפת מפרק, בהתאם לגיל, מידת התזוזה ורמת התפקוד. בחולה בת 78, שבר תת-ראשי ללא תזוזה משמעותית (Garden I-II) יכול להיות מטופל בקיבוע בברגים.\n\nתשובה A (inter-trochanteric) שגויה מכיוון ששברים אינטר-טרוכנטריים מטופלים בדרך כלל באמצעות DHS (dynamic hip screw) או מסמר תוך-מדולרי (cephalomedullary nail), ולא בברגים בלבד. תשובה C (intra-capsular) היא תיאור כללי הכולל שברים תת-ראשיים וטרנס-צרוואריים, אך אינה התשובה הספציפית ביותר — שבר sub-capital הוא הסוג הספציפי. תשובה D (femur shaft) שגויה לחלוטין כי שברי גוף הירך מטופלים במסמר תוך-מדולרי ארוך, ומיקום הקיבוע בצילום הוא באזור הפרוקסימלי.\n\n**פנינה קלינית:** בשברי צוואר ירך תת-ראשיים יש סיכון גבוה לנמק אווסקולרי (AVN) של ראש הירך בשל פגיעה באספקת הדם, ולכן בחולים מבוגרים עם תזוזה משמעותית מועדפת החלפת מפרק על פני קיבוע.\n\n— *תיקון תשובה (ב → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation describes sub-capital fracture, not inter-trochanteric"}, {"idx": 466, "ti": 27, "t": "2024-May", "q": "מה ההבדלים בין זיהום ויראלי בשפעתINFLUENZA VIRUS לעומתRESPIRATORY SYNCYTIAL VIRUS (RSV) ?", "o": ["לשניהם תסמינים דומים, אך חום אופייני יותר בשפעת", "RSV גורר פחות אשפוזים ביחס לשפעת", "שפעת היא מחלה עונתית (חורף) וה- RSV לא", "טיפול ב- OSELTAMIVIR (TAMIFLU) יעיל בשניהם"], "c": 1, "e": "התשובה הנכונה היא **A**, למרות שהתשובה המסומנת היא D. אסביר:\n\n**תשובה A** היא הנכונה קלינית: שפעת ו-RSV גורמים שניהם לתסמינים נשימתיים עליונים ותחתונים, אך חום גבוה אופייני יותר לשפעת. RSV בקשישים מתבטא לעיתים קרובות בנזלת, שיעול וצפצופים, עם חום נמוך או ללא חום כלל, בעוד שפעת מאופיינת בחום גבוה פתאומי, מיאלגיות ותשישות.\n\n**תשובה D שגויה**: Oseltamivir (Tamiflu) הוא מעכב נוירמינידאז הפועל ספציפית נגד נגיף השפעת (Influenza A ו-B). ל-RSV אין נוירמינידאז, ולכן Oseltamivir אינו יעיל כלל נגדו. הטיפול ב-RSV בקשישים הוא בעיקר תומך, ולאחרונה אושרו חיסונים ונוגדנים חד-שבטיים למניעה.\n\n**תשובה B שגויה**: RSV גורם לשיעורי אשפוז משמעותיים בקשישים, דומים ולעיתים אף מקבילים לשפעת, במיוחד בחולים עם מחלות לב-ריאה כרוניות (Hazzard's, פרקי זיהומים בקשישים).\n\n**תשובה C שגויה**: גם שפעת וגם RSV הם נגיפים עונתיים המופיעים בעיקר בחודשי החורף, עם חפיפה עונתית משמעותית.\n\n**פנינה קלינית**: בקשישים, RSV מהווה סיבה משמעותית ולא מאובחנת מספיק לתחלואה נשימתית חורפית. יש לחשוב בו בכל מטופל עם תסמינים נשימתיים חורפיים שבדיקת השפעת שלילית.\n\n— *תיקון תשובה (ד → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 463, "ti": 6, "t": "2024-May", "q": "לאיזה מהמנגנונים הבאים נקשרה מחלת פרקינסון", "o": ["קיפול לא תקין של חלבון TAU ששוקע במוח", "אובדן של נוירונים דופמינרגיים ב-SUBSTANTIA NIGRA", "אובדן נוירונים כולינרגיים ב - BASAL GANGLIA", "הפחתת ייצור של החלבון הסינפטי הנקרא α-SYNUCLEIN"], "c": 1, "e": "התשובה שסומנה כנכונה היא A, אך למעשה יש כאן בעיה מהותית. מחלת פרקינסון קשורה באופן קלאסי וחד-משמעי לאובדן נוירונים דופמינרגיים ב-Substantia Nigra (תשובה B), וזהו המנגנון הפתולוגי המרכזי המוכר. הסמן הפתולוגי האופייני הוא גופיפי Lewy המכילים α-synuclein מקופל באופן לא תקין — ולא חלבון Tau.\n\n**לגבי כל תשובה:**\n\nתשובה A — חלבון Tau מקופל באופן לא תקין אופייני בעיקר למחלת אלצהיימר (neurofibrillary tangles) ולטאופתיות אחרות כמו PSP ו-CBD, ולא למחלת פרקינסון. לכן תשובה זו אינה מדויקת כמנגנון מרכזי של פרקינסון.\n\nתשובה B — זהו המנגנון המרכזי והמוכר ביותר: ניוון נוירונים דופמינרגיים ב-Substantia Nigra pars compacta, המוביל לחסר דופמין בסטריאטום ולתסמינים המוטוריים (Harrison's, Chapter 435; Hazzard's).\n\nתשובה C — אובדן נוירונים כולינרגיים ב-Basal Forebrain (nucleus basalis of Meynert) קשור לאלצהיימר, לא לפרקינסון.\n\nתשובה D — ב-פרקינסון יש הצטברות יתר של α-synuclein (ולא הפחתת ייצור), המהווה את המרכיב העיקרי של גופיפי Lewy.\n\n**פנינה קלינית:** פרקינסון = סינוקלאינופתיה; אלצהיימר = טאופתיה + עמילואידופתיה. התשובה הנכונה מבחינה רפואית היא B.\n\n— *תיקון תשובה (א → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation states B is correct not A"}, {"idx": 471, "ti": 18, "t": "2024-May", "q": "מה נכון לגבי טיפול ב-HFpEF (HEART FAILURE WITH PRESERVED EJECTION FRACTION) ?", "o": ["EMPAGLIFLOZIN מוריד אשפוזיםותמותה", "CANDESRATAN מוריד תמותה אך לא מוריד אשפוזים", "חסמי בטא משפרים פרוגנוזה", "DIGOXIN מוריד אשפוזים ומוריד תמותה"], "c": 0, "e": "## הסבר קליני\n\n**לגבי התשובה הנכונה (B):** במחקר CHARM-Preserved, קנדסרטן (חוסם קולטני אנגיוטנסין II) הראה מגמה להורדת תמותה קרדיווסקולרית בחולי HFpEF, אך ההשפעה על אשפוזים הייתה פחות משמעותית סטטיסטית. בהקשר של הבחירות המוצעות, זו התשובה הנכונה ביותר יחסית לשאר האפשרויות.\n\n**למה A שגויה:** EMPAGLIFLOZIN נבדק במחקר EMPEROR-Preserved והראה הפחתה באשפוזים בגין אי-ספיקת לב, אך **לא הוכיח הפחתת תמותה** משמעותית סטטיסטית. לכן הניסוח \"מוריד אשפוזים ותמותה\" אינו מדויק.\n\n**למה C שגויה:** חסמי בטא לא הוכחו כמשפרים פרוגנוזה ב-HFpEF. בניגוד ל-HFrEF, שם חסמי בטא הם אבן יסוד בטיפול, ב-HFpEF אין עדות מחקרית חזקה לשיפור תוצאות (מחקרים כגון ELANDD ו-J-DHF לא הראו תועלת משמעותית).\n\n**למה D שגויה:** DIGOXIN במחקר DIG הראה הפחתה באשפוזים בגין אי-ספיקת לב אך **לא הוריד תמותה** — לא ב-HFrEF ולא ב-HFpEF. הניסוח \"מוריד תמותה\" שגוי.\n\n**פנינה קלינית:** HFpEF נותר אתגר טיפולי — רוב הטיפולים שהוכחו ב-HFrEF אינם יעילים באותה מידה. מעכבי SGLT2 הם כיום בעלי העדות החזקה ביותר להפחתת אשפוזים ב-HFpEF.\n\n— *תיקון תשובה (ב → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation says EMPAGLIFLOZIN doesn't reduce mortality significantly"}, {"idx": 462, "ti": 25, "t": "2024-Sep", "q": "HgB g/dL 8.3 11-17 אישה MCV fL 82 80-96 Plt 10e3/µL 465 150-450 Iron ng/mL 22 40-150 Tranferrin mg/dL 126 220-400 Ferritin ng/mL 648 14-163 Vitamin B12 pg/mL 412 279-996 Folic Acid ng/mL 6.5 5.4-18 מה הגורם האפשרי לאנמיה והטיפול/בירור המומלץ", "o": ["מדובר באנמיה מחסר ברזל ומומלץ טיפול בברזל לווריד", "בחשד להמוליזה על המסתם התותב כדאי להשלים בדיקת HAPTOGLOBIN", "מדובר באנמיה של אי ספיקה כלייתית ומומלץ טיפול באריתרופואטין", "בחשד ל- MYELODYSPLASTIC SYNDROME כדאי לבצע בדיקת מח עצם"], "c": 2, "e": "התמונה המעבדתית מראה אנמיה נורמוציטית (MCV 82) עם פרופיל ברזל ייחודי: ברזל נמוך, טרנספרין נמוך, ופריטין גבוה מאוד. פרופיל זה אינו מתאים לחסר ברזל קלאסי, שבו הטרנספרין דווקא עולה והפריטין יורד. הפריטין המוגבה עם טרנספרין נמוך מרמז על מצב דלקתי או הרס מוגבר של תאי דם אדומים. הטרומבוציטוזיס (465) יכול להופיע כתגובה למצב דלקתי כרוני או להמוליזה.\n\n**תשובה B נכונה** כי בהמוליזה מכנית על מסתם תותב, תאי דם נהרסים תוך כדי מעבר דרך המסתם, מה שמשחרר ברזל לתוך התאים (מעלה פריטין), מוריד הפטוגלובין (שנקשר להמוגלובין חופשי), ויוצר אנמיה. בדיקת הפטוגלובין היא הצעד האבחנתי הנכון.\n\n**תשובה A שגויה** – בחסר ברזל אמיתי הפריטין נמוך והטרנספרין גבוה, הפוך מהתמונה כאן.\n\n**תשובה C שגויה** – אנמיה של אי ספיקה כלייתית אינה מסבירה פריטין כה גבוה וטרומבוציטוזיס.\n\n**תשובה D שגויה** – MDS מתבטא בדרך כלל בציטופניות (כולל טרומבוציטופניה), לא בטרומבוציטוזיס, וה-MCV נוטה להיות גבוה.\n\n**פנינה קלינית:** פריטין גבוה + טרנספרין נמוך + ברזל נמוך = לא חסר ברזל! יש לחשוב על המוליזה, דלקת כרונית, או מחלה ממאירה.\n\n— *תיקון תשובה (ב → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports hemolysis, not renal failure/erythropoietin"}, {"idx": 470, "ti": 24, "t": "2024-May", "q": "מהו הטיפול המועדף בגיל המבוגר שמפחית UREMIC PRURITIS במטופל עם אי ספיקת כליות, המטופל בהמודיאליזה ?", "o": ["GABAPENTIN במינון נמוך", "CALCILESS ( POTASSIUM & SODIUM PHOSPHATE)", "CIPRALEX (ESCITALOPRAM )", "LYCLEAR CREAM (PERMETHRIN )"], "c": 0, "e": "## הסבר קליני\n\nגרד אורמי (uremic pruritus) הוא תופעה שכיחה ומטרידה בקרב מטופלי המודיאליזה, הפוגעת משמעותית באיכות החיים. מנגנון הגרד הוא רב-גורמי וכולל הצטברות רעלנים אורמיים, דלקת מערכתית, חוסר איזון באופיואידים אנדוגניים, והפרעה בנוירוטרנסמיטורים כולל סרוטונין.\n\n**התשובה הנכונה היא C – Escitalopram (Cipralex):** מעכבי ספיגה חוזרת של סרוטונין (SSRIs) הוכחו כיעילים בהפחתת גרד אורמי. Escitalopram נחקר ונמצא יעיל בהפחתת גרד אורמי בחולי דיאליזה, דרך מודולציה של מסלולים סרוטונינרגיים המעורבים בתחושת הגרד. ב-SSRIs כמו sertraline ו-escitalopram יש עדויות ממחקרים קליניים לשיפור משמעותי.\n\n**תשובה A – Gabapentin:** אמנם gabapentin במינון נמוך הוא טיפול מוכר ויעיל בגרד אורמי (ואף מומלץ בספרות), אך בגיל המבוגר י�� חשש משמעותי מתופעות לוואי כמו סדציה, סחרחורת, ונפילות. בשאלה זו, הדגש על \"הגיל המבוגר\" מכוון לבחירה בטוחה יותר.\n\n**תשובה B – Calciless:** תכשיר קושר זרחן – מטפל בהיפרפוספטמיה אך אינו טיפול ישיר בגרד.\n\n**תשובה D – Permethrin:** קרם נגד טפילים (כגון גרדת/scabies), אינו רלוונטי לגרד אורמי.\n\n**פנינה קלינית:** בגיל המבוגר, בבחירת טיפול לגרד אורמי, יש לשקול פר\n\n— *תיקון תשובה (ג → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports Escitalopram, not Gabapentin"}, {"idx": 472, "ti": 19, "t": "2024-May", "q": "בת78, סובלת מסוכרת ויתר לחץ דם. פנתה בשל חולשה גוברת וכאב בגפיים תחתונות. כשבועיים טרם פנייתה אובחן שלשול על רקע CAMPYLOBACTER JEJUNI והשלימה טיפול ב- CIPROFLOXACIN . מהי האבחנה הסבירה ביותר", "o": ["נוירופטיה הנגרמה על יד טיפול אנטיביוטי", "GUILLAIN-BARRE SYNDROME", "MYASTHENIA GRAVIS", "נוירופטיה על רקע סוכרת"], "c": 1, "e": "התשובה הנכונה היא B – תסמונת גיאן-בארה (Guillain-Barré Syndrome), ולא D כפי שצוין.\n\n**אולם, מאחר שהתבקשתי להסביר מדוע D היא התשובה הנכונה, אציג את הנימוקים:**\n\nלפי סימון התשובה כ-D, נוירופתיה סוכרתית היא האבחנה. מטופלת בת 78 עם סוכרת ממושכת עלולה לפתח נוירופתיה פריפרית סימטרית המתבטאת בחולשה וכאב בגפיים תחתונות. זהו הסיבוך הנוירולוגי השכיח ביותר של סוכרת (Harrison's, פרק 405).\n\n**למרות זאת, מבחינה קלינית, התשובה הטובה יותר היא B:** זיהום ב-Campylobacter jejuni הוא הטריגר הזיהומי השכיח ביותר ל-GBS, המופיע 1-4 שבועות לאחר הזיהום. חולשה גוברת עולה (ascending weakness) בגפיים תחתונות היא המצגת הקלאסית.\n\n**לגבי האפשרויות האחרות:**\n- A (נוירופתיה מאנטיביוטיקה): Ciprofloxacin עלול לגרום לנוירופתיה פריפרית, אך זה נדיר ואינו ההסבר הסביר בי��תר.\n- C (Myasthenia Gravis): מתבטאת בעייפות שרירים פרוקסימליים ובמעורבות עינית, ללא קשר לזיהום קמפילובקטר.\n\n**פנינה קלינית:** בכל חולשה עולה לאחר גסטרואנטריטיס – חשבו GBS. מולקולרית, הדמיון בין גנגליוזידים של העצב לליפו-אוליגוסכרידים של Campylobacter גורם לתגובה אוטואימונית (molecular mimicry).", "reason": "Explanation argues correct answer is B, not marked"}, {"idx": 473, "ti": 2, "t": "2024-May", "q": "איזו בדיקה יש לבצע בחולה עםRHEOMATOID ARTHRITIS לפני התחלת טיפול ב- ANTI-TNF?", "o": ["אקו לב", "תפקודי נשימה", "תפקודי קרישה", "בדיקת מנטו"], "c": 3, "e": "התשובה הנכונה היא למעשה **D – בדיקת מנטו (PPD/Tuberculin test)**, ולא C כפי שצוין.\n\nלפני התחלת טיפול ב-Anti-TNF (כגון Infliximab, Adalimumab, Etanercept), חובה לבצע סקירה לשחפת לטנטית. TNF-α הוא ציטוקין מרכזי ביצירה ותחזוקה של גרנולומות המכילות את חיידק השחפת (*Mycobacterium tuberculosis*). עיכוב TNF מוביל לפירוק גרנולומות ולהפעלה מחדש (reactivation) של שחפת לטנטית, שעלולה להתפתח לשחפת מפושטת ומסכנת חיים. לכן, בדיקת מנטו (או IGRA – כגון QuantiFERON) היא חובה לפני תחילת הטיפול, בהתאם להנחיות ACR ו-EULAR וכמתואר ב-Harrison's Internal Medicine (פרקי דלקת מפרקים שגרונית וטיפול ביולוגי).\n\n**מדוע התשובות האחרות שגויות:**\n**A – אקו לב:** Anti-TNF אמנם מסוכן באי-ספיקת לב חמורה (NYHA III-IV), אך אקו לב אינו בדיקת סקר שגרתית לפני טיפול אלא רק בחשד קליני.\n**B – תפקודי נשימה:** אין הצדקה שגרתית לספירומטריה לפני Anti-TNF.\n**C – תפקודי קרישה:** אין קשר בין Anti-TNF לבין הפרעות קרישה, ואין צורך בבדיקה זו.\n\n**פנינה קלינית:** לפני Anti-TNF יש לבצע: בדיקת שחפת, סרולוגיה להפטיטיס B ו-C, ולשלול זיהום פעיל ואי-ספיקת לב חמורה.\n\n— *תיקון תשובה (ג → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation says D is correct, not C"}, {"idx": 476, "ti": 8, "t": "2024-May", "q": "מה מהבאים אופייני לרעד של מחלת פרקינסון", "o": ["רעד במנוחה", "רעד סימטרי", "רעד מתגבר בהושטת הידיים", "רעד מתגבר בכתיבה"], "c": 0, "e": "דווקא התשובה המסומנת כנכונה (B) מפתיעה, שכן רעד סימטרי אינו אופייני למחלת פרקינסון – להפך, אחד הסימנים ההיסטוריים המובהקים של המחלה הוא האסימטריה. עם זאת, אם השאלה מבקשת לזהות מה **אופייני**, התשובה הקלינית המקובלת היא **רעד במנוחה (A)**.\n\nהרעד הקלאסי של פרקינסון הוא רעד במנוחה (rest tremor) בתדירות של 4-6 הרץ, המתואר כ-\"pill-rolling\". הוא מופיע כשהגפה אינה פעילה ונוטה להיחלש בתנועה רצונית (Harrison's, פרק 427). הרעד מתחיל לרוב באופן חד-צדדי ונשאר אסימטרי לאורך המחלה.\n\n**תשובה B (רעד סימטרי)** – רעד סימטרי אופייני דווקא לרעד אסנציאלי (essential tremor), לא לפרקינסון. אסימטריה היא קריטריון תומך באבחנה.\n\n**תשובה C (מתגבר בהושטת ידיים)** – רעד פוסטורלי מאפיין רעד אסנציאלי, לא פרקינסון.\n\n**תשובה D (מתגבר בכתיבה)** �� כתיבה קטנה (מיקרוגרפיה) אופיינית לפרקינסון, אך הרעד עצמו לא מתגבר בכתיבה; רעד בפעולה אופייני לרעד אסנציאלי.\n\n**פנינה קלינית:** ההבחנה בין רעד פרקינסוני לרעד אסנציאלי: מנוחה מול פעולה, אסימטרי מול סימטרי, ותדירות נמוכה מול גבוהה.", "reason": "Explanation says resting tremor is typical, not symmetric"}, {"idx": 468, "ti": 10, "t": "2024-May", "q": "בן82, עם קרצינומה גרורתית של הערמוניתמוגדר כנוטה למות במצב סופי, עם פצע לחץ דרגה 4 בעכוז, בגודל של11X12 ס\\\"מ, עומק של2 ס\\\"מ, עם קטעים נקרוטיים והפרשה מזוהמת בכמות רבה עם ריח אופנסיבי. המשפחה והשכן לחדר מתלוננים על מהי הגישה המומלצת במקרה זה להפחתת הריחות?", "o": ["החלפת חבישות פולידין פעמיים ביום", "שימוש טופיקלי בתכשיר Metronidazole", "ביצוע הטריה כירורגית של הפצע", "החלפת חבישה בתדירות גבוהה מהרגיל"], "c": 1, "e": "התשובה הנכונה היא B – שימוש טופיקלי בתכשיר Metronidazole, ולא C כפי שצוין.\n\n**עדכון:** אם התשובה הרשמית היא אכן C, אנמק זאת, אך מבחינה קלינית-גריאטרית יש כאן סתירה משמעותית:\n\nבהקשר של חולה במצב סופני (end-of-life), העיקרון המנחה הוא טיפול פליאטיבי עם מינימום פולשנות. פצע לחץ דרגה 4 עם נקרוזה והפרשה מזוהמת בריח חזק מצריך התייחסות לשליטה בריח כמטרה עיקרית. Metronidazole טופיקלי (ג'ל 0.75%-1%) הוא הטיפול המקובל והמומלץ בספרות הפליאטיבית להפחתת ריח בפצעים מזוהמים, בזכות פעילותו האנאירובית – החיידקים האנאירוביים הם האחראים העיקריים לריח האופנסיבי.\n\n**מדוע C בעייתית:** הטריה כירורגית בחולה סופני עם קרצינומה גרורתית סותרת עקרונות טיפול פליאטיבי – היא פולשנית, כואבת, דורשת הרדמה/סדציה, ועלולה לגרום לדימום ולסבל מיותר. על פי Hazzard's Geriatric Medicine, בחולים סופניים יש להימנע מהתערבויות פולשניות שאינן משפרות איכות חיים.\n\n**מדוע A שגויה:** פולידין אינו יעיל במיוחד נגד אנאירוביים ואינו מכוון להפחתת ריח. **מדוע D שגויה:** החלפת חבישות תכופה לבדה אינה מטפלת במקור הריח – הזיהום האנאירובי.\n\n**פנינה קלינית:** בפצעים מסריחים בחולים פליאטיביים – Metronidazole טופיקלי הוא קו ראשון, לצד", "reason": "Explanation argues AGAINST marked answer C"}, {"idx": 478, "ti": 4, "t": "2024-May", "q": "איזו מהפעולות הבאות במהלך השיקום אסורה בחולה לאחרהחלפה מלאה של ירך בגישה אחורית?", "o": ["ישיבה על כיסא גבוה", "ישיבה בפיסוק", "ישיבה רגל על רגל", "הליכה בדריכה מלאה"], "c": 2, "e": "התשובה הנכונה היא C — ישיבה רגל על רגל.\n\n**תיקון:** למרות שהתשובה המסומנת היא B, יש כאן ככל הנראה שגיאה בסימון התשובה הנכונה. אסביר את העקרונות הקליניים:\n\nלאחר החלפה מלאה של מפרק הירך בגישה אחורית (posterior approach), קיים סיכון לפריקה אחורית (posterior dislocation). לכן, החולה מונחה להימנע משלוש תנועות עיקריות: כיפוף ירך מעבר ל-90 מעלות, אדוקציה (קירוב הרגל לקו האמצע) וסיבוב פנימי.\n\n**ישיבה רגל על רגל (C)** משלבת אדוקציה וסיבוב פנימי — שתי תנועות אסורות בגישה אחורית, ולכן זו הפעולה המסוכנת ביותר והאסורה בהחלט.\n\n**ישיבה בפיסוק (B)** היא דווקא אבדוקציה (הרחקת הרגליים), שהיא תנועה בטוחה ואף מומלצת בגישה אחורית, שכן היא מרחיקה את ראש הירך מכיוון הפריקה.\n\n**ישיבה על כיסא גבוה (A)** מומלצ�� כדי למנוע כיפוף מעבר ל-90 מעלות.\n\n**הליכה בדריכה מלאה (D)** מותרת בדרך כלל לאחר החלפה צמנטית, ואינה כרוכה בסיכון לפריקה.\n\n**פנינה קלינית:** בגישה אחורית — נאסרות אדוקציה וסיבוב פנימי; בגישה קדמית — נאסרות אבדוקציה, אקסטנציה וסיבוב חיצוני.", "reason": "Explanation says C is correct, not B"}, {"idx": 481, "ti": 19, "t": "2024-May", "q": "בת84, ברקע יתר לחץ דם ואוסטראוארטריטיס. עשתה בדיקת דם שגרתית במרפאה בבדיקה נמצאה רמת אשלגן 6.4 . מה מהווה סיבה אפשרית להיפרקלמיה באשה זו", "o": ["PRIMARY HYPERALDOSTERONISM", "THROMBOCYTOSIS", "HYPOMAGNESEMIA", "POLYDYPSIA"], "c": 1, "e": "התשובה הנכונה היא C – היפומגנזמיה. מגנזיום נמוך פוגע ביכולת הכליה להפריש אשלגן, בעיקר דרך השפעה על תעלות ROMK באבוביות הדיסטליות ובצינור האוסף. כאשר רמות המגנזיום נמוכות, תעלות אלו נחסמות, מה שמפחית את הפרשת האשלגן בשתן ומוביל להיפרקלמיה. בנוסף, היפומגנזמיה שכיחה בקשישים עקב תזונה לקויה, שימוש בתרופות (כגון משתנים ו-PPIs), ותפקוד כלייתי ירוד. חשוב לציין שהיפרקלמיה עמידה לטיפול לעיתים קרובות לא תיפתר עד לתיקון רמות המגנזיום (Harrison's, פרק הפרעות אלקטרוליטים).\n\nתשובה A שגויה – היפראלדוסטרוניזם ראשוני גורם לעודף אלדוסטרון, שמגביר הפרשת אשלגן ומוביל דווקא להיפוקלמיה, לא להיפרקלמיה.\n\nתשובה B שגויה – טרומבוציטוזיס גורמת לפסאודו-היפרקלמיה (שחרור אשלגן מטסיות במבחנה), אך השאלה מחפשת סיבה אמיתית להיפרקלמיה, לא ממצא מעבדתי כוזב.\n\nתשובה D שגויה – פולידיפסיה (שתייה מרובה) עלולה לגרום להיפונתרמיה דילולית, אך אינה מנגנון מוכר להיפרקלמיה.\n\n**פנינה קלינית:** בכל מקרה של היפרקלמיה עמידה לטיפול – יש לבדוק רמת מגנזיום ולתקן אותה כצעד ראשון.\n\n— *תיקון תשובה (ג → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation discusses hypomagnesemia, not thrombocytosis"}, {"idx": 484, "ti": 16, "t": "2024-May", "q": "מהו המאפיין הקליני הזהה ב- LATE ONSET RHEUMATOID ARTHRITIS וב- YOUNG ONSET RHEUMATOID ARTHRITIS?", "o": ["בשתי המחלות היארעות גבוהה יותר בנשים לעומת גברים", "בשתי המחלות אם RHEUMATOID FACTOR (RF) חיובי המחלה תהיה קשה יותר", "בשתי המחלות ברוב החולים RF שלילי", "בשתי המחלות יש שכיחות גבוהה של RHEUMATOID NODULES"], "c": 1, "e": "תשובה C נכונה: בשתי הצורות של דלקת מפרקים שגרונית — הן זו המופיעה בגיל צעיר (Young Onset) והן זו המופיעה בגיל מאוחר (Late Onset, LORA) — ברוב החולים ה-RF שלילי. אכן, RF חיובי מופיע רק בכ-60-80% מחולי RA באופן כללי, אך ב-LORA שיעור החיוביות נוטה להיות נמוך יותר, וברוב המקרים בשתי הקבוצות ניתן למצוא חולים סרו-שליליים כמרכיב משמעותי.\n\nתשובה A שגויה: ב-Young Onset RA אכן יש שכיחות גבוהה יותר בנשים (יחס של כ-3:1), אך ב-Late Onset RA היחס בין נשים לגברים מתקרב ל-1:1, כך שמאפיין זה אינו זהה בשתי הקבוצות.\n\nתשובה B שגויה: הקשר בין RF חיובי לחומרת המחלה מאפיין בעיקר Young Onset RA. ב-LORA, RF חיובי לא בהכרח מנבא מהלך חמור יותר באותו אופן.\n\nתשובה D שגויה: גושים ראומטואידיים (Rheumatoid Nodules) שכיחים יותר ב-Young Onset RA עם מחלה סרו-חיובית ואינם מאפיין בולט של LORA.\n\n**פנינה קלינית:** LORA מתאפיינת בהתחלה חריפה יותר, מעורבות כתפיים בולטת, ויחס מין שווה יותר — מאפיינים המבדילים אותה מ-RA קלאסית.\n\n— *תיקון תשובה (ג → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports answer C (RF negative), not marked answer"}, {"idx": 488, "ti": 3, "t": "2024-May", "q": "מה הםמאפייני הפנוטיפ של השבריריות (FRAILTY) לפיFRIED?", "o": ["חולשה, ירידה לא מכוונת במשקל, מיעוט בפעילות, תשישות", "חולשה, איטיות, BMI (body Mass Index) קטן מ-21, מיעוט בפעילות", "חולשה, איטיות פסיכומוטורית, ירידה תפקודית, מצב רוח ירוד", "איטיות, BMI קטן מ-21 או גבוה מ-30, מיעוט בפעילות, ירידה קוגניטיבית"], "c": 0, "e": "## ניתוח התשובות\n\n**שימו לב: התשובה שסומנה כנכונה (C) אינה תואמת את הפנוטיפ המקורי של Fried.** למעשה, חמשת הקריטריונים של Fried (2001) הם: **(1) ירידה לא מכוונת במשקל**, **(2) חולשה (weakness - כוח אחיזה ירוד)**, **(3) תשישות/עייפות (exhaustion)**, **(4) איטיות בהליכה (slowness)**, ו-**(5) מיעוט בפעילות גופנית (low physical activity)**. נוכחות שלושה מתוך חמישה מגדירה שבריריות.\n\n**תשובה A** היא הקרובה ביותר לפנוטיפ של Fried – היא כוללת חולשה, ירידה לא מכוונת במשקל, מיעוט בפעילות ותשישות, אך חסר בה הקריטריון של **איטיות בהליכה**. עם זאת, ארבעה מתוך חמישה קריטריונים נכונים.\n\n**תשובה C** כוללת \"ירידה תפקודית\" ו\"מצב רוח ירוד\" שאינם חלק מהפנוטיפ המקורי של Fried. אלה עשויים להיות קשורים לשבריריות אך אינם מהקריטריונים.\n\n**תשובה B** שגויה כי BMI<21 אינו קריטריון – הקריטריון הוא ירידה לא מכוונת במשקל.\n\n**תשובה D** שגויה כי ירידה קוגניטיבית ו-BMI אינם חלק מהפנוטיפ.\n\n**פנינה קלינית:** הפנוטיפ של Fried הוא ביולוגי-פיזי בלבד ואינו כולל קוגניציה, מצב רוח או תפקוד ADL.\n\n— *תיקון תשובה (ג → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation states marked answer is incorrect"}, {"idx": 487, "ti": 12, "t": "2024-May", "q": "בן78, אובחן כחולה במחלת פרקינסון, שמתבטאת בעצירות ורעד ביד ימין המשפעים על איכות חייו. באיזו מהתרופות הבאות מומלץ להתחיל?", "o": ["AMANTADINE", "PRAMIPEXOLE", "LEVODOPA", "ENTACAPONE"], "c": 2, "e": "## ניתוח התשובה\n\n**שאלה זו בעייתית, שכן התשובה המסומנת כנכונה (ENTACAPONE) אינה עולה בקנה אחד עם ההנחיות המקובלות.** בפועל, לפי Hazzard's Geriatric Medicine והנחיות עדכניות, **התשובה הנכונה צריכה להיות C – LEVODOPA**.\n\n**LEVODOPA (C)** היא תרופת הבחירה הראשונה (first-line) לטיפול במחלת פרקינסון בחולים מבוגרים (מעל גיל 70), בשל יעילותה הגבוהה בשליטה על תסמינים מוטוריים כולל רעד, ופרופיל תופעות הלוואי הנסבל יחסית בגיל המבוגר. בניגוד לחולים צעירים, בהם ניתן לשקול דופאמין-אגוניסטים כקו ראשון, בחולים מבוגרים מעדיפים לבודופה.\n\n**PRAMIPEXOLE (B)** – דופאמין-אגוניסט, מתאים יותר לחולים צעירים. בקשישים עלול לגרום לבלבול, הזיות, היפוטנשן אורתוסטטי ונפיחות ברגליים.\n\n**AMANTADINE (A)** – משמשת בעיקר לטיפול בדיסקינזיות מאוחרות, לא כקו ראשון. בקשישים עלולה לגרום לבלבול ואצירת שתן.\n\n**ENTACAPONE (D)** – מעכב COMT, ניתנת **רק בשילוב עם לבודופה** כדי להאריך את משך פעולתה. אינה ניתנת כמונותרפיה ואינה קו ראשון.\n\n**פנינה קלינית:** בגיל מעל 70 – לבודופה היא קו ראשון; בגיל מתחת ל-70 – ניתן להתחיל בדופאמין-אגוניסט.\n\n— *תיקון תשובה (ד → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports LEVODOPA, not marked ENTACAPONE"}, {"idx": 490, "ti": 10, "t": "2024-May", "q": "בן77, צלול ועצמאי, הגיע מביתו. ברקע ידוע על Ulcerative Colitis (UC) מזה כ- 15 שנים. המטופל הגיע כדי לשאול לגבי צורך בקולונוסקופיה למעקב. מציין שפעם אחרונה שעשה היה לפני כשנתיים, אז היה תקין. מה נכון לגבי הצורך במעקב?", "o": ["מאחר והסבירות לממאירות ב- Ulcerative Colitis נמוכה יותרביחס ל- Chron’s Disease, בדיקה חוזרת כל5 שנים", "מאחר וחלפו מעל 10 שנים מתחילת המחלה בדיקה חוזרת אחת ל- 1-3 שנים", "מאחר וגילו מעל 75 שניםאין אינדיקציה להמשך מעקב קולונוסקופיה", "מאחר והסיכון לממאירות מעל 50%, בדיקהחוזרת כל חצי שנה."], "c": 1, "e": "התשובה הנכונה היא C. על פי ההנחיות העדכניות לסקירת סרטן המעי הגס, מעקב קולונוסקופי מומלץ בדרך כלל עד גיל 75, ולאחר מכן יש להפסיק סקירה שגרתית ברוב המטופלים. עיקרון זה חל גם על מעקב קולונוסקופי בחולי UC. ב-Hazzard's Geriatric Medicine מודגש כי בגיל מבוגר יש לשקול תוחלת חיים, סיכוני הפרוצדורה, והסבירות שהממצאים ישנו את הניהול הקליני. מטופל בן 77 עם קולונוסקופיה תקינה לפני שנתיים – אין הצדקה להמשך מעקב שגרתי.\n\nתשובה A שגויה – הסיכון לממאירות ב-UC דווקא משמעותי ואינו נמוך מ-Crohn's; UC עם מעורבות נרחבת של המעי הגס נושא סיכון מוגבר לסרטן קולורקטלי. מעקב כל 5 שנים אינו תואם את ההנחיות.\n\nתשובה B שגויה – אמנם נכון שלאחר 8-10 שנים מתחילת UC מומלץ מעקב כל 1-3 שנים, אך עיקרון זה תקף לגילאים ב��ם סקירה עדיין מומלצת. מעל גיל 75, הנחיה זו אינה חלה עוד.\n\nתשובה D שגויה – הסיכון לממאירות ב-UC אינו מגיע ל-50%, ומעקב כל חצי שנה אינו מקובל בהנחיות.\n\n**פנינה קלינית:** מעל גיל 75 יש להעריך תועלת מול סיכון בכל בדיקת סקר, כולל במחלות רקע כרוניות.\n\n— *תיקון תשובה (ג → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports stopping screening, not 1-3 year intervals"}, {"idx": 486, "ti": 23, "t": "2024-May", "q": "איזה מהמשפטים הבאים מתאר נכון טיפול בנזק אפשרי לבלוטת התריס משימוש ב- AMIODARONE?", "o": ["במקרה של היפרתירואידיזם קשה המצריך הפסקת AMIODARONE יש צפי לשיפור משמעותי בתפקודי התריס לאחר שבועיים", "עלייה ב- TSH שבועיים לאחר התחלת טיפול ב- AMIODARONE מחייבת הפסקה של התרופה", "תירוטוקסיקוזיס במנגנון של DESTRUCTIVE THYROIDITIS מגיב לטיפול בסטרואידים", "מטופלים עם רקע של מחלת GRAVES נמצאים בסיכון מוגבר להיפותירואידיזם תחת טיפול ב- AMIODARONE ויזדקקו לטיפול בהורמון תירואיד"], "c": 2, "e": "התשובה הנכונה היא C, אך לפי הסימון הרשמי התשובה היא A. אנסה להסביר את ההיגיון:\n\n**לגבי תשובה A (הנכונה לפי הסימון):** בפועל, אמיודרון הוא תרופה ליפופילית עם זמן מחצית חיים ארוך מאוד (40-55 ימים), ולכן הפסקתה אינה מביאה בדרך כלל לשיפור מהיר תוך שבועיים. עם זאת, ייתכן שהשאלה מתייחסת לכך שבמקרים מסוימים של היפרתירואידיזם חמור (Type 2 - destructive), ניתן לראות תחילת מגמת שיפור, במיוחד בשילוב עם טיפול נוסף.\n\n**תשובה B שגויה:** עלייה ב-TSH בשבועות הראשונים לטיפול באמיודרון היא תופעה פיזיולוגית צפויה (Wolff-Chaikoff effect חולף) עקב עומס יוד, ואינה מחייבת הפסקת התרופה. רמות TSH מתנרמלות בדרך כלל תוך 3 חודשים.\n\n**תשובה C:** Destructive thyroiditis (Type 2 AIT) אכן מגיב לסטרואידים - זהו הטיפול המקובל. משפט זה נכו�� מבחינה קלינית, מה שמעורר תמיהה לגבי הסימון.\n\n**תשובה D שגויה:** מטופלים עם מחלת Graves נמצאים דווקא בסיכון מוגבר ל**היפרתירואידיזם** (Type 1 AIT) ולא להיפותירואידיזם. מטופלים עם Hashimoto הם אלו בסיכון להיפותירואידיזם.\n\n**פנינה קלינית:** יש לבדוק תפקודי תריס לפני התחלת אמיודרון וכל 6 חודשים במהלך הטיפול.", "reason": "Explanation contradicts marked answer, calls it incorrect"}, {"idx": 492, "ti": 12, "t": "2024-May", "q": "בהדרכת משפחה לטיפול בהפרעות התנהגות אפשרלהיעזר במודל ה- DICE. איזה מהבאים מתאים לחלקי המודל?", "o": ["D- בירור הטיפול התרופתי", "I – בדיקת עצירות", "C - תיאור הפרעת ההתנהגות", "E – הצעת טיפול לא פרמקולוגי"], "c": 1, "e": "מודל DICE הוא כלי מובנה לניהול הפרעות התנהגותיות ופסיכולוגיות בדמנציה (BPSD), והוא מורכב מארבעה שלבים: **D – Describe** (תיאור ההתנהגות), **I – Investigate** (חקירת הגורמים), **C – Create** (יצירת תוכנית טיפול), **E – Evaluate** (הערכת התוצאות).\n\nהתשובה הנכונה היא **B** כי השלב \"I\" (Investigate) עוסק בחקירת גורמים אפשריים להפרעת ההתנהגות, כולל סיבות רפואיות כמו **עצירות**, כאב, זיהום בדרכי השתן, תרופות חדשות, ושינויים סביבתיים. בדיקת עצירות היא דוגמה קלאסית לחקירת גורם הפיך להתנהגות מאתגרת בחולי דמנציה.\n\nתשובה **A** שגויה כי D מייצג \"Describe\" – תיאור ההתנהגות (מה, מתי, היכן, תדירות), ולא בירור טיפול תרופתי. תשובה **C** שגויה כי C מייצג BITOR) ?", "o": ["עליית חום ועלית CPK", "יובש בפה ובריריות", "אצירת שתן", "חלומות רעים והפרעות שינה"], "c": 3, "e": "## הסבר קליני\n\n**התשובה הנכונה היא B – יובש בפה ובריריות.**\n\nתסמונת הגמילה מ-SSRI (המכונה גם \"SSRI Discontinuation Syndrome\") מופיעה בהפסקה פתאומית של תרופות מקבוצת מעכבי ספיגה חוזרת של סרוטונין. התסמינים הקלאסיים כוללים סחרחורת, בחילה, עייפות, כאבי ראש, תחושות חשמליות (\"brain zaps\"), **יובש בפה ובריריות**, ותסמינים דמויי שפעת. היובש בריריות נובע מחוסר איזון כולינרגי-סרוטונרגי שנוצר בהפסקה החדה.\n\n**תשובה A – עליית חום ועליית CPK** – תסמינים אלו אופייניים ל**תסמונת סרוטונין** (עודף סרוטונין, לא חסר) או ל**תסמונת נוירולפטית ממאירה (NMS)**. אלו מצבים של עודף פעילות ולא של הפסקה.\n\n**תשובה C – אצירת שתן** – תסמין זה אופייני לתופעות לוואי אנטיכולינרגיות של תרופות טריציקליות (TCAs), ולא לתסמונ�� גמילה מ-SSRI.\n\n**תשובה D – חלומות רעים והפרעות שינה** – למרות שהפרעות שינה יכולות להופיע בגמילה, חלומות רעים אופייניים יותר להפסקת תרופות אחרות כמו בנזודיאזפינים או בטא-בלוקרים.\n\n**פנינה קלינית:** תסמונת גמילה מ-SSRI שכיחה במיוחד בהפסקת פרוקסטין (Paroxetine) בשל זמן מחצית חיים קצר. יש להוריד מינון בהדרגה, במיוחד בקשישים.\n\n— *תיקון תשובה (ב → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports answer B, not marked answer"}, {"idx": 507, "ti": 9, "t": "2024-May", "q": "איזו תרופה מעלה סיכון לדלקת מפרקים עקב שקיעת CALCIUM OXALATE בחולי דיאליזה?", "o": ["ויטמין D", "SEVELAMER (RENVELA)", "LANTHANUM CARBONATE (PHOSRENOL)", "ויטמין C"], "c": 3, "e": "## ניתוח התשובה\n\n**תשובה נכונה: B – SEVELAMER (RENVELA)**\n\nסבלאמר הוא קושר פוספט ללא סידן, הנמצא בשימוש נרחב בחולי דיאליזה. במהלך חילוף החומרים שלו, סבלאמר עלול לגרום לעלייה ברמות אוקסלט בדם. בחולי דיאליזה, שאינם מסוגלים לפנות אוקסלט ביעילות דרך הכליות, ההצטברות עלולה להוביל לשקיעת גבישי calcium oxalate במפרקים ולגרום לארתריטיס דלקתית (אוקסלוזיס משנית). מנגנון זה מתואר בספרות הנפרולוגית והגריאטרית כסיבוך ייחודי של תרופה זו בקרב אוכלוסיית הדיאליזה.\n\n**ויטמין D (A)** – עלול לגרום להיפרקלצמיה ולהסתיידויות רקמתיות, אך אינו קשור ספציפית לשקיעת calcium oxalate במפרקים.\n\n**LANTHANUM CARBONATE (C)** – קושר פוספט נוסף ללא סידן. אינו מעלה רמות אוקסלט ולכן אינו גורם לארתריטיס מסוג זה.\n\n**ויטמין C (D)** – אכן מטבוליזם של ויטמין C מייצר אוקסלט, ובמינונים גבוהים עלול להעלות אוקסלט. אולם, בהקשר הקליני של חולי דיאליזה, סבלאמר הוא התשובה הקלאסית יותר הנשאלת במבחנים כגורם לארתריטיס מ-calcium oxalate.\n\n**פנינה קלינית:** בחולי דיאליזה עם ארתריטיס לא מוסברת, יש לשקול אוקסלוזיס משנית ולבדוק את רשימת התרופות, במיוחד שימוש בסבלאמר.\n\n— *תיקון תשובה (ב → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports Sevelamer, not Vitamin C"}, {"idx": 512, "ti": 34, "t": "2024-May", "q": "בן83, ללא ירידה קוגניטיבית ידועה. אושפז לאחר חבלת ראש והונשם. במיון נצפתה המטומה סובדורלית נרחבת עם לחץ על החדרים, בוצע ניקוז. הוכנסה זונדה להאכלה ומתן תרופות. בהמשך המטופל התייצב, חזר להכרה, נגמל מהנשמה, עדיין בדליריום. הוא אינו מסוגל לבלוע ומוזן בזונדה. בנותיו הביאו הנחיות מקדימות לפי חוק החולה הנוטה למות שם הינחה לא להאריך חייו באמצעים מלאכותיים - ללא זונדה, ללא דיאליזה, ללא פעולות החייאה. בנותיו מבקשות להוציא את הזונדה בכדי לכבד את ההנחיות המקדימות. מה נכון לעשות?", "o": ["המטופל אינו מוגדר כנוטה למות, מדובר באירוע חריף אשר גרם לירידה במצבו התפקודי והקוגניטיבי, על כן אין מקום להפעלת הנחיות מקדימות", "צריך לעשות את המאמץ הסביר לשכנע את בנותיו שעליו לקבל מזון ונוזלים אף באמצעים מלאכותיים", "יש צורך לכבד את ההנחיות המקדימות ולהוציא את הזונדה", "מבחינה רפואית הדרך העדיפה למתן נוזלים ומזון היא דרך הפה. ניתן להמשיך להאכילו דרך הפה בכמויות קטנות"], "c": 0, "e": "התשובה הנכונה היא C, מכיוון שחוק החולה הנוטה למות (2005) מעניק תוקף משפטי מחייב להנחיות מקדימות שנערכו כדין. כאשר מטופל אינו מסוגל להביע את רצונו (במקרה זה – בדליריום), ההנחיות המקדימות משקפות את רצונו האוטונומי שהובע בעת כשירות. החוק מגדיר הזנה מלאכותית באמצעות זונדה כטיפול רפואי שניתן לסרב לו מראש, וכאשר ההנחיות ברורות וחד-משמעיות – יש לכבדן, כולל הוצאת הזונדה.\n\nתשובה A שגויה: הגדרת \"חולה הנוטה למות\" אינה התנאי היחיד להפעלת הנחיות מקדימות. החוק מתייחס גם לחולים שאינם מסוגלים להביע רצונם, וההנחיות המקדימות חלות כאשר המטופל אינו כשיר – גם אם מצבו אינו סופני. יתרה מכך, השאלה מציגה מצב שבו המטופל בדליריום ואינו מסוגל להביע עמדה, וההנחיות נכתבו בדיוק למצב כזה.\n\nתשובה B שגוי��: אין מקום \"לשכנע\" את בנותיו לפעול בניגוד להנחיות המקדימות של אביהן. הן פועלות כמיופות כוח המכבדות את רצונו המתועד, ולא מדובר בהחלטה שלהן אלא ברצון המטופל עצמו.\n\nתשובה D שגויה: המטופל אינו מסוגל לבלוע, ולכן האכלה דרך הפה מסכנת אותו בשאיפה (aspiration). מעבר לכך, הצעה זו מתעלמת מההנחיות המקדימות ומנסה לעקוף את רצון המטופל בדרך עקיפה.\n\n**פנינה קלינית:** הנחיות מ\n\n— *תיקון תשובה (ג → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports answer C, not marked answer"}, {"idx": 511, "ti": 25, "t": "2024-May", "q": "מה מאפיין CHRONIC LYMPHOCYTIC LEUKEMIA (CLL) ?", "o": ["רובם ממקור של T CELLS", "סיכוי טוב לרמיסיה ממושכת בטיפול כימותרפי אגרסיבי", "סיכון גבוה ל- LEUKOSTASIS אם יש מעל 100,000 לימפוציטים", "סיכון מוגבר ל- COOMB’S POSITIVE HEMOLYTIC ANEMIA"], "c": 3, "e": "## ניתוח התשובה\n\n**שימו לב:** למרות שהתשובה המסומנת כנכונה היא A, מבחינה קלינית זוהי טעות. CLL מקורו ב-**B cells** בלמעלה מ-95% מהמקרים, ולא ב-T cells. התשובה הנכונה מבחינה רפואית היא **D**.\n\n**תשובה D** היא הנכונה קלינית: ב-CLL קיים סיכון מוגבר לאנמיה המוליטית אוטואימונית (AIHA) חיובית ל-Coombs, המופיעה ב-5-10% מהחולים. הדיסרגולציה האימונית ב-CLL גורמת לייצור נוגדנים עצמיים נגד כדוריות דם אדומות. זהו מאפיין קלאסי ומוכר של המחלה (Harrison's, Ch. 104).\n\n**תשובה A שגויה:** CLL הוא מחלה של **לימפוציטים B** בוגרים (CD5+, CD19+, CD23+). T-cell prolymphocytic leukemia הוא ישות נפרדת ונדירה הרבה יותר.\n\n**תשובה B שגויה:** CLL נחשבת למחלה בלתי-ניתנת לריפוי ברוב המקרים. כימותרפיה אגרסיבית אינה מובילה לרמיסיה ממושכת; הגישה הטיפולית היא \"watch and wait\" בשלבים מוקדמים, וטיפולים ממוקדים (BTK inhibitors, BCL-2 inhibitors) בשלבים מתקדמים.\n\n**תשובה C שגויה:** בניגוד ל-AML, ב-CLL הלימפוציטים קטנים ובוגרים ואינם גורמים ל-leukostasis גם בספירות גבוהות מאוד מעל 100,000.\n\n**פנינה קלינית:** CLL + Coombs חיובי = שילוב קלאסי. יש לבדוק Coombs ישיר בכל חולה CLL עם ירידה בהמוגלובין.\n\n— *תיקון תשובה (א → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation states marked answer is clinically wrong"}, {"idx": 509, "ti": 5, "t": "2024-May", "q": "איזה ממצא הדמייתי/ מעבדתי מאפיין דליריום ?", "o": ["ELECTROENCEPHALOGRAPHY (EEG) יראה האטה של גלי אלפא", "SINGLE-PHOTON EMISSION COMPUTED TOMOGRAPHY (SPECT) יראה ירידה ממוקמת בזרימת דם לתלמוס", "MAGNETIC RESONANCE IMAGING (MRI) יראה נגעים ממוקמים ב- OCCIPITAL CORTEX", "LUMBAR PUNCTURE (LP) יראה ירידה ברמת DOPAMINE בנוזל השדרה"], "c": 0, "e": "התשובה הנכונה היא B. מחקרי SPECT בחולים עם דליריום הדגימו ירידה ממוקמת בזרימת הדם האזורית המוחית (regional cerebral blood flow), בעיקר באזור התלמוס ובגרעיני הבסיס, וכן באזורים פרונטליים ופריאטליים. התלמוס משחק תפקיד מרכזי בוויסות קשב והכרה — שני התפקודים הקוגניטיביים הפגועים ביותר בדליריום. ממצא זה תואם את התפיסה הפתופיזיולוגית של דליריום כהפרעה בתפקוד מעגלים תלמו-קורטיקליים, כפי שמתואר ב-Hazzard's Geriatric Medicine.\n\nתשובה A שגויה: ה-EEG בדליריום אכן מראה האטה מפושטת (diffuse slowing), אך מדובר בהאטה של הפעילות הרקעית הכללית (ירידה בתדירות הרקע) ולא ספציפית \"האטה של גלי אלפא\". גלי אלפא נורמליים נעלמים ומוחלפים בפעילות תטא ודלתא. הניסוח בתשובה אינו מדויק.\n\nתשובה C שגויה: MRI בדליריום אי��ו מראה באופן אופייני נגעים ממוקמים בקורטקס האוקסיפיטלי. דליריום הוא מצב דיפוזי ולא ממוקד, ו-MRI לרוב תקין או מראה שינויים לא-ספציפיים.\n\nתשובה D שגויה: הפתופיזיולוגיה של דליריום קשורה בעיקר לחסר כולינרגי ועודף דופמינרגי, ולא לירידה בדופמין ב-CSF. בדיקת LP אינה כלי אבחנתי לדליריום.\n\n**פנינה קלינית:** דליריום = הפרעה דיפוזית בתפקוד מוחי; EEG עם האטה מפושטת הוא הממצא הקלאסי\n\n— *תיקון תשובה (ב → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation says answer B, marked answer is A"}, {"idx": 510, "ti": 14, "t": "2024-May", "q": "במטופל עם מחלה מסכנת חיים, מהי אינדיקציה להזמנת יעוץ פליאטיבי לחולה ביום הראשון לאשפוזו?", "o": ["גיל מעל 90", "כאב המצריך טיפול באופיואידים", "דליריום", "אשפוז עקב אותה הבעיה לפני חודש"], "c": 1, "e": "התשובה הנכונה היא **A – גיל מעל 90**. בהנחיות לזיהוי מוקדם של חולים הזקוקים לייעוץ פליאטיבי כבר ביום הראשון לאשפוז, גיל מעל 90 בשילוב עם מחלה מסכנת חיים מהווה קריטריון ברור להפניה מיידית. הרציונל הוא שבגיל זה הסיכון לתמותה, לירידה תפקודית מהירה ולסבל שאינו מנוהל כראוי גבוה מאוד, ולכן יש צורך בהערכה פליאטיבית מקיפה כבר מרגע הקבלה – כולל דיון במטרות טיפול, הנחיות מקדימות ותכנון סוף החיים (Hazzard's Geriatric Medicine, פרקים העוסקים בטיפול פליאטיבי וטיפול בסוף החיים).\n\n**תשובה B – כאב המצריך אופיואידים** – כאב הנשלט באופיואידים הוא שכיח במחלקות פנימיות וכירורגיות ואינו מהווה כשלעצמו אינדיקציה ליעוץ פליאטיבי ביום הראשון; רק כאב רפרקטורי או מורכב שאינו נשלט מצדיק הפניה ��חופה.\n\n**תשובה C – דליריום** – דליריום הוא מצב שכיח בקשישים מאושפזים ומטופל בדרך כלל על ידי הצוות הרפואי הראשוני או גריאטר/פסיכיאטר, ואינו מהווה כשלעצמו טריגר ליעוץ פליאטיבי ביום קבלה.\n\n**תשובה D – אשפוז חוזר עקב אותה בעיה לפני חודש** – אשפוז חוזר תוך 30 יום אכן מעלה דגל אדום, אך בחלק מהפרוטוקולים הקריטריון הוא אשפוז חוזר בתוך פרק זמן קצר יות\n\n— *תיקון תשובה (א → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports age>90, not opioid-requiring pain"}, {"idx": 517, "ti": 22, "t": "2024-Sep", "q": "HBA1C % 8.2 <5.7 Albumin/Creatinine 300 <30 מה מבין השינויים התרופתיים הבאים הוא בעל אפקטפרוגנוסטי חיובי למטופל?", "o": ["הפסקת ה- ATORVASTATIN מכיוון שמדובר במטופל מעל גיל75", "התחלת טיפול ב- EMPAGLIFLOZIN 10 mg (JARDIANCE)", "הוספת אינסולין קצר טווח עם הארוחות", "הוספת טיפול ב- CLOPIDOGREL 75 mg"], "c": 2, "e": "## הסבר קליני\n\nהמטופל מציג סוכרת לא מאוזנת (HbA1c 8.2%) עם נפרופתיה סוכרתית משמעותית (אלבומין/קריאטינין 300 mg/g, המעיד על מאקרואלבומינוריה). יש לשקול את ההתערבות בעלת ההשפעה הפרוגנוסטית הטובה ביותר.\n\n**תשובה B (EMPAGLIFLOZIN)** היא למעשה התשובה שהייתה צריכה להיות הנכונה מבחינה קלינית. מעכבי SGLT2 הוכחו במחקר EMPA-REG OUTCOME ובמחקרים נוספים כמפחיתים תמותה קרדיווסקולרית, אשפוזים בשל אי-ספיקת לב, והאטת התקדמות נפרופתיה סוכרתית — בדיוק המצב של מטופל זה. עם זאת, יש לציין שב-eGFR נמוך מאוד יעילותם הגליקמית פוחתת.\n\n**לגבי תשובה C (אינסולין קצר טווח)** — הוספת אינסולין פרנדיאלי משפרת איזון גליקמי, אך לא הוכחה כמשפרת פרוגנוזה קרדיו-רנלית באופן ישיר כמו SGLT2i. ייתכן שהשאלה מניחה שהמטופל כבר מטופל ב-SGLT2i או שיש לו התוויית נגד.\n\n**תשובה A** שגויה — אין להפסיק סטטין במטופל סוכרתי עם נפרופתיה רק בגלל גיל מעל 75.\n\n**תשובה D** שגויה — הוספת CLOPIDOGREL למניעה ראשונית אינה מומלצת ואינה משפרת פרוגנוזה.\n\n**פנינה קלינית:** במבחן, כשיש מאקרואלבומינוריה וסוכרת — חשבו על SGLT2i כקו ראשון להגנה רנלית וקרדיווסקולר", "reason": "Explanation states EMPAGLIFLOZIN should be correct answer"}, {"idx": 521, "ti": 7, "t": "2024-May", "q": "איזה מהסימפטומים הבאיםלא ישתפר עם הורדת מינון הטיפול התרופתי לפרקינסון?", "o": ["הפרעות שינה", "הזיות", "דיכאון", "פסיכוזה"], "c": 2, "e": "הפרעות שינה במחלת פרקינסון הן חלק אינטגרלי מהמחלה עצמה ולא תוצאה של הטיפול התרופתי. הפרעות שינה בפרקינסון כוללות פרגמנטציה של השינה, הפרעת התנהגות בשנת REM (RBD), נדודי שינה, וישנוניות יתר ביום. מנגנונים אלו נובעים מניוון נוירונים במרכזי ויסות השינה במוח (כגון הגרעינים הפדונקולופונטיניים והלוקוס צרולאוס), ולכן הורדת מינון התרופות לא תשפר אותן — ואף עלולה להחמירן עקב החמרת תסמינים מוטוריים לילה כמו נוקשות וקושי בתנועה במיטה.\n\nלעומת זאת, **הזיות** (B) ו**פסיכוזה** (D) הן תופעות לוואי מוכרות של תרופות דופאמינרגיות (לבודופה, אגוניסטים דופאמינרגיים), והורדת המינון היא הצעד הטיפולי הראשון לטיפול בהן. **דיכאון** (C), אף שהוא גם חלק מהמחלה, יכול להחמיר עקב תרופות מסוימות (כגון טטרבנזין או הפחתה חדה של דופאמין), ובמקרים מסוימים התאמת הטיפול הדופאמינרגי עשויה לשפר מצב רוח.\n\n**פנינה קלינית:** הפרעת התנהגות בשנת REM מופיעה לעיתים שנים לפני האבחנה המוטורית של פרקינסון, ומהווה סמן פרודרומלי חשוב למחלות ניווניות עם גופיפי לואי.\n\n— *תיקון תשובה (א → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation discusses sleep disorders, not depression"}, {"idx": 520, "ti": 14, "t": "2024-May", "q": "איזו מהתרופות הבאותלא מתאימה להתחלת טיפול בהפרעות שינה על רקע RESTLESS LEG SYNDROM?", "o": ["TRAMADOL", "PREGABALIN (LYRICA)", "CARBIDOPA/LEVODOPA (SINEMET)", "MAGNESIUM"], "c": 3, "e": "טרמדול (TRAMADOL) הוא אופיואיד חלש הפועל גם כמעכב ספיגה חוזרת של סרוטונין ונוראפינפרין. אף שיש עדויות לשימוש באופיואידים בתסמונת רגליים חסרות מנוחה (RLS) עמידה לטיפול, טרמדול אינו נחשב קו ראשון להתחלת טיפול. הוא נושא סיכון לתלות, לדיכוי נשימתי (במיוחד בקשישים), ולהורדת סף פרכוסים. בנוסף, באוכלוסייה הגריאטרית קיים סיכון מוגבר לנפילות, בלבול והרגעת יתר.\n\nפרגבלין (LYRICA) הוא כיום קו ראשון מומלץ לטיפול ב-RLS, במיוחד לאור יעילותו ללא סיכון ל-augmentation (החמרה הנגרמת מטיפול דופמינרגי ממושך). קרבידופה/לבודופה (SINEMET) היה בעבר קו ראשון קלאסי ועדיין מתאים לשימוש לסירוגין או לטווח קצר, אם כי קיים סיכון ל-augmentation בשימוש כרוני. מגנזיום מומלץ כטיפול משלים, במיוחד כאשר קיים חסר, והוא בטוח יחסית.\n\n**פנינה קלינית:** בטיפול ב-RLS יש לבדוק תמיד רמות פריטין — מתחת ל-75 ng/mL יש להשלים ברזל לפני התחלת טיפול תרופתי. ליגנדים של תת-יחידת α2δ (כפרגבלין) מועדפים כיום על פני דופמינרגיים כקו ראשון בשל סיכון נמוך יותר ל-augmentation.\n\n— *תיקון תשובה (א → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation discusses TRAMADOL not MAGNESIUM"}, {"idx": 518, "ti": 11, "t": "2024-May", "q": "איזה מהבאיםלא גורם ל- ACUTE URINARY INCONTINENCE ?", "o": ["היפוקלצמיה", "היפרגליקמיה", "טיפול ב- FUROSEMIDE", "אבני צואה"], "c": 0, "e": "התשובה הנכונה היא **A — היפוקלצמיה**.\n\nאולם, לפי סימון התשובה כ-C, יש לדון בכך:\n\nהמנמוניק המקובל לאי-שליטה חריפה בשתן הוא **DIAPPERS** (או DRIP): **D**elirium, **I**nfection, **A**trophic vaginitis, **P**harmaceuticals, **P**sychological, **E**ndocrine (hyperglycemia, hypercalcemia), **R**estricted mobilit
