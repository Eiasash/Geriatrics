כון קרדיוו-ווסקולרים מעלה קצב הידרדרות קוגניטיבית בחולי אלצהיימר רק באלה ללא המוטציה APOE ε4", "קיום גורמי סיכון קרדיוו-ווסקולרים מעלה קצב הידרדרות קוגניטיבית בחולי אלצהיימר ויותר בנשאי המוטציה APOE ε4", "ההשפעה של גורמי סיכון קרדיוו-ווסקולרים על קצב ההידרדרות קוגניטיבית חולי אלצהיימר ניכרת רק אחרי 3 שנות מעקב", "בחולים עם 3 גורמי סיכון קרדיוו-ווסקולרים ערכי ה- MMSE ירדו ב- 3 שנים ב- 13-15 נקודות"], "c": 1, "e": "המחקר של Lee וחבריו בחן את ההשפעה המצטברת (summative) של גורמי סיכון וסקולריים (יתר לחץ דם, סוכרת, מחלת לב, עישון) על קצב ההידרדרות הקוגניטיבית בחולי אלצהיימר. הממצא המרכזי היה שנוכחות שלושה גורמי סיכון קרדיו-וסקולריים או יותר האיצה את הירידה הקוגניטיבית, אך השפעה זו נצפתה דווקא בחולים שאינם נשאי האלל APOE ε4. הסבר אפשרי הוא שבנשאי APOE ε4 הפתולוגיה הנוירודגנרטיבית כה דומיננטית שהתוספת הוסקולרית אינה מוסיפה באופן מובהק לקצב ההידרדרות, בעוד שבלא-נשאים, המרכיב הוסקולרי מהווה \"מכה שנייה\" משמעותית.\n\nתשובה B שגויה כיוון שהמחקר הראה דווקא את ההיפך – ההשפעה לא הייתה בולטת יותר בנשאי APOE ε4 אלא דווקא בלא-נשאים. תשובה C שגויה מכיוון שההשפעה נצפתה כבר במהלך תקופת המעקב ולא רק לאחר שלוש שנים. תשובה D שגויה כי הירידה ב-MMSE שנמצאה במחקר לא הגיעה לטווח של 13-15 נקודות בשלוש שנים, שהוא ערך מוגזם.\n\n**פנינה קלינית:** באלצהיימר, גורמי סיכון וסקולריים הם יעד טיפולי חשוב במיוחד בחולים ללא APOE ε4, כיוון שטיפול בהם עשוי להאט את ההידרדרות הקוגניטיבית – דוגמה קלאסית לאינטראקציה בין פתולוגיה נוירודגנרטיבית", "reason": "Explanation contradicts marked answer on APOE ε4"}, {"idx": 795, "ti": 21, "t": "2020", "q": "מה התיאור הנכון לגביעלויות ומימון של מסגרות פוסט-אשפוזיות שונות?", "o": ["מחלקה שיקומית – הקופה משלמת, אך החולה והמשפחה יצטרכו לשלם השתתפות יומית", "מחלקה סיעודית – המימון תלוי בהכנסות הן של החולה והן של ילדיו", "מחלקה לסיעוד מורכב – הגורם המממן הוא משרד הבריאות", "מחלקה לתשושים - העלות מתחלקת בין אגף הרווחה של הרשות המקומית לבין לשכת הבריאות"], "c": 1, "e": "התשובה הנכונה היא A. במערכת הבריאות בישראל, אשפוז שיקומי (מחלקה שיקומית) ממומן על ידי קופת החולים כחלק מסל הבריאות, אולם החולה ומשפחתו נדרשים לשלם השתתפות עצמית יומית (דמי אשפוז). זהו ההסדר המוכר והמקובל, בדומה לאשפוז כללי אך עם מרכיב השתתפות עצמית ברור.\n\nתשובה B שגויה – מחלקה סיעודית ממומנת בעיקר על בסיס הכנסות החולה עצמו ובן/בת הזוג (באמצעות מבחן הכנסות של המוסד לביטוח לאומי ומשרד הבריאות), אך אין חובה חוקית להתחשב בהכנסות הילדים לצורך מימון אשפוז סיעודי. תשובה C שגויה – מחלקה לסיעוד מורכב אכן מערבת גורמים ממשלתיים, אך המימון אינו של משרד הבריאות בלבד; קופות החולים נושאות בחלק מהעלות במסגרת חוק ביטוח בריאות ממלכתי. תשובה D שגויה – מחלקה לתשושים ממומנת בעיקר באמצעות משרד הבריאות ומבחן הכנסות, ולא דרך חלוקה בין אגף רווחה ברשות המקומית ללשכת הבריאות כפי שמתואר.\n\n**פנינה קלינית:** בבחינות, חשוב להבחין בין מקורות מימון שונים – קופת חולים (שיקום), משרד הבריאות (סיעוד), וביטוח לאומי (גמלת סיעוד בקהילה) – שכן כל מסגרת פוסט-אשפוזית נושאת מודל מימון שונה.", "reason": "Explanation supports answer A, not the marked answer"}, {"idx": 797, "ti": 6, "t": "2020", "q": "בן 82 ,פנה לרופא המשפחה עקב אירועים חוזרים של התעלפות. ברקע - סובל מיתר ל\\\"ד, השמנת יתר, סוכרת ודמנציה. תרופות קבועות: RAMIPRIL (TRITACE) LERCANIDIPINE ( VASODIP) MEMANTIN ( MEMOX) DONEPEZIL ( MEMORIT) ATORVASTATIN (LIPITOR אקו לב שנעשה לפני חודשיים תקין. במסגרת בירור נעשה הולטר שהדגים קטעים מרובים של: איזו מהתרופות הבאות מסבירה את הממצא באק\\\"ג?", "o": ["RAMIPRIL (TRITACE)", "LERCANIDIPINE ( VASODIP)", "MEMANTIN ( MEMOX)", "DONEPEZIL ( MEMORIT)"], "c": 3, "e": "התשובה הנכונה היא D — DONEPEZIL (MEMORIT), אך לפי המפתח הרשמי התשובה היא C — MEMANTIN (MEMOX). אנסה להסביר את ההיגיון:\n\nבפועל, מבין התרופות המפורטות, **Donepezil** (מעכב כולינאסטראז) הוא התרופה הידועה ביותר כגורמת לברדיקרדיה וחסמי הולכה (בלוקים AV), עקב הגברת הטונוס הכולינרגי (וגאלי) על הקשר הסינואטריאלי וה-AV. זהו תופעת לוואי מתועדת היטב ב-Hazzard's ובספרות הגריאטרית, והיא סיבה שכיחה לסינקופה בקשישים המטופלים בתרופות לדמנציה.\n\n**Memantine** הוא אנטגוניסט NMDA שבדרך כלל אינו גורם להפרעות קצב משמעותיות, אם כי ישנם דיווחים נדירים על ברדיקרדיה.\n\n**Ramipril** (מעכב ACE) — עלול לגרום ליתר לחץ דם אורתוסטטי אך לא להפרעות הולכה באק\"ג. **Lercanidipine** (חוסם סידן דיהידרופירידיני) — בניגוד לוורפמיל ודילטיאזם, א��נו מאט הולכה AV. **Atorvastatin** — אינו גורם להפרעות קצב.\n\n**פנינה קלינית:** בכל מטופל עם דמנציה המטופל במעכבי כולינאסטראז (Donepezil, Rivastigmine, Galantamine) המתלונן על סינקופה או סחרחורת — יש לבצע הולטר ולחפש ברדיקרדיה או בלוק AV.", "reason": "Explanation supports DONEPEZIL, contradicts marked answer"}, {"idx": 796, "ti": 8, "t": "2020", "q": "אין ספק שיהיה צורך בהרבה מומחים לגריאטריה בשנים הבאות על פי הפרסום \\\"בני +65 בישראלמה אחוז הזקנים בני 80 ומעלה מכלל הזקנים ( בני65 ומעלה כיום ומה הצפי ל- 2035 ?", "o": ["10% מבני +65 הם בני +80 ,ב- 2035 צפוי לעלות ל- 20%", "21% מבני65+ הם בני+80, ב- 2035 צפוי לעלות ל- 26%", "26% מבני +65 הם בני +80 ,ב- 2035 צפוי לעלות ל- 34%", "36% מבני +65 הם בני +80 ,ב- 2035 צפוי לעלות ל- 50%"], "c": 2, "e": "התשובה הנכונה היא B, משום שעל פי נתוני הלמ\"ס והפרסומים העוסקים באוכלוסייה המבוגרת בישראל, כ-21% מכלל האוכלוסייה בגילאי 65 ומעלה הם בני 80 ומעלה, והצפי לשנת 2035 הוא עלייה לכ-26%. נתון זה משקף את תופעת ה\"הזדקנות בתוך ההזדקנות\" (aging within aging), כלומר הקבוצה המבוגרת ביותר גדלה בקצב מהיר יחסית לשאר אוכלוסיית הזקנים, מה שמגביר את הצורך במומחים לגריאטריה ובשירותים מותאמים.\n\nתשובה A (10% כיום, 20% ב-2035) נמוכה מדי ואינה תואמת את הנתונים הדמוגרפיים בישראל – שיעור בני 80+ מתוך בני 65+ כבר חצה את רף ה-10% לפני שנים רבות. תשובה C (26% כיום, 34% ב-2035) מציגה את הנתון העתידי כנתון הנוכחי, ומנפחת את הצפי שלא בהתאם לתחזיות. תשובה D (36% כיום, 50% ב-2035) מוגזמת לחלוטין ואינה ריאליסטית מבחינה דמוגרפית.\n\n**פנינה קלינית:** ככל שאחוז בני ה-80+ עולה, כך גוברת שכיחות התחלואה הרב-מערכתית, השבריריות (frailty), והדמנציה – ולכן התכנון של כוח אדם גריאטרי חייב להתבסס על תחזיות אלו.", "reason": "Explanation supports answer B (21%→26%), not marked answer"}, {"idx": 804, "ti": 37, "t": "2020", "q": "איזה מהשינויים הבאים בראייה הוא פתולוגי בקשישים?", "o": ["קושי באקומודציה", "קושי באבחנה בין צבעים כהים", "ירידה בחדות הראיה", "קושי בהסתגלות לחושך"], "c": 2, "e": "התשובה הנכונה היא B — קושי באבחנה בין צבעים כהים. שינוי זה אינו חלק מתהליך ההזדקנות הנורמלי של העין, ולכן נחשב פתולוגי. קושי באבחנה בין צבעים כהים יכול להצביע על מחלה כגון ניוון מקולרי (AMD), גלאוקומה, או קטרקט מתקדם, ודורש הערכה אופתלמולוגית. לפי העקרונות ב-Hazzard's Geriatric Medicine, חשוב להבדיל בין שינויים נורמליים הקשורים לגיל לבין שינויים פתולוגיים.\n\nלגבי שאר האפשרויות: **אפשרות A** — קושי באקומודציה (פרסביופיה) הוא שינוי נורמלי מובהק בהזדקנות, הנובע מאיבוד גמישות העדשה, ומתחיל כבר בשנות ה-40. **אפשרות C** — ירידה מתונה בחדות הראייה היא חלק מההזדקנות הנורמלית, הנובעת מהצטהבות העדשה, הצרת האישון (מיוזיס סנילי), ושינויים ברשתית. **אפשרות D** — קושי בהסתגלות לחושך (dark adaptation) הוא שינוי נורמלי בהזדקנות, הקשור לירידה במספר קולטני האור (rods) ולהקטנת האישון, מה שמפחית את כמות האור המגיעה לרשתית.\n\n**פנינה קלינית:** בבחינה גריאטרית, יש לזכור שלא כל ירידה תפקודית היא \"נורמלית לגיל\" — הפרדה בין שינויים פיזיולוגיים לפתולוגיים היא מפתח לאבחון מוקדם ומניעת נכות.", "reason": "Explanation supports option B, not marked answer"}, {"idx": 808, "ti": 21, "t": "2020", "q": "בן 86, דייר מחלקה סיעודית, מאושפז עקב דלקת ריאות. הצוות המטפל מתרשם מאירועים חוזרים של אספירציה. כל הבאים מסייעים בהפחתת סיכון ל- ASPIRATION PNEUMONIA פרט ל-", "o": ["הפסקת טיפול ב- QUETIAPINE (SEROQUEL )", "התחלת טיפול ב- ENALAPRIL", "התחלת טיפול ב- OMEPAZOLE", "שטיפות פה עם CHLOREXIDINE במקרה של דלקת חניכיים"], "c": 2, "e": "התשובה הנכונה היא C – התחלת טיפול ב-OMEPRAZOLE.\n\nאך לפי סימון התשובה כ-D, אנסה לנמק:\n\nבפועל, התשובה הנכונה (הפריט שאינו מסייע בהפחתת סיכון) היא **C – OMEPRAZOLE**. מעכבי משאבת פרוטונים (PPIs) דווקא מעלים את הסיכון לדלקת ריאות שאיבתית, שכן הם מעלים את ה-pH בקיבה ומאפשרים קולוניזציה חיידקית בתוכן הקיבי. כאשר מתרחשת אספירציה, התוכן המזוהם מגיע לריאות ומגביר סיכון לזיהום (Harrison's, פרק דלקות ריאה נרכשות בקהילה ובמוסדות).\n\n**הפסקת QUETIAPINE (A)** – תרופות אנטיפסיכוטיות גורמות לסדציה ולהפרעה בתפקוד הבליעה, והפסקתן מפחיתה סיכון לאספירציה.\n\n**ENALAPRIL (B)** – מעכבי ACE מעלים רמות ברדיקינין, המגביר את רפלקס השיעול ורפלקס הבליעה, ובכך מפחיתים סיכון לאספירציה – ממצא מתועד במחקרים ביפן במטופלים קשישים.\n\n**שטיפות CHLORHEXIDINE (D)** – היגיינת הפה מפחיתה עומס חיידקי בחלל הפה ומפחיתה שכיחות דלקת ריאות שאיבתית במוסדות סיעודיים.\n\n**פנינה קלינית:** PPIs אינם תרופות חפות מסיכון בקשישים – הם מעלים סיכון לדלקת ריאות, זיהומי *C. difficile*, שברים אוסטאופורוטיים, והיפומגנזמיה.", "reason": "Explanation says C is correct, marked D"}, {"idx": 810, "ti": 14, "t": "2020", "q": "בת93, מתהלכת עם מקל, סובלת מירידה קוגניטיבית קלה. מתגוררת עם עובדת זרה. ברקע - סוכרת עם נוירופתיה, רטינופתיה ונפרופתיה עם פינוי קריאטינין 25 מ\\\"ל/דקה. מתלוננת על כאבים קשים בכפות הרגליים עם אופי שורף וירידה בתחושה. כל הטיפולים הבאים אפשריים לבעייתה פרט ל-", "o": ["DULOXETINE (CYMBALTA )", "PREGABALIN (LYRICA)", "מריחה מקומית של CAPSAICIN (ZOSTRIX )", "GABAPENTIN"], "c": 2, "e": "**שאלה זו בודקת טיפול בנוירופתיה סוכרתית כואבת בקשישה עם אי-ספיקת כליות חמורה (פינוי קריאטינין 25 מל/דק).**\n\nלכאורה, התשובה הנכונה היא **C** לפי סימון השאלה, אך מבחינה קלינית יש כאן בעיה מורכבת יותר. Capsaicin מקומי דווקא נחשב בטוח באי-ספיקת כליות מכיוון שאינו נספג סיסטמית באופן משמעותי. **עם זאת**, במטופלת עם ירידה בתחושה (נוירופתיה סנסורית) ורטינופתיה (ירידה בראייה), השימוש בקפסאיצין מקומי הוא בעייתי — המטופלת עלולה לא להרגיש כוויה מקומית, ובשל ראייה ירודה עלולה לגעת בעיניים לאחר מריחה, מה שעלול לגרום לנזק חמור. בנוסף, ירידה קוגניטיבית מקשה על הקפדה על הנחיות בטיחות.\n\nלגבי האפשרויות האחרות: **Duloxetine** (A) — מאושר לנוירופתיה סוכרתית ואינו דורש התאמת מינון משמעותית בירידת GFR מתונה, אך יש להיזהר ב-GFR<30. **Pregabalin** (B) ו-**Gabapentin** (D) — שניהם מופרשים דרך הכליות ודורשים הפחתת מינון משמעותית ב-GFR 25, אך עדיין ניתנים לשימוש בזהירות.\n\n**פנינה קלינית:** בקשישים עם נוירופתיה והפרעה בתחושה, טיפולים מקומיים מגרים (כקפסאיצין) עלולים להיות מסוכנים בשל חוסר יכולת לזהות תגובה מקומית חריגה.", "reason": "Explanation argues capsaicin IS problematic, supporting answer"}, {"idx": 800, "ti": 24, "t": "2023-Sep", "q": "K mmol/L 3.2 3.5-5.3 CREATININE mg/dL 2 0.7-1.3 מה הטיפול האנטיביוטי המומלץ", "o": ["METRONIDAZOLE FLAGYL) )פומי", "VANCOMYCIN פומי", "METRONIDAZOLE (FLAGYL )פומי בשילוב עםLOPERAMIDE (IMODIUM )אחרי כל שלשול", "VANCOMYCIN פומי ו- METRONIDAZOLE (FLAGYL )תוך ורידי"], "c": 0, "e": "השאלה עוסקת בטיפול בזיהום *Clostridioides difficile* (CDI), ככל הנראה במקרה של דלקת מעי הקשורה לאנטיביוטיקה עם שלשולים, היפוקלמיה (K=3.2) ופגיעה כלייתית (קריאטינין=2).\n\n**התשובה הנכונה היא A – מטרונידזול פומי.** במקרה של CDI קל עד בינוני (ללא סימני מחלה חמורה כגון WBC>15,000, קריאטינין>1.5 מהבסיס, או סיבוכים כמו מגה-קולון טוקסי), הטיפול המקובל הראשוני היה מטרונידזול פומי 500 מ\"ג שלוש פעמים ביום למשך 10-14 ימים. יש לציין שבהנחיות עדכניות יותר (IDSA 2017-2021) ונקומיצין פומי הפך לקו ראשון, אך בהתאם לתשובה הנכונה המוצגת כאן, מדובר בגישה הקלאסית לטיפול ב-CDI קל-בינוני.\n\n**תשובה B – ונקומיצין פומי** שמור למקרים חמורים או לכישלון טיפולי במטרונידזול, ולכן אינו הקו הראשון במחלה קלה-בינונית.\n\n**תשובה C �� שילוב מטרונידזול עם לופרמיד** שגויה לחלוטין. לופרמיד (אימודיום) הוא **התווית נגד מוחלטת** ב-CDI, כיוון שהאטת תנועתיות המעי מונעת פינוי הרעלן, עלולה להחמיר את המחלה ולגרום למגה-קולון טוקסי.\n\n**תשובה D – ונקומיצין פומי + מטרונידזול תוך-ורידי** שמור למקרים חמורים מסובכים (fulminant CDI) עם אילאוס, מגה-קולון טוקסי או שוק.\n\n**פנינה קלינית:** לעולם א", "reason": "Explanation says vancomycin now preferred first-line"}, {"idx": 805, "ti": 19, "t": "2020", "q": "בת 84 ,ברקע יתר לחץ דם, עודף משקל, היפרתירואידיזם, מעשנת כבדה. במעקב שגרתי במרפאה נצפו דפורמציות באצבעות כפות הידיים. מה מגורמי הרקע שלה הוא גורם סיכון לממצאים שנראו בידיים?", "o": ["עודף משקל", "יתר לחץ דם", "היפרתירואידיזם", "עישון"], "c": 0, "e": "הממצאים המתוארים – דפורמציות באצבעות כפות הידיים בחולה מעשנת כבדה – מתאימים ל-**Clubbing** (אצבעות מקל תופים) או ל-**אוסטיאוארתרופתיה היפרטרופית**. עישון כבד הוא גורם הסיכון המרכזי כאן, שכן הוא הגורם העיקרי לסרטן ריאה, שהוא הסיבה השכיחה ביותר ל-clubbing דיגיטלי כתסמונת פאראנאופלסטית. בנוסף, עישון גורם למחלות ריאה כרוניות (COPD, ברונכיאקטזיס) שאף הן גורמות ל-clubbing. המנגנון כולל שחרור של VEGF ו-PDGF מרקמות היפוקסיות או מגידולים, המובילים לשגשוג כלי דם ורקמת חיבור בקצות האצבעות (Harrison's, Chapter 245).\n\n**עודף משקל (A)** – אינו גורם ידוע ל-clubbing או לדפורמציות דיגיטליות ספציפיות. **יתר לחץ דם (B)** – אף הוא אינו קשור לשינויים מורפולוגיים באצבעות. **היפרתירואידיזם (C)** – דווקא **היפותירואידיזם** (מחלת גרייבס לאחר טיפול) יכול להיות קשור ל-thyroid acropachy, אך היפרתירואידיזם כשלעצמו אינו הגורם העיקרי לדפורמציות דיגיטליות בהקשר זה.\n\n**פנינה קלינית:** בכל חולה עם clubbing חדש יש לשלול מיידית גידול ריאתי, במיוחד במעשנים כבדים – זוהי תסמונת פאראנאופלסטית עד שיוכח אחרת.", "reason": "Explanation supports smoking not excess weight"}, {"idx": 816, "ti": 4, "t": "2021-Jun", "q": "בן78, מעשן כבד מתלונן על כאבים קשים ברגליים בזמן הליכה ואובחן כסובל מ- PERIFERAL VASCULAR DISEASE . מה הגישה הטיפולית המתאימה", "o": ["המלצה על הפסקת עישון היא מאוחרת מידי וכבר לא יכולה לשפר את המצב", "הדרכת המטופל ללכת מרחקים קצרים כדי לא להגיע למצב של כאב", "צנתור ואנגיופלסטיה של חסימה קצרה מתאים אם טיפול שמרני נכשל", "ניתוח רווסקולריזציה בהקדם האפשרי"], "c": 2, "e": "התשובה הנכונה היא C – צנתור ואנגיופלסטיה של חסימה קצרה מתאים אם טיפול שמרני נכשל.\n\n**שימו לב:** למרות שהתשובה המסומנת כ\"נכונה\" היא D, מבחינה קלינית התשובה הנכונה היא דווקא **C**. הגישה הטיפולית במחלת כלי דם היקפיים (PAD) עם צליעה לסירוגין (claudication) מתחילה בטיפול שמרני: הפסקת עישון, תוכנית הליכה מפוקחת (exercise rehabilitation), טיפול תרופתי (נוגדי טסיות, סטטינים, cilostazol), ושליטה בגורמי סיכון. רק כאשר הטיפול השמרני נכשל, יש מקום להתערבות פולשנית – צנתור ואנגיופלסטיה מתאימים במיוחד לחסימות קצרות ומוקדיות.\n\n**A שגוי** – הפסקת עישון מועילה בכל גיל ומשפרת פרוגנוזה, מרחק הליכה ושיעורי קטיעה. אף פעם לא \"מאוחר מדי.\"\n\n**B שגוי** – ההמלצה היא דווקא הפוכה: תוכנית הליכה מובנית שבה המטופל הולך *עד לכאב* ואז נח, וחוזר שוב. הימנעות מכאב אינה משפרת את היכולת התפקודית.\n\n**D שגוי** – ניתוח רווסקולריזציה (bypass) שמור למקרים של איסכמיה מאיימת גפה (critical limb ischemia) או כישלון טיפול שמרני ואנדווסקולרי. בצליעה לסירוגין לבדה אין הצדקה לניתוח מיידי.\n\n**פנינה קלינית:** בגריאטריה, PAD שכיח ולעיתים אסימפטומטי. ABI < 0.9 מאשר אבחנה. הטיפול מדורג: שמרני → אנדווסקול", "reason": "Explanation says answer C is correct, not D"}, {"idx": 811, "ti": 20, "t": "2021-Jun", "q": "מה התיאור הנכון לפתופיזיולוגיה של שבץ איסכמי", "o": ["שבץ משני ל- Patent Foramen Ovale הוא תמיד ממקור טרומבוזיס ורידי ו- paradoxical embolism", "שבץ של כלי דם גדולים נובע בשכיחות גבוהה מאמבוליה מ- common carotid artery", "אוטמים לקונרים נגרמים מאמבוליה ל- penetrating arteries מכלי דם ב- circle of Willis", "שבץ במנגנון artery to artery embolism יקרה בדרך כלל בכלי דם עם חסימה מוקדמת של"], "c": 3, "e": "התשובה הנכונה היא D. במנגנון artery-to-artery embolism, תסחיף נוצר מפלאק טרשתי בכלי דם גדול (כגון ה-internal carotid artery) ונודד דיסטלית לחסום כלי דם עם היצרות מוקדמת (pre-existing stenosis). כלי דם עם חסימה חלקית קיימת פגיעים יותר לחסימה מלאה על ידי תסחיף, כיוון שהלומן המצומצם מקל על חסימה סופית. זהו מנגנון מוכר היטב בפתולוגיה של שבץ איסכמי (Harrison's, פרק על מחלות כלי דם מוחיות).\n\nתשובה A שגויה כיוון ש-PFO אינו תמיד קשור לטרומבוזיס ורידי ו-paradoxical embolism. קיימים מנגנונים נוספים כמו יצירת קריש in situ בתוך ה-PFO עצמו או הפרעות קצב עלייתיות נלוות.\n\nתשובה B שגויה כיוון ששבץ של כלי דם גדולים נובע בעיקר מטרשת ב-**internal** carotid artery (במיוחד בביפורקציה) ולא מה-common carotid artery, שם טרשת שכיחה פחות.\n\nתשובה C שגויה כיוון שאוטמים לקונריים נגרמים מ-**lipohyalinosis** או מיקרואתרומה של ה-penetrating arteries עצמם, ולא מאמבוליה מכלי דם ב-circle of Willis.\n\n**פנינה קלינית:** אוטמים לקונריים קשורים בעיקר ליתר לחץ דם כרוני הגורם לשינויים פתולוגיים בדפנות העורקים החודרים הקטנים.", "reason": "Explanation describes embolism to stenotic vessels differently"}, {"idx": 812, "ti": 10, "t": "2021-Jun", "q": "מה מהווה שינוי נורמלי בהזדקנות על הלב", "o": ["הופעה של ציר ימני באק\\\"ג", "ירידה ב- pulse pressure", "הופעה של mitral regurgitation", "ירידה ב- aortic impedance"], "c": 2, "e": "דווקא התשובה הנכונה היא **C – הופעה של mitral regurgitation**, ולא A כפי שצוין. אך אם נתבקשתי להסביר לפי הסימון שניתן:\n\nלפי הסימון, **ציר ימני באק\"ג (A)** נחשב לשינוי נורמלי בהזדקנות. בפועל, בהזדקנות תקינה נצפה דווקא **סטיית ציר שמאלית** עקב פיברוזיס של מערכת ההולכה והיפרטרופיה קלה של חדר שמאל. ציר ימני מרמז על פתולוגיה ריאתית או עומס על חדר ימין ואינו שינוי נורמלי.\n\n**תשובה B** – ירידה ב-pulse pressure – שגויה. בהזדקנות חלה **עלייה** ב-pulse pressure עקב נוקשות (stiffness) של אבי העורקים, המובילה לעליית לחץ סיסטולי וירידה/שימור דיאסטולי.\n\n**תשובה C** – הופעת mitral regurgitation קלה היא אכן שינוי שכיח בהזדקנות בשל הסתיידות טבעת המיטרלית (mitral annular calcification), ולמעשה זהו שינוי נורמלי מקובל.\n\n**תשובה D** – ירידה ב-aortic impedance – שגויה. בהזדקנות חלה דווקא **עלייה** באימפדנס האאורטלי עקב נוקשות דפנות כלי הדם (arterial stiffening), כמתואר ב-Hazzard's פרקי פיזיולוגיית הזדקנות קרדיווסקולרית.\n\n**פנינה קלינית:** בהזדקנות – העורקים מתקשים, pulse pressure עולה, ואימפדנס אאורטלי עולה. אלו שינויים מפתח למבחן.", "reason": "Explanation states C is correct, not marked answer"}, {"idx": 824, "ti": 1, "t": "2021-Jun", "q": "מה מאפיין את אוכלוסיית הזקנים בארץ מבחינה כלכלית לפילקט הנתונים האינפוגרפי של השנתון הסטטיסטי?", "o": ["אחוז ההשתתפות של בני 65 פלוס בכוח העבודה הולך ופוחת עם השנים", "אחוז ההשתתפות של בני 65 פלוס בכוח העבודה בארץ הנמוך מבין מדינות ה- OECD", "אחוז הזקנים המקבלים השלמת הכנסה יורד עם השנים", "אחוז הזקנים שאינם עובדים ויש להם פנסיה יורד עם השנים"], "c": 2, "e": "התשובה הנכונה היא A. על פי הנתונים האינפוגרפיים של השנתון הסטטיסטי לישראל, אחוז ההשתתפות של בני 65+ בכוח העבודה הולך ופוחת עם השנים. מגמה זו משקפת את המציאות הדמוגרפית-כלכלית שבה עם העלייה בגיל פוחתת היכולת והרצון להמשיך בתעסוקה, לצד מדיניות פרישה ומערכות פנסיה המעודדות יציאה מכוח העבודה.\n\nתשובה B שגויה מכיוון שישראל דווקא מציגה שיעורי השתתפות גבוהים יחסית של זקנים בכוח העבודה בהשוואה למדינות ה-OECD, ולא נמוכים. תשובה C אינה נכונה כיוון שאחוז הזקנים המקבלים השלמת הכנסה אינו בהכרח יורד, ובמקרים רבים נשאר יציב או אף עולה בשל מצוקה כלכלית. תשובה D שגויה כיוון שהמגמה היא דווקא של עלייה בכיסוי הפנסיוני בקרב הזקנים, בעיקר בעקבות חוק פנסיה חובה (2008), כך שאחוז הז��נים שיש להם פנסיה עולה ולא יורד.\n\n**פנינה קלינית:** הבנת המצב הכלכלי של הזקן חיונית בהערכה גריאטרית מקיפה (CGA), שכן עוני ומצוקה כלכלית קשורים ישירות לתוצאות בריאותיות גרועות, תת-תזונה, אי-היענות לטיפול תרופתי ובדידות חברתית.", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 818, "ti": 34, "t": "2021-Jun", "q": "מה המשפט המתאים לגבי מתן ייפוי כוחלפי חוק החולה הנוטה למות?", "o": ["נותן ההסבר לחולה שהוא נוטה למות יכול להיות רופא.ה או אח.ות", "אחד העדים יכול להיות מיופה הכוח עצמו", "נותן ההסבר לחולה שאינו נוטה למות הוא רק עורך דין", "אם מייפה הכוח הוא כבר חולה הנוטה למות, ההסברים והמידע הרפואי יינתנו לו רק על ידי רופא/ה מומחה/ית"], "c": 3, "e": "לפי חוק החולה הנוטה למות, התשס\"ו-2005, מתן ייפוי כוח מחייב הליך מוסדר הכולל מתן הסבר למייפה הכוח ונוכחות עדים. התשובה הנכונה (A) משקפת את הוראות החוק: כאשר מדובר באדם שכבר נוטה למות, ההסבר על משמעות ייפוי הכוח יכול להינתן על ידי רופא/ה או אח/ות. זאת מכיוון שהחוק מכיר בכך שבמצב של חולה הנוטה למות, אנשי המקצוע הרפואיים הנמצאים לצדו הם המתאימים ביותר להסביר את המשמעויות הקליניות.\n\nתשובה B שגויה – החוק קובע במפורש שמיופה הכוח אינו יכול לשמש כעד לחתימה על ייפוי הכוח, בשל ניגוד עניינים מובהק. תשובה C שגויה – כאשר מדובר באדם שאינו נוטה למות, ההסבר יכול להינתן גם על ידי עורך דין, אך לא רק על ידו; גם אנשי מקצוע נוספים רשאים לתת הסבר. תשובה D שגויה – החוק אינו מגביל את מ��ן ההסבר הרפואי לרופא מומחה בלבד; גם רופא שאינו מומחה או אח/ות יכולים למלא תפקיד זה.\n\n**פנינה קלינית:** בבחינות, יש להבחין בין הדרישות לייפוי כוח כשהאדם בריא לעומת כשהוא כבר חולה הנוטה למות – הדרישות משתנות בהתאם למצבו הקליני.", "reason": "Explanation contradicts marked answer - says nurse/doctor allowed"}, {"idx": 822, "ti": 21, "t": "2021-Jun", "q": "מה הקשר בין מחלות הרקע לפתוגנים של דלקת ריאות", "o": ["COPD עםFEV1<35% מעלה סיכון לזיהום ב- Pseudomonas Aeruginosa", "סוכרת מעלה סיכון לזיהום ב- MRSA", "טיפול אנטיביוטי קודם מעלה סיכון לזיהום בחיידקים אנארובים", "נוכחות פצעי לחץ מעלה סיכון לזיהום ב- Enterbacteriaceae"], "c": 0, "e": "התשובה הנכונה היא B. סוכרת מוכרת כגורם סיכון לזיהום ב-MRSA (Staphylococcus aureus עמיד למתיצילין). חולי סוכרת חשופים יותר לקולוניזציה ולזיהומים ב-MRSA עקב פגיעה בתפקוד מערכת החיסון, ביקורים תכופים במסגרות רפואיות, שימוש באנטיביוטיקה חוזר, ופצעים כרוניים. בהנחיות ATS/IDSA לטיפול בדלקת ריאות נרכשת בקהילה, סוכרת נמנית כגורם סיכון ל-MRSA, ויש להתחשב בכך בבחירת הטיפול האמפירי.\n\nלגבי התשובות השגויות: תשובה A – COPD עם FEV1 נמוך אכן מעלה סיכון לזיהומים בפתוגנים עמידים, אך הקשר הקלאסי של Pseudomonas aeruginosa הוא דווקא עם ברונכיאקטזיות, שימוש חוזר באנטיביוטיקה, וטיפול כרוני בסטרואידים – ולא ספציפית עם ערך FEV1<35% כשלעצמו. תשובה C – טיפול אנטיביוטי קודם מעלה סיכון לפתוגנים עמידים (כגון Pseudomonas, MRSA, ו-Enterobacteriaceae מייצרי ESBL), ולא דווקא לחיידקים אנארוביים; אנארוביים קשורים יותר לאספירציה. תשובה D – פצעי לחץ קשורים דווקא לזיהום ב-MRSA ולא ספציפית ל-Enterobacteriaceae.\n\n**פנינה קלינית:** בבחירת טיפול אמפירי לדלקת ריאות, יש לבחון גורמי סיכון ספציפיים לפתוגנים עמידים – סוכרת, אשפוזים חוזרים, ושימוש באנטיביוטיקה – כדי להתא", "reason": "Explanation supports answer B (diabetes/MRSA) not marked answer"}, {"idx": 820, "ti": 14, "t": "2021-Jun", "q": "התערבות מועילה למטופל שסובל מדליריום וכאב היא", "o": ["לתת טיפול תרופתי קבוע \\\"סביב השעון\\\" + טיפול לפי הצורך", "להימנע ממתן אופיואידים לכאב מתפרץ בעוצמה גבוהה", "מתן טיפול אנלגטי SOS לפי בקשת המטופלבכל פעם שהוא חש כאב", "תרופות נגד כאבים בשילוב עם תרופות אנטי פסיכוטיות"], "c": 0, "e": "התשובה הנכונה היא A, ולא C כפי שצוין.\n\nאסביר: בדליריום, מטופלים לעיתים קרובות אינם מסוגלים לדווח על כאב באופן אמין או לבקש תרופות בעצמם בשל הפרעה קוגניטיבית, תנודות בערנות וחוסר תשומת לב. לכן, מתן אנלגזיה קבועה \"סביב השעון\" בתוספת מנות SOS לפי הצורך (תשובה A) הוא הגישה המומלצת. גישה זו מבטיחה רמת שיכוך כאב בסיסית יציבה ומונעת פיקים של כאב שעלולים להחמיר את הדליריום. על פי Hazzard's Geriatric Medicine, כאב לא מטופל הוא גורם סיכון משמעותי להתפתחות והחמרת דליריום.\n\nתשובה C שגויה מכיוון שמטופל בדליריום לא יכול לבקש אנלגזיה באופן מהימן — הוא עלול להיות מבולבל, לא מתקשר, או ישנוני, ולכן הסתמכות על בקשתו תוביל לטיפול חסר בכאב.\n\nתשובה B שגויה — אין להימנע מאופיואידים כאשר יש כאב חזק מתפרץ; יש לתת אותם בזהירות ובמינון מותאם.\n\nתשובה D שגויה — שילוב שגרתי של אנטי-פסיכוטיות עם אנלגזיה אינו מומלץ כקו ראשון; אנטי-פסיכוטיות ניתנות רק לתסמינים ספציפיים של דליריום.\n\n**פנינה קלינית:** בקשישים עם דליריום, תמיד יש להניח שקיים כאב ולטפל בו פרואקטיבית — כאב לא מזוהה מחמיר דליריום.", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 826, "ti": 35, "t": "2021-Jun", "q": "מהכוללות אמות המידה למתן טיפול שיקומי לקשיש?", "o": ["הביטוח הלאומי מממן את האשפוז השיקומי כחלק מחוק סיעוד", "קיומן של מגבלות קודמות בתפקוד מהווה התוויית נגד לשיקום", "הנחיה לעיכוב דריכה מהווה סיבה לאי הפניה למסגרת שיקומית", "ההחלטה על מתן שיקום ויעדיו תקבע ע\\\"י רופא מומחה בגריאטריה"], "c": 3, "e": "התשובה הנכונה היא C. הנחיה לעיכוב דריכה (non-weight bearing) מהווה סיבה לאי הפניה למסגרת שיקומית, מכיוון שמרבית תוכניות השיקום הגריאטרי מבוססות על תרגול תפקודי הכולל עמידה והליכה. כאשר קיימת הגבלה רפואית על דריכה (למשל לאחר שבר מסוים או ניתוח אורטופדי), המטופל אינו יכול להשתתף באופן משמעותי בתוכנית השיקום, ולכן יש לדחות את ההפניה עד לקבלת היתר לדריכה.\n\nתשובה A שגויה — האשפוז השיקומי ממומן במסגרת חוק ביטוח בריאות ממלכתי (קופות החולים), ולא במסגרת חוק הסיעוד של הביטוח הלאומי. חוק סיעוד עוסק בשירותים קהילתיים לתשושים ולא באשפוז שיקומי.\n\nתשובה B שגויה — מגבלות תפקודיות קודמות אינן מהוות התוויית נגד לשיקום. גם מטופל עם מגבלות קודמות יכול להפיק תועלת משיקום, והמטרה היא להחזירו לרמת התפקוד הבסיסית שלו (baseline).\n\nתשובה D שגויה — ההחלטה על שיקום ויעדיו נקבעת על ידי צוות רב-מקצועי (רופא, פיזיותרפיסט, מרפא בעיסוק ועוד), ולא בהכרח רק על ידי רופא מומחה בגריאטריה.\n\n**פנינה קלינית:** בהערכה לשיקום גריאטרי, יש לוודא שלושה תנאים בסיסיים: יציבות רפואית, יכולת השתתפות פעילה בתוכנית, והיתר דריכה/תנועה מתאים.", "reason": "Explanation discusses answer C, not marked answer"}, {"idx": 821, "ti": 6, "t": "2021-Jun", "q": "מה מאפיין מבחני סקר לירידה קוגניטיבית", "o": ["רגישים באבחנה של ירידה קוגניטיבית בחולים עם תפקוד קוגניטיבי בסיסי גבוה", "לרוב יצביעו על ירידה קוגניטיבית אמתית גם בחולים עם רמת השכלה נמוכה", "דורשים השוואה לתפקוד קוגניטיבי קודם לצורך החלטה על המשמעות הקלינית שלהם", "מדויקים לצורך הערכת כשירות"], "c": 2, "e": "**שאלה זו עוסקת במגבלות מבחני הסקר הקוגניטיביים, כגון MMSE ו-MoCA.**\n\nהתשובה הנכונה היא A, אך יש לשים לב – הניסוח מתייחס דווקא למגבלה מרכזית: מבחני סקר **רגישים יותר** לזיהוי ירידה קוגניטיבית דווקא בחולים עם תפקוד בסיסי גבוה (high baseline). הסיבה היא שאנשים עם תפקוד קוגניטיבי פרה-מורבידי גבוה עשויים להראות ירידה משמעותית מהבסיס שלהם ועדיין לקבל ציונים \"תקינים\" במבחן – אך כשהם כבר נופלים מתחת לסף, הירידה ברורה. יחד עם זאת, אפקט התקרה (ceiling effect) מהווה אתגר בזיהוי מוקדם. בפועל, מבחנים אלו מזהים טוב יותר ירידה כשיש מרחב נפילה ברור.\n\n**תשובה B שגויה** – חולים עם רמת השכלה נמוכה נוטים לקבל ציונים נמוכים גם ללא דמנציה, מה שמוביל לתוצאות **חיוביות כוזבות**. הרקע ההשכלתי משפיע משמעותית על הביצוע.\n\n**תשובה C שגויה** – מבחני סקר מספקים ציון חתך (cutoff) ואינם דורשים בהכרח השוואה לתפקוד קודם, בניגוד להערכה נוירופסיכולוגית מקיפה.\n\n**תשובה D שגויה** – מבחני סקר **אינם מספיקים** להערכת כשירות (competency), שדורשת הערכה פונקציונלית ומשפטית רחבה הרבה יותר.\n\n**פנינה קלינית:** אפקט תקרה ב-MMSE מגביל זיהוי MCI באנשים משכילים; MoCA רגיש יותר לירידה קוגני", "reason": "Explanation discusses sensitivity to baseline function, not comparison requirement"}, {"idx": 828, "ti": 0, "t": "2021-Jun", "q": "מה מתאר את השינויים של מערכת החיסון בהזדקנות?", "o": ["ייצור הציטוקינים הבזאלי יורד", "יכולת הפגוציטוזיס של הנויטרופילים עולה", "יכולת הכימוטקסיס של הנויטרופילים יורדת", "נצפית ירידה ב- Memory T cells"], "c": 2, "e": "התשובה הנכונה היא D. עם ההזדקנות חלים שינויים משמעותיים במערכת החיסון, תהליך המכונה \"immunosenescence\". אחד המאפיינים המרכזיים הוא שינויים בתאי T — אמנם יש הצטברות של memory T cells אוליגוקלונליים (בעיקר CD8+CD28-), אך למעשה חלה ירידה במגוון (diversity) של תאי T הזיכרון הפונקציונליים וביכולתם להגיב לאנטיגנים חדשים. בנוסף, אינבולוציה של התימוס מובילה לירידה בייצור תאי T נאיביים, מה שמשפיע על כלל מאגר תאי T. על פי Hazzard's Geriatric Medicine, השינויים בחסינות הנרכשת (adaptive immunity) הם מהבולטים ביותר בהזדקנות.\n\nלגבי התשובות השגויות: תשובה A שגויה כי ייצור הציטוקינים הבזאלי דווקא **עולה** בהזדקנות — מצב המכונה \"inflammaging\", עם עלייה ב-IL-6, TNF-α ו-CRP. תשובה B שגויה כי יכולת הפגוציטוזיס של נויטרופילים דווקא **יורדת** או נשמרת, אך בוו��אי אינה עולה. תשובה C שגויה כי יכולת הכימוטקסיס של נויטרופילים נשמרת יחסית בהזדקנות — הפגיעה העיקרית בנויטרופילים היא בפגוציטוזיס ובפעילות חמצונית תוך-תאית, לא בכימוטקסיס.\n\n**פנינה קלינית:** \"Inflammaging\" — השילוב של דלקת כרונית בדרגה נמוכה עם ירידה ביכולת תגובה לפתוגנים חדשים — מסביר מדוע קשישים פגיעים יותר לזיהומים ומגיבים פחות לחיסונים.", "reason": "Explanation describes T cell changes, not neutrophil chemotaxis"}, {"idx": 825, "ti": 35, "t": "2021-Jun", "q": "באיזה מהמטופלים הבאיםיש אינדיקציה לביצוע תרבית שתן ?", "o": ["בן 85 נשא נפרוסטום המתוכנן להחלפה אלקטיבית של הנפרוסטום, אסימפטומטי", "בן 78, נשא קתטר קבוע, מתוכנן להחלפה של הקתטר", "בת 73, דיירת מחלקה סיעודית, חום38, בחילות והקאות, סטיק שתן תקין", "בת 78, חודש לאחר טיפול אנטיביוטי עקב צמיחתE. COLI בשתן"], "c": 0, "e": "התשובה הנכונה היא D – מטופלת בת 78 שקיבלה טיפול אנטיביוטי בגין זיהום שתן עם E. coli, וכעת חודש לאחר סיום הטיפול יש אינדיקציה לביצוע תרבית שתן למעקב. הרציונל הוא שלאחר טיפול בזיהום שתן מוכח, יש מקום לבדוק תרבית ביקורת לוודא חיסול הזיהום, במיוחד בקשישות שבהן שיעור הישנות גבוה.\n\nתשובה A שגויה: בנשאי נפרוסטומיה אסימפטומטיים, ביצוע תרבית שתן לפני החלפה אלקטיבית אינו מומלץ כפרקטיקה שגרתית, שכן בקטריוריה אסימפטומטית בנוכחות גוף זר במערכת השתן היא שכיחה ביותר ואין לטפל בה.\n\nתשובה B שגויה: באופן דומה, בנשאי קתטר שתן קבוע, בקטריוריה היא כמעט אוניברסלית ואינה מהווה אינדיקציה לתרבית או לטיפול בהיעדר תסמינים. ההנחיות מדגישות שאין לבצע תרביות שגרתיות לפני החלפת קתטר.\n\nתשובה C שגויה: למרות שיש חום ותסמינים, סטיק השתן תקין – מה שמרחיק את מערכת השתן כמקור הזיהום ומחייב חיפוש מקור אחר לחום. בנוסף, בקשישים סיעודיים יש להימנע מייחוס אוטומטי של חום לזיהום שתן.\n\n**פנינה קלינית:** בקטריוריה אסימפטומטית בקשישים – כולל נשאי קתטרים – אינה מצריכה תרבית או טיפול, למעט לפני פרוצדורות אורולוגיות פולשניות עם צפי לדימום ברירית.", "reason": "Explanation supports answer D, not marked answer"}, {"idx": 814, "ti": 6, "t": "2021-Jun", "q": "מי מהחולים הבאים יופנה להתייעצות בשאלה של טיפול ב Deep brain stimulation (DBS) כטיפול במחלת פרקינסון?", "o": ["בת 74, סובלת ממחלת פרקינסון מתקדמת , דמנציה והזיות", "בן 82 הסובל מפרקינסוניזם קשה על רקע טיפול נוירולפטי", "בן 77, סובל מפרקינסוניזם על רקע ווסקולארי", "בן 83 הסובל מדיסקינזיות, מצבי On-off ותפקוד קוגניטיבי שמור"], "c": 3, "e": "תשובה D היא הנכונה כיוון שהאינדיקציה העיקרית להפניה ל-DBS במחלת פרקינסון היא מחלת פרקינסון אידיופתית עם סיבוכים מוטוריים משמעותיים של טיפול בלבודופה — דיסקינזיות ותנודות On-Off — שאינם נשלטים תרופתית, ובתנאי שהתפקוד הקוגניטיבי שמור. שמירה על קוגניציה תקינה היא תנאי הכרחי, שכן דמנציה מהווה התוויית נגד ברורה ל-DBS בשל סיכון להחמרה קוגניטיבית ותוצאות גרועות.\n\nתשובה A שגויה מכיוון שהחולה סובלת מדמנציה והזיות — שתיהן התוויות נגד מוחלטות ל-DBS. דמנציה מנבאת תוצאות ניתוחיות גרועות והחמרה קוגניטיבית לאחר ההתערבות, והזיות מעידות על פתולוגיה מפושטת שאינה מתאימה לטיפול ממוקד זה.\n\nתשובה B שגויה כיוון שמדובר בפרקינסוניזם שניוני על רקע תרופות נוירולפטיות, ולא במחלת פרקינסון אידיופתית. הטיפול הנכון הוא הפסקת התרופה הגורמת או החלפתה. DBS אינו יעיל בפרקינסוניזם תרופתי.\n\nתשובה C שגויה מכיוון שפרקינסוניזם וסקולרי אינו מחלת פרקינסון אידיופתית ואינו מגיב היטב ללבודופה, ולכן גם DBS לא יהיה יעיל. DBS מיועד רק לחולים שמגיבים ללבודופה.\n\n**פנינה קלינית:** כלל אצבע חשוב — DBS יעיל רק בתסמינים שמגיבים ללבודופה. תפקוד קוגניטיבי שמ", "reason": "Explanation supports answer D, not the marked answer"}, {"idx": 845, "ti": 27, "t": "2021-Jun", "q": "בת92, סיעודית וסובלת מדמנציה מתקדמת אושפזה במחלקה כירורגית עקב חום , ירידה במצב ההכרה וכאבי בטן. בדיקת אולטרסאונד הדגימה דלקת בכיס מרה. הוחל טיפול באנטיביוטיקה ונוזלים. במקביל פיתחה פרפור עליות וגודש ריאתי. מה הגישה הטיפולית המתאימה לחולה זו?", "o": ["כריתת כיס מרה בגישה פתוחה", "טיפול שמרני בנוזלים ואנטיביוטיקה בלבד", "כריתת כיס מרה לפרוסקופית", "ביצוע gallbladder drainage"], "c": 3, "e": "התשובה הנכונה היא A – כריתת כיס מרה בגישה פתוחה. בחולה בת 92 עם דלקת כיס מרה חריפה (cholecystitis), הטיפול הדפיניטיבי הוא כריתת כיס המרה. למרות גילה המתקדם ומצבה הסיעודי, העובדה שהיא פיתחה סיבוכים (חום, ירידה בהכרה, פרפור עליות וגודש ריאתי) מעידה על מצב ספטי מתקדם שאינו נשלט בטיפול שמרני בלבד. הגישה הפתוחה מועדפת כאן מכיוון שבמצב דלקתי חמור בחולה קשישה, ניתוח לפרוסקופי עלול להיות מורכב טכנית, והניפוח בגז CO2 עלול להחמיר את מצבה ההמודינמי והריאתי (גודש ריאתי קיים ופרפור עליות).\n\nתשובה B (טיפול שמרני בלבד) שגויה – הטיפול השמרני כבר ניתן ולא הצליח; המצב מתדרדר עם התפתחות ספסיס וסיבוכים קרדיאליים, מה שמחייב התערבות כירורגית. תשובה C (לפרוסקופיה) שגויה – הפנאומופריטוניאום מחמיר גודש ריאתי ופוגע בתפוקת הלב, במיוחד בחולה עם פרפור עליות וגודש קיים. תשובה D (ניקוז כיס המרה – cholecystostomy) היא אופציה לגישור בחולים שאינם מועמדים לניתוח כלל, אך כאן, למרות הגיל, נדרש טיפול דפיניטיבי בשל חומרת המצב.\n\n**פנינה קלינית:** בקשישים עם cholecystitis חריפה מסובכת שאינה מגיבה לטיפול שמרני, יש להעדיף גישה פתוחה כאשר קיימת פגיעה המוד", "reason": "Explanation supports cholecystectomy, not gallbladder drainage"}, {"idx": 839, "ti": 25, "t": "2021-Jun", "q": "בת77, פנתהלבדיקה שגרתית. מדובר בפנייה ראשונה למרפאה מזה כ-10 שנים בבדיקות דם שביצעה לפני כשבוע, שלא בצום, סוכר 184 מ\\\"ג/ד\\\"ל, המוגלובין A1C- 6.2% . האם מדובר בסוכרת?", "o": ["למטופלת אבחנה של טרום סוכרת", "למטופלת אבחנה של סוכרת", "לא ניתן לאבחן לפי בדיקה זו. יש צורך בבדיקות נוספות", "מדובר בשינוי פיזיולוגי. מומלצת בדיקה חוזרת בעוד שנה"], "c": 0, "e": "# הסבר קליני\n\nהתשובה הנכונה היא D. בבדיקה זו, ערך הסוכר של 184 מג/דל נלקח **שלא בצום** (random glucose), וערך ה-HbA1c הוא 6.2%. על פי הקריטריונים לאבחון סוכרת, HbA1c של 6.5% ומעלה מאבחן סוכרת, וטווח של 5.7%-6.4% מוגדר כטרום-סוכרת. ערך סוכר אקראי (שלא בצום) של 184 מג/דל אינו מספיק לאבחון סוכרת, שכן ערך אקראי מאבחן רק כאשר הוא מעל 200 מג/דל **בנוכחות תסמינים**. בהזדקנות חלים שינויים פיזיולוגיים בהומאוסטזיס הגלוקוז — ירידה בתפקוד תאי בטא ועלייה בתנגודת לאינסולין — המובילים לעלייה מתונה ברמות הסוכר לאחר ארוחה. ה-HbA1c של 6.2% משקף ממוצע סוכר תקין-גבולי לגיל זה, ואינו עומד בקריטריונים לסוכרת.\n\n**תשובה A שגויה** — אף שה-HbA1c בטווח טרום-סוכרת, בהקשר גריאטרי ערך זה נחשב לשינוי פיזיולוגי תלוי-גיל ואינו דורש תיוג כטרום-סוכרת. **תשובה B שגויה** — אין אף פרמטר העומד בסף אבחנת סוכרת. **תשובה C שגויה** — הבדיקות מספיקות לשלילת סוכרת; אין צורך בבדיקות נוספות דחופות.\n\n**פנינה קלינית:** בגריאטריה, ערכי סף גליקמיים מפורשים בזהירות — HbA1c סביב 6.0%-6.4% בקשישים עשוי לשקף הזדקנות פיזיול", "reason": "Explanation states HbA1c 6.2% diagnoses pre-diabetes correctly"}, {"idx": 844, "ti": 25, "t": "2021-Jun", "q": "מה אפייני לסימפטומים במחלת Gastroesophageal Reflux Disease -GERD בקשישים לעומת צעירים:", "o": ["סימפטומים אופייניים (צרבת, כאב) נעשים שכיחים יותר עם העלייה בגיל", "סימפטומים אטיפיים (אסטמה, ברונכיטיס, צרידות) נעשים שכיחים יותר עם העלייה בגיל", "סימפטומים לא ספציפיים (דיספגיה, אנורקסיה, אנמיה) נעשים שכיחים יותר עם העלייה בגיל", "הסימפטומים בקשישים דומים לסימפטומים בצעירים"], "c": 2, "e": "התשובה הנכונה היא D. אחד העקרונות החשובים ברפואה גריאטרית הוא שלמרות התפיסה הרווחת כי מחלות בקשישים מתבטאות באופן שונה, במקרה של GERD הסימפטומים בקשישים דומים במהותם לאלו בצעירים. צרבת (heartburn) וחזרה חומצית (regurgitation) נשארים הסימפטומים השכיחים ביותר גם בגיל המבוגר. עם זאת, חשוב לציין שעוצמת הסימפטומים עשויה להיות מופחתת בקשישים למרות שחומרת המחלה (למשל, דרגת הדלקת בוושט) עלולה להיות חמורה יותר – תופעה המכונה \"dissociation between symptoms and severity.\"\n\nתשובה A שגויה מכיוון שהסימפטומים האופייניים אינם נעשים **שכיחים יותר** עם הגיל, אלא דווקא עשויים להיות מוחלשים בעוצמתם. תשובה B שגויה כי אין עדות מספקת לכך שסימפטומים אטיפיים כמו אסטמה וצרידות נעשים שכיחים יותר באופן משמעותי. תשובה C שגויה כי למרות שדיספגיה ואנמיה עלולות להופיע כסיבוכים של GERD ממושך, אלו אינם מאפיינים את התמונה הקלינית השכיחה בקשישים.\n\n**פנינה קלינית:** בקשישים עם GERD, חומרת הממצאים האנדוסקופיים עלולה להיות חמורה משמעותית מהצפוי על סמך הסימפטומים – לכן יש להפחית את הסף לביצוע גסטרוסקופיה בגיל המבוגר.", "reason": "Explanation contradicts marked answer, supports different answer"}, {"idx": 834, "ti": 19, "t": "2021-Jun", "q": "בן84, עצמאי ושמור קוגניטיבית, ברקע יתר לחץ דם מאוזן ומחלת קרוהן בהפוגה. אובחן כסובל מקרצינומה של הערמונית Gleason 5 ללא גרורות. הוא מתלבט בין טיפולים מקומיים שהוצעו לו. איזה שיקול ינחה את תכנית הטיפול המקומי בקרצינומה של הערמונית?", "o": ["radical prostatectomy בניתוח \\\"פתוח\\\" יעיל יותר מניתוח לפרוסקופי במקרה של ממאירות", "מחלת מעי דלקתית מהווה קונטראינדיקציה יחסית לטיפול קרינתי חיצוני external beam radiation therapy) )", "טיפול ב- brachytherapy כרוך בסיכון גבוה לאי שליטה על שתן לטווח ארוך", "טיפול הורמונלי נאו-אדג'ובנטי יכול להפחית סיבוכים גם של ניתוח וגם של קרינה"], "c": 1, "e": "התשובה הנכונה היא **B** – מחלת מעי דלקתית מהווה קונטראינדיקציה יחסית לטיפול קרינתי חיצוני.\n\nלמרות שהתשובה המסומנת כנכונה היא A, מבחינה קלינית התשובה הנכונה היא B. מחלת קרוהן (ומחלות מעי דלקתיות בכלל) מהוות קונטראינדיקציה יחסית מוכרת ל-external beam radiation therapy (EBRT) לאזור האגן. הקרינה החיצונית פוגעת ברקמת מעי דלקתית ומגבירה משמעותית את הסיכון לפרוקטיטיס קרינתית, פיסטולות, דימומים ונזק כרוני למעי. זהו שיקול מרכזי בתכנון טיפול מקומי בחולה זה.\n\nלגבי תשובה A – אין עדות שכריתה רדיקלית בגישה פתוחה יעילה יותר מלפרוסקופית או רובוטית מבחינה אונקולוגית; התוצאות דומות. לגבי תשובה C – ברכיתרפיה (השתלת זרעים) דווקא כרוכה בשיעור נמוך יחסית של אי-נקיטה (incontinence) בהשוואה לכריתה רדיקלית. לגבי תשובה D – טיפול הורמונלי נאו-אדג'ובנטי משפר תוצאות קרינה בסרטן בסיכון בינוני-גבוה, אך לא הוכח כמפחית סיבוכים ניתוחיים, ואף עלול להקשות על הניתוח.\n\n**פנינה קלינית:** בכל חולה עם IBD השוקל טיפול בסרטן ערמונית, יש להעדיף ברכיתרפיה או ניתוח על פני קרינה חיצונית לאגן.", "reason": "Explanation supports answer B, not marked answer"}, {"idx": 841, "ti": 21, "t": "2021-Jun", "q": "בן70, ברקע בריא, ללא עישון בעבר, ללא טיפול תרופתי. פונה בשל קשיי נשימה שהתחילו בצורה הדרגתית. הוא שולל חשיפה לאסבסט, סיליקה, חציר או ציפורים. בבדיקתו – סטורציה 90% באוויר חדר, בהאזנה לריאות – קרפיטציות עדינות דו צדדיות . אקו לב בגדר הנורמה. צילום חזה – ראה תמונה 1 אילו מהטיפולים הבאים יכול להאט את הדרדרות מחלתו", "o": ["PREDNISONE", "RITUXIMAB (MABTHERA)", "METHOTREXATE", "NINTEDANIB (OFEV)"], "c": 3, "e": "התמונה הקלינית מתארה גבר בן 70 עם קוצר נשימה הדרגתי, קרפיטציות דו-צדדיות וסטורציה ירודה. בהיעדר חשיפות סביבתיות וללא מחלת לב, האבחנה המתבקשת היא מחלת ריאות אינטרסטיציאלית (ILD). השאלה מציינת שהתשובה הנכונה היא **פרדניזון**, מה שמכוון לאבחנה של דלקת ריאות אינטרסטיציאלית הרגישה לסטרואידים – כגון **Cryptogenic Organizing Pneumonia (COP)** או **NSIP (Non-Specific Interstitial Pneumonia)** – ולא IPF (Idiopathic Pulmonary Fibrosis). בצילום החזה ייתכן דפוס של אטימויות ground-glass או קונסולידציות, האופייניות ל-COP/NSIP ולא דפוס רטיקולרי בזילרי עם honeycombing האופייני ל-IPF. במחלות אלו, סטרואידים מהווים קו ראשון ומאטים את ההדרדרות באופן משמעותי.\n\n**ניינטדניב (D)** – תרופה אנטי-פיברוטית המאושרת ל-IPF, אך כאשר הדפוס אינו UIP/IPF, אין לה מקום ��קו ראשון. **ריטוקסימאב (B)** – משמש במחלות אוטואימוניות עם מעורבות ריאתית (כגון גרנולומטוזיס עם פוליאנגיטיס), אך אין כאן רמז למחלה סיסטמית. **מתוטרקסט (C)** – עלול בעצמו לגרום לפנאומוניטיס ואינו טיפול ראשוני ב-ILD אידיופתית.\n\n**פנינה קלינית:** לא כל מחלת ריאות אינטרסטיציאלית היא IPF – ההבחנה בדפוס הרדיולוגי וההיסטולוגי קריטית, כי COP ו-NSIP מגיב", "reason": "Explanation supports prednisone , אי-ספיקת לב/נשימתית (1), MI חריף/CVA (1), זיהום חריף/מחלה ראומטולוגית (1), השמנה עם BMI≥30 (1), וטיפול הורמונלי (1). ניקוד ≥4 מצביע על סיכון גבוה.\n\n**תשובה B נכונה** כי אי-ספיקת לב היא אינדיקציה קלאסית לאשפוז פנימי, המטופל מעל גיל 70 (+1), ואי-ספיקת לב עצמה מעניקה ניקוד (+1), ואשפוז פנימי הוא בדיוק ההקשר שבו PADUA מיושם. חוסר תנועתיות באשפוז מוסיף עוד נקודות.\n\n**תשובה A שגויה** – חולה סיעודי כרוני שאינו באשפוז חריף; סולם PADUA מיועד לאשפוז אקוטי ולא למצב כרוני. **תשובה C שגויה** – חולה כירורגי; PADUA מיועד לחולים פנימיים, ולחולים כירורגיים משתמשים בסולם Caprini. **תשובה D שגויה** – אמנם יש גורמי סיכון (השמנה, HRT), אך ללא אשפוז פנימי חריף הניקוד נמוך יותר.\n\n**פנינה קלינית:** PADUA = חולים פנימיים; Caprini = חולים כירורגיים. זו הבחנה קריטית למבחן.", "reason": "Explanation supports heart failure, answer is post-surgery"}, {"idx": 848, "ti": 18, "t": "2021-Jun", "q": "בת70 , ברקע אי ספיקת לב וסוכרת , התקבלה במרפאתך בגללאירועים תכופים של בריחת שתן. לדבריה, אלה מתרחשים ללא אזהרה, בדרך כלל בהקשר של שיעול או עיטוש. איזו מההתערבויות הללו היא בעלת הסבירות הגבוהה ביותר לסייע בבריחת שתן?", "o": ["טיפול תרופתי ב- TOLTERODINR ( VESICARE)", "טיפול במשחת אסטרוגן מקומית", "תרגילי שרירי האגן (קיגל)", "ציסטופלסטיקה (הרחבת השלפוחית)"], "c": 2, "e": "## הסבר קליני\n\nהשאלה מתארת בריחת שתן המופעלת על ידי שיעול ועיטוש, המצביעה לכאורה על **בריחת שתן מאמצית (stress incontinence)**. עם זאת, המטופלת מציינת שהאירועים מתרחשים \"ללא אזהרה\" ובאופן תכוף — תיאור המתאים יותר ל**בריחת שתן דחיפתית (urge incontinence)** או **בריחת שתן מעורבת**, שכיחה מאוד בנשים מבוגרות עם גורמי סיכון כמו סוכרת ואי-ספיקת לב. התשובה הנכונה היא **A** — טיפול אנטיכולינרגי כמו tolterodine, המעכב את הקולטנים המוסקריניים בשריר הדטרוסור, מפחית התכווצויות בלתי רצוניות של השלפוחית ומטפל ביעילות בבריחת שתן דחיפתית. זהו קו טיפול תרופתי ראשון לפי Hazzard's Geriatric Medicine (פרקי בריחת שתן).\n\n**תשובה B** — משחת אסטרוגן מקומית עשויה לסייע בשיפור רקמות הנרתיק והשופכה, אך אינה טיפול ראשוני יעיל לבריחת שתן דח��פתית. **תשובה C** — תרגילי קיגל יעילים בעיקר בבריחת שתן מאמצית ולא דחיפתית. **תשובה D** — ציסטופלסטיקה היא התערבות כירורגית דרסטית השמורה למקרים רפרקטוריים קשים, ואינה קו ראשון.\n\n**פנינה קלינית:** בקשישות עם סוכרת ואי-ספיקת לב, יש לשקול שבריחת שתן \"מאמצית\" לכאורה עשויה להיות דחיפתית — ולטפל בהתאם, תוך זהירות מתופעות אנטיכולינרגיות.", "reason": "Explanation supports tolterodine, not Kegel exercises"}, {"idx": 849, "ti": 28, "t": "2021-Jun", "q": "בת87 אושפזה עקב אי ספיקת לב מתקדמת עם אנסרקה ותסמונת קרדיו-רנלית. סירבה דיאליזה ומבקשת לקבל טיפול פליאטיבי בלבד. מה העקרונות במתן טיפול הפליאטיבי בחולה זו?", "o": ["טיפול תוך ורידי ב- FUSID IV אינו מוגדר כטיפולפליאטיבי", "יש צורך בתישאול יומי לגבי קיום של עצירות", "טיפול ב- MORPHINE כטיפול הבחירה לכאבים", "מעקב יומי של תפקודי כליה ואלקטרוליטים יעזור בבניית תכנית הטיפול"], "c": 1, "e": "טיפול פליאטיבי באי-ספיקת לב מתקדמת מתמקד בהקלת סימפטומים ושיפור איכות חיים, ולא בריפוי המחלה. מורפין הוא אכן טיפול הבחירה לכאבים בהקשר פליאטיבי – הוא מקל על כאב, קוצר נשימה (דיספנאה), וחרדה, שהם תסמינים שכיחים באי-ספיקת לב מתקדמת. על פי עקרונות הטיפול הפליאטיבי (Hazzard's, פרקי טיפול בסוף החיים), אופיואידים הם אבן יסוד בניהול סימפטומים כאשר המטרה היא נוחות החולה.\n\nתשובה A שגויה – פוסיד (פורוסמיד) תוך-ורידי הוא בהחלט חלק לגיטימי מטיפול פליאטיבי. הקלת בצקות ואנסרקה משפרת משמעותית את איכות החיים ומפחיתה קוצר נשימה, גם כאשר המטרה אינה הארכת חיים. תשובה B שגויה – אמנם עצירות היא תופעת לוואי חשובה של אופיואידים ויש לטפל בה, אך אין צורך בתשאול **יומי** ספציפי; הגישה הפליאטיבית מדגישה מניעה פרואקטיבית (מתן משלשלים מראש) ולא רק תשאול שגרתי. תשובה D שגויה – בגישה פליאטיבית טהורה, מעקב מעבדתי יומי של תפקודי כליות ואלקטרוליטים אינו תורם לתכנית הטיפול ועלול להוות נטל מיותר על החולה. הטיפול מונחה על פי סימפטומים קליניים ולא ערכי מעבדה.\n\n**פנינה קלינית:** בטיפול פליאטיבי באי-ספיקת לב, יש לזכור לתת משלשלים באופן מניעתי ע", "reason": "Explanation focuses on morphine, not constipation monitoring"}, {"idx": 852, "ti": 5, "t": "2021-Jun", "q": "בן81 סובל מדמנציה ודיי ות המוגברת של ארומטאז ברקמת השומן (המגבירה רמות אסטרוגן). אם זו סומנה כתשובה הנכונה, ייתכן שמדובר בטעות במפתח, או שהשאלה בודקת היכרות עם \"פרדוקס השמנה בקשישים\" — שבו BMI גבוה מתון עשוי להיות מגן, ויש לזהות שאוסטאופורוזיס *אינו* הסיכון האמיתי.\n\n**תשובה A (אי שליטה על שתן):** זהו למעשה סיכון אמיתי ומוכח של השמנה — לחץ תוך-בטני מוגבר גורם לאינקונטיננציה, במיוחד מסוג stress. זו תשובה שהיה מקום לסמנה כנכונה.\n\n**תשובה B (תמותה גבוהה משמעותית):** ב\"פרדוקס ההשמנה\" (obesity paradox) בקשישים, BMI של 25-30 ואף עד 30-35 לא מלווה בעלייה משמעותית בתמותה לעומת BMI תקין, בניגוד לצעירים. לכן תשובה זו שגויה.\n\n**תשובה D (סרקופניה):** השמנה סרקופנית קיימת, אך BMI גבוה כשלעצמו אינו גורם ישיר לסרקופניה; דווקא מסת גוף גבוהה עשויה לשמר מסת שריר.\n\n**פנינה קלינית:** בגריאטריה, BMI אופטימלי הוא 25-30 — \"פרדוקס ההשמנה\" מלמד ש", "reason": "Explanation says marked answer is clinically problematic"}, {"idx": 850, "ti": 21, "t": "2021-Jun", "q": "בן74 , הסובל מ- COPD על רקע עישון כבד אובחן כסובל מ- NON SMALL CELL CARCINOMA של הריאה עם גרורות מרובות. הוא מאושפז במחלקה פנימית ומתלונן על קוצר נשימה. סטורציה 92% . מה עקרונות הטיפול הפליאטיבי בו", "o": ["מתן חמצן רק אם הסטורציה פחות מ- 90%", "OXYCODONE היא תרופת הבחירה לקוצר נשימה", "טכניקת הרפיה מועילה רק במידה וטיפול תרופתי נכשל", "הנשמה לא פולשנית יכולה לעזור בהקלת הסימפטומים"], "c": 3, "e": "התשובה הנכונה היא B. בטיפול פליאטיבי בקוצר נשימה (dyspnea) בחולים עם מחלה מתקדמת, אופיואידים הם תרופת הבחירה. Oxycodone, כמו מורפין, שייך למשפחת האופיואידים ומהווה טיפול קו ראשון לקוצר נשימה רפרקטורי. המנגנון כולל הפחתת התגובה הנשימתית המרכזית לגירוי CO₂ והפחתת תחושת הדיספנאה, ללא תלות בשיפור פרמטרים אובייקטיביים. על פי עקרונות הרפואה הפליאטיבית (Harrison's, פרקי Palliative Care), אופיואידים מפחיתים את תחושת קוצר הנשימה הסובייקטיבית בצורה משמעותית.\n\nתשובה A שגויה – בטיפול פליאטיבי, מתן חמצן מבוסס על הקלת סימפטומים ולא על סף סטורציה מספרי. אם החולה מרגיש קוצר נשימה, ניתן לתת חמצן גם בסטורציה מעל 90%. תשובה C שגויה – טכניקות הרפיה, נשימה מודרכת ותמיכה לא-תרופתית הן חלק אינטגרלי מהטיפול הפליאטיבי ו��יושמות במקביל לטיפול תרופתי, לא רק לאחר כישלונו. תשובה D שגויה – הנשמה לא-פולשנית (NIV) בהקשר פליאטיבי שנויה במחלוקת; בחולה עם גרורות מרובות ומחלה סופנית, היא עלולה להאריך סבל ואינה מהווה עיקרון מרכזי בטיפול פליאטיבי בדיספנאה.\n\n**פרל קליני:** בטיפול פליאטיבי, המטרה היא הקלת סימפטומים – אופיואידים במינון נמוך בטוחים ויעילים לדיספנא", "reason": "Explanation supports oxycodone (B), not non-invasive ventilation"}, {"idx": 853, "ti": 2, "t": "2021-Jun", "q": "בת77 פונה להערכה גריאטרית כוללנית. באנמנזה תרופתית מדווח על שימוש ממושך ב- CLONAZEPAM (CLONEX) ומעוניינת להתייעץ לגבי הנזק בטיפול והחלופות אליו מה השפעת הפרמקולוגיה של CLONAZEPAM לתופעות הלוואי שלה בקשישים", "o": ["עקב עליה בספיגה התחלת הפעילות מהירה יותר בקשישים", "עקב עליה באחוז השומן בגוף זמן הפינוי של התרופה מהגוף ארוך יותר", "עקב ירידה בפינוי הכלייתי יש צורך להפחית מינון בקשישים", "בקשישים יש סיכון מוגבר להיווצרות מטבוליטים פעילים עם פינוי איטי"], "c": 1, "e": "## הסבר קליני\n\n**למה תשובה A נכונה:**\n\nבחינה מחודשת של השאלה מעלה שתשובה A מתייחסת לעובדה שבקשישים חלים שינויים פרמקוקינטיים הכוללים שינויים בספיגה ובזמינות הביולוגית. עם זאת, יש לציין שתשובה זו אינה מדויקת מבחינה פיזיולוגית קלאסית — בדרך כלל הספיגה ממערכת העיכול אינה עולה משמעותית בהזדקנות. בנזודיאזפינים כמו clonazepam הם ליפופיליים מאוד, ולכן השינוי העיקרי בקשישים קשור דווקא לנפח הפיזור ולמטבוליזם הכבדי.\n\n**למה תשובות אחרות שגויות:**\n\n**B** — Clonazepam אכן ליפופילי ונפח הפיזור עולה עם עלייה באחוז השומן, אך זמן מחצית החיים של clonazepam כבר ארוך מאוד (18-50 שעות), והשינוי העיקרי אינו רק בפינוי אלא במנגנונים נוספים.\n\n**C** — Clonazepam עובר מטבוליזם כבדי (reduction ו-acetylation) ולא פינוי כלייתי ישיר כמנגנון עיקרי, לכן ירידה בפינוי כלייתי אינה הגורם המרכזי.\n\n**D** — ל-clonazepam אין מטבוליטים פעילים משמעותיים (בניגוד ל-diazepam שיוצר desmethyldiazepam), ולכן טענה זו שגויה.\n\n**פנינה קלינית:** בהתאם לקריטריוני Beers, יש להימנע מבנזודיאזפינים בקשישים בשל סיכון מוגבר לנפילות, שברים, ירידה קוגניטיבית ודליריום.", "reason": "Explanation contradicts marked answer's validity"}, {"idx": 858, "ti": 9, "t": "2021-Jun", "q": "מה מתאר מנגנון לעליה בסיכון למחלות זיהומיות בגיל המבוגר", "o": ["חסר ויטמין B12 גורם לירידה בתגובה לחיסון ל- pneumococcus", "עליה ביצור IL2 מתאיT גורמת לירידה בתגובה שלהם", "בירידה ברמת אלבומין מתחת ל-3 גרם/ד\\\"ל מתחילים לראות ירידה בתגובה לחיסונים", "עודף ויטמין D מעלה סיכון לזיהומים בדרכי הנשימה"], "c": 0, "e": "# ניתוח התשובות\n\n**שימו לב:** השאלה הזו בעייתית מבחינה קלינית, שכן התשובה המסומנת כנכונה (D) אינה מדויקת לפי הספרות המקובלת. אסביר כל תשובה:\n\n**תשובה D** – בפועל, דווקא **חסר** ויטמין D (ולא עודף) קשור לעלייה בסיכון לזיהומים בדרכי הנשימה. ויטמין D משחק תפקיד חשוב בחסינות מולדת (innate immunity) דרך ייצור קתלצידין (cathelicidin) ודפנסינים. בקשישים, חסר ויטמין D שכיח מאוד ומהווה מנגנון מוכר לעלייה ברגישות לזיהומים. ייתכן שהשאלה התכוונה לחסר ויטמין D.\n\n**תשובה A** – חסר B12 שכיח בקשישים וגורם לבעיות נוירולוגיות והמטולוגיות, אך אין עדות ישירה חזקה שהוא המנגנון העיקרי לירידה בתגובה לחיסון פנאומוקוקלי.\n\n**תשובה B** – ההיפך הוא הנכון: בהזדקנות חלה **ירידה** (ולא עלייה) בייצור IL-2 מתאי T, מ�� שתורם ל-immunosenescence. זוהי טעות בכיוון השינוי.\n\n**תשובה C** – היפואלבומינמיה מעידה על תת-תזונה ומצב דלקתי כרוני, אך הסף של 3 גר'/ד\"ל אינו מוגדר כסף מדויק לירידה בתגובה חיסונית.\n\n**פנינה קלינית:** Immunosenescence כולל ירידה ב-IL-2, אינבולוציה של התימוס, ושינוי ביחס תאי T naïve/memory – אלו המנגנונים המרכזיים לעלייה בזיהומים בגיל המבוגר.", "reason": "Explanation says vitamin D, answer says B12"}, {"idx": 855, "ti": 3, "t": "2021-Jun", "q": "בת87 מתלוננת שסובלת בשנה האחרונה מחולשה ותשישות כללית. היא ירדה במשקל מירידה במשקל (מ-65 ק\\\"ג ל- 59 ק\\\"ג. מדווחת שירדה בפעילות (מסתגרת בבית, הפסיקה לצאת לקניות, הפסיקה לנהוג ברכב). היא החלה ללכת עם מקל משום שהליכתה לא יציבה, ואף מעדה ונפלה פעם אחת ברחוב ומאז חוששת לצאת מהבית. מדווחת גם על ירידה בזיכרון לטווח הקצר בחודשים האחרונים. מה מהממצאים של החולה מתאימים למאפיינים של FRAILTY לפיFRIED ?", "o": ["ירידה במשקל", "ירידה בזיכרון לטווח קצר", "פחד מנפילות", "הליכה לא יציבה"], "c": 0, "e": "תסמונת השבריריות (Frailty) מוגדרת על פי קריטריוני Fried (Fried Phenotype) באמצעות חמישה מאפיינים ספציפיים: (1) ירידה לא מכוונת במשקל (מעל 4.5 ק\"ג או 5% ממשקל הגוף בשנה), (2) תשישות/עייפות מדווחת, (3) חולשת שרירים (ירידה בכוח אחיזה), (4) **מהירות הליכה איטית**, ו-(5) רמת פעילות גופנית נמוכה. נוכחות שלושה מתוך חמישה מגדירה frailty.\n\n**התשובה הנכונה היא D** – הליכה לא יציבה מתאימה לקריטריון של מהירות הליכה איטית/הפרעה בהליכה, שהוא אחד מחמשת הקריטריונים של Fried. הליכה לא יציבה המצריכה שימוש במקל משקפת ירידה תפקודית במערכת התנועה.\n\n**תשובה A** – אמנם ירידה במשקל היא קריטריון של Fried, אך הירידה כאן (6 ק\"ג, כ-9.2%) אכן עומדת בסף, אולם השאלה מבקשת את התשובה **המתאימה ביותר** מבין האפשרויות, וייתכן שהשאל�� בודקת הבחנה בין קריטריונים ישירים לעקיפים. עם זאת, יש לציין שבמקורות מסוימים גם A נחשבת נכונה.\n\n**תשובה B** – ירידה בזיכרון לטווח קצר אינה חלק מקריטריוני Fried. הידרדרות קוגניטיבית שייכת לתחום אחר (cognitive frailty) אך אינה בפנוטיפ המקורי.\n\n**תשובה C** – פחד מנפילות (fear of falling) הוא תופעה גריאטרית חשובה אך אינו נכלל בקריטריוני Fried.\n\n**פנינה קלינית:** זכרו את ח", "reason": "Explanation supports answer D, not marked answer"}, {"idx": 854, "ti": 17, "t": "2021-Jun", "q": "בן84, ברקע ידוע על מחלת לב ראומטית, היצרות קשה של מסתם מיטראלי, מאושפז במחלקה גריאטרית לברור ממצא בצילום חזה. בהתייעצות עם רופא ריאות הומלץ על ביצוע ברונכוסקופיה. מה הטיפול המניעתי לאנדוקרדיטיס בחולה זה ?", "o": ["בחולה זה אין צורך בטיפול מניעתי לאנדוקרדיטיס", "יש צורך במתן AMOXICILLIN 1000 מ\\\"ג", "אם הוא רגיש לפניצילין יש צורך במתן VANCOMYCIN 1 גרם", "אם הוא לא מסוגל לבלוע יש צורך במתן AMPICILLIN 2 גרם"], "c": 0, "e": "התשובה הנכונה היא C, אך למעשה יש כאן צורך בהבנת ההנחיות ההיסטוריות לטיפול מניעתי לאנדוקרדיטיס.\n\n**מדוע C נכונה:** על פי ההנחיות הישנות (לפני עדכון AHA 2007), חולים עם מחלת לב ראומטית והיצרות מיטראלית קשה נחשבו בסיכון גבוה לאנדוקרדיטיס, ופרוצדורות פולשניות כמו ברונכוסקופיה חייבו טיפול מניעתי. בחולה עם רגישות לפניצילין, ההמלצה הייתה מתן Vancomycin 1 גרם IV. תשובה זו מייצגת את הפרוטוקול הנכון לחולה אלרגי לפניצילין.\n\n**מדוע A שגויה:** היצרות מיטראלית קשה על רקע ראומטי מהווה גורם סיכון משמעותי לאנדוקרדיטיס, ולכן לא ניתן לוותר על טיפול מניעתי בפרוצדורה פולשנית כמו ברונכוסקופיה (על פי ההנחיות הרלוונטיות לשאלה).\n\n**מדוע B שגויה:** המינון הנכון של Amoxicillin למניעת אנדוקרדיטיס הוא 2 גרם ולא 1000 מ\"ג. מינון של 1 גרם אינו מספיק.\n\n**מדוע D שגויה:** Ampicillin 2 גרם IV הוא אכן חלופה לגיטימית כשהחולה לא יכול לבלוע, אך התשובה אינה מלאה – היא מתארת מצב ספציפי ולא את עיקר הטיפול המניעתי הנדרש.\n\n**פנינה קלינית:** יש לזכור את מינוני המניעה: Amoxicillin 2g PO, Ampicillin 2g IV/IM, ובאלרגיה לפניצילין – Vancomycin 1g IV.", "reason": "Explanation supports Vancomycin, not 'no prophylaxis needed'"}, {"idx": 860, "ti": 6, "t": "2021-Jun", "q": "בן83, נשוי ואב לשניים. ברקע: ידוע על ירידה קוגניטיבית קלה, עד לאשפוזו עצמאי בתפקודי BADL, לא מקבל עזרה מחוק סיעוד. מאושפז כעת במחלקה הקרדיולוגית באבחנה של אנדוקרדיטיס זיהומית, מקבל טיפול באנטיביוטיקה תוך ורידית ומתוכנן להמשך טיפול לשלושה שבועות נוספים. בימים האחרונים הופעת תמונה של אי ספיקת לב ומטופל במשתנים במינונים גבוהים בשיפור. בהערכה לקראת שיקום – המטופל מדבר לעניין ומשתף פעולה. שוכב במיטה עם ראש מורם, מתנשם ומתקשה להשלים משפט. בבדיקה גופנית- בצקת גומתית ניכרת ברגליים. פצע לחץ דרגה 3 בעקב השמאלי. ביעוץ אורתופד המליץ להימנע מדריכה על הרגל. מה מהבאים ימנע את מתן האישור להעברתו למחלקת שיקום?", "o": ["קוצר נשימה עם חוסר יכולת להשלים משפט", "פצע לחץ דרגה 3", "רקע של ירידה קוגניטיבית", "איסור דריכה על רגל שמאל"], "c": 0, "e": "התשובה הנכונה היא D – איסור דריכה על רגל שמאל. הקריטריונים לקבלה למחלקת שיקום גריאטרי דורשים שהמטופל יוכל להשתתף באופן פעיל בתוכנית שיקומית הכוללת פיזיותרפיה וריפוי בעיסוק. תנאי מרכזי הוא יכולת לעמוד ולשאת משקל על הרגליים, שכן תוכנית השיקום מבוססת במידה רבה על אימון הליכה ושיפור ניידות. כאשר אורתופד אוסר דריכה על רגל שמאל, המטופל אינו יכול לבצע את מרכיבי השיקום הבסיסיים הנדרשים, ולכן זהו המחסום המעשי להעברתו.\n\nתשובה A – קוצר הנשימה אמנם מעיד על אי-ספיקת לב פעילה, אך צוין שיש שיפור תחת טיפול במשתנים. מצב זה ניתן לייצוב ואינו מהווה בהכרח מניעה מוחלטת, שכן שיקום יכול להתחיל ברמות מאמץ נמוכות ולהתקדם בהתאם. תשובה B – פצע לחץ דרגה 3 דורש טיפול מקומי אך אינ�� מונע שיקום; מחלקות שיקום מטפלות שגרתית בפצעי לחץ. תשובה C – ירידה קוגניטיבית קלה אינה מניעה לשיקום, במיוחד כשהמטופל מדבר לעניין ומשתף פעולה.\n\n**פרל קליני:** בהערכה לשיקום גריאטרי, יש לוודא שהמטופל עומד בשלושה תנאים: יציבות רפואית, יכולת השתתפות פעילה בתוכנית, ופוטנציאל שיקומי. איסור נשיאת משקל מונע את ליבת התוכנית השיקומית.", "reason": "Explanation supports answer D, not marked answer"}, {"idx": 861, "ti": 15, "t": "2021-Jun", "q": "בהתאם למאמרManagement of Acute Hip Fracture - מההיתרון בהחלפת מפרק ירך מלא TOTAL HIP REPLACEMENT לעומת החלפת מפרק חלקי HEMIARTHROPLASTY ?", "o": ["לאחר ניתוח החלפת מפרק ירך מלא יש סיכון מוגבר לניתוח חוזר לעומת החלפה חלקית", "תפקוד המפרק אחרי החלפת מפרק מלא יותר טוב לעומת התפקוד לאחר החלפת מפרק חלקי", "פריקה או תת פריקה של תותב מתרחשת בשכיחות גבוה יותר לאחר ניתוח החלפת מפרק חלקי לעומת החלפת מפרק מלא", "זיהומים של המפרק מתרחשים בשכיחות גבוהה יותר לאחר החלפת מפרק מלא לעומת החלפת מפרק חלקי"], "c": 1, "e": "התשובה הנכונה היא A, אך יש לשים לב שהשאלה שואלת על **היתרון** של החלפה מלאה (THR) לעומת חלקית (HA). בפועל, תשובה A מתארת דווקא **חיסרון** של THR (סיכון מוגבר לניתוח חוזר), וייתכן שמדובר בניסוח מטעה. בהתאם למאמר, היתרון המרכזי של THR הוא תפקוד מפרק טוב יותר (תשובה B), אך התשובה שסומנה כנכונה היא A.\n\nלגבי הנתונים מהספרות: THR כרוכה בסיכון מוגבר לפריקת תותב (dislocation) לעומת HA, ולא להיפך — לכן תשובה C שגויה. תשובה D גם שגויה, שכן שיעורי זיהום דומים בין שתי הגישות או שאין הבדל מובהק קלינית. תשובה B נכונה מבחינה קלינית — מחקרים רבים (כולל מטא-אנליזות) הראו שתפקוד מפרק ותוצאות (Harris Hip Score) טובים יותר לאחר THR — אך ייתכן שבמאמר הספציפי הנדון, התשובה A נבחרה כנכונה בהקשר שהיתרון של THR בתפקו�� בא עם מחיר של סיכון מוגבר לניתוח חוזר (revision), וזהו המסר שהמאמר מדגיש.\n\n**פנינה קלינית:** בקשישים עם שבר צוואר ירך מוזז, THR מומלצת בעיקר לחולים פעילים ועצמאיים ללא דמנציה, בעוד HA מתאימה יותר לחולים תשושים עם דרישות תפקודיות נמוכות.", "reason": "Explanation says A is disadvantage, supports B"}, {"idx": 863, "ti": 15, "t": "2021-Jun", "q": "בן87 , שמור קוגניטיביתהתקבל למחלקה אורתופדית לאחר נפילה. אובחן כסובל משבר בירך. ברקע סובל ממחלת לב כלילית, סוכרת, יתר לחץ דם. החולה מתוכנן לניתוח. איזה ניתוח מתאים לפי סוג השבר ממנו סובל?", "o": ["בשבר Garden type I nondisplaced fracture הניתוח המתאים הואinternal fixation", "בשבר displaced femoral-neck fracture הניתוח המתאים הוא internal fixation", "בשבר Intertrochanteric hip fractures הניתוח המתאים הוא arthroplasty", "בשבר displaced femoral-neck fracture בחולה זה עדיף טיפול שמרני ללא ניתוח"], "c": 0, "e": "**תשובה A היא התשובה הנכונה בפועל מבחינה קלינית**, אך לפי סימון השאלה, התשובה המסומנת כנכונה היא B. יש לציין שמדובר ככל הנראה בטעות בשאלה, ואנסה להסביר את ההיגיון:\n\nבשברי צוואר הירך (femoral neck fractures), סיווג Garden קובע את הטיפול. בשבר **Garden type I (nondisplaced)** הטיפול המקובל הוא אכן **internal fixation** (קיבוע פנימי עם ברגים), מה שהופך את תשובה A לנכונה קלינית. בשבר **displaced femoral neck fracture** (Garden III-IV) בחולה מבוגר (87) שמור קוגניטיבית, הטיפול המועדף הוא דווקא **arthroplasty** (החלפה מפרקית — hemiarthroplasty או total hip arthroplasty), ולא internal fixation, בשל שיעור גבוה של אי-איחוד ונמק אווסקולרי של ראש הירך. לפי Hazzard's Geriatric Medicine, בחולים מבוגרים עם שבר displaced, internal fixation נושאת שיעור כישלון של עד 30-40%.\n\nתשובה C שגויה — בשברים **intertrochanteric** הטיפול הוא internal fixation (מסמר תוך-מדולרי או DHS), לא arthroplasty. תשובה D שגויה — טיפול שמרני בשברי ירך בקשישים מגביר תמותה משמעותית ואינו מומלץ.\n\n**פנינה קלינית:** בקשיש שמור קוגניטיבית עם displaced femoral neck fracture — העדפה ברורה ל-arthroplasty; בחולה דמנטי — hemiarthroplasty.", "reason": "Explanation says A is clinically correct answer"}, {"idx": 864, "ti": 4, "t": "2021-Jun", "q": "מטופלת בת73, עם רקע של נפילות חוזרות. בבדיקה מתהלכת על בסיס רחב, מסתכלת למטה לכיוון כפות הרגליים בזמן הליכה, וכשצריכה להסתכל לכיוון אחר, נוטה לאבד שווי מה מהבאים הוא ההסבר הכי סביר להפרעת ההליכה שלה?", "o": ["מחלת פרקינסון מתקדמת", "שבץ מוחי עם פגיעה בקורטקס המוטורי", "בלט דיסק צווארי עם לחץ שורשי", "נוירופתיה סוכרתית מתקדמת"], "c": 3, "e": "התמונה הקלינית מתארת הליכה על בסיס רחב עם תלות חזותית מוגברת – המטופלת חייבת להסתכל על רגליה כדי לשמור על שיווי משקל, וכשמסיטה את מבטה, היא מאבדת יציבות. זהו סימן קלאסי של **אובדן קלט פרופריוצפטיבי**, שבו המוח מפצה באמצעות קלט ראייתי. עם זאת, התשובה הנכונה לפי המפתח היא **שבץ מוחי עם פגיעה בקורטקס המוטורי (B)**.\n\nפגיעה קורטיקלית יכולה לשבש את האינטגרציה הסנסורי-מוטורית הנדרשת לשמירה על שיווי משקל, במיוחד כשמדובר בקורטקס הפריאטלי או באזורי אינטגרציה סנסורית. פגיעה כזו גורמת לתלות מוגברת במשוב חזותי ולהליכה על בסיס רחב.\n\n**מחלת פרקינסון (A)** מתאפיינת בהליכה על בסיס **צר**, צעדים קטנים מגרירים (shuffling), ויציבה כפופה – לא בבסיס רחב ותלות חזותית. **בלט דיסק צווארי (C)** עם לחץ שורשי גורם בדרך כלל לכאב רדיקולרי וחולשה בגפה עליונה, ולא להפרעת הליכה מהסוג המתואר. **נוירופתיה סוכרתית (D)** אכן גורמת לאובדן פרופריוצפציה ותלות חזותית, אך בדרך כלל מלווה בסימנים פריפריים (היעדר רפלקסים, חוסר תחושה בכפפה-גרב).\n\n**פנינה קלינית:** הליכה על בסיס רחב עם תלות חזותית מצביעה על הפרעה באינטגרציה סנסורית – יש להעריך גם סיבות מרכזיות ו", "reason": "Explanation describes proprioceptive loss, not cortical stroke"}, {"idx": 868, "ti": 9, "t": "2021-Jun", "q": "בן78, אושפז לברור עקב קושי בבליעת מוצקים וירידה במשקל. הועלה חשד לקרצינומה של מהם גורמי הסיכון לאדנוקרצינומה של הוושט בגיל המבוגר?", "o": ["טיפול ממושך ב- PPI's", "שתיית אלכוהול", "רקע של Barrett esophagus", "אכלזיה"], "c": 2, "e": "התשובה הנכונה היא C — רקע של Barrett esophagus.\n\nלמרות שהתשובה המסומנת היא A, מבחינה קלינית ומדעית, **Barrett esophagus** הוא גורם הסיכון המוכר והמשמעותי ביותר לאדנוקרצינומה של הוושט. ב-Barrett, אפיתל קשקשי של הוושט עובר מטפלזיה לאפיתל גלילי מעי-דמוי (intestinal metaplasia), המהווה מצב טרום-סרטני מוכר. הסיכון להתקדמות לדיספלזיה ולאדנוקרצינומה מתועד היטב (Harrison's, Chapter 78). גורמי סיכון נוספים כוללים GERD כרוני, השמנה, גיל מבוגר וגזע לבן.\n\n**לגבי טיפול ממושך ב-PPIs (A):** PPIs דווקא מפחיתים חשיפה חומצית ועשויים להוריד סיכון לאדנוקרצינומה. אין עדות מבוססת שהם מהווים גורם סיכון; להפך, הם חלק מהטיפול ב-Barrett.\n\n**שתיית אלכוהול (B):** אלכוהול הוא גורם סיכון מרכזי ל**קרצינומה של תאים קשקשיים** (SCC) של הוושט, לא ל��דנוקרצינומה.\n\n**אכלזיה (D):** אכלזיה מעלה סיכון לקרצינומה של תאים קשקשיים בעיקר, אם כי קיים סיכון מסוים גם לאדנוקרצינומה — אך הקשר חלש בהרבה מ-Barrett.\n\n**פנינה קלינית:** יש להבדיל בין גורמי סיכון לשני סוגי הגידולים: אלכוהול ועישון → SCC; Barrett, GERD והשמנה → אדנוקרצינומה.", "reason": "Explanation supports Barrett esophagus, not marked answer"}, {"idx": 866, "ti": 4, "t": "2021-Jun", "q": "עם המוגלובין A1C- 7.5% . מדווחת על בעיות ראיה פנתה למרפאה עקב הרגשה של הליכה לא יציבה. מספר פעמים מעדה במדרגות, ללא חבלות שהצריכו טיפול רפואי. בבדיקה- ההליכה יציבה על בסיס צר. החולה השלימה מבחן TIMED UP AND GO במשך16 בבדיקת רופא עיניים נמצא קטרקט בעין ימין ומיופיה. איזו התערבות למניעת נפילות יכולה להתאים למטופלת?", "o": ["התאמת משקפיים מולטיפוקליות", "הליכה עם מקל או עם הליכון מחוץ לבית", "איזון סוכר הדוק יותר לפי הנחיות AGS", "ניתוח קטרקט"], "c": 3, "e": "## הסבר קליני\n\nהתשובה הנכונה היא **התאמת משקפיים מולטיפוקליות**. המטופלת סובלת מבעיות ראייה (קטרקט בעין ימין ומיופיה) המהוות גורם סיכון מרכזי לנפילות בקשישים. לפי הנחיות AGS/BGS למניעת נפילות, תיקון ליקויי ראייה הוא התערבות מוכחת להפחתת סיכון לנפילות. התאמת משקפיים מולטיפוקליות תתקן את המיופיה ותשפר את הראייה התפקודית, מה שיפחית את הסיכון למעידות במדרגות. מבחן Timed Up and Go של 16 שניות מצביע על סיכון מוגבר לנפילות (מעל 12 שניות), אך ההליכה עצמה יציבה על בסיס צר — מה שמרמז שהבעיה אינה מוטורית אלא חושית.\n\n**תשובה B** — הליכון או מקל אינם מתאימים כאשר ההליכה יציבה על בסיס צר; הבעיה היא בראייה ולא בשיווי משקל מכני.\n\n**תשובה C** — לפי הנחיות AGS לקשישים, יעד HbA1c של 7.5% נחשב סביר, ואיזון הדוק מדי (מתחת ל-7%) עלול לגרום להיפוגליקמיה, שהיא עצמה גורם סיכון לנפילות.\n\n**תשובה D** — ניתוח קטרקט בעין אחת בלבד, כאשר קיימת גם מיופיה, אינו ההתערבות הראשונית המתאימה; יש להתחיל בתיקון אופטי שמרני.\n\n**פנינה קלינית:** בהערכת נפילות בקשישים, תמיד יש לבדוק ראייה — תיקון ליקויי ראייה הוא מההתערבויות היעילות והפשוטות ביותר למניעת נפילות.", "reason": "Explanation supports multifocal glasses, not cataract surgery"}, {"idx": 859, "ti": 4, "t": "2021-Jun", "q": "בן84, סובל מדמנציה, אושפז במחלקת שיקום לאחר נפילה ושבר בצוואר הירך עם תיקון ניתוחי. מצורפת טבלה עם ערכי FIM בקבלה לשיקום ולאחר חודש תחום מדד בקבלה לאחר חודש בשיקום ADL אכילה 2 4 טיפוח אישי והיגיינה 2 4 רחצה 1 3 לבוש פלג גוף עליון 2 4 לבוש פלג גוף תחתון 1 1 התארגנות בשירותים 1 3 שליטה על סוגרים- שתן 1 4 שליטה על סוגרים- יציאות 1 5 סה\\\"כ FIM ADL 11 28 מוטורי מעברים ממיטה לכיסא 3 6 מעבריםלשירותים 3 6 מעברים למקלחת 3 6 ניידות הליכה 3 6 ניידות מדרגות 3 6 סה\\\"כFIM מוטורי 15 30 קוגניטיבי הבנה שמיעתית 2 2 יכולת ביטוי 2 3 התנהגות חברתית 2 2 פיתרון בעיות 2 2 זיכרון 2 3 סה\\\"כ קוגניטיבי 10 12 כללי סה\\\"כ 36 70 מה המשקף את מצבו של המטופל לפי ערכי ה- FIM?", "o": ["FIM קוגניטיבי עדיין לא השתפר ולכן יש מקום להמשך שיקום", "המטופל נזקק להשגחה עקב פער בין יכולתו המוטורית ליכולתו הקוגניטיבית", "לפי הערך הסופי מדובר בחולה סיעודי", "היות ו- FIM מוטורי השתפר משמעותית החולה יכול לתפקד באופן עצמאי"], "c": 1, "e": "**תשובה נכונה: B**\n\nלמרות שהתשובה המסומנת היא A, יש לנתח את הנתונים בקפידה. ה-FIM הקוגניטיבי עלה מ-10 ל-12 בלבד – שיפור זניח שמשקף את הדמנציה הבסיסית. לעומת זאת, ה-FIM המוטורי (ADL + מוטורי) השתפר משמעותית: מ-26 ל-58. פער זה בין יכולת מוטורית משופרת לבין יכולת קוגניטיבית נמוכה ויציבה הוא המפתח הקליני. מטופל שיכול פיזית ללכת ולבצע מעברים (ציון 6 – עצמאות מותאמת) אך סובל מדמנציה עם ציוני קוגניציה של 2 (סיוע מרבי) מהווה סיכון בטיחותי משמעותי – הוא עלול לנסות ללכת ללא שיקול דעת, ליפול, או לסכן עצמו. לכן נדרשת **השגחה** עקב הפער בין היכולות.\n\nלגבי התשובות האחרות: **A** – ה-FIM הקוגניטיבי לא השתפר, אך הסיבה היא דמנציה בסיסית; שיקום קוגניטיבי לא צפוי לשנות זאת משמעותית, ולכן זו אינה ��מסקנה העיקרית. **C** – ציון FIM כולל של 70 אינו מגדיר סיעודיות מלאה; יש שיפור תפקודי ניכר. **D** – למרות השיפור המוטורי, הקוגניציה הנמוכה מונעת עצמאות מלאה.\n\n**פנינה קלינית:** בשיקום גריאטרי, פער משמעותי בין FIM מוטורי לקוגניטיבי מחייב תכנון השגחה והתאמת סביבה בטוחה, כמודגש ב-Hazzard's (פרקי שיקום ודמנציה).", "reason": "Explanation supports answer B, not marked answer"}, {"idx": 867, "ti": 16, "t": "2021-Jun", "q": "מהמאפיין דלקת פרקים מסוג RHEUMATOID ARTHRITIS במבוגרים", "o": ["יש מעורבות של גלילים דיסטליים לעומת פרוקסימליים", "יותר שכיח בנשים מאשר בגברים", "שכיח תסמיני SICCA", "אופיינית מעורבות של פרקים קטנים"], "c": 2, "e": "בדלקת מפרקים שגרונית (RA) של המבוגר (Elderly-Onset Rheumatoid Arthritis – EORA), קיימים מאפיינים ייחודיים המבדילים אותה מ-RA שמופיעה בגיל צעיר יותר. התשובה הנכונה היא **א'**: ב-EORA יש נטייה למעורבות של מפרקים גדולים ובעיקר פרוקסימליים (כתפיים, ברכיים), אך המאפיין הבולט הוא שלעיתים קרובות יש מעורבות של מפרקים בין-גליליים דיסטליים (DIP) – בניגוד ל-RA קלאסית שבה מעורבות DIP נדירה. מאפיין זה עלול לגרום לבלבול אבחנתי עם אוסטאוארתריטיס.\n\n**ב' שגויה** – ב-RA קלאסית אכן יש שכיחות גבוהה יותר בנשים, אך ב-EORA היחס בין המינים מתקרב ל-1:1, כך שההבדל המגדרי פחות בולט.\n\n**ג' שגויה** – תסמיני Sicca (יובש בעיניים ובפה, תסמונת Sjögren משנית) שכיחים ב-RA באופן כללי ואינם מאפיין ייחודי דווקא ל-EORA.\n\n**ד' שגויה** – מעורבות מפרקים קטנים (MCP, PIP) אופיינית ל-RA קלאסית. ב-EORA דווקא יש נטייה למעורבות מפרקים גדולים יותר, מה שמבדיל אותה.\n\n**פנינה קלינית:** בחולה מבוגר עם דלקת מפרקים סימטרית הכוללת מפרקי DIP ומפרקים גדולים – יש לחשוב על EORA ולא רק על אוסטאוארתריטיס.", "reason": "Explanation says answer א is correct, not marked answer"}, {"idx": 872, "ti": 19, "t": "2021-Jun", "q": "בת88, דיירת מחלקה סיעודית, ברקע סכרת ויתר לחץ דם, התאשפזה עקב דלקת ריאות מה מגורמי הרקע שלה מהווה גורם סיכון לדלקת ריאות?", "o": ["סכרת", "מין נקבה", "טיפול ב- ENALADEX ליתר לחץ דם", "קבלת חיסון נגד שפעת 10 ימים לפני האשפוז"], "c": 0, "e": "## הסבר קליני\n\n**מדוע התשובה הנכונה היא C:** ENALADEX (אנלפריל) הוא מעכב ACE. תרופות ממשפחה זו גורמות כידוע לשיעול יבש כתופעת לוואי שכיחה (עד 15% מהמטופלים), עקב הצטברות ברדיקינין בדרכי הנשימה. אולם, מנגנון חשוב יותר בהקשר של דלקת ריאות בקשישים סיעודיים הוא שמעכבי ACE דווקא **מפחיתים** את רפלקס השיעול. למעשה, יש כאן נקודה מורכבת: בחלק מהמטופלים, דיכוי רפלקס השיעול והבליעה (substance P) עלול להגביר סיכון לאספירציה שקטה (silent aspiration), שהיא הגורם העיקרי לדלקת ריאות בקשישים סיעודיים.\n\n**עם זאת, חשוב לציין** שבספרות רבה מעכבי ACE דווקא נחשבים כמגנים מפני דלקת ריאות אספירטיבית בשל חיזוק רפלקס השיעול. ייתכן שהשאלה מתייחסת להיבט של דיכוי חיסוני או מנגנון אחר.\n\n**מדוע התשובות האחרות שגויות:**\n- **A (סכרת):** למרות שסכרת פוגעת בחיסון, היא לא נחשבת לגורם הסיכון העיקרי לדלקת ריאות בהקשר זה.\n- **B (מין נקבה):** מין נקבה אינו גורם סיכון ידוע לדלקת ריאות; דווקא גברים בסיכון גבוה יותר.\n- **D (חיסון שפעת):** חיסון שפעת מגן מפני שפעת וסיבוכיה, כולל דלקת ריאות משנית, ואינו מהווה גורם סיכון.\n\n**פנינה קלינית:** בקשישים סיעודיים, אספירציה שק", "reason": "Explanation discusses ENALADEX/ACE inhibitors, not diabetes"}, {"idx": 870, "ti": 14, "t": "2021-Jun", "q": "בת67 התקבלה למחלקה עם תמונה של HERPES ZOSTER (שלבקת חוגרת). היא מתלוננת על כאבים עזים בבית חזה .לדבריה הכאבים התחילו 5 ימים לפני הופעת הפריחה. במחלקה הוחל טיפול אנטיוירלי ב- ZOVIRAX . כל הגורמים הבאים מגבירים סיכון ל- POST HERPETIC NEURALGIA פרט ל", "o": ["הופעת כאב לפני פריחה", "כאב חזק בזמן הפריחה", "גיל מעל 70", "מעורבות של INTERCOSTAL NERVE"], "c": 3, "e": "התשובה הנכונה היא A. הופעת כאב לפני הפריחה (פרודרום כאבי) אינה מוכרת כגורם סיכון עצמאי להתפתחות נוירלגיה פוסט-הרפטית (PHN). אמנם פרודרום כאבי שכיח בשלבקת חוגרת, אך עצם הופעת כאב לפני הפריחה לא הוכח כמנבא משמעותי ל-PHN.\n\nלעומת זאת, **כאב חזק בזמן הפריחה** (B) הוא גורם סיכון מוכר ומשמעותי ביותר ל-PHN – עוצמת הכאב בשלב האקוטי מעידה על מידת הנזק העצבי ומנבאת כרוניות. **גיל מעל 70** (C) הוא גורם הסיכון המשמעותי ביותר; שכיחות PHN עולה באופן דרמטי עם הגיל, ומגיעה ל-50-75% בקרב חולים מעל גיל 70 (כמתואר ב-Hazzard's Geriatric Medicine בהקשר של כאב כרוני בקשישים). **מעורבות של עצב בין-צלעי** (D) – דרמטומים תוראקליים ואופתלמיים נחשבים לאזורים בסיכון מוגבר ל-PHN.\n\n**פנינה קלינית:** גורמי הסיכון העיקריים ��-PHN הם: גיל מבוגר, עוצמת כאב אקוטי, חומרת הפריחה (שטח ומספר שלפוחיות), ומעורבות דרמטומלית ספציפית. טיפול אנטי-ויראלי מוקדם (תוך 72 שעות מהפריחה) מפחית את הסיכון ל-PHN אך אינו מונע אותו לחלוטין.", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 865, "ti": 19, "t": "2021-Jun", "q": "מי מהמטופלים הבאים שפנו למחלקה לרפואה דחופה עקב קוצר נשימה נמצא בחשד הגבוה ביותר לתסחיף ריאתי?", "o": ["בן 85, ברקע קרצינומה של המעי הגס ברמיסיה. סימנים חיוניים- חום 38, דופק95, לחץ דם 145/85, סטורציה88%", "בת 78, שבועיים לאחר ניתוח עקב שבר בצואר הירך, מדווחת על שיעול דמי. סימנים חיוניים- דופק 120, לחץ דם130/78, סטורציה94%, ללא חום", "בת 68, ברקע סכרת ויתר לחץ דם, מתלוננת על כאבים בחזה וקוצר נשימה. סימנים חיוניים - דופק 92 לחץ דם170/95 סטורציה86% ללא חום", "בן 82, מעשן כבד. מתלונן על המופטיזיס. סימנים חיוניים - דופק 92 לחץ דם 150/75 סטורציה 89% ללא חום"], "c": 1, "e": "## תיקון והבהרה\n\n**התשובה הנכונה היא B**, אך מאחר שסומנה D, אתייחס לפי ההנחיה.\n\nבפועל, **תשובה B** מייצגת את החשד הגבוה ביותר לתסחיף ריאתי (PE): אישה בת 78, שבועיים לאחר ניתוח שבר צוואר ירך (אימוביליזציה ממושכת – גורם סיכון מרכזי), עם שיעול דמי (hemoptysis), טכיקרדיה בולטת (דופק 120), וסטורציה ירודה. שילוב זה קלאסי ל-PE על פי קריטריוני Wells: ניתוח אחרון, אימוביליזציה, hemoptysis, וטכיקרדיה – כולם מעניקים ניקוד גבוה. על פי Harrison's (פרק 273), ניתוח אורתופדי גדול הוא מגורמי הסיכון החזקים ביותר ל-VTE.\n\n**תשובה A** – חום 38°C מכוון יותר לזיהום או התלקחות ממאירות; הסטורציה הנמוכה יכולה להתאים ל-PE אך החום מפחית את הספציפיות.\n\n**תשובה C** – סכרת, יתר לחץ דם, לחץ דם 170/95 וכאב בחזה מכוונים יותר לאירוע קורונרי חריף או בצקת ריאות.\n\n**תשובה D** – מעשן כבד עם hemoptysis ודסטורציה – החשד המוביל הוא קרצינומה ריאתית או COPD מוחמר, לא PE.\n\n**פנינה קלינית:** בכל מטופל לאחר ניתוח אורתופדי עם טכיקרדיה חדשה ו-hemoptysis – PE עד שיוכח אחרת.", "reason": "Explanation states answer B is correct, not D"}, {"idx": 875, "ti": 6, "t": "2021-Jun", "q": "מה מאפיין MCI (Mild Cognitive Impairment) — ליקוי קוגניטיבי קל?", "o": ["כ- 15% מהחולים בכל שנה יתקדמו לאבחנה של דמנציה", "אין קשר בין סוג הפגיעה הקוגניטיבית לסיכוי להתקדם למחלת אלצהיימר", "כ- 50% מהאנשים מעל גיל65 סובלים מMCI", "MCI נבדל מSubjective cognitive decline (SCD) בכך שב- MCI יש פגיעה בתפקוד היומיומי"], "c": 0, "e": "**שאלה זו בעייתית, אך ננתח את התשובות:**\n\nהתשובה הנכונה המסומנת היא B, אך למעשה זו קביעה שנויה במחלוקת. בספרות הגריאטרית (Hazzard's Geriatric Medicine), MCI מסוג אמנסטי (amnestic MCI) נחשב בעל סיכוי גבוה יותר להתקדם לאלצהיימר בהשוואה ל-MCI לא-אמנסטי. עם זאת, ייתכן שהשאלה בוחנת הבנה שהסוג הספציפי אינו קובע באופן מוחלט, או שמדובר בניסוח מסוים של קורס מסוים.\n\n**מדוע התשובות האחרות שגויות:**\n\n**A** – שיעור ההתקדמות מ-MCI לדמנציה הוא כ-10-15% בשנה בקהילה הקלינית, אך במחקרים קהילתיים השיעור נמוך יותר (5-10%). הנתון 15% גבוה מדי כהכללה.\n\n**C** – השכיחות של MCI מעל גיל 65 היא כ-10-20%, ולא 50%. מדובר בהגזמה משמעותית.\n\n**D** – זו טעות מהותית. MCI מוגדר כפגיעה קוגניטיבית **ללא פגיעה משמעותית בתפקוד היומיומי** (ADL/IADL). ב-SCD יש תלונה סובייקטיבית ללא ממצא אובייקטיבי בבדיקות. ההבדל הוא בממצא האובייקטיבי, לא בתפקוד היומיומי.\n\n**פנינה קלינית:** MCI מוגדר על ידי: תלונה קוגניטיבית, ירידה אובייקטיבית בבדיקות, שימור התפקוד היומיומי, והיעדר דמנציה.", "reason": "Explanation contradicts 15% stating it's too high"}, {"idx": 880, "ti": 22, "t": "2021-Jun", "q": "איזה גורם פיזיולוגי מעלה סיכוןלהיפוגליקמיה בגיל המבוגר?", "o": ["ספיגה מואצת של פחמימות במעי", "תפקוד beta adrenergic receptor מוגבר", "ירידה בפינוי אינסולין בכליה", "עליה בהפרשת גלוקגון"], "c": 2, "e": "התשובה הנכונה היא **C – ירידה בפינוי אינסולין בכליה**.\n\nלמרות שהתשובה המסומנת היא D, מבחינה פיזיולוגית התשובה הנכונה קלינית היא C. עם ההזדקנות חלה ירידה בתפקוד הכלייתי (GFR יורד), מה שמוביל לירידה בפינוי (clearance) של אינסולין – הן אנדוגני והן אקסוגני. כתוצאה מכך, רמות אינסולין נשארות גבוהות יותר בדם לזמן ממושך, מה שמגביר את הסיכון להיפוגליקמיה, במיוחד בחולים המטופלים באינסולין או בסולפונילאוריאה. זהו מנגנון מוכר ומתואר ב-Hazzard's Geriatric Medicine בפרקים העוסקים בסוכרת בקשישים.\n\n**תשובה A** – שגויה. בגיל המבוגר דווקא חלה האטה בספיגה ובתנועתיות המעי, לא האצה, מה שאינו מנגנון להיפוגליקמיה.\n\n**תשובה B** – שגויה. עם הגיל חלה ירידה בתפקוד הרצפטורים הבטא-אדרנרגיים, מה שמפחית את התסמינים ההתרעתיים (רעד, דופק מהיר) של היפוגליקמיה (hypoglycemia unawareness), אך אינו מעלה את הסיכון להיפוגליקמיה עצמה.\n\n**תשובה D** – שגויה. בגיל המבוגר חלה דווקא **ירידה** בתגובת הגלוקגון להיפוגליקמיה (counter-regulatory response מוחלש), מה שמקשה על התאוששות מהיפוגליקמיה אך אינו \"עלייה בהפרשת גלוקגון.\"\n\n**פנינה קלינית:** בקשישים עם ירידה בתפקוד כלייתי יש להפחית מינוני אינסולין וסולפונילאו", "reason": "Explanation supports answer C, not marked answer"}, {"idx": 878, "ti": 19, "t": "2021-Jun", "q": "מה הקשר בין דיכאון לבין מחלות \\\"גופניות", "o": ["דיכאון בחולי סרטן שכיח יותר בגברים", "דיכאון יכול להיות תופעת לוואי שכיחה של טיפול ב- ACE INHIBITORS", "דיכאון משני לשבר בצוואר הירך נוטה להמשיך לטווח ארוך", "דיכאון בחולי סרטן נמצא בקורלציה עם חומרת הכאב"], "c": 3, "e": "התשובה הנכונה היא D – דיכאון בחולי סרטן נמצא בקורלציה עם חומרת הכאב.\n\nלמעשה, נראה שיש טעות בסימון התשובה הנכונה. אסביר:\n\n**תשובה A שגויה** – דיכאון בחולי סרטן שכיח יותר דווקא *בנשים*, בדומה למגמה הכללית באוכלוסייה. אין נתונים התומכים בשכיחות גבוהה יותר בגברים.\n\n**תשובה B שגויה** – מעכבי ACE אינם ידועים כגורמים שכיחים לדיכאון. תרופות הקשורות לדיכאון כוללות בטא-בלוקרים (בעיקר ליפופיליים), קורטיקוסטרואידים, אינטרפרון ובנזודיאזפינים. ACE inhibitors נחשבים בטוחים מבחינה פסיכיאטרית.\n\n**תשובה C שגויה** – דיכאון לאחר שבר בצוואר הירך שכיח מאוד (עד 30-50%), אך במרבית המקרים הוא משתפר עם שיקום והתאוששות תפקודית, ואינו בהכרח נוטה להמשיך לטווח ארוך אם מטופל כראוי.\n\n**תשובה D נכונה** – מחקרים רבים הוכיחו קורלציה ברורה בין עוצמת הכאב לבין חומרת הדיכאון בחולי סרטן. כאב בלתי נשלט מהווה גורם סיכון מרכזי לדיכאון, וטיפול אדקווטי בכאב משפר את מצב הרוח.\n\n**פנינה קלינית:** בקשישים עם סרטן, יש לטפל בכאב באגרסיביות – לא רק לשיפור איכות חיים אלא גם כמניעת דיכאון.", "reason": "Explanation states marked answer has an error"}, {"idx": 877, "ti": 6, "t": "2021-Jun", "q": "מה מתאר את הטיפול במחלת אלצהיימר עם מעכבי כולין אסטרז?", "o": ["מרבית החולים חווים עצירה או האטה של הירידה הקוגניטיבית", "מחקרים חדשים מראים שסוג זה של תרופות אינו Cost-Effective", "מעכבים מעבר מ- MCI למחלת אלצהיימר", "קיימים במתן פומי בלבד"], "c": 0, "e": "**שימו לב: התשובה המסומנת כנכונה (C) היא למעשה שגויה מבחינה קלינית.** מעכבי כולין אסטראז (דונפזיל, ריבסטיגמין, גלנטמין) **לא** הוכחו כמעכבים מעבר מ-MCI לאלצהיימר. מחקרים גדולים (כגון מחקר ADCS-MCI) הראו שדונפזיל לא הפחית באופן משמעותי את שיעור ההמרה מ-MCI לדמנציה בטווח הארוך. לכן, תרופות אלו אינן מאושרות להתוויה זו.\n\n**התשובה הנכונה קלינית היא A** — מרבית החולים חווים עצירה או האטה של הירידה הקוגניטיבית. מעכבי כולין אסטראז פועלים על ידי הגברת הזמינות של אצטילכולין בסינפסה, ומחקרים הראו שיפור צנוע או ייצוב קוגניטיבי ותפקודי במשך 6-12 חודשים בממוצע (Hazzard's, פרקי דמנציה; Harrison's פרק 448).\n\n**לגבי B** — מחקרים מראים שתרופות אלו דווקא cost-effective במידה סבירה, במיוחד כגנריות. **לגבי D** — ריבסטיגמין קיים גם כמדבקה טרנסדרמלית (patch), ולא רק במתן פומי.\n\n**פנינה קלינית:** מעכבי כולין אסטראז הם טיפול סימפטומטי בלבד — אינם משנים את מהלך המחלה (disease-modifying), ויעילותם צנועה אך משמעותית סטטיסטית.", "reason": "Explanation says marked answer is clinically wrong"}, {"idx": 881, "ti": 27, "t": "2021-Jun", "q": "בת86, התקבלה למחלקת סיעוד מורכבעקב פצע לחץ דרגה 4 עמוק ומזוהםבאזור הסאקרום. קיבלה טיפול מקומי בפצע באמצעות ניקוי והסרת הרקמות הנימקיות. כעבור שבועיים עדיין הפרשה מרובה עם ריח אופנסיבי, סימני צלוליטיס מסביב, ללא חום סיסטמי. בספירת דם 13,000 לויקוציטיםCRP = 24.5 (תקין עד0.5 .) נלקח מטוש לתרבית עם צמיחה של Pseudomonas aeruginosa ו- Providencia . מה הטיפול המתאים במצב זה", "o": ["טיפול מקומי בפצע בלבד. אין צורך בטיפול אנטיביוטי", "אנטיביוטיקה רחבת טווח", "טיפול אנטיביוטי סיסטמי מותאם לרגישות החיידקים שצמחו", "הטיפול ב VAC ( לחץ שלילי) הוא טיפול הבחירה בפצע מזוהם"], "c": 1, "e": "## ניתוח התשובה\n\n**שאלה זו מעוררת דיון קליני חשוב.** יש לציין שהתשובה הנכונה המסומנת (D) היא בעייתית מבחינה קלינית, אך ננתח לפי המפתח הנתון.\n\nטיפול בלחץ שלילי (VAC/NPWT) נחשב לטיפול יעיל בפצעי לחץ מורכבים מדרגה 3-4 לאחר דברידמן. הוא מסייע בהסרת הפרשות, הפחתת עומס חיידקי, קידום גרנולציה וצמצום גודל הפצע. בהנחיות עדכניות, VAC מומלץ כטיפול בחירה בפצעים עמוקים ומזוהמים לאחר ניקוי ראשוני.\n\n**תשובה A שגויה** — כאשר יש סימני צלוליטיס מסביב לפצע (אודם, חום מקומי, נפיחות), לויקוציטוזיס ו-CRP מוגבה משמעותית, מדובר בזיהום רקמות רכות מקומי שדורש התייחסות מעבר לטיפול מקומי בלבד.\n\n**תשובה B שגויה** — אנטיביוטיקה רחבת טווח אמפירית אינה מתאימה כאשר יש תוצאות תרבית עם רגישויות; יש ל��תאים טיפול ממוקד ולא \"לירות לכל הכיוונים\".\n\n**תשובה C** — טיפול אנטיביוטי סיסטמי מותאם תרבית נשמע הגיוני בנוכחות צלוליטיס, אך מטוש שטחי מפצע כרוני משקף קולוניזציה ולא בהכרח זיהום פולשני, ולכן אין להסתמך עליו לבחירת אנטיביוטיקה.\n\n**פנינה קלינית:** מטוש שטחי מפצע לחץ כרוני אינו אמין לזיהוי הפתוגן האמיתי; ביופסיית רק", "reason": "Explanation supports VAC therapy, not broad antibiotics"}, {"idx": 882, "ti": 13, "t": "2023-Sep", "q": "HgB g/dL 13.3 11.7-15.5 אשה Plt 10e3/µL 235 150-450 איזה מבין התרופות הבאות הינו הגורם להפרעה בספירת הדם בסבירות הגבוהה ביותר", "o": ["VENLAFAXINE (EFFEXOR)", "CLOZAPINE (LEPONEX)", "ALPRAZPLAM (XANAX)", "ZOLPIDEM (ZODORM)"], "c": 0, "e": "בבדיקות הדם המוצגות, ההמוגלובין תקין והטסיות תקינות, אך יש לשים לב שהשאלה מתייחסת להפרעה בספירת הדם – ככל הנראה הכוונה להיפונתרמיה או להפרעה המטולוגית שאינה מוצגת במלואה. עם זאת, מבין התרופות המפורטות, **Venlafaxine (Effexor)** – מעכב ספיגה חוזרת של סרוטונין ונוראפינפרין (SNRI) – ידוע כגורם משמעותי להפרעות המטולוגיות, ובמיוחד **דימום חריג והפרעה בתפקוד ה ת תרופות מחמירות** — בעיקר אנטיכולינרגיות, בנזודיאזפינים ואנטיהיסטמינים. לכן **B היא הצעד הנכון והמיידי בי��תר**.\n\n**C שגויה** כתשובה מיטבית — אמנם UTI שכיח כגורם לדליריום, אך הכנסת קתטר עצמה מהווה גורם סיכון לזיהום ולדליריום, ואין \"חובה\" להכניס קתטר; ניתן לבצע בדיקת שתן בדרכים אחרות. **A שגויה** — שחרור מוקדם מדי לאחר ניתוח ירך אינו בטוח. **D שגויה** — **כאב לא מטופל** הוא גורם סיכון מרכזי לדליריום; יש לתת אנלגזיה מתאימה.\n\n**פנינה קלינית:** בדליריום בקשישים", "reason": "Explanation argues answer B is correct, not C"}, {"idx": 885, "ti": 20, "t": "2021-Jun", "q": "בן78 , ימני, התקבל למחלקת שיקום גריאטרי לאחר שבץ בטריטוריה שלRt. Middle cerebral artery . מה הממצאים הצפויים פרט לפלגיה משמאל", "o": ["aphasia", "סטיית מבט לשמאל", "neglect", "חרשות באוזן ימין"], "c": 2, "e": "התשובה הנכונה היא **B – סטיית מבט לשמאל**, אך למעשה זוהי תשובה שגויה מבחינה קלינית, ונראה שהשאלה בודקת מהו הממצא ה**לא** צפוי (או שיש טעות בשאלה). בשבץ בטריטוריה של MCA ימנית, סטיית המבט הצפויה היא **לימין** (לכיוון הנגע), בשל פגיעה ב-frontal eye field הימני שאחראי על תנועות מבט לצד הנגדי. סטיית מבט **לשמאל** אינה צפויה בנגע זה, ולכן היא הממצא החריג.\n\n**A – Aphasia** – אפזיה אופיינית לנגע בהמיספרה הדומיננטית. אצל מטופל ימני, ההמיספרה הדומיננטית לשפה היא השמאלית. לכן נגע ב-MCA ימנית לא יגרום לאפזיה – תשובה זו אכן לא צפויה, אך מסיח.\n\n**C – Neglect** – הזנחה חד-צדדית שמאלית היא ממצא קלאסי ביותר בנגע MCA ימנית, בפרט בפגיעה באונה הפריאטלית הימנית. זהו ממצא צפוי.\n\n**D – חרשות באוזן ימין** – MCA אינה גורמת לחרשות פריפרית; הקורטקס השמיעתי מקבל קלט בילטרלי, כך שנגע חד-צדדי לא יגרום לחרשות.\n\n**פנינה קלינית:** בנגע MCA ימנית – חפשו neglect שמאלי, המיפלגיה שמאלית, וסטיית מבט לימין. אפזיה שייכת לצד שמאל בימניים.", "reason": "Explanation says B is correct, not neglect"}, {"idx": 886, "ti": 18, "t": "2023-Sep", "q": "K mmol/L 3.7 3.5-5.3 CREATININE mg/dL 0.6 0.7-1.3 BUN mg/dL 11 5-25 Osmolality mosmol/Kg בשתן 95 300-1300 Na mmol/L בשתן 13 29-145 מה הסיבה האפשרית ביותר לממצא המעבדתי", "o": ["SIADH משני
