ns no CPR, not 'do not treat.' Many reversible conditions (delirium, depression, medication effects) can mimic dementia progression.", "reason": "Explanation discusses post-concussive syndrome, not DNR status"}, {"idx": 2433, "ti": 7, "t": "Hazzard", "q": "A 74-year-old woman with depression and osteoarthritis presents with worsening hip pain limiting her walking to 50 feet. She takes sertraline 100mg, acetaminophen 3g daily, and refuses NSAIDs due to GI concerns. Pain scales show 7/10 pain affecting sleep and mood. Her daughter asks about tramadol. eGFR 58. Which analgesic approach is safest?", "o": ["Tramadol 25mg TID with close monitoring", "Duloxetine 30mg daily instead of sertraline", "Morphine 5mg q6h PRN", "Topical diclofenac gel QID"], "c": 3, "e": "Topical NSAIDs provide localized pain relief with minimal systemic absorption, avoiding GI and renal risks in elderly patients. Evidence supports efficacy for osteoarthritis.\n\nOption A (tramadol) is the TRAP - combining tramadol with SSRIs significantly increases serotonin syndrome risk (Beers Criteria: avoid combination). Many prescribers miss this interaction.\n\nOption B (duloxetine) could help both pain and depression but switching stable antidepressants adds complexity and duloxetine requires renal dose adjustment.\n\nOption C (morphine) should be avoided in elderly with chronic non-cancer pain due to falls, constipation, delirium, and dependence risks.\n\nClinical Pearl: For osteoarthritis in elderly, use stepwise approach: acetaminophen (<3g/day), topical NSAIDs, intra-articular injections, then duloxetine. Avoid tramadol with any serotonergic drugs (SSRIs, SNRIs, TCAs). If opioids necessary, use lowest dose, short-acting, with bowel regimen and fall precautions.", "reason": "Explanation contradicts patient's stated NSAID refusal"}, {"idx": 2437, "ti": 7, "t": "Hazzard", "q": "A 78-year-old retired professor with well-controlled bipolar II disorder on lamotrigine 200mg presents with his wife who reports increasing arguments about finances. He insists on investing their savings in 'guaranteed' cryptocurrency schemes he found online. He sleeps normally, denies mood symptoms, and MMSE is 27/30 with poor clock draw. MRI shows mild hippocampal atrophy. Which diagnosis best explains his behavior?", "o": ["Hypomanic episode", "Behavioral variant frontotemporal dementia", "Mild cognitive impairment", "Delusional disorder"], "c": 1, "e": "New-onset poor judgment and financial vulnerability in an older adult with personality change (arguments) and executive dysfunction (clock draw) suggests behavioral variant FTD, especially with preserved MMSE and hippocampal changes.\n\nOption A (hypomania) is the TRAP - bipolar history makes clinicians assume mood episode, but he lacks cardinal hypomanic symptoms (decreased sleep, elevated mood, increased energy).\n\nOption C (MCI) doesn't explain the prominent behavioral changes and poor judgment.\n\nOption D (delusional disorder) requires fixed false beliefs; poor judgment about investments isn't necessarily delusional.\n\nClinical Pearl: Behavioral variant FTD presents with personality change, disinhibition, apathy, loss of empathy, and executive dysfunction before memory loss. Often misdiagnosed as psychiatric illness. Unlike bipolar disorder, mood symptoms aren't prominent. Financial vulnerability is common - consider capacity evaluation and financial protections early.", "reason": "Explanation contradicts itself - mentions hippocampal changes"}, {"idx": 2453, "ti": 7, "t": "Hazzard", "q": "An 86-year-old nursing home resident with severe Alzheimer's disease (MMSE 8/30) and osteoarthritis is evaluated for increased calling out and resistance to care. Staff report she moans during repositioning and hits caregivers during bathing. She's been on memantine 10 mg BID and acetaminophen 650 mg TID scheduled. Exam reveals grimacing with passive hip flexion and guarding during abdominal palpation. What is the most appropriate next step?", "o": ["Start morphine 2.5 mg q4h PRN", "Increase acetaminophen to 1000 mg QID", "Start haloperidol 0.25 mg BID", "Trial of gabapentin 100 mg TID"], "c": 1, "e": "This patient has behavioral symptoms due to untreated pain in severe dementia. The correct answer is to increase acetaminophen to 1000 mg QID - she's showing pain behaviors (grimacing, guarding) and is on subtherapeutic acetaminophen. Maximum safe dose in elderly is 3-4 grams daily, and scheduled dosing is key for dementia patients who can't request PRN medications.\n\nOption A (morphine PRN) is the trap - opioids seem appropriate for pain but PRN dosing is useless in severe dementia (can't request), and opioids increase delirium, falls, and constipation.\n\nOption C (haloperidol) treats behavioral symptoms without addressing underlying pain - violates principle of finding reversible causes first.\n\nOption D (gabapentin) could help neuropathic pain but no evidence of neuropathy, and sedation worsens function.\n\nClinical Pearl: Pain in dementia often presents as aggression, resistance to care, or vocalization. Use observational pain scales (PAINAD, PACSLAC). Start with scheduled acetaminophen 3-4 grams daily before adding other analgesics. If opioids needed, use scheduled low-dose, short-acting agents with aggressive bowel regimens.", "reason": "Explanation supports acetaminophen 3-4g daily, not 4g"}, {"idx": 2450, "ti": 7, "t": "Hazzard", "q": "A 75-year-old woman with recurrent major depression and generalized anxiety disorder presents for follow-up. She's been stable on escitalopram 20 mg daily and buspirone 15 mg BID for 2 years. She reports new-onset dizziness and fell last week. Review of systems reveals constipation and dry mouth. Her daughter mentions she seems 'slower mentally.' Labs: Na 128, K 3.8, Cr 1.1. Medication review reveals her PCP recently added nortriptyline 25 mg for 'nerve pain.' What is the most appropriate action?", "o": ["Discontinue nortriptyline", "Reduce escitalopram to 10 mg", "Check thyroid function", "Fluid restriction for SIADH"], "c": 0, "e": "This patient has multiple adverse effects from nortriptyline. The correct answer is to discontinue nortriptyline - a TCA on Beers 2023 criteria causing her anticholinergic symptoms (constipation, dry mouth, cognitive slowing), orthostatic hypotension (dizziness, fall), and contributing to hyponatremia. Adding a TCA to an SSRI also increases SIADH risk.\n\nOption B (reducing escitalopram) is the trap - providers often blame the longstanding SSRI for new symptoms, but she was stable for 2 years until nortriptyline was added.\n\nOption C (thyroid check) is reasonable but doesn't address the clear temporal relationship with nortriptyline.\n\nOption D (fluid restriction) treats hyponatremia symptomatically without removing the cause.\n\nClinical Pearl: Elderly patients on SSRIs have 4-fold increased SIADH risk. Adding medications with SIADH potential (TCAs, carbamazepine, NSAIDs) compounds this risk. For neuropathic pain in patients on SSRIs, prefer gabapentin or pregabalin. Always use anticholinergic burden calculators when adding medications.", "reason": "Question text appears cut off and incomplete"}, {"idx": 2479, "ti": 14, "t": "Hazzard", "q": "An 86-year-old nursing home resident with severe Alzheimer's disease (unable to communicate) shows signs of discomfort during perineal care. Staff report she strikes out when touched 'down there.' Pelvic exam reveals severe vulvar atrophy and fissuring. She has no fever or discharge. Her only medication is memantine. Urine culture is negative. What is the most appropriate treatment?", "o": ["Topical estrogen cream 0.5g twice weekly", "Oral gabapentin 100mg TID", "Lidocaine 2% jelly before care", "Oral estrogen 0.3mg daily"], "c": 2, "e": "Lidocaine jelly is correct for immediate relief during necessary care. This addresses the acute behavioral symptoms (striking out) triggered by painful vulvar atrophy while avoiding systemic medications in severe dementia.\n\nOption A (topical estrogen) is the trap - while treating the underlying cause seems logical, it takes weeks for effect and doesn't address immediate pain during care. Many physicians reflexively treat the pathology rather than the functional problem.\n\nOption B (gabapentin) causes sedation and confusion, worsening dementia symptoms without targeted benefit for localized pain.\n\nOption D (oral estrogen) has systemic risks (VTE, stroke) and is inappropriate for localized vulvar atrophy in advanced dementia.\n\nClinical Pearl: In advanced dementia, behavioral symptoms often represent pain or discomfort. Address immediate functional needs (peaceful care provision) while considering longer-term treatments. Topical anesthetics provide rapid relief for procedure-related pain in non-verbal patients.", "reason": "Explanation contradicts itself - describes Option A scenario"}, {"idx": 2476, "ti": 14, "t": "Hazzard", "q": "A 78-year-old man develops severe right facial pain after shingles 4 months ago. Pain is burning, constant, 8/10 in the V2 distribution. He tried gabapentin 300mg TID but discontinued due to confusion. His wife reports he's stopped shaving and eating solid foods. He has mild cognitive impairment (MoCA 22/30), DM2, and takes metformin and glyburide. Exam shows allodynia over right maxilla. Which treatment is most appropriate?", "o": ["Carbamazepine 100mg BID", "Posterior superior alveolar nerve block", "Amitriptyline 10mg at bedtime", "Pregabalin 50mg BID"], "c": 1, "e": "Posterior superior alveolar nerve block is correct for post-herpetic neuralgia in the V2 distribution failing systemic therapy. This provides targeted relief without cognitive side effects, crucial in this patient with baseline MCI who already failed gabapentin due to confusion.\n\nOption A (carbamazepine) is the trap - it's first-line for trigeminal neuralgia, leading physicians to use it for facial pain. However, it's less effective for PHN and requires extensive monitoring (CBC, LFTs, sodium) in elderly. It also interacts with glyburide.\n\nOption C (amitriptyline) is on Beers 2023 list, particularly risky with MCI due to anticholinergic effects worsening cognition.\n\nOption D (pregabalin) has similar side effects to gabapentin which already caused confusion. Lower doses unlikely to help.\n\nClinical Pearl: Facial PHN significantly impacts function (eating, hygiene). When systemic medications fail or cause cognitive impairment in elderly, nerve blocks provide targeted relief preserving cognition. The loss of ADLs (shaving, eating solids) indicates urgent need for effective treatment.", "reason": "Nerve block is procedure, not treatment option"}, {"idx": 2487, "ti": 28, "t": "Hazzard", "q": "A 79-year-old woman with multi-infarct dementia and type 2 diabetes is admitted from her assisted living facility with pneumonia. On day 3, she becomes increasingly somnolent and picks at her bedsheets. Her aide reports she was independent in all ADLs at baseline. Medications include metformin, lisinopril, and citalopram 20mg. Vitals stable, glucose 145. CAM assessment is positive. Which medication should be discontinued first?", "o": ["Metformin due to lactic acidosis risk", "Lisinopril due to hypotension risk", "Citalopram due to anticholinergic properties", "All medications should be continued"], "c": 2, "e": "This patient has hypoactive delirium (CAM positive with somnolence and picking behaviors). Citalopram, while not classically anticholinergic, can worsen delirium in elderly patients and is associated with QT prolongation at doses >20mg in those over 60.\n\nOption A (metformin) is the TRAP - many physicians reflexively discontinue metformin during acute illness fearing lactic acidosis, but with stable vitals and normal glucose, this isn't indicated. Metformin rarely causes delirium.\n\nOption B (lisinopril) shouldn't be stopped without hypotension. Abrupt discontinuation could worsen cardiac status.\n\nOption D is incorrect as medication review is essential in delirium, particularly for drugs affecting cognition.\n\nClinical Pearl: In geriatric delirium, systematically review all medications using STOPP criteria. SSRIs, despite being 'safer' than tricyclics, can still contribute to delirium through various mechanisms including hyponatremia, serotonin effects, and drug interactions. The FDA recommends maximum citalopram dose of 20mg in patients >60 years.", "reason": "Citalopram is actually NOT highly anticholinergic"}, {"idx": 2499, "ti": 28, "t": "Hazzard", "q": "An 86-year-old man with advanced COPD (FEV1 30% predicted), heart failure (EF 35%), and stage 4 CKD (eGFR 22) presents to the ED with his third exacerbation in 6 months. He requires BiPAP and is started on IV methylprednisolone and antibiotics. His daughter mentions he can no longer manage his medications independently and recently fell twice. He has a living will stating no intubation. On day 3, he remains on BiPAP with minimal improvement. The ICU team suggests transition to comfort care. Which is the most appropriate next step?", "o": ["Transfer to ICU for trial of non-invasive ventilation optimization", "Initiate morphine infusion and discontinue BiPAP", "Palliative care consultation to clarify goals while continuing current treatment", "Discharge to hospice facility immediately"], "c": 2, "e": "The correct answer is palliative care consultation while continuing treatment. This patient has a life-limiting illness but DNI status does NOT equal comfort care only. Palliative care can help clarify goals, manage symptoms, and support decision-making while aggressive treatment continues.\n\nOption A (ICU transfer) contradicts his documented wishes against intubation and escalation. This is the trap answer - many physicians equate DNI with no ICU care, but non-invasive support in ICU may be appropriate.\n\nOption B (morphine/discontinue BiPAP) represents premature transition to comfort care without proper goals-of-care discussion. This assumes DNI means comfort only.\n\nOption D (immediate hospice) is premature without establishing that the patient/family want to transition to comfort-focused care.\n\nClinical Pearl: Palliative care consultation is appropriate at ANY stage of serious illness, not just end-of-life. Early palliative care improves quality of life, symptom management, and even survival in some conditions. DNR/DNI orders specify procedural limitations, not overall care intensity.", "reason": "Explanation contradicts itself about ICU appropriateness"}, {"idx": 2490, "ti": 28, "t": "Hazzard", "q": "An 82-year-old man recently diagnosed with lung adenocarcinoma is discussing treatment options. His oncologist recommends carboplatin-based chemotherapy. The patient is living independently, walks 2 miles daily, and manages his own finances. His main concern is maintaining his ability to care for his disabled wife. eGFR 45mL/min/1.73m². Which factor most strongly supports proceeding with chemotherapy?", "o": ["His excellent performance status", "The specific histology of adenocarcinoma", "His role as primary caregiver", "His preserved IADL function"], "c": 3, "e": "Preserved IADL function (managing finances) indicates intact executive function and predicts better tolerance of chemotherapy and ability to manage complex treatment regimens. This functional marker is more predictive than chronologic age.\n\nOption A (performance status) is the TRAP - while walking 2 miles seems impressive, basic mobility doesn't capture the cognitive reserve needed to handle chemotherapy's complexities and side effects. Many physicians overrely on physical function alone.\n\nOption B (adenocarcinoma histology) determines drug selection but doesn't predict treatment tolerance in elderly patients.\n\nOption C (caregiver role) represents his values but doesn't indicate whether he can physiologically tolerate treatment.\n\nClinical Pearl: In geriatric oncology, IADL assessment predicts chemotherapy tolerance better than ADLs or performance status. Managing finances requires executive function, planning, and cognitive flexibility - skills needed to recognize and report side effects, maintain appointments, and manage complex medication regimens. Always dose-adjust carboplatin for renal function using Calvert formula.", "reason": "Explanation describes option A not marked answer"}, {"idx": 2509, "ti": 28, "t": "Hazzard", "q": "A 79-year-old woman with CHF (EF 30%), CKD stage 4 (eGFR 18), and diabetes is seen in heart failure clinic. Despite maximal medical therapy, she has NYHA Class IV symptoms. She asks about life expectancy to 'get her affairs in order.' Using the Seattle Heart Failure Model, her 1-year mortality is 40%. How should the physician respond?", "o": ["You likely have less than a year to live", "We can't predict individual survival, so let's focus on symptom management", "Based on your conditions, average survival is about 12-18 months, though individuals vary", "Let's wait until you're sicker to discuss prognosis"], "c": 2, "e": "The correct answer provides honest prognostic information while acknowledging uncertainty. Patients deserve truthful prognosis communication to make informed decisions, balanced with hope and individual variation.\n\nOption A (less than a year) oversimplifies statistics and removes hope. 40% one-year mortality means 60% survive longer.\n\nOption B (avoiding prognosis) is the trap answer - many physicians deflect prognostic questions, but patients need this information for planning. Withholding requested information violates autonomy.\n\nOption D (delay discussion) misses the patient's clear request and readiness to plan. Delaying may result in crisis decision-making.\n\nClinical Pearl: When discussing prognosis, use the 'warning shot, pause, assess understanding' approach. Provide ranges rather than point estimates, acknowledge uncertainty, and explore what information would be helpful. Concurrent palliative care in advanced heart failure improves quality of life and mood.", "reason": "40% 1-year mortality doesn't support 12-18 months"}, {"idx": 2548, "ti": 17, "t": "Hazzard", "q": "An 81-year-old man with HFrEF (EF 35%), CKD stage 4 (eGFR 26), and DM2 presents with worsening dyspnea. Current medications: carvedilol 6.25mg BID, furosemide 40mg BID, lisinopril 5mg daily. BP 108/64, HR 78. Labs: K 5.2, BNP 890. He asks about starting sacubitril/valsartan after reading about it online. What is the most appropriate response?", "o": ["Start sacubitril/valsartan 24/26mg BID after 36-hour washout", "Unsuitable due to CKD stage 4 - continue current regimen", "Start sacubitril/valsartan 49/51mg BID immediately", "Increase lisinopril to 10mg daily instead"], "c": 1, "e": "Sacubitril/valsartan is contraindicated in severe renal impairment (eGFR <30) due to hyperkalemia risk. This patient with eGFR 26 and K 5.2 should continue current therapy with careful monitoring.\n\nOption A is the TRAP - while the 36-hour washout is correct to avoid angioedema, many prescribers focus on the transition protocol without checking renal contraindications first.\n\nOption C is doubly wrong - no washout period and starting at higher dose in renal impairment.\n\nOption D would worsen hyperkalemia with higher ACE inhibitor dose when potassium is already 5.2.\n\nClinical Pearl: In advanced CKD (eGFR <30), many guideline-directed HF medications require dose adjustment or avoidance. Sacubitril/valsartan is contraindicated <30, spironolactone requires extreme caution <45. Focus on volume management and consider earlier dialysis planning in cardiorenal syndrome.", "reason": "Explanation says eGFR <30 contraindicated, patient has 26"}, {"idx": 2554, "ti": 17, "t": "Hazzard", "q": "A 79-year-old woman with new-onset AF (CHA2DS2-VASc 4) and stage 3b CKD (eGFR 38) is started on amiodarone for rate control after metoprolol and diltiazem failed. Baseline QTc 438ms. Two weeks later, she reports tremor and cold intolerance. TSH 0.02 (baseline 2.1), free T4 3.8 (normal 0.8-1.8). What is the most appropriate management?", "o": ["Discontinue amiodarone and start methimazole", "Continue amiodarone and start propranolol", "Discontinue amiodarone and start prednisone", "Continue amiodarone and monitor monthly"], "c": 0, "e": "Amiodarone-induced thyrotoxicosis type 2 (destructive thyroiditis) requires amiodarone discontinuation when possible and antithyroid drugs. In elderly with AF, the hyperthyroidism worsens cardiac status.\n\nOption B is the TRAP - continuing amiodarone while treating side effects is tempting when other rate control failed, but thyrotoxicosis in elderly AF patients increases stroke and mortality risk.\n\nOption C suggests type 2 amiodarone thyrotoxicosis treatment, but methimazole is first-line and safer than steroids in elderly.\n\nOption D ignores symptomatic hyperthyroidism which requires treatment.\n\nClinical Pearl: Amiodarone causes thyroid dysfunction in 15-20% of patients. Check TSH before starting and every 6 months. In elderly, consider dronedarone if normal LV function, or AV node ablation with pacing if medical rate control fails. Amiodarone's half-life is 40-55 days - effects persist months after stopping.", "reason": "Methimazole treats type 1, not type 2"}, {"idx": 2564, "ti": 17, "t": "Hazzard", "q": "A 78-year-old woman presents 2 hours after onset of substernal chest pressure. ECG shows ST depressions in V4-V6. Initial troponin 0.8 ng/mL (normal <0.04). She takes aspirin 81 mg, lisinopril 10 mg, and simvastatin 20 mg. Creatinine 1.6 mg/dL, weight 58 kg. The resident suggests starting enoxaparin 1 mg/kg BID. What is the appropriate dosing adjustment?", "o": ["Enoxaparin 40 mg BID", "Enoxaparin 60 mg daily", "Enoxaparin 30 mg BID", "Enoxaparin 80 mg BID"], "c": 2, "e": "The correct answer is enoxaparin 30 mg BID. Using Cockcroft-Gault: CrCl = (140-78) × 58 × 0.85 / (72 × 1.6) = 26.5 mL/min. With CrCl <30 mL/min, enoxaparin requires 50% dose reduction for ACS treatment, so instead of 1 mg/kg BID (60 mg BID), give 30 mg BID.\n\nOption A (40 mg BID) is the TRAP - this represents prophylactic dosing for VTE prevention, not therapeutic dosing for ACS. Many providers confuse these indications.\n\nOption B (60 mg daily) incorrectly applies once-daily dosing, which is for VTE treatment, not ACS.\n\nOption D (80 mg BID) would represent unadjusted dosing if using actual body weight incorrectly (80 kg vs 58 kg), risking major bleeding.\n\nClinical Pearl: Always calculate CrCl using Cockcroft-Gault (not eGFR) for drug dosing in elderly. Low-molecular-weight heparins require dose adjustment when CrCl <30 mL/min. In ACS, enoxaparin is dosed BID (not daily as in VTE). Registry data shows elderly patients often receive excessive anticoagulation due to failure to adjust for renal function.", "reason": "Explanation says 60 mg BID reduced by 50%"}, {"idx": 2572, "ti": 17, "t": "Hazzard", "q": "An 81-year-old man with paroxysmal AF (CHA2DS2-VASc 4), prior GI bleed 2 years ago, and recent diagnosis of mild Alzheimer's disease presents for anticoagulation counseling. He lives with his daughter who manages his medications. He takes aspirin 81 mg, diltiazem 180 mg daily, and donepezil 10 mg. His daughter is concerned about bleeding risk but also worried about stroke. What is the most appropriate anticoagulation strategy?", "o": ["Start apixaban 2.5 mg BID", "Continue aspirin alone given bleeding history", "Start dabigatran 110 mg BID", "Start apixaban 5 mg BID"], "c": 3, "e": "The correct answer is starting apixaban 5 mg BID. Despite remote GI bleed and mild dementia, his high stroke risk (CHA2DS2-VASc 4) mandates anticoagulation. Apixaban showed lowest GI bleeding risk among DOACs and doesn't require dose reduction for age alone. With daughter managing medications, adherence is feasible.\n\nOption A (reduced-dose apixaban) is the TRAP - many physicians inappropriately dose-reduce based on age alone, but he doesn't meet criteria for reduction (needs 2 of: age ≥80, weight ≤60 kg, or Cr ≥1.5).\n\nOption B (aspirin alone) is inadequate with 6-7% annual stroke risk at CHA2DS2-VASc 4, while aspirin only reduces stroke by ~20%.\n\nOption C (dabigatran) has higher GI bleeding risk than apixaban and twice-daily dosing, making it less ideal with cognitive impairment.\n\nClinical Pearl: Don't automatically dose-reduce DOACs in elderly - use drug-specific criteria. Remote GI bleeding (>1 year) shouldn't preclude anticoagulation in high-risk AF. With cognitive impairment, choose DOACs with best safety profiles and consider caregiver involvement for adherence.", "reason": "Patient is 81 years old, meets reduction criteria"}, {"idx": 2562, "ti": 17, "t": "Hazzard", "q": "A 77-year-old woman with paroxysmal atrial fibrillation, heart failure (EF 42%), and CKD stage 3a (eGFR 52) is admitted with NSTEMI. Coronary angiography shows 80% LAD stenosis requiring PCI with drug-eluting stent. She's on apixaban 5 mg BID for stroke prevention. The interventional cardiologist wants to start 'triple therapy.' Which regimen is most appropriate for this patient?", "o": ["Apixaban 5 mg BID + aspirin 81 mg + clopidogrel 75 mg for 1 month", "Warfarin (INR 2-3) + aspirin 325 mg + clopidogrel 75 mg for 3 months", "Apixaban 2.5 mg BID + clopidogrel 75 mg (no aspirin)", "Rivaroxaban 2.5 mg BID + aspirin 81 mg + clopidogrel 75 mg for 6 months"], "c": 2, "e": "The correct answer is reduced-dose apixaban (2.5 mg BID) with clopidogrel only, omitting aspirin. Recent trials (AUGUSTUS, RE-DUAL PCI) show that in elderly patients requiring anticoagulation post-PCI, dual therapy (anticoagulant + P2Y12 inhibitor) has similar efficacy with significantly less bleeding than triple therapy.\n\nOption A (full-dose triple therapy) is the TRAP - this was standard practice until recently, but carries unacceptable bleeding risk in elderly patients. The full apixaban dose adds further risk.\n\nOption B (warfarin-based triple therapy with high-dose aspirin) represents outdated practice with highest bleeding risk, especially with aspirin 325 mg.\n\nOption D (rivaroxaban 2.5 mg BID from COMPASS trial) is for stable CAD without AF indication; this dose is inadequate for stroke prevention in AF.\n\nClinical Pearl: In elderly patients with AF requiring PCI, prefer DOAC-based dual therapy over triple therapy. When triple therapy is necessary, limit to 1 week maximum with aspirin 81 mg. The 2.5 mg BID apixaban dose is specifically studied for this indication in combination with antiplatelet therapy.", "reason": "Explanation describes dual therapy, marked answer includes aspirin"}, {"idx": 2578, "ti": 18, "t": "Hazzard", "q": "An 85-year-old woman with HFrEF (EF 28%), moderate Alzheimer's dementia, and CrCl 32 mL/min (Cockcroft-Gault) is admitted with volume overload. Home medications include lisinopril 10 mg daily, carvedilol 3.125 mg BID, and furosemide 40 mg daily. She's given IV furosemide with good diuresis. Her family asks about starting 'the new heart pill they saw on TV' (sacubitril/valsartan). Her BP is 102/58. What is the most appropriate response?", "o": ["Start sacubitril/valsartan 24/26 mg BID after 36-hour washout", "Sacubitril/valsartan is contraindicated due to renal function", "Continue current regimen due to hypotension risk", "Defer decision pending cognitive assessment"], "c": 0, "e": "Sacubitril/valsartan can be safely initiated in this patient after a 36-hour ACE inhibitor washout period. While her CrCl is 32 mL/min, sacubitril/valsartan is only contraindicated when eGFR <30 mL/min/1.73m² (not Cockcroft-Gault CrCl). The PARADIGM-HF trial showed mortality benefit even in elderly patients. Option B is the trap - many physicians confuse CrCl cutoffs with eGFR cutoffs, but FDA labeling uses eGFR for this drug. Option C incorrectly avoids proven therapy due to borderline BP (102/58 is acceptable for initiating at lowest dose). Option D inappropriately denies evidence-based therapy based on dementia diagnosis alone - moderate dementia doesn't preclude heart failure treatment. Clinical Pearl: Don't withhold life-prolonging HFrEF therapies from dementia patients unless they're in terminal phase or have explicitly stated comfort-only goals. Use eGFR (not Cockcroft-Gault) for ARNI dosing decisions.", "reason": "Explanation contradicts low BP being acceptable"}, {"idx": 2577, "ti": 18, "t": "Hazzard", "q": "A 77-year-old man with HFpEF, paroxysmal AFib, and recent fall with hip fracture presents to ED with acute dyspnea. He's on diltiazem 180 mg daily, apixaban 5 mg BID, and hydrochlorothiazide 25 mg daily. Since his fall 3 weeks ago, he's been bedbound. Exam: bilateral crackles, 2+ edema, irregular rhythm. ECG shows AFib with RVR (rate 145). CXR shows pulmonary edema. NT-proBNP 3400. Which intervention is most appropriate?", "o": ["IV diltiazem 10 mg bolus then increase oral dose", "Synchronized cardioversion", "IV furosemide 40 mg and continue current diltiazem", "Add digoxin 0.125 mg daily"], "c": 2, "e": "This patient has acute decompensated HFpEF triggered by AFib with rapid ventricular response and deconditioning from bedrest. The priority is treating pulmonary edema with IV diuretics while maintaining rate control. His current diltiazem dose is adequate once euvolemia is achieved. Option A (IV diltiazem bolus) is the trap - while tempting for immediate rate control, calcium channel blockers can precipitate acute heart failure in volume-overloaded HFpEF patients by their negative inotropic effects. Option B (cardioversion) won't address the volume overload and AFib will likely recur without treating the precipitant. Option D (digoxin) is not first-line for rate control and has a narrow therapeutic window in elderly with renal dysfunction. Clinical Pearl: In acute HFpEF exacerbations with concurrent AFib/RVR, prioritize diuresis over aggressive rate control - heart rate often improves with volume removal alone, avoiding negative inotropes in the acute setting.", "reason": "Explanation argues against IV diltiazem bolus option"}, {"idx": 2576, "ti": 18, "t": "Hazzard", "q": "An 81-year-old nursing home resident with moderate vascular dementia, HFrEF (EF 30%), and CKD stage 3b is found unresponsive. She's on carvedilol 6.25 mg BID, lisinopril 5 mg daily, furosemide 40 mg daily, and memantine 10 mg BID. Blood glucose is 42 mg/dL. After IV dextrose, she awakens but remains confused. Her advance directive specifies DNR but allows all other treatments. What is the most likely cause of her hypoglycemia?", "o": ["Decreased oral intake due to dementia progression", "Carvedilol masking hypoglycemic symptoms", "Memantine-induced hypoglycemia", "Occult insulinoma"], "c": 1, "e": "Carvedilol and other non-selective beta-blockers can both precipitate hypoglycemia (by blocking hepatic gluconeogenesis and glycogenolysis) and mask its warning symptoms (tremor, tachycardia) in elderly patients. This is particularly dangerous in dementia patients who cannot verbalize symptoms. Option A (decreased intake) is the trap - while plausible in dementia, it doesn't explain the acute severe hypoglycemia without other signs of failure to thrive. Option C is incorrect as memantine doesn't affect glucose metabolism. Option D (insulinoma) is extremely rare and would cause recurrent episodes. Clinical Pearl: In elderly heart failure patients with cognitive impairment, consider switching from non-selective beta-blockers (carvedilol, propranolol) to cardioselective ones (bisoprolol, metoprolol) to reduce hypoglycemia risk, especially if they have diabetes or poor nutritional intake.", "reason": "Explanation describes precipitating hypoglycemia, not just masking"}, {"idx": 2590, "ti": 17, "t": "Hazzard", "q": "A 79-year-old woman residing in assisted living is found unresponsive by staff. She has heart failure (EF 25%), permanent AF on warfarin, and mild cognitive impairment. Staff report she seemed confused yesterday and fell twice this week. On arrival, she opens eyes to voice, follows simple commands intermittently, and has slurred speech. BP 95/60, HR 42 regular. ECG shows complete heart block with narrow QRS escape. Which intervention is most appropriate?", "o": ["Immediate temporary pacemaker insertion", "Atropine 0.5 mg IV", "Check digoxin level and hold warfarin", "Dopamine infusion 5 mcg/kg/min"], "c": 2, "e": "The correct answer is to check digoxin level and hold warfarin. This presentation suggests digoxin toxicity causing complete heart block - the confusion, falls, and bradycardia form a classic triad in elderly patients. Though not mentioned in her medications, digoxin is commonly prescribed for AF with HF.\n\nOption A (temporary pacing) is the trap answer that aggressive clinicians would choose. While pacing treats the bradycardia, it doesn't address the underlying cause and subjects a frail elderly patient to an invasive procedure that may be unnecessary if digoxin toxicity resolves.\n\nOption B (atropine) is ineffective for complete heart block and may paradoxically worsen AV conduction in digoxin toxicity.\n\nOption D (dopamine) provides chronotropic support but doesn't address the cause and increases myocardial oxygen demand in a patient with systolic dysfunction.\n\nClinical Pearl: In elderly patients with new AV block, always consider medication toxicity first, especially digoxin. The combination of altered mental status, falls, and bradyarrhythmia should trigger immediate digoxin level checking. Digoxin is on Beers criteria for multiple reasons including narrow therapeutic window in elderly.", "reason": "Explanation contradicts itself - digoxin not mentioned"}, {"idx": 2593, "ti": 17, "t": "Hazzard", "q": "An 81-year-old man is admitted with syncope while grocery shopping. He has coronary disease (3-vessel CABG 8 years ago), heart failure with EF 30%, and moderate COPD. Medications include carvedilol 12.5 mg BID, lisinopril 10 mg, furosemide 40 mg, spironolactone 25 mg, and tiotropium. Telemetry shows 8-beat run of VT at 180 bpm during syncope. EP study induces sustained monomorphic VT. His daughter mentions he's been falling more and needed help with bills recently. What is the most appropriate management?", "o": ["ICD implantation for secondary prevention", "Amiodarone 200 mg daily", "Shared decision-making about ICD given functional decline", "Wearable cardioverter-defibrillator trial"], "c": 2, "e": "The correct answer is shared decision-making about ICD given functional decline. While this patient meets criteria for secondary prevention ICD (sustained VT with syncope), the recent functional decline (falls, needing help with IADLs like managing finances) suggests emerging frailty that must be factored into decision-making.\n\nOption A (immediate ICD) is the trap answer - guidelines clearly recommend ICD for secondary prevention, but don't account for functional decline and frailty. Many physicians reflexively follow guidelines without considering the whole patient.\n\nOption B (amiodarone) is inferior to ICD for preventing sudden cardiac death and has significant toxicity risks, especially pulmonary toxicity in someone with COPD. It might be reasonable if patient declines ICD after informed discussion.\n\nOption D (wearable defibrillator) only delays the necessary decision and may not be manageable for someone with cognitive/functional decline who needs help with IADLs.\n\nClinical Pearl: ICD guidelines were developed from trials that excluded frail elderly patients. Functional decline, especially in IADLs, predicts poor outcomes and should trigger comprehensive goals-of-care discussions. The ability to manage device alerts and follow-up visits must be considered alongside mortality benefit.", "reason": "Explanation is incomplete and cuts off abruptly"}, {"idx": 2595, "ti": 17, "t": "Hazzard", "q": "An 85-year-old man with CKD stage 3b (eGFR 36), permanent AF, and moderat frailty is seen in cardiology clinic. He's on metoprolol 50 mg BID and apixaban 5 mg BID. Resting HR is 95-105. He reports fatigue walking to the mailbox (50 meters) and his wife notes he naps twice daily. ECG shows AF with controlled ventricular response. Echo reveals EF 58%, moderate MR, LA volume 45 mL/m². Which intervention is most appropriate?", "o": ["Add digoxin 0.125 mg daily", "Catheter ablation for AF", "Increase metoprolol to 75 mg BID", "Add diltiazem 120 mg daily"], "c": 3, "e": "The correct answer is add diltiazem 120 mg daily. This patient has symptomatic AF with inadequate rate control despite β-blocker therapy. Adding a non-dihydropyridine calcium channel blocker is appropriate for better rate control. His fatigue and exercise intolerance likely stem from inadequate rate control rather than the rate itself.\n\nOption A (digoxin) is the trap answer - historically popular for elderly AF patients, but provides poor rate control during activity. With eGFR 36, digoxin requires dose adjustment and careful monitoring. It's also on Beers criteria for fall risk and toxicity in CKD.\n\nOption B (ablation) is inappropriate for an 85-year-old with moderate frailty. Permanent AF with enlarged left atrium has low ablation success rates, and procedural risks increase with age and frailty.\n\nOption C (increasing metoprolol) may cause excessive bradycardia at rest without improving exercise rate control, worsening his fatigue.\n\nClinical Pearl: Rate control in elderly AF should target symptoms, not strict HR goals. The combination of β-blocker plus non-dihydropyridine CCB often provides better 24-hour rate control than either alone. Avoid reflexive digoxin use - it's inferior for active rate control and problematic in CKD.", "reason": "Resting HR 95-105 contradicts 'controlled ventricular response'"}, {"idx": 2584, "ti": 18, "t": "Hazzard", "q": "An 80-year-old man with ischemic cardiomyopathy (EF 20%), CKD stage 4 (eGFR 24), and diabetes is admitted with cardiogenic shock. He's on carvedilol 3.125 mg BID, lisinopril 2.5 mg daily, spironolactone 12.5 mg daily, and furosemide 80 mg BID. BP 82/50, HR 95, CI 1.8 L/min/m². Lactate 2.8. The ICU team starts dobutamine 5 mcg/kg/min. His family previously expressed desire for 'everything done' but haven't discussed specifics. What should be addressed next?", "o": ["Add milrinone for additional inotropy", "Urgent IABP placement", "Goals-of-care discussion about prognosis and options", "Emergent dialysis for volume removal"], "c": 2, "e": "This patient in cardiogenic shock with multiple comorbidities needs immediate goals-of-care discussion. 'Everything done' often reflects lack of prognostic understanding rather than true desire for indefinite mechanical support. With EF 20% and CKD stage 4, he's unlikely to be a transplant or LVAD candidate. Option A (milrinone) is the trap - reflexively adding inotropes without addressing the bigger picture of whether temporary measures align with achievable goals. His current dobutamine provides adequate support for the discussion. Option B (IABP) is a bridge to nowhere without transplant/LVAD eligibility. Option D (dialysis) may worsen hemodynamics in cardiogenic shock. Clinical Pearl: In elderly patients with cardiogenic shock, early goals-of-care discussions are crucial - temporary mechanical support without exit strategy (transplant/LVAD eligibility) may prolong suffering without meaningful recovery possibility.", "reason": "Explanation advocates milrinone as trap, contradicts marked answer"}, {"idx": 2606, "ti": 17, "t": "Hazzard", "q": "An 81-year-old man with mild cognitive impairment is found to have 4.8 cm AAA on screening ultrasound. His medications include lisinopril, metformin, and donepezil. CrCl 45 mL/min. He lives alone, manages IADLs independently. What is the appropriate surveillance interval?", "o": ["Repeat ultrasound in 3 months", "Repeat ultrasound in 6 months", "Repeat ultrasound in 12 months", "Proceed with elective repair"], "c": 2, "e": "The correct answer is 12-month surveillance. For AAA 4.0-4.9 cm, annual imaging is recommended per SVS guidelines. His functional independence and mild cognitive impairment don't alter surveillance timing.\n\nOption A (3 months) is too frequent - reserved for AAA approaching intervention threshold (5.0-5.4 cm) or rapid expansion.\n\nOption B (6 months) is the trap answer - many practitioners over-survey 4-5 cm aneurysms, but evidence shows annual imaging is sufficient as growth averages 0.2-0.3 cm/year at this size.\n\nOption D (elective repair) is premature - intervention threshold is 5.5 cm for men unless rapid expansion (>0.5 cm in 6 months) or symptoms develop.\n\nClinical Pearl: AAA screening is the only vascular screening proven to reduce disease-specific mortality in elderly men. Medicare covers one-time screening for men 65-75 who ever smoked. Growth rate increases exponentially above 5 cm diameter.", "reason": "Explanation cut off mid-sentence, incomplete justification"}, {"idx": 2609, "ti": 17, "t": "Hazzard", "q": "A 77-year-old man with diabetes and Stage 3a CKD (eGFR 48) undergoes carotid endarterectomy for symptomatic 75% stenosis. POD#1 he develops agitation, pulling at lines, and not recognizing his daughter. CAM screen positive. Medications include metformin, lisinopril, and aspirin. Which medication is most appropriate for his delirium?", "o": ["Haloperidol 0.5mg IV q6h PRN", "Quetiapine 12.5mg PO BID", "Diphenhydramine 25mg IV q6h PRN", "Dexmedetomidine infusion"], "c": 1, "e": "The correct answer is low-dose quetiapine, which has favorable evidence in postoperative delirium with less EPS risk than haloperidol. Starting at 12.5mg BID is appropriate for elderly patients.\n\nOption A (haloperidol) would typically be first-line but requires QTc monitoring and has higher EPS risk in elderly. Post-CEA patients may have swallowing issues making oral preferred over IV.\n\nOption C (diphenhydramine) is the trap answer - Beers Criteria strongly recommends avoiding first-generation antihistamines in elderly due to anticholinergic effects that worsen delirium.\n\nOption D (dexmedetomidine) is reserved for ICU-level agitation and requires continuous monitoring.\n\nClinical Pearl: Postoperative delirium affects 15-25% after vascular surgery. Carotid procedures carry unique risks including hyperperfusion syndrome and cranial nerve injury affecting swallowing. Always screen with CAM and treat underlying causes before antipsychotics.", "reason": "Explanation contradicts itself on haloperidol being first-line"}, {"idx": 2611, "ti": 17, "t": "Hazzard", "q": "A 75-year-old man with PAD, DM2, and recent TIA on dual antiplatelet therapy (aspirin + clopidogrel) requires femoropopliteal bypass for critical limb ischemia. Preop labs: Hgb 10.2, platelets 145K, INR 1.1, CrCl 55 mL/min. When should clopidogrel be stopped before surgery?", "o": ["Continue through surgery given critical limb ischemia", "Stop 3 days before surgery", "Stop 5 days before surgery", "Stop 7 days before surgery"], "c": 2, "e": "The correct answer is stopping clopidogrel 5 days before surgery to allow platelet function recovery while minimizing thrombotic risk. This balances bleeding risk with his recent TIA.\n\nOption A (continue clopidogrel) is the trap answer - while tempting in critical limb ischemia, continuing dual antiplatelet therapy triples major bleeding risk in vascular surgery.\n\nOption B (3 days) provides insufficient platelet recovery - clopidogrel irreversibly inhibits platelets for their 7-10 day lifespan.\n\nOption D (7 days) unnecessarily prolongs thrombotic risk given his recent TIA.\n\nClinical Pearl: In elderly vascular patients, balance bleeding versus thrombotic risk. Continue aspirin perioperatively for cardiovascular protection. Restart clopidogrel within 24-48 hours postop if no bleeding. Consider bridging with LMWH only if very high thrombotic risk (recent stent, mechanical valve).", "reason": "Explanation contradicts itself on platelet lifespan timing"}, {"idx": 2622, "ti": 19, "t": "Hazzard", "q": "An 81-year-old woman is admitted with new-onset confusion and BP 198/92. Her daughter reports gradual cognitive decline over 6 months with recent worsening. The patient takes no medications. Head CT shows moderate white matter disease. Labs: Cr 1.1, K 4.2, glucose 98. She scores 4/4 on CAM criteria. What is the most appropriate initial antihypertensive approach?", "o": ["IV labetalol 20 mg push", "Sublingual nitroglycerin 0.4 mg", "Oral amlodipine 5 mg", "Observe and recheck BP in 1 hour"], "c": 3, "e": "This patient presents with delirium (positive CAM) in the setting of severely elevated BP but without signs of hypertensive emergency (no acute end-organ damage). In elderly patients with delirium, BP often normalizes with treatment of the underlying confusion without antihypertensive therapy.\n\nOption A (IV labetalol) is the TRAP - aggressive IV antihypertensive therapy in elderly patients without true hypertensive emergency can cause cerebral hypoperfusion, worsening confusion and potentially causing stroke, especially with underlying white matter disease.\n\nOption B (sublingual nitroglycerin) causes unpredictable BP reduction and is no longer recommended for hypertensive urgency.\n\nOption C (oral amlodipine) might be reasonable after observation, but immediate treatment isn't indicated without end-organ damage.\n\nClinical Pearl: Distinguish hypertensive emergency (end-organ damage requiring immediate IV therapy) from hypertensive urgency (elevated BP without acute damage). In elderly patients with delirium or dementia, treat underlying causes first - BP often improves with resolution of acute stressors.", "reason": "Explanation contradicts itself on BP management approach"}, {"idx": 2638, "ti": 21, "t": "Hazzard", "q": "A 79-year-old woman with GOLD stage 2 COPD and osteoporosis presents after her third fall in 2 months. She reports dizziness when standing and increasing use of her rescue inhaler. Medications: budesonide/formoterol, albuterol PRN (now 6x/day), alendronate, calcium/vitamin D. Standing BP drops from 145/85 to 118/70 with HR increase from 72 to 95. Which medication change would most reduce her fall risk?", "o": ["Add tiotropium for better COPD control", "Discontinue alendronate", "Reduce albuterol use and add long-acting bronchodilator", "Start midodrine 5 mg TID"], "c": 2, "e": "This patient has orthostatic hypotension and tachycardia from excessive beta-agonist use, a major fall risk factor. The correct answer is to reduce short-acting albuterol use by optimizing long-acting bronchodilator therapy, as frequent SABA use (>4x/day) indicates poor COPD control and causes orthostasis.\n\nOption A (adding tiotropium) is the TRAP - while adding a LAMA is appropriate for uncontrolled COPD, simply adding it without addressing the excessive SABA use won't reduce the adrenergic side effects causing her orthostasis and falls. Many physicians focus on adding medications rather than optimizing existing regimens.\n\nOption B (discontinuing alendronate) is incorrect. While bisphosphonates can cause GI upset, they don't cause orthostatic hypotension. Stopping osteoporosis treatment in a frequent faller would increase fracture risk.\n\nOption D (midodrine) treats the symptom not the cause. Adding another medication to counteract side effects of overused medication exemplifies prescribing cascade in elderly patients.\n\nClinical Pearl: Beta-agonist overuse is a common but overlooked cause of orthostatic hypotension in elderly COPD patients. Always quantify rescue inhaler use - more than 2-3 times weekly indicates need for controller optimization. The combination of orthostasis and tachycardia suggests adrenergic excess rather than volume depletion.", "reason": "Explanation describes reducing albuterol, answer adds bronchodilator"}, {"idx": 2641, "ti": 21, "t": "Hazzard", "q": "An 85-year-old man with COPD and CKD stage 3b (CrCl 32 mL/min by Cockcroft-Gault) is hospitalized with pneumonia. On day 2, he becomes agitated and pulls out his IV. His nurse requests medication for agitation. Current medications include piperacillin-tazobactam, budesonide/formoterol, and tiotropium. Which PRN medication order is most appropriate?", "o": ["Haloperidol 2 mg IM q6h PRN", "Lorazepam 0.5 mg IV q4h PRN", "Haloperidol 0.5 mg PO q12h PRN", "Diphenhydramine 25 mg IV q6h PRN"], "c": 2, "e": "This patient has hyperactive delirium requiring pharmacologic management. The correct answer is low-dose haloperidol 0.5 mg PO with extended dosing interval (q12h) due to reduced renal clearance. In CKD, haloperidol's half-life increases, requiring dose and frequency adjustment.\n\nOption A (2 mg IM q6h) is the TRAP - this is a standard adult dose without renal adjustment. Many physicians don't consider that haloperidol undergoes 40% renal elimination of metabolites. This dose would accumulate rapidly in elderly CKD patients, causing oversedation and EPS.\n\nOption B (lorazepam) is contraindicated - benzodiazepines worsen delirium and suppress respiratory drive in COPD. They're on Beers Criteria for both indications.\n\nOption D (diphenhydramine) has high anticholinergic burden and is specifically listed in Beers Criteria. It would worsen confusion and increase fall risk.\n\nClinical Pearl: In elderly patients with CrCl <40 mL/min, start haloperidol at 0.25-0.5 mg and extend dosing intervals. Always calculate CrCl using Cockcroft-Gault (not eGFR) for drug dosing in elderly patients. Monitor QTc and electrolytes, as haloperidol prolongs QT interval and hypokalemia/hypomagnesemia increase torsades risk.", "reason": "Explanation describes q12h but implies dose reduction needed"}, {"idx": 2647, "ti": 21, "t": "Hazzard", "q": "A 77-year-old woman with mild COPD and recurrent falls is admitted after syncope. Telemetry shows intermittent bradycardia to 35 bpm. She reports dizziness with inhaler use. Home medications: tiotropium daily, albuterol PRN (2-3 times daily), losartan 50 mg, and calcium/vitamin D. Physical exam shows HR 48, BP 138/82. Which medication adjustment would best address her bradycardia?", "o": ["Discontinue tiotropium and start ipratropium", "Discontinue losartan", "Switch albuterol to levalbuterol", "Add theophylline for bronchodilation"], "c": 0, "e": "This patient has symptomatic bradycardia from tiotropium, an antimuscarinic that can cause paradoxical bradycardia in susceptible elderly patients. The correct answer is switching to ipratropium, which has less systemic absorption and cardiac effects.\n\nOption C is the TRAP - many physicians assume beta-agonists cause only tachycardia and might switch to levalbuterol thinking it's more 'cardioselective.' However, her bradycardia temporally relates to all inhaler use, suggesting anticholinergic effect. Levalbuterol offers no advantage over albuterol for cardiac effects.\n\nOption B (discontinuing losartan) is incorrect as ARBs don't cause bradycardia. They may cause hyperkalemia but not conduction abnormalities.\n\nOption D (theophylline) would worsen cardiac issues with its narrow therapeutic window and arrhythmogenic potential in elderly patients.\n\nClinical Pearl: Tiotropium can cause paradoxical bradycardia in 1-2% of elderly patients through vagal stimulation. Risk factors include baseline bradycardia and conduction disease. Always consider medication-induced bradycardia in elderly patients with new syncope or falls. Ipratropium has shorter duration and less systemic absorption, making it safer in patients with cardiac conduction issues.", "reason": "Explanation contradicts itself - blames tiotropium then albuterol"}, {"idx": 2651, "ti": 21, "t": "Hazzard", "q": "An 81-year-old nursing home resident with severe COPD (on home O2 2L continuously), dementia, and recurrent aspirations is brought to the ED after being found unresponsive. He was recently started on morphine 5mg PO q6h for dyspnea. On arrival, he's obtunded with RR 8, SpO2 78% on 2L O2. ABG: pH 7.18, pCO2 89, pO2 52. His advance directive states 'DNR but continue all medical treatments.' What is the most appropriate next step?", "o": ["Administer naloxone 0.4mg IV and prepare for intubation", "Increase oxygen to 15L non-rebreather mask", "Start BiPAP at 12/5 cmH2O with FiO2 40%", "Provide comfort care only given poor prognosis"], "c": 0, "e": "The correct answer is naloxone administration. This patient has acute hypercapnic respiratory failure with severe acidemia likely due to opioid overdose (morphine recently started, now obtunded with RR 8). Naloxone can reverse this while respecting his wishes for continued medical treatment.\n\nOption B (high-flow oxygen) is the TRAP - it seems logical to treat hypoxemia, but high-flow oxygen suppresses hypoxic drive in COPD patients with chronic CO2 retention, worsening hypercapnia.\n\nOption C (BiPAP) requires patient cooperation and ability to protect airway - inappropriate for obtunded patient.\n\nOption D misinterprets DNR status. DNR means no chest compressions if heart stops, not withholding reversible treatments. His directive explicitly states continue medical treatments.\n\nClinical Pearl: DNR doesn't equal comfort care only. Opioid-induced respiratory depression is reversible and should be treated unless explicitly refused. In COPD patients, start with naloxone 0.04-0.1mg to avoid precipitating withdrawal and dyspnea crisis.", "reason": "Explanation supports naloxone but not intubation preparation"}, {"idx": 2672, "ti": 24, "t": "Hazzard", "q": "A 78-year-old woman with diabetes and CKD stage 3B (CrCl 32 mL/min by Cockcroft-Gault) is admitted with pyelonephritis. Urine culture grows E. coli sensitive to ciprofloxacin. She weighs 58 kg. What is the appropriate ciprofloxacin dosing?", "o": ["500 mg PO q12h", "250 mg PO q12h", "500 mg PO q24h", "750 mg PO q24h"], "c": 1, "e": "The correct answer is 250 mg q12h. With CrCl 30-50 mL/min, ciprofloxacin requires 50% dose reduction. Standard dosing would be 500 mg q12h, so renally adjusted dose is 250 mg q12h.\n\nOption A (500 mg q12h) represents failure to renally dose and risks toxicity including confusion, seizures, and tendon rupture - all increased in elderly.\n\nOption C (500 mg q24h) is the trap - many physicians know to adjust fluoroquinolones but choose interval extension over dose reduction. This leads to subtherapeutic troughs and treatment failure.\n\nOption D (750 mg q24h) is excessive even with interval adjustment and not a standard ciprofloxacin dose.\n\nClinical Pearl: For fluoroquinolones in CKD, reduce the dose, don't extend the interval. This maintains therapeutic peaks while preventing accumulation. Always use Cockcroft-Gault (not eGFR) for drug dosing, especially in elderly women with low muscle mass.", "reason": "Standard pyelonephritis dosing is 500mg q12h minimally"}, {"idx": 2694, "ti": 12, "t": "Hazzard", "q": "An 84-year-old man with diabetes, hypertension, and mild cognitive impairment (MOCA 22/30) presents to the ED with no bowel movement for 8 days. He takes metformin 1000 mg BID, lisinopril 10 mg daily, and donepezil 10 mg daily. His daughter reports progressive difficulty with IADLs over 2 months, now requiring help with medications and finances. Physical exam reveals a distended abdomen with hypoactive bowel sounds. Labs: Cr 1.8 mg/dL (baseline 1.2), K 5.1 mEq/L, glucose 142 mg/dL. Abdominal X-ray shows moderate stool burden without obstruction. Which medication is most likely contributing to his constipation?", "o": ["Metformin", "Lisinopril", "Donepezil", "Age-related decreased colonic motility"], "c": 2, "e": "The correct answer is donepezil, a cholinesterase inhibitor that commonly causes constipation in elderly patients (up to 10% incidence). While cholinesterase inhibitors theoretically should increase GI motility through enhanced cholinergic activity, paradoxically they often cause constipation in older adults, likely due to altered receptor sensitivity and autonomic dysfunction.\n\nOption A (metformin) is the TRAP - most clinicians associate metformin with diarrhea, not constipation. This makes it the most tempting wrong answer as providers would quickly eliminate it.\n\nOption B (lisinopril) rarely causes constipation; ACE inhibitors more commonly cause diarrhea if any GI effects.\n\nOption D is incorrect because while age contributes to constipation, the temporal association with IADL decline and medication use suggests a pharmacologic cause.\n\nClinical Pearl: When evaluating new constipation in elderly patients, always review medications started within the past 6 months. The decline in IADLs concurrent with constipation suggests this is affecting his functional status - a key geriatric syndrome presentation.", "reason": "Explanation contradicts itself on donepezil's constipation mechanism"}, {"idx": 2700, "ti": 12, "t": "Hazzard", "q": "A 77-year-old man with Parkinson's disease and benign prostatic hyperplasia presents with new-onset constipation and urinary retention. He was started on tolterodine 2 mg BID two weeks ago for overactive bladder. Other medications: carbidopa/levodopa 25/250 TID, tamsulosin 0.4 mg daily, aspirin 81 mg. On exam, he has masked facies, cogwheel rigidity, and a distended bladder. Post-void residual: 450 mL. His wife mentions he's been more confused lately and forgot their grandson's name yesterday. Which aspect of his presentation represents medication-induced functional decline?", "o": ["Worsening parkinsonian symptoms", "Cognitive impairment", "Urinary retention", "All of the above"], "c": 3, "e": "The correct answer is all of the above. Tolterodine, an antimuscarinic agent on the Beers Criteria, has caused a cascade of anticholinergic effects: constipation, urinary retention (worsened by BPH), cognitive impairment, and can worsen parkinsonian symptoms by blocking dopamine activity.\n\nOption B (cognitive impairment alone) is the TRAP - while confusion is concerning, focusing only on cognition misses the full picture of anticholinergic syndrome affecting multiple organ systems.\n\nOption A (parkinsonian symptoms) is partially correct but incomplete.\n\nOption C (urinary retention) is also partially correct but misses the systemic nature of the problem.\n\nClinical Pearl: Anticholinergic medications in Parkinson's patients create a 'perfect storm' - they worsen motor symptoms, cause confusion that can be mistaken for disease progression, and precipitate urinary/bowel dysfunction. Always screen for anticholinergic burden before adding new medications in PD patients. Tolterodine should be avoided; if OAB treatment needed, consider mirabegron (beta-3 agonist).", "reason": "Explanation cut off, cannot verify complete answer"}, {"idx": 2696, "ti": 12, "t": "Hazzard", "q": "An 88-year-old man with advanced COPD (on 2L O2), heart failure (EF 35%), and moderate dementia is brought by his son for increasing confusion over 3 days. The son reports his father hasn't had a bowel movement in 10 days despite usually being regular. The patient is grimacing and holding his abdomen but cannot verbalize pain. Medications include furosemide 40 mg BID, carvedilol 6.25 mg BID, and morphine SR 15 mg BID for dyspnea. Exam shows distended, tender abdomen with absent bowel sounds. Labs: BUN 58, Cr 2.1 (baseline 1.4), K 3.2. The son mentions his father signed a POLST form indicating DNR/DNI but desires full medical treatment. What is the most appropriate management?", "o": ["Urgent surgical consultation for possible bowel obstruction", "Methylnaltrexone 12 mg subcutaneous injection", "Comfort-focused care with glycerin suppositories", "CT abdomen/pelvis with IV contrast"], "c": 1, "e": "The correct answer is methylnaltrexone, a peripherally-acting μ-opioid receptor antagonist specifically indicated for opioid-induced constipation when laxatives have failed. It doesn't cross the blood-brain barrier, so won't reverse the morphine's palliative benefits for dyspnea.\n\nOption A (surgery) is the TRAP - while absent bowel sounds suggest obstruction, this patient's goals include full medical treatment despite DNR status. However, with advanced COPD, heart failure, AKI, and dementia, he's an extremely poor surgical candidate. Many physicians conflate 'full treatment' with 'aggressive intervention.'\n\nOption C (comfort care only) contradicts his documented wishes for full medical treatment. DNR doesn't mean comfort-only care.\n\nOption D (CT with contrast) is inappropriate with AKI (Cr 2.1) and would require nephrotoxic contrast.\n\nClinical Pearl: Methylnaltrexone works within 4 hours in most patients and is safe in renal impairment, though consider dose reduction if CrCl <30. Always clarify goals of care - DNR/DNI with full medical treatment means optimize medical management while avoiding intubation if deterioration occurs.", "reason": "Question mentions no opioids in medication list"}, {"idx": 2702, "ti": 12, "t": "Hazzard", "q": "A 73-year-old man with COPD, type 2 diabetes, and chronic low back pain presents to his PCP with severe constipation. He reports no bowel movement for 9 days despite trying prune juice and walking more. Current medications: tiotropium 18 mcg inhaled daily, metformin 1000 mg BID, gabapentin 300 mg TID, and tramadol 50 mg QID started 3 weeks ago. He mentions feeling dizzy when standing quickly. BP sitting 142/88, standing 118/72. Abdominal exam reveals distension and absent bowel sounds in RLQ. CrCl: 55 mL/min. What is the most concerning finding requiring immediate intervention?", "o": ["Orthostatic hypotension", "Absent bowel sounds suggesting ileus", "Tramadol dose exceeding recommendations for his renal function", "Anticholinergic burden from tiotropium"], "c": 2, "e": "The correct answer is tramadol dosing. With CrCl 55 mL/min, tramadol should be limited to 200 mg/day (he's taking 200 mg QID = 800 mg/day). This overdosing increases risk of seizures, serotonin syndrome, and severe constipation. Tramadol also lowers seizure threshold in elderly.\n\nOption B (absent bowel sounds) is the TRAP - while concerning for ileus, this is likely secondary to the tramadol overdose and anticholinergic burden rather than a primary surgical problem.\n\nOption A (orthostatic hypotension) needs addressing but isn't immediately life-threatening like potential tramadol toxicity.\n\nOption D (tiotropium) contributes to constipation but is appropriately dosed and necessary for his COPD.\n\nClinical Pearl: Tramadol requires renal dose adjustment: CrCl 30-60 mL/min maximum 200 mg/day; CrCl <30 maximum 100 mg/day. In elderly patients, tramadol combines opioid effects (constipation) with SNRI activity (increases fall risk through orthostatic hypotension) making it particularly problematic per Beers Criteria.", "reason": "Answer says 'renal function' but explanation says overdosing"}, {"idx": 2709, "ti": 12, "t": "Hazzard", "q": "An 84-year-old man with mild dementia (MMSE 22), CKD stage 3a (eGFR 48), and Type 2 diabetes presents to clinic with his daughter who reports he hasn't had a bowel movement in 8 days. He takes metformin 1000mg BID, lisinopril 10mg daily, donepezil 10mg daily, and ferrous sulfate 325mg daily. Physical exam reveals a distended abdomen with hypoactive bowel sounds and hard stool in the rectal vault. His CrCl by Cockcroft-Gault is 42 mL/min. Which initial laxative regimen is most appropriate?", "o": ["Magnesium hydroxide 30mL daily", "Polyethylene glycol 17g daily", "Docusate sodium 100mg BID", "Lactulose 15mL BID"], "c": 3, "e": "The correct answer is lactulose, a hyperosmolar laxative proven effective in older adults with constipation. It's safe in CKD and doesn't require renal adjustment.\n\nOption A (magnesium hydroxide) is the TRAP - many physicians reflexively prescribe milk of magnesia for constipation, but it's contraindicated in CKD stage 3 due to hypermagnesemia risk even with normal creatinine.\n\nOption B (PEG) would be appropriate but should be reserved for severe constipation resistant to other agents or for disimpaction, not as first-line therapy.\n\nOption C (docusate) has minimal laxative effect and shouldn't be used for constipation treatment in older adults per current evidence.\n\nClinical Pearl: Iron supplements commonly cause constipation in elderly patients. When treating constipation in CKD, avoid magnesium-based laxatives and phosphate enemas. Lactulose and sorbitol are equally effective, with sorbitol being cheaper.", "reason": "Explanation contradicts itself - calls lactulose correct"}, {"idx": 2716, "ti": 12, "t": "Hazzard", "q": "A 78-year-old woman with diabetes, CKD stage 4 (eGFR 25), and recent L2 compression fracture on oxycodone presents to the ED with severe abdominal pain and distension. She reports no bowel movement for 12 days despite taking senna daily. CT shows massive stool burden with dilated colon to 8cm and concern for impending perforation. Vitals: BP 160/95, HR 102. Labs: K 5.8, Cr 3.2 (baseline 2.4), glucose 68. Which intervention is contraindicated?", "o": ["Soap suds enema", "Manual disimpaction", "Lactulose retention enema", "Surgical consultation"], "c": 0, "e": "The correct answer is soap suds enema, which should NEVER be given to elderly patients due to risk of colonic necrosis, especially with dilated colon.\n\nOption B (manual disimpaction) may be necessary despite perforation risk given the critical situation.\n\nOption C (lactulose enema) is safe in renal failure and may help soften stool.\n\nOption D (surgical consultation) is appropriate given impending perforation risk with 8cm dilation.\n\nClinical Pearl: This case shows multiple red flags: hyperkalemia and worsening renal function suggest possible urinary obstruction from fecal impaction, hypoglycemia may indicate decreased PO intake, and colonic dilation >6cm risks perforation. Senna (stimulant laxative) can worsen colonic dilation in obstruction. Avoid phosphate enemas with eGFR <30.", "reason": "Explanation contradicts marked answer - says NEVER give"}, {"idx": 2711, "ti": 12, "t": "Hazzard", "q": "An 87-year-old man with moderate vascular dementia is brought to the ED by his care facility for acute confusion and agitation. He hasn't had a bowel movement in 10 days despite daily docusate. His abdomen is markedly distended and tympanic. KUB shows dilated loops of bowel with air-fluid levels and a large fecal burden in the rectosigmoid. Vitals: BP 95/60, HR 110. Labs: K 3.2, Cr 1.8 (baseline 1.2), WBC 14K. Which intervention should be avoided?", "o": ["Magnesium citrate 300mL PO", "Tap water enema", "IV fluid resuscitation", "Glycerin suppository"], "c": 0, "e": "The correct answer is to avoid magnesium citrate. This patient has acute kidney injury (Cr 1.8 from 1.2) and magnesium salts are contraindicated in renal impairment. Additionally, the KUB findings suggest possible pseudo-obstruction, and magnesium citrate can worsen this condition in elderly patients.\n\nOption B (tap water enema) is safe and appropriate for disimpaction without electrolyte risks.\n\nOption C (IV fluids) is essential given hypotension, tachycardia, and AKI - this is not just constipation but a medical emergency.\n\nOption D (glycerin suppository) is safe though may have limited efficacy with severe impaction.\n\nClinical Pearl: Severe constipation can trigger delirium in dementia patients. The combination of abdominal distension, AKI, and hemodynamic instability suggests this is more than simple constipation - consider stercoral colitis or perforation risk. Docusate is ineffective for constipation treatment and should be discontinued.", "reason": "Explanation argues AGAINST marked correct answer"}, {"idx": 2720, "ti": 12, "t": "Hazzard", "q": "A 72-year-old man with recently diagnosed metastatic pancreatic cancer is started on morphine SR 30mg BID for pain control. At 2-week follow-up, he reports good pain control but hasn't had a bowel movement in 6 days. He has been taking docusate 200mg BID as prescribed at discharge. Physical exam shows mild abdominal distension and moderate stool in rectal vault. His goals include maintaining quality of life and staying active. What is the best management?", "o": ["Add senna 2 tablets at bedtime", "Replace docusate with lactulose 15mL BID", "Start methylnaltrexone injections", "Add prune juice 8oz daily"], "c": 1, "e": "The correct answer is replacing ineffective docusate with lactulose. Docusate has no proven efficacy for opioid-induced constipation, while lactulose is effective and well-tolerated.\n\nOption A (adding senna) is the TRAP - while stimulant laxatives are part of opioid constipation treatment, adding senna while continuing useless docusate perpetuates polypharmacy.\n\nOption C (methylnaltrexone) is premature - expensive injectable therapy should be reserved for laxative failure.\n\nOption D (prune juice) has insufficient evidence and unreliable dosing for opioid constipation.\n\nClinical Pearl: Preemptive bowel regimens should start with ALL opioid prescriptions. The combination of a scheduled osmotic laxative (lactulose or PEG) plus PRN stimulant laxative or suppository is more effective than docusate. Quality of life in cancer patients is significantly impacted by constipation.", "reason": "Explanation says adding senna is TRAP answer"}, {"idx": 2736, "ti": 26, "t": "Hazzard", "q": "An 83-year-old man with metastatic bladder cancer on pembrolizumab develops severe diarrhea (8-10 stools/day) for 5 days. He appears volume depleted. Laboratory: K 3.1 mEq/L, Cr 2.8 mg/dL (baseline 1.3), stool calprotectin elevated. Colonoscopy shows diffuse colitis. He takes lisinopril 20 mg and metformin 1000 mg BID. What medication adjustment is most critical?", "o": ["Stop pembrolizumab permanently", "Hold metformin", "Increase lisinopril for renal protection", "Start loperamide 4 mg QID"], "c": 1, "e": "The correct answer is holding metformin immediately. With acute kidney injury (Cr 2.8 from 1.3), metformin must be stopped to prevent lactic acidosis. His eGFR is likely <30 mL/min, an absolute contraindication for metformin. This is a medical emergency in elderly patients.\n\nOption A (stop pembrolizumab) may be needed but first requires steroid treatment for immune-related colitis - many patients can resume after resolution.\n\nOption C (increase lisinopril) is the trap - ACE inhibitors should be HELD in acute kidney injury with volume depletion, not increased. This would worsen renal function.\n\nOption D (loperamide) is contraindicated in inflammatory colitis as it increases toxic megacolon risk.\n\nClinical Pearl: Immune checkpoint inhibitor colitis requires prompt recognition and treatment with corticosteroids. In elderly patients, always reassess all medications during acute illness. Metformin-associated lactic acidosis has 50% mortality - hold when eGFR <30 or with any acute illness causing dehydration.", "reason": "Explanation contradicts itself on lisinopril management"}, {"idx": 2757, "ti": 26, "t": "Hazzard", "q": "A 79-year-old man with intermediate-risk prostate cancer (Gleason 3+4, PSA 12) chooses external beam radiation. He has controlled hypertension, osteoarthritis, and takes lisinopril, amlodipine, and celecoxib. BMI is 32. During radiation planning, he develops severe hip pain limiting his ability to lie flat for 20 minutes. CrCl is 55 mL/min. What is the most appropriate management?", "o": ["Increase celecoxib to 200 mg twice daily", "Add tramadol 50 mg before each treatment", "Switch to brachytherapy instead", "Prescribe morphine 5 mg as needed"], "c": 2, "e": "This patient cannot tolerate positioning for EBRT due to arthritis. Brachytherapy requires only one procedure under anesthesia with brief positioning, making it the best alternative for intermediate-risk disease. Option A (increasing celecoxib) is the trap - while addressing his pain seems logical, NSAIDs are relatively contraindicated during pelvic radiation due to increased GI/GU toxicity risk, and higher doses increase cardiovascular risk in elderly. Option B (tramadol) is on Beers criteria for seizure/SIADH risk and may not provide adequate relief. Option D (morphine) could work but causes constipation worsening radiation proctitis and doesn't address the fundamental positioning problem. Clinical Pearl: Treatment modifications in elderly patients often require balancing cancer control with practical limitations. Brachytherapy provides equivalent cancer outcomes for intermediate-risk disease.", "reason": "Explanation is incomplete, cuts off mid-sentence"}, {"idx": 2756, "ti": 26, "t": "Hazzard", "q": "An 85-year-old nursing home resident with advanced dementia (unable to recognize family) and prostate cancer develops acute urinary retention. PSA is 45 ng/mL. He grimaces with bladder palpation but cannot verbalize pain. His daughter (POA) wants 'everything done' but son advocates comfort care. CrCl is 28 mL/min. After Foley placement, what is the most appropriate next step?", "o": ["Initiate bicalutamide 50 mg daily", "Start leuprolide depot injection", "Transurethral resection of prostate", "Finasteride 5 mg daily with close monitoring"], "c": 3, "e": "This patient has symptomatic locally advanced prostate cancer causing retention, but also has advanced dementia limiting aggressive interventions. Finasteride (5-alpha reductase inhibitor) can reduce prostate size and improve voiding with minimal side effects - appropriate for symptom palliation. Option A (bicalutamide) is the trap - while antiandrogen monotherapy seems reasonable, it can cause painful gynecomastia and requires hepatic monitoring, inappropriate for advanced dementia. Option B (leuprolide) causes initial testosterone flare worsening obstruction before improvement. Option C (TURP) requires anesthesia with high delirium risk in advanced dementia. Clinical Pearl: In advanced dementia, focus on symptom management. Goals-of-care discussions should emphasize that 'comfort care' doesn't mean 'no treatment' - we still treat reversible suffering like urinary retention.", "reason": "Explanation describes bicalutamide as option A not finasteride"}, {"idx": 2776, "ti": 26, "t": "Hazzard", "q": "A 76-year-old woman with EGFR-mutant stage IV NSCLC on osimertinib for 18 months presents with confusion and falls. Head MRI shows stable treated brain metastases without new lesions. Labs reveal sodium 118 mEq/L, serum osmolality 255 mOsm/kg, urine osmolality 580 mOsm/kg. She takes hydrochlorothiazide 25 mg daily and sertraline 100 mg daily. What is the most appropriate initial management?", "o": ["3% saline infusion at 50 mL/hour", "Fluid restriction to 800 mL/day", "Discontinue sertraline and hydrochlorothiazide immediately", "Tolvaptan 15 mg daily"], "c": 2, "e": "The correct answer is to immediately discontinue both sertraline and hydrochlorothiazide. This patient has severe symptomatic hyponatremia due to SIADH, likely multifactorial from sertraline (SSRI), thiazide diuretic, and possibly lung cancer. Both medications are on the Beers Criteria - SSRIs for hyponatremia risk and thiazides in elderly due to electrolyte disturbances.\n\nOption A is the trap - while 3% saline is used for severe symptomatic hyponatremia, the infusion rate of 50 mL/hour is too aggressive. In chronic hyponatremia, rapid correction >8 mEq/L in 24 hours risks osmotic demyelination syndrome. Elderly patients are particularly vulnerable. If 3% saline is used, rates should be 15-30 mL/hour with frequent monitoring.\n\nOption B (fluid restriction alone) is insufficient for symptomatic hyponatremia with confusion and falls.\n\nOption D (tolvaptan) risks overly rapid correction and is contraindicated with sodium <120 mEq/L due to unpredictable response.\n\nClinical Pearl: In elderly cancer patients with hyponatremia, always review medications first. The combination of SSRIs and thiazides is particularly dangerous, causing severe hyponatremia in up to 10% of elderly patients. Both appear on Beers Criteria. Stop offending drugs before considering aggressive sodium correction to avoid osmotic demyelination.", "reason": "Explanation contradicts itself on hypertonic saline necessity"}, {"idx": 2796, "ti": 26, "t": "Hazzard", "q": "A 79-year-old woman completed treatment for stage IIIA colon cancer 2 years ago. At follow-up, CEA rises from 2.1 to 8.6 ng/mL. CT shows a solitary 3cm liver metastasis. She has controlled hypertension and mild arthritis, walks daily, and manages all ADLs. Her oncologist discusses treatment options including hepatic resection versus systemic therapy. What factor most strongly supports attempting curative resection?", "o": ["Her young physiologic age at 79", "The metastasis is solitary and resectable", "Her excellent functional status", "CEA elevation confirms active disease"], "c": 2, "e": "The correct answer is her excellent functional status (independent in all ADLs, walks daily). Functional status predicts surgical outcomes better than chronological age and indicates she can likely tolerate and recover from major surgery.\n\nOption B (solitary/resectable metastasis) is the trap - technical resectability doesn't equal advisability in elderly patients. Many physicians focus on anatomy while ignoring the patient's global ability to benefit from aggressive treatment.\n\nOption A ('young' 79) misuses chronologic age - there's no 'young' 79, only fit or frail.\n\nOption D (CEA elevation) confirms recurrence but doesn't guide treatment selection between surgery and chemotherapy.\n\nClinical Pearl: For elderly patients with resectable colorectal liver metastases, functional status and life expectancy, not age, should guide treatment. Five-year survival after hepatic resection approaches 40% in selected patients. Comprehensive geriatric assessment better predicts surgical outcomes than chronologic age. Consider hepatic resection in robust elderly patients who could tolerate and benefit from cure.", "reason": "Explanation supports solitary resectable metastasis not functional status"}, {"idx": 2807, "ti": 26, "t": "Hazzard", "q": "An 80-year-old man with mild cognitive impairment (MoCA 21/30) presents for treatment of extensive actinic damage. He has >50 actinic keratoses on his scalp and face, with several early SCCs in the past year. He lives with his working daughter who helps with medications. His dermatologist recommends field therapy with 5-fluorouracil. Which medication regimen is most appropriate given his cognitive status?", "o": ["5-FU 5% cream twice daily for 4 weeks", "5-FU 0.5% cream once daily for 4 weeks", "Ingenol mebutate for 3 consecutive days", "Photodynamic therapy monthly x 3"], "c": 3, "e": "The correct answer is photodynamic therapy (PDT) monthly x 3. For extensive field disease in a patient with mild cognitive impairment, PDT offers supervised treatment ensuring compliance. The procedure is performed in-office, eliminating complex home regimens and medication adherence issues.\n\nOption B (5-FU 0.5%) is the trap answer - physicians often choose 'gentler' formulations for elderly patients. However, even simplified regimens require daily application for weeks, unrealistic with cognitive impairment and working caregiver.\n\nOption A (5-FU 5% twice daily) is too complex for someone with memory issues. The intense inflammatory response also requires careful monitoring and symptom management beyond his capabilities.\n\nOption C (ingenol mebutate) seems attractive due to short course, but requires precise application to multiple areas over consecutive days. Miss one day and efficacy drops significantly.\n\nClinical Pearl: In cognitively impaired patients, prioritize supervised treatments over home regimens. PDT, cryotherapy, or laser resurfacing ensure treatment completion. When prescribing topicals, assess: Who applies it? Can they remember? Can they monitor for adverse effects? Caregiver availability matters as much as drug selection.", "reason": "Question asks for medication regimen, answer isn't medication"}, {"idx": 2823, "ti": 25, "t": "Hazzard", "q": "An 83-year-old man with chronic lymphocytic leukemia stable on observation devel
