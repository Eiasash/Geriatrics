 PRN) and consider gabapentin starting at 100 mg nightly. Regional blocks are ideal when feasible.", "reason": "Explanation cut off, cannot verify complete reasoning"}, {"idx": 1916, "ti": 8, "t": "Hazzard", "q": "A 79-year-old woman with CHF (EF 35%), CKD stage 4 (eGFR 22), and recurrent UTIs is admitted with pyelonephritis. Urine culture shows E. coli sensitive to ciprofloxacin and nitrofurantoin. She weighs 58kg. Current Cr 2.8mg/dL (baseline 2.4). Which antibiotic regimen is most appropriate?", "o": ["Nitrofurantoin 100mg PO BID x 7 days", "Ciprofloxacin 250mg PO BID x 7 days", "Ciprofloxacin 250mg PO daily x 7 days", "Trimethoprim-sulfamethoxazole DS 1 tab PO BID x 7 days"], "c": 2, "e": "Ciprofloxacin 250mg PO daily is correct. Using Cockcroft-Gault: CrCl = (140-79) × 58 × 0.85 / (72 × 2.8) = 15 mL/min. For CrCl <30, ciprofloxacin requires 50% dose reduction (500mg BID → 250mg daily).\n\nOption A (nitrofurantoin) is the trap - many physicians see it's sensitive and prescribe it, forgetting it's contraindicated when CrCl <30 mL/min due to inadequate urinary concentration and increased toxicity risk.\n\nOption B (full-dose cipro) fails to account for severe renal impairment, risking CNS toxicity, QT prolongation, and tendon rupture in this elderly patient.\n\nOption D (TMP-SMX) wasn't tested for sensitivity and requires dose adjustment in CKD; it also raises potassium and creatinine.\n\nClinical Pearl: Nitrofurantoin, though first-line for uncomplicated UTIs, achieves therapeutic levels through renal excretion and is ineffective/toxic when CrCl <30 mL/min. Always calculate CrCl using actual body weight in elderly patients before prescribing renally-cleared antibiotics.", "reason": "Explanation says CrCl 15, contradicts marked answer"}, {"idx": 1930, "ti": 8, "t": "Hazzard", "q": "A 78-year-old woman with diabetes, hypertension, and mild cognitive impairment presents to clinic complaining of fatigue and difficulty completing her weekly grocery shopping. She lives alone and her daughter notes she's been forgetting to take medications. Current medications: metformin 1000mg BID, glyburide 10mg daily, lisinopril 20mg daily, amlodipine 10mg daily, atorvastatin 40mg daily, aspirin 81mg daily, and recently started amitriptyline 50mg nightly for neuropathic pain. BP 138/72, standing BP 115/65. Labs: HbA1c 7.8%, Cr 1.4 (eGFR 42). Which medication change would most improve her functional status?", "o": ["Discontinue amitriptyline", "Switch glyburide to insulin glargine", "Reduce lisinopril to 10mg daily", "Add donepezil 5mg daily"], "c": 0, "e": "The correct answer is discontinuing amitriptyline, a tricyclic antidepressant on the Beers 2023 list as potentially inappropriate in older adults. TCAs cause significant anticholinergic effects including cognitive impairment, orthostatic hypotension, and sedation - all contributing to her functional decline and IADL impairment (grocery shopping difficulty).\n\nOption B (switching to insulin) is the trap answer - many physicians reflexively intensify diabetes control, but her HbA1c of 7.8% is actually appropriate for an older adult with cognitive impairment (target 7.5-8.5%). Insulin would increase hypoglycemia risk without improving outcomes.\n\nOption C (reducing lisinopril) addresses orthostatic hypotension but misses the primary culprit - the anticholinergic burden from amitriptyline. The BP drop isn't severe enough to warrant ACE-I reduction as first step.\n\nOption D (adding donepezil) might help cognition but adds another medication to an already complex regimen and doesn't address the iatrogenic cause of her decline.\n\nClinical Pearl: When an older adult presents with new functional decline, always perform a thorough medication review focusing on Beers criteria drugs. Anticholinergic medications are a leading cause of reversible cognitive and functional impairment in the elderly.", "reason": "Amitriptyline not listed in patient's current medications"}, {"idx": 1935, "ti": 8, "t": "Hazzard", "q": "An 83-year-old man with atrial fibrillation on warfarin is admitted after a mechanical fall with a small subdural hematoma. Neurosurgery recommends conservative management. His INR is 3.8. Other medications include diltiazem 120mg daily and pravastatin 40mg daily. Creatinine is 1.9mg/dL (CrCl 31 mL/min by Cockcroft-Gault). He weighs 68kg. After warfarin reversal, when and with what agent should anticoagulation be restarted?", "o": ["Resume warfarin in 4 weeks with target INR 2-3", "Start apixaban 2.5mg BID in 2 weeks", "Start rivaroxaban 15mg daily in 4 weeks", "Anticoagulation permanently contraindicated"], "c": 1, "e": "The correct answer is starting apixaban 2.5mg BID in 2 weeks. After intracranial hemorrhage, anticoagulation can typically be restarted in 2-4 weeks if the benefit (stroke prevention in AF) outweighs risk. Apixaban requires dose reduction to 2.5mg BID when 2 of 3 criteria are met: age ≥80, weight ≤60kg, or Cr ≥1.5. This patient meets age and creatinine criteria.\n\nOption A (warfarin) is the trap answer - many physicians default to resuming the previous anticoagulant, but DOACs have lower intracranial hemorrhage risk than warfarin in elderly patients, making them preferred after ICH.\n\nOption C (rivaroxaban) requires dose adjustment to 15mg daily when CrCl 15-50, but even with adjustment, apixaban has the most favorable safety profile in elderly patients with renal impairment.\n\nOption D (permanent discontinuation) is overly conservative. Guidelines support restarting anticoagulation after ICH when stroke risk is high (CHA2DS2-VASc likely ≥4 in this elderly male).\n\nClinical Pearl: Always use Cockcroft-Gault (not eGFR) for drug dosing in elderly patients. DOACs are preferred over warfarin after ICH due to 50% lower risk of recurrent intracranial bleeding. Apixaban has the most evidence in frail elderly patients with renal impairment.", "reason": "Patient is 83, meets only 1 criterion"}, {"idx": 1942, "ti": 8, "t": "Hazzard", "q": "A 77-year-old man with CKD stage 3b (eGFR 35), diabetes, and recent NSTEMI is seen for follow-up. Medications: metoprolol 50mg BID, atorvastatin 80mg daily, clopidogrel 75mg daily, lisinopril 20mg daily. BP 142/88, K+ 5.2. HbA1c 8.4%. Which medication adjustment is most appropriate given his renal function?", "o": ["Add spironolactone 12.5mg daily for BP control", "Switch lisinopril to amlodipine 5mg daily", "Add empagliflozin 10mg daily", "Increase metoprolol to 100mg BID"], "c": 1, "e": "The correct answer is switching lisinopril to amlodipine. With K+ 5.2 and CKD 3b, continuing ACE inhibitor risks dangerous hyperkalemia. Amlodipine provides BP control without potassium retention or renal effects.\n\nOption A (spironolactone) would be catastrophic - adding a potassium-sparing diuretic with borderline hyperkalemia and reduced renal function could cause life-threatening hyperkalemia.\n\nOption C (empagliflozin) is the trap answer - SGLT2 inhibitors have cardiovascular and renal benefits post-MI, making this tempting. However, with eGFR 35, empagliflozin's glycemic effect is minimal, and the hyperkalemia risk with concurrent ACE inhibitor is concerning.\n\nOption D (increasing metoprolol) might help BP but doesn't address the safety issue of ACE inhibitor with hyperkalemia and CKD.\n\nClinical Pearl: In CKD stage 3b-4, monitor potassium closely with RAAS inhibitors. When K+ >5.0, consider switching to non-RAAS antihypertensives. While ACE inhibitors have renal protective effects, safety trumps benefit when hyperkalemia develops. Always reassess medication safety as renal function declines.", "reason": "Removing ACE inhibitor post-NSTEMI contradicts guideline therapy"}, {"idx": 1962, "ti": 32, "t": "Hazzard", "q": "An 88-year-old nursing home resident with advanced Alzheimer's disease (MMSE 8/30) and CKD stage 3 (eGFR 42) develops aspiration pneumonia. Her court-appointed guardian, a volunteer from the public guardianship program, must decide about hospitalization. The patient has no advance directive. Her estranged daughter calls demanding 'everything be done.' The guardian notes the patient grimaces with movement and hasn't recognized visitors in months. Under substituted judgment standard, what should guide the guardian's decision?", "o": ["The daughter's wishes as closest living relative", "What most reasonable elderly persons would want", "The patient's previously expressed values and preferences", "Medical recommendations for optimal clinical outcomes"], "c": 2, "e": "The correct answer is the patient's previously expressed values and preferences. Substituted judgment requires the guardian to decide as the patient would have decided based on their known values, not what others want or what seems medically optimal.\n\nOption A (daughter's wishes) is the trap - family preferences don't override substituted judgment standard, especially when family is estranged and hasn't been involved in care. Many assume family automatically decides, but guardians must follow legal standards.\n\nOption B (reasonable person standard) describes best interests standard, not substituted judgment. This applies only when patient's preferences are unknown.\n\nOption D (medical recommendations) confuses clinical judgment with substituted decision-making. Guardians must consider medical input but decide based on patient values.\n\nClinical Pearl: Document patient values during cognitive decline - even patients with mild-moderate dementia can express preferences about quality vs quantity of life. These documented preferences become crucial when guardians must make substituted judgments. Public guardians especially need this information as they lack personal knowledge of the patient.", "reason": "Explanation contradicts answer - no known values exist"}, {"idx": 1988, "ti": 38, "t": "Hazzard", "q": "A 78-year-old woman undergoes robotic prostatectomy for adenocarcinoma. PMH: AFib (on rivaroxaban), diabetes, and hypertension. POD#2: develops acute SOB, SpO2 88% on 4L. BP 98/62, HR 118 irregular. ECG shows AFib with RVR. CXR: bilateral infiltrates. BNP 890 (baseline 200). Troponin 0.08 (baseline 0.02). What is the most likely diagnosis?", "o": ["Pulmonary embolism", "TACO (transfusion-associated circulatory overload)", "Aspiration pneumonia", "Stress cardiomyopathy"], "c": 1, "e": "The correct answer is TACO. Robotic surgery requires steep Trendelenburg positioning causing massive fluid shifts. Combined with AFib and diastolic dysfunction (implied by baseline elevated BNP), this precipitates volume overload. Elevated BNP and bilateral infiltrates confirm diagnosis.\n\nOption A (PE) is the TRAP - everyone considers PE with postop dyspnea and tachycardia, but bilateral infiltrates argue against PE as primary diagnosis.\n\nOption C (aspiration) typically shows unilateral/dependent infiltrates and fever.\n\nOption D (Takotsubo) causes more dramatic troponin elevation and wall motion abnormalities.\n\nClinical Pearl: Elderly patients tolerate Trendelenburg positioning poorly due to reduced venous compliance and diastolic dysfunction. Limit fluids intraoperatively, use lung-protective ventilation, and consider supine positioning intervals. The rivaroxaban hold increased her thrombotic risk - restart ASAP once hemostasis assured.", "reason": "Woman cannot undergo prostatectomy - anatomically impossible"}, {"idx": 1996, "ti": 38, "t": "Hazzard", "q": "An 85-year-old man with severe AS (valve area 0.7 cm²), mild dementia, and CKD stage 3b undergoes TAVR under conscious sedation. Baseline Cr 1.9. Two hours post-procedure, he becomes agitated and hypertensive (BP 185/95). ECG shows LBBB (new). Echo reveals moderate paravalvular leak. What's the most appropriate immediate management?", "o": ["Nicardipine infusion for BP control", "Urgent return to cath lab for valve adjustment", "IV haloperidol for agitation", "Temporary pacemaker placement"], "c": 3, "e": "Temporary pacemaker placement is indicated. New LBBB occurs in 25-30% post-TAVR and risks progression to complete heart block, especially with paravalvular leak causing ongoing conduction system inflammation. Elderly patients tolerate bradycardia poorly.\n\nOption A (nicardipine) is the trap - treating hypertension seems logical but it's likely compensatory for reduced cardiac output from conduction abnormality. Vasodilation could precipitate shock.\n\nOption B (return to cath lab) addresses paravalvular leak but not the immediate conduction risk. Moderate leak often improves as valve expands over days.\n\nOption C (haloperidol) treats agitation symptomatically but misses the underlying cause - likely hypoperfusion from conduction abnormality causing delirium.\n\nClinical Pearl: Post-TAVR complications include stroke (2%), paravalvular leak (10-15%), vascular injury (5%), and conduction abnormalities (25-30%). New LBBB + any additional risk factor (baseline RBBB, paravalvular leak, balloon-expandable valve) warrants prophylactic temporary pacing.", "reason": "New LBBB alone doesn't require immediate pacemaker"}, {"idx": 2007, "ti": 9, "t": "Hazzard", "q": "An 81-year-old man with COPD on home oxygen presents with 15-pound weight loss over 3 months. BMI 20.1 kg/m². He reports early satiety and dyspnea with eating. Current medications: tiotropium, fluticasone/salmeterol, furosemide 40 mg daily. Albumin 3.1 g/dL, BNP 890 pg/mL. Echocardiogram shows EF 35%. You start oral supplements. Which formula is most appropriate?", "o": ["High-protein pulmonary formula with increased fat content", "Standard 1.0 kcal/mL polymeric formula", "Concentrated 2.0 kcal/mL formula with fiber", "Low-sodium cardiac formula with fluid restriction"], "c": 2, "e": "The correct answer is concentrated 2.0 kcal/mL formula. This patient has cardiac cachexia with volume overload (elevated BNP, on furosemide) and COPD-related dyspnea limiting intake. High-calorie density formula provides nutrition without excessive volume.\n\nOption A (pulmonary formula) is the trap - these expensive formulas with high fat content were designed to reduce CO2 production, but studies show no clinical benefit. Many physicians still choose these based on outdated teaching.\n\nOption B (standard formula) requires too much volume for a patient already struggling with dyspnea and fluid overload. Would need 1500-2000 mL daily for adequate calories.\n\nOption D (cardiac formula) addresses sodium but these formulas are typically lower calorie density, requiring more volume - counterproductive in this patient with both cardiac and pulmonary limitations.\n\nClinical Pearl: In patients with combined cardiac and pulmonary disease, prioritize caloric density over disease-specific formulations. Monitor daily weights closely when initiating nutrition support in heart failure patients, as even enteral formulas contain 70-80% water and may worsen volume status.", "reason": "Explanation describes formula without fiber mentioned"}, {"idx": 2034, "ti": 9, "t": "Hazzard", "q": "A 90-year-old man in hospice for end-stage heart failure develops severe oral thrush and odynophagia. He has DNR/DNI status but wants symptom management. Current medications include furosemide 40 mg BID, carvedilol 3.125 mg BID, and morphine 2.5 mg q4h PRN. Physical exam reveals extensive white plaques on tongue and buccal mucosa. CrCl is 28 mL/min. Which antifungal regimen is most appropriate for his goals of care?", "o": ["Fluconazole 200 mg PO day 1, then 100 mg daily", "Nystatin swish and spit QID", "Clotrimazole troches 5 times daily", "IV micafungin 100 mg daily"], "c": 1, "e": "The correct answer is nystatin swish and spit QID. For hospice patients with odynophagia from thrush, topical therapy provides immediate relief without systemic drug interactions or renal concerns. The 'swish and spit' technique avoids swallowing difficulties.\n\nOption A (fluconazole) requires dose adjustment to 50% with CrCl 28 and has significant drug interactions with many cardiac medications. Systemic therapy seems excessive for comfort care.\n\nOption C (clotrimazole troches) is the trap - while effective, troches must dissolve slowly in the mouth (15-30 minutes) and be swallowed, which is difficult with severe odynophagia. Many providers don't consider the practical aspects.\n\nOption D (IV micafungin) is inappropriate for hospice - requires IV access, daily infusions, and is inconsistent with comfort-focused goals.\n\nClinical Pearl: In hospice care, choose therapies that provide immediate symptom relief with minimal burden. Magic mouthwash (viscous lidocaine, antacid, diphenhydramine) can supplement antifungal therapy for odynophagia comfort.", "reason": "Explanation says 'swish and spit' but discourages swallowing"}, {"idx": 2043, "ti": 9, "t": "Hazzard", "q": "An 81-year-old woman with rheumatoid arthritis on methotrexate develops painful mouth ulcers preventing eating. She also started trimethoprim-sulfamethoxazole for UTI 5 days ago. Lab results: WBC 2.8, ANC 900, platelets 95,000, CrCl 38 mL/min. Oral exam reveals multiple shallow ulcers on buccal mucosa and tongue. Which intervention is most appropriate?", "o": ["Discontinue both medications immediately", "Add leucovorin 15 mg daily", "Switch to nitrofurantoin for UTI", "Prescribe magic mouthwash QID"], "c": 0, "e": "The correct answer is discontinuing both medications immediately. This patient has pancytopenia with oral ulcers suggesting methotrexate toxicity potentiated by trimethoprim-sulfamethoxazole. Both drugs inhibit dihydrofolate reductase, causing synergistic bone marrow suppression.\n\nOption B (leucovorin) is the TRAP - while leucovorin rescues methotrexate toxicity, continuing the drug interaction is dangerous. Many physicians add leucovorin without recognizing the drug interaction must be stopped first.\n\nOption C (nitrofurantoin) removes one interacting drug but is contraindicated with CrCl <60 mL/min due to inefficacy and neuropathy risk.\n\nOption D (magic mouthwash) treats symptoms while ignoring life-threatening pancytopenia requiring immediate intervention.\n\nClinical Pearl: Methotrexate + trimethoprim is a potentially fatal drug interaction causing megaloblastic anemia, pancytopenia, and mucositis. Always check for antifolate combinations. With CrCl 38 mL/min, methotrexate clearance is already reduced, increasing toxicity risk.", "reason": "Explanation contradicts itself on leucovorin treatment approach"}, {"idx": 2036, "ti": 9, "t": "Hazzard", "q": "A 79-year-old woman in a nursing home with moderate Alzheimer's disease (FAST 6c) develops fever and confusion. Staff note foul-smelling breath and facial swelling. She's been refusing oral care for 2 weeks. Exam shows right facial edema, trismus, and purulent drainage from multiple tooth sockets. Temperature 38.8°C, WBC 16,000. CrCl 42 mL/min. Which antibiotic regimen is most appropriate?", "o": ["Clindamycin 300 mg PO QID", "Amoxicillin-clavulanate 875 mg PO BID", "Metronidazole 400 mg PO TID", "Penicillin VK 500 mg PO QID plus metronidazole 500 mg PO TID"], "c": 0, "e": "The correct answer is clindamycin 300 mg QID. This patient has a periodontal abscess with cellulitis requiring anaerobic coverage. Clindamycin provides excellent bone penetration and anaerobic coverage for oral infections, with no renal adjustment needed at CrCl 42 mL/min.\n\nOption B (amoxicillin-clavulanate) is the TRAP - while it's first-line for many infections, the 875 mg formulation should be avoided with CrCl <30 mL/min due to clavulanate accumulation. Many physicians don't realize the clavulanate component isn't renally adjusted.\n\nOption C (metronidazole alone) lacks aerobic coverage needed for polymicrobial oral infections.\n\nOption D (penicillin + metronidazole) is reasonable but requires two medications and the metronidazole dose should be reduced to 250 mg TID with CrCl <50 mL/min.\n\nClinical Pearl: Poor oral hygiene in dementia patients increases aspiration pneumonia risk 4-fold. Daily chlorhexidine rinses reduce pneumonia incidence by 40% in nursing home residents unable to perform self-care.", "reason": "CrCl 42 contradicts need to avoid clavulanate"}, {"idx": 2067, "ti": 11, "t": "Hazzard", "q": "A 72-year-old woman is admitted to the hospital with severe COPD exacerbation. On day 3, she develops new urinary incontinence, soaking through 3 pads in 8 hours. She is confused about the date and repeatedly asks why she's in the hospital. Her daughter states she was fully continent and living independently before admission. Current medications include: prednisone 40 mg daily, ipratropium nebulizers Q6H, levofloxacin 750 mg daily, and newly started tolterodine 2 mg BID for bladder spasms. Vital signs are stable. CAM screen is positive. Post-void residual is 250 mL. What is the most appropriate intervention?", "o": ["Discontinue tolterodine and start scheduled toileting", "Insert indwelling urinary catheter", "Increase tolterodine to 4 mg BID", "Start tamsulosin 0.4 mg daily"], "c": 0, "e": "The correct answer is to discontinue tolterodine and implement scheduled toileting. This patient has delirium (positive CAM, confusion, acute functional decline with new incontinence) and urinary retention (PVR 250 mL) caused by tolterodine, an anticholinergic that's on the Beers Criteria.\n\nOption B (catheter) is the TRAP - while it would manage the retention, indwelling catheters increase delirium risk, UTI risk, and functional decline. They should be avoided unless absolutely necessary.\n\nOption C (increase tolterodine) would worsen both the delirium and urinary retention. Anticholinergics cause both cognitive impairment and bladder dysfunction in older adults.\n\nOption D (tamsulosin) is used for BPH-related retention in men and has no role in anticholinergic-induced retention in women.\n\nClinical Pearl: New incontinence during hospitalization often represents delirium and/or medication side effects rather than a new bladder problem. Always review medications - anticholinergics, diuretics, sedatives, and alpha-blockers are common culprits.", "reason": "Explanation mentions urinary retention, tolterodine causing retention"}, {"idx": 2076, "ti": 11, "t": "Hazzard", "q": "An 82-year-old woman with moderate dementia in assisted living is brought to the ED by staff who report blood in her disposable briefs. She has lost 15 pounds over 6 months. Examination reveals an ulcerated, friable 4 cm mass on the right labium majus. She moans when the area is examined but cannot provide history. Her daughter (healthcare proxy) arrives and states her mother has been clear about wanting comfort care only, no hospitalizations or procedures. Labs show hemoglobin 8.2 g/dL, creatinine 1.6 mg/dL. What is the most appropriate management?", "o": ["Transfuse 2 units packed red blood cells", "Silver nitrate application for hemostasis", "Urgent gynecologic oncology consultation", "Hospice referral with local wound care"], "c": 3, "e": "The correct answer is hospice referral with local wound care. This patient has probable advanced vulvar cancer with constitutional symptoms (weight loss, anemia) and clear comfort-only goals. Hospice provides appropriate symptom management.\n\nOption A (transfusion) is the TRAP - while transfusion might temporarily improve hemoglobin, it requires hospitalization (against stated wishes), provides only temporary benefit, and doesn't address the underlying terminal condition or symptoms.\n\nOption B (silver nitrate) could help bleeding but requires painful repeated applications inappropriate for comfort care in advanced dementia.\n\nOption C (oncology consultation) would likely recommend staging and treatment inconsistent with comfort-only goals. Diagnosis is clinically apparent without need for tissue confirmation in this setting.\n\nClinical Pearl: In advanced dementia, functional status (weight loss, dependency) often indicates prognosis better than cancer staging. Hospice enrollment allows symptom management (topical lidocaine, non-adherent dressings, oral tranexamic acid for bleeding) while honoring goals.", "reason": "Explanation cut off, cannot verify complete reasoning"}, {"idx": 2089, "ti": 11, "t": "Hazzard", "q": "A 76-year-old man is referred by his primary care physician for consideration of testosterone replacement. He reports 6 months of fatigue, decreased libido, and mild erectile dysfunction. Morning testosterone levels on two occasions were 242 ng/dL and 268 ng/dL (normal 300-1000). He has controlled hypertension and a history of prostate cancer treated with radiation 5 years ago (PSA undetectable for 3 years). BMI 32, hemoglobin 16.2 g/dL. Which aspect of his history represents the strongest contraindication to testosterone therapy?", "o": ["History of treated prostate cancer", "Hemoglobin level above 16 g/dL", "Borderline low testosterone levels", "Lack of specific hypogonadal symptoms"], "c": 1, "e": "Baseline hemoglobin >16 g/dL is an absolute contraindication due to erythrocytosis risk. Testosterone therapy typically raises hemoglobin 1-2 g/dL, potentially causing dangerous polycythemia in this patient.\n\nOption A (prostate cancer) is the trap - while historically an absolute contraindication, current guidelines suggest considering therapy after 2-3 years disease-free following discussions of risks. Many clinicians reflexively exclude these patients.\n\nOption C (borderline levels) isn't a contraindication but suggests retesting, preferably with free testosterone and LH/FSH.\n\nOption D (nonspecific symptoms) warrants investigation for other causes but doesn't contraindicate treatment if truly hypogonadal.\n\nClinical Pearl: Before starting testosterone in elderly men, check baseline hemoglobin/hematocrit, PSA, and perform digital rectal exam. Monitor hemoglobin at 3-6 months then annually. Stop therapy if hematocrit exceeds 54%. Remember that 'low T' symptoms overlap with normal aging, depression, and other chronic diseases - don't reflexively treat numbers without clinical correlation.", "reason": "Explanation contradicts itself calling prostate cancer absolute"}, {"idx": 2095, "ti": 11, "t": "Hazzard", "q": "An 84-year-old man with moderate dementia (MMSE 18), diabetes, and BPH presents to clinic with his daughter who reports he has been soiling his underwear daily for 3 weeks. He denies any discomfort but seems embarrassed. His medications include donepezil 10 mg, metformin 1000 mg BID, and tamsulosin 0.4 mg daily. Physical exam reveals a distended bladder palpable to the umbilicus, normal anal tone, and stool in the rectal vault. Post-void residual is 450 mL. Creatinine is 1.8 mg/dL (baseline 1.2). Which is the most appropriate next step?", "o": ["Start oxybutynin 5 mg daily for overactive bladder", "Insert indwelling Foley catheter and refer to urology", "Increase tamsulosin to 0.8 mg daily", "Discontinue donepezil as it may worsen incontinence"], "c": 1, "e": "This patient has overflow incontinence due to chronic urinary retention causing bilateral hydronephrosis and acute kidney injury (creatinine rise from 1.2 to 1.8). The palpable bladder and high PVR confirm significant retention. Immediate bladder decompression with catheterization is required to prevent further renal damage.\n\nOption A (oxybutynin) is the TRAP - many practitioners reflexively prescribe anticholinergics for incontinence. However, oxybutynin would worsen retention, is on the Beers list for cognitive impairment risk in dementia, and could precipitate complete urinary obstruction.\n\nOption C (increasing tamsulosin) is inadequate for this degree of retention with renal compromise. While higher doses are sometimes used, immediate decompression is needed.\n\nOption D (stopping donepezil) is incorrect - while cholinesterase inhibitors can theoretically increase bladder contractility, they rarely cause clinically significant incontinence and stopping would worsen his dementia.\n\nClinical Pearl: In elderly men with new incontinence, always check PVR to distinguish overflow from urgency incontinence. Anticholinergics are contraindicated in retention and should be avoided in dementia per Beers criteria.", "reason": "Explanation mentions AKI/hydronephrosis, not in question stem"}, {"idx": 2111, "ti": 0, "t": "Hazzard", "q": "An 84-year-old woman is brought to the ED by her daughter who found her confused this morning. The patient lives alone, manages her own medications, and was independent in all ADLs until 3 days ago. Vitals: T 37.1°C, HR 88, BP 108/62, RR 20. She's oriented only to person, repeatedly asking 'when is my husband coming?' (he died 2 years ago). Medications include donepezil 10 mg, metoprolol 25 mg BID, and zolpidem 10 mg QHS started last week for insomnia. What is the most likely diagnosis?", "o": ["Progression of underlying dementia", "Delirium due to zolpidem", "Psychotic depression with delusions", "Normal pressure hydrocephalus"], "c": 1, "e": "The correct answer is delirium due to zolpidem. This patient has acute confusion (3 days) with disorientation and apparent hallucinations after recent initiation of zolpidem, a Beers Criteria medication that commonly causes delirium in elderly patients, especially at the 10 mg dose.\n\nOption A (dementia progression) is the TRAP - many assume confusion in a patient on donepezil represents worsening dementia. However, dementia progresses over months to years, not days. The acute timeline and temporal relationship to zolpidem initiation point to delirium.\n\nOption C (psychotic depression) typically has mood symptoms preceding psychosis and doesn't cause fluctuating consciousness or acute onset.\n\nOption D (NPH) presents with the triad of gait disturbance, incontinence, and cognitive decline over months, not acute confusion.\n\nClinical Pearl: Zolpidem is on the 2023 Beers list with strong recommendation to avoid in elderly due to increased risk of delirium, falls, and fractures. If sleep aid needed, consider melatonin 1-3 mg or trazodone 25 mg. Always use CAM criteria to distinguish delirium from dementia: acute onset, fluctuation, inattention, and altered consciousness level.", "reason": "Explanation mentions zolpidem but not in medication list"}, {"idx": 2107, "ti": 11, "t": "Hazzard", "q": "An 83-year-old man with BPH, Parkinson's disease, and orthostatic hypotension is scheduled for HoLEP (holmium laser enucleation). His medications include carbidopa-levodopa, tamsulosin 0.4 mg, and midodrine 10 mg TID. Preoperative standing BP is 95/62 (supine 128/78). The anesthesiologist expresses concern about intraoperative hypotension. Which medication adjustment would best optimize his perioperative safety?", "o": ["Discontinue tamsulosin 1 week before surgery", "Increase midodrine to 15 mg TID starting tomorrow", "Hold morning midodrine dose on surgery day", "Continue all medications through perioperative period"], "c": 3, "e": "Continue all medications to maintain hemodynamic stability. Abruptly stopping tamsulosin risks acute urinary retention (especially problematic before prostate surgery), while continuing midodrine helps support blood pressure during anesthesia. His orthostatic hypotension requires these medications for safety.\n\nOption A is the TRAP - many surgeons reflexively stop alpha-blockers before surgery fearing hypotension. However, withdrawal risks acute retention, and the mild hypotensive effect is manageable with appropriate anesthetic technique and fluids.\n\nOption B (increasing midodrine) could cause supine hypertension without improving surgical outcomes - his supine BP of 128/78 doesn't have room for increase.\n\nOption C (holding midodrine) would worsen orthostatic hypotension during position changes and recovery, increasing fall risk postoperatively.\n\nClinical Pearl: In patients with autonomic dysfunction (Parkinson's), maintain medications supporting blood pressure through surgery. Anesthesiologists can manage medication-related hypotension better than the risks of withdrawal (retention, orthostasis, falls). Coordinate with anesthesia for appropriate monitoring and vasopressor availability.", "reason": "Explanation contradicts marked answer regarding midodrine continuation"}, {"idx": 2121, "ti": 0, "t": "Hazzard", "q": "An 80-year-old man with frailty syndrome (unintentional 15-pound weight loss, exhaustion, weakness, slow walking speed) and CKD stage 3b (eGFR 36) is referred for 'failure to thrive.' Review shows he's on 12 medications including atorvastatin 80 mg, aspirin 81 mg, metoprolol 100 mg BID, and lisinopril 40 mg. BP 108/64, albumin 3.1. According to Fried phenotype criteria, which intervention would best address his frailty?", "o": ["Add megestrol acetate 400 mg daily for appetite", "Reduce atorvastatin to 20 mg for possible statin myopathy", "Comprehensive medication reconciliation and deprescribing", "Start testosterone replacement therapy"], "c": 2, "e": "The correct answer is comprehensive medication reconciliation and deprescribing. This patient meets Fried frailty criteria (weight loss, exhaustion, weakness, slow gait) and has polypharmacy (12 medications) with hypotension suggesting overtreatment. Deprescribing can improve outcomes in frail elderly.\n\nOption A (megestrol) is inappropriate - it causes thrombosis, adrenal suppression, and doesn't address underlying polypharmacy contributing to frailty.\n\nOption B (reduce statin) is the TRAP - while statins can cause myopathy, simply reducing one medication misses the broader polypharmacy issue. Many physicians focus on single medications rather than overall burden.\n\nOption D (testosterone) lacks evidence in frailty and adds another medication with risks including cardiovascular events.\n\nClinical Pearl: Frailty syndrome (prevalence 10-15% in community-dwelling elderly) is diagnosed using Fried criteria: unintentional weight loss, exhaustion, weakness (grip strength), slow walking speed, and low physical activity. Three or more = frail. Polypharmacy contributes to frailty through multiple mechanisms. Start deprescribing with preventive medications in limited life expectancy (statins, bisphosphonates) and medications with high risk/low benefit ratios.", "reason": "Explanation supports reducing statin not comprehensive reconciliation"}, {"idx": 2155, "ti": 4, "t": "Hazzard", "q": "A 78-year-old woman presents to the ED after falling at home while getting up to use the bathroom at night. She reports dizziness upon standing and has fallen twice in the past month. Medications include amlodipine 10mg daily, hydrochlorothiazide 25mg daily, trazodone 100mg at bedtime, and oxybutynin 5mg twice daily. BP lying 145/85, standing 118/72 after 1 minute. Creatinine 1.4 mg/dL (eGFR 42). Which medication change would most effectively reduce her fall risk?", "o": ["Discontinue oxybutynin", "Discontinue trazodone", "Switch hydrochlorothiazide to chlorthalidone", "Reduce amlodipine to 5mg daily"], "c": 0, "e": "The correct answer is discontinuing oxybutynin, which carries the highest fall risk through multiple mechanisms: anticholinergic effects causing confusion/sedation, urinary retention leading to nocturia, and orthostatic hypotension. Both oxybutynin and trazodone are on the Beers 2023 list, but oxybutynin's multifactorial contribution to falls makes it the priority.\n\nOption B (trazodone) is the TRAP - many clinicians reflexively discontinue sedatives first. While trazodone increases fall risk and is Beers-listed, it's less problematic than oxybutynin in this scenario with documented orthostasis and nocturia-related falls.\n\nOption C (switching thiazides) is incorrect; chlorthalidone has similar orthostatic effects.\n\nOption D (reducing amlodipine) might help orthostasis but doesn't address the anticholinergic burden or nocturia.\n\nClinical Pearl: When evaluating polypharmacy-related falls, prioritize discontinuing drugs with multiple mechanisms of fall risk. Anticholinergics like oxybutynin cause cognitive impairment AND orthostasis AND increased nighttime awakening - a 'triple threat' for falls.", "reason": "Explanation contradicts itself on orthostatic hypotension contribution"}, {"idx": 2158, "ti": 4, "t": "Hazzard", "q": "An 81-year-old man is admitted after a mechanical fall with hip fracture. Post-operatively, he develops delirium and pulls out his Foley catheter. His wife mentions he's been forgetting to take his medications lately and burned a pot last week (IADL decline). Creatinine clearance by Cockcroft-Gault is 35 mL/min. He weighs 68kg. Current medications include morphine PCA. Which medication for delirium management requires the most careful dosing adjustment?", "o": ["Haloperidol 0.5mg IM", "Quetiapine 12.5mg PO", "Risperidone 0.25mg PO", "Olanzapine 2.5mg IM"], "c": 2, "e": "The correct answer is risperidone, which is primarily renally excreted (60% unchanged) and requires dose reduction with CrCl <60 mL/min. In elderly patients with CrCl 35 mL/min, risperidone and its active metabolite accumulate significantly, increasing extrapyramidal side effects and mortality risk.\n\nOption A (haloperidol) undergoes hepatic metabolism with minimal renal excretion, requiring no adjustment.\n\nOption B (quetiapine) is the TRAP - many assume all antipsychotics need renal adjustment, but quetiapine is 99% hepatically metabolized with no renal dosing needed, making it preferred in renal impairment.\n\nOption D (olanzapine) is hepatically metabolized (though IM olanzapine is Beers-listed due to increased sedation risk).\n\nClinical Pearl: Among antipsychotics used for delirium, only risperidone and paliperidone require renal dose adjustment. In elderly patients with CKD, quetiapine is often the safest choice, starting at 12.5-25mg. Always calculate CrCl using Cockcroft-Gault (not eGFR) for drug dosing in elderly patients.", "reason": "Explanation argues against risperidone, favors quetiapine instead"}, {"idx": 2193, "ti": 4, "t": "Hazzard", "q": "An 85-year-old man is brought to the ED by his son who found him on the kitchen floor. The patient remembers making breakfast but nothing after that until his son was helping him up. He has Parkinson's disease, BPH, hypertension, and chronic back pain. Medications: carbidopa/levodopa 25/100 QID, tamsulosin 0.8mg at bedtime, lisinopril 20mg daily, tramadol 50mg PRN. Exam shows resting tremor and bradykinesia. Which combination of factors most likely caused his syncope?", "o": ["Postprandial hypotension from Parkinson's plus morning medication timing", "Neurogenic orthostatic hypotension from Parkinson's plus alpha blockade", "Vasovagal syncope from pain plus vagal hypersensitivity", "Medication interaction between tramadol and carbidopa/levodopa"], "c": 1, "e": "Parkinson's disease causes neurogenic orthostatic hypotension through autonomic dysfunction. Adding tamsulosin (alpha-blocker) to age-related beta-blockade creates severe orthostatic hypotension, especially problematic in Parkinson's patients who already have impaired compensatory mechanisms.\n\nOption A (postprandial hypotension) is the trap - while PPH is common in Parkinson's, the timing (morning, making breakfast) suggests pre-meal rather than post-meal. Many assume all Parkinson's syncope is postprandial.\n\nOption C (vasovagal) is less likely given no reported prodrome and Parkinson's patients have blunted autonomic responses.\n\nOption D is incorrect - no significant interaction between tramadol and levodopa.\n\nClinical Pearl: The combination of neurogenic OH from Parkinson's disease plus iatrogenic OH from alpha-blockers is particularly dangerous. Consider alternative BPH treatments (5-alpha reductase inhibitors, procedures) in Parkinson's patients to avoid this synergy.", "reason": "Explanation mentions beta-blockade not in patient's medications"}, {"idx": 2219, "ti": 30, "t": "Hazzard", "q": "An 86-year-old woman with CHF (EF 35%), atrial fibrillation on warfarin, and early Alzheimer's disease is brought to the ED by her granddaughter for the third time this month with dyspnea. Each time she's found to be fluid overloaded with subtherapeutic INR. The granddaughter manages all medications. Today's labs: BNP 890, INR 1.2, Cr 1.4. The patient's pill bottles at home contain the correct medications but many pills remain. What is the most concerning finding suggesting elder mistreatment?", "o": ["Subtherapeutic anticoagulation", "Recurrent CHF exacerbations despite adequate resources", "Evidence of medication stockpiling", "Cognitive impairment with caregiver medication management"], "c": 1, "e": "Repeated emergency visits for preventable disease decompensation despite adequate resources and a capable caregiver strongly suggests neglect through medication withholding. This pattern - multiple CHF exacerbations with evidence of ungiving prescribed medications - is a classic presentation of medical neglect.\n\nOption A (subtherapeutic INR) is concerning but could have multiple causes including dietary changes or drug interactions.\n\nOption C is the trap - medication stockpiling might suggest hoarding or selling, but in this context with multiple admissions for the same condition, it more likely indicates the caregiver isn't administering the medications.\n\nOption D describes a common scenario that isn't inherently concerning without evidence of harm.\n\nClinical Pearl: Frequent emergency visits or hospitalizations for chronic disease exacerbations despite adequate resources and care plans should trigger evaluation for neglect. The Beers Criteria note warfarin requires careful monitoring in elderly patients, making withholding particularly dangerous.", "reason": "Explanation describes neglect, not recurrent exacerbations"}, {"idx": 2225, "ti": 30, "t": "Hazzard", "q": "A 79-year-old man with Parkinson's disease, depression, and recent hip fracture is evaluated at home by visiting nurse. He lives with his 45-year-old son since the fracture. The nurse notes multiple missed medical appointments, empty refrigerator, and overflowing garbage. The patient scores 24/30 on MMSE but appears withdrawn. His medications (carbidopa-levodopa, sertraline, vitamin D) are scattered on the floor. The son, smelling of alcohol, says 'He's too much trouble.' What combination of findings most strongly indicates elder mistreatment?", "o": ["Cognitive impairment with caregiver stress", "Environmental neglect with caregiver substance abuse", "Depression with social isolation", "Missed appointments with medication noncompliance"], "c": 1, "e": "Environmental neglect (empty refrigerator, garbage) combined with caregiver substance abuse represents clear mistreatment. The son's statement 'too much trouble' indicates caregiver unwillingness, not just inability. Substance abuse is a major risk factor for elder abuse.\n\nOption A is the trap - the patient has normal cognition (MMSE 24/30), and 'caregiver stress' often excuses neglect when the real issue is caregiver substance abuse and unwillingness to provide care.\n\nOption C (depression/isolation) may result from neglect but doesn't identify the primary problem.\n\nOption D focuses on symptoms rather than causes.\n\nClinical Pearl: Environmental neglect (poor sanitation, inadequate food) with caregiver substance abuse requires immediate intervention. The scattered Parkinson's medications are particularly concerning as medication timing is critical for symptom control. Normal cognition (MMSE 24/30) makes the patient's withdrawn state more concerning for abuse impact.", "reason": "Explanation mentions substance abuse, answer doesn't specify"}, {"idx": 2256, "ti": 4, "t": "Hazzard", "q": "An 86-year-old woman is evaluated for recurrent falls. Her daughter reports she's fallen 4 times in 3 months, always when getting up to use the bathroom. The patient appears thin and reports poor appetite. Medications: furosemide 40 mg BID, lisinopril 20 mg daily, melatonin 5 mg nightly. Exam: temporal wasting, weight 48 kg (BMI 18), grip strength 12 kg, gait speed 0.6 m/s. Labs: albumin 3.0 g/dL. Using Fried criteria, which finding confirms frailty syndrome?", "o": ["Unintentional weight loss >10 pounds in past year", "Recurrent falls", "Low albumin level", "Furosemide-induced volume depletion"], "c": 0, "e": "This patient meets frailty criteria with multiple markers including slow gait speed (<0.8 m/s), weak grip strength (<16 kg for women), and likely weight loss given her low BMI and temporal wasting. The Fried phenotype requires 3 of 5 criteria: unintentional weight loss (>10 pounds/year), exhaustion, low activity, slow gait, and weak grip. Weight loss is a core criterion.\n\nOption B (falls) is the trap - while frail patients fall frequently, falls themselves aren't part of Fried criteria. Many clinicians conflate consequences of frailty (falls, disability) with diagnostic criteria.\n\nOption C (low albumin) indicates malnutrition contributing to frailty but isn't a Fried criterion.\n\nOption D (volume depletion) may contribute to falls but isn't related to frailty diagnosis.\n\nClinical Pearl: Frailty syndrome affects 15% of community-dwelling elderly and 50% of those >85. It's diagnosed using validated criteria (Fried, Rockwood Clinical Frailty Scale), not clinical gestalt. Frailty predicts falls, disability, hospitalization, and death independent of comorbidities. Interventions should address nutrition (protein supplementation), exercise (resistance training), and polypharmacy reduction.", "reason": "Explanation describes gait speed and grip strength"}, {"idx": 2265, "ti": 16, "t": "Hazzard", "q": "A 77-year-old nursing home resident with moderate dementia (MMSE 18/30) and bilateral knee OA is noted by staff to be eating less and participating less in activities. When asked about pain, she denies it but grimaces when standing. Tylenol 650mg BID is scheduled. Vital signs normal. On exam, she guards both knees during passive range of motion. What is the most appropriate next intervention?", "o": ["Increase acetaminophen to 1000mg TID", "Start celecoxib 100mg daily", "Trial of scheduled tramadol 25mg BID", "Use observational pain scale and increase acetaminophen"], "c": 3, "e": "The correct answer is using an observational pain scale (like PAINAD) and increasing acetaminophen based on objective findings. Dementia patients often cannot reliably report pain, but behavioral changes (eating less, activity withdrawal) and physical signs (grimacing, guarding) indicate untreated pain.\n\nOption A (increase acetaminophen) is the trap - while the dose increase is appropriate, simply increasing medication without systematic pain assessment in dementia patients leads to both under and over-treatment. Many assume dementia patients need less analgesia when they actually have same pain levels but can't communicate them.\n\nOption B (celecoxib) adds unnecessary risks (GI, renal, cardiovascular) when acetaminophen hasn't been optimized.\n\nOption C (tramadol) is inappropriate - increases confusion and fall risk in dementia patients. Listed in Beers criteria as potentially inappropriate in dementia.\n\nClinical Pearl: Pain in dementia presents as behavioral changes: decreased eating, withdrawal from activities, aggression, or sleep disturbance. Use validated observational scales (PAINAD, PACSLAC) for patients with MMSE <18. Functional decline (reduced participation) may be the only sign of inadequate pain control in cognitive impairment.", "reason": "Explanation says Option A is trap answer"}, {"idx": 2279, "ti": 15, "t": "Hazzard", "q": "An 81-year-old man is seen in outpatient follow-up 6 weeks after hip fracture repair. His wife reports he's been confused at times, forgetting recent conversations but remembering remote events clearly. He scores 24/30 on MMSE (lost points on recall and orientation). Pre-fracture MMSE was 28/30. He's completed physical therapy and ambulates independently. CBC and metabolic panel are normal. 25-hydroxyvitamin D level is 18 ng/mL. Which intervention is most likely to improve his cognitive function?", "o": ["Start vitamin D 50,000 IU weekly for 8 weeks", "Begin donepezil 5 mg daily", "Order brain MRI", "Refer to neuropsychology for testing"], "c": 0, "e": "This patient has vitamin D deficiency (<20 ng/mL) with mild cognitive decline after hip fracture. Vitamin D deficiency is associated with cognitive impairment, increased fall risk, and poor fracture healing. High-dose replacement (50,000 IU weekly) is indicated for levels <20 ng/mL.\n\nOption B (donepezil) is the trap - the 4-point MMSE decline might suggest early dementia, leading providers to start cholinesterase inhibitors. However, post-operative cognitive dysfunction is common and may improve with time and treating reversible causes like vitamin D deficiency.\n\nOption C (brain MRI) isn't indicated for mild cognitive changes without focal findings or rapid progression. Post-operative cognitive changes are expected.\n\nOption D (neuropsychology) may be helpful if cognitive issues persist after treating vitamin D deficiency, but it's premature now.\n\nClinical Pearl: Vitamin D deficiency is present in 60-90% of hip fracture patients. Beyond bone health, vitamin D affects muscle strength, balance, and cognitive function. Always check levels in hip fracture patients and aggressively replace if <30 ng/mL to reduce fall risk and optimize recovery.", "reason": "Question text appears cut off, no vitamin D level mentioned"}, {"idx": 2288, "ti": 15, "t": "Hazzard", "q": "An 88-year-old man is day 14 in skilled nursing after hip fracture repair. Chart review shows he's lost 8 pounds since admission. He has mild dementia and macular degeneration. Staff report he eats <50% of meals, stating 'the food has no taste.' Medications: vitamin D, calcium, acetaminophen PRN. Labs: albumin 3.0, prealbumin 16. Which intervention would most effectively address his poor intake?", "o": ["Liberalize diet to regular with no restrictions", "Start megestrol acetate 400 mg daily", "Order zinc sulfate 220 mg daily", "Begin mirtazapine 7.5 mg QHS"], "c": 0, "e": "Liberalizing diet restrictions in elderly SNF residents improves intake and quality of life. Many elderly have unnecessary restrictions (diabetic, low-salt, low-cholesterol) that make food unpalatable without meaningful benefit at advanced age.\n\nOption C (zinc) is the trap - zinc deficiency can cause taste changes, making it seem like a logical choice. However, zinc deficiency is uncommon without specific risk factors (chronic diarrhea, alcohol use), and supplements can cause nausea, worsening intake.\n\nOption B (megestrol) has serious adverse effects including thrombosis, adrenal suppression, and proximal muscle weakness - particularly dangerous post-hip fracture.\n\nOption D (mirtazapine) helps appetite but he's not describing depression symptoms. Address simple interventions before adding psychoactive medications.\n\nClinical Pearl: Restrictive diets in nursing homes often worsen malnutrition without improving outcomes. For elderly with limited life expectancy, quality of life and adequate nutrition outweigh theoretical benefits of dietary restrictions. Consider patient preferences, enhance flavors with seasonings, and provide social dining when possible.", "reason": "Explanation assumes restrictions exist; question doesn't specify"}, {"idx": 2290, "ti": 36, "t": "Hazzard", "q": "An 84-year-old man with COPD, heart failure (EF 35%), and diabetes is admitted to inpatient rehabilitation following a right MCA stroke 10 days ago. His NIHSS improved from 12 to 6. He requires moderate assistance for transfers and has left-sided neglect. On day 3 of rehabilitation, he refuses therapy sessions, stating 'What's the point? I'll never get better.' His wife reports he was an avid woodworker who hasn't touched his tools in 6 months. Medications include metoprolol, lisinopril, furosemide, metformin, and aspirin. Which intervention is most likely to improve his rehabilitation participation?", "o": ["Start sertraline 25 mg daily", "Increase therapy sessions to twice daily", "Arrange for woodworking activities in occupational therapy", "Discharge to home with outpatient therapy"], "c": 2, "e": "This patient shows signs of depression (anhedonia, hopelessness) that preceded his stroke, now interfering with rehabilitation participation. The correct answer is incorporating meaningful activities (woodworking) into therapy, which addresses both depression and functional goals through patient-centered care.\n\nOption A (sertraline) is tempting but SSRIs take 4-6 weeks for effect and won't immediately improve participation. Additionally, starting antidepressants during acute rehabilitation without addressing motivational factors is premature.\n\nOption B (increasing sessions) is the TRAP - many assume more therapy equals better outcomes, but without addressing the underlying depression and motivation, this will likely increase resistance and frustration.\n\nOption D (discharge home) is inappropriate as the patient still requires moderate assistance for transfers and has unaddressed left neglect, making him unsafe for discharge.\n\nClinical Pearl: In geriatric rehabilitation, incorporating personally meaningful activities into therapy improves engagement and outcomes more effectively than simply increasing therapy intensity. Pre-stroke interests provide powerful motivational tools.", "reason": "Explanation contradicts itself - describes depression treatment"}, {"idx": 2292, "ti": 36, "t": "Hazzard", "q": "An 81-year-old man with mild cognitive impairment (MoCA 22/30) and chronic kidney disease (GFR 35 mL/min) is undergoing outpatient cardiac rehabilitation after NSTEMI treated with PCI 6 weeks ago. He takes aspirin, clopidogrel, atorvastatin, metoprolol, and lisinopril. During his fourth session, he develops dizziness and near-syncope while on the treadmill at 2.5 mph. BP drops from 130/80 to 95/60 with standing. Which medication adjustment is most appropriate?", "o": ["Discontinue metoprolol", "Reduce lisinopril dose by 50%", "Add midodrine 2.5 mg TID", "Switch metoprolol to evening dosing"], "c": 3, "e": "This patient has exercise-induced orthostatic hypotension limiting his cardiac rehabilitation. The correct answer is switching metoprolol to evening dosing, which maintains cardiac protection while minimizing daytime orthostatic symptoms during rehabilitation.\n\nOption A (discontinuing metoprolol) is the TRAP - many providers reflexively stop beta-blockers for orthostasis, but this patient needs continued beta-blockade post-MI for mortality benefit. Stopping it would be dangerous.\n\nOption B (reducing lisinopril) is less ideal as ACE inhibitors provide important cardiac and renal protection. The orthostasis is more likely from beta-blocker peak effect during exercise.\n\nOption C (midodrine) adds polypharmacy and potential drug interactions without first trying timing adjustments. It's also contraindicated with coronary disease.\n\nClinical Pearl: In geriatric cardiac rehabilitation, medication timing is crucial. Evening dosing of antihypertensives allows maintenance of cardioprotective therapy while minimizing orthostatic symptoms during daytime exercise sessions.", "reason": "Explanation discusses Option A not switching dosing"}, {"idx": 2306, "ti": 36, "t": "Hazzard", "q": "A 79-year-old woman admitted for stroke rehabilitation has been making good progress with PT/OT but develops new urinary incontinence. Her therapists note she can transfer independently but 'forgets' to ask for help toileting. MMSE 22/30. She takes aspirin, atorvastatin, and metformin. Urinalysis shows 50-100 WBC, many bacteria, negative nitrites. Which management approach would best maintain her functional progress?", "o": ["Start oxybutynin 2.5mg BID for urge incontinence", "Treat with ciprofloxacin 250mg BID x 7 days", "Implement scheduled toileting every 2 hours", "Insert indwelling catheter until discharge"], "c": 2, "e": "This patient has functional incontinence due to mild cognitive impairment affecting her ability to recognize toileting needs. The correct answer is behavioral intervention (scheduled toileting) which maintains continence without medication risks.\n\nOption A (oxybutynin) is the TRAP - it's a Beers Criteria medication with high anticholinergic burden that would worsen her cognition (MMSE already borderline at 22) and potentially reverse her rehabilitation gains. Many physicians reflexively prescribe anticholinergics for any incontinence.\n\nOption B assumes UTI based on UA, but asymptomatic bacteriuria is common in elderly and shouldn't be treated. She has no fever, dysuria, or systemic symptoms. Unnecessary antibiotics risk C. diff and delirium.\n\nOption D (catheter) would eliminate her functional mobility for toileting, increase UTI risk, and likely extend her rehab stay. Catheters should be avoided in mobile patients.\n\nClinical Pearl: In rehabilitation settings, maintain function over convenience. Scheduled toileting preserves mobility and dignity while avoiding polypharmacy. Remember that 30-50% of elderly women have asymptomatic bacteriuria - don't treat the urinalysis, treat the patient.", "reason": "Explanation describes UTI/bacteriuria not addressed by answer"}, {"idx": 2304, "ti": 36, "t": "Hazzard", "q": "An 84-year-old woman with severe osteoarthritis, depression, and recent diagnosis of mild cognitive impairment (MoCA 22/30) is evaluated for knee replacement. She lives alone, manages basic ADLs independently but daughter helps with bills and shopping. BMI 34, uses rolling walker, 10-meter gait speed 0.6 m/s. She scores 4/5 on Clinical Frailty Scale. Surgeon defers to rehabilitation assessment. What factor most strongly predicts poor postoperative rehabilitation outcome?", "o": ["Clinical Frailty Scale score of 4", "Living alone without full-time caregiver", "Mild cognitive impairment", "Gait speed 0.6 m/s"], "c": 0, "e": "Frailty (CFS 4/5) is the strongest predictor of poor surgical outcomes and rehabilitation failure. Frail patients have depleted physiologic reserve, prolonged recovery, and high complication rates regardless of living situation or cognition.\n\nOption B (living alone) is the TRAP - many assume social support determines outcomes, but with appropriate planning and services, patients living alone can succeed. Frailty is more predictive than living situation.\n\nOption C (MCI) may slow learning of new techniques but doesn't prevent rehabilitation success with appropriate strategies and repetition.\n\nOption D (slow gait speed) indicates functional limitation but is one component of frailty, not independently predictive when frailty is assessed comprehensively.\n\nClinical Pearl: Pre-rehabilitation frailty assessment using validated tools (Clinical Frailty Scale, Fried criteria) predicts outcomes better than age, comorbidities, or social factors. CFS ≥4 indicates need for prehabilitation or non-surgical management consideration.", "reason": "Explanation describes CFS 4/5, marked answer says 4"}, {"idx": 2324, "ti": 6, "t": "Hazzard", "q": "A 77-year-old man with mild cognitive impairment and type 2 diabetes presents for routine follow-up. His wife mentions he forgot to take his medications several times last week and mixed up his insulin doses twice. Montreal Cognitive Assessment (MoCA) score is 22/30 (was 24/30 one year ago). Current medications include metformin 1000 mg BID, insulin glargine 24 units at bedtime, and lisinopril 20 mg daily. HbA1c 7.2%. Which medication adjustment is most appropriate?", "o": ["Discontinue metformin due to cognitive concerns", "Switch to sliding scale insulin regimen", "Simplify to insulin glargine once daily only, accept HbA1c 7.5-8.0%", "Add sitagliptin 100 mg daily to reduce insulin needs"], "c": 2, "e": "The correct answer is simplifying to insulin glargine once daily only and accepting a higher HbA1c target of 7.5-8.0%. This patient's declining cognition increases hypoglycemia risk with complex regimens. The American Diabetes Association recommends HbA1c 7.5-8.0% for older adults with mild cognitive impairment.\n\nOption A (discontinuing metformin) is the trap - many providers unnecessarily stop metformin in cognitive impairment, but it's actually the safest diabetes medication in elderly with minimal hypoglycemia risk and potential cognitive benefits.\n\nOption B (sliding scale insulin) would worsen complexity and increase error risk with his cognitive decline. Sliding scales are particularly dangerous in cognitively impaired patients.\n\nOption D (adding sitagliptin) increases polypharmacy and cost without addressing the core safety issue of medication complexity in cognitive impairment.\n\nClinical Pearl: In older adults with cognitive impairment and diabetes, simplify regimens and liberalize glycemic targets. The harms of hypoglycemia (falls, cognitive decline, cardiovascular events) outweigh benefits of tight control in this population. One daily insulin injection is safer than multiple daily injections.", "reason": "Explanation calls correct answer Option B/trap"}, {"idx": 2328, "ti": 6, "t": "Hazzard", "q": "A 77-year-old woman with Alzheimer's disease is brought to the ED by family who report she hasn't slept in 3 days and is seeing 'little children' in her room. She has been more confused and agitated. Current medications: donepezil 10 mg daily, memantine 10 mg BID, and trazodone 50 mg at bedtime started 1 week ago for insomnia. Exam shows bilateral upper extremity cogwheel rigidity. Which action is most appropriate?", "o": ["Increase trazodone to 100 mg at bedtime", "Discontinue trazodone, start quetiapine 12.5 mg at bedtime", "Add haloperidol 0.5 mg BID for hallucinations", "Obtain head CT to rule out subdural hematoma"], "c": 1, "e": "The correct answer is discontinuing trazodone and starting low-dose quetiapine. The new-onset visual hallucinations and extrapyramidal symptoms after starting trazodone suggest drug-induced parkinsonism with psychosis. Trazodone can rarely cause EPS and hallucinations in elderly.\n\nOption A (increasing trazodone) is the trap - providers often increase sleep medications when insomnia persists, but this would worsen the drug-induced syndrome.\n\nOption C (haloperidol) would severely worsen extrapyramidal symptoms. Traditional antipsychotics should be avoided when parkinsonism is present.\n\nOption D (head CT) isn't indicated without trauma history or focal findings. The temporal relationship with trazodone initiation makes medication effect most likely.\n\nClinical Pearl: In dementia patients with hallucinations AND parkinsonism, use quetiapine or clozapine - they have lower risk of worsening extrapyramidal symptoms. Always consider medication-induced causes for new neuropsychiatric symptoms, even with 'benign' drugs like trazodone.", "reason": "Quetiapine would worsen drug-induced parkinsonism symptoms"}, {"idx": 2342, "ti": 6, "t": "Hazzard", "q": "A 76-year-old woman with Lewy body dementia and REM sleep behavior disorder is admitted after a fall with hip fracture. Post-operatively, she's agitated and hallucinating more than baseline. The orthopedic team gave her haloperidol 2mg IV x1 for agitation. Two hours later, she's rigid, tremulous, and minimally responsive. Temp 38.4°C, HR 118, BP 165/95. CK is 890. Which diagnosis and treatment are correct?", "o": ["Neuroleptic malignant syndrome; dantrolene and bromocriptine", "Postoperative delirium; increase haloperidol to 5mg", "Neuroleptic sensitivity; supportive care and benzodiazepines", "Serotonin syndrome; cyproheptadine"], "c": 2, "e": "The correct answer is neuroleptic sensitivity with supportive care and benzodiazepines. Patients with DLB have severe sensitivity to antipsychotics, developing life-threatening rigidity, altered consciousness, and autonomic instability even with single doses.\n\nOption A (NMS) is the trap - while presentation overlaps, NMS typically requires longer antipsychotic exposure and higher CK (>1000). DLB patients have exquisite neuroleptic sensitivity as a disease feature, not true NMS. Treatment is similar but prognosis is better with sensitivity reactions.\n\nOption B (increase haloperidol) would be catastrophic, potentially fatal in DLB.\n\nOption D (serotonin syndrome) requires serotonergic medications and presents with hyperreflexia and clonus, not parkinsonism.\n\nClinical Pearl: DLB patients have severe, potentially irreversible reactions to all antipsychotics, even 'atypicals' like quetiapine. This neuroleptic sensitivity is a core clinical feature of DLB. For agitation in DLB, use non-pharmacological approaches first, then cholinesterase inhibitors. If antipsychotics are absolutely necessary, use quetiapine ≤12.5mg with extreme caution and close monitoring.", "reason": "Explanation says neuroleptic sensitivity IS the correct answer"}, {"idx": 2350, "ti": 5, "t": "Hazzard", "q": "An 85-year-old man with moderate vascular dementia (MoCA 18/30), CKD stage 4 (eGFR 22), and diabetes is transferred from his nursing home with acute confusion. His daughter reports he was oriented yesterday but today doesn't recognize her. Vitals: T 37.1°C, BP 95/60, HR 110, RR 24, O2 sat 92% on RA. Labs show WBC 6.2, Hgb 10.1, BUN 78, Cr 3.4 (baseline 2.8), glucose 68. He takes metformin 1000mg BID, lisinopril 20mg daily, and donepezil 10mg daily. What is the most appropriate next step?", "o": ["Administer IV haloperidol 2mg for agitation", "Check fingerstick glucose and give IV dextrose", "Order head CT to rule out stroke", "Start empiric ceftriaxone for presumed UTI"], "c": 1, "e": "This patient has hyperactive delirium with hypoglycemia as the precipitant. The correct answer is to immediately check fingerstick glucose and administer IV dextrose. His glucose of 68 mg/dL combined with tachycardia and confusion strongly suggests hypoglycemic delirium, likely from metformin accumulation in severe CKD.\n\nOption A (haloperidol) is the trap - while haloperidol is first-line for agitated delirium, you must first address reversible causes. Many clinicians reflexively sedate without looking for metabolic causes.\n\nOption C (head CT) is reasonable but not urgent given no focal findings and a clear metabolic cause present.\n\nOption D (antibiotics) is premature without signs of infection (afebrile, normal WBC).\n\nClinical Pearl: Metformin is contraindicated when eGFR <30 due to lactic acidosis risk. In CKD patients with delirium, always check for medication accumulation, especially metformin, gabapentin, and benzodiazepines. Hypoglycemia in elderly can present as delirium without typical sympathetic symptoms.", "reason": "Explanation says glucose already IS 68, not check"}, {"idx": 2354, "ti": 5, "t": "Hazzard", "q": "A 79-year-old man with mild cognitive impairment (MoCA 22/30) presents to the ED with his wife who reports he's been 'not himself' since starting antibiotics 3 days ago for cellulitis. He's oriented to person only, has word-finding difficulty, and scored 3/5 on CAM-ICU. Home medications: lisinopril 10mg daily, metformin 500mg BID, and levofloxacin 500mg daily (started 3 days ago). Vitals normal. Cr 1.6 (eGFR 41), glucose 112. What is the most appropriate management?", "o": ["Discontinue levofloxacin and switch to cephalexin", "Add haloperidol 0.5mg PO q6h PRN", "Obtain head CT and lumbar puncture", "Reduce levofloxacin to 250mg daily"], "c": 3, "e": "The correct answer is reducing levofloxacin to 250mg daily. Fluoroquinolones require renal dosing when CrCl <50 mL/min (his estimated CrCl by Cockcroft-Gault is ~35-40). Levofloxacin accumulation causes CNS toxicity including delirium, especially in elderly.\n\nOption A (switching antibiotics) is the trap - while tempting to stop the offending drug, he still needs treatment for cellulitis. Cephalexin might be less effective. The appropriate action is proper dose adjustment, not cessation.\n\nOption B (haloperidol) treats symptoms without addressing the cause - medication toxicity from improper dosing.\n\nOption C (CT/LP) is unnecessary given clear temporal relationship with medication and no fever or focal findings.\n\nClinical Pearl: Always calculate CrCl using Cockcroft-Gault (not eGFR) for drug dosing in elderly: CrCl = [(140-age) × weight(kg) × 0.85(if female)] / (72 × SCr). Fluoroquinolones, gabapentin, and many antibiotics need adjustment. CNS side effects often present as delirium in elderly.", "reason": "Explanation advocates switching antibiotics, contradicts dose reduction"}, {"idx": 2396, "ti": 6, "t": "Hazzard", "q": "A 72-year-old man is evaluated for a 6-month history of frequent falls. His wife notes he has difficulty looking down at his plate during meals and his voice has become softer. He has mild cognitive impairment but remains independent in IADLs. Examination reveals masked facies, axial rigidity greater than appendicular, vertical gaze palsy (especially downgaze), and hyperextended neck posture. He falls backward during pull test. Which medication should be avoided?", "o": ["Carbidopa-levodopa", "Donepezil", "Amantadine", "Rivastigmine"], "c": 1, "e": "The correct answer is donepezil. This patient has classic progressive supranuclear palsy (PSP) with vertical gaze palsy, axial rigidity, postural instability, and backward falls. Cholinesterase inhibitors like donepezil can worsen motor function and increase fall risk in PSP by enhancing cholinergic tone, which may exacerbate bradykinesia and postural instability.\n\nOption A (carbidopa-levodopa) is the TRAP - while PSP responds poorly to dopaminergic therapy compared to Parkinson's, a trial is reasonable and may provide modest benefit in up to 30% of patients. Many clinicians avoid it entirely, but this is incorrect.\n\nOption C (amantadine) may provide mild symptomatic benefit for rigidity and is not contraindicated.\n\nOption D (rivastigmine) is another cholinesterase inhibitor and should also be avoided, but donepezil is more commonly misprescribed due to its widespread use.\n\nClinical Pearl: PSP presents with early postural instability, vertical gaze palsy (downgaze affected first), axial > appendicular rigidity, and poor levodopa response. Avoid cholinesterase inhibitors which worsen motor symptoms. The 'rocket sign' (hyperextended neck) and backward falls distinguish PSP from Parkinson's disease.", "reason": "Explanation says donepezil worsens PSP, not treats"}, {"idx": 2398, "ti": 6, "t": "Hazzard", "q": "A 76-year-old man with mild cognitive impairment is brought by his son who is concerned about personality changes over the past year. The patient has become increasingly apathetic, stopped attending his weekly poker games, and shows no interest in his grandchildren's activities. He has also developed a rigid morning routine and becomes agitated if unable to eat the same breakfast daily. His MMSE is 26/30. Brain MRI shows bilateral frontal lobe atrophy. His son asks about genetic testing after reading about familial dementia online. Which genetic mutation is LEAST likely to explain this presentation?", "o": ["C9orf72 hexanucleotide repeat expansion", "Progranulin (GRN) mutation", "Microtubule-associated protein tau (MAPT) mutation", "Presenilin-1 (PSEN1) mutation"], "c": 3, "e": "The correct answer is PSEN1 mutation, which causes early-onset familial Alzheimer's disease, not frontotemporal dementia. This patient has classic behavioral variant FTD with apathy, loss of empathy, and compulsive behaviors (rigid breakfast routine) plus frontal atrophy on MRI.\n\nOption A (C9orf72) is the TRAP - while it's the most common genetic cause of familial FTD, many clinicians don't realize it can present with psychiatric symptoms (depression, psychosis) years before motor symptoms, making the behavioral changes seem unrelated. C9orf72 accounts for the largest proportion of familial FTD cases.\n\nOption B (GRN mutations) cause 25% of familial FTD with variable presentation including bvFTD, and typically present later (35-80 years) with asymmetric atrophy.\n\nOption C (MAPT mutations) were the first identified FTD mutations and commonly present in the 5th-6th decade with behavioral symptoms.\n\nClinical Pearl: The three major FTD mutations are C9orf72 (most common, associated with FTD-ALS), GRN (asymmetric atrophy, variable phenotype), and MAPT (earlier onset). PSEN1/PSEN2/APP mutations cause familial Alzheimer's, not FTD. Consider genetic counseling for FTD patients under 65 or with positive family history.", "reason": "Explanation says PSEN1 causes Alzheimer's not FTD"}, {"idx": 2412, "ti": 39, "t": "Hazzard", "q": "An 81-year-old man is admitted after falling off a ladder. CT shows small frontal contusions. He's on apixaban for AFib, amlodipine, and tamsulosin. Day 3, he develops urinary retention requiring catheterization. Post-void residual yesterday was 50mL. Creatinine increased from 1.2 to 1.8 mg/dL. Which medication adjustment is most appropriate?", "o": ["Discontinue tamsulosin permanently", "Add oxybutynin 2.5 mg daily", "Switch tamsulosin to finasteride", "Continue current medications unchanged"], "c": 0, "e": "This patient has acute urinary retention after TBI, likely due to tamsulosin combined with acute kidney injury. The correct answer is stopping tamsulosin - alpha-blockers can precipitate urinary retention paradoxically in setting of autonomic dysfunction after TBI, and with his AKI, the drug will accumulate.\n\nOption B (adding oxybutynin) is the trap - anticholinergics worsen urinary retention and are on Beers list for cognitive impairment risk, especially dangerous in post-TBI patients already at risk for confusion.\n\nOption C (finasteride) takes months to work, doesn't help acute retention, and requires dose adjustment in renal impairment.\n\nOption D ignores both the medication-induced retention and need for renal dosing adjustments.\n\nClinical Pearl: Post-TBI patients often develop autonomic dysfunction affecting bladder control. Review all medications - alpha-blockers, anticholinergics, opioids can precipitate retention. With AKI (Cr 1.2→1.8 = 33% decline in eGFR), adjust apixaban dose and avoid renally-cleared drugs that affect bladder function. Consider intermittent catheterization over indwelling to reduce infection risk.", "reason": "Explanation contradicts itself - tamsulosin treats not causes retention"}, {"idx": 2404, "ti": 6, "t": "Hazzard", "q": "A 75-year-old woman is evaluated for cognitive decline and personality changes over 2 years. Her son reports she has become disinhibited, making inappropriate comments to strangers and shoplifting candy. She shows no remorse when confronted. She has developed a rigid preference for sweet foods, eating ice cream for every meal. MMSE is 27/30. MRI brain shows bilateral frontal and anterior temporal atrophy. Family history reveals her mother had 'dementia and shaking' in her 60s, and her maternal uncle died of ALS at age 58. Which test is most likely to reveal the underlying etiology?", "o": ["C9orf72 hexanucleotide repeat expansion testing", "Apolipoprotein E genotyping", "14-3-3 protein and RT-QuIC", "Serum anti-NMDA receptor antibodies"], "c": 0, "e": "The correct answer is C9orf72 testing. This patient has behavioral variant FTD (disinhibition, loss of empathy, dietary changes, frontotemporal atrophy) with a striking family history of dementia with movement disorder (likely FTD) and ALS. C9orf72 expansion is the most common cause of familial FTD-ALS and accounts for this phenotypic heterogeneity within families.\n\nOption B (APOE) is the TRAP - while APOE4 is the strongest genetic risk factor for Alzheimer's disease and many providers reflexively order it for any dementia, it has no role in FTD diagnosis and doesn't explain the ALS in the family.\n\nOption C (14-3-3 and RT-QuIC) tests for Creutzfeldt-Jakob disease, which presents with rapid progression over months, not years, and myoclonus.\n\nOption D (anti-NMDA antibodies) cause autoimmune encephalitis with psychiatric symptoms, seizures, and movement disorders in younger patients, not slowly progressive FTD.\n\nClinical Pearl: C9orf72 expansion causes 40% of familial FTD and 40% of familial ALS. Within families, the same mutation can cause pure FTD, pure ALS, or FTD-ALS overlap. Psychiatric symptoms (psychosis, depression) may precede motor/cognitive symptoms by years. Consider testing in any patient under 65 with FTD or with positive family history.", "reason": "Question text missing family history of ALS"}, {"idx": 2415, "ti": 39, "t": "Hazzard", "q": "A 78-year-old woman presents to ED after being found on floor by neighbor, last seen normal 12 hours prior. She's confused, repeatedly asking 'where's my mother?' (deceased 20 years). Bruising on right temple. Lives alone, independent in all IADLs previously. CT head negative. Labs: Na 128, glucose 92, Cr 1.4 (baseline 0.9). Which finding most strongly suggests need for extended observation?", "o": ["Persistent retrograde amnesia after 4 hours", "Inability to recall three words after 5 minutes", "Failure to know current year", "Requesting to call deceased relatives"], "c": 0, "e": "This patient has post-traumatic amnesia with concerning features. The correct answer is persistent retrograde amnesia after 4 hours - this suggests more severe TBI despite negative CT and predicts prolonged recovery and higher risk of complications.\n\nOption B (poor word recall) is the trap - many physicians focus on anterograde amnesia testing, but acute word recall problems are common in any confused elderly patient and less specific for TBI severity.\n\nOption C (temporal disorientation) is common in both delirium and mild TBI, usually resolving within hours.\n\nOption D (calling for deceased relatives) is typical of generic confusion in elderly and doesn't specifically indicate TBI severity.\n\nClinical Pearl: Duration of post-traumatic amnesia (PTA) is the best predictor of TBI outcome in elderly. PTA >4 hours suggests moderate TBI despite normal imaging. These patients need admission for serial exams, as delayed bleeds are more common in elderly (brain atrophy allows more space before symptoms). Also note the acute kidney injury (Cr 0.9→1.4) suggesting dehydration from lying on floor - always check for rhabdomyolysis.", "reason": "Explanation describes retrograde amnesia, not anterograde amnesia"}, {"idx": 2413, "ti": 39, "t": "Hazzard", "q": "A 77-year-old woman with moderate AD (MMSE 18) falls at her assisted living facility, striking her occiput on concrete. Initial GCS 15, no focal deficits. CT shows no acute findings. Over 48 hours she becomes increasingly somnolent, eating only 25% of meals. Daughter asks about 'comfort care only.' Current medications: donepezil 10mg, sertraline 50mg. What is the most appropriate response?", "o": ["Agree to comfort care given her dementia diagnosis", "Obtain MRI brain to evaluate for diffuse axonal injury", "Start methylphenidate 2.5 mg twice daily for arousal", "Discuss that DNR status doesn't preclude reversible condition treatment"], "c": 3, "e": "This patient has post-concussive syndrome with hypersomnia, which is often reversible. The correct answer emphasizes that DNR/comfort care discussions shouldn't prevent treatment of potentially reversible conditions, even in dementia patients.\n\nOption A is the trap - many physicians conflate dementia with terminal illness and prematurely transition to comfort care for treatable conditions. Post-traumatic hypersomnia often improves over weeks to months.\n\nOption B (MRI for DAI) won't change acute management and DAI typically presents with immediate severe impairment, not delayed somnolence.\n\nOption C (methylphenidate) may be reasonable later but requires goals-of-care clarification first and careful cardiac monitoring in elderly.\n\nClinical Pearl: Post-concussive syndrome in dementia patients often manifests as functional decline (eating less, sleeping more) rather than typical headache/dizziness. Recovery is possible but slower than in younger patients. Always clarify that DNR mea
