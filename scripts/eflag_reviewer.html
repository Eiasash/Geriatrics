ent at eGFR <30.\n\nOption D (reducing metoprolol) is unnecessary - his vitals aren't provided suggesting hypotension, and beta-blockers don't significantly impact cognition.\n\nClinical Pearl: H2-blockers cross the blood-brain barrier and have anticholinergic properties, particularly problematic in CKD where drug clearance is reduced. PPIs are preferred for acid suppression in older adults, though they have their own risks with prolonged use.", "reason": "Explanation supports switching ranitidine but to omeprazole"}, {"idx": 3114, "ti": 24, "t": "Harrison", "q": "An 82-year-old man with CKD stage 3a (eGFR 56 mL/min/1.73m²), frailty (unintentional 12-pound weight loss, exhaustion, slow walking speed), and NYHA class III heart failure is hospitalized with volume overload. He's on furosemide 80mg BID, lisinopril 5mg daily, carvedilol 3.125mg BID, and spironolactone 25mg daily. Labs: K 5.3mEq/L, creatinine 1.6mg/dL (baseline 1.3mg/dL). He asks about his prognosis and whether dialysis is in his future. What is the most appropriate response?", "o": ["Your kidney function is stable, so dialysis is unlikely to be needed", "We should start planning for dialysis within the next year", "Given your heart failure and frailty, dialysis may not improve your quality of life", "Let's focus on treating your heart failure first before discussing dialysis"], "c": 2, "e": "The correct answer acknowledges that dialysis in frail patients with severe heart failure often doesn't improve quality of life or survival. This represents appropriate goals-of-care discussion, recognizing that CKD stage 3a rarely progresses to dialysis in elderly patients with competing mortality risks from heart failure and frailty.\n\nOption A is the trap answer - while technically accurate that stage 3a CKD doesn't usually need dialysis, it dismisses his legitimate concern and misses the opportunity for goals-of-care discussion in a frail patient with life-limiting comorbidities.\n\nOption B is incorrect - CKD stage 3a with eGFR 56 is nowhere near requiring dialysis, which typically starts at eGFR <10-15.\n\nOption D inappropriately defers an important discussion that the patient initiated.\n\nClinical Pearl: Frailty (meeting ≥3 Fried criteria) is associated with poor dialysis outcomes including early mortality and nursing home placement. In frail elderly patients with advanced comorbidities, conservative management often provides equal or better quality of life compared to dialysis.", "reason": "Explanation describes option A, not marked answer"}, {"idx": 3118, "ti": 24, "t": "Harrison", "q": "An 81-year-old man with CKD stage 3b (eGFR 35 mL/min/1.73m²) presents with acute gout in his right great toe. He has a history of recurrent gout attacks every 2-3 months. Current medications include allopurinol 100mg daily, chlorthalidone 25mg daily for hypertension, and aspirin 81mg daily. Serum uric acid 9.2mg/dL, creatinine 2.1mg/dL. Which change in chronic gout management is most appropriate?", "o": ["Increase allopurinol to 300mg daily", "Switch allopurinol to febuxostat 40mg daily", "Discontinue allopurinol during acute attack", "Add probenecid 500mg BID"], "c": 1, "e": "The correct answer is switching to febuxostat. While allopurinol can be used in CKD with dose adjustment, this patient has inadequate control on current dosing. Febuxostat doesn't require renal dose adjustment and achieves better urate lowering in CKD patients. The cardiovascular concerns with febuxostat are less relevant in elderly patients with limited life expectancy.\n\nOption A (increasing allopurinol) is the trap answer - many providers fear using adequate allopurinol doses in CKD, but it CAN be slowly titrated up to 300mg even with eGFR 35, monitoring for hypersensitivity. However, switching to febuxostat is simpler and more effective.\n\nOption C (discontinuing allopurinol) is incorrect - urate-lowering therapy should be continued during acute attacks as stopping/starting can precipitate more attacks.\n\nOption D (probenecid) is contraindicated when eGFR <30 and ineffective <50. Uricosurics don't work well in CKD.\n\nClinical Pearl: Chlorthalidone and low-dose aspirin both raise uric acid levels. In CKD, consider switching to non-thiazide antihypertensives if recurrent gout is problematic. Target serum urate <6mg/dL, checking levels 2-4 weeks after medication changes.", "reason": "Explanation contradicts itself - gets cut off mid-sentence"}, {"idx": 3117, "ti": 24, "t": "Harrison", "q": "A 79-year-old woman with CKD stage 4 (eGFR 22 mL/min/1.73m²) is seen in clinic with complaints of severe fatigue and feeling 'washed out.' She can no longer walk to her mailbox without resting. Labs: Hemoglobin 8.2g/dL, MCV 87fL, ferritin 95ng/mL, TSAT 18%, B12 and folate normal. She asks if she needs dialysis. Current medications include lisinopril 10mg daily and sevelamer 800mg TID. What is the most appropriate next step?", "o": ["Start oral ferrous sulfate 325mg TID", "Initiate darbepoetin alfa 40mcg weekly", "Refer for dialysis evaluation", "Give IV iron sucrose 200mg weekly x 5"], "c": 3, "e": "The correct answer is IV iron sucrose. She has functional iron deficiency (TSAT <20% despite ferritin >100) common in CKD, where inflammation blocks iron utilization. IV iron is indicated before starting ESA therapy and often improves anemia independently.\n\nOption A (oral iron) is the trap answer - it seems logical with low TSAT, but oral iron is poorly absorbed in advanced CKD due to elevated hepcidin, causes significant GI upset, and interferes with phosphate binder absorption. This is what non-nephrologists commonly prescribe.\n\nOption B (darbepoetin) is premature - guidelines recommend correcting iron deficiency first, as ESAs won't work effectively without adequate iron stores.\n\nOption C (dialysis referral) - while she has stage 4 CKD, initiating dialysis based solely on fatigue from treatable anemia would be inappropriate. Uremic symptoms typically occur at eGFR <15.\n\nClinical Pearl: In CKD anemia, ferritin <100 OR TSAT <20% indicates iron deficiency. IV iron is preferred in CKD stages 3-5 as it bypasses hepcidin-mediated gut blockade. Target hemoglobin 10-11g/dL to avoid cardiovascular events from higher targets.", "reason": "Explanation says ferritin >100, labs show 95ng/mL"}, {"idx": 3106, "ti": 24, "t": "Harrison", "q": "An 81-year-old man with COPD, CKD stage 3a, and depression is admitted with acute dyspnea. CXR shows pulmonary edema. He's never had heart problems. Echo reveals EF 25% with global hypokinesis. Review of medications shows he recently started seeing a new psychiatrist. His medication list includes: tiotropium, albuterol PRN, sertraline 100 mg (started 3 months ago), lisinopril 10 mg. Which medication most likely precipitated his cardiomyopathy?", "o": ["High-dose sertraline", "Tiotropium inhaler", "Recent course of azithromycin", "Over-the-counter ibuprofen"], "c": 3, "e": "This patient likely has NSAID-induced cardiomyopathy. Elderly patients often self-medicate with OTC NSAIDs, which can precipitate heart failure through sodium retention, blood pressure elevation, and direct myocardial effects.\n\nOption A (sertraline) is the TRAP - SSRIs are generally cardiac-safe, though high doses can rarely cause QT prolongation. Sertraline doesn't cause cardiomyopathy.\n\nOption B (tiotropium) can cause urinary retention and dry mouth but not cardiomyopathy.\n\nOption C (azithromycin) can cause QT prolongation and rare arrhythmias but not global cardiomyopathy.\n\nClinical Pearl: Always ask about OTC medications in elderly patients - they often don't consider these 'real medicines.' NSAIDs are on the Beers Criteria for multiple reasons: kidney injury, GI bleeding, heart failure exacerbation, and interaction with antihypertensives. In patients >75 or with CKD, even short NSAID courses can precipitate heart failure. The cardiomyopathy may be reversible with NSAID cessation.", "reason": "Explanation discusses OTC ibuprofen, not listed medication"}, {"idx": 3128, "ti": 12, "t": "Harrison", "q": "A 77-year-old woman with diabetes, mild cognitive impairment, and depression comes to clinic accompanied by her daughter who reports her mother has been complaining of constipation for 3 weeks. The patient confirms having bowel movements every 4-5 days with significant straining. Her medications include metformin 1000 mg BID, sertraline 100 mg daily (started 6 weeks ago), and calcium carbonate 600 mg BID. Recent labs: HbA1c 7.2%, Cr 1.1 mg/dL, TSH 3.2 mIU/L. Which medication adjustment would most likely improve her constipation?", "o": ["Discontinue sertraline and start mirtazapine 7.5 mg qHS", "Switch calcium carbonate to calcium citrate", "Reduce metformin to 500 mg BID", "Add polyethylene glycol 3350 17 g daily"], "c": 1, "e": "The correct answer is switching from calcium carbonate to calcium citrate. Calcium carbonate commonly causes constipation in elderly patients by binding phosphate in the gut and creating insoluble complexes. Calcium citrate has better bioavailability and causes less GI side effects including constipation.\n\nOption A (switching to mirtazapine) is the trap - while SSRIs can occasionally cause constipation, mirtazapine commonly causes sedation and weight gain in elderly patients and is on the Beers list for increased fall risk. Switching antidepressants after only 6 weeks is premature.\n\nOption C (reducing metformin) is incorrect as metformin typically causes diarrhea, not constipation, and her diabetes control is appropriate for her age.\n\nOption D (adding PEG) treats the symptom without addressing the likely medication cause, missing an opportunity to reduce pill burden.\n\nClinical Pearl: Calcium carbonate is a common overlooked cause of constipation in elderly patients. When calcium supplementation is needed, calcium citrate is preferred as it doesn't require stomach acid for absorption and causes fewer GI side effects.", "reason": "Explanation supports changing calcium form, not switching"}, {"idx": 3131, "ti": 12, "t": "Harrison", "q": "An 82-year-old man with compensated cirrhosis, atrial fibrillation on warfarin, and osteoarthritis is admitted with melena. His INR is 5.8. After vitamin K and fresh frozen plasma, his bleeding stops and INR normalizes to 2.3. On hospital day 3, he develops confusion and asterixis. He reports no bowel movement since admission. Home medications include warfarin, metoprolol 25 mg BID, and acetaminophen 650 mg QID. Hospital medications include pantoprazole 40 mg IV BID and morphine 2 mg IV q4h PRN (received 6 doses). What is the most likely cause of his encephalopathy?", "o": ["Opioid-induced constipation precipitating hepatic encephalopathy", "Warfarin-associated coagulopathy with micro-hemorrhages", "Acetaminophen toxicity in setting of cirrhosis", "Hospital-acquired hyponatremia"], "c": 0, "e": "The correct answer is opioid-induced constipation precipitating hepatic encephalopathy. Morphine causes constipation through reduced GI motility, and in cirrhotic patients, constipation leads to increased ammonia production and absorption, triggering hepatic encephalopathy with confusion and asterixis.\n\nOption B (warfarin micro-hemorrhages) is the trap - while his INR was elevated, it's now therapeutic, and warfarin doesn't typically cause encephalopathy with asterixis.\n\nOption C (acetaminophen toxicity) is unlikely at therapeutic doses (2.6 g/day, below the 3 g/day limit for cirrhotic patients), and acetaminophen toxicity presents with elevated transaminases, not asterixis.\n\nOption D (hyponatremia) can cause confusion but doesn't cause asterixis, which is pathognomonic for hepatic encephalopathy.\n\nClinical Pearl: In cirrhotic patients, always use opioids cautiously as they precipitate hepatic encephalopathy through constipation and direct CNS effects. If opioids are necessary, prophylactic lactulose should be intensified to ensure 2-3 bowel movements daily.", "reason": "Explanation describes morphine, answer states opioid-induced"}, {"idx": 3143, "ti": 16, "t": "Harrison", "q": "A 76-year-old man with mild cognitive impairment presents with 2 months of fever, weight loss, and severe leg pain with walking that improves with rest. Physical exam reveals absent dorsalis pedis pulses bilaterally and livedo reticularis. Labs: ESR 95, CRP 67, Cr 1.6, negative ANCA. Angiography shows multiple microaneurysms in mesenteric and renal arteries with segmental narrowing. He takes metoprolol and recently completed a prednisone taper for 'polymyalgia.' Which medication is contraindicated?", "o": ["Cyclophosphamide", "Azathioprine", "Methotrexate", "Tocilizumab"], "c": 3, "e": "This patient has polyarteritis nodosa (PAN) with classic angiographic findings. While cyclophosphamide or azathioprine with prednisone are standard treatment, tocilizumab is contraindicated due to increased risk of bowel perforation in PAN.\n\nOption D (tocilizumab) is the TRAP - it's FDA-approved for GCA, leading physicians to consider it for other vasculitides. However, IL-6 blockade in PAN increases intestinal perforation risk due to masked symptoms and impaired healing of ischemic bowel.\n\nOptions A, B, and C are all reasonable choices for PAN, with selection based on disease severity and patient factors.\n\nClinical Pearl: Not all vasculitides respond to the same biologics. Tocilizumab is contraindicated in PAN due to GI perforation risk. Always consider mesenteric involvement in PAN - abdominal pain out of proportion to exam warrants urgent imaging to rule out bowel ischemia.", "reason": "Explanation states tocilizumab is contraindicated, not correct"}, {"idx": 3145, "ti": 16, "t": "Harrison", "q": "A 78-year-old man with diabetes, CKD stage 3a (eGFR 45), and recent GCA diagnosis on prednisone 40mg daily presents with acute foot pain and swelling. Joint aspiration shows negatively birefringent crystals. His medications include metformin, lisinopril, and alendronate. Serum uric acid is 9.2. Which treatment for his acute gout attack requires dose adjustment?", "o": ["Colchicine 1.2mg then 0.6mg in 1 hour", "Prednisone increase to 60mg daily", "Indomethacin 50mg TID", "Intra-articular corticosteroid injection"], "c": 0, "e": "This patient has acute gout superimposed on chronic steroid use. Colchicine requires dose reduction with eGFR 45 - maximum 0.6mg once for acute attack, not the standard 1.2mg/0.6mg regimen.\n\nOption C (indomethacin) is the TRAP - NSAIDs are traditionally first-line for gout but are contraindicated with his CKD stage 3a and concurrent steroid use (increased GI and renal risk). Many physicians habitually reach for NSAIDs.\n\nOption B (increase prednisone) is reasonable given he's already on steroids; no adjustment needed.\n\nOption D (joint injection) needs no systemic dose adjustment.\n\nClinical Pearl: Colchicine dosing in elderly requires careful attention to renal function. With CrCl 30-60: maximum 0.6mg daily. With CrCl <30: avoid or use 0.3mg maximum. The traditional 'loading dose' regimen should never be used in elderly or CKD patients.", "reason": "Explanation says colchicine needs reduction, contradicts marked answer"}, {"idx": 3150, "ti": 16, "t": "Harrison", "q": "A 77-year-old woman with RA on adalimumab presents with 4 weeks of severe headache, scalp tenderness, and jaw claudication. ESR 112, CRP 89. You strongly suspect GCA but temporal artery biopsy capability won't be available for 5 days. She is terrified of high-dose steroids due to previous steroid psychosis. Which management approach is most appropriate?", "o": ["Start prednisone 60mg now, add steroid-sparing agent", "Use tocilizumab monotherapy", "Wait for biopsy given steroid concerns", "Start prednisone 15mg and titrate up"], "c": 0, "e": "Despite previous steroid psychosis, high-dose prednisone is mandatory for suspected GCA to prevent blindness. Adding a steroid-sparing agent (methotrexate or tocilizumab) allows faster taper and may reduce psychiatric effects.\n\nOption B (tocilizumab alone) is the TRAP - while tocilizumab is FDA-approved for GCA, monotherapy isn't recommended for initial treatment due to slower onset. Guidelines require concurrent steroids initially.\n\nOption C (wait for biopsy) risks irreversible blindness; unacceptable delay.\n\nOption D (low-dose steroids) is inadequate for GCA and provides false security.\n\nClinical Pearl: Previous steroid psychosis doesn't contraindicate steroids for sight-threatening conditions. Strategies include: prophylactic low-dose antipsychotic, early steroid-sparing agent, and close psychiatric monitoring. Tocilizumab allows 50% faster steroid taper in GCA. Document careful risk-benefit discussion.", "reason": "Explanation contradicts marked answer regarding steroid-sparing agent"}, {"idx": 3148, "ti": 16, "t": "Harrison", "q": "A 79-year-old woman with moderate Alzheimer's disease is brought by family for increased confusion over 2 weeks. She now needs help with bathing (new IADL decline). Medications: donepezil, sertraline, and lorazepam 0.5mg TID recently started for 'anxiety.' Physical exam is unremarkable. Labs normal except Na 128. Which intervention is most likely to improve her cognition?", "o": ["Discontinue lorazepam", "Fluid restriction to 1L daily", "Add memantine", "Switch to rivastigmine"], "c": 0, "e": "This patient has medication-induced cognitive impairment from lorazepam, a Beers Criteria medication. Benzodiazepines cause delirium, falls, and accelerated cognitive decline in dementia patients.\n\nOption B (fluid restriction) is the TRAP - while treating hyponatremia seems logical, the SIADH is likely medication-induced from sertraline + lorazepam. Fluid restriction without addressing the cause won't improve cognition and may worsen confusion from dehydration in elderly.\n\nOption C (add memantine) won't help acute medication-induced decline.\n\nOption D (switching cholinesterase inhibitors) doesn't address the benzodiazepine issue.\n\nClinical Pearl: Benzodiazepines are absolutely contraindicated in dementia (Beers Criteria) - they worsen cognition, increase falls 50%, and accelerate functional decline. For anxiety in dementia, use SSRIs, structured routines, or music therapy. If absolutely necessary, use ultra-low-dose quetiapine, not benzodiazepines.", "reason": "Explanation cut off, incomplete reasoning provided"}, {"idx": 3152, "ti": 16, "t": "Harrison", "q": "An 84-year-old frail woman (5 kg weight loss, exhaustion, slow walking speed) with new diagnosis of limited granulomatosis with polyangiitis (sino-nasal only, no renal/lung involvement) is started on methotrexate 15mg weekly. Two weeks later, she develops severe mucositis and pancytopenia. Which factor best explains her toxicity?", "o": ["Drug interaction with her medications", "Unrecognized renal insufficiency", "Folate deficiency", "Frailty syndrome physiology"], "c": 3, "e": "Frailty syndrome causes altered drug pharmacokinetics through sarcopenia, reduced protein binding, and impaired hepatic metabolism. Frail elderly require 25-50% dose reductions of many medications including methotrexate.\n\nOption B (renal insufficiency) is the TRAP - while methotrexate is renally cleared, the severe toxicity at standard dosing in a frail patient reflects the broader physiologic changes of frailty beyond just renal function.\n\nOption A (drug interactions) isn't mentioned in the stem.\n\nOption C (folate deficiency) might contribute but doesn't explain severe toxicity at standard doses.\n\nClinical Pearl: Frailty is an independent predictor of chemotherapy toxicity. Use geriatric assessment (gait speed, grip strength, weight loss) to identify frail patients who need dose reductions. Start at 50% standard dose for immunosuppressants in frail elderly, regardless of organ function. Consider alternative agents with better tolerance profiles.", "reason": "Explanation describes renal-based pharmacokinetics, not frailty physiology"}, {"idx": 3158, "ti": 20, "t": "Harrison", "q": "An 83-year-old woman with well-controlled epilepsy on carbamazepine 200mg BID for 10 years presents with fatigue and easy bruising. She also has AFib on warfarin and osteoarthritis. Labs: Hgb 9.2, MCV 102, platelets 89K, INR 5.2 (goal 2-3), Na 129. LFTs normal. Which mechanism best explains her presentation?", "o": ["Carbamazepine-induced aplastic anemia", "Drug interaction causing warfarin toxicity", "SIADH from carbamazepine", "Age-related bone marrow suppression"], "c": 1, "e": "Carbamazepine is a strong CYP3A4 inducer, but with aging, hepatic metabolism slows and drug interactions become unpredictable. Here, long-term enzyme induction is failing, causing increased warfarin effect (INR 5.2) and resulting thrombocytopenia and anemia from occult bleeding. The macrocytosis supports chronic blood loss.\n\nOption A (aplastic anemia) is the trap - while carbamazepine can cause this, it typically occurs early in treatment, not after 10 years. The elevated INR points to bleeding rather than marrow suppression.\n\nOption C (SIADH) explains the mild hyponatremia but not the hematologic findings. Carbamazepine commonly causes SIADH in elderly.\n\nOption D (age-related changes) doesn't explain the sudden change after stable therapy or the significantly elevated INR.\n\nClinical Pearl: Beers 2023 lists carbamazepine as potentially inappropriate due to SIADH risk and drug interactions. In elderly patients on chronic enzyme inducers, hepatic function decline can unmask dangerous drug interactions. Monitor INR closely when elderly patients on warfarin have any medication or health status changes.", "reason": "Explanation contradicts itself - CYP3A4 inducer decreases warfarin"}, {"idx": 3166, "ti": 20, "t": "Harrison", "q": "A 79-year-old man with epilepsy and moderate Alzheimer's arrives at clinic with his daughter. She reports finding multiple pill bottles of different AEDs at his home: half-empty levetiracetam, expired phenytoin, and gabapentin 'from a friend.' He's had two breakthrough seizures this month. His pills are in various containers without labels. What intervention most effectively addresses the root cause?", "o": ["Simplify to monotherapy with once-daily AED", "Nursing home placement for medication supervision", "Home health aide for medication administration", "Prosecute friend for sharing controlled substances"], "c": 2, "e": "Home health services for medication administration directly addresses the chaos while maintaining independence. Professional medication management ensures proper AED delivery without premature institutionalization. This respects autonomy while ensuring safety.\n\nOption A (simplifying regimen) is the trap - while helpful, simplification alone won't solve the organizational chaos and unsafe medication sharing when cognitive impairment affects judgment.\n\nOption B (nursing home) is premature and overly restrictive. Many elderly can remain home with appropriate support services.\n\nOption D (prosecution) - gabapentin isn't controlled in most states, and this punitive approach doesn't help the patient.\n\nClinical Pearl: Medication mismanagement in dementia requires systematic intervention. Assess: cognitive ability, social support, and home environment. Solutions include: home health, pill packaging services, family involvement, and removing old medications. Preserve independence when possible - nursing home placement should be last resort for medication issues alone.", "reason": "Explanation argues against simplifying regimen, not for aide"}, {"idx": 3173, "ti": 20, "t": "Harrison", "q": "An 85-year-old woman is admitted with new-onset AF and embolic stroke. She lives independently but has noticed difficulty balancing her checkbook lately. Echo shows no valvular disease. Creatinine is 1.4 mg/dL, weight 58 kg, and CrCl 28 mL/min. She's discharged on atorvastatin and needs anticoagulation. Which regimen is most appropriate?", "o": ["Apixaban 2.5 mg BID", "Apixaban 5 mg BID", "Warfarin with INR target 2-3", "Rivaroxaban 15 mg daily"], "c": 0, "e": "The correct answer is apixaban 2.5 mg BID. This patient meets criteria for reduced-dose apixaban: she has 2 of 3 criteria (age ≥80, weight ≤60 kg, and creatinine ≥1.5 mg/dL). With CrCl 28 mL/min and weight 58 kg, she needs dose reduction.\n\nOption B (apixaban 5 mg BID) is the TRAP - many physicians remember that apixaban doesn't need renal adjustment until CrCl <25, but forget the additional age and weight criteria for dose reduction. This overdosing error in elderly patients significantly increases bleeding risk.\n\nOption C (warfarin) is less desirable due to higher intracranial hemorrhage risk in elderly patients, need for monitoring, and drug interactions, though it remains an option.\n\nOption D (rivaroxaban 15 mg) requires different dosing: should be 20 mg daily with CrCl >50, or 15 mg daily with CrCl 15-50, but timing with food is crucial and often missed in elderly patients.\n\nClinical Pearl: The subtle cognitive change (difficulty with checkbook = IADL deficit) suggests early dementia, which increases both stroke and bleeding risk. In the CHA2DS2-VASc era, this patient scores ≥4 (age, female, stroke), mandating anticoagulation. Always use Cockcroft-Gault (not eGFR) for drug dosing in elderly patients, as it accounts for age-related muscle loss.", "reason": "Creatinine 1.4 doesn't meet ≥1.5 criterion stated"}, {"idx": 3181, "ti": 20, "t": "Harrison", "q": "A 79-year-old woman with previous stroke on dual antiplatelet therapy presents with new-onset confusion and word-finding difficulty. She lives independently but her neighbor called EMS after finding her disoriented. Exam shows mild aphasia, no motor deficits. CT shows no acute changes, old right lacunar infarct. Labs: Na+ 128, glucose 110, Cr 1.1. She takes aspirin, clopidogrel, atorvastatin, and recently started hydrochlorothiazide. What's the most likely diagnosis?", "o": ["Acute stroke despite dual antiplatelet therapy", "Hyponatremic encephalopathy", "Progression of vascular dementia", "Clopidogrel-induced TTP"], "c": 1, "e": "The correct answer is hyponatremic encephalopathy. The sodium of 128 with recent thiazide initiation and acute confusion strongly suggests medication-induced SIADH. Thiazides are a major cause of hyponatremia in elderly patients, especially women.\n\nOption A is the TRAP - with aphasia and confusion, stroke seems obvious, but the negative CT and lack of motor findings make acute stroke less likely. Many physicians anchor on stroke history and miss metabolic causes of altered mental status.\n\nOption C (vascular dementia progression) would be gradual, not acute onset with neighbor noticing sudden change. The focal aphasia also suggests an acute process.\n\nOption D (TTP) is rare with clopidogrel and would show thrombocytopenia and hemolytic anemia, not isolated hyponatremia.\n\nClinical Pearl: Elderly women are particularly susceptible to thiazide-induced hyponatremia due to increased ADH sensitivity and decreased renal diluting capacity. Symptoms can mimic stroke, especially in patients with prior cerebrovascular disease who may have less cognitive reserve. Check sodium within 1-2 weeks of starting thiazides in elderly patients. The aphasia may represent focal seizure activity from hyponatremia rather than structural lesion.", "reason": "Explanation mentions thiazide initiation, not in question"}, {"idx": 3199, "ti": 6, "t": "Exam", "q": "מטופלת בת 85 עם ירידה קוגניטיבית. בבדיקה MMSE = 24. מהי המשמעות?", "o": ["Mild cognitive impairment — ציון בטווח borderline (cutoff <24 ← abnormal)", "Dementia חמורה", "Normal cognition", "Delirium"], "c": 0, "e": "MMSE: max 30, cutoff <24 = cognitive impairment (רגישות ~80%, ספציפיות ~80%). 24 = borderline. פירוט: <20 = moderate, <10 = severe. MMSE מוגבל: ceiling effect, education bias, לא רגיש ל-MCI ולתפקודי executive. MoCA עדיף ל-screening (cutoff <26). בדמנציה: יש לבדוק תפקוד ADL/IADL.", "reason": "Explanation states 24=borderline, contradicts MCI diagnosis"}, {"idx": 3222, "ti": 0, "t": "2021-Jun", "q": "בן82 ללא מחלות רקע ידועות וללא טיפול תרופתי קבוע .פיתח פרפור פרוזדורים לאחרונה. ת הו חל טיפול תרופתי בנוגדי קרישה ובהמשך ב- AMIDARONE (PROCOR) . בבדיקות מעבדה :לאחר שבועיים מדד ויחידות החולה ערכים תקינים TSH mu/L 7.8 0.4-4.7 FT4 ng/dL 2.3 0.7-1.8 TT3 ng/dL 55 60-180 כיצד יש להתערב בעקבות הפתולוגיה בבדיקות המעבדה?", "o": ["מדובר בת ירו .טוקסיקוזיס יש להוסיף לטיפול תכשיר חוסם ביטא", "מדובר בתופעת לואי שכיחה . במצב המתואר מומלץ מעקב בלבד", "תמונה של תירואידיטיס. מומלץ לתת טיפול ב- Methimazole", "מדובר בתופעת לואי נדירה ומסכנת חיים, יש להפסיק טיפול בAmiodarone ולתת טיפול ב Elthroxin"], "c": 1, "e": "## התשובה הנכונה: ב — מדובר בתופעת לואי שכיחה. במצב המתואר מומלץ מעקב בלבד\n\n**למה ב נכונה:**\nהתמונה המעבדתית מציגה TSH מוגבר עם FT4 מוגבר ו-T3 נמוך, המתאימה ל-Amiodarone-induced hypothyroxinemia או euthyroid hypothyroxinemia. מדובר בתופעה שכיחה המופיעה ב-20-25% מהמטופלים ב-Amiodarone, הנגרמת מעיכוב של המרת T4 ל-T3 על ידי התרופה. כאשר המטופל נשאר אותירואידי קלינית (ללא תסמינים), המלצה היא מעקב תקופתי בלבד ללא שינוי טיפולי.\n\n**למה האפשרויות האחרות שגויות:**\n- **א.** תירוטוקסיקוזיס אמורה להציג TSH נמוך עם FT4 ו-T3 גבוהים - כאן TSH גבוה ו-T3 נמוך, לכן לא מדובר בהיפרתירואידיזם.\n- **ג.** Methimazole מיועד להיפרתירואידיזם ולא למצב המתואר כאן; תירואידיטיס הנגרמת מ-Amiodarone מתבטאת באופן שונה עם תסמינים קליניים.\n- **ד.** אין צורך להפסיק את ה-Amiodarone או לתת Levothyroxine במצב של אותירואידיזם קליני; Levothyroxine יינתן רק אם יתפתח היפותירואידיזם אמיתי עם תסמינים או TSH גבוה מאוד עם FT4 נמוך.\n\n**נקודת המפתח לקשיש:**\nבקשישים המטופלים ב-Amiodarone חיוני לבצע מעקב תפקודי תירואיד כל 3-6 חודשים, אך יש להימנע מהתערבות טיפולית מיותרת במצבים של שינויים מעבדתיים ללא ביטוי קליני, במיוחד כאשר התועלת מהתרופה (שליטה בפרפור פרוזדורים) עולה על הסיכון.", "reason": "Explanation describes euthyroid state, answer implies pathology"}, {"idx": 3223, "ti": 0, "t": "2021-Jun", "q": "בן84 , ,עצמאי ושמור קוגניטיבית .ברקע סכרת, יתר לחץ דם מתלונן על חולשה והרגשה כללית ל א טובה מזה כחודשיים . מדווח על .כאבים בכתפיים, יותר בשעות הבוקר בבדיקות מעבדה- HB 10.1 עםMCV 65 ,, ללא לויקוציטוזיס ,כימיה בגדר הנורמה רמתCRP - 65 . ,ראומטואיד פקטור חיוביANA . שלילי ב- EMG סימנים אופייניים שלinflammatory myopathy . הועלה חשד ל- לPolymyalgia Rheumatica ( PMR .) איזה ממצא תורם לאבחון שלPMR ?בחולה זה", "o": ["rheumatoid factor חיובי", "ANA שלילי", "ב- EMG סימנים אופייניים שלinflammatory myopathy", "אנמיה מיקרוציטית"], "c": 1, "e": "## התשובה הנכונה: ב — ANA שלילי\n\n**למה ב נכונה:**\nPolymyalgia Rheumatica (PMR) היא מחלה דלקתית שכיחה בקשישים מעל גיל 50, המאופיינת בכאבי שרירים בכתפיים ובאגן עם נוקשות בוקר. האבחנה היא קלינית ומתבססת על היעדר ממצאים סרולוגיים אוטואימוניים - ANA שלילי ו-RF שלילי (כאשר RF עשוי להיות חיובי בשיעור נמוך בקשישים בריאים). העדר נוגדנים אוטואימוניים עוזר לשלול מחלות אחרות כמו SLE או דלקת מפרקים שגרונית.\n\n**למה האפשרויות האחרות שגויות:**\n- **א.** Rheumatoid factor חיובי אינו תומך באבחנה של PMR - להיפך, הוא מעלה חשד למחלות אחרות כמו דלקת מפרקים שגרונית. ב-PMR אמיתית RF צריך להיות שלילי.\n- **ג.** ב-PMR אין מעורבות של שריר עצמו - המחלה היא דלקתית של המפרקים והסינוביום, לכן EMG תקין. ממצאים של inflammatory myopathy ב-EMG מעידים על מחלה אחרת כמו polymyositis.\n- **ד.** אנמיה מיקרוציטית אינה קשורה ל-PMR. אנמיה של מחלה כרונית (normocytic או mild microcytic) עשויה להופיע, אך אנמיה מיקרוציטית מובהקת עם MCV 65 מעידה על חסר ברזל שצריך בירור נפרד (מערכת עיכול?).\n\n**נקודת המפתח לקשיש:**\nב-PMR אצל קשישים יש לזכור את הטריאדה הקלאסית: גיל מעל 50, כאבי כתפיים/אגן עם נוקשות בוקר, ESR/CRP גבוהים, והעדר סמנים סרולוגיים - התגובה הדרמטית לסטרואידים במינון נמוך (Prednisone 12.5-25 מ\"ג) מאשרת את האבחנה.", "reason": "Explanation supports RF negative, not ANA negative"}, {"idx": 3244, "ti": 0, "t": "2023-Sep", "q": "בן76 , מאושפז במחלקת שיקום לאחר ניתוח החלפת מפרק הירך. משקלו75 .ק\"ג ברקע- .יתר לחץ דם ידוע, שיוחס להיצרות דו צדדית של עורקי הכליה מזה שבוע מטופל ב- VANCOMYCIN פומי בגין אבחנתPSEUDOMEMBRANOUS COLITIS .. הפסיק לשלשל מזה יומיים מטופל ב- AMIKACIN במינון500 \"מ .ג ליום עקב זיהום בדרכי השתן עקב כאבים עזים באזור הניתוח טופל ב- IBUPROFEN ביום שלפני לקיחת בדיקות .המעבדה אוכל ושותה. מקבל עירוי נוזלים1000 .סמ\"ק ליממה :בבדיקות דם שגרתיות נמצאה החמרה בתפקודי כליה מדד ויחידות בדיקה בקבלתו למחלקה בדיקה לאחר שבוע ער כים תקינים CREATININE mg/dL 0.7 1.5 0.7-1.3 BUN mg/dL 21 28 5-25 ?איזה מהגורמים הבאים חשוד ביותר להחמרת התפקוד הכלייתי", "o": ["VANCOMYCIN", "AMIKACIN", "IBUPROFEN", "דהידרציה בחינת שלב א' גריאטריה התמחות בסיס13.06.23"], "c": 0, "e": "## התשובה הנכונה: ב — AMIKACIN\n\n**למה ב נכונה:**\nAmikacin הוא אמינוגליקוזיד עם נפרוטוקסיסיות מוכרת, במיוחד בקשישים. המינון של 500 מ\"ג ליום בחולה בן 76 עם היצרות דו-צדדית של עורקי הכליה מהווה סיכון גבוה במיוחד. אמינוגליקוזידים מצטברים ברקמת הכליה וגורמים לנזק טובולרי חריף, והסיכון גובר כאשר יש פגיעה כלייתית רקע או זרימה כלייתית מופחתת. בקשישים יש להתאים מינון לפי eGFR ולעקוב אחר רמות שיא ושפל.\n\n**למה האפשרויות האחרות שגויות:**\n- **א. VANCOMYCIN** — Vancomycin פומי (לא תוך ורידי) אינו נספג באופן מערכתי ולכן אינו גורם לנפרוטוקסיסיות. הוא פועל מקומית במעי לטיפול ב-Pseudomembranous colitis.\n- **ג. IBUPROFEN** — למרות ש-NSAIDs יכולים לגרום לפגיעה כלייתית (ירידה בזרימה גלומרולרית), השימוש היה חד-פעמי יום לפני הבדיקה, והסבירות נמוכה יותר מאשר חשיפה מתמשכת לאמינוגליקוזיד במשך שבוע.\n- **ד. דהידרציה** — החולה אוכל ושותה ומקבל 1000 סמ\"ק נוזלים ליממה, והיחס BUN/Creatinine (28/1.5=18.7) אינו מעיד על דהידרציה משמעותית (בדהידרציה מובהקת היחס בדרך כלל >20).\n\n**נקודת המפתח לקשיש:**\nאמינוגליקוזידים ב-Beers Criteria מצריכים זהירות רבה בקשישים, במיוחד עם מחלת כליות רקע או ירידה ב-eGFR, והמינון חייב להיות מותאם לתפקוד כלייתי עם מעקב אחר רמות תרופה בדם.", "reason": "Explanation supports AMIKACIN, not marked VANCOMYCIN"}, {"idx": 3257, "ti": 0, "t": "Hazzard-suppl", "q": "מה מאפיין הפרעות שינה בפיברומיילגיה?", "o": ["עליה במשך השינה הכללי", "ירידה במשך שנתREM", "EEG יראה ירידה בכמות של גלי אלפא", "הירדמות מהירה ויקיצה איטית"], "c": 1, "e": "## התשובה הנכונה: ג — EEG יראה ירידה בכמות של גלי אלפא\n\n**למה ג נכונה:**\nהמאפיין האלקטרופיזיולוגי המובהק של הפרעות השינה בפיברומיאלגיה הוא חדירת גלי אלפא (alpha intrusion) לשלבי השינה העמוקה, כלומר עלייה בפעילות אלפא במקום שבו היא לא אמורה להופיע. זה גורם לשינה לא מרעננת (non-restorative sleep) ומחמיר את תסמיני הכאב והעייפות הכרונית האופייניים למצב.\n\n**למה האפשרויות האחרות שגויות:**\n- **א.** משך השינה הכללי לרוב תקין או אפילו מופחת בפיברומיאלגיה, והבעיה העיקרית היא באיכות השינה ולא בכמות.\n- **ב.** אין ירידה משמעותית במשך שנת REM בפיברומיאלגיה, השינוי העיקרי הוא בשינה העמוקה (NREM stages 3-4).\n- **ד.** מטופלים עם פיברומיאלגיה בדרך כלל סובלים מקושי בהירדמות ויקיצות תכופות במהלך הלילה, לא מהירדמות מהירה.\n\n**נקודת המפתח לקשיש:**\nבקשישים עם פיברומיאלגיה, השילוב של הפרעות שינה ארכיטקטוניות עם השינויים הפיזיולוגיים הקשורים בגיל מחמיר את תחושת העייפות והכאב הכרוני, ודורש טיפול משולב הכולל היגיינת שינה, פעילות גופנית מותאמת, וטיפול תרופתי זהיר במינונים נמוכים.", "reason": "Explanation says alpha waves increase, not REM decrease"}, {"idx": 3265, "ti": 24, "t": "2021-Jun", "q": "בן75 , סיעודי וסובל מדמנציה אושפז ,עקב התדרדרות במצב הכללי ירידה במצב ההכרה וחום. סימנים חיוניים- דופק115 , לחץ דם 90/40 , סטורציה75% באוויר חדר . ב צילום חזה – הצללה בריאה ימנית . :במעבדה מדד ויחידות החולה ערכים תקינים Na mmol/L 156 135-146 K mmol/L 4.8 3.5-5.3 CREATININE mg/dL 2.1 0.7-1.3 BUN mg/dL 70 5-25 WBC 10e3/µL 21,000 4.0-11.0 HgB g/dL 14.2 13.2-17 גבר Plt 10e3/µL 354 150-450 CRP mg/L 200 <0.03-5 Ph 7.22 7.34-7.45 PO2 mmHg 50 70-100 PCO2 mmHg 58 35-46 HCO3 mmol/L 22 21-26 סוכם שמדובר בדלקת ריאות- הוחל.טיפול אנטיביוטי רחב טווח, נוזלים, חובר למסכת חמצן מה מבין הנתונים מהווה את ה מרכיב המשמעותי ביותר בהערכת הפרוגנוזה לפיSCAP?", "o": ["בלבול", "גיל מעל70", "PH<7.3", "מדדי דלקת מוגברים 'בחינת שלב א- התמחות על גריאטריה 21.12.21"], "c": 2, "e": "## התשובה הנכונה: ג — PH<7.3\n\n**למה ג נכונה:**\nבסקורים CURB-65 ו-PSI (Pneumonia Severity Index) להערכת חומרת דלקת ריאות נרכשת בקהילה, אחידוזה עם pH function render(){
  const s = stats();
  document.getElementById('nKeep').textContent = s.k;
  document.getElementById('nDismiss').textContent = s.d;
  document.getElementById('nSkip').textContent = s.s;
  document.getElementById('nTodo').textContent = s.t;
  document.getElementById('total').textContent = ITEMS.length;
  document.getElementById('bar').style.width = (100*(s.k+s.d)/ITEMS.length)+'%';
  document.querySelector('.export').textContent = '⬇️ Export decisions ('+(s.k+s.d+s.s)+') — paste into apply script';
  
  const list = filtered();
  document.getElementById('pos').textContent = list.length ? (pos+1) : 0;
  const main = document.getElementById('main');
  
  if(!list.length){
    main.innerHTML = '<div class="done">✓ Nothing in this filter</div>';
    return;
  }
  if(pos >= list.length) pos = list.length-1;
  if(pos < 0) pos = 0;
  
  const {item,i:origIdx} = list[pos];
  const cur = state[item.idx];
  const opts = item.o.map((o,i)=>`<div class="opt${i===item.c?' correct':''}">${i===item.c?'✓ ':''}${esc(o)}</div>`).join('');
  
  main.innerHTML = `
    <div class="card" dir="rtl">
      <div class="meta">
        <span>idx=${item.idx} · ti=${item.ti} · ${item.t}</span>
        <span>${cur?'Status: <b style="color:'+(cur==='keep'?'#dc2626':cur==='dismiss'?'#10b981':'#94a3b8')+'">'+cur+'</b>':''}</span>
      </div>
      <div class="reason">⚠️ AI reason: ${esc(item.reason)}</div>
      <div class="q">${esc(item.q)}</div>
      <div class="opts">${opts}</div>
      <div class="exp"><b>הסבר:</b><br>${esc(item.e)}</div>
      <div class="actions">
        <button class="btn btn-dismiss" onclick="decide('dismiss')">✓ Dismiss<br><small style="font-weight:400;font-size:9px">false positive</small></button>
        <button class="btn btn-keep" onclick="decide('keep')">⚠️ Keep<br><small style="font-weight:400;font-size:9px">real bug</small></button>
        <button class="btn btn-skip" onclick="decide('skip')">↩ Skip<br><small style="font-weight:400;font-size:9px">later</small></button>
      </div>
      <div class="nav">
        <button onclick="move(-1)">← Prev</button>
        <button class="jump" onclick="const n=prompt('Jump to item number:');if(n){pos=Math.max(0,Math.min(ITEMS.length-1,+n-1));render();}">Jump</button>
        <button onclick="move(1)">Next →</button>
      </div>
    </div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function move(d){
  const list = filtered();
  pos = Math.max(0, Math.min(list.length-1, pos+d));
  render();
}
function decide(v){
  const list = filtered();
  if(!list.length) return;
  const {item} = list[pos];
  if(v==='skip') state[item.idx] = 'skip';
  else state[item.idx] = v;
  localStorage.setItem(STOR, JSON.stringify(state));
  // auto-advance in todo filter, otherwise just rerender
  if(filter==='todo'){
    // don't increment pos — list shrinks, next item slides in
    render();
  } else {
    move(1);
  }
}
function exportDecisions(){
  const out = {app:APP, decisions:state, ts:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'eflag_decisions_'+APP+'_'+Date.now()+'.json';
  a.click();
}

document.querySelectorAll('.filter-bar button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.filter-bar button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    filter = b.dataset.f;
    pos = 0;
    render();
  };
});

// keyboard shortcuts
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft') move(-1);
  else if(e.key==='ArrowRight') move(1);
  else if(e.key==='d') decide('dismiss');
  else if(e.key==='k') decide('keep');
  else if(e.key==='s') decide('skip');
});

// click filter-bar "todo" by default
document.querySelectorAll('.filter-bar button').forEach(x=>x.classList.remove('on'));
document.querySelector('[data-f="todo"]').classList.add('on');
filter = 'todo';
render();
</script>
</body>
</html>
