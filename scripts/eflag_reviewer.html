וזקיקי השיער. עיכוב האנזים מפחית את רמות ה-DHT ובכך מאט התקרחות אנדרוגנית (androgenetic alopecia) ומכווץ את הערמונית בהיפרפלזיה שפירה (BPH). זהו העיקרון המתואר ב-Harrison's Internal Medicine בפרקים העוסקים בהפרעות ערמונית ואנדרוגנים.\n\n**תשובה A** מנוסחת בצורה הפוכה — היא מתארת המרה של DHT לטסטוסטרון, תהליך שאינו מתרחש פיזיולוגית. ההמרה היא חד-כיוונית (טסטוסטרון → DHT). ייתכן שמדובר בשגיאת ניסוח בשאלה, והכוונה הייתה לחסימת ההמרה של טסטוסטרון ל-DHT.\n\n**תשובה C** מתייחסת למעכבי PDE5 כמו Sildenafil (ויאגרה), המשמשים לטיפול בהפרעות זיקפה — מנגנון שונה לחלוטין.\n\n**תשובה D** אינה מתארת מסלול ביוכימי מוכר; פוספורילציה של אסטרדיול אינה מנגנון תרופתי ידוע.\n\n**פנינה קלינית:** Finasteride מוריד DHT בכ-70%, ותופעות לוואי כוללות ירידה בליבידו והפרעות בזיקפה — חשוב ליידע מטופלים קשישים.", "reason": "Explanation says answer A is backwards/incorrect"}, {"idx": 325, "ti": 20, "t": "2024-May", "q": "בן65, יד ימין דומיננטית, מאושפז בשיקום נוירולוגי לאחרCVA איסכמי ב- MCA השמאלי הוא מגיע עם המיפרזיס מימין וקשיים בשפה. בבדיקה נראה שמבין את מה שנאמר לו וממלא הוראות פשוטות, אך הוא לא מצליח להביע את עצמו באופן מילולי וממציא מילים ( neologisms). הוא מתקשה לחזור אחרי משפטים מהו סוג האפאזיה ממנה סובל?", "o": ["Wernicke's aphasia", "Broca's aphasia", "Conduction aphasia", "Global aphasia"], "c": 1, "e": "הבה נבחן את התשובה הנכונה ואת השגויות:\n\n**למעשה, התיאור הקליני כאן אינו מתאים באופן קלאסי לאפזיה גלובלית (D).** התמונה הקלינית המתוארת — הבנה שמורה יחסית, הפקה לקויה עם ניאולוגיזמים, וקושי בחזרה — מתאימה יותר ל**אפזיה של ברוקה (B)** או **אפזיה של הולכה (C)**. עם זאת, אם התשובה הרשמית היא D, ייתכן שהשאלה מדגישה שהשילוב של פגיעה נרחבת ב-MCA שמאלי עם המיפרזיס ימני מעיד על נזק נרחב הכולל את כל אזורי השפה.\n\n**אפזיה גלובלית (D)** מאופיינת בפגיעה חמורה הן בהבנה והן בהפקה, ומופיעה באוטם נרחב ב-MCA. הבעיה: החולה כאן *מבין* ומבצע הוראות פשוטות.\n\n**Wernicke (A)** — הבנה לקויה עם דיבור שוטף אך חסר משמעות. כאן ההבנה שמורה, לכן לא מתאים.\n\n**Broca (B)** — הפקה לקויה עם הבנה שמורה, אך ללא ניאולוגיזמ��ם אופייניים (יותר דיבור מאומץ ולא שוטף).\n\n**Conduction (C)** — הבנה והפקה שמורות יחסית עם קושי בולט בחזרה ופרפזיות פונמיות.\n\n**פרל קליני:** באוטם נרחב ב-MCA, גם אם בתחילה נראית הבנה חלקית, יש לעקוב אחר התפתחות התמונה — לעיתים הבנה \"שמורה\" בשלב חריף היא שטחית בלבד, ומדובר באפזיה גלובלית.", "reason": "Explanation says Broca's or conduction fits better"}, {"idx": 335, "ti": 35, "t": "2024-May", "q": "בן77, נושא טרכאוסטום, לאחר גמילה מהנשמה ממושכת, ללא צורך בסקשיין. עבר שיקום וכעת זקוק לעזרה ברחצה ובלבוש, הולך עם הליכון בעזרת מטפל מספר צעדים, אינו שולט על סוגר השתן. איזו מסגרת מתאימה להמשך טיפול בו?", "o": ["מחלקה למונשמים כרוניים", "מחלקה תת אקוטית", "מחלקה לסיעוד מורכב", "מחלקה סיעודית"], "c": 2, "e": "**מחלקה תת-אקוטית (תשובה B)** היא התשובה הנכונה מכיוון שהמטופל נגמל בהצלחה מהנשמה, אינו זקוק לסקשיין, ועבר תהליך שיקומי אך עדיין לא מיצה את פוטנציאל השיקום שלו. הוא מציג תלות חלקית ב-ADL (רחצה, לבוש), ניידות מוגבלת אך קיימת (הליכה עם הליכון ומטפל), ואי-שליטה על סוגר — מצב המצדיק המשך שיקום ופיקוח רפואי ברמה תת-אקוטית. מסגרת זו מספקת שיקום אינטנסיבי יחסית עם פיקוח רפואי, מתאימה למטופלים שאינם זקוקים עוד לאשפוז חד (acute) אך עדיין בעלי פוטנציאל שיפור תפקודי.\n\n**תשובה A** (מונשמים כרוניים) שגויה — המטופל נגמל מההנשמה ואינו תלוי במכשיר הנשמה; הטרכאוסטום כשלעצמו אינו מצדיק מחלקה זו.\n\n**תשובה C** (סיעוד מורכב) מיועדת לחולים עם צרכים רפואיים מורכבים מתמשכים (כגון תלות בהנשמה, פצעים מורכבים, עירויים), ואינה מתאימה למי שפוטנציאל השיקום שלו טרם מוצה.\n\n**תשובה D** (מחלקה סיעודית) מיועדת למטופלים ללא פוטנציאל שיקומי משמעותי, במצב תפקודי יציב ותלוי — מוקדם מדי לשלוח אותו לסיעוד.\n\n**פנינה קלינית:** ההחלטה על מסגרת ההמשך נקבעת לפי שלושה צירים — רמת המורכבות הרפואית, פוטנציאל השיקום, ומידת התלות", "reason": "Explanation supports sub-acute, not complex nursing"}, {"idx": 329, "ti": 12, "t": "2024-May", "q": "איזה מהתהליכים הפתופיזיולוגיים הבאים קשור בהופעת עצירות בגיל המבוגר ?", "o": ["ירידה בקישור האנדורפינים בפלסמה לקולטנים במעי", "עליה בשקיעת קולגן במעי הגס", "עליה בפעילות העצבית המעכבת לשרירים הצירקולריים במעי", "עליה בפעילות הפלקסוס המיינטרי"], "c": 1, "e": "התשובה הנכונה היא C. עם הזדקנות מערכת העיכול חלים שינויים נוירו-מוסקולריים במעי הגס. אחד המנגנונים המרכזיים הוא עלייה בפעילות העצבית המעכבת (inhibitory innervation) לשרירים הצירקולריים של המעי, מה שמוביל להפחתת הפריסטלטיקה והאטת מעבר התוכן במעי הגס. שינוי זה תורם ישירות להתפתחות עצירות בגיל המבוגר, כפי שמתואר בספרות הגריאטרית (Hazzard's Geriatric Medicine, פרקים העוסקים בשינויי מערכת העיכול עם הגיל).\n\nתשובה A שגויה – אנדורפינים אכן משפיעים על תנועתיות המעי דרך קולטני אופיואידים, אך המנגנון המתואר (ירידה בקישור) דווקא היה מפחית את ההשפעה המעכבת של האופיואידים ולכן לא היה גורם לעצירות. תשובה B שגויה – אמנם יש שינויים מבניים במעי עם הגיל, אך שקיעת קולגן במעי הגס אינה המנגנון המרכזי המוכר לעצירות הקשורה בגיל. תשובה D שגויה – עלייה בפעילות הפלקסוס המיינטרי הייתה דווקא מגבירה פריסטלטיקה ומקלה על מעבר תוכן, ולא גורמת לעצירות. בפועל, עם הגיל יש דווקא ירידה במספר הנוירונים בפלקסוס המיינטרי.\n\n**פנינה קלינית:** עצירות בקשישים היא רב-גורמית – מעבר לשינויים פיזיולוגיים, יש לזכור תרופות (אופיואידים, אנטיכולינרגיים), חוסר תנועה, צריכת נוזלים מופחתת ומחלות נלוות.", "reason": "Explanation describes neurological changes, not collagen deposition"}, {"idx": 339, "ti": 5, "t": "2024-May", "q": "למי מהחולים הבאים יש להתחיל טיפול תרופתי באנטי-פסיכוטיים באשפוז?", "o": ["בת 79 עם דליריום היפואקטיבי שממתינה לשיקום, כרגע שיתוף פעולה לקוי על רקע קושי במילוי הוראות. היועץ השיקומי הודיע כי המטופלת לא תעבור למחלקת שיקום עד שהדליריום ישתפר.", "בת 82 עםUTI, שבלילות ממלמלת ומדברת. שכניה מתלוננים שקשה להם לישון עמה", "בן 91 עם שבר מורכב בירך. בלילות מנסה לצאת מהמיטה ולחזור הביתה. הוא צועק על המטפלת הצמודה שלו בלילות שהיא מחזיקה אותו בכלא על מנת להרעיל אותו ותולש מעצמו ציוד רפואי.", "בן 88 עם דמנציה קלה ברקע, במחלקת כוויות לאחר שפך על עצמו בטעות סיר מרק רותח. רוב הזמן משתף פעולה עם הצוות אך בכל פעם שהצוות בא להחליף לו חבישות צורח \\\"לא, לא, לא\\\" משתולל ומרביץ להם."], "c": 2, "e": "**תשובה נכונה: A** – אין להתחיל טיפול אנטי-פסיכוטי באף אחד מהמקרים הללו, אך השאלה בוחנת את הזיהוי של המקרה שבו הלחץ להתחיל טיפול תרופתי הוא הגדול ביותר אך אינו מוצדק. למעשה, בחינה מחודשת מעלה שהתשובה הנכונה היא C.\n\n**עדכון:** התשובה הנכונה לפי המפתח היא **A**, אך יש להבין מדוע:\n\nבדליריום היפואקטיבי, אין הצדקה לטיפול באנטי-פסיכוטיים. ההנחיות (Hazzard's, פרק דליריום) מדגישות שאנטי-פסיכוטיים מיועדים רק כאשר יש **סכנה מיידית לחולה או לסביבה** – אגיטציה קשה, אלימות, או תסמינים פסיכוטיים מסכנים. דליריום היפואקטיבי אינו מהווה אינדיקציה, גם אם שיתוף הפעולה לקוי. הלחץ המערכתי (דרישת השיקום) אינו הצדקה קלינית.\n\n**B** – מלמול לילי אינו מצדיק אנטי-פסיכוטיים; יש לטפל ב-UTI ולשקול התערבויות לא-תרופתיות.\n\n**C** – כאן יש אגיטציה, פסיכוזה (מחשבות רדיפה), תלישת ציוד רפואי וסיכון לנפילה – זו דווקא אינדיקציה אפשרית לאנטי-פסיכוטיים במינון נמוך לטווח קצר.\n\n**D** – ההתנהגות מוגבלת להחלפת חבישות (כאב!) – יש לטפל בכאב ובהרגעה מקדימה לפני הפרוצדורה, לא באנטי-פסיכוטיים.\n\n**פנינה קלינית:** אנטי-פסיכוטיים בד", "reason": "Explanation contradicts itself on correct answer"}, {"idx": 337, "ti": 18, "t": "2024-May", "q": "מה נכון לגבי הטיפול ב- Hydralazine באי ספיקת לב", "o": ["מומלץ למטופלים שלא יכולים לסבול טיפול בחסמי ACE", "מעלה תמותה", "ניתן פעם ביום", "קיימת קונטראינדיקציה לשילוב עם ניטרטים"], "c": 0, "e": "The correct answer is **A** — מומלץ למטופלים שלא יכולים לסבול טיפול בחסמי ACE.\n\nHowever, the question states the correct answer is **C**. Let me address this critically:\n\n**Hydralazine** הוא מרחיב כלי דם ישיר הפועל על השריר החלק העורקי. בהקשר של אי-ספיקת לב, השילוב של hydralazine עם isosorbide dinitrate (HYD-ISDN) הוכח במחקרי V-HeFT ו-A-HeFT כמפחית תמותה, במיוחד בחולים אפרו-אמריקאים. על פי ההנחיות (Harrison's Ch. 252, Hazzard's), שילוב זה מומלץ במטופלים שאינם סובלים ACEi/ARB (בגלל אי-ספיקת כליות, היפרקלמיה, אנגיואדמה), מה שהופך את **תשובה A לנכונה**.\n\n**תשובה B** שגויה — hydralazine עם ניטרטים דווקא **מפחית** תמותה.\n\n**תשובה C** שגויה — hydralazine ניתן **שלוש פעמים ביום** (t.i.d) בשל זמן מחצית חיים קצר (2-4 שעות), ולא פעם ביום.\n\n**תשובה D** שגויה — אין קונטראינדיקציה לשילוב עם ניטרטים; להיפך, זהו השילוב המומלץ והמוכח.\n\n**פנינה קלינית:** השילוב hydralazine + ISDN הוא חלופה מבוססת ראיות ל-ACEi/ARB באי-ספיקת לב, והתשובה הנכונה צריכה להיות **A**.", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 341, "ti": 38, "t": "2024-May", "q": "מבין המצבים הבאים, מה מתאר נכונה קשר בין שינויפיזיולוגי בזקנה והשפעתו במהלך סביב ניתוח?", "o": ["ירידה בנוקשות בית החזה ועליה בסיכון לכשל נשימתי", "ירידה במספר הנפרונים וירידה בסיכון לצבירת נוזלים", "ירידה בזרימת הדם לדרמיס וירידה ביכולת ריפוי פצע", "ירידה בזרימת הדם לכבד וזמן מחצית חיים קצר של התרופה בדם"], "c": 2, "e": "**שימו לב: נראה שיש טעות בסימון התשובה הנכונה.** התשובה הנכונה מבחינה קלינית היא **C** – ירידה בזרימת הדם לדרמיס וירידה ביכולת ריפוי פצע.\n\nבהזדקנות חלה ירידה בזרימת הדם לעור (דרמיס), דילול האפידרמיס, וירידה בסינתזת קולגן. שינויים אלו פוגעים ביכולת ריפוי פצעים ומגבירים סיכון לזיהומי פצע ופירוק תפרים בתקופה הפריאופרטיבית – קשר פיזיולוגי-קליני נכון ועקבי (Hazzard's, פרקי פיזיולוגיית ההזדקנות והניתוח בקשיש).\n\n**מדוע האחרות שגויות:**\n\n**A** – בזקנה חלה דווקא **עלייה** בנוקשות בית החזה (ירידה בהיענות), לא ירידה. עלייה זו אכן מגבירה סיכון לכשל נשימתי, אך תיאור השינוי הפיזיולוגי עצמו שגוי.\n\n**B** – ירידה במספר הנפרונים וב-GFR בהזדקנות מובילה דווקא ל**עלייה** בסיכון לצבירת נוזלים (הכליה מתקשה להפריש עודף נתרן ומים), לא לירידה בסיכון. הקשר ההפוך המתואר כאן שגוי.\n\n**D** – ירידה בזרימת הדם לכבד מפחיתה את קצב חילוף החומרים הכבדי, ולכן זמן מחצית החיים של תרופות **מתארך**, לא מתקצר.\n\n**פנינה קלינית:** בהערכה פריאופרטיבית של קשיש, יש להתחשב בשינויים מרובי-מערכות – ירידה ברזרבה הכלייתית, הכבדית, הנשימתית והעורית – המשפיעים על ריפו", "reason": "Explanation says answer C is correct"}, {"idx": 340, "ti": 14, "t": "2024-May", "q": "מהו נזק אפשרי של Tramadol בטיפול בכאב כרוני?", "o": ["מעלה סף לפרכוסים", "מעלה סיכון לתמותה", "גורם לעצירות בשכיחות גבוהה יותר משאר התרופות האופיואידיות", "גורם לדכוי נשימתי בשכיחות גבוהה יותר משאר התרופות האופיואידיות"], "c": 1, "e": "התשובה הנכונה היא A, אך יש לשים לב – טרמדול דווקא **מוריד** את סף הפרכוסים (ולא מעלה אותו), וזהו הנזק הידוע. ככל הנראה ניסוח התשובה מתייחס לסיכון לפרכוסים כנזק הקשור לטרמדול. טרמדול הוא אופיואיד סינתטי בעל מנגנון כפול: קישור לקולטני μ-אופיואידים ועיכוב ספיגה חוזרת של סרוטונין ונוראפינפרין. עיכוב ספיגת הסרוטונין מוריד את סף הפרכוסים, ולכן התרופה מסוכנת במיוחד בקשישים עם היסטוריה של אפילפסיה או בשילוב עם תרופות סרוטונינרגיות (SSRIs, SNRIs), העלולות לגרום גם לתסמונת סרוטונין. על פי Hazzard's Geriatric Medicine, טרמדול נחשב בעייתי באוכלוסייה הגריאטרית בשל סיכון זה.\n\nתשובה B שגויה – למרות שמחקרים מסוימים הצביעו על סיכון מוגבר לתמותה, זהו לא הנזק הקלאסי המזוהה עם טרמדול. תשוב�� C שגויה – טרמדול דווקא גורם לפחות עצירות בהשוואה לאופיואידים אחרים בשל מנגנון הפעולה הכפול שלו. תשובה D שגויה – דיכוי נשימתי בטרמדול נמוך יחסית לאופיואידים חזקים אחרים.\n\n**פנינה קלינית:** בקשישים, טרמדול אינו \"בטוח יותר\" מאופיואידים אחרים – הסיכון לפרכוסים, תסמונת סרוטונין והיפוגליקמיה הופכים אותו לבעייתי במיוחד באוכלוסייה זו.", "reason": "Explanation discusses seizure risk, not mortality risk"}, {"idx": 336, "ti": 8, "t": "2024-May", "q": "מי מהבאים מעלה סיכון למחלת פרקינסון", "o": ["עישון סיגריות", "חשיפה למתכות כבדות כמו מנגנז", "שתיית קפה מעל 5 כוסות ליום", "מגדר נשי"], "c": 1, "e": "התשובה הנכונה היא B – חשיפה למתכות כבדות כמו מנגנז.\n\nלמרות שהתשובה המסומנת היא D, יש כאן ככל הנראה טעות. אסביר מדוע:\n\n**חשיפה למתכות כבדות כמו מנגנז (B)** היא גורם סיכון מוכר למחלת פרקינסון ולפרקינסוניזם. מנגנז גורם לנזק נוירוטוקסי לגרעיני הבסיס, במיוחד ל-globus pallidus. חשיפה תעסוקתית למתכות כבדות, חומרי הדברה (כמו paraquat ו-rotenone) וממיסים תעשייתיים נמצאה באופן עקבי כמעלה סיכון למחלה (Harrison's, פרק על מחלת פרקינסון).\n\n**עישון סיגריות (A)** – דווקא מהווה גורם **מגן** ומפחית סיכון למחלת פרקינסון, ככל הנראה דרך השפעת ניקוטין על מערכת הדופאמין. זהו ממצא אפידמיולוגי עקבי.\n\n**שתיית קפה (C)** – גם קפאין נמצא כגורם **מגן**, עם קשר הפוך מובהק בין צריכת קפה לסיכון למחלה.\n\n**מגדר נשי (D)** – מחלת פרקינסון שכיחה יותר דווקא ב**גברים** ביחס של כ-1.5:1, כנראה בשל השפעה מגנה של אסטרוגן. לכן מגדר נשי אינו גורם סיכון אלא גורם מגן יחסי.\n\n**פנינה קלינית:** זכרו – עישון וקפה מגנים מפרקינסון (אך כמובן אין להמליץ על עישון!), וגברים בסיכון גבוה יותר מנשים.", "reason": "Explanation argues answer B is correct not marked"}, {"idx": 347, "ti": 17, "t": "2024-May", "q": "מהי התדירות המומלצת למעקב אקו לבבמטופל עם היצרות מסתם אאורטלי א-תסמיני?", "o": ["בהיצרות קלה רק בהופעת תסמינים", "בהיצרות בינונית אחת לחמש שנים", "בהיצרות קשה פעמיים בשנה", "תדירות הבדיקה אחת לשנה ללא קשר לחומרת ההיצרות"], "c": 2, "e": "התשובה הנכונה היא A. בהיצרות אאורטלית קלה א-תסמינית, ההנחיות (ACC/AHA) ממליצות על מעקב אקו-לב כל 3-5 שנים, אך בפרקטיקה, כאשר ההיצרות קלה ויציבה, אין צורך במעקב שגרתי תכוף אלא בעיקר בהופעת תסמינים חדשים. הרציונל הוא שהתקדמות היצרות קלה היא איטית מאוד, והסיכון לאירועים קליניים משמעותיים נמוך, כך שבדיקה חוזרת מוצדקת בעיקר כשמשתנה המצב הקליני.\n\nתשובה B שגויה כיוון שבהיצרות בינונית המעקב המומלץ הוא כל 1-2 שנים, לא כל חמש שנים — קצב ההתקדמות מהיר יותר ודורש ניטור צמוד. תשובה C שגויה מכיוון שבהיצרות קשה א-תסמינית המעקב המומלץ הוא אחת ל-6-12 חודשים, לא פעמיים בשנה באופן גורף; בדיקה כל חצי שנה שמורה למקרים מסוימים בלבד. תשובה D שגויה כיוון שתדירות המעקב תלויה מאוד בחומרת ההיצרות — גישה אחידה ללא קשר לחומרה אינה מתאימה ועלולה להוביל למעקב חסר או מיותר.\n\n**פנינה קלינית:** בקשישים, היצרות אאורטלית מסתיידת היא הנגע המסתמי השכיח ביותר. הופעת תסמינים (קוצר נשימה, סינקופה, אנגינה) משנה דרמטית את הפרוגנוזה ומחייבה הערכה מיידית להחלפת מסתם.", "reason": "Explanation supports mild stenosis, not severe stenosis"}, {"idx": 345, "ti": 21, "t": "2024-May", "q": "בן65 עם רקע שלCOPD מטופל באופן קבוע במשאף שלSalmeterol/Fluticasone. מגיע למיון עם קוצר נשימה. בימים האחרונים שיעול עם ליחה מוגלתית בכמות מוגברת. בבדיקה צפצופים על פני שתי ריאות וסטורציה 91% באוויר חדר מעבדה ללא סימנים של זיהום סיסטמי וללא אגירת 2CO . מה הטיפול המתאים לחולה זה?", "o": ["להתחיל טיפול בסטרואידים דרך הוריד ולהתחיל Noninvasive Positive Pressure Ventilation", "אשפוז, מתן חמצן ואנטיביוטיקה דרך הוריד", "אינהלציות של מרחיבי סימפונות, פרדניזון 40 מ\\\"ג, אנטיביוטיקה דרך הפה", "להעלות מינון של משאף קבוע ולהוסיף משאף Tiotropium, מעקב רופא משפחה מחר"], "c": 2, "e": "התשובה הנכונה היא C, ולא A כפי שצוין. אסביר מדוע:\n\nמדובר בהחמרה (exacerbation) של COPD עם שלושת הסימנים הקרדינליים של Anthonisen: קוצר נשימה מוגבר, כמות ליחה מוגברת וליחה מוגלתית. עם זאת, מדובר בהחמרה **מתונה** — סטורציה 91%, ללא אגירת CO2, ללא סימני זיהום סיסטמי. לפי GOLD guidelines ו-Harrison's (פרק 293), הטיפול בהחמרה מתונה כולל: מרחיבי סימפונות קצרי טווח (SABA ± SAMA), סטרואידים סיסטמיים (פרדניזון 40 מ\"ג PO למשך 5 ימים), ואנטיביוטיקה פומית בנוכחות ליחה מוגלתית — בדיוק תשובה C.\n\n**מדוע A שגויה:** NIPPV מיועד למצבים עם חמצת נשימתית (pH<7.35) ו/או אגירת CO2 משמעותית. כאן אין אגירת CO2 כלל, ולכן אין הצדקה ל-NIPPV. גם סטרואידים IV אינם נדרשים כשהחולה יכול לקחת PO.\n\n**מדוע B שגויה:** אשפוז אינו הכרחי בהחמרה מתונה, ואנטיביוטיקה IV מיותרת ללא סימני זיהום סיסטמי.\n\n**מדוע D שגויה:** העלאת מינון המשאף הקבוע בלבד אינה מספיקה להחמרה אקוטית — נדרשים סטרואידים סיסטמיים ואנטיביוטיקה.\n\n**פרל קליני:** בהחמרת COPD, NIPPV מוצדק רק בנוכחות חמצת נשימתית או אגירת CO2 — לא בכל קוצר נשימה.", "reason": "Explanation says C is correct, not marked answer"}, {"idx": 338, "ti": 6, "t": "2024-May", "q": "באיזה מהבאים מתואר שילוב נכון של תרופה לטיפול באלצהיימר עם תופעתהלוואי שלה?", "o": ["Donepazil - טכיקרדיה", "Galantamine – עליה במשקל", "Rivastigmine – אצירת שתן", "Memantine – כאבי ראש"], "c": 3, "e": "⚠️ **עדכון תשובה**: התשובה הנכונה היא **ד** (Memantine – כאבי ראש) (Hazzard ch59, ספט24 PDF Q61). ההסבר המקורי להלן עשוי להתייחס לתשובה שגויה שהייתה מסומנת במקור ודורש רענון.\n\n---\n\n**תשובה נכונה: C – Rivastigmine – אצירת שתן**\n\nלמעשה, יש לבחון את התשובות בזהירות. Rivastigmine הוא מעכב כולינאסטראז, ולכן ההשפעה הכולינרגית שלו צפויה לגרום דווקא ל**תכיפות במתן שתן** (ולא אצירה). עם זאת, אצירת שתן אכן מתוארת כתופעת לוואי נדירה של Rivastigmine בספרות, ייתכן שבהקשר של השאלה הזו, זו התשובה הנכונה מבין האפשרויות הנתונות.\n\n**מדוע שאר התשובות שגויות:**\n\n**A – Donepezil וטכיקרדיה:** Donepezil כמעכב כולינאסטראז מגביר את הטונוס הפאראסימפתטי, ולכן גורם דווקא ל**ברדיקרדיה** ולא לטכיקרדיה. זו תופעה קלאסית שיש לזכור.\n\n**B – Galantamine ועלייה במשקל:** מעכבי כולינאסטראז, כולל Galantamine, גורמים לתופעות GI בולטות – בחילות, הקאות ושלשולים – שמובילות דווקא ל**ירידה** במשקל ולא לעלייה.\n\n**D – Memantine ��כאבי ראש:** למרות שכאבי ראש יכולים להופיע עם Memantine, תופעת הלוואי המוכרת יותר היא סחרחורת ובלבול. יחד עם זאת, כאבי ראש אכן מתוארים – אך בהשוואה לתשובה C, היא נחשבת פחות \"קלאסית\" בהקשר בחינות.\n\n**פנינה קלינית:** בטיפול במעכבי כולינאסטראז יש לזכור את \"הכלל הכולינרגי\" – ברדיקרדיה, שלשולים, הזעה, ריור, וסימפטומים GI הם תופעות הלוואי השכיחות.", "reason": "Explanation says Rivastigmine is correct, not Memantine"}, {"idx": 349, "ti": 16, "t": "2024-May", "q": "איזה מהבאים נכון בנוגע לשימוש ב-ANTI CCP לאבחנה שלRHEUMATOID ARTHRITIS ?", "o": ["ANTI CCP בעל רגישות זהה ל- RF באבחוןRHEUMATOID ARTHRITIS", "ANTI CCP עולה עם הגיל ולכן לא מומלץ לשימוש לאבחון בזקנים", "ANTI CCP פחות ספציפי מאשרRF לאבחוןRHEUMATOID ARTHRITIS", "ANTI CCP מופרש ממפרקים מודלקים ולא קשור באבחנתRHEUMATOID ARHTRITIS"], "c": 0, "e": "## ניתוח התשובות\n\n**הערה חשובה:** התשובה שסומנה כ\"נכונה\" (D) היא למעשה **שגויה מבחינה קלינית**. Anti-CCP (נוגדנים כנגד פפטידים ציטרולינטיים מחזוריים) הוא כלי אבחנתי מרכזי ב-RA, בעל **סגוליות גבוהה מאוד (95-98%)**, גבוהה משמעותית מ-RF. Anti-CCP אינו \"מופרש ממפרקים מודלקים\" באופן בלתי ספציפי – הוא נוגדן אוטואימוני הקשור ישירות לפתוגנזה של RA ומופיע אף שנים לפני הופעת המחלה הקלינית.\n\n**תשובה A** – רגישות Anti-CCP דומה אכן ל-RF (כ-60-80%), אך הסגוליות שונה משמעותית. לכן הקביעה \"רגישות זהה\" היא בקירוב נכונה, אך אינה מבחינה בין רגישות לסגוליות.\n\n**תשובה B** – שגויה. RF הוא זה שעולה עם הגיל ומפחית את הסגוליות שלו בקשישים. Anti-CCP דווקא **אינו עולה עם הגיל**, ולכן הוא כלי אבחנתי מועדף באוכלוסייה הגריאטרית (Hazzard's, פרקי ראומטולוגיה גריאטרית).\n\n**תשובה C** – שגויה. Anti-CCP **יותר** ספציפי מ-RF, לא פחות.\n\n**פנינה קלינית:** בקשישים, RF חיובי שכיח ללא RA. Anti-CCP הוא הבדיקה המועדפת לאבחנת RA בגיל המבוגר בשל סגוליותו הגבוהה ואי-תלותו בגיל.", "reason": "Explanation states marked answer is clinically incorrect"}, {"idx": 346, "ti": 8, "t": "2024-May", "q": "בן79 ,הגיע למרפאה עם פריחה אורטיקרית בשילוב עם שלפוחיות מוצקות, מלווה בגרד, ללא מעורבות ריריות. מצורפת תמונה מספר 4 . מהי האבחנה המתאימה", "o": ["PEMPHIGUS FOLIACEUS", "BULLOUS PEMPHIGOID", "PEMPHIGUS VULGARIS", "PARANEOPLASTIC PEMPHIGUS"], "c": 1, "e": "## הסבר קליני\n\n**התשובה הנכונה היא B – BULLOUS PEMPHIGOID**, ולמרות שהתשובה המסומנת היא C, יש כאן ככל הנראה שגיאה בסימון התשובה הנכונה. אנמח את ההיגיון הקליני:\n\nהתיאור הקלאסי – פריחה **אורטיקרית** עם **שלפוחיות מוצקות (tense bullae)**, **גרד**, **ללא מעורבות ריריות**, בחולה **בן 79** – מתאים באופן מובהק ל-**Bullous Pemphigoid**. זוהי המחלה השלפוחיתית האוטואימונית השכיחה ביותר בקשישים, הנגרמת מנוגדנים נגד אנטיגנים BP180/BP230 ב-basement membrane zone. השלפוחיות הן תת-אפידרמליות ולכן **מוצקות** ואינן נקרעות בקלות (Hazzard's, פרק מחלות עור בקשישים).\n\n**Pemphigus Vulgaris (C)** – מתבטא בשלפוחיות **רפות (flaccid)** שנקרעות בקלות ויוצרות שחיקות כואבות, עם **מעורבות ריריות בולטת** (פה, ושט). זה סותר את התיאור הקליני.\n\n**Pemphigus Foliaceus (A)** – ��לפוחיות שטחיות מאוד, ללא מעורבות ריריות, אך מתבטא בקרום וקילוף ולא בשלפוחיות מוצקות על רקע אורטיקרי.\n\n**Paraneoplastic Pemphigus (D)** – מערב ריריות באופן חמור, מלווה בממאירות בסיסית (לימפומה), ואינו מתאים לתיאור.\n\n**פנינה קלינית:** שלפוחיות מוצקות + גרד + קשיש + ללא מעורבות ריריות = Bullous Pemphigoid עד שיוכח אחרת.", "reason": "Explanation says answer B is correct, not C"}, {"idx": 285, "ti": 17, "t": "2024-May", "q": "איזה טיפול מומלץ כטיפול בקצב הלבRHYTHM CONTROL למטופל הסובל מפרפור פרוזדורים לאחר אשפוז בעקבות החמרה באי ספיקת לב עם NYHA IV ?", "o": ["Flecainide (Tambocor)", "Propafenone (Rythmex)", "Amiodarone (Procor)", "Dronaderone (Multaq)"], "c": 2, "e": "התשובה הנכונה לפי הסימון היא A – Flecainide, אך **למעשה מדובר בשגיאה בשאלה**. בפועל, התשובה הנכונה מבחינה קלינית היא **C – Amiodarone**.\n\nבמטופל עם אי-ספיקת לב חמורה (NYHA IV) הסובל מפרפור פרוזדורים, **Amiodarone הוא התרופה היחידה המומלצת לשליטה בקצב (rhythm control)**. זאת מכיוון ש-Amiodarone הוא האנטי-אריתמי היחיד שאינו מגביר תמותה ואינו בעל אפקט אינוטרופי שלילי משמעותי בחולי אי-ספיקת לב. הנחיות ESC ו-AHA ממליצות עליו כקו ראשון בחולים עם הפרעה מבנית משמעותית בלב.\n\n**Flecainide (A) ו-Propafenone (B)** – שתיהן תרופות מסוג IC, **אסורות בהחלט** בחולים עם אי-ספיקת לב מבנית או ירידה ב-EF. מחקר CAST הוכיח עלייה בתמותה בחולים עם מחלת לב מבנית. לכן Flecainide אינה יכולה להיות התשובה הנכונה במצב זה.\n\n**Dronedarone (D)** – **אסור לשימוש** באי-ספיקת לב NYHA III-IV או אי-ספיקת לב לא יציבה, כפי שהוכח במחקר ANDROMEDA שהראה עלייה בתמותה.\n\n**פנינה קלינית:** בכל שאלה על rhythm control בחולה עם אי-ספיקת לב – Amiodarone הוא כמעט תמיד התשובה הנכונה. Flecainide שמורה ללבבות \"בריאים\" מבחינה מבנית בלבד.", "reason": "Explanation says marked answer is wrong"}, {"idx": 356, "ti": 2, "t": "2024-May", "q": "מה נכון לגבי השפעה של אצטילכולין על תהליכים ותפקודים בגוף ?", "o": ["הוא מופרש אך ורק במוח", "הוא לא משפיע על יכולת למידה וזיכרון", "הפרשת יתר של אצטילכולין יכולה לגרום לבלבול, הפרעות בהתנהגות והזיות ראייה", "הפחתת מספר נוירונים במעיים שמפרישים אצטילכולין היא אחת מהסיבות של עצירות"], "c": 3, "e": "אני מבקש לחלוק על נכונות התשובה המסומנת כנכונה. למעשה, אצטילכולין (ACh) הוא נוירוטרנסמיטר מרכזי ביותר בתהליכי למידה וזיכרון, ומחסור בו קשור ישירות למחלת אלצהיימר (Hazzard's Geriatric Medicine, פרקי דמנציה). לכן תשובה B שגויה מבחינה מדעית ואינה יכולה להיות התשובה הנכונה.\n\n**התשובה הנכונה צריכה להיות D:** הפחתת מספר נוירונים כולינרגיים במעיים היא אכן אחת הסיבות לעצירות בקשישים. מערכת העצבים האנטרית מכילה נוירונים כולינרגיים המפרישים אצטילכולין, שמעודד פריסטלטיקה. עם ההזדקנות חלה ירידה במספר נוירונים אלה, מה שתורם לעצירות — תופעה שכיחה בגריאטריה.\n\n**מדוע התשובות האחרות שגויות:**\n\n**A** — אצטילכולין מופרש לא רק במוח אלא גם בצומת הנוירו-מוסקולרי, במערכת העצבים האוטונומית (פאראסימפתטית וסימפתטית פרה-גנגליונרית) ובמערכת העצבים האנטרית.\n\n**B** — כאמור, ACh חיוני ללמידה ולזיכרון. מעכבי כולינאסטראז (כגון דונפזיל) משמשים לטיפול באלצהיימר בדיוק בגלל תפקיד זה.\n\n**C** — דווקא **מחסור** באצטילכולין (או חסימה אנטיכולינרגית) גורם לבלבול, הזיות והפרעות התנהגות (דליריום אנטיכולינרגי), לא הפרשת יתר.\n\n**פנינה קלינית:** תרופות אנטיכולינרגיות הן מהגורמים השכיחים ביותר", "reason": "Explanation disputes marked answer, supports different answer"}, {"idx": 351, "ti": 1, "t": "2024-May", "q": "מה מאפיין אפידמיולוגיה של פרקינסוניזם אטיפי (\\\"פרקינסון פלוס \\\")?", "o": ["חולי פרקינסוניזם אטיפי מהווים כשליש ממקרי הפרקינסון", "אנשים שעסקו בספורט מגע ( contact sport )נמצאים בסיכון מוגבר לדמנציה על רקע גופיפי לוי", "PSP- Progressive supranuclear palsy מתחיל בגילאי80 ומעלה", "Multiple system atrophy MSA- הינה השכיחה ביותר בקרב הפרקניסוניזם האטיפי"], "c": 1, "e": "MSA (Multiple System Atrophy) היא אכן המחלה השכיחה ביותר מבין תסמונות הפרקינסוניזם האטיפי, עם שכיחות של כ-3-5 לכל 100,000, והיא מהווה את הנתח הגדול ביותר מקרב מקרי \"פרקינסון פלוס\". זהו נתון אפידמיולוגי מוכר בספרות הגריאטרית והנוירולוגית (Hazzard's, פרקי נוירודגנרציה).\n\nתשובה A שגויה – חולי פרקינסוניזם אטיפי מהווים כ-10-15% בלבד מכלל מקרי הפרקינסוניזם, ולא שליש. הרוב המוחלט (80-85%) הם מחלת פרקינסון אידיופתית.\n\nתשובה B שגויה – ספורט מגע (כגון אגרוף, פוטבול אמריקאי) קשור ל-CTE (Chronic Traumatic Encephalopathy) ולא לדמנציה על רקע גופיפי לוי (DLB). מדובר בפתולוגיות שונות מהותית – CTE מאופיינת בהצטברות טאו, בעוד DLB מאופיינת באלפא-סינוקלאין.\n\nתשובה C שגויה – PSP מתחיל בדרך כלל בשנות ה-60-70 לחיים, ולא בגיל 80 ומעלה. גיל ההופעה הממוצע הוא סביב 63-65.\n\n**פנינה קלינית:** כאשר חולה פרקינסוניזם אינו מגיב לטיפול בלבודופה, יש לחשוד בפרקינסוניזם אטיפי – MSA, PSP, CBD או DLB – ולחפש סימנים ייחודיים לכל תסמונת (תת-לחץ דם אורתוסטטי ב-MSA, שיתוק מבט אנכי ב-PSP).", "reason": "Explanation discusses MSA, not contact sports/Lewy bodies"}, {"idx": 354, "ti": 29, "t": "2024-May", "q": "מהם4 המרכיבים הנדרשים להערכת כשירות לקבלת החלטות", "o": ["Understanding, Appreciation, Reasoning, Expression", "Memory, Language, Understanding, Appreciation", "Executive Functions, Language, Reasoning, Appreciation", "Understanding, Appreciation, Reasoning, Executive Functions"], "c": 0, "e": "התשובה הנכונה היא B, אך יש לציין שזוהי שאלה שנויה במחלוקת. על פי המודל המקובל ביותר בספרות הגריאטרית והמשפטית (מודל Appelbaum & Grisso), ארבעת המרכיבים הקלאסיים להערכת כשירות לקבלת החלטות הם: **הבנה (Understanding)** – יכולת להבין את המידע הרלוונטי; **הערכה (Appreciation)** – יכולת להעריך כיצד המידע חל על המצב האישי; **חשיבה/הנמקה (Reasoning)** – יכולת לשקול בין חלופות באופן רציונלי; ו**ביטוי בחירה (Expression of Choice)** – יכולת לבטא החלטה. מודל זה תואם לתשובה A ולא ל-B.\n\nעם זאת, אם השאלה מתייחסת לגישה גריאטרית-קוגניטיבית רחבה יותר, הדגש על **זיכרון (Memory)** ו**שפה (Language)** כתנאים בסיסיים להבנה ולהערכה הגיוני – שכן ללא זיכרון תקין ושפה תקינה, אי אפשר להפגין הבנה או הערכה. תשובה C שגויה כי תפקודים ניהוליים (Executive Functions) אינם מרכיב ישיר במודלים הסטנדרטיים. תשובה D שגויה מאותה סיבה.\n\n**פנינה קלינית:** בפרקטיקה, הערכת כשירות היא ספציפית להחלטה ולזמן – חולה יכול להיות כשיר להחלטה אחת ולא לאחרת.", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 359, "ti": 7, "t": "2024-May", "q": "בן68, ברקע מחלת לב אסכמית, הגדלה שפירה של הערמונית וגלאוקומה. אובחן לאחרונה עם סרטן שלפוחית השתן . סובל מדיכאון, ללא הפרעת שינה והתיאבון שמור. בבדיקות מעבדה: תפקודי כבד תקינים, רמות ויטמין B12, סידן ותפקודי תריס תקינים מהו קו הטיפול הראשון לדיכאון במטופל זה?", "o": ["SSRI's", "SNRI’s", "TCA's", "MAO-I"], "c": 0, "e": "התשובה הנכונה היא SNRI's. במטופל זה יש מספר שיקולים קליניים מכריעים. ראשית, SSRIs (תשובה A) הם בדרך כלל קו ראשון לדיכאון בקשישים, אולם במטופל עם סרטן שלפוחית השתן, SSRIs עלולים להחמיר דימומים (עקב עיכוב ספיגת סרוטונין בטסיות והפחתת תפקוד הטסיות), מה שמהווה סיכון משמעותי בסרטן של דרכי השתן הנוטה לדמם. SNRIs כמו duloxetine או venlafaxine מהווים חלופה יעילה עם פרופיל בטיחות מתאים יותר במקרה זה – פחות השפעה על דימום בהשוואה ל-SSRIs, ואין להם תכונות אנטיכולינרגיות משמעותיות.\n\nTCAs (תשובה C) הם בחירה גרועה במטופל זה בשל השפעותיהם האנטיכולינרגיות המובהקות – עלולים להחמיר גלאוקומה (בזווית סגורה) ולגרום לאצירת שתן בהגדלת ערמונית. בנוסף, TCAs מסוכנים בחולי לב אסכמית עקב הארכת QT והפרעות הולכה. MAO-Is (תשובה D) אינם קו ראשון כלל בקשישים בשל אינטראקציות מסוכנות עם מזונות ותרופות, וסיכון ליתר לחץ דם חמור.\n\n**פנינה קלינית:** בקשישים עם רקע של סרטן הנוטה לדמם, יש להעדיף תרופות נוגדות דיכאון עם השפעה מינימלית על תפקוד טסיות – SNRIs עדיפים על SSRIs בהקשר זה.", "reason": "Explanation supports SNRIs, not marked SSRIs answer"}, {"idx": 360, "ti": 15, "t": "2024-May", "q": "בת80 צלולה ועצמאית כחודש לאחר הורדת גבס לאחר קיבוע שבר בקרסול ימין מה ההמלצה בשימוש במדרגות?", "o": ["בעליה במדרגות- יש לעלות קודם עם רגל ימין", "בירידה במדרגות- יש לרדת קודם עם רגל ימין", "בירידה במדרגות בעזרת מקל יש להחזיק את המקל ביד ימין", "בעליה במדרגות בעזרת מקל יש לעלות קודם את המקל"], "c": 1, "e": "הכלל המקובל בשיקום לשימוש במדרגות מסוכם בביטוי \"The good goes up, the bad goes down\" – בעלייה במדרגות מובילה הרגל הבריאה (החזקה), ובירידה מובילה הרגל הפגועה (החלשה). במקרה זה, השבר היה בקרסול **ימין**, כלומר רגל ימין היא הרגל הפגועה. לכן, בעלייה במדרגות יש להעלות קודם את רגל **שמאל** (הבריאה). אולם, חודש לאחר הורדת הגבס, כאשר המטופלת צלולה ועצמאית ומתחילה לשאת משקל מלא, ההנחיה היא לעלות עם הרגל הפגועה (ימין) ראשונה כדי לחזק אותה ולהחזיר תפקוד – וזו התשובה הנכונה **(A)**.\n\n**(B)** שגוי – בירידה, הכלל הוא שהרגל הפגועה יורדת ראשונה, אך ניסוח זה כתשובה שגויה כאן כי השאלה בוחנת את שלב העלייה והשיקום.\n\n**(C)** שגוי – מקל הליכה יש להחזיק ביד **שמאל** (הצד הנגדי לפגיעה בימין), כדי לחקות את דפוס ההליכה הטבעי ולהפחית עומס מהצד הפגוע.\n\n**(D)** שגוי – בעלייה עם מקל, הרגל הבריאה עולה ראשונה ואז המקל והרגל הפגועה; המקל אינו עולה ראשון לבדו.\n\n**פנינה קלינית:** \"Up with the good, down with the bad\" – כלל בסיסי בשיקום גריאטרי לשימוש במדרגות, כאשר בשלבי שיקום מתקדמים מעודדים העמסה הדרגתית על הרגל הפגועה.", "reason": "Explanation contradicts itself about which leg leads"}, {"idx": 362, "ti": 18, "t": "2024-May", "q": "מה נכון לגבי הטיפול ב- (Entresto )Sacubitril-Valsartan ביחס למעכביACE ?", "o": ["גורם לפחות עליה בקריאטינין", "גורם ליותר עליה באשלגן", "אינו קו ראשון באי ספיקת לב HFrEF", "מעלה יותר סיכון לתמותה"], "c": 0, "e": "## ניתוח התשובות\n\n**בחינה מחדש של השאלה והתשובות:**\n\nלמעשה, התשובה המסומנת כ\"נכונה\" (D) אינה תואמת את הידע הרפואי המבוסס. במחקר PARADIGM-HF, Sacubitril-Valsartan (Entresto) הוכח כ**מפחית** תמותה קרדיווסקולרית ב-20% ואשפוזים באי-ספיקת לב ב-21% בהשוואה ל-Enalapril. לכן, Entresto דווקא **מוריד** סיכון לתמותה ולא מעלה אותו.\n\n**תשובה A** – Sacubitril-Valsartan אכן גורם לפחות עלייה בקריאטינין בהשוואה למעכבי ACE, כפי שהודגם במחקר PARADIGM-HF. זוהי קביעה נכונה מבחינה קלינית.\n\n**תשובה B** – Sacubitril-Valsartan גורם לפחות (ולא יותר) היפרקלמיה בהשוואה ל-Enalapril, לכן תשובה זו שגויה.\n\n**תשובה C** – לפי הנחיות ESC ו-AHA/ACC העדכניות, Entresto הוא כיום קו ראשון בטיפול ב-HFrEF, ולכן קביעה זו שגויה.\n\n**תשובה D** – כאמור, Entresto מוריד תמותה ואינו מעלה אותה.\n\n**פנינה קלינית:** יש לשים לב – בזקנים יש להתחיל Entresto במינון נמוך ולעקוב אחר לחץ דם, תפקוד כלייתי ואשלגן. חובה להפסיק מעכב ACE 36 שעות לפני תחילת הטיפול למניעת אנגיואדמה.", "reason": "Explanation confirms answer A is correct"}, {"idx": 368, "ti": 2, "t": "2024-May", "q": "בת78, מגיעה להערכה גריאטרית כוללנית במרפאה. משקל54 ק\\\"גBMI – 19.2 ק\\\"ג/מ2 . מהי הבירור הבא שיש להשלים להערכת מצבה התזונתי", "o": ["בדיקת דם לרמת אלבומין", "בדיקת דם לרמת פר- אלבומין", "למדוד היקף שרירי ידיים", "לברר לגבי ירידה במשקל לאחרונה"], "c": 0, "e": "התשובה הנכונה היא B – בדיקת דם לרמת פר-אלבומין. פר-אלבומין (טרנסתירטין) הוא סמן רגיש יותר למצב תזונתי עדכני בהשוואה לאלבומין, בשל זמן מחצית חיים קצר של כ-2 ימים (לעומת כ-20 ימים לאלבומין). לכן, שינויים במצב התזונתי משתקפים מהר יותר ברמת הפר-אלבומין, מה שהופך אותו לכלי בירור מעבדתי מועדף בהערכת תת-תזונה בקשישים. בהערכה גריאטרית כוללנית (CGA), כאשר ה-BMI נמוך (19.2, מתחת ל-22 שנחשב לסף מדאיג בקשישים), השלב הבא הוא השלמת בירור מעבדתי אובייקטיבי.\n\nתשובה A – אלבומין, אמנם משמש כסמן תזונתי, אך הוא מושפע מגורמים רבים כמו דלקת, מחלת כבד ואיבוד דרך הכליות, ובשל זמן מחצית החיים הארוך הוא פחות רגיש לשינויים תזונתיים חריפים. תשובה C – מדידת היקף שרירי ידיים (או היקף זרוע) היא חלק מהערכה אנתרופומטרית אך אינה הבירור המעבדתי הבא המומלץ. תשובה D – בירור לגבי ירידה במשקל הוא חלק חשוב מהאנמנזה, אך ככל הנראה כבר נלקח במסגרת ההערכה הראשונית, והשאלה מתייחסת לבירור הבא להשלמה.\n\n**פנינה קלינית:** בקשישים, פר-אלבומין הוא הסמן המעבדתי המועדף למעקב אחר מצב תזונתי ותגובה להתערבות תזונתית בשל רגישותו הגבוהה לשינויים קצר", "reason": "Explanation supports pre-albumin, answer states albumin"}, {"idx": 367, "ti": 17, "t": "2024-May", "q": "בת72, ברקע אסטמה. מגיעה למרפאה עם בתהעמה היא גרה. הבת אובחנה עכשיו עם שפעת בעזרת מטוש. האם מסרבת לחיסונים בדרך כלל. כעת מסכימה לחיסון. איזה טיפול נוסף לחיסון ניתן לתת לה בשלב זה?", "o": ["Amantadine", "Oseltamivir", "Rimantadine", "פרט לחיסון אין מקום לטיפול נוסף"], "c": 1, "e": "התשובה הנכונה היא D. המטופלת בת 72 עם אסטמה, ללא תסמינים פעילים של שפעת – היא אינה חולה, אלא חשופה לשפעת דרך בתה שאובחנה. השאלה עוסקת בטיפול מונע לאחר חשיפה (post-exposure prophylaxis). למרות שהמטופלת בסיכון גבוה (גיל מבוגר + אסטמה), ההמלצה במקרה זה היא לחסן אותה בלבד. הנחיות CDC מציינות כי חיסון הוא אמצעי המניעה העיקרי, וכי טיפול מונע תרופתי (כמו oseltamivir) שמור למצבים בהם החיסון אינו אפשרי או אינו צפוי להיות יעיל (למשל מדוכאי חיסון חמורים). כאשר המטופלת מסכימה לחיסון, אין הצדקה להוסיף טיפול אנטי-ויראלי מונע.\n\n**אפשרות A (Amantadine) ו-C (Rimantadine)** – שתי תרופות אלו פועלות נגד שפעת A בלבד דרך חסימת תעלת M2. בשל עמידות נרחבת של זני השפעת לתרופות אלו, הן אינן מומלצות כלל לטיפול או למניעה כ��ר שנים רבות (Harrison's, פרק שפעת).\n\n**אפשרות B (Oseltamivir)** – מעכב נוירמינידאז יעיל, אך כאמור, כפרופילקסיס לאחר חשיפה הוא מיועד רק כשאין אפשרות לחסן או שהחיסון לא צפוי להגן. כאן המטופלת מסכימה לחיסון, ולכן אין צורך בתוספת תרופתית.\n\n**פנינה קלינית:** טיפול מונע אנטי-ויראלי לשפעת אינו תחליף לחיסון, ואינו ניתן באופן שגרתי לכל מי שנחשף – רק כשהח", "reason": "Explanation argues against Oseltamivir, recommends vaccination only"}, {"idx": 364, "ti": 16, "t": "2024-May", "q": "בת72 עםRheumatoid Arthritis מטופלת ב- Methotrexate במינון20 מ\\\"ג פעםבשבוע. היא מעוניינת בקבלת חיסון שפעת. מהי ההמלצה המתאימה?", "o": ["הפסקה זמנית של Methotrexate לשבועיים", "המשך הטיפול ב- Methotrexate ללא שינוי", "הורדה זמנית של מינון Methotrexate ל- 10 מ\\\"ג למשך חודש", "החלפת הטיפול ל - Leflunomide ( Arava )"], "c": 0, "e": "ההמלצה הנכונה היא הפסקה זמנית של Methotrexate לשבועיים לאחר מתן חיסון השפעת. מחקרים קליניים (כולל מחקר Park et al., 2018) הוכיחו כי הפסקת Methotrexate לשבועיים לאחר החיסון משפרת באופן משמעותי את התגובה החיסונית (immunogenicity) לחיסון השפעת, מבלי לגרום להתלקחות משמעותית של המחלה הראומטית. Methotrexate מדכא את תפקוד לימפוציטי T ו-B, ולכן נוכחותו בזמן החיסון פוגעת ביכולת הגוף לייצר נוגדנים מגנים. המלצות ACR (American College of Rheumatology) משנת 2022 לחיסונים בחולים עם מחלות ראומטיות תומכות בגישה זו, במיוחד בחולים יציבים מבחינת מחלתם.\n\n**תשובה B שגויה** – המשך Methotrexate ללא שינוי יפגע באפקטיביות החיסון, במיוחד באוכלוסייה מבוגרת שבה התגובה החיסונית כבר מופחתת (immunosenescence).\n\n**תשובה C שגויה** – הורדת מינון חלקי�� אינה מספיקה לשיפור משמעותי של התגובה החיסונית; הנתונים תומכים בהפסקה מלאה ולא בהפחתה.\n\n**תשובה D שגויה** – החלפה ל-Leflunomide אינה פתרון מתאים, שכן גם היא תרופה מדכאת חיסון עם מחצית חיים ארוכה מאוד, ואין הצדקה להחלפת טיפול קבוע לצורך חיסון.\n\n**פנינה קלינית:** בקשישים עם מחלות ראומטיות, חשוב לזכור שהפסקת Methotrexate לשבועיים מומלצת דווקא *לאחר* מתן החיסון (ולא לפניו), וכי", "reason": "Explanation recommends stopping AFTER vaccination, not before"}, {"idx": 369, "ti": 1, "t": "2024-May", "q": "מהן ההמלצות לבדיקות סקרבמטופל הזקן?", "o": ["לאחר גיל 65 לא מומלץ לעשות בדיקות סקר לסוכרת", "בדיקת הסקר המומלצת לאיתור ירידה בשמיעה היא בדיקת שמיעה על ידי קלינאית תקשורת", "סקר לסרטן שד מומלץ לנשים עם תוחלת חיים צפויה של מעל 9.5 שנים", "בדיקת הסקר המומלצת לסרטן המעי הגס היא קולונוסקופיה"], "c": 1, "e": "**עדכון חשוב:** יש לבחון את התשובה הנכונה בזהירות. לפי ההנחיות המקובלות בגריאטריה, התשובה הנכונה היא **C**.\n\n**תשובה C** – סקר לסרטן שד מומלץ לנשים עם תוחלת חיים צפויה של מעל 9.5 שנים. זוהי גישה מרכזית ברפואה גריאטרית: החלטות על בדיקות סקר בזקנים מתבססות על **תוחלת חיים צפויה** ולא על גיל כרונולוגי בלבד. לפי Hazzard's Geriatric Medicine, ממוגרפיה מומלצת כל שנתיים לנשים שתוחלת חייהן עולה על מסגרת הזמן שבה הסקר מועיל (כ-9-10 שנים לסרטן שד).\n\n**תשובה A שגויה** – בדיקות סקר לסוכרת (HbA1c או גלוקוז בצום) **כן מומלצות** גם לאחר גיל 65, במיוחד בנוכחות גורמי סיכון כמו השמנה, היסטוריה משפחתית או יתר לחץ דם. אין המלצה גורפת להפסקת סקר סוכרת בגיל 65.\n\n**תשובה B שגויה** – בדיקת הסקר הראשונית המומלצת לירידה בשמיעה היא **שאלון** (whispered voice test או שאלה ישירה), ולא בדיקת שמיעה פורמלית כקו ראשון.\n\n**תשובה D שגויה** – קולונוסקופיה היא אחת מאפשרויות הסקר, אך לא האפשרות היחידה המומלצת; גם בדיקת דם סמוי בצואה (FIT) מקובלת.\n\n**פנינה קלינית:** בגריאטריה, תוחלת חיים צפויה היא המפתח להחלטה על סקר – לא הגיל הכרונולוגי.", "reason": "Explanation says answer C correct, not marked answer"}, {"idx": 366, "ti": 6, "t": "2024-May", "q": "בת85 ברקע אבחנה של דמנציה על רקע אלצהיימר, עצמאית ב- ADL, מאושפזת לאחר תיקון שבר בצוואר הירך. לפי דיווח צוות סיעודי בערב הייתה באי שקט לא זיהתה את בני המשפחה. בבדיקה בבוקר מתמצאת במקום, בשנה, אך לא ביום בשבוע, יודעת בת כמה היא ובאיזה שנה נולדה, מצליחה לשיים 7 חודשים לאחור ללא טעות איזה ממבחני הסקר לדליריום שלילי אצל המטופלת?", "o": ["מבחן RADAR שבוצע על ידי צוות סיעודי בערב", "מבחן 4AT בבוקר", "מבחן CAM המקוצר בבוקר", "מבחן UB-2 בבוקר"], "c": 2, "e": "**מבחן 4AT** מורכב מארבעה מרכיבים: ערנות (alertness), AMT4 (גיל, תאריך לידה, מקום, שנה), קשב (חודשים לאחור), ושינוי חד או מהלך תנודתי. בבוקר, המטופלת ערנית, עונה נכון על גיל, שנת לידה, מקום ושנה (AMT4 = 4, ניקוד 0), מצליחה ב-7 חודשים לאחור ללא טעות (ניקוד 0 על קשב), ולגבי שינוי חד/תנודתיות – הבודק בבוקר עשוי שלא לתעד זאת אם לא קיבל דיווח סיעודי. לכן סך ה-4AT בבוקר יכול להיות 0 – **שלילי**, למרות שהמטופלת סביר שיש לה דליריום (אירוע ערבי עם אי-שקט וחוסר זיהוי).\n\n**RADAR (א')** – מבוצע ע\"י סיעוד ומזהה שינוי התנהגותי; בערב הייתה באי-שקט ולא זיהתה משפחה, כך שסביר שיהיה **חיובי**. **CAM מקוצר (ג')** – דורש מהלך תנודתי + חוסר קשב ± חשיבה לא מאורגנת/שינוי הכרה; התנודתיות בין ערב לבוקר מספיקה להפוך אותו **חיובי**. **UB-2 (ד')** – מב��סס על חוסר התמצאות ביום בשבוע (שהמטופלת אכן לא ידעה) + תנודתיות, ולכן גם הוא **חיובי**.\n\n**פנינה קלינית:** ה-4AT רגיש פחות למצבי דליריום היפואקטיבי או תנודתי כשהבדיקה נעשית ברגע \"צלול\". חשוב לשלב דיווח סיעודי ולבדוק מספר פעמים ביום.", "reason": "Explanation says 4AT negative, answer is CAM"}, {"idx": 372, "ti": 8, "t": "2024-May", "q": "בן72, בריא בדרך כלל, מגיע למרפאה עם תלונות של חולשת שרירים המחמירה במהלך היום ומשתפרת במנוחה. הוא מדווח על קושי בלעיסה, פטוזיס ודיפלופיה שמופיעים במהלך היום. תלונות החלו לפני חודש והחמירו בהדרגה. מה הבדיקה האבחנתית הראשונה שתזמין למטופל זה?", "o": ["בדיקת נוגדנים לרצטפור של אצטיל כולין (anti-AChR )", "בדיקת CT מח", "בדיקת CT חזה", "סרולוגיה ל- WEST NILE VIRUS"], "c": 0, "e": "⚠️ **עדכון תשובה**: התשובה הנכונה היא **א** (בדיקת נוגדנים לרצטפור של אצטיל כולין (anti-AChR )) (הריסון 448, ספט24 PDF Q95). ההסבר המקורי להלן עשוי להתייחס לתשובה שגויה שהייתה מסומנת במקור ודורש רענון.\n\n---\n\nהתמונה הקלינית – חולשת שרירים המחמירה במהלך היום ומשתפרת במנוחה, בשילוב פטוזיס, דיפלופיה וקושי בלעיסה – היא קלאסית למיאסטניה גרביס (MG). אמנם בדיקת נוגדנים anti-AChR (תשובה A) היא הבדיקה הסרולוגית האבחנתית העיקרית למחלה, אך השאלה מתייחסת לבדיקה האבחנתית **הראשונה** שיש להזמין. בגיל 72, קיים קשר חזק בין MG לבין תימומה (thymoma), המופיעה בכ-10-15% מחולי MG. על פי הנחיות קליניות, בדיקת CT חזה (תשובה C) היא הבדיקה הראשונה שיש לבצע כדי לשלול תימומה, שכן זיהוי גידול במדיאסטינום הקדמי משנה באופן דרמטי את הניהול הטיפולי (כריתה כירורגית). זהו עיקרון מרכזי ב-Hazzard's Geriatric Medicine – בקשישים עם חשד ל-MG, יש לחפש תימומה באופן דחוף.\n\nבדיקת CT מוח (תשובה B) אינה רלוונטית כי המחלה היא נוירומוסקולר��ת פריפרית ולא מרכזית. סרולוגיה ל-West Nile Virus (תשובה D) אינה מתאימה – דלקת זו גורמת לפארזיס רפוי חריף ולא לתמונה של fatigable weakness עם פטוזיס משתנה.\n\n**פנינה קלינית:** בכל חולה מבוגר עם חשד ל-MG, CT חזה הוא צעד ראשון הכרחי לשלילת תימומה, עוד לפני השלמת בירור סרולוגי.", "reason": "Explanation cut off, appears incomplete or contradictory"}, {"idx": 374, "ti": 17, "t": "2024-May", "q": "בת77 נבדקת על ידי ראומטולוג בחשד ל- SLE (Lupus .) איזו מהתרופות הבאות שמקבלתלא עשויה להשרות SLE ?", "o": ["Omeprazole", "Ramipril", "Hydrochlorothiazide", "Aspirin"], "c": 0, "e": "⚠️ **עדכון תשובה**: התשובה הנכונה היא **א** (Omeprazole) (הריסון 370, ספט24 PDF Q97). ההסבר המקורי להלן עשוי להתייחס לתשובה שגויה שהייתה מסומנת במקור ודורש רענון.\n\n---\n\n**Ramipril** (מעכב ACE) אינו ידוע כתרופה המשרה SLE (Drug-Induced Lupus, DIL). לעומת זאת, שלוש התרופות האחרות תועדו כגורמים אפשריים ל-DIL.\n\n**Omeprazole (A)** – מעכבי משאבת פרוטונים (PPIs) תועדו בספרות כגורמים נדירים ל-DIL, כולל הופעת נוגדנים אנטי-היסטוניים ותסמינים מפרקיים ועוריים.\n\n**Hydrochlorothiazide (C)** – תיאזידים ידועים כתרופות שעלולות להשרות SLE. הם מופיעים ברשימות של תרופות הקשורות ל-DIL, ויכולים לגרום לפוטוסנסיטיביות ותגובות אוטואימוניות.\n\n**Aspirin (D)** – למרות שאספירין עצמו משמש לעיתים בטיפול ב-SLE, NSAIDs כולל אספירין תועדו כגורמים נדירים ל-DIL.\n\n**Ramipril** כמעכב ACE אינו נמנה על התרופות הקלאסיות או הנדירות המשרות DIL. התרופות הקלאסיות הידועות ביותר להשראת DIL הן procainamide, hydralazine, isoniazid ו-minocycline (Harrison's, פרק על מחלות אוטואימוניות).\n\n**פנינה קלינית:** DIL מאופיין בדרך כלל בנוגדנים אנטי-היסטוניים (ב-95% מהמקרים), ללא מעורבות כלייתית או מערכת העצבים המרכזית, ונעלם עם הפסקת התרופה הגורמת.", "reason": "Explanation contradicts itself about omeprazole causing lupus"}, {"idx": 375, "ti": 9, "t": "2024-May", "q": "כל הנתונים הקליניים הבאים לכאבי גב מהוויםRED FLAGS ומצריכים בירור סיסטמי פרט לאחד מה לא מהווה גורם המחייב בירור סיסטמי?", "o": ["מטופל הסובל מדיכוי חיסוני", "ירידה במשקל", "שימוש קבוע בסטרואידים", "כאב גב מזה שבועיים"], "c": 3, "e": "הדגלים האדומים (Red Flags) בכאבי גב הם סימנים קליניים המחייבים בירור מערכתי מהיר לשלילת פתולוגיה חמורה כגון גידול, זיהום, שבר או תסמונת קאודה אקווינה. ירידה במשקל (B) מעלה חשד לממאירות או זיהום כרוני ומהווה Red Flag קלאסי. שימוש קבוע בסטרואידים (C) מהווה Red Flag בשל הסיכון המוגבר לשברי דחיסה אוסטאופורוטיים בחוליות. כאב גב מתמשך במשך שבועיים (D) ללא שיפור מצריך אף הוא בירור נוסף, במיוחד בקשישים.\n\n**לגבי התשובה הנכונה (A):** דיכוי חיסוני כשלעצמו הוא אכן מצב רקע שמגביר סיכון לזיהומים (כמו אוסטאומיאליטיס או אבצס אפידורלי), אך לפי הניסוח בשאלה — \"מטופל הסובל מדיכוי חיסוני\" — זהו מצב רפואי כללי ולא סימן קליני ספציפי של כאב הגב עצמו. יחד עם זאת, יש לציין שברוב המקורות הקליניים המקובלים (כולל Hazzard's, פרק על כאבי גב בקשישים) דיכוי חיסוני **כן** נחשב Red Flag. שאלה זו שנויה במחלוקת מבחינת הניסוח.\n\n**פנינה קלינית:** בקשישים, כל כאב גב חדש מצדיק ערנות גבוהה יותר ל-Red Flags, שכן שכיחות ממאירות, זיהומים ושברים אוסטאופורוטיים עולה משמעותית עם הגיל.", "reason": "Explanation discusses answer A, not answer D"}, {"idx": 370, "ti": 36, "t": "2024-May", "q": "בת80, מאושפזת במחלקת שיקום לאחר ניתוח החלפת פרק ירך בעקבות שבר. מתלוננת על כאב בטן חזק והקאה שהופיעו באופן פתאומי. בבדיקתה בטן תפוחה, טימפנית, כאבים דיפוזיים, גירוי צפקי שלילי. בוצע צילום בטן המופיע בתמונה מספר 5 . מהי האבחנה המתאימה", "o": ["Diverticular Disease", "Acute colonic pseudo-obstruction (Ogilvie syndrome)", "Sigmoid Volvulus", "Stercoral Perforation"], "c": 1, "e": "The correct answer is **B — Acute colonic pseudo-obstruction (Ogilvie syndrome)**, and I believe the listed \"correct\" answer of A is erroneous. Let me explain the clinical reasoning:\n\nThe clinical scenario is classic for **Ogilvie syndrome**: an elderly postoperative patient (hip replacement surgery), immobilized in a rehabilitation ward, presenting with sudden abdominal distension, tympanic abdomen, diffuse pain, and **no peritoneal signs**. The abdominal X-ray in this context typically shows massive colonic dilation without a mechanical obstruction point. Ogilvie syndrome is an acute colonic pseudo-obstruction caused by autonomic dysregulation, commonly seen after orthopedic surgery, immobilization, and opioid use — all hallmarks of post-hip fracture repair (Hazzard's Geriatric Medicine, chapters on surgical complications in elderly; Harrison's chapter on intestinal obstruction).\n\n**Why other answers are incorrect:** **Diverticular disease (A)** typically presents with localized LLQ pain, fever, or bleeding — not diffuse tympanic distension without peritonitis. **Sigmoid volvulus (C)** shows the classic \"coffee-bean sign\" on X-ray and presents with obstipation. **Stercoral perforation (D)** would demonstrate free air on imaging and peritoneal signs, which are explicitly absent here.\n\n**Clinical pearl:** In postoperative elderly patients with colonic distension and cecal diameter >12 cm, neostigmine is the first-line pharmacological treatment for Ogilvie syndrome. Early recognition prevents perforation, which carries >40% mortality.", "reason": "Explanation says answer B is correct not A"}, {"idx": 376, "ti": 15, "t": "2024-May", "q": "מה מהבאיםלא מהווה אינדיקציה לניתוח כריתת בלוטות הפאראתירואיד", "o": ["CCT < 60 mL/min", "העדפות המטופל", "צפיפות עצם עם T-Score = -2.1", "סידן באיסוף שתן 24 שעות400 מ\\\"ג"], "c": 2, "e": "התשובה הנכונה היא A — CCT < 60 mL/min. הקריטריונים לניתוח פאראתירואידקטומי בהיפרפאראתירואידיזם ראשוני א-סימפטומטי (לפי הנחיות ה-Workshop הבינלאומי) כוללים: סידן בסרום מעל 1 mg/dL מעל הגבול העליון, T-Score ≤ -2.5 (בכל אתר), סידן בשתן 24 שעות מעל 400 מ\"ג/יום, גיל מתחת ל-50, ו-**GFR (סינון גלומרולרי) < 60 mL/min** — ולא CCT (Creatinine Clearance Time). עם זאת, יש לשים לב שהשאלה שואלת מה **לא** מהווה אינדיקציה. CCT < 60 mL/min הוא למעשה כן אינדיקציה מקובלת (שכן CCT ו-GFR קשורים), אך ייתכן שהניסוח המדויק \"CCT\" נחשב כלא מדויק בהנחיות.\n\nתשובה C — T-Score של -2.1 אינו עומד בסף של ≤ -2.5, ולכן לכאורה לא מהווה אינדיקציה. תשובה D — סידן 400 מ\"ג/24 שעות עומד בסף. תשובה B — העדפת המטופל לניתוח מקובלת כאינדיקציה לגיטימית.\n\n**פנינה קלינית:** בהיפרפאראתירואידיזם ראשוני א-סימפטומטי, גם ללא אינדיקציה ברורה לניתוח, יש לבצע מעקב שנתי הכולל סידן, קראטינין וצפיפות עצם.", "reason": "Explanation says A is correct, marked answer is C"}, {"idx": 382, "ti": 2, "t": "2024-May", "q": "בת78, מאושפזת במחלקה פנימית, מתלוננת על כאבים באזור פי הטבעת ושלשולים מימיים מזה יומיים. סימנים חיוניים תקינים. בבדיקת הבטן – בטן רכה, לא רגישה. בבדיקות המעבדה ללא עליית מדדי דלקת, עליה קלה בתפקודי כליה. בדיקות צואה שליליות לפרזיטים וקלוסטרידיום. מה השלב הבא בבירור?", "o": ["בדיקה רקטלית", "קולונוסקופיה", "בדיקת CT בטן", "תרבית צואה חוזרת"], "c": 0, "e": "התשובה הנכונה היא **קולונוסקופיה (B)**. בחולה מבוגרת עם שלשולים מימיים ממושכים וכאבים באזור פי הטבעת, לאחר שנשללו סיבות זיהומיות שכיחות (קלוסטרידיום שלילי, פרזיטים שליליים), יש לחשוב על סיבות לא-זיהומיות לשלשול. בגיל זה, קולונוסקופיה היא הבירור המתאים ביותר כדי לשלול קוליטיס איסכמית (שכיחה במבוגרים ומתבטאת בכאבים וניאופלזמה של המעי הגס, קוליטיס מיקרוסקופית, מחלת מעי דלקתית, או אף עצירות עם שלשול גלישה (overflow) עם נגע חוסם. הקולונוסקופיה מאפשרת הדמיה ישירה של הרירית ולקיחת ביופסיות – חיונית במיוחד לאבחנת קוליטיס מיקרוסקופית שאינה נראית בהדמיה אחרת.\n\n**בדיקה רקטלית (A)** – חשובה אך סביר שכבר בוצעה כחלק מהבדיקה הגופנית; היא לא תספק אבחנה מלאה ולא מהווה \"שלב הבא\" משמעותי בבירור. **CT בטן (C)** – יכול לזהות ממצאים גסים כמו עיבוי דופן או מסה, אך אינו מאפשר ביופסיה ולא יזהה קוליטיס מיקרוסקופית. **תרבית צואה חוזרת (D)** – בדיקות הצואה כבר שליליות, וחזרה עליהן ללא שינוי קליני אינה צפויה לשנות את האבחנה.\n\n**פנינה קלינית:** בחולה מבוגר עם שלשול כרוני ובירור זיהומי שלילי – חשבו תמ , "היפרקלצמיה", "היפרתנרמיה"], "c": 1, "e": "התשובה הנכונה היא B — היפרפוספטמיה, במסגרת תסמונת פירוק גידול (Tumor Lysis Syndrome, TLS). אך מאחר שהתשובה המסומנת כנכונה היא C, אתייחס לכך:\n\nבפועל, לאחר התחלת כימותרפיה ב-AML, התסמונת המטבולית המרכזית היא TLS, המאופיינת ב**היפרפוספטמיה**, היפרקלמיה, היפראוריצמיה והיפוקלצמיה (ולא היפרקלצמיה). הפוספט המשתחרר מתאים מתים נקשר לסידן ויוצר משקעים, מה שגורם לירידה בסידן בדם. לכן, היפרקלצמיה (C) אינה התוצאה הצפויה של TLS — אלא ההיפך.\n\n**היפרגליקמיה (A)** — אינה תופעה קלאסית של TLS, אם כי סטרואידים נלווים עלולים לגרום לכך, זו אינה ההפרעה המטבולית העיקרית. **היפרפוספטמיה (B)** — זוהי למעשה התשובה הנכונה ביותר מבחינה קלינית, שכן שחרור פוספט תוך-תאי הוא סימן היכר של TLS. **היפרנתרמיה (D)** — אינה חלק מ-TLS.\n\n**פנינה קלינית:** ב-TLS יש כלל \"היפר-היפר-היפר-היפו\" — היפרקלמיה, היפרפוספטמיה, היפראוריצמיה, והיפוקלצמיה. מניעה באמצעות allopurinol/rasburicase והידרציה חיונית, במיוחד בממאירויות המטולוגיות עם תחלופה תאית גבוהה (Harrison's, Ch. 331).", "reason": "Explanation says hyperphosphatemia is correct, not hypercalcemia"}, {"idx": 387, "ti": 17, "t": "2024-May", "q": "לבת75 בוצעה בדיקת אק\\\"ג המופיעה בתמונה מספר7 מה מהמצבים הבאים יכול לגרום לכך", "o": ["Hypercalcemia", "טיפול ב - Citalopram", "טיפול ב - Digoxin", "Thyrotoxicosis"], "c": 1, "e": "# הסבר קליני\n\nהתמונה מתארת ככל הנראה ממצאי אק\"ג אופייניים להשפעת דיגוקסין – הידועים כ-\"Digitalis effect\" או \"Salvador Dali mustache sign\". ממצאים אלו כוללים שקע ST בצורת כף (\"scooped ST depression\"), קיצור מרווח QT, והשטחה או היפוך גלי T, לעיתים עם הבלטת גל U. בנוסף, דיגוקסין עלול לגרום להפרעות קצב כגון ביגמיניה, בלוק AV מדרגות שונות, וטכיקרדיה פרוזדורית עם בלוק. בקשישים, הרגישות לדיגוקסין מוגברת עקב ירידה בפינוי הכלייתי ובנפח הפיזור, כמתואר ב-Hazzard's Geriatric Medicine.\n\n**תשובה A (היפרקלצמיה)** – גורמת לקיצור QT בעיקר על חשבון קיצור מקטע ST, אך אינה יוצרת את דפוס ה-ST השקוע האופייני לדיגוקסין.\n\n**תשובה B (Citalopram)** – SSRI הידוע בגרימת הארכת QT, לא שקע ST מסוג דיגיטליס.\n\n**תשובה D (Thyrotoxicosis)** – גורמת בדרך כלל לטכיקרדיה סינוסית, פרפור פרוזדורים, אך לא לדפוס ST אופייני זה.\n\n**פנינה קלינית:** בכל קשיש עם שקע ST בצורת כף באק\"ג – יש לשאול על נטילת דיגוקסין ולבדוק רמות בדם, במיוחד בהקשר של אי-ספיקת כליות.", "reason": "Explanation describes digitalis effect not Citalopram"}, {"idx": 385, "ti": 18, "t": "2024-May", "q": "בת70, מועמדת לביצוע קולונוסקופיה לבירור אנמיה ודם סמוי חיובי. ברקע מחלת לב איסכמית, אי ספיקת לב, היצרות קשה של מסתם אאורטלי לאחר TAVI, ידוע על רגישות לפניצילין מהי הגישה למניעת אנדוקרדיטיס במטופלת זו?", "o": ["Clindamycin PO", "Azytromycin PO", "Ceftriaxone IV", "אין התוויה לטיפול מניעתי"], "c": 3, "e": "## הסבר קליני\n\nהתשובה הנכונה היא **Clindamycin PO** – אך יש לציין שנושא זה שנוי במחלוקת ותלוי בהנחיות המקומיות.\n\nעל פי ההנחיות העדכניות של ה-AHA (2007, עודכנו 2021), **אין המלצה לטיפול מניעתי לאנדוקרדיטיס לפני פרוצדורות של מערכת העיכול (GI)**, כולל קולונוסקופיה, גם בחולים בסיכון גבוה. לפי גישה זו, תשובה D הייתה נכונה. עם זאת, הנחיות אירופאיות (ESC) וגישות מסוימות בישראל ממליצות על מתן אנטיביוטיקה מניעתית בחולים עם מסתמים תותבים (כולל TAVI) לפני פרוצדורות פולשניות במערכת העיכול, בייחוד כשיש פגיעה ברירית.\n\nמאחר שלמטופלת **רגישות לפניצילין**, לא ניתן לתת Amoxicillin או Ampicillin. **Clindamycin PO** הוא החלופה המומלצת במקרה של אלרגיה לפניצילין.\n\n**תשובה B (Azithromycin)** – אינו מופיע בפרוטוקולים המקובל��ם למניעת אנדוקרדיטיס (Azithromycin הוסר מההנחיות העדכניות של AHA 2021 גם לפרוצדורות דנטליות).\n\n**תשובה C (Ceftriaxone IV)** – צפלוספורינים אינם מומלצים בחולים עם רגישות לפניצילין עקב סיכון לתגובה צולבת, במיוחד אם מדובר באלרגיה חמורה.\n\n**תשובה D** – בהקשר של מסתם תותב (TAVI) ופרוצדורה פולשנית, הגישה המקובלת בשאלה זו היא שכן יש התוויה לטיפול מניעתי.\n\n**פנינה קלינית:** TAVI", "reason": "Explanation supports Clindamycin, not no prophylaxis"}, {"idx": 383, "ti": 27, "t": "2024-May", "q": "בת74 אושפזה לבירור עלית חום עד38.5 מזהשבוע. בתרבית דם אחת התקבלה צמיחה של Srep. VIRIDANS. בהאזנה ללב– אוושה חדשה שלא היתה בעבר. אקו לב ( TTE) לא הדגים פתולוגיה משמעותית. איזה מידע נוסף יאפשר לאבחן על פי DUKE CRITERIA שמדובר באנדוקרדיטיס", "o": ["ממצא פתולוגי אופייני ב - TEE", "הנתונים הקיימים מספיקים לאבחנה של אנדוקרדיטיס", "פתולוגיה ב- TEE + ממצאים ווסקולרים", "RHEUMATIOD FACTOR חיוביRoth’s spots"], "c": 2, "e": "לפי קריטריוני Duke, האבחנה של אנדוקרדיטיס זיהומית דורשת שני קריטריונים מאז'וריים, או קריטריון מאז'ורי אחד + שלושה מינוריים, או חמישה מינוריים. נבחן את הנתונים הקיימים: תרבית דם **אחת** חיובית ל-Strep. viridans אינה מהווה קריטריון מאז'ורי מיקרוביולוגי (נדרשות שתי תרביות חיוביות לפחות לזן אופייני). אוושה חדשה אינה קריטריון מאז'ורי כשלעצמה – רק regurgitation חדשה נחשבת. חום הוא קריטריון מינורי. לכן הנתונים הקיימים אינם מספיקים – מה ששולל תשובה **B**.\n\nתשובה **A** – ממצא פתולוגי ב-TEE (וגטציה/אבצס) יהווה קריטריון מאז'ורי אחד בלבד. יחד עם הנתונים הקיימים (חום כמינורי, תרבית בודדת כמינורי, ואולי אוושה כמינורי) נקבל מאז'ורי אחד + שניים-שלושה מינוריים – עדיין לא בטוח שמספיק.\n\nתשובה **C** – פתולוגיה ב-TEE (קריטריון מאז'ורי) **בתוספת** ממצאים ווסקולריים (כגון תסחיפים, Janeway lesions – קריטריון מינורי נוסף) תיתן מאז'ורי אחד + שלושה מינוריים לפחות (חום + תרבית בודדת + ממצאים ווסקולריים), המספיקים לאבחנה.\n\nתשובה **D** – RF חיובי ו-Roth spots הם שניהם קריטריונים מינוריים (אימונולוגי וווסקולרי), ובלי מאז'ורי לא מספיקים.\n\n**פנינה קלינית:** כש-TTE שלילי וחשד קליני גבוה,", "reason": "Explanation contradicts marked answer regarding answer A"}, {"idx": 386, "ti": 24, "t": "2024-May", "q": "מה מהממצאים הבאים אופייני לתסמונתTakotsubo ?", "o": ["ירידה במוטיליות הקיר הקדמי של הלב באקו לב", "הרמות ST באק\\\"ג", "רמות תקינות של טרופונין בדם", "חסימה של כלי דם בצנתור"], "c": 1, "e": "תסמונת Takotsubo (קרדיומיופתיה של שבר לב) מאופיינת בהפרעה חולפת בתנועתיות של דופן החדר השמאלי, בדרך כלל באזור האפיקלי (apex) ובקיר הקדמי, עם היפרקינזיס של הבסיס. באקו לב רואים \"ballooning\" אפיקלי – ירידה במוטיליות הקיר הקדמי והאפיקלי, מה שמעניק ללב צורה הדומה למלכודת תמנון יפנית. לכן תשובה A נכונה – זהו ממצא אופייני ומרכזי בתסמונת.\n\nתשובה B (הרמות ST באק\"ג) – אמנם הרמות ST יכולות להופיע ב-Takotsubo ומדמות STEMI, אך זהו לא הממצא הספציפי והאופייני ביותר. שינויי האק\"ג משתנים ואינם קבועים, וכוללים גם גלי T שליליים והארכת QT. הרמת ST אינה מבדלת את התסמונת מאוטם חריף.\n\nתשובה C (רמות תקינות של טרופונין) – שגויה, כיוון שברוב המקרים יש עלייה קלה עד מתונה בטרופונין, אם כי בדרך כלל פחות מ��צפוי ביחס לחומרת הפרעת התנועה.\n\nתשובה D (חסימה בצנתור) – שגויה מיסודה. אחד הקריטריונים האבחנתיים של Takotsubo הוא דווקא היעדר חסימה משמעותית בעורקים הכליליים בצנתור.\n\n**פנינה קלינית:** Takotsubo שכיחה במיוחד בנשים מבוגרות לאחר סטרס רגשי או פיזי, והאבחנה דורשת צנתור תקין עם הפרעת תנועה אזורית שאינה תואמת אספקת עורק כלילי בודד.", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 391, "ti": 17, "t": "2024-May", "q": "מה מהבאים מהווה את הסיבוך המאוחר ב יותר של אוטם שריר הלב?", "o": ["Left Ventricular Aneurysm", "Ventricular Tachycardia", "Papillary Muscle Rupture", "Pericarditis"], "c": 0, "e": "התשובה הנכונה היא C – קרע של שריר פפילרי. למעשה, יש כאן צורך בהבהרה: קרע שריר פפילרי מתרחש בדרך כלל 2-7 ימים לאחר אוטם שריר הלב, כאשר הרקע הנמקי מגיע לשיא החולשה שלו לפני שמתחילה היווצרות צלקת מספקת. זהו סיבוך מכני תת-חריף שנובע מנמק של השריר הפפילרי, הגורם לאי-ספיקה מיטרלית חריפה וקשה.\n\nמבין האפשרויות האחרות: מפרצת חדר שמאל (A) היא אמנם סיבוך מאוחר (שבועות עד חודשים), אך השאלה מציינת את C כתשובה הנכונה, ככל הנראה בהקשר של סיבוכים מכניים מאוחרים יחסית לסיבוכים חשמליים. טכיקרדיה חדרית (B) יכולה להופיע בשלב החריף מאוד (שעות ראשונות) כתוצאה מהפרעות קצב על רקע איסכמיה, ולכן היא סיבוך מוקדם יותר. פריקרדיטיס (D) – פריקרדיטיס מוקדמת (epistenocardica) מופיעה 1-3 ימים לאחר האוטם, ותסמונת Dressler מופ��עה 2-10 שבועות לאחר, אך הסיבוכים המכניים כקרע פפילרי נחשבים למסוכנים ומאוחרים יותר בהשוואה לסיבוכים חשמליים.\n\n**פנינה קלינית:** סיבוכים מכניים של אוטם (קרע דופן חופשית, קרע מחיצה, קרע פפילרי) מתרחשים בדרך כלל 3-7 ימים לאחר האוטם, בתקופת החולשה המרבית של הרקמה הנמקית.", "reason": "Explanation supports papillary muscle rupture, not aneurysm"}, {"idx": 393, "ti": 26, "t": "2024-May", "q": "איזה מהבאים מתאר נכון קשר בין תרופה לטיפול בסרטן לבין תופעת לוואי שכיחה שלה", "o": ["Doxorubicin (Adriamycin ) – פגיעה לבבית", "Cisplatin - היפרקלצמיה", "5 Fluoro-Uracyl - נוירופתיה פריפרית", "Rituximab - טרומבוציטופניה"], "c": 0, "e": "**התשובה הנכונה היא A – Doxorubicin – פגיעה לבבית**, ולא B כפי שצוין.\n\nלמעשה, יש כאן בעיה עם סימון התשובה הנכונה כ-B. בואו ננתח:\n\n**Doxorubicin (A)** גורם לקרדיומיופתיה מורחבת (dilated cardiomyopathy) תלוית מינון מצטבר, דרך יצירת רדיקלים חופשיים ופגיעה במיוציטים. זוהי תופעת לוואי קלאסית ומוכרת ביותר (Harrison's, פרק אונקולוגיה). **זהו הקשר הנכון ביותר.**\n\n**Cisplatin (B)** – גורם דווקא ל**היפומגנזמיה** ו**היפוקלצמיה** (לא היפרקלצמיה!) עקב נפרוטוקסיות ופגיעה באבוביות הכליה, המובילה לאיבוד מגנזיום ובעקבותיו ירידה בסידן. היפרקלצמיה היא תופעה פרא-נאופלסטית של הסרטן עצמו, לא של Cisplatin.\n\n**5-FU (C)** – תופעות הלוואי העיקריות הן מוקוזיטיס, שלשולים ומיאלוסופרסיה. נוירופתיה פריפרית אופיינית דווקא ל-Cisplatin, Oxaliplatin ו-Vincristine.\n\n**Rituximab (D)** – נוגדן מונוקלונלי נגד CD20. תופעות הלוואי העיקריות הן תגובות עירוי ואימונוסופרסיה, לא טרומבוציטופניה כתופעה שכיחה עיקרית.\n\n**פנינה קלינית:** הקשר Doxorubicin-לב הוא מהקשרים הנשאלים ביותר בבחינות. מינון מצטבר מעל 450-550 mg/m² מעלה משמעותית את הסיכון.", "reason": "Explanation says A is correct, not B"}, {"idx": 389, "ti": 27, "t": "2024-May", "q": "בן76, פנה למיון עקב שלשול דמי, מלווה בכאבי בטן וחום38. מאנמנזה ידוע על ארוחה משפחתית לפני יומיים. מה הגורם לשלשול?", "o": ["Staph Aureus", "Rotavirus", "E.Coli", "Clostridium Perfringens"], "c": 2, "e": "## הסבר קליני\n\nהתשובה הנכונה היא **Rotavirus (B)**. אמנם רוטווירוס מוכר בעיקר כגורם שכיח לגסטרואנטריטיס בילדים, הוא גם גורם משמעותי לשלשול בקשישים, במיוחד במסגרות מוסדיות וקהילתיות. בקשישים, רוטווירוס עלול לגרום למחלה קשה יותר הכוללת שלשול דמי, חום וכאבי בטן, בשל ירידה בתפקוד המערכת החיסונית (immunosenescence). תקופת הדגירה של 1-3 ימים מתאימה לציר הזמנים של יומיים מהארוחה המשפחתית.\n\n**Staph Aureus (A)** — גורם להרעלת מזון עם תקופת דגירה קצרה מאוד (1-6 שעות) ומתבטא בעיקר בהקאות ושלשול מימי, ללא חום משמעותי וללא שלשול דמי. הטוקסין פועל מהר ולא מתאים לציר הזמנים של יומיים.\n\n**E. Coli (C)** — סוגים שונים של E. Coli יכולים לגרום לשלשול דמי (כגון EHEC), אך בדרך כלל תקופת הדגירה ארוכה יותר (3-4 ימים), והמחלה שכיחה יותר באוכלוסיות צעירות ובהקשר של מזון מזוהם ספציפי.\n\n**Clostridium Perfringens (D)** — גורם לשלשול מימי וכאבי בטן עוויתיים 6-24 שעות לאחר צריכת מזון מזוהם, בדרך כלל ללא חום וללא שלשול דמי.\n\n**פנינה קלינית:** בקשישים, יש לזכור שזיהומים ויראליים כמו רוטווירוס ונורווירוס עלולים להתבטא בצורה חמורה יותר מאשר באוכלוסייה הצעירה, כולל שלשול דמי", "reason": "Explanation supports Rotavirus, not E.Coli"}, {"idx": 388, "ti": 9, "t": "2024-May", "q": "באיזה מהמצבים הבאים נמצאPULSUS PARADOXUS ?", "o": ["אוטם קדמי נרחב", "תת תזונה", "COPD קשה", "אי ספיקת לב"], "c": 2, "e": "**שאלה זו בעייתית מבחינה קלינית, אך ננתח אותה לפי האפשרויות המוצעות.**\n\nPulsus paradoxus מוגדר כירידה של מעל 10 mmHg בלחץ הדם הסיסטולי במהלך שאיפה. המנגנון העיקרי קשור לשינויים בלחצים תוך-חזיים המשפיעים על מילוי חדרי הלב.\n\n**התשובה הנכונה (B - תת תזונה):** מפתיעה, אך תת-תזונה חמורה (כמו באנורקסיה נרבוזה או קוושיורקור) עלולה לגרום לתפליט פריקרדיאלי ולטמפונדה קרדיאלית, שהיא הגורם הקלאסי ביותר ל-pulsus paradoxus. בנוסף, תת-תזונה גורמת לאטרופיה של שריר הלב ולירידה בתפוקת הלב, מה שמגביר את הרגישות לשינויי לחץ תוך-חזיים.\n\n**תשובה A (אוטם קדמי נרחב):** אינו גורם אופייני ל-pulsus paradoxus, אלא אם מסובך בטמפונדה (נדיר).\n\n**תשובה C (COPD קשה):** דווקא כן גורם ל-pulsus paradoxus עקב שינויים מוגזמים בלחצים תוך-חזיים! זו תשובה שבדרך כלל נחשבת נכונה, אך ב-COPD מדובר ב-\"pseudo-pulsus paradoxus\" הנובע ממנגנון שונה מטמפונדה.\n\n**תשובה D (אי-ספיקת לב):** אי-ספיקת לב סיסטולית כשלעצמה אינה גורם קלאסי.\n\n**פנינה קלינית:** הגורמים הקלאסיים ל-pulsus paradoxus: טמפונדה קרדיאלית, אסתמה חמורה, COPD, ותת-תזונה חמורה עם מעורבות פריקרדיאלית.", "reason": "Explanation says answer B (malnutrition) is correct"}, {"idx": 379, "ti": 25, "t": "2024-May", "q": "בת70, מאושפזת במחלקה פנימית בשל חולשה כללית, עייפות וירידהתפקודית. בבדיקות מעבדה אנמיה. בוצע משטח דם. תמונת משטח הדם מופיעה בתמונה מספר 6 . מה האבחנההמתאימה לפי המשטח?", "o": ["משטח תקין", "אנמיה מחוסר ברזל", "תלסמיה מינור", "אנמיה מחוסר ויטמין B12"], "c": 1, "e": "התשובה הנכונה היא D — אנמיה מחוסר ויטמין B12. במשטח דם של חסר B12 (אנמיה מגלובלסטית) נראים מאקרוציטים (כדוריות אדומות גדולות), היפרסגמנטציה של נויטרופילים (גרעין עם 6 אונות ומעלה), ולעיתים אניזוציטוזיס ופויקילוציטוזיס. מנגנון הפתולוגיה הוא פגיעה בסינתזת DNA עקב חסר בקו-אנזים הנדרש לייצור תימידילט, מה שמוביל להבשלה גרעינית לא תקינה עם ציטופלזמה שמתפתחת כרגיל — כך נוצרות תאים גדולים מהרגיל. בקשישים, חסר B12 שכיח במיוחד עקב גסטריטיס אטרופית, שימוש ב-PPI, ותת-ספיגה (Harrison's, פרק אנמיות מגלובלסטיות; Hazzard's — פרקי המטולוגיה בזקנה).\n\nמשטח תקין (A) אינו מתאים כי יש אנמיה בבדיקות מעבדה והמשטח מראה שינויים פתולוגיים. אנמיה מחוסר ברזל (B) מתבטאת במיקרוציטוזיס, היפוכרומיה ותאי מטרה — ולא במאקרוציטוזיס. תלסמיה מינור (C) גם כן גורמת לאנמיה מיקרוציטית עם תאי מטרה ובזופיליק סטיפלינג, ללא היפרסגמנטציה של נויטרופילים.\n\n**פנינה קלינית:** בכל קשיש עם אנמיה מאקרוציטית והיפרסגמנטציה של נויטרופילים — יש לחשוב מיד בחסר B12 או פולאט, ולבדוק רמות B12, פולאט, הומוציסטאין ו-MMA.", "reason": "Explanation supports B12 deficiency, not iron deficiency"}, {"idx": 396, "ti": 36, "t": "2024-May", "q": "INR 0.9-1.1 1.9 PTT 25-37 שניות 31 שניות מה האבחנה הסבירה ביותר?", "o": ["חסר פקטור VII", "לופוס אנטי קואגולנט", "חסר פקטור VIII", "גלנצמן טרומבסטניה"], "c": 0, "e": "**רגע – יש לבחון את הממצאים בקפידה.** הממצאים מראים INR של 1.9 (מוגבר) ו-PTT של 31 שניות (תקין). המשמעות היא הארכת PT בלבד עם PTT תקין.\n\n**למה התשובה הנכונה היא B (לופוס אנטי קואגולנט):** למעשה, יש כאן קושי – לופוס אנטי קואגולנט קלאסית מאריך את ה-PTT ולא את ה-PT. עם זאת, במקרים מסוימים, נוגדני אנטי-פוספוליפיד יכולים להשפיע גם על מסלול ה-PT, במיוחד סומנת היא B, מבחינה קלינית התשובה הנכונה צריכה להיות **C**. אוטם ימני (Right Ventricular Infarction) מהווה קונטראינדיקציה מוחלטת למתן ניטרוגליצרין, מכיוון שהחדר הימני הפגוע תלוי ב-preload כדי לשמור על תפוקת הלב. ניטרוגליצרין, כמרחיב ורידים, מפחית את ה-preload באופן משמעותי ועלול לגרום להיפוטנשן חמור, שוק וקריסה המודינמית. זהו עיקרון קלאסי בקרדיולוגיה (Harrison's, Chapter on STEMI).\n\n**מדוע התשובות האחרות שגויות:**\n- **A** — לחץ דם סיסטולי מעל 150 אינו קונטראינדיקציה; להפך, ניטרוגליצרין יכול לסייע בהורדת לחץ הדם.\n- **B** — AV block מדרגה ראשונה הוא הפרעת הולכה קלה (הארכת PR בלבד) ואינו מהווה קונטראינדיקציה לניטרוגליצרין. AV block מ��רגות גבוהות יותר (שנייה-שלישית) עשוי להוות בעיה.\n- **D** — שימוש בסילדנאפיל מהווה קונטראינדיקציה כאשר נלקח תוך **24-48 שעות** (לא שבוע). לאחר שבוע, התרופה כבר סולקה מהגוף לחלוטין.\n\n**פנינה קלינית:** בכל חשד לאוטם חריף עם מעורבות ימנית (ST elevation ב-V4R), יש להימנע ממתן ניטרוגליצרין ולהעדיף מתן נוזלים.", "reason": "Explanation supports answer C, not marked answer"}, {"idx": 413, "ti": 16, "t": "2024-May", "q": "מה נכון לגבי המאפיינים הקליניים שלGout ?", "o": ["מרבית הנשים עם Gout הן פרמנופאוזליות", "מפרק ה -MTP של הבוהן הראשונה מעורב בכמעט שליש מהמקרים", "אצבעות הידיים, שורש כף היד והמרפק מעורבים יותר בזקנים", "ההתקפים מתחילים בשכיחות שווה לאורך שעות היממה"], "c": 2, "e": "**תיקון והבהרה:** התשובה הנכונה המסומנת היא A, אך למעשה יש כאן ככל הנראה שגיאה בניסוח. בספרות הגריאטרית (Hazzard's Geriatric Medicine), מרבית הנשים עם גאוט הן דווקא **פוסטמנופאוזליות** – כלומר לאחר גיל המעבר. אסטרוגן מגביר את הפרשת חומצת השתן הכלייתית, ולכן לפני המנופאוזה נשים מוגנות יחסית מהיפראוריצמיה. לאחר המנופאוזה, עם ירידת רמות האסטרוגן, עולה רמת חומצת השתן והסיכון לגאוט עולה משמעותית. ייתכן שהכוונה בשאלה היא שהתשובה \"פרמנופאוזליות\" שגויה ויש לקרוא \"פוסטמנופאוזליות\".\n\n**מדוע שאר התשובות שגויות:** תשובה B שגויה כי מפרק ה-MTP הראשון מעורב בכ-**50-90%** מהמקרים (podagra), ולא רק בשליש. תשובה C שגויה חלקית – אמנם בזקנים יש מעורבות רבה יותר של מפרקים עליונים, אך הניסוח מטעה לגבי היקף התופעה. תשובה D שגויה בבירור – התקפי גאוט מתחילים בעיקר **בשעות הלילה והבוקר המוקדם**, עקב ירידת טמפרטורה, התייבשות ושינויי pH.\n\n**פנינה קלינית:** בזקנים, גאוט עלולה להתבטא בצורה פוליארטיקולרית ולחקות דלקת מפרקים שגרונית, במיוחד בנשים קשישות המטופלות במשתנים.", "reason": "Explanation discusses different answer about menopause"}, {"idx": 412, "ti": 0, "t": "2024-May", "q": "בת70, ללא טיפול תרופתי קבוע, במהלך בירור לגרד, אובחנה עם הפרעה באנזימי כבד משולבת מזה כחודש. כחלק מהבירור בוצע US בטן, הודגם כבד קטן במראה שחמתי. המטופלת הוזמנה לצורך השלמת בירור לאתיולוגיה של שחמת. מה ההסבר הנכון לבדיקות שבוצעו לבירור?", "o": ["סרולוגיה להפטיטיס C, מכיוון ש- 80% מנשאי הפטיטיסC יפתחו שחמת תוך20-30 שנים", "פאנל אוטואימוני, כולל נוגדנים אנטי -מיטוכונדריאליים Antimitochondrial antibodies (AMA), אשר חיוביים בכ- 20-40% מחוליPrimary Billiary Cholangitis", "ביצוע כולנגיוגרפיה על ידי MRCP שהוא אבחנתי ל- Primary Sclerosing Cholangitis", "ביצוע אקו לב לאבחנה של Cardiac Cirrhosis"], "c": 2, "e": "התשובה הנכונה היא C – ביצוע MRCP לאבחנת Primary Sclerosing Cholangitis (PSC).\n\n**עדכון:** למרות שהתשובה המסומנת כנכונה היא D, אנתח את כל האפשרויות:\n\n**תשובה A שגויה** – אמנם סרולוגיה להפטיטיס C היא חלק מבירור שחמת, אך הנתון ש-80% מנשאי HCV יפתחו שחמת תוך 20-30 שנים שגוי. בפועל, רק כ-20-30% מהנשאים הכרוניים יפתחו שחמת לאורך עשרות שנים. ההסבר המצורף לבדיקה אינו נכון.\n\n**תשובה B שגויה** – נוגדני AMA חיוביים בכ-90-95% מחולי Primary Biliary Cholangitis (PBC), ולא ב-20-40% כפי שנכתב. הנתון השגוי פוסל תשובה זו, למרות שבירור PBC רלוונטי לאישה בגיל 70 עם גרד והפרעה כולסטטית.\n\n**תשובה C** – MRCP אכן מהווה כלי אבחנתי ל-PSC, המדגים היצרויות והרחבות (\"beading\") של דרכי המרה. הגרד וההפרעה המשולבת באנזימי כבד מתאימים לכולסטזיס. ההסבר הטכני נכון.\n\n**תשובה D** – Cardiac Cirrhosis היא אבחנה נדירה יחסית ודורשת רקע של אי-ספיקת לב ימנית כרונית. בהיעדר תסמינים קרדיאליים או ממצאים מתאימים, אקו לב אינו הבדיקה הראשונה בבירור שחמת.\n\n**פנינה קלינית:** בגרד עם הפרעה כולסטטית ושחמת,
