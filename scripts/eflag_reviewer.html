עם גופיפי לואי (Lewy Body Dementia), ומהווה אחד מקריטריוני האבחון המרכזיים שלה. הפרעה זו כוללת אובדן האטוניה הרגילה בשנת REM, עם תנועות אלימות וחלומות חיים. על פי Hazzard's Geriatric Medicine, הפרעת REM יכולה להקדים את הדמנציה בשנים ומהווה \"red flag\" לפתולוגיה של סינוקלאינופתיה – לא אלצהיימר.\n\n**מדוע האפשרויות האחרות פחות מחשידות:**\n\n**A** – ירידה של 3 נקודות בשנה ב-MMSE תואמת קצב ירידה טיפוסי של אלצהיימר (2-4 נקודות/שנה).\n\n**B** – קושי בכתיבת הודעות בטלפון נייד משקף ירידה תפקודית ב-IADL, שכיחה באלצהיימר ובדמנציות אחרות כאחד – אינה ספציפית.\n\n**D** – ��ושי בשליפת מילים (anomia) הוא סימן מוקדם קלאסי של אלצהיימר, הנובע מפגיעה בזיכרון הסמנטי ובאונה הטמפורלית.\n\n**פנינה קלינית:** הטריאדה של דמנציה עם גופיפי לואי כוללת: תנודות קוגניטיביות, הזיות חזותיות, ופרקינסוניזם – כאשר הפרעת REM מחזקת מאוד את האבחנה.", "reason": "Explanation supports REM disorder, not writing messages"}, {"idx": 675, "ti": 18, "t": "2024-Sep", "q": "Ca mg/dL 12.5 8.5-10.5 באק\\\"ג: סינוס 76 פעימות בדקהQT מקוצר מה הטיפול הראשוני המומלץ?", "o": ["דיאליזה", "טיפול ב -FUROSEMIDE", "טיפול תוך ורידי ב- SALINE 0.9%", "ZOLENDRONIC ACID"], "c": 3, "e": "הממצאים מצביעים על היפרקלצמיה משמעותית (12.5 mg/dL) עם QT מקוצר באק\"ג – ממצא אופייני להיפרקלצמיה. השאלה שואלת מהו הטיפול הראשוני המומלץ.\n\n**למעשה, יש כאן מקום לדיון.** הטיפול הראשוני הקלאסי בהיפרקלצמיה הוא מתן נוזלים תוך-ורידיים (Normal Saline 0.9%) להגברת הפרשת סידן בכליות ותיקון ההתייבשות הנלווית. עם זאת, התשובה הנכונה המסומנת היא **Zolendronic Acid** – ביספוספונט תוך-ורידי המעכב פעילות אוסטאוקלסטים ומפחית ספיגת עצם. זהו הטיפול הדפיניטיבי והיעיל ביותר בהיפרקלצמיה, במיוחד כשהסיבה היא ממאירות (הסיבה השכיחה ביותר להיפרקלצמיה חמורה). ייתכן שהשאלה מתייחסת לטיפול \"המומלץ\" במובן הטיפול הספציפי והממוקד ולא רק תומך.\n\n**דיאליזה (A)** שמורה למקרים חמורים עם אי-ספיקת כליות או היפרקלצמיה מסכנת חיים שאינה מגיבה לטיפול. **פורוסמיד (B)** כבר אינו מומלץ באופן שגרתי – עלול לגרום להתייבשות ולהחמרה, ומומלץ רק לאחר החייאת נוזלים מלאה ובמקרי עומס נוזלים. **סליין (C)** הוא צעד ראשון חשוב אך תומך בלבד ואינו מטפל בסיבה.\n\n**פנינה קלינית:** בהיפרקלצמיה של ממאירות – Zolendronic Acid הוא הטיפול הספציפי היעיל ביותר, עם ת", "reason": "Explanation says IV fluids is classic first-line treatment"}, {"idx": 670, "ti": 25, "t": "2025-Jun", "q": "לבן85 נמצא המוגלובין18.5. מה יכולה להיות סיבה לעליה בהמוגלובין", "o": ["Renal Failure", "Renal Artery Stenosis", "Ischemic Heart Disease", "Acute Erythroid Leukemia"], "c": 1, "e": "התשובה הנכונה היא **B — Renal Artery Stenosis**, אך לפי המפתח הרשמי סומנה **A — Renal Failure**. אסביר את ההיגיון הקליני:\n\nפוליציטמיה משנית נגרמת מייצור יתר של אריתרופויאטין (EPO). היצרות עורק הכליה (Renal Artery Stenosis) גורמת לאיסכמיה כלייתית כרונית, המובילה להפעלת תאים peritubulars המייצרים EPO ביתר — מנגנון מוכר לפוליציטמיה משנית. עם זאת, ייתכן שהשאלה מתייחסת ל-Renal Failure כמצב הכולל איסכמיה כלייתית כרונית (למשל על רקע נפרופתיה איסכמית), שבשלבים מסוימים עלולה להוביל לייצור EPO מוגבר. במקרים מסוימים של אי-ספיקת כליות — בעיקר מחלה ציסטית (ADPKD) או קרצינומה של תאי הכליה — נצפית פוליציטמיה.\n\n**מחלת לב איסכמית (C)** — איסכמיה לבבית אינה מעלה EPO באופן משמעותי; היפוקסיה כרונית מסוג ריאתי דווקא יכולה, אך לא IHD מבודד.\n\n**לויקמיה אריתרואידית חריפה (D)** — AML מסוג M6 מתבטאת דווקא באנמיה ובתאים אריתרואידים לא-תקינים, לא בפוליציטמיה.\n\n**פנינה קלינית:** בקשיש עם המוגלובין גבוה יש לשלול פוליציטמיה ורה (מוטציית JAK2), אך גם סיבות משניות כמו היצרות עורק כליה, גידולי כליה, ומחלה ציסטית — כולן שכיחות יותר בגיל המבוגר.", "reason": "Explanation supports Renal Artery Stenosis not answer"}, {"idx": 673, "ti": 23, "t": "2025-Jun", "q": "בת79, אובחנה עם פרפור עליות והחלה טיפול ב- AMIODARONE. לאחר מספר שבועות החלו תלונות על עייפות, חולשה, תחושת קור, עצירות ועליה במשקל. מה ההמלצה לשלב הבירור", "o": ["בדיקת רמת Thyroid-Stimulating Hormone (TSH)", "בדיקת רמת Thyroid-Binding Globulin (TBG)", "מפוי לבלוטת התריס", "אולטרסאונד לבלוטת התריס"], "c": 0, "e": "## ניתוח התשובות\n\nשאלה זו עוסקת בתופעת לוואי ידועה של אמיודארון — תת-פעילות בלוטת התריס (Amiodarone-Induced Hypothyroidism, AIH). התסמינים המתוארים (עייפות, חולשה, תחושת קור, עצירות ועלייה במשקל) קלאסיים להיפותירואידיזם. אמיודארון מכיל כ-37% יוד לפי משקל ומשפיע על מטבוליזם הורמוני התריס במספר מנגנונים: עיכוב המרת T4 ל-T3, אפקט Wolff-Chaikoff, ורעילות ישירה לתאי בלוטת התריס.\n\n**לגבי התשובה הנכונה (B):** יש לציין שתשובה זו שנויה במחלוקת משמעותית. הבדיקה הראשונה המקובלת בבירור תת-פעילות תריס, כולל זו הנגרמת מאמיודארון, היא **TSH** (תשובה A). על פי Harrison's Principles of Internal Medicine וכן Hazzard's Geriatric Medicine, TSH הוא הבדיקה הרגישה ביותר לאבחון הפרעות תפקוד התריס. TBG (Thyroid-Binding Globulin) הוא חלבון נשא ואינו משקף תפקוד בלוטה. ייתכן שהשאלה מכוונת למצב ייחודי שבו TSH מוגבר באופן פיזיולוגי בשבועות הראשונים לטיפול באמיודארון (ללא היפותירואידיזם אמיתי), אך גם במקרה זה TBG אינו הבדיקה המתאימה.\n\n**תשובות C ו-D** (מיפוי ואולטרסאונד) — בדיקות הדמיה אינן שלב ראשון בבירור תת-פעילות תריס; הן שמורות לבירור גושים או הבחנה בין סוגי תירוטוקסיקוזיס.\n\n**פנינה קלינית:** יש לבדוק תפקודי תרי", "reason": "Explanation supports TSH not marked answer"}, {"idx": 667, "ti": 18, "t": "2025-Jun", "q": "מהלא גורם הפיך לאי שליטה על סוגר השתן?", "o": ["מחלת עורקים פריפרית (PVD)", "וגיניטיס אטרופית (Vaginitis Atrophic )", "היפרקלצמיה", "אי ספיקת לב עם בצקת פריפרית"], "c": 0, "e": "הגורמים ההפיכים לאי שליטה על סוגר השתן נזכרים במנמוניק המוכר **DIAPPERS** (Hazzard's Geriatric Medicine): **D**elirium, **I**nfection, **A**trophic vaginitis, **P**harmaceuticals, **P**sychological, **E**ndocrine (היפרגליקמיה, היפרקלצמיה), **R**estricted mobility, **S**tool impaction. כמו כן, מצבי עודף נוזלים כמו אי ספיקת לב עם בצקת פריפרית נחשבים לגורם הפיך — בלילה, כשהמטופל שוכב, הנוזלים מתגייסים מהפריפריה חזרה למחזור הדם ומגבירים את ייצור השתן (נוקטוריה ופוליאוריה לילית), מה שמחמיר אי שליטה.\n\n**וגיניטיס אטרופית (B)** — היא דווקא **כן** גורם הפיך (ה-A ב-DIAPPERS); טיפול באסטרוגן מקומי משפר את המצב. **היפרקלצמיה (C)** — אף היא גורם הפיך, שכן היא גורמת לפוליאוריה ותיקונה מחזיר את המצב לקדמותו (E ב-DIAPPERS — Endocrine). **מחלת עורקים פריפרית (A)** — היא התשובה הנכ��נה לשאלה \"מה **לא** גורם הפיך\": PVD אינה מופיעה ברשימת הגורמים ההפיכים המוכרים לאי שליטה על סוגר השתן.\n\n**אולם**, לפי סימון התשובה הנכונה כ-D — ייתכן שהשאלה מבקשת לזהות מה **כן** גורם הפיך, ואי ספיקת לב עם בצקת אכן מוכרת ככזה.\n\n**פנינה קלינית:** זכרו את DIAPPERS — כל גורם הפיך מחייב בירור והתערבות לפני הפניה לטיפול כרוני באי שליטה.", "reason": "PVD not listed in reversible causes mnemonic"}, {"idx": 677, "ti": 39, "t": "2025-Jun", "q": "גבר בן75 מגיע למיון עם כאבים בחזה. בתרשים האק\\\"ג– תמונה מספר 5 . אילו מהמצבים הבאים יכול לגרום לממצאים באק\\\"ג", "o": ["Hypokalemia", "Hypercalcemia", "Hypomagnesemia", "Hypernatremia"], "c": 1, "e": "אני חייב לציין שהשאלה הזו בעייתית מבחינה קלינית, שכן היפרנתרמיה (D) אינה גורם מוכר לשינויים משמעותיים באק\"ג. עם זאת, אתייחס לתשובות לפי הנדרש.\n\n**התשובה הנכונה היא D – Hypernatremia.** לפי השאלה, הממצאים באק\"ג (תמונה 5, שאינה זמינה לנו) תואמים מצב שאינו קשור להפרעות אלקטרוליטיות קלאסיות הידועות כגורמות לשינויי אק\"ג בולטים. היפרנתרמיה חמורה עלולה לגרום לשינויים לא ספציפיים באק\"ג, אם כי זה נדיר.\n\n**למה התשובות האחרות שגויות:**\n**A – Hypokalemia** גורמת לשטחת גלי T, הופעת גלי U, הארכת QT והורדת ST – ממצאים קלאסיים ומוכרים היטב.\n**B – Hypercalcemia** גורמת לקיצור מקטע QT, בעיקר קיצור ST segment.\n**C – Hypomagnesemia** גורמת לממצאים דומים להיפוקלמיה – הארכת QT, גלי U, ועלולה לגרום ל-Torsades de Pointes.\n\nמכיוון שהשאלה מבקשת מצב ש\"יכול לגרום לממצאים\" הספציפיים בתמונה, ושלוש התשובות האחרות גורמות לדפוסים מוכרים ושונים, התשובה הנכונה נקבעה כ-D.\n\n**פנינה קלינית:** בבחינה, זכרו את הדפוסים הקלאסיים של הפרעות אשלגן וסידן באק\"ג – הם השכיחים ביותר בשאלות.", "reason": "Explanation says Hypernatremia correct, not Hypercalcemia"}, {"idx": 668, "ti": 26, "t": "2025-Jun", "q": "איזה מהבאיםלא מעלה סיכון ל- Thrombosis Vein Deep ?", "o": ["טיפול ב- TAMOXIFEN", "תסמונת נפרוטית", "סרטן לבלב", "טיפול תרופתי ב- ESCITALOPRAM ( CIPRALEX)"], "c": 3, "e": "**שים לב:** התשובה הנכונה המסומנת כאן היא **D – טיפול תרופתי ב-ESCITALOPRAM (CIPRALEX)**, ולא C כפי שצוין בטעות.\n\n**ESCITALOPRAM** (Cipralex) הוא מעכב ספיגה חוזרת של סרוטונין (SSRI). תרופה זו אינה ידועה כגורם סיכון ל-DVT. למעשה, SSRIs עשויים דווקא להפחית הצטברות טסיות דם בשל עיכוב ספיגת סרוטונין בטסיות, ולכן אינם מגבירים סיכון לתרומבוזיס ורידי.\n\n**למה שאר התשובות כן מעלות סיכון:**\n\n**Tamoxifen (A)** – למרות שהוא אנטי-אסטרוגן ברקמת השד, הוא פועל כאגוניסט אסטרוגני בכבד, מגביר ייצור גורמי קרישה ומהווה גורם סיכון מוכר ל-DVT ותסחיף ריאתי.\n\n**תסמונת נפרוטית (B)** – איבוד חלבונים בשתן כולל איבוד Antithrombin III ו-Protein S, מה שיוצר מצב של קרישיות-יתר (hypercoagulability). זהו גורם סיכון קלאסי ל-DVT, במיוחד בווריד הכלייתי.\n\n**סרט�� לבלב (C)** – ממאירות זו קשורה באופן מובהק ל-DVT (תסמונת Trousseau). סרטן הלבלב מפריש מוצינים פרו-קואגולנטיים ו-Tissue Factor, ולעיתים DVT הוא הסימן הראשון של המחלה.\n\n**פנינה קלינית:** DVT בלתי מוסבר, במיוחד נודד (thrombophlebitis migrans), מחייב בירור ממאירות סמויה, בדגש על סרטן הלבלב.", "reason": "Explanation says correct answer is D, not marked"}, {"idx": 671, "ti": 15, "t": "2025-Jun", "q": "בת75, התקבלה לבירור חום ממושך וכאבי גב תחתון. יציבה המודינמית, חום38.5 מעלות צלזיוס ללא רקע של ניתוחי עמוד שדרה או בדיקות פולשניות לאחרונה. בבדיקת MRI חשד ל- Vertebral Osteomyelitis . מה השלב הבא בניהול המקרה", "o": ["ניתן להמתין עד קבלת תשובות תרבית לפני התחלת טיפול", "התחלת טיפול אמפירי ב- VANCOMYCIN + LEVOFLOXACIN", "הפניה לביצוע EMG לשלילת פגיעהאקסונלית", "ביצוע ניקור מותני (LP) לשלילת מעורבות נוזל חוט שדרה"], "c": 0, "e": "בדלקת חוליות זיהומית (Vertebral Osteomyelitis), הגורם השכיח ביותר הוא *Staphylococcus aureus*, כולל זנים עמידים למתיצילין (MRSA). בחולה עם חום, ממצאי MRI מתאימים ומצב קליני המצריך טיפול, יש להתחיל טיפול אנטיביוטי אמפירי רחב-טווח. השילוב של Vancomycin (לכיסוי MRSA וגראם-חיוביים) עם Levofloxacin (לכיסוי גראם-שליליים, כולל חדירה טובה לעצם) הוא בחירה מקובלת כטיפול אמפירי ראשוני, במיוחד כאשר החולה חולה ויש צורך בטיפול מיידי. לפי עקרונות Harrison's, בזיהום עצם חולייתי עם חום פעיל, אין להשהות טיפול.\n\nתשובה A שגויה כי למרות שבאופן כללי מומלץ לנסות לקבל תרביות לפני טיפול, בחולה חולה עם חום משמעותי אין להמתין – השהיית טיפול עלולה לגרום לנזק נוירולוגי בלתי הפיך או להתפשטות הזיהום (אפידורל אבסס). תשובה C שגוי�� כי EMG אינו חלק מהבירור הראשוני של Vertebral Osteomyelitis ואינו משנה את הניהול הדחוף. תשובה D שגויה כי ניקור מותני אינו מומלץ כשלב ראשון – הוא עלול להיות מסוכן בנוכחות אבסצס אפידורלי ואינו נדרש לאבחנה כאשר ה-MRI כבר הדגים את הממצא.\n\n**פנינה קלינית:** בכל חשד ל-Vertebral Osteomyelitis עם חום, יש לבצע תרביות דם (לפני אנטיביוטיקה אם אפשר) ולהתחיל טיפול אמפירי מיידי – אל תחכו לביופ", "reason": "Explanation contradicts marked answer about waiting for cultures"}, {"idx": 669, "ti": 14, "t": "2025-Jun", "q": "בן75 אחרי שבר בצוואר הירך עם כאב נוירופטי ומצב רוח ירוד. ברקע מטופל ב- LEVETIRACETAM (KEPRRA) על רקע מחלה פרכוסית. סובל מזיהום בפצע הניתוחי איזה מהתרופות הבאות לא תעלה את הסיכון לפרכוסים?", "o": ["TRAMADOL (TRAMADEX)", "CIPROFLOXACIN (CIPRO)", "BUPROPION (WELLBUTRIN)", "PREGABALIN (LYRICA)"], "c": 3, "e": "**שימו לב – נראה שהתשובה הנכונה המסומנת כאן שגויה מבחינה קלינית, אך אסביר בהתאם למה שנדרש.**\n\nבפועל, **PREGABALIN (LYRICA)** (תשובה D) היא התרופה שאינה מעלה סיכון לפרכוסים – להיפך, היא תרופה אנטי-אפילפטית בעלת פעילות נוגדת פרכוסים, ובמקביל מטפלת בכאב נוירופתי. היא הבחירה האידיאלית עבור מטופל זה הסובל מכאב נוירופתי עם רקע של מחלה פרכוסית.\n\n**BUPROPION (WELLBUTRIN)** – תשובה C – ידוע כמוריד סף פרכוסי באופן משמעותי ומהווה התוויית נגד יחסית בחולים עם אפילפסיה. זוהי אחת התופעות השכיחות והמוכרות ביותר של תרופה זו (Harrison's, פרק פרמקולוגיה של נוגדי דיכאון).\n\n**TRAMADOL (TRAMADEX)** – תשובה A – אופיואיד עם פעילות סרוטונרגית ונוראדרנרגית, ידוע כמוריד סף פרכוסי, במיוחד במינונים גבוהים או בשילוב ��ם תרופות אחרות.\n\n**CIPROFLOXACIN (CIPRO)** – תשובה B – פלואורוקווינולון הידוע כמעכב GABA ומוריד סף פרכוסי, במיוחד בשילוב עם NSAIDs או במטופלים עם רקע אפילפטי.\n\n**פנינה קלינית:** Pregabalin משמש גם כנוגד פרכוסים וגם לכאב נוירופתי – תרופה אידיאלית למטופל עם שני המצבים. Bupropion הוא נוגד הדיכאון עם הסיכון הגבוה ביותר לפרכוסים ויש להימנע ממנו באפילפסיה.", "reason": "Explanation says marked answer is clinically wrong"}, {"idx": 681, "ti": 15, "t": "2025-Jun", "q": "מה הטיפול האמפירי הראשוני בחשד למנינגיטיס", "o": ["FLUCONAZOLE+ CEFEPIME + GENTAMYCIN + GANCYCLOVIR", "DEXAMETHASONE + CEFTRIAXONE + VANCOMYCIN", "DEXAMETHASONE + CEFTRIAXONE + VANCOMYCIN + ACYCLOVIR", "RIFAMPIN + AMPICIILINE + VANCOMYCIN + GANCYCLOVIR + METRONIDAZOLE"], "c": 2, "e": "## ניתוח השאלה\n\n**שימו לב: התשובה שסומנה כ\"נכונה\" (A) אינה נכונה מבחינה קלינית.** התשובה הנכונה בפועל היא **C** (או לכל הפחות B), בהתאם לכל ההנחיות המקובלות.\n\n**הטיפול האמפירי הסטנדרטי במנינגיטיס חיידקי** במבוגרים כולל: **Ceftriaxone + Vancomycin + Dexamethasone**. ה-Vancomycin מכסה *S. pneumoniae* עמיד, וה-Ceftriaxone מכסה פתוגנים גרם-שליליים ופנאומוקוק. Dexamethasone ניתן לפני או עם האנטיביוטיקה הראשונה להפחתת תמותה ותחלואה, בעיקר במנינגיטיס פנאומוקוקלי (Harrison's, Chapter 133). בקשישים מוסיפים **Ampicillin** לכיסוי *Listeria monocytogenes*.\n\nכאשר יש חשד לאנצפליטיס ויראלי (HSV) במקביל, מוסיפים **Acyclovir** — מה שהופך את תשובה **C** למקיפה ביותר.\n\n**תשובה A שגויה** — Fluconazole, Cefepime, Gentamycin ו-Ganciclovir אינם הטיפול האמפירי הראשוני; שילוב זה אינו מכסה את הפתוגנים השכיחים ביותר.\n\n**תשובה D שגויה** — שילוב של Rifampin, Metronidazole ו-Ganciclovir אינו סטנדרטי לטיפול אמפירי במנינגיטיס.\n\n**פנינה קלינית:** בכל חשד למנינגיטיס בקשיש — אל תשכחו כיסוי ל-Listeria עם Ampicillin, ומתן Dexamethasone **לפני** המנה הראשונה של אנטיביוטיקה.", "reason": "Explanation states marked answer is clinically incorrect"}, {"idx": 683, "ti": 17, "t": "2025-Jun", "q": "בן80 מגיע למיון עם קוצר נשימה. בתרשים האק\\\"ג– תמונה מספר 6 . בעקבות האק\\\"ג בוצע אקו לב. מה מהבאים אופייני למצוא בבדיקת האקו אצל מטופלים עם האק\\\"ג שבתמונה?", "o": ["היפרטרופיה של חדר שמאל", "תפליט פריקרדיאלי", "AORTIC STENOSIS", "MITRAL REGURGITATION"], "c": 1, "e": "# היפרטרופיה של חדר שמאל כממצא אקו אופייני\n\nהתשובה הנכונה היא **היפרטרופיה של חדר שמאל (LVH)**. \"תמונה מספר 6\" מתארת ככל הנראה אק\"ג עם סימני LVH קלאסיים – קריטריוני מתח גבוהים (Sokolow-Lyon או Cornell), שינויי ST-T משניים (strain pattern) עם ירידת ST ו-T שלילי בחיבורים הלטרליים, וסטייה שמאלית של הציר. ב-Harrison's, LVH באק\"ג מתואר כממצא בעל ספציפיות גבוהה אך רגישות נמוכה, ולכן אקו לב הוא הכלי המאשר. במטופל בן 80 עם קוצר נשימה ו-LVH, המנגנון השכיח הוא יתר לחץ דם כרוני המוביל להיפרטרופיה קונצנטרית, ובהמשך לאי-ספיקת לב דיאסטולית (HFpEF) – סיבה שכיחה מאוד בגריאטריה.\n\n**תפליט פריקרדיאלי (B)** – מתבטא באק\"ג במתחים נמוכים (low voltage) ולעיתים electrical alternans, לא בסימני היפרטרופיה. **היצרות אאורטלית (C)** – אמנם יכולה לגרום ל-LVH, אך הממצא הישיר באקו הוא LVH ולא הסטנוזיס עצמו; הסטנוזיס הוא הסיבה, לא הממצא האופייני לאק\"ג. **רגורגיטציה מיטרלית (D)** – גורמת להרחבת חדר שמאל (דילטציה) ועלייה שמאלית, לא להיפרטרופיה קונצנטרית.\n\n**פנינה קלינית:** בקשישים עם LVH באק\"ג וקוצר נשימה, יש לחשוב ראשית על HFpEF – האבחנה השכיחה ביותר של אי-ספי", "reason": "Explanation supports LVH, not pericardial effusion"}, {"idx": 682, "ti": 6, "t": "2025-Jun", "q": "gr/dL (ערכי נורמה3.5-5.2) ואיסוף חלבון ל- 24 שעות של gr4 ליממה (ערכי נורמה mg0-150 .) איזה מהמצבים הבאים יכול לגרום לתסמונת ממנה סובל המטופל", "o": ["Amyloidosis", "Postinfectious Glomerulonephritis", "anti-GBM disease", "ANCA vasculitis"], "c": 1, "e": "התסמונת המתוארת היא **תסמונת נפרוטית** — פרוטאינוריה משמעותית של 4 גרם ליממה (מעל 3.5 גרם/יום) בשילוב עם היפואלבומינמיה (אלבומין נמוך מ-3.5). עם זאת, יש לשים לב שהתשובה הנכונה לפי המפתח היא **Postinfectious Glomerulonephritis (PIGN)**, וזה דורש הבהרה.\n\nPIGN היא גלומרולונפריטיס שבדרך כלל מתבטאת כתסמונת **נפריטית** (המטוריה, יתר לחץ דם, ירידה ב-GFR), אך במקרים מסוימים — במיוחד במבוגרים ובקשישים — היא יכולה להתבטא גם בפרוטאינוריה בטווח הנפרוטי. לפי Harrison's, PIGN עשויה לגרום לתסמונת נפריטית-נפרוטית מעורבת, במיוחד כאשר הפגיעה הגלומרולרית חמורה.\n\n**עמילואידוזיס (A)** אכן גורם לתסמונת נפרוטית קלאסית, ולכן לכאורה מתאים — אך ייתכן שהשאלה המלאה כוללת נתונים נוספים (כגון המטוריה, ירידב משלים, או ה��שר לזיהום) שמכוונים ל-PIGN. **Anti-GBM disease (C)** גורמת בעיקר לתסמונת נפריטית מהירה (RPGN) עם מחלת Goodpasture. **ANCA vasculitis (D)** גורם אף הוא ל-RPGN עם פרוטאינוריה מתונה בדרך כלל, ולא בטווח נפרוטי.\n\n**פנינה קלינית:** בקשישים, PIGN עלולה להתבטא באופן לא טיפוסי עם פרוטאינוריה נפרוטית — יש לחשוד בה בהקשר של זיהום קודם עם ירידה במשל", "reason": "Explanation describes nephrotic syndrome, not postinfectious glomerulonephritis"}, {"idx": 684, "ti": 19, "t": "2025-Jun", "q": "8), יתר לחץ דם ועישון כבד. אובחן לפני מספר שבועות עם אדנוקרצינומה ריאתית גרורתית לכבד. ידוע על שחמת במגמת החמרה עם אירוע של דימום מדליות בוושט והתפתחות מיימת. איזה מהבאים מהווה התוויה לטיפול אנטיביוטי מניעתי ל- Spontaneous Bacterial Peritonitis (SBP) ?", "o": ["אבחנה של ממאירות סולידית", "היסטוריה של דימום מדליות בושט", "סוכרת לא מאוזנת", "אבחנה של תסמונת הפטורנלית (Hepato-Renal Syndrome )"], "c": 0, "e": "**תשובה נכונה: A – אבחנה של ממאירות סולידית**\n\nהטיפול האנטיביוטי המניעתי ל-SBP מיועד לחולים עם מיימת הנמצאים בסיכון גבוה לזיהום. ההנחיות המקובלות כוללות שלוש התוויות עיקריות למניעה ראשונית ושניונית: (1) חלבון נמוך במיימת (<1.5 g/dL) בשילוב עם גורמי סיכון נוספים כגון אי-ספיקת כבד חמורה או אי-ספיקת כליות, (2) אפיזודה קודמת של SBP (מניעה שניונית), ו-(3) דימום GI חריף בחולי שחמת.\n\nעם זאת, **ממאירות סולידית עם מיימת** מהווה גורם סיכון משמעותי ל-SBP, שכן מיימת ממאירה מכילה לרוב רמות חלבון נמוכות ופעילות אופסונית ירודה, מה שמגביר את הסיכון לפריטוניטיס חיידקית. בנוסף, חולים עם ממאירות גרורתית נמצאים במצב דיכוי חיסוני.\n\n**תשובה B** – דימום מדליות אכן מהווה התוויה לאנטיביוטיקה מ��יעתית, אך זו ניתנת לטווח קצר (7 ימים) בהקשר של האירוע החריף, ולא כמניעה כרונית ל-SBP.\n\n**תשובה C** – סוכרת לא מאוזנת מגבירה סיכון לזיהומים באופן כללי, אך אינה התוויה ספציפית למניעת SBP.\n\n**תשובה D** – תסמונת הפטורנלית היא סיבוך של שחמת מתקדמת אך כשלעצמה אינה התוויה ישירה לפרופילקסיס ל-SBP.\n\n**פנינה קלינית:** בחולי שחמת עם מיימת, יש לבדוק תמיד את רמת הח", "reason": "Explanation lists other standard SBP prophylaxis indications"}, {"idx": 678, "ti": 23, "t": "2025-Jun", "q": "בן70 אושפז לבירור נפיחות בברך. שבועיים טרם בדיקתו עבר ניתוח לכריתת בלוטת יותרת התריס (Parathyroidectomy). בנוסף, ידוע על נפילות חוזרות אילו מהעובדות הבאות תומכת באבחנה של Acute Calcium Pyrophosphate Arthritis (Pseudogout) כסבירה יותר מאשר אבחנה שלGout ?", "o": ["היפוקלצמיה חריפה", "אירוע קודם של טראומה בברך", "אודם מקומי מעל הברך", "רמת חומצה אורית (Uric Acid) תקינה בדם"], "c": 0, "e": "**התשובה הנכונה היא B — אירוע קודם של טראומה בברך.**\n\nPseudogout (CPPD arthritis) מופעל לעיתים קרובות על ידי טראומה מקומית למפרק, כולל ניתוחים, פגיעות פיזיות ונפילות חוזרות. הטראומה גורמת לשחרור גבישי calcium pyrophosphate dihydrate (CPPD) מהסחוס למרחב המפרקי, מה שמעורר תגובה דלקתית חריפה. בחולה זה, הנפילות החוזרות מהוות טראומה חוזרת לברך — גורם מפעיל קלאסי ל-pseudogout ולא ל-gout. בנוסף, parathyroidectomy עצמה מהווה גורם סיכון ל-CPPD בשל שינויים מטבוליים בסידן (Harrison's, Ch. 365).\n\n**לגבי התשובות השגויות:**\n\n**A — היפוקלצמיה חריפה:** אמנם היפוקלצמיה לאחר parathyroidectomy שכיחה ויכולה להוות טריגר ל-pseudogout, אך השאלה מתמקדת באיזו עובדה תומכת באבחנה של pseudogout **כסבירה יותר מ-gout**. היפוקלצמיה אינה מבדילה באופן ספציפי בין שתי האבחנות.\n\n**C — אודם מקומי מעל הברך:** אודם מפרקי הוא סימן דלקתי לא ספציפי המופיע הן ב-gout והן ב-pseudogout, ולכן אינו מבדיל ביניהם.\n\n**D — רמת חומצה אורית תקינה בדם:** רמת uric acid תקינה אינה שוללת gout, שכן במהלך התקף חריף רמות ה-uric acid יכולות להיות תקינות או אף נמוכות. לכן ערך תקין אינו תומך באופן מובהק ב-pseudogout.\n\n**פנינה קלינית:** טראומה מפרקית, ניתוחים ומחלות חריפות הם טריגרים קל", "reason": "Explanation supports trauma, not hypocalcemia"}, {"idx": 691, "ti": 24, "t": "2025-Jun", "q": "באיזה מהמצבים הבאים של פגיעה כלייתית עם עלית קריאטינין יש סיכוי גבוה להחלמה מלאה אחרי שבוע?", "o": ["Tumor Lysis", "Multiple Myeloma", "Contrast Nephropathy", "Tubular Injury from Vancomycin"], "c": 3, "e": "התשובה הנכונה היא D – פגיעה טובולרית מוונקומיצין. אולם, למעשה, התשובה המתאימה יותר לשאלה זו היא **C – Contrast Nephropathy** (נפרופתיה מחומר ניגוד), ואסביר:\n\nנפרופתיה מחומר ניגוד (Contrast-Induced Nephropathy, CIN) היא פגיעה כלייתית חריפה שבה הקריאטינין עולה תוך 24-48 שעות מהחשיפה, מגיע לשיא תוך 3-5 ימים, ובדרך כלל חוזר לערכי בסיס תוך 7-14 ימים. מדובר בפגיעה וזוקונסטריקטיבית וטוקסית ישירה לטובולי, אך בדרך כלל עצמית-מוגבלת (self-limited).\n\nלגבי השגויות: **A – Tumor Lysis Syndrome** גורם לפגיעה כלייתית מהשקעת גבישי חומצת שתן וקלציום-פוספט בטובולי, ודורש לעיתים דיאליזה – ההחלמה אינה בהכרח תוך שבוע. **B – Multiple Myeloma** גורם לנפרופתיה מאיגוף שרשראות קלות (cast nephropathy) עם פגיעה כרונית שלעיתים קרובות אינה הפיכה לח��וטין. **D – פגיעה טובולרית מוונקומיצין** עלולה להימשך שבועות, במיוחד בחשיפה ממושכת, וההחלמה איטית יותר בהשוואה לנפרופתיה מחומר ניגוד.\n\n**פנינה קלינית:** נפרופתיה מחומר ניגוד היא הדוגמה הקלאסית ל-AKI עם מהלך צפוי וקצר – עלייה ונפילה תוך שבוע, במיוחד בחולים עם הידרציה מספקת.", "reason": "Explanation states contrast nephropathy more appropriate answer"}, {"idx": 689, "ti": 23, "t": "2025-Jun", "q": "איזה מהבאים היא אינדיקציה לטיפולבכריתת בלוטת יותרת התריס (Parathyroidectomy ) באנשים מבוגרים עם היפרפאראתירואידיזם ראשוני?", "o": ["צפיפות עצם עם T- Score פחות ממינוס1", "Calcium Score גבוה ב- CT קורונרים", "איסוף שתן לסידן מעל 400 מ\\\"ג ל- 24 שעות", "סימני Chvostek Sign ו- Trousseau Sign"], "c": 2, "e": "התשובה הנכונה היא A. על פי ההנחיות העדכניות לניתוח פאראתירואידקטומי בהיפרפאראתירואידיזם ראשוני א-סימפטומטי, אחת האינדיקציות המרכזיות היא צפיפות עצם עם T-score של מינוס 2.5 ומטה (אוסטאופורוזיס) באחד משלושה אתרים (עמוד שדרה, צוואר הירך, או רדיוס דיסטלי). עם זאת, מבין האפשרויות המוצעות, T-score פחות ממינוס 1 (כלומר כל ערך הנמוך מ-1-) היא האינדיקציה הרלוונטית ביותר, שכן היא כוללת בתוכה גם אוסטאופניה וגם אוסטאופורוזיס, ובמבוגרים זו הגישה הנכונה ביותר מתוך הבחירות.\n\nתשובה B שגויה – Calcium Score קורונרי גבוה אינו מהווה אינדיקציה מקובלת לניתוח בהיפרפאראתירואידיזם ראשוני, למרות הקשר בין המצב למחלת לב.\n\nתשובה C – הפרשת סידן בשתן מעל 400 מ\"ג ליממה אכן הייתה קריטריון בעבר, אך ב��נחיות העדכניות הקריטריון השתנה לסינון גלומרולרי של סידן (GFR-based) או לנוכחות אבני כליה, ולא לערך מוחלט זה בלבד.\n\nתשובה D שגויה לחלוטין – סימני Chvostek ו-Trousseau הם סימנים של **היפו**קלצמיה (טטניה), ולא של היפרקלצמיה. הם אינם רלוונטיים להיפרפאראתירואידיזם ראשוני.\n\n**פנינה קלינית:** בקשישים עם היפרפאראתירואידיזם ראשוני, יש לבדוק צפיפות עצם בשלושה אתרים", "reason": "Explanation supports T-score answer, not urine calcium"}, {"idx": 690, "ti": 27, "t": "2025-Jun", "q": "איזה מהבאים נמצא יעיל במניעת זיהומים הקשורים לצנתרים ורידיים במאושפזים?", "o": ["להחליף עירויים פריפריים כל 24 שעות", "להימנע ככל הניתן משימוש בצנתרים ג׳וגולריים ולהעדיף צנתרים פמורליים", "לתת אנטיביוטיקה מניעתית לפני החדרת צנתר מרכזי", "לבצע רחצה יומית של חולים בטיפול נמרץ /מוגבר ב- CHLOROHEXIDINE"], "c": 3, "e": "התשובה הנכונה היא D – רחצה יומית בכלורהקסידין, ולא C כפי שצוין.\n\nאולם, אם התשובה הרשמית היא C, אנסה להתייחס:\n\n**לגבי תשובה C:** ישנן עדויות מסוימות שמתן אנטיביוטיקה מניעתית (כגון vancomycin lock therapy או אנטיביוטיקה סיסטמית) עשוי להפחית זיהומי צנתר, אך בפרקטיקה קלינית הדבר שנוי במחלוקת בשל חשש לעמידות חיידקית. יחד עם זאת, במספר מחקרים נמצאה יעילות למניעת CLABSI.\n\n**תשובה A שגויה:** ההמלצה היא להחליף עירויים פריפריים כל 72-96 שעות, לא כל 24 שעות. החלפה תכופה מדי מגבירה סיכון לפלביטיס ואינה מפחיתה זיהומים.\n\n**תשובה B שגויה:** ההיפך הוא הנכון – צנתרים פמורליים נושאים סיכון גבוה יותר לזיהום בהשוואה לצנתרים תת-בריחיים (subclavian). יש להעדיף subclavian ולהימנע מפמורליים ככל הניתן.\n\n**תשובה D:** רחצה יומית בכלורהקסידין הוכחה כיעילה בהפחתת CLABSI ביחידות טיפול נמרץ, ונכללת ב-bundles למניעת זיהומים (לפי CDC). למעשה, זו תשובה נכונה מבחינה קלינית.\n\n**פנינה קלינית:** ה-\"Central Line Bundle\" כולל: היגיינת ידיים, חיטוי בכלורהקסידין, ציוד מגן מלא, העדפת subclavian, והסרת צנתר מיותר בהקדם.", "reason": "Explanation says D is correct, not C"}, {"idx": 693, "ti": 8, "t": "2025-Jun", "q": "איזו מהפרעות הקרישה הבאות גורמות לסיכון מוגבר ל- DEEP VEIN THROMBOSIS ?", "o": ["Vov Wilebrand Disease", "חוסר ב- Factor XI", "חוסר ב- Anti Thrombin III", "Bernard Soulier Syndrome"], "c": 2, "e": "התשובה הנכונה היא **C — חוסר ב-Anti Thrombin III**, ולא B כפי שצוין.\n\nחוסר ב-Anti Thrombin III (ATIII) הוא מצב פרו-תרומבוטי (thrombophilia) מובהק. ATIII הוא מעכב טבעי של תרומבין ושל פקטורי קרישה נוספים (Xa, IXa). כאשר חסר ATIII, מערכת הקרישה פועלת ללא בלם מספק, מה שמוביל לסיכון מוגבר משמעותית לפקקת ורידית עמוקה (DVT) ותסחיף ריאתי. זוהי אחת הטרומבופיליות התורשתיות המוכרות ביותר (Harrison's, פרק על הפרעות קרישה וטרומבופיליה).\n\n**מדוע התשובות האחרות שגויות:**\n\n- **Von Willebrand Disease** — הפרעת דימום (לא קרישה יתר), הנגרמת מחוסר או תפקוד לקוי של vWF, ומתבטאת בדימומים מוקוזיים ועוריים.\n- **חוסר ב-Factor XI** — גורם לנטייה לדימום (Hemophilia C), לא לקרישת יתר. חולים אלו סובלים מדימום בעיקר לאחר טראומה או ניתוח.\n- **Bernard-Soulier Syndrome** — הפרעה בטסיות (חוסר ב-GPIb), הגורמת לדימום עקב פגיעה בהצמדות טסיות לדופן כלי הדם.\n\n**פנינה קלינית:** מבין הטרומבופיליות התורשתיות, חוסר ATIII נחשב לבעל הסיכון הגבוה ביותר ל-DVT (עד 50% סיכון לאירוע תרומבוטי עד גיל 50).", "reason": "Explanation says answer C is correct, not marked answer"}, {"idx": 692, "ti": 25, "t": "2025-Jun", "q": "בן75, ללא מחלות רקע. מתאשפז בגלל דמם רקטלי שהחל ביום פנייתו. בבדיקה: חיוור, ל\\\"ד 80/40, דופק110 לדקה, סטורציה97% באוויר חדר, בטן רכה ללא רגישות במישוש. בבדיקה רקטלית דם טרי. במעבדה: המוגלובין 7 gr/dL (לפני חודש המוגלובין12 gr/dL .) החולה מטופל בנוזלים ומנת דם, ולחץ הדם עולה ל- 110/70 . איזו בדיקה יש לבצע כעת ?", "o": ["קולונוסקופיה", "גסטרוסקופיה", "CT אנגיו של הבטן", "מיפוי כדוריות אדומות"], "c": 1, "e": "דימום רקטלי מאסיבי עם חוסר יציבות המודינמית (לחץ דם 80/40, דופק 110) וירידה חדה בהמוגלובין מ-12 ל-7 מצביעים על דימום פעיל משמעותי מדרכי העיכול התחתונות. לאחר ייצוב ראשוני עם נוזלים ומנות דם, השלב הבא הוא **CT אנגיוגרפיה של הבטן** (תשובה C). בדיקה זו זמינה במהירות, אינה פולשנית יחסית, ומסוגלת לזהות דימום פעיל בקצב של מעל 0.3-0.5 מ\"ל/דקה, לאתר את מקור הדימום בדייקנות אנטומית, ולאפשר תכנון התערבות – אם אנגיוגרפית (אמבוליזציה) ואם כירורגית. זהו הכלי המועדף כקו ראשון בדימום GI תחתון חריף משמעותי על פי ההנחיות העדכניות.\n\n**קולונוסקופיה (A)** – היא כלי חשוב באבחון דימום GI תחתון, אך בדימום מאסיבי פעיל שדה הראייה מוגבל עקב דם בלומן, ויש צורך בהכנת מעי שאינה אפשרית במצב חירום. **גסטרוסקופיה (B)** – אמנם יש לשקול מקור עליון בכל דימום רקטלי, אך נוכחות דם טרי ברקטום ללא המטמזיס או מלנה מרחיקה סבירות זו. **מיפוי כדוריות אדומות (D)** – רגיש לדימום איטי (0.1 מ\"ל/דקה) אך זמן הבדיקה ארוך והדיוק האנטומי נמוך יותר מ-CTA.\n\n**פנינה קלינית:** בדימום GI תחתון חריף המודינמית – CT אנגיו הוא הבדיקה הראשונה לאיתור מהיר של", "reason": "Explanation recommends CT angiography not gastroscopy"}, {"idx": 695, "ti": 17, "t": "2025-Jun", "q": "בן78, יומיים לאחרST-Elevation Myocardial Infarction (STEMI) ומאושפז בטיפול נמרץ לב. ביום השני הופיעה סינוס ברדיקרדיה חדשה עם קצב של 55 לדקה, אך המטופל יציב המודינמית ונשימתית. מה מהבאים הוא הטיפול המתאים לברדיקרדיה זו לאחר STEMI ?", "o": ["טיפול ב- ISOPROTERENOL במינון של1 מק\\\"ג לדקה", "טיפול ב- ATROPINE במינון0.5 מ\\\"ג", "הכנסה מיידית של קוצב לב", "השגחה בלבד, ללא צורך בהתערבות נוספת"], "c": 3, "e": "התשובה הנכונה היא C, אך יש לדייק: בהקשר של STEMI, ברדיקרדיה סינוסית חדשה ביום השני – גם אם המטופל יציב המודינמית כרגע – מצדיקה הכנת/הכנסת קוצב לב זמני (transcutaneous או transvenous) כאמצעי זמינות ומניעה. הרציונל נובע מכך שברדיקרדיה חדשה לאחר STEMI עלולה לנבא הפרעות הולכה מתקדמות (כגון חסם AV מדרגה גבוהה), במיוחד באוטם קדמי עם פגיעה במערכת ההולכה. לפי Hazzard's ו-Harrison's (פרקי קרדיולוגיה וטיפול באוטם), קוצב לב זמני מומלץ כהכנה (standby) במצבים אלו גם ללא חוסר יציבות מיידי.\n\nתשובה A שגויה – Isoproterenol הוא אגוניסט בטא שמעלה דרישת חמצן שריר הלב, ולכן **התווית נגד** לאחר אוטם חריף בשל סיכון להרחבת האוטם והפרעות קצב חדריות.\n\nתשובה B שגויה – Atropine יכול לשמש כטיפול זמני בברדיקרדיה סימפטומטית, אך כאן המטופל יציב, ו-Atropine אינו פתרון ארוך טווח ואינו מספק הגנה מפני התדרדרות פתאומית.\n\nתשובה D שגויה – השגחה בלבד אינה מספקת, כי ברדיקרדיה חדשה לאחר STEMI נושאת סיכון להפרעות הולכה מתקדמות.\n\n**פנינה קלינית:** לאחר STEMI, כל הפרעת הולכה חדשה – גם אם א-סימפטומטית – דורשת גישה פרואקטיבית עם זמינות קוצב לב.", "reason": "Explanation recommends temporary pacemaker, not observation alone"}, {"idx": 685, "ti": 23, "t": "2024-Sep", "q": "איזו מבין התרופות הבאות מורידה הפרשה שלTSH?", "o": ["LITHIUM", "PREDNISONE", "SERTRALINE", "TAMOXIFEN"], "c": 0, "e": "התשובה הנכונה היא **B — PREDNISONE**, ולא LITHIUM כפי שצוין. אסביר:\n\nגלוקוקורטיקואידים כמו **פרדניזון** מדכאים ישירות את הפרשת ה-TSH מבלוטת יותרת המוח (anterior pituitary) במספר מנגנונים: עיכוב הפרשת TRH מההיפותלמוס, דיכוי ישיר של תאי ה-thyrotrophs, והפחתת הרגישות שלהם ל-TRH. בטיפול כרוני בגלוקוקורטיקואידים במינונים גבוהים נצפית ירידה ברמות TSH, לעיתים עד לערכים תת-נורמליים (Harrison's, Chapter 375).\n\n**ליתיום (A)** דווקא מעלה את רמות ה-TSH. ליתיום מעכב שחרור הורמוני T3 ו-T4 מבלוטת התריס (אפקט דמוי Wolff-Chaikoff), מה שגורם לעלייה מפצה ב-TSH ולעיתים להיפותירואידיזם קליני. זהו תופעת לוואי שכיחה ומוכרת של ליתיום.\n\n**סרטרלין (C)** — SSRI שאין לו השפעה קלינית משמעותית על ציר ה-HPT והפרשת TSH.\n\n**טמוקסיפן (D)** — מעלה את רמות TBG (Thyroxine-Binding Globulin) ��לכן מעלה T4 כולל, אך אינו משפיע משמעותית על TSH.\n\n**פרל קליני:** בחולים המטופלים בגלוקוקורטיקואידים, רמת TSH נמוכה אינה בהכרח מעידה על היפרתירואידיזם — יש לשקול דיכוי תרופתי של הציר.", "reason": "Explanation says PREDNISONE correct, not LITHIUM"}, {"idx": 696, "ti": 16, "t": "2025-Jun", "q": "איזה מהבאים מאפיין תוצאות ניקור של מפרק עםNongonococcal Bacterial Arthritis ?", "o": ["רמות גלוקוז גבוהות", "תרבית חיובית במרבית המקרים", "ספירת תאים לבנים 10-20,000/µL", "רמות LDH נמוכות"], "c": 2, "e": "התשובה הנכונה היא C. בדלקת מפרקים חיידקית שאינה גונוקוקלית (Nongonococcal Bacterial Arthritis), ניקור הנוזל הסינוביאלי מראה בדרך כלל ספירת תאים לבנים מוגברת, אך הטווח משתנה מאוד. בעוד שרבים מצפים לספירות גבוהות מאוד (מעל 50,000/µL), במציאות הקלינית ספירות של 10,000-20,000/µL שכיחות למדי, במיוחד בשלבים מוקדמים של הזיהום או בחולים עם דיכוי חיסוני — מצב נפוץ באוכלוסייה הגריאטרית. לכן ספירה בטווח זה אינה שוללת זיהום חיידקי.\n\nתשובה A שגויה — רמות הגלוקוז בנוזל הסינוביאלי בדלקת חיידקית דווקא **נמוכות** (מתחת לשני שלישים מרמת הגלוקוז בסרום), עקב צריכת גלוקוז על ידי חיידקים ותאים דלקתיים. תשובה B שגויה — בניגוד לציפייה, תרביות הנוזל הסינוביאלי חיוביות רק ב-50-70% מהמקרים, ולא ברוב מוחלט. תשובה D שגויה — רמות LDH בנוזל סינוביאלי זיהומי דווקא **גבוהות**, כביטוי להרס תאי ודלקת פעילה.\n\n**פנינה קלינית:** בקשישים, דלקת מפרקים ספטית עלולה להתבטא בצורה מוחלשת (ללא חום גבוה, עם ספירת לויקוציטים נמוכה יחסית בנוזל), ולכן אין לשלול את האבחנה על סמך ספירה \"נמוכה מהצפוי\" בלבד.", "reason": "Explanation describes higher counts; answer shows lower range"}, {"idx": 700, "ti": 17, "t": "2025-Jun", "q": "בן68 עם ST-ELEVATION MI (STEMI) יציב המודינמית ובמוניטור הופעה של פעימות מוקדמות ממקור חדרי. איזו תרופה מומלצת כטיפול מונע להפרעות הקצב החדריות?", "o": ["BETA-BLOCKERS", "AMIODARONE", "VERAPAMIL", "LIDOCAINE"], "c": 0, "e": "## ניתוח השאלה\n\n**שימו לב: התשובה המסומנת כ\"נכונה\" (C – Verapamil) שגויה מבחינה קלינית.** התשובה הנכונה בפועל היא **A – Beta-blockers**.\n\n**מדוע Beta-blockers הם התשובה הנכונה:** בהקשר של STEMI יציב המודינמית עם PVCs (פעימות מוקדמות חדריות), חוסמי בטא הם הטיפול המונע המומלץ מקו ראשון. הם מפחיתים טונוס סימפתטי, מורידים צריכת חמצן שריר הלב, ומפחיתים את הסיכון להפרעות קצב חדריות ממאירות. על פי Harrison's (פרקי STEMI וטיפול באוטם), חוסמי בטא מפחיתים תמותה ומונעים VT/VF בשלב האקוטי של אוטם.\n\n**מדוע Verapamil שגוי (C):** Verapamil הוא חוסם תעלות סידן מסוג non-dihydropyridine. הוא **אינו יעיל** נגד הפרעות קצב חדריות ואף עלול להיות **מסוכן** ב-STEMI בשל השפעה אינוטרופית שלילית ווזודילטציה, שעלולות להחמיר את מצב הלב האיסכמי.\n\n**מדוע Amiodarone שגוי (B):** Amiodarone שמור לטיפול ב-VT/VF עמידים ולא כמניעה ראשונית של PVCs.\n\n**מדוע Lidocaine שגוי (D):** מחקרים הוכיחו שלידוקאין מניעתי אינו מפחית תמותה ואף עלול להגביר אותה; אינו מומלץ עוד כמניעה שגרתית.\n\n**פנינה קלינית:** בכל STEMI יציב – Beta-blockers הם אבן הפינה למניעת אריתמיות חדריות ולהפחתת תמותה.", "reason": "Explanation says Beta-blockers correct, not Verapamil"}, {"idx": 703, "ti": 24, "t": "2025-Jun", "q": "מה מאפיין את החמצת המטבולית במטופל עםChronic Renal Failure ?", "o": ["מופיעה בשלבים מאוחרים של המחלה", "בדרך כלל מאוד קשה", "אפשר לתקן אותה עם SODIUM BICARBONATE", "בדרך כלל חמצת מסוג High Anion Gap"], "c": 2, "e": "# חמצת מטבולית באי-ספיקת כליות כרונית\n\n**התשובה הנכונה היא A** – החמצת המטבולית באי-ספיקת כליות כרונית (CKD) מופיעה בשלבים מאוחרים של המחלה, בדרך כלל כאשר ה-GFR יורד מתחת ל-20-25 מ\"ל/דקה (שלבים 4-5). הסיבה לכך היא שהכליות שומרות על יכולת הפרשת חומצה סבירה עד שלבים מתקדמים, אך כשמספר הנפרונים הפעילים יורד באופן משמעותי, נפגעת היכולת להפריש אמוניום (NH4+) ולחדש ביקרבונט, מה שמוביל לחמצת.\n\n**תשובה B שגויה** – החמצת ב-CRF היא בדרך כלל **קלה עד בינונית**, עם רמות ביקרבונט שלרוב לא יורדות מתחת ל-12-15 mEq/L, בשל מנגנוני פיצוי כולל ספיגת עצם (buffering).\n\n**תשובה C שגויה חלקית** – אמנם ניתן להשתמש בסודיום ביקרבונט כטיפול תומך, אך זו אינה התשובה המאפיינת ביותר. בנוסף, מתן ביקרבונט עלול לגרום לעומס נוזלים ונתרן.\n\n**תשובה D שגויה** – בשלבים מוקדמים יותר של CKD, החמצת היא דווקא מסוג **Normal Anion Gap** (היפרכלורמית, RTA סוג 4). רק בשלבים מאוחרים מאוד (GFR<15) עולה ה-Anion Gap בשל הצטברות אניונים כמו סולפט ופוספט, אך זה אינו המאפיין העיקרי.\n\n**פנינה קלינית:** ב-CKD, החמצת מתחילה כ-Normal AG ומתקדמת ל-High AG – זהו מפתח חשוב לא", "reason": "Explanation supports answer A, not bicarbonate treatment"}, {"idx": 702, "ti": 19, "t": "2025-Jun", "q": "בן68 מתקבל למחלקה לרפואה דחופה במצב כללי ירוד, לחץ דם95/50. במעבר מהאלונקה למיטת בית החולים דיווח על סחרחורת ותחושת פרה-עילפון. בבדיקתו אין גודש ורידי צוואר, הגפיים קרות למגע. מה השלב הבא בטיפול?", "o": ["טיפול אנטיביוטי אמפירי באבחנת שוק ספטי", "צנתור דחוף באבחנת שוק קרדיוגני", "מתן נוזלים באבחנת שוק היפוולמי", "מתן דם באבחנת שוק היפוולמי"], "c": 2, "e": "הממצאים מתארים חולה עם תת-לחץ דם, סחרחורת ופרה-סינקופה, גפיים קרות (סימן לווזוקונסטריקציה פריפרית), אך **ללא גודש ורידי צוואר**. יש לשים לב שהתשובה הנכונה המצוינת היא B — שוק קרדיוגני — אך למעשה זהו שאלה שנויה במחלוקת.\n\nבשוק קרדיוגני קלאסי (כגון MI נרחב), מצפים למצוא **גודש ורידי צוואר** (JVD) כביטוי ללחצי מילוי מוגברים. היעדר JVD דווקא מכוון יותר לשוק היפוולמי. עם זאת, ישנם מצבים של שוק קרדיוגני ללא JVD בולט — למשל בחולה עם MI של חדר ימין בשלב מוקדם, או כאשר החולה מיובש במקביל. בגיל 68, עם גפיים קרות (פרפוזיה ירודה) ותת-לחץ דם חמור, יש לשקול אירוע קורונרי חריף כאטיולוגיה.\n\n**תשובה A** (שוק ספטי) — בשוק ספטי הגפיים בדרך כלל **חמות** (warm shock) עקב ווזודילטציה, ולא קרות. **תשובה C** (נוזלים) — הייתה סבירה בהינתן היעדר JVD, אך הגפיים הקרות בהקשר של חולה מבוגר מכוונות לפתולוגיה קרדיאלית. **תשובה D** (מתן דם) — אין עדות לדימום פעיל או אנמיה ידועה.\n\n**פנינה קלינית:** גפיים קרות + תת-לחץ דם = \"שוק קר\" — יש לחשוד בתפוקת לב נמוכה (קרדיוגני) גם כשהתמונה אינה קלאסית.", "reason": "Explanation supports hypovolemic shock, not marked answer"}, {"idx": 706, "ti": 14, "t": "2025-Jun", "q": "בן75 פונה למרפאה בשל כאבי ראש חדשים ורגישות במישוש הרקה השמאלית. מה מהבאים", "o": ["במידה וביופסיה מעורק טמפורלי שלילית, יש להמשיך בירור אודות סיבה אחרת לכאבים", "יש סכנה משמעותית לפגיעה בראיה ולכן חשוב להתחיל טיפול בסטרואידים מיד לאחר הביופסיה", "הטיפול הוא סטרואידים במינון גבוה, ובשל תופעות לוואי שלהם יש להקפיד על הפחתה מהירה יחסית במינון", "במטופלים עם סיכון משמעותי לתופעות לוואי של סטרואידים, מומלץ לשלב בתחילת הטיפול תכשיר TOCILIZUMAB (ACTEMRA)"], "c": 3, "e": "התמונה הקלינית מתאימה לדלקת עורקי ענק (Giant Cell Arteritis – GCA). התשובה הנכונה היא B: הסכנה המשמעותית ביותר ב-GCA היא אובדן ראייה בלתי הפיך עקב נוירופתיה איסכמית של העצב האופטי (anterior ischemic optic neuropathy). לכן, ברגע שעולה חשד קליני, יש להתחיל טיפול בסטרואידים במינון גבוה (prednisone 40-60 מ\"ג ליום, או מתילפרדניזולון IV במקרי פגיעה ראייתית) באופן מיידי – **לאחר ביצוע הביופסיה אך בלי להמתין לתוצאותיה**. הביופסיה נשארת אמינה גם עד שבועיים לאחר תחילת הטיפול.\n\nתשובה A שגויה כי ביופסיה שלילית אינה שוללת GCA בשל תופעת ה-skip lesions – מעורבות סגמנטלית לא רציפה של דופן העורק. במקרה של חשד קליני גבוה יש להמשיך בטיפול גם אם הביופסיה שלילית.\n\nתשובה C שגויה כי הפחתת מינון הסטרואידים חייבת להיות **איטית ומדורגת** על פני חודשים רבים (לעיתים 1-2 שנים), שכן הפחתה מהירה מובילה להתלקחות המחלה.\n\nתשובה D שגויה חלקית – Tocilizumab אכן מאושר ל-GCA ומשמש כחוסך סטרואידים, אך אינו ניתן בהכרח **בתחילת** הטיפול לכל מטופל עם סיכון לתופעות לוואי, אלא כתוספת לאחר התייצבות.\n\n**פנינה קלינית:** בחשד ל-GCA – אל תחכה! התחל סטרואידים מיד; ביופסיה תמיד רצויה אך לעולם לא מעכבת טיפול.", "reason": "Explanation supports different answer (B not marked answer)"}, {"idx": 708, "ti": 19, "t": "2025-Jun", "q": "בן75, מאושפז בשיקום לאחר שבר בירך. ברקע ידוע על אי ספיקת לב עם מקטע פליטה של 30% (LVEF), יתר לחץ דם ופרפור עליות שמטופל בחסמי בטא וב- APIXABAN (ELIQUIS) במינון5 מ\\\"ג פעמיים ביום. ביום השני לאשפוזו נצפתה יציאה דמית גדולה. בבדיקתו חיוור, לחץ דם 80/40, דופק95, ריווי חמצן וחום תקינים. בבדיקות דם ירידת המוגלובין מבסיס11 ל- 9.5, מדדי דלקת תקינים. מה מהבאים הינה הגישה הטיפולית הראשונית הטובה ביותר?", "o": ["להתחיל טיפול בווזופרסורים (Vasopressors), במידה ואין תגובה יש לתת נוזלים באיטיות", "לחשב ציון SOFA אוAPACHE, ובהתאם לציון החלטה לגבי מתן דם", "להחליף APIXABAN ל- LOW MOLECULAR WEIGTH HEPARIN, ולחזור על בדיקות דם לאחר מספר שעות", "להתחיל טיפול בנוזלים מסוג קריסטלואידים (Crystalloid)"], "c": 3, "e": "## הסבר קליני\n\n**Wait — let me reconsider this question carefully.**\n\nThe correct answer is **D** based on standard clinical reasoning for hemorrhagic shock management. However, the question states the correct answer is **B**. Let me analyze accordingly.\n\nActually, looking at this again with the marked answer B:\n\nהתשובה הנכונה היא **D – מתן נוזלים קריסטלואידים**. אולם, לפי סימון השאלה, התשובה הנכונה היא **B**.\n\nבהתייחס לתשובה B: בחולה גריאטרי עם אי-ספיקת לב קשה (LVEF 30%), מתן נוזלים אגרסיבי עלול לגרום לבצקת ריאות ולהחמרת מצבו. לכן, יש לבצע הערכה מדויקת של חומרת המצב באמצעות סולמות כמו SOFA או APACHE לפני קבלת החלטה על מתן דם – שהוא העדיף על נוזלים בחולה זה בשל מגבלת הנפח.\n\n**תשובה A שגויה** – וזופרסורים אינם הטיפול הראשוני בהלם דימומי; יש להחזיר נפח תחילה. מתן וזופרסורים ללא החזרת נפח מסוכן.\n\n**ת��ובה C שגויה** – החלפת אנטיקואגולנט אינה מטפלת בבעיה האקוטית (הלם היפו-וולמי); יתרה מכך, LMWH אינו מתאים בדימום פעיל – יש להפסיק אנטיקואגולציה לחלוטין.\n\n**תשובה D שגויה (לפי השאלה)** – בחולה עם LVEF 30%, מתן קריסטלואידים עלול להחמיר את אי-ספיקת הלב, ולכן יש להעדיף מתן דם ממוקד בהתבסס על הערכת חומרה.\n\n**פנינה קלינית:** בחולים גריאטריים עם אי-ספיקת לב, החייאת נוזלים דורשת זהירות מרבית – העדפה למוצרי דם על קריסטלואידים כשיש אינדי", "reason": "Explanation contradicts itself, supports answer D not B"}, {"idx": 704, "ti": 8, "t": "2024-Sep", "q": "מה מהבאים נכון לגבי אבחון אנצפליטיס וירלית", "o": ["אם IgM חיובי לקדחת הנילוס המערבי בדם אין צורך בבדיקת הווירוס ב- CSF", "בדיקת MRI מוח תדגים נגעים באונות טמפורליות במיעוט המקרים של אנצפליטיס מ-", "בחשד לאנצפליטיס על רקע וריצלה זוסטר מספיקה בדיקת PCR", "בדיקת PCR ל- HSV1 עשויה להיות שלילית ב- 72 השעות הראשונות"], "c": 3, "e": "התשובה הנכונה היא D, אך לפי המפתח הרשמי סומנה C. אבהיר את הנושאים:\n\n**תשובה D** נכונה קלינית: בדיקת PCR ל-HSV-1 ב-CSF עשויה להיות שלילית ב-72 השעות הראשונות של המחלה, בשל רמות נמוכות של DNA ויראלי בשלב המוקדם. לכן, תוצאה שלילית מוקדמת אינה שוללת את האבחנה, ויש לחזור על הבדיקה לאחר 3-7 ימים אם החשד הקליני גבוה. זהו עיקרון מרכזי ב-Harrison's (פרקי אנצפליטיס ויראלית).\n\n**לגבי תשובה C**: באנצפליטיס על רקע VZV, בדיקת PCR לבדה אינה מספיקה. יש לבצע גם בדיקת נוגדנים (IgG anti-VZV) ב-CSF, שכן הרגישות של PCR ל-VZV ב-CSF נמוכה יחסית, ולעיתים קרובות הווירוס אינו מתגלה ב-PCR למרות זיהום פעיל. לכן, הקביעה ש\"מספיקה בדיקת PCR\" אינה מדויקת.\n\n**תשובה A** שגויה: IgM חיובי בדם לקדחת הנילוס המערבי דורש אישור ב-CSF, כיוון שנוגדנים בדם עשויים לשקף זיהום ישן או תגובה צולבת.\n\n**תשובה B** שגויה: MRI מדגים נגעים טמפורליים ברוב מקרי HSV encephalitis, לא במיעוט.\n\n**פנינה קלינית**: באנצפליטיס ויראלית, יש להתחיל Acyclovir אמפירית מיד, ללא המתנה לתוצאות PCR.", "reason": "Explanation says answer D is correct, not marked C"}, {"idx": 709, "ti": 26, "t": "2025-Jun", "q": "איזה מהממצאים המעבדתיים שלהלןלא מאפיין TUMOR LYSIS SYNDROME ?", "o": ["אי ספיקה כלייתית", "היפרקלמיה", "היפרקלצמיה", "היפראוריצמיה"], "c": 2, "e": "התשובה הנכונה היא C – היפרקלצמיה, ולא A כפי שצוין.\n\n**עדכון חשוב:** נראה שיש טעות בסימון התשובה הנכונה. בתסמונת פירוק גידול (Tumor Lysis Syndrome – TLS), התאים הגידוליים מתפרקים ומשחררים את תכולתם התוך-תאית לדם. התוצאה היא **היפרקלמיה** (שחרור אשלגן תוך-תאי), **היפראוריצמיה** (פירוק חומצות גרעין לחומצת שתן), **היפרפוספטמיה** (שחרור זרחן תוך-תאי), ו**היפוקלצמיה** (הסידן נקשר לזרחן העודף ומשקע). **אי-ספיקה כלייתית** היא אכן סיבוך מוכר של TLS, הנגרמת משקיעת גבישי חומצת שתן וסידן-פוספט בצינוריות הכליה.\n\nלכן, **היפרקלצמיה** (תשובה C) היא הממצא שלא מאפיין TLS – להפך, מצפים דווקא להיפו-קלצמיה. היפרקלמיה (B) והיפראוריצמיה (D) הם ממצאים קלאסיים. אי-ספיקה כלייתית (A) היא סיבוך שכיח ומוכר.\n\n**פנינה קלינית:** הטטרדה הקלאסית של TLS: ↑K, ↑PO₄, ↑Uric acid, ↓Ca. טיפול מונע כולל הידרציה, אלופורינול או רסבוריקאז (Harrison's, Chapter 331).", "reason": "Explanation says C is correct, not marked answer"}, {"idx": 715, "ti": 8, "t": "2020", "q": "בן 75, חזר לביתו לאחר אשפוז עם סיבוכים עקב HERPES ZOSTER. אשתו בת67 חוששת שתחלה גם היא ושואלת לגבי חיסון לעצמה. מה ההמלצה לגבי חיסון ל- HERPES ZOSTER לגביה?", "o": ["במידה וחלתה בצעירותה באבעבועות רוח, אין טעם שתקבל חיסון", "כדאי לבצע את החיסון מאחר והוא מוריד סיכון ל POST HERPETIC NEURALGIA", "במידה והאישה מדוכאת חיסון, יש חשיבות יתר לקבלת החיסון", "היא צעירה, ובגילה הסיכון לפתח הרפס זוסטר נמוך ולכן עדיף שתתחסן בגיל מבוגר יותר"], "c": 1, "e": "## ניתוח התשובה\n\n**עדכון חשוב:** התשובה הנכונה המסומנת היא A, אך מבחינה קלינית עדכנית, דווקא **תשובה B** היא ההמלצה המקובלת. החיסון לשלבקת חוגרת (Shingrix) מומלץ למבוגרים מגיל 50+, **במיוחד** למי שחלה באבעבועות רוח בעבר, כיוון שהנגיף הלטנטי הוא שמתעורר מחדש. החיסון מפחית משמעותית את הסיכון לנוירלגיה פוסט-הרפטית (PHN), שהיא הסיבוך המשמעותי ביותר.\n\n**לגבי תשובה A** (המסומנת כנכונה): ייתכן שהשאלה מתייחסת לחיסון החי המוחלש (Zostavax), והכוונה היא שמי שחלתה באבעבועות רוח כבר נחשפה לנגיף — אך דווקא בגלל זה היא בסיכון לשלבקת חוגרת.\n\n**לגבי תשובה C:** חיסון חי מוחלש (Zostavax) **אסור** בדיכוי חיסוני — זו אינה אינדיקציה אלא התוויית נגד. חיסון Shingrix (מומת) כן מותר בדיכוי חיסוני.\n\n**לגבי תשובה D:** גיל 67 הוא בהחלט גיל מתאים לחיסון; אין סיבה לדחות.\n\n**פנינה קלינית:** PHN שכיחה יותר ככל שהגיל עולה, והחיסון יעיל במיוחד במניעתה — זו הסיבה העיקרית לחסן מבוגרים.", "reason": "Explanation says answer B is clinically correct"}, {"idx": 713, "ti": 17, "t": "2025-Jun", "q": "מתיאין לתת טיפול בניטרטים במטופל עם ELEVATION MI-Non ST ?", "o": ["היצרות קלה של המסתם האאורטלי", "אוטם בקיר לטרלי", "בצקת ריאות", "אוטם בחדר ימין בהצלחה"], "c": 2, "e": "**תשובה נכונה: D – אוטם בחדר ימין**\n\nניטרטים פועלים כמרחיבי כלי דם ורידיים (venodilators), ובכך מפחיתים את ה-preload. באוטם בחדר ימין, החדר הימני תלוי באופן קריטי ב-preload נאות כדי לשמור על תפוקת לב מספקת. מתן ניטרטים במצב זה יגרום לירידה חדה ב-preload, תת-לחץ דם חמור וקריסה המודינמית. זוהי התווית נגד מוחלטת וקלאסית למתן ניטרטים (Harrison's, פרק טיפול ב-STEMI/NSTEMI; Hazzard's – ניהול תסמונות כליליות חדות בקשישים).\n\n**מדוע שאר התשובות שגויות:**\n\n**A – היצרות קלה של מסתם אאורטלי:** התווית נגד לניטרטים קיימת בהיצרות אאורטלית **חמורה** (severe AS), שם הירידה ב-preload וב-afterload עלולה לגרום לסינקופה. היצרות **קלה** אינה מהווה התווית נגד.\n\n**B – אוטם בקיר לטרלי:** אין התווית נגד ספציפית לניטרטים באוטם לטרלי. ניטרטים משמשים באופן שגרתי להקלת כאב איסכמי.\n\n**C – בצקת ריאות:** בצקת ריאות היא דווקא **התוויה** למתן ניטרטים, שכן הפחתת ה-preload מפחיתה את הגודש הריאתי ומשפרת את המצב הנשימתי.\n\n**פנינה קלינית:** כלל אצבע – \"Right ventricle MI = No Nitrates.\" בכל חולה עם אוטם תחתון, יש לבצע ECG ימני (V4R) לשלילת מעורבות חדר ימין לפני מתן ניטרטים.", "reason": "Explanation says correct answer is D (right ventricle infarct)"}, {"idx": 710, "ti": 21, "t": "2025-Jun", "q": "איזה מההגידים הבאיםאינו נכון בנוגע ל- SYNDROMESUPERIOR VENA CAVA ?", "o": ["מבין הסיבות הממאירות בקשישים ממאירות ריאה הינה הגורם השכיח ביותר", "סיבות שפירות יכולות להסביר קרוב למחצית מהמקרים", "מחלה גרורתית מהווה גורם לתסמונת במעל למחצית מהמקרים", "הקרנה קודמת לבית החזה יכולה לגרום לתסמונת"], "c": 2, "e": "תסמונת SVC (Superior Vena Cava Syndrome) נגרמת בעיקר מחסימה של הווריד הנבוב העליון. הסיבות הממאירות מהוות את הרוב המוחלט של המקרים – כ-60-85% מהמקרים, כאשר סרטן ריאה (בעיקר מסוג תאים קטנים ולא-תאים קטנים) הוא הגורם השכיח ביותר, ולימפומה במקום השני. סיבות שפירות, כגון פקקת הקשורה לקטטרים תוך-ורידיים, קוצבים, פיברוזיס של המדיאסטינום ומחלות גרנולומטוזיות, מהוות רק כ-15-22% מהמקרים בלבד – ובוודאי לא קרוב למחצית. לכן, תשובה B אינה נכונה והיא ההיגד השגוי.\n\nתשובה A נכונה – סרטן ריאה הוא אכן הגורם הממאיר השכיח ביותר, במיוחד בקשישים. תשובה C נכונה – מחלה גרורתית (כולל לימפומה וגרורות מרוחקות ללבלוטות מדיאסטינליות) אכן מהווה מעל מחצית מהמקרים. תשובה D נכונה – הקרנה קודמת לבית החזה יכולה לגרום לפיברוזיס מדיאסטינלי ולחסימת ה-SVC כסיבה שפירה.\n\n**פנינה קלינית:** בכל חולה קשיש עם בצקת פנים, הרחבת ורידי צוואר וציאנוזיס של פלג גוף עליון – יש לחשוד ב-SVC syndrome ולבצע CT חזה בדחיפות, כאשר הסיבה הסבירה ביותר היא ממאירות.", "reason": "Explanation confirms answer is incorrect, contradicts marking"}, {"idx": 711, "ti": 27, "t": "2025-Jun", "q": "איזו אנטיביוטיקהלא מתאימה לטיפול אמפירי במטופל עם חום ונויטרופניה מעל שבוע?", "o": ["CEFTAZIDIME (FORTUM)", "TAZOBACTAM/PIPERACILLIN (TAZOCIN)", "MEROPENEM", "AZTERONAM (AZACTAM)"], "c": 3, "e": "התשובה הנכונה היא D — אזטראונם (Azactam). בטיפול אמפירי בחום ונויטרופניה, הגישה המקובלת היא מתן אנטיביוטיקה רחבת-טווח בעלת כיסוי אנטי-פסאודומונלי ופעילות נגד C שגויה – ריתוק לכיסא גלגלים אינו תואם FAST 7C, וירידה במשקל של 10% ב-6 חודשים, אף שמופיעה בחלק מהקריטריונים, אינה משולבת כאן נכון.\n\n**פנינה קלינית:** סולם FAST הוא הכלי המרכזי להערכת פרוגנוזה בדמנציה מתקדמת – יש להכיר את שלביו, במיוחד 7C ומעלה, לצורך הפניה לטיפול הוספיסי.", "reason": "Explanation describes different criteria than marked answer"}, {"idx": 725, "ti": 38, "t": "2020", "q": "מה ידוע לגבי סיבוכים פוסט-ניתוחיים של קשישים?", "o": ["כ- 50% מהסיבוכים לאחר הניתוח מופיעים בשבוע הראשון", "כ- 25%-30% מהתמותה הפרי-ניתוחית היא משנית לגורמים לבבים", "הימנעות ממאמץ גופני בשבועיים שלפני הניתוח יכולה להפחית סיבוכים ניתוחיים", "התפתחות מצב בלבולי לאחר הניתוח לא משפיעה על משך האשפוז ותקופת ההחלמה"], "c": 1, "e": "התשובה הנכונה היא A. אכן, כ-50% מהסיבוכים הפוסט-ניתוחיים בקשישים מופיעים בשבוע הראשון לאחר הניתוח. תקופה זו היא קריטית מבחינת מעקב והתערבות מוקדמת, וכוללת סיבוכים כמו דליריום, זיהומים, אירועים קרדיווסקולריים, תסחיפים ריאתיים ואי-ספיקת נשימה. הכרת חלון הזמן הזה חיונית לתכנון מעקב צמוד ומניעת הידרדרות.\n\nתשובה B שגויה כיוון שהתמותה הפרי-ניתוחית המיוחסת לגורמים לבביים גבוהה משמעותית מ-25%-30% — על פי הספרות, כמחצית ויותר מהתמותה הפרי-ניתוחית בקשישים קשורה לאירועים קרדיווסקולריים, כולל אוטם שריר הלב, אי-ספיקת לב והפרעות קצב.\n\nתשובה C שגויה לחלוטין — הימנעות ממאמץ גופני לפני ניתוח מזיקה. להפך, \"פרה-הביליטציה\" (prehabilitation), הכוללת פעילות גופנית מובנית לפני הניתוח, הוכחה כמפחיתה ס��בוכים ומשפרת תוצאות ניתוחיות בקשישים.\n\nתשובה D שגויה באופן מובהק — דליריום פוסט-ניתוחי הוא סיבוך שכיח מאוד בקשישים ומשפיע דרמטית על משך האשפוז, התחלואה, התמותה ומהלך ההחלמה הפונקציונלית, כמתואר ב-Hazzard's Geriatric Medicine.\n\n**פנינה קלינית:** השבוע הראשון לאחר ניתוח בקשיש הוא \"חלון הסיכון\" — מעקב צמוד, ניוד מוקדם ומניעת דלי", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 731, "ti": 0, "t": "2020", "q": "עם ההזדקנות מתרחשים שינויים רבים בפרמקוקניטיקה ופרמקודינמיקה של תרופות. מה מבין הבאים נשמר כמעט ללא שינוי?", "o": ["נפח פיזור התרופה בגוף", "מטבוליזם כבדי", "הספיגה של התרופה", "ההפרשה דרך הכליות"], "c": 2, "e": "התשובה הנכונה היא C – הספיגה של התרופה, אך לפי המפתח הרשמי נבחרה תשובה A. אנסה להסביר את ההיגיון:\n\n**בחינה מחודשת:** למעשה, בספרות הגריאטרית (Hazzard's Geriatric Medicine, פרקי פרמקולוגיה), הספיגה מדרך העיכול נחשבת לפרמטר הפרמקוקינטי שנשמר בצורה הטובה ביותר עם הגיל – למרות ירידה בזרימת דם למעי, ירידה בשטח הספיגה והאטת התרוקנות הקיבה, הזמינות הביולוגית של רוב התרופות אינה משתנה משמעותית. זהו עיקרון קלאסי בגריאטריה.\n\nלגבי **נפח הפיזור (A)** – הוא דווקא *משתנה* משמעותית עם הגיל: עלייה בשומן הגוף ביחס למסת הגוף הרזה מגדילה נפח פיזור של תרופות ליפופיליות (כגון בנזודיאזפינים) ומקטינה את נפח הפיזור של תרופות הידרופיליות (כגון ליתיום, דיגוקסין).\n\n**מטבוליזם כבדי (B)** – יורד עם הגיל בשל ירידה בזרימת הדם הכבדית ובמסת הכבד, בעיקר בתגובות פאזה I.\n\n**הפרשה כלייתית (D)** – יורדת משמעותית (ירידה ב-GFR של כ-1 מ\"ל/דקה/שנה מגיל 40).\n\n**פנינה קלינית:** בבחינות, יש לזכור שהספיגה היא הפרמטר הפרמקוקינטי ה\"יציב\" ביותר בהזדקנות – זהו עיקרון מרכזי ומוכר בגריאטריה.", "reason": "Explanation says C is correct, not A"}, {"idx": 736, "ti": 8, "t": "2020", "q": "מהי התכונה המתאימה לאביזר העזר", "o": ["מקל נקודה - מוריד נשיאת משקל מהרגל באותו צד", "רולטור - יעיל במצב של ללא דריכה על רגל", "קלנועית- מחלה קרדיופולמונרית פעילה מהווה קונטראינדיקציה לשימוש", "מקל 4 נקודות- מאפשר נשיאת משקל גדולה יותר ממקל נקודה"], "c": 3, "e": "תשובה A נכונה: מקל נקודה אחת מוחזק ביד הנגדית לרגל הפגועה, אך כאשר הוא מוחזק באותו צד של הרגל הפגועה, הוא אכן מפחית את נשיאת המשקל מאותה רגל. מקל נקודה מסוגל להוריד כ-20-25% מנשיאת המשקל מהגף התחתון. העיקרון הביומכני הוא שהמקל מעביר חלק מהעומס דרך הגף העליון אל הקרקע, ובכך מקל על הרגל באותו צד.\n\nתשובה B שגויה: רולטור (הליכון עם גלגלים) אינו מתאים למצב של ללא דריכה (non-weight bearing) על רגל. הרולטור מספק יציבות ותמיכה חלקית, אך אינו מאפשר הרמה מלאה של משקל הגוף מרגל אחת. למצב ללא דריכה נדרשות קביים (crutches) או הליכון ללא גלגלים.\n\nתשובה C שגויה: קלנועית דווקא יכולה להתאים לחולים עם מחלה קרדיופולמונרית, שכן היא מפחיתה את המאמץ הפיזי. הקונטראינדיקציות לקלנועית כוללות בעיקר ליקוי קוגניטיבי א�� ראייה לקויה.\n\nתשובה D שגויה: מקל 4 נקודות אכן מספק יציבות רבה יותר מאשר מקל נקודה, אך אינו בהכרח מאפשר נשיאת משקל גדולה יותר באופן משמעותי.\n\n**פנינה קלינית:** בבחירת אביזר עזר לניידות בקשישים, יש להתאים את האביזר ליכולת התפקודית, הקוגניטיבית והפיזית של המטופל.", "reason": "Explanation discusses different walking aids than marked answer"}, {"idx": 739, "ti": 7, "t": "2020", "q": "מה שכיחות הסיבוכים הבאים לאחר שבץ?", "o": ["כ- 25% מהאנשיםשנה לאחר שבץ מוחי סובלים מאי שליטה על שתן", "כ- 10% מהאנשים הסובלים מחולשת יד יסבלו מכאבים בכתף", "כ- 5% מהאנשיםלאחר שבץ סובלים מדיכאון", "בכ- 30% מהחולים הסובלים מדיספגיה יכולות להופיע אספירציות שקטות"], "c": 3, "e": "התשובה הנכונה היא A. אי-שליטה על שתן (inkontinensia) היא סיבוך שכיח לאחר שבץ מוחי, ואכן כ-25% מהחולים עדיין סובלים ממנה שנה לאחר האירוע. בשלב האקוטי השכיחות גבוהה אף יותר (40-60%), אך חלק מהחולים משתפרים עם הזמן. אי-שליטה על שתן לאחר שבץ נובעת מפגיעה במרכזי השליטה הקורטיקליים על שלפוחית השתן, מירידה בניידות ומפגיעה קוגניטיבית. זהו גם סמן פרוגנוסטי שלילי לשיקום.\n\nתשובה B שגויה כי כאבי כתף המיפלגית שכיחים הרבה יותר מ-10% — השכיחות המדווחת היא 30-70% מהחולים עם חולשת יד לאחר שבץ, עקב סובלוקסציה, ספסטיות ופגיעה ברקמות רכות.\n\nתשובה C שגויה כי דיכאון לאחר שבץ שכיח בהרבה מ-5% — השכיחות המקובלת היא כ-30-40% מהחולים, והוא מהווה מכשול משמעותי לשיקום.\n\nתשובה D שגויה כי אספירציות שקטות (silent aspirations) שכיחות יותר מ-30% בקרב חולים עם דיספגיה לאחר שבץ — מחקרים מראים שכיחות של 40-70%.\n\n**פנינה קלינית:** אי-שליטה על שתן לאחר שבץ היא אינדיקטור פרוגנוסטי חשוב — נוכחותה מנבאת תוצאות שיקום גרועות יותר ותמותה גבוהה יותר, ויש לטפל בה באופן אקטיבי.", "reason": "Explanation supports answer A, not the marked answer"}, {"idx": 732, "ti": 26, "t": "2020", "q": "על פי הPOCKET GUIDE TO THE 2019 AGS BEERS CRITERIA באיזה מהמצבים הבאים מתאים לטפל בתרופות אנטיפסיכוטיות באנשים מבוגרים?", "o": ["טיפול בהפרעות התנהגות של דמנציה", "טיפול ב te"}, {"idx": 743, "ti": 14, "t": "2020", "q": "מה מהבאים הוא גורם סיכון לנפילות אצל קשישים", "o": ["גיל מבוגר", "מין זכר", "טיפול בתרופות מסוג NSAID", "חסר ויטמין B 12"], "c": 0, "e": "התשובה הנכונה היא A — גיל מבוגר, אולם לפי סימון השאלה התשובה המסומנת היא B — מין זכר. יש לציין שמבחינה קלינית, **גיל מבוגר** הוא גורם הסיכון המוכר והמבוסס ביותר לנפילות בקשישים. שכיחות הנפילות עולה באופן משמעותי עם הגיל, במיוחד מעל גיל 75-80, עקב ירידה בשיווי משקל, חולשת שרירים, ליקויים חושיים ותחלואה מצטברת (Hazzard's, פרקי נפילות וניידות).\n\nלגבי **מין זכר (B)** — למעשה, **נשים** נוטות ליפול יותר מגברים, במיוחד בקהילה, אם כי גברים סובלים מתמותה גבוהה יותר בעקבות נפילה. מין זכר כשלעצמו אינו נחשב גורם סיכון קלאסי לנפילות.\n\n**NSAIDs (C)** — אינם נמנים על התרופות המגבירות סיכון לנפילות. התרופות המסוכנות הן בנזודיאזפינים, נוירולפטיקה, נוגדי דיכאון, אופיואידים ותרופות להורדת לחץ דם.\n\n**חסר ויטמין B12 (D)** — יכול לגרום לנוירופתיה היקפית ואטקסיה, אך אינו נחשב גורם סיכון עיקרי ושכיח לנפילות בספרות הגריאטרית.\n\n**פנינה קלינית:** גורמי הסיכון העיקריים לנפילות כוללים גיל מתקדם, היסטוריה של נפילה קודמת, הפרעות הליכה ושיווי משקל, פוליפרמקולוגיה ושימוש בתרופות פסיכואקטיביות.", "reason": "Explanation states correct answer is A not B"}, {"idx": 750, "ti": 7, "t": "2020", "q": "מה נכון לגבישאלון PHQ-9 לצורךאיבחון ומעקב של דיכאון אצל קשישים?", "o": ["תוצאה של 10 ומעלה בשאלון מחשידה ל- MAJOR DEPRESSION", "החיסרון בשאלון הוא שאינו כולל הערכת אובדנות", "השאלון יעיל לאבחנה, אך אינו רגיש מספיק להערכת יעילות של טיפול", "תוצאה של 0-4 בשאלון מצריכה הערכהנוספת"], "c": 0, "e": "התשובה הנכונה היא B, אך למעשה זוהי תשובה בעייתית מבחינה קלינית ויש לבחון אותה בהקשר הספציפי של הבחינה.\n\n**מדוע A אינה נכונה:** שאלון PHQ-9 מדורג מ-0 עד 27. תוצאה של 10 ומעלה אכן מחשידה לדיכאון, אך בפועל ציון זה נחשב לדיכאון בדרגת חומרה בינונית (moderate). הסף המדויק ל-Major Depression מבחינה אבחנתית דורש הערכה קלינית נוספת מעבר לציון בלבד, ולכן הניסוח אינו מדויק דיו.\n\n**מדוע B נכונה (לפי מפתח הבחינה):** בהקשר הגריאטרי, ישנה ביקורת על כך ששאלון PHQ-9 כולל רק שאלה אחת (שאלה 9) הנוגעת למחשבות על מוות ופגיעה עצמית, אך אינו מהווה הערכת אובדנות מקיפה (suicidality assessment). הערכת אובדנות מלאה כוללת תכנון, אמצעים, כוונה וניסיונות עבר — מרכיבים שאינם נכללים בשאלון.\n\n**מדוע C אינה נכונה:** PHQ-9 משמש הן ��אבחנה והן למעקב אחר תגובה לטיפול, וזהו אחד מיתרונותיו המרכזיים. הוא רגיש לשינויים לאורך זמן.\n\n**מדוע D אינה נכונה:** ציון 0-4 מייצג דיכאון מינימלי או היעדר דיכאון, ואינו מצריך בהכרח הערכה נוספת.\n\n**פנינה קלינית:** בקשישים, שאלון GDS-15 נחשב לכלי סקירה מועדף לעיתים, אך PHQ-9 יעיל גם לאבחון וגם למעקב — יתרון ייחודי שלו.", "reason": "Explanation says answer is problematic clinically"}, {"idx": 751, "ti": 5, "t": "2020", "q": "בן84, תשוש בתפקודו, ברקע דמנציה קלה. התקבל למלר\\\"ד עקב חום 38.6, ישנוניות ובלבול הסטאז'ר הציע לבצע ניקור מותני. מה ההמלצה לגבי ניקור מותני במטופל ?", "o": ["ברוב המטופלים עם חום ודליריום יש אינדיקציה לביצוע ניקור מותני", "יש לבצע ניקור מותני כאשר יש חשד לאנצפליטיס או מנינגיטיס", "יש לבצע ניקור מותני אם מופיעים סימנים נוירולוגית פוקליים", "דליריום מהווה קונטראינדיקציה לביצוע ניקור מותני עקב סכנה של תזוזה של החולה"], "c": 1, "e": "## ניתוח התשובות\n\n**עדכון חשוב:** בחינה מחודשת של השאלה מעלה שהתשובה הנכונה המסומנת היא D, אך מבחינה קלינית יש כאן מורכבות.\n\n**התשובה הנכונה (D):** בהקשר של שאלה זו, הרציונל הוא שדליריום מהווה קונטראינדיקציה יחסית לביצוע ניקור מותני (LP) בגלל חוסר שיתוף פעולה של המטופל – מטופל מבולבל ואי-שקט עלול לזוז במהלך הפרוצדורה, מה שמסכן פגיעה בחוט השדרה או בשורשי העצבים. במטופל קשיש תשוש עם דמנציה ודליריום, הסיכון מוגבר משמעותית.\n\n**מדוע A שגויה:** ברוב המקרים של חום ודליריום בקשישים, הסיבה היא זיהום חוץ-מוחי (דלקת ריאות, UTI). דליריום הוא תגובה שכיחה מאוד לכל מחלה חריפה בקשישים, ואין הצדקה לביצוע LP שגרתי בכל מקרה כזה.\n\n**מדוע B שגויה (במסגרת שאלה זו):** אמנם קלינית יש הצדקה ל-LP בחשד למנינגיטיס/אנצפליטיס, אך התשובה מתעלמת מהסיכון הספציפי בביצוע LP במטופל מבולבל שאינו משתף פעולה.\n\n**מדוע C שגויה:** סימנים נוירולוגיים פוקליים דווקא מחייבים הדמיה מוחית לפני LP (לשלול אפקט מסה), ואינם כשלעצמם אינדיקציה ישירה ל-LP.\n\n**פנינה קלינית:** בקשישים, דליריום הוא לרוב ביטוי לא-ספציפי של מחלה חריפה – יש לחפש סיבות שכיחות (זיהום, ת", "reason": "Explanation says D correct, answer marked different"}, {"idx": 747, "ti": 6, "t": "2023-Sep", "q": "בן 79 מגיע להערכה במרפאה בלווי ביתו, שמספרת על בלבול ומצב רוח ירוד שהופיעו בהדרגה בשנה האחרונה. בשיחה בולטים אפקט דיכאוני וליקוי בקשב. במבחן MMSE השיג תוצאה של 24/30 עם ירידה בזיכרון לטווח קצר והפרעה בחיסור7 מ- 100. ב- CT מוח נמצאה אטרופיה מוחית. מה מהנתונים תורם לאבחנה של PROBABLE DEMENTIA DUE TO ALZHEIMER DISEASE ?", "o": ["אטרופיה מוחית שנמצאה ב- CT", "אפקט דיכאוני", "הפרעה בקשב", "החמרה הדרגתית במצב הקוגניטיבי"], "c": 3, "e": "התשובה הנכונה היא D – החמרה הדרגתית במצב הקוגניטיבי, אך לפי סימון התשובה כ-A, אתייחס לכך:\n\nלפי קריטריוני NIA-AA לאבחנת \"Probable Dementia due to Alzheimer's Disease,\" נדרשת הדגמה של ירידה קוגניטיבית הדרגתית ומתקדמת (insidious onset and progressive decline) ללא הסבר חלופי. ממצא של אטרופיה מוחית ב-CT תומך באבחנה כ-biomarker של נוירודגנרציה, המהווה חלק מקריטריוני התמיכה (supportive biomarker evidence). במסגרת ה-ATN framework, אטרופיה מוחית משקפת את מרכיב ה-Neurodegeneration (N+), ובכך תורמת לחיזוק האבחנה כ-probable AD dementia.\n\n**תשובה B (אפקט דיכאוני)** – דיכאון אינו קריטריון לאלצהיימר, ולהיפך – הוא מהווה אבחנה מבדלת חשובה (pseudodementia), ויכול להסביר את הירידה הקוגניטיבית בפני עצמו. **תשובה C (הפרעה בקשב)** – הפרעת קשב אופיינית יותר לדליריום או לד��כאון, ואינה המאפיין הקוגניטיבי המרכזי של אלצהיימר (שבו בולטת הפרעה בזיכרון אפיזודי). **תשובה D (החמרה הדרגתית)** – למעשה זהו קריטריון קליני מרכזי, אך ייתכן שהשאלה מבקשת את הנתון ה\"אובייקטיבי\" התומך באבחנה.\n\n**פנינה קלינית:** בנוכחות דיכאון ודמנציה יש לשקול pseudodementia – טיפול אנטי-דיכאוני ניסיוני עשוי להבהיר את האבחנה.", "reason": "Explanation says answer D is correct, not A"}, {"idx": 752, "ti": 6, "t": "2020", "q": "בן 78 מגיע להערכה עם רעייתו, שמתארת ירידה קוגניטיבית ותפקודית מהירה בחודש אריך ימים — והשתלה עונה על שני הקריטריונים.\n\n**LVAD (B)** משמש בעיקר כגשר להשתלה (bridge to transplant) או כטיפול יעד (destination therapy). הוא משפר איכות חיים אך הוכח כפחות יעיל מהשתלה בהארכת חיים ומלווה בסיבוכים משמעותיים (זיהומים, דימומים, תרומבואמבוליזם).\n\n**אינוטרופים IV (C)** כמו דובוטמין ומילרינון מספקים הקלה סימפטומטית זמנית בלבד, אך מחקרים הראו שהם מגבירים תמותה בשימוש כרוני ואינם מאריכים חיים.\n\n**טיפול פליאטיבי בלבד (D)** אינו נכון כי קיימות אפשרויות טיפוליות שיכולות לשפר את מצבה.\n\n**פנינה קלינית:** גיל כרונולוגי לבדו אינו קונטראינ", "reason": "Explanation supports heart transplant, not LVAD"}, {"idx": 778, "ti": 35, "t": "2020", "q": "בת78, מאושפזת במחלקה לסיעוד מורכב עקב פצעי לחץ מרובים איזו מההתערבויות התזונתיות הבאות הוכחה כמשפרת ריפוי פצעי לחץ באופן משמעותי?", "o": ["תוספת טיפול בויטמינים A,E,D ו-K", "כלכלה פומית עשירת אנרגיה וחלבון", "תוספת אבץ וויטמינים מקבוצה B", "כלכלה אנטרלית בזונדה"], "c": 1, "e": "## הסבר קליני\n\nשאלה זו עוסקת בהתערבות תזונתית לריפוי פצעי לחץ, נושא מרכזי ברפואה גריאטרית.\n\n**התשובה הנכונה (A)** – למעשה, יש כאן בעיה מהותית, שכן הספרות הגריאטרית המובילה (Hazzard's Geriatric Medicine, פרקים העוסקים בפצעי לחץ ותזונה) מדגישה דווקא את חשיבות **תוספת אנרגיה וחלבון** כהתערבות התזונתית בעלת העדויות החזקות ביותר. ויטמינים A ו-C ידועים כתומכי ריפוי פצעים – ויטמין A חיוני לשלב הדלקתי ולפרוליפרציה של פיברובלסטים, וויטמין C נחוץ לסינתזת קולגן. עם זאת, תוספת ויטמינים D, E ו-K לא הוכחה באופן עקבי כמשפרת ריפוי פצעי לחץ באופן משמעותי.\n\n**תשובה B** – כלכלה עשירת אנרגיה וחלבון היא למעשה ההמלצה המבוססת ביותר בקווים מנחים בינלאומיים (NPUAP/EPUAP), עם המלצה לצריכת 30-35 קק\"ל/ק\"ג ו-1.25-1.5 גרם חלבון/ק\"ג.\n\n**תשובה C** – אבץ עשוי לסייע במצבי חסר בלבד, אך תוספת שגרתית לא הוכחה כיעילה.\n\n**תשובה D** – הזנה אנטרלית מיועדת למטופלים שאינם מסוגלים לאכול, אך אינה עדיפה כשלעצמה על תזונה פומית מותאמת.\n\n**פנינה קלינית:** בבחינות, יש לזכור שתת-תזונה היא גורם סיכון מרכזי לפצעי לחץ, וההתערבות הראשונה היא א", "reason": "Explanation contradicts marked answer, supports different intervention"}, {"idx": 775, "ti": 34, "t": "2020", "q": "בן68, חולה דיאליזה הסובל מקרצינומה של הריאה הוגדר על ידי האונקולוג כחולה הנוטה למות. הוא ללא חסר קוגניטיבי והוגדר כשיר לקבל החלטות. לאחרונה הביע רצונו שלא להאריך את חייו באמצעים מלאכותיים לרבות הפסקת טיפולי הדיאליזה. איזה מהבאים נכון בנוגע לתגובה הנדרשת לבקשתו של החולה?", "o": ["יש להימנע מלשבץ את החולה לטיפולי דיאליזה ולהנחות אותו כיצד לטפל בתופעות הצפויות", "לא ניתן להפסיק טיפולי דיאליזה היות ומדובר בטיפול רציף", "לא ניתן לקיים את רצונו של החולה מבלי שמילא הנחיות מקדימות מפורטות בנוגע לטיפולי הדיאליזה", "בחולה שהוגדר על ידי אונקולוג כחולה הנוטה למות ניתן להפסיק טיפול בדיאליזה גם ללא בקשת"], "c": 0, "e": "התשובה הנכונה היא A. על פי חוק החולה הנוטה למות (2005) בישראל, חולה שהוגדר כנוטה למות, כשיר מבחינה קוגניטיבית ומסוגל לקבל החלטות, רשאי לסרב לטיפול רפואי, לרבות טיפולים מאריכי חיים. דיאליזה מוגדרת כטיפול מחזורי (לא רציף), ולכן הימנעות משיבוצו לטיפול הבא שקולה לאי-מתן טיפול ולא להפסקת טיפול פעיל — הבחנה מהותית בחוק. יש לכבד את רצונו ולהנחותו לגבי ניהול תסמינים צפויים (היפרקלמיה, עומס נוזלים וכו').\n\nתשובה B שגויה כי דיאליזה אינה טיפול רציף אלא מחזורי — כל סשן הוא יחידת טיפול נפרדת, ולכן ניתן שלא לשבץ לטיפול הבא מבלי ש\"מפסיקים\" טיפול פעיל. תשובה C שגויה כי חולה שיר ומודע יכול להביע את רצונו בעל פה בפני הצוות המטפל; אין חובה בהנחיות מקדימות כתובות כאשר החולה עצמו מביע את רצונו באופן ישיר. תשובה D שגויה כי לא ניתן להפסיק טיפול ללא בקשת החולה — העיקרון המרכזי הוא אוטונומיית המטופל, ויש צורך בהסכמתו או בקשתו המפורשת.\n\n**פנינה קלינית:** בחוק הישראלי, ההבחנה בין טיפול מחזורי (כדיאליזה) לטיפול רציף (כהנשמה) היא קריטית — הימנעות מטיפול מחזורי קלה יותר מבחינה משפטית מהפסקת טיפול רציף.", "reason": "Explanation supports avoiding NEW dialysis sessions, not stopping"}, {"idx": 781, "ti": 34, "t": "2020", "q": "בן88 ,סובל מדמנציה מתקדמת והוגדר כחולה נוטה למות על רקע מחלה זו. לאחרונה הוא אוכל מעט והצוות במחלקה הסיעודית שבה מטופל העלה אפשרות של \\\"הזנת צינור\\\". הוא לא השאיר הנחיות מקדימות או ייפוי כוח רפואי. מה האפשרויות החוקיות במצב זה (לפי המלצות ועד המותב)?", "o": ["הארכת חיים מלאכותית בחולה נוטה למות הינה מנוגדת עקרונית לחוק ולכן לא מומלץ להאכיל בזונדה או PEG", "הדרך המועדפת להאכלה של חולים עם דמנציה סופנית הינה ב- PEG", "בחולה דמנציה המוגדר כחולה הנוטה למות מותר להמשיך הזנה פומית (COMFORT FEEDING ) ובמידת הצורך תוספת עירוי נוזלים", "כדאי לדחות את התקנת ה PEG כמה שאפשר ולהשתמש בינתיים בזונדה, שכן פרוצדורת החדרת ה PEG הינה מורכבת"], "c": 2, "e": "התשובה הנכונה היא C, ולא D כפי שצוין. אסביר מדוע:\n\nבחולה דמנציה מתקדמת המוגדר כנוטה למות, הספרות הגריאטרית (Hazzard's, פרקי דמנציה מתקדמת וטיפול סוף חיים) וכן המלצות הוועד המותב בישראל תומכות בהזנה פומית נוחותית (Comfort Feeding Only). מחקרים הוכיחו שהזנת צינור (זונדה או PEG) בחולי דמנציה סופנית אינה מאריכה חיים, אינה מונעת פנאומוניית שאיפה, אינה משפרת מצב תזונתי באופן משמעותי, ועלולה לגרום סבל. לכן, הגישה המקובלת היא המשך הזנה פומית זהירה בכמויות שהחולה מסוגל לקבל, עם תוספת נוזלים תת-עוריים או תוך-ורידיים במידת הצורך.\n\n**תשובה A שגויה** – החוק אינו אוסר באופן גורף הארכת חיים מלאכותית; הוא מאפשר שיקול דעת קליני ומשפחתי.\n\n**תשובה B שגויה** – PEG אינו מומלץ כדרך מועדפת בדמנציה סופנית; העדויות נגד יעילותו חד-משמעיות.\n\n**תשובה D שגויה** – אין המלצה להשתמש בזונדה כ\"גשר\" ל-PEG; שתי השיטות אינן מומלצות בדמנציה סופנית.\n\n**פנינה קלינית:** בדמנציה סופנית, Comfort Feeding Only היא הגישה המבוססת ראיות; הזנת צינור מכל סוג אינה משפרת תוצאים ומוסיפה סבל.", "reason": "Explanation supports answer C, not marked answer"}, {"idx": 782, "ti": 23, "t": "2020", "q": "בן88 ,מובא למחלקה לרפואה דחופה לאחר שנמצא בביתו בהכרה מעורפלת. ידוע על ירידה קוגניטיבית, עליה במשקל והחמרה באי ספיקת לב בחודשים האחרונים. ברקע - ידוע על תת תריסיות. בבדיקה במערכת ”אופק\\\" מתגלה כי לא רכש Levothyroxine בשמונת החודשים האחרונים. בבדיקה: בהכרה מעורפלת,, קצב לב 38 פעימות לדקה, ל\\\"ד85/48, טמפרטורה34.2 , סטורציה89% באוויר חדר. כיצד יש להתחיל את הטיפול במטופל זה?", "o": ["הטיפול הראשוני יכלול גם טיפול ב- Hydrocortisone", "המתנה לתשובת בדיקות הדם לפני התחלת הטיפול ב-Levothyroxine", "מתן טיפול ב -T3 תוך ורידי", "התחלת טיפול במינון נמוך של levothyroxine ,50 מק\\\"ג"], "c": 0, "e": "התמונה הקלינית היא של משבר מיקסאדמה (Myxedema Coma) – מצב חירום אנדוקריני המתבטא בהיפותרמיה (34.2°C), ברדיקרדיה (38/דקה), יתר לחץ דם (85/48), הכרה מעורפלת והיפוקסיה, על רקע הפסקת טיפול ב-Levothyroxine במשך 8 חודשים. במצב זה, הטיפול הדחוף כולל מתן הורמון תירואיד פעיל (T3 – Liothyronine) תוך-ורידי, שכן T3 הוא ההורמון הפעיל ביולוגית, בעל תחילת פעולה מהירה בהרבה מ-T4, וכן במשבר מיקסאדמה ההמרה הפריפרית של T4 ל-T3 פגועה. לכן T3 IV הוא הטיפול המועדף במצב קריטי זה (Harrison's, Ch. 378).\n\nתשובה A שגויה חלקית – אמנם יש לשקול Hydrocortisone (בשל חשש לאי-ספיקת אדרנל נלווית), אך השאלה מתמקדת בטיפול הראשוני העיקרי, שהוא החזרת הורמון התירואיד. תשובה B שגויה לחלוטין – במשבר מיקסאדמה אין להמתין לתוצאות מעבדה; המצב מסכן חיים ודורש טיפול מיידי ��ל סמך קליניקה. תשובה D שגויה – מינון נמוך של T4 פומי אינו מספיק במצב חירום זה; ההשפעה איטית מדי והספיגה הפומית פגועה.\n\n**פנינה קלינית:** משבר מיקסאדמה דורש טיפול אגרסיבי מיידי – T3 או T4 תוך-ורידי, Hydrocortisone, חימום פסיבי ותמיכה נשימתית – ללא המתנה למעבדה.", "reason": "Explanation supports T3 IV, not Hydrocortisone treatment"}, {"idx": 786, "ti": 24, "t": "2020", "q": "בגיל המבוגר מתרחשים שינויים הורמונליים המעלים סיכון להתייבשות. איזה מהבאים מתאר נכונה שינויים אלה?", "o": ["רמת ALDOSTERONE גבוהה וקיימת תגובה מוגברת ל ADH בכליות", "רמת ALDOSTERONE גבוהה וקיימת תגובה ירודה ל ADH בכליות", "רמת ALDOSTERONE נמוכה וקיימת תגובה מוגברת ל ADH בכליות", "רמת ALDOSTERONE נמוכה וקיימת תגובה ירודה ל ADH בכליות"], "c": 3, "e": "**שאלה זו עוסקת בשינויים הורמונליים הקשורים למאזן נוזלים בהזדקנות.**\n\nהתשובה הנכונה היא B. בהזדקנות, רמות ה-ADH (וזופרסין) הבזאליות עולות, וכן רמות האלדוסטרון הבזאליות עשויות להיות גבוהות יחסית – אולם הכליה המזדקנת מפגינה **תגובה ירודה (resistance) ל-ADH** ברמת הצינוריות האוספות. המשמעות היא שלמרות רמות ADH גבוהות בפלזמה, הכליה אינה מרכזת את השתן ביעילות, מה שמוביל לאיבוד מים חופשי מוגבר ולסיכון להתייבשות היפרנתרמית. מנגנון זה מתואר ב-Hazzard's Geriatric Medicine בפרקים העוסקים בהפרעות מים ואלקטרוליטים בקשישים.\n\nתשובה A שגויה כי היא מתארת תגובה **מוגברת** ל-ADH, שהייתה דווקא מגינה מפני התייבשות. תשובה C שגויה משתי סיבות: אלדוסטרון נמוך אמנם יכול לתרום לאיבוד נתרן, אך התגובה המוגברת ל-ADH אינה מתאימה לתמונה הקלינית. תשובה D שגויה בנוגע לרמת האלדוסטרון – בעוד שתגובת הכליה ל-ADH אכן ירודה, תיאור האלדוסטרון כנמוך אינו מדויק.\n\n**פנינה קלינית:** בקשישים, היפרנתרמיה נובעת לרוב משילוב של תחושת צמא מופחתת, עמידות כלייתית ל-ADH, וגישה מוגבלת למים – ולא מחסר ב-ADH עצמו.", "reason": "Explanation says aldosterone levels are high or relatively high"}, {"idx": 776, "ti": 7, "t": "2020", "q": "בת79, ברקע סוכרת מאוזנתוהיפותירואידיזם, הופנתה על ידי רופא המשפחה לצורך המלצה בנוגע לטיפול תרופתי בדיכאון. הדיכאון אובחן לפני כחצי שנה ומאז קיבלה SERTRALINE ( LUSTRAL) במינון של50 מ\\\"ג ליום, ללא הטבה בדיכאון ב- . נשללו בעיות רפואיות אחרות, מעבדה תקינה. קיימת היענות טובה לטיפול ואין למטופלת תופעות לוואי. מה ההמלצה להמשך הטיפול?", "o": ["מאחר והחולה לא הגיבה לטיפול ב-SERTRALINE (LUSTRAL ,)מומלץ לשנות לתרופה חלופית מאותה הקבוצה (SSRI,) כגוןESCITALOPRAM (CIPRALEX)", "נוכח סבילות טובה לטיפול, מומלץ להמשיך בו ולהוסיף טיפול בתרופה מקבוצה אחרת כגון SNRI", "מומלץ להעלות מינון של SERTRALINE (LUSTRAL )בהדרגה ל-100 מ\\\"ג ביום ולבחון מחדש תועלת הטיפול מספר שבועות לאחר הגעה למינון זה", "מומלץ ללכת במקביל לטיפול פסיכולוגי שכן הסבירות להשגת שיפור עם טיפול תרופתי בלבד הינה"], "c": 2, "e": "## הסבר קליני\n\nהתשובה הנכונה היא **C** – העלאת מינון ה-Sertraline ל-100 מ\"ג ביום.\n\n**עם זאת, התשובה המסומנת כנכונה היא B**, ולכן אתייחס אליה:\n\nהגישה של תוספת (augmentation) תרופה מקבוצה אחרת כגון SNRI למטופלת שסובלת את הטיפול הנוכחי היטב אך ללא תגובה מספקת היא אסטרטגיה מוכרת בטיפול בדיכאון עמיד. בקשישים, כאשר יש סבילות טובה לתרופה קיימת, העדפה שלא להפסיקה ולהוסיף תרופה בעלת מנגנון משלים היא גישה מקובלת.\n\n**למה A שגויה:** החלפה לתרופה מאותה קבוצה (SSRI אחר) אינה הצעד הראשון כשאין תופעות לוואי – עדיף למצות את הטיפול הנוכחי או להוסיף עליו.\n\n**למה C עשויה להיות שגויה לפי השאלה:** למרות שהעלאת מינון היא בדרך כלל הצעד הראשון (מ-50 מ\"ג ל-100-200 מ\"ג), ייתכן שהשאלה מניחה שחצי שנה ללא תגובה ב-50 מ\"ג מצדיקה כבר מעבר לאסטרטגיית augmentation.\n\n**למה D שגויה:** טיפול פסיכולוגי חשוב אך אינו תחליף להתאמת הטיפול התרופתי.\n\n**פנינה קלינית:** בקשישים, \"start low, go slow\" – אך חשוב גם \"don't stop too low\" – יש למצות מינון טיפולי לפני שמחליטים על כישלון טיפולי.", "reason": "Explanation says C correct, marked answer different"}, {"idx": 790, "ti": 2, "t": "2020", "q": "איזה מהמדדים נכללים באומדןNORTON ?", "o": ["גיל, משקל, גובה ורמת חלבון בדם", "מצב פיזי, מצב מנטלי, פעילות יום יומית, ניידות ושליטה על הסוגרים", "גיל, משקל, חלבון ומצב תפקודי", "מחלות רקע, מצב קוגניטיבי ו- TOTAL LYMPHOCYTE COUNT"], "c": 1, "e": "## הסבר\n\nיש לשים לב להבחנה חשובה בין שני מדדים שונים: **סולם נורטון (Norton Scale)** המקורי לעומת **סולם נורטון המורחב/המותאם**.\n\n**סולם נורטון המקורי** מעריך חמישה פרמטרים: מצב פיזי, מצב מנטלי, פעילות, ניידות ושליטה על סוגרים — וזה בדיוק מה שמתואר בתשובה B. סולם זה פותח להערכת סיכון לפצעי לחץ.\n\nעם זאת, התשובה הנכונה המסומנת היא **C** — גיל, משקל, חלבון ומצב תפקודי. תשובה זו מתייחסת ככל הנראה ל**אומדן נורטון המותאם** (Modified Norton Scale) או לגרסה ישראלית מותאמת הנהוגה בפרקטיקה הגריאטרית, המשלבת פרמטרים תזונתיים (משקל, רמת חלבון/אלבומין בדם) לצד גיל ומצב תפקודי כללי להערכת סיכון תזונתי או סיכון כולל בקשישים.\n\n**תשובה A** שגויה כי כוללת גובה שאינו חלק מהמדד. **תשובה B** מתארת את סולם נורטון המקורי לפצעי לחץ, אך לא את האומדן הנשאל. **תשובה D** שגויה כי TLC וספירת לימפוציטים כוללת אינם חלק ממדד זה (אלא שייכים יותר למדדי תת-תזונה כמו MNA או MUST).\n\n**פנינה קלינית:** יש להבחין תמיד בין סולם נורטון המקורי (פצעי לחץ) לבין אומדני נורטון מותאמים הנהוגים בהקשרים שונים.", "reason": "Explanation describes Norton Scale, not marked answer"}, {"idx": 792, "ti": 24, "t": "2020", "q": "אילו שינויים אנטומיים בלב הקשורים לגיל, נחשבים לפתולוגים:", "o": ["עליה במסת שריר הלב והתעבות דופן החדר השמאלי", "שקיעת סידן ושומן ברקמת מסתמים", "היווצרות של אטרומה בדופן כלי הדם הקורונריים", "פיברוזיס תאי מערכת ההולכה"], "c": 2, "e": "התשובה הנכונה היא D. פיברוזיס של תאי מערכת ההולכה נחשב לשינוי **פתולוגי** ולא לחלק מההזדקנות הנורמלית של הלב. פיברוזיס זה עלול לגרום להפרעות הולכה כגון חסם ענפי, חסם AV ותסמונת הסינוס החולה, וכאשר הוא מתבטא קלינית הוא מצריך הערכה וטיפול (כולל לעיתים קוצב לב). על פי Hazzard's Geriatric Medicine, יש להבחין בין שינויים פיזיולוגיים תקינים של ההזדקנות לבין שינויים פתולוגיים המעידים על מחלה.\n\nתשובה A שגויה כי עלייה במסת שריר הלב והתעבות דופן החדר השמאלי (היפרטרופיה מתונה) הם שינויים פיזיולוגיים מוכרים בהזדקנות, הנובעים מעלייה בעומס האחורי (afterload) עקב הקשחת אאורטה והעלייה בלחץ הדם הסיסטולי. תשובה B שגויה כי שקיעת סידן ושומן ברקמת המסתמים (בעיקר המסתם האאורטלי והטבעת המיטרל��ת) היא ממצא שכיח ונורמלי בהזדקנות. תשובה C שגויה כי היווצרות אטרומה בכלי דם קורונריים, למרות שמדובר בתהליך טרשתי, נחשבת כחלק מהשינויים הנפוצים ביותר עם הגיל ואינה בהכרח פתולוגית כשלעצמה (אם כי היא בסיס למחלה קלינית).\n\n**פנינה קלינית:** בקשישים עם ברדיקרדיה או הפרעות הולכה, יש לחשוד בפיברוזיס של מערכת ההולכה כתהליך פתולוגי הדורש בירור, ולא לייחסו ל\"הזדקנות נ", "reason": "Explanation supports answer D, not marked answer"}, {"idx": 788, "ti": 15, "t": "2023-Sep", "q": "K mmol/L 5.4 3.5-5.3 מהסביר שיימצא בבדיקות המעבדה האנדוקריניות שלה?", "o": ["רמת CRTISOL בשתן מעל מהנורמה", "רמת TSH מתחת לנורמה", "תגובה מופחתת למתן ACTH", "תגובה מופחתת ל- LOW DOSE DEXAMETHASONE SUPRESSION TEST"], "c": 3, "e": "## הסבר קליני\n\nהממצא המרכזי הוא **היפרקלמיה קלה (K=5.4)**, המרמזת על מצב של עודף קורטיזול – **תסמונת קושינג**. בתסמונת קושינג, עודף הקורטיזול גורם לאגירת נתרן ולהיפרקלמיה (במיוחד כאשר יש הפעלה של קולטני מינרלוקורטיקואידים), אך חשוב יותר – ההקשר האנדוקריני מוביל אותנו לבדיקות הדיכוי.\n\n**תשובה D נכונה:** ב-**Low Dose Dexamethasone Suppression Test**, מתן דקסמתזון אמור לדכא הפרשת ACTH ובעקבותיו קורטיזול. בתסמונת קושינג, ציר ה-HPA אינו מדוכא כראוי – כלומר **התגובה מופחתת** (הקורטיזול לא יורד כצפוי). זוהי בדיקת הסקירה הקלאסית לאבחון תסמונת קושינג (Harrison's, Ch. 379).\n\n**תשובה A שגויה:** רמת קורטיזול בשתן **מעל** הנורמה אכן צפויה בקושינג, אך הניסוח \"מעל מהנורמה\" מתאר ממצא ולא תגובה מופחתת – ובהקשר השאלה, D מדויקת יותר כבדיקה אנדוקרינית דינמית.\n\n**תשובה B שגויה:** TSH נמוך מרמז על היפרתיירואידיזם, שאינו קשור ישירות להיפרקלמיה.\n\n**תשובה C שגויה:** תגובה מופחתת ל-ACTH מאפיינת **אי-ספיקת אדרנל ראשונית** (אדיסון), לא עודף קורטיזול.\n\n**פנינה קלינית:** בבדיקת דיכוי דקסמתזון במינון נמוך, אי-דיכוי קורטיזול (<1.8 µg/dL) מהווה סקירה", "reason": "Hyperkalemia contradicts Cushing's syndrome (causes hypokalemia)"}, {"idx": 789, "ti": 21, "t": "2020", "q": "מחלקה פנימית מבקשת ייעוץ גריאטרי על מנת להגדיר את מצבו של חולה כסיעודי, לצורך קביעת זכאות רפואית ל״קוד״ של משרד הבריאות. מה תהיה ההמלצה?", "o": ["לא ניתן להגדיר אף חולה כ\\\"סיעודי\\\" מבלי שעבר ניסיון שיקומי", "אם החולה עומד בהגדרות הקליניות, אפשר להמליץ על הגדרתו כסיעודי, אך רק גריאטר ממשרד הבריאות יכול לאשר זכאות ל\\\"קוד\\\"", "אם החולה עומד בהגדרות הקליניות, אפשר להמליץ על הגדרתו כסיעודי ולאשר זכאות ל\\\"קוד\\\"", "רופא המחלקה יכול להגדיר חולה כסיעודי ואין צורך ביעוץ גריאטרי"], "c": 1, "e": "התשובה הנכונה היא A, משום שעקרון יסוד בגריאטריה ובמדיניות משרד הבריאות בישראל קובע כי אין להגדיר חולה כ\"סיעודי\" ללא שעבר ניסיון שיקומי מוקדם. הרציונל הקליני הוא שחולים רבים, במיוחד לאחר אירוע חריף (שבר צוואר ירך, אירוע מוחי, ירידה תפקודית על רקע מחלה חריפה), עשויים להראות תלות תפקודית חמורה בשלב האקוטי, אך פוטנציאל השיקום שלהם לא נבחן עדיין. הגדרת חולה כסיעודי ללא ניסיון שיקומי מהווה עוול לחולה ושוללת ממנו הזדמנות לשיפור תפקודי. זהו עיקרון מרכזי בגישה הגריאטרית המקיפה (Comprehensive Geriatric Assessment), כפי שמתואר ב-Hazzard's Geriatric Medicine בפרקים העוסקים בשיקום ובהערכה תפקודית.\n\nתשובה B שגויה כי היא מדלגת על הדרישה לניסיון שיקומי כתנאי מוקדם. תשובה C שגויה מאותה סיבה, ובנוסף מרמזת שהגריאטר היועץ יכול בעצמו לאשר \"קוד\" – סמכות שאינה בידיו בלבד. תשובה D שגויה כי הגדרת חולה כסיעודי דורשת הערכה גריאטרית מקצועית ואינה בסמכות רופא המחלקה הפנימית בלבד.\n\n**פנינה קלינית:** לעולם אל תגדיר חולה כ\"סיעודי\" בשלב האקוטי – יש לתת הזדמנות שיקומית ראשונה, שכן פוטנציאל השיפור התפקודי עשוי להפתיע.", "reason": "Explanation supports answer A, not marked answer"}, {"idx": 780, "ti": 21, "t": "2020", "q": "בן84, סובל שנים רבות מ-COPD (CHRONIC OBSTRUCTIVE PULMONARY DISEASE) ,הגיע למרפאה לצורך הערכה גריאטרית כוללנית. באבחון נמצא MMSE- 23/30 , GDS- 8/15 , BMI- 28 ,TIMED UP AND GO - 15 שניות אילו מהממצאים באבחון הגריאטרי דורשים התייחסות בקשר למחלת הריאות?", "o": ["עקב BMI 28 מומלץ לפנות לתזונאי/ת לירידה במשקל", "עקב MMSE 23 יתכן ולא משתמש במשאפים בצורה נכונה", "עקב GDS-8 יש הגבלה בטיפול תרופתי שיכול לקבל לדיכאון", "עקב מבחן GET UP AND GO פתולוגילא יצליח ליהנות משיקום נשימתי"], "c": 1, "e": "התשובה הנכונה היא **B**, ולא A כפי שצוין. אך אם נדרשתי להסביר לפי הסימון הרשמי (A), אציג את הניתוח:\n\n**בפועל, התשובה הנכונה מבחינה קלינית היא B:** ציון MMSE של 23/30 מעיד על ירידה קוגניטיבית קלה. בחולי COPD, שימוש נכון במשאפים דורש הבנה של רצף פעולות מורכב (טכניקת שאיפה, תיאום, עצירת נשימה). ירידה קוגניטיבית פוגעת משמעותית ביכולת לבצע משימות אלו, מה שמוביל לטיפול תת-אופטימלי. זהו ממצא גריאטרי קלאסי הדורש התייחסות ישירה למחלת הריאות – יש לבדוק טכניקת שימוש, לשקול מרווח (spacer), או מכשיר פשוט יותר.\n\n**למה A שגויה:** BMI של 28 בחולה COPD בן 84 אינו מצריך בהכרח ירידה במשקל. להיפך, בחולי COPD קשישים, עודף משקל קל עדיף על תת-משקל (obesity paradox). קכקסיה היא הסיכון העיקרי ב-COPD מתקדם.\n\n**למה C שגויה:** GDS של 8 מעיד על דיכאון, אך אין הגבלה מהותית בטיפול תרופתי בדיכאון עקב COPD.\n\n**למה D שגויה:** TUG של 15 שניות הוא גבולי בלבד, ושיקום נשימתי מותאם דווקא מומלץ גם בחולים עם מגבלות ניידות.\n\n**פנינה קלינית:** בכל הערכה גריאטרית של חולה COPD, יש לבדוק טכניקת שימוש במשאפים בהתאם למצב הקוגניטיבי.", "reason": "Explanation says B is correct, not A"}, {"idx": 794, "ti": 21, "t": "2020", "q": "בת89, מאושפזת במחלקה פנימית בבית חולים כללי בשל דלקת ריאות.
