ops progressive fatigue and bruising. Labs: Hb 7.2 g/dL, platelets 18,000, Coombs test positive, elevated LDH, low haptoglobin. He lives alone, manages all ADLs independently, walks 2 miles daily. Which treatment approach is most appropriate?", "o": ["Prednisone 1 mg/kg daily with rapid taper", "Rituximab monotherapy weekly x 4", "Prednisone 20 mg daily with slow taper", "Ibrutinib 420 mg daily"], "c": 2, "e": "This patient has autoimmune hemolytic anemia and thrombocytopenia complicating CLL. The correct answer is lower-dose prednisone (20 mg) with slow taper, balancing efficacy against steroid toxicity in an active 83-year-old.\n\nOption A (prednisone 1 mg/kg = ~70-80 mg) is the TRAP - standard adult dosing ignores increased steroid sensitivity in elderly. High-dose steroids cause delirium, hyperglycemia, myopathy, and infection risk. Start low and go slow.\n\nOption B (rituximab alone) is insufficient for severe autoimmune cytopenias. While rituximab helps long-term, initial steroids are needed for rapid response with severe thrombocytopenia.\n\nOption D (ibrutinib) treats CLL but worsens bleeding risk with severe thrombocytopenia. BTK inhibitors should wait until platelet count improves.\n\nClinical Pearl: Elderly patients are more sensitive to corticosteroid side effects. In autoimmune cytopenias, start with lower doses (prednisone 0.25-0.5 mg/kg) and taper slowly. Monitor for hyperglycemia, delirium, myopathy, and infection. Consider PJP prophylaxis if treatment expected >4 weeks.", "reason": "Explanation supports low-dose not standard-dose prednisone"}, {"idx": 2836, "ti": 25, "t": "Hazzard", "q": "An 80-year-old woman with transfusion-dependent MDS, heart failure (EF 40%), and diabetes is admitted with fever and hypotension. Blood cultures grow E. coli. She requires norepinephrine in the ICU. Her daughter asks about code status, stating 'Mom said she never wanted to be kept alive on machines.' Current Hb 6.8 g/dL, platelets 28,000, ANC 400. The ICU attending recommends comfort care given her poor prognosis. What is the most appropriate next step?", "o": ["Transition to comfort care per daughter's request", "Continue aggressive care including broad-spectrum antibiotics and transfusion support", "Obtain ethics consultation before making decisions", "Discontinue pressors but continue antibiotics"], "c": 1, "e": "This patient has potentially reversible sepsis in the setting of MDS-related neutropenia. Despite her serious underlying condition, sepsis treatment (antibiotics, supportive care) offers reasonable chance of recovery to baseline. Her statement about 'machines' likely referred to permanent ventilation, not temporary ICU support.\n\nOption A (comfort care) is the TRAP - many physicians assume elderly cancer patients want comfort care only, but this represents age bias. Sepsis in neutropenic patients is often reversible with appropriate treatment, regardless of age.\n\nOption C (ethics consultation) delays potentially life-saving treatment when the situation doesn't present an ethical dilemma - treatable infection in a patient without clear advance directives refusing such treatment.\n\nOption D (partial withdrawal) makes no medical sense - pressors support blood pressure while antibiotics treat infection; both are needed.\n\nClinical Pearl: 'Do Not Resuscitate' doesn't mean 'do not treat.' Many older adults with hematologic malignancies misunderstand that DNR only applies to CPR, not other treatments. Always clarify specific preferences about antibiotics, transfusions, and temporary ICU support separately from code status discussions.", "reason": "Explanation supports comfort care, contradicts marked answer"}, {"idx": 2845, "ti": 23, "t": "Hazzard", "q": "An 84-year-old woman with stage 3b CKD (eGFR 42 mL/min/1.73m²) presents to clinic with progressive fatigue over 3 months. She reports needing her daughter's help with grocery shopping and meal preparation for the first time. Current medications include lisinopril 10 mg daily, furosemide 40 mg daily, and ferrous sulfate 325 mg daily. Labs show: Hb 8.2 g/dL, MCV 82 fL, ferritin 180 ng/mL, TSAT 15%, TSH 5.8 mIU/L (0.5-4.5), free T4 0.9 ng/dL (0.9-1.7). Which is the most appropriate next step?", "o": ["Start levothyroxine 25 mcg daily", "Increase ferrous sulfate to twice daily", "Start epoetin alfa 4000 units weekly", "Refer for IV iron infusion"], "c": 0, "e": "This patient has subclinical hypothyroidism (elevated TSH with normal free T4) presenting with functional decline in IADLs. In elderly patients with TSH >10 or symptoms attributable to thyroid dysfunction, treatment is indicated. The correct starting dose is levothyroxine 25 mcg daily (reduced from standard 50 mcg due to age and cardiac risk).\n\nOption B (increase oral iron) is the trap - despite low TSAT suggesting functional iron deficiency, the ferritin >100 indicates adequate stores. Oral iron has poor absorption in CKD and causes significant GI side effects in elderly.\n\nOption C (epoetin) addresses anemia of CKD but TSH should be normalized first as hypothyroidism contributes to anemia and fatigue.\n\nOption D (IV iron) is premature without first correcting hypothyroidism and reassessing.\n\nClinical Pearl: Subclinical hypothyroidism in elderly patients can present solely as functional decline. Start with 25 mcg levothyroxine and titrate by 12.5-25 mcg increments every 6-8 weeks. Target TSH is age-adjusted (4-6 mIU/L acceptable in patients >80 years).", "reason": "Labs show no TSH/T4 values mentioned"}, {"idx": 2849, "ti": 23, "t": "Hazzard", "q": "An 85-year-old man with heart failure (EF 35%) and CKD stage 4 (eGFR 25) is brought by family with worsening confusion over 3 days. He was recently started on levothyroxine 50 mcg daily for new hypothyroidism. Core temperature is 34°C, BP 100/65, HR 58. ECG shows sinus bradycardia with J waves and QTc 480 ms. Labs: TSH 45 (was 52 last week), K 5.1, Cr 3.2 (baseline 2.8). Which management error is most likely to cause deterioration?", "o": ["Initiating cardiac monitoring in ICU", "Administering warmed normal saline 500 mL", "Holding levothyroxine until rewarmed", "Giving calcium gluconate for hyperkalemia"], "c": 3, "e": "This patient has moderate hypothermia with myxedema features. The hyperkalemia (5.1) is likely pseudohyperkalemia from hypothermia - potassium shifts extracellularly with cooling. Calcium gluconate is the trap answer because it's unnecessary and potentially harmful, as rewarming will correct the potassium without intervention.\n\nOption A (ICU monitoring) is appropriate given cardiac comorbidity and hypothermia.\n\nOption B (warmed fluids) helps with both rewarming and the volume depletion common in hypothermia.\n\nOption C (holding levothyroxine) is correct - thyroid replacement should be held until core temperature >35°C to avoid precipitating arrhythmias.\n\nClinical Pearl: Hypothermia causes predictable lab abnormalities including pseudohyperkalemia, hemoconcentration, and elevated creatinine. Avoid treating lab values in isolation - focus on rewarming. The recent levothyroxine initiation at full dose (50 mcg) was too aggressive for this elderly patient with cardiac disease; should start at 12.5-25 mcg.", "reason": "Explanation says giving calcium IS the error"}, {"idx": 2860, "ti": 22, "t": "Hazzard", "q": "A 79-year-old man with heart failure (EF 35%) and recent hip fracture is admitted with acute confusion 3 days post-surgery. He's been receiving morphine PCA. Labs: Na 124 mEq/L, serum osmolality 262 mOsm/kg, urine osmolality 450 mOsm/kg, urine Na 45 mEq/L. He appears euvolemic. Chest X-ray shows mild pulmonary edema. Which management approach is most appropriate?", "o": ["3% saline infusion targeting 8 mEq/L rise in 24 hours", "Fluid restriction to 800 mL/day", "Furosemide 40 mg IV with 0.9% saline replacement", "Tolvaptan 15 mg PO daily"], "c": 2, "e": "The correct answer is furosemide with isotonic saline replacement. This patient has SIADH from post-operative state and opioids, complicated by mild hypervolemia from heart failure. Loop diuretics enhance free water excretion while saline prevents volume depletion.\n\nOption A (3% saline) is the TRAP - while appropriate for severe symptomatic hyponatremia, this patient's confusion is likely multifactorial (delirium from surgery/opioids plus mild hyponatremia). Aggressive correction risks osmotic demyelination, especially given chronicity suggested by adaptation.\n\nOption B (fluid restriction alone) is insufficient for symptomatic hyponatremia and impractical post-operatively when adequate hydration is needed for healing.\n\nOption D (tolvaptan) is contraindicated in hyponatremia with concurrent heart failure due to risk of overly rapid correction and hepatotoxicity.\n\nClinical Pearl: In elderly post-operative patients, distinguish delirium from hyponatremia symptoms. SIADH is common post-surgery, especially with opioids. Aim for gradual correction (6-8 mEq/L/24h) and address all contributing factors including pain management alternatives.", "reason": "Explanation contradicts itself on SIADH with hypervolemia"}, {"idx": 2863, "ti": 22, "t": "Hazzard", "q": "An 86-year-old woman with moderate dementia is brought from her memory care unit with lethargy. She's been drinking less for 3 days. Labs: Na 119 mEq/L, K 3.8, Cl 84, HCO3 28. Serum osmolality 248, urine osmolality 95 mOsm/kg. TSH 2.1, cortisol 18. She takes donepezil and memantine. What is the most likely diagnosis?", "o": ["SIADH from dementia medications", "Psychogenic polydipsia with appropriate dilution", "Reset osmostat syndrome", "Tea and toast syndrome"], "c": 3, "e": "The correct answer is 'tea and toast syndrome' - severe hyponatremia from inadequate solute intake. The key finding is appropriately dilute urine (osmolality <100), indicating intact renal diluting capacity but insufficient solute to excrete free water.\n\nOption A (SIADH) is the TRAP - most physicians assume medication-induced SIADH with hyponatremia in dementia patients. However, SIADH causes inappropriately concentrated urine (>100 mOsm/kg), not the dilute urine seen here.\n\nOption B (psychogenic polydipsia) is unlikely in moderate dementia where patients typically have reduced fluid intake, not excessive intake.\n\nOption C (reset osmostat) causes mild chronic hyponatremia (125-135), not severe hyponatremia, and patients remain asymptomatic.\n\nClinical Pearl: In elderly patients with poor dietary intake, hyponatremia with maximally dilute urine indicates inadequate solute intake. Normal kidneys need ~50-100 mOsm of solute daily to excrete free water. Treatment involves improving nutrition, not fluid restriction.", "reason": "Explanation describes low solute intake, not syndrome"}, {"idx": 2854, "ti": 23, "t": "Hazzard", "q": "A 75-year-old man with recently diagnosed subclinical hypothyroidism (TSH 8.2) returns for follow-up after starting levothyroxine 25 mcg daily 8 weeks ago. He reports feeling more energetic and resumed walking his dog daily. However, his wife notes new episodes of confusion in the evenings. Repeat labs: TSH 2.8, free T4 1.3 ng/dL. Temperature 36.8°C. Medications include levothyroxine, atorvastatin 40 mg, and diphenhydramine 50 mg nightly for sleep. What is the most likely cause of his evening confusion?", "o": ["Overtreatment with levothyroxine", "Diphenhydramine use", "Unmasked dementia", "Statin-induced cognitive effects"], "c": 1, "e": "This patient's evening confusion represents sundowning likely precipitated by diphenhydramine, which is strongly anticholinergic and appears on Beers criteria as potentially inappropriate in older adults. First-generation antihistamines cause confusion, sedation, and increased fall risk in elderly patients.\n\nOption A (levothyroxine overtreatment) is the trap - his TSH of 2.8 is perfectly therapeutic and his clinical improvement (increased energy, resumed dog walking) indicates appropriate treatment.\n\nOption C (unmasked dementia) is possible but less likely given the temporal relationship with evening diphenhydramine dosing.\n\nOption D (statin effects) rarely causes confusion and wouldn't show evening predominance.\n\nClinical Pearl: Successful thyroid replacement (improved energy, normalized TSH) can unmask other problems like inappropriate medications. Diphenhydramine for sleep is particularly problematic in elderly - recommend sleep hygiene, melatonin, or low-dose trazodone instead. Evening confusion in an otherwise improving patient warrants medication review.", "reason": "Explanation assumes diphenhydramine use, not stated anywhere"}, {"idx": 2862, "ti": 22, "t": "Hazzard", "q": "A 77-year-old man with diabetes and CKD stage 4 (eGFR 22) is found confused by staff at his nursing home during a heat wave. T 38.9°C, HR 108, BP 96/58. Labs: Na 158 mEq/L, glucose 385 mg/dL, BUN 92, Cr 3.8 (baseline 2.9). Urine osmolality 450 mOsm/kg. He's been refusing meals but taking his medications. Which fluid management strategy is most appropriate?", "o": ["0.45% saline at 250 mL/hr until euvolemic", "D5W at 150 mL/hr after initial 0.9% saline bolus", "0.9% saline 500 mL bolus then 100 mL/hr", "Free water via NG tube 200 mL q2h"], "c": 1, "e": "The correct answer is D5W after initial isotonic saline bolus. This patient has hyperosmolar hyperglycemic state with true hypernatremia from dehydration. Initial 0.9% saline restores volume, then D5W provides free water to correct hypernatremia while the dextrose prevents rapid glucose drop.\n\nOption A (0.45% saline) is the TRAP - many choose hypotonic saline for hypernatremia, but in severe dehydration, this can cause rapid fluid shifts and cerebral edema. Additionally, 250 mL/hr is too aggressive in CKD stage 4.\n\nOption C (continued 0.9% saline) addresses volume but won't correct free water deficit causing hypernatremia.\n\nOption D (NG free water) is inappropriate in an obtunded patient (aspiration risk) and doesn't address intravascular volume depletion.\n\nClinical Pearl: In elderly CKD patients with hypernatremia, calculate free water deficit but correct slowly (0.5 mEq/L/hr) to avoid cerebral edema. Monitor glucose closely as hydration improves renal glucose clearance. Heat waves disproportionately affect nursing home residents with cognitive impairment who can't sense or respond to thirst.", "reason": "D5W inappropriate for diabetes/HHS and hypernatremia correction"}, {"idx": 2880, "ti": 27, "t": "Hazzard", "q": "An 85-year-old woman is admitted with herpes zoster affecting the right V1 dermatome. She has moderate Alzheimer's disease and lives with her daughter. Creatinine is 1.3mg/dL (CrCl 28 mL/min by Cockcroft-Gault), weight 48kg. The rash appeared 2 days ago. Current medications: memantine 10mg BID, escitalopram 10mg daily. She's allergic to sulfa (rash). What is the appropriate antiviral therapy?", "o": ["Acyclovir 800mg PO 5 times daily for 7 days", "Valacyclovir 1000mg PO TID for 7 days", "Famciclovir 500mg PO TID for 7 days", "Acyclovir 400mg PO TID for 7 days"], "c": 3, "e": "This elderly woman with severe renal impairment (CrCl 28) needs antiviral therapy for herpes zoster with appropriate renal dosing. The correct answer is acyclovir 400mg TID, which is the recommended dose adjustment for CrCl 10-25 mL/min.\n\nOption A (standard dose acyclovir) is the trap - many physicians forget to adjust antivirals for renal function, risking neurotoxicity including confusion, hallucinations, and seizures in elderly patients with reduced clearance.\n\nOption B (valacyclovir) requires reduction to 500mg daily with this CrCl. Option C (famciclovir) needs reduction to 250mg daily. Both are more expensive than acyclovir with no proven superiority.\n\nClinical Pearl: Always calculate CrCl using Cockcroft-Gault in elderly patients before prescribing antivirals. Ophthalmic involvement (V1 distribution) requires urgent ophthalmology referral. Post-herpetic neuralgia risk increases with age - consider starting gabapentin early, but at reduced dose (100mg daily) given renal function.", "reason": "Explanation says CrCl 10-25 dose, not 28"}, {"idx": 2886, "ti": 27, "t": "Hazzard", "q": "An 86-year-old woman with mild Alzheimer's dementia develops shingles on her left torso (T10-11 dermatomes). Rash appeared 4 days ago. She lives alone with daily daughter visits who reports mom hasn't been cooking and seems weaker. Medications: donepezil 10mg qHS, calcium, vitamin D. Labs: Cr 0.8mg/dL, weight 52kg. Daughter asks about preventing postherpetic neuralgia. What is the best evidence-based intervention?", "o": ["Start gabapentin 100mg TID, titrate as tolerated", "Valacyclovir 1g TID x 3 more days", "Apply lidocaine 5% patches to affected area", "Oral prednisone 60mg daily with rapid taper"], "c": 1, "e": "Despite presenting at day 4, antiviral therapy (valacyclovir) remains the best evidence-based intervention to reduce postherpetic neuralgia risk. Studies show benefit up to 72 hours after rash onset, with some benefit even later in elderly.\n\nOption A (gabapentin) is the trap - while often prescribed for PHN prevention, evidence doesn't support prophylactic use. It's a Beers Criteria medication requiring careful titration in elderly due to sedation, dizziness, and fall risk.\n\nOption C (lidocaine patches) treats existing PHN but doesn't prevent it. Option D (corticosteroids) don't prevent PHN and increase infection risk in elderly.\n\nClinical Pearl: Functional decline (not cooking, weakness) suggests this patient needs comprehensive geriatric assessment beyond treating shingles. Her CrCl is approximately 44 mL/min (Cockcroft-Gault) - no valacyclovir adjustment needed until CrCl <30. Early antiviral therapy remains the only proven PHN prevention.", "reason": "Explanation says 72hr window, patient at day 4"}, {"idx": 2882, "ti": 27, "t": "Hazzard", "q": "An 82-year-old woman in skilled nursing for hip fracture rehabilitation develops sudden confusion and agitation. She has been pulling out her Foley catheter repeatedly. PMH: HTN, osteoporosis, mild cognitive impairment. Home medications: amlodipine 5mg, alendronate weekly, vitamin D. Current: above plus oxycodone 5mg q6h PRN, docusate. Vitals normal. UA shows 50-100 WBC, positive nitrites, many bacteria. Cr 1.1. She weighs 58kg. What is the best initial management?", "o": ["Remove Foley, start nitrofurantoin 100mg PO BID x 5 days", "Obtain urine culture, start ceftriaxone 1g IV daily", "Start ciprofloxacin 250mg PO BID x 3 days", "Remove Foley, obtain culture, defer antibiotics pending results"], "c": 3, "e": "This patient has catheter-associated bacteriuria causing delirium. The correct approach is removing the catheter (source control), obtaining culture, and deferring antibiotics since she's hemodynamically stable. Up to 50% of catheterized elderly have asymptomatic bacteriuria that doesn't require treatment.\n\nOption A is the trap - nitrofurantoin seems appropriate for 'UTI' but treating asymptomatic bacteriuria increases resistance without benefit. Plus, nitrofurantoin is on Beers Criteria for CrCl <30 (hers is ~35 by Cockcroft-Gault).\n\nOption B (IV antibiotics) is overly aggressive for stable patient. Option C uses fluoroquinolones which should be avoided in elderly (Beers Criteria) due to delirium, tendon rupture risk.\n\nClinical Pearl: Delirium in catheterized patients often improves with catheter removal alone. Pyuria doesn't equal infection in elderly. Calculate CrCl: (140-82) × 58 × 0.85 / (72 × 1.1) = 36 mL/min. Foley catheters should be removed ASAP in elderly to prevent CAUTIs and delirium.", "reason": "Explanation says bacteriuria causes delirium, contradicts deferring antibiotics"}, {"idx": 2888, "ti": 27, "t": "Hazzard", "q": "An 83-year-old woman presents to the ED with acute confusion and fever after recent discharge for COVID-19 pneumonia 1 week ago. She required 5 days of remdesivir and dexamethasone. Lives independently, manages complex medication regimen. Current meds: apixaban 5mg BID, metoprolol 50mg BID, rosuvastatin 20mg. Vitals: T 38.6°C, BP 138/82, HR 94, RR 18, SpO2 95% RA. WBC 14.2 with 11% bands. UA negative. Blood cultures pending. CXR clear. What is the most likely diagnosis requiring treatment?", "o": ["Bacterial pneumonia requiring antibiotics", "COVID-19 rebound requiring repeat antivirals", "Central line-associated bloodstream infection", "Clostridioides difficile colitis"], "c": 3, "e": "This elderly patient with recent COVID-19 treatment including antibiotics (often given with remdesivir) and steroids now presents with fever, leukocytosis with bandemia, and confusion - classic for C. difficile infection. Recent hospitalization and antibiotic exposure are major risk factors.\n\nOption A is the trap - pneumonia seems logical post-COVID, but clear CXR and lack of respiratory symptoms argue against it. Many physicians miss C. diff when focused on pulmonary causes.\n\nOption B (COVID rebound) typically occurs during/immediately after Paxlovid, not remdesivir, and presents with URI symptoms not isolated fever. Option C unlikely without mention of central line.\n\nClinical Pearl: C. diff risk persists up to 3 months post-antibiotics. Elderly have highest incidence and mortality from C. diff. Test only if diarrhea present (may be minimal in elderly) - PCR has high sensitivity. Oral vancomycin is now first-line over metronidazole. High functional status (manages complex meds) predicts better outcomes.", "reason": "Remdesivir is antiviral not antibiotic treatment"}, {"idx": 2906, "ti": 17, "t": "Harrison", "q": "An 81-year-old man is admitted with STEMI and receives PCI with drug-eluting stent. Post-procedure day 2, he develops acute confusion, pulling at lines and not recognizing his wife. PMH: mild cognitive impairment, BPH on tamsulosin. Current meds include aspirin, ticagrelor, atorvastatin, metoprolol. CAM screen is positive. Labs: Cr 1.8 (baseline 1.2), K 3.9, Mg 1.6. Which medication should be discontinued?", "o": ["Ticagrelor", "Metoprolol", "Atorvastatin", "Tamsulosin"], "c": 0, "e": "This patient has delirium (positive CAM) post-MI with AKI. Ticagrelor should be switched to clopidogrel as it's associated with higher delirium risk in elderly, especially with renal impairment. The P2Y12 inhibition is critical post-stent, but clopidogrel has better CNS tolerability. Option B (metoprolol) is the TRAP - while beta-blockers can cause confusion, they're essential post-MI for mortality reduction. Many will choose this thinking any CNS-active drug should be stopped in delirium. Option C (atorvastatin) rarely causes delirium and is crucial for secondary prevention. Option D (tamsulosin) could contribute to orthostatic hypotension but isn't the primary concern here and is on Beers list only for avoiding in patients with syncope history. The AKI (Cr 1.2→1.8) likely contributes to ticagrelor accumulation. Clinical Pearl: In elderly patients with delirium post-PCI, consider switching ticagrelor to clopidogrel rather than stopping dual antiplatelet therapy, which risks stent thrombosis.", "reason": "Explanation says switch to clopidogrel not discontinue"}, {"idx": 2911, "ti": 17, "t": "Harrison", "q": "A 76-year-old woman is admitted with NSTEMI. She undergoes PCI with placement of two drug-eluting stents. Post-procedure, she develops severe back pain between her shoulder blades. PMH: HTN, hyperlipidemia, 30 pack-year smoking history. BP initially 186/102, now 142/88 after labetalol. HR 96. Chest CT shows type B aortic dissection. Current meds include aspirin 81mg, clopidogrel 75mg, atorvastatin 80mg. Which medication management is most appropriate?", "o": ["Continue DAPT, add IV esmolol infusion", "Stop clopidogrel, continue aspirin, add IV nicardipine", "Continue DAPT, add oral metoprolol", "Stop all antiplatelets, IV labetalol infusion"], "c": 1, "e": "This patient has Stanford Type B aortic dissection (descending aorta) post-PCI with recent stent placement. Management requires balancing dissection treatment (BP/HR control) with stent thrombosis prevention. Stopping clopidogrel while continuing aspirin provides some stent protection while reducing bleeding risk. IV nicardipine offers precise BP control for dissection. Option A (continue DAPT + esmolol) is the TRAP - seems logical to maintain full DAPT for stents, but dual therapy significantly increases risk of dissection extension/rupture. This represents overtreating the stents while undertreating the dissection. Option C inadequate BP control with oral agent. Option D (stop all antiplatelets) risks acute stent thrombosis within days. Type B dissections are usually managed medically with aggressive BP control (SBP <120) unless complicated. Clinical Pearl: In competing thrombotic/bleeding risks, monotherapy aspirin often provides adequate stent protection while allowing treatment of bleeding-risk conditions; risk of stent thrombosis on aspirin alone is ~2% vs ~0.5% with DAPT.", "reason": "Explanation contradicts itself - stops clopidogrel increases risk"}, {"idx": 2905, "ti": 17, "t": "Harrison", "q": "A 78-year-old woman with moderate frailty (CFS 6) presents with acute dyspnea and pleuritic chest pain. She lives in assisted living due to requiring help with bathing and dressing. PMH: AFib on apixaban 2.5mg BID, osteoporosis. Weight 52kg, Cr 1.1mg/dL. CTA shows segmental PE. Which anticoagulation adjustment is most appropriate?", "o": ["Continue apixaban 2.5mg BID", "Increase to apixaban 5mg BID", "Switch to warfarin with INR target 2-3", "Increase to apixaban 10mg BID x7 days, then 5mg BID"], "c": 3, "e": "This frail elderly woman has acute PE while on prophylactic-dose apixaban. She needs treatment dosing: 10mg BID x7 days, then 5mg BID. Her CrCl by Cockroft-Gault is ~35 (52kg, age 78, Cr 1.1), and she's ≥80 years old, but she doesn't meet criteria for dose reduction (needs 2 of 3: age ≥80, weight ≤60kg, Cr ≥1.5). Option A is the TRAP - continuing her current dose treats her AFib but not the PE. Many geriatricians over-reduce anticoagulation in frail elderly. Option B (5mg BID) skips the required loading dose for acute VTE. Option C (warfarin) is inappropriate given her frailty affecting ADLs - she'd struggle with INR monitoring and dietary restrictions. Her CFS 6 indicates she needs help with ADLs but can still make medical decisions. Clinical Pearl: Frailty alone doesn't mandate anticoagulation dose reduction; use validated criteria (age, weight, renal function) even in frail patients with acute thrombotic events.", "reason": "Patient is not ≥80 years old (78yo)"}, {"idx": 2916, "ti": 17, "t": "Harrison", "q": "A 79-year-old woman with HTN and prediabetes presents to cardiology clinic for evaluation of exertional chest pressure. Stress echo shows reversible inferior wall ischemia. Angiography reveals 80% RCA stenosis amenable to PCI. She gardens daily and babysits grandchildren twice weekly. Current meds: HCTZ 25mg daily, simvastatin 20mg daily. Cr 1.1, weight 62kg. If she undergoes PCI, which antiplatelet regimen is most appropriate?", "o": ["Aspirin 81mg + clopidogrel 75mg for 12 months", "Aspirin 81mg + ticagrelor 90mg BID for 12 months", "Aspirin 81mg + ticagrelor 60mg BID for 12 months", "Aspirin 81mg + clopidogrel 75mg for 6 months"], "c": 0, "e": "For stable CAD in this active elderly woman, standard DAPT is aspirin + clopidogrel for 6-12 months. Her good functional status (gardens, babysits = intact IADLs) and lack of ACS make clopidogrel preferred over newer agents. CrCl ~44 by Cockroft-Gault (62kg, age 79) is adequate for standard dosing. Option B (ticagrelor 90mg) is the TRAP - guidelines recommend ticagrelor for ACS, leading many to use it for all PCI. However, in stable CAD, ticagrelor increases bleeding without benefit and causes dyspnea in elderly. Option C (ticagrelor 60mg) is for long-term secondary prevention beyond 12 months, not initial therapy. Option D (6 months) is reasonable but 12 months provides better stent protection in elective PCI. Note: simvastatin 20mg is suboptimal - she needs high-intensity statin. HCTZ is on Beers list as potentially inappropriate (hyponatremia risk). Clinical Pearl: In elderly patients with stable CAD undergoing PCI, clopidogrel is preferred over ticagrelor/prasugrel due to better bleeding profile; reserve potent P2Y12 inhibitors for ACS.", "reason": "Explanation states 6-12 months, answer specifies 12"}, {"idx": 2935, "ti": 21, "t": "Harrison", "q": "An 82-year-old woman with GOLD stage 3 COPD is admitted for pneumonia. Her baseline mMRC dyspnea score is 3. She requires 4L oxygen to maintain SpO2 >88%. Her daughter asks about long-term prognosis and whether her mother should be 'full code.' The patient has mild cognitive impairment but can still express preferences. Labs show BUN 45, Cr 1.8 (baseline 1.2), giving CrCl 28 mL/min. Which antibiotic regimen is most appropriate while discussing goals of care?", "o": ["Levofloxacin 750 mg daily", "Ceftriaxone 1g daily + azithromycin 500 mg daily", "Levofloxacin 750 mg every 48 hours", "Piperacillin-tazobactam 3.375g q6h"], "c": 2, "e": "This elderly patient with severe COPD and acute kidney injury requires careful antibiotic selection with renal dose adjustment. The correct answer is levofloxacin 750 mg every 48 hours, which provides appropriate pneumonia coverage with proper renal adjustment for CrCl <50 mL/min.\n\nOption A (daily levofloxacin) is the TRAP - it's the standard pneumonia dose but fails to account for her significant renal impairment, risking QT prolongation, tendon rupture, and CNS toxicity in this elderly patient.\n\nOption B (ceftriaxone + azithromycin) doesn't require renal adjustment but azithromycin can prolong QT interval and both drugs together increase risk in elderly patients with polypharmacy.\n\nOption D (piperacillin-tazobactam) is unnecessarily broad spectrum for community-acquired pneumonia and requires q8h dosing with this CrCl.\n\nClinical Pearl: The mMRC score of 3 (stops after 100m walking) indicates severe functional limitation. Combined with cognitive impairment and acute illness, this is an ideal time for goals-of-care discussion. Being 'full code' doesn't preclude aggressive treatment - many patients want full treatment but would accept comfort care if treatment fails.", "reason": "Explanation cut off, cannot verify complete reasoning"}, {"idx": 2945, "ti": 21, "t": "Harrison", "q": "An 83-year-old nursing home resident with severe COPD, moderate Alzheimer's disease, and recurrent aspirations is brought in with fever and hypoxia. CXR shows RLL consolidation. He's on thickened liquids but staff report he pockets food. His daughter has DPOA and states 'he wouldn't want a feeding tube but treat the pneumonia aggressively.' Current CrCl is 38 mL/min. Which antibiotic regimen best balances efficacy and safety?", "o": ["Piperacillin-tazobactam 3.375g IV q6h", "Ceftriaxone 1g IV daily + metronidazole 500mg q8h", "Meropenem 1g IV q8h", "Ampicillin-sulbactam 3g IV q8h"], "c": 1, "e": "This patient has aspiration pneumonia requiring anaerobic coverage. The correct answer is ceftriaxone plus metronidazole, providing appropriate coverage without renal adjustment needs and once-daily dosing ideal for nursing homes.\n\nOption A (piperacillin-tazobactam) is the TRAP - it's the reflex choice for aspiration pneumonia but requires q8h dosing with his CrCl and has higher adverse event rates in elderly patients.\n\nOption C (meropenem) is unnecessarily broad spectrum, requires renal adjustment to q12h, and increases CDiff risk in this institutionalized patient.\n\nOption D (ampicillin-sulbactam) requires q8h dosing with renal impairment and has high sodium load problematic in elderly.\n\nClinical Pearl: Aspiration pneumonia treatment has evolved - not all aspirations need anaerobic coverage (only if poor dentition, putrid sputum, or abscess). The daughter's wishes reflect common goals: aggressive medical treatment but avoiding artificial nutrition. Document specific preferences about escalation thresholds. With moderate Alzheimer's and recurrent aspirations, median survival is <6 months - consider palliative care consultation.", "reason": "Explanation supports a different option than marked"}, {"idx": 2949, "ti": 24, "t": "Harrison", "q": "A 78-year-old man with CKD stage 4 (eGFR 22 mL/min/1.73m²) presents to the ED with confusion and falls. His wife reports he's been drinking more water than usual for 3 weeks. Medications include lisinopril 20mg, amlodipine 10mg, and lithium 300mg BID for bipolar disorder. Labs: Na 128 mEq/L, K 4.8 mEq/L, Cr 3.2 mg/dL (baseline 2.8), serum osmolality 265 mOsm/kg, urine osmolality 95 mOsm/kg. Which intervention is most appropriate?", "o": ["Discontinue lithium and monitor sodium", "Start tolvaptan 15mg daily", "Fluid restriction to 1L/day", "3% saline infusion at 50mL/hr"], "c": 0, "e": "This patient has lithium-induced nephrogenic diabetes insipidus causing chronic hyponatremia. The correct answer is to discontinue lithium, as it causes AVP resistance at the collecting duct. His low urine osmolality despite hyponatremia confirms diabetes insipidus.\n\nOption B (tolvaptan) is the TRAP - while vaptans treat SIADH-related hyponatremia, they worsen nephrogenic DI by further blocking V2 receptors. Many clinicians reflexively reach for vaptans for any hyponatremia.\n\nOption C (fluid restriction) is inappropriate for diabetes insipidus where patients cannot concentrate urine - restriction would worsen dehydration.\n\nOption D (3% saline) is only for severe symptomatic hyponatremia with seizures or coma. This patient's confusion is likely from his underlying condition, not acute hyponatremia.\n\nClinical Pearl: In CKD patients on lithium, monitor for nephrogenic DI. Unlike SIADH (concentrated urine), DI shows dilute urine despite hyponatremia. Treatment involves stopping the offending agent and allowing free water access.", "reason": "Explanation describes diabetes insipidus not hyponatremia treatment"}, {"idx": 2981, "ti": 25, "t": "Harrison", "q": "An 85-year-old nursing home resident with advanced Parkinson's disease is hospitalized with aspiration pneumonia. Despite antibiotics, he remains bedbound and develops a sacral pressure ulcer. His family asks about his prognosis. In the past month, he has lost 15% body weight, requires full assistance with all ADLs, and has had two hospitalizations. Lab: albumin 2.8 g/dL, Hb 10.2 g/dL. Using the Clinical Frailty Scale, what is his frailty status?", "o": ["6 - Moderately Frail", "7 - Severely Frail", "8 - Very Severely Frail", "9 - Terminally Ill"], "c": 2, "e": "This patient scores 8 (Very Severely Frail) on the Clinical Frailty Scale. He is completely dependent for all ADLs, approaching end of life with multiple markers of poor prognosis: recurrent aspiration, pressure ulcer, significant weight loss, and hypoalbuminemia. CFS 8 indicates complete dependence but not yet terminally ill.\n\nOption B (CFS 7 - Severely Frail) is the trap - many clinicians underestimate frailty severity. CFS 7 patients are dependent for ADLs but stable, without the life-threatening complications this patient exhibits.\n\nOption A (CFS 6) describes someone who needs help with IADLs and some ADLs but isn't completely dependent.\n\nOption D (CFS 9) requires a life expectancy <6 months with active dying process, which isn't clearly established yet despite his poor prognosis.\n\nClinical Pearl: The Clinical Frailty Scale predicts mortality and guides care decisions. CFS ≥7 indicates high mortality risk and should prompt goals-of-care discussions. In advanced frailty (CFS 8-9), comfort-focused care often aligns better with prognosis than aggressive interventions.", "reason": "Explanation contradicts itself about terminal illness status"}, {"idx": 2980, "ti": 25, "t": "Harrison", "q": "A 79-year-old woman with mild Alzheimer's, HTN, and recent DVT presents for follow-up. She lives alone and her daughter notices increasing bruising. Current medications: donepezil 10 mg daily, amlodipine 5 mg daily, apixaban 5 mg BID. Weight 58 kg, Cr 1.3 mg/dL, calculated CrCl 38 mL/min. CBC normal except platelets 180K. What is the most appropriate next step?", "o": ["Reduce apixaban to 2.5 mg BID", "Switch to warfarin with INR monitoring", "Add famotidine 20 mg BID", "Check anti-Xa level"], "c": 0, "e": "This patient meets criteria for apixaban dose reduction to 2.5 mg BID. She has 2 of 3 criteria: age ≥80 (she's 79, close), weight ≤60 kg (she's 58 kg), and Cr ≥1.5 mg/dL (she's 1.3). However, with CrCl 38 mL/min and low body weight, dose reduction is appropriate to prevent bleeding.\n\nOption B (switch to warfarin) is the trap - many physicians reflexively switch to warfarin for 'better monitoring,' but warfarin has higher bleeding risk in elderly patients and requires frequent monitoring that may be challenging for someone with cognitive impairment living alone.\n\nOption C (add famotidine) provides GI protection but doesn't address the systemic bleeding risk from excessive anticoagulation.\n\nOption D (anti-Xa level) isn't routinely recommended for DOAC monitoring and wouldn't change management.\n\nClinical Pearl: DOAC dosing in elderly requires careful attention to renal function (using Cockcroft-Gault), weight, and age. Apixaban requires dose reduction with 2+ criteria: age ≥80, weight ≤60 kg, or Cr ≥1.5. Don't forget to reassess dosing regularly as renal function declines.", "reason": "Patient is 79, doesn't meet age ≥80 criterion"}, {"idx": 2994, "ti": 26, "t": "Harrison", "q": "An 81-year-old man with multiple myeloma on lenalidomide presents to clinic with progressive dyspnea over 2 weeks. He stopped playing weekly bridge due to fatigue (functional decline). Exam shows JVD, distant heart sounds, and pulsus paradoxus of 15 mmHg. ECG shows low voltage. Echocardiogram reveals large pericardial effusion with early tamponade physiology. Thoracentesis last month showed malignant cells. He asks, 'Doctor, what are my options? I want to see my granddaughter graduate in 3 months.' What is the most appropriate next step?", "o": ["Emergent pericardiocentesis", "Pericardial window surgery", "Increase lenalidomide dose", "Comfort care only given malignant effusion"], "c": 1, "e": "The correct answer is pericardial window surgery. This patient has recurrent malignant pericardial effusion with early tamponade and a specific short-term goal (granddaughter's graduation). A pericardial window provides definitive drainage preventing reaccumulation, aligning with his goals.\n\nOption A (pericardiocentesis) is the trap - while it provides immediate relief, malignant effusions typically reaccumulate within days to weeks. Serial pericardiocentesis would subject him to repeated procedures, contradicting his quality of life goals.\n\nOption C (increase chemotherapy) doesn't address the immediate mechanical problem and chemotherapy takes weeks to reduce effusion production. He needs intervention now for his symptoms.\n\nOption D (comfort care only) misinterprets prognosis. Malignant pericardial effusion, while serious, can be effectively palliated. Many patients live months to years after intervention, making his 3-month goal realistic.\n\nClinical Pearl: In elderly cancer patients, always elicit specific goals before recommending procedures. A pericardial window, though more invasive than pericardiocentesis, may better serve quality of life by preventing repeated interventions.", "reason": "Explanation mentions granddaughter's graduation - not in question"}, {"idx": 2997, "ti": 26, "t": "Harrison", "q": "A 78-year-old woman with CLL on ibrutinib for 6 months presents with fever and cough. She lives in assisted living due to recurrent falls. CrCl 35 mL/min. Chest X-ray shows RLL infiltrate. WBC 45,000 (baseline 60,000), ANC 2,500. Which antimicrobial approach is most appropriate?", "o": ["Levofloxacin 750 mg PO daily", "Levofloxacin 500 mg PO daily", "Azithromycin 500 mg PO daily", "Ceftriaxone 1 g IV daily + azithromycin 500 mg PO daily"], "c": 3, "e": "The correct answer is ceftriaxone + azithromycin. This patient on ibrutinib (BTK inhibitor) has significant immunosuppression despite normal ANC, requiring broad coverage for community-acquired pneumonia including atypical organisms. Her falls history and assisted living status indicate frailty requiring more aggressive initial treatment.\n\nOption A (full-dose levofloxacin) is the trap - fluoroquinolones are on the Beers criteria for increased fall risk in elderly, especially problematic in someone with recurrent falls. Additionally, this dose isn't renally adjusted.\n\nOption B (reduced-dose levofloxacin) addresses renal function but maintains the fall risk issue. Fluoroquinolones can cause confusion, dizziness, and tendon problems in elderly patients.\n\nOption C (azithromycin alone) provides inadequate coverage for someone on BTK inhibitor therapy, which significantly impairs B-cell function and antibody production.\n\nClinical Pearl: BTK inhibitors like ibrutinib cause functional immunosuppression that isn't reflected in the ANC. These patients need aggressive antimicrobial therapy similar to those with hematologic malignancies. Always check Beers criteria - fluoroquinolones in elderly with fall history is a classic board trap.", "reason": "Explanation argues against levofloxacin, supports marked answer"}, {"idx": 2993, "ti": 26, "t": "Harrison", "q": "A 79-year-old woman with newly diagnosed small cell lung cancer is admitted with neutropenic fever (ANC 200, temp 38.8°C) 10 days after first chemotherapy cycle. She has mild cognitive impairment (MMSE 22) and relies on her son for medication management. Creatinine 1.8 mg/dL (baseline 1.2), BP 105/65. Blood cultures are pending. Which empiric antibiotic regimen is most appropriate?", "o": ["Cefepime 2 g IV q8h", "Cefepime 1 g IV q12h", "Ciprofloxacin 400 mg IV q8h + amoxicillin-clavulanate", "Vancomycin 15 mg/kg IV q12h + cefepime 2 g IV q8h"], "c": 1, "e": "The correct answer is cefepime 1 g IV q12h, which represents appropriate renal dose adjustment. Using Cockroft-Gault formula for this elderly woman with acute kidney injury (estimated CrCl ~25-30 mL/min), cefepime requires significant dose reduction to prevent neurotoxicity.\n\nOption A (full-dose cefepime) is the dangerous trap - many physicians forget to renally dose-adjust in elderly patients, especially during acute illness. Full-dose cefepime in renal impairment causes encephalopathy, myoclonus, and seizures, particularly problematic in someone with baseline cognitive impairment.\n\nOption C (oral regimen) is inappropriate for neutropenic fever requiring IV antibiotics with antipseudomonal coverage. This combination lacks adequate gram-negative coverage.\n\nOption D (vancomycin + cefepime) represents over-treatment. Vancomycin is only indicated for hemodynamic instability, skin/soft tissue infection, or known MRSA colonization, none of which are present.\n\nClinical Pearl: Always calculate CrCl using Cockroft-Gault (not eGFR) for drug dosing in elderly patients. Cefepime neurotoxicity is common in elderly with renal impairment and can be mistaken for delirium or progression of cognitive impairment.", "reason": "Explanation describes Option A as wrong answer"}, {"idx": 3002, "ti": 26, "t": "Harrison", "q": "An 82-year-old man with bladder cancer s/p cystectomy and ileal conduit 6 months ago presents with confusion and falls. His daughter notes he's been having trouble with his ostomy care (functional decline). BP 92/58, HR 105. Labs: Hgb 9.2 (baseline 11), platelets 680K. CT chest shows filling defect in right pulmonary artery. CrCl 42 mL/min. Which anticoagulation strategy is most appropriate?", "o": ["Heparin bolus 80 units/kg, then 18 units/kg/hr infusion", "Enoxaparin 1 mg/kg subcutaneously BID", "Enoxaparin 1 mg/kg subcutaneously daily", "Apixaban 10 mg PO BID x 7 days"], "c": 2, "e": "The correct answer is enoxaparin 1 mg/kg daily (renally dosed). This patient has cancer-associated thrombosis with hemodynamic compromise requiring immediate anticoagulation. With CrCl 42 mL/min, enoxaparin requires dose reduction to daily dosing.\n\nOption A (heparin) could be used but is less effective than LMWH for cancer-associated thrombosis and requires frequent monitoring, challenging in confused elderly patients.\n\nOption B (full-dose enoxaparin BID) is the trap - many physicians know LMWH is preferred for cancer patients but forget to renally dose-adjust. CrCl <30 requires daily dosing; many experts recommend this adjustment at CrCl <50 in elderly patients.\n\nOption D (apixaban) isn't wrong per se, but DOACs have less evidence in cancer-associated thrombosis, especially with GI malignancy and altered anatomy from ileal conduit potentially affecting absorption.\n\nClinical Pearl: Cancer patients have 20-30% higher VTE recurrence rates. In elderly cancer patients with PE, always calculate CrCl using Cockroft-Gault and adjust LMWH accordingly. The thrombocytosis here is likely reactive to cancer, not a contraindication to anticoagulation.", "reason": "Explanation says CrCl <30 needs adjustment, patient has 42"}, {"idx": 3000, "ti": 26, "t": "Harrison", "q": "An 80-year-old man with extensive-stage small cell lung cancer is day 8 post-chemotherapy when his daughter notices he's 'not making sense.' He couldn't figure out how to use his pillbox this morning (IADL decline). Temp 37.1°C, BP 110/70. Labs: WBC 500, ANC 100, Cr 1.6 (baseline 1.1). He appears confused but has no focal findings. Which empiric therapy should be initiated immediately?", "o": ["Cefepime 2 g IV + vancomycin", "Meropenem 500 mg IV q6h", "Ceftazidime 2 g IV q8h + gentamicin", "Acyclovir 10 mg/kg IV q8h"], "c": 1, "e": "The correct answer is meropenem 500 mg IV q6h (renally dosed). This neutropenic patient with altered mental status needs immediate broad-spectrum antibiotics. The dose is appropriately reduced for his renal function using Cockroft-Gault calculation.\n\nOption A (cefepime + vancomycin) is the trap - while this is standard neutropenic fever coverage, cefepime at full dose with Cr 1.6 in an 80-year-old will cause neurotoxicity, worsening his confusion. Many physicians forget to dose-adjust in mild renal impairment.\n\nOption C (ceftazidime + gentamicin) combines two nephrotoxic drugs in someone with acute kidney injury. Aminoglycosides are on Beers criteria for elderly patients, especially with renal impairment.\n\nOption D (acyclovir) suggests HSV encephalitis, but he's afebrile with no focal findings. While immunosuppressed patients need broad differentials, bacterial infection is far more likely with severe neutropenia.\n\nClinical Pearl: Functional decline (IADL changes like medication management) often precedes obvious infection symptoms in elderly neutropenic patients. The combination of neutropenia + confusion in elderly = sepsis until proven otherwise, requiring immediate antibiotics.", "reason": "Explanation cut off, incomplete reasoning provided"}, {"idx": 3011, "ti": 27, "t": "Harrison", "q": "An 81-year-old man with Stage 3b CKD (eGFR 36) is diagnosed with S. aureus prosthetic valve endocarditis 3 months after mechanical mitral valve replacement. He's clinically stable. Isolate is methicillin-susceptible. Surgery consult deems him high-risk. Family meeting establishes goals of life prolongation with acceptable quality of life. What is the optimal antibiotic approach?", "o": ["Nafcillin 2g IV q4h for 6 weeks", "Cefazolin 2g IV q8h for 6 weeks", "Vancomycin 15mg/kg IV q24h + rifampin 300mg PO q8h + gentamicin 1mg/kg IV q48h for 2 weeks", "Cefazolin 2g IV q8h + rifampin 300mg PO q8h for 6 weeks, then rifampin 300mg PO q8h indefinitely"], "c": 3, "e": "This patient has early PVE with MSSA requiring prolonged combination therapy given surgical contraindication. The correct answer includes cefazolin (renally-dosed), rifampin for biofilm penetration, and indefinite rifampin suppression after initial treatment.\n\nOption A (nafcillin monotherapy) is the TRAP - many physicians treat MSSA endocarditis with nafcillin alone, but prosthetic valves require combination therapy with rifampin for biofilm penetration. Monotherapy has >50% failure rate in PVE.\n\nOption B (cefazolin alone) lacks rifampin and would fail in prosthetic valve infection.\n\nOption C (vancomycin-based) inappropriately uses vancomycin for MSSA and includes nephrotoxic gentamicin in CKD patient.\n\nClinical Pearl: Early PVE (<12 months) requires surgery in most cases, but high-risk patients may be managed medically with combination antibiotics including rifampin. Goals-of-care discussions should address that medical management alone has higher failure rates but aligns with quality-of-life priorities.", "reason": "Explanation cut off, cannot verify complete reasoning"}, {"idx": 3009, "ti": 27, "t": "Harrison", "q": "An 88-year-old man with permanent pacemaker placed 18 months ago presents with 6 weeks of fatigue and 5kg weight loss. No fever reported. Physical exam reveals splenomegaly. Labs: Hgb 9.2 g/dL, ESR 95 mm/hr, creatinine 1.4 mg/dL. Blood cultures at 48 hours show gram-positive rods. TEE shows vegetations on pacemaker leads. Which organism is most likely?", "o": ["Corynebacterium species", "Listeria monocytogenes", "Bacillus cereus", "Cutibacterium acnes"], "c": 3, "e": "This patient has subacute CIED-IE with indolent presentation (fatigue, weight loss, anemia, elevated ESR without fever) typical of Cutibacterium acnes (formerly Propionibacterium acnes). This organism causes delayed device infections and may take 5-14 days to grow in blood cultures.\n\nOption A (Corynebacterium) is the TRAP - many physicians assume any gram-positive rod in blood cultures is a 'diphtheroid' contaminant. However, Corynebacterium typically causes earlier device infections (within 12 months) and grows faster in culture.\n\nOption B (Listeria) causes acute illness with fever and CNS symptoms, not this indolent presentation.\n\nOption C (Bacillus) typically causes acute fulminant infection in immunocompromised patients or PWID, not subacute device infection.\n\nClinical Pearl: C. acnes CIED-IE presents insidiously in elderly patients, often >1 year after implantation. Always hold blood cultures for 14 days when suspecting indolent device infection. Complete device removal is required for cure.", "reason": "Cultures at 48 hours contradict 5-14 day growth"}, {"idx": 3019, "ti": 27, "t": "Harrison", "q": "An 86-year-old nursing home resident with advanced dementia (unable to recognize family) and diabetes develops MRSA bacteremia from a sacral ulcer. TEE shows 5mm tricuspid vegetation. She's on comfort feeds only per advance directives. Family asks about treatment options. What is the most appropriate recommendation?", "o": ["Comfort care only with no antibiotics", "Oral linezolid 600mg q12h for 4 weeks", "IV vancomycin via PICC for 6 weeks", "Oral trimethoprim-sulfamethoxazole for suppression"], "c": 1, "e": "This patient has right-sided endocarditis in setting of advanced dementia. The correct answer is oral linezolid, which can treat endocarditis while maintaining comfort-focused goals by avoiding IV access.\n\nOption A (no antibiotics) is the TRAP - many assume comfort care means no antibiotics, but treating infection can improve comfort by reducing fever and agitation, aligning with palliative goals.\n\nOption C (IV vancomycin) requires PICC placement contradicting comfort-focused care and increasing medicalization.\n\nOption D (TMP-SMX suppression) is inadequate for active endocarditis treatment.\n\nClinical Pearl: Goals-of-care in advanced dementia should focus on comfort, but this doesn't preclude treating reversible conditions causing distress. Oral antibiotics for endocarditis (linezolid for MRSA, fluoroquinolones for susceptible organisms) can align with comfort goals while avoiding invasive procedures.", "reason": "Explanation supports oral linezolid, answer marked C"}, {"idx": 3017, "ti": 27, "t": "Harrison", "q": "An 80-year-old man admitted with MSSA endocarditis develops new fever on day 14 of cefazolin. He has chronic knee pain managed with scheduled acetaminophen 650mg q6h and tramadol 50mg q8h. WBC rises from 8 to 16K. Blood cultures negative. Chest X-ray clear. His daughter mentions he seems more confused. What is the most appropriate next step?", "o": ["Switch cefazolin to vancomycin for MRSA coverage", "Add gentamicin for synergy", "Check random cortisol level", "Obtain hepatic function panel"], "c": 3, "e": "This patient likely has acetaminophen toxicity from scheduled high-dose therapy (2.6g/day) in an elderly person. The correct action is checking liver enzymes, as hepatotoxicity can present with fever, leukocytosis, and encephalopathy.\n\nOption A (switch to vancomycin) is the TRAP - knee-jerk reaction to fever on antibiotics is to broaden coverage, but MSSA doesn't develop resistance during therapy and negative cultures argue against treatment failure.\n\nOption B (add gentamicin) would add nephrotoxicity without benefit in MSSA endocarditis already responding to therapy.\n\nOption C (cortisol) could evaluate adrenal insufficiency but is less likely than medication toxicity given the clinical picture.\n\nClinical Pearl: The 2023 Beers Criteria recommends avoiding >3g/day acetaminophen in elderly patients. Even 2.6g/day can cause toxicity with malnutrition, dehydration, or concurrent liver disease. Fever in elderly patients on antibiotics requires systematic evaluation beyond assuming treatment failure.", "reason": "Dose 2.6g/day is below 4g toxic threshold"}, {"idx": 3038, "ti": 17, "t": "Harrison", "q": "An 81-year-old nursing home resident with moderate vascular dementia is found unresponsive. Staff report 3 days of decreased oral intake and lethargy. Temperature 35.8°C, BP 88/54, HR 112. ECG shows new LBBB. Troponin I 8.2 ng/mL. Lactate 4.2. She has a POLST form indicating DNR/DNI but full medical treatment. Family is en route. Which management approach is most appropriate?", "o": ["Comfort measures only given DNR status", "Aggressive fluid resuscitation and vasopressors", "IV fluids, antibiotics, and reassess with family input", "Immediate cardiac catheterization"], "c": 2, "e": "This patient has cardiogenic shock from likely NSTEMI, complicated by possible sepsis. The correct approach balances aggressive care within her stated goals (DNR but full treatment).\n\nOption A is the TRAP - many physicians incorrectly equate DNR with comfort care only. DNR means no CPR if heart stops, but doesn't preclude other aggressive treatments. This is a critical medicolegal distinction.\n\nOption B (aggressive resuscitation) may be excessive without family input given her baseline dementia and poor prognosis from cardiogenic shock in elderly patients.\n\nOption D (immediate cath) is inappropriate given hemodynamic instability and unclear overall goals. Stabilization and family discussion take precedence.\n\nClinical Pearl: DNR ≠ 'do not treat.' Many DNR patients want full medical treatment short of CPR. Always clarify specific treatment preferences, especially in elderly patients with dementia where quality of life considerations are paramount.", "reason": "Explanation describes cardiogenic shock not antibiotics indication"}, {"idx": 3045, "ti": 17, "t": "Harrison", "q": "An 82-year-old woman with diabetes, hypertension, and mild cognitive impairment is admitted with NSTEMI. She weighs 52kg with Cr 1.1 mg/dL (CrCl 38 mL/min by Cockcroft-Gault). She's started on aspirin, metoprolol, and atorvastatin. Which P2Y12 inhibitor dosing is most appropriate?", "o": ["Clopidogrel 75mg daily without loading dose", "Clopidogrel 300mg load then 75mg daily", "Ticagrelor 180mg load then 90mg BID", "Prasugrel 60mg load then 10mg daily"], "c": 1, "e": "This elderly patient with low body weight and reduced CrCl should receive clopidogrel 300mg load (reduced from standard 600mg due to age/weight) then 75mg daily.\n\nOption A (no loading dose) delays antiplatelet effect in acute NSTEMI where rapid platelet inhibition improves outcomes.\n\nOption C (ticagrelor) is the TRAP - while guidelines prefer ticagrelor in NSTEMI, elderly patients >75 with low body weight (<60kg) have significantly increased bleeding risk. The BID dosing also reduces compliance in cognitively impaired patients.\n\nOption D (prasugrel) is contraindicated in patients ≥75 years old (Beers Criteria 2023) due to intracranial hemorrhage risk.\n\nClinical Pearl: In elderly NSTEMI patients, individualize P2Y12 inhibitor choice based on bleeding risk factors: age >75, weight <60kg, previous bleeding, CrCl <60. Clopidogrel remains first-line in high bleeding risk elderly patients despite being 'weaker' than newer agents.", "reason": "Standard clopidogrel loading is 600mg not 300mg"}, {"idx": 3041, "ti": 17, "t": "Harrison", "q": "A 78-year-old man with HTN, DM, and recent hip fracture (3 weeks post-ORIF) presents with rest angina. He's on enoxaparin 40mg daily for DVT prophylaxis, metoprolol 25mg BID, and oxycodone PRN. ECG shows ST depression. Troponin rising. Weight 68kg, Cr 1.3 mg/dL. Using Cockcroft-Gault: CrCl = 42 mL/min. What is the appropriate anticoagulation for NSTEMI?", "o": ["Enoxaparin 1mg/kg BID", "Enoxaparin 1mg/kg daily", "Unfractionated heparin infusion", "Continue prophylactic enoxaparin 40mg daily"], "c": 1, "e": "This elderly patient with NSTEMI and moderate renal impairment requires therapeutic anticoagulation with dose adjustment. Enoxaparin 1mg/kg daily is correct for CrCl 30-50 mL/min.\n\nOption A (full dose BID) is the TRAP - this is standard NSTEMI dosing but inappropriate with CrCl <50. Many physicians forget to calculate CrCl in elderly patients, leading to bleeding complications.\n\nOption C (UFH) is acceptable but not preferred unless CrCl <30 or other contraindications exist.\n\nOption D (prophylactic dose) is insufficient for NSTEMI treatment.\n\nClinical Pearl: Always calculate CrCl using Cockcroft-Gault (not eGFR) for drug dosing in elderly patients. For NSTEMI anticoagulation: CrCl >50: enoxaparin 1mg/kg BID; CrCl 30-50: 1mg/kg daily; CrCl <30: use UFH.", "reason": "Explanation supports 1mg/kg daily, not BID dosing"}, {"idx": 3050, "ti": 17, "t": "Harrison", "q": "A 75-year-old man with newly diagnosed NSTEMI has baseline mild cognitive impairment. Post-catheterization, he's started on dual antiplatelet therapy, high-intensity statin, beta-blocker, and ACE inhibitor. His wife reports he frequently forgets medications. Which intervention best ensures medication adherence while maintaining autonomy?", "o": ["Weekly pill box with wife supervising", "Simplify to once-daily regimen where possible", "Admit to SNF for medication management", "Discontinue non-essential cardiac medications"], "c": 1, "e": "Simplifying to once-daily dosing improves adherence in cognitively impaired patients while maintaining autonomy. Many cardiac drugs have once-daily options.\n\nOption A (wife supervising) is reasonable but less empowering than regimen simplification as the primary intervention.\n\nOption C (SNF admission) is the TRAP - many providers overreact to medication non-adherence in MCI patients by recommending institutionalization. This drastically reduces quality of life for a manageable problem.\n\nOption D compromises essential post-MI secondary prevention.\n\nClinical Pearl: Medication adherence in MCI: First simplify regimen (once-daily dosing, combination pills), then add supports (pill boxes, alarms, family assistance). Reserve institutionalization for failure of community-based interventions. Post-MI medications save lives - work to maintain them rather than discontinuing.", "reason": "Explanation incomplete, cuts off at 'MCI: F'"}, {"idx": 3053, "ti": 17, "t": "Harrison", "q": "An 81-year-old man with heart failure (EF 35%), CKD stage 3a, and diabetes presents 4 hours after chest pain onset. ECG shows anterior STEMI. He arrives at a non-PCI hospital; transfer time to PCI center is 140 minutes. BP 108/72, HR 88. Creatinine 1.6 mg/dL, weight 72kg, CrCl 38 mL/min. No contraindications to fibrinolysis identified. What is the most appropriate reperfusion strategy?", "o": ["Tenecteplase 35mg IV bolus", "Tenecteplase 25mg IV bolus", "Transfer for primary PCI", "Tenecteplase 40mg IV bolus"], "c": 1, "e": "This patient requires fibrinolysis because primary PCI cannot be achieved within 120 minutes of first medical contact (140-minute transfer time). The correct answer is tenecteplase 25mg, which represents appropriate renal dose adjustment for his CrCl 38 mL/min.\n\nOption A (35mg) is the trap answer - this would be the standard dose for his weight (72kg = 35mg dose) but fails to account for required renal adjustment. Many physicians forget that tenecteplase requires dose reduction when CrCl <60 mL/min.\n\nOption C (transfer for PCI) is wrong because the delay exceeds 120 minutes, making fibrinolysis the preferred strategy per guidelines.\n\nOption D (40mg) would be an overdose even without considering renal function.\n\nClinical Pearl: Tenecteplase dosing in elderly requires TWO adjustments: weight-based dosing AND renal adjustment. For CrCl 30-60 mL/min, reduce the weight-based dose by 50%. Always calculate CrCl using Cockroft-Gault in elderly patients, as eGFR overestimates renal function for drug dosing.", "reason": "Tenecteplase does NOT require renal dose adjustment"}, {"idx": 3061, "ti": 17, "t": "Harrison", "q": "A 77-year-old woman is post-STEMI day 4, treated with PCI. She developed acute kidney injury (creatinine rose from 1.2 to 2.1 mg/dL) attributed to contrast nephropathy. She has new bilateral rales, orthopnea, and 2+ pitting edema. BNP 1840 pg/mL. Echo shows EF 30%. Weight 70kg, current CrCl 28 mL/min. BP 102/64. Which diuretic regimen is most appropriate?", "o": ["Furosemide 20mg IV BID", "Furosemide 80mg IV BID", "Metolazone 5mg PO daily", "Furosemide 40mg IV BID + metolazone 2.5mg PO daily"], "c": 1, "e": "This patient has decompensated heart failure with AKI requiring effective diuresis. The correct answer is furosemide 80mg IV BID - in kidney disease, loop diuretics require higher doses to achieve the same effect due to reduced tubular secretion.\n\nOption A (20mg furosemide) is the trap answer - many physicians are afraid to use appropriate diuretic doses when creatinine is elevated. This underdosing leads to inadequate diuresis, prolonged congestion, and worse outcomes. The myth of 'protecting the kidneys' by using homeopathic diuretic doses must be overcome.\n\nOption C (metolazone alone) is insufficient for acute decompensated heart failure - thiazide-like diuretics have reduced efficacy when CrCl <30 mL/min.\n\nOption D (combination) may be needed if high-dose loop diuretic fails, but not as first-line due to higher risk of severe hypokalemia and metabolic alkalosis.\n\nClinical Pearl: In CKD with acute heart failure, loop diuretic dosing must be INCREASED, not decreased. For CrCl <30 mL/min, double the usual IV dose. Monitor electrolytes closely, but fear of worsening creatinine shouldn't prevent adequate decongestion - permissive azotemia with successful decongestion improves long-term outcomes versus persistent congestion with 'preserved' creatinine.", "reason": "Explanation describes 80mg IV BID, not listed"}, {"idx": 3057, "ti": 17, "t": "Harrison", "q": "An 82-year-old man is day 3 post-anterior STEMI treated with PCI. He develops new confusion, word-finding difficulty, and right facial droop. CT head shows no hemorrhage. BP 168/92, HR 78 (in sinus). He's on aspirin 81mg, ticagrelor 90mg BID, atorvastatin 80mg, and metoprolol 50mg BID. CrCl 38 mL/min. Echo shows apical akinesis with possible thrombus. What is the most appropriate antithrombotic management?", "o": ["Add warfarin with target INR 2-3, continue DAPT", "Stop ticagrelor, add warfarin with target INR 2-3", "Add apixaban 5mg BID, continue DAPT", "Stop ticagrelor, add apixaban 5mg BID"], "c": 1, "e": "This patient has cardioembolic stroke from LV thrombus post-MI, requiring anticoagulation. The correct answer is stopping ticagrelor and adding warfarin. Triple therapy would pose excessive bleeding risk in this elderly patient with CrCl 38 mL/min.\n\nOption A (triple therapy with warfarin) has unacceptable bleeding risk, especially with renal impairment and age >80.\n\nOption C (adding apixaban to DAPT) is the trap answer - while DOACs are generally preferred, apixaban is not FDA-approved for LV thrombus. Many physicians assume DOACs can replace warfarin for all indications, but evidence supports only warfarin for post-MI LV thrombus.\n\nOption D (apixaban replacing ticagrelor) is wrong for the same reason - lack of evidence for DOACs in LV thrombus.\n\nClinical Pearl: LV thrombus remains an indication for warfarin over DOACs. In elderly patients requiring anticoagulation post-PCI, use warfarin/DOAC + P2Y12 inhibitor (drop aspirin) unless very high thrombotic risk. The HAS-BLED score significantly underestimates bleeding risk in patients >80 years on triple therapy.", "reason": "Explanation contradicts stopping ticagrelor, supports anticoagulation addition"}, {"idx": 3059, "ti": 17, "t": "Harrison", "q": "A 79-year-old woman is admitted with acute inferior STEMI. She has moderate Alzheimer's (MMSE 17), hypertension, and osteoporosis. Lives with daughter who manages her medications. Current meds: donepezil 10mg, amlodipine 5mg, alendronate weekly. During initial evaluation, she appears frightened and repeatedly asks for her deceased husband. HR 95, BP 108/65. Which factor most strongly predicts her risk of developing severe delirium during this admission?", "o": ["Baseline moderate dementia", "Current psychotic features (deceased husband)", "Anticipated use of narcotic analgesia", "Hemodynamic parameters suggesting right ventricular involvement"], "c": 0, "e": "The strongest predictor of delirium in hospitalized elderly is baseline dementia. This patient's moderate Alzheimer's disease (MMSE 17) places her at extremely high risk (>50%) for developing delirium during acute illness and hospitalization.\n\nOption B (psychotic features) is the trap answer - many assume that hallucinations about deceased relatives indicate delirium, but this is actually common in moderate-severe dementia at baseline ('persistent complex bereavement'). It's not psychosis or necessarily delirium. Many providers misdiagnose baseline dementia behaviors as acute delirium.\n\nOption C (narcotic use) is a risk factor but less predictive than baseline cognitive impairment.\n\nOption D (RV involvement) may cause hypotension but isn't a direct delirium predictor.\n\nClinical Pearl: Use the DEAR risk stratification for delirium: Dementia, Elderly (>80), Alcohol, Renal impairment. Presence of dementia alone confers 5-fold increased risk. In patients with baseline MMSE <20, implement universal delirium precautions: orientation cues, maintain day/night cycle, early mobilization, minimize tethers (IVs, catheters), and have family present continuously if possible.", "reason": "Question appears truncated, incomplete outcome prediction"}, {"idx": 3048, "ti": 17, "t": "Harrison", "q": "An 81-year-old man with NSTEMI, diabetes, and stage 3b CKD (eGFR 32) requires cardiac catheterization. He weighs 70kg. Creatinine is 2.0 mg/dL. He's worried about dialysis risk. Which intervention best reduces contrast-induced nephropathy risk?", "o": ["N-acetylcysteine 600mg PO BID starting now", "Sodium bicarbonate 150mEq in 1L D5W at 3mL/kg/hr", "Normal saline 1mL/kg/hr for 12 hours pre and post", "Hold procedure until nephrology consultation"], "c": 2, "e": "Isotonic saline hydration remains the only proven intervention for contrast nephropathy prevention in high-risk patients.\n\nOption A (N-acetylcysteine) is the TRAP - despite widespread use, multiple trials show no benefit for preventing contrast nephropathy. Many physicians still prescribe it from outdated practice.\n\nOption B (bicarbonate) showed initial promise but recent trials demonstrate no superiority over saline.\n\nOption D inappropriately delays urgent cardiac intervention. Nephrology input rarely changes management in straightforward cases.\n\nClinical Pearl: Contrast nephropathy risk factors include CKD (especially eGFR <45), diabetes, age >75, volume depletion, and high contrast volume. Prevention = hydration with isotonic saline. Minimize contrast volume and consider staged procedures for complex multivessel intervention.", "reason": "Explanation discusses isotonic saline, answer specifies normal saline"}, {"idx": 3069, "ti": 39, "t": "Harrison", "q": "An 81-year-old woman is admitted with distributive shock from urosepsis. PMH: mild Alzheimer's (MMSE 20), HTN, osteoporosis. Day 3: she's off pressors but develops acute confusion, picking at bedsheets and trying to climb out of bed. She hasn't slept in 48 hours. CAM screen positive. Labs normal except Cr 1.8 (baseline 1.2). Which intervention has the strongest evidence for delirium prevention?", "o": ["Scheduled melatonin 3mg at 9 PM", "Early mobilization with PT/OT BID", "Prophylactic haloperidol 0.5mg BID", "Continuous pulse oximetry monitoring"], "c": 1, "e": "This patient has ICU delirium (positive CAM) with multiple risk factors. The correct answer is early mobilization, which has the strongest evidence for both delirium prevention and treatment. The ABCDEF bundle emphasizes early mobility as a cornerstone of delirium reduction.\n\nOption A (melatonin) is the TRAP - while sleep-wake cycle restoration is important and melatonin is safe, evidence for melatonin in delirium prevention is weak. Many clinicians overestimate its efficacy because it seems logical and harmless.\n\nOption C (prophylactic haloperidol) has been disproven in multiple trials. Antipsychotics don't prevent delirium and may increase mortality. They're reserved for treating dangerous agitation only.\n\nOption D (continuous monitoring) may increase sleep disruption from false alarms and staff interventions, potentially worsening delirium. Minimize unnecessary monitoring in stable patients.\n\nClinical Pearl: The ABCDEF bundle for ICU delirium: Assess/manage pain, Both SAT/SBT, Choice of sedation (minimize), Delirium monitoring, Early mobility, Family engagement. Early mobility (even passive ROM in intubated patients) reduces delirium by 40% and shortens ICU stay by 2 days.", "reason": "Explanation discusses prevention but patient already has delirium"}, {"idx": 3067, "ti": 39, "t": "Harrison", "q": "An 88-year-old nursing home resident with advanced dementia (unable to recognize family), dysphagia requiring pureed diet, and recurrent aspiration pneumonia is admitted with septic shock from pneumonia. CrCl 28 mL/min. The ICU team recommends intubation and vasopressors. His son, who is POA, asks about prognosis and goals of care. According to his living will, he wanted 'everything done.' What is the most appropriate counseling approach?", "o": ["Explain that 'everything done' in advanced dementia context means optimal comfort care", "Proceed with full aggressive care per the living will", "Recommend time-limited trial of ICU care with reassessment in 72 hours", "Request ethics consultation before making decisions"], "c": 0, "e": "This patient has end-stage dementia with poor functional status and life-threatening illness. The correct answer recognizes that 'everything done' often means everything to achieve the patient's goals - which in advanced dementia is typically comfort and dignity, not prolonging the dying process with invasive interventions unlikely to restore meaningful function.\n\nOption B (full aggressive care) is the TRAP - many clinicians interpret advance directives literally without considering the clinical context. A living will written when healthy may not reflect wishes when facing end-stage dementia with no prospect of meaningful recovery.\n\nOption C (time-limited trial) might be appropriate for unclear prognosis, but this patient has clear markers of end-stage dementia (not recognizing family, dysphagia, recurrent aspiration) with dismal prognosis even if he survives this acute event.\n\nOption D (ethics consultation) delays necessary decision-making and isn't required when the medical team and surrogate can discuss goals aligned with the patient's condition.\n\nClinical Pearl: In advanced dementia, median survival after eating problems develop is <6 months. Hospitalization for pneumonia in advanced dementia carries >50% 6-month mortality. Frame discussions around what the patient valued in life and whether ICU care can restore those values.", "reason": "Living will explicitly stated 'everything done' verbatim"}, {"idx": 3077, "ti": 39, "t": "Harrison", "q": "An 83-year-old man with vascular dementia, residing in assisted living, presents with cardiogenic shock from decompensated heart failure. EF 20%, BNP 3400. He's on dobutamine 7.5 mcg/kg/min but remains hypotensive. Cardiac index 1.8 L/min/m2. The heart failure team recommends intra-aortic balloon pump (IABP) as bridge to decision. His son reports progressive decline over 6 months - needs help with all ADLs, doesn't recognize family, weight loss of 20 lbs. What should guide the goals-of-care discussion?", "o": ["His trajectory suggests end-stage dementia where invasive cardiac support is unlikely to restore meaningful function", "IABP is minimally invasive and reversible, warranting a trial", "Cardiogenic shock mortality exceeds 50% regardless of intervention", "Transfer to a center with LVAD capability for definitive therapy"], "c": 0, "e": "This patient has markers of advanced dementia (not recognizing family, total ADL dependence, weight loss) with superimposed cardiogenic shock. The correct answer frames mechanical circulatory support in context of his overall prognosis and quality of life.\n\nOption B is the TRAP - while IABP is 'less invasive' than surgery, it requires ICU care, immobilization, and anticoagulation. Many physicians minimize MCS invasiveness when it still represents aggressive care inappropriate for end-stage dementia.\n\nOption C (mortality statistics) doesn't address quality of life or functional outcomes in dementia context.\n\nOption D (LVAD referral) is inappropriate for advanced dementia - LVAD requires cognitive ability for device management and carries significant burden.\n\nClinical Pearl: Advanced dementia markers (FAST 7): inability to walk, speak (<6 words), smile, hold head up, or recognize family. Median survival <6 months with any of these. Mechanical circulatory support in advanced dementia offers burden without meaningful benefit. Focus on comfort and dignity.", "reason": "Explanation describes advanced dementia, answer says end-stage"}, {"idx": 3087, "ti": 27, "t": "Harrison", "q": "An 82-year-old man develops confusion and agitation 2 days after hip fracture repair. He has been receiving morphine PCA for pain control. Past medical history: mild cognitive impairment, BPH. Vitals normal. He is disoriented to place and time, pulling at his catheter. CAM screen is positive. Labs unremarkable except Cr 1.6 (baseline 1.3). What is the most appropriate management strategy?", "o": ["Switch to scheduled acetaminophen and discontinue opioids completely", "Change morphine PCA to fentanyl patch", "Rotate to hydromorphone 0.2 mg IV q3h PRN", "Continue morphine but add scheduled haloperidol"], "c": 2, "e": "This patient has postoperative delirium, likely precipitated by morphine which has active metabolites that accumulate in kidney disease. The correct answer is rotating to hydromorphone at appropriate low doses for his renal function.\n\nOption A is the TRAP - completely discontinuing opioids after major surgery in an elderly patient risks inadequate pain control, which itself precipitates delirium. The key is using the RIGHT opioid at the RIGHT dose.\n\nOption B (fentanyl patch) is inappropriate for acute pain and takes 12-24 hours to reach steady state, leaving him without adequate analgesia.\n\nOption D treats the symptom (delirium) without addressing the cause (morphine accumulation) and adds another deliriogenic medication.\n\nClinical Pearl: In elderly with CKD, avoid morphine (active metabolite M6G accumulates) and meperidine (seizures from normeperidine). Hydromorphone and fentanyl are safer choices. Use multimodal analgesia: scheduled acetaminophen, regional blocks, and lowest effective opioid doses. Remember the '5 Ps' of postoperative delirium: Pain, Pee (retention), Poop (constipation), Pharmacology, and Pulmonary (hypoxia).", "reason": "Explanation cut off, cannot verify complete reasoning"}, {"idx": 3091, "ti": 27, "t": "Harrison", "q": "An 80-year-old man with COPD on home oxygen, diabetes, and mild dementia is admitted with fever and increased confusion. His wife reports he has been more somnolent and eating poorly for 3 days. T 37.8°C, BP 100/60, HR 88, RR 20, O2 sat 88% on his usual 2L NC. WBC 6,000, glucose 220, lactate 2.3. UA shows 10 WBC/hpf, few bacteria. CXR clear. Blood cultures are obtained. Which finding most strongly supports a diagnosis of sepsis?", "o": ["Temperature 37.8°C with infection source", "Lactate 2.3 mmol/L", "Change in mental status from baseline", "WBC 6,000 in a diabetic patient"], "c": 2, "e": "Per Sepsis-3 criteria, sepsis requires life-threatening organ dysfunction from infection. The correct answer is altered mental status representing acute brain dysfunction, especially significant when changed from baseline dementia.\n\nOption B (lactate 2.3) is the TRAP - while lactate >2 defines septic shock when combined with hypotension requiring vasopressors, mild elevation alone doesn't define sepsis. Many conditions elevate lactate.\n\nOption A (low-grade fever) doesn't meet SIRS criteria and elderly often have blunted fever response. Temperature alone doesn't indicate organ dysfunction.\n\nOption D (normal WBC) is common in elderly sepsis - absence of leukocytosis doesn't rule out serious infection, especially in diabetics.\n\nClinical Pearl: Elderly patients with sepsis often present atypically: hypothermia more than fever, confusion rather than classic symptoms, normal WBC despite serious infection. The qSOFA score (altered mentation, RR ≥22, SBP ≤100) performs well in elderly. A single qSOFA point (altered mental status) in a patient with infection warrants careful evaluation for organ dysfunction and consideration of sepsis.", "reason": "Question appears cut off, cannot verify complete answer"}, {"idx": 3110, "ti": 24, "t": "Harrison", "q": "An 81-year-old man with CKD stage 3b (eGFR 36 mL/min/1.73m²) and mild cognitive impairment presents for routine follow-up. His daughter mentions he's been more forgetful and recently got lost driving to church. His medications include atorvastatin 40mg qHS, metoprolol 50mg BID, and ranitidine 150mg BID for reflux. Labs: Creatinine 1.8mg/dL, K 4.9mEq/L, HCO3 22mEq/L. Which medication change is most appropriate?", "o": ["Increase atorvastatin to 80mg for vascular protection", "Switch ranitidine to omeprazole 20mg daily", "Add memantine 5mg daily for cognitive symptoms", "Reduce metoprolol to 25mg BID"], "c": 1, "e": "The correct answer is switching ranitidine to omeprazole. Ranitidine (H2-blocker) is on the 2023 Beers Criteria and STOPP v3 list due to increased risk of cognitive impairment and delirium in older adults. In a patient with worsening cognition, removing potentially causative medications is the first step.\n\nOption A (increasing statin) is the trap answer - while statins provide vascular protection, high-dose statins don't improve cognition and may worsen confusion in some elderly patients. This appeals to clinicians focused on vascular dementia prevention.\n\nOption C (adding memantine) is premature - first eliminate potentially reversible causes like inappropriate medications before adding dementia drugs. Memantine also requires renal dose adjustm
