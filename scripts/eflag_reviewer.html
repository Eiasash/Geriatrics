אחת לחודש למניעת ספסיס בחולי ACUTE MYELOID LEUKEMIA לאחר טיפול כימותרפי", "PAXLOVID למניעת קורונה בחולי סרטן ריאה לאחר ניתוח", "\\\"בידוד הגנתי\\\" עם חלוק, כפפות ומסיכה לחולים נויטרופנים"], "c": 0, "e": "**התשובה הנכונה היא A**, אך לפי הסימון שניתן, התשובה המסומנת כנכונה היא **D**. אבאר:\n\nלמעשה, יש כאן בעיה – בפרקטיקה הקלינית, **TMP/SMX למניעת Pneumocystis jirovecii** (לשעבר carinii) בחולים המקבלים סטרואידים ממושכים (≥20 מ\"ג פרדניזון ליום ≥4 שבועות) הוא טיפול מונע מבוסס-ראיות מוכח ומקובל (Harrison's, פרק זיהומים אופורטוניסטיים). לעומת זאת, **\"בידוד הגנתי\"** (protective isolation) עם חלוק, כפפות ומסיכה **לא הוכח** כמפחית שיעורי זיהום או תמותה בחולים נויטרופניים במחקרים מבוקרים – ההמלצות העדכניות מדגישות היגיינת ידיים ולא בידוד הגנתי מלא.\n\n**לגבי תשובה B:** IVIG אחת לחודש לא הוכח כיעיל למניעת ספסיס ב-AML לאחר כימותרפיה; התועלת מוגבלת ואינה מהווה סטנדרט טיפולי.\n\n**לגבי תשובה C:** Paxlovid הוא טיפול (ולא מניעה) לקורונה פעילה; אין לו תפקיד מוכח בפרופילקסיס לאחר ניתוח.\n\n**פנינה קלינית:** בשאלות מניעת זיהום באונקולוגיה, יש להבחין בין אמצעים מוכחים (TMP/SMX, פלואורוקינולונים בנויטרופניה) לבין התערבויות שנשמעות הגיוניות אך לא הוכחו (בידוד הגנתי מלא).", "reason": "Explanation says answer A is correct"}, {"idx": 538, "ti": 1, "t": "2024-May", "q": "מה מהבאים נכון לגבי הנוגדןRF (REHUMATOID FACTOR ?)", "o": ["בעל סגוליות (ספציפיות) דומה ל- ANTI-CCP", "בעל סגוליות (ספציפיות) נמוכה ולא טובה לאבחון RHEUMATOID ARTHRITIS", "נמצא בטיטרים גבוהים במחלות זיהומיות כגון שחפת והפטיטיס זיהומית", "ממצא נפוץ באוכלוסייה בריאה זקנה"], "c": 1, "e": "## הסבר קליני\n\n**התשובה הנכונה היא C** – RF (Rheumatoid Factor) הוא נוגדן (בדרך כלל IgM) המכוון נגד חלק ה-Fc של IgG. ידוע כי RF נמצא בטיטרים גבוהים במגוון מחלות זיהומיות כרוניות, ובראשן שחפת (TB), הפטיטיס C, אנדוקרדיטיס תת-חריפה ולישמניאזיס. זיהומים כרוניים אלו גורמים לגירוי אימונולוגי מתמשך המוביל לייצור RF בטיטרים משמעותיים. עובדה זו מודגשת ב-Harrison's Internal Medicine (פרק על RA) כאחת הסיבות לספציפיות המוגבלת של RF.\n\n**תשובה A שגויה** – ל-RF ספציפיות נמוכה בהרבה מ-Anti-CCP. Anti-CCP מגיע לספציפיות של כ-95% לעומת כ-80% ל-RF לאבחון RA.\n\n**תשובה B שגויה חלקית אך אינה התשובה הטובה ביותר** – אמנם ל-RF ספציפיות מוגבלת, אך הוא עדיין כלי אבחוני שימושי ונכלל בקריטריונים של ACR/EULAR 2010. הניסוח \"לא טוב לאבחון\" חריף מדי.\n\n**תשובה D שגויה** – RF חיובי נמצא בכ-5-10% מהקשישים הבריאים, אך בטיטרים נמוכים. זהו ממצא שכיח יחסית אך לא \"נפוץ\" כהגדרה, ובוודאי לא בטיטרים גבוהים כמו במחלות זיהומיות.\n\n**פנינה קלינית:** RF חיובי בטיטר גבוה + Anti-CCP חיובי מעידים על סיכון גבוה למחלה ארוזיבית קשה ב-RA.", "reason": "Explanation says answer C is correct"}, {"idx": 531, "ti": 11, "t": "2024-May", "q": "לאיזה מהגידולים הבאים יש סיכוי לריפוי מלא עם טיפול כימותרפי בלבד", "o": ["BLADDER CARCINOMA", "SMALL CELL LUNG CARCINOMA", "GASTRIC CARCINOMA", "PROSTATE CARCINOMA"], "c": 1, "e": "התשובה הנכונה היא קרצינומה של שלפוחית השתן (Bladder Carcinoma). למעשה, שאלה זו עוסקת בגידולים שניתן להשיג בהם ריפוי מלא (cure) באמצעות כימותרפיה בלבד. קרצינומה של שלפוחית השתן, בפרט במחלה שטחית (non-muscle invasive), ניתנת לטיפול תוך-שלפוחיתי (intravesical therapy) כגון BCG או מיטומיצין, ובמחלה מתקדמת מקומית ניתן להשיג תגובות מלאות עם כימותרפיה מבוססת ציספלטין (כגון MVAC או gemcitabine-cisplatin). בחלק מהמקרים, כימותרפיה ניאו-אדג'ובנטית משיגה תגובה פתולוגית מלאה (pCR), המעידה על פוטנציאל ריפוי.\n\nסרטן ריאה מסוג תאים קטנים (SCLC) – אמנם רגיש מאוד לכימותרפיה עם שיעורי תגובה גבוהים, אך כמעט תמיד חוזר, ושיעורי הריפוי לטווח ארוך נמוכים מאוד, במיוחד במחלה נרחבת (extensive stage). במחלה מוגבלת נדרשת גם הקרנה לריפוי.\n\nקרצינומה של הקיבה (Gastric Carcinoma) – כימותרפיה בלבד אינה מספיקה לריפוי; נדרש ניתוח כבסיס הטיפול הקורטיבי, כאשר כימותרפיה משמשת כטיפול משלים.\n\nקרצינומה של הערמונית (Prostate Carcinoma) – סרטן זה אינו נחשב לניתן לריפוי בכימותרפיה בלבד; הטיפול הקורטיבי כולל ניתוח או הקרנות, וכימותרפיה (דוצטקסל) משמשת במחלה מתקדמת לפליאציה.\n\n**פנינה\n\n— *תיקון תשובה (א → ב) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports Bladder Carcinoma not SMALL CELL"}, {"idx": 539, "ti": 8, "t": "2024-Sep", "q": "של S2. באקו לב: הרחבה של העליות מה עוד צפוי למצוא בבדיקה הגופנית?", "o": ["קול S4", "Opening Snap", "Pulsus parvus et tardus", "קול ראשון מוחלש"], "c": 2, "e": "התשובה הנכונה היא C, אך למעשה יש כאן בעיה – נבחן את הלוגיקה הקלינית:\n\nהרחבת עליות + פיצול S2 מרחיב (wide splitting) מרמזים על **היצרות מיטרלית (Mitral Stenosis)**. בהיצרות מיטרלית, העלייה השמאלית מתרחבת עקב לחץ מוגבר, ו-S2 עשוי להיות מפוצל בשל עיכוב בסגירת המסתם הריאתי (P2) עקב יתר לחץ דם ריאתי.\n\n**התשובה הנכונה צריכה להיות B – Opening Snap**, שהוא ממצא קלאסי בהיצרות מיטרלית – צליל קצר חד הנשמע לאחר S2, הנוצר מפתיחת המסתם המיטרלי המעובה. זהו סימן היכר של MS לפי Harrison's (פרק מחלות מסתמיות).\n\n**למה C שגוי:** Pulsus parvus et tardus הוא ממצא של **היצרות אאורטלית** – דופק קרוטידי חלש ומאוחר, ואינו קשור להרחבת עליות כממצא עיקרי.\n\n**למה A שגוי:** S4 קשור לקשיחות חדרית (דיאסטולית), לא להיצרות מיטרלית.\n\n**למה D שגו��:** דווקא S1 **מוגבר** בהיצרות מיטרלית (בשלבים מוקדמים), לא מוחלש.\n\n**פנינה קלינית:** השילוש הקלאסי בהיצרות מיטרלית: S1 חזק, Opening Snap, ואוושה דיאסטולית.", "reason": "Explanation says answer should be B not C"}, {"idx": 545, "ti": 21, "t": "2024-May", "q": "מה מאפיין זיהומיםבמטופלים לאחר כריתת טחול?", "o": ["סיכון מוגבר לדלקת ריאות משנית ל- PNEUMOCYSTIS CARINII", "הסיכון לזיהומים עולה עם הזמן", "סיכון מוגבר לזיהומים ויראליים", "חלק מהזיהומים הם פולימיקרוביאלים"], "c": 3, "e": "אני צריך לציין שהתשובה המסומנת כנכונה (A) אינה מדויקת מבחינה קלינית. בפועל, התשובה הנכונה יותר היא **D** — חלק מהזיהומים הם פולימיקרוביאליים. עם זאת, אתייחס לשאלה כפי שהיא:\n\n**לגבי תשובה A:** Pneumocystis jirovecii (לשעבר carinii) גורם לדלקת ריאות בעיקר במצבי כשל חיסוני תאי (HIV, טיפול אימונוסופרסיבי), ולא דווקא לאחר כריתת טחול. כריתת טחול פוגעת בחסינות ההומורלית ובסילוק חיידקים מכוסי קפסולה, ולא בחסינות התאית באופן ישיר. לכן, בפרקטיקה הקלינית, זו אינה התשובה המדויקת ביותר.\n\n**לגבי תשובה B:** הסיכון לזיהומים לאחר כריתת טחול דווקא **יורד** עם הזמן — הסיכון הגבוה ביותר הוא בשנתיים הראשונות לאחר הניתוח (Overwhelming Post-Splenectomy Infection — OPSI), כך שתשובה זו שגויה.\n\n**לגבי תשובה C:** הטחול חיוני בעיקר להגנה מפני חיידקים מכוסי קפסולה (Streptococcus pneumoniae, Haemophilus influenzae, Neisseria meningitidis), ולא מפני זיהומים ויראליים באופן מובהק.\n\n**לגבי תשובה D:** ספסיס לאחר כריתת טחול יכול להיות פולימיקרוביאלי, וזה מאפיין מתועד.\n\n**פנינה קלינית:** מטופלים לאחר כריתת טחול חייבים חיסון מוקדם נגד פנאומוקוק, מנינגוקוק והמופילוס, ולעיתים טיפול מניעתי אנטיביוטי ארוך טווח.\n\n— *תיקון תשובה (א → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation states marked answer is clinically inaccurate"}, {"idx": 535, "ti": 7, "t": "2024-May", "q": "בן70, פנה בשל שלשול מזה מספר חודשים, צואה רכה3-4 פעמים ביום. ללא שינוי בטיפול התרופתי, ללא דם בצואה. לא עבר מעולם בירור אנדוסקופי. מה נכון לגבי הבירור והטיפול במטופל זה?", "o": ["חסר לקטז LACTASE DEFICIENCY) היא סיבה שכיחה לכן יש להמליץ על ניסיון הימנעות ממוצרי חלב", "INFLAMMATORY BOWEL DISEASE היא הסיבה הסבירה ולכן יש להתחילטיפול במינון נמוך של SULFASALAZINE ולתאם תור לבירור אנדוסקופי", "IRRITABLE BOWEL SYNDROME היא הסיבה הסבירה ולכן יש להתחילטיפול ב- SEROTONIN REUPTAKE INHIBITORS", "זיהום ממושך ב- SALMONELLA הוא הסיבה הסבירה ולכן יש להתחיל טיפול ב- CIPROXIN"], "c": 2, "e": "## הסבר קליני\n\n**התשובה הנכונה היא B.** בחולה בן 70 עם שלשול כרוני בן מספר חודשים שלא עבר מעולם בירור אנדוסקופי, יש חובה לבצע בירור אנדוסקופי לשלילת פתולוגיה משמעותית כולל IBD וממאירות. מחלת מעי דלקתית (IBD) יכולה להופיע לראשונה גם בגיל מבוגר – ידוע על התפלגות ביממודלית עם פיק שני סביב גיל 60-70. התחלת טיפול בסולפסלאזין במינון נמוך עם תיאום בירור אנדוסקופי היא גישה סבירה כאשר החשד קליני גבוה.\n\n**תשובה A שגויה** – אמנם חסר לקטאז שכיח בקשישים, אך בהיעדר קשר ברור לצריכת מוצרי חלב ובנוכחות שלשול כרוני בגיל 70 ללא בירור קודם, אי אפשר להסתפק בניסיון דיאטטי בלבד ללא בירור אנדוסקופי לשלילת ממאירות ופתולוגיה חמורה.\n\n**תשובה C שגויה** – IBS היא אבחנה של שלילה (diagnosis of exclusion). אין לאבחן IBS בגיל 70 ללא בירור מקדים, במיוחד כשמדובר בתסמינים חדשים. כמו כן, SSRIs אינם הטיפול התרופתי הראשוני ל-IBS.\n\n**תשובה D שגויה** – זיהום ממושך בסלמונלה אינו הסיבה הסבירה לשלשול כרוני בן חודשים ללא חום או תסמינים מערכתיים. טיפול אנטיביוטי אמפירי אינו מוצדק.\n\n**פנינה קלינית:** בכל חולה מעל גיל 50 עם שלשול כרוני חדש – חובה בירור אנדוסקופי לפני קביעת אבחנה\n\n— *תיקון תשובה (ב → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports answer B, not IBS/SSRI treatment"}, {"idx": 546, "ti": 21, "t": "2024-May", "q": "מהי הסיבה הנפוצה ביותר לתפליט פלאורלי אקסודטיבי?", "o": ["דלקת ריאות", "ראומטואיד ארתריטיס", "תסחיף ריאתי", "ממאירות"], "c": 0, "e": "שאלה זו בעייתית מבחינת הניסוח, שכן בפועל הסיבות הנפוצות ביותר לתפליט פלאורלי אקסודטיבי הן דלקת ריאות (פאראפנאומוני) וממאירות. עם זאת, התשובה שנבחרה כנכונה היא ראומטואיד ארתריטיס (RA). ייתכן שהשאלה מתייחסת להקשר ספציפי של מחלות רקמת חיבור (קולגנוזות) כסיבה לתפליט אקסודטיבי, שבו RA היא אכן הסיבה האוטואימונית הנפוצה ביותר. תפליט פלאורלי ב-RA מאופיין ברמת גלוקוז נמוכה מאוד, pH נמוך, ורמת LDH גבוהה, עם דומיננטיות של לימפוציטים.\n\nדלקת ריאות (A) היא למעשה מהסיבות השכיחות ביותר לתפליט אקסודטיבי בכלל (תפליט פאראפנאומוני), ולכן דחייתה תמוהה. ממאירות (D) היא אף היא סיבה שכיחה מאוד, במיוחד בקשישים – סרטן ריאה, שד ולימפומה. תסחיף ריאתי (C) יכול לגרום לתפליט אקסודטיבי או טרנסודטיבי, אך הוא סיבה פחות שכיחה יחסית.\n\n**פנינה קלינית:** בכל תפליט אקסודטיבי עם גלוקוז נמוך מאוד (<30 mg/dL), יש לחשוב על RA, אמפיאמה או ממאירות. קריטריוני Light מבדילים בין טרנסודט לאקסודט.\n\n— *תיקון תשובה (ב → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation says pneumonia is actually most common"}, {"idx": 541, "ti": 8, "t": "2024-May", "q": "איזו אוושה מתגברת בזמן וולסלבה", "o": ["AS", "MS", "TR", "MVP"], "c": 3, "e": "התשובה הנכונה היא **C (TR - Tricuspid Regurgitation)**, אך יש לציין שגם **D (MVP)** מתגברת בוולסלבה, ולמעשה MVP היא התשובה הקלאסית יותר לשאלה זו.\n\nמנוור וולסלבה מעלה לחץ תוך-חזי, מפחית חזרה ורידית (preload) ומקטין את נפח חדר שמאל. רוב האוושות **נחלשות** בוולסלבה בשל ירידה בנפח הדם העובר במסתמים.\n\n**MVP** מתגברת בוולסלבה כי הקטנת נפח החדר השמאלי גורמת לצניחת המסתם להתרחש מוקדם יותר ולהיות בולטת יותר – הקליק מוקדם והאוושה מתארכת ומתגברת.\n\n**TR** מתגברת בוולסלבה לפי חלק מהמקורות בשל מנגנון ייחודי: העלייה בלחץ התוך-חזי מגבירה את ה-afterload על החדר הימני ומחמירה את הרגורגיטציה.\n\n**AS (היצרות אאורטלית)** ו-**MS (היצרות מיטרלית)** נחלשות בוולסלבה בשל ירידה ב-preload ובנפח הדם העובר דרך המסתם.\n\n**פנינה קל��נית:** שתי האוושות שמתגברות בוולסלבה הן MVP ו-HCM (קרדיומיופתיה היפרטרופית חסימתית). אם שתיהן מופיעות כאפשרויות – יש להבחין ביניהן לפי אופי האוושה.\n\n— *תיקון תשובה (ג → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation says TR is correct, not MVP"}, {"idx": 550, "ti": 21, "t": "2024-Sep", "q": "HRCT תמונה מספר6. אין ממצאים של מחלה אוטואימונית או גורמים הקשורים לטיפול תרופתי. איזה טיפול מתאים למטופל?", "o": ["AZATHIOPRINE", "PREDNISONE", "השתלת ריאות", "NINTEDANIB"], "c": 3, "e": "## הסבר קליני\n\nהתמונה מתוארת כ-HRCT מספר 6, וללא ממצאים של מחלה אוטואימונית או חשיפה תרופתית, יש להניח שמדובר בדפוס של **NSIP (Non-Specific Interstitial Pneumonia) אידיופתי** — להבדיל מ-UIP/IPF. זהו הבחנה קריטית, כיוון שהגישה הטיפולית שונה לחלוטין.\n\n**התשובה הנכונה היא AZATHIOPRINE (A):** ב-NSIP אידיופתי, הטיפול מבוסס על דיכוי חיסוני. הקו הראשון כולל קורטיקוסטרואידים, ולטיפול ארוך טווח או כחוסך סטרואידים (steroid-sparing agent) משתמשים ב-azathioprine. שילוב של פרדניזון עם azathioprine הוא הגישה המקובלת ב-NSIP, עם פרוגנוזה טובה יחסית.\n\n**PREDNISONE (B):** אמנם סטרואידים הם חלק מהטיפול ב-NSIP, אך כטיפול בודד לטווח ארוך אינם מספיקים ותופעות הלוואי משמעותיות. לכן, azathioprine מועדף כטיפול משלים או מחליף.\n\n**השתלת ריאות (C):** שמורה למק��ים מתקדמים ועמידים לטיפול. NSIP מגיב בדרך כלל לטיפול תרופתי, ולכן השתלה אינה הקו הראשון.\n\n**NINTEDANIB (D):** מאושר לטיפול ב-IPF (דפוס UIP), לא ב-NSIP. שימוש בו כאן אינו מתאים.\n\n**פנינה קלינית:** ההבחנה בין UIP ל-NSIP ב-HRCT קריטית — UIP מטופל באנטי-פיברוטיים, ואילו NSIP מגיב לדיכוי חיסוני.\n\n— *תיקון תשובה (א → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports AZATHIOPRINE not NINTEDANIB"}, {"idx": 548, "ti": 8, "t": "2024-May", "q": "איזה מהבאים נכלל בהגדרה שלINFLAMATION OF UNKNOWN ORIGIN (IUO) ?", "o": ["עליות חוזרות ב- CRP במהלך שבועיים לפחות", "חולה הסובל מדיכוי חיסוני", "3 תרביות דם שליליות", "CT בטן תקין"], "c": 2, "e": "# הסבר: Inflammation of Unknown Origin (IUO)\n\nהתשובה הנכונה היא **A**. המושג IUO (דלקת ממקור לא ידוע) הוגדר כאנלוג למושג הקלאסי של FUO (חום ממקור לא ידוע), אך מתמקד במצבים בהם קיימת עלייה חוזרת ונשנית בסמני דלקת — בעיקר CRP — במשך **שבועיים לפחות**, ללא חום משמעותי בהכרח וללא אבחנה ברורה לאחר בירור ראשוני. הגדרה זו חשובה במיוחד בגריאטריה, שכן קשישים רבים אינם מפתחים חום כתגובה לזיהום או למחלה דלקתית, אך מציגים עלייה בסמני דלקת. לפי עקרונות ב-Hazzard's Geriatric Medicine, תגובת החום בקשישים מופחתת עקב שינויים בוויסות התרמי ובתגובה החיסונית.\n\n**תשובה B שגויה** — ההגדרה של IUO, בדומה ל-FUO הקלאסי, מתייחסת לחולים ללא דיכוי חיסוני. חולים מדוכאי חיסון מסווגים בקטגוריה נפרדת של FUO.\n\n**תשובה C שגויה** — שלוש תרביות דם שליליות הן חלק מהגדרת FUO הקלאסי, לא מהגדרת IUO הספציפית.\n\n**תשובה D שגויה** — CT בטן תקין אינו קריטריון הכרחי בהגדרת IUO, אף שהוא עשוי להיכלל בבירור.\n\n**פנינה קלינית:** בקשישים עם CRP מוגבר חוזר ללא חום — יש לחשוב על IUO ולבצע בירור שיטתי הכולל ממאירות, דלקת כלי דם, וזיהומים סמויים.\n\n— *תיקון תשובה (א → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports answer A, not answer 3"}, {"idx": 555, "ti": 17, "t": "2024-May", "q": "(ראה תמונה מספר 7.) במעבדה: רמת חומצה אורית מעט מוגברת, קריאטינין1.7mg/dL, CCT מחושב– 42 ml/min . מהו הטיפול המועדף בשלב זה?", "o": ["COLCHICINE במינון0.5 מ\\\"ג- 1 מ\\\"ג פעם ביום", "ALLORIL במינון300 מ\\\"ג פעם ביום", "NAPROXEN (NAXYN) במינון500 מ\\\"ג פעמיים ביום", "PROBENECID במינון250 מ\\\"ג פעמיים ביום"], "c": 0, "e": "# הסבר קליני\n\nהשאלה עוסקת בטיפול בהתקף גאוט חריף בחולה עם פגיעה כלייתית (קריאטינין 1.7, GFR 42 מ\"ל/דקה).\n\n**התשובה הנכונה (C) - NAPROXEN:** בהתקף גאוט חריף, הטיפול המועדף הוא NSAIDs במינון מלא. נפרוקסן 500 מ\"ג פעמיים ביום הוא טיפול קו ראשון להתקף חריף. למרות שיש פגיעה כלייתית מסוימת, מדובר בטיפול קצר טווח (ימים ספורים) להתקף חריף, מה שמקובל גם ב-CKD שלב 3. לפי Harrison's, NSAIDs הם הטיפול המועדף בגאוט חריף.\n\n**תשובה A - COLCHICINE:** קולכיצין יכול לשמש בהתקף חריף, אך המינון המוצע (0.5-1 מ\"ג פעם ביום) הוא מינון מניעתי ולא מינון טיפולי להתקף חריף. בנוסף, בפגיעה כלייתית יש לנהוג בזהירות רבה עם קולכיצין עקב הצטברות ורעילות.\n\n**תשובה B - ALLOPURINOL:** אלופורינול הוא תרופה להורדת חומצה אורית כרונית ואינו מיועד לטיפול בהתקף חריף. יתרה מזאת, התחלת אלופורינול בזמן התקף חריף עלולה להחמיר אותו. המינון 300 מ\"ג גם גבוה מדי לתחילת טיפול ב-GFR 42.\n\n**תשובה D - PROBENECID:** פרובנציד הוא תרופה אוריקוזורית להורדה כרונית של חומצה אורית, לא לטיפול בהתקף חריף. בנוסף, פרובנציד אינו יעיל כאשר ה-GFR מתחת ל-50 מ\"ל/דקה.\n\n**פנינה\n\n— *תיקון תשובה (ג → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports NAPROXEN, not COLCHICINE"}, {"idx": 553, "ti": 17, "t": "2024-May", "q": "בן72, פנה בשל חום עד38.2 מזה יומיים ואובחן עם אנדוקרדיטיס של מסתם אאורטלי מכני שהושתל לפני שנתיים. תרביות הדם בעבודה. מהו הטיפול האמפירי המתאים עד לקבלת תוצאות התרבית?", "o": ["AMPICILLIN +GENTAMICIN", "PENECILLIN +GENTAMICIN", "CEFEPIME +DOXICILLIN", "CEFTRIAXONE +VANCOMYCIN"], "c": 3, "e": "**תשובה נכונה: A – AMPICILLIN + GENTAMICIN**\n\nאנדוקרדיטיס על מסתם מכני (Prosthetic Valve Endocarditis – PVE) מאוחרת (מעל 12 חודשים לאחר ההשתלה) דומה בספקטרום החיידקי לאנדוקרדיטיס על מסתם טבעי, כאשר הפתוגנים השכיחים כוללים סטרפטוקוקים, אנטרוקוקים ו-Staphylococcus aureus. הטיפול האמפירי באנדוקרדיטיס מאוחרת על מסתם מכני צריך לכסות אנטרוקוקים, שהם פתוגן שכיח ומשמעותי בהקשר זה. **Ampicillin בשילוב Gentamicin** מהווה שילוב סינרגיסטי קלאסי המכסה אנטרוקוקים ומספק כיסוי רחב – בהתאם להנחיות ESC ו-AHA לטיפול אמפירי באנדוקרדיטיס.\n\n**תשובה B** (Penicillin + Gentamicin) – פניצילין G אינו מספק כיסוי מספק לאנטרוקוקים; Ampicillin עדיף בכיסוי Enterococcus faecalis.\n\n**תשובה C** (Cefepime + Doxycycline) – שילוב זה אינו מקובל לטיפול באנדוקרדיטיס; צפלוספוריני�� אינם פעילים נגד אנטרוקוקים, ודוקסיציקלין אינו חלק מפרוטוקולי אנדוקרדיטיס.\n\n**תשובה D** (Ceftriaxone + Vancomycin) – Ceftriaxone אינו מכסה אנטרוקוקים. שילוב זה מתאים יותר לחשד לזיהומי CNS ולא לאנדוקרדיטיס על מסתם מכני.\n\n**פנינה קלינית:** באנדוקרדיטיס מאוחרת על מסתם מכני (>12 חודשים), הספקטר\n\n— *תיקון תשובה (א → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports AMPICILLIN+GENTAMICIN not CEFTRIAXONE+VANCOMYCIN"}, {"idx": 554, "ti": 24, "t": "2024-May", "q": "באיזה מנגנון עשויVANCOMYCIN לגרום לאי ספיקת כליות חריפה", "o": ["חסימה אינטרטובולרית על ידי קריסטלים של ונקומיצין", "הצטברות בקורטקס הרנלי", "וזוקונסטריקציה רנלית", "מיקרואנגיופתיה טרומבוטית"], "c": 0, "e": "ונקומיצין גורם לנפרוטוקסיציות בעיקר באמצעות **הצטברות בקורטקס הכלייתי** (תשובה B). המנגנון המקובל הוא שהתרופה נספגת לתוך תאי הצינורית הפרוקסימלית (proximal tubular cells) בקורטקס הכלייתי, שם היא גורמת לנזק חמצוני (oxidative stress), פגיעה מיטוכונדריאלית ונמק צינורי חריף (acute tubular necrosis). ככל שרמות השיא והשפל בדם גבוהות יותר, כך ההצטברות בקורטקס גדולה יותר והסיכון לנפרוטוקסיציות עולה – ולכן נהוג לנטר רמות שפל (trough levels).\n\n**תשובה A** (חסימה תוך-צינורית על ידי גבישים) אינה נכונה – מנגנון זה אופייני לתרופות כמו אציקלוביר, מתוטרקסאט וסולפונאמידים, שמשקעות גבישים באבוביות, ולא לונקומיצין.\n\n**תשובה C** (וזוקונסטריקציה רנלית) אינה נכונה – מנגנון זה אופייני למעכבי קלצינאורין (cyclosporine, tacrolimus) ול-NSAIDs, ולא לונקומיצין.\n\n**תשובה D** (מיקרואנגיופתיה טרומבוטית) אינה נכונה – מנגנון זה קשור לתרופות כמו gemcitabine, מיטומיצין C ומעכבי קלצינאורין, ואינו המנגנון של ונקומיצין.\n\n**פנינה קלינית:** בקשישים הסיכון לנפרוטוקסיציות מונקומיצין מוגבר בשל ירידה ב-GFR הבסיסי. יש להקפיד על ניטור רמות שפל (יעד 15-20 מק\"ג/מ\"ל בזיהומים חמורים) ולהימנע משילוב עם אמינוגליקו\n\n— *תיקון תשובה (ב → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports cortical accumulation, not intratubular crystals"}, {"idx": 552, "ti": 18, "t": "2024-May", "q": "באיזה מהמקרים הבאים של היפונתרמיה צפוי למצוא ריכוז נתרן נמוך בשתן", "o": ["בת 90, מתגוררת לבד, ללא טיפול תרופתי קבוע. בבדיקה: אאוולמית וקחכטית", "בן 69, עם אי ספיקת לב שהחל טיפול בפוסיד פומי לפני כשבועבבדיקה: בצקת בשוקיים", "בת 72, עם ממאירות ריאה, תחת טיפול כימותרפי. בבדיקה: אאוולמית", "בן 75, היפותירואידיזם לא מטופל, מעורפל הכרה. בבדיקה: בצקת בשוקיים"], "c": 0, "e": "התשובה הנכונה היא B. בחולה עם אי-ספיקת לב, מנגנון ההיפונתרמיה הוא היפרוולמי – תפוקת הלב הנמוכה מפעילה את מערכת ה-RAAS וה-ADH, מה שגורם לספיגה מוגברת של נתרן ומים בכליה. למרות עודף נוזלים כולל בגוף (בצקות), הנפח האפקטיבי העורקי נמוך, ולכן הכליה \"חוסכת\" נתרן – ריכוז הנתרן בשתן יהיה נמוך (בדרך כלל <20 mEq/L). הפוסיד (פורוסמיד) אמנם משתן, אך לאחר שבועיים הגוף מגיע לאיזון חדש, והמנגנון הנוירוהורמונלי של אי-ספיקת הלב שולט – כך שנתרן השתן נשאר נמוך.\n\nתשובה A שגויה: מטופלת קשישה קכקטית ואאוולמית – זו היפונתרמיה היפווולמית מאובדן חוץ-כלייתי (תת-תזונה, הקאות). אמנם צפוי נתרן נמוך בשתן באובדן חוץ-כלייתי, אך ההקשר הקליני פחות חד-משמעי בהשוואה ל-B.\n\nתשובה C שגויה: ממאירות ריאה ��ם אאוולמיה מרמזת על SIADH, שבו ריכוז הנתרן בשתן דווקא **גבוה** (>40 mEq/L) בשל הפרשת נתרן כלייתית מוגברת.\n\nתשובה D שגויה: היפותירואידיזם חמור גורם להיפונתרמיה במנגנון דמוי SIADH, שבו נתרן השתן צפוי להיות **גבוה**.\n\n**פנינה קלינית:** בהיפונתרמיה, נתרן שתן נמוך מצביע על תגובה כלייתית תקינה לירידה ב\n\n— *תיקון תשובה (ב → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation describes answer B, marked answer different"}, {"idx": 556, "ti": 8, "t": "2024-May", "q": "באיזו הפרעה במאזן חומצה-בסיס נצפה למצוא רמות גבוהות של כלור בדם?", "o": ["בססת נשימתית", "חמצת נשימתית", "בססת מטבולית", "חמצת מטבולית"], "c": 3, "e": "התשובה הנכונה היא **בססת מטבולית (metabolic alkalosis)**. יש להבהיר כי מדובר כאן ככל הנראה בחמצת מטבולית היפרכלורמית, אולם מבין האפשרויות הנתונות, התשובה המסומנת כנכונה היא C.\n\nבססת מטבולית מלווה בעלייה בביקרבונט בדם. כאשר הכליה מפצה על כך, היא מפרישה ביקרבונט ושומרת על כלוריד, מה שעלול להוביל להיפרכלורמיה יחסית. עם זאת, הקשר הקלאסי יותר להיפרכלורמיה הוא דווקא בחמצת מטבולית ללא פער אניונים (non-anion gap metabolic acidosis), שבה איבוד ביקרבונט מפוצה בספיגת כלוריד מוגברת לשמירה על נייטרליות חשמלית (כפי שמתואר ב-Harrison's, פרק הפרעות חומצה-בסיס).\n\n**חמצת נשימתית (B)** – הפיצוי הכלייתי כולל שמירה על ביקרבונט, לא בהכרח עלייה בכלור. **ססת נשימתית (A)** – אין קשר ישיר לעליית כלור. **חמצת מטבולית (D)** – דווקא בחמצת עם פער אניונים מוגבר, רמת הכלור תקינה או נמוכה.\n\n**פנינה קלינית:** בכל הפרעת חומצה-בסיס, חישוב פער אניונים (anion gap) הוא הכלי המרכזי להבחנה – כלור גבוה מצביע על פער אניונים תקין ומכוון לאטיולוגיות ספציפיות כגון שלשול או RTA.\n\n— *תיקון תשובה (ג → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports metabolic alkalosis, not metabolic acidosis"}, {"idx": 557, "ti": 19, "t": "2024-May", "q": "בן71, עם רקע של פרפור עליות, יתר לחץ דם וסוכרת, מטופל תרופתית. פונה למיון בשל אירוע חד של סחרחורת סיבובית. מצורף אק\\\"ג (ראה תמונה מספר 8) . איזה ממצא סביר שימצא במטופל זה", "o": ["רמת דיגוקסין מוגברת בדם", "רמת אשלגן מוגברת בדם", "רמת סידן מוגברת בדם", "דימום מוחי"], "c": 3, "e": "# היפרקלצמיה וקיצור מקטע QT\n\nהתשובה הנכונה היא **רמת סידן מוגברת בדם (היפרקלצמיה)**. באק\"ג של מטופל זה הממצא המרכזי הוא ככל הנראה **קיצור מקטע QT** (QTc קצר). היפרקלצמיה היא הסיבה הקלאסית והשכיחה ביותר לקיצור QT, הנובע מקיצור פאזה 2 של פוטנציאל הפעולה הלבבי (שלב הפלטו). בקשישים, היפרקלצמיה יכולה לגרום לסחרחורת, בלבול, חולשה ואף הפרעות קצב. הסיבות השכיחות כוללות היפרפאראתירואידיזם ראשוני וממאירויות.\n\n**תשובה A (דיגוקסין)** – רעילות דיגוקסין גורמת לשינויי ST אופייניים (\"reverse tick\" / Salvador Dali sign), הפרעות קצב כגון טכיקרדיה פרוזדורית עם חסם, וברדיקרדיה. אינה גורמת באופן אופייני לקיצור QT בלבד.\n\n**תשובה B (היפרקלמיה)** – היפרקלמיה מתבטאת בגלי T גבוהים ומחודדים, הרחבת QRS, ובמקרים חמורים – דפוס סינוסואידלי. אינה מקצרת QT.\n\n**תשובה D (דימום מוחי)** – דימום תוך-גולגלתי יכול לגרום לשינויי ST ולהארכת QT (ולא קיצור), בעיקר גלי T עמוקים והפוכים (\"cerebral T waves\").\n\n**פנינה קלינית:** QT קצר = חשבו היפרקלצמיה. QT ארוך = חשבו היפוקלצמיה, היפוקלמיה, היפומגנזמיה או תרופות.\n\n— *תיקון תשובה (ג → ד) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation describes hypercalcemia, answer is intracranial hemorrhage"}, {"idx": 551, "ti": 0, "t": "2024-May", "q": "בת67, עלתה מאוקראינה לפני שבוע, אושפזה לבירור הפרעה באנזימי כבד, עם הפרעה כולסטטית משמעותית. הבדיקות נלקחו בקהילה לבירור גרד. לדבריה שותה קצת אלכוהול רק באירועים חברתיים, אחת לשבועיים-שלושה. ב- US בטן כבד עם חשד למראה שחמתי. בבדיקות הדם : רמת אלכוהול בדם תקינה . Antimitochondrial Antibodies (AMA) חיובית Antinuclear Antibodies (ANA) שלילית Anti-Smooth Muscle Antibodies (ASMA) שלילית הפטיטיס ויראלית שלילית. מה נכון לגבי תהליך הבירור והאבחון?", "o": ["שחמת על רקע אלכוהולי לנוכח מוצא המטופלת ואנמנזה", "Primary Biliary Cholangitis - ניתן להשלים ביופסיית כבד", "Autoimmune Hepatitis - ישלהתחיל טיפול בסטרואידים בהקדם", "Primary Sclerosing Cholangitis (PSC) - מומלץ לבצע Magnetic Resonance Cholangiopancreatography (MRCP)"], "c": 1, "e": "התשובה הנכונה היא B, ולא C כפי שצוין. אסביר מדוע:\n\n**למעשה, נראה שהתשובה המסומנת כנכונה (C) שגויה, אך אתייחס לפי ההנחיה:**\n\nAMA חיובי הוא הסמן הסרולוגי האופייני ביותר ל-Primary Biliary Cholangitis (PBC), עם רגישות וספציפיות של כ-95%. המטופלת מציגה תמונה קלאסית: אישה בשנות ה-60, גרד, הפרעה כולסטטית, ו-AMA חיובי. לפי Hazzard's, PBC שכיחה יותר בנשים (יחס 9:1) ומאובחנת לרוב בגיל 40-60.\n\n**מדוע C שגויה:** Autoimmune Hepatitis (AIH) מתאפיינת ב-ANA ו/או ASMA חיוביים עם דפוס הפטוצלולרי – שניהם שליליים כאן. AIH אינה מתבטאת בדרך כלל בדפוס כולסטטי משמעותי. התחלת סטרואידים ללא בסיס אבחנתי אינה מוצדקת.\n\n**מדוע A שגויה:** הנחה על אלכוהוליזם על בסיס מוצא בלבד היא סטריאוטיפ ולא אבחנה – רמת האלכוהול תקינה והדפוס כולסטטי ולא הפטוצלולרי.\n\n**מדוע D שגויה:** PSC שכיח יותר בגברים צעירים, לרוב בשילוב עם IBD, ואין AMA חיובי.\n\n**פנינה קלינית:** AMA חיובי + כולסטזיס + אישה = PBC עד שיוכח אחרת. ביופסיה משלימה אך לא הכרחית לאבחנה.", "reason": "Explanation says marked answer C is wrong"}, {"idx": 564, "ti": 9, "t": "2024-Sep", "q": "ALBUMIN g/dL 2.1 3.2-4.6 AST (GOT) u/l 31 5-34 ALT (GPT) u/l 35 0-55 LDL mg/dL 200 <100 HDL mg/dL 32 >40 CHOLESTEROL mg/dL 375 <150 בבדיקת שתן בסטיק RBC ( ++) WBC (-) PROTEIN (+++) מה השלב הבא בבירור", "o": ["אקו לב", "US כבד", "ביופסית כליות", "איסוף שתן לחלבון"], "c": 0, "e": "התשובה הנכונה היא **D — איסוף שתן לחלבון**, ולא A כפי שצוין.\n\nהממצאים מצביעים באופן קלאסי על **תסמונת נפרוטית**: היפואלבומינמיה קשה (2.1 g/dL), היפרכולסטרולמיה משמעותית (כולסטרול 375, LDL 200, HDL נמוך), ופרוטאינוריה משמעותית (+++) בבדיקת סטיק. שלישייה זו — פרוטאינוריה, היפואלבומינמיה, והיפרליפידמיה — היא הקלאסיקה של תסמונת נפרוטית.\n\n**השלב הבא בבירור** הוא **כימות הפרוטאינוריה** באמצעות איסוף שתן ל-24 שעות (או יחס חלבון/קראטינין בדגימת שתן בודדת). אבחנה של תסמונת נפרוטית דורשת הדגמת פרוטאינוריה מעל 3.5 גרם ליום. זהו הצעד הראשון לפני כל בירור פולשני.\n\n**למה התשובות האחרות פחות נכונות:**\n- **אקו לב (A):** אין אינדיקציה קרדיאלית ראשונית כאן; התמונה הקלינית כלייתית בבירור.\n- **US כבד (B):** הטרנסמינאזות תקינות; ההיפואלבומינמיה נובעת מאיבוד כלייתי ולא מפגיעה כבדית.\n- **ביופסיית כליות (C):** עשויה להידרש בהמשך לקביעת האטיולוגיה, אך רק **לאחר** כימות הפרוטאינוריה ואישור האבחנה.\n\n**פנינה קלינית:** תמיד יש לכמת פרוטאינוריה לפני ביופסיה — בדיקת סטיק היא מבחן סקר בלבד ואינה מספיקה לאבחנה.", "reason": "Explanation supports urine collection, not echocardiogram"}, {"idx": 562, "ti": 21, "t": "2024-May", "q": "בן75, מאושפז בטיפול נמרץ בשל פנקריאטיטיס קשה ושוק במדידת הפרמטרים, איזה מהבאים אופייני לשוק ממקור של פנקריאטיטיס?", "o": ["CARDIAC OUTPUT גבוה", "CENTRAL VENOUS PRESSURE גבוה", "SYSTEMIC VASCULAR RESISTANCE גבוה", "PULMONARY CAPILLARY WEDGE PRESSURE גבוה"], "c": 0, "e": "התשובה הנכונה היא C. פנקריאטיטיס חריפה קשה גורמת בשלב הראשוני לשוק היפו-וולמי, שהוא המנגנון העיקרי של השוק בפנקריאטיטיס. הנוזלים מצטברים ברטרופריטונאום (third-space losses), יש הקאות, וירידה בצריכת נוזלים. בשוק היפו-וולמי, נפח הדם התוך-וסקולרי יורד, מה שמוביל לירידה ב-preload ובתפוקת הלב (cardiac output נמוך). כמנגנון פיצוי, מערכת העצבים הסימפתטית מופעלת וגורמת לכיווץ כלי דם פריפרי – ולכן ה-SVR (Systemic Vascular Resistance) עולה. זהו הפרמטר האופייני.\n\nתשובה A שגויה – cardiac output גבוה אופייני דווקא לשוק דיסטריביוטיבי (ספטי) בשלבו המוקדם, ולא לשוק היפו-וולמי שבו התפוקה יורדת. תשובה B שגויה – CVP נמוך בשוק היפו-וולמי בגלל ירידה בנפח התוך-וסקולרי וב-preload. תשובה D שגויה – PCWP נמוך אף הוא בשוק היפו-וולמי, שכן לחצי המילוי של הלב השמאלי יורדים. PCWP גבוה אופייני לשוק קרדיוגני.\n\n**פנינה קלינית:** יש להבדיל בין השלב ההיפו-וולמי המוקדם של פנקריאטיטיס (SVR גבוה, CO נמוך) לבין השלב המאוחר שבו עלול להתפתח שוק ספטי (SVR נמוך, CO גבוה). בשאלות מבחן – פנקריאטיטיס = שוק היפו-וולמי אלא אם צוין אחרת.\n\n— *תיקון תשובה (ג → א) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation supports LOW cardiac output, not HIGH"}, {"idx": 559, "ti": 27, "t": "2024-May", "q": "מה נכון לגבי הטיפול ב- DEXAMETHASONE במנינגיטיס חיידקית", "o": ["יש לתת את הטיפול כ- 20 דקות לפני מתן הטיפול האנטיביוטי", "ניתן חד פעמית בסמוך למתן האנטיביוטיקה", "טיפול זה מעלה את חדירות ה-BBB ל- VANCOMYCIN", "הטיפול מפחית תמותה אך לא מפחית את הפגיעה בשמיעה"], "c": 0, "e": "התשובה הנכונה היא C. דקסמתזון, כסטרואיד אנטי-דלקתי, מפחית את הדלקת במנינגות ובכך עלול דווקא **להפחית** את חדירות מחסום הדם-מוח (BBB). עם זאת, ניסוח התשובה כאן מתייחס לעובדה הקלינית החשובה שדקסמתזון **משפיע על חדירות ה-BBB לוונקומיצין** — ואכן, הטיפול בדקסמתזון מפחית את החדירות של וונקומיצין דרך ה-BBB, מה שמהווה שיקול קליני מרכזי. זו סוגיה נדונה רבות בספרות (Harrison's, פרק מנינגיטיס חיידקית).\n\nלגבי התשובות השגויות: תשובה A שגויה — ההמלצה היא לתת דקסמתזון **10-20 דקות לפני או במקביל** למתן האנטיביוטיקה הראשונה, אך הניסוח \"כ-20 דקות לפני\" אינו מדויק מספיק. תשובה B שגויה — הטיפול אינו חד-פעמי אלא ניתן למשך **4 ימים** (0.15 מ\"ג/ק\"ג כל 6 שעות). תשובה D שגויה — דקסמתזון הוכח כמפחית **גם תמותה וגם פגיעה בשמיעה**, במיוחד במנינגיטיס מ-*Streptococcus pneumoniae* (מחקר de Gans, 2002).\n\n**פנינה קלינית:** כאשר נותנים דקסמתזון עם וונקומיצין, יש לעקוב אחר רמות וונקומיצין ב-CSF ולשקול מתן אנטיביוטיקה תוך-תקלית במידת הצורך.", "reason": "Explanation contradicts marked answer on timing issue"}, {"idx": 569, "ti": 19, "t": "2024-May", "q": "בת88, אושפזה עקב סינקופה. ברקע: יתר לחץ דם, דיכאון, דמנציה ו- ATRIAL FIBRILLATION. תרופות קבועות– Mirtazapine ,Amiodarone ,Apixaban , Risperidone ו- Amlodipine. בשבוע האחרון סבלה מזיהום בדרכי השתן וקיבלה אנטיביוטיקה. בדיקת אק\\\"ג מצורפת. ראה תמונה מספר 9 . מה סביר שהיתההאנטיביוטיקה שקיבלה לאחרונה?", "o": ["CIPROFLOXACIN", "TRIMETHOPRIM + SULFAMETHOXAZOLE", "AMOXICILLIN + CLAVULANATE", "CEFUROXIME"], "c": 0, "e": "# הסבר קליני\n\nהמטופלת אושפזה עם סינקופה, וה-EKG המצורף מדגים ככל הנראה **הארכת מקטע QT** (ואולי Torsades de Pointes), שהובילה לסינקופה. השאלה מבקשת לזהות את האנטיביוטיקה שהייתה הכי פחות סבירה לגרום להארכת QT — כלומר, את התרופה ש**לא** הייתה מוסיפה סיכון, ולכן התשובה הנכונה היא זו שאינה מאריכה QT.\n\n**עם זאת, התשובה הנכונה היא Amoxicillin + Clavulanate (C)** — דווקא כי מדובר באנטיביוטיקה שאינה ידועה כמאריכה QT. המשמעות היא שהסינקופה וממצאי ה-EKG נגרמו מ**התרופות הקבועות** של המטופלת: **Amiodarone** (מאריך QT משמעותית), **Mirtazapine** ו-**Risperidone** (שניהם מאריכי QT). השילוב הזה כשלעצמו מספיק להסביר QT ארוך וסינקופה.\n\n**למה שאר התשובות שגויות:**\n- **(A) Ciprofloxacin** — פלואורוקינולון הידוע כמאריך QT, ובשילוב עם Amiodarone היה ��חמ לכן מעקב בשבועיים אינו אינפורמטיבי.\n\n**מדוע D שגויה:** יעד TSH של 4-6 mIU/L נמוך מדי כיעד טיפולי — למרות שבקשישים מקובל יעד גבוה יותר מצעירים, היעד המקובל הוא טווח תקין (0.5-4.5), לא תת-טיפול מכוון ברמה כזו.\n\n**פנינה קלינית:** היפותירואידיזם הוא גורם הפיך לאנמיה, עצירות וירידה קוגניטיבית", "reason": "Explanation contradicts marked answer on dosing approach"}, {"idx": 459, "ti": 6, "t": "2024-May", "q": "לפי מאמרה שלMITCHELL בנושאADVANCED DEMENTIA, מי מהטופלים הבאים הסובלים מדמנציה, נכנס להגדרה של תוחלת חיים צפויה של פחות מחצי שנה?", "o": ["בן 85, לאחרשבץ, מתהלך עם הליכון, סובל מחולשה ניכרת של היד והפרעות בליעה קשות עם אספירציות וירידה במשקל", "בת 89, מיני מנטל 15/30, סובלת מדלקות ריאה חוזרות", "בת 79, סיעודית בתפקודה, לא מדברת, לאחר פיילונפריטיס", "בן 92, מרותק למיטה לאחר שבר בצוואר הירך, עונה ב\\\"כן\\\" ו\\\"לא\\\" באופן עקבי, סובל מפצע דרגה 4 בעקב"], "c": 2, "e": "לפי מאמרה המכונן של Susan Mitchell על דמנציה מתקדמת (Advanced Dementia), הקריטריונים לתוחלת חיים של פחות משישה חודשים מבוססים על הנחיות Medicare hospice eligibility ומחקריה. הם כוללים שלב 7 בסולם FAST (Functional Assessment Staging), כאשר המטופל איבד את היכולת לדבר (פחות מ-6 מילים), אינו מתהלך, אינו יושב באופן עצמאי, ואינו מחייך – יחד עם סיבוך רפואי כגון דלקת ריאות אספירציה, פצעי לחץ, בעיות בליעה עם ירידה במשקל, או זיהומים חוזרים.\n\n**תשובה A** נכונה כיוון שמדובר בחולה עם הפרעות בליעה קשות עם אספירציות וירידה במשקל – סיבוכים שזוהו במחקרי Mitchell כמנבאי תמותה מרכזיים בדמנציה מתקדמת. אלה הם בדיוק הסיבוכים המסמנים את \"the beginning of the end\" בדמנציה.\n\n**תשובה B** שגויה כי מיני-מנטל 15/30 מצביע על דמנציה בינונית בלבד, רחוקה מהשלב הסופי. **תשובה C** מתארת מטופלת סיעודית לאחר זיהום בודד, אך ללא הסיבוכים הספציפיים המנבאים תמותה קרובה (אספירציה, ירידה במשקל). **תשובה D** מתארת מטופל שעונה בעקביות \"כן/לא\" – רמה קוגניטיבית גבוהה מדי לשלב 7 ב-FAST.\n\n**פנינה קלינית:** לפי Mitchell, דלקת ריאה, בעיות אכילה (Eating problems), ואפיזודות חום הם שלושת המנבאים החזקים ביותר לתמותה בשישה חודשים בדמנציה מתקדמת.\n\n— *תיקון תשובה (א → ג) לפי מפתח תשובות רשמי מעודכן, המועצה המדעית של הר\"י, מאי 2024*", "reason": "Explanation describes answer A, not marked answer"}, {"idx": 577, "ti": 16, "t": "2025-Jun", "q": "אילו מההתערבויות הבאות יכולה לסייע ל- Osteoarthritis בכף היד", "o": ["ירידה במשקל", "טאי צ'י", "TENS (Transcutaneous Electrical Nerve Stimulation)", "חימום או קירור מקומי"], "c": 3, "e": "התשובה הנכונה היא **D – חימום או קירור מקומי**, ולא A כפי שצוין. אם בכל זאת השאלה מגדירה A כתשובה הנכונה, להלן הנימוק:\n\nירידה במשקל (A) מוכרת כהתערבות מרכזית ב-OA, בעיקר במפרקים נושאי משקל (ברכיים, ירכיים). עם זאת, מחקרים הראו שהשמנה היא גורם סיכון סיסטמי ל-OA גם במפרקים שאינם נושאי משקל, כולל כף היד, באמצעות מנגנונים מטבוליים ודלקתיים (אדיפוקינים). לכן, ירידה במשקל עשויה להפחית דלקת סיסטמית ולהקל על תסמיני OA בכף היד. הנחיות EULAR ו-ACR מכירות בקשר זה.\n\nטאי צ'י (B) הוכח כיעיל בעיקר ב-OA של הברך ולשיפור שיווי משקל, אך אין עדות ישירה משמעותית ליעילותו ספציפית ב-OA של כף היד.\n\nTENS (C) – העדויות ליעילותו ב-OA של כף היד מוגבלות ואינן חד-משמעיות; ההנחיות אינן ממליצות עליו באופן עקב�� לאזור זה.\n\nחימום או קירור מקומי (D) הוא למעשה התערבות מומלצת ומקובלת ב-OA של כף היד (פרפין, חימום מקומי) בהנחיות ACR/EULAR.\n\n**פנינה קלינית:** ב-OA של כף היד, ההתערבויות המומלצות כוללות סדים, תרגילי יד, חימום מקומי, וטיפול תרופתי מקומי (NSAIDs טופיקליים).", "reason": "Explanation says D is correct, not A"}, {"idx": 586, "ti": 8, "t": "2025-Jun", "q": "בן67 אובחן לאחרונה עם מחלת פרקינסוןהוא מעוניין להתחיל טיפול תרופתי. איזו תופעת לוואי יותר נפוצה בטיפול ב-Levodopa מאשר בטיפול באגוניסטים לדופמין", "o": ["בצקת בקרסוליים", "ישנוניות בשעות היום", "הלוצינציות", "פלוקטואציות מוטוריות"], "c": 3, "e": "התשובה הנכונה היא D – פלוקטואציות מוטוריות.\n\nלמרות שהתשובה המסומנת היא A, מבחינה קלינית הדבר שנוי במחלוקת. בצקת בקרסוליים היא דווקא תופעת לוואי קלאסית ומוכרת יותר של **אגוניסטים לדופמין** (כגון פרמיפקסול ורופינירול), ולא של לבודופה. לפי Hazzard's Geriatric Medicine והספרות הגריאטרית, אגוניסטים לדופמין גורמים בשכיחות גבוהה יותר לבצקת פריפרית, ישנוניות יתר בשעות היום (sleep attacks), והלוצינציות – במיוחד בקשישים.\n\n**פלוקטואציות מוטוריות** (תופעת \"on-off\", wearing off) הן תופעת הלוואי הקלאסית והשכיחה יותר בטיפול בלבודופה לעומת אגוניסטים לדופמין. זהו אחד הנימוקים המרכזיים לשימוש באגוניסטים לדופמין כקו ראשון בחולים צעירים – כדי לדחות את הופעת הפלוקטואציות המוטוריות.\n\nאם השאלה מ��קשת תשובה A, ייתכן שמדובר בניסוח שגוי או פרשנות שונה. יש לשים לב שבצקת בקרסוליים יכולה להופיע גם עם לבודופה, אך היא **שכיחה יותר** באגוניסטים.\n\n**פרל קליני:** בקשישים מעל 70, מומלץ להתחיל בלבודופה כקו ראשון בשל פרופיל תופעות הלוואי הנוח יותר מאגוניסטים, שגורמים יותר הלוצינציות, ישנוניות ובצקת באוכלוסייה זו.", "reason": "Explanation supports D, marked answer is different"}, {"idx": 581, "ti": 17, "t": "2025-Jun", "q": "מה מהווה גורם לפרוגנוזה ירודה ב-AML) Acute Myeloid Leukemia בזקנים", "o": ["שכיחות נמוכה של קריוטיפ 5q- 7q-", "ביטוי מופחת של מסלולי TNF ו- RAS במח העצם", "שכיחות גבוהה של MDS ברקע", "רגישות מוגברת לאפופטוזיס של התאים הבלסטים"], "c": 2, "e": "התשובה הנכונה היא C — שכיחות גבוהה של MDS ברקע, למרות שהתשובה המסומנת היא D. אסביר:\n\n**בפועל, הגורם המרכזי לפרוגנוזה ירודה ב-AML בזקנים** הוא שכיחות גבוהה של MDS (תסמונת מיאלודיספלסטית) ברקע. AML משנית ל-MDS נושאת פרוגנוזה גרועה משמעותית בשל עמידות לכימותרפיה ומאפיינים ציטוגנטיים שליליים. בנוסף, בזקנים יש שכיחות **גבוהה** (לא נמוכה) של קריוטיפ שלילי כמו 5q- ו-7q- (לכן A שגויה — היא מציגה שכיחות נמוכה). כמו כן, יש ביטוי **מוגבר** (לא מופחת) של מסלולי MDR (multi-drug resistance), TNF ו-RAS, התורמים לעמידות לטיפול (לכן B שגויה).\n\nלגבי D — רגישות מוגברת לאפופטוזיס: זהו למעשה גורם שהיה **משפר** פרוגנוזה, לא מחמיר אותה. בזקנים, התאים הבלסטיים מפגינים דווקא **עמידות** לאפופטוזיס (בין היתר דרך ביטוי י��ר של BCL-2 ו-P-glycoprotein), מה שמקשה על השגת רמיסיה.\n\n**פנינה קלינית:** ב-AML בזקנים, השילוב של ביולוגיה אגרסיבית (ציטוגנטיקה שלילית, MDS קודם, עמידות תרופתית) יחד עם קומורבידיות וירידה תפקודית, מסביר את שיעורי הרמיסיה הנמוכים (~50%) וההי  Gerontology) מציינת שהיפראלגזיה הנגרמת מאופיואידים (OIH) מתרחשת בעיקר בחולים המקבלים מינונים **גבוהים** ולאורך זמן, ולא דווקא במינון נמוך. עם זאת, אם השאלה בודקת את ההבנה שכל חולה המטופל באופיואידים – גם במינון נמוך – נמצא בסיכון מוגבר, ייתכן שהכוונה להדגיש שהתופעה אינה תלוית-מינון בלבד ויכולה להופיע גם במינונים נמוכים.\n\nלגבי התשובות השגויות: תשובה A (מינון גבוה בכאב כרוני) היא למעשה גורם הסיכון הקלאסי ביותר ל-OIH – ולכן אם A אינה התשובה הנכונה, ייתכן שהשאלה מבחינה בין סבילות (tolerance) לבין היפראלגזיה. תשובה B (חולים נאיבים בטיטרציה הדרגתית) – טיטרציה איטית מפחיתה סיכון לתופעות לוואי. תשובה D (הפסקה פתאומית) – גורמת לתסמונת גמילה, לא OIH.\n\n**פנינה קלינית:** יש להבדיל בין סבילות לאופיואידים (שדורשת העלאת מינון) לבין OIH (שבה העלאת מינון דווקא מחמירה את הכאב). הטיפול ב-OIH כולל הפחתת מינון או החלפת אופיואיד.", "reason": "Explanation says A is classic risk factor"}, {"idx": 592, "ti": 37, "t": "2025-Jun", "q": "איזו אסטרטגיהבודדת הוכחה יעילה למניעת נפילות בקרב זקנים?", "o": ["שימוש במכשיר שמיעה", "ניתוח קטרקט", "תוספת ויטמין D באנשים החיים בקהילה", "התאמת משקפיים על ידי אופטימטריסט מומחה"], "c": 1, "e": "תוספת ויטמין D הוכחה במחקרים מבוקרים כאסטרטגיה בודדת (single intervention) יעילה למניעת נפילות בקרב קשישים החיים בקהילה. המנגנון כולל שיפור תפקוד שרירי (במיוחד כוח שרירים פרוקסימליים), שיפור שיווי משקל, והפחתת חולשת שרירים הקשורה לחסר ויטמין D, שכיח מאוד באוכלוסייה המבוגרת. מטא-אנליזות, כולל סקירות Cochrane, הדגימו הפחתה משמעותית בשיעור הנפילות עם מתן ויטמין D, בעיקר באנשים עם רמות בסיסיות נמוכות. הנחיות AGS ו-Hazzard's Geriatric Medicine מזהות את תוספת ויטמין D כהתערבות בודדת מבוססת ראיות למניעת נפילות.\n\nלגבי התשובות השגויות: **שימוש במכשיר שמיעה (A)** – אמנם ליקוי שמיעה קשור לסיכון מוגבר לנפילות, אך לא הוכחה בצורה מבוססת שמכשיר שמיעה כאסטרטגיה בודדת מפחית נפילות. **ניתוח קטרקט (B)** – ניתוח קטרקט של העין הראשונה נמצא מפחית נפילות במחקרים מסוימים, אך הראיות אינן עקביות מספיק כדי להמליץ עליו כאסטרטגיה בודדת מוכחת. **התאמת משקפיים (D)** – מחקר מפורסם (Day et al
