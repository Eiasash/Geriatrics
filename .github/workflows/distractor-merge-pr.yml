name: Distractor Branch → Main (Auto-PR)

# Periodically opens (or updates) a PR from cowork/distractor-autopsy to main
# carrying ONLY the data/distractors.json file, so accumulated distractor
# generation work gets visibility back into main without bloating the PR
# with unrelated drift on the side branch.
#
# Workflow:
#   1. Compare data/distractors.json on main vs cowork/distractor-autopsy
#   2. If side branch has more entries → fast-forward a PR branch
#      (auto/distractor-snapshot) with only that file from the side branch
#   3. Open or update a PR from auto/distractor-snapshot → main
#   4. Exit no-op if no new entries since last PR

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC — weekly batch

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch side branch
        run: |
          git fetch origin cowork/distractor-autopsy:cowork/distractor-autopsy || {
            echo "Side branch missing — autopsy hasn't run since branch wipe. Exiting."
            exit 0
          }

      - name: Compare distractor counts
        id: compare
        run: |
          MAIN_COUNT=$(node -e "try{const d=require('./data/distractors.json');console.log(Object.keys(d).length)}catch{console.log(0)}")
          git show cowork/distractor-autopsy:data/distractors.json > /tmp/side-distractors.json 2>/dev/null || echo "{}" > /tmp/side-distractors.json
          SIDE_COUNT=$(node -e "const d=require('/tmp/side-distractors.json');console.log(Object.keys(d).length)")
          echo "main=$MAIN_COUNT" >> $GITHUB_OUTPUT
          echo "side=$SIDE_COUNT" >> $GITHUB_OUTPUT
          DELTA=$((SIDE_COUNT - MAIN_COUNT))
          echo "delta=$DELTA" >> $GITHUB_OUTPUT
          echo "main: $MAIN_COUNT, side: $SIDE_COUNT, delta: $DELTA"
          if [ "$DELTA" -le 0 ]; then
            echo "noop=true" >> $GITHUB_OUTPUT
          else
            echo "noop=false" >> $GITHUB_OUTPUT
          fi

      - name: Stage distractors-only PR branch
        if: steps.compare.outputs.noop == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create or reset auto/distractor-snapshot from current main, then
          # graft ONLY data/distractors.json from the side branch on top.
          git checkout -B auto/distractor-snapshot origin/main
          git checkout cowork/distractor-autopsy -- data/distractors.json
          git add data/distractors.json
          git diff --cached --quiet && {
            echo "No actual change after cherry-pick — branch already at parity."
            exit 0
          }
          MAIN_COUNT="${{ steps.compare.outputs.main }}"
          SIDE_COUNT="${{ steps.compare.outputs.side }}"
          DELTA="${{ steps.compare.outputs.delta }}"
          git commit -m "data: distractor snapshot ($SIDE_COUNT entries, +$DELTA since last sync)

          Auto-cherry-picked data/distractors.json from cowork/distractor-autopsy.
          Generated by .github/workflows/distractor-autopsy.yml on the side branch
          and auto-PR'd here by .github/workflows/distractor-merge-pr.yml.

          Co-Authored-By: Claude Opus 4.7 <noreply@anthropic.com>"
          git push --force origin auto/distractor-snapshot

      - name: Open or update PR
        if: steps.compare.outputs.noop == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAIN_COUNT="${{ steps.compare.outputs.main }}"
          SIDE_COUNT="${{ steps.compare.outputs.side }}"
          DELTA="${{ steps.compare.outputs.delta }}"
          BODY="Weekly snapshot from \`cowork/distractor-autopsy\`.

          | Metric | Value |
          | --- | --- |
          | distractors on main | $MAIN_COUNT |
          | distractors on side branch | $SIDE_COUNT |
          | new entries to merge | +$DELTA |

          Generated by [distractor-merge-pr.yml](.github/workflows/distractor-merge-pr.yml).
          Diff is data/distractors.json only — no app code changes.

          Merge when ready. Side branch keeps accumulating; next Monday's run
          will open a fresh PR with the next batch."

          # Update existing open PR or open a new one
          EXISTING=$(gh pr list --head auto/distractor-snapshot --base main --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body "$BODY"
            echo "Updated existing PR #$EXISTING"
          else
            gh pr create --base main --head auto/distractor-snapshot \
              --title "data: distractor snapshot (+$DELTA, $SIDE_COUNT total)" \
              --body "$BODY"
          fi

      - name: No-op summary
        if: steps.compare.outputs.noop == 'true'
        run: |
          echo "No new distractors since last sync. main=${{ steps.compare.outputs.main }}, side=${{ steps.compare.outputs.side }}. Exiting clean."
