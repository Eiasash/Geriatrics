// ===== INDEXEDDB MIGRATION =====
const IDB_NAME='shlav_mega_db',IDB_VER=1,IDB_STORE='state';
let idb=null;
function openIDB(){return new Promise((resolve,reject)=>{
const req=indexedDB.open(IDB_NAME,IDB_VER);
req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE);};
req.onsuccess=e=>{idb=e.target.result;resolve(idb);};
req.onerror=e=>reject(e.target.error);
});}
function idbGet(key){return new Promise((resolve,reject)=>{
if(!idb)return resolve(null);
const tx=idb.transaction(IDB_STORE,'readonly');
const req=tx.objectStore(IDB_STORE).get(key);
req.onsuccess=()=>resolve(req.result||null);
req.onerror=()=>resolve(null);
});}
function idbSet(key,val){return new Promise((resolve,reject)=>{
if(!idb)return resolve();
const tx=idb.transaction(IDB_STORE,'readwrite');
tx.objectStore(IDB_STORE).put(val,key);
tx.oncomplete=()=>resolve();
tx.onerror=()=>resolve();
});}
// Migrate localStorage → IndexedDB on first run
async function migrateToIDB(){
try{
await openIDB();
const existing=await idbGet('samega');
if(!existing){
const lsData=localStorage.getItem(LS);
if(lsData){
await idbSet('samega',JSON.parse(lsData));
// Keep user_id for Supabase, clear the rest
const uid=localStorage.getItem('user_id');
localStorage.removeItem(LS);
if(uid)localStorage.setItem('user_id',uid);
}else{
await idbSet('samega',S);
}
}else{
// Load from IDB into state
Object.assign(S,existing);
}
// Override save() to use IDB
const origSave=save;
window._idbSaveTimer=null;
const idbSave=()=>{clearTimeout(window._idbSaveTimer);window._idbSaveTimer=setTimeout(()=>{
idbSet('samega',JSON.parse(JSON.stringify(S))).catch(()=>{});
// Keep localStorage as fallback
try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}
},150);};
// Replace the global save
window.save=idbSave;
save=idbSave;
}catch(e){console.warn('IDB migration failed, using localStorage:',e);}
}
migrateToIDB().then(()=>{renderTabs();render();});

let pomoActive=false,pomoSec=3000,pomoBreak=false,pomoBreakSec=300,pomoInterval=null;
function startPomodoro(){
pomoActive=true;pomoSec=3000;pomoBreak=false;pomoBreakSec=300;
if(pomoInterval)clearInterval(pomoInterval);
pomoInterval=setInterval(()=>{
if(pomoBreak){
pomoBreakSec--;
if(pomoBreakSec<=0){pomoBreak=false;pomoSec=3000;}
}else{
pomoSec--;
if(pomoSec<=0){pomoBreak=true;pomoBreakSec=300;}
}
const bar=document.getElementById('pomo-fill');
if(bar&&!pomoBreak)bar.style.width=((3000-pomoSec)/3000*100)+'%';
const el=document.getElementById('pomo-time');
if(el)el.textContent=fmtT(pomoBreak?pomoBreakSec:pomoSec);
if(pomoBreak)renderPomoOverlay();
else{const ov=document.getElementById('pomo-overlay');if(ov)ov.remove();}
},1000);
render();
}
function stopPomodoro(){pomoActive=false;clearInterval(pomoInterval);pomoInterval=null;
const ov=document.getElementById('pomo-overlay');if(ov)ov.remove();render();}
function renderPomoOverlay(){
if(!pomoBreak)return;
if(document.getElementById('pomo-overlay'))return;
const div=document.createElement('div');div.id='pomo-overlay';div.className='pomo-overlay';
div.innerHTML=`<h2>Break Time</h2><p style="font-size:13px;margin-bottom:16px;color:#94a3b8">Rest your eyes. Stand up. Stretch.</p>
<div class="pomo-break-timer" id="pomo-break-display">${fmtT(pomoBreakSec)}</div>
<p style="font-size:10px;margin-top:12px;color:#64748b">Auto-resumes in ${Math.ceil(pomoBreakSec/60)} min</p>`;
document.body.appendChild(div);
const iv=setInterval(()=>{const d=document.getElementById('pomo-break-display');
if(!pomoBreak||!d){clearInterval(iv);const o=document.getElementById('pomo-overlay');if(o)o.remove();return;}
d.textContent=fmtT(pomoBreakSec);},1000);
}

function calcACBTotal(){return medBasket.reduce((sum,name)=>{const d=DRUGS.find(x=>x.name===name);return sum+(d?d.acb:0);},0);}
function getSTOPPWarnings(){
const warnings=[];const names=medBasket.map(n=>n.toLowerCase());
const cats=medBasket.map(n=>{const d=DRUGS.find(x=>x.name===n);return d?d.cat:'';}).filter(Boolean);
// Dual anticholinergic
const acDrugs=medBasket.filter(n=>{const d=DRUGS.find(x=>x.name===n);return d&&d.acb>=2;});
if(acDrugs.length>=2)warnings.push({level:'high',text:`Dual anticholinergic burden: ${acDrugs.join(' + ')} — cumulative cognitive/fall risk`});
// Benzo + opioid
const hasBenzo=cats.some(c=>c.toLowerCase().includes('benzo'));
const hasOpioid=cats.some(c=>c.toLowerCase().includes('opioid'));
if(hasBenzo&&hasOpioid)warnings.push({level:'high',text:'Benzodiazepine + Opioid — respiratory depression risk'});
// Dual antiplatelet
const antiPlat=medBasket.filter(n=>/aspirin|clopidogrel|prasugrel|ticagrelor/i.test(n));
if(antiPlat.length>=2)warnings.push({level:'med',text:`Dual antiplatelet: ${antiPlat.join(' + ')} — bleeding risk, especially with anticoagulant`});
// NSAID + anticoagulant
const hasNSAID=cats.some(c=>c.toLowerCase().includes('nsaid'));
const hasAnticoag=cats.some(c=>c.toLowerCase().includes('anticoag'));
if(hasNSAID&&hasAnticoag)warnings.push({level:'high',text:'NSAID + Anticoagulant — major GI bleed risk'});
// ACEi/ARB + K-sparing + NSAID (triple whammy)
const hasACE=names.some(n=>/enalapril|ramipril|lisinopril|losartan|valsartan|candesartan/i.test(n));
const hasKsparing=names.some(n=>/spironolactone|eplerenone|amiloride/i.test(n));
if(hasACE&&hasKsparing)warnings.push({level:'med',text:'ACEi/ARB + K-sparing diuretic — hyperkalemia risk'});
if(hasACE&&hasNSAID)warnings.push({level:'med',text:'ACEi/ARB + NSAID — AKI risk, reduced BP efficacy'});
// Anticholinergic opposing cholinesterase inhibitor
const hasAntiChol=medBasket.some(n=>{const d=DRUGS.find(x=>x.name===n);return d&&d.acb>=2;});
const hasChEI=names.some(n=>/donepezil|rivastigmine|galantamine/i.test(n));
if(hasAntiChol&&hasChEI)warnings.push({level:'high',text:'Anticholinergic opposes cholinesterase inhibitor — pharmacological conflict'});
// Metformin + CKD
const hasMet=names.some(n=>/metformin/i.test(n));
if(hasMet)warnings.push({level:'low',text:'Metformin — verify eGFR >30; contraindicated in severe CKD'});
// PPI long-term
const hasPPI=names.some(n=>/omeprazole|pantoprazole|esomeprazole|lansoprazole/i.test(n));
if(hasPPI)warnings.push({level:'low',text:'PPI — long-term use: Mg/Ca malabsorption, C. difficile risk, consider step-down'});
return warnings;
}

function srScore(qIdx,correct){
if(!S.sr[qIdx])S.sr[qIdx]={ef:2.5,n:0,next:0};
const s=S.sr[qIdx];
const q=correct?4:1;
s.ef=Math.max(1.3,s.ef+(.1-(5-q)*(.08+(5-q)*.02)));
s.n=correct?s.n+1:0;
const days=s.n<=1?1:s.n===2?3:Math.round((s.n-1)*s.ef);
s.next=Date.now()+days*86400000;
save();
}

let calcVals={};
function calcUp(k,v){calcVals[k]=parseFloat(v)||0;render();}
function renderCalc(){
let h=`<div class="sec-t">🧮 Clinical Calculators</div><div class="sec-s">CrCl · CHA₂DS₂-VASc · CURB-65 · GDS-15 · Braden · PADUA</div>`;

// CrCl
const age=calcVals.age||75,wt=calcVals.wt||55,cr=calcVals.cr||1.0,fem=calcVals.fem===undefined?0.85:calcVals.fem;
const crcl=Math.max(0,Math.round(((140-age)*wt*fem)/(72*cr)));
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Cockcroft-Gault CrCl</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
<div><label style="font-size:10px;color:#64748b">Age</label><input class="calc-in" type="number" value="${age}" onchange="calcUp('age',this.value)"></div>
<div><label style="font-size:10px;color:#64748b">Weight (kg)</label><input class="calc-in" type="number" value="${wt}" onchange="calcUp('wt',this.value)"></div>
<div><label style="font-size:10px;color:#64748b">Creatinine</label><input class="calc-in" type="number" step="0.1" value="${cr}" onchange="calcUp('cr',this.value)"></div>
<div><label style="font-size:10px;color:#64748b">Sex</label><select class="calc-in" onchange="calcUp('fem',this.value)">
<option value="0.85" ${fem<1?'selected':''}>Female (×0.85)</option><option value="1" ${fem>=1?'selected':''}>Male (×1)</option></select></div>
</div>
<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${crcl<30?'#dc2626':crcl<60?'#d97706':'#059669'}">${crcl} ml/min</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${crcl<30?'CKD 4-5: Avoid metformin, adjust all renally-cleared drugs':crcl<60?'CKD 3: Dose adjust many drugs':'CKD 1-2: Mild impairment'}</p>
</div></div>`;

// CHA2DS2-VASc
const cha=Object.entries(calcVals).filter(([k])=>k.startsWith('cha_')).reduce((s,[k,v])=>s+v,0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">CHA₂DS₂-VASc</h3>`;
[['cha_chf','CHF',1],['cha_htn','HTN',1],['cha_age75','Age ≥75',2],['cha_dm','Diabetes',1],
['cha_stroke','Stroke/TIA',2],['cha_vasc','Vascular disease',1],['cha_age65','Age 65-74',1],['cha_sex','Female sex',1]
].forEach(([k,l,pts])=>{
const on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">
<span>${l} (+${pts})</span>
<input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?${pts}:0)" style="width:16px;height:16px">
</label>`;
});
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${cha>=2?'#dc2626':'#d97706'}">${cha}</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${cha>=2?'Anticoagulate (DOAC preferred, Apixaban safest in CKD)':cha===1?'Consider anticoagulation':'Low risk — consider no therapy'}</p>
</div></div>`;


// CURB-65
const curb=Object.entries(calcVals).filter(([k])=>k.startsWith('curb_')).reduce((s,[k,v])=>s+v,0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">CURB-65</h3>`;
[['curb_conf','Confusion (new)',1],['curb_bun','BUN >20 mg/dL (>7 mmol/L)',1],['curb_rr','RR ≥30',1],['curb_bp','BP: SBP<90 or DBP≤60',1],['curb_age','Age ≥65',1]
].forEach(([k,l,pts])=>{
const on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">
<span>${l} (+${pts})</span>
<input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?${pts}:0)" style="width:16px;height:16px">
</label>`;
});
const curbRisk=curb<=1?'Low risk (<2% mortality) — consider outpatient':curb===2?'Moderate (9%) — short inpatient or supervised outpatient':'High (15-40%) — ICU if 4-5';
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${curb>=3?'#dc2626':curb>=2?'#d97706':'#059669'}">${curb}</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${curbRisk}</p>
</div></div>`;

// GDS-15 Quick Score
const gds=Object.entries(calcVals).filter(([k])=>k.startsWith('gds_')).reduce((s,[k,v])=>s+v,0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">GDS-15 (Depression Screen)</h3>`;
['Satisfied with life? (No=1)','Dropped activities? (Yes=1)','Feel life is empty? (Yes=1)','Often bored? (Yes=1)','Good spirits most of time? (No=1)',
'Afraid something bad? (Yes=1)','Feel happy most of time? (No=1)','Often feel helpless? (Yes=1)','Stay home rather than go out? (Yes=1)','More memory problems? (Yes=1)',
'Wonderful to be alive? (No=1)','Feel worthless? (Yes=1)','Feel full of energy? (No=1)','Feel hopeless? (Yes=1)','Others better off? (Yes=1)'].forEach((l,i)=>{
const k='gds_'+i,on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f8fafc;font-size:10px;cursor:pointer">
<span>${l}</span><input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?1:0)" style="width:14px;height:14px"></label>`;
});
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${gds>=5?'#dc2626':'#059669'}">${gds}/15</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${gds>=10?'Severe depression — refer':gds>=5?'Positive screen — evaluate further':'Normal'}</p>

</div></div>`;

// Braden Scale
const bradenSubs=[
['brad_sens','Sensory Perception',['Completely Limited (1)','Very Limited (2)','Slightly Limited (3)','No Impairment (4)']],
['brad_moist','Moisture',['Constantly Moist (1)','Very Moist (2)','Occasionally Moist (3)','Rarely Moist (4)']],
['brad_act','Activity',['Bedfast (1)','Chairfast (2)','Walks Occasionally (3)','Walks Frequently (4)']],
['brad_mob','Mobility',['Completely Immobile (1)','Very Limited (2)','Slightly Limited (3)','No Limitation (4)']],
['brad_nut','Nutrition',['Very Poor (1)','Probably Inadequate (2)','Adequate (3)','Excellent (4)']],
['brad_fric','Friction/Shear',['Problem (1)','Potential Problem (2)','No Apparent Problem (3)']]
];
const bradenScore=bradenSubs.reduce((s,[k])=>s+(calcVals[k]||1),0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Braden Scale (Pressure Injury Risk)</h3>`;
bradenSubs.forEach(([k,label,opts])=>{
const v=calcVals[k]||1;
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">${label}</label>
<select class="calc-in" style="font-size:11px" onchange="calcUp('${k}',this.selectedIndex+1)">`;
opts.forEach((o,i)=>{h+=`<option value="${i+1}"${v===i+1?' selected':''}>${o}</option>`;});
h+=`</select></div>`;
});
const bradenRisk=bradenScore<=12?'High Risk':bradenScore<=14?'Moderate Risk':bradenScore<=18?'Mild Risk':'No Risk';
const bradenClr=bradenScore<=12?'#dc2626':bradenScore<=14?'#d97706':bradenScore<=18?'#2563eb':'#059669';
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">

<p style="font-size:10px;color:#64748b;margin-top:2px">${bradenRisk}${bradenScore<=18?' — Implement prevention protocol':''}</p>
<button id="copy-braden" onclick="copyReport('braden')" class="btn btn-o" style="margin-top:8px;font-size:10px;padding:4px 10px">📋 העתק דוח</button>

// PADUA VTE Score
const paduaItems=[
['pad_cancer','Active cancer',3],['pad_vte','Previous VTE',3],['pad_immob','Reduced mobility (≥3 days)',3],
['pad_throm','Known thrombophilia',3],['pad_trauma','Recent (≤1mo) trauma/surgery',2],
['pad_age','Age ≥70',1],['pad_hf','Heart/respiratory failure',1],['pad_mi','Acute MI or stroke',1],
['pad_infect','Acute infection/rheumatic disorder',1],['pad_obesity','Obesity (BMI ≥30)',1],['pad_hormone','Ongoing hormonal therapy',1]
];
const paduaScore=paduaItems.reduce((s,[k,,pts])=>s+(calcVals[k]?pts:0),0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">PADUA VTE Risk Score</h3>`;
paduaItems.forEach(([k,l,pts])=>{
const on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">

</label>`;
});
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">
<span style="font-size:22px;font-weight:700;color:${paduaScore>=4?'#dc2626':'#059669'}">${paduaScore}</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${paduaScore>=4?'High VTE risk (≥4) — Pharmacological prophylaxis recommended':'Low VTE risk (<4) — Mechanical prophylaxis or early mobilization'}</p>

// 4AT Rapid Delirium Screen
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">4AT (Rapid Delirium Screen)</h3>`;

const at4_2=[['No mistakes (0)','0'],['1 mistake (1)','1'],['2+ mistakes or untestable (2)','2']];

const at4_4=[['No (0)','0'],['Yes (4)','4']];

<button id="copy-4at" onclick="copyReport('4at')" class="btn btn-o" style="margin-top:8px;font-size:10px;padding:4px 10px">📋 העתק דוח</button>
</div></div>`;

// MNA-SF (Mini Nutritional Assessment - Short Form)
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">MNA-SF (Nutritional Screen)</h3>`;

// Clinical Frailty Scale
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Clinical Frailty Scale (CFS)</h3>`;
const cfsOpts=['1 — Very Fit (robust, active, energetic)','2 — Well (no active disease, less fit)','3 — Managing Well (medical problems well-controlled)','4 — Vulnerable (not dependent, but slowed)','5 — Mildly Frail (limited IADLs)','6 — Moderately Frail (needs help with ADLs+IADLs)','7 — Severely Frail (completely dependent, approaching EOL)','8 — Very Severely Frail (bed-bound, may not recover from minor illness)','9 — Terminally Ill (<6mo prognosis)'];

h+=`<select class="calc-in" style="font-size:11px" onchange="calcUp('cfs',this.value)">`;
cfsOpts.forEach((o,i)=>{h+=`<option value="${i+1}"${cfsV==i+1?' selected':''}>${o}</option>`;});

const cfsClr=cfsV>=7?'#dc2626':cfsV>=5?'#d97706':cfsV>=4?'#2563eb':'#059669';
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">

<p style="font-size:10px;color:#64748b;margin-top:2px">${cfsV>=7?'Severely frail — high mortality, consider goals of care':cfsV>=5?'Frail — increased vulnerability to adverse outcomes':cfsV>=4?'Pre-frail / vulnerable':'Fit / not frail'}</p>
</div></div>`;

// Norton Scale (Pressure Injury)
const nortonSubs=[
['nrt_phys','Physical Condition',['Very Bad (1)','Poor (2)','Fair (3)','Good (4)']],
['nrt_ment','Mental Condition',['Stuporous (1)','Confused (2)','Apathetic (3)','Alert (4)']],
['nrt_act','Activity',['Bedfast (1)','Chairbound (2)','Walks with Help (3)','Ambulatory (4)']],
['nrt_mob','Mobility',['Immobile (1)','Very Limited (2)','Slightly Limited (3)','Full (4)']],
['nrt_inc','Incontinence',['Doubly (1)','Usually Urinary (2)','Occasional (3)','None (4)']]
];
const nortonScore=nortonSubs.reduce((s,[k])=>s+(calcVals[k]||1),0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Norton Scale (Pressure Injury Risk)</h3>`;
nortonSubs.forEach(([k,label,opts])=>{
const v=calcVals[k]||1;
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">${label}</label>
<select class="calc-in" style="font-size:11px" onchange="calcUp('${k}',this.selectedIndex+1)">`;
opts.forEach((o,i)=>{h+=`<option value="${i+1}"${v===i+1?' selected':''}>${o}</option>`;});
h+=`</select></div>`;});
const nortonClr=nortonScore<=12?'#dc2626':nortonScore<=14?'#d97706':'#059669';
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">
<span style="font-size:22px;font-weight:700;color:${nortonClr}">${nortonScore}/20</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${nortonScore<=12?'High risk — implement prevention':'Norton ≤14 moderate risk, >14 lower risk'}${nortonScore<=14?' — Turn schedule + skin assessment':''}</p>
<button id="copy-norton" onclick="copyReport('norton')" class="btn btn-o" style="margin-top:8px;font-size:10px;padding:4px 10px">📋 העתק דוח</button>
</div></div>`;

// Morse Fall Scale
const morseItems=[
['mor_hist','History of falling (last 3mo)',25],['mor_diag','Secondary diagnosis (≥2)',15],
['mor_amb','Ambulatory aid',['None/bedrest/wheelchair (0)','Crutches/cane/walker (15)','Furniture (30)']],
['mor_iv','IV/heparin lock',20],['mor_gait','Gait',['Normal/bedrest/immobile (0)','Weak (10)','Impaired (20)']],
['mor_ment','Mental status',['Oriented to own ability (0)','Overestimates / forgets limitations (15)']]
];
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Morse Fall Scale</h3>`;
morseItems.forEach(([k,l,pts])=>{
if(Array.isArray(pts)){
const v=String(calcVals[k]||0);
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">${l}</label>
<select class="calc-in" style="font-size:11px" onchange="calcUp('${k}',this.value)">`;
pts.forEach(o=>{const val=o.match(/\((\d+)\)/)[1];h+=`<option value="${val}"${v===val?' selected':''}>${o}</option>`;});
h+=`</select></div>`;
}else{
const on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">
<span>${l} (+${pts})</span><input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?${pts}:0)" style="width:16px;height:16px"></label>`;
}});
const morseScore=morseItems.reduce((s,[k,,pts])=>{if(Array.isArray(pts))return s+(parseFloat(calcVals[k])||0);return s+(calcVals[k]||0);},0);
const morseClr=morseScore>=45?'#dc2626':morseScore>=25?'#d97706':'#059669';
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">

</div></div>`;

return h;
}

// ===== RTL MEDICOLEGAL TEXT GENERATOR =====
function copyReport(type){
let text='';const d=new Date().toLocaleDateString('he-IL');
if(type==='katz'){
const items=['רחצה','הלבשה','שימוש בשירותים','העברה','שליטה על סוגרים','אכילה'];
const score=items.reduce((s,_,i)=>s+(calcVals['katz_'+i]||0),0);
const deps=items.filter((_,i)=>!calcVals['katz_'+i]);
text=`הערכת תפקוד יומיומי (Katz ADL) — ${d}\n`;
text+=`ציון כולל: ${score}/6. `;
text+=score===6?'המטופל/ת עצמאי/ת בכל פעולות היומיום הבסיסיות.':
`המטופל/ת תלוי/ה בפעולות: ${deps.join(', ')}. רמת תלות: ${score>=4?'קלה':score>=2?'בינונית':'חמורה'}.`;
}else if(type==='norton'){
const labels=['מצב גופני','מצב נפשי','פעילות','ניידות','שליטה על סוגרים'];
const vals=['nrt_phys','nrt_ment','nrt_act','nrt_mob','nrt_inc'];
const score=vals.reduce((s,k)=>s+(calcVals[k]||1),0);
text=`הערכת סיכון לפצעי לחץ (Norton) — ${d}\n`;
text+=`ציון כולל: ${score}/20. `;
text+=`רמת סיכון: ${score<=12?'גבוהה':score<=14?'בינונית':'נמוכה'}. `;
text+=score<=14?'יש להפעיל פרוטוקול מניעת פצעי לחץ.':'סיכון נמוך, המשך ניטור.';
}else if(type==='4at'){
const score=(parseFloat(calcVals.at4_1)||0)+(parseFloat(calcVals.at4_2)||0)+(parseFloat(calcVals.at4_3)||0)+(parseFloat(calcVals.at4_4)||0);
text=`סקירת דליריום (4AT) — ${d}\n`;
text+=`ציון כולל: ${score}. `;
text+=score>=4?'ממצא מחשיד לדליריום ± פגיעה קוגניטיבית. יש להמשיך בירור ולטפל בגורם.':
score>=1?'ממצא מחשיד לפגיעה קוגניטיבית. יש לשקול הערכה נוספת.':'ללא דליריום או פגיעה קוגניטיבית.';
}else if(type==='braden'){
const score=['brad_sens','brad_moist','brad_act','brad_mob','brad_nut','brad_fric'].reduce((s,k)=>s+(calcVals[k]||1),0);
text=`הערכת סיכון לפצעי לחץ (Braden) — ${d}\n`;
text+=`ציון כולל: ${score}/23. `;
text+=`רמת סיכון: ${score<=12?'גבוהה':score<=14?'בינונית':score<=18?'קלה':'ללא סיכון'}. `;
text+=score<=18?'יש להפעיל פרוטוקול מניעה.':'';
}else if(type==='morse'){
const morseScore=[['mor_hist',25],['mor_diag',15],['mor_iv',20]].reduce((s,[k,p])=>s+(calcVals[k]||0),0)+
['mor_amb','mor_gait','mor_ment'].reduce((s,k)=>s+(parseFloat(calcVals[k])||0),0);
text=`הערכת סיכון נפילות (Morse) — ${d}\n`;
text+=`ציון כולל: ${morseScore}. `;
text+=`רמת סיכון: ${morseScore>=45?'גבוהה':morseScore>=25?'בינונית':'נמוכה'}. `;
text+=morseScore>=25?'יש להפעיל פרוטוקול מניעת נפילות.':'';
}else if(type==='gds'){
const score=Array.from({length:15},(_, i)=>calcVals['gds_'+i]||0).reduce((a,b)=>a+b,0);
text=`סקירת דיכאון (GDS-15) — ${d}\n`;
text+=`ציון כולל: ${score}/15. `;
text+=score>=10?'חשד לדיכאון חמור — יש להפנות להערכה פסיכיאטרית.':score>=5?'סקירה חיובית — יש להמשיך בירור ולשקול טיפול.':'תקין — ללא חשד לדיכאון.';
}
if(text&&navigator.clipboard){
navigator.clipboard.writeText(text).then(()=>{
const btn=document.getElementById('copy-'+type);
if(btn){btn.textContent='✅ הועתק';setTimeout(()=>btn.textContent='📋 העתק דוח',1500);}
});
}
}

async function sendChat(){
const input=document.getElementById('chat-input');
const text=(input?input.value:'').trim();
if(!text||chatLoading)return;
const key=getApiKey();
if(!key){const k=prompt('הכנס Anthropic API Key:','');if(!k)return;setApiKey(k);}
S.chat.push({role:'user',text:text});
chatLoading=true;save();render();
setTimeout(function(){const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
let history=S.chat.slice(-10);
if(history.length>0&&history[0].role!=='user')history=history.slice(1);
const messages=history.filter(function(m){return m.role==='user'||m.role==='assistant';}).map(function(m){return{role:m.role,content:m.text};});
try{
const ctrl=new AbortController();
const timeout=setTimeout(function(){ctrl.abort();},45000);
const resp=await fetch('https://api.anthropic.com/v1/messages',{
method:'POST',
headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1024,system:CHAT_SYSTEM,messages:messages}),
signal:ctrl.signal
});
clearTimeout(timeout);
if(!resp.ok){const e=await resp.json().catch(function(){return{};});if(resp.status===401||resp.status===403){localStorage.removeItem('samega_apikey');throw new Error('API key invalid');}throw new Error(e.error&&e.error.message?e.error.message:'HTTP '+resp.status);}
const data=await resp.json();
S.chat.push({role:'assistant',text:data.content[0].text});
}catch(e){
const offline=!navigator.onLine||e.message.includes('Failed to fetch');
const timedOut=e.name==='AbortError';
S.chat.push({role:'error',text:offline?'📡 אין חיבור לאינטרנט':timedOut?'⏱️ תם הזמן':'⚠️ '+e.message});
}
chatLoading=false;save();render();
setTimeout(function(){const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

    if(!rows||!rows.length){alert('No backup found for ID: '+id);return;}
    const row=rows[0];
    if(confirm('Restore backup from '+new Date(row.updated_at).toLocaleString()+'?\nThis will overwrite your current progress.')){
      Object.assign(S,row.data);save();render();
      alert('✅ Progress restored!');
    }
  }catch(e){alert('❌ Restore failed: '+e.message);}
}

function render(){
const el=document.getElementById('ct');
const focused=document.activeElement?.id;
const sv={srchi:document.getElementById('srchi')?.value,nfilt:document.getElementById('nfilt')?.value,dsrch:document.getElementById('dsrch')?.value};
if(tab!==lastTab){el.classList.remove('fade-in');void el.offsetWidth;el.classList.add('fade-in');window.scrollTo({top:0});lastTab=tab;}
switch(tab){
case'quiz':el.innerHTML=renderQuiz();break;
case'study':el.innerHTML=renderStudy();break;
case'syl':el.innerHTML=renderSyllabus();break;
case'book':el.innerHTML=renderBook();break;
case'flash':el.innerHTML=renderFlash();break;
case'drugs':el.innerHTML=renderDrugs();break;
case'calc':el.innerHTML=renderCalc();break;
case'osce':el.innerHTML=renderOsce();break;
case'track':el.innerHTML=renderTrack();break;
case'search':el.innerHTML=renderSearch();break;
case'chat':el.innerHTML=renderChat();break;
case'law':el.innerHTML=renderEOLTree();break;
case'labs':el.innerHTML=renderLabOverlay();break;
case'aging':el.innerHTML=renderAgingSheet();break;
case'basket':el.innerHTML=renderMedBasket();break;
}
// Ward modal
const wc=document.getElementById('ward-container');
if(wc)wc.innerHTML=wardOpen?renderWardModal():'';
// Restore input values and focus
if(sv.srchi!==undefined&&document.getElementById('srchi'))document.getElementById('srchi').value=sv.srchi;
if(sv.nfilt!==undefined&&document.getElementById('nfilt'))document.getElementById('nfilt').value=sv.nfilt;
if(sv.dsrch!==undefined&&document.getElementById('dsrch'))document.getElementById('dsrch').value=sv.dsrch;
if(focused){const fe=document.getElementById(focused);if(fe){fe.focus();if(fe.value)fe.setSelectionRange(fe.value.length,fe.value.length);}}
}


// ===== DARK MODE =====
function toggleDark(){document.body.classList.toggle('dark');S.dark=document.body.classList.contains('dark');if(S.dark&&document.body.classList.contains('study')){document.body.classList.remove('study');S.studyMode=false;}save();}
function toggleStudyMode(){document.body.classList.toggle('study');S.studyMode=document.body.classList.contains('study');if(S.studyMode&&document.body.classList.contains('dark')){document.body.classList.remove('dark');S.dark=false;}save();}
if(S.dark)document.body.classList.add('dark');
if(S.studyMode)document.body.classList.add('study');

// ===== FLASHCARD SPACED REP =====
function fcRate(q){// q: 0=again, 1=hard, 2=easy
const key='fc_'+S.fci%FLASH.length;
if(!S.fcsr)S.fcsr={};
if(!S.fcsr[key])S.fcsr[key]={n:0,next:0};
const s=S.fcsr[key];
const days=q===0?0:q===1?1:4;
s.n=q===0?0:s.n+1;s.next=Date.now()+days*86400000;
S.fci++;S.fcFlip=false;save();render();
}

// ===== EXPORT PROGRESS =====

function importProgress(){
const input=document.createElement('input');input.type='file';input.accept='.json';
input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
r.onload=ev=>{try{const d=JSON.parse(ev.target.result);Object.assign(S,d);save();render();
alert('✅ Progress imported successfully!');}catch(err){alert('❌ Invalid file');}};r.readAsText(f);};
input.click();}

function exportProgress(){
const data=JSON.stringify(S,null,2);
const blob=new Blob([data],{type:'application/json'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='shlav-a-progress.json';a.click();
}

// PWA + Background Sync + Daily Notification
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js').then(reg=>{
// Schedule daily notification at 07:00
function scheduleDailyNotification(){
const now=new Date();
const target=new Date(now);
target.setHours(7,0,0,0);
if(now>=target)target.setDate(target.getDate()+1);
const delay=target-now;
setTimeout(()=>{
const dueN=getDueQuestions().length;
if(dueN>0&&reg.active){
reg.active.postMessage({type:'schedule-notification',dueCount:dueN});
}
scheduleDailyNotification();// Reschedule for next day
},delay);
}
// Request notification permission
if('Notification' in window&&Notification.permission==='default'){
Notification.requestPermission();
}
scheduleDailyNotification();
}).catch(()=>{});
}
// Background sync helper — call when Supabase backup fails offline
async function queueBackgroundSync(url,body,apikey){
try{
if('serviceWorker' in navigator&&'SyncManager' in window){
const reg=await navigator.serviceWorker.ready;
// Store pending data in IDB
if(idb){
const tx=idb.transaction('state','readwrite');
tx.objectStore('state').put({url,body,apikey},'pending_sync');
await new Promise(r=>{tx.oncomplete=r;});
}
await reg.sync.register('supabase-backup');
}
}catch(e){console.warn('Background sync registration failed:',e);}
}

renderTabs();render();
