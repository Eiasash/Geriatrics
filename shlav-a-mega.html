<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sky:59 130 246;--em:16 185 129;--sl8:30 41 59;--red:239 68 68;--amb:245 158 11;
--bg:248 250 252;--bg2:241 245 249;--bg3:255 255 255;--fg:30 41 59;--fg2:100 116 139;--fg3:148 163 184;
--brd:226 232 240;--card-bg:255 255 255;
--green-bg:240 253 244;--green-brd:187 247 208;--green-fg:22 101 52;
--blue-bg:239 246 255;--blue-brd:191 219 254;--blue-fg:30 64 175;
--yellow-bg:255 251 235;--yellow-brd:253 230 138;--yellow-fg:146 64 14;
--red-bg:254 242 242;--red-brd:254 202 202;--red-fg:153 27 27}
body{font-family:'Inter',system-ui,sans-serif;background:rgb(var(--bg));color:rgb(var(--fg));-webkit-font-smoothing:antialiased;overflow-x:hidden}
.heb{font-family:'Heebo',sans-serif;direction:rtl;text-align:right}
button{cursor:pointer;border:none;background:none;font:inherit}
input,textarea,select{font:inherit}
.hdr{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:10px 16px;position:sticky;top:0;z-index:40}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:-.5px}
.hdr p{font-size:10px;color:rgb(var(--fg2));margin-top:1px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgb(var(--card-bg));border-top:1px solid #e2e8f0;display:flex;z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.06);padding-bottom:max(4px,env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:0 0 auto;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 6px 6px;transition:.15s;font-size:10px;font-weight:600}
.tabs button.on{color:rgb(var(--sky))}
.tabs button:not(.on){color:rgb(var(--fg3))}
.tabs .ic{font-size:18px}
.ct{max-width:640px;margin:0 auto;padding:12px 12px 80px}
.card{background:rgb(var(--card-bg));border-radius:16px;border:1px solid rgb(var(--brd));box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;margin-bottom:10px}
.pill{display:inline-block;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;transition:.15s;cursor:pointer}
.pill.on{background:rgb(var(--sky));color:#fff;box-shadow:0 2px 6px rgba(59,130,246,.25)}
.pill:not(.on){background:rgb(var(--card-bg));color:rgb(var(--fg2));border:1px solid rgb(var(--brd))}
.qo{width:100%;text-align:right;padding:12px 14px;border-radius:12px;border:2px solid #e2e8f0;font-size:12px;line-height:1.6;transition:.15s;margin-bottom:6px;font-family:'Heebo',sans-serif;display:block}
.qo:not(.lk):hover{border-color:#bae6fd;background:#f0f9ff}
.qo.sel{border-color:rgb(var(--sky));background:rgb(var(--blue-bg))}
.qo.ok{border-color:rgb(var(--em));background:#ecfdf5;color:rgb(var(--green-fg))}
.qo.no{border-color:rgb(var(--red));background:rgb(var(--red-bg));color:rgb(var(--red-fg))}
.qo.dim{border-color:#f1f5f9;color:#cbd5e1}
.btn{padding:7px 18px;border-radius:12px;font-size:12px;font-weight:700;transition:.15s;display:inline-block}
.btn:disabled{opacity:.35}
.btn-p{background:rgb(var(--sky));color:#fff}
.btn-d{background:rgb(var(--sl8));color:#fff}
.btn-g{background:rgb(var(--em));color:#fff}
.btn-o{background:rgb(var(--bg2));color:rgb(var(--fg2))}
.ab{max-height:0;overflow:hidden;transition:max-height .3s ease}.ab.op{max-height:5000px}
.acc-h{width:100%;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;text-align:left;transition:.1s}
.acc-h:hover{background:rgb(var(--bg2))}
.acc-ic{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.acc-ar{font-size:10px;color:rgb(var(--fg3));transition:transform .2s}
.acc-ar.op{transform:rotate(180deg)}
.stats{display:flex;gap:6px;margin-bottom:12px}
.stat{flex:1;background:rgb(var(--card-bg));border-radius:14px;border:1px solid rgb(var(--brd));padding:10px 8px;text-align:center}
.stat .n{font-size:20px;font-weight:700}
.stat .l{font-size:9px;color:rgb(var(--fg2));text-transform:uppercase;font-weight:600;letter-spacing:.5px;margin-top:2px}
.fc{background:rgb(var(--card-bg));border-radius:16px;border:1px solid rgb(var(--brd));padding:24px 20px;min-height:180px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;transition:.2s;user-select:none}
.fc:active{transform:scale(.98)}
.search-box{width:100%;border:1px solid rgb(var(--brd));border-radius:12px;padding:8px 12px;font-size:12px;margin-bottom:12px}
.search-box:focus{outline:none;border-color:rgb(var(--sky));box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.timer{font-variant-numeric:tabular-nums;font-family:'Inter',monospace}
.ck{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;border:1px solid rgb(var(--brd));font-size:11px;cursor:pointer;margin-bottom:5px}
.ck:hover{background:rgb(var(--bg2))}
.ck.done span{text-decoration:line-through;color:rgb(var(--fg3))}
.topic{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;font-size:11px;cursor:pointer;transition:.1s}
.topic:hover{background:rgb(var(--bg2))}
.topic.done{background:#ecfdf5;border:1px solid #a7f3d0}
.drug-row{padding:8px 12px;border-bottom:1px solid rgb(var(--brd));font-size:11px}
.drug-row:last-child{border:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.badge-r{background:rgb(var(--red-bg));color:#dc2626}
.badge-y{background:rgb(var(--yellow-bg));color:#d97706}
.badge-g{background:#ecfdf5;color:#059669}
.calc-in{width:100%;border:1px solid rgb(var(--brd));border-radius:10px;padding:8px 12px;font-size:13px;margin-bottom:8px}
.calc-in:focus{outline:none;border-color:rgb(var(--sky))}
.sec-t{font-size:16px;font-weight:700;color:rgb(var(--fg));margin-bottom:3px}
.sec-s{font-size:10px;color:rgb(var(--fg2));margin-bottom:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
@media(min-width:768px){.ct{padding:20px 16px 88px;max-width:800px}.tabs button{min-width:64px;font-size:11px}.hdr h1{font-size:18px}}
@media(min-width:1024px){.ct{max-width:900px}.card{padding:16px}}
.dm-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;padding:4px;opacity:.7}
.tabs button{min-height:44px}
.qo{min-height:44px;display:flex;align-items:center}
.ck{min-height:44px}
.topic{min-height:44px}
.pill{min-height:32px;display:inline-flex;align-items:center}
.btn:active{transform:scale(.96)}
.qo:active:not(.lk){transform:scale(.99)}
.stat .l{font-size:10px}
.badge{font-size:10px}
.hdr p{font-size:11px}
.progress-bar{height:3px;background:#e2e8f0;border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-bar .fill{height:100%;background:rgb(var(--sky));border-radius:2px;transition:width .3s ease}
body.dark .progress-bar{background:#334155}
body.dark .badge-r{background:#450a0a;color:#fca5a5}
body.dark .badge-y{background:#451a03;color:#fde68a}
body.dark .badge-g{background:#064e3b;color:#6ee7b7}
body.dark .ck:hover{background:#1e293b}
body.dark .calc-result{background:#1e293b !important}
body.dark a{color:#60a5fa}
body.dark .explain-box{background:#064e3b !important;border-color:#059669 !important;color:#a7f3d0 !important}
body.dark .tag-topic{background:#064e3b !important;color:#6ee7b7 !important}
body.dark .tag-year{background:#1e3a5f !important;color:#93c5fd !important}
body.dark .sec-s{color:rgb(var(--fg3))}
body.dark .btn-o{background:#334155;color:#e2e8f0}
.streak-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgb(var(--yellow-bg));color:#d97706;border:1px solid rgb(var(--yellow-brd))}
body.dark .streak-badge{background:#451a03;border-color:rgb(var(--yellow-fg))}
@media print{.tabs,.hdr,.dm-btn,button{display:none !important}.ct{padding:0;max-width:100%}.card{break-inside:avoid;border:1px solid #ccc;margin-bottom:8px}.ab{max-height:none !important}.stat,.stats{break-inside:avoid}body{background:rgb(var(--card-bg));color:#000;font-size:12pt}}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.share-btn{font-size:13px;padding:2px 6px;opacity:.5;cursor:pointer;border:none;background:none}
.share-btn:hover{opacity:1}
.empty{text-align:center;padding:32px 16px;color:rgb(var(--fg3));font-size:12px;line-height:1.7}

body.dark{background:#0f172a;color:#e2e8f0;
--bg:15 23 42;--bg2:30 41 59;--bg3:30 41 59;--fg:226 232 240;--fg2:148 163 184;--fg3:100 116 139;
--brd:51 65 85;--card-bg:30 41 59;
--green-bg:6 78 59;--green-brd:5 150 105;--green-fg:167 243 208;
--blue-bg:23 37 84;--blue-brd:59 130 246;--blue-fg:147 197 253;
--yellow-bg:35 30 15;--yellow-brd:80 65 30;--yellow-fg:240 210 120;
--red-bg:69 10 10;--red-brd:127 29 29;--red-fg:252 165 165}
body.dark .card{background:#1e293b;border-color:#334155}
body.dark .btn{border-color:#334155}
body.dark input[type="checkbox"]{accent-color:#3b82f6}
body.dark .hdr{background:linear-gradient(135deg,#000,#0f172a)}
body.dark .tabs{background:#1e293b;border-color:#334155}
body.dark .tabs button:not(.on){color:rgb(var(--fg2))}
body.dark .qo{border-color:#334155;color:#e2e8f0}
body.dark .qo:not(.lk):hover{border-color:rgb(var(--fg2));background:#1e293b}
body.dark .qo.sel{border-color:rgb(var(--sky));background:#172554}
body.dark .qo.ok{background:#064e3b;border-color:rgb(var(--green-fg));color:#a7f3d0}
body.dark .qo.no{background:#450a0a;border-color:#7f1d1d;color:#fca5a5}
body.dark .qo.dim{border-color:rgb(var(--fg));color:rgb(var(--fg2))}
body.dark .pill:not(.on){background:#1e293b;color:rgb(var(--fg3));border-color:#334155}
body.dark .search-box,body.dark .calc-in{background:#1e293b;border-color:#334155;color:#e2e8f0}
body.dark select{background:#1e293b;color:#e2e8f0}
body.dark .acc-h:hover{background:#1e293b}
body.dark .fc{background:#1e293b;border-color:#334155;color:#e2e8f0}
body.dark .topic:hover{background:#1e293b}
body.dark .topic.done{background:#064e3b;border-color:rgb(var(--green-fg))}
body.dark .ck{border-color:#334155;color:#e2e8f0}
body.dark .stat{background:#1e293b;border-color:#334155}
body.dark .sec-t{color:#f1f5f9}
body.dark .drug-row{border-color:#334155;color:#e2e8f0}

/* ===== BLIND RECALL BLUR ===== */
.qo-blur{filter:blur(8px);transition:filter .25s ease;user-select:none}
.qo-blur:active,.qo-blur:focus,.qo-blur.revealed{filter:none}
.qo-blur::after{content:'Tap to reveal';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;color:rgb(var(--fg3));pointer-events:none;opacity:.9}
.qo{position:relative}

/* ===== SUDDEN DEATH ===== */
.sudden-death-banner{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff;padding:10px 14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;animation:pulse-red 2s infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.leaderboard-row{display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid rgb(var(--brd));font-size:11px}
body.dark .leaderboard-row{border-color:#334155}

/* ===== POMODORO ===== */
.pomo-bar{position:fixed;top:0;left:0;right:0;height:4px;background:#e2e8f0;z-index:60}
.pomo-bar .pomo-fill{height:100%;background:rgb(var(--em));transition:width 1s linear}
.pomo-overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;backdrop-filter:blur(6px)}
.pomo-overlay h2{font-size:24px;margin-bottom:8px}
.pomo-overlay .pomo-break-timer{font-size:64px;font-weight:700;font-variant-numeric:tabular-nums}


@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}




/* ===== MED BASKET ===== */
.med-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;background:rgb(var(--blue-bg));color:#1d4ed8;cursor:pointer;border:1px solid rgb(var(--blue-brd));margin:2px}
.med-chip .x{font-size:12px;font-weight:700;margin-left:2px;opacity:.6}
.med-chip .x:hover{opacity:1}
body.dark .med-chip{background:#1e3a5f;color:#93c5fd;border-color:rgb(var(--blue-fg))}
.acb-meter{height:10px;border-radius:5px;background:#e2e8f0;overflow:hidden;margin:6px 0}
.acb-meter .acb-fill{height:100%;border-radius:5px;transition:width .3s}

/* ===== DECISION TREE ===== */
.dt-node{padding:12px;border-radius:12px;border:2px solid #e2e8f0;margin-bottom:8px;cursor:pointer;transition:.15s;font-size:12px}
.dt-node:hover{border-color:rgb(var(--sky))}
.dt-node.active{border-color:rgb(var(--em));background:#ecfdf5}
.dt-node.inactive{opacity:.4}
body.dark .dt-node{border-color:#334155}
body.dark .dt-node.active{border-color:#059669;background:#064e3b}
.dt-result{padding:14px;border-radius:12px;border:2px solid rgb(var(--em));background:#ecfdf5;font-size:12px;line-height:1.7}
body.dark .dt-result{background:#064e3b;border-color:#059669;color:#a7f3d0}

/* ===== LAB OVERLAY ===== */
.lab-modal{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.lab-sheet{background:rgb(var(--card-bg));width:calc(100% - 24px);max-width:600px;max-height:85vh;border-radius:20px;overflow-y:auto;padding:20px 16px;animation:fadeIn .2s ease}
body.dark .lab-sheet{background:#1e293b;color:#e2e8f0}
.range-bar{height:8px;border-radius:4px;background:#e2e8f0;position:relative;margin:8px 0}
.range-bar .normal{position:absolute;height:100%;background:#bbf7d0;border-radius:4px}
.range-bar .marker{position:absolute;width:3px;height:16px;top:-4px;background:#1e293b;border-radius:2px}
body.dark .range-bar{background:#334155}
body.dark .range-bar .marker{background:rgb(var(--bg2))}
.frailty-slider{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(to right,#bbf7d0,#fde68a,#fecaca);outline:none}
.frailty-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#1e293b;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
body.dark .frailty-slider::-webkit-slider-thumb{background:#e2e8f0;border-color:#334155}

/* ===== CHEAT SHEET ===== */
.aging-row{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid rgb(var(--brd));font-size:10px}
.aging-row .cell{padding:8px 10px;line-height:1.5}
.aging-row .normal-cell{background:rgb(var(--green-bg));color:rgb(var(--green-fg))}
.aging-row .path-cell{background:rgb(var(--red-bg));color:rgb(var(--red-fg))}
body.dark .aging-row{border-color:#334155}
body.dark .aging-row .normal-cell{background:#064e3b;color:#6ee7b7}
body.dark .aging-row .path-cell{background:#450a0a;color:#fca5a5}

/* ===== DISTRACTOR AUTOPSY ===== */
.distractor-highlight{border:2px solid rgb(var(--brd)) !important;background:rgb(var(--bg2)) !important;position:relative}
.distractor-highlight::before{content:'🔍';position:absolute;top:-8px;right:-8px;font-size:14px}
body.dark .distractor-highlight{background:rgb(var(--bg2)) !important;border-color:rgb(var(--fg3)) !important}

/* ===== SPEECH BUTTON ===== */
.speech-btn{font-size:18px;padding:4px;opacity:.5;cursor:pointer;border:none;background:none;transition:.15s}
.speech-btn:hover,.speech-btn.speaking{opacity:1}
.speech-btn.speaking{animation:pulse-speak 1s infinite}
@keyframes pulse-speak{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ===== ROI SCATTER ===== */
.roi-grid{position:relative;width:100%;aspect-ratio:1.4;border-left:2px solid #64748b;border-bottom:2px solid #64748b;margin:12px 0}
.roi-dot{position:absolute;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;cursor:pointer;transition:.2s;border:2px solid rgba(255,255,255,.8);text-align:center;line-height:1.1;overflow:hidden}
.roi-dot:hover{transform:scale(1.3);z-index:5}
.roi-label{position:absolute;font-size:9px;color:rgb(var(--fg2));font-weight:600}

/* ===== VOICE PARSER ===== */
.voice-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;background:rgb(var(--red-bg));color:#dc2626;border:1px solid rgb(var(--red-brd));cursor:pointer}
.voice-btn.listening{background:#dc2626;color:#fff;animation:pulse-red 1.5s infinite}
body.dark .voice-btn{background:#450a0a;border-color:#7f1d1d}

/* Night/Study Mode */
body.study{background:#1a1008;color:#e8d5b0;
--bg:26 16 8;--bg2:34 21 8;--bg3:34 21 8;--fg:232 213 176;--fg2:160 128 96;--fg3:122 92 48;
--brd:61 42 18;--card-bg:34 21 8;
--green-bg:15 40 10;--green-brd:30 80 20;--green-fg:140 220 120;
--blue-bg:10 25 50;--blue-brd:40 80 140;--blue-fg:140 180 240;
--yellow-bg:30 25 10;--yellow-brd:70 55 25;--yellow-fg:220 190 100;
--red-bg:50 15 10;--red-brd:120 40 30;--red-fg:240 160 140}
body.study .card{background:#221508;border-color:#3d2a12}
body.study .hdr{background:linear-gradient(135deg,#0d0804,#1a1008)}
body.study .tabs{background:#221508;border-color:#3d2a12}
body.study .tabs button:not(.on){color:#a08060}
body.study .pill:not(.on){background:#221508;color:#a08060;border-color:#3d2a12}
body.study .qo{border-color:#3d2a12;color:#e8d5b0;background:#221508}
body.study .qo:not(.lk):hover{border-color:#7a5c30;background:#2a1e0d}
body.study .qo.sel{border-color:#c48a3a;background:#2a1e0d}
body.study .search-box,body.study .calc-in{background:#221508;border-color:#3d2a12;color:#e8d5b0}
body.study .stat{background:#221508;border-color:#3d2a12}
body.study .fc{background:#221508;border-color:#3d2a12;color:#e8d5b0}
body.study .sec-t{color:#e8d5b0}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.chat-msg-user{background:rgb(var(--blue-bg));border-radius:12px 12px 2px 12px;padding:8px 12px;font-size:12px;align-self:flex-end;max-width:85%}
.chat-msg-ai{background:rgb(var(--bg2));border:1px solid rgb(var(--brd));border-radius:12px 12px 12px 2px;padding:8px 12px;font-size:12px;align-self:flex-start;max-width:90%;white-space:pre-wrap;line-height:1.6}

// ===== INDEXEDDB MIGRATION =====
const IDB_NAME='shlav_mega_db',IDB_VER=1,IDB_STORE='state';
let idb=null;
function openIDB(){return new Promise((resolve,reject)=>{
const req=indexedDB.open(IDB_NAME,IDB_VER);
req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE);};
req.onsuccess=e=>{idb=e.target.result;resolve(idb);};
req.onerror=e=>reject(e.target.error);
});}
function idbGet(key){return new Promise((resolve,reject)=>{
if(!idb)return resolve(null);
const tx=idb.transaction(IDB_STORE,'readonly');
const req=tx.objectStore(IDB_STORE).get(key);
req.onsuccess=()=>resolve(req.result||null);
req.onerror=()=>resolve(null);
});}
function idbSet(key,val){return new Promise((resolve,reject)=>{
if(!idb)return resolve();
const tx=idb.transaction(IDB_STORE,'readwrite');
tx.objectStore(IDB_STORE).put(val,key);
tx.oncomplete=()=>resolve();
tx.onerror=()=>resolve();
});}
// Migrate localStorage → IndexedDB on first run
async function migrateToIDB(){
if(typeof _dataPromise!=='undefined') await _dataPromise; else await new Promise(r=>{const iv=setInterval(()=>{if(typeof QZ!=='undefined'&&QZ.length){clearInterval(iv);r();}},50);setTimeout(()=>{clearInterval(iv);r();},5000);});

try{
await openIDB();
const existing=await idbGet('samega');
if(!existing){
const lsData=localStorage.getItem(LS);
if(lsData){
await idbSet('samega',JSON.parse(lsData));
// Keep user_id for Supabase, clear the rest
const uid=null/*user_id removed*/;
localStorage.removeItem(LS);
// user_id removed — no longer needed
}else{
await idbSet('samega',S);
}
}else{
// Load from IDB into state
Object.assign(S,existing);
}
// Override save() to use IDB
const origSave=save;

const idbSave=()=>{clearTimeout(window._idbSaveTimer);window._idbSaveTimer=setTimeout(()=>{
idbSet('samega',JSON.parse(JSON.stringify(S))).catch(()=>{});
// Keep localStorage as fallback
try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}
},150);};
// Replace the global save
window.save=idbSave;
save=idbSave;
}catch(e){console.warn('IDB migration failed, using localStorage:',e);}
}

// ===== POMODORO TIMER =====
let pomoActive=false,pomoSec=3000,pomoBreak=false,pomoBreakSec=300,pomoInterval=null;
function startPomodoro(){
pomoActive=true;pomoSec=3000;pomoBreak=false;pomoBreakSec=300;
if(pomoInterval)clearInterval(pomoInterval);
pomoInterval=setInterval(()=>{
if(pomoBreak){
pomoBreakSec--;
if(pomoBreakSec<=0){pomoBreak=false;pomoSec=3000;}
}else{

function renderPomoOverlay(){

if(!pomoBreak||!d){clearInterval(iv);const o=document.getElementById('pomo-overlay');if(o)o.remove();return;}
d.textContent=fmtT(pomoBreakSec);},1000);

let medBasket=[];

function calcACBTotal(){return medBasket.reduce((sum,name)=>{const d=DRUGS.find(x=>x.name===name);return sum+(d?d.acb:0);},0);}
function getSTOPPWarnings(){
const warnings=[];const names=medBasket.map(n=>n.toLowerCase());
const cats=medBasket.map(n=>{const d=DRUGS.find(x=>x.name===n);return d?d.cat:'';}).filter(Boolean);
// Dual anticholinergic
const acDrugs=medBasket.filter(n=>{const d=DRUGS.find(x=>x.name===n);return d&&d.acb>=2;});
if(acDrugs.length>=2)warnings.push({level:'high',text:`Dual anticholinergic burden: ${acDrugs.join(' + ')} — cumulative cognitive/fall risk`});
// Benzo + opioid
const hasBenzo=cats.some(c=>c.toLowerCase().includes('benzo'));
const hasOpioid=cats.some(c=>c.toLowerCase().includes('opioid'));
if(hasBenzo&&hasOpioid)warnings.push({level:'high',text:'Benzodiazepine + Opioid — respiratory depression risk'});
// Dual antiplatelet
const antiPlat=medBasket.filter(n=>/aspirin|clopidogrel|prasugrel|ticagrelor/i.test(n));
if(antiPlat.length>=2)warnings.push({level:'med',text:`Dual antiplatelet: ${antiPlat.join(' + ')} — bleeding risk, especially with anticoagulant`});
// NSAID + anticoagulant
const hasNSAID=cats.some(c=>c.toLowerCase().includes('nsaid'));
const hasAnticoag=cats.some(c=>c.toLowerCase().includes('anticoag'));
if(hasNSAID&&hasAnticoag)warnings.push({level:'high',text:'NSAID + Anticoagulant — major GI bleed risk'});
// ACEi/ARB + K-sparing + NSAID (triple whammy)
const hasACE=names.some(n=>/enalapril|ramipril|lisinopril|losartan|valsartan|candesartan/i.test(n));
const hasKsparing=names.some(n=>/spironolactone|eplerenone|amiloride/i.test(n));
if(hasACE&&hasKsparing)warnings.push({level:'med',text:'ACEi/ARB + K-sparing diuretic — hyperkalemia risk'});
if(hasACE&&hasNSAID)warnings.push({level:'med',text:'ACEi/ARB + NSAID — AKI risk, reduced BP efficacy'});
// Anticholinergic opposing cholinesterase inhibitor
const hasAntiChol=medBasket.some(n=>{const d=DRUGS.find(x=>x.name===n);return d&&d.acb>=2;});
const hasChEI=names.some(n=>/donepezil|rivastigmine|galantamine/i.test(n));
if(hasAntiChol&&hasChEI)warnings.push({level:'high',text:'Anticholinergic opposes cholinesterase inhibitor — pharmacological conflict'});
// Metformin + CKD
const hasMet=names.some(n=>/metformin/i.test(n));
if(hasMet)warnings.push({level:'low',text:'Metformin — verify eGFR >30; contraindicated in severe CKD'});
// PPI long-term
const hasPPI=names.some(n=>/omeprazole|pantoprazole|esomeprazole|lansoprazole/i.test(n));
if(hasPPI)warnings.push({level:'low',text:'PPI — long-term use: Mg/Ca malabsorption, C. difficile risk, consider step-down'});
return warnings;
}

// ===== EOL DECISION TREE STATE =====
let eolState={competent:null,terminal:null,directive:null,proxy:null};
function setEol(k,v){eolState[k]=v;render();}
function getEolResult(){
const s=eolState;
if(s.competent===null)return null;
let result={standing:'',forms:[],actions:[]};
if(s.competent===true){
result.standing='Patient is competent — their autonomous wishes govern all decisions.';
result.actions.push('Document capacity assessment','Respect current expressed wishes even if contradicting prior AD');
result.forms.push('Informed consent form','Living will update (optional)');
if(s.terminal===true){
result.actions.push('Discuss goals of care','Offer palliative care consultation');
result.forms.push('POLST / DNR form if patient consents','Hospice referral form');
}
}else{
if(s.directive===true){
result.standing='Patient incompetent with advance directive — follow documented wishes via proxy.';
result.forms.push('Activate existing advance directive','Verify proxy identity (ייפוי כוח מתמשך)');
result.actions.push('Proxy decides per substituted judgment','Ethics consult if proxy deviates from AD');
}else{
if(s.proxy===true){
result.standing='No AD but proxy appointed — proxy uses substituted judgment or best interest.';
result.forms.push('מינוי מקבל החלטות זמני (Emergency Surrogate)','Court appointment if proxy unavailable');
result.actions.push('Proxy decides in best interest','Document proxy decisions thoroughly');
}else{
result.standing='No AD, no proxy — need court-appointed guardian (אפוטרופוס) or emergency surrogate.';
result.forms.push('Application for אפוטרופוס via court','מקבל החלטות חלופי form (for urgent medical decisions)');
result.actions.push('Contact social worker for guardianship process','For emergency: 2 physicians + social worker can approve');
}
}
if(s.terminal===true){
result.standing+=' Terminal status applies — חוק החולה הנוטה למות 2005.';
result.forms.push('טופס הנוטה למות — status declaration');
result.actions.push('May withhold/withdraw cyclical treatments per law','Continuous treatments require specific conditions to withdraw','Pain relief and dignity measures mandated by law');
}
}
return result;
}

// ===== IMA SYLLABUS WEIGHTS (approximate % from P005-2026) =====
const IMA_WEIGHTS=[5,3,6,5,8,8,10,5,7,4,4,5,3,3,5,5,4,6,5,4,5,4,5,3,4,3,4,5,6,5,4,3,3,3,3,4,3,3,4,3];

// ===== FSRS-4.5 loaded from shared/fsrs.js =====
function srScore(qIdx,correct,fsrsRating){
if(!S.sr[qIdx])S.sr[qIdx]={ef:2.5,n:0,next:0,ts:[],at:0,tot:0,ok:0};
const s=S.sr[qIdx];
if(s.tot===undefined){s.tot=0;s.ok=0;}
const elapsed=Math.round((Date.now()-qStartTime)/1000);
if(!s.ts)s.ts=[];
s.ts.push(elapsed);if(s.ts.length>10)s.ts.shift();
s.at=Math.round(s.ts.reduce((a,b)=>a+b,0)/s.ts.length);
s.tot++;if(correct)s.ok++;
// FSRS-4.5 scheduling
const rating=fsrsRating||(correct?3:1); // Use explicit rating if provided
const daysSinceReview=s.lastReview?Math.max(0,(Date.now()-s.lastReview)/86400000):0;
// Initialize or migrate FSRS state
if(s.fsrsS===undefined||s.fsrsD===undefined){
  if(s.n>0||s.ef!==2.5){
    const mig=fsrsMigrateFromSM2(s);s.fsrsS=mig.s;s.fsrsD=mig.d;
  }else{
    const init=fsrsInitNew(rating);s.fsrsS=init.s;s.fsrsD=init.d;
  }
}
const rPrev=daysSinceReview>0?fsrsR(daysSinceReview,s.fsrsS):1;
const upd=fsrsUpdate(s.fsrsS,s.fsrsD,rPrev,rating);
s.fsrsS=Math.round(upd.s*1000)/1000;
s.fsrsD=Math.round(upd.d*100)/100;
s.lastReview=Date.now();
// FSRS interval → next review
const fsrsDays=fsrsInterval(s.fsrsS);
s.next=Date.now()+fsrsDays*86400000;
// Keep SM-2 ef/n as proxies for filter compatibility
s.n=correct?s.n+1:0;
// ef mirrors difficulty: D=1→ef=2.5, D=10→ef=1.3
s.ef=Math.round((2.5-(s.fsrsD-1)/(10-1)*(2.5-1.3))*1000)/1000;
// session tracking
_sessionOk+=correct?1:0;_sessionNo+=correct?0:1;
if(correct&&QZ[qIdx])_sessionBest[QZ[qIdx].ti]=((_sessionBest[QZ[qIdx].ti]||0)+1);
if(!correct&&QZ[qIdx])_sessionWorse[QZ[qIdx].ti]=((_sessionWorse[QZ[qIdx].ti]||0)+1);
qStartTime=Date.now();
trackDailyActivity();

function getWeakTopics(n=3){

return scored.slice(0,n);
}
function buildRescuePool(){

  const topicQs=QZ.map((q,i)=>({i,q})).filter(x=>x.q.ti===w.ti);
  // Prioritize questions with worst personal accuracy
  topicQs.sort((a,b)=>{
    const sa=S.sr[a.i],sb=S.sr[b.i];
    const pa=sa&&sa.tot?(sa.ok/sa.tot):0.5;
    const pb=sb&&sb.tot?(sb.ok/sb.tot):0.5;
    return pa-pb;
  });
  rescueQs.push(...topicQs.slice(0,7).map(x=>x.i));
});
// Shuffle
for(let i=rescueQs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[rescueQs[i],rescueQs[j]]=[rescueQs[j],rescueQs[i]];}

function buildMockExamPool(){
  const total=EXAM_FREQ.reduce((a,b)=>a+b,0);

  const byTopic={};
  QZ.forEach((q,i)=>{const ti=q.ti>=0?q.ti:39;if(!byTopic[ti])byTopic[ti]=[];byTopic[ti].push(i);});
  // Compute target per topic
  EXAM_FREQ.forEach((freq,ti)=>{
    if(!freq||!byTopic[ti]||!byTopic[ti].length)return;
    const target=Math.max(1,Math.round(freq/total*100));
    // shuffle that topic's questions, take target count
    const src=[...byTopic[ti]].sort(()=>Math.random()-.5);
    for(let k=0;k<Math.min(target,src.length);k++)examPool.push(src[k]);
  });
  // Trim or pad to ~100
  examPool.sort(()=>Math.random()-.5);
  return examPool.slice(0,100);
}

function isMetaOption(text){
  // Detect options that reference letter positions or aggregate all answers
  // These must NOT be shuffled as their content references other option positions
  const t=(text||'').trim();
  const metaPatterns=[
    /כל\s*(ה)?תשוב/,           // כל התשובות נכונות
    /כל\s*(ה)?אמור/,            // כל האמור נכון
    /אף\s*תשוב/,                // אף תשובה
    /all\s+of\s+the\s+above/i,
    /none\s+of\s+the\s+above/i,
    /both\s+[a-e]\s+and\s+[a-e]/i,
    /[א-ת][׳']\s*ו[־-]?\s*[א-ת][׳']/,  // א׳ ו-ב׳, א׳ וג׳
    /^\s*[a-e]\s+and\s+[a-e]\s*$/i,      // "A and C"
    /\d\s*ו\s*\d/,              // 1 ו-2
  ];
  return metaPatterns.some(p=>p.test(t));
}

const _fmtNote=function(txt){
const parts=txt.split(/📖\s*HAZZARD'?S?\s*8e\s*BOARD\s*PEARLS:\s*/i);
const clinicalNotes=parts[0]||'';
const boardPearls=parts[1]||'';
function fmtLine(line){
// Section headers: ▸ HEADING — render as a styled block header
if(/^▸\s+/.test(line)){
const title=line.replace(/^▸\s+/,'');
return '<div style="margin:14px 0 6px;padding:5px 10px;background:linear-gradient(90deg,#eff6ff,transparent);border-left:3px solid #3b82f6;border-radius:0 4px 4px 0;font-size:10px;font-weight:800;color:rgb(var(--blue-fg));text-transform:uppercase;letter-spacing:.6px">'+title+'</div>';
}
// Sub-headers: ALL-CAPS word followed by colon at line start (e.g. "Tai Chi:", "RACF setting:")
line=line.replace(/^([A-Z][A-Z\s\/&\-()]{2,40}):/,'<strong style="color:#0f172a">$1:</strong>');
// Any remaining "Label:" pattern
line=line.replace(/^([^:\n]{2,50}):/,'<strong>$1:</strong>');
// Numbers with units, thresholds
line=line.replace(/(≥\d[\d.]*\s*(?:mmHg|m\/s|s\b|mg|IU|%)?|≤\d[\d.]*\s*(?:mmHg|m\/s|s\b|mg|IU|%)?|[<>]\d[\d.]*\s*(?:mmHg|m\/s|s\b|mg|IU|%)?|\d+–\d+%|\d+%)/g,'<b style="color:#0f172a">$1</b>');
// SOE badges
line=line.replace(/\(SOE=[A-C]\)/g,'<span style="background:#ecfdf5;color:#059669;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;vertical-align:middle">$&</span>');
// INCREASES / AVOID / WARNING keywords
line=line.replace(/\b(INCREASES|AVOID|DO NOT|WARNING|CRITICAL|CONTRAINDICATED)\b/g,'<span style="color:#dc2626;font-weight:700">$1</span>');
// Positive keywords
line=line.replace(/\b(SOE=A)\b/g,'<span style="color:#059669;font-weight:700">$1</span>');
return line;
}
function fmtBlock(t){
const paras=t.split(/\n{2,}/);
return paras.map(function(para){
const lines=para.split('\n');
// Check if first line is a section header
if(lines.length===1&&/^▸\s+/.test(lines[0])){
return fmtLine(lines[0]);
}
const fmt=lines.map(fmtLine).join('<br>');
return '<p style="font-size:11.5px;line-height:1.9;margin:0 0 10px;color:rgb(var(--fg))">'+fmt+'</p>';
}).join('');
}

h+='</div>';
}
return h;
};
h+=`<div style="padding:10px 14px 14px;border-top:1px solid rgb(var(--brd))">${_fmtNote(n.notes)}</div>`;

function renderPriorityMatrix(){
  const TOPICS_L=TOPICS;
  const EF_FREQ=[0,34,30,28,36,43,178,39,63,36,20,27,19,22,50,40,22,94,70,78,18,80,43,21,46,27,29,52,10,11,7,0,6,9,26,19,23,9,17,0];
  const maxFreq=Math.max(...EF_FREQ);
  const tSt=S.ts||{};
  const rows=TOPICS_L.map((name,ti)=>{
    const s=tSt[ti]||{ok:0,no:0,tot:0};
    const acc=s.tot>0?s.ok/s.tot:null;
    const freq=EF_FREQ[ti]||0;
    const freqPct=maxFreq>0?freq/maxFreq:0;
    const gap=acc===null?0.7:(1-acc); // unknown → treat as 70% gap
    const priority=Math.round(freqPct*gap*100);
    return{ti,name,freq,acc,gap,priority,s};
  }).filter(r=>r.freq>0).sort((a,b)=>b.priority-a.priority);
  
  let h='<div style="font-weight:700;font-size:12px;margin:14px 0 8px;color:#0f172a">🎯 Priority Matrix — where to study next</div>';
  h+='<div style="font-size:9px;color:rgb(var(--fg3));margin-bottom:8px">Score = exam frequency × your gap. Higher = drill harder.</div>';
  rows.slice(0,15).forEach((r,rank)=>{
    const accStr=r.acc===null?'untested':`${Math.round(r.acc*100)}%`;
    const barW=Math.round(r.priority);
    const color=r.priority>=60?'#dc2626':r.priority>=30?'#f59e0b':'#10b981';
    const trend=getTopicTrend(r.ti);
    const trendStr=trend===null?'':trend>5?'<span style="color:#059669;font-size:10px">↑</span>':trend<-5?'<span style="color:#dc2626;font-size:10px">↓</span>':'<span style="color:rgb(var(--fg3));font-size:10px">→</span>';
    h+=`<div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <div style="font-size:11px;font-weight:${rank<5?'700':'400'}">${rank+1}. ${r.name} ${trendStr}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:9px;color:rgb(var(--fg2))">${r.s.tot}q · ${accStr}</span>
          <span style="font-size:10px;font-weight:700;color:${color}">${r.priority}</span>
        </div>
      </div>
      <div style="height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden">
        <div style="width:${barW}%;height:100%;background:${color};border-radius:3px"></div>
      </div>
    </div>`;
  });
  h+=`<div onclick="var el=document.getElementById('pmFull');el.style.display=el.style.display==='none'?'block':'none'" style="font-size:10px;color:rgb(var(--sky));cursor:pointer;margin-top:6px">Show all 40 topics ▾</div>`;
  h+=`<div id="pmFull" style="display:none">`;
  rows.slice(15).forEach((r,rank)=>{
    const accStr=r.acc===null?'untested':`${Math.round(r.acc*100)}%`;
    h+=`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgb(var(--brd));font-size:10px">
      <span>${rank+16}. ${r.name}</span>
      <span style="color:rgb(var(--fg2))">${r.s.tot}q · ${accStr}</span>
    </div>`;
  });
  h+=`</div>`;
  return h;
}

const prompt=`Based on this geriatrics/medicine chapter content, generate exactly 5 board-style multiple-choice questions.

Chapter: ${chTitle}
Content excerpt:
${excerpt.slice(0,3000)}

Return ONLY valid JSON array, no markdown. Each question must have:
- q: question text (Hebrew or English, clinical vignette style)
- o: array of exactly 4 options

- e: explanation including why correct answer is right AND why each wrong option is wrong (per-distractor)

  html+='<button onclick="approveGeneratedQ('+JSON.stringify(gq).replace(/"/g,'&quot;')+')" style="margin-top:6px;font-size:10px;padding:4px 12px;background:#059669;color:#fff;border:none;border-radius:6px;cursor:pointer">✅ Add to Bank</button>';
  html+='</div>';
});
html+='</div>';
box.innerHTML=html;
}catch(err){
box.innerHTML='<div class="card" style="padding:16px;color:#dc2626">Error: '+sanitize(err.message)+'</div>';
}

function approveGeneratedQ(gq){
// Add the generated question to the local question bank
const newQ={q:gq.q,o:gq.o,c:gq.c,t:'Hazzard',ti:0,e:gq.e};
// Find best matching topic
for(let ti=0;ti<TOPICS.length;ti++){
  const topicLower=(TOPICS[ti]||'').toLowerCase();
  const qLower=(gq.q||'').toLowerCase()+(gq.e||'').toLowerCase();
  if(topicLower.split(/\s+/).filter(w=>w.length>3).some(w=>qLower.includes(w))){newQ.ti=ti;break;}
}
QZ.push(newQ);
// Store in localStorage as pending additions
let pending=[];try{pending=JSON.parse(localStorage.getItem('samega_pending_qs')||'[]');}catch(e){}
pending.push(newQ);
localStorage.setItem('samega_pending_qs',JSON.stringify(pending));
alert('Question added! ('+QZ.length+' total). Note: pending server sync.');
}

async function quizMeOnChapter(chNum,chTitle){
  // Show loading state in Library
  const el=document.getElementById('quiz-me-box');
  if(el){el.innerHTML='<div style="text-align:center;padding:20px;color:rgb(var(--fg2))">⏳ Generating questions from Ch '+sanitize(chNum)+'...</div>';}
  // Get chapter text from already-loaded data
  let chapterText='';
  if(window._libData&&window._libData.chapters){
    const ch=window._libData.chapters.find(c=>c.ch===chNum);
    if(ch&&ch.sections){
      chapterText=ch.sections.slice(0,6).map(s=>s.title+': '+s.content).join('\n').slice(0,3000);
    }
  }
  if(!chapterText){
    chapterText="Hazzard's Geriatric Medicine Chapter "+chNum+": "+chTitle;
  }
  const prompt=`You are an Israeli geriatrics board examiner writing MCQ for the שלב א׳ exam.

Based on this chapter content from Hazzard's Geriatric Medicine Ch ${chNum} (${chTitle}):
${chapterText}

Generate 3 original MCQ questions NOT already in the question bank. Each question must:
1. Test a specific fact, threshold, or mechanism from this chapter
2. Have exactly 5 answer options (A-E)
3. Have one definitively correct answer
4. Include a brief Hebrew explanation (2-3 sentences)

Return ONLY valid JSON array:
[{"q":"question text","o":["A. opt","B. opt","C. opt","D. opt","E. opt"],"c":0,"e":"הסבר בעברית"}]
c = 0-based index of correct answer. No markdown, no preamble.`;
  try{
    const txt=await callAI([{role:'user',content:prompt}],1200,'sonnet');
    const clean=txt.replace(/\`\`\`json|\`\`\`/g,'').trim();
    const qs=JSON.parse(clean);
    // Display the generated questions
    let h='<div style="margin-top:16px;border-top:2px solid #7c3aed;padding-top:12px">';
    h+='<div style="font-weight:700;font-size:12px;color:#7c3aed;margin-bottom:10px">🧠 AI-Generated Questions — Ch '+chNum+': '+chTitle+'</div>';
    qs.forEach((q,qi)=>{
      h+=`<div style="margin-bottom:14px;padding:12px;background:#faf5ff;border-radius:10px;border-left:3px solid #7c3aed">`;
      h+=`<div style="font-size:12px;font-weight:600;margin-bottom:8px">${qi+1}. ${q.q}</div>`;
      q.o.forEach((opt,oi)=>{
        const isCorrect=oi===q.c;
        h+=`<div style="font-size:11px;padding:4px 8px;margin-bottom:3px;border-radius:6px;background:${isCorrect?'#dcfce7':'#f8fafc'};color:${isCorrect?'#166534':'#475569'};font-weight:${isCorrect?'700':'400'}">${opt}${isCorrect?' ✓':''}</div>`;
      });
      if(q.e)h+=`<div style="font-size:10px;color:#6d28d9;margin-top:8px;direction:rtl;text-align:right;line-height:1.6;border-top:1px solid #e9d5ff;padding-top:6px">💡 ${sanitize(q.e)}</div>`;
      h+='</div>';
    });
    h+='<button onclick="addChapterQsToBank('+JSON.stringify(JSON.stringify(qs)).slice(1,-1)+')" style="font-size:10px;padding:6px 14px;background:#059669;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:4px">➕ Add to my question bank</button>';
    h+='</div>';
    if(el)el.innerHTML=h;
  }catch(e){
    if(el)el.innerHTML='<div style="color:#dc2626;font-size:11px;padding:8px">⚠️ Failed to generate: '+sanitize(e.message)+'</div>';
  }
}
function addChapterQsToBank(jsonStr){
  try{
    const qs=JSON.parse(jsonStr);
    const existing=JSON.parse(localStorage.getItem('samega_custom_qs')||'[]');
    qs.forEach(q=>{q.t='AI-Ch';q.ti=-1;existing.push(q);});
    localStorage.setItem('samega_custom_qs',JSON.stringify(existing));
    alert('✅ '+qs.length+' questions added! Reload to see them in the AI-Ch filter.');
  }catch(e){alert('Failed: '+e.message);}
}

// ===== CALCULATORS =====
let calcVals={};
function calcUp(k,v){calcVals[k]=parseFloat(v)||0;render();}
function renderCalc(){
// Tool selector pills
const _cv=[{id:'calc',l:'🧮 Calculators'},{id:'basket',l:'🧺 Med Basket'},{id:'eol',l:'🕊️ EOL Tree'},{id:'lab',l:'🔬 Lab Ref'},{id:'aging',l:'📋 Aging Sheet'}];
let h=`<div style="display:flex;gap:4px;overflow-x:auto;padding:4px 0;margin-bottom:8px">`;
_cv.forEach(v=>{h+=`<button onclick="calcView='${v.id}';render()" style="white-space:nowrap;padding:6px 12px;border:none;border-radius:20px;font-size:10px;font-weight:${calcView===v.id?'700':'400'};cursor:pointer;background:${calcView===v.id?'#0f172a':'#f1f5f9'};color:${calcView===v.id?'#fff':'#64748b'}">${v.l}</button>`;});
h+=`</div>`;
if(calcView==='basket')return h+renderMedBasket();
if(calcView==='eol')return h+renderEOLTree();
if(calcView==='lab')return h+renderLabOverlay();
if(calcView==='aging')return h+renderAgingSheet();
h+=`<div class="sec-s">CrCl · CHA₂DS₂-VASc · CURB-65 · GDS-15 · Braden · PADUA</div>`;

// CrCl
const age=calcVals.age||75,wt=calcVals.wt||55,cr=calcVals.cr||1.0,fem=calcVals.fem===undefined?0.85:calcVals.fem;
const crcl=Math.max(0,Math.round(((140-age)*wt*fem)/(72*cr)));
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Cockcroft-Gault CrCl</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
<div><label style="font-size:10px;color:rgb(var(--fg2))">Age</label><input class="calc-in" type="number" value="${age}" onchange="calcUp('age',this.value)"></div>
<div><label style="font-size:10px;color:rgb(var(--fg2))">Weight (kg)</label><input class="calc-in" type="number" value="${wt}" onchange="calcUp('wt',this.value)"></div>
<div><label style="font-size:10px;color:rgb(var(--fg2))">Creatinine</label><input class="calc-in" type="number" step="0.1" value="${cr}" onchange="calcUp('cr',this.value)"></div>
<div><label style="font-size:10px;color:rgb(var(--fg2))">Sex</label><select class="calc-in" onchange="calcUp('fem',this.value)">
<option value="0.85" ${fem<1?'selected':''}>Female (×0.85)</option><option value="1" ${fem>=1?'selected':''}>Male (×1)</option></select></div>
</div>
<div style="margin-top:10px;padding:10px;background:rgb(var(--blue-bg));border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${crcl<30?'#dc2626':crcl<60?'#d97706':'#059669'}">${crcl} ml/min</span>
<p style="font-size:10px;color:rgb(var(--fg2));margin-top:2px">${crcl<30?'CKD 4-5: Avoid metformin, adjust all renally-cleared drugs':crcl<60?'CKD 3: Dose adjust many drugs':'CKD 1-2: Mild impairment'}</p>
</div></div>`;

// CHA2DS2-VASc
const cha=Object.entries(calcVals).filter(([k])=>k.startsWith('cha_')).reduce((s,[k,v])=>s+v,0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">CHA₂DS₂-VASc</h3>`;
[['cha_chf','CHF',1],['cha_htn','HTN',1],['cha_age75','Age ≥75',2],['cha_dm','Diabetes',1],
['cha_stroke','Stroke/TIA',2],['cha_vasc','Vascular disease',1],['cha_age65','Age 65-74',1],['cha_sex','Female sex',1]
].forEach(([k,l,pts])=>{
const on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">
<span>${l} (+${pts})</span>
<input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?${pts}:0)" style="width:16px;height:16px">
</label>`;
});
h+=`<div style="margin-top:10px;padding:10px;background:rgb(var(--blue-bg));border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${cha>=2?'#dc2626':'#d97706'}">${cha}</span>
<p style="font-size:10px;color:rgb(var(--fg2));margin-top:2px">${cha>=2?'Anticoagulate (DOAC preferred, Apixaban safest in CKD)':cha===1?'Consider anticoagulation':'Low risk — consider no therapy'}</p>
</div></div>`;


// CURB-65
const curb=Object.entries(calcVals).filter(([k])=>k.startsWith('curb_')).reduce((s,[k,v])=>s+v,0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">CURB-65</h3>`;
[['curb_conf','Confusion (new)',1],['curb_bun','BUN >20 mg/dL (>7 mmol/L)',1],['curb_rr','RR ≥30',1],['curb_bp','BP: SBP<90 or DBP≤60',1],['curb_age','Age ≥65',1]
].forEach(([k,l,pts])=>{
const on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">
<span>${l} (+${pts})</span>
<input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?${pts}:0)" style="width:16px;height:16px">
</label>`;
});
const curbRisk=curb<=1?'Low risk (<2% mortality) — consider outpatient':curb===2?'Moderate (9%) — short inpatient or supervised outpatient':'High (15-40%) — ICU if 4-5';
h+=`<div style="margin-top:10px;padding:10px;background:rgb(var(--blue-bg));border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${curb>=3?'#dc2626':curb>=2?'#d97706':'#059669'}">${curb}</span>
<p style="font-size:10px;color:rgb(var(--fg2));margin-top:2px">${curbRisk}</p>
</div></div>`;

// GDS-15 Quick Score
const gds=Object.entries(calcVals).filter(([k])=>k.startsWith('gds_')).reduce((s,[k,v])=>s+v,0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">GDS-15 (Depression Screen)</h3>`;
['Satisfied with life? (No=1)','Dropped activities? (Yes=1)','Feel life is empty? (Yes=1)','Often bored? (Yes=1)','Good spirits most of time? (No=1)',
'Afraid something bad? (Yes=1)','Feel happy most of time? (No=1)','Often feel helpless? (Yes=1)','Stay home rather than go out? (Yes=1)','More memory problems? (Yes=1)',
'Wonderful to be alive? (No=1)','Feel worthless? (Yes=1)','Feel full of energy? (No=1)','Feel hopeless? (Yes=1)','Others better off? (Yes=1)'].forEach((l,i)=>{
const k='gds_'+i,on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f8fafc;font-size:10px;cursor:pointer">
<span>${l}</span><input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?1:0)" style="width:14px;height:14px"></label>`;
});
h+=`<div style="margin-top:10px;padding:10px;background:rgb(var(--blue-bg));border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${gds>=5?'#dc2626':'#059669'}">${gds}/15</span>
<p style="font-size:10px;color:rgb(var(--fg2));margin-top:2px">${gds>=10?'Severe depression — refer':gds>=5?'Positive screen — evaluate further':'Normal'}</p>
<button id="copy-gds" onclick="copyReport('gds')" class="btn btn-o" style="margin-top:8px;font-size:10px;padding:4px 10px" aria-label="Copy GDS report">📋 העתק דוח</button>
</div></div>`;

// Braden Scale
const bradenSubs=[
['brad_sens','Sensory Perception',['Completely Limited (1)','Very Limited (2)','Slightly Limited (3)','No Impairment (4)']],
['brad_moist','Moisture',['Constantly Moist (1)','Very Moist (2)','Occasionally Moist (3)','Rarely Moist (4)']],
['brad_act','Activity',['Bedfast (1)','Chairfast (2)','Walks Occasionally (3)','Walks Frequently (4)']],
['brad_mob','Mobility',['Completely Immobile (1)','Very Limited (2)','Slightly Limited (3)','No Limitation (4)']],
['brad_nut','Nutrition',['Very Poor (1)','Probably Inadequate (2)','Adequate (3)','Excellent (4)']],
['brad_fric','Friction/Shear',['Problem (1)','Potential Problem (2)','No Apparent Problem (3)']]
];
const bradenScore=bradenSubs.reduce((s,[k])=>s+(calcVals[k]||1),0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Braden Scale (Pressure Injury Risk)</h3>`;
bradenSubs.forEach(([k,label,opts])=>{
const v=calcVals[k]||1;
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:rgb(var(--fg2));font-weight:600">${label}</label>
<select class="calc-in" style="font-size:11px" onchange="calcUp('${k}',this.selectedIndex+1)">`;
opts.forEach((o,i)=>{h+=`<option value="${i+1}"${v===i+1?' selected':''}>${o}</option>`;});
h+=`</select></div>`;
});
const bradenRisk=bradenScore<=12?'High Risk':bradenScore<=14?'Moderate Risk':bradenScore<=18?'Mild Risk':'No Risk';
const bradenClr=bradenScore<=12?'#dc2626':bradenScore<=14?'#d97706':bradenScore<=18?'#2563eb':'#059669';
h+=`<div style="margin-top:10px;padding:10px;background:rgb(var(--blue-bg));border-radius:10px;text-align:center" class="calc-result">
<span style="font-size:22px;font-weight:700;color:${bradenClr}">${bradenScore}/23</span>
<p style="font-size:10px;color:rgb(var(--fg2));margin-top:2px">${bradenRisk}${bradenScore<=18?' — Implement prevention protocol':''}</p>
<button id="copy-braden" onclick="copyReport('braden')" class="btn btn-o" style="margin-top:8px;font-size:10px;padding:4px 10px" aria-label="Copy Braden report">📋 העתק דוח</button>
</div></div>`;

// PADUA VTE Score
const paduaItems=[
['pad_cancer','Active cancer',3],['pad_vte','Previous VTE',3],['pad_immob','Reduced mobility (≥3 days)',3],
['pad_throm','Known thrombophilia',3],['pad_trauma','Recent (≤1mo) trauma/surgery',2],
['pad_age','Age ≥70',1],['pad_hf','Heart/respiratory failure',1],['pad_mi','Acute MI or stroke',1],
['pad_infect','Acute infection/rheumatic disorder',1],['pad_obesity','Obesity (BMI ≥30)',1],['pad_hormone','Ongoing hormonal therapy',1]
];
const paduaScore=paduaItems.reduce((s,[k,,pts])=>s+(calcVals[k]?pts:0),0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">PADUA VTE Risk Score</h3>`;
paduaItems.forEach(([k,l,pts])=>{
const on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">
<span>${l} (+${pts})</span>
<input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?${pts}:0)" style="width:16px;height:16px">
</label>`;
});
h+=`<div style="margin-top:10px;padding:10px;background:rgb(var(--blue-bg));border-radius:10px;text-align:center" class="calc-result">
<span style="font-size:22px;font-weight:700;color:${paduaScore>=4?'#dc2626':'#059669'}">${paduaScore}</span>
<p style="font-size:10px;color:rgb(var(--fg2));margin-top:2px">${paduaScore>=4?'High VTE risk (≥4) — Pharmacological prophylaxis recommended':'Low VTE risk (<4) — Mechanical prophylaxis or early mobilization'}</p>
</div></div>`;


// Katz ADL Index
const katzItems=['Bathing','Dressing','Toileting','Transferring','Continence','Feeding'];
const katzScore=katzItems.reduce((s,_,i)=>s+(calcVals['katz_'+i]||0),0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Katz ADL Index</h3>`;
katzItems.forEach((l,i)=>{const k='katz_'+i,on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">
<span>${l} (Independent=1)</span><input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?1:0)" style="width:16px;height:16px"></label>`;});
h+=`<div style="margin-top:10px;padding:10px;background:rgb(var(--blue-bg));border-radius:10px;text-align:center" class="calc-result">

<p style="font-size:10px;color:rgb(var(--fg2));margin-top:2px">${katzScore===6?'Full independence':katzScore>=4?'Moderate dependence':katzScore>=2?'Severe dependence':'Total dependence'}</p>

</div></div>`;

// Lawton IADL Scale
const lawtonItems=['Phone use','Shopping','Food prep','Housekeeping','Laundry','Transport','Medications','Finances'];
const lawtonScore=lawtonItems.reduce((s,_,i)=>s+(calcVals['law_'+i]||0),0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Lawton IADL Scale</h3>`;
lawtonItems.forEach((l,i)=>{const k='law_'+i,on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">
<span>${l} (Independent=1)</span><input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?1:0)" style="width:16px;height:16px"></label>`;});
h+=`<div style="margin-top:10px;padding:10px;background:rgb(var(--blue-bg));border-radius:10px;text-align:center" class="calc-result">
<span style="font-size:22px;font-weight:700;color:${lawtonScore>=6?'#059669':lawtonScore>=4?'#d97706':'#dc2626'}">${lawtonScore}/8</span>
<p style="font-size:10px;color:rgb(var(--fg2));margin-top:2px">${lawtonScore===8?'Fully independent':lawtonScore>=5?'Partially dependent':'Significantly dependent'} in IADLs</p>

function renderExamTrendCard(){
  const OLD_EX=new Set(['2021','2022','יוני 23']);
  const NEW_EX=new Set(['ספט 24','יוני 25','2025-א']);
  const TOPICS_L=TOPICS;
  const oldTot=QZ.filter(q=>OLD_EX.has(q.t)).length||1;
  const newTot=QZ.filter(q=>NEW_EX.has(q.t)).length||1;
  const trends=TOPICS_L.map((name,ti)=>{
    const oldN=QZ.filter(q=>OLD_EX.has(q.t)&&q.ti===ti).length;
    const newN=QZ.filter(q=>NEW_EX.has(q.t)&&q.ti===ti).length;
    const delta=(newN/newTot - oldN/oldTot)*100;
    return{ti,name,oldN,newN,oldPct:oldN/oldTot*100,newPct:newN/newTot*100,delta};
  }).filter(r=>r.oldN+r.newN>0);
  
  const growing=trends.filter(r=>r.delta>0.5).sort((a,b)=>b.delta-a.delta).slice(0,6);
  const shrinking=trends.filter(r=>r.delta<-0.5).sort((a,b)=>a.delta-b.delta).slice(0,4);
  
  let h=`<div class="card" style="padding:14px;margin-bottom:10px;border-left:4px solid #7c3aed">
<div style="font-weight:700;font-size:12px;margin-bottom:4px;color:#7c3aed">📈 Exam Trend — 2021-22 vs ספט24–25-א</div>
<div style="font-size:9px;color:rgb(var(--fg3));margin-bottom:10px">Where the exam is heading. Study accordingly.</div>`;
  
  h+=`<div style="font-size:10px;font-weight:700;color:#059669;margin-bottom:5px">▲ GROWING — prioritize</div>`;
  growing.forEach(r=>{
    const barW=Math.min(100,Math.round(r.delta*15));
    h+=`<div style="margin-bottom:5px">
<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px">
  <span style="font-weight:${r.delta>1.5?'700':'400'}">${r.name}</span>
  <span style="color:#059669">+${r.delta.toFixed(1)}pp · ${r.newPct.toFixed(1)}% of exam</span>
</div>
<div style="height:4px;background:#e2e8f0;border-radius:2px"><div style="width:${barW}%;height:100%;background:#10b981;border-radius:2px"></div></div>
</div>`;
  });
  
  h+=`<div style="font-size:10px;font-weight:700;color:#dc2626;margin-bottom:5px;margin-top:10px">▼ SHRINKING — less priority</div>`;
  shrinking.forEach(r=>{
    h+=`<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px">
<span style="color:rgb(var(--fg2))">${r.name}</span>
<span style="color:#dc2626">${r.delta.toFixed(1)}pp</span>
</div>`;
  });
  
  h+=`<div style="font-size:9px;color:rgb(var(--fg3));margin-top:8px;border-top:1px solid rgb(var(--brd));padding-top:6px">Old: 2021+2022+יוני23 (${oldTot}q) · New: ספט24+יוני25+2025-א (${newTot}q)</div>`;
  h+=`</div>`;
  return h;
}

function calcEstScore(){
  // FSRS-aware estimated score: weight by retrievability for seen questions
  const now2=Date.now();
  // Frequency weights from historical exam distribution
  const totalFreq=EXAM_FREQ.reduce((a,b)=>a+b,0);
  const tSt=S.ts||{};
  const due=new Set(getDueQuestions());
  
  let weightedScore=0,totalWeight=0;
  EXAM_FREQ.forEach((freq,ti)=>{
    if(!freq)return;
    const s=tSt[ti]||{ok:0,no:0,tot:0};
    const weight=freq/totalFreq;
    let acc;
    if(s.tot<3){
      // Not enough data — assume 60% (neutral)
      acc=0.60;
    } else {
      acc=s.ok/s.tot;
      // Penalize if due questions exist in this topic
      const duePenalty=QZ.filter((_,i)=>QZ[i]?.ti===ti&&due.has(i)).length;
      if(duePenalty>0)acc=Math.max(0,acc-duePenalty*0.02);
    }
    weightedScore+=acc*weight;
    totalWeight+=weight;
  });
  return totalWeight>0?Math.round(weightedScore/totalWeight*100):null;
}

h+=`<div class="mb-item" style="padding:8px 12px;border-bottom:1px solid rgb(var(--brd));cursor:pointer;font-size:11px;display:flex;justify-content:space-between;align-items:center;${inBasket?'background:#ecfdf5':''}" onclick="toggleMedBasket('${d.name.replace(/'/g,"\\'")}');render()" data-drug="${d.name.toLowerCase()} ${d.heb}" role="option" aria-selected="${inBasket?'true':'false'}">

</div></div>`;
}
}

const result=getEolResult();
if(result){
h+=`<div class="dt-result" dir="auto" style="margin-top:12px">

{name:'Sodium',unit:'mmol/L',young:[136,145],old:[133,145],note:'Hyponatremia common; drug-induced (SSRIs, diuretics, carbamazepine) is most common cause'},

h+=`<div class="card" style="padding:14px;margin-bottom:10px">

'✅ Fit: Standard age-adjusted ranges apply. Most screening tests retain reasonable test characteristics.'}</div>
</div>`;
// Lab cards
labs.forEach(l=>{

${frailtyLevel>=5?`<div style="font-size:9px;color:#d97706;margin-top:4px">⚡ In frail patients: PPV of abnormal ${l.name} is reduced. Clinical correlation essential.</div>`:''}
</div>`;
});
return h;
}

async function sendChat(){

if(!text||chatLoading)return;
const key=getApiKey();
if(!key){const k=prompt('הכנס Anthropic API Key:','');if(!k)return;setApiKey(k);}

setTimeout(function(){const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
let history=S.chat.slice(-10);
if(history.length>0&&history[0].role!=='user')history=history.slice(1);
const messages=history.filter(function(m){return m.role==='user'||m.role==='assistant';}).map(function(m){return{role:m.role,content:m.text};});
try{
const ctrl=new AbortController();
const timeout=setTimeout(function(){ctrl.abort();},45000);
const resp=await fetch(AI_PROXY,{
method:'POST',
headers:{'Content-Type':'application/json','x-api-secret':AI_SECRET},
body:JSON.stringify({model:'sonnet',max_tokens:1024,system:CHAT_SYSTEM,messages:messages}),
signal:ctrl.signal
});
clearTimeout(timeout);
if(!resp.ok){const e=await resp.json().catch(function(){return{};});if(resp.status===401||resp.status===403){localStorage.removeItem('samega_apikey');throw new Error('API key invalid');}throw new Error(e.error&&e.error.message?e.error.message:'HTTP '+resp.status);}
const data=await resp.json();
S.chat.push({role:'assistant',text:data.content[0].text});
}catch(e){
const offline=!navigator.onLine||e.message.includes('Failed to fetch');
const timedOut=e.name==='AbortError';
S.chat.push({role:'error',text:offline?'📡 אין חיבור לאינטרנט':timedOut?'⏱️ תם הזמן':'⚠️ '+sanitize(e.message)});
}
chatLoading=false;save();render();
setTimeout(function(){const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

const _SB_KEY=SUPA_ANON;
function _sbDeviceId(){let id=localStorage.getItem('samega_devid');if(!id){id='dev_'+Math.random().toString(36).slice(2,12);localStorage.setItem('samega_devid',id);}return id;}
async function cloudBackup(){
  const btn=document.getElementById('cloud-backup-btn');
  if(btn){btn.disabled=true;btn.textContent='☁️ Saving...';}
  try{
    const payload={id:_sbDeviceId(),data:S,updated_at:new Date().toISOString()};
    const res=await fetch(SUPA_URL+'/rest/v1/samega_backups',{
      method:'POST',
      headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(payload)
    });
    if(res.ok||res.status===409){
      // If 409, try upsert
      if(res.status===409){
        const patchRes=await fetch(SUPA_URL+'/rest/v1/samega_backups?id=eq.'+_sbDeviceId(),{
          method:'PATCH',
          headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Content-Type':'application/json'},
          body:JSON.stringify({data:S,updated_at:new Date().toISOString()})
        });
        if(!patchRes.ok){const pe=await patchRes.text();alert('❌ Backup update failed: '+patchRes.status+'\n'+pe.slice(0,200));return;}
      }
      alert('✅ Progress backed up to cloud!\nDevice ID: '+_sbDeviceId().slice(0,12)+'...');
    } else {
      const err=await res.text();
      alert('❌ Backup failed: '+res.status+'\n'+err.slice(0,200));
    }
  }catch(e){alert('❌ Backup failed: '+e.message);}
  if(btn){btn.disabled=false;btn.textContent='☁️ Backup to Cloud';}
}
async function cloudRestore(){
  const id=prompt('Enter device ID to restore from (leave blank for this device):',_sbDeviceId())||_sbDeviceId();
  if(!id)return;
  try{
    const res=await fetch(SUPA_URL+'/rest/v1/samega_backups?id=eq.'+encodeURIComponent(id)+'&select=data,updated_at',{
      headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY}
    });
    if(!res.ok){alert('❌ Restore failed: '+res.status);return;}
    const rows=await res.json();
    if(!rows||!rows.length){alert('No backup found for ID: '+id);return;}
    const row=rows[0];
    if(confirm('Restore backup from '+new Date(row.updated_at).toLocaleString()+'?\nThis will overwrite your current progress.')){
      Object.assign(S,row.data);save();render();
      alert('✅ Progress restored!');
    }
  }catch(e){alert('❌ Restore failed: '+e.message);}
}

// ===== WEEKLY TREND SNAPSHOT =====
function takeWeeklySnapshot(){
  try{
    const now=new Date();
    const weekKey='w_'+now.getFullYear()+'_'+Math.floor((now-new Date(now.getFullYear(),0,0))/(7*864e5));
    const snapshots=JSON.parse(localStorage.getItem('samega_weekly')||'{}');
    if(snapshots[weekKey])return; // already taken this week
    const tSt=S&&S.ts?S.ts:{};
    const snap={};
    for(let i=0;i<40;i++){const s=tSt[i]||{ok:0,no:0,tot:0};snap[i]=s.tot>0?Math.round(s.ok/s.tot*100):null;}
    snapshots[weekKey]={date:now.toISOString(),acc:snap};
    const keys=Object.keys(snapshots).sort();
    if(keys.length>52)delete snapshots[keys[0]];
    localStorage.setItem('samega_weekly',JSON.stringify(snapshots));
  }catch(e){}
}
function getTopicTrend(ti){
  try{
    const snapshots=JSON.parse(localStorage.getItem('samega_weekly')||'{}');
    const keys=Object.keys(snapshots).sort();
    if(keys.length<2)return null;
    const prev=snapshots[keys[keys.length-2]].acc[ti];
    const curr=snapshots[keys[keys.length-1]].acc[ti];
    if(prev===null||curr===null)return null;
    return curr-prev; // positive = improving
  }catch(e){return null;}
}

// Schedule daily notification at 07:00
function scheduleDailyNotification(){
const now=new Date();
const target=new Date(now);
target.setHours(7,0,0,0);
if(now>=target)target.setDate(target.getDate()+1);
const delay=target-now;
setTimeout(()=>{
const dueN=getDueQuestions().length;
if(dueN>0&&reg.active){
reg.active.postMessage({type:'schedule-notification',dueCount:dueN});
}
scheduleDailyNotification();// Reschedule for next day
},delay);
}
// Request notification permission
if('Notification' in window&&Notification.permission==='default'){
Notification.requestPermission();
}
scheduleDailyNotification();
}).catch(()=>{});
}
