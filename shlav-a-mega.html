}

// Topic tagging runs inside initApp() after QZ is loaded
function getTopicStats(){
const st={};
Object.entries(S.sr).forEach(([idx,d])=>{
const q=QZ[idx];if(!q)return;
const ti=q.ti||0;
if(!st[ti])st[ti]={ok:0,no:0,tot:0};
st[ti].tot++;
if(d.n>0)st[ti].ok++;else st[ti].no++;
});
return st;
}

let NOTES=[]; // loaded from notes.json
let DRUGS=[]; // loaded from drugs.json
let FLASH=[]; // loaded from flashcards.json
let _dataReady=false; // guard: render() is a no-op until initApp() resolves

// ===== STATE =====
const LS='samega';
let S=JSON.parse(localStorage.getItem(LS)||'null')||{ck:{},qOk:0,qNo:0,bk:{},notes:{},sr:{},fci:0,fcFlip:false,streak:0,lastDay:null};
if(!S.streak)S.streak=0;if(!S.lastDay)S.lastDay=null;
let _saveTimer;function save(){clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>localStorage.setItem(LS,JSON.stringify(S)),150)}
(function updateStreak(){
const today=new Date().toISOString().slice(0,10);
if(S.lastDay===today)return;
const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
if(S.lastDay===yest)S.streak++;
else if(S.lastDay!==today)S.streak=1;
S.lastDay=today;save();
})();

// ===== SPACED REP =====
function srScore(qIdx,correct){
if(!S.sr[qIdx])S.sr[qIdx]={ef:2.5,n:0,next:0};
const s=S.sr[qIdx];
const q=correct?4:1;
s.ef=Math.max(1.3,s.ef+(.1-(5-q)*(.08+(5-q)*.02)));
s.n=correct?s.n+1:0;
const days=s.n<=1?1:s.n===2?3:Math.round((s.n-1)*s.ef);
s.next=Date.now()+days*86400000;
save();
}
function getDueQuestions(){
const now=Date.now();
return Object.entries(S.sr).filter(([k,v])=>v.next<=now).map(([k])=>parseInt(k)).slice(0,20);
}

// ===== QUIZ ENGINE =====
let qi=0,sel=null,ans=false,pool=[],filt='all',topicFilt=-1,examMode=false,examTimer=null,examSec=0;
function buildPool(){
if(filt==='weak'){
const ts=getTopicStats();
const weakTopics=TOPICS.map((_,i)=>({i,s:ts[i]||{ok:0,no:0,tot:0}})).filter(p=>p.s.tot>=3).sort((a,b)=>{const pa=a.s.tot?a.s.ok/a.s.tot:0,pb=b.s.tot?b.s.ok/b.s.tot:0;return pa-pb;}).slice(0,10).map(p=>p.i);
if(weakTopics.length===0){pool=QZ.map((_,i)=>i);}else{pool=QZ.map((_,i)=>i).filter(i=>weakTopics.includes(QZ[i].ti));}
for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
qi=0;return;}
if(filt==='due'){pool=getDueQuestions();qi=0;return;}

pool=[];
const due=getDueQuestions();
if(filt==='due'){pool=due.length?due:[];}
else if(filt==='topic'&&topicFilt>=0){QZ.forEach((q,i)=>{if(q.ti===topicFilt)pool.push(i)});}
else{QZ.forEach((q,i)=>{if(filt==='all'||q.t.includes(filt))pool.push(i)});}
for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
qi=0;sel=null;ans=false;
}
// buildPool() deferred to initApp()

function setFilt(f){filt=f;topicFilt=-1;buildPool();render()}
function setTopicFilt(ti){filt='topic';topicFilt=ti;buildPool();render()}
function pick(i){if(ans)return;sel=i;render()}
function check(){
if(sel===null)return;ans=true;
const q=QZ[pool[qi]];
if(sel===q.c){S.qOk++;srScore(pool[qi],true);}
else{S.qNo++;srScore(pool[qi],false);}
save();render();
}
function next(){
if(examMode&&qi+1>=Math.min(pool.length,150)){endExam();return;}
qi++;if(qi>=pool.length)qi=0;sel=null;ans=false;render();
}
function toggleBk(){S.bk[pool[qi]]=!S.bk[pool[qi]];save();render();}

// ===== EXAM MODE =====
function startExam(){
examMode=true;filt='all';buildPool();pool=pool.slice(0,150);
S.qOk=0;S.qNo=0;examSec=10800;save();
examTimer=setInterval(()=>{examSec--;if(examSec<=0)endExam();
const el=document.getElementById('etimer');if(el)el.textContent=fmtT(examSec);},1000);
render();
}
function endExam(){
clearInterval(examTimer);examMode=false;
const tot=S.qOk+S.qNo,pct=tot?Math.round(S.qOk/tot*100):0;
alert(`Exam Complete!\n\n✅ ${S.qOk}/${tot} (${pct}%)\n${pct>=60?'PASS 🎉':'NEEDS WORK ❌'}\n\nTime: ${fmtT(10800-examSec)}`);
render();
}
function fmtT(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return(h?h+':':'')+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0')}

}

let rvQueue=[],rvIdx=0,rvSel=null,rvAns=false;

function startReview(){
rvQueue=getDueOrdered();rvIdx=0;rvSel=null;rvAns=false;
render();
}
function rvPick(i){if(rvAns)return;rvSel=i;render();}
function rvCheck(){
if(rvSel===null)return;rvAns=true;
const qIdx=rvQueue[rvIdx];const q=QZ[qIdx];
const correct=rvSel===q.c;
srScore(qIdx,correct);
S.srSess.reviewed++;if(correct)S.srSess.correct++;
save();render();
}
function rvNext(){
rvIdx++;rvSel=null;rvAns=false;
if(rvIdx>=rvQueue.length){rvQueue=[];rvIdx=0;}
render();
}
function fmtNext(ms){
const diff=ms-Date.now();if(diff<=0)return'now';
const h=Math.floor(diff/3600000);const d=Math.floor(diff/86400000);
if(d>=1)return d===1?'tomorrow':`in ${d} days`;
if(h>=1)return`in ${h}h`;
return'soon';
}
function renderReview(){
const sess=S.srSess;
const retPct=sess.reviewed?Math.round(sess.correct/sess.reviewed*100):0;
const dueQueue=getDueOrdered();
const totalDue=dueQueue.length;
let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
<div class="sec-t">🔄 Review</div>
<button class="btn btn-o" style="font-size:10px;padding:5px 12px" onclick="go('quiz')">← Back to Quiz</button>
</div>`;
// Session stats header
h+=`<div class="stats">
<div class="stat"><div class="n" style="color:rgb(var(--sky))">${sess.reviewed}</div><div class="l">Reviewed</div></div>
<div class="stat"><div class="n" style="color:rgb(var(--em))">${sess.correct}</div><div class="l">Correct</div></div>
<div class="stat"><div class="n" style="color:${retPct>=70?'rgb(var(--em))':retPct>=50?'rgb(var(--amb))':'rgb(var(--red))'}">
${sess.reviewed?retPct+'%':'—'}</div><div class="l">Retention</div></div>
<div class="stat"><div class="n" style="color:rgb(var(--amb))">${totalDue}</div><div class="l">Due</div></div>
</div>`;
// No due cards — empty state
if(totalDue===0&&rvQueue.length===0){
// find next due time
let nextTs=null;
Object.values(S.sr).forEach(s=>{if(nextTs===null||s.next<nextTs)nextTs=s.next;});
const nextStr=nextTs&&nextTs>Date.now()?fmtNext(nextTs):'No cards scheduled yet.';
h+=`<div class="card" style="padding:36px 20px;text-align:center">
<div style="font-size:40px;margin-bottom:12px">🎉</div>
<div style="font-weight:700;font-size:15px;margin-bottom:6px">All caught up!</div>
<div class="rev-sub" style="margin-bottom:16px">No cards due for review right now.</div>
${nextTs&&nextTs>Date.now()?`<div class="rev-next-info">Next review: <b>${nextStr}</b></div>`:'<div class="rev-next-info">Answer some quiz questions to build your review queue.</div>'}
</div>`;
if(sess.reviewed>0)h+=`<div class="card" style="padding:14px;text-align:center;margin-top:10px">
<div class="rev-sub">Session complete · ${sess.reviewed} reviewed · ${retPct}% correct</div></div>`;
return h;
}
// Queue not started yet — show start screen
if(rvQueue.length===0){
h+=`<div class="card" style="padding:24px;text-align:center">
<div style="font-size:32px;margin-bottom:10px">📚</div>
<div style="font-weight:700;font-size:14px;margin-bottom:6px">${totalDue} card${totalDue!==1?'s':''} due for review</div>
<div class="rev-sub" style="margin-bottom:16px">Sorted by most overdue first. Answer to update your schedule.</div>
<button class="btn btn-p" onclick="startReview()">Start Review Session</button>
</div>`;
return h;
}
// Queue in progress but exhausted
if(rvIdx>=rvQueue.length){
h+=`<div class="card" style="padding:36px 20px;text-align:center">
<div style="font-size:40px;margin-bottom:12px">✅</div>
<div style="font-weight:700;font-size:15px;margin-bottom:6px">Session complete!</div>
<div class="rev-sub" style="margin-bottom:16px">${sess.reviewed} reviewed · ${sess.correct} correct · ${retPct}% retention</div>
${dueQueue.length>0?`<button class="btn btn-p" onclick="startReview()" style="margin-right:8px">Review New Due Cards</button>`:''}
<button class="btn btn-o" onclick="go('quiz')">Back to Quiz</button>
</div>`;
return h;
}
// Active question
const qIdx=rvQueue[rvIdx];const q=QZ[qIdx];
if(!q){rvNext();return renderReview();}
const topicName=q.ti>=0&&TOPICS[q.ti]?TOPICS[q.ti]:'';
const srState=S.sr[qIdx]||{ef:2.5,n:0,next:0};
// Progress bar
h+=`<div class="progress-bar"><div class="fill" style="width:${Math.round(rvIdx/rvQueue.length*100)}%"></div></div>`;
h+=`<div class="rev-sub" style="font-size:10px;text-align:right;margin-bottom:8px">${rvIdx+1} / ${rvQueue.length}</div>`;
h+=`<div class="card" style="padding:16px">`;
h+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">
<span class="rev-badge-ch">${sanitize(q.t)}</span>
${topicName?`<span class="rev-badge-topic">${sanitize(topicName)}</span>`:''}
<span class="rev-badge-rep">Rep #${srState.n}</span>
</div>`;
h+=`<p class="heb" style="font-size:13px;font-weight:700;line-height:1.7;margin-bottom:16px">${sanitize(q.q)}</p>`;
q.o.forEach((o,i)=>{
let cls='qo';
if(rvAns){cls+=' lk';if(i===q.c)cls+=' ok';else if(i===rvSel)cls+=' no';else cls+=' dim';}
else if(i===rvSel)cls+=' sel';
h+=`<button class="${cls}" onclick="rvPick(${i})">${sanitize(o)}</button>`;
});
h+=`<div style="display:flex;gap:6px;margin-top:14px">`;
if(!rvAns){
h+=`<button class="btn btn-p" onclick="rvCheck()"${rvSel===null?' disabled':''}>בדוק</button>`;
}else{
const correct=rvSel===q.c;
const newSr=S.sr[qIdx];
h+=`<button class="btn btn-d" onclick="rvNext()">${rvIdx+1>=rvQueue.length?'Finish':'Next →'}</button>`;
h+=`<span class="rev-ans-info">
${correct?'<span style="color:rgb(var(--em))">✓ Correct</span>':'<span style="color:rgb(var(--red))">✗ Incorrect</span>'}
· Next review: ${newSr?fmtNext(newSr.next):'tomorrow'}
</span>`;
}
h+=`</div>`;
if(rvAns){
if(q.e){
h+=`<div class="explain-box-q"><div style="font-weight:700;margin-bottom:4px">💡 Explanation</div>${sanitize(q.e)}</div>`;
}
const note=q.ti>=0&&NOTES[q.ti]?NOTES[q.ti]:null;
if(note){
const correctText=q.o[q.c];
const sentences=note.notes.split(/\.\s+/);
const relevant=sentences.filter(s=>s.length>20).filter(s=>{
const sl=s.toLowerCase(),ql=q.q.toLowerCase(),cl=correctText.toLowerCase();
return cl.split(/\s+/).filter(w=>w.length>3).some(w=>sl.includes(w.toLowerCase()))||ql.split(/\s+/).filter(w=>w.length>4).some(w=>sl.includes(w.toLowerCase()));
}).slice(0,2);
h+=`<div class="explain-box" style="margin-top:10px;padding:10px 12px">
<div style="font-weight:700;margin-bottom:4px">💡 ${sanitize(note.topic)}</div>`;
if(relevant.length)h+=`<div>${sanitize(relevant.join('. '))}.</div>`;
else h+=`<div class="rev-sub" style="font-style:italic">Correct: <b>${sanitize(correctText)}</b></div>`;
h+=`</div>`;
}
}
h+=`</div>`;
return h;
}

// Async app initialization
async function initApp(){
  const loader=document.getElementById('app-loader');
  try{
    const [qd,nd,fd,dd]=await Promise.all([
      fetch('questions.json').then(r=>{if(!r.ok)throw new Error('questions');return r.json();}),
      fetch('notes.json').then(r=>{if(!r.ok)throw new Error('notes');return r.json();}),
      fetch('flashcards.json').then(r=>{if(!r.ok)throw new Error('flashcards');return r.json();}),
      fetch('drugs.json').then(r=>{if(!r.ok)throw new Error('drugs');return r.json();}),
    ]);
    QZ=qd;NOTES=nd;FLASH=fd;DRUGS=dd;
    // Tag topics now that QZ is loaded
    QZ.forEach(q=>{const txt=(q.q+' '+q.o.join(' ')).toLowerCase();let best=-1,mx=0;TK.forEach((keys,ti)=>{let sc=0;keys.forEach(k=>{if(txt.includes(k.toLowerCase()))sc++;});if(sc>mx){mx=sc;best=ti;}});q.ti=best>=0?best:8;});
    buildPool();const hdrSub=document.getElementById("hdr-sub");if(hdrSub)hdrSub.textContent="SZMC · "+QZ.length+" Qs · Hazzard's 8e + Harrison's 22e · Syllabus P005-2026";
    _dataReady=true;
    if(loader)loader.remove();
    renderTabs();render();
  }catch(e){
    if(loader)loader.innerHTML='<div style="text-align:center;padding:48px 24px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:15px;font-weight:700;margin-bottom:8px">Failed to load question bank</div><div style="font-size:12px;color:#64748b;margin-bottom:20px">'+sanitize(e.message)+'</div><button onclick="location.reload()" style="padding:10px 24px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">Retry</button></div>';
  }
}
initApp();
</script>
