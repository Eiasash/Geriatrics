<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sky:59 130 246;--em:16 185 129;--sl8:30 41 59;--red:239 68 68;--amb:245 158 11}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#1e293b;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.heb{font-family:'Heebo',sans-serif;direction:rtl;text-align:right}
button{cursor:pointer;border:none;background:none;font:inherit}
input,textarea,select{font:inherit}
.hdr{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:10px 16px;position:sticky;top:0;z-index:40}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:-.5px}
.hdr p{font-size:10px;color:#64748b;margin-top:1px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.06);padding-bottom:max(4px,env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:0 0 auto;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 6px 6px;transition:.15s;font-size:10px;font-weight:600}
.tabs button.on{color:rgb(var(--sky))}
.tabs button:not(.on){color:#94a3b8}
.tabs .ic{font-size:18px}
.ct{max-width:640px;margin:0 auto;padding:12px 12px 80px}
.card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;margin-bottom:10px}
.pill{display:inline-block;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;transition:.15s;cursor:pointer}
.pill.on{background:rgb(var(--sky));color:#fff;box-shadow:0 2px 6px rgba(59,130,246,.25)}
.pill:not(.on){background:#fff;color:#64748b;border:1px solid #e2e8f0}
.qo{width:100%;text-align:right;padding:12px 14px;border-radius:12px;border:2px solid #e2e8f0;font-size:12px;line-height:1.6;transition:.15s;margin-bottom:6px;font-family:'Heebo',sans-serif;display:block}
.qo:not(.lk):hover{border-color:#bae6fd;background:#f0f9ff}
.qo.sel{border-color:rgb(var(--sky));background:#eff6ff}
.qo.ok{border-color:rgb(var(--em));background:#ecfdf5;color:#065f46}
.qo.no{border-color:rgb(var(--red));background:#fef2f2;color:#991b1b}
.qo.dim{border-color:#f1f5f9;color:#cbd5e1}
.btn{padding:7px 18px;border-radius:12px;font-size:12px;font-weight:700;transition:.15s;display:inline-block}
.btn:disabled{opacity:.35}
.btn-p{background:rgb(var(--sky));color:#fff}
.btn-d{background:rgb(var(--sl8));color:#fff}
.btn-g{background:rgb(var(--em));color:#fff}
.btn-o{background:#f1f5f9;color:#475569}
.ab{max-height:0;overflow:hidden;transition:max-height .3s ease}.ab.op{max-height:5000px}
.acc-h{width:100%;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;text-align:left;transition:.1s}
.acc-h:hover{background:#f8fafc}
.acc-ic{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.acc-ar{font-size:10px;color:#94a3b8;transition:transform .2s}
.acc-ar.op{transform:rotate(180deg)}
.stats{display:flex;gap:6px;margin-bottom:12px}
.stat{flex:1;background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:10px 8px;text-align:center}
.stat .n{font-size:20px;font-weight:700}
.stat .l{font-size:9px;color:#64748b;text-transform:uppercase;font-weight:600;letter-spacing:.5px;margin-top:2px}
.fc{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:24px 20px;min-height:180px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;transition:.2s;user-select:none}
.fc:active{transform:scale(.98)}
.search-box{width:100%;border:1px solid #e2e8f0;border-radius:12px;padding:8px 12px;font-size:12px;margin-bottom:12px}
.search-box:focus{outline:none;border-color:rgb(var(--sky));box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.timer{font-variant-numeric:tabular-nums;font-family:'Inter',monospace}
.ck{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;border:1px solid #e2e8f0;font-size:11px;cursor:pointer;margin-bottom:5px}
.ck:hover{background:#f8fafc}
.ck.done span{text-decoration:line-through;color:#94a3b8}
.topic{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;font-size:11px;cursor:pointer;transition:.1s}
.topic:hover{background:#f1f5f9}
.topic.done{background:#ecfdf5;border:1px solid #a7f3d0}
.drug-row{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:11px}
.drug-row:last-child{border:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.badge-r{background:#fef2f2;color:#dc2626}
.badge-y{background:#fffbeb;color:#d97706}
.badge-g{background:#ecfdf5;color:#059669}
.calc-in{width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;margin-bottom:8px}
.calc-in:focus{outline:none;border-color:rgb(var(--sky))}
.sec-t{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:3px}
.sec-s{font-size:10px;color:#64748b;margin-bottom:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
@media(min-width:768px){.ct{padding:20px 16px 88px;max-width:800px}.tabs button{min-width:64px;font-size:11px}.hdr h1{font-size:18px}}
@media(min-width:1024px){.ct{max-width:900px}.card{padding:16px}}
.dark{background:#0f172a;color:#e2e8f0}
.dark .card{background:#1e293b;border-color:#334155}
.dark .hdr{background:linear-gradient(135deg,#020617,#0f172a)}
.dark .tabs{background:#1e293b;border-color:#334155}
.dark .tabs button:not(.on){color:#64748b}
.dark .pill:not(.on){background:#1e293b;color:#94a3b8;border-color:#334155}
.dark .qo{border-color:#334155;color:#e2e8f0}
.dark .qo:not(.lk):hover{border-color:#1d4ed8;background:#172554}
.dark .qo.sel{border-color:rgb(var(--sky));background:#1e3a5f}
.dark .qo.dim{border-color:#1e293b;color:#475569}
.dark .search-box{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .stat{background:#1e293b;border-color:#334155}
.dark .fc{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .acc-h:hover{background:#1e293b}
.dark .calc-in{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .ck{border-color:#334155;color:#e2e8f0}
.dark .drug-row{border-color:#334155}
.dark .topic{color:#e2e8f0}
.dark .topic.done{background:#064e3b;border-color:#059669}
.dark .sec-t{color:#f1f5f9}
.dark .sec-s{color:#94a3b8}
.dark .btn-o{background:#334155;color:#e2e8f0}
.dm-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;padding:4px;opacity:.7}
@keyframes fadeIn{from{opacity:.6}to{opacity:1}}
.fade-in{animation:fadeIn .15s ease}
.tabs button{min-height:44px}
.qo{min-height:44px;display:flex;align-items:center}
.ck{min-height:44px}
.topic{min-height:44px}
.pill{min-height:32px;display:inline-flex;align-items:center}
.btn:active{transform:scale(.96)}
.qo:active:not(.lk){transform:scale(.99)}
.stat .l{font-size:10px}
.badge{font-size:10px}
.hdr p{font-size:11px}
.progress-bar{height:3px;background:#e2e8f0;border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-bar .fill{height:100%;background:rgb(var(--sky));border-radius:2px;transition:width .3s ease}
.dark .progress-bar{background:#334155}
.dark .qo.ok{border-color:rgb(var(--em));background:#064e3b;color:#a7f3d0}
.dark .qo.no{border-color:rgb(var(--red));background:#450a0a;color:#fca5a5}
.dark .qo.dim{border-color:#1e293b;color:#475569}
.dark .drug-row{border-color:#334155;color:#e2e8f0}
.dark .badge-r{background:#450a0a;color:#fca5a5}
.dark .badge-y{background:#451a03;color:#fde68a}
.dark .badge-g{background:#064e3b;color:#6ee7b7}
.dark .ck:hover{background:#1e293b}
.dark .topic:hover{background:#334155}
.dark .osce-scenario{background:#1e293b !important;border-color:#334155 !important}
.dark .calc-result{background:#1e293b !important}
.dark a{color:#60a5fa}
.dark .explain-box{background:#064e3b !important;border-color:#059669 !important;color:#a7f3d0 !important}
.dark .tag-topic{background:#064e3b !important;color:#6ee7b7 !important}
.dark .tag-year{background:#1e3a5f !important;color:#93c5fd !important}
.streak-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.dark .streak-badge{background:#451a03;border-color:#92400e}
@media print{.tabs,.hdr,.dm-btn,button{display:none !important}.ct{padding:0;max-width:100%}.card{break-inside:avoid;border:1px solid #ccc;margin-bottom:8px}.ab{max-height:none !important}.stat,.stats{break-inside:avoid}body{background:#fff;color:#000;font-size:12pt}}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.share-btn{font-size:13px;padding:2px 6px;opacity:.5;cursor:pointer;border:none;background:none}
.share-btn:hover{opacity:1}
.empty{text-align:center;padding:32px 16px;color:#94a3b8;font-size:12px;line-height:1.7}

/* ===== BLIND RECALL BLUR ===== */
.qo-blur{filter:blur(8px);transition:filter .25s ease;user-select:none}
.qo-blur:active,.qo-blur:focus,.qo-blur.revealed{filter:none}
.qo-blur::after{content:'Tap to reveal';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;color:#94a3b8;pointer-events:none;opacity:.9}
.qo{position:relative}

/* ===== SUDDEN DEATH ===== */
.sudden-death-banner{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff;padding:10px 14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;animation:pulse-red 2s infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.leaderboard-row{display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #f1f5f9;font-size:11px}
.dark .leaderboard-row{border-color:#334155}

/* ===== POMODORO ===== */
.pomo-bar{position:fixed;top:0;left:0;right:0;height:4px;background:#e2e8f0;z-index:60}
.pomo-bar .pomo-fill{height:100%;background:rgb(var(--em));transition:width 1s linear}
.pomo-overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;backdrop-filter:blur(6px)}
.pomo-overlay h2{font-size:24px;margin-bottom:8px}
.pomo-overlay .pomo-break-timer{font-size:64px;font-weight:700;font-variant-numeric:tabular-nums}

/* ===== WARD FAB ===== */
.ward-fab{position:fixed;bottom:72px;right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(220,38,38,.35);z-index:45;cursor:pointer;transition:.2s;border:none}
.ward-fab:active{transform:scale(.92)}
.ward-modal{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.ward-sheet{background:#fff;width:100%;max-width:640px;max-height:85vh;border-radius:20px 20px 0 0;overflow-y:auto;padding:20px 16px 32px;animation:slideUp .25s ease}
.dark .ward-sheet{background:#1e293b;color:#e2e8f0}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ward-pill{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;transition:.15s}
.ward-pill.on{background:rgb(var(--red));color:#fff;border-color:rgb(var(--red))}
.dark .ward-pill{border-color:#334155}

/* ===== MED BASKET ===== */
.med-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;background:#eff6ff;color:#1d4ed8;cursor:pointer;border:1px solid #bfdbfe;margin:2px}
.med-chip .x{font-size:12px;font-weight:700;margin-left:2px;opacity:.6}
.med-chip .x:hover{opacity:1}
.dark .med-chip{background:#1e3a5f;color:#93c5fd;border-color:#1e40af}
.acb-meter{height:10px;border-radius:5px;background:#e2e8f0;overflow:hidden;margin:6px 0}
.acb-meter .acb-fill{height:100%;border-radius:5px;transition:width .3s}

/* ===== DECISION TREE ===== */
.dt-node{padding:12px;border-radius:12px;border:2px solid #e2e8f0;margin-bottom:8px;cursor:pointer;transition:.15s;font-size:12px}
.dt-node:hover{border-color:rgb(var(--sky))}
.dt-node.active{border-color:rgb(var(--em));background:#ecfdf5}
.dt-node.inactive{opacity:.4}
.dark .dt-node{border-color:#334155}
.dark .dt-node.active{border-color:#059669;background:#064e3b}
.dt-result{padding:14px;border-radius:12px;border:2px solid rgb(var(--em));background:#ecfdf5;font-size:12px;line-height:1.7}
.dark .dt-result{background:#064e3b;border-color:#059669;color:#a7f3d0}

/* ===== LAB OVERLAY ===== */
.lab-modal{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.lab-sheet{background:#fff;width:calc(100% - 24px);max-width:600px;max-height:85vh;border-radius:20px;overflow-y:auto;padding:20px 16px;animation:fadeIn .2s ease}
.dark .lab-sheet{background:#1e293b;color:#e2e8f0}
.range-bar{height:8px;border-radius:4px;background:#e2e8f0;position:relative;margin:8px 0}
.range-bar .normal{position:absolute;height:100%;background:#bbf7d0;border-radius:4px}
.range-bar .marker{position:absolute;width:3px;height:16px;top:-4px;background:#1e293b;border-radius:2px}
.dark .range-bar{background:#334155}
.dark .range-bar .marker{background:#f1f5f9}
.frailty-slider{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(to right,#bbf7d0,#fde68a,#fecaca);outline:none}
.frailty-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#1e293b;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.dark .frailty-slider::-webkit-slider-thumb{background:#e2e8f0;border-color:#334155}

/* ===== CHEAT SHEET ===== */
.aging-row{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid #f1f5f9;font-size:10px}
.aging-row .cell{padding:8px 10px;line-height:1.5}
.aging-row .normal-cell{background:#f0fdf4;color:#166534}
.aging-row .path-cell{background:#fef2f2;color:#991b1b}
.dark .aging-row{border-color:#334155}
.dark .aging-row .normal-cell{background:#064e3b;color:#6ee7b7}
.dark .aging-row .path-cell{background:#450a0a;color:#fca5a5}

/* ===== DISTRACTOR AUTOPSY ===== */
.distractor-highlight{border:2px solid #f59e0b !important;background:#fffbeb !important;position:relative}
.distractor-highlight::before{content:'🔍';position:absolute;top:-8px;right:-8px;font-size:14px}
.dark .distractor-highlight{background:#451a03 !important;border-color:#d97706 !important}

/* ===== SPEECH BUTTON ===== */
.speech-btn{font-size:18px;padding:4px;opacity:.5;cursor:pointer;border:none;background:none;transition:.15s}
.speech-btn:hover,.speech-btn.speaking{opacity:1}
.speech-btn.speaking{animation:pulse-speak 1s infinite}
@keyframes pulse-speak{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ===== ROI SCATTER ===== */
.roi-grid{position:relative;width:100%;aspect-ratio:1.4;border-left:2px solid #64748b;border-bottom:2px solid #64748b;margin:12px 0}
.roi-dot{position:absolute;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;cursor:pointer;transition:.2s;border:2px solid rgba(255,255,255,.8);text-align:center;line-height:1.1;overflow:hidden}
.roi-dot:hover{transform:scale(1.3);z-index:5}
.roi-label{position:absolute;font-size:9px;color:#64748b;font-weight:600}

/* ===== VOICE PARSER ===== */
.voice-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;cursor:pointer}
.voice-btn.listening{background:#dc2626;color:#fff;animation:pulse-red 1.5s infinite}
.dark .voice-btn{background:#450a0a;border-color:#7f1d1d}

/* Night/Study Mode */
body.study{background:#1a1008;color:#e8d5b0}
body.study .card{background:#221508;border-color:#3d2a12}
body.study .hdr{background:linear-gradient(135deg,#0d0804,#1a1008)}
body.study .tabs{background:#221508;border-color:#3d2a12}
body.study .tabs button:not(.on){color:#a08060}
body.study .pill:not(.on){background:#221508;color:#a08060;border-color:#3d2a12}
body.study .qo{border-color:#3d2a12;color:#e8d5b0;background:#221508}
body.study .qo:not(.lk):hover{border-color:#7a5c30;background:#2a1e0d}
body.study .qo.sel{border-color:#c48a3a;background:#2a1e0d}
body.study .search-box,body.study .calc-in{background:#221508;border-color:#3d2a12;color:#e8d5b0}
body.study .stat{background:#221508;border-color:#3d2a12}
body.study .fc{background:#221508;border-color:#3d2a12;color:#e8d5b0}
body.study .sec-t{color:#e8d5b0}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.chat-msg-user{background:#eff6ff;border-radius:12px 12px 2px 12px;padding:8px 12px;font-size:12px;align-self:flex-end;max-width:85%}
.chat-msg-ai{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px 12px 12px 2px;padding:8px 12px;font-size:12px;align-self:flex-start;max-width:90%;white-space:pre-wrap;line-height:1.6}

<script>
const QZ=[{"q":"מה היעילות של טיפול תרופתי באי ספיקת לבHFpEF ?","o":["כל חוסמי הבטא הוכחו כמפחיתים תמותה ( class effect )","טיפול ב- DIGOXIN הוכח כמפחית אשפוזים, אך לא מפחית תמותה","טיפול ב- FUROSEMIDE הוכח כמפחית אשפוזים ומאריך חיים","מעכבי SGLT2 הוכחו כמפחיתים תמותה בחולי סוכרת בלבד"],"c":1,"t":"2022"},{"q":"בן88, עצמאי בתפקודו ושמור קוגניטיבית, מבצע פעילות גופנית, גר בבית עם אשתו ללא מחלות רקע משמעותיות וללא טיפול תרופתי קבוע. . פנה למוקד רפואי בקהילה עקב חום ושיעול. סימנים חיוניים: חום 38, דופק88 לדקה, לחץ דם80 \\\\130, נשימות16בדקה בבדיקה ערני, נינוח, ללא דליריום, בהאזנה לריאות קריפיטציות משמאל. בדיקות מעבדה- המוגלובין תקין, ללא לויקוציטוזיס, תפקודי כליה תקינים, CRP -30 . בצילום חזה– תסנין משמאל החולה מבקש לקבל טיפול בביתו ולא באשפוז. איזה טיפול אנטיביוטי אפשר לרשום לחולה זה בבית?","o":["Clavulanic Acid+Amoxicillin ( אוגמנטין","Cefuroxime ( זינט","Cefuroxime ( זינטClindamycin ( דלצין","Cefuroxime ( זינט+ Azithromycin ( אזניל"],"c":3,"t":"2022"},{"q":"בת75 , ברקע דמנציה, דיכאון, סוכרת, יתר לחץ דם ואוסטאוארטריטיסהתקבלה למחלקה לרפואה דחופה עקב החמרה בתפקודי כליה. בבדיקות המעבדה נמצאה אי ספיקה כלייתית עם קריאטינין 2.3 ו- BUN -70. בבדיקה לפני חצי שנה- קריאטינין 1.2 ו- BUN תקין מתוך כל התרופות שלקחה בביתה – כולן יכולות לגרום לאי ספיקה כלייתית חדה פרט ל-","o":["Etoricoxib ( ארקוקסיה","Empagliflozin ( ג'רדיינס","Candesartan ( אטקנד","Ecitralopam (ציפרלקס)"],"c":3,"t":"2022"},{"q":"בן81 מתקבל להערכה לפני ניתוח החלפה שלמה של מפרק ירך עקב אוסטאוארתריטיס קשה. מתלונן על ירידה תפקודית המגבילה את יכולתו ללכת ללא עזרה. ברקע – יתר לחץ דם, סוכרת, היפרליפידמיה, אי ספיקת כליות כרונית, אוסטאוארתריטיס. בתרופותיו – Insulin, Atorvastatin, Paracetamol . בבדיקה גופנית ישנה הגבלת בטווחי תנועה בירך אק\\\"ג – תמונה מספר 1 מה נדרש כחלק מהברור וההכנה הקרדיאלית לניתוח","o":["אין צורך בבירור קרדיאלי נוסף לפני ניתוח זה","יש צורך מבחן מאמץ על הליכון חשמלי או אופני כושר","יש צורך צנתור קורונרי לאחר הכנה כילייתית","יש צורך מבחן מאמץ פרמקולוגי עם הדמיה כגון אקו דובוטמין"],"c":3,"t":"2022"},{"q":"בן82, ברקע יל״ד מאוזן תרופתית. מאושפז בטיפול נמרץ בשל ספסיס על רקע דלקת ריאות. הוא מונשם, לאחר שלושה ניסיונות גמילה שלא צלחו. מעוניינים להתקדם לביצוע טרכאוסטומיה. המטופל אינו מסוגל להביע דעתו, אך יש ברשותו מספר מסמכים משפטיים שכולם תקינים ובתוקף. מה סוג המסמך שיש להפעיל במצבו הנוכחי?","o":["יפוי כח מתמשך","יפוי כח לפי חוק החולה הנוטה למות","הנחיות מקדימות לפי חוק החולה הנוטה למות","תעודת רופא לאפוטרופסות"],"c":0,"t":"2022"},{"q":"בן85 מאושפז בטיפול נמרץ לאחר ניתוח החלפת מסתם אאורטלי. במהלך האשפוז סבל מספסיס. בבדיקות המעבדה נצפתה ירידה בטסיות מ- 247,000 בקבלתו לטיפול נמרץ ל- באבחנה מבדלת הועלתה אפשרות שלHIT- Heparin Induced Thrombocytopenia . איזה ממצא יתאים לאבחנה זו","o":["PTT מאורך","ירידה בטסיות 48 שעות לאחר התחלת טיפול ב- Heparin","ממצא של DVT חדש","בדיקת דם חיובית ל- anti IIb/IIIa antibodies"],"c":2,"t":"2022"},{"q":"מי מהחולים הבאים יפיק תועלת מבדיקת הסקר לממאירות","o":["בדיקת סקר לערמונית לגבר בן 90, עצמאי ושמור קוגניטיבית","בדיקת סקר ללבלב, לגבר בן 65, בריא, ששני הוריו נפטרו מהמחלה","בדיקת סקר לשד, לאישה בת 72 ,ברקע סוכרתאינה נשאית גן BRCA","בדיקת סקר למעי גס, לאישה בת 77, עם אי ספיקת לב סופניתעל רקע מחלת לב איסכמית"],"c":2,"t":"2022"},{"q":"בן80, המוכר כסובל מדמנציה, אושפז במחלקה פנימית. הוא עבר אבחון גריאטרי בקהילה לפני חודש. נמצא MMSE 18/30, והוזמן גריאטר כדי להגדירו כ\\\"תשוש נפש\\\" לצורך סידור מוסדי. באיזה מצב ניתן להגדיר את המטופל כ\\\"תשוש נפש\\\"?","o":["המטופל מרותק למיטה, לא שולט על סוגרים, צועק ביום ובלילה, נזקק לטיפול בתכשירים אנטי-פסיכוטיים","המטופל מתהלך, מסרב להתקלח, יוצא מהמחלקה ולא יודע לחזור","המטופל מתהלך, שולט על סוגרים, משתף פעולה בטיפול, לא מתמצא בזמן ובמקום, מסכים לעבור למסגרת מוסדית","למטופל החמרה חריפה במצבו הקוגניטיבי עם הזיות ראיה"],"c":1,"t":"2022"},{"q":"בן80 פלוני אלמוני הובא למחלקה לרפואה דחופה לאחר נפילה ברחוב. לא ידוע שום רקע רפואי אך בתיקו נמצאו כדורי PREDNISONE 5 מ\\\" ג ועט אינסולין LANTUS . סימנים חיוניים- דופק 130 לדקה לחץ דם90/60 סטורציה92 ללא חום בבדיקה גופנית- השמנה מרכזית, חיוורון, עור עם שטפי דם מרובים, רגל ימין ב- LATERAL ROTATION נפוחה עם רגישות בסובך רמת גלוקוז בדם בסטיק 160 מג. אובחן שבר פרה-טרוכנטרי. מה הצעד הטיפולי הבא הנדרש:","o":["לתת 2 מנות דם מסוגO ללא הצלבה ו6 מנות טסיות","מתן אינסולין קצר טווח","מתן SC CLEXAN במינון80 מ\\\"ג","מתן HYDROCORTISONE תוך ורידי"],"c":3,"t":"2022"},{"q":"מה נכון לגבי הטיפול ב- Idiopathic Pulmonary Fibrosis ?","o":["רוב החולים מגיבים זמנית לטיפול בסטרואידים במינון גבוה","הטיפול בשילוב של סטרואידים, azathioprine ו- N-acetylcysteine הוכח כמפחית אשפוזים אך לא כמאריך תוחלת חיים","הטיפול ב- pirfenidone משפר איכות חיים אך ללא השפעה משמעותית על מהלך","יש לשלב טיפול פליאטיבי משלב מוקדם של המחלה"],"c":3,"t":"2022"},{"q":"מטופל בן80, מועמד לניתוח החלפה אלקטיבית של פרק ברך עקב אוסטאוארטריטיס מתקדם. מקבל טיפול קבוע ב- CLOPIDIGREL עקב אוטם שריר הלב והכנסת STENT לפני שנתיים מה ההתייחסות לטיפול ב- CLPIDOGREL כהכנה לניתוח","o":["יש להפסיק טיפול ב CLOPIDOGREL 5-7 ימים לפני הניתוח למניעת דמם","יש להפסיק טיפול ב- CLOPIDOGREL שבוע לפני הניתוח ולתת טיפול חלופי ב- ENOXAPARIN ( קלקסן","אין צורך להפסיק את הטיפול. מדובר בניתוח שניתן לבצע תחת נוגדי טסיות","יש להפסיק CLOPIDOGREL רק אם הניתוח מבוצע בהרדמה ספינלית"],"c":0,"t":"2022"},{"q":"בת86, תשושה בתפקודה וסובלת מירידה קוגניטיבית קלה. מתגוררת בביתה עם עזרה של \\\"חוק סיעוד\\\". הגיעה למרפאה נפרולוגית למעקב עקב אי ספיקה כלייתית מתקדמת עם CCT-15 מ\\\"ל/דקה מה הקשר האפשרי בין שבריריות (FRAILTY) לאיספיקה כלייתית?","o":["היות והשבריריות היא משנית לאורמיה התחלה מוקדמת של דיאליזה תשפר את מצבה","חולים שבריריים נוטים להגיע מאוחר לדיאליזה מחשש להחמרה במצבם","נוכחות שבריריות בחולה דיאליזה מלווה בפרוגנוזה גרועה יותר","שבריריות מופיעה בחולי אי ספיקה כלייתית רק ב- CCT 30 מ\\\"ל/דקה ומטה"],"c":2,"t":"2022"},{"q":"בת76, הסובלת מיתר לחץ דם. מטופלת ב- ENALAPRIL ( אנלדקס BISOPROLOL (קרדילוקVALSARTAN ( דיובן) ו- DOXAZOCIN (קדקס. מתלוננת על נדודי שינה בחודשים האחרונים. איזו מהתרופות הקבועות שלה יכולה לפגוע באיכות השינה בסבירות הגבוהה ביותר?","o":["ENALAPRIL","BISOPROLOL( קרדילוק","VALSARTAN (דיובן","DOXAZOCIN ( קדקס"],"c":1,"t":"2022"},{"q":"מהו \\\"דגל אדום\\\" לכאבי גב משניים למחלה סיסטמית","o":["רקע של סוכרת מטופלת באינסולין","רקע של COPD קשה תלוי בסטרואידים","משך סימנים מעל שבועיים","כאב מוקל בכפיפה קדימה"],"c":1,"t":"2022"},{"q":"בת83, גרה לבדה. ללא עזרה מ\\\"חוק סיעוד\\\". עד לאשפוזה התהלכה עם קוודריפוד והיתה עצמאית ב- ADL. ברקע- SLEEP APNEA המטופלת ב- CPAP מזה שנתיים מאושפזת לאחר נפילה ושבר בכתף ימין. אורתופד המליץ על קיבוע של הכתף ל- 6 שבועות החולה מוגבלת בהזזת יד ימין, נזקקת לעזרה ב- ADL ומתקשה להחזיק את הקוודריפוד אין החמרה במצבה הנשימתי. מה נכון לגבי תכנית השיקום?","o":["היות ולא מדובר בשבר ברגל אין אינדיקציה לשיקום באשפוז","החולה זקוקה למסגרת סיעודית עד להחלמת השבר ואז תעבור לשיקום","רקע של בעיה נשימתית המצריכה CPAP הוא קונטראינדיקציה לשיקום","אם אין מערכת תמיכה בבית מתאימה לשיקום באשפוז"],"c":3,"t":"2022"},{"q":"איזה תסמין של מחלת פרקינסון שייך ל- Nonmotor Features ?","o":["Constipation","Dysphagia","Drooling","Masked facies (hypomimia)"],"c":0,"t":"2022"},{"q":"מהו גורם הסיכון החשוב ביותר בדמנציה על רקע אלצהיימר","o":["גיל","דיכאון","חבלת ראש בעבר","Apolipoprotein E genotype"],"c":0,"t":"2022"},{"q":"בן78, מהנדס במקצוע, בגמלאות, אלמן כשלושה חודשים, הילדים תומכים בו, מתגורר לבד בבית פרטי. הגיע לייעוץ עקב ירידה קוגניטיבית. הוא דיווח שבחודשיים האחרונים הוא מרגיש ירידה בזיכרון טווח קצר – שוכח איפה שם חפצים, שואל שוב ושוב את אותה שאלה. בנוסף מתקשה להתרכז בקריאה או בטלוויזיה. ברקע: סוכרת, יתר לחץ דם ויתר שומנים בדם, מ/א אירוע מוחי איסכמי קל ללא חסרים נוירולוגיים. מאוזן מבחינת מחלות הרקע תחת טיפול תרופתי. מבחן MMSE - תמונה מספר3 עברה שנה והמטופל הגיע למרפאה למעקב. בדיקתMMSE היתה28/30 . איזה טיפול סביר שקיבל","o":["מעכבי אצטיל כולין","נוגדי דיכאון","קנאביס רפואי","תרגול קוגניטיבי"],"c":1,"t":"2022"},{"q":"מי מהבאים נחשב כ- prescribing cascade בגריאטריה","o":["טיפול במצב פסיכוטי על ידי HAPOERIDOL -> הופעת סימנים אקסטרא-פירמידלים -> החלפת הטיפול ב- QUETHIAPINE (סרוקוול","טיפול בכאב גב על ידי טיפול ב- ETODOLAC ( אטופן-> הופעת גאוט -> טיפול ב- ALLOPURINOL","טיפול ב- DONEPEZIL לדמנציה-> הופעת אי ":["שדרוג המשקפיים למולטיפוקל","הליכה עם הליכון בלבד","החלפת כדורי שינה מ- BROTIZOLAM (בונדורמין) ל- ZOLPIDEM ( סטילנוקס","בדיקת הבית על ידי מרפאה בעיסוק"],"c":3,"t":"2022"},{"q":"בן80 , מתגורר בביתו עם אשתו. ברקע מחלת לב איסכמית, יתר לחץ דם, סוכרת מסוג 2 מאוזנת הופנה לבדיקת רופא גריאטר בשל ירידה בזיכרון, אי שקט, אלימות מילולית ופיזית כלפי הסובבים. לפי אנמנזה מבני משפחתו: לפני כשלוש שנים הופיעה ירידה בזיכרון לטווח הקצר אשר התבטאה בעיקר בשכיחת תאריך, יום בשבוע, חזרה על אותן שאלות וחיפוש חפצים שלא זכר היכן הניח. בשנה האחרונה נצפתה ירידה הדרגתית נוספת בזיכרון כולל בזיכרון לטווח הארוך, הופעת קושי בשימוש במכשירי הבית, אירועי הליכה לאיבוד ביציאה מהבית. במקביל חל שינוי באישיותו -הפך להיות אפתי, אדיש ולעתים קרובות אלים . בתפקודיו הבסיסיים זקוק לתזכורת להתקלח ועזרה בהתאמת הבגדים. בבדיקתו: בהכרה מלאה. קשב וריכוז תקינים. בשיחה טוען שאין לו כל בעיה קוגניטיבית. בדיקה גופנית כולל נוירולוגית ללא ממצא בולט. במבחן MMSE שיתף פעולה וצבר16 נקודות. איזה מהממצאים הבאים צפוי להיות בבדיקות נוספות של מטופל זה?","o":["במבחן GDS יקבל תוצאה של11","בנוזל ספינלי צפויה עליה באמילויד בטא וב- TAU","בבדיקת MRI מוח צפויים שינויים איסכמיים כרוניים","EMG ידגים איטיות של גליGAMMA"],"c":1,"t":"2022"},{"q":"בת69 התקבלה לאשפוז במחלקה פנימית גריאטרית עם כאבים בחזה וכאבים במפרקים שורש כף יד ימין וכתף שמאל. ברקע: יתר לחץ דם עקשני - טופלה ב- ATENOLOL ( נורמיטןו- VALSARTAN ( דיובן לפני חודש הוחל מתן HYDRALAZINE . בבדיקה גופנית רושם לשיפשוף פריקרדיאלי אק\\\"ג- תמונה מספר 6 . מהי אבחנה הסבירה ביותר","o":["DERMATOMYOSITIS","SYSTEMIC LUPUS ERYTHEMATOSIS","POLYMIALGIA RHEUMATICA","FELTY SYNDROME"],"c":1,"t":"2022"},{"q":"בן68 , מזה מספר חודשים מתלונן על כאבי גב תחתון שמופיעים בעמידה ממושכת ובהליכה, מוקלים בישיבה ובכיפוף קדימה. במסגרת הבירור בוצע MRI של עמוד השדרה המתני – תמונה מספר 7 . מה מהבאים הוא הגורם השכיח ביותר לפתולוגיה הנרכשת המתוארת","o":["Ankylosing spondylitis","אוסטיאוארתריטיסDegenerative Arthritis )","מחלת פאג'ט של העצםPaget disease of bone)","דלקת מפרקים שגרוניתRheumatoid arthritis )"],"c":1,"t":"2022"},{"q":"בן88 סובל מ-ALZHEIMER DISEASE. בשנה האחרונה המטופל התעלף פעמיים במהלך היום. בוצע הולטר אק\\\"ג שהדגים נטייה לברדיקרדיה בלילה. מכל התרופות האפשריות לטיפול בדמנציה איזו תרופה איננה מומלצת למטופל זה?","o":["DONEPEZIL (ממוריט","RIVASTIGMINE (אקסלון","GALANTAMINE ( גלנטמינה","MEMANTINE ( ממוקס"],"c":0,"t":"2022"},{"q":"מה מהשינויים הבאים אופייני להזדקנות נורמלית של הריאה","o":["ירידה ב- Residual volume (RV)","עליה ב- diffusion lung capacity for carbon monoxide (DLCO )","עליה ב- (Functional residual capacity (FRC","ירידה ב- Residual Volume ( RV)"],"c":2,"t":"2022"},{"q":"איזו מבין התרופות נוגדות דיכאון הבאות עשויה לגרום להפרעת הקצב באק\\\"גבתמונה מספר 8?","o":["Citralopam ( ציפרמיל","Duloxetine ( סימבלטה","Bupropion Hydrobromide (וולבוטרין","Hypericum perforatum ( רמוטיב"],"c":0,"t":"2022"},{"q":"לאיזו מהתרופות הבאות יש השפעה אנטיכולינרגית חזקה ביותר","o":["OLANZAPINE ( זיפרקסה","RISPERIDONE ( ריספרדל","QUETIAPINE ( סרוקוול","HALOPERIDOL"],"c":0,"t":"2022"},{"q":"מה מבין השינויים הפסיכולוגיים/ קוגניטיביים הבאים נחשב בשינוי של הזדקנות נורמלית?","o":["ירידה באוצר המילים","נטייה להיות מושפע מרושם ראשוני","התחזקות באמונה דתית","נטייה להתבודדות"],"c":1,"t":"2022"},{"q":"בן65, מגיע למיון עם חולשה כללית, סחרחורת מאתמול. אשתו מתארתאיבוד המוטיבציה ואיבוד היכולת ליזום פעולות מונחות מטרה, לקבוע מטרות ולהחליט החלטות, ואובדן שליטה על סוגר השתן . בבדיקה נוירולוגית- חולשה בגפיים התחתונות עם סימנים פירמידליים, ללא הפרעה בעצבי הגולגולת. איזו תסמונת מתארת את השבץ האיסכמי ממנו סובל מטופל זה?","o":["Anterior Cerebral Artery Infarction","Middle Cerebral Artery Infarction","Posterior Cerebral Artery Infarction","Posterior inferior cerebellar arteries"],"c":0,"t":"2022"},{"q":"בן72 , סובל ממחלת פרקינסון כ-7 שנים. למטופל תגובה טובה לטיפול ב- Dopicar , הבאה לידי ביטוי בשיפור ניכר בתפקוד המוטורי. יחד עם זאת בזמן שמתפקד היטב ישנן תנועות לא רצוניות מרובות (Peak dose Dyskinesias) הפוגעות באופן קשה באיכות חייו של המטופל. איזו מבין הגישות הטיפוליות הבאות יכולה להקל על המטופל לשמור על התפקוד היום יומי ובמקביל להפחית את התנועות הלא רצוניות ?","o":["פיזיותרפיה מכוונת לשעות של הדיסקינזיות","עליה במינון ה Dopicar","הפסקת הטיפול ב Dopicar","מתן רציף של Levodopa/carbidopa בעזרת משאבה ישירות למעי"],"c":3,"t":"2022"},{"q":"על פי המאמרAdvanced dementia מאתMitchell, מהם הסיבוכים הקליניים השכיחים ביותר בדמנציה מתקדמת?","o":["הפרעות הליכה ואפתיה","הפרעות שינה והתפתחות פצעי לחץ","הפרעות אכילה וזיהומים","דיכאון ואי שליטה על סוגרים"],"c":2,"t":"2022"},{"q":"בת89, בעלת תואר שני במדעים. פנתה לבירור בשל תלונות על מצב רוח ירוד, תחושת ריקנות, בדידות ועיסוק רב במחשבות על בעלה שנפטר לפני כשבועיים בהיותו מאושפז על רקע דלקת ראות. מה מהבאים מהווה גורם סיכון להתפתחות Persistent complex bereavement disorder בקרב המטופלת","o":["השכלתה האקדמית","היותה אישה","היעדר רקע של הפרעת חרדה או דכאון","מותו של בעלה לאחר מחלה ממושכת"],"c":1,"t":"2022"},{"q":"מה המשפט המתאר אתהסיכון לשברים בחוליות בחולים עם אוסטאופורוזיס?","o":["שבר קודם בגולגולת, אך לא בעצמות האף, מהווה גורם סיכון לשבר נוסף","צפיפות עצם אינה מנבאת את הסיכון לשבר בחוליה בגברים","שבר קודם בחוליה מהווה גורם סיכון לשבר נוסף","עודף משקל מעלה את הסיכון לשבר בחוליה"],"c":2,"t":"2022"},{"q":"בת67, הגיעה לבדיקה במרפאה בשל תלונות על ירידה בזיכרון. מדווחת על היסטוריה משפחתית של אמא שחלתה במחלת אלצהיימר כשהייתה בת 85 . באבחוןMMSE קיבלה29/30 ובאבחוןMOCA קיבלה28/30. בדיקת ציור שעון תקינה שני ילדיה שליוו אותה לבדיקה, טוענים שהיא עובדת המון שעות ביממה בעבודה משרדית, מעשנת קופסת סיגריות ביום ושותה 2-3 פחיות בירה בערב. היא עצבנית, מתקשה להירדם ועייפה רב הזמן. מתוך המאמר Dementia prevention, intervention, and care: 2020 report מאת Livingston ושותפיו מה ניתן להדריך מטופלת זו למניעת דמנציה","o":["תרגול קוגניטיבי יומיומי הוכח כמונע התקדמות MCI לדמנציה","הפסקת עישון גם בגיל מאוחר יכולה להוריד את הסיכון לדמנציה","טיפול תרופתי להשגת שינה איכותית יכול להוריד את הסיכון להתפתחות דמנציה","לצורך \\\"ניטרול\\\" גורם הסיכון של שתית אלכוהול יש להפסיק לחלוטין את השתיה ולא רק להפחית כמויות"],"c":1,"t":"2022"},{"q":"מה המשפט המתאר בצורה נכונה את הטיפול בהתקףGOUT בקשישים","o":["טיפול בסטרואידים בפוליארטיקולר גאוט ניתן ל-5-10 ימים עם ירידה הדרגתית (tapering )","טיפול ב- colchicine ניתן במינון0.5 מ\\\"ג4 פעמים ביום ומופחת במקרה של שלשול","febuxostat ( פבוריק) עדיפה על allopurinol בחולה עם מחלת לב איסכמית","NSADIS לא סלקטיביים הוכחו כיעילים יותר מ- NSAIDS סלקטיביים בטיפול בגאוט"],"c":0,"t":"2022"},{"q":"לפי מחקרים בבעלי חיים, הדיאטה המביאה לתוחלת החיים הארוכה ביותר, היא דיאטה שבה יש הגבלה בכמות של –","o":["חלבון","פחמימות","שומנים","שומנים ופחמימות"],"c":0,"t":"2022"},{"q":"בן75, מאובחן עם דיכאון. מזה שבועיים מקבל טיפול שלESCITALOPRAM במינון5 מ\\\"ג. מדווח על שיפור מסוים במצב הרוח, אך עדיין מתקשה בשינה ומרגיש חוסר אנרגיה מה נכון להמליץ במצב זה?","o":["להחליף טיפול ל- MIRTAZAPINE במינון15 מ\\\"ג","להמשיך טיפול ב- ESCITALOPRAM במינון5 מ\\\"ג והוסיףMIRTAZAPINE במינון 15 מ\\\"ג","להוסיף טיפול ב- QUETIAPINE במינון12.5 מ\\\"ג","להעלות מינון ESCITALOPRAM ל- 10 מ\\\"ג"],"c":3,"t":"2022"},{"q":"בן70, עצמאי וללא ירידה קוגניטיבית, ברקע יתר לחץ דם וסוכרת, מאוזנים, התקבל למחלקה כירורגית עקב חסימת מעיים. עלה למחלקה בשעה 23:00 בלילה לאחר שהיה של 24 שעות במחלקה לרפואה דחופה. בקבלתו באי שקט פסיכומוטורי, לא מתמצא במקום ובזמן. לפי CAM המטופל אובחן עם דליריום הכירורגים מעוניינים לקבל הסכמה של המטופל לניתוח שיבוצע בימים הקרובים במידה ולא ישתפר בטיפול שמרני. מה הגישה המתאימה לקבלת הסכמה לניתוח למטופל זה?","o":["כדאי לנסות לדבר עם המטופל בבוקר. יתכן ויהיה שיפור במצבו ויהיה כשיר לחתימה","יש למלא תעודת רופא ולמנות אפוטרופוס בן משפחה","מומלץ לבצע בדיקת MINI-COG להערכת מצבו הקוגניטיבי","מומלץ להתחיל טיפול תרופתי באנטי פסיכוטים לצורך שיפור מצבו הקוגניטיבי ואז ניתן יהיה לקבל הסכמה"],"c":0,"t":"2022"},{"q":"חסימה של איזה עורק יכולה לגרום ל\\\"תסמונת נעילה ( LOCKED-IN ) ?","o":["Anterior communicating artery","Anterior choroidal artery","Posterior inferior cerebellar arteries","Basilar artery"],"c":3,"t":"2022"},{"q":"בת84, אושפזה עקב פרפור עליות התקפי וקוצר נשימה ברקע- יתר לחץ דם, מחלת לב איסכמית, סוכרת, CARPAL TUNNEL SYNDROME . בדיקת אקו לב הדגימהEF 40% . ב חות של Valvular Regurgitation","ירידה במשקל הלב","הופעה של ציר ימני באק\\\"ג","ירידה ב Pulse Pressure"],"c":0,"t":"2022"},{"q":"מהנכון לגבי אוכלוסיית בני ה- 85 בישראל לפי לקט הנתונים של מכון ברוקדייל","o":["מעל 50% מהם מקבלים עזרה מ\\\"חוק סיעוד","20% מתוכם נמצאים במוסדות","20% מהם מתקשים בהליכה או בעליית מדרגות","בגיל זה יותר גברים מנשים נזקקים לעזרה מ\\\"חוק סיעוד\\\""],"c":0,"t":"2022"},{"q":"מה מאפיין את השינויים בכליות בגיל המבוגר","o":["יש עליה בהתנגדות של עורקי ה- afferent וירידה בהתנגדות של עורקי ה- efferent","בכ- 2/3 מהאוכלוסייה נצפית ירידה בתפקודי כליה עם הגיל","עקב נפרוסקלרוזיס יש עליה במסת הכליות עם הגיל","פרוטינוריה עד 200 מ\\\"ג24 שעות נחשבת לתקינה בבני70 ומעלה"],"c":1,"t":"2022"},{"q":"מה מאפיין את השינויים בלבלב בגיל המבוגר","o":["יש ירידה בתפקוד האקסוקריני של הלבלב","יש עליה בנפח הלבלב משני להסננה שומנית","יש עליה בלחץ של ה- SPHINCTER OF ODI","יש ירידה במשקל הלבלב"],"c":3,"t":"2022"},{"q":"בת75 התאשפזה לאחרונה עקב בצקת ריאה על רקע אי ספיקת לב עםEF- 30% , משנית למחלת לב איסכמית. גורמי סיכון: סוכרת, היפרליפידמיה, יתר לחץ דם אך אינה מעשנת. הטיפול התרופתי הקבוע כולל VALSARTAN ,PROPRANOLOL ,ASPIRIN , FUROSEMIDE ,METFORMIN . אילו המלצות טיפול מתאימות לחולה הזאת","o":["הגבלת שתיה ל - 4 כוסות ליממה, הוספת טיפול ב- SPIRONOLACTONE ומעקב רמות אשלגן","הגבלת שתיה ל - 8 כוסות ליממה, החלפת ה- PROPRANOLOL ב-CARVEDILOL","הגבלת צריכת מלח עד 1 גרם ליממה והימנעות מביצוע מאמצים","התחלת טיפול ביתי בעירוי FUROSEMIDE שלוש פעמים בשבוע"],"c":0,"t":"2022"},{"q":"ארבעה מטופלים עצמאיים בתפקודם ושמורים קוגניטיבית הגיעו למרפאה עם תשובת איזה מהמטופלים הבאים אינו זקוק לטיפול בסטטינים?","o":["בן 86, ברקע יתר לחץ דם ועישון","בת 89 לאחר אוטם והכנסת תומכן","בן 75, עם סוכרת מאוזנת","בת 79, עםPVD"],"c":0,"t":"2022"},{"q":"HgB g/dL 8.5 13.2-17 גבר MCV fL 88 80-96 Plt 10e3/µL 187 150-450 Iron ng/mL 52 40-150 Transferrin mg/dL 250 220-400 Ferritin ng/mL 145 14-163 Vitamin B12 pg/mL 526 175-961 Folic Acid ng/mL 15 2.6-17.1 CREATININE mg/dL 1.0 0.7-1.3 BUN mg/dL 26 5-25 מה הסיבה הכי סבירה לאנמיה אצל המטופל הזה","o":["אנמיה של Myelodysplastic Syndrome","אנמיה של מחלה כרונית","אנמיה פוסט ניתוחית","אנמיה של חסר ברזל"],"c":0,"t":"2022"},{"q":"בת82 עצמאית ושמורה קוגניטיבית, גרה בקהילה. ברקע סוכרת מאוזנת בשל בצקות קלות ברגליים, נלקח בקופת חולים סטיק שתן שהדגים חלבון +, סוכר + , ניטריטים + , לויקוציטים ++ ואריתרוציטים ++. החולה שוללת תכיפות או דחיפות במתן שתן, צריבה בשתן, חום או כאבי מותניים. בסונר כליות ודרכי שתן עולה חשד לגוש בשלפוחית השתן. באיזה מצב יש לקחת תרבית שתן ממטופלת זו?","o":["לצורך זיהוי חיידק למקרה של צורך בטיפול אנטיביוטי בעתיד","לצורך טיפול בזיהום בדרכי השתן בחולת סוכרת","אם החולה מועמדת לציסטוסקופיה","אם החולה מועמדת להכנסת קתטר"],"c":2,"t":"2022"},{"q":"מה מאפיין את השינויים במערכת השתן בגיל המבוגר","o":["רוב הקשישים עם אי שליטה על שתן סובלים מהתכווצויות לא רצוניות של השלפוחית (involuntary bladder contractions )","שאריות שתן לאחר ריקון (residual urine volume ) יורדת עם הגיל","קיבולת השלפוחית ( functional bladder capacity) עולה עם הגיל","בנשים בנות 80 ומעלה יש עליה בסיכון לאי שליטה על שתן ככל שעברו יותר לידות"],"c":0,"t":"2022"},{"q":"מהמהבאים מהווה קריטריון לאבחנה/ קלסיפיקציה של -GIANT CELL ARTERITIS לפי– ACR CLASSIFICATION CRITERIA – 1990 ?","o":["ממצאים בביופסיה של העורק הטמפורלי עם הסננת תאים פולינוקלארים","CRP מוגבר פי3 מהנורמה","לויקופניה","רגישות במישוש סביב העורק הטמפורלי"],"c":3,"t":"2022"},{"q":"בן87, עצמאי בתפקודו . ברקע יתר לחץ דם, סוכרת והיפרליפידמיה. עקב זיהום בדרכי הנשימה העליונות מטופל ב- Cefuroxime ( זינט ) מזה שבוע. פנה למחלקה לרפואה דחופה בשל אירועי שלשול וכאבי בטן מזה כיומיים. בבדיקתו נראה במצב כללי טוב, יציב המודינמית ונשימתית, חום סיסטמי תקין. בדיקת Clostridium Difficile toxin חיובית מהי הגישה הטיפולית המתאימה?","o":["הפסקת הטיפול האנטיביוטי שגרם למחלה יספיק ברוב החולים במצב יציב וניתן לעקוב ללא טיפול","מומלץ להתחיל טיפול ב- VANCOMYCIN פומי","מומלץ להתחיל טיפול ב- METRONIDAZOLE ( פלג'יל) תוך ורידי","מומלץ להתחיל טיפול ב- VANCOMYCIN פומי יחד עםMETRONIDAZOLE ( פלג'יל) תוך ורידי"],"c":1,"t":"2022"},{"q":"איזה מהחיסונים הבאים מומלץרק לקשישים עם גורמי סיכון ולא לכל הקשישים ?","o":["חיסון לשפעת (INFLUENZA)","חיסון לזיהום על ידי PNEUMOCOCOCUS","חיסון לזיהום על ידי MENINGOCOCOCUS","חיסון לשלבקת חוגרת (VARICELLA ZOSTER)"],"c":2,"t":"2022"},{"q":"בן75 עצמאי בתפקודו ושמור קוגניטיבית. ברקע יתר לחץ דם ומחלת לב איסכמית יציבה. אובחן כסובל מקרצינומה של הערמונית עם גרורות לעצמות. הומלץ לו על טיפול androgen-deprivation therapy בזריקותGNRH ואנטי אנדרוגן מה חשוב להדריך אותו לגבי טיפול זה?","o":["הטיפול יכול להביא להחלמה מלאה בערך ב- 50% מהחולים","הטיפול יכול להעלות סיכון לדמנציה","הטיפול יכול לגרום לירידה בלחץ הדם","הטיפול יכול לגרום לפוליציטמיה משנית"],"c":1,"t":"2022"},{"q":"מהנכון לגבי טיפול לא תרופתי בקוצר נשימה בסוף החיים ?","o":["במחקר שהשווה מתן אויר לעומת חמצן דרך משקפים (nasal cannula ) לחולים עם סטורציה תקינה, נמצא יתרון משמעותי למתן חמצן","טיפול בהנשמה לא פולשנית מסוג BiPAP אינו מומלץ לחוליCOPD בדרגה מתקדמת","טיפול בחמצן לחולי COPD עם ירידה בריווי חמצן משפר איכות חיים ומאריך חיים","בחולים אונקולוגים לא נמצא יתרון בשיפור איכות חיים בטיפול בהנשמה לא פולשנית"],"c":2,"t":"2022"},{"q":"בת80 המטופלת ב- CITALOPAM הגיעה להתייעץ לגבי מינון התרופה. היא מטופלת ב- 20 מ\\\"ג שלCITALOPRAM בשיפור חלקי ומבקשת לעלות את מינון התרופה. מה ההסבר להגבלת מינון של CITALOPRAM בגיל מבוגר","o":["מינון גבוה של התרופה יכולה לגרום לעלייה בערכי לחץ דם","מינון גבוה של התרופה יכול לגרום לאגירת נוזלים והגברת תאבון","מינון גבוה יכול לגרום להפרעת קצב","עלית במינון של התרופה מעלה סיכון לשבר"],"c":2,"t":"2022"},{"q":"בת72, עצמאית בתפקודה וללא חסר קוגניטיבי פנתה למרפאה עקב כאבי עצמות משניים לגרורות מקרצינומה של הריאה. היא טופלה בבית ב- PARACETAMOL ו- DIPYRONE ( אופטלגין) ללא הטבה. הוחלט על התחלת טיפול באופיואידים מה יש להדריך אותה עם התחלת הטיפול?","o":["הטיפול גורם לעצירות אך יש סבילות ( tolerance) שמתפתחת אחרי מספר ימים","הטיפול גורם לבחילות אך יש סבילות ( tolerance) שמתפתחת אחרי מספר ימים","יש להימנע מנהיגה כל התקופה בה מטופלת באופיואידים","אם מגיעים למינון מקסימלי של תרופה אופיואידית יהיה צורך לעבור לתכשיר אחר"],"c":1,"t":"2022"},{"q":"איזו מהתרופות הבאות יכולה לגרום לירידה בתיאבון","o":["Levetiracetam ( קפרא","Olanzapine ( זיפרקסה","Empagliflozin ( ג'רדיאנס","Oxazepam ( ואבן"],"c":0,"t":"2022"},{"q":"מה המשפט שמתאר בצורה נכונה השפעה של ויטמינים ומינרלים על מחלות שונות","o":["תוספת ויטמין B12 מעכבת הופעתage-related macular degeneration (AMD)","תוספת ויטמיןE מורידה שכיחות של שבץ","תוספת ויטמין B1 ( תיאמין) יכולה לעזור בחולי אי ספיקת לב תחת טיפולמשתן","תוספת ויטמין D יכולה לעזור במניעה של פצעי לחץ בחולים במוסדות"],"c":2,"t":"2022"},{"q":"כל התופעות הבאות הן תופעת לוואי שלProton Pump Inhibitor –PPI פרט ל-","o":["החמרת COPD","אי ספיקה כלייתית","זיהום ב- Clostridium difficile","שברים בעצמות"],"c":0,"t":"2022"},{"q":"איזה גורמים משפיעים על תמותה לאחר שבר בצוואר הירך לפי המאמר Management of Acute Hip Fracture מאתBhandari ?","o":["ניתוח תוך פחות מ- 24 שעות מפחית את התמותה לאחר שבר","ביצוע קיבוע עם nails intramedullary משפר את הפרוגנוזה לעומת ביצוע קיבוע חיצוני","חולים שלא נותחו ונשארו במיטה נותרו במצב סיעודי אך ללא השפעה על אחוזי התמותה","מתן של ביספוספונטים בחודש הראשון לאחר השבר הראה עליה בסיכון לתמותה"],"c":0,"t":"2022"},{"q":"מה הוא ביטוי אפשרי של אירוע מוחי בטריטוריה של Middle Cerebral Artery ?","o":["ירידה סנסורית איפסילטרלית","Aphasia אם האירוע הוא בהמיספירה שמאלית","homonymous hemianopsia איפסילטרלית","Diplopia"],"c":1,"t":"2022"},{"q":"לפיMCKEITH CRITERIA לאבחנתDEMENTIA WITH LEWY BODIES , איזה מהבאים אינו CORE FEATURE?","o":["פלקטואציות בערנות ובריכוז","הזיות ויזואליות חוזרות","מחשבות שווא סיסטמיות","פרקינסוניזם ספונטאני"],"c":2,"t":"2022"},{"q":"בן76, הגיע למרפאה קוגניטיבית לצורך הערכה בשל ירידה בזיכרון, נפילות חוזרות ונטייה לאי שקט בלילות. המשפחה מספרת על ירידה בזיכרון בחודשים האחרונים, בלבול בימי השבוע, בלבול בין שמות הנכדים. היה מקרה שחשד שאחד הנכדים הינו פורץ לביתו וצלצל למשטרה. פעמיים יצא מהבית סביב 3 בבוקר ללכת לקניות בסופר. לדברי המשפחה \\\"יש ימים רעים ויש ימים טובים יותר\\\". בבדיקה נוירולוגית- ריגידיות סימטרית בגפיים. לפני כשבוע נבדק במחלקה לרפואה דחופה בשל בלבול. בדיקות דם ות הדם mOsm/kG 350 (הנורמה 275-295 ( mOsm/kg מה הטיפול הראשוני בבעיה זו","o":["מאחר וערכי הנתרן תקינים עיקר הטיפול הראשוני יכלול הפסקת טיפול ליתר לחץ דם והתחלת טיפול באינסולין","בחשד למחלת אדיסון כל טיפול צריך לכלול גם מתן IV HYDROCORTISONE","טיפול הראשוני יהיה הכנסת זונדה ומתן מהיר של 3 ליטר מים בשילוב הרצת שני ליטר","הטיפול הראשוני יתמקד בהחזר נוזלים ראשוני מהיר בסליין 0.9% ובולוס אינסולין"],"c":1,"t":"2022"},{"q":"מה הגישה הטיפולית בהיפרתירואידיזם משני לטיפול ב- AMIODARONE (amiodarone-induced thyrotoxicosis ?)","o":["הטיפול בסטרואידים מביא לשיפור ברוב החולים תוך חודש","טיפול בתרופות אנטי-תירואיד יעיל מאוד אך בעל סיכון לנויטרופניה","הפסקת הטיפול ב- AMIODARONE משפרת את הפגיעה בתירואיד תוך מספר שבועות","ניתוח של Near-total thyroidectomy הוא בעל יעילות לטווח ארוך"],"c":3,"t":"2022"},{"q":"בן80, מאושפז במחלקה פנימית גריאטרית עקב זיהום בדרכי בשתן. המטופל נשא קתטר שתן קבוע מזה שנתיים. ביום השני של האשפוז עבר בדיקת CT בטן עם חומר ניגוד ונשלל אבצס ביום השלישי לאשפוזו הוחל טיפול אנטיביוטי ב- Amikacin לפי רגישות החיידק במהלך האשפוז החום ירד, ללא דהידרציה, לחץ דם יציב ותפוקת שתן תקינה. ביום העשירי לאשפוז קריאטינין עלה מ-1 עד3 . מה מהבאים יתמוך באבחנה של אי ספיקת כליות משנית לטיפול באמינוגלוקוזידים","o":["יחס BUN/CREATININE מעל20","אוליגוריה","GRANULAR CASTS בבדיקת שתן למיקרוסקופ","היפרמגנזמיה"],"c":2,"t":"2022"},{"q":"Protein g/dL 6.5 3 מה ניתן להסיק מבדיקות המעבדה מהתפליט","o":["נוכח תפליט אקסודטיבי והסיפור הקליני מומלץ מלבד הבדיקות השגרתיות לשלוח את הנוזל לציטולוגיה ול-ADA (Adenosine Deaminase )","מדובר בתפליט טרנסודטיבי. נוכח הסיפור הקליני יש לטייב טיפול באי ספיקת לב ולהשלים בירור ליציאה מאיזון אי ספיקת לב","על אף שסביר שהתפליט אקסודטיבי יש כ- 25% סיכוי שלמעשה מדובר בטעות והתפליט למעשה טרנסודטיבי","אין די נתונים על מנת להעריך את סוג התפליט"],"c":0,"t":"2022"},{"q":"בת76, שמורה קוגניטיבית ועצמאית בביתה, הופנתה למחלקה לרפואה דחופה בשל החמרה בקוצר נשימה ושיעול בשבוע האחרון. ברקע ידוע על COPD, ללא טיפול תרופתי קבוע. בקבלתה נושמת 22-24 נשימות לדקה, סטורציה88% באוויר חדר, מתוקנ ention, and care: 2020 report of the Lancet Commission ,\\\"איזה מהטיפולים הבאים הוכח כמפחית סיכון להתפתחות דמנציה ?","o":["טיפול בסטטינים למטופלים מבוגרים עם סיכון למחלה וסקולרית","טיפול באספירין (100 מ\\\"ג) למבוגרים בריאים מעל גיל65","טיפול ביתר לחץ דם","טיפול במעכבי אצטילכולין אסטרז במטופלים עם mild cognitive impairment"],"c":2,"t":"2023"},{"q":"למי מהמטופלים הבאים יש לבצע בדיקת תרבית שתן למרות שאין לו תלונות מכוונות","o":["מטופל עם פגיעה בעמוד השדרה","דייר במוסד סיעודי","מטופל מושתל כליה לאחר שנה מההשתלה","מטופל לקראת פרוצדורה פולשנית אורולוגית"],"c":3,"t":"2023"},{"q":"על פי המאמר Dementia prevention, intervention, and care: 2020 report of the Lancet Commission\\\", איזה מגורמי הסיכון הבאים ב-Midlife הינו המשמעותי ביותר להתפתחות דמנציה?","o":["ירידה בשמיעה","חבלת ראש","יתר לחץ דם","השמנה"],"c":0,"t":"2023"},{"q":"מה מאפיין SLE (Systemic Lupus Erythematosus) בקשישים לעומת צעירים","o":["השכיחות בגברים קשישים דומה לשכיחות בנשים","ל- ANA בטיטר גבוה סגוליותSPECIFICITY) גבוהה יותר בקשישים לעומת צעירים","התמונה הקלינית בקשישים סוערת יותר","השכיחות של מעורבות המטולוגית גבוהה יותר בקשישים"],"c":3,"t":"2023"},{"q":"מטופל הסובל מדמנציה עם קושי ניכרבתפקוד השפתי. המטופל מסוגל להבין משפטים פשוטים, אך לא משפטים מורכבים. קיימת אפרקסיה שפתית. מה סביר למצוא מבחינה פתולוגית?","o":["פתולוגיה מסוג TAU","פתולוגיה TDP-43","פגיעה וסקולרית מפושטת","משקעי חלבון 14-3-3"],"c":0,"t":"2023"},{"q":"במי מהמטופלים הבאים יש מקום לטיפול במעכבי CHOLIESTERASE ?","o":["מטופל עם תלונות על ירידה בזיכרון, MMSE 24/30 ,ללא שינוי בתפקודו או באורחות חייו","מטופל הסובל מ- DEMENTIA WITH LEWY BODIES ,בדיקתMMSE אחרונה 10/30 . כעת עם החמרת הלוצינציות ראיה טורדניות","מטופל עם דמנציה על רקע מחלת אלצהיימר , MMSE 8/30","מטופל עם FRONTOTEMPORAL DEMENTIA , בדיקת MMSE 22/30 ,כעת עם החמרה בדיסאינהיביציות"],"c":1,"t":"2023"},{"q":"בן97, שמור קוגניטיבית, מתהלך עם הליכון ונזקק לעזרה חלקית ב-ADL, נבדק עקב כאבי עצמות מפושטים ואובחן כסובל מ-CARCINOMA OF PROSTATE עם גרורות מה הטיפול המומלץ","o":["ניתוח OPEN PROSTATECTOMY ואחריו טיפול כימותרפי","טיפול ב- LHRH AGONIST","טיפול פליאטיבי בלבד","טיפול כימותרפי במשלב המכיל 5 FU"],"c":1,"t":"2023"},{"q":"מה מאפיין סימנים של היפרתירואידיזם במבוגרים לעומת צעירים?","o":["במבוגרים אין טכיקרדיה","במבוגרים יש בלבול בחלק מהמטופלים","שלשול שכיח במבוגרים יותר מאשר בצעירים","הזעה שכיחה במבוגרים יותר מאשר בצעירים"],"c":1,"t":"2023"},{"q":"בן80, לוקה בדמנציה מסוג אלצהיימר, מתגורר בבית אבותתפקודית – מתהלך עם הליכון, משתתף בפעילות יומיומית בבית אבות. המטופל סובל מאי-שליטה על סוגר שתן המגבילה אותו בפעילות חברתית. לאחרונה הופיעו פצעים שטחיים על רקע רטיבות כרונית באזור פרינאלי. מה ההמלצה לטיפול?","o":["פעילות לשימור ושיפור טונוס שרירי אגן","טיפול תרופתי ב- MIRABEGRON (BETMIGA )","חיבור לפנרוס","ניהול יומן השתנה ולקיחה יזומה לשירותים"],"c":3,"t":"2023"},{"q":"איזה מהפצעים מתאים לטיפולבחבישות אטומות השומרות על סביבת פצע לחה המאפשרת למאקרופגים ואנזימים לפעול?","o":["פצע עם זיהום פעיל","פצע עם רקמה נמקית חלקית","פצע עם תעלות וכיסים","פצע באנשים עם כשל חיסוני"],"c":1,"t":"2023"},{"q":"מה מהווה אינדיקציה נכונה להשתלת) CARDIOVERTER DEFIBRLLATOR (ICD ?","o":["מטופל עם EF-35% ,-NIHA III, חצי שנה לאחר אוטם שריר הלב","מטופל עם EF-30% NIHA , - IV ,שבועיים לאחר אוטם שריר הלב","מטופל עם EF-45% ,NIHA- II ,חצי שנהלאחר אוטם שריר הלב עם אירוע של VF","מטופל עם -EF25% , II - NIHA ,חודש לאחר ניתוח מעקפים"],"c":0,"t":"2023"},{"q":"בת84, מתגוררת עם בעלה הסיעודי ומטפלת בו. ברקע ממאירות שד ברמיסיה, סוכרת לא מאוזנת. המטופלת מדווחת על מצב רוח ירוד, חוסר הנאה והפרעות בשינה. איזה מהגורמים הבאים מעלה את הסיכון לאובדנות במטופלת זו?","o":["סוכרת לא מאוזנת","הפרעות בשינה","מין נקבה","הטיפול בבעלה הסיעודי"],"c":1,"t":"2023"},{"q":"בן75, ברקע מחלת לב איסכמיתאי-ספיקת כליות עם GFR של45 מ\\\"ל/דקה, אירוע של CVA בעבר. במעבדה– המוגלובין A1C – 8.9% . לאיזו מהתרופות הבאות לסוכרת יש פוטנציאל להביא לשינוי פרוגנוסטי למחלות הרקע","o":["משפחת 1GLP להורדת תסמיני אי-ספיקת לב","משפחת מעכבי SGLT2 לצורך הגנה כלייתית","METFORMIN כמניעה שניונית לשבץ","משפחת 4DPP למחלת לב איסכמית"],"c":1,"t":"2023"},{"q":"איזו מהבדיקות הבאותהיא מנבא סיכון מתוקף לנפילה אצל קשישים?","o":["מבחן TIMED UP AND GO","מדד BBARTHEL","אומדן FIM","FRAILTY לפיFRIED"],"c":0,"t":"2023"},{"q":"המוגלובין A1C- 7.0 יחס אלבומין-קריאטינין 357 על פי המאמרADA Older Adults: Standards of Medical Care in Diabetes-2022 איזהמבין השינויים התרופתיים הבאים יועיל למטופל ?","o":["הפסקת הטיפול בסטטינים בשל פינוי כלייתי לקוי ושינוי לטיפול ב- BEZAFIBRATE","הפסקת טיפול ב-METFORMIN מחשש לחמצת לקטית","הפסקת טיפול ב- EMPAGLYFLOZIN בגלל אי-ספיקת כליות","החלפת הטיפול ב- INSULIN APIDRA לטיפול ב- SITGALIPTIN (AJANUVI)"],"c":0,"t":"2023"},{"q":"איזה מהבאים מה מהווה גורם מזרז ( Precipitating Factor ) לדליריום","o":["דכאון","ליקוי תפקודי","רמת אלבומין נמוכה","מחלת רקע חמורה"],"c":2,"t":"2023"},{"q":"איזה מהבאים מייצגגישה טיפולית נכונה בחולה הסובל מ- COPD ומירידהקוגניטיבית?","o":["לחולה שלא מצליח למלא הוראות, שיש לו מטפל צמוד ובעל PEAK INSPIRATORY FLOW נמוך מתאים להשתמש ב- NEBULIZER","לחולה שלא מצליח למלא הוראות ובעל PEAK INSPIRATORY FLOW גבוה מתאים להשתמש ב- DPI (DRY POWDER INHALER )","לחולה שלא מצליח למלא הוראות, שאין לו מטפל צמוד ובעל PEAK INSPIRATORY FLOW נמוך מתאים להשתמש במשאף עם SPACER","לחולה שמצליח למלא הוראות, אין לו מטפל צמוד ובעל PEAK INSPIRATORY FLOW נמוך מתאים להשתמש ב - DPI DRY POWDER INHALER))"],"c":0,"t":"2023"},{"q":"איזה מהבאים הוא התערבות למניעת דליריום לאחר שבר צוואר הירך?","o":["איזון כאב אגרסיבי על ידי מינונים גבוהים של אופיואידים","פיזיותרפיה לניוד מוקדם לאחר הניתוח","מעקב סימנים חיוניים קפדני על ידי מוניטור","עירוי דם לשמירת המטוקריט מעל 40%"],"c":1,"t":"2023"},{"q":"איזה מהבאים נכון לגבי יעילות טיפול בחולים זקנים עם אי ספיקת לב עם ירידה במקטע הפליטה (HFrEF?)","o":["חיסון נגד שפעת הוכח כמפחית תמותה","מעכבי SGLT2 יעילים בהפחתת תמותה בצעירים אך לא בזקנים","טיפול במשתנים הוכח כמפחית סימפטומים של גודש ריאתי ובצקות, וכן כמפחית תמותה","חוסמי בטא הוכחו כמונעים אשפוזים, אך יש קונטראינדיקציה יחסית בזקנים"],"c":0,"t":"2023"},{"q":"מהי תופעת לוואי אפשרית של טיפול כרוני בקורטיקוסטרואידים בשאיפה בחולה","o":["Contact Dermatitis בכפות הידיים","אוסטאופורוזיס","אאוזינופיליה","כיבים במערכת העיכול"],"c":1,"t":"2023"},{"q":"מה מאפייןשבץ מוחי המערב את הטריטוריה שלACA -Anterior Cerebral Artery ?","o":["מתבטא בשיתוק רפוי (פלצידי) של כף היד","מתבטא בפגיעה ברגל יותר מאשר פגיעה ביד","לא משפיע על מתן שתן","נגרם לרוב כתוצאה ממחלה אטרוסקלרוטית ולא מתסחיף"],"c":1,"t":"2023"},{"q":"בת75, מתגוררת בדיור מוגן, מתניידת עם הליכוןלוקה בדמנציה, תחת טיפול ב- MEMANTINE. מתקבלת לאשפוז במחלקה פנימיתבשל דלקת ריאות ומקבלת טיפול אנטיביוטי ב- CEFTRIAXONE וטיפול מניעתי ב-OMEPRAZOL ו-ENOXAPARIN . לשינה טופלה ב- ZOLPIDEM . ביום השנילאשפוזה החולה מבולבלת, באי שקט ניכר וצועקת. בשיחה איתה, נראה כי היא חושבת שהיא נמצאת כעת בביתה. איזה טיפול תרופתי יכול לגרום למצבה בסבירות הגבוהה ביותר?","o":["ZOLPIDEM","OMEPRAZOLE","MEMANTINE","CEFTRIAXONE"],"c":0,"t":"2023"},{"q":"בן70, אובחן עם תסמונתGuillain-Barré ואושפז באופן דחוף בטיפול נמרץ עקב שיתוק מתקדם ואי-ספיקה נשימתית. איזה מהטיפולים הבאים, אם יינתן מוקדם, עשוי לקצר את מהלך המחלה ולהפחית את השכיחות של שיתוק קבוע?","o":["עירוי פלסמה","קורטיקוסטרואידים","IVIG","CYCLOPHOSPHAMIDE"],"c":2,"t":"2023"},{"q":"מטופל הסובל מדמנציה ומטופל ב- RIVASTIGMINE (EXELON) החל לאחרונה לסבול מבעיות בשליטה במתן שתן. מה מומלץ במצב זה?","o":["לשקול להפסיק את הטיפול ב- RIVASTIGMINE","להתחיל טיפול אנטימוסקריני, כמו FESOTERODINE (TOVIAZ )","להתחיל טיפול ב – MIRABEGRON (BETMIGA )","להפנות לבדיקה אורודינמית לברור אי-שליטה"],"c":0,"t":"2023"},{"q":"בן68, סובל מאיטיות מוטורית ורעד במנוחה שהחלו לפני מספר חודשים. איזה מהבאים תומך בכך שסובל ממחלת פרקינסון אידיופטית?","o":["קיימים נוקשות ורעד סימטריים","ישנה תגובה מינימלית לטיפול ב- Levodopa אשר ניתן על ידי רופא המשפחה","ברדיקינזיה והפרעה בהחזרים הפוסטוראלים","הפרעה בתנועות עיניים כלפי מטה"],"c":2,"t":"2023"},{"q":"ציון2. ללא חסר נוירולוגי פוקלי נוסף. בוצע CT ראש שלא הדגיםמחלה צרברו-וסקולרית. מה יכול להסביר את ההבדל בין שתי בדיקות MMSE שביצע","o":["צפויים הבדלים גדולים בבדיקת ה- MMSE בין בודקים שונים","דליריום הינו הסבר סביר להבדלים","בדמנציה על רקע מחלת אלצהיימר יתכנו פלוקטואציות","בדמנציה על רקע מחלת גופיפי לוי (LBD )יתכנו פלוקטואציות"],"c":0,"t":"2023"},{"q":"בת 74 .לוקה בדמנציה. מאושפזת במחלקה הפנימית בשל החמרה באי-ספיקת הלב משנית לאי לקיחת טיפול תרופתי. העובדת הסוציאלית מדווחת כי המטופלת מתגוררת עם בנה הגרוש, שמוכר כמטפל הרשמי שלה מטעם חוק סיעוד . במהלך האשפוז הבן לא הגיע כלל למחלקה. לקראת השחרור המטופלת מבקשת לחזור לביתה. מה יהיה השלב הבא בתכנית השחרור של המטופלת?","o":["יש למנות עבורה אפוטרופוס שידאג לכל צרכיה","לקבל את הסכמתה לפנות לפקידת סעד","לכבד את רצונה של המטופלת ולשחררה לביתה","לדווח לפקידת סעד ולא לשחרר עד למציאת פתרון הולם"],"c":3,"t":"2023"},{"q":"מההמנגנון השכיח ביותר של תעוקת חזה בחולה זקן עם היצרות אאורטלית?","o":["מחלה קורונרית","איסכמיה סב-אנדוקרדיאלית","חוסר התאמה בין ה- CARDIAC OUTPUT לצרכים","פרפור עליות"],"c":0,"t":"2023"},{"q":"בן91, סובל מממאירות ריאה עם גרורות לעצמות, לכבד ולמוחהאונקולוגים החליטו להפסיק טיפולים כימותרפיים והמליצו על טיפול פליאטיבי בלבד. החולה מאושפז כרגע במחלקה פנימית בשל דלקת בדרכי השתן. מי מוסמך להיות \\\"הרופא האחראי\\\" ולהגדיר את החולה כנוטה למות?","o":["הרופא האונקולוג המומחה המטפל","כל רופא אונקולוג מומחה","מנהל המחלקה הפנימית","כל רופא מומחה במחלקה הפנימית"],"c":2,"t":"2023"},{"q":"איזו תשלובת חיסונים מומלצת לחולהCOPD בן80 בנוסף לחסון נגד שפעת","o":["PNEUMOVAX ו- PCV13 חד פעמי","PNEUMOVAX או 13PCV כל חמש שנים","PNEUMOVAX ו- PCV13 כל חמש שנים","PNEUMOVAX ו- PCV13 כל חמש שנים, חיסון ל- HAEMOPHILUS INFLUENZA חד פעמי"],"c":0,"t":"2023"},{"q":"איזה מהבאים נכון בנוגע לסמכות הרפואית הנדרשת להגדרת הסטטוס התפקודי המפורט במשפטים שלהלן?","o":["מומחה ברפואה פנימית יכול לאשר סטטוס סיעודי מורכב וסטטוס סיעודי","גריאטר מחוזי צריך לאשר סטטוס סיעודי או תשוש נפש אם זקוקים ל\\\"קוד\\\"","סטטוס שיקומי מאושר רק על-ידי גריאטר","סטטוס מונשם כרוני מאושר על-ידי גריאטר או רופא ריאות"],"c":1,"t":"2023"},{"q":"בן88, סובל מדמנציה מתקדמת, מרותק למיטה עם פצעי לחץ דרגה4. בבדיקות המעבדה עליית קריאטינין ל-8 והועלתה שאלה של טיפול בדיאליזה. לחולה בת אחת מסורה שאומרת שאביה היה מעוניין להימנע מדיאליזה במצב זה. אלצהיימר","ירידה קוגניטיבית בחולי סוכרת מעלה סיכון להיפרגליקמיה ולא להיפוגליקמיה","בחולי סוכרת רואים ירידה בתפקודים קוגניטיביים הקשורים לאונה הפריאטלית","בחולי סוכרת קיימת שכיחות מוגברת של פגיעה בתפקודים ניהוליים (EXECUTIVE )"],"c":3,"t":"מאי 2024"},{"q":"איזה מהבאים נכון בנוגע לירידת שמיעה תלוית גיל","o":["היא לא מושפעת ממחלות רקע כגון סוכרת ומחלות כלי דם","במעל 50% מהמקרים יש מרכיב תורשתי רלוונטי","אין הבדל בין גברים לנשים בשכיחות האבחנה","ניתן לבסס את האבחנה על בדיקת סקירה במרפאה גריאטרית"],"c":2,"t":"מאי 2024"},{"q":"תמונה מספר 2 .) מה הטיפול המומלץ","o":["הטריה כירורגית","אנטיביוטיקה סיסטמית רחבת טווח","הפחתת לחץ ומעקב","גרב אלסטית"],"c":3,"t":"מאי 2024"},{"q":"בן80 מתלונן לאחרונה על כאבי גב, לא ממוקמים, עם מהלך איטי והדרגתי. איזו אבחנה מתאימה לתלונות?","o":["אוסטאוארתריטיס","מתיחת שריר","שבר דחיסה בחוליות","פריצת דיסק חריפה"],"c":3,"t":"מאי 2024"},{"q":"מה מהבאים מהווהאינדיקציה לטיפול קבוע בחמצן ביתי קבוע לפחות 16 שעות ביום, במטופל עם","o":["PaO2 < 55 mmHg במנוחה","FEV1> 60%","Hematocrit < 45%","קוצר נשימה וסטורציה 88% במאמץ"],"c":2,"t":"מאי 2024"},{"q":"בת65 מתלוננת על הפרעות בשינה. במהלך השינה צועקת ומרביצה לבן זוגה. בבוקר אינה זוכרת את שאירע. מה מתאר נכונה את המצב?","o":["המצב שכיח בנשים וקשור בהזדקנות תקינה","המצב קשור בדום נשימה בשינה ויש לשקול שימוש ב - CPAP","מצב זה יכול להקדים הופעה של מחלת פרקינסון","מדובר בהפרעת התנהגות על רקע דמנציה ויש צורך בטיפול אנטיפסיכוטי"],"c":2,"t":"מאי 2024"},{"q":"מה קרה לאחוז הזקנים שמקבלים השלמת הכנסה בין השנים2005 ו– 2018 ?","o":["עלה","ירד","עלה עד 2010 ואז התחיל לרדת","ירד עד 2010 ואז התחיל לעלות"],"c":0,"t":"מאי 2024"},{"q":"בת70, מסיימת שיקום6 שבועות לאחרCVA שהשפיע על ה- Left Parietal Lobe. אין לה שום פגיעה מוטורית שארית, וחולשת יד ימין איתה התייצגה חלפה לחלוטין. עם זאת, היא מביעה תסכול מכך שלא מצליחה לבצע פעולות בסיסיות כגון לבוש, שימוש בסכין ומזלג, או סירוק השיער. היא מבינה את ההנחיות, יכולה לתאר במילים את רצף הפעולות הנדרש, אך לא מצליחה לייצר את התנועות הנדרשות באופן מותאם על מנת לסיים את המשימה. כיצד נקראת התופעה שאותה מציגה המטופלת?","o":["Ataxia","Neglect","Apraxia","Agnosia"],"c":2,"t":"מאי 2024"},{"q":"באיזה מהבאים מתוארת התוצאה המתאימה לפגיעה בעצב המפורט","o":["פגיעה בעצב V (TRIGEMINAL) תגרום להפרעה ב- CORNEAL REFLEX","פגיעה בעצב IX (GLOSSOPHARYNGEAL) תגרום לאטרופיה ופסיקולציות בלשון","פגיעה בעצב XII (HYPOGLOSSAL) תפגע בתנועות של שריר הטרפזיוס","פגיעה בעצב VII (FACIAL) תפגע בתנועות הראש לצדדים"],"c":1,"t":"מאי 2024"},{"q":"בן86, סובל מדמנציה בדרגת חומרה בינונית, עד לאחרונה פקד מועדון יום. מתקבל למיון עם כיב איסכמי ברגל ימין. הותחל טיפול באנטיביוטיקה תוך ורידית וזקוק לכריתה של הגפה בימים הקרובים. למטופל הנחיות מקדימות לפי חוק החולה הנוטה למות ויפויי כח מתמשך אשר לא הופעל. הצוות מתרשם כי אינו כשיר לתת הסכמה מדעת. כיצד מקבלים הסכמה לניתוח במקרה זה?","o":["למטופל הנחיות מקדימות בתוקף ויש לפעול לפיהן","ניתוח כריתה בחתימה של 3 רופאים","קבלת הסכמה של מיופה הכח והפעלת תוקף יפויי כח באופן מיידי","מנוי אפוטרופוס לצורך פעולה דחופה"],"c":2,"t":"מאי 2024"},{"q":"אילו מהמדדים הריאתיים הבאים עולה פיזיולוגית עם הזדקנות","o":["RV – Residual Volume","FVC - Forced Vital Capacity","FEV1 – Forced Expiratory Flow 1 sec","DLCO – Diffusing Capacity"],"c":0,"t":"מאי 2024"},{"q":"בן73, בימים האחרונים אינו מרוכז, ישנוני, סובל ממחשבות שווא והזיות ראיה שמחמירות בשעות הערב. אינו מודע למצבו. מה מומלץ לעשות?","o":["התחלת טיפול אנטיפסיכוטי וברור הסיבה לפסיכוזה","ברור הדמייתי בשאלה של דמנציה","התחלת טיפול נוגד דיכאון","ברור מקיף בשאלה של דליריום"],"c":0,"t":"מאי 2024"},{"q":"איזה מהבאים מהווה גורם סיכון לסרטן שד בנשים","o":["וסת ראשונה בגיל מאוחר","לידות מרובות","שתיית אלכוהול","תת משקל"],"c":1,"t":"מאי 2024"},{"q":"בן75, ברקע פרקינסון. התסמינים המוטורים החלו בגיל צעיר והחלו בצד שמאל, ניכר שסובל מברדיקינזיה משמעותית ורעד. איזה מבין נתוני החולה שתוארו, מהווה גורם סיכון לפתח דמנציה בפרקינסון?","o":["הופעת תסמינים מוטורים בגיל צעיר","רעד","ברדיקינזיה","תסמינים מוטורים שהחלו משמאל"],"c":1,"t":"מאי 2024"},{"q":"מה מאפיין פיזיולוגיה של הזדקנות הכליה","o":["פרוטאינוריה","זרימת הדם לכליה עולה","ירידה בנפח הכליה","עלייה בקראטינין בדם"],"c":0,"t":"מאי 2024"},{"q":"איזה מהבאים מתאר נכון את הממצאים בנוגע לשינויים בתגובה לאינסולין עם הגיל","o":["קיימת עליה ברגישות לאינסולין","עליה בכמות רקמת השומן קשורה בירידה ברגישות לאינסולין","קיימת ירידה בפעילות הגופנית שמעלה רגישות לאינסולין","לא נמצא שינוי ברגישות לאינסולין עם הגיל"],"c":0,"t":"מאי 2024"},{"q":"חולה מאושפז לאחר אירוע מוחי קשה ונזקק לעזרה מלאה בתפקודי מיטה ומעברים. איזו מההנחיות הבאות יש לתת לצוות הסיעודי למניעת פצעי לחץ?","o":["הצוות נדרש לשינויי תנוחה יזומים במיטה אחת למשמרת של 8 שעות","יש להקפיד על הגבהת זווית מיטה ל - 30 מעלות רוב שעות היום","במהלך הורדה לישיבה בכסא או כורסא יש להקפיד על הגבלה פיזית למניעת החלקה","בשכיבה יש למנוע לחץ בעקבים ולשמור אותם \\\"צפים\\\" באוויר על ידי כרית או אביזר אחר"],"c":1,"t":"מאי 2024"},{"q":"בן64, הסובל מסכיזופרניה מגיל20, נמצא במעקב פסיכיאטרי מסודר. עצמאי בתפקודי היומיום הבסיסיים (BADL), זקוק לעזרה והכוונה בתפקודים האינסטרומנטלייםIADL), יוצא לעבודה מוגנת התגורר עד לאחרונה עם הוריו, שמתקשים לתמוך בו. מה ההגדרה המתאימה עבורו לצורך מיסוד?","o":["תשוש נפש","תשוש","נכה נפש","סיעודי חלקי"],"c":3,"t":"מאי 2024"},{"q":"בן65, יד ימין דומיננטית, מאושפז בשיקום נוירולוגי לאחרCVA איסכמי ב- MCA השמאלי הוא מגיע עם המיפרזיס מימין וקשיים בשפה. בבדיקה נראה שמבין את מה שנאמר לו וממלא הוראות פשוטות, אך הוא לא מצליח להביע את עצמו באופן מילולי וממציא מילים ( neologisms). הוא מתקשה לחזור אחרי משפטים מהו סוג האפאזיה ממנה סובל?","o":["Wernicke's aphasia","Broca's aphasia","Conduction aphasia","Global aphasia"],"c":3,"t":"מאי 2024"},{"q":"בן73, מגיע למיון עם קוצר נשימה והיפוקסמיה, איזומהמחלות הבאות יכולה להיות סיבה ל - HIGH OUTPUT HEART FAILUR?","o":["Hypothyroidism","Vitamin B1 deficiency","Amyloidosis","Cachexia"],"c":1,"t":"מאי 2024"},{"q":"מהו מנגנון הפעולה שלFinasteride (Propecia) ?","o":["חסימת ההמרה של דיהידרוטסטוסטרון לטסטוסטרון","עיכוב האנזים 5 Alpha Reductase","עיכוב האנזים Phosphodiesterase type 5","חסימת הפוספורילציה של Estradiol"],"c":0,"t":"מאי 2024"},{"q":"איזה מהשינויים הבאים מתרחש באופן פיזיולוגי בתפקודי התריס בגיל המבוגר","o":["ישנם פחות נוגדנים עצמיים","TBG (Thyroid-binding globulin) עולה","רמות T4 יורדות","TSH עולה"],"c":3,"t":"מאי 2024"},{"q":"איזה מהתהליכים הפתופיזיולוגיים הבאים קשור בהופעת עצירות בגיל המבוגר ?","o":["ירידה בקישור האנדורפינים בפלסמה לקולטנים במעי","עליה בשקיעת קולגן במעי הגס","עליה בפעילות העצבית המעכבת לשרירים הצירקולריים במעי","עליה בפעילות הפלקסוס המיינטרי"],"c":2,"t":"מאי 2024"},{"q":"מה הטיפולהמתאים לפצע המופיע בתמונה מספר 3 ?","o":["Hydrocolloids – כגוןGranuflex","Hydrogels - כגוןHydrogel","Alginates – כגוןKaltostat","Hydrofibers – כגוןAquacel"],"c":0,"t":"מאי 2024"},{"q":"מי מהמטופלים הבאים מתאים לאבחנה שלRHEUMATOID ARHTHRITIS ?","o":["בן 77, סינוביטיס בברך מזה חודשיים, שקיעת דםמוחשת, RF שלילי","בת 72, כאבים בכתפיים ובברכיים מזה חודש, שקיעת דם מוחשתRF חיובי","בת 84, סינוביטיס במפרקי הידיים דו צדדית מזה חצי שנהCRP מוגברRF חיובי","בן 85, כאבים בכתפיים ובגב מזה שנה, שקיעת דם תקינהRF חיובי"],"c":2,"t":"מאי 2024"},{"q":"מבין התרופות הבאות ל- COPD מי מעלהסיכון לפרכוסים?","o":["Tiotropium Bromide (Spiriva)","Ipratropium Bromide (Aerovent)","Theophylline (Teotrim)","Fluticasone Propionate (Flixotide)"],"c":1,"t":"מאי 2024"},{"q":"בן78, מאובחן כשנה עם מחלת פרקינסון. סובל מנדודי שינה וסיוטים המופיעים בדרך כלל לפחות 90 דקות לאחר תחילת השינהבנוסף, מתלונן על היעדר חוש ריח ועצירות. מה הטיפול התרופתי המומלץ?","o":["Brotizolam (Bondormin)","Melatonin (Circadin)","Zolpidem (Stilnox)","Zopiclone (Nocturno)"],"c":1,"t":"מאי 2024"},{"q":"לפי המאמרAdvanced Dementia שלMitchell, איזה מהבאים הוא קריטריון לפרוגנוזה של תוחלת חיים קצרה מ- 6 חודשים במטופל עם דמנציה מתקדמת בשלבFAST 7C?","o":["שלושה פצעי לחץ דרגה 2","צלוליטיס","מבחן MMSE פחות מ- 5","היפואלבומינמיה 2.2 גרם לדציליטר"],"c":1,"t":"מאי 2024"},{"q":"בן77, נושא טרכאוסטום, לאחר גמילה מהנשמה ממושכת, ללא צורך בסקשיין. עבר שיקום וכעת זקוק לעזרה ברחצה ובלבוש, הולך עם הליכון בעזרת מטפל מספר צעדים, אינו שולט על סוגר השתן. איזו מסגרת מתאימה להמשך טיפול בו?","o":["מחלקה למונשמים כרוניים","מחלקה תת אקוטית","מחלקה לסיעוד מורכב","מחלקה סיעודית"],"c":1,"t":"מאי 2024"},{"q":"מי מהבאים מעלה סיכון למחלת פרקינסון","o":["עישון סיגריות","חשיפה למתכות כבדות כמו מנגנז","שתיית קפה מעל 5 כוסות ליום","מגדר נשי"],"c":3,"t":"מאי 2024"},{"q":"מה נכון לגבי הטיפול ב- Hydralazine באי ספיקת לב","o":["מומלץ למטופלים שלא יכולים לסבול טיפול בחסמי ACE","מעלה תמותה","ניתן פעם ביום","קיימת קונטראינדיקציה לשילוב עם ניטרטים"],"c":2,"t":"מאי 2024"},{"q":"באיזה מהבאים מתואר שילוב נכון של תרופה לטיפול באלצהיימר עם תופעתהלוואי שלה?","o":["Donepazil - טכיקרדיה","Galantamine – עליה במשקל","Rivastigmine – אצירת שתן","Memantine – כאבי ראש"],"c":2,"t":"מאי 2024"},{"q":"למי מהחולים הבאים יש להתחיל טיפול תרופתי באנטי-פסיכוטיים באשפוז?","o":["בת 79 עם דליריום היפואקטיבי שממתינה לשיקום, כרגע שיתוף פעולה לקוי על רקע קושי במילוי הוראות. היועץ השיקומי הודיע כי המטופלת לא תעבור למחלקת שיקום עד שהדליריום ישתפר.","בת 82 עםUTI, שבלילות ממלמלת ומדברת. שכניה מתלוננים שקשה להם לישון עמה","בן 91 עם שבר מורכב בירך. בלילות מנסה לצאת מהמיטה ולחזור הביתה. הוא צועק על המטפלת הצמודה שלו בלילות שהיא מחזיקה אותו בכלא על מנת להרעיל אותו ותולש מעצמו ציוד רפואי.","בן 88 עם דמנציה קלה ברקע, במחלקת כוויות לאחר שפך על עצמו בטעות סיר מרק רותח. רוב הזמן משתף פעולה עם הצוות אך בכל פעם שהצוות בא להחליף לו חבישות צורח \\\"לא, לא, לא\\\" משתולל ומרביץ להם."],"c":0,"t":"מאי 2024"},{"q":"מהו נזק אפשרי של Tramadol בטיפול בכאב כרוני?","o":["מעלה סף לפרכוסים","מעלה סיכון לתמותה","גורם לעצירות בשכיחות גבוהה יותר משאר התרופות האופיואידיות","גורם לדכוי נשימתי בשכיחות גבוהה יותר משאר התרופות האופיואידיות"],"c":0,"t":"מאי 2024"},{"q":"מבין המצבים הבאים, מה מתאר נכונה קשר בין שינויפיזיולוגי בזקנה והשפעתו במהלך סביב ניתוח?","o":["ירידה בנוקשות בית החזה ועליה בסיכון לכשל נשימתי","ירידה במספר הנפרונים וירידה בסיכון לצבירת נוזלים","ירידה בזרימת הדם לדרמיס וירידה ביכולת ריפוי פצע","ירידה בזרימת הדם לכבד וזמן מחצית חיים קצר של התרופה בדם"],"c":1,"t":"מאי 2024"},{"q":"מה כולל שאלוןSARC-F SCREENING TEST?","o":["נפילות","ירידה במדרגות","מעברים במיטה","בדיקת צפיפות עצם"],"c":3,"t":"מאי 2024"},{"q":"(מבסיס1.2 .) מה מבין הבאים גרם לתלונות של החולה","o":["היפונתרמיה","היפוקלמיה","היפוקלצמיה","היפוגליקמיה"],"c":3,"t":"מאי 2024"},{"q":"הפצע בגודל 4.0x4.5x.0.5 cm בחלקו מכוסה ברקמה צהובה, מסביב לפצע אודם ונפיחות עם רגישות למישוש, דפקים פריפריים תקינים, במעבדה 13.000 לויקוציטים בוצעה הטריה כירורגית וניקוי של הפצע, עם חשיפה של עצם והמשך הפרשה מוגלתית בכמות רבה. הותחל טיפול אנטיביוטי סיסטמי. מה הטיפול המקומי המתאים להמשך הטיפול בפצע זה?","o":["טיפול ב - VACUM (לחץ שלילי","חבישת Hydrocolloid","חבישת Allginate עם יוני כסף","חבישה עם פד גזה יבש עם Polydine"],"c":2,"t":"מאי 2024"},{"q":"בן65 עם רקע שלCOPD מטופל באופן קבוע במשאף שלSalmeterol/Fluticasone. מגיע למיון עם קוצר נשימה. בימים האחרונים שיעול עם ליחה מוגלתית בכמות מוגברת. בבדיקה צפצופים על פני שתי ריאות וסטורציה 91% באוויר חדר מעבדה ללא סימנים של זיהום סיסטמי וללא אגירת 2CO . מה הטיפול המתאים לחולה זה?","o":["להתחיל טיפול בסטרואידים דרך הוריד ולהתחיל Noninvasive Positive Pressure Ventilation","אשפוז, מתן חמצן ואנטיביוטיקה דרך הוריד","אינהלציות של מרחיבי סימפונות, פרדניזון 40 מ\\\"ג, אנטיביוטיקה דרך הפה","להעלות מינון של משאף קבוע ולהוסיף משאף Tiotropium, מעקב רופא משפחה מחר"],"c":0,"t":"מאי 2024"},{"q":"בן79 ,הגיע למרפאה עם פריחה אורטיקרית בשילוב עם שלפוחיות מוצקות, מלווה בגרד, ללא מעורבות ריריות. מצורפת תמונה מספר 4 . מהי האבחנה המתאימה","o":["PEMPHIGUS FOLIACEUS","BULLOUS PEMPHIGOID","PEMPHIGUS VULGARIS","PARANEOPLASTIC PEMPHIGUS"],"c":2,"t":"מאי 2024"},{"q":"מהי התדירות המומלצת למעקב אקו לבבמטופל עם היצרות מסתם אאורטלי א-תסמיני?","o":["בהיצרות קלה רק בהופעת תסמינים","בהיצרות בינונית אחת לחמש שנים","בהיצרות קשה פעמיים בשנה","תדירות הבדיקה אחת לשנה ללא קשר לחומרת ההיצרות"],"c":0,"t":"מאי 2024"},{"q":"מה נכון מבחינת סיבוכי מחלת הסוכרת","o":["יש לחפש את סיבוכי הסוכרת החל מ- 5 שנים מזמןהאבחנה","אלבומינוריה הינה מדד להתקדמות מחלת כליות אך לא לסיכון קרדיווסקולארי","עלייה בקריאטינין תיראה לרוב עם אבחנת הסוכרת והינה הפיכה ברובה","אלבומינוריה הינה מדד פרוגנוסטי ומדד לתגובה לטיפול ,"c":2,"t":"מאי 2024"},{"q":"בת72, פליטה מאוקראינה, ללא היסטוריה רפואית ידועה, לדבריה בריאה בדרך כלל, לא שותה הרבה אלכוהול, וללא טיפול תרופתי קבוע. הופנתה בשל הרגשה כללית רעה מזה 2-3 ימים. בבדיקות הדם הפרעה משולבת באנזימי כבד. אילו מהממצאים הבאים מכוונים לכך שמדובר בהפרעה ממושכת, ולא אקוטית?","o":["רמת ALT גבוהה יותר מאשרAST .","הפרעה בתפקודי קרישה","רמה תקינה של אמוניה","רמת אלבומין מתחת ל 3 gr/dL"],"c":3,"t":"מאי 2024"},{"q":"בן82, לא ידוע על ירידה קוגניטיבית, ברקע ידוע על שחמת מזה כ- 20 שנים, על רקע כבד שומני אושפז בשל מספר הקאות דמיות כשעתיים טרם קבלתו, מלווה בדליריום. לציין 3-4 אירועים דומים בשנים האחרונות, אירוע אחרון לפני שנה וחצי, אז עבר קשירת דליות. בקבלתו יציב המודינמית ונשימתית, חום סיסטמי תקין. בבדיקות דם ללא חריגות משמעותיות ביחס לבדיקות קודמות, למעט רמת HB 10, כאשר הבסיס סביב 11, מה נכון לומר לגבי הבירור והטיפול במצבו","o":["המטופל מתאים לחוק החולה הנוטה למות, יש לבדוק אם קיימות הנחיות מקדימות, ולשקול להימנע מטיפולים פולשניים בהתאם","מתן מנת דם, ובמידה וההמוגלובין יישאר יציב עד הבוקר למחרת ויהיה שיפור במצבו הקוגניטיבי, תבוצע גסטרוסקופיה אבחנתית","לנוכח סיכון של 20-30% לתמותה סביב כל אירוע של דימום מדליות, חשוב ליידע את אישתו של המטופל על מצבו, ולהקפיד על מעקב קליני ומעבדתי קפדני","בהיעדר מדדי דלקת מוגברים, ולנוכח חשד נמוך ל - SBP (Spontaneous Bacterial Peritonitis), אין מקום למתן טיפול אנטיביוטי"],"c":1,"t":"מאי 2024"},{"q":"מה אופייני לאפידמיולוגיה הזיהומית במטופלים לאחר כריתת טחול","o":["סיכון מוגבר לזיהומים ויראלים","הסיכון לזיהומים גבוה יותר בשלוש השנים הראשונות לאחר הניתוח","סיכון מוגבר לזיהומים בחיידקים גרהם שליליים","כ- 3-5% מהמטופלים יפתחו זיהום מסכן חיים במהלך חייהם"],"c":0,"t":"מאי 2024"},{"q":"בת80, פנתה לבירור בשל חולשה גוברת. במעבדהHb = 8.1, רמת ויטמין B12 = 100 . מה מהבאים מתאים לאבחנה של חסר ויטמיןB12 ?","o":["Reticulocyte index = 1.1","MCV=90","LDH מוגבר","תאי מטרה במשטח דם"],"c":3,"t":"מאי 2024"},{"q":"מה מהבאים נכון לגבי פגיעה כלייתית מאמינוגליקוזידים","o":["מאופיינת בהיפרמגנזמיה בבדיקות הדם","יכולה להופיע גם שבוע לאחר סיום הטיפול","ת  בטיחותי במניעת נפילות ושברים","לטיפול ב- Carbamazepine סיכון להיפונתרמיה","טיפול ב - Gabapentin מחייב מעקב הדוק אחר רמות תרופה בדם"],"c":2,"t":"ספט 2024"},{"q":"מה מהבאים מהווה סיבוך של היצרות המסתם האאורטלי","o":["חסם עלייתי חדרי","השטחה של המיקרווילי ברירית המעי הדק","הפרעה בתפקוד הטסיות","עליה ברמות VON WILLEBRAND FACTOR"],"c":2,"t":"ספט 2024"},{"q":"בן67, חזר לביקורתלאחר חצי שנה של טיפול תרופתי לדחיפות במתן שתן (URGENCY INCONTINENCE ). ברקע הגדלה שפירה של הערמונית. הוא מדווח עלהפרעה בתפקוד המיני והופעת גניקומסטיה. מה התרופה שגרמה לתופעות הלוואי המתוארות?","o":["Tadafil (Phosphodiesterase Inhibitor)","Finasteride (5-Alpha-Reductase Inhibitor)","Mirabegron (Beta-3-Agonist)","Oxybutinin (Anticholinergic)"],"c":1,"t":"ספט 2024"},{"q":"מי מהבאים סובל מדליריוםע ל פי הקריטריונים של CAM -Confusion Assessment Method ?","o":["בן 91 עם דמנציה מתקדמת שבחודשים האחרונים צועק ברוב שעות היום והלילה, משפחתו הביאה אותו לאשפוז כי לא מסתדרים איתו בבית. גם באשפוז באי שקט תמידי, אינו ממלא הוראות, זיכרון קצר טווח מאוד לקוי.","בת 82 עםUTI, ברקע דמנציה בינונית. ישנונית מאוד, מתמצאת במקום ובסיטואציה, אך נרדמת תוך כדי משפטים ואינה מצליחה למלא משימות פשוטות כמו לאיית את שמה לאחור. דווח כי בלילה הייתה באי שקט וניסתה לצאת מהמיטה.","בת 75 חצי שנה לאחר אירוע מוחי , משתפת פעולה ומבצעת הוראות. מאז האירוע המוחי תפקודי זיכרון, שפה וקשב פגועים ביחס למצבה הבסיסי לפני האירוע .","בן 78, מאושפז בשל כאבים בחזה ומסרב לעבור את הצנתור שהומלץ לו. בכל פעם שנכנס איש צוות לחדר מקלל וצועק. כשנשאל על ידיכם שאלות התמצאות או שאלות לגבי מצבו עונה בעצבנות \\\"לא יודע\\\"."],"c":1,"t":"ספט 2024"},{"q":"בת74, עם השמנת יתר, מתלוננת על כאב ברכיים. הכאב מוחמר בזמן פעילות, מוקל במנוחה. מתארת כאב חד לסירוגין, בעיקר בב וקר או לאחר מנוחה ממושכת המלווה בנוקשות אשר חולפת תוך כחצי שעה. בבדיקה גופנית רגישות במישוש הברך, אי סדירות וקריפיטציות . בוצע צילום ברכיים. אילו ממצאים בצילום יאשרו את האבחנה הקלינית?","o":["היצרות המרווח הטיביו -פמורלי, אוסטאופיטים","עבוי קורטיקלי, אזורים סקלרוטיים וטרבקולות גסות","אוסטאופניה ונגעים ליטיים  קודם את המקל"],"c":1,"t":"ספט 2024"},{"q":"בן 88 עצמאי ושמור קוגניטיבית, נבדק במחלקה לרפואה דחופה עקב דלקת ריאות . הוא מתלונן על שיעול פרודוקטיבי עם ליחה צהובה. אינו מבולבל. סימנים חיוניים: חום 38.5, דופק 100 ,לחץ דם 146/85 ,נשימות 20 לדקה. במעבדה - 18,000 לויקוציטים, תפקודי כליה תקינים. על פי מדד CURB65 מהי הפרוגנוזה והמשך הטיפול המומלץ?","o":["סיכוי י התמותה פחות מ- 2% ,מתאיםלטיפול בקהילה אם יש מערכת תמיכה","סיכוי י התמותה 10%, מתאים לאשפוז במחלקה פנימית","סיכוי י התמותה מעל 20%, מתאים לאשפוז בחדר מוגבר","סיכויי התמותה מעל 40%, מתאים לאשפוז בטיפול נמרץ"],"c":0,"t":"ספט 2024"},{"q":"מה נכון לגבי הטיפול ב- (Entresto )Sacubitril-Valsartan ביחס למעכביACE ?","o":["גורם לפחות עליה בקריאטינין","גורם ליותר עליה באשלגן","אינו קו ראשון באי ספיקת לב HFrEF","מעלה יותר סיכון לתמותה"],"c":0,"t":"ספט 2024"},{"q":"בן75, ברקע מחלת פרקינסון מזה כ-9 שנים. מטופל ב- Dopicar כדור אחד4 פעמיםביום . לאחרונה הופיעו תנועות שרירים לא רצוניות דמויות ריקוד. מה ההמלצה המתאימה?","o":["להוסיף טיפול ב – Dopamine Agonist","להמשיך טיפול ב- Dopicar ללא שינוי","להפחית מינון של Dopicar","להוסיף טיפול ב - MAO-B Inhibitor"],"c":2,"t":"ספט 2024"},{"q":"בת72 עםRheumatoid Arthritis מטופלת ב- Methotrexate במינון20 מ\\\"ג פעם בשבוע היא מעוניינת בקבלת חיסון שפעת. מהי ההמלצה המתאימה?","o":["הפסקה זמנית של Methotrexate לשבועיים","המשך הטיפול ב- Methotrexate ללא שינוי","הורדה זמנית של מינון Methotrexate ל- 10 מ\\\"ג למשך חודש","החלפת הטיפול ל - Leflunomide ( Arava )"],"c":0,"t":"ספט 2024"},{"q":"בן87, מתגורר עם מטפלת צמודה שעוזרת לו ברחצה ובלבוש. מתנייד עם הליכון והשגחה צמודה של המטפלת. סובל מדמנציה. אושפז לאחר נפילה, אובחן שבר בקרסול. טופל ניתוחית. מה מהבאים יעכב את העברת המטופל לשיקום?","o":["פצע לחץ דרגה 4 בעכוז","איסור דריכה למשך 6 שבועות","מצבו התפקודי עוד טרם הנפילה","חוסר שיתוף פעולה עם המטפלים"],"c":3,"t":"ספט 2024"},{"q":"בת85 ברקע אבחנה של דמנציה על רקע אלצהיימר, עצמאית ב- ADL, מאושפזת לאחר תיקון שבר בצוואר הירך. לפי דיווח צוות סיעודי בערב הייתה באי שקט לא זיהתה את בני המשפחה. בבדיקה בבוקר מתמצאת במקום ","בדיקת CT חזה","סרולוגיה ל- WEST NILE VIRUS"],"c":0,"t":"ספט 2024"},{"q":"בת 77 נבדקת על ידי ראומטולוג בחשד ל - SLE (Lupus ) . איזו מהתרופות הבאות שמקבלת לא עשויה להשרות SLE ?","o":["Omeprazole","Ramipril","Hydrochlorothiazide","Aspirin"],"c":3,"t":"ספט 2024"},{"q":"כל הנתונים הקליניים הבאים לכאבי גב מהווים RED FLAGS ומצריכים בירור סיסטמי פרט לאחד. מה לא מהווה גורם המחייב בירור סיסטמי?","o":["מטופל הסובל מדיכוי חיסוני","ירידה במשקל","שימוש קבוע בסטרואידים","כאב גב מזה שבועיים"],"c":3,"t":"ספט 2024"},{"q":"על פי מחקר ה- Diabetes Prevention Program (DPP) בארה\\\"ב, איזה מהבאים נכון בנוגע לדרכים למניעת סוכרת בגיל המבוגר?","o":["ישנה יעילות שווה ל- METFORMIN ולשינוי אורחות חיים בהשוואה לפלצבו","שינוי אורחות חיים יעיל יותר בהשוואה לשימוש ב- METFORMIN","טיפול ב- METFORMIN יעיל יותר בהשוואה לשינוי באורחות החיים","טיפול ב- METFORMIN יעיל יותר במבוגרים לעומת צעירים"],"c":0,"t":"ספט 2024"},{"q":"בן 70, מעשן כבד, ברקע מחלת ריאות חסימתית כרונית קשה וברונכואקטזיות. בשנה האחרונה אשפוזים חוזרים עקב חום, שיעול פרודוקטיבי וקוצר נשימה. איזה טיפול אנטיביוטי מומלץ?","o":["INVANZ (ERTAPENEM)","AUGMENTIN (AMOXYCILLIN + CLAVULANIC ACID)","ROCEPHINE (CEFTRIAXONE)","CIPROXIN (CIPROFLOXACIN)"],"c":2,"t":"ספט 2024"},{"q":"באיזה מהבאים מתואר הבירור המתאים למטופל בחשד למחלת לב איסכמית יציבה","o":["CT Angio קרדיאלי, בבן70 עם שינויים ניווניים קשים בברכיים","אקו לב במאמץ, בבן 72 שעבר צנתור כלילי והכנסת סטנט לפני3 שנים","מבחן מאמץ, בבן 70 עם קוצב לב","מבחן מאמץ, בבן 72 שעבר ניתוח מעקפים לפני4 שנים"],"c":1,"t":"ספט 2024"},{"q":"מספר 1 .) אילו ממצאים נוספים צפוי למצוא בבדיקה הגופנית","o":["חולשת יד ימין","דופק לא סדיר","קושי בסגירת עין ימין","שיווי משקל לקוי"],"c":0,"t":"ספט 2024"},{"q":"בבדיקת MOCA ציון19. זיכרון3/5 מילים, תפקודים ניהוליים וקשב לקויים מאוד מה מהבאים מהווה CORE FEATURE לאבחנה של מצבו","o":["דלוזיות פרנואידליות","נפילות חוזרות","דיכאון","פלוקטואציות במצב הקוגניטיבי"],"c":2,"t":"ספט 2024"},{"q":"מה נכוןבנוגע לדרכים למניעת סיבוכים קרדיווסקולריים בחולי סוכרת קשישים?","o":["לטיפול בסטטי
