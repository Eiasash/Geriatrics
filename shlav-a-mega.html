<script>
'use strict';
// Initialize data arrays (populated by loader)
let QZ = [];
let TK = [];
let NOTES = [];
let DRUGS = [];
let FLASH = [];
let TABS = [];
let OSCE = [];

// ===== DATA LOADER =====
let loadingPromise = loadDataArrays();

async function loadDataArrays() {
  const basePath = './data/';
  const files = {
    'QZ': 'questions.json',
    'TK': 'topics.json', 
    'NOTES': 'notes.json',
    'DRUGS': 'drugs.json',
    'FLASH': 'flashcards.json',
    'TABS': 'tabs.json',
    'OSCE': 'osce.json'
  };
  
  try {
    const promises = Object.entries(files).map(([varName, fileName]) =>
      fetch(basePath + fileName)
        .then(r => r.json())
        .then(data => {
          window[varName] = data;
          return varName;
        })
    );
    
    const loaded = await Promise.all(promises);
    console.log('Loaded:', loaded.join(', '));
    return loaded;
  } catch (error) {
    console.error('Error loading data:', error);
    // Fallback: show error message
    const ct = document.querySelector('.ct');
    if (ct) {
      ct.innerHTML = '<div style="padding: 20px; color: red;">Error loading data files. Please check browser console.</div>';
    }
    throw error;
  }
}

migrateToIDB = async function() {

};

let calcVals={};

// CrCl
const age=calcVals.age||75,wt=calcVals.wt||55,cr=calcVals.cr||1.0,fem=calcVals.fem===undefined?0.85:calcVals.fem;
const crcl=Math.max(0,Math.round(((140-age)*wt*fem)/(72*cr)));
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Cockcroft-Gault CrCl</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
<div><label style="font-size:10px;color:#64748b">Age</label><input class="calc-in" type="number" value="${age}" onchange="calcUp('age',this.value)"></div>
<div><label style="font-size:10px;color:#64748b">Weight (kg)</label><input class="calc-in" type="number" value="${wt}" onchange="calcUp('wt',this.value)"></div>
<div><label style="font-size:10px;color:#64748b">Creatinine</label><input class="calc-in" type="number" step="0.1" value="${cr}" onchange="calcUp('cr',this.value)"></div>
<div><label style="font-size:10px;color:#64748b">Sex</label><select class="calc-in" onchange="calcUp('fem',this.value)">
<option value="0.85" ${fem<1?'selected':''}>Female (×0.85)</option><option value="1" ${fem>=1?'selected':''}>Male (×1)</option></select></div>
</div>
<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${crcl<30?'#dc2626':crcl<60?'#d97706':'#059669'}">${crcl} ml/min</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${crcl<30?'CKD 4-5: Avoid metformin, adjust all renally-cleared drugs':crcl<60?'CKD 3: Dose adjust many drugs':'CKD 1-2: Mild impairment'}</p>

['brad_sens','Sensory Perception',['Completely Limited (1)','Very Limited (2)','Slightly Limited (3)','No Impairment (4)']],
['brad_moist','Moisture',['Constantly Moist (1)','Very Moist (2)','Occasionally Moist (3)','Rarely Moist (4)']],
['brad_act','Activity',['Bedfast (1)','Chairfast (2)','Walks Occasionally (3)','Walks Frequently (4)']],
['brad_mob','Mobility',['Completely Immobile (1)','Very Limited (2)','Slightly Limited (3)','No Limitation (4)']],
['brad_nut','Nutrition',['Very Poor (1)','Probably Inadequate (2)','Adequate (3)','Excellent (4)']],
['brad_fric','Friction/Shear',['Problem (1)','Potential Problem (2)','No Apparent Problem (3)']]
];

h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">${label}</label>

opts.forEach((o,i)=>{h+=`<option value="${i+1}"${v===i+1?' selected':''}>${o}</option>`;});
h+=`</select></div>`;
});
const bradenRisk=bradenScore<=12?'High Risk':bradenScore<=14?'Moderate Risk':bradenScore<=18?'Mild Risk':'No Risk';
const bradenClr=bradenScore<=12?'#dc2626':bradenScore<=14?'#d97706':bradenScore<=18?'#2563eb':'#059669';
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">

// PADUA VTE Score

// Katz ADL Index

// Lawton IADL Scale

h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Lawton IADL Scale</h3>`;
lawtonItems.forEach((l,i)=>{const k='law_'+i,on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">
<span>${l} (Independent=1)</span><input type="checkbox" ${on?'checked':''} onchange="calcUp('${k}',this.checked?1:0)" style="width:16px;height:16px"></label>`;});
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">

<p style="font-size:10px;color:#64748b;margin-top:2px">${lawtonScore===8?'Fully independent':lawtonScore>=5?'Partially dependent':'Significantly dependent'} in IADLs</p>
</div></div>`;

// 4AT Rapid Delirium Screen
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">4AT (Rapid Delirium Screen)</h3>`;
const at4_1=[['Normal (0)','0'],['Mild sleepiness <10s (0)','0'],['Clearly abnormal (4)','4']];
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">1. Alertness</label>
<select class="calc-in" style="font-size:11px" onchange="calcUp('at4_1',this.value)">`;
at4_1.forEach(([l,v])=>{h+=`<option value="${v}"${String(calcVals.at4_1||0)===v?' selected':''}>${l}</option>`;});
h+=`</select></div>`;
const at4_2=[['No mistakes (0)','0'],['1 mistake (1)','1'],['2+ mistakes or untestable (2)','2']];
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">2. AMT4 (age, DOB, place, year)</label>
<select class="calc-in" style="font-size:11px" onchange="calcUp('at4_2',this.value)">`;
at4_2.forEach(([l,v])=>{h+=`<option value="${v}"${String(calcVals.at4_2||0)===v?' selected':''}>${l}</option>`;});
h+=`</select></div>`;
const at4_3=[['Achieves 7+ months correctly (0)','0'],['Starts but <7 / refuses (1)','1'],['Untestable (2)','2']];
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">3. Attention (months backwards)</label>

at4_3.forEach(([l,v])=>{h+=`<option value="${v}"${String(calcVals.at4_3||0)===v?' selected':''}>${l}</option>`;});

const at4_4=[['No (0)','0'],['Yes (4)','4']];
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">4. Acute change or fluctuating course</label>

<button id="copy-4at" onclick="copyReport('4at')" class="btn btn-o" style="margin-top:8px;font-size:10px;padding:4px 10px">📋 העתק דוח</button>
</div></div>`;

// MNA-SF (Mini Nutritional Assessment - Short Form)
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">MNA-SF (Nutritional Screen)</h3>`;

h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">${label}</label>
<select class="calc-in" style="font-size:11px" onchange="calcUp('${k}',this.value)">`;
opts.forEach(o=>{const val=o.match(/\((\d+)\)/)[1];h+=`<option value="${val}"${v===val?' selected':''}>${o}</option>`;});
h+=`</select></div>`;});

<span style="font-size:22px;font-weight:700;color:${mnaScore<=7?'#dc2626':mnaScore<=11?'#d97706':'#059669'}">${mnaScore}/14</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${mnaScore>=12?'Normal nutritional status':mnaScore>=8?'At risk of malnutrition':'Malnourished'}</p>
</div></div>`;

// Clinical Frailty Scale
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Clinical Frailty Scale (CFS)</h3>`;
const cfsOpts=['1 — Very Fit (robust, active, energetic)','2 — Well (no active disease, less fit)','3 — Managing Well (medical problems well-controlled)','4 — Vulnerable (not dependent, but slowed)','5 — Mildly Frail (limited IADLs)','6 — Moderately Frail (needs help with ADLs+IADLs)','7 — Severely Frail (completely dependent, approaching EOL)','8 — Very Severely Frail (bed-bound, may not recover from minor illness)','9 — Terminally Ill (<6mo prognosis)'];
const cfsV=calcVals.cfs||1;
h+=`<select class="calc-in" style="font-size:11px" onchange="calcUp('cfs',this.value)">`;
cfsOpts.forEach((o,i)=>{h+=`<option value="${i+1}"${cfsV==i+1?' selected':''}>${o}</option>`;});
h+=`</select>`;
const cfsClr=cfsV>=7?'#dc2626':cfsV>=5?'#d97706':cfsV>=4?'#2563eb':'#059669';
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">
<span style="font-size:22px;font-weight:700;color:${cfsClr}">${cfsV}/9</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${cfsV>=7?'Severely frail — high mortality, consider goals of care':cfsV>=5?'Frail — increased vulnerability to adverse outcomes':cfsV>=4?'Pre-frail / vulnerable':'Fit / not frail'}</p>
</div></div>`;

// Norton Scale (Pressure Injury)
const nortonSubs=[
['nrt_phys','Physical Condition',['Very Bad (1)','Poor (2)','Fair (3)','Good (4)']],
['nrt_ment','Mental Condition',['Stuporous (1)','Confused (2)','Apathetic (3)','Alert (4)']],
['nrt_act','Activity',['Bedfast (1)','Chairbound (2)','Walks with Help (3)','Ambulatory (4)']],
['nrt_mob','Mobility',['Immobile (1)','Very Limited (2)','Slightly Limited (3)','Full (4)']],
['nrt_inc','Incontinence',['Doubly (1)','Usually Urinary (2)','Occasional (3)','None (4)']]
];
const nortonScore=nortonSubs.reduce((s,[k])=>s+(calcVals[k]||1),0);
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Norton Scale (Pressure Injury Risk)</h3>`;
nortonSubs.forEach(([k,label,opts])=>{
const v=calcVals[k]||1;
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">${label}</label>
<select class="calc-in" style="font-size:11px" onchange="calcUp('${k}',this.selectedIndex+1)">`;
opts.forEach((o,i)=>{h+=`<option value="${i+1}"${v===i+1?' selected':''}>${o}</option>`;});
h+=`</select></div>`;});
const nortonClr=nortonScore<=12?'#dc2626':nortonScore<=14?'#d97706':'#059669';
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">
<span style="font-size:22px;font-weight:700;color:${nortonClr}">${nortonScore}/20</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${nortonScore<=12?'High risk — implement prevention':'Norton ≤14 moderate risk, >14 lower risk'}${nortonScore<=14?' — Turn schedule + skin assessment':''}</p>
<button id="copy-norton" onclick="copyReport('norton')" class="btn btn-o" style="margin-top:8px;font-size:10px;padding:4px 10px">📋 העתק דוח</button>
</div></div>`;

// Morse Fall Scale
const morseItems=[
['mor_hist','History of falling (last 3mo)',25],['mor_diag','Secondary diagnosis (≥2)',15],
['mor_amb','Ambulatory aid',['None/bedrest/wheelchair (0)','Crutches/cane/walker (15)','Furniture (30)']],
['mor_iv','IV/heparin lock',20],['mor_gait','Gait',['Normal/bedrest/immobile (0)','Weak (10)','Impaired (20)']],
['mor_ment','Mental status',['Oriented to own ability (0)','Overestimates / forgets limitations (15)']]
];
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Morse Fall Scale</h3>`;
morseItems.forEach(([k,l,pts])=>{
if(Array.isArray(pts)){
const v=String(calcVals[k]||0);
h+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#64748b;font-weight:600">${l}</label>
<select class="calc-in" style="font-size:11px" onchange="calcUp('${k}',this.value)">`;
pts.forEach(o=>{const val=o.match(/\((\d+)\)/)[1];h+=`<option value="${val}"${v===val?' selected':''}>${o}</option>`;});
h+=`</select></div>`;
}else{
const on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">

}});
const morseScore=morseItems.reduce((s,[k,,pts])=>{if(Array.isArray(pts))return s+(parseFloat(calcVals[k])||0);return s+(calcVals[k]||0);},0);
const morseClr=morseScore>=45?'#dc2626':morseScore>=25?'#d97706':'#059669';
h+=`<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center" class="calc-result">

<button id="copy-morse" onclick="copyReport('morse')" class="btn btn-o" style="margin-top:8px;font-size:10px;padding:4px 10px">📋 העתק דוח</button>
</div></div>`;

return h;
}

// ===== RTL MEDICOLEGAL TEXT GENERATOR =====
function copyReport(type){
let text='';const d=new Date().toLocaleDateString('he-IL');
if(type==='katz'){
const items=['רחצה','הלבשה','שימוש בשירותים','העברה','שליטה על סוגרים','אכילה'];
const score=items.reduce((s,_,i)=>s+(calcVals['katz_'+i]||0),0);
const deps=items.filter((_,i)=>!calcVals['katz_'+i]);
text=`הערכת תפקוד יומיומי (Katz ADL) — ${d}\n`;
text+=`ציון כולל: ${score}/6. `;
text+=score===6?'המטופל/ת עצמאי/ת בכל פעולות היומיום הבסיסיות.':
`המטופל/ת תלוי/ה בפעולות: ${deps.join(', ')}. רמת תלות: ${score>=4?'קלה':score>=2?'בינונית':'חמורה'}.`;
}else if(type==='norton'){
const labels=['מצב גופני','מצב נפשי','פעילות','ניידות','שליטה על סוגרים'];
const vals=['nrt_phys','nrt_ment','nrt_act','nrt_mob','nrt_inc'];
const score=vals.reduce((s,k)=>s+(calcVals[k]||1),0);
text=`הערכת סיכון לפצעי לחץ (Norton) — ${d}\n`;
text+=`ציון כולל: ${score}/20. `;
text+=`רמת סיכון: ${score<=12?'גבוהה':score<=14?'בינונית':'נמוכה'}. `;
text+=score<=14?'יש להפעיל פרוטוקול מניעת פצעי לחץ.':'סיכון נמוך, המשך ניטור.';
}else if(type==='4at'){
const score=(parseFloat(calcVals.at4_1)||0)+(parseFloat(calcVals.at4_2)||0)+(parseFloat(calcVals.at4_3)||0)+(parseFloat(calcVals.at4_4)||0);
text=`סקירת דליריום (4AT) — ${d}\n`;
text+=`ציון כולל: ${score}. `;
text+=score>=4?'ממצא מחשיד לדליריום ± פגיעה קוגניטיבית. יש להמשיך בירור ולטפל בגורם.':
score>=1?'ממצא מחשיד לפגיעה קוגניטיבית. יש לשקול הערכה נוספת.':'ללא דליריום או פגיעה קוגניטיבית.';
}else if(type==='braden'){
const score=['brad_sens','brad_moist','brad_act','brad_mob','brad_nut','brad_fric'].reduce((s,k)=>s+(calcVals[k]||1),0);
text=`הערכת סיכון לפצעי לחץ (Braden) — ${d}\n`;
text+=`ציון כולל: ${score}/23. `;
text+=`רמת סיכון: ${score<=12?'גבוהה':score<=14?'בינונית':score<=18?'קלה':'ללא סיכון'}. `;
text+=score<=18?'יש להפעיל פרוטוקול מניעה.':'';
}else if(type==='morse'){
const morseScore=[['mor_hist',25],['mor_diag',15],['mor_iv',20]].reduce((s,[k,p])=>s+(calcVals[k]||0),0)+
['mor_amb','mor_gait','mor_ment'].reduce((s,k)=>s+(parseFloat(calcVals[k])||0),0);
text=`הערכת סיכון נפילות (Morse) — ${d}\n`;
text+=`ציון כולל: ${morseScore}. `;
text+=`רמת סיכון: ${morseScore>=45?'גבוהה':morseScore>=25?'בינונית':'נמוכה'}. `;
text+=morseScore>=25?'יש להפעיל פרוטוקול מניעת נפילות.':'';
}else if(type==='gds'){
const score=Array.from({length:15},(_, i)=>calcVals['gds_'+i]||0).reduce((a,b)=>a+b,0);
text=`סקירת דיכאון (GDS-15) — ${d}\n`;
text+=`ציון כולל: ${score}/15. `;
text+=score>=10?'חשד לדיכאון חמור — יש להפנות להערכה פסיכיאטרית.':score>=5?'סקירה חיובית — יש להמשיך בירור ולשקול טיפול.':'תקין — ללא חשד לדיכאון.';
}
if(text&&navigator.clipboard){
navigator.clipboard.writeText(text).then(()=>{
const btn=document.getElementById('copy-'+type);
if(btn){btn.textContent='✅ הועתק';setTimeout(()=>btn.textContent='📋 העתק דוח',1500);}
});
}
}

if(srchQ.length>=2){

// Search questions
const qRes=[];QZ.forEach((item,i)=>{if(item.q.toLowerCase().includes(q)||item.o.some(o=>o.toLowerCase().includes(q)))qRes.push(i);});

const nRes=NOTES.filter(n=>n.topic.toLowerCase().includes(q)||n.notes.toLowerCase().includes(q));

dRes.forEach(d=>{h+=`<div class="card" style="padding:10px"><span style="font-weight:700;font-size:11px">${d.name}</span> ${d.beers?'<span class="badge badge-r">BEERS</span>':''}<div style="font-size:10px;color:#475569;margin-top:2px">${d.risk}</div></div>`;});

}

// ===== GERIATRIC LAB OVERLAY & BAYESIAN SLIDER =====
let frailtyLevel=3;
function renderLabOverlay(){
const labs=[
{name:'Hemoglobin',unit:'g/dL',young:[12,17.5],old:[11,15.5],note:'Lower Hgb thresholds acceptable in elderly; WHO criteria may over-diagnose anemia'},
{name:'Creatinine',unit:'mg/dL',young:[0.6,1.2],old:[0.5,1.5],note:'Reduced muscle mass → lower Cr despite reduced GFR; eGFR more reliable'},
{name:'D-dimer',unit:'ng/mL',young:[0,500],old:[0,null],note:'Age-adjusted cutoff: age×10 ng/mL. Standard 500 has poor specificity in elderly'},
{name:'TSH',unit:'mIU/L',young:[0.4,4.0],old:[0.4,7.0],note:'Mild TSH elevation (4-7) may be normal in >70yo; avoid over-treating subclinical hypothyroidism'},
{name:'Albumin',unit:'g/dL',young:[3.5,5.0],old:[3.0,4.5],note:'Acute phase reactant; drops in inflammation/illness, not just nutrition'},
{name:'BNP',unit:'pg/mL',young:[0,100],old:[0,300],note:'Rises with age, renal impairment; higher cutoffs needed in elderly for HF diagnosis'},
{name:'ESR',unit:'mm/hr',young:[0,20],old:[0,null],note:'Age-adjusted: (age+10)/2 for women, age/2 for men. Nonspecific in elderly'},
{name:'WBC',unit:'×10³/µL',young:[4.5,11],old:[3.5,11],note:'Blunted immune response may prevent leukocytosis in severe infection'},
{name:'Sodium',unit:'mmol/L',young:[136,145],old:[133,145],note:'Hyponatremia common; drug-induced (SSRIs, diuretics, carbamazepine) is most common cause'},
{name:'B12',unit:'pg/mL',young:[200,900],old:[300,900],note:'Low-normal (200-300) may be functionally deficient in elderly; check methylmalonic acid'}
];
let h=`<div class="sec-t">🔬 Geriatric Lab Reference</div>
<div class="sec-s">Age-adjusted ranges + Frailty impact on test interpretation</div>`;
// Frailty slider
h+=`<div class="card" style="padding:14px;margin-bottom:10px">
<div style="font-weight:700;font-size:12px;margin-bottom:8px">Frailty Level (CFS): ${frailtyLevel}/9</div>
<input type="range" min="1" max="9" value="${frailtyLevel}" class="frailty-slider" oninput="frailtyLevel=parseInt(this.value);render()">
<div style="display:flex;justify-content:space-between;font-size:9px;color:#64748b;margin-top:4px">
<span>1 — Very Fit</span><span>5 — Mildly Frail</span><span>9 — Terminal</span></div>
<div style="margin-top:8px;padding:8px 10px;background:${frailtyLevel>=7?'#fef2f2':frailtyLevel>=5?'#fffbeb':'#ecfdf5'};border-radius:8px;font-size:10px;color:${frailtyLevel>=7?'#991b1b':frailtyLevel>=5?'#92400e':'#166534'};line-height:1.5">
${frailtyLevel>=7?'⚠️ Severely frail: Standard lab cutoffs have reduced PPV. Many "abnormal" values are baseline. Focus on clinical significance, not numbers.':
frailtyLevel>=5?'⚡ Frail: Age-adjusted ranges should be used. Higher false-positive rate with standard cutoffs. Consider pre-test probability carefully.':
'✅ Fit: Standard age-adjusted ranges apply. Most screening tests retain reasonable test characteristics.'}</div>
</div>`;
// Lab cards
labs.forEach(l=>{
const ddimer=l.name==='D-dimer';
const esr=l.name==='ESR';
const oldHi=ddimer?75*10:esr?40:l.old[1];
h+=`<div class="card" style="padding:12px;margin-bottom:8px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
<span style="font-weight:700;font-size:12px">${l.name}</span>
<span style="font-size:10px;color:#64748b">${l.unit}</span></div>
<div style="display:flex;gap:12px;font-size:10px;margin-bottom:6px">
<span style="color:#2563eb">Young: ${l.young[0]}–${l.young[1]}</span>
<span style="color:#d97706">Elderly: ${l.old[0]}–${oldHi||'age×10'}${ddimer?' (age-adjusted)':''}</span></div>
<div style="font-size:10px;line-height:1.5;color:#475569;padding:6px 8px;background:#f8fafc;border-radius:8px">${l.note}</div>
${frailtyLevel>=5?`<div style="font-size:9px;color:#d97706;margin-top:4px">⚡ In frail patients: PPV of abnormal ${l.name} is reduced. Clinical correlation essential.</div>`:''}
</div>`;
});
return h;
}

// ===== NORMAL AGING VS PATHOLOGY CHEAT SHEET =====
let agingSearch='';
function renderAgingSheet(){
const data=[
{system:'Cardiovascular',normal:'↑ Aortic stiffness, ↑ SBP, LV wall thickening, ↓ max HR, ↓ diastolic relaxation',path:'HFpEF, aortic stenosis (calcific), atrial fibrillation, orthostatic hypotension'},
{system:'Pulmonary',normal:'↓ FEV1 (30mL/yr), ↓ chest wall compliance, ↓ PaO2 (normal: 80-age/4), ↑ residual volume',path:'COPD, pulmonary fibrosis, sleep apnea (OSA prevalence ↑ with age)'},
{system:'Renal',normal:'↓ GFR ~1 mL/min/yr after 40, ↓ concentrating ability, ↓ renin/aldosterone, ↓ tubular function',path:'CKD, AKI (lower threshold for nephrotoxins), hyponatremia (↑ ADH sensitivity)'},
{system:'Neurological',normal:'↓ Processing speed, ↓ working memory, mild word-finding difficulty, ↓ sleep efficiency, ↓ deep sleep',path:'Dementia (progressive ADL loss), delirium (acute), Parkinson disease, stroke'},
{system:'Musculoskeletal',normal:'↓ Bone density (0.5-1%/yr post-menopause), ↓ muscle mass (sarcopenia 3-8%/decade after 30), ↑ body fat',path:'Osteoporosis (fracture), severe sarcopenia (disability), polymyalgia rheumatica'},
{system:'GI',normal:'↓ Esophageal motility, ↓ gastric acid, ↓ hepatic blood flow/mass, slower transit time',path:'Dysphagia, GERD, C. difficile (especially post-antibiotics), constipation (severe/fecal impaction)'},
{system:'Endocrine',normal:'↓ Testosterone, ↑ insulin resistance, ↓ vitamin D synthesis, ↓ thyroid hormone clearance',path:'DM2 (new-onset), hypothyroidism, adrenal insufficiency, hyperosmolar state (HHS)'},
{system:'Immune',normal:'Immunosenescence: ↓ naive T cells, ↓ vaccine response, ↑ autoantibodies, ↑ inflammatory cytokines (inflammaging)',path:'Reactivation (herpes zoster, TB), severe infections without fever, poor vaccine response'},
{system:'Sensory',normal:'Presbyopia (lens stiffness ~50yo), presbycusis (high-frequency loss), ↓ taste/smell, ↓ proprioception',path:'Cataracts (opacification), glaucoma, AMD, sudden hearing loss'},
{system:'Skin',normal:'↓ Collagen, ↓ subcutaneous fat, ↓ wound healing, senile purpura, xerosis',path:'Pressure injuries, skin cancer (BCC/SCC/melanoma), bullous pemphigoid'},
{system:'Urogenital',normal:'↓ Bladder capacity, ↑ residual volume, ↓ detrusor contractility, BPH (men), vaginal atrophy (women)',path:'Urinary incontinence (urge/overflow/functional), recurrent UTI, urinary retention'},
{system:'Hematologic',normal:'↓ Bone marrow cellularity, ↓ stem cell reserve, normal CBC unless stressed',path:'Anemia of chronic disease, MDS, VTE (↑ risk with age), clonal hematopoiesis (CHIP)'}
];
let h=`<div class="sec-t">👴 Normal Aging vs. Pathology</div>
<div class="sec-s">Physiological changes vs. disease — know the difference</div>`;
h+=`<input class="search-box" placeholder="Search system or term..." oninput="agingSearch=this.value.toLowerCase();render()" value="${agingSearch}">`;
h+=`<div style="border-radius:12px;overflow:hidden;border:1px solid #e2e8f0">
<div class="aging-row" style="font-weight:700;font-size:11px;background:#f8fafc">
<div class="cell" style="color:#166534">✅ Normal Aging</div>
<div class="cell" style="color:#991b1b">❌ Pathology</div></div>`;
data.filter(d=>!agingSearch||d.system.toLowerCase().includes(agingSearch)||d.normal.toLowerCase().includes(agingSearch)||d.path.toLowerCase().includes(agingSearch)).forEach(d=>{
h+=`<div style="padding:6px 10px;font-weight:700;font-size:11px;background:#eff6ff;color:#1d4ed8">${d.system}</div>`;
h+=`<div class="aging-row">
<div class="cell normal-cell">${d.normal}</div>
<div class="cell path-cell">${d.path}</div></div>`;
});
h+=`</div>`;
return h;
}

// ===== FLASHCARD SPACED REP =====
function fcRate(q){// q: 0=again, 1=hard, 2=easy
const key='fc_'+S.fci%FLASH.length;
if(!S.fcsr)S.fcsr={};
if(!S.fcsr[key])S.fcsr[key]={n:0,next:0};
const s=S.fcsr[key];
const days=q===0?0:q===1?1:4;
s.n=q===0?0:s.n+1;s.next=Date.now()+days*86400000;
S.fci++;S.fcFlip=false;save();render();
}

// PWA + Background Sync + Daily Notification
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js').then(reg=>{
// Schedule daily notification at 07:00
function scheduleDailyNotification(){
const now=new Date();
const target=new Date(now);
target.setHours(7,0,0,0);
if(now>=target)target.setDate(target.getDate()+1);
const delay=target-now;
setTimeout(()=>{
const dueN=getDueQuestions().length;
if(dueN>0&&reg.active){
reg.active.postMessage({type:'schedule-notification',dueCount:dueN});
}
scheduleDailyNotification();// Reschedule for next day
},delay);
}
// Request notification permission
if('Notification' in window&&Notification.permission==='default'){
Notification.requestPermission();
}
scheduleDailyNotification();
}).catch(()=>{});
}
// Background sync helper — call when Supabase backup fails offline
async function queueBackgroundSync(url,body,apikey){
try{
if('serviceWorker' in navigator&&'SyncManager' in window){
const reg=await navigator.serviceWorker.ready;
// Store pending data in IDB
if(idb){
const tx=idb.transaction('state','readwrite');
tx.objectStore('state').put({url,body,apikey},'pending_sync');
await new Promise(r=>{tx.oncomplete=r;});
}
await reg.sync.register('supabase-backup');
}
}catch(e){console.warn('Background sync registration failed:',e);}
}
