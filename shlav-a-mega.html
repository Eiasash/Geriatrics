/* ──── SZMC Clinical Kit v1 (injected) ──── */
/* SZMC Clinical Kit — semantic tokens + per-app skin. Additive layer; does
 * not remove existing --bg/--fg/--brd/--sky variables. New components should
 * reference --sem-* and --app-*; existing code keeps working unchanged.
 * Modes: body.dark, body.study (sepia) — both already match app conventions.
 */

/* ── Self-hosted Heebo (Hebrew + Latin, split by unicode-range) ── */
@font-face{font-family:"Heebo";font-style:normal;font-weight:400;font-display:swap;
  src:url("fonts/heebo-hebrew-400-normal.woff2") format("woff2");
  unicode-range:U+0590-05FF,U+FB1D-FB4F;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:500;font-display:swap;
  src:url("fonts/heebo-hebrew-500-normal.woff2") format("woff2");
  unicode-range:U+0590-05FF,U+FB1D-FB4F;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:600;font-display:swap;
  src:url("fonts/heebo-hebrew-600-normal.woff2") format("woff2");
  unicode-range:U+0590-05FF,U+FB1D-FB4F;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:700;font-display:swap;
  src:url("fonts/heebo-hebrew-700-normal.woff2") format("woff2");
  unicode-range:U+0590-05FF,U+FB1D-FB4F;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:400;font-display:swap;
  src:url("fonts/heebo-latin-400-normal.woff2") format("woff2");
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:500;font-display:swap;
  src:url("fonts/heebo-latin-500-normal.woff2") format("woff2");
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:600;font-display:swap;
  src:url("fonts/heebo-latin-600-normal.woff2") format("woff2");
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:700;font-display:swap;
  src:url("fonts/heebo-latin-700-normal.woff2") format("woff2");
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}

/* ── Self-hosted Inter (Latin only) ── */
@font-face{font-family:"Inter";font-style:normal;font-weight:400;font-display:swap;
  src:url("fonts/inter-latin-400-normal.woff2") format("woff2");}
@font-face{font-family:"Inter";font-style:normal;font-weight:500;font-display:swap;
  src:url("fonts/inter-latin-500-normal.woff2") format("woff2");}
@font-face{font-family:"Inter";font-style:normal;font-weight:600;font-display:swap;
  src:url("fonts/inter-latin-600-normal.woff2") format("woff2");}
@font-face{font-family:"Inter";font-style:normal;font-weight:700;font-display:swap;
  src:url("fonts/inter-latin-700-normal.woff2") format("woff2");}

/* ── Semantic tokens (clinical — reserved, never decorative) ── */
:root{
  --sem-critical:#ef4444;
  --sem-warning:#f59e0b;
  --sem-ok:#10b981;
  --sem-info:#3b82f6;
  --sem-neutral:#64748b;
  --tap-min:44px;
  /* Defaults (Shlav A already primary; overridden per-skin below) */
  --app-primary:rgb(var(--sky, 59 130 246));
  --app-accent:#8b5cf6;
  --app-on-primary:#fff;
}

/* ── Skin: Geriatrics (Shlav A) — amber primary, violet accent ── */
html[data-skin="geriatrics"]{
  --app-primary:#f59e0b;
  --app-accent:#8b5cf6;
  --app-on-primary:#1e293b;
}
/* ── Skin: Pnimit Mega — sky primary, emerald accent ── */
html[data-skin="pnimit"]{
  --app-primary:#3b82f6;
  --app-accent:#10b981;
  --app-on-primary:#fff;
}
/* ── Skin: Toranot — slate primary, sky accent ── */
html[data-skin="toranot"]{
  --app-primary:#1e293b;
  --app-accent:#3b82f6;
  --app-on-primary:#fff;
}

/* ── Dark mode (body.dark) keeps skin accent legible ── */
body.dark[data-skin="geriatrics"],html[data-skin="geriatrics"] body.dark{
  --app-primary:#fbbf24;
  --app-on-primary:#0f172a;
}
body.dark[data-skin="toranot"],html[data-skin="toranot"] body.dark{
  --app-primary:#3b82f6;
}
/* ── Study (sepia) — warm the primary toward amber for 3am ── */
body.study{--app-primary:#c48a3a;--app-on-primary:#0f172a;}

/* ── Clinical badges (semantic, reserved) ── */
.badge-critical{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#fef2f2;color:#dc2626}
.badge-warning {padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#fffbeb;color:#d97706}
.badge-ok      {padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#ecfdf5;color:#059669}
.badge-info    {padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#eff6ff;color:#2563eb}
body.dark .badge-critical{background:#450a0a;color:#fca5a5}
body.dark .badge-warning {background:#451a03;color:#fde68a}
body.dark .badge-ok      {background:#064e3b;color:#6ee7b7}
body.dark .badge-info    {background:#172554;color:#93c5fd}
body.study .badge-critical{background:#3d1212;color:#ff9b8a}
body.study .badge-warning {background:#3d2a12;color:#f0c878}
body.study .badge-ok      {background:#1e3d1e;color:#a6e0a0}
body.study .badge-info    {background:#1e2a3d;color:#a0c8f0}

/* ── Numeric (labs/doses/timers): tabular + LTR isolated inside RTL ── */
.num,.lab,.dose,.timer,.ltr-num{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:isolate;}

/* ── 44px tap minimum for interactive elements ── */
.tap-min,button.tap-min{min-height:var(--tap-min);}

/* ── Reduced motion (respect OS setting globally) ── */
@media (prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important;}}


/* Dark/study fixes for hardcoded-light inline styles */
body.dark [style*="background:#fef2f2"][style*="color:#991b1b"]{background:#450a0a!important;color:#fca5a5!important}
body.dark [style*="background:#f5f3ff"]{background:#2e1065!important;color:#c4b5fd!important}
body.dark [style*="background:#ede9fe"]{background:#2e1065!important;color:#c4b5fd!important}
body.study [style*="background:#fef2f2"]{background:#3d2a12!important;color:#c48a3a!important}
body.study [style*="background:#f5f3ff"]{background:#2a1e0d!important;color:#e8d5b0!important}
body.study [style*="background:#ede9fe"]{background:#2a1e0d!important;color:#e8d5b0!important}

/* ──── end Clinical Kit ──── */
*{box-sizing:border-box;margin:0;padding:0}
:root{--sky:59 130 246;--em:16 185 129;--sl8:30 41 59;--red:239 68 68;--amb:245 158 11;
--bg:248 250 252;--bg2:241 245 249;--bg3:255 255 255;--fg:30 41 59;--fg2:100 116 139;--fg3:148 163 184;
--brd:226 232 240;--card-bg:255 255 255;
--green-bg:240 253 244;--green-brd:187 247 208;--green-fg:22 101 52;
--blue-bg:239 246 255;--blue-brd:191 219 254;--blue-fg:30 64 175;
--yellow-bg:255 251 235;--yellow-brd:253 230 138;--yellow-fg:146 64 14;
--red-bg:254 242 242;--red-brd:254 202 202;--red-fg:153 27 27}
body{font-family:'Heebo','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:rgb(var(--bg));color:rgb(var(--fg));-webkit-font-smoothing:antialiased;overflow-x:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%}
.heb{font-family:'Heebo',sans-serif;unicode-bidi:plaintext;text-align:start}
button{cursor:pointer;border:none;background:none;font:inherit}
input,textarea,select{font:inherit}
.hdr{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;position:sticky;top:0;z-index:40}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:-.5px}
.hdr p{font-size:10px;color:rgb(var(--fg2));margin-top:1px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgb(var(--card-bg));border-top:1px solid #e2e8f0;display:flex;z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.06);padding-bottom:max(4px,env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:0 0 auto;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 6px 6px;transition:.15s;font-size:10px;font-weight:600}
.tabs button.on{color:var(--app-primary)}
.tabs button:not(.on){color:rgb(var(--fg3))}
.tabs .ic{font-size:18px}
.ct{max-width:640px;margin:0 auto;padding:12px 12px 80px}
.card{background:rgb(var(--card-bg));border-radius:16px;border:1px solid rgb(var(--brd));box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;margin-bottom:10px}
.pill{display:inline-block;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;transition:.15s;cursor:pointer}
.pill.on{background:var(--app-primary);color:var(--app-on-primary);box-shadow:0 2px 6px rgba(59,130,246,.25)}
.pill:not(.on){background:rgb(var(--card-bg));color:rgb(var(--fg2));border:1px solid rgb(var(--brd))}
.qo{width:100%;text-align:right;padding:12px 14px;border-radius:12px;border:2px solid #e2e8f0;font-size:12px;line-height:1.6;transition:.15s;margin-bottom:6px;font-family:'Heebo',sans-serif;display:block}
.qo:not(.lk):hover{border-color:#bae6fd;background:#f0f9ff}
.qo.sel{border-color:rgb(var(--sky));background:rgb(var(--blue-bg))}
.qo.ok{border-color:rgb(var(--em));background:#ecfdf5;color:rgb(var(--green-fg))}
.qo.no{border-color:rgb(var(--red));background:rgb(var(--red-bg));color:rgb(var(--red-fg))}
.qo.dim{border-color:#f1f5f9;color:#cbd5e1}
.btn{padding:7px 18px;border-radius:12px;font-size:12px;font-weight:700;transition:.15s;display:inline-block}
.btn:disabled{opacity:.35}
.btn-p{background:var(--app-primary);color:var(--app-on-primary)}
.btn-d{background:rgb(var(--sl8));color:#fff}
.btn-g{background:rgb(var(--em));color:#fff}
.btn-o{background:rgb(var(--bg2));color:rgb(var(--fg2))}
.ab{max-height:0;overflow:hidden;transition:max-height .3s ease}.ab.op{max-height:5000px}
.acc-h{width:100%;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;text-align:left;transition:.1s}
.acc-h:hover{background:rgb(var(--bg2))}
.acc-ic{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.acc-ar{font-size:10px;color:rgb(var(--fg3));transition:transform .2s}
.acc-ar.op{transform:rotate(180deg)}
.stats{display:flex;gap:6px;margin-bottom:12px}
.stat{flex:1;background:rgb(var(--card-bg));border-radius:14px;border:1px solid rgb(var(--brd));padding:10px 8px;text-align:center}
.stat .n{font-size:20px;font-weight:700}
.stat .l{font-size:9px;color:rgb(var(--fg2));text-transform:uppercase;font-weight:600;letter-spacing:.5px;margin-top:2px}
.fc{background:rgb(var(--card-bg));border-radius:16px;border:1px solid rgb(var(--brd));padding:24px 20px;min-height:180px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;transition:.2s;user-select:none}
.fc:active{transform:scale(.98)}
.search-box{width:100%;border:1px solid rgb(var(--brd));border-radius:12px;padding:8px 12px;font-size:12px;margin-bottom:12px}
.search-box:focus{outline:none;border-color:rgb(var(--sky));box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.timer{font-variant-numeric:tabular-nums;font-family:'Inter',monospace}
.ck{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;border:1px solid rgb(var(--brd));font-size:11px;cursor:pointer;margin-bottom:5px}
.ck:hover{background:rgb(var(--bg2))}
.ck.done span{text-decoration:line-through;color:rgb(var(--fg3))}
.topic{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;font-size:11px;cursor:pointer;transition:.1s}
.topic:hover{background:rgb(var(--bg2))}
.topic.done{background:#ecfdf5;border:1px solid #a7f3d0}
.drug-row{padding:8px 12px;border-bottom:1px solid rgb(var(--brd));font-size:11px}
.drug-row:last-child{border:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.badge-r{background:rgb(var(--red-bg));color:#dc2626}
.badge-y{background:rgb(var(--yellow-bg));color:#d97706}
.badge-g{background:#ecfdf5;color:#059669}
.calc-in{width:100%;border:1px solid rgb(var(--brd));border-radius:10px;padding:8px 12px;font-size:13px;margin-bottom:8px}
.calc-in:focus{outline:none;border-color:rgb(var(--sky))}
.sec-t{font-size:16px;font-weight:700;color:rgb(var(--fg));margin-bottom:3px}
.sec-s{font-size:10px;color:rgb(var(--fg2));margin-bottom:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
@media(min-width:768px){.ct{padding:20px 16px 88px;max-width:800px}.tabs button{min-width:64px;font-size:11px}.hdr h1{font-size:18px}}
@media(min-width:1024px){.ct{max-width:900px}.card{padding:16px}}
.dm-btn{position:absolute;top:50%;transform:translateY(-50%);font-size:18px;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;padding:0;opacity:.9;background:rgba(255,255,255,0.08);border-radius:50%;border:none;cursor:pointer;color:#fff}
.dm-btn:hover{opacity:1;background:rgba(255,255,255,0.18)}
.dm-btn:active{transform:translateY(-50%) scale(.92)}
.tabs button{min-height:44px}
.qo{min-height:44px;display:flex;align-items:center}
.ck{min-height:44px}
.topic{min-height:44px}

.btn:active{transform:scale(.96)}

.stat .l{font-size:10px}
.badge{font-size:10px}
.hdr p{font-size:11px}
.progress-bar{height:3px;background:#e2e8f0;border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--app-primary);border-radius:2px;transition:width .3s ease}

/* ===== BLIND RECALL BLUR ===== */
.qo-blur{filter:blur(8px);transition:filter .25s ease;user-select:none}
.qo-blur:active,.qo-blur:focus,.qo-blur.revealed{filter:none}
.qo-blur::after{content:'Tap to reveal';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;color:rgb(var(--fg3));pointer-events:none;opacity:.9}
.qo{position:relative}

/* ===== SUDDEN DEATH ===== */
.sudden-death-banner{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff;padding:10px 14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;animation:pulse-red 2s infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.leaderboard-row{display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid rgb(var(--brd));font-size:11px}
body.dark .leaderboard-row{border-color:#334155}

/* ===== POMODORO ===== */
.pomo-bar{position:fixed;top:0;left:0;right:0;height:4px;background:#e2e8f0;z-index:60}
.pomo-bar .pomo-fill{height:100%;background:rgb(var(--em));transition:width 1s linear}
.pomo-overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;backdrop-filter:blur(6px)}
.pomo-overlay h2{font-size:24px;margin-bottom:8px}
.pomo-overlay .pomo-break-timer{font-size:64px;font-weight:700;font-variant-numeric:tabular-nums}


@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}




/* ===== MED BASKET ===== */
.med-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;background:rgb(var(--blue-bg));color:#1d4ed8;cursor:pointer;border:1px solid rgb(var(--blue-brd));margin:2px}
.med-chip .x{font-size:12px;font-weight:700;margin-left:2px;opacity:.6}
.med-chip .x:hover{opacity:1}
body.dark .med-chip{background:#1e3a5f;color:#93c5fd;border-color:rgb(var(--blue-fg))}
.acb-meter{height:10px;border-radius:5px;background:#e2e8f0;overflow:hidden;margin:6px 0}
.acb-meter .acb-fill{height:100%;border-radius:5px;transition:width .3s}

/* ===== DECISION TREE ===== */
.dt-node{padding:12px;border-radius:12px;border:2px solid #e2e8f0;margin-bottom:8px;cursor:pointer;transition:.15s;font-size:12px}
.dt-node:hover{border-color:rgb(var(--sky))}
.dt-node.active{border-color:rgb(var(--em));background:#ecfdf5}
.dt-node.inactive{opacity:.4}
body.dark .dt-node{border-color:#334155}
body.dark .dt-node.active{border-color:#059669;background:#064e3b}
.dt-result{padding:14px;border-radius:12px;border:2px solid rgb(var(--em));background:#ecfdf5;font-size:12px;line-height:1.7}
body.dark .dt-result{background:#064e3b;border-color:#059669;color:#a7f3d0}

/* ===== LAB OVERLAY ===== */
.lab-modal{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.lab-sheet{background:rgb(var(--card-bg));width:calc(100% - 24px);max-width:600px;max-height:85vh;border-radius:20px;overflow-y:auto;padding:20px 16px;animation:fadeIn .2s ease}
body.dark .lab-sheet{background:#1e293b;color:#e2e8f0}
.range-bar{height:8px;border-radius:4px;background:#e2e8f0;position:relative;margin:8px 0}
.range-bar .normal{position:absolute;height:100%;background:#bbf7d0;border-radius:4px}
.range-bar .marker{position:absolute;width:3px;height:16px;top:-4px;background:#1e293b;border-radius:2px}
body.dark .range-bar{background:#334155}
body.dark .range-bar .marker{background:rgb(var(--bg2))}
.frailty-slider{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(to right,#bbf7d0,#fde68a,#fecaca);outline:none}
.frailty-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#1e293b;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
body.dark .frailty-slider::-webkit-slider-thumb{background:#e2e8f0;border-color:#334155}

/* ===== CHEAT SHEET ===== */
.aging-row{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid rgb(var(--brd));font-size:10px}
.aging-row .cell{padding:8px 10px;line-height:1.5}
.aging-row .normal-cell{background:rgb(var(--green-bg));color:rgb(var(--green-fg))}
.aging-row .path-cell{background:rgb(var(--red-bg));color:rgb(var(--red-fg))}
body.dark .aging-row{border-color:#334155}
body.dark .aging-row .normal-cell{background:#064e3b;color:#6ee7b7}
body.dark .aging-row .path-cell{background:#450a0a;color:#fca5a5}

/* ===== DISTRACTOR AUTOPSY ===== */
.distractor-highlight{border:2px solid rgb(var(--brd)) !important;background:rgb(var(--bg2)) !important;position:relative}
.distractor-highlight::before{content:'🔍';position:absolute;top:-8px;right:-8px;font-size:14px}
body.dark .distractor-highlight{background:rgb(var(--bg2)) !important;border-color:rgb(var(--fg3)) !important}

/* ===== SPEECH BUTTON ===== */
.speech-btn{font-size:18px;padding:4px;opacity:.5;cursor:pointer;border:none;background:none;transition:.15s}
.speech-btn:hover,.speech-btn.speaking{opacity:1}
.speech-btn.speaking{animation:pulse-speak 1s infinite}
@keyframes pulse-speak{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ===== ROI SCATTER ===== */
.roi-grid{position:relative;width:100%;aspect-ratio:1.4;border-left:2px solid #64748b;border-bottom:2px solid #64748b;margin:12px 0}
.roi-dot{position:absolute;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;cursor:pointer;transition:.2s;border:2px solid rgba(255,255,255,.8);text-align:center;line-height:1.1;overflow:hidden}
.roi-dot:hover{transform:scale(1.3);z-index:5}
.roi-label{position:absolute;font-size:9px;color:rgb(var(--fg2));font-weight:600}

/* ===== VOICE PARSER ===== */
.voice-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;background:rgb(var(--red-bg));color:#dc2626;border:1px solid rgb(var(--red-brd));cursor:pointer}
.voice-btn.listening{background:#dc2626;color:#fff;animation:pulse-red 1.5s infinite}
body.dark .voice-btn{background:#450a0a;border-color:#7f1d1d}

/* Night/Study Mode */
body.study{background:#1a1008;color:#e8d5b0;
--bg:26 16 8;--bg2:34 21 8;--bg3:34 21 8;--fg:232 213 176;--fg2:160 128 96;--fg3:122 92 48;
--brd:61 42 18;--card-bg:34 21 8;
--green-bg:15 40 10;--green-brd:30 80 20;--green-fg:140 220 120;
--blue-bg:10 25 50;--blue-brd:40 80 140;--blue-fg:140 180 240;
--yellow-bg:30 25 10;--yellow-brd:70 55 25;--yellow-fg:220 190 100;
--red-bg:50 15 10;--red-brd:120 40 30;--red-fg:240 160 140}
body.study .card{background:#221508;border-color:#3d2a12}
body.study .hdr{background:linear-gradient(135deg,#0d0804,#1a1008)}
body.study .tabs{background:#221508;border-color:#3d2a12}
body.study .tabs button:not(.on){color:#a08060}
body.study .pill:not(.on){background:#221508;color:#a08060;border-color:#3d2a12}
body.study .qo{border-color:#3d2a12;color:#e8d5b0;background:#221508}
body.study .qo:not(.lk):hover{border-color:#7a5c30;background:#2a1e0d}
body.study .qo.sel{border-color:#c48a3a;background:#2a1e0d}
body.study .search-box,body.study .calc-in{background:#221508;border-color:#3d2a12;color:#e8d5b0}
body.study .stat{background:#221508;border-color:#3d2a12}
body.study .fc{background:#221508;border-color:#3d2a12;color:#e8d5b0}
body.study .sec-t{color:#e8d5b0}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.chat-msg-user{background:rgb(var(--blue-bg));border-radius:12px 12px 2px 12px;padding:8px 12px;font-size:12px;align-self:flex-end;max-width:85%}
.chat-msg-ai{background:rgb(var(--bg2));border:1px solid rgb(var(--brd));border-radius:12px 12px 12px 2px;padding:8px 12px;font-size:12px;align-self:flex-start;max-width:90%;white-space:pre-wrap;line-height:1.6}
.chat-msg-err{background:rgb(var(--red-bg));border:1px solid rgb(var(--red-brd));border-radius:12px;padding:8px 12px;font-size:11px;color:#dc2626}
.chat-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid #e2e8f0}
.chat-starter{display:block;width:100%;text-align:right;padding:8px 12px;border-radius:10px;border:1px solid rgb(var(--brd));font-size:11px;margin-bottom:5px;background:rgb(var(--card-bg));cursor:pointer;font-family:'Heebo',sans-serif}
.chat-starter:hover{background:rgb(var(--blue-bg));border-color:#bae6fd}
.chat-disclaimer{font-size:10px;color:#d97706;padding:5px 8px;background:rgb(var(--yellow-bg));border-radius:8px;border:1px solid rgb(var(--yellow-brd))}
.typing-dots{display:flex;gap:4px;align-items:center;padding:2px 0}.typing-dots span{width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:tdot 1.2s infinite}.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
body.dark .chat-msg-ai{background:#1e293b;border-color:#334155;color:#e2e8f0}
body.dark .chat-msg-user{background:#1e3a5f;color:#e2e8f0}
body.dark .chat-starter{background:#1e293b;border-color:#334155;color:#e2e8f0}
body.dark .chat-input-row{border-color:#334155}
body.dark .chat-disclaimer{background:#422006;border-color:rgb(var(--yellow-fg));color:#fcd34d}
.skip-link{position:absolute;left:-9999px;top:4px;z-index:9999;padding:6px 12px;background:#3b82f6;color:#fff;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none}
.skip-link:focus{left:4px}
:focus-visible{outline:2px solid #3b82f6;outline-offset:2px}

/* ===== TOOLTIPS ===== */
.tt-wrap{position:relative;display:inline-flex;align-items:center;gap:3px}
.tt-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#e2e8f0;color:rgb(var(--fg2));font-size:9px;font-weight:700;cursor:help;flex-shrink:0;line-height:1;border:none;padding:0}
.tt-icon:focus{outline:2px solid rgb(var(--sky));outline-offset:1px}
.tt-box{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;font-size:10px;line-height:1.5;padding:7px 10px;border-radius:8px;width:180px;z-index:999;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.tt-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:rgb(var(--fg))}
.tt-icon:hover+.tt-box,.tt-icon:focus+.tt-box{display:block}
</style>

<script>
// === DEBUG CONSOLE === (tap top-right corner 5x within 3s; window.__debug.show() to open manually)
(function initDebugConsole(){
var APP_NAME='Shlav A Mega';
var MAX_LOGS=200, MAX_ERRORS=50, MAX_NETWORK=100, MAX_ACTIONS=100;
var buffer={logs:[],errors:[],network:[],actions:[]};
function ts(){return new Date().toISOString().slice(11,23);}
function clip(arr,max){if(arr.length>max)arr.shift();}
function safeStr(a){if(a===undefined)return 'undefined';if(a===null)return 'null';if(typeof a==='string')return a;if(a instanceof Error)return a.message+(a.stack?'\n'+a.stack.slice(0,500):'');try{return JSON.stringify(a).slice(0,500);}catch(e){return String(a);}}
var origConsole={};
['log','info','warn','error','debug'].forEach(function(lvl){
origConsole[lvl]=console[lvl].bind(console);
console[lvl]=function(){var args=Array.prototype.slice.call(arguments);try{buffer.logs.push({ts:ts(),level:lvl,msg:args.map(safeStr).join(' ')});clip(buffer.logs,MAX_LOGS);}catch(e){}return origConsole[lvl].apply(console,args);};
});
window.addEventListener('error',function(e){buffer.errors.push({ts:ts(),msg:e.message||String(e),file:e.filename||'?',line:e.lineno||0,col:e.colno||0,stack:(e.error&&e.error.stack)||'(no stack)'});clip(buffer.errors,MAX_ERRORS);});
window.addEventListener('unhandledrejection',function(e){var r=e.reason;buffer.errors.push({ts:ts(),msg:'UnhandledRejection: '+((r&&r.message)||String(r)),stack:(r&&r.stack)||'(no stack)'});clip(buffer.errors,MAX_ERRORS);});
var origFetch=window.fetch;
if(origFetch){window.fetch=function(url,opts){var t0=performance.now();var u=typeof url==='string'?url:(url&&url.url)||'?';return origFetch.apply(this,arguments).then(function(r){buffer.network.push({ts:ts(),url:u,status:r.status,ms:Math.round(performance.now()-t0),ok:r.ok});clip(buffer.network,MAX_NETWORK);return r;},function(err){buffer.network.push({ts:ts(),url:u,status:0,ms:Math.round(performance.now()-t0),error:err.message||String(err)});clip(buffer.network,MAX_NETWORK);throw err;});};}
document.addEventListener('click',function(e){var t=e.target;if(!t||!t.tagName)return;var label='';if(t.id)label='#'+t.id;else if(t.className&&typeof t.className==='string')label='.'+t.className.split(/\s+/)[0];else label=t.tagName.toLowerCase();var oc=t.getAttribute&&t.getAttribute('onclick')||'';var fnMatch=oc.match(/^([a-zA-Z_$][\w$]*)\s*\(/);if(fnMatch)label+=' → '+fnMatch[1]+'()';buffer.actions.push({ts:ts(),label:label});clip(buffer.actions,MAX_ACTIONS);},true);
// 5-tap activator: invisible 40x40 div in top-right absolute corner. z-index 39
// places it BELOW .hdr (z-index 40), so dark/study/help buttons take precedence
// on overlapping pixels — only the corner pixels NOT covered by a button trigger
// the 5-tap counter. No document-level coordinate detection (was the source of
// the v10.38.1 collision with the dark-mode toggle).
var taps=[];
function registerTap(){var n=Date.now();taps=taps.filter(function(z){return n-z<3000;});taps.push(n);if(taps.length>=5){taps=[];showDebugPanel();}}
// Keyboard shortcut: Ctrl+Shift+D (desktop) or window.__debug.show()
document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.shiftKey&&(e.key==='D'||e.key==='d')){e.preventDefault();showDebugPanel();}},true);
// Persistent button after first activation (sessionStorage flag) or ?debug=1 URL param
function shouldShowButton(){try{if(/[?&]debug=1\b/.test(location.search))return true;if(localStorage.getItem('__dbg_seen')==='1')return true;}catch(e){}return false;}
function injectActivatorAndButton(){
if(!document.body)return;
if(!document.getElementById('__debug_activator')){
var act=document.createElement('div');
act.id='__debug_activator';
act.setAttribute('style','position:fixed;top:0;right:0;width:40px;height:40px;z-index:39;pointer-events:auto;background:transparent');
act.addEventListener('click',function(e){e.stopPropagation();registerTap();});
act.addEventListener('touchend',function(e){e.stopPropagation();registerTap();});
document.body.appendChild(act);
}
if(shouldShowButton()&&!document.getElementById('__debug_btn')){
var btn=document.createElement('button');
btn.id='__debug_btn';
btn.textContent='🐞';
btn.title='Debug console';
btn.setAttribute('style','position:fixed;bottom:70px;right:10px;width:36px;height:36px;border-radius:50%;background:#0891b2;color:#fff;border:none;font-size:18px;z-index:99998;box-shadow:0 2px 8px rgba(0,0,0,0.3);cursor:pointer');
btn.addEventListener('click',function(e){e.stopPropagation();showDebugPanel();});
document.body.appendChild(btn);
}
}
if(document.body)injectActivatorAndButton();
else document.addEventListener('DOMContentLoaded',injectActivatorAndButton);
function escapeHtml(s){return String(s==null?'':s).replace(/[<>&"']/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];});}
function buildReport(){
var ver=typeof APP_VERSION!=='undefined'?APP_VERSION:'?';
var swInfo=navigator.serviceWorker&&navigator.serviceWorker.controller?'shlav-a-v'+ver+' ('+navigator.serviceWorker.controller.state+')':'inactive';
var mem=performance.memory?'used '+Math.round(performance.memory.usedJSHeapSize/1048576)+'MB / total '+Math.round(performance.memory.totalJSHeapSize/1048576)+'MB / limit '+Math.round(performance.memory.jsHeapSizeLimit/1048576)+'MB':'n/a';
var state=[];
try{if(typeof tab!=='undefined')state.push('tab='+tab);}catch(e){}
try{if(typeof libSec!=='undefined')state.push('libSec='+libSec);}catch(e){}
try{if(typeof qi!=='undefined')state.push('qi='+qi);}catch(e){}
try{if(typeof pool!=='undefined'&&pool)state.push('pool='+pool.length);}catch(e){}
try{if(typeof QZ!=='undefined'&&QZ)state.push('QZ='+QZ.length);}catch(e){}
try{if(typeof grsChOpen!=='undefined'&&grsChOpen)state.push('grsChOpen='+grsChOpen);}catch(e){}
try{if(typeof hazChOpen!=='undefined'&&hazChOpen)state.push('hazChOpen='+hazChOpen);}catch(e){}
try{if(typeof harChOpen!=='undefined'&&harChOpen)state.push('harChOpen='+harChOpen);}catch(e){}
return ['=== DEBUG REPORT ===',
'App: '+APP_NAME+' v'+ver,
'SW: '+swInfo,
'URL: '+location.href,
'UA: '+navigator.userAgent,
'Screen: '+innerWidth+'x'+innerHeight+' @ '+(window.devicePixelRatio||1)+'dpr',
'Memory: '+mem,
'State: '+(state.join(', ')||'none'),
'Time: '+new Date().toISOString(),
'',
'=== RECENT ERRORS (showing last '+Math.min(buffer.errors.length,10)+' of '+buffer.errors.length+' total) ==='].concat(
buffer.errors.slice(-10).map(function(e){return '['+e.ts+'] '+e.msg+'\n  at '+(e.file||'?')+':'+(e.line||'?')+':'+(e.col||'?')+'\n  '+(e.stack||'').split('\n').slice(0,5).join('\n  ');}),
['','=== RECENT CONSOLE (showing last '+Math.min(buffer.logs.length,50)+' of '+buffer.logs.length+' total) ==='],
buffer.logs.slice(-50).map(function(l){return '['+l.ts+' '+l.level.toUpperCase()+'] '+l.msg.slice(0,300);}),
['','=== RECENT NETWORK (showing last '+Math.min(buffer.network.length,20)+' of '+buffer.network.length+' total) ==='],
buffer.network.slice(-20).map(function(n){return '['+n.ts+' '+(n.status||'ERR')+' '+n.ms+'ms] '+n.url.slice(0,120)+(n.error?' ERROR: '+n.error:'');}),
['','=== RECENT ACTIONS (showing last '+Math.min(buffer.actions.length,30)+' of '+buffer.actions.length+' total) ==='],
buffer.actions.slice(-30).map(function(a){return '['+a.ts+'] '+a.label;}),
['','=== END REPORT ===']).join('\n');
}
function showDebugPanel(){
try{localStorage.setItem('__dbg_seen','1');}catch(e){}
injectActivatorAndButton();
var existing=document.getElementById('__debug_panel');
if(existing){existing.remove();return;}
var panel=document.createElement('div');
panel.id='__debug_panel';
panel.setAttribute('style','position:fixed;bottom:0;left:0;right:0;height:75vh;background:#1a1a1a;color:#e0e0e0;font:11px/1.5 ui-monospace,monospace;z-index:999999;border-top:2px solid #0891b2;overflow-y:scroll;padding:12px;box-shadow:0 -10px 30px rgba(0,0,0,0.5);direction:ltr;text-align:left');
var report=buildReport();
panel.innerHTML='<div style="display:flex;gap:8px;margin-bottom:10px;position:sticky;top:0;background:#1a1a1a;padding-bottom:8px;border-bottom:1px solid #333;flex-wrap:wrap"><button id="__db_copy" style="background:#0891b2;color:#fff;border:0;padding:8px 14px;border-radius:6px;font-weight:600">📋 Copy</button><button id="__db_clear" style="background:#444;color:#fff;border:0;padding:8px 14px;border-radius:6px">🗑️ Clear</button><button id="__db_close" style="background:#dc2626;color:#fff;border:0;padding:8px 14px;border-radius:6px">✕ Close</button><span style="color:#888;align-self:center;font-size:10px">Tap top-right 5x to reopen</span></div><pre style="white-space:pre-wrap;word-break:break-word;margin:0">'+escapeHtml(report)+'</pre>'; // safe-innerhtml: report passed through escapeHtml; static button markup is code-controlled
document.body.appendChild(panel);
document.getElementById('__db_copy').onclick=function(){copyReport(report);};
document.getElementById('__db_clear').onclick=function(){buffer.logs.length=0;buffer.errors.length=0;buffer.network.length=0;buffer.actions.length=0;panel.querySelector('pre').textContent=buildReport();};
document.getElementById('__db_close').onclick=function(){panel.remove();};
}
function copyReport(text){
var btn=document.getElementById('__db_copy');
function flash(msg){if(!btn)return;var o=btn.textContent;btn.textContent=msg;setTimeout(function(){var b=document.getElementById('__db_copy');if(b)b.textContent='📋 Copy';},2000);}
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){flash('✅ Copied!');},fb);}else{fb();}
function fb(){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');flash('✅ Copied (fallback)!');}catch(e){flash('❌ Copy failed');}ta.remove();}
}
window.__debug={
show:showDebugPanel,
report:function(){origConsole.log(buildReport());return buildReport();},
buffer:buffer,
clear:function(){buffer.logs.length=0;buffer.errors.length=0;buffer.network.length=0;buffer.actions.length=0;}
};
origConsole.info('[debug-console] initialized — tap top-right 5x or call __debug.show()');
})();
</script>

<script>
document.addEventListener('DOMContentLoaded',function(){
const el=document.getElementById('hdr-sub');
if(!el)return;
function upd(){
const d=new Date();
const day=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
const h=String(d.getHours()).padStart(2,'0');
const m=String(d.getMinutes()).padStart(2,'0');
const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
el.textContent=day+' '+d.getDate()+' '+mon+' · '+h+':'+m;
}
upd();setInterval(upd,30000);
});

let QZ=[];

// ===== AUTO TOPIC TAGGING =====
let TK=[];

QZ.forEach(q=>{
const txt=(q.q+' '+q.o.join(' ')).toLowerCase();
let best=-1,mx=0;
TK.forEach((keys,ti)=>{let sc=0;keys.forEach(k=>{if(txt.includes(k.toLowerCase()))sc++;});if(sc>mx){mx=sc;best=ti;}});
q.ti=best>=0?best:8;

function getTopicStats(){
const st={};
Object.entries(S.sr).forEach(([idx,d])=>{
const q=QZ[idx];if(!q)return;
const ti=q.ti||0;
if(!st[ti])st[ti]={ok:0,no:0,tot:0};
st[ti].tot++;
if(d.tot>0&&d.ok/d.tot>=0.5)st[ti].ok++;else st[ti].no++;
});
return st;

// ===== STATE =====
const LS='samega';
// One-time exam-year tag migration. Runs before state loads so any persisted
// filter selections or tag-keyed fields get rewritten. Idempotent via
// __tagMigrationV1 sentinel inside the state object.
(function migrateExamYearTags(){
  const MAP={'יוני 21':'2021-Jun','יוני 22':'2022-Jun-Basic','יוני 22 על':'2022-Jun-Subspec','יוני 23':'2023-Jun-Basic','יוני 23 על':'2023-Jun-Subspec','יוני 25':'2025-Jun','מאי 24':'2024-May-Basic','ספט 24':'2024-Sep-Basic','מאי 24 על':'2024-May-Subspec','ספט 24 על':'2024-Sep-Subspec','2022':'2022-Jun-Basic','2023-Jun':'2023-Jun-Basic','2024-May':'2024-May-Basic','2024-Sep':'2024-Sep-Basic','2023-ב':'2023-Sep','2025':'2025-Jun'};
  // 2025-א cannot auto-migrate (split by classification) — drop from stored selections
  const DROP=new Set(['2025-א']);
  const rename=(v)=>{if(typeof v!=='string')return v;if(DROP.has(v))return null;return Object.prototype.hasOwnProperty.call(MAP,v)?MAP[v]:v;};
  const walk=(obj)=>{
    if(Array.isArray(obj)){for(let i=obj.length-1;i>=0;i--){const w=rename(obj[i]);if(w===null)obj.splice(i,1);else if(w!==obj[i])obj[i]=w;else if(obj[i]&&typeof obj[i]==='object')walk(obj[i]);}return;}
    if(obj&&typeof obj==='object'){for(const k of Object.keys(obj)){const v=obj[k];const w=rename(v);if(w===null)delete obj[k];else if(w!==v)obj[k]=w;else if(v&&typeof v==='object')walk(v);}}
  };
  const KEYS=[LS,'samega_mock_hist','samega_sessions','samega_custom_qs','samega_pending_qs'];
  for(const k of KEYS){
    try{const raw=localStorage.getItem(k);if(!raw)continue;const s=JSON.parse(raw);if(!s||(typeof s==='object'&&s.__tagMigrationV1))continue;walk(s);if(typeof s==='object'&&!Array.isArray(s))s.__tagMigrationV1=true;localStorage.setItem(k,JSON.stringify(s));}catch(e){/* corrupt — skip */}
  }
})();
let S=JSON.parse(localStorage.getItem(LS)||'null')||{ck:{},qOk:0,qNo:0,bk:{},notes:{},sr:{},fci:0,fcFlip:false,streak:0,lastDay:null,chat:[],studyMode:false,sp:{},spOpen:false,qnotes:{},gnotes:''};
if(!S.qnotes)S.qnotes={};
if(typeof S.gnotes!=='string')S.gnotes='';
if(!S.chat)S.chat=[];
if(S.studyMode===undefined)S.studyMode=false;
if(!S.streak)S.streak=0;if(!S.lastDay)S.lastDay=null;
if(!S.sp)S.sp={};
if(S.spOpen===undefined)S.spOpen=false;
if(S.notifOptIn===undefined)S.notifOptIn=false;
let _saveTimer;function save(){clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>{
  try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){console.error('Save failed:',e);}
  // Warn if localStorage approaching 5MB limit
  try{
    let total=0;
    for(let k in localStorage)if(localStorage.hasOwnProperty(k))total+=localStorage[k].length*2;
    if(total>4*1024*1024&&!window._lsWarnShown){
      window._lsWarnShown=true;
      console.warn('localStorage: '+(total/1024/1024).toFixed(1)+'MB — approaching limit');
      localStorage.removeItem('samega_ex');
      localStorage.removeItem('samega_weekly');
    }
  }catch(e){}
  updateSyncPill();
  },150)}

// ===== SYNC INDICATOR =====
// Tracks and displays cloud sync state in the header pill (#syncPill).
// States: 'offline' | 'syncing' | 'synced' | 'stale' | 'never' | 'failed'
// `stale` = last backup > 1 day old; `never` = user hasn't tapped Backup yet.
let _syncState='init';
function computeSyncState(){
  if(typeof navigator!=='undefined'&&navigator.onLine===false)return 'offline';
  if(_syncState==='syncing'||_syncState==='failed')return _syncState;
  const last=S&&S._lastCloudSync?new Date(S._lastCloudSync).getTime():0;
  if(!last)return 'never';
  const ageDays=(Date.now()-last)/86400000;
  if(ageDays>1)return 'stale';
  return 'synced';
}
function syncPillMeta(state){
  switch(state){
    case 'offline':  return {label:'🔴 Offline',       bg:'#fef2f2', fg:'#b91c1c', brd:'#fca5a5'};
    case 'syncing':  return {label:'☁️ Syncing…',      bg:'#eff6ff', fg:'#1d4ed8', brd:'#93c5fd'};
    case 'synced':   return {label:'🟢 Synced',        bg:'#ecfdf5', fg:'#15803d', brd:'#86efac'};
    case 'stale':    return {label:'🟡 Backup stale',  bg:'#fefce8', fg:'#a16207', brd:'#fde047'};
    case 'never':    return {label:'💾 Local only',    bg:'#f5f3ff', fg:'#6d28d9', brd:'#c4b5fd'};
    case 'failed':   return {label:'⚠️ Sync failed',   bg:'#fef2f2', fg:'#b91c1c', brd:'#fca5a5'};
    default:         return {label:'💾 Local only',    bg:'#f5f3ff', fg:'#6d28d9', brd:'#c4b5fd'};
  }
}
function updateSyncPill(){
  // Transient states (syncing/failed) are sticky; otherwise recompute from S + navigator.onLine.
  const st=(_syncState==='syncing'||_syncState==='failed')?_syncState:computeSyncState();
  const el=typeof document!=='undefined'?document.getElementById('syncPill'):null;
  if(!el)return;
  const m=syncPillMeta(st);
  el.textContent=m.label;
  el.style.background=m.bg;el.style.color=m.fg;el.style.border='1px solid '+m.brd;
  el.style.display='inline-block';
}
function showSyncStatus(){
  const st=(_syncState==='syncing'||_syncState==='failed')?_syncState:computeSyncState();
  const last=S&&S._lastCloudSync?new Date(S._lastCloudSync).toLocaleString():'never';
  const did=(typeof localStorage!=='undefined'?localStorage.getItem('samega_devid'):null)||'(not set)';
  const lines=[
    'Sync status: '+st,
    'Last cloud backup: '+last,
    'Device ID: '+String(did).slice(0,18)+(String(did).length>18?'…':''),
    '',
    navigator.onLine===false
      ? 'You are offline — changes are saved locally and will sync when you reconnect.'
      : (st==='synced'
        ? 'Everything is backed up. Go to Track → ☁️ Backup to Cloud to back up manually.'
        : 'To back up now, go to Track → ☁️ Backup to Cloud.'),
  ];
  toast(lines.join('\n'),'info',5000);
}
if(typeof window!=='undefined'){
  window.addEventListener('online', ()=>{if(_syncState!=='syncing')_syncState='init';updateSyncPill();});
  window.addEventListener('offline',()=>{updateSyncPill();});
}
(function updateStreak(){
const today=new Date().toISOString().slice(0,10);
if(S.lastDay===today)return;
const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
if(S.lastDay===yest)S.streak++;
else if(S.lastDay!==today)S.streak=1;
S.lastDay=today;save();
})();

// ===== INDEXEDDB MIGRATION =====
const IDB_NAME='shlav_mega_db',IDB_VER=1,IDB_STORE='state';
let idb=null;
function openIDB(){return new Promise((resolve,reject)=>{
const req=indexedDB.open(IDB_NAME,IDB_VER);
req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE);};
req.onsuccess=e=>{idb=e.target.result;resolve(idb);};
req.onerror=e=>reject(e.target.error);
});}
function idbGet(key){return new Promise((resolve,reject)=>{
if(!idb)return resolve(null);
const tx=idb.transaction(IDB_STORE,'readonly');
const req=tx.objectStore(IDB_STORE).get(key);
req.onsuccess=()=>resolve(req.result||null);
req.onerror=()=>resolve(null);
});}
function idbSet(key,val){return new Promise((resolve,reject)=>{
if(!idb)return resolve();
const tx=idb.transaction(IDB_STORE,'readwrite');
tx.objectStore(IDB_STORE).put(val,key);
tx.oncomplete=()=>resolve();
tx.onerror=()=>resolve();
});}
// ===== DATA LOADER (v10.0) =====
let _dataReady = false;
const _dataPromise = (async function loadDataArrays() {
  const basePath = './data/';
  const files = {
    QZ: 'questions.json',
    TK: 'topics.json',
    NOTES: 'notes.json',
    DRUGS: 'drugs.json',
    FLASH: 'flashcards.json',
    TABS: 'tabs.json',
    QCHAPS: 'question_chapters.json',
    DIS: 'distractors.json',
    REG: 'regulatory.json',
  };
  try {
    const entries = Object.entries(files);
    const results = await Promise.all(
      entries.map(([varName, fileName]) =>
        fetch(basePath + fileName).then(r => {
          if (!r.ok) {
            // DIS is optional: missing distractors.json should not break data load
            if (varName === 'DIS') return {};
            throw new Error(varName + ': ' + r.status);
          }
          return r.json();
        }).catch(err => {
          if (varName === 'DIS') { console.warn('distractors.json unavailable:', err.message); return {}; }
          throw err;
        })
      )
    );
    entries.forEach(([varName], i) => {
      if (varName === 'QZ') QZ = results[i];
      else if (varName === 'TK') TK = results[i];
      else if (varName === 'NOTES') NOTES = results[i];
      else if (varName === 'DRUGS') DRUGS = results[i];
      else if (varName === 'FLASH') FLASH = results[i];
      else if (varName === 'TABS') TABS = results[i];
      else if (varName === 'QCHAPS') QCHAPS = results[i] || {};
      else if (varName === 'DIS') DIS = results[i];
      else if (varName === 'REG') REG = results[i];
      });
    _dataReady = true;
    // Build NOTES_BY_TI map so NOTES lookup is by topic-name match, not
    // positional. notes.json order does NOT necessarily match TOPICS[]
    // positional order; 8 of 40 topics had mismatches.
    try {
      const _nNorm = s => String(s||'').split('—')[0].split('(')[0].trim().toLowerCase();
      const _tKeys = TOPICS.map(_nNorm);
      NOTES_BY_TI = {};
      (NOTES||[]).forEach(n => {
        const nk = _nNorm(n.topic);
        let ti = _tKeys.indexOf(nk);
        if (ti < 0) ti = _tKeys.findIndex(tk => tk && nk && (tk.includes(nk) || nk.includes(tk)));
        if (ti >= 0 && NOTES_BY_TI[ti] === undefined) NOTES_BY_TI[ti] = n;
      });
    } catch(e) { console.warn('NOTES_BY_TI build failed', e); NOTES_BY_TI = {}; }
    // Load user-generated/approved questions from localStorage
    const _xp=lsGet('samega_pending_qs',[]);
    const _xc=lsGet('samega_custom_qs',[]);
    const _xAll=[..._xp,..._xc].filter(q=>q&&typeof q.q==='string'&&Array.isArray(q.o)&&q.o.length===4&&Number.isInteger(q.c)&&q.c>=0&&q.c<=3&&typeof q.ti==='number');
    // Dedup user-added questions by normalized question text — `_xp` and `_xc`
    // can overlap (pending → custom), and without this an approved question
    // appears twice in QZ and gets double-weighted in spaced repetition.
    const _xSeen=new Set();
    const _xUnique=[];
    for(const _xq of _xAll){
      const _key=_xq.q.trim().toLowerCase().slice(0,120);
      if(_xSeen.has(_key))continue;
      _xSeen.add(_key);
      _xUnique.push(_xq);
    }
    if(_xUnique.length){QZ.push(..._xUnique);console.log('Loaded '+_xUnique.length+' user-generated questions'+(_xAll.length!==_xUnique.length?' ('+(_xAll.length-_xUnique.length)+' duplicates skipped)':''));}
    console.log('Data loaded: ' + QZ.length + ' questions, ' + NOTES.length + ' notes');
    takeWeeklySnapshot();
  } catch (error) {
    console.error('Data load failed:', error);
    var ct = document.getElementById('ct');
    if (ct) ct.innerHTML = '<div style="padding:20px;color:red;text-align:center">' +
      '<b>Error loading data</b><br>Please refresh the page or clear cache.' +
      '<br><small>' + sanitize(error.message) + '</small></div>';
    throw error;
  }
})();

async function migrateToIDB(){
if(typeof _dataPromise!=='undefined') await _dataPromise; else await new Promise(r=>{const iv=setInterval(()=>{if(typeof QZ!=='undefined'&&QZ.length){clearInterval(iv);r();}},50);setTimeout(()=>{clearInterval(iv);r();},5000);});

try{
await openIDB();
const existing=await idbGet('samega');
if(!existing){
const lsData=localStorage.getItem(LS);
if(lsData){
await idbSet('samega',JSON.parse(lsData));
// Keep user_id for Supabase, clear the rest
const uid=null/*user_id removed*/;
localStorage.removeItem(LS);
// user_id removed — no longer needed
}else{
await idbSet('samega',S);
}
}else{
// Load from IDB into state
Object.assign(S,existing);
}
// Override save() to use IDB
const origSave=save;
window._idbSaveTimer=null;
const idbSave=()=>{clearTimeout(window._idbSaveTimer);window._idbSaveTimer=setTimeout(()=>{
idbSet('samega',JSON.parse(JSON.stringify(S))).catch(()=>{});
// Keep localStorage as fallback
try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}
},150);};
// Replace the global save
window.save=idbSave;
save=idbSave;
}catch(e){console.warn('IDB migration failed, using localStorage:',e);}
}
// Atomic-flush on page hide: if the debounced save timer is pending when the tab
// is closing/backgrounding, drain it synchronously to localStorage (the durable
// fallback layer). IDB write is best-effort — LS is guaranteed to hold latest S.
// Fixes audit finding: tab close during 150ms debounce could lose last edit.
function _flushSaveSync(){
  try{clearTimeout(_saveTimer);}catch(e){}
  try{if(window._idbSaveTimer)clearTimeout(window._idbSaveTimer);}catch(e){}
  try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}
  try{if(typeof idbSet==='function')idbSet('samega',JSON.parse(JSON.stringify(S))).catch(()=>{});}catch(e){}
}
// pagehide fires on tab close, navigation, and iOS Safari backgrounding — more reliable than beforeunload
window.addEventListener('pagehide',_flushSaveSync);
// visibilitychange→hidden covers mobile backgrounding where pagehide may not fire immediately
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')_flushSaveSync();});
migrateToIDB().then(()=>{
// v9.39: Reset study plan tier open states to collapsed
if(S._spVer!=='9.42'){S._spVer='9.42';delete S.sp_t1;delete S.sp_t2;delete S.sp_t3;delete S.sp_t4;delete S.spOpen;S.spOpen=false;save();}
// v10.46.0: bind cloud study-plan delegated handlers (idempotent via window.__studyPlanBound)
if(typeof window.bindStudyPlanEvents==='function')window.bindStudyPlanEvents();
renderTabs();render();if(!localStorage.getItem('shlav_seen_help')){localStorage.setItem('shlav_seen_help','1');setTimeout(showHelp,500);}}).catch(e=>{console.error('IDB init failed, falling back to localStorage:',e);renderTabs();render();});

// ===== POMODORO TIMER =====
let pomoActive=false,pomoSec=3000,pomoBreak=false,pomoBreakSec=300,pomoInterval=null;
function startPomodoro(){
pomoActive=true;pomoSec=3000;pomoBreak=false;pomoBreakSec=300;
if(pomoInterval)clearInterval(pomoInterval);
pomoInterval=setInterval(()=>{
if(pomoBreak){
pomoBreakSec--;
if(pomoBreakSec<=0){pomoBreak=false;pomoSec=3000;}
}else{
pomoSec--;
if(pomoSec<=0){pomoBreak=true;pomoBreakSec=300;}
}
const bar=document.getElementById('pomo-fill');
if(bar&&!pomoBreak)bar.style.width=((3000-pomoSec)/3000*100)+'%';
const el=document.getElementById('pomo-time');
if(el)el.textContent=fmtT(pomoBreak?pomoBreakSec:pomoSec);
if(pomoBreak)renderPomoOverlay();
else{const ov=document.getElementById('pomo-overlay');if(ov)ov.remove();}
},1000);

}
function stopPomodoro(){pomoActive=false;clearInterval(pomoInterval);pomoInterval=null;

function renderPomoOverlay(){
if(!pomoBreak)return;
if(document.getElementById('pomo-overlay'))return;
const div=document.createElement('div');div.id='pomo-overlay';div.className='pomo-overlay';
// safe-innerhtml: static copy; only interpolations are fmtT() (formatted timer string) and Math.ceil() of internal timer — no user input.
div.innerHTML=`<h2>Break Time</h2><p style="font-size:13px;margin-bottom:16px;color:rgb(var(--fg3))">Rest your eyes. Stand up. Stretch.</p>
<div class="pomo-break-timer" id="pomo-break-display">${fmtT(pomoBreakSec)}</div>
<p style="font-size:10px;margin-top:12px;color:rgb(var(--fg2))">Auto-resumes in ${Math.ceil(pomoBreakSec/60)} min</p>`;
document.body.appendChild(div);
const iv=setInterval(()=>{const d=document.getElementById('pomo-break-display');
if(!pomoBreak||!d){clearInterval(iv);const o=document.getElementById('pomo-overlay');if(o)o.remove();return;}
d.textContent=fmtT(pomoBreakSec);},1000);
}

// ===== NEXT BEST STEP FILTER =====
function startNextBestStep(){

function calcACBTotal(){return medBasket.reduce((sum,name)=>{const d=DRUGS.find(x=>x.name===name);return sum+(d?d.acb:0);},0);}
function getSTOPPWarnings(){
// Pure function of medBasket + DRUGS. Returns {level:'high'|'med'|'low', text}[].
const warnings=[];
const names=medBasket.map(n=>n.toLowerCase());
const entries=medBasket.map(n=>({n,d:DRUGS.find(x=>x.name===n)})).filter(e=>e.d);
const cats=entries.map(e=>(e.d.cat||'').toLowerCase());
const has=(pat)=>names.some(n=>pat.test(n));
const catHas=(pat)=>cats.some(c=>pat.test(c));
const flagged=(k)=>entries.filter(e=>e.d[k]);
// -------- Anticholinergic burden --------
const acDrugs=entries.filter(e=>e.d.acb>=2).map(e=>e.n);
if(acDrugs.length>=2)warnings.push({level:'high',text:`Dual anticholinergic burden: ${acDrugs.join(' + ')} — cumulative cognitive/fall risk (ACB ≥2 each)`});
// -------- Respiratory depression: benzo + opioid --------
const hasBenzo=catHas(/benzo/);
const hasOpioid=catHas(/opioid/);
if(hasBenzo&&hasOpioid)warnings.push({level:'high',text:'Benzodiazepine + Opioid — respiratory depression / overdose risk (Beers strong recommendation)'});
// -------- Antiplatelet load --------
const antiPlat=medBasket.filter(n=>/aspirin|clopidogrel|prasugrel|ticagrelor|ticlopidine/i.test(n));
if(antiPlat.length>=2)warnings.push({level:'med',text:`Dual antiplatelet: ${antiPlat.join(' + ')} — bleeding risk; reconsider duration/indication`});
// -------- Anticoagulant + antiplatelet / NSAID --------
const hasAnticoag=catHas(/anticoag|doac/);
const hasNSAID=catHas(/nsaid/);
if(hasNSAID&&hasAnticoag)warnings.push({level:'high',text:'NSAID + Anticoagulant — major GI bleed risk. Use paracetamol first-line.'});
if(hasAnticoag&&antiPlat.length>=1)warnings.push({level:'high',text:`Anticoagulant + Antiplatelet (${antiPlat.join(', ')}) — triple check indication, shortest duration possible, GI protection`});
// -------- Triple whammy: ACEi/ARB + diuretic + NSAID --------
const hasACE=has(/enalapril|ramipril|lisinopril|losartan|valsartan|candesartan|perindopril/i);
const hasDiuretic=catHas(/diuretic|thiazide|loop/);
const hasKsparing=has(/spironolactone|eplerenone|amiloride/i);
if(hasACE&&hasDiuretic&&hasNSAID)warnings.push({level:'high',text:'⚠️ TRIPLE WHAMMY: ACEi/ARB + diuretic + NSAID — AKI risk up to 8-fold. Stop NSAID if possible.'});
if(hasACE&&hasKsparing)warnings.push({level:'med',text:'ACEi/ARB + K-sparing diuretic — hyperkalemia risk. Check K, Cr weekly at initiation.'});
if(hasACE&&hasNSAID)warnings.push({level:'med',text:'ACEi/ARB + NSAID — AKI risk, reduced BP efficacy'});
// -------- Anticholinergic opposing cholinesterase inhibitor --------
const hasAntiChol=entries.some(e=>e.d.acb>=2);
const hasChEI=has(/donepezil|rivastigmine|galantamine/i);
if(hasAntiChol&&hasChEI)warnings.push({level:'high',text:'Anticholinergic opposes cholinesterase inhibitor — pharmacological conflict. One should stop.'});
// -------- Fall risk: CNS depressant tally --------
const fallDrugs=entries.filter(e=>e.d.falls||/benzo|sedat|opioid|antipsycho/i.test(e.d.cat||'')).map(e=>e.n);
if(fallDrugs.length>=3)warnings.push({level:'high',text:`Falls/fractures risk: ${fallDrugs.length} CNS-active drugs (${fallDrugs.join(', ')}) — STOPP criterion E`});
else if(fallDrugs.length===2)warnings.push({level:'med',text:`Dual fall-risk drugs: ${fallDrugs.join(' + ')} — consider consolidation/de-prescribe`});
// -------- QT-prolonging combination --------
const qtDrugs=entries.filter(e=>e.d.qt||/amiodarone|haloperidol|citalopram|escitalopram|methadone|moxifloxacin|azithromycin|ondansetron|quetiapine|trazodone/i.test(e.n)).map(e=>e.n);
if(qtDrugs.length>=2)warnings.push({level:'high',text:`QT-prolongation stack: ${qtDrugs.join(' + ')} — obtain ECG, correct K/Mg. Torsades risk.`});
// -------- Serotonin syndrome risk --------
const sero=entries.filter(e=>e.d.serotonergic||/SSRI|SNRI|TCA|tramadol|linezolid|MAOI/i.test(e.d.cat||'')||/fluoxetine|sertraline|citalopram|escitalopram|paroxetine|venlafaxine|duloxetine|tramadol|amitriptyline|nortriptyline|desipramine/i.test(e.n)).map(e=>e.n);
if(sero.length>=2)warnings.push({level:'high',text:`Serotonin-syndrome risk: ${sero.join(' + ')} — monitor for clonus/tremor/hyperthermia. Avoid adding tramadol/linezolid/methylene blue.`});
// -------- Digoxin --------
const hasDigoxin=has(/digoxin/i);
if(hasDigoxin){
  warnings.push({level:'med',text:'Digoxin — Beers: avoid >0.125 mg/day in elderly. Narrow therapeutic index. Monitor level + K.'});
  if(catHas(/loop/))warnings.push({level:'high',text:'Digoxin + loop diuretic — hypokalemia → digoxin toxicity. Replace K, check level.'});
  if(catHas(/thiazide/))warnings.push({level:'med',text:'Digoxin + thiazide — hypokalemia → digoxin toxicity. Monitor K.'});
  if(has(/amiodarone/i))warnings.push({level:'high',text:'Digoxin + amiodarone — ↑digoxin levels 50-70%. Halve digoxin dose.'});
}
// -------- Warfarin interaction cluster --------
const hasWarfarin=has(/warfarin/i);
if(hasWarfarin){
  if(hasNSAID)warnings.push({level:'high',text:'Warfarin + NSAID — major bleed risk. Switch to paracetamol.'});
  if(antiPlat.length)warnings.push({level:'high',text:`Warfarin + ${antiPlat.join('/')} — tight indication review + shortest duration + PPI cover.`});
  if(has(/amiodarone|metronidazole|sulfamethoxazole|fluconazole|ciprofloxacin/i))warnings.push({level:'high',text:'Warfarin + potent interaction drug — INR will spike. Empirically reduce warfarin 25-50% and recheck INR in 3-5 days.'});
}
// -------- Statin + CYP3A4 inhibitor --------
const statins=entries.filter(e=>/statin/i.test(e.d.cat||'')||/simvastatin|atorvastatin|lovastatin/i.test(e.n)).map(e=>e.n);
const cyp34Inh=entries.filter(e=>e.d.cyp3a4_inhibitor||/amiodarone|diltiazem|verapamil|clarithromycin|erythromycin|ketoconazole|itraconazole|fluconazole|ritonavir/i.test(e.n)).map(e=>e.n);
if(statins.some(s=>/simvastatin|lovastatin/i.test(s))&&cyp34Inh.length)warnings.push({level:'high',text:`Simvastatin/lovastatin + CYP3A4 inhibitor (${cyp34Inh.join(', ')}) — myopathy/rhabdo risk. Switch to rosuvastatin or pravastatin.`});
// -------- Clopidogrel + CYP2C19 PPI --------
if(has(/clopidogrel/i)&&has(/omeprazole|esomeprazole/i))warnings.push({level:'med',text:'Clopidogrel + omeprazole/esomeprazole — ↓antiplatelet activation (CYP2C19). Switch to pantoprazole.'});
// -------- Levothyroxine absorption --------
if(has(/levothyroxine|eltroxin|synthroid/i)){
  if(has(/ferrous|calcium|omeprazole|pantoprazole|esomeprazole|lansoprazole|sucralfate/i))warnings.push({level:'med',text:'Levothyroxine absorption ↓ by PPI / iron / calcium / sucralfate. Space by ≥4h and recheck TSH.'});
}
// -------- Metformin & other renal --------
if(has(/metformin/i))warnings.push({level:'low',text:'Metformin — verify eGFR ≥30; hold 48h around contrast. Lactic acidosis rare.'});
if(has(/nitrofurantoin/i))warnings.push({level:'med',text:'Nitrofurantoin — CI if CrCl<30 (pulmonary/hepatic/neuropathy risk in elderly).'});
// -------- PPI chronic use --------
const hasPPI=has(/omeprazole|pantoprazole|esomeprazole|lansoprazole/i);
if(hasPPI)warnings.push({level:'low',text:'PPI chronic use — Mg/Ca malabsorption, fracture, C. difficile risk. Document ongoing indication; deprescribe if possible.'});
// -------- Bradycardia-rate stack --------
const hasBB=catHas(/beta-?blocker/);
const hasNonDHP=has(/diltiazem|verapamil/i);
if(hasBB&&hasNonDHP)warnings.push({level:'high',text:'Beta-blocker + non-DHP CCB (diltiazem/verapamil) — severe bradycardia / AV block. Usually contraindicated.'});
// -------- Beers count summary (info) --------
const beersList=entries.filter(e=>e.d.beers).map(e=>e.n);
if(beersList.length)warnings.push({level:'med',text:`${beersList.length} Beers-listed drug${beersList.length>1?'s':''}: ${beersList.join(', ')} — review for alternatives.`});
return warnings;
}

function srScore(qIdx,correct,fsrsRating){
if(!S.sr[qIdx])S.sr[qIdx]={ef:2.5,n:0,next:0,ts:[],at:0,tot:0,ok:0};
const s=S.sr[qIdx];
if(s.tot===undefined){s.tot=0;s.ok=0;}
const elapsed=Math.round((Date.now()-qStartTime)/1000);
if(!s.ts)s.ts=[];
s.ts.push(elapsed);if(s.ts.length>10)s.ts.shift();
s.at=Math.round(s.ts.reduce((a,b)=>a+b,0)/s.ts.length);
s.tot++;if(correct)s.ok++;
// FSRS-4.5 scheduling
const rating=fsrsRating||(correct?3:1); // Use explicit rating if provided
const daysSinceReview=s.lastReview?Math.max(0,(Date.now()-s.lastReview)/86400000):0;
// Initialize or migrate FSRS state
if(s.fsrsS===undefined||s.fsrsD===undefined){
  if(s.n>0||s.ef!==2.5){
    const mig=fsrsMigrateFromSM2(s);s.fsrsS=mig.s;s.fsrsD=mig.d;
  }else{
    const init=fsrsInitNew(rating);s.fsrsS=init.s;s.fsrsD=init.d;
  }
}
const rPrev=daysSinceReview>0?fsrsR(daysSinceReview,s.fsrsS):1;
const upd=fsrsUpdate(s.fsrsS,s.fsrsD,rPrev,rating);
s.fsrsS=Math.round(upd.s*1000)/1000;
s.fsrsD=Math.round(upd.d*100)/100;
s.lastReview=Date.now();
// FSRS interval → next review
const fsrsDays=fsrsIntervalWithDeadline(s.fsrsS,s.fsrsD,rPrev);
s.next=Date.now()+fsrsDays*86400000;
// Keep SM-2 ef/n as proxies for filter compatibility
s.n=correct?s.n+1:0;
// ef mirrors difficulty: D=1→ef=2.5, D=10→ef=1.3
s.ef=Math.round((2.5-(s.fsrsD-1)/(10-1)*(2.5-1.3))*1000)/1000;
// session tracking
_sessionOk+=correct?1:0;_sessionNo+=correct?0:1;
if(correct&&QZ[qIdx])_sessionBest[QZ[qIdx].ti]=((_sessionBest[QZ[qIdx].ti]||0)+1);
if(!correct&&QZ[qIdx])_sessionWorse[QZ[qIdx].ti]=((_sessionWorse[QZ[qIdx].ti]||0)+1);
qStartTime=Date.now();
trackDailyActivity();
save();
}

// Time-to-answer signal helpers.
// Median of S.sr[i].at across all questions in topic `ti` with recorded time.
// Returns null if fewer than 3 samples — median isn't meaningful with less.
function topicMedianTime(ti){
  if(ti===undefined||ti===null||ti<0)return null;
  const samples=[];
  Object.entries(S.sr).forEach(([k,v])=>{
    const q=QZ[k];if(!q||q.ti!==ti)return;
    if(typeof v.at==='number'&&v.at>0)samples.push(v.at);
  });
  if(samples.length<3)return null;
  samples.sort((a,b)=>a-b);
  const mid=samples.length>>1;
  return samples.length%2?samples[mid]:Math.round((samples[mid-1]+samples[mid])/2);
}
// Global median across all recorded answer times — used when topic median is unavailable.
function globalMedianTime(){
  const samples=[];
  Object.entries(S.sr).forEach(([k,v])=>{
    if(typeof v.at==='number'&&v.at>0)samples.push(v.at);
  });
  if(samples.length<3)return null;
  samples.sort((a,b)=>a-b);
  const mid=samples.length>>1;
  return samples.length%2?samples[mid]:Math.round((samples[mid-1]+samples[mid])/2);
}
// Count of questions currently meeting the Slow filter criterion (avg >60s).
function slowQuestionCount(){
  let n=0;
  Object.values(S.sr).forEach(v=>{if(typeof v.at==='number'&&v.at>60)n++;});
  return n;
}

// ===== FINAL STRETCH: crunch-time quiz mode =====
// Builds a 40-q pool weighted by EXAM_FREQ, prioritizing unseen + previously-wrong questions.
// Different from Mock (exam simulation) and Rescue (3 weakest topics).
// Purpose: in the last weeks before exam, cover high-yield ground you haven't seen yet.
function buildFinalStretchPool(size=40){
const total=EXAM_FREQ.reduce((a,b)=>a+b,0);
if(!total){toast('EXAM_FREQ not loaded','error');return;}
// Group by topic
const byTopic={};
QZ.forEach((q,i)=>{const ti=q.ti>=0?q.ti:39;if(!byTopic[ti])byTopic[ti]=[];byTopic[ti].push(i);});
// Score each question: high if never-seen, medium if answered-wrong, low if answered-right
// Add topic-level weighting by EXAM_FREQ
function qScore(i,ti){
  const sr=S.sr[i];
  const tot=sr?.tot||0;
  const ok=sr?.ok||0;
  const topicWeight=(EXAM_FREQ[ti]||0)/total;  // 0..~0.15
  let urgency;
  if(tot===0)urgency=1.0;                       // never seen — highest priority
  else if(ok===0)urgency=0.9;                   // always wrong
  else if(ok/tot<0.5)urgency=0.7;               // mostly wrong
  else if(ok/tot<0.8)urgency=0.4;               // half-right
  else urgency=0.15;                            // mastered
  return urgency * (0.4 + topicWeight * 6);     // blend urgency w/ exam weight
}
// Compute target per topic by EXAM_FREQ
const scored=[];
EXAM_FREQ.forEach((freq,ti)=>{
  if(!freq||!byTopic[ti]||!byTopic[ti].length)return;
  byTopic[ti].forEach(i=>scored.push({i,ti,s:qScore(i,ti)}));
});
// Sort by score desc, pick top (size * 2), then shuffle & slice
scored.sort((a,b)=>b.s-a.s);
const top=scored.slice(0,size*2);
for(let i=top.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[top[i],top[j]]=[top[j],top[i]];}
pool=top.slice(0,size).map(x=>x.i);
_sessAnsw={};
qi=0;sel=null;ans=false;autopsyDistractor=-1;teachBackState=null;_optShuffle=null;_confidence=null;_pendingSR=null;
filt='finalStretch';render();
// Toast the plan
const daysLeft=(S.examDate||localStorage.getItem('shlav_exam_date'))?Math.max(0,Math.ceil((new Date(S.examDate||localStorage.getItem('shlav_exam_date'))-Date.now())/864e5)):null;
toast(`🎯 Final Stretch: ${size} high-yield questions${daysLeft!==null?` · ${daysLeft} days to exam`:''}`,'success',2500);
}

// Historical topic frequency weights (from 9 real exams, recency-weighted 2× for last 2)
const EXAM_FREQ=[0,34,30,28,36,43,178,39,63,36,20,27,19,22,50,40,22,94,70,78,18,80,43,21,46,27,29,52,10,11,7,0,6,9,26,19,23,9,17,0];
// target 100q: proportional + floor(1) for evergreen topics
function buildMockExamPool(){
  const total=EXAM_FREQ.reduce((a,b)=>a+b,0);
  const examPool=[];
  // Group QZ by topic
  const byTopic={};
  QZ.forEach((q,i)=>{const ti=q.ti>=0?q.ti:39;if(!byTopic[ti])byTopic[ti]=[];byTopic[ti].push(i);});
  // Compute target per topic
  EXAM_FREQ.forEach((freq,ti)=>{
    if(!freq||!byTopic[ti]||!byTopic[ti].length)return;
    const target=Math.max(1,Math.round(freq/total*100));
    // shuffle that topic's questions, take target count
    const src=[...byTopic[ti]].sort(()=>Math.random()-.5);
    for(let k=0;k<Math.min(target,src.length);k++)examPool.push(src[k]);
  });
  // Trim or pad to ~100
  examPool.sort(()=>Math.random()-.5);
  return examPool.slice(0,100);
}

function isMetaOption(text){
  // Detect options that reference letter positions or aggregate all answers
  // These must NOT be shuffled as their content references other option positions
  const t=(text||'').trim();
  const metaPatterns=[
    /כל\s*(ה)?תשוב/,           // כל התשובות נכונות
    /כל\s*(ה)?אמור/,            // כל האמור נכון
    /אף\s*תשוב/,                // אף תשובה
    /all\s+of\s+the\s+above/i,
    /none\s+of\s+the\s+above/i,
    /both\s+[a-e]\s+and\s+[a-e]/i,
    /[א-ת][׳']\s*ו[־-]?\s*[א-ת][׳']/,  // א׳ ו-ב׳, א׳ וג׳
    /^\s*[a-e]\s+and\s+[a-e]\s*$/i,      // "A and C"
    /\d\s*ו\s*\d/,              // 1 ו-2
  ];
  return metaPatterns.some(p=>p.test(t));
}
function remapExplanationLetters(text,shuf){
  // shuf[displayPos]=origIdx → build inverse: origIdx→displayPos
  const inv={};shuf.forEach((orig,disp)=>{inv[orig]=disp;});
  const letters=['A','B','C','D','E'];
  const heb=['א','ב','ג','ד','ה'];
  // Replace patterns like "התשובה הנכונה היא C" or "תשובה A" or "Answer B"
  return text.replace(/\b([A-E])\b/g,(m,letter)=>{
    const origIdx=letters.indexOf(letter);
    if(origIdx===-1||inv[origIdx]===undefined)return m;
    return letters[inv[origIdx]];
  }).replace(/(תשובה\s*)([א-ה])\b/g,(m,prefix,letter)=>{
    const origIdx=heb.indexOf(letter);
    if(origIdx===-1||inv[origIdx]===undefined)return m;
    return prefix+heb[inv[origIdx]];
  });
}
function getOptShuffle(qIdx,q){
  // Return stable shuffle for this question in this session
  if(_optShuffle&&_optShuffle.qIdx===qIdx)return _optShuffle.map;
  const n=q.o.length;
  // Separate meta-options (pin to end) from regular options (shuffle)
  const regular=[],meta=[];
  q.o.forEach((_,i)=>{isMetaOption(q.o[i])?meta.push(i):regular.push(i);});
  // Fisher-Yates shuffle of regular options only, seeded by qIdx
  let seed=qIdx*31+17;
  const rand=()=>{seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/0xffffffff;};
  for(let i=regular.length-1;i>0;i--){
    const j=Math.floor(rand()*(i+1));
    [regular[i],regular[j]]=[regular[j],regular[i]];
  }
  // Meta options stay at end in original relative order
  const map=[...regular,...meta];
  _optShuffle={qIdx,map};
  return map;
}

const _fmtNote=function(txt){
const parts=txt.split(/📖\s*HAZZARD'?S?\s*8e\s*BOARD\s*PEARLS:\s*/i);
const clinicalNotes=parts[0]||'';
const boardPearls=parts[1]||'';
function fmtLine(line){
// Section headers: ▸ HEADING — render as a styled block header
if(/^▸\s+/.test(line)){
const title=line.replace(/^▸\s+/,'');
return '<div style="margin:14px 0 6px;padding:5px 10px;background:linear-gradient(90deg,#eff6ff,transparent);border-left:3px solid #3b82f6;border-radius:0 4px 4px 0;font-size:10px;font-weight:800;color:rgb(var(--blue-fg));text-transform:uppercase;letter-spacing:.6px">'+title+'</div>';
}
// Sub-headers: ALL-CAPS word followed by colon at line start (e.g. "Tai Chi:", "RACF setting:")
line=line.replace(/^([A-Z][A-Z\s\/&\-()]{2,40}):/,'<strong style="color:#0f172a">$1:</strong>');
// Any remaining "Label:" pattern
line=line.replace(/^([^:\n]{2,50}):/,'<strong>$1:</strong>');
// Numbers with units, thresholds
line=line.replace(/(≥\d[\d.]*\s*(?:mmHg|m\/s|s\b|mg|IU|%)?|≤\d[\d.]*\s*(?:mmHg|m\/s|s\b|mg|IU|%)?|[<>]\d[\d.]*\s*(?:mmHg|m\/s|s\b|mg|IU|%)?|\d+–\d+%|\d+%)/g,'<b style="color:#0f172a">$1</b>');
// SOE badges
line=line.replace(/\(SOE=[A-C]\)/g,'<span style="background:#ecfdf5;color:#059669;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;vertical-align:middle">$&</span>');
// INCREASES / AVOID / WARNING keywords
line=line.replace(/\b(INCREASES|AVOID|DO NOT|WARNING|CRITICAL|CONTRAINDICATED)\b/g,'<span style="color:#dc2626;font-weight:700">$1</span>');
// Positive keywords
line=line.replace(/\b(SOE=A)\b/g,'<span style="color:#059669;font-weight:700">$1</span>');
return line;
}
function fmtBlock(t){
const paras=t.split(/\n{2,}/);
return paras.map(function(para){
const lines=para.split('\n');
// Check if first line is a section header
if(lines.length===1&&/^▸\s+/.test(lines[0])){
return fmtLine(lines[0]);
}
const fmt=lines.map(fmtLine).join('<br>');
return '<p style="font-size:11.5px;line-height:1.9;margin:0 0 10px;color:rgb(var(--fg))">'+fmt+'</p>';
}).join('');
}
let h='<div style="font-size:10px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📝 Clinical Notes</div>';

h+='</div>';
}
return h;
};

// ===== TOPIC PRIORITY MATRIX (added to Track tab) =====
function renderPriorityMatrix(){
  const TOPICS_L=TOPICS;
  const EF_FREQ=[0,34,30,28,36,43,178,39,63,36,20,27,19,22,50,40,22,94,70,78,18,80,43,21,46,27,29,52,10,11,7,0,6,9,26,19,23,9,17,0];
  const maxFreq=Math.max(...EF_FREQ);
  const tSt=getTopicStats();
  const rows=TOPICS_L.map((name,ti)=>{
    const s=tSt[ti]||{ok:0,no:0,tot:0};
    const acc=s.tot>0?s.ok/s.tot:null;
    const freq=EF_FREQ[ti]||0;
    const freqPct=maxFreq>0?freq/maxFreq:0;
    const gap=acc===null?0.7:(1-acc); // unknown → treat as 70% gap
    const priority=Math.round(freqPct*gap*100);
    return{ti,name,freq,acc,gap,priority,s};
  }).filter(r=>r.freq>0).sort((a,b)=>b.priority-a.priority);
  
  let h='<div style="font-weight:700;font-size:12px;margin:14px 0 8px;color:#0f172a">🎯 Priority Matrix — where to study next</div>';
  h+='<div style="font-size:9px;color:rgb(var(--fg3));margin-bottom:8px">Score = exam frequency × your gap. Higher = drill harder.</div>';
  rows.slice(0,15).forEach((r,rank)=>{
    const accStr=r.acc===null?'untested':`${Math.round(r.acc*100)}%`;
    const barW=Math.round(r.priority);
    const color=r.priority>=60?'#dc2626':r.priority>=30?'#f59e0b':'#10b981';
    const trend=getTopicTrend(r.ti);
    const trendStr=trend===null?'':trend>5?'<span style="color:#059669;font-size:10px">↑</span>':trend<-5?'<span style="color:#dc2626;font-size:10px">↓</span>':'<span style="color:rgb(var(--fg3));font-size:10px">→</span>';
    h+=`<div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <div style="font-size:11px;font-weight:${rank<5?'700':'400'}">${rank+1}. ${r.name} ${trendStr}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:9px;color:rgb(var(--fg2))">${r.s.tot}q · ${accStr}</span>
          <span style="font-size:10px;font-weight:700;color:${color}">${r.priority}</span>
        </div>
      </div>
      <div style="height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden">
        <div style="width:${barW}%;height:100%;background:${color};border-radius:3px"></div>
      </div>
    </div>`;
  });
  h+=`<div onclick="var el=document.getElementById('pmFull');el.style.display=el.style.display==='none'?'block':'none'" style="font-size:10px;color:rgb(var(--sky));cursor:pointer;margin-top:6px">Show all 40 topics ▾</div>`;
  h+=`<div id="pmFull" style="display:none">`;
  rows.slice(15).forEach((r,rank)=>{
    const accStr=r.acc===null?'untested':`${Math.round(r.acc*100)}%`;
    h+=`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgb(var(--brd));font-size:10px">
      <span>${rank+16}. ${r.name}</span>
      <span style="color:rgb(var(--fg2))">${r.s.tot}q · ${accStr}</span>
    </div>`;
  });
  h+=`</div>`;
  return h;
}

async function generateQuestionsFromChapter(source,chNum,chTitle){
const box=document.getElementById('quiz-me-box');
if(!box)return;
box.innerHTML='<div class="card" style="padding:16px;text-align:center"><div style="font-size:12px;color:#0ea5e9">✨ Generating board-style questions from Ch '+sanitize(chNum)+'...</div><div style="font-size:10px;color:rgb(var(--fg3));margin-top:4px">~15s</div></div>';
const chData=source==='haz'?(_hazData&&_hazData[String(chNum)]):(_harData&&_harData[String(chNum)]);
if(!chData){box.innerHTML='<div class="card" style="padding:16px;color:#dc2626">Chapter data not loaded — open the chapter first</div>';return;}
// v10.39.0 — defensive: section.content can be string OR array depending on parser
const excerpt=(chData.sections||[]).slice(0,5).map(function(s){
  const c=s.content;
  return (Array.isArray(c)?c.join(' '):String(c||'')).slice(0,800);
}).join('\n');
const textbookName=source==='haz'?"Hazzard's 8e":"Harrison's 22e";
// v10.40.0 — parallel-3 single-Q pattern. v10.39.0's single 1800-tok call
// took ~35s wall (Sonnet 4.6 ~60 tok/s) and got killed by the 30s client
// AbortController, surfacing as "signal is aborted without reason". Mirror
// of the proven scripts/eissue_via_proxy.py 6-worker / 1-Q-per-call pattern:
// 3 calls × 600 tokens each, parallel. Each ~10-15s, wall <20s.
const slices=[
  excerpt.slice(0,1200),
  excerpt.slice(1000,2200)||excerpt.slice(0,1200),
  excerpt.slice(2000,3200)||excerpt.slice(0,1200)
];
const focuses=['the opening third','the middle third','the final third'];
const buildPrompt=(idx)=>`Based on this ${textbookName} chapter section, generate exactly ONE board-style MCQ for the Israeli geriatrics שלב א׳ exam. Focus on ${focuses[idx]} of the chapter.

Chapter: ${chTitle}
Content:
${slices[idx]}

Return ONLY a single JSON object (no markdown, no preamble, no array brackets):
- q: clinical vignette stem (Hebrew preferred)
- o: 4 options
- c: correct index (0-3)
- e: 2-3 sentence Hebrew explanation covering the correct answer + the most likely distractor

Format: {"q":"...","o":["A","B","C","D"],"c":0,"e":"..."}`;
try{
const settled=await Promise.allSettled([
  callAI([{role:'user',content:buildPrompt(0)}],600,'sonnet'),
  callAI([{role:'user',content:buildPrompt(1)}],600,'sonnet'),
  callAI([{role:'user',content:buildPrompt(2)}],600,'sonnet')
]);
const questions=[];
for(const r of settled){
  if(r.status!=='fulfilled')continue;
  const m=r.value.match(/\{[\s\S]*\}/);
  if(!m)continue;
  try{const obj=JSON.parse(m[0]);if(obj&&obj.q&&Array.isArray(obj.o)&&typeof obj.c==='number')questions.push(obj);}catch(e){}
}
if(!questions.length)throw new Error('No valid questions returned (proxy may be overloaded — try again in a moment)');
// Display for review
let html='<div class="card" style="padding:16px">';
html+='<div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#0ea5e9">✨ Generated '+questions.length+' Questions</div>';
html+='<div style="font-size:10px;color:rgb(var(--fg2));margin-bottom:12px">Review and approve questions to add to your bank.</div>';
questions.forEach((gq,i)=>{
  html+='<div style="padding:10px;margin-bottom:8px;background:rgb(var(--bg2));border-radius:10px;border:1px solid rgb(var(--brd))">';
  html+='<div style="font-size:11px;font-weight:600;margin-bottom:6px;line-height:1.5" dir="'+heDir(gq.q)+'">'+(i+1)+'. '+sanitize(gq.q)+'</div>';
  gq.o.forEach((opt,oi)=>{
    html+='<div style="font-size:10px;padding:2px 0;color:'+(oi===gq.c?'#059669':'#64748b')+'" dir="'+heDir(opt)+'">'+(oi===gq.c?'✅':'○')+' '+sanitize(opt)+'</div>';
  });
  html+='<div style="font-size:9px;color:rgb(var(--fg2));margin-top:4px;line-height:1.5;unicode-bidi:plaintext" dir="'+heDir(gq.e)+'">'+sanitize(gq.e)+'</div>';
  html+='<button onclick="approveGeneratedQ('+JSON.stringify(gq).replace(/"/g,'&quot;')+')" style="margin-top:6px;font-size:10px;padding:4px 12px;background:#059669;color:#fff;border:none;border-radius:6px;cursor:pointer">✅ Add to Bank</button>';
  html+='</div>';
});
html+='</div>';
box.innerHTML=html;
}catch(err){
box.innerHTML='<div class="card" style="padding:16px;color:#dc2626">Error: '+sanitize(err.message)+'</div>';
}
}
function approveGeneratedQ(gq){
// Add the generated question to the local question bank
const newQ={q:gq.q,o:gq.o,c:gq.c,t:'Hazzard',ti:0,e:gq.e};
// Find best matching topic
for(let ti=0;ti<TOPICS.length;ti++){
  const topicLower=(TOPICS[ti]||'').toLowerCase();
  const qLower=(gq.q||'').toLowerCase()+(gq.e||'').toLowerCase();
  if(topicLower.split(/\s+/).filter(w=>w.length>3).some(w=>qLower.includes(w))){newQ.ti=ti;break;}
}
QZ.push(newQ);
// Store in localStorage as pending additions
let pending=[];try{pending=JSON.parse(localStorage.getItem('samega_pending_qs')||'[]');}catch(e){}
pending.push(newQ);
try{localStorage.setItem('samega_pending_qs',JSON.stringify(pending));}catch(e){}
toast('Question added! ('+QZ.length+' total). Note: pending server sync.','info');
}

// Guard: calcEstScore() returns a 60% neutral default for topics with <3 answers.
// For users with thin data, readiness collapses to ~60, polluting the global board.
// Require min answered + real calcEstScore result before submitting.
const LB_MIN_ANSWERED=20;
async function submitLeaderboardScore(){
const totalAnswered=Object.values(S.sr||{}).reduce((a,s)=>a+(s.tot||0),0);
const totalCorrect=Object.values(S.sr||{}).reduce((a,s)=>a+(s.ok||0),0);
if(totalAnswered<LB_MIN_ANSWERED)return{skipped:'thin_data',answered:totalAnswered};
const est=calcEstScore();
if(est==null)return{skipped:'no_est',answered:totalAnswered};
const streak=getStudyStreak();
const readiness=est;
// Cloud user id: username if logged in, otherwise stable per-device random.
let uid=(typeof getUserId==='function'?getUserId():localStorage.getItem('samega_uid'));
if(!uid){uid='u'+Math.random().toString(36).slice(2,10);try{localStorage.setItem('samega_uid',uid);}catch(e){}}
const payload={uid,answered:totalAnswered,correct:totalCorrect,streak,readiness,ts:new Date().toISOString()};
try{
  const res=await fetch(SUPA_URL+'/rest/v1/shlav_leaderboard',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_ANON,'Authorization':'Bearer '+SUPA_ANON,'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify(payload)
  });
  if(!res.ok){console.warn('Leaderboard submit non-ok',res.status);return{submitted:false,status:res.status};}
  return{submitted:true};
}catch(e){console.warn('Leaderboard submit failed',e);return{submitted:false,error:String(e)};}
}
