 מחושב לפי נוסחתCockcroft-Gault, ואילו על פיMDRD (Modification of Diet in Renal Disease ) הוא תקין ולכן לא תומך בפתולוגיה כלייתית","מדובר במחלת כליה כרונית (CKD) דרגה2 לפיKDIGO ודרוש המשך מעקב עם איסוף שתן 24 שעות לחלבון"],"c":1,"t":"ספט 2024"},{"q":"בן84 הגיע ליעוץ גריאטרי עקב ירידה קוגניטיבית שהחמירה בחודש האחרון. כמו כן מתלונן על תופעות חדשות של עצירות, טשטוש ראיה ויובש בפה. מספר שהיה לפני חודש במרפאת כאב והחל תרופה חדשה במינון נמוך. איזו תרופה חדשה שקיבל יכולה להסביר את התסמינים שלו?","o":["AMITRIPTYLINE ( ELATROL)","VENLAFAXINE ( VIEPAX)","DULOXETINE ( CYMBALTA)","GABAPENTIN"],"c":2,"t":"ספט 2024"},{"q":"מה מהווה גורם לפרוגנוזה ירודה ב-AML) Acute Myeloid Leukemia בזקנים","o":["שכיחות נמוכה של קריוטיפ 5q- 7q-","ביטוי מופחת של מסלולי TNF ו- RAS במח העצם","שכיחות גבוהה של MDS ברקע","רגישות מוגברת לאפופטוזיס של התאים הבלסטים"],"c":3,"t":"ספט 2024"},{"q":"בת82 התקבלה לשיקום לאחר ניתוח החלפה מלאה שלמפרק ירך ימין בעקבות שבר אוסטאופורוטי. ברקע: מחלה ריאתית חסימתית כרונית, אי ספיקה לבבית כרונית עם מקטע פליטה 55%, יתר לחץ דם, סוכרת, השמנת יתר. בבדיקות מעבדה שנלקחו לבירור מעבדתי של אנמיה נצפו התוצאות הבאות: mlU/L TSH = 40 (נורמה0.35-4.5 ,)FT4 = 8 pmol/L (נורמה10-20). כמו כן מדווחת על עצירות, חולשה כללית, וירידה בזיכרון לטווח קצר. מהי הגישה הטיפולית המתאימה?","o":["התחלת טיפול ב- LEVOTHYROXINE (ELTROXIN) במינון100 מק''ג ליממה","ממצא אופייני לאחר שבר בצוואר הירך, לא מצריך טיפול, מומלץ לחזור על הבדיקה לאחר השיקום","התחלת טיפול ב- LEVOTHYROXINE (ELTROXIN) ובדיקת מעקב חוזרת לאחר שבועיים","התחלת טיפול ב- LEVOTHYROXINE (ELTROXIN) עם יעדTSH של 4-6 mlU/L"],"c":0,"t":"ספט 2024"},{"q":"מטופל הגיע לאשפוז בעקבות אצירת שתן ובלבול לאחר שהתחיל לאחרונה תרופה נגד דיכאון איזו תרופה סביר להניח שהתחיל לקבל?","o":["CITALOPRAM (RECITAL)","ECITALOPRAM (CIPRALEX)","PAROXETIN (PAXXET)","LUSTRAL (SERTRALINE)"],"c":2,"t":"ספט 2024"},{"q":"מהם ההבדלים בין דליריום לבין התקף פסיכוטי","o":["בדליריום החולה ערני ובהתקף פסיכוטי החולה שקוע","בדליריום הזיכרון תקין ובהתקף פסיכוטי הזיכרון לקוי","בדליריום החולה מתמצא בזמן ובמקום ובהתקף פסיכוטי לא","בדליריום אופייני הזיות ויזואליות ובהתקף פסיכוטי שמיעתיות"],"c":1,"t":"ספט 2024"},{"q":"מבין המדינות הבאות היכן תוחלת החיים הגבוהה ביותר על פי לקט הנתונים האינפוגרפי של מכון ברוקדייל?","o":["מונקו","מקסיקו","ישראל","צ'אד"],"c":0,"t":"ספט 2024"},{"q":"בן80 ,עם רקע של דמנציה לפי אבחון גריאטר בקהילה לפני כחצי שנה, התקבל למחלקה גריאטרית לבירור נפילות חוזרות. בבדיקה נוירולוגית - נוקשות יתר, איטיות בתנועה, עצבים קרניאליים – סימני Gaze Palsy . אטרופיה של איזה איבר יכולה להסביר את ההסתמנות הקלינית?","o":["Dorasl Midbrain","Frontal Lobe","Hypocampus","Temporal Lobe"],"c":0,"t":"ספט 2024"},{"q":"בן67 אובחן לאחרונה עם מחלת פרקינסוןהוא מעוניין להתחיל טיפול תרופתי. איזו תופעת לוואי יותר נפוצה בטיפול ב-Levodopa מאשר בטיפול באגוניסטים לדופמין","o":["בצקת בקרסוליים","ישנוניות בשעות היום","הלוצינציות","פלוקטואציות מוטוריות"],"c":0,"t":"ספט 2024"},{"q":"מחושב 23 . איזה טיפול אנטיביוטי מתאים","o":["P.O NITROFURANTOIN (MACRODANTIN)","I.V CEFTRIAXONE (ROCEPHIN)","P.O FOSFOMYCIN (MONUROL)","I.V CHLORAMPHENICOL (SYNTOMYCIN)"],"c":0,"t":"ספט 2024"},{"q":"בן65, גרוש, ערירי, גר לבד. רקע של שימוש מוגבר באלכוהול. אושפז בפנימית לאחר שנמצא ברחוב עם היפותרמיה. בקבלתו למיון מוזנח, מלוכלך, עם פצעים מרובים ברגליים. במהלך האשפוז יוצא לעשן בחצר וחוזר למחלקה. נפל פעם אחת במחלקה, ללא חבלות משמעותיות. הפצעים ברגליים על רקע אי ספיקת לב ורידית ובצקת. רובם שטחיים אולם יש 2 פצעים עמוקים מכוסים רקמת פיברין. לאחר התייצבות מצבו עו\\\"ס מתרשמת שאינו יכול לחזור לגור לבד והמחלקה מזמינה ייעוץ גריאטרי לצורך הגדרה מוסדית. בשיחה המטופל מתמצא בסיטואציה ומסכים לעבור למסגרת מוסדית. האחיות מדווחות כי הוא שולט על סוגרים, זקוק לעזרה קלה ברחצה ולבוש פלג גוף תחתון. מתהלך במחלקה. הומלץ על הליכון אך לרוב לא משתמש. מה ההגדרה התפקודית המתאימה?","o":["סיעודי מורכב","סיעודי","תשוש","תשוש נפש"],"c":0,"t":"ספט 2024"},{"q":"מי מהבאים בסיכון מוגבר לפתח תסמונת היפראלגזיה (רגישות מוגברת לגירויי כאב) הקשורה בטיפול באופיואידים Opioid Induced Hyperalgesia)?","o":["חולים עם תסמונת כאב כרוני המקבלים טיפול באופיואידים במינון גבוה","חולים נאיבים (שלא טופלו עד כה באופיואידים) בזמן טיטרציה הדרגתית של הטיפול","חולים המטופלים באופיואידים במינון נמוך","חולים המפסיקים טיפול באופיואידים באופן פתאומי"],"c":2,"t":"ספט 2024"},{"q":"בן69, מהנדס אלקטרוניקה, עדיין מנהל את העסק העצמאי שלו. פנה למרפאה הגריאטרית עקב ירידה בזיכרון. לדבריו מתקשה לזכור תוכניות, משתמש ברשימות וסימונים על לוח השנה. Montreal Cognitive Assessment (MoCA) 25/30, נקודות ירדו על זיכרון לטווח קצר-בינוני. Geriatric Depression Scale (GDS) 2/15 . המטופל הגיע להתייעצות לגבי טיפול ביולוגי מה ההמלצה על פי המאמר \\\" Lecanemab in Early Alzheimer’s Disease\\\" מאתvan Dyck et al ?","o":["יש לבצע בדיקה גנטית לאלל לגן ApoE4 ובמידה ונמצא הומוזיגוטי הטיפול מומלץ","במידה ויקבל את הטיפול צפוי שיהיה שיפור ב- CDR-SB אך לא ברור אם תהיה לכך משמעות קלינית","הטיפול אינו מתאים למצבו הקוגניטיבי הנוכחי, במידה ויפתח דמנציה יש להתחיל טיפול","הטיפול מעלה תמותה בעקבות סיכון לדימום מוחי ולכן אינו מומלץ"],"c":3,"t":"ספט 2024"},{"q":"באיזה מהבאים מתואר קשר נכוןבין רפלקס פתולוגי לפגיעה המוחית הקשורה אליו?","o":["Babinski Reflex - פגיעה ב- LOWER MOTOR NEURON","Grasp Reflex - פגיעה באונה פרונטלית","Suck Reflex - פגיעה באונה אוקסיפיטלית","Reflex Palmomental – פגיעה מוחית דיפוזית"],"c":0,"t":"ספט 2024"},{"q":"איזו אסטרטגיהבודדת הוכחה יעילה למניעת נפילות בקרב זקנים?","o":["שימוש במכשיר שמיעה","ניתוח קטרקט","תוספת ויטמין D באנשים החיים בקהילה","התאמת משקפיים על ידי אופטימטריסט מומחה"],"c":2,"t":"ספט 2024"},{"q":"איזה מהשינויים הפיזיולוגיים הבאים בהזדקנות מהווה גורם סיכון להיפוגליקמיה","o":["הפרשת גלוקגון מוגברת","עליה בתפקוד הרצפטורים הבטא אדרנרגיים","עליה בתגובת הורמון גדילה להיפוגליקמיה","פגיעה במערכת העצבית האוטונומית"],"c":0,"t":"ספט 2024"},{"q":"איזה מהשינויים הפיזיולוגיים בהזדקנות הוא הנכון","o":["יש תגובה מופחתת לסטרס פיזי או נפשי (\\\"Fight or Flight\\\") ללא עליה משמעותית ברמות קורטיזול","יש תגובה מופחתת להתייבשות, עם שמירה של נפח הפלסמה בגוף וירידה ב-GFR","יש תגובה מופחתת לשינויים ברמת גלוקוז בדם, עם רגישות גבוהה לתסמיני היפרגליקמיה","יש תגובה מופחתת למלאות בשלפוחית השתן, עם ירידה ביכולת ההתכווצות של שריר ה- Detrusor"],"c":2,"t":"ספט 2024"},{"q":"CT בטן בתמונה מספר1. איזה מההתערבויות התרופתיות יכול לעזור בטיפול?","o":["הפסקת הדרגתית של טיפול ב- Quetiapine","הורדת המינון של Levothyroxine","הוספת טיפול ב Kayexalate","הוספת טיפול בברזל פומי"],"c":0,"t":"ספט 2024"},{"q":"בת78, התקבלה למחלקת שיקום לאחר אשפוז עקב אירוע מוחי עם שיתוק בפלג גוף ימין בבדיקתה פצע לחץ דרגה 3 בעכוז איזו מההתערבויות הבאות הוכחה כמשפרת ריפוי של פצע הלחץ באופן משמעותי?","o":["שימוש במזרון דינמי","טיפול בחמצן היפרבארי","תוספת טיפול בוויטמינים A,E,C IRON","אנטיביוטיקה סיסטמית"],"c":3,"t":"ספט 2024"},{"q":"באקו לב שטח מסתם 20.6 cm, מפל לחצים50 mmHg, מהירות זרימה5 m/s . מה הגישה הטיפולית הנכונה למטופל?","o":["Surgical Aortic Valve Replacement (SAVR)","Transcatheter Aortic Valve Replacement (TAVR)","טיפול פליאטיבי לצורך הקלת התסמינים","בהעדר קריטריונים להתערבות לבצע בדיקה חוזרת בעוד שנה"],"c":2,"t":"ספט 2024"},{"q":"במרפאה קרדיולוגיתמעוניינים להכניס בדיקה לאבחון שבריריות שתתבצע לפני החלטה על פרוצדורת החלפת מסתם אאורטלי בצינתור Transcatheter Aortic-Valve Implantation (TAVI) . מה ההמלצה המתאימה בהתייחס למדדי שבריריות שונים","o":["מדד FRIED ניתן לבצע בתשאול טלפוני","ניתן לבצע מדדDeficit Accumulation Index or Frailty Index (FI) אחרי הערכה כוללנית של גריאטר בקהילה","במידה ורוצים להשתמש באבחון שבריריות מתוך תיק רפואי מומלץ להשתמש במדד Clinical Frailty Scale (CFS) שלRockwood","מדדFRAIL מחייב בדיקה גופנית במרפאה"],"c":0,"t":"ספט 2024"},{"q":"מה מאפיין הפרעות שינה בפיברומיילגיה","o":["עליה במשך השינה הכללי","ירידה במשך שנת REM","EEG יראה ירידה בכמות של גלי אלפא","הירדמות מהירה ויקיצה איטית"],"c":1,"t":"ספט 2024"},{"q":"למי מהמטופלים הבאים מתאים להיעזר ברולטור?","o":["בת 72 הסובלת מ- Lewy Body Dementia","בן 77, שמור קוגניטיבית, לאחר שבץ, סובל מפרזיס ביד ורגל ימין","בן 85 הסובל ממחלת פרקינסון","בת 88 הסובלת מ- Pulmonary Fibrosis וקוצר נשימה במאמץ"],"c":1,"t":"ספט 2024"},{"q":"בזקן עם בעיית שמיעה על רקע הגיל, איזה מהמילים הבאות יתקשה לזהות","o":["גלידה","שלום","ארון","ספר"],"c":0,"t":"ספט 2024"},{"q":"מה מהבאים מקל על כאב שמקורו ב- Lumbar Spinal Stenosis","o":["ישיבה","הליכה","ירידת מדרגות","עמידה"],"c":0,"t":"ספט 2024"},{"q":"בן 81 ,עם סרטן ריאות מתקדם, מאושפז במחלקה האונקולוגית לקבלת טיפולים כימותרפיים והקרנות. המטופל תשוש, מדווח על תאבון ירוד ואוכל מעט. בנוסף סובל מתופעות לוואי מהטיפולים שמקבל. מהי הגישה לגבי טיפולים תומכים במטופל זה?","o":["טיפול פליאטיבי משפר את איכות החיים של המטופל, אבל לא את ההישרדות הכללית","לתשישות המאפיינת מטופלים אונקולוגיים רבים אין טיפול פרמקולוגי","הטיפול בבחילות ניתן רק במידה ויש סימפטומים ולא כטיפול מונע","אם למטופל יש דיכאון סביר לתת טיפול ב- MIRTAZAPINE (MIRO)"],"c":2,"t":"ספט 2024"},{"q":"מה מחשיד שנגע עורי הואMalignant Melanoma ?","o":["צבע כהה ואחיד","גבולות חדים ומורמים","אסימטריה","ריבוי נגעים עם מראה דומה"],"c":3,"t":"ספט 2024"},{"q":"בת74 מדווחת על בריחת שתן לאחר ניתוח החלפת ברך אלקטיבי. מציינת בריחתשתן בדרך לשירותים. איזה מהתערבויות הבאות יכולה להפחית את אירועי בריחת השתן?","o":["טיפול תרופתי מקובצה של Alpha Adrenergic Agonist","תרגול של שלפוחית השתן (Bladder Training )","התאמת סביבה","התערבות כירורגית"],"c":1,"t":"ספט 2024"},{"q":"מה מאפיין טיפול ב-Electroconvulsive Therapy (ECT) בגיל המבוגר","o":["טיפול ב-ECT פחות יעילבזקנים לעומת צעירים","טיפול ב-ECT בטוח עם מעט תופעות לוואי","טיפול ב-ECT גורם לירידה בזיכרון לטווח ארוך","שיעור תסמיני הדיכאון גבוה אחרי טיפול ב-ECT"],"c":0,"t":"ספט 2024"},{"q":"בת65, מדווחת שבשנתיים האחרונות קיימת החמרה ברעד וחוסר קואורדינציה של יד שמאל שהופיעה בעיקר בזמן נשיאת חפצים, כעת מודאגת מהאטה מילולית, מתקשה בשליפת מילים ויש פגיעה בשטף הדיבור. בבדיקה בולטת נוקשות ביד שמאל ומיוקלונוס בעת יישור היד השמאלית, דיסטוניה משמאל, לא נצפה רעד אך קיימת אי יציבות בעמידה והליכה. מה האבחנה המתאימה?","o":["דמנציה מסוג Lewy Body","תסמונת Corticobasal","Primary Progressive Aphasia","מחלה על שם Creutzfeldt – Jacob"],"c":0,"t":"ספט 2024"},{"q":"מה נכון לגבי פתופיזיולוגיה של דליריום ?","o":["הפעלת המערכת הדופמינרגית","הפעלת המערכת הכולינרגית","דיכוי מערכת נוראפינפרין","אין שינוי במערכת סרוטונינרגית"],"c":0,"t":"ספט 2024"},{"q":"בן91 מתגורר בגפו. ברקע: סוכרת, יתר לחץ דם, אוסטיאוארטריטיס, ניוון רשתית (AMD) ,קטרקט ואנמיה על רקע תלסמיה מיינור. פנה לייעוץ גריאטרי בעקבות תופעה חדשה של ראיית דמויות אנשים וחיות בתוך ביתו. המטופל מודע לכך שמדובר בדמויות שאינן קיימות במציאות ומוטרד מהאפשרות שמדובר בתסמינים של דמנציה. בבדיקה גופנית: סימנים חיוניים תקינים, ללא ממצא חריג. במעבדה אנמיה יציבה, המוגלובין מסוכרר (A1C=6.8%). בדיקתMoCA 26/30 – נקודות ירדו בסעיפים של העתקת קובייה, שיום וזיכרון מושהה. מה האבחנה הסבירה?","o":["Charles-Bonnet Syndrome","Lewy Body Disease","Delirium","Schizophrenia"],"c":2,"t":"ספט 2024"},{"q":"בן75 עםרקע של מחלת פרקינסון, המטופלת ב- DOPICAR ודיכאון, המטופל ב- BUPROPION. הופנה לאשפוז בעקבות נפילה ושבר בצוואר ירך. בבירור לסיבת הנפילה המטופל ציין כי נפל מהמיטה בזמן שינה תוך כדי חלום בלהות. מה הטיפול התרופתי המומלץ במצבו?","o":["טיפול ב- MIRTAZAPINE (MIRO)","טיפול ב- MELATONIN (CIRCADIN)","טיפול ב- OXAZEPAM (VABEN)","הפסקת טיפול ב- BUPROPION (WELLBUTRIN)"],"c":1,"t":"ספט 2024"},{"q":"מה מאפייןClostridium Difficile Infection (CDI) בזקנים","o":["לזקנים עם CDI יש פרוטוקול טיפול שונה ביחס לצעירים","במטופלים זקנים בסיכון גבוה לפתח CDI לא מומלץ טיפול בנוגדנים","רוב הזקנים עם נשאות א-תסמינית יפתחו CDI לאחר טיפול אנטיביוטי","הסיכון להישנות של CDI גבוה יותר בזקנים ביחס לצעירים"],"c":2,"t":"ספט 2024"},{"q":"כיצד מוגדר \\\"אדם קרוב\\\" לפי \\\"חוק החולה הנוטה למות\\\"?","o":["כל אדם שמכיר את החולה","רופא המטפל בחולה","אדם בעל קרבה משפחתית או רגשית לחולה ומסור לו","כל אדם שמבקר את החולה בבית החולים"],"c":0,"t":"ספט 2024"},{"q":"בדמנציה מתקדמת שכיחה דיספגיה וירידה במשקל, וקיים סיכון לפתח דלקת ריאות מאספירציה (Aspiration Pneumonia). מה נכון לגבי הזנת צינורTube Feeding) בשלב זה","o":["מגבירה את הסיכון להתפתחות פצעי לחץ","עדיפה על האכלה פומית","מונעת התפתחות דלקת ריאות מאספירציה","משפרת איכות חיים ותוחלת חיים"],"c":2,"t":"ספט 2024"},{"q":"אילו שינויים פיזיולוגיים בזקנה עשויים לגרום לסיבוכים סביב ניתוחים","o":["עליה בזרימת דם לכבד, ולכן ירידה בזמן מחצית חיים של תרופות שמפונות בכבד","עליה ב-V/Q mismatch, ולכן עליה בפוטנציאל לכשל נשימתי","עליה בהפרשת נתרן ומים, ולכן עלייה בסיכון להתייבשות","ירידה בהפרשת אינסולין, ולכן עלייה בשכיחות של היפוגליקמיה"],"c":0,"t":"ספט 2024"},{"q":"מטופל בן83 אובחן עם דמנציה על רקע מחלת אלצהיימר לפני כשלוש שנים. מתגורר בבית עם אשתו ועם מטפלת צמודה שמסייעת ב-IADL בעיקר, משגיחה במקלחת ומלווה את המטופל בהליכות בשכונה על מנת למנוע נפילות. ברקע: מחלת לב איסכמית, יתר לחץ דם, סוכרת סוג 2 , איבוד שליטה על סוגרים מסוגUrge. נוטלASPIRIN ,ENALAPRIL ,METFORMIN , FESOTERODINE ,HYDROCHLOROTHIAZIDE . מובא למרפאה על ידי המשפחה בשל הופעה של אי- שקט, אגיטציה, התנהגות אגרסיבית. משתולל כשמנסים להכניס אותו למקלחת או להחליף לו בגדים. בתשאול מתברר שלא אלים פיזית כלפי המשפחה או המטפלת, לא בורח מהבית ומצליחים להרגיע אותו בשיחה בדרך כלל. לפי המאמר Reduction and prevention of agitation in persons with neurocognitive disorders: an international psychogeriatric association consensus algorithm מאת Cummings et al., מה השלב הבא בבירור והטיפול","o":["מומלץ על התחלת טיפול בתרופות אנטיפסיכוטיות","מומלץ על התחלת טיפול ב-CITALOPRAM","מומלץ להפסיק METFORMIN כיוון שעשוי להחמיר אגיטציה","יש להבין את הסיבות לאגיטציה ולבנות תוכנית טיפול לפי עקרונות ה- DICE"],"c":3,"t":"ספט 2024"},{"q":"בן65, שוקל80 קילו, אובחן עם תסמונת Guillain-Barré לאחר שהתייצג עם חולשה סימטרית עולה וא-רפלקסיה. לאחר 5 ימי טיפול ב-IVIg במינון160 גרם ליום, לא נצפה שיפור משמעותי במצבו. מה ההחלטה הטיפולית הנכונה כעת?","o":["להתחיל טיפול משולב של IVIg עם פלזמפרזיס להגברת יעילות הטיפול","להחליף את הטיפול לפלזמפרזיס מכיוון שה- IVIg לא היה יעיל","להמשיך מעקב ותמיכה נשימתית בהתאם לצורך, ללא שינוי בטיפול האימונומודולטורי","לתת מחזור נוסף של IVIg במינון גבוה יותר"],"c":2,"t":"ספט 2024"},{"q":"בן75, ברקע: מחלת לב איסכמית ואי שליטה על השתן, נוטל מזה שנים ASPIRIN , VALSARTAN ,ESCITALOPRAM, MIRABEGRON . איזו מהתרופות שנוטל מעלה סיכון לנפילות?","o":["ASPIRIN","ESCITALOPRAM (CIPRALEX)","VALSARTAN (VECTOR)","MIRABEGRON (BETMIGA)"],"c":2,"t":"ספט 2024"},{"q":"בת76 מגיעה לביקור מרפאה יחד עם בעלה. ברקעאי ספיקת כליות סופנית (ESRD) ועוברת המודיאליזה בשנתיים האחרונות. בנוסף מחלת לב איסכמית, יתר לחץ דם, סוכרת סוג 2 ומחלת ריאות חסימתית כרונית. ניידת בצורה עצמאית עם הליכון, נעזרת בבעלה ל-IADL בלבד. ידוע על דמנציה וסקולרית קלה. המטופלת מרגישה התדרדרות בתפקוד ופונה למרפאה על מנת לקבל ייעוץ אודות שיפור איכות חיים ומניעת סיבוכים. מה נכון להמליץ לה?","o":["במטופלים עם ESRD יש שכיחות גבוהה של נפילות, ולכן מומלץ להתחיל טיפול בביספוספונאט כמו ALENDRONIC ACID (FOSALAN) על מנת למנוע שברים","במטופלים מבוגרים עם ESRD יש שכיחות גבוהה שלRenal Osteodystrophy, ולכן חשוב להיות אגרסיביים בטיפול על מנת למנוע שברים","למטופלים עם ESRD יש שכיחות גבוהה של תת תזונה, במיוחד לאור ההגבלות התזונתיות השונות. מומלץ לעקוב אחר רמות אלבומין בדם ולפנות לייעוץ דיאטנית על מנת להתאים","במצבה דיאליזה לא משפרת פרוגנוזה, ועדיף לתכנן הפסקת הטיפול כדי לשמור על איכות"],"c":1,"t":"ספט 2024"},{"q":"מהי ההמלצה הנכונה למניעת סוכרת במטופלים מעל גיל 65 עם טרום-סוכרת?","o":["מומלץ לבצע שינוי אורח חיים לצורך דחיית ההתקדמות לסוכרת","מומלץ לבצע בדיקת סקר לאבחון סוכרת אחת לשנה רק אם יש סיפור משפחתי של סוכרת","מומלץ להתחיל טיפול תרופתי בגלוקומין כקו ראשון","מומלץ על ירידה במשקל של לפחות 10%"],"c":2,"t":"ספט 2024"},{"q":"(נורמה3.5-5 .) צילום בטן מצורףבתמונה 2 . בנוסף לתיקון אלקטרוליטים, הכנסתRectal Tube מה הטיפול המומלץ","o":["Neostigmine (Mestinon)","Polyethylene Glycol (Normalax)","Bisacodyl (Laxadine) בכדורים","Bisacodyl (Laxadine) בנרות"],"c":1,"t":"ספט 2024"},{"q":"בת93, אובחנה עם היפותרמיה (32 מעלות צלסיוס) לאחר נפילה ושכיבה ממושכת על רצפת מה מהבאים הוא הגורם המשמעותי ביותר להתפתחות היפותרמיה בגיל המטופלת?","o":["ירידה בטמפרטורת הגוף הבסיסית (Basal Body Temperature )","ירידה ביכולת יצירת חום במנגנון צמרמורת (Shivering )","עליה ביכולת כיווץ כלי הדם הפריפריים (Vasoconstriction)","ירידה במסת השומן הבטני (Abdominal adipose )"],"c":3,"t":"ספט 2024"},{"q":"תמונה מספר 3. מה הוא הטיפול המומלץ?","o":["POVIDONE IODINE (POLYDINE)","מדבקת HYDROCOLLOID","משחה אנטיביוטית מקומית","HYDROFIBER עם יוני כסף"],"c":1,"t":"ספט 2024"},{"q":"לאחר Mechanical Mitral Valve Replacement, מה הטיפול התרופתי המומלץ לדילול דם","o":["ASPIRIN","CLOPIDOGREL (PLAVIX)","APIXABAN (ELIQUIS)","WARFARIN (COUMADIN)"],"c":1,"t":"ספט 2024"},{"q":"בת94 גרה לבד בביתה. ברקע: יל\\\"ד ואי-ספיקת כליות - קראטינין בסיס 1.6, שוקלת50 ק\\\"ג ללא שינוי בשנה האחרונה. ללא אשפוזים בשנה האחרונה. היא מתארת עייפות, חוסר אנרגיה, והליכה איטית. בנוסף, מדווחת על 2 נפילות בשנה האחרונה על מנת להשלים מדדFRIED במרפאה מה צריך לבצע","o":["חישוב BMI","ביצוע שאלון תזונתי מפורט","ביצוע מדידת HAND GRIP","ביצוע MoCA"],"c":1,"t":"ספט 2024"},{"q":"בן88, ברקע ידוע עלCOPD, ונעזר בחמצן ביתי, אושפז להשגחה לאחר נפילה ושבר בצלע המטופל מתלונן על כאב חזק בחזה, באזור השבר. בדיקות הדם תקינות, כולל גזים, מדדי דלקת, ספירת דם, תפקודי כבד וכליה. המטופל מתלונן מאד על כאב, למרות טיפול ב- 1 גרם של PARACETAMOL תוך ורידי4 פעמים ביום. מה נכון לגבי איזון כאב במטופל זה בעת האשפוז","o":["אין לתת טיפול ממשפחת ה- NSAIDS לנוכח גילו וסיכון לדימום ממערכת העיכול","אין לתת טיפול באופיואידים בשל טיפול כרוני בחמצן והסיכון לדיכוי נשימתי","אין לתת שילוב של PARACETAMOL עםNSAIDS","אין לתת תוספת PARACETAMOL"],"c":1,"t":"ספט 2024"},{"q":"מבין תוצאות מבחני התפקוד והניידות הבאים מה מנבא סיכון מוגבר למוגבלות בניידות?","o":["מבחן LONG DISTANCE CORRIDOR WALK תוך2 דקות מרחק של300 מ","מבחן SIX MINUTE WALK מרחק400 מ","מבחן TIME GET UP & GO במשך25 שניות","מבחן SHORT PHYSICAL PEFORMANCE BATTERY ציון של12"],"c":3,"t":"ספט 2024"},{"q":"בת80 אובחנה עם ממאירות קולון מקומית, מועמדת לניתוח. לפי בירור טרום ניתוחי אין עדות לפיזור משני וככל הנראה לא יידרש טיפול אונקולוגי משלים לאחר הניתוח. לא ידוע על ירידה קוגניטיבית. המטופלת מבקשת למלא הוראות מקדימות טרם הניתוח. מה נכון?","o":["מוגדרת כחולה הנוטה למות ונדרש החתמה על ידי רופא/ה בלבד","נדרשת הערכת כשירות על ידי גריאטר טרם חתימה על ההוראות","יכולה למלא רק ייפוי כוח לפי חוק החולה הנוטה למות","יכולה למלא טופס הנחיות רפואיות מקדימות בנוכחות אח/ות"],"c":1,"t":"ספט 2024"},{"q":"בת 75 ,עצמאית ב- BADL וללא חסר קוגניטיבי . ברקע אוסטאופורוזיס, מטופלת בוויטמין D ו- ALENDRONATE. בנוסףיתר לחץ דם, שבחצי שנה האחרונה טופל עם דיאטה ופעילות גופנית, ללא טיפול תרופתי. בשבועות האחרונים מספר מדידות של לחץ דם סביב 165/90 . מה הגישה הטיפולית הנכונה בחולה זו?","o":["המטופלת עם סיכון קרדיו-וסקולרי נמוך ולכן אינה זקוקה לטיפול להורדת לחץ דם","בגילה היעד להורדת לחץ הדם הסיסטולי הינו מתחת ל- 120 mmHg","אוסטאופורוזיס הינו התוויית נגד לטיפול ב-Hydrochlorothiazide","ככל הנראה תזדקק לשתי תרופות להורדת לחץ הדם"],"c":0,"t":"ספט 2024"},{"q":"בת92 סובלת מדמנציה בחומרה קלה, דיכאון ויתר לחץ דם. בתקופה האחרונה היא מרגישה כאב בטן תחתונה פתאומי, לחץ ללכת לשירותים, אך היא לא מצליחה להתאפק. לכן יש לה דליפות שתן בכמות קטנה בדרך לשירותים. איזו תרופה עלולה לגרום לתופעה זו?","o":["DONEPEZIL (MEMORIT)","VALSARTAN (VECTOR)","AMIODARONE (PROCOR)","BISOPROLOL (CARDILOC)"],"c":2,"t":"ספט 2024"},{"q":"איזה מהבאים הוא גורם סיכון גבוה לממאירות במצב שבו יש ממצא של נודול בתירואיד","o":["מין נשי","המצאות נודולים מרובים בתירואיד","הסתיידויות בבלוטה בבדיקת סונר","נודול שנמוש בבדיקה גופנית"],"c":2,"t":"ספט 2024"},{"q":"בן80 עם ירידה קוגניטיבית בשנה האחרונה, פנה עם אשתו למרפאה. הם מספרים כי בחודשיים האחרונים היו נפילות חוזרות ואירועים של אי שקט לסירוגין. המטופל מדווח שרואה חרקים במיטה, ואשתו מתארת הפרעות בשינה. מהו הטיפול התרופתי המומלץ במצב זה?","o":["Amantadine (PK-Mertz)","Donepezil (Memorit)","Risperidone (Risperdal)","Diazepam (Assival)"],"c":1,"t":"ספט 2024"},{"q":"בת90, גרה לבד בבית, תמיד היתה מאוד פעילה. לאחרונה מתלוננת על קושי לעשות עבודות בית קלות שבעבר הייתה עושה בקלות. בוצע מבחן 9 -PHQ המצורףבתמונה מספר 4 לפי המבחן מה האבחנה ומה הטיפול","o":["מדובר ב- Dysthymia, מומלץ התחלת טיפול תרופתי","מדובר בMinor Depression - מומלץ מעקב בלבד","יש לחפש גורם אחר לעייפות, מעקב בלבד","מדובר ב- Dysthymia, מומלץ טיפול פסיכותרפי"],"c":3,"t":"ספט 2024"},{"q":"מה נכון בנוגע לתבחינים לאבחוןTuberculosis ?","o":["רגישות ה- Tuberculin Skin Test לא משתנה עם הגיל","בדיקת Tuberculin Skin Test עשויה להיות חיובית לאחר חיסוןBCG","בדיקת Interferon Gamma Release Assay (IGRA) חיובית מאבחנתLatent Tuberculosis","בדיקת IGRA מצריכה שני שלבים לצורך השלמתה"],"c":2,"t":"ספט 2024"},{"q":"איזו התערבות רפואית מותרת מבחינה חוקיתבחולה הנוטה למות לפי רצונו ?","o":["ניתוק ממכונת הנשמה","ניטרול פעולה של ICD ( IMPLANTABLE CARDIOVERTER DEFIBRILLATOR)","הפסקת פעולה של קוצב לב במטופל עם COMPLETE AV BLOCK","מתן עירוי עם MORPHINE במינון כפול מזה המקל על כאבים"],"c":1,"t":"ספט 2024"},{"q":"בן80, נפל ושברמפרק ירך וזקוק לניתוח. ברקע ידוע על פרפור עליות תחת טיפול ב- APIXABAN (ELIQUIS) . מהי ההרדמה המומלצת ומדוע?","o":["הרדמה כללית, כי מאפשרת ניתוח מיידי","הרדמה אזורית לאחר יומיים של הפסקת APIXABAN , כי מורידה סיכון לדליריום","הרדמה אזורית לאחר יומיים של הפסקת APIXABAN , כי מפחיתה תמותה","הרדמה כללית כי מפחיתה שימוש באופיואידים לאחר הניתוח"],"c":0,"t":"ספט 2024"},{"q":"לפי המאמרDementia prevention, intervention, and care: 2024 report of the Lancet standing Commission מאתLivingstone et al, מה מהבאים נכון","o":["אלל ApoE4 הוא גורם סיכון משמעותי לדמנציה ואין אפשרות להפחתת סיכוןזה בהתערבות חיצונית","ישנם 14 גורמי סיכון הניתנים לשינוי, התערבות ושיפור בהם מפחית סיכון לדמנציה במעל","מעכבי כולין אסטרז לא הראו יעילות משמעותית בהאטת התקדמות דמנציה של מחלת אלצהיימר, ובשל תופעות לוואי משמעותיות עדיף שלא להשתמש בהם","במטופלים עם דמנציה על רקע מחלת גופיפי לווי Lewy Body), יש לבדוק ביומרקרים ב- CSF על מנת לאשר את האבחנה"],"c":3,"t":"ספט 2024"},{"q":"בן75, לאחר אירוע מוחי ופגיעה בפלג גוף ימין בבדיקתו: ביד ימין - תנועה כנגד כוח הכבידה ולא כנגד תנגודת. ברגל ימין לא הופקה תנועה כלל. איך מוגדר הכוח בגפיים?","o":["רגל 0/5 יד 5/5","רגל 1/5 יד 4/5","רגל 0/5 יד 3/5","רגל 1/5 יד 2/5"],"c":2,"t":"ספט 2024"},{"q":"בן86, מאובחן עם דמנציה מתקדמת, מאושפז במחלקה לסיעוד מורכב עקב פצעי לחץ בדרגה 4 בעכוז ובעקב, מוגדר כנוטה למות, פיתחדלקת ריאות מאספירציה, מה נכון לגבי הטיפול?","o":["טיפול אנטיביוטי משפר הישרדות אך לא נוחות","המטופל מוגדר כנוטה למות אין לתת טיפול אנטיביוטי","יש להפסיק האכלה פומית ולהכניס זונדה למתן אוכל ותרופות","יש להגדיר את המטופל כנוטה למות במצב סופי ולהתחיל סדציה פליאטיבית"],"c":1,"t":"ספט 2024"},{"q":"מיפויSPECT דופמין יעזור להבחין בין פרקינסון לביןאיזו מהאבחנות הבאות?","o":["Progressive Supranuclear Palsy (PSP)","Dementia with Lewy Bodies (DLB)","Essential Tremor","Multiple System Atrophy (MSA)"],"c":2,"t":"ספט 2024"},{"q":"בן68 עם מחלת פרקינסון, שאובחנה לפני6 שנים, מתמודד עם קושי הולך וגובר בזיכרון, קשב וקבלת החלטות. התסמינים המוטוריים של החולה יציבים, אך הירידה הקוגניטיבית הפכה בולטת יותר במהלך 6 החודשים האחרונים, מלווה בירידה בקשב , הפרעת שינה וליקוי ויזו-מרחבי. איזו מהאפשרויות הבאות היא אופציה טיפולית של קו ראשון לטיפול בתסמינים של המטופל?","o":["Levodopa","Cholinesterase Inhibitors","Dopamine Agonists","Antipsychotics"],"c":0,"t":"ספט 2024"},{"q":"מה נכון בנוגע למנגנון פיזיולוגי של שליטה בסוגר השתן","o":["מערכת סימפתטית גורמת להתכווצות של שלפוחית השתן","מערכת פרה-סימפתטית גורמת להרפיית שלפוחית השתן","מערכת סומטית גורמת להתכווצות של שרירי אגן","מערכת סימפתטית גורמת להרפיה של השופכה"],"c":1,"t":"ספט 2024"},{"q":"בת77, לוקה בסרטן שדגרורתי ומקבלת מספר תרופות. באיזה מהבאים מתואר נכונה טיפול עם תופעת הלוואי הצפויה בעקבותיו?","o":["LETROZOLE (FEMARA) – אי ספיקת כליות","MEGESTROL ACETATE (MEGACE)– ירידה במשקל","CYCLOPHOSPHAMIDE - ציסטיטיס","METHOTREXATE - טרומבוציטוזיס"],"c":2,"t":"ספט 2024"},{"q":"מה הסיבה השכיחה ביותר לתסמונת קושינג בקשישים","o":["טיפול תרופתי בקורטיקוסטרואידים","אדנומה מפרישה של האדרנל","קרצינומה מפרישה של האדרנל","הפרשת יתר של ACTH מההיפופיזה"],"c":2,"t":"ספט 2024"},{"q":"מהם העקרונות בהמלצה לטיפול בנוגד דיכאון?","o":["כדי להגיע לתגובה טיפולית חשוב להגיע למינון מטרה של התרופה","בטיפול בדיכאון מינורי מומלץ מינון נמוך של תרופות לעומת דיכאון מג'ורי מינון גבוה","תרופות נוגדות דיכאון יעילות מאוד במטופלים עם דמנציה","לטיפול נוגד דיכאון יש אפקט פלסבו גבוה"],"c":1,"t":"ספט 2024"},{"q":"מה נכון לגבי דמנציה של עגבתSyphilis)?","o":["יכולה לקרות בכל שלב של המחלה","טיפול בפניצילין לרוב מביא להחלמה","התסמינים כוללים הזיות, דלוזיות, אטקסיה וירידה קוגניטיבית","יש לבצע סקירה לעגבת לכל דמנציה חדשה, גם בנוכחות אטיולוגיה ברורה"],"c":2,"t":"ספט 2024"},{"q":"בן88, מתגורר בביתו עם מטפלת צמודה. ברקע: מצב אחרי אירועי מוחי, דמנציה וסקולרית, אירועי אגיטציה בתדירות יומית. בהמלצת קלינאית תקשורת מוזן בכלכלה דייסתית. נבדק בחשד לדלקת ריאות כתוצאה מאספירציה. בבדיקתו: חום 38 מעלות, היגיינת פה ירודה, חרחורים לחים בבסיס ריאה ימנית. בצילום חזה תסנין בבסיס ריאה ימנית. מה מהבאים, במטופל זה, עשוי להפחית את הסיכון להתפתחות דלקת ראות כתוצאה מאספירציה?","o":["הקפדה על היגיינת חלל הפה","מתן טיפול אנטי-פסיכוטי להרגעה לפני האוכל","החדרת צינור הזנה מסוג PEG","טיפול מונע ב-AMOXICILLIN"],"c":3,"t":"ספט 2024"},{"q":"בן75, עם דומיננטיות ימנית התקבל עם אוטם ב- MCA, לפי המאמרStroke Rehabilitation Clinician Handbook 2020 מאתTeasell et al, מהי הפגיעה הצפויה","o":["בפגיעה ב-RT MCA , בחלק המטופלים יתכןNeglect","בפגיעה ב- RT MCA, צפויה אפאזיה גלובלית","בפגיעה ב- LT MCA, צפויה פגיעה בראיה","בפגיעה ב- LT MCA, צפויה פגיעה בולטת יותר ברגלבהשוואה ליד"],"c":0,"t":"ספט 2024"},{"q":"מה הוא יעד הטיפול בסוכרת לקשיש סיעודי עם דמנציה מתקדמת שלא מקבל טיפול באינסולין","o":["סוכר בצום בין 90-130","סוכר בצום בין 180-250","ערך המוגלובין מסוכרר פחות מ-7%","ערך המוגלובין מסוכרר פחות מ-8.5%"],"c":1,"t":"ספט 2024"},{"q":"בן 75, ברקע מחלת לב איסכמית, אירוע לבבי לפני כ- 5 שנים, מטופל ב- ASPIRIN .התקבל לאשפוז בעקבות דלקת ריאות. במהלך האשפוז בעקבות פרפור פרוזדורים עם הולכה חדרית של 120 לדקהטופל בחוסמי ביטא וחזר לקצב סינוס. המטופל במשקל 70 ק\\\" ג, בד\\\" כ נייד בבית, נפל לפני כחצי שנה בביתו בעקבות התקלות בשטיח, תפקודי כליה תקינים . מהו הטיפול התרופתי המומלץ בשחרורו?","o":["הוספת טיפול ב- APIXABAN 2.5mg פעמיים ביום","הפסקת טיפול ב- ASPIRIN התחלת טיפול ב- APIXABAN 5mg פעמיים ביום","הוספת טיפול ב- RIVAROXABAN 15mg פעם ביום.","המשך טיפול ב- ASPIRIN בלבד"],"c":1,"t":"ספט 2024"},{"q":"במטופל עם פצע לחץ ללא חסרים תזונתיים, איזה תוסף תזונתי נמצא כמסייע לרפוי פצע אם ניתן לפחות 4 שבועות","o":["ויטמין A","ויטמין C","ברזל","אבץ"],"c":0,"t":"ספט 2024"},{"q":"מה מאפיין שינויים פתופיזיולוגים במצב שלFrailty ?","o":["מאזן אנרגיה ( Energy Balance) חיובי","ירידה ב- Resting Metabolic Rate","הארכה של טלומרים","עליה בפעילות הורמונים אנאבולים"],"c":3,"t":"ספט 2024"},{"q":"בן80, מתגורר בביתומתאשפז בחורף במחלקה פנימית לבירור קוצר נשימה, שיעול וירידה בסטורציה. ברקע: COPD בדרגת חומרה קלה-בינונית. ללא אשפוז או טיפול אנטיביוטי בשנה האחרונה. מה הצעד האבחנתי המומלץ בשלב זה?","o":["דגימת כיח לתרבית לצורך התאמת טיפול אנטיביוטי מכוון","מטוש אנטיגן לשפעת עונתית להחלטה על טיפול אנטי-ויראלי","PCR לRhinovirus. במידה וחיובי– הימנעות מטיפול אנטיביוטי","דגימת דם לרמת פרוקלציטונין להחלטה על צורך בטיפול אנטיביוטי"],"c":0,"t":"ספט 2024"},{"q":"בת72 אושפזה לבירור ירידה במשקל. היא מדווחת על קושי בבליעה ובלעיסה ועקב זה הפסיקה לאכול בשר. בתשובה לשאלה מכוונה מדווחת על דיפלופיה. מה השלב הבא בבירור?","o":["PET-CT","EEG","בדיקת נוגדנים Anti-Acetylcholine Receptor","בדיקת נוגדנים Anti-NMDA Receptor"],"c":1,"t":"ספט 2024"},{"q":"בן84 הגיע ליעוץ גריאטרי עקב ירידה קוגניטיבית שהחמירה בחודש האחרון. כמו כן מתלונן על תופעות חדשות של עצירות, טשטוש ראיה ויובש בפה. מדווח שהיה לפני חודש במרפאת כאב והחל תרופה חדשה במינון נמוך. איזו תרופה חדשה שקיבל יכולה להסביר את התסמינים שלו?","o":["AMITRIPTYLINE ( ELATROL)","VENLAFAXINE ( VIEPAX)","DULOXETINE ( CYMBALTA)","GABAPENTIN"],"c":3,"t":"ספט 2024"},{"q":"בן88, ערירי. מאושפז כחודש במחלקה פנימית בשל זיהום בקורונה שהסתבך. טרם האשפוז גר בביתו בגפו, נעזר במטפלת מטעם חוק סיעוד )עזרה ב-IADL וברחצה כעת מועמד לשחרור, אחרי גמילה מהנשמה, עם פצעי לחץ דרגה 3 בסקרום ובטרוכנטר. זקוק לעזרה מלאה בכל התפקודים כולל האכלה, אינו שולט על סוגר השתן, נעזר באמצעי ספיגה. עירני, מבצע הוראות פשוטות, קם בעזרה של 2 מטפלים והולך עם הליכון אמות3 מטרים בעזרה כיצד יש להגדיר את הסטטוס של המטופל ולאן יש להפנותו?","o":["סיעודי מורכב, למחלקת לסיעוד מורכב","סיעודי זמני, לנופשון במחלקה סיעודית","שיקומי, למחלקת שיקום","שיקומי, לשיקום בית"],"c":0,"t":"ספט 2024"},{"q":"בת85 גרה במחלקה סיעודית, מרותקת לכיסא גלגלים וסובלת מדמנציה קשה. בשנתיים האחרונות היא לא שולטת על שני הסוגרים ונעזרת בחיתול 24 שעות. אחת לשנה לוקחים לחולה בדיקות שגרתיות כולל ספירה, כימיה ושתן לכללית. הספירה והכימיה תקינות. בבדיקת שתן לכללית נמצאו לויקוציטים רבים ללא אריתרוציטים. החולה מרגישה טוב, ללא חום ולא נראית סובלת. מה ההמלצה לצוות המטפל?","o":["נטילת תרבית שתן. אם תהיה צמיחה התחלת טיפול אנטיביוטי על פי רגישות","נטילת תרבית שתן. התחלת טיפול אנטיביוטי אמפירי עד קבלת תשובות התרבית","התחלת טיפול אנטיביוטי אמפירי ללא תרבית","מעקב בלבד"],"c":1,"t":"ספט 2024"},{"q":"למימחולי הפרקינסון הבאים מומלץ טיפול Deep Brain Stimulation ?","o":["מטופל עם רעד בלתי נשלט","מטופל עם נפילות","מטופל עם דיכאון ומחשבות אובדנות","מטופל עם דמנציה"],"c":0,"t":"ספט 2024"},{"q":"בן75, עם הפרעה בתפיסה מרחבית ובתפקודים ניהוליים מזה שנה, מינימנטל18 בבדיקה לפני 3 חודשים וכעת מינימנטל25. זקוק לעזרה בניהול התרופות וכספיו בחצי שנה האחרונה. סובל מהזיות ראייה ותנועות מרובות מתוך שינה. מתוארים שינויים ניכרים במצבו במהלך היום. בבדיקה ניכרת ריגידיות, ברדיקינזיה ואורטוסטטיזם. שיפור משמעותי בתסמיניו עם טיפול ב- DONEPAZIL במינון10 מ”ג. סבל מהחמרה מוטורית קשה קשה בניסיון טיפולי עם QUANTAPINE (SEROQUEL) במינון25 מ\\\"ג מהי האבחנה הסבירה ביותר?","o":["Possible Dementia With Lewy Bodies- ייתכן שמדובר בדמנציה מסוגLewy Body אבל אינו ממלא מספיק קריטריונים","Probable Dementia With Lewy Bodies - ככל הנראה מדובר בלואי בודי דמנציה","Probable Parkinson’s Disease Dementia - סביר שמדובר בדמנציה של פרקינסון מכיוון שחלפה שנה מהתחלת תסמיניו הקוגניטיבים","Possible Parkinson’s Disease Dementia - ייתכן שמדובר בדמנציה של פרקינסון לאור הופעת ההזיות בתחילת המחלה"],"c":1,"t":"ספט 2024"},{"q":"איזו מההצהרות הבאות נכונה לגבי המלצותהקריטריונים של BEERS לגבי נוגדי קרישה עבור קשישים?","o":["ל- WARFARIN יש יעילות דומה ל-DOAC בטיפול ב- VTEאו בפרפור פרוזדורים לא- שסתומי (Non-Valvular), וגם סיכון דומה לדימום מג'ורי","DABIGATRAN הוא נוגד קרישה בטוח ויעיל יותר מ-APIXABAN עבור קשישים","יש להימנע משימוש ב- APIXABAN עבור מטופלים עם מחלת כליות סופנית","WARFARIN אינו מומלץ כטיפול התחלתי עבורVTE או פרפור פרוזדורים לא-שסתומי (Non - Valvular), אלא אם כן אין חלופות מתאימות"],"c":0,"t":"ספט 2024"},{"q":"בת89 סובלת מסרטן ריאות גרורתי, תוחלת חיים משוערת "q":"בן 78 ,מטופל כרונית לתסמיני היפרטרופיה של פרוסטטה (BPH )וליתר לחץ דם מאוזן, מתעניין במתן ייפוי כוח לבנו. מה מהבאים נכון בנוגע לאפשרויות העומדות בפניו ?","o":["לחתום על ייפוי כוח רפואי על ידי רופא ועובדת סוציאלית","לחתום על ייפוי כוח מתמשך מלא (רפואי ורכוש) על ידי גריאטר מומחה","לחתום על ייפוי כוח לרכוש על ידי פקיד בכיר בבנק","לחתום על ייפוי כוח רפואי על ידי אחות מומחית קלינית בגריאטריה"],"c":0,"t":"ספט 2024"},{"q":"בת 73 ,מגיעה למיון עם קוצר נשימה, החמרה במצבה בחודש האחרון, ירידה תפקודית, וסחרחורת במאמץ מינימאלי מזה כשבוע. אשפוזים חוזרים בחצי שנה האחרונה עקב החמרת אי ספיקת לב. רקע: • מחלת לב איסכמית – ניתוח מעקפים לפני כ- 10 שנים, צנתור אחרון במהלך אשפוזה הקודם עם התערבות למעקפים ופתיחתם • מחלת כלי דם היקפיים • סוכרת מטופלת במשתנים במינונים מקסימאליים, (ENTRESTO) SACUBITRIL/VALSARTANבמינון מקסימאלי וב- SGLT2 . בבדיקה - לחץ דם 125/80 ,דופק 105 ,נשימות 24 . מעבדה - BUN 23 ,קריאטינין 1.5 בהחמרה מבסיס. אק\\\" ג - סינוס טכיקרדיה ללא הפרעת הולכה. אקוקרדיוגרפיה - חדר שמאל מורחב עם מקטע פליטה 20% ,ואי ספיקה מיטראלית קלה. מה מהבאים יכול לשפר את איכות חייה ויאריך אותם ?","o":["השתלת קוצב Cardiac resynchronization therapy – (CRT)","מכשיר תומך בחדר שמאל- Left ventricular assisted device (LVAD)","תיקון מסתם מיטראלי – Mitral Clip","אין מה שיכול לשפר את מצבה, מומלץ להעבירה לטיפול פליאטיבי בלבד."],"c":2,"t":"ספט 2024"},{"q":"בן83 סובל מהידרדרות תפקודית וקוגניטיבית בשנה האחרונה. הוא הולך לאט מאוד, סובל מנפילות חוזרות, סובל מפחד מפני נפילות, ירד במשקל 7 ק\\\"ג בשנה האחרונה, מרגיש עייפות כל הזמן, וגם עולה חשד למחלת אלצהיימר בחומרה בינונית. לפי הקריטריונים של FRIED כיצד ניתן להגדיר את החולה?","o":["PREFRAIL","FRAIL","VERY FRAIL","COGNITIVE FRAIL"],"c":1,"t":"ספט 2024"},{"q":"בת84 מטופלת במחלקה שיקומית לאחר שברבצוואר הירך. לאחר חודש של שיקום היא הולכת עם הליכון בהשגחה בלבד בתחום החדר ומתוכננת להשתחרר למחלקה סיעודית. מה תפקיד הריפוי בעיסוק בשיקום שלה?","o":["שליחת צוות לביקור לבדיקת התאמת המסגרת לתפקודה","הערכה קוגניטיבית בשאלה של התאמתה למחלקה לתשושי נפש","שיפור ADL – אכילה, הלבשת in – 2 g/dL איזה מהמצבים הבאים מתאים לתוצאות הבדיקה","o":["תסמונת נפרוטית","צירוזיס","אי ספיקת לב","פנקראטיטיס"],"c":1,"t":"ספט 2024"},{"q":"בת79, אובחנה עם פרפור עליות והחלה טיפול ב- AMIODARONE. לאחר מספר שבועות החלו תלונות על עייפות, חולשה, תחושת קור, עצירות ועליה במשקל. מה ההמלצה לשלב הבירור","o":["בדיקת רמת Thyroid-Stimulating Hormone (TSH)","בדיקת רמת Thyroid-Binding Globulin (TBG)","מפוי לבלוטת התריס","אולטרסאונד לבלוטת התריס"],"c":1,"t":"ספט 2024"},{"q":"מה מהבאים נכון בנוגע לכאב ראשפוסט-טראומטי?","o":["כאב הראש יכול להמשך שנים לאחר האירוע","אבחנה מתבצעת לרוב על ידי MRI","בבדיקה נוירולוגית תהיה עדות לסימני צד","אירוע זיהומי לא מהווה סיבה לכאב ראש זה"],"c":0,"t":"ספט 2024"},{"q":"Ca mg/dL 12.5 8.5-10.5 באק\\\"ג: סינוס 76 פעימות בדקהQT מקוצר מה הטיפול הראשוני המומלץ?","o":["דיאליזה","טיפול ב -FUROSEMIDE","טיפול תוך ורידי ב- SALINE 0.9%","ZOLENDRONIC ACID"],"c":3,"t":"ספט 2024"},{"q":"מה נכון בנוגע לפגיעה באברי מטרהבסוכרת מסוג 2 ?","o":["נפרופתיה סוכרתית היא הסיבוך המיקרו-וסקולרי השכיח ביותר","נפרופתיה סוכרתית לא קשורה לסיכון להתפתחות מחלה קרדיווסקולרית","נוירופתיה סוכרתית מתפתחת לפני אבחון הסוכרת","נוירופתיה סוכרתית יכולה להתבטא בראיה כפולה ופטוזיס"],"c":2,"t":"ספט 2024"},{"q":"גבר בן75 מגיע למיון עם כאבים בחזה. בתרשים האק\\\"ג– תמונה מספר 5 . אילו מהמצבים הבאים יכול לגרום לממצאים באק\\\"ג","o":["Hypokalemia","Hypercalcemia","Hypomagnesemia","Hypernatremia"],"c":3,"t":"ספט 2024"},{"q":"בת72, ברקע סכיזופרניה ללא מעקב רפואי. מאושפזת לאחר נפילה ושבר בצוואר הירך בבדיקה הגופנית ציאנוזיס של האצבעות ו- Clubbing . מה מהאבחנות הבאות עשויה להיות מתאימה","o":["Emphysema","Raynaud’s Phenomenon","Deep Vein Thrombosis","Peripheral Vascular Disease"],"c":1,"t":"ספט 2024"},{"q":"בן70 אושפז לבירור נפיחות בברך. שבועיים טרם בדיקתו עבר ניתוח לכריתת בלוטת יותרת התריס (Parathyroidectomy). בנוסף, ידוע על נפילות חוזרות אילו מהעובדות הבאות תומכת באבחנה של Acute Calcium Pyrophosphate Arthritis (Pseudogout) כסבירה יותר מאשר אבחנה שלGout ?","o":["היפוקלצמיה חריפה","אירוע קודם של טראומה בברך","אודם מקומי מעל הברך","רמת חומצה אורית (Uric Acid) תקינה בדם"],"c":1,"t":"ספט 2024"},{"q":"מה מאפיין ממצאי מעבדה של אנמיה של מחלה כרונית","o":["MCV גבוה","אחוז רטיקולוציטים גבוה","FERRITN נמוך","TRANSFERIN נמוך"],"c":2,"t":"ספט 2024"},{"q":"בן80, עם שחמת כבד מתקדמת על רקע הפטיטיסC וניקורים חוזרים עקב מיימת. מטופל ב- SPIRONOLACTONE ו- FUROSEMIDE ולמרות זאת עדיין סובל מאשפוזים חוזרים עקב מיימת. תוספת של איזה מהטיפולים הבאים יכול לעזור למיימת הרפרקטורית?","o":["CARVEDILOL (DIMITONE)","DOXAZOSIN )CADEX(","CLONIDINE (NORMOPRESSAN)","HYDRALAZINE"],"c":3,"t":"ספט 2024"},{"q":"מה הטיפול האמפירי הראשוני בחשד למנינגיטיס","o":["FLUCONAZOLE+ CEFEPIME + GENTAMYCIN + GANCYCLOVIR","DEXAMETHASONE + CEFTRIAXONE + VANCOMYCIN","DEXAMETHASONE + CEFTRIAXONE + VANCOMYCIN + ACYCLOVIR","RIFAMPIN + AMPICIILINE + VANCOMYCIN + GANCYCLOVIR + METRONIDAZOLE"],"c":0,"t":"ספט 2024"},{"q":"gr/dL (ערכי נורמה3.5-5.2) ואיסוף חלבון ל- 24 שעות של gr4 ליממה (ערכי נורמה mg0-150 .) איזה מהמצבים הבאים יכול לגרום לתסמונת ממנה סובל המטופל","o":["Amyloidosis","Postinfectious Glomerulonephritis","anti-GBM disease","ANCA vasculitis"],"c":1,"t":"ספט 2024"},{"q":"בן80 מגיע למיון עם קוצר נשימה. בתרשים האק\\\"ג– תמונה מספר 6 . בעקבות האק\\\"ג בוצע אקו לב. מה מהבאים אופייני למצוא בבדיקת האקו אצל מטופלים עם האק\\\"ג שבתמונה?","o":["היפרטרופיה של חדר שמאל","תפליט פריקרדיאלי","AORTIC STENOSIS","MITRAL REGURGITATION"],"c":0,"t":"ספט 2024"},{"q":"8), יתר לחץ דם ועישון כבד. אובחן לפני מספר שבועות עם אדנוקרצינומה ריאתית גרורתית לכבד. ידוע על שחמת במגמת החמרה עם אירוע של דימום מדליות בוושט והתפתחות מיימת. איזה מהבאים מהווה התוויה לטיפול אנטיביוטי מניעתי ל- Spontaneous Bacterial Peritonitis (SBP) ?","o":["אבחנה של ממאירות סולידית","היסטוריה של דימום מדליות בושט","סוכרת לא מאוזנת","אבחנה של תסמונת הפטורנלית (Hepato-Renal Syndrome )"],"c":0,"t":"ספט 2024"},{"q":"איזו מבין התרופות הבאות מורידה הפרשה שלTSH?","o":["LITHIUM","PREDNISONE","SERTRALINE","TAMOXIFEN"],"c":0,"t":"ספט 2024"},{"q":"בת75 אובחנה עםIdiopathic Pulmonary Fibrosis. הומלץ להתחיל טיפול תרופתי בתכשירים אנטי-פיברוטיים. מה נכון לגבי תרופות אלה?","o":["תופעות לוואי גסטרואינטסטינליות כוללות שלשול ובחילה","רוב תופעות הלוואי הן מינוריות ולא מצריכות הפסקה של הטיפול","התרופות עוצרות את התקדמות המחלה","התרופות פועלות על מנת לתקן את הנזק שנגרם לריאות"],"c":0,"t":"ספט 2024"},{"q":"בן80 ביצע בדיקת דם שגרתית ונמצאו בה2500 לויקוציטים1100 נויטרופילים. מה יכולה להיות התרופה שגרמה לכך?","o":["LITHIUM","CARBAMAZEPINE (TEGRETOL)","FILGASTIM ( G-CSF)","PREDNISONE"],"c":1,"t":"ספט 2024"},{"q":"בת70, עם רקע של סכיזופרניה, מגיעה למיון עם ירידה במצב הכרה, בלבול וכאבי ראש בבדיקתה: ללא בצקות, ללא רושם לסימני התייבשות. בבדיקות מעבדה היפונתרמיה של 122 mEq/L . בבדיקת השתן אוסמולארית של100 mOsm/kg. ריכוז הנתרן בשתן10 mM . איזה מהמצבים הבאים יכול להסביר את ההיפונתרמיה","o":["פולידיפסיה","היפותירואידיזם","טיפול בתיאזיד","גידול ריאתי"],"c":1,"t":"ספט 2024"},{"q":"איזה מהבאים היא אינדיקציה לטיפולבכריתת בלוטת יותרת התריס (Parathyroidectomy ) באנשים מבוגרים עם היפרפאראתירואידיזם ראשוני?","o":["צפיפות עצם עם T- Score פחות ממינוס1","Calcium Score גבוה ב- CT קורונרים","איסוף שתן לסידן מעל 400 מ\\\"ג ל- 24 שעות","סימני Chvostek Sign ו- Trousseau Sign"],"c":0,"t":"ספט 2024"},{"q":"איזה מהבאים נמצא יעיל במניעת זיהומים הקשורים לצנתרים ורידיים במאושפזים?","o":["להחליף עירויים פריפריים כל 24 שעות","להימנע ככל הניתן משימוש בצנתרים ג׳וגולריים ולהעדיף צנתרים פמורליים","לתת אנטיביוטיקה מניעתית לפני החדרת צנתר מרכזי","לבצע רחצה יומית של חולים בטיפול נמרץ /מוגבר ב- CHLOROHEXIDINE"],"c":2,"t":"ספט 2024"},{"q":"באיזה מהמצבים הבאים של פגיעה כלייתית עם עלית קריאטינין יש סיכוי גבוה להחלמה מלאה אחרי שבוע?","o":["Tumor Lysis","Multiple Myeloma","Contrast Nephropathy","Tubular Injury from Vancomycin"],"c":3,"t":"ספט 2024"},{"q":"בן75, ללא מחלות רקע. מתאשפז בגלל דמם רקטלי שהחל ביום פנייתו. בבדיקה: חיוור, ל\\\"ד 80/40, דופק110 לדקה, סטורציה97% באוויר חדר, בטן רכה ללא רגישות במישוש. בבדיקה רקטלית דם טרי. במעבדה: המוגלובין 7 gr/dL (לפני חודש המוגלובין12 gr/dL .) החולה מטופל בנוזלים ומנת דם, ולחץ הדם עולה ל- 110/70 . איזו בדיקה יש לבצע כעת ?","o":["קולונוסקופיה","גסטרוסקופיה","CT אנגיו של הבטן","מיפוי כדוריות אדומות"],"c":2,"t":"ספט 2024"},{"q":"איזו מהפרעות הקרישה הבאות גורמות לסיכון מוגבר ל- DEEP VEIN THROMBOSIS ?","o":["Vov Wilebrand Disease","חוסר ב- Factor XI","חוסר ב- Anti Thrombin III","Bernard Soulier Syndrome"],"c":1,"t":"ספט 2024"},{"q":"לאיזומהתרופות הבאות לטיפול בבצקת ריאות יש גם אפקט לשיפור כושר ההתכווצות של הלב (CONTRACTILITY? )","o":["NITROGLYCERIN","FUROSAMIDE","ENALAPRIL","MILIRONE"],"c":1,"t":"ספט 2024"},{"q":"בן78, יומיים לאחרST-Elevation Myocardial Infarction (STEMI) ומאושפז בטיפול נמרץ לב. ביום השני הופיעה סינוס ברדיקרדיה חדשה עם קצב של 55 לדקה, אך המטופל יציב המודינמית ונשימתית. מה מהבאים הוא הטיפול המתאים לברדיקרדיה זו לאחר STEMI ?","o":["טיפול ב- ISOPROTERENOL במינון של1 מק\\\"ג לדקה","טיפול ב- ATROPINE במינון0.5 מ\\\"ג","הכנסה מיידית של קוצב לב","השגחה בלבד, ללא צורך בהתערבות נוספת"],"c":2,"t":"ספט 2024"},{"q":"איזה מהבאים מאפיין תוצאות ניקור של מפרק עםNongonococcal Bacterial Arthritis ?","o":["רמות גלוקוז גבוהות","תרבית חיובית במרבית המקרים","ספירת תאים לבנים 10-20,000/µL","רמות LDH נמוכות"],"c":2,"t":"ספט 2024"},{"q":"K mM/L 5.6 3.5-5 מהי האבחנה המתאימה","o":["טיפול ב- AMPHOTERICIN B","4Renal Tubular Acidosis Type","Hyperaldosteronism","הרעלת אתילן גליקול"],"c":0,"t":"ספט 2024"},{"q":"בן61 מתקבל למיון בשל מספר אירועים של כאבים בחזה ביום קבלתו, מדדים חיוניים תקינים אק\\\"ג במיון מראה עליות ST בקיר קדמי. זמן קצר לאחר הגעתו הוא מפתח שני אירועים של SHORT VT, כל אחד מהם נמשך כחמש שניות וחולף ספונטנית. מדדים תקינים וללא תלונות כעת מצד החולה. כיצד יש לטפל בו?","o":["מתן AMIODARONE IV במינון150 מ״ג תוך10 דקות","מתן LIDOCAINE במינון100 מ״ג ב- IV PUSH","סדציה והיפוך חשמלי מסונכרן","צנתור דחוף"],"c":3,"t":"ספט 2024"},{"q":"Albumin gr/dL 3.9 3.5-5.2 אלקטרופורזה של חלבונים ללא פיק מונוקלונלי מה השלב הבא בברור?","o":["בדיקת דם לשרשראות קלות","איסוף שתן לחלבון כמותי","בדיקת דם לאימונוגלובולינים כמותי","היות ונשללה מיילומה יש להמשיך בירור בכיוון מחלות אחרות"],"c":0,"t":"ספט 2024"},{"q":"מהו הטיפול האנטיביוטי מניעתי לאנדוקרדיטיס, המתאים למטופל עם כותרת של אלרגיה ל- AMOXICILLIN/ CLAVULANIC ACID (AUGMENTIN)?","o":["VANCOMYCIN במינון750 מ\\\"ג","CLINDAMYCIN במינון600 מ\\\"ג","AZITHROMYCIN במינון500 מ\\\"ג","CIPROFLOXACIN במינון500 גרם"],"c":3,"t":"ספט 2024"},{"q":"בן68 עם ST-ELEVATION MI (STEMI) יציב המודינמית ובמוניטור הופעה של פעימות מוקדמות ממקור חדרי. איזו תרופה מומלצת כטיפול מונע להפרעות הקצב החדריות?","o":["BETA-BLOCKERS","AMIODARONE","VERAPAMIL","LIDOCAINE"],"c":2,"t":"ספט 2024"},{"q":"בן77 פנה למחלקה לרפואה דחופה עקב חום וכאבים עזים בכף הרגל, ללא חבלה. בבדיקות המעבדה – תפקודי כליה ואלקטרוליטים תקינים, לויקוציטים 12,300, המוגלובין וטסיות תקינים מצורפת תמונה של כפות הרגליים, תמונה מספר 7 . מה השלב הבא בטיפול בחולה","o":["התחלת טיפול אנטיביוטי ב - CEFAMEZIN","הפניה לצילום רנטגן","התחלת טיפול ב- COLCHICINE","ניקור של המפרק"],"c":2,"t":"ספט 2024"},{"q":"בן68 מתקבל למחלקה לרפואה דחופה במצב כללי ירוד, לחץ דם95/50. במעבר מהאלונקה למיטת בית החולים דיווח על סחרחורת ותחושת פרה-עילפון. בבדיקתו אין גודש ורידי צוואר, הגפיים קרות למגע. מה השלב הבא בטיפול?","o":["טיפול אנטיביוטי אמפירי באבחנת שוק ספטי","צנתור דחוף באבחנת שוק קרדיוגני","מתן נוזלים באבחנת שוק היפוולמי","מתן דם באבחנת שוק היפוולמי"],"c":1,"t":"ספט 2024"},{"q":"מה מאפיין את החמצת המטבולית במטופל עםChronic Renal Failure ?","o":["מופיעה בשלבים מאוחרים של המחלה","בדרך כלל מאוד קשה","אפשר לתקן אותה עם SODIUM BICARBONATE","בדרך כלל חמצת מסוג High Anion Gap"],"c":0,"t":"ספט 2024"},{"q":"מה מהבאים נכון לגבי אבחון אנצפליטיס וירלית","o":["אם IgM חיובי לקדחת הנילוס המערבי בדם אין צורך בבדיקת הווירוס ב- CSF","בדיקת MRI מוח תדגים נגעים באונות טמפורליות במיעוט המקרים של אנצפליטיס מ-","בחשד לאנצפליטיס על רקע וריצלה זוסטר מספיקה בדיקת PCR","בדיקת PCR ל- HSV1 עשויה להיות שלילית ב- 72 השעות הראשונות"],"c":2,"t":"ספט 2024"},{"q":"איזה ממצא בבדיקה גופנית אופייני ל- MITRAL VALAVE PROLAPSE (MVP) בניגוד ל- MITRAL REGURGITATION (MR) פונקציונלי","o":["החלשות האוושה כשהחולה על צד שמאל","התגברות האוושה ברכינה קדימה","התגברות האוושה בזמן ולסלבה","החלשות האוושה כשהחולה בעמידה"],"c":2,"t":"ספט 2024"},{"q":"בן75 פונה למרפאה בשל כאבי ראש חדשים ורגישות במישוש הרקה השמאלית. מה מהבאים","o":["במידה וביופסיה מעורק טמפורלי שלילית, יש להמשיך בירור אודות סיבה אחרת לכאבים","יש סכנה משמעותית לפגיעה בראיה ולכן חשוב להתחיל טיפול בסטרואידים מיד לאחר הביופסיה","הטיפול הוא סטרואידים במינון גבוה, ובשל תופעות לוואי שלהם יש להקפיד על הפחתה מהירה יחסית במינון","במטופלים עם סיכון משמעותי לתופעות לוואי של סטרואידים, מומלץ לשלב בתחילת הטיפול תכשיר TOCILIZUMAB (ACTEMRA)"],"c":1,"t":"ספט 2024"},{"q":"בת95 עם ממצא מקרי של פרפור עליות. נשקלת האפשרות לטיפול בנוגד קרישה. איזה מהבאים מהווה רכיב ב- HAS-BLED Score ?","o":["אי ספיקת לב","דיברטיקולוזיס","יתר לחץ דם","עבר של חבלת ראש"],"c":1,"t":"ספט 2024"},{"q":"בן75, מאושפז בשיקום לאחר שבר בירך. ברקע ידוע על אי ספיקת לב עם מקטע פליטה של 30% (LVEF), יתר לחץ דם ופרפור עליות שמטופל בחסמי בטא וב- APIXABAN (ELIQUIS) במינון5 מ\\\"ג פעמיים ביום. ביום השני לאשפוזו נצפתה יציאה דמית גדולה. בבדיקתו חיוור, לחץ דם 80/40, דופק95, ריווי חמצן וחום תקינים. בבדיקות דם ירידת המוגלובין מבסיס11 ל- 9.5, מדדי דלקת תקינים. מה מהבאים הינה הגישה הטיפולית הראשונית הטובה ביותר?","o":["להתחיל טיפול בווזופרסורים (Vasopressors), במידה ואין תגובה יש לתת נוזלים באיטיות","לחשב ציון SOFA אוAPACHE, ובהתאם לציון החלטה לגבי מתן דם","להחליף APIXABAN ל- LOW MOLECULAR WEIGTH HEPARIN, ולחזור על בדיקות דם לאחר מספר שעות","להתחיל טיפול בנוזלים מסוג קריסטלואידים (Crystalloid)"],"c":1,"t":"ספט 2024"},{"q":"איזה מהממצאים המעבדתיים שלהלןלא מאפיין TUMOR LYSIS SYNDROME ?","o":["אי ספיקה כלייתית","היפרקלמיה","היפרקלצמיה","היפראוריצמיה"],"c":0,"t":"ספט 2024"},{"q":"איזה מההגידים הבאיםאינו נכון בנוגע ל- SYNDROMESUPERIOR VENA CAVA ?","o":["מבין הסיבות הממאירות בקשישים ממאירות ריאה הינה הגורם השכיח ביותר","סיבות שפירות יכולות להסביר קרוב למחצית מהמקרים","מחלה גרורתית מהווה גורם לתסמונת במעל למחצית מהמקרים","הקרנה קודמת לבית החזה יכולה לגרום לתסמונת"],"c":1,"t":"ספט 2024"},{"q":"איזו אנטיביוטיקהלא מתאימה לטיפול אמפירי במטופל עם חום ונויטרופניה מעל שבוע?","o":["CEFTAZIDIME (FORTUM)","TAZOBACTAM/PIPERACILLIN (TAZOCIN)","MEROPENEM","AZTERONAM (AZACTAM)"],"c":3,"t":"ספט 2024"},{"q":"בן75, ברקע מחלת פרקינסון, יתר לחץ דם, אי ספיקת לב והגדלה שפירה של הערמונית. פונה למרפאה שבוע לאחר התחלת טיפול תרופתי חדש עם בצקת פריפרית חדשה. איזו מהתרופות הבאות לא גרמה לכך?","o":["CLONIDINE (NORMOPRESSAN)","DOPICAR","ALFUZOCIN (XATRAL)","MILRINONE"],"c":3,"t":"ספט 2024"},{"q":"איזו מהתרופות הבאותהניתנות בחולי אי ספיקת לב עם ractionF jectionE educedR לא משפיעה על קצב הלב?","o":["EPLERENONE","IVABRADINE","BISOPROLOL","DIGOXIN"],"c":0,"t":"ספט 2024"},{"q":"מתיאין לתת טיפול בניטרטים במטופל עם ELEVATION MI-Non ST ?","o":["היצרות קלה של המסתם האאורטלי","אוטם בקיר לטרלי","בצקת ריאות","אוטם בחדר ימין בהצלחה"],"c":2,"t":"ספט 2024"},{"q":"בת 85 ,עצמאית ב- BADL וללא חסר קוגניטיבי. ברקע אוסטאופורוזיס, מטופלת בויטמין D ו- ALENDRONATE. בנוסףיתר לחץ דם שעד כה טופל עם דיאטה ופעילות גופנית , ללא טיפול תרופתי. בחודשים האחרונים מדידות חוזרות של לחצי דם סביב 165/90. מהי הגישה הטיפולית המתאימה בחולה זו?","o":["המטופלת עם סיכון קרדיו-וסקולרי נמוך. אין צורך בטיפול להורדת לחצי הדם","הימנעות מטיפול ב- HYDOCHLOROTHIASIDE עקב אוסטאופורוזיס","טיפול ב- DOXAZOCIN (CADEX )כקו ראשון","טיפול ב- AMLODIPINE (AMLO )כקו ראשון"],"c":3,"t":"2023-ב"},{"q":"בן 75, חזר לביתו לאחר אשפוז עם סיבוכים עקב HERPES ZOSTER. אשתו בת67 חוששת שתחלה גם היא ושואלת לגבי חיסון לעצמה. מה ההמלצה לגבי חיסון ל- HERPES ZOSTER לגביה?","o":["במידה וחלתה בצעירותה באבעבועות רוח, אין טעם שתקבל חיסון","כדאי לבצע את החיסון מאחר והוא מוריד סיכון ל POST HERPETIC NEURALGIA","במידה והאישה מדוכאת חיסון, יש חשיבות יתר לקבלת החיסון","היא צעירה, ובגילה הסיכון לפתח הרפס זוסטר נמוך ולכן עדיף שתתחסן בגיל מבוגר יותר"],"c":0,"t":"2023-ב"},{"q":"בת80, שוקלת65 ק\\\"ג, בבדיקות בקופ\\\"ח רמת קריאטנין בדם 0.8. אושפזה עקב התייבשות ו- Acute Tubular Necrosis (ATN) עם עלייה של הקריאטנין בשחרורה - קריאטינין התייצב על 1.5 . כעבור6 חודשיםאושפזה שנית עם עליה נוספת בקריאטנין מ- 1.5 ל- 3 . כעבור6 חודשיםנוספים, אושפזה פעם שלישית עם עליה נוספת בקריאטנין מ- 3 ל- 5.5. באיזה שלב חלההירידה החדה ביותר ב-GFR אצל המטופלת","o":["בעליית קריאטנין מ-0.8 ל-1.5","בעליית קריאטנין מ-1.5 ל-3","בעליית קריאטנין מ-3 ל-5.5","בכולם יש ירידה דומה ב-GFR"],"c":0,"t":"2023-ב"},{"q":"5 . מה הגישה הטיפולית לזיהום במקרה המתואר?","o":["מתן טיפול אנטיביוטי בהתאם לבדיקת מטוש ( SWAB )ממוגלה שיוצאת מהפצע","מתן טיפול אנטיביוטי ראשוני המכסה זיהום ב- PSEUDOMONAS AUROGINOSA","מתן טיפול אנטיביוטי ב- CEFAMEZIN היעיל בטיפול בחיידקי עור כמו STREPTOCOCUS ו- STAPHILOCOCUS","מתן טיפול אנטיביוטי אמפירי רחב טווח"],"c":2,"t":"2023-ב"},{"q":"למרפאה מגיע מטופל בן 76 הסובל מירידה קוגניטיבית מזה כ- 3 שנים. מדווח על ירידה בזיכרון ובהתמצאות בזמן. אשתו מדווחת כי במהלך השנה האחרונה הירידה הקוגניטיבית מביאה לקושי גובר בניהול פעולות אותן היה מבצע היטב עד כה (קניות, נהיגה, עבודה על המחשב, ניהול הטיפול התרופתי, אחזקת בית וכו'). בבדיקת MMSE מתקבל ציון של 24/30 . מה הטיפול התרופתי המומלץ במטופל זה ומדוע","o":["היות ומדובר ב- MCI מומלץ טיפול במעכבי כולין אסטרז שנמצאו יעילים בעיכוב התקדמות מ- MCI למחלת אלצהיימר","מומלץ טיפול ב Memantine, אשר מאושר לשימוש למחלת אלצהיימר בדרגה קלה-בינונית ומאט את קצב הירידה במבחן MMSE","מומלץ טיפול במעכבי כולין אסטרז בחולי אלצהיימר, שכן הוא גורם להאטה של ההחמרה הקוגניטיבית ולשיפור באיכות חיים","מומלץ שילוב של מעכב כולינאסטרז ו- Memantine כיוון שהוכח כיבמחלת אלצהיימר בדרגה קלה השילוב יעיל יותר מכל אחת מהתרופות בנפרד בשימור תפקוד"],"c":2,"t":"2023-ב"},{"q":"בן88 ,ללא חסר קוגניטיבי ידועאושפז בטיפול נמרץ קרדיולוגי עקב אוטם שריר הלב. בלילה צעק, ניסה לקפוץ מהמיטה ואף הרביץ לאחות שקשרה אותו למיטה. איזה מהבאים נכון בנוגע לטיפול במצב המתואר?","o":["הטיפול התרופתי יעיל מאוד במקרה זה","ההמלצות הטיפוליות כוללות גמילה מקתטר שתן וניתוק ממוניטור","הגבלה פיזית היא חיונית במקרה כזה","מומלץ טיפול בבנזודיאזפינים בשעות בלילה בלבד"],"c":3,"t":"2023-ב"},{"q":"בת84, מגיעה להערכה גריאטרית כוללנית ומבקשת הפניה לבדיקת ממוגרפיה. היא מאוד כועסת שהבדיקה אינה בסל הבריאות עבורה. מה אפשר להסביר לה על התועלת בביצוע ממוגרפיה שגרתית בנשים מעל גיל 75 ?","o":["אין אינדיקציה לבדיקת ממוגרפיה היות וסרטן שד מאוד נדיר בגיל זה","סרטן שד בגיל מבוגר הוא בעל פרוגנוזה טובה יותר","אין הוכחה מחקרית ליעילות ממוגרפיה למניעת תמותה בנשים מעל לגיל 75","לא ניתן להסביר. הבדיקה אינה בסל הבריאות משיקולים כלכליים בלבד"],"c":0,"t":"2023-ב"},{"q":"בן75, מעשן כבד, אובחן כסובל מ- COPD CHRONIC OBSTRUCTIVE PULMONARY) DISEASE .) ברקע- יתר לחץ דם וסוכרת. מטופל בתרופות - ASPIRIN ,ENALAPRIL ו- METFORMIN . לאחרונה אושפז עקב החמרה בקוצר נשימה ושוחרר לביתו לאחר שבוע. פנה למרפאה להתייעצות לגבי מניעה של אשפוזים נוספים. מה מומלץ לצורך מניעת אשפוזים חוזרים?","o":["שימוש קבוע במכייחים למניעת הצטברות הפרשות","מתן תוספת של טיפול ב- THEOPHYLLINE","מתן חמצן במשקפיים 2 ליטר/לדקהללא קשר למצב ריווי החמצן בדם","הפניה לשיקום ריאות"],"c":0,"t":"2023-ב"},{"q":"בת 85 אובחנה כסובלת מ- Polymyalgia Rheumatica (PMR) . מהנכון בנוגע למחלה זו?","o":["התסמונת שכיחה יותר אצל נשים ביחס של 2:1","70% מחוליPMR הם בגיל מעל60","כאבים בחגורת אגן יותר שכיחים מאשר כאבים בחגורת כתפיים","ב- 40% מהחולים ישארטריטיס ארוזיבי של מפרקי כפות הידיים"],"c":1,"t":"2023-ב"},{"q":"לפי המאמרUse of the Functional Independence Measure for Outcomes Measurement in Acute Inpatient Rehabilitation מאתMichele Cournan, מה נכון לגבי ההבדל בין מדד ה- -BARTHELלמדד ה- FIM ?","o":["מדד ה -BARTHEL מבוסס על מדד ה- FIM","מדד FIM נועד למדוד את מה שהמטופל \\\"יכול לעשות\\\" , ומדד הBARTHEL נועד למדוד \\\"נטל טיפול","מדד BARTHEL נועד למדוד את מה שהמטופל \\\"יכול לעשות\\\" , ומדד הFIM נועד למדוד \\\"נטל טיפול\\\"","מדד ה BARHEL - הוא מדד בעל אמינות גבוהה יותר לעומתFIM"],"c":2,"t":"2023-ב"},{"q":"מה מהבאים נכון לגבי תופעות לואי של טיפול באופיואידים בכאב כרוני בזקנים?","o":["עצירות היא תופעת לוואי שמתפתחת לה סבילות ( TOLERANCE ) עם הזמן","עקב תופעות הלוואי אסור לעבור מינון מקסימלי של אופיואידים (CEILING EFFECT)","PSEUDOADDICTION היאתופעת לוואי המתבטאת בצריכה מופרזת של תרופה משנית לגורמים לא אורגניים","בהפסקה פתאומית של הטיפול יכולים להיות סימני גמ תחלת הכלכלה?","o":["היפוגליקמיה, היפונתרמיה והיפרקלמיה","היפרגליקמיה, היפוקלמיה והיפופוספטמיה","היפרנתרמיה, היפרגליקמיה והיפופוספטמיה","היפומגנזמיה, היפרקלמיה והיפרקלצמיה"],"c":2,"t":"2023-ב"},{"q":"עם ההזדקנות מתרחשים שינויים רבים בפרמקוקניטיקה ופרמקודינמיקה של תרופות. מה מבין הבאים נשמר כמעט ללא שינוי?","o":["נפח פיזור התרופה בגוף","מטבוליזם כבדי","הספיגה של התרופה","ההפרשה דרך הכליות"],"c":0,"t":"2023-ב"},{"q":"על פי הPOCKET GUIDE TO THE 2019 AGS BEERS CRITERIA באיזה מהמצבים הבאים מתאים לטפל בתרופות אנטיפסיכוטיות באנשים מבוגרים?","o":["טיפול בהפרעות התנהגות של דמנציה","טיפול במחלה ביפולרית","טיפול ממושך למניעת הקאות במקבלי כימותרפיה","טיפול קצר למניעת דליריום"],"c":3,"t":"2023-ב"},{"q":"בן 80 ,מועמד לניתוח להחלפת פרק ירך, אובחן כסובל משבריריות (FRAILITY) על פי הקריטריונים של FRIED . ברקע - סוכרת, אי ספיקת כליות מתקדמת ומחלת לב איסכמית. מה ההשפעה של השבריריות (FRAILITY) על בעיותיו הרפואיות","o":["העובדה שהמטופל שברירי מעלה סיכון לדלקת ריאות לאחר ניתוח","המטופל יגיע לדיאליזה בערכי GFR נמוכים יותר מאשר אם לא היה שברירי","סיכוי סביר כי אירועים קרדיווסקולריים אצל המטופל יהיו סימפטומטיים לעומת קשישים ללא שבריריות","מאחר שהמטופל שברירי סביר שבבדיקת סבילות לגלוקוז Glucose tolerance test רמות הגלוקוז והאינסולין יהיו נמוכות יותר"],"c":3,"t":"2023-ב"},{"q":"בן90 הוא חולה נוטה למות, אשר חתם על מינוי ייפוי כוח לפי חוק החולה הנוטה למות. כעת הוא נמצא באשפוז במחלקה קרדיולוגית בשל סינקופה המיוחסת לחסם הולכתי וזקוק להכנסת קוצב. הצוות המטפל מתלבט האם הוא כשיר לקבל החלטה זו או שיש להכניס לתוקף את ייפוי הכוח. כיצד יש לקבל החלטה לגבי כשירות מטופל זה על פי חוק החולה הנוטה למות?","o":["יש להזמין גריאטר כיוון שרק הוא יכול להחליט על הוצאה מחזקת הכשרות","יש להזמין פסיכיאטר כיוון שרק הוא יכול להחליט על הוצאה מחזקת הכשרות","לצורך הערכת כשירות יש צורך בהערכה קוגניטיבית פורמלית, כמו MOCA על ידי מרפאה בעיסוק","כל רופא שהוגדר כרופא אחראי יכול להוציא מחזקת הכשרות"],"c":2,"t":"2023-ב"},{"q":"בת84 מגיעה למרפאה לאחר שנפלה בביתה מספר פעמים. בהערכה עולה כי היא סובלת מאינסומניה מזה כעשר שנים, מאז מות בעלה. מאז מטופלת ב- BROTIZOLAM (BONDORMIN .) היאהעלתה את המינון על דעת עצמה עד ל- 2 כדורים ללילההיא מדווחת על מצב רוח שמור ובסקר GDS צברה ניקוד של3/15 . מההצעד הבא להמשך הטיפול?","o":["הפסקה מידית של BROTIZOLAM בעקבות הנפילותגם במחיר של הפרעה בשינה","החלפה של הטיפול מ- BROTIZOLAM ל- TRAZODIL","הפחתה הדרגתית של הטיפול ב BROTIZOLAM ובמקבילהפניה לטיפול קוגניטיבי התנהגותי להפרעות שינה","הערכה במעבדת שינה לקביעת דפוס השינה והתאמת טיפול תרופתי"],"c":2,"t":"2023-ב"},{"q":"מהי התכונה המתאימה לאביזר העזר","o":["מקל נקודה - מוריד נשיאת משקל מהרגל באותו צד","רולטור - יעיל במצב של ללא דריכה על רגל","קלנועית- מחלה קרדיופולמונרית פעילה מהווה קונטראינדיקציה לשימוש","מקל 4 נקודות- מאפשר נשיאת משקל גדולה יותר ממקל נקודה"],"c":0,"t":"2023-ב"},{"q":"לדיירת במחלקה סיעודית, בת 85, נלקחה תרבית שתן לאחר הופעת חום 38.2 . מה מבין הסימפטומים/סימנים הבאים (בנוסף לחום) מחשיד ל זיהום בדרכי השתן בחולה זו?","o":["מאקרוהמטוריה","אירוע של אורוספסיס ב-3 חודשים הקודמים","אצירת שתן","עכירות של השתן"],"c":0,"t":"2023-ב"},{"q":"גבר בן73 ,שמור קוגניטיבית, שנתיים לאחר אירוע מוחי עם חולשת פלג גוף ימין, פנה למלר\\\"ד בעקבות נפילה וחבלה לאגן. עד הנפילה התהלך עם הליכון. בצילום רנטגן: מה הטיפול המומלץ לפי המאמר Management of Acute Hip Fracture ?","o":["רדוקציה של השבר בחדר ניתוח והשכבה עם מתיחה ל- 3 שבועות","ניתוח arthroplasty, תוך עד48 שעות מהנפילה, וניוד מוקדם","בשל מגבלת ניידות מלפני הנפילה מומלץ להימנע מניתוח, מומלצת פיזיותרפיה וניוד מוקדם ככל","ניתוח מיסמור תוך לשדי (intramedullary nails)"],"c":1,"t":"2023-ב"},{"q":"מה שכיחות הסיבוכים הבאים לאחר שבץ?","o":["כ- 25% מהאנשיםשנה לאחר שבץ מוחי סובלים מאי שליטה על שתן","כ- 10% מהאנשים הסובלים מחולשת יד יסבלו מכאבים בכתף","כ- 5% מהאנשיםלאחר שבץ סובלים מדיכאון","בכ- 30% מהחולים הסובלים מדיספגיה יכולות להופיע אספירציות שקטות"],"c":0,"t":"2023-ב"},{"q":"בת 78 ,סובלת מסוכרת לא מאוזנת, ירידה בשמיעה, ופרפור עליות. היא מתגוררת בביתה לבדה, ולאחרונה אובחנה כסובלת מדמנציה. לאחרונה אירעו מספר אירועים: השכנים מצאו אותה משוטטת ברחוב ולא מוצאת את ביתה, הוזמן מכבי אש עקב שריפה שפרצה בדירה מסיר שנשאר על האש. בביקור בית של הרווחה מתברר שלא התרחצה ולא החליפה בגדים זמן ממושך ואכלה מזון מקולקל. הוחלט להעביר אותה למסגרת מוסדית. מה הסטטוס התפקודי של אישה זו?","o":["המטופלת עם ירידה קוגניטיבית, הגורמת לה לפגיעה משמעותית בתפקוד היומיומי ולכן תוגדר כתשושת נפש","המטופלת מתהלכת בעצמה וזקוקה רק לעזרה ב- IADL ולכן תוגדר כתשושה","המטופלת זקוקה להשגחה צמודה ואינה יכולה להתרחץ בעצמה ולכן תוגדר כסיעודית","סוג המסגרת המתאימה תלוי בערך המספרי של מבחן MMSE"],"c":0,"t":"2023-ב"},{"q":"בן81, סובל מ- PARKINSON DEMENTIA .MMSE לפי3 חודשים היה12/30. תרופות קבועות ENALAPRIL ,DOPICAR,METFORMIN .לדברי בני המשפחה, האיש מתהלך בבית באופן עצמאי עם הליכון גלגלים ( ROLATOR )ונופל לעיתים קרובות. לא היה איבוד הכרה ולא ידוע על חבלת ראש התקבל למרפאה להערכת נפילות חוזרות. מה כוללת תכנית הברור הראשונית בחולה זה?","o":["המלצה לביצוע HOLTER בחשד להפרעות קצב","בדיקת MMSE חוזרת","הערכת יכולת שימוש נכון ב- ROLATOR","המלצה לביצוע MRI מוח"],"c":1,"t":"2023-ב"},{"q":"בן 92 ,התקבל במרפאה הגריאטרית בשל תלונות על שינויים קוגניטיביים. הוא אדם פעיל, עצמאי ב- ADL ו- IADL. לדבריו, מזה כשנתיים סובל מקושי במציאת מילים ושטף דיבור. לאחרונה הבחין בנוסף בהפרעה בזיכרון הבאה לידי ביטוי בירידה ביכולת הלמידה. בנו מספר על האטה בזמן התגובה. מה האבחנה?","o":["מאחר ובשנתיים הראשונות התחום הפגוע היחידי היה שפתי, מדובר ב- Primary progressive aphasia.","מדובר ב-dementia אשר הסיבה השכיחה לה הינה מחלת אלצהיימר","המצב המתואר מתאים ל Normal aging","מדובר ב Minimal cognitive impairment- MCI"],"c":2,"t":"2023-ב"},{"q":"מה מהבאים הוא גורם סיכון לנפילות אצל קשישים","o":["גיל מבוגר","מין זכר","טיפול בתרופות מסוג NSAID","חסר ויטמין B 12"],"c":1,"t":"2023-ב"},{"q":"בן93, סובל מדמנציה, מתגורר בביתו עם עובד זראושפז במחלקה פנימית עקב החמרה של אי-ספיקת לב. עד לאשפוזו התהלך בביתו עם הליכון. לאחר שבוע אשפוז במחלקה הפנימית הוא מרותק למיטה. בבדיקה גופנית- דלדול שרירים ניכר. מה האפשרויות הטיפוליות בחולה זה?","o":["לצורך שיפור תפקודי מומלצת תזונה עם 0.8 גרם/ק\\\"ג חלבון","סטרואידים אנאבולים יכולים לעזור בטיפול בסרקופניה","טיפול פיזיותרפי יכול להעלות את מסת השריר","מדובר בחולה סיעודי ואין טיפול יעיל למצבו"],"c":1,"t":"2023-ב"},{"q":"בת75 ,בריאה בדרך כללעצמאית ב- ADL ,הגיעה להתייעצות במרפאה בשאלה של טיפול לאוסטאופורוזיס. היא מביאה איתה תשובת בדיקת צפיפות עצם הבאה: מה כוללות ההמלצות התרופתיות?","o":["תוספת תכשירי סידן במינון 3000 מ\\\"ג ליום","תוספת ויטמין D במינון500 יחידות ליום","טיפול ב- ALENDRONAE במינון70 מ\\\"ג אחת לשבוע","על פי הממצאים בבדיקה אין אינדיקציה לטיפול לאוסטאופורוזיס"],"c":3,"t":"2023-ב"},{"q":"בן78 שהיה עצמאי וגר בביתו, התקבל למחלקה לגריאטריה שיקומית לאחר שעבר ניתוח לקיבוע שבר בצואר הירך בעקבות נפילה. הוא שואל \\\"האם אחזור להיות כמו שהייתי לפני הנפילה\\\"? מה הפרוגנוזה לאחר שבר בצואר הירך?","o":["הסיכון לתמותה תוך שנה בגברים לאחר שבר בצואר הירך מגיע ל- 36%","75% מהאנשים שעברו שבר בצואר הירך יזדקקו לאביזרי עזר בהליכה לאחר שנה","הסיכון לפצעי לחץ לאחר שבר בצואר הירך הוא כ- 10% בחודש הראשון","דיכאון משני לשבר בצואר הירך נשאר בדרך כלל לטווח ארוך לאחר השיפור התפקודי"],"c":3,"t":"2023-ב"},{"q":"בן 79 מגיע להערכה במרפאה בלווי ביתו, שמספרת על בלבול ומצב רוח ירוד שהופיעו בהדרגה בשנה האחרונה. בשיחה בולטים אפקט דיכאוני וליקוי בקשב. במבחן MMSE השיג תוצאה של 24/30 עם ירידה בזיכרון לטווח קצר והפרעה בחיסור7 מ- 100. ב- CT מוח נמצאה אטרופיה מוחית. מה מהנתונים תורם לאבחנה של PROBABLE DEMENTIA DUE TO ALZHEIMER DISEASE ?","o":["אטרופיה מוחית שנמצאה ב- CT","אפקט דיכאוני","הפרעה בקשב","החמרה הדרגתית במצב הקוגניטיבי"],"c":0,"t":"2023-ב"},{"q":"בן 85 עם רקע רפואי של אי ספיקת לב, COPD ,סוכרת ויתר לחץ דם מתקבל למחלקה סיעודית. לאחר בירור מול המשפחה ורופא המשפחה – לא ברור האם קיבל חיסון לפנאומוקוק בעברו. מה ההמלצה לגבי ההתחסנות לפנואומוקוק עבור המטופל?","o":["יש להתחסן ב-PCV13 (PREVENAR )בלבד","אם יש ספק בעניין חיסון קודם מותר לתת חיסון חוזר","אין חשיבות לחיסון בגיל 85 באם לא חוסן עד כה","באם סבל מדלקת ריאות ב-5 שנים האחרונות, יש לתת חיסון PCV13 ו-PPSV23"],"c":2,"t":"2023-ב"},{"q":"בן78, ברקעPAF, סוכרת, היפרליפידמיה, ומחלת לב איסכמית. התקבל למחלקת שיקום לאחר שהיה מאושפז במחלקה נוירולוגית עקב שבץ מוחי (CVA). בקבלתו לשיקום, הומלץ עלטיפול ב- ATORVASTATIN (LIPITOR) במינון גבוה. הפיזיותרפיסט חושש שהטיפול בסטטינים יפגע בשרירים ויפריע לתהליך השיקומי. מה נכון לגבי מיופתיה על רקע שימוש ב- Lipid lowering agents ?","o":["כ- 1% מהמטופלים בסטטינים יכולים לפתח רבדומיוליזיס","רוב המיופתיות מתייצגות תוך חודש מתחילת הטיפול בסטטינים","עליה של CPK נצפית בעד10% מהמטופלים בסטטינים","טיפול ב- AMIODARONE יכול לעלות סיכון למיופתיה של סטטינים"],"c":3,"t":"2023-ב"},{"q":"מה נכון לגבישאלון PHQ-9 לצורךאיבחון ומעקב של דיכאון אצל קשישים?","o":["תוצאה של 10 ומעלה בשאלון מחשידה ל- MAJOR DEPRESSION","החיסרון בשאלון הוא שאינו כולל הערכת אובדנות","השאלון יעיל לאבחנה, אך אינו רגיש מספיק להערכת יעילות של טיפול","תוצאה של 0-4 בשאלון מצריכה הערכהנוספת"],"c":1,"t":"2023-ב"},{"q":"בן84, תשוש בתפקודו, ברקע דמנציה קלה. התקבל למלר\\\"ד עקב חום 38.6, ישנוניות ובלבול הסטאז'ר הציע לבצע ניקור מותני. מה ההמלצה לגבי ניקור מותני במטופל ?","o":["ברוב המטופלים עם חום ודליריום יש אינדיקציה לביצוע ניקור מותני","יש לבצע ניקור מותני כאשר יש חשד לאנצפליטיס או מנינגיטיס","יש לבצע ניקור מותני אם מופיעים סימנים נוירולוגית פוקליים","דליריום מהווה קונטראינדיקציה לביצוע ניקור מותני עקב סכנה של תזוזה של החולה"],"c":3,"t":"2023-ב"},{"q":"בן 78 מגיע להערכה עם רעייתו, שמתארת ירידה קוגניטיבית ותפקודית מהירה בחודשים האחרונים: הוא היה מעורב בכמה תאונות קלות, ולאחרונה גם הלך לאיבוד מספר פעמים. בלילות הוא מפריע לה לישון עם דיבור ותנועות תוך כדי שינה, בלילות האחרונים היה משוכנע שנכנסה הביתה קבוצת ילדים, והוא הכין להם שתיה וממתקים. היא מבולבלת כי יש ימים בהם הוא \\\"מתנהג רגיל\\\", \\\"כמו פעם\\\". אילו ממצאים בבדיקות עזר יעזרו באיבחון המחלה?","o":["ממצא ב- EEG שלגלים נמוכים ואיטיים באזור הטמפורלי","ממצאים אופייניים בניקור מותני","ממצא של ירידת לחץ דם אורתוסטטית","דלדול אונות מדיאליות וטמפורליות ב- MRI"],"c":0,"t":"2023-ב"},{"q":"HgB gr/dl 9.5 17-13.2 MCV fL 80 80-96 PLT 10e3qµL 496,000 140-450 NEU % 82 40-75 LYM % 16 20-40 IRON µg/dL 32 40-150 TRANSFERRIN mg/dL 152 220-400 FERRITIN ng/dL 188 14-163 VIT B12 pg/mL >1000 175-961 FOLIC ACID , הגיע למיון בבית חולים פסיכיאטרי. בני המשפחה מספרים על שינוי באישיות מזה כשנה: קשריו החברתיים התקלקלו בשל אירועים חוזרים של התנהגות לא הולמת בציבור – מקלל ומעיר הערות סקסיסטיות ופוגעניות, עלה כ-20 ק\\\"ג במהלך השנה תוך אכילה בלתי פוסקת של דברי מתיקה. לאחרונה ניכרת גם ירידה תפקודית – לא מצליח לבצע את עבודתו, מתקשה גם בבישול. בבדיקה: אפקט מרומם, לא תואם. MMSE=29/30. מה ההמלצה הטיפולית","o":["טיפול ב-SSRI's","טיפול במעכבי כולינאסטרז","טיפול באנטי פסיכוטים אטיפיים","בגילו ובנוכחות MMSE תקין - מדובר בהפרעה פסיכיאטרית שאינה קשורה לגריאטריה"],"c":2,"t":"2023-ב"},{"q":"4 )ויתר לחץ דם. בגין תלונות על צריבה במתן שתן פונה למרפאה. סטיק שתן חיובי ללויקוציטים וניטריטים. אלו מבין הבאים מתאים כקו ראשון לטיפול אנטיביוטי?","o":["CIPROFLOXACIN למשך 7 ימים","NITROFURANTOIN ( מקרודנטין) למשך 5 ימים","TRIMETOPRIM/SULPHAMETHOXAZOLE ( רספרים 7 ימים","PHOSPHOMYCIN ( מונורול) למשך 3 ימים"],"c":3,"t":"2023-ב"},{"q":"בת 75, דיירתבמחלקה לתשושים הסובלת מדמנציה קלה ואירועי חרדה ברקע, מדווחת על דאגה מתמדת. הצוות המטפל בה מדווח כי היא מתקשה להתמקד ושהיא סובלת מנדודי שינה עם שיטוט מוגבר במהלך היום והלילה. היא השתתפה בטיפול קבוצתי במשך 6 השבועות האחרונים עם שיפור מינימלי. לא מטופלת תרופתית כרגע. מה הטיפול התרופתי המתאים למטופלת בקו הראשון?","o":["Memorit) Donepezil)","Citralopam (Cipramil )","Oxazepam (Vaben)","Quetiapine (Seroquel)"],"c":2,"t":"2023-ב"},{"q":"חום 38.5 ,ל\\\"ד 80/50 mm Hg ,מבולבל, 30 נשימות לדקה, קריאטינין 2.5 BUN=45 מ\\\"ג/ד\\\"ל. בצילום חזה: מה הסיכון לתמותה אצל המטופל ?","o":["פחות מ- 5%","5%-10%","20%","מעל 40%"],"c":2,"t":"2023-ב"},{"q":"בת85, ברקע יל\\\"ד וסוכרת, התקבלה עם שבץ מוחי שהתבטא בהמיפלגיה של צד שמאל. לאחר אשפוז בנוירולוגיה, הגיעה לשיקום. כשבוע לאחר אשפוזה, התחילה להתלונן על כאבים באזור הכתף השמאלית. הועלתה השערה שמדובר ב\\\"כאב כתף המיפלגית\\\" - hemiplegic shoulder pain . מה הטיפול המתאים למצב זה","o":["הטיפול כולל מתלה תומך למניעת תת-פריקה ותרגולים למניעת קונטרקטורות","מדובר ברוב המקרים בכאב ממקור מרכזי ולכן טיפול ב- PREGABALIN (LYRICA) יכול לעזור","אם לא משתפר ספונטנית לאחר חצי שנה, יש מקום לטיפול בגירוי חשמלי מקומי","מומלץ להפחית את אינטנסיביות הטיפול השיקומי עד להפחתת הכאב"],"c":0,"t":"2023-ב"},{"q":"בת94, גרה לבדה עד האשפוז, לא ידוע על ירידה קוגניטיבית. מאושפזתבמחלקה פנימית בשל אלח דם (SEPSIS )ממקורשל דלקת בדרכי השתן. היא נושאת קתטר שתן ומטופלת באנטיביוטיקה דרך הוריד. רופא גריאטר נקרא לתת יעוץ בשל מצב של אי-שקט ובלבול. בבדיקה נראית כאובה, סובלת מאי שקט פסיכו-מוטורי בולט, ליקוי בקשב, חוסר התמצאות במקום ובזמן. רשימת תרופות שמקבלת: ROCEPHIN ENOXAPARIN (CLEXAN ) PARACETAMOL OXAZEPAM (VABEN ) RAMIPRIL (TRITACE ) TROSPIUM (SPASMEX) BROTIZOLAM (BONDORMIN ) מהצריך לייעץ בהתייחס לטיפול התרופתי שהמטופלת מקבלת?","o":["להפסיק טיפול ב- VABEN שקיבלה בביתה","להפסיק את הטיפול ב- TROSPIUM (SPSMEX)","להחליף את ה-BROTIZOLAM (BONDORMIN) ב- ZOLPIDEM (ZODORM)","להוסיף טיפול קבוע ב- TRAMADOL לאיזון כאב"],"c":2,"t":"2023-ב"},{"q":"לעיתים נדרשתאבחנה מבדלת בין דליריום, דמנציה, דיכאון ופסיכוזה. מה נכון בנוגע להשוואה בין האבחנות השונות?","o":["גם בדליריום וגם בדמנציה ההופעה היא הדרגתית","הלוצינציות ראיה אופייניות לדליריום ולדיכאון","רק בדליריום ניתן לראות שינוי במצב ההכרה","בכולם יש הפרעה בזיכרון"],"c":3,"t":"2023-ב"},{"q":"בת67 מגיעהלייעוץ לגבי גורמים להאטת הזדקנות המוח. מה נכון להמליץ לה?","o":["פעילות גופנית מפחיתה איבוד נפח מוחי ומשפרת נוירוגנזה","פעילות אינטלקטואלית ופעילויות פנאי מחוץ לבית טובות להפגת בדידות אך אינן רלבנטיות לשימור תפקודי המוח","דיאטה עתירת חלבון משפרת את בריאות המוח","איזון קפדני של מחלות כמו היפרליפידמיה, סכרת, ויתר ל\\\"ד ימנע מוות לבבי, אך אינו קשור למניעת דמנציה"],"c":1,"t":"2023-ב"},{"q":"בן73, מגיע למרפאה גריאטרית בשל חוסר יציבות, חולשה כללית, ונפילות חוזרותהוא מתאר קצב הליכה איטי, מתלונן על דחיפות במתן שתן ומספר שהוא קם לשירותים 3-4 פעמים בלילה שולל בעיות זיכרון, הזיות או מחשבות שווא. רופא המשפחה ניסה טיפול ב- DOPICAR לכמה חודשים ללא שיפור משמעותי. בבדיקה- לחץ דם בשכיבה 156/84 ,אך יורד ל- 104/73 סיסטולי בעמידה, דופק כ- 95. מתנייד עם הליכון, הליכה shuffling gait ,תנועות רגליים ללא קואורדינציה טובה, כיפוף גב קדימה, ללא רעד במנוחה, אבל רעד בביצוע תנועה מכוונת, תנועות עיניים תקינות. בהערכה קוגניטיבית MMSE – 29/30 ,MRI של המוח ללא הרחבת חדרים או גרורות איזו מהאבחנות הבאות היא הסבירה ביותר?","o":["מחלת פרקינסון","Lewy Body Disease","Progressive supranuclear palsy","Multisystem Atrophy"],"c":2,"t":"2023-ב"},{"q":"/80 ,דופק 58. בשחרור הומלץ על טיפול ב- ASPIRIN( ,CLOPIDOGREL PLAVIX ( ו- ATORVASTATIN (LIPITOR) . איזו מבין רשימות תרופות הבאות מתאימה להשלמת התרופות המומלצות בשחרור:","o":["LERCANIDIPINE (VASODIP) ,BISOPROLOL (CARDILOC)","LERCANIDIPINE ( VASODIP) , RAMIPRIL ( TRITACE)","RAMIPRIL ( TRITACE)","BISOPROLOL (CARDILOC)"],"c":0,"t":"2023-ב"},{"q":"בן85, סובל מקושי להירדם. מתעניין לגבי אפשרות לשימוש בתרופות ממשפחתNon benzodiazepines drugs (Z-drugs) . מה היתרון של שימוש בתרופות אלו על פי ההמלצות של POCKET GUIDE TO THE 2019 AGS BEERS CRITERIA?","o":["גורמות לפחות נפילות ושברים לעומת בנזודיאזיפינים","מפחיתות סיכוי לדליריום","מקצרות מעט את הזמן שלוקח להירדם","ההשפעה שלהם טובה מאוד לגבי משך השינה"],"c":0,"t":"2023-ב"},{"q":"בן74, תשוש בתפקודו. התקבל למחלקה לרפואה דחופה לאחר נפילה מה הניתוח המומלץ לשבר שבתמונה על פי המאמרManagement of Acute Hip Fracture מאת Bhandari וחבריו","o":["קיבוע פנימי (internal fixation) על ידי ברגים","מסמור תוך לשדי (intramedullary nails)","החלפת מפרק ירך (arthroplasty)","קיבוע פנימי (internal fixation) על ידי sliding hip screw"],"c":3,"t":"2023-ב"},{"q":"K mmol/L 4.5 3.5-5.3 Cl mmol/L 88 95-110 PCO2 mmHg 35 35-46 HCO3 mmol/L 14 21-26 בבדיקת שתן: לויקוציטים + , תאים אדומים -, ניטריט -, קטונים +++ תופעת לוואי של איזו מהתרופות הבאות עשויה להיות הגורם למצבו של החולה?","o":["METFORMIN","DAPAGLIFLOZIN (FORXIGA)","LINAGLIPTINE (TRAJENTA)","DISOTHIAZIDE"],"c":2,"t":"2023-ב"},{"q":"מה מאפיין כאב גב מותני בחולים הסובלים מהיצרות ספינאלית?","o":["הכאב מחמיר במעבר משכיבה לישיבה","הכאב מחמיר בהליכה בעליה","הכאב מחמיר בהרמה של חפצים כבדים","הכאב מחמיר בשכיבה על הגב"],"c":1,"t":"2023-ב"},{"q":"בן 75, הופנה על ידי רופא המשפחה לביצוע בדיקת הדמיה (MRI )במסגרת בירור ירידה קוגניטיבית הדרגתית ומתמדת במהלך השנה האחרונה. ברקע – יתר לחץ דם, סוכרת מסוג 2 , ניתוח תיקון שבר בירך שמאל לפני כשנה ושבר ביד ימין לאחר נפילה לפני חודשיים. אשתו מדווחת על הפרעות שליטה על סוגר השתן מאז הנפילה והשבר בירך שמאל. בבדיקת MRI : מה הטיפול האפשרי למטופל זה?","o":["DOPICAR","EXELON ) RIVASTIGMINE )","ניתוח VENTRICULO-PRITONEAL SHANT","קרינה לאזור הפריאטלי מימין"],"c":1,"t":"2023-ב"},{"q":"בת 79 ,ברקע סוכרת קלה ויתר לחץ דם , מתעניינת במתן ייפוי כוח לבנה. איזה מהבאים נכון בנוגע לאפשרות לחתום על ייפוי כוח?","o":["אין לה אפשרות לחתום על ייפוי כוח לפי חוק החולה הנוטה למות כיוון שאינה מוגדרת כעת כזו.","יש באפשרותה לחתום על ייפוי כוח מתמשך רפואי בפני עו״ס","יש באפשרותה לחתום על ייפוי כוח מתמשך מלא בפני רופא","יש באפשרותה לחתום על ייפוי כוח מתמשך רפואי רק בפני עורך דין"],"c":1,"t":"2023-ב"},{"q":"בת82, עצמאית ב- BADL וללא חסר קוגניטיבי. סובלת מסוכרת בשנים האחרונות. ברקע ידוע על אי ספיקת כליות קלה. המטופלת מעוניינת לדעת אילו ערכים מומלצים לה לפי הקווים המנחים, שפורסמו לאחרונה ( מאמרSDANDARTS OF MEDICAL CARE 2020 .)","o":["גלוקוז בצום עד 150, איזון לחצי דם של140/80 ,HBA1C של מתחת ל- 7.5","גלוקוז בצום עד 180, איזון לחצי דם של150/90 ,HBA1C של מתחת ל- 8.5","גלוקוז בצום עד 100, איזון לחצי דם של120/80 ,HBA1C של מתחת ל- 7","גלוקוז בצום עד 130, איזון לחצי דם של140/90 ,HBA1C של מתחת ל- 7.5"],"c":3,"t":"2023-ב"},{"q":"בן75, ברקע - מחלת לב איסכמית, MI לפני כ-5 שנים, מטופל בASPIRIN - . התקבל לאשפוז בעקבות דלקת ריאות. במהלך האשפוז, בעקבות פרפור פרוזדורים עם תגובה חדרית של 120 , טופל בחוסמי ביטא וחזר לקצב סינוס. המטופל במשקל 70 ק\\\"ג, בד\\\"כ נייד בבית, נפל לפני כחצי שנה בביתו בעקבות היתקלות בשטיח, תפקודי כליה תקינים. מהו הטיפול התרופתי המומלץ בשחרורו?","o":["הוספת טיפול ב- APIXABAN 2.5mg (ELIQUIS )פעמיים ביום","הפסקת טיפול ב-ASPIRIN והתחלת טיפול ב-APIXABAN 5mg (ELIQUIS )פעמיים ביום","הוספת טיפול ב-RIVAROXABAN 15mg (XARELTO )פעם ביום","המשך טיפול ב ASPIRIN בלבד"],"c":1,"t":"2023-ב"},{"q":"בן68, חולה דיאליזה הסובל מקרצינומה של הריאה הוגדר על ידי האונקולוג כחולה הנוטה למות. הוא ללא חסר קוגניטיבי והוגדר כשיר לקבל החלטות. לאחרונה הביע רצונו שלא להאריך את חייו באמצעים מלאכותיים לרבות הפסקת טיפולי הדיאליזה. איזה מהבאים נכון בנוגע לתגובה הנדרשת לבקשתו של החולה?","o":["יש להימנע מלשבץ את החולה לטיפולי דיאליזה ולהנחות אותו כיצד לטפל בתופעות הצפויות","לא ניתן להפסיק טיפולי דיאליזה היות ומדובר בטיפול רציף","לא ניתן לקיים את רצונו של החולה מבלי שמילא הנחיות מקדימות מפורטות בנוגע לטיפולי הדיאליזה","בחולה שהוגדר על ידי אונקולוג כחולה הנוטה למות ניתן להפסיק טיפול בדיאליזה גם ללא בקשת"],"c":0,"t":"2023-ב"},{"q":"בת79, ברקע סוכרת מאוזנתוהיפותירואידיזם, הופנתה על ידי רופא המשפחה לצורך המלצה בנוגע לטיפול תרופתי בדיכאון. הדיכאון אובחן לפני כחצי שנה ומאז קיבלה SERTRALINE ( LUSTRAL) במינון של50 מ\\\"ג ליום, ללא הטבה בדיכאון ב- . נשללו בעיות רפואיות אחרות, מעבדה תקינה. קיימת היענות טובה לטיפול ואין למטופלת תופעות לוואי. מה ההמלצה להמשך הטיפול?","o":["מאחר והחולה לא הגיבה לטיפול ב-SERTRALINE (LUSTRAL ,)מומלץ לשנות לתרופה חלופית מאותה הקבוצה (SSRI,) כגוןESCITALOPRAM (CIPRALEX)","נוכח סבילות טובה לטיפול, מומלץ להמשיך בו ולהוסיף טיפול בתרופה מקבוצה אחרת כגון SNRI","מומלץ להעלות מינון של SERTRALINE (LUSTRAL )בהדרגה ל-100 מ\\\"ג ביום ולבחון מחדש תועלת הטיפול מספר שבועות לאחר הגעה למינון זה","מומלץ ללכת במקביל לטיפול פסיכולוגי שכן הסבירות להשגת שיפור עם טיפול תרופתי בלבד הינה"],"c":1,"t":"2023-ב"},{"q":"באיזה מהמצבים הבאים יופעל מיופה כוח של אדם שחתם על ייפוי כוח מתמשך רפואי?","o":["בת 76 ,שהוכרזה כחולה נוטה למות וזקוקה להקרנות כעת","בן 94, המגיע לניתוח החלפת מפרק ירך אלקטיבי ומבין את השלכות הניתוח","בת 72, הסובלת מאלח דםSEPSIS) ודליריום וכעת צריכה להסכים לכריתת כיס מרה דחופה","בן 80 ,כבד שמיעה, ששכח את מכשירי השמיעה בבית וכעת צריך להסכים לניתוח קיבוע שבר"],"c":1,"t":"2023-ב"},{"q":"בת78, מאושפזת במחלקה לסיעוד מורכב עקב פצעי לחץ מרובים איזו מההתערבויות התזונתיות הבאות הוכחה כמשפרת ריפוי פצעי לחץ באופן משמעותי?","o":["תוספת טיפול בויטמינים A,E,D ו-K","כלכלה פומית עשירת אנרגיה וחלבון","תוספת אבץ וויטמינים מקבוצה B","כלכלה אנטרלית בזונדה"],"c":0,"t":"2023-ב"},{"q":"מה אופייני בבדיקה פיסיקלית של מטופל עם אי-ספיקת לב עם מקטע פליטה שמור (HFPEF?)","o":["ל\\\"ד מאוזן","גודש ורידי צוואר","בהאזנה ללב קול רביעי","הסטה של הולם הלב"],"c":1,"t":"2023-ב"},{"q":"בן84, סובל שנים רבות מ-COPD (CHRONIC OBSTRUCTIVE PULMONARY DISEASE) ,הגיע למרפאה לצורך הערכה גריאטרית כוללנית. באבחון נמצא MMSE- 23/30 , GDS- 8/15 , BMI- 28 ,TIMED UP AND GO - 15 שניות אילו מהממצאים באבחון הגריאטרי דורשים התייחסות בקשר למחלת הריאות?","o":["עקב BMI 28 מומלץ לפנות לתזונאי/ת לירידה במשקל","עקב MMSE 23 יתכן ולא משתמש במשאפים בצורה נכונה","עקב GDS-8 יש הגבלה בטיפול תרופתי שיכול לקבל לדיכאון","עקב מבחן GET UP AND GO פתולוגילא יצליח ליהנות משיקום נשימתי"],"c":0,"t":"2023-ב"},{"q":"בן88 ,סובל מדמנציה מתקדמת והוגדר כחולה נוטה למות על רקע מחלה זו. לאחרונה הוא אוכל מעט והצוות במחלקה הסיעודית שבה מטופל העלה אפשרות של \\\"הזנת צינור\\\". הוא לא השאיר הנחיות מקדימות או ייפוי כוח רפואי. מה האפשרויות החוקיות במצב זה (לפי המלצות ועד המותב)?","o":["הארכת חיים מלאכותית בחולה נוטה למות הינה מנוגדת עקרונית לחוק ולכן לא מומלץ להאכיל בזונדה או PEG","הדרך המועדפת להאכלה של חולים עם דמנציה סופנית הינה ב- PEG","בחולה דמנציה המוגדר כחולה הנוטה למות מותר להמשיך הזנה פומית (COMFORT FEEDING ) ובמידת הצורך תוספת עירוי נוזלים","כדאי לדחות את התקנת ה PEG כמה שאפשר ולהשתמש בינתיים בזונדה, שכן פרוצדורת החדרת ה PEG הינה מורכבת"],"c":3,"t":"2023-ב"},{"q":"בן88 ,מובא למחלקה לרפואה דחופה לאחר שנמצא בביתו בהכרה מעורפלת. ידוע על ירידה קוגניטיבית, עליה במשקל והחמרה באי ספיקת לב בחודשים האחרונים. ברקע - ידוע על תת תריסיות. בבדיקה במערכת ”אופק\\\" מתגלה כי לא רכש Levothyroxine בשמונת החודשים האחרונים. בבדיקה: בהכרה מעורפלת,, קצב לב 38 פעימות לדקה, ל\\\"ד85/48, טמפרטורה34.2 , סטורציה89% באוויר חדר. כיצד יש להתחיל את הטיפול במטופל זה?","o":["הטיפול הראשוני יכלול גם טיפול ב- Hydrocortisone","המתנה לתשובת בדיקות הדם לפני התחלת הטיפול ב-Levothyroxine","מתן טיפול ב -T3 תוך ורידי","התחלת טיפול במינון נמוך של levothyroxine ,50 מק\\\"ג"],"c":2,"t":"2023-ב"},{"q":"בת 73 ,מגיעה למיון עקב קוצר נשימה. היא מתארת החמרה במצבה בחודש האחרון, עם ק function getTopicStats(){
const st={};
Object.entries(S.sr).forEach(([idx,d])=>{
const q=QZ[idx];if(!q)return;
const ti=q.ti||0;
if(!st[ti])st[ti]={ok:0,no:0,tot:0};
st[ti].tot++;
if(d.n>0)st[ti].ok++;else st[ti].no++;
});

}

const NOTES=[{"id":0,"topic":"Biology of Aging","ch":"Hazzard Ch 1-3","notes":"Hayflick limit: human fibroblasts ~50 doublings then senescence — caused by telomere shortening (no telomerase). Telomerase reactivated in ~90% of cancers. APOE4: risk for CV disease AND dementia. Caloric restriction (CRAN): reduces protein glycation via lower glucose, extends lifespan in animals (~15yr theoretical human benefit, GRS exam Q). ROS theory: oxidative damage accumulates BUT antioxidant supplements do NOT extend lifespan and may INCREASE mortality. Only exception: mitochondrial catalase overexpression in mice extends lifespan. Cellular senescence: SASP (senescence-associated secretory phenotype) drives chronic inflammation. Methylation clocks: epigenetic age markers correlating with biological aging. GDF-15 protein strongly linked to frailty and mobility disability (proteomics). Key aging changes: ↑body fat (especially visceral), ↓lean mass, ↓total body water, ↓bone density, ↓organ reserve, ↑aortic stiffness, ↓immune diversity. Compression of morbidity hypothesis: disability concentrated in shorter period before death. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: The biological basis of aging involves multiple interconnected mechanisms including genomic instability (mutations, chromosomal instability, telomere shortening), epigenetic alterations (DNA methylation changes, histone modifications), loss of proteostasis (protein misfolding, aggregation), mitochondrial dysfunction (reduced ATP production, increased ROS), cellular senescence (permanent cell cycle arrest via p16/p21), stem cell exhaustion, and altered intercellular communication. Key mechanisms: telomeres shorten ~50-200 bp/year; p16 expression increases exponentially with age; senescent cells accumulate and secrete pro-inflammatory factors (SASP). Cellular senescence is driven by p53/p21 and p16/Rb pathways. Hayflick limit (~50 divisions) represents replicative senescence in vitro. Genomic instability increases cancer risk. Mitochondrial-derived reactive oxygen species (ROS) accumulate, causing lipid peroxidation and DNA damage. NAD+ depletion impairs sirtuin function. Aging is characterized by chronic low-grade inflammation (\"inflammaging\") with elevated IL-6, TNF-alpha, and CRP. Cellular programs linking aging to disease: autophagy decline, energy metabolism shifts (glycolysis to oxidative phosphorylation), calcium dysregulation. Animal models (C. elegans, Drosophila, mice) demonstrate that aging is not inevitable; interventions targeting IGF-1, mTOR, and AMPK pathways extend lifespan. Critical threshold: 10^14 senescent cells represents aging transition. Accumulation of these molecular lesions explains the exponential increase in disease incidence and mortality with age."},{"id":1,"topic":"Demography & Epidemiology","ch":"Hazzard Ch 2,4, Brookdale","notes":"Israel: women live ~4yr longer than men. >30% of age ≥75 have difficulty walking/stairs (Brookdale). Income supplement (השלמת הכנסה) percentage INCREASED since 2005. Most elderly live at home with family, not institutions. Rectangularization of survival curve. Dependency ratio increasing globally. Aging tsunami: baby boomers entering 75+ cohort. DALY (disability-adjusted life years) increasingly driven by chronic non-communicable diseases in elderly. Social determinants of health: poverty, education, neighborhood all impact health outcomes in elderly (new Hazzard Ch 6). COVID-19 disproportionately affected elderly, especially in nursing homes. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Global population aging is unprecedented: persons aged 65+ numbered 727 million in 2020 and projected to reach 1.5 billion by 2050. In the US, 16% are now age 65+; by 2034, older adults will outnumber children <18 years. Fastest-growing segment: 85+ years (oldest-old), with centenarians increasing 8-10% annually. Life expectancy at 65 years is ~19 additional years (women ~21, men ~17). Compression of morbidity concept: healthy lifespan extends but maximum lifespan plateaus ~122 years. Demographic transition: post-industrialized countries show aging, fertility decline, declining mortality. Sex differences: women comprise 55-57% of 65+ population, 2:1 ratio at 85+. Major causes of death in older adults: heart disease (27%), cancer (20%), stroke (6%), COPD (5%), Alzheimer disease (4%). Disability patterns: 1 in 4 adults 65+ report functional limitations; ADL/IADL prevalence increases exponentially after age 75. Multimorbidity: 80% of older adults have ≥2 chronic conditions; average is 3.9 conditions. Healthcare utilization: older adults account for 34% of all hospital stays, 47% of hospital days. Economics: persons 65+ consume 36% of total US healthcare spending (~$8,100 per capita annually vs $3,300 for non-elderly). Geriatric syndromes (falls, delirium, incontinence) are often missing from ICD codes but drive morbidity. Ethnic disparities: African Americans have higher stroke/hypertension prevalence; Hispanic/Latino populations show lower dementia rates but higher diabetes; Asian Americans have lower mortality rates."},{"id":2,"topic":"Geriatric Assessment (CGA)","ch":"Hazzard Ch 8-10","notes":"Components: Medical + Functional + Cognitive + Psychological + Social + Environmental + Economic. Meta-analysis: CGA reduces mortality (NNT=33), reduces institutionalization, improves function at 12mo (SOE=A). 4Ms framework (IHI Age-Friendly Care): What Matters, Medication, Mentation, Mobility. Key scales: Katz ADL (6 items, hierarchical: bathing lost first, feeding last), Lawton IADL (8 items), Barthel (0-100), FIM (18 items — 13 motor + 5 cognitive, required for Israeli rehab). MoCA ≤25 abnormal (better than MMSE for MCI/executive). GDS-15 ≥5 depression. MNA ≤11 malnourished. AMT4: orientation questions (age, DOB, place, year). Pre-albumin better than albumin for acute nutritional changes (shorter half-life 2d vs 21d). CGA in hip fracture: orthogeriatric co-management improves complications, costs, mortality (SOE=A). Lubben Soc
