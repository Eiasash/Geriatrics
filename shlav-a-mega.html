async function quizMeOnChapter(chNum,chTitle){
  // Validate chNum — reject non-positive or absurd values that would waste
  // AI quota on invalid prompts (Hazzard 8e: 1–108, Harrison 22e: 1–500).
  const n=Number(chNum);
  if(!Number.isFinite(n)||n<1||n>500){console.warn('[quizMeOnChapter] invalid chapter number:',chNum);return;}
  // Show loading state in Library
  const el=document.getElementById('quiz-me-box');
  if(el){el.innerHTML='<div style="text-align:center;padding:20px;color:rgb(var(--fg2))">⏳ Generating questions from Ch '+sanitize(chNum)+'...</div>';}
  // v10.39.0 fix — was reading window._libData which is never assigned.
  // Source-detect from currently-open chapter: harChOpen vs hazChOpen.
  const isHarrison=(typeof harChOpen!=='undefined'&&harChOpen!==null&&String(harChOpen)===String(chNum));
  const dataMap=isHarrison?_harData:_hazData;
  const textbookName=isHarrison?"Harrison's Principles of Internal Medicine, 22e":"Hazzard's Geriatric Medicine, 8e";
  let chapterText='';
  if(dataMap&&dataMap[String(chNum)]){
    const ch=dataMap[String(chNum)];
    if(ch&&Array.isArray(ch.sections)){
      chapterText=ch.sections.slice(0,6).map(s=>(s.title||'')+': '+(Array.isArray(s.content)?s.content.join(' '):String(s.content||''))).join('\n').slice(0,3000);
    }
  }
  if(!chapterText){
    chapterText=textbookName+" Chapter "+chNum+": "+chTitle+' (full content unavailable — generate from textbook knowledge)';
  }
  // v10.40.0 — parallel-3 single-Q pattern (mirrors generateQuestionsFromChapter).
  // v10.39.0's single 1500-tok call took ~30s wall, hit the 30s client AbortController,
  // surfacing as "signal is aborted without reason". Split across 3 chapter slices.
  const slices=[chapterText.slice(0,1200),chapterText.slice(1000,2200)||chapterText.slice(0,1200),chapterText.slice(2000,3200)||chapterText.slice(0,1200)];
  const focuses=['the opening third','the middle third','the final third'];
  const buildPrompt=(idx)=>`You are an Israeli geriatrics board examiner writing MCQ for the שלב א׳ exam.

Based on ${textbookName} Ch ${chNum} (${chTitle}), focus on ${focuses[idx]}:
${slices[idx]}

Generate ONE original MCQ. The question must:
1. Test a specific fact, threshold, or mechanism from this content
2. Have exactly 5 answer options (A-E)
3. Have one definitively correct answer
4. Include a 2-3 sentence Hebrew explanation

Return ONLY a single JSON object (no markdown, no preamble, no array brackets):
{"q":"question text","o":["A. opt","B. opt","C. opt","D. opt","E. opt"],"c":0,"e":"הסבר בעברית"}
c = 0-based index of correct answer.`;
  try{
    const settled=await Promise.allSettled([
      callAI([{role:'user',content:buildPrompt(0)}],600,'sonnet'),
      callAI([{role:'user',content:buildPrompt(1)}],600,'sonnet'),
      callAI([{role:'user',content:buildPrompt(2)}],600,'sonnet')
    ]);
    const qs=[];
    for(const r of settled){
      if(r.status!=='fulfilled')continue;
      const clean=r.value.replace(/\`\`\`json|\`\`\`/g,'').trim();
      const m=clean.match(/\{[\s\S]*\}/);
      if(!m)continue;
      try{const obj=JSON.parse(m[0]);if(obj&&obj.q&&Array.isArray(obj.o)&&typeof obj.c==='number')qs.push(obj);}catch(e){}
    }
    if(!qs.length)throw new Error('No valid questions returned (proxy may be overloaded — try again in a moment)');
    // Display the generated questions
    let h='<div style="margin-top:16px;border-top:2px solid #7c3aed;padding-top:12px">';
    h+='<div style="font-weight:700;font-size:12px;color:#7c3aed;margin-bottom:10px">🧠 AI-Generated Questions — Ch '+sanitize(String(chNum))+': '+sanitize(chTitle)+'</div>';
    qs.forEach((q,qi)=>{
      h+=`<div style="margin-bottom:14px;padding:12px;background:#faf5ff;border-radius:10px;border-left:3px solid #7c3aed">`;
      h+=`<div style="font-size:12px;font-weight:600;margin-bottom:8px" dir="${heDir(q.q)}">${qi+1}. ${sanitize(q.q)}</div>`;
      q.o.forEach((opt,oi)=>{
        const isCorrect=isOk(q,oi);
        h+=`<div style="font-size:11px;padding:4px 8px;margin-bottom:3px;border-radius:6px;background:${isCorrect?'#dcfce7':'#f8fafc'};color:${isCorrect?'#166534':'#475569'};font-weight:${isCorrect?'700':'400'}">${sanitize(opt)}${isCorrect?' ✓':''}</div>`;
      });
      if(q.e)h+=`<div style="font-size:10px;color:#6d28d9;margin-top:8px;text-align:right;line-height:1.6;border-top:1px solid #e9d5ff;padding-top:6px;unicode-bidi:plaintext" dir="${heDir(q.e)}">💡 ${sanitize(q.e)}</div>`;
      h+='</div>';
    });
    // Stash generated questions under a random id so the Add button can
    // find them without embedding the full JSON payload in an onclick
    // attribute (AI-produced quotes/brackets can break attribute escaping).
    const _addId='aichq_'+Math.random().toString(36).slice(2,10);
    (window._aiChapterQs=window._aiChapterQs||{})[_addId]=qs;
    h+='<button onclick="addChapterQsToBank(\''+_addId+'\')" style="font-size:10px;padding:6px 14px;background:#059669;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:4px">➕ Add to my question bank</button>';
    h+='</div>';
    if(el)el.innerHTML=h;
  }catch(e){
    if(el)el.innerHTML='<div style="color:#dc2626;font-size:11px;padding:8px">⚠️ Failed to generate: '+sanitize(e.message)+'</div>';
  }
}
function addChapterQsToBank(idOrJson){
  try{
    // Backwards compatible: previously accepted a JSON string directly.
    // New call path passes an id that looks up the array stashed by quizMeOnChapter.
    let qs;
    if(window._aiChapterQs&&Object.prototype.hasOwnProperty.call(window._aiChapterQs,idOrJson)){
      qs=window._aiChapterQs[idOrJson];
      delete window._aiChapterQs[idOrJson];
    }else{
      qs=JSON.parse(idOrJson);
    }
    const existing=JSON.parse(localStorage.getItem('samega_custom_qs')||'[]');
    qs.forEach(q=>{q.t='AI-Ch';q.ti=-1;existing.push(q);});
    localStorage.setItem('samega_custom_qs',JSON.stringify(existing));
    toast('✅ '+qs.length+' questions added! Reload to see them in the AI-Ch filter.','info');
  }catch(e){toast('Failed: '+e.message,'info');}
}

// Returns card indices that are either due (next<=now) or unseen.
function fcGetDueIndices(){
const now=Date.now();const fcsr=S.fcsr||{};const due=[];
for(let i=0;i<FLASH.length;i++){const r=fcsr['fc_'+i];if(!r||!r.next||r.next<=now)due.push(i);}
return due;
}
function fcRebuildQueue(){
const due=fcGetDueIndices();
for(let i=due.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[due[i],due[j]]=[due[j],due[i]];}
S.fcQueue=due;S.fcQueuePos=0;
}
function renderFlash(){
const dueMode=!!S.fcDueMode;
if(dueMode){
  if(!Array.isArray(S.fcQueue)||S.fcQueue.length===0||S.fcQueuePos>=S.fcQueue.length){fcRebuildQueue();}
}

const activeIdx=dueMode?(S.fcQueue[S.fcQueuePos]??0):(S.fci%FLASH.length);

h+=`<div style="display:flex;gap:6px;margin-bottom:12px">
<span class="badge badge-g">✅ Known: ${fcKnown}</span>
<span class="badge badge-y">📖 Learning: ${fcLearning}</span>

  return h;

function renderExamTrendCard(){
  const OLD_EX=new Set(['2020','2021','2021-Jun','2022','2023-Jun','2023-Sep']);
  const NEW_EX=new Set(['2024-May','2024-Sep','2025-Jun']);
  const TOPICS_L=TOPICS;
  const oldTot=QZ.filter(q=>OLD_EX.has(q.t)).length||1;
  const newTot=QZ.filter(q=>NEW_EX.has(q.t)).length||1;
  const trends=TOPICS_L.map((name,ti)=>{
    const oldN=QZ.filter(q=>OLD_EX.has(q.t)&&q.ti===ti).length;
    const newN=QZ.filter(q=>NEW_EX.has(q.t)&&q.ti===ti).length;
    const delta=(newN/newTot - oldN/oldTot)*100;
    return{ti,name,oldN,newN,oldPct:oldN/oldTot*100,newPct:newN/newTot*100,delta};
  }).filter(r=>r.oldN+r.newN>0);
  
  const growing=trends.filter(r=>r.delta>0.5).sort((a,b)=>b.delta-a.delta).slice(0,6);
  const shrinking=trends.filter(r=>r.delta<-0.5).sort((a,b)=>a.delta-b.delta).slice(0,4);
  
  let h=`<div class="card" style="padding:14px;margin-bottom:10px;border-left:4px solid #7c3aed">
<div style="font-weight:700;font-size:12px;margin-bottom:4px;color:#7c3aed">📈 Exam Trend — 2020-23 vs 2024-25</div>
<div style="font-size:9px;color:rgb(var(--fg3));margin-bottom:10px">Where the exam is heading. Study accordingly.</div>`;
  
  h+=`<div style="font-size:10px;font-weight:700;color:#059669;margin-bottom:5px">▲ GROWING — prioritize</div>`;
  growing.forEach(r=>{
    const barW=Math.min(100,Math.round(r.delta*15));
    h+=`<div style="margin-bottom:5px">
<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px">
  <span style="font-weight:${r.delta>1.5?'700':'400'}">${r.name}</span>
  <span style="color:#059669">+${r.delta.toFixed(1)}pp · ${r.newPct.toFixed(1)}% of exam</span>
</div>
<div style="height:4px;background:#e2e8f0;border-radius:2px"><div style="width:${barW}%;height:100%;background:#10b981;border-radius:2px"></div></div>
</div>`;

function calcEstScore(){
  // FSRS-aware estimated score: weight by retrievability for seen questions
  const now2=Date.now();
  // Frequency weights from historical exam distribution
  const totalFreq=EXAM_FREQ.reduce((a,b)=>a+b,0);
  const tSt=getTopicStats();
  const due=new Set(getDueQuestions());
  
  let weightedScore=0,totalWeight=0;
  EXAM_FREQ.forEach((freq,ti)=>{
    if(!freq)return;
    const s=tSt[ti]||{ok:0,no:0,tot:0};
    const weight=freq/totalFreq;
    let acc;
    if(s.tot<3){
      // Not enough data — assume 60% (neutral)
      acc=0.60;
    } else {
      acc=s.ok/s.tot;
      // Penalize if due questions exist in this topic
      const duePenalty=QZ.filter((_,i)=>QZ[i]?.ti===ti&&due.has(i)).length;
      if(duePenalty>0)acc=Math.max(0,acc-duePenalty*0.02);
    }
    weightedScore+=acc*weight;
    totalWeight+=weight;
  });
  return totalWeight>0?Math.round(weightedScore/totalWeight*100):null;
}

// Resolve a user message (typed in chat) to a topic index list.
// Returns null if no alias and no exact-topic-name match found.
function resolveTopicFromText(text){
  if(!text)return null;
  const lower=String(text).toLowerCase();
  // Pass 1 — direct alias hit (longest-keyword-first to avoid "id" matching inside "incontinence")
  const keys=Object.keys(TOPIC_ALIASES).sort(function(a,b){return b.length-a.length;});
  for(let i=0;i<keys.length;i++){
    const k=keys[i];
    // Word boundary for English keys (avoid "ed" in "delirium"); substring for Hebrew
    const isHebrew=/[\u0590-\u05FF]/.test(k);
    const hit=isHebrew?lower.indexOf(k.toLowerCase())>=0:new RegExp('\\b'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(lower);
    if(hit)return{tis:TOPIC_ALIASES[k],matched:k};
  }
  // Pass 2 — exact TOPICS name match
  for(let ti=0;ti<TOPICS.length;ti++){
    const tname=String(TOPICS[ti]||'').toLowerCase();
    if(tname&&lower.indexOf(tname)>=0)return{tis:[ti],matched:TOPICS[ti]};
  }
  return null;
}

// Detect "give me X questions / make X questions / quiz me on X" patterns
// across Hebrew + English. Returns the topic-relevant fragment, or null.
function detectQuizIntent(text){
  if(!text)return null;
  const t=String(text).trim();
  // English patterns
  const enPat=/^(?:make|give|generate|show|quiz|test|drill|practice)\s+(?:me\s+)?(?:some\s+|a\s+few\s+|more\s+)?(.+?)(?:\s+(?:questions?|qs?|mcq|mcqs|quiz|practice|drill))?\s*[?.!]?$/i;
  // Hebrew patterns: תן לי X / תייצר X / שאלות על X / תרגל אותי על X / תבחן אותי על X
  const hePat=/(?:תן\s*לי|תייצר|תרגל\s*אותי|תבחן\s*אותי|בחן\s*אותי|אני\s*רוצה)?\s*(?:שאלות|מבחן|תרגול)?\s*(?:על|ב|של)\s+(.+?)\s*[?.!]?$/;
  const m=t.match(enPat)||t.match(hePat);
  if(m&&m[1])return m[1].trim();
  // Bare topic — "hematology", "frailty", "cga" — also counts as intent if it matches a known alias
  if(t.length<=40&&t.split(/\s+/).length<=4&&resolveTopicFromText(t))return t;
  return null;
}

async function sendChat(){
const input=document.getElementById('chat-input');
const text=(input?input.value:'').trim();
if(!text||chatLoading)return;
S.chat.push({role:'user',text:text});
// v10.39.0 — quiz intent detection. "make me hematology questions" no longer
// gets sent to Claude (slow, AI-generated, untracked). Instead: parse the topic,
// jump straight into the topic-filtered quiz from the existing 3,800+ Q bank.
// This fixes "I asked for hematology and got anticoagulants" — that was the
// chat doing free-text generation with no awareness of the bank's topic schema.
const _intent=detectQuizIntent(text);
const _topic=_intent?resolveTopicFromText(_intent):null;
if(_topic&&_topic.tis&&_topic.tis.length){
  const tis=_topic.tis;
  const primary=tis[0];
  const counts=tis.map(function(ti){return{ti:ti,n:QZ.filter(function(q){return q.ti===ti;}).length};});
  const total=counts.reduce(function(a,c){return a+c.n;},0);
  if(total>0){
    const tnames=counts.filter(function(c){return c.n>0;}).map(function(c){return TOPICS[c.ti]+' ('+c.n+')';}).join(' · ');
    const reply='✅ "'+_topic.matched+'" → '+tnames+'\n\nטוען '+counts.find(function(c){return c.ti===primary;}).n+' שאלות מ-'+TOPICS[primary]+'.';
    S.chat.push({role:'assistant',text:reply});
    save();render();
    // Defer the actual jump so user sees the chat reply first
    setTimeout(function(){
      try{setTopicFilt(primary);tab='quiz';render();}catch(e){console.warn('topic route failed',e);}
    },400);
    return;
  }else{
    // Topic resolved but bank has 0 Qs in those buckets — fall through to AI chat
    S.chat.push({role:'assistant',text:'⚠️ זיהיתי "'+_topic.matched+'" אבל אין שאלות בנושאים '+tis.map(function(ti){return TOPICS[ti];}).join(', ')+' בבנק. ממשיך כצ\'אט רגיל.'});
    save();render();
    // continue to AI chat below
  }
}
chatLoading=true;save();render();
setTimeout(function(){const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
let history=S.chat.slice(-10);
if(history.length>0&&history[0].role!=='user')history=history.slice(1);
const messages=history.filter(function(m){return m.role==='user'||m.role==='assistant';}).map(function(m){return{role:m.role,content:m.text};});
try{
const ctrl=new AbortController();
const timeout=setTimeout(function(){ctrl.abort();},45000);
const resp=await fetch(AI_PROXY,{
method:'POST',
headers:{'Content-Type':'application/json','x-api-secret':AI_SECRET},
body:JSON.stringify({model:'sonnet',max_tokens:1024,system:CHAT_SYSTEM,messages:messages}),
signal:ctrl.signal
});
clearTimeout(timeout);
if(!resp.ok){const e=await resp.json().catch(function(){return{};});throw new Error(e.error&&e.error.message?e.error.message:'HTTP '+resp.status);}
const data=await resp.json();
S.chat.push({role:'assistant',text:data.content[0].text});
}catch(e){
const offline=!navigator.onLine||e.message.includes('Failed to fetch');
const timedOut=e.name==='AbortError';
S.chat.push({role:'error',text:offline?'📡 אין חיבור לאינטרנט':timedOut?'⏱️ תם הזמן':'⚠️ '+sanitize(e.message)});
}
chatLoading=false;save();render();
setTimeout(function(){const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

function sendChatStarter(text){const input=document.getElementById('chat-input');if(input)input.value=text;sendChat();}
function clearChat(){S.chat=[];chatLoading=false;save();render();}

      if(!u||typeof u!=='object'||typeof u.username!=='string') return null;
      if(!/^[a-z0-9][a-z0-9_-]{2,31}$/.test(u.username)) return null;
      return u;
    }catch(_){return null;}
  }
  function getUserId(){

    let id=localStorage.getItem(UID_LS);
    if(!id){id='u'+Math.random().toString(36).slice(2,10);try{localStorage.setItem(UID_LS,id);}catch(e){}}
    return id;
  }
  function setAuthSession(username, displayName){
    const profile={username, displayName:displayName||null, loggedInAt:Date.now()};
    try{localStorage.setItem(AUTH_LS,JSON.stringify(profile));}catch(e){}
    try{localStorage.setItem(UID_LS,username);}catch(e){}
    return profile;
  }
  function logout(){
    try{localStorage.removeItem(AUTH_LS);}catch(e){}
    const id='u'+Math.random().toString(36).slice(2,10);
    try{localStorage.setItem(UID_LS,id);}catch(e){}
    try{localStorage.setItem(DEV_LS,'dev_'+Math.random().toString(36).slice(2,12));}catch(e){}
  }

        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPA_ANON,'Authorization':'Bearer '+SUPA_ANON},
        body:JSON.stringify(body),
      });
      if(!res.ok){const txt=await res.text().catch(()=>''); return {ok:false,error:'http_'+res.status,message:txt.slice(0,200)};}
      const d=await res.json().catch(()=>null);
      if(!d||typeof d!=='object') return {ok:false,error:'bad_response'};

    }catch(e){return {ok:false,error:'network',message:String(e)};}
  }

  function _setStatus(msg,tone){

// ===== SUPABASE CLOUD SYNC =====
const _SB_KEY=SUPA_ANON;
function _sbDeviceId(){
  // When logged in, use the username so cloud backups follow the user across devices.
  const _u=(typeof getCurrentUser==='function'?getCurrentUser():null);
  if(_u) return 'user_'+_u.username;
  let id=localStorage.getItem('samega_devid');
  if(!id){id='dev_'+Math.random().toString(36).slice(2,12);try{localStorage.setItem('samega_devid',id);}catch(e){}}
  return id;
}
async function cloudBackup(){
  const btn=document.getElementById('cloud-backup-btn');
  if(btn){btn.disabled=true;btn.textContent='☁️ Saving...';}
  _syncState='syncing';updateSyncPill();
  let ok=false;
  try{
    // Bundle ancillary localStorage (mock_hist, sessions) so cross-device restore
    // carries the full picture, not just S.
    let _mockHist=[],_sessions=[];
    try{_mockHist=JSON.parse(localStorage.getItem('samega_mock_hist')||'[]');}catch(e){}
    try{_sessions=JSON.parse(localStorage.getItem('samega_sessions')||'[]');}catch(e){}
    const _bundled={...S,_mockHist,_sessions};
    const payload={id:_sbDeviceId(),data:_bundled,updated_at:new Date().toISOString()};
    const res=await fetch(SUPA_URL+'/rest/v1/samega_backups',{
      method:'POST',
      headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(payload)
    });
    if(res.ok||res.status===409){
      // If 409, try upsert
      if(res.status===409){
        const patchRes=await fetch(SUPA_URL+'/rest/v1/samega_backups?id=eq.'+_sbDeviceId(),{
          method:'PATCH',
          headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Content-Type':'application/json'},
          body:JSON.stringify({data:_bundled,updated_at:new Date().toISOString()})
        });
        if(!patchRes.ok){const pe=await patchRes.text();toast('❌ Backup update failed: '+patchRes.status+'\n'+pe.slice(0,200,'info'));return;}
      }
      ok=true;
      S._lastCloudSync=new Date().toISOString();save();
      toast('✅ Progress backed up to cloud!\nDevice ID: '+_sbDeviceId().slice(0,12)+'...','success');
    } else {
      const err=await res.text();
      toast('❌ Backup failed: '+res.status+'\n'+err.slice(0,200,'info'));
    }
  }catch(e){toast('❌ Backup failed: '+e.message,'info');}
  _syncState=ok?'init':'failed';updateSyncPill();
  if(btn){btn.disabled=false;btn.textContent='☁️ Backup to Cloud';}
}
async function cloudRestore(){
  // Logged-in users auto-restore from their account row; guests are prompted.
  const _u=(typeof getCurrentUser==='function'?getCurrentUser():null);
  const id=_u?_sbDeviceId():(prompt('Enter device ID to restore from (leave blank for this device):',_sbDeviceId())||_sbDeviceId());
  if(!id)return;
  try{
    const res=await fetch(SUPA_URL+'/rest/v1/samega_backups?id=eq.'+encodeURIComponent(id)+'&select=data,updated_at',{
      headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY}
    });
    if(!res.ok){toast('❌ Restore failed: '+res.status,'info');return;}
    const rows=await res.json();
    if(!rows||!rows.length){toast('No backup found for ID: '+id,'info');return;}
    const row=rows[0];
    if(await confirmModal('Restore backup from '+new Date(row.updated_at).toLocaleString()+'?\nThis will overwrite your current progress.')){
      // Pull sibling localStorage bundles out of the payload before S whitelist
      try{if(Array.isArray(row.data&&row.data._mockHist))localStorage.setItem('samega_mock_hist',JSON.stringify(row.data._mockHist.slice(-20)));}catch(e){}
      try{if(Array.isArray(row.data&&row.data._sessions))localStorage.setItem('samega_sessions',JSON.stringify(row.data._sessions.slice(-30)));}catch(e){}
      const allowed=Object.keys(S);const validated={};for(const k of allowed){if(k in row.data)validated[k]=row.data[k];}Object.assign(S,validated);save();render();
      toast('✅ Progress restored!','success');
    }
  }catch(e){toast('❌ Restore failed: '+e.message,'info');}
}

// ===== FLASHCARD SPACED REP =====
// FSRS-4.5 scoring for flashcards (rating 1=Again, 2=Hard, 3=Good, 4=Easy).
function fcFsrsScore(key,rating){
if(!S.fcsr)S.fcsr={};
if(!S.fcsr[key])S.fcsr[key]={n:0,next:0};
const s=S.fcsr[key];
const daysSinceReview=s.lastReview?Math.max(0,(Date.now()-s.lastReview)/86400000):0;
if(s.fsrsS===undefined||s.fsrsD===undefined){const init=fsrsInitNew(rating);s.fsrsS=init.s;s.fsrsD=init.d;}
const rPrev=daysSinceReview>0?fsrsR(daysSinceReview,s.fsrsS):1;
const upd=fsrsUpdate(s.fsrsS,s.fsrsD,rPrev,rating);
s.fsrsS=Math.round(upd.s*1000)/1000;
s.fsrsD=Math.round(upd.d*100)/100;
s.lastReview=Date.now();
const days=fsrsInterval(s.fsrsS);
s.next=Date.now()+days*86400000;
s.n=rating===1?0:Math.min(2,(s.n||0)+1);
s.days=days;
}
function fcRate(rating){// 1=Again, 2=Hard, 3=Good, 4=Easy
const dueMode=!!S.fcDueMode;
const activeIdx=dueMode?(S.fcQueue[S.fcQueuePos]??0):(S.fci%FLASH.length);
const key='fc_'+activeIdx;
fcFsrsScore(key,rating);
if(dueMode){
  if(rating===1)S.fcQueue.push(activeIdx); // immediate relearn
  S.fcQueuePos=(S.fcQueuePos||0)+1;
  if(S.fcQueuePos>=S.fcQueue.length)fcRebuildQueue();
}else{S.fci++;}
S.fcFlip=false;save();render();
}

'10.42.0':[

'10.40.0':[
'⚡ Quiz / Generate Qs buttons no longer fail with "signal is aborted without reason". Real root cause: v10.39.0 cut to 3 Qs at max_tokens=1800 with the comment "fits in ~22s, well under the 25s upstream ceiling" — but the math was wrong. Sonnet 4.6 generates at ~60 tok/s, so 1800 tokens = 30s pure output time, hitting the 30s client AbortController exactly. Verified empirically: a 1500-token call to the proxy clocked at 34.7s.',
'🔀 Switched to parallel-3 single-Q pattern (mirrors the proven scripts/eissue_via_proxy.py 6-worker / 1-Q-per-call architecture from CLAUDE.md). generateQuestionsFromChapter and quizMeOnChapter now do 3 callAI calls in parallel via Promise.allSettled, each capped at 600 tokens (~10s wall), each focused on a different chapter slice (opening / middle / final third). Wall clock ~15s, well under the 30s client timeout. Partial successes return remaining valid Qs; total failures show a "proxy may be overloaded" hint instead of a cryptic AbortError.',
'🛡️ tests/topicIntentRouting.test.js: 4 new regression guards locking the parallel-3 architecture. Asserts (a) Promise.allSettled is used, (b) exactly 3 callAI invocations per function, (c) each call <=800 tokens. Prevents regressing back to a single big call that would re-trigger the AbortController kill.',
],
'10.39.0':[

'10.4':['🛡️ Atomic-save: flush localStorage סינכרונית ב-pagehide/visibility-hidden — סגירת tab בזמן ה-debounce של 150ms כבר לא תאבד את השמירה האחרונה.','📚 PDF caching on-demand: ספרי הלימוד (Hazzard/Harrison/מאמרים/בחינות) נשמרים אוטומטית לקריאה אופליין אחרי פתיחה ראשונה. עד 40 PDFs ב-LRU cache.','🔄 SW stuck-version guard: אם service worker חדש הופעל בזמן שהלקוח רץ, banner העדכון עולה אוטומטית.','🔒 applyUpdate שומר על cache של תמונות ו-PDF (רק shlav-a-* נמחק ב-reset) — מונע הורדה חוזרת של ספרים.','📐 תיקון RTL punctuation ב-303 שאלות (424 נקודות): רווח בין עברית לאותיות לטיניות, רווח אחרי פסיק/נקודה-פסיק בטקסט עברי. scripts/fix_rtl_punctuation.py idempotent.','📝 CLAUDE.md/README סנכרון (v10.4, 3,326 Qs).'],
'10.3':['🖼️ תיקון 5 תמונות שאלות: idx 3194/3196/3200/3204/3205 מחוברות ל-Supabase URLs (geri_2024_al_q69, geri_sep2024_q69, geri_2024_al_q35, geri_jun2025_q136, geri_sep2024_q31). imgMissing/imgDep flags הוסרו.'],
'10.2':['↩ הוחזרו כתובות Supabase לסכמת public (geriatrics schema לא היה חשוף ב-PostgREST, כתיבות החזירו 406 ונתוני משתמשים נעלמו). 12 שורות שעברו היסטורית ב-geriatrics.* אוחו חזרה ל-public.* בטרנזקציה בטוחה.','🔒 תיקון auth של proxy ל-Toranot — 2 call sites ישנים (question gen + feedback AI) שעקפו את callAI() והשתמשו בפורמט body.secret הישן תוקנו. כעת כולם דרך callAI עם header x-api-secret. כל פיצ׳רי ה-AI פעילים שוב.'],
'10.0':['✅ תמיכה ב-c_accept[] (multi-accept answers): 7 שאלות 2020 מדורגות נכון כעת. עד כה 5/7 Qs היו מסמנים את רוב הסטודנטים כטועים אף שהם בחרו תשובה שהוועדה קיבלה רשמית (Q52 75% false-wrong, Q97 75%, Q98 75%, Q100 75%, Q30 50%). Engine: isOk(q,i) helper ב-HTML (~14 grading sites מעודכנים).','🧪 Tests: 690 pass.','📝 Memory drift fix: v9.94→10.0, 3,315→3,326 Qs, 686→690 tests, tags כוללים 2021-Dec / 2023-Sep / Hazzard-suppl / 2022-Jun-orphan.'],
'9.99':['🔧 תיקון 2020: שאלה 3 (GFR drops, ATN creat 0.8→1.5→3→5.5) שוחזרה - הייתה מפוצלת לשני fragments: stem-ב-2023-Sep + tail-ב-2020. Retag + dedupe. 2020: 99→100 (תואם canonical), 2023-Sep: 24→22.','🖼️ 10 תמונות 2020: Q14 (pressure ulcer stage), Q25 (hip fracture XR), Q32 (DEXA), Q40 (MOCA), Q43 (CLL blood smear), Q49 (CAP CXR), Q57 (intertrochanteric), Q60 (NPH MRI), Q87 (donepezil bradycardia ECG), Q95 (RA hand deformities). Supabase geri_2020_q{N}.png.','🧹 6 תמונות שגויות ב-2020 עם URL של geri_Jun23_basis הוסרו (cross-contamination).','✅ Audit: 0 mismatches ב-single-answer vs official key (100 Qs), 4 multi-accept (Q52/97/98/100) - live c בתוך accept set. 7 multi-accept כולל 24/29/30.','✅ 690 tests pass, version 9.98 → 9.99'],
'9.98':['🧹 ניקיון: 51 תמונות placeholder פגומות (data:image/svg+xml עם viewBox ריק) הוסרו משדה img. משתמשים ראו תמונות שבורות עד עכשיו.','📊 Audit כולל של תמונות: 143 שאלות עם img אמיתי (4.3%). Gap של 7 שאלות עם reference תמונה בטקסט אך ללא img wired: 2021-Jun (3), 2022-Jun-Basic (1), 2022-Jun-Subspec (2), 2024-May-Basic (1). מקור תמונות עבור Jun22 לא מקומי, יעודכן ב-sessions עתידיים.','✅ Tests: 690 pass, version 9.97 → 9.98'],
'9.97':['🖼️ תמונות Dec 2021 הועלו ל-Supabase ומחוברות לשאלות: geri_Dec21_q34.png (CXR עם UIP/honeycombing לאבחנת IPF), geri_Dec21_q40.png (פצע לחץ דרגה 4 בטרוכנטר), geri_Dec21_q77.png (Torsades de Pointes במוניטור)','🔧 Q69 תוקן: תשובה הנכונה שונתה מ-ג (גיל מעל 70) ל-ד (מעורבות intercostal nerve). שאלת "פרט ל" — גיל מעל 70 אכן גורם סיכון ל-PHN; intercostal nerve הוא המיקום השכיח ביותר של HZ אך לא גורם סיכון עצמאי. הסבר נכתב מחדש.','📊 קליניקל analysis של 3 ה-mismatches שנותרו מ-v9.96: Q41 (מנגנון תרופות לעצירות) — ambiguous, נשמר; Q73 (SCAP severity) — גרסת live (pH<7.3) defensible קלינית לפי ATS/IDSA 2007; Q69 תוקן.','📂 Dec 2021 Q34/40/77 images rendered from exam PDF (pymupdf) ועברו audit visual.'],
'9.96':['🏷️ תגית 2021 → 2021-Dec לעקביות עם 2021-Jun (תג Dec 2021 IMA exam). 92 שאלות קיימות, מתוקנות למעקב','➕ ingest 12 שאלות חסרות מבחינת Dec 2021 (Q1,4,7,10,30,36,64,66,70,75,90,91). סה״כ 2021-Dec = 104 (כולל 12 חדשות עם הסברים AI)','🏷️ Bonus flag (multi-accept) לQ1 (ג+ד) — ועדת ערעורים אישרה שתי תשובות','📋 Answer-key audit של 85/92 existing Qs מול PDF answer key רשמי — 77 תואמים, 8 mismatches דווחו ב-commit (Q26/59/74/80/95 mis-mapping היוריסטי, Q41/69/73 flagged for Hazzard review)','📂 Staging: exams/2021_dec_al/ עם 3 PDFs (exam_subspec, answer_key, source_map) + missing_q_final.json + gen script','🧪 CI locks: 2021-Dec=104, 2021 הוסר מ-PAST_EXAM_TAGS ו-EXAM_YEARS. 3,327 total שאלות'],
'9.95':['🏷️ פירוק תגיות 2022 ו-2023-Jun לפי canonical JSONs (2022_al, 2022_basis, 2023_al, 2023_basis): 2022 (156) → 2022-Jun-Subspec (95) + 2022-Jun-Basic (45) + 2022-Jun-orphan (16). 2023-Jun (167) → 2023-Jun-Subspec (100) + 2023-Jun-Basic (45) + 2023-Jun-orphan (22)','⚠ GRS (Geriatrics Review Syllabus) נשאר בסילבוס P005-2026 עדכון יולי 2024 — זיהוי שגוי קודם. 32/100 שאלות Jun 2022 Subspec שמתייחסות ל-GRS נכנסות בגריאטריה (לא מסוננות).','📋 Multi-accept (ועדת ערעורים) נוסף לשאלות: Jun22 Q11(א+ג), Q36(ב+ג), Q42(כולן), Q66(א+ב), Q91(ב+ד). Jun23 Q1(א+ד), Q7(א+ב), Q8(א+ג+ד), Q11(ב+ד). שדה "accept" חדש עם מערך אינדקסים, הערה מופיעה בהסבר','🖼️ תמונות Jun 2023 (6, embedded): geri_Jun23_pg{1..4}_img* ב-Supabase. Jun 2022 album (11 תמונות על 3 עמודים, רנדור): geri_Jun22_page{1,2,3}.png — עדיין לא ממופות לשאלות ספציפיות, מחייב מיפוי ידני','🗂️ MAP מיגרציה הורחב: "יוני 22"→2022-Jun-Basic, "יוני 22 על"→2022-Jun-Subspec, "יוני 23"→2023-Jun-Basic (שונה מברירת מחדל קודמת!), "יוני 23 על"→2023-Jun-Subspec. localStorage קיים מיגרציה אוטומטית','🧪 CI locks: PAST_EXAM_TAGS + EXAM_YEARS הורחבו ל-6 תגיות חדשות. EXPECTED counts עודכנו (2022 ו-2023-Jun הוסרו, 6 תת-קבוצות הוחלפו). 3,315 total שאלות'],
'9.94':['🏷️ פירוק תגיות 2024 האגרגטיביות: 2024-May (294) + 2024-Sep (29) → 4 תגיות קנוניות לפי canonical JSONs: 2024-May-Subspec (90), 2024-May-Basic (44), 2024-Sep-Subspec (93), 2024-Sep-Basic (50), 2024-orphan (47 ללא התאמה canonical — ידרשו בירור ידני)','➕ Q26 HCAP נוסף ידנית (חסר ב-may24_al canonical עקב פיסקה א.ב.ג.ה. במקום א.ב.ג.ד.) — תשובה נכונה ב (מודיאליזה). סה\"כ שאלות: 3315 (מ-3314)','🖼️ הרצת 4 תמונות May24 Subspec ל-Supabase תחת naming נקי: geri_May24_sub_q{4,8,35,69}.png. Q4 פנים (Bell/stroke), Q8 נגע עור 90yo, Q35 צילום ירך פוסט-ניתוח, Q69 CT מוח. Q16 PHQ-9 לא rewired (אין תמונה מקומית; להשלים next session)','🧪 בדיקות רגרסיה: PAST_EXAM_TAGS ו-EXAM_YEARS עודכנו ל-4 תגיות החדשות + 2024-orphan. Cross-tag dup guard הורחב לבדוק כל 4 תת-קבוצות 2024. סה\"כ locks: 3315','🔀 MAP מיגרציה: \"מאי 24\"→\"2024-May-Basic\", \"ספט 24\"→\"2024-Sep-Basic\" (ברירת מחדל ל-Basic שהיא ה-superset). חדשות: \"מאי 24 על\"→2024-May-Subspec, \"ספט 24 על\"→2024-Sep-Subspec. הלוקאל-סטורג׳ של משתמשים קיימים מתמפה אוטומטית','📦 Jun 2023 Subspec staged (exams/2023_jun_al/): exam_subspec.pdf (100 Qs התמחות על), answer_key.pdf, images_album.pdf (6 תמונות Q12/29/30/32/47/50), source_map.pdf. Ingestion לא בוצע — לv9.95'],
'9.93':['📚 Sep 2024 canonical data saved — source map (100 Qs → Hazzard/Harrison ch+page), post-appeal key, tag-audit report. Available in scripts/exam_audit/canonical/.','⚠️ Tag audit revealed 73/100 Sep 2024 exam Qs are currently tagged "2024-May" in the DB (only 3 correctly tagged). Not auto-retagged because it would break tag-lock tests. Report at scripts/exam_audit/canonical/tag_audit_2024Sep.json.','📊 Top Sep24 Hazzard chapters: 61 (6 Qs), 58 (5), 46 (5), 60/87 (4 each). Combined with 2025-Jun for emerging EXAM_FREQ calibration.'],
'9.92':['🎯 Final Stretch — מצב חדש לתקופת דחק לפני בחינה. בונה מאגר של 40 שאלות ברמת high-yield (לפי EXAM_FREQ) ובעדיפות לשאלות שלא נראו עדיין + נקודות חלשות. CTA חדש בטאב Track — צהוב/כתום כש≤30 ימים לבחינה.','🖼️ תמונה נוספה לשאלה Q47 של יוני 2025 (פצע לחץ דרגה 4). צפיפות תמונות: 190→191.','📚 source map רשמי של IMA עבור מועד 2025-Jun על — 100 שאלות ממופות לפרק Hazzard + עמוד ספציפי. נשמר ב-scripts/exam_audit/canonical/ לצורך ולידציה עתידית של תגי פרקים.'],
'9.91':['🎯 Easy/Med/Hard — לחיצה כעת מרעננת תצוגה מיידית + הדירוג נטען מהשמירה (היה נראה כאילו לא עובד כי ה-UI לא התעדכן אחרי לחיצה).'],
'9.91':['🔬 AI scan של 3,314 שאלות — 626 סומנו ב-eFlag (ההסבר אולי לא מתאים לתשובה). באדג׳ אדום מופיע אחרי גילוי התשובה עם כפתור "✓ אמת" לניקוי. לבדיקה ידנית.','✓ כפתור "מאומת" נוסף לבאדג׳ imgDep (ניקוי בלחיצה).'],
'9.91':['🔍 AI audit על 3,314 הסברים: 626 סומנו עם eFlag (תיאור לא תואם לתשובה הנכונה). באדג\' אדום מוצג לאחר חשיפת התשובה + כפתור "✓ אמת" לניקוי.','✓ כפתור "מאומת" נוסף לבאדג\' imgDep — לחיצה אחת לניקוי הסימון לאחר תיקון.'],
'9.90':['↔️ תיקון BIDI סופי: heDir מיושם בכל מקום שמרנדר תוכן עברית/אנגלית מעורב — flashcards, אופציות, הסברים, הודעות chat, הערות, voice transcript, teach-back, תוצאות חיפוש. גם autopsy cards עם שמות אנגליים לא מתהפכים עוד.'],
'9.89':['↔️ תיקון BIDI מקיף: כיוון טקסט מחושב לפי יחס עברית/אנגלית (heDir) במקום dir="auto" שהופך פסקאות עברית המתחילות ב-IgG4/MEN1/CT לצד שגוי. חל על שאלה, אופציות, autopsy, preview של שאלות AI-generated.','🔍 Q267 תוקן (דליות, לא BCC/SCC) + תג קרדיווסקולר במקום Polypharmacy.','⚠️ 10 שאלות תלויות-תמונה מסומנות כעת עם באדג\' אמבר: ההסבר עשוי להיות שגוי, אמת מול מקור.','⏱️ AI verify verdict נשאר על המסך (היה נעלם אחרי 8 שניות בגלל render()).'],
'9.88':['⚡ FSRS כעת מודע לתאריך מבחן: לאחר הגדרת תאריך, אינטרוולים נחתכים לפי קשיי הכרטיס (חלש 30% / רגיל 60% / חזק 85% מהימים שנותרו) כך שכל כרטיס מקבל לפחות חזרה אחת לפני המבחן.','🔁 Replay wrong answers — מבחן הסימולציה שומר את ה-IDs של התשובות השגויות; כפתור חזרה עליהן במודאל התוצאה ובלוח היומי.','☁️ Cloud backup כולל כעת mock history ו-sessions — שחזור בין מכשירים שומר את מגמת המבחנים.'],

'9.85':['📝 הערות אישיות — כפתור 📝 בכל שאלה פותח הערה פרטית','📓 פנקס כללי ב-More → Notes עם ייצוא לקובץ','🔖 רשימה של כל ההערות עם כפתור מעבר לשאלה'],

'9.77':['🎨 Design: new token layer — amber/violet skin via data-skin="geriatrics"','🔤 Self-hosted Heebo + Inter fonts (removed Google Fonts dependency, offline-ready)','🛡️ CSP tightened: style-src and font-src now self-only','♿ Respects prefers-reduced-motion globally'],
    '9.76': ['🎨 ניקוי UI מקצועי — tabs (Quiz/Learn/Library/Track/More) עכשיו משתמשות באייקונים של SVG אחידים במקום emoji שנראו שונה בכל דפדפן/מכשיר. רינדור זהה באנדרואיד/iOS/Chrome.', '🗺 Weak Spots Map: headers לא מקוצצים יותר ל-"un"/"ep"/"ay" — עכשיו "21·6"/"24·9" וכו׳ (שנה·חודש). שמות נושאים לא נחתכים בצד.', '🎯 שורת מבחנים מסודרת עם היררכיה ברורה: Mock (primary), Full 150q (secondary), SD/On-Call/Pomo עם תוויות ברורות במקום רק emoji.', '🏷 אייקונים מחליפי מצב בכותרת הגיוניים יותר: ☀ Study Mode / 🌙 Dark / ? Help (היה 🕯️/🌓 מבלבלים).'],
'9.75': ['🙈 מצב מבחן לא חושף תשובה עד הסוף — Mock ו-Full. רק הבחירה שלך מודגשת, ירוק/אדום/הסבר רק בסיום.', '📊 Exam Trend מתוקן — פילטר היה מחפש שמות עבריים שלא קיימים בנתונים, עכשיו משתמש בתגיות האמיתיות (2020-23 מול 2024-25).', '🗺 Weak Spots Map: emoji שבור תוקן, ו-n=1 מוצג באפור עם "1q" במקום אדום מטעה. לציון משמעותי נדרשות לפחות 2 תשובות.', '✍ Year filter pills קומפקטיים יותר (format "2020 · 99" במקום שני spans).', '📝 Changelog לגרסאות 9.69-9.75 נוסף (קודם חזר לתוכן של 9.68 תחת כותרת גרסה חדשה).'],
'9.74': ['🎯 מבחן סימולציה לפי שנה — כפתור Mock פותח כעת בורר עם כל המבחנים הקודמים (2020, 2021, 2022, 2023-Jun, 2024-May, 2024-Sep, 2025-Jun) + אפשרות 100 שאלות אקראי.', '↩ כפתור "קודמת" חדש — ניתן לחזור לשאלה קודמת בלי לאבד את התשובה שסומנה. מצב המבחן נשמר בקאש לכל הסשן.', '🛠 תיקון: כפתור "סיים מבחן" עכשיו עובד. באג: newlines ב-onclick שברו את HTML parsing.', '🍎 תאימות iOS: viewport-fit=cover, apple-mobile-web-app-capable, ו-env(safe-area-inset-top) לכותרת. האפליקציה עובדת נכון באייפון עם notch.', '📊 Exam Trend מתוקן — הפילטר היה מחפש שמות תגיות בעברית שלא קיימים. עכשיו משתמש בשמות התגיות האמיתיים (2020-2023 מול 2024-2025).', '🗺 Weak Spots Map: אייקון השבור (U+1F5FA) תוקן, ועכשיו n=1 מוצג באפור עם סמן "1q" במקום אדום מטעה — נדרשות לפחות 2 תשובות לציון משמעותי.', '🙈 מצב מבחן לא חושף תשובות עד הסוף — בחירה מודגשת אבל ירוק/אדום/הסבר מוצגים רק בסיום ב-mock או ב-full.', '✍ דיאלוג סנכרון ענן מציין עכשיו "Track → Backup to Cloud".'],
'9.73': ['🏷 תיוג 8 שאלות סווגו מחדש — שאלות על פיזיולוגיית ריאה בהזדקנות, ספירומטריה ב-COPD, והיפרתירואידיזם היו מסומנות תחת Ethics/Biology/Osteoporosis/Delirium. הועברו ל-Pulmonary/Thyroid/CGA המתאים. Filter לפי נושא עכשיו מחזיר תוצאות נכונות.'],
'9.72': ['📝 31 שאלות חדשות — פצעי לחץ (+15) וזכויות החולה (+16), שני הנושאים המכוסים הכי פחות ביחס למשקלם במבחן. מקורות: NPUAP 2019, Hazzard 8e פרק 53, חוק זכויות החולה 1996, ייפוי כוח מתמשך, חוק החולה הנוטה למות 2005, חוק העונשין 368.', 'ti 10 (פצעי לחץ): 31→46. ti 33 (זכויות החולה): 28→44. Hazzard tag: 1758→1789. Total: 3283→3314.'],
'9.71': ['🧹 Deep dedup — הוסרו 115 שאלות: 72 דופליקטים כמעט-זהים בתוך תגיות, 40 שאלות יתומות ב-2024-Sep שהועברו ל-May24, ו-3 שאלות שתויגו מחדש לפי הסיווג הקנוני.', '🔒 Dedup guard הוחמר ל-stem-normalized match + cross-tag tripwire בין 2024-May/2024-Sep.', '📮 Feedback reports כעת לוכדים [hash:xxxxxxxx] — 8-char content-hash יציב של השאלה, כדי שנוכל לעקוב אחרי דיווחים חוזרים על אותה שאלה.'],
'9.70': ['🖼 2 תמונות חסרות הועלו ל-Supabase — idx 3342 (CXR), idx 3382 (פצע ברגל).'],
'9.69': ['🧹 Dedup — הוסרו 8 דופליקטים ישנים שנקלטו דרך whitelist שכבר לא רלוונטי.'],
'9.68': ['🏛️ פילטר חדש "תקנות" (242 שאלות) — ייפוי כוח מתמשך, כשירות, אפוטרופוס, הנחיות רפואיות מקדימות, חוק החולה הנוטה למות, סיעוד מורכב, כושר נהיגה, חוזר מנכ"ל.', 'תיוג אוטומטי על בסיס regex חזק של מילות מפתח עבריות + אנגליות (scripts/tag_regulatory.cjs) — מייצר data/regulatory.json. בנק תקנות רשמי שסביב 7% מהשאלות.', 'שילוב מלא: pill חדש בשורת הפילטרים של לשונית Quiz, עם ספירה חיה.'],
'9.67': ['🔬 Distractor Autopsy עכשיו תמיד-מופעל (לא Toggle). אחרי כל תשובה: כל 4 האפשרויות נצבעות (ירוק=נכונה, אדום=הבחירה השגויה שלך, אפור=שגויות אחרות) עם הסבר "למה שגוי כאן / מתי זה היה נכון".', '📦 data/distractors.json: מאגר מוכן מראש עם "autopsy" לכל שאלה — מחושב ברקע ע"י scripts/generate_distractors.cjs (קלוד Haiku דרך toranot proxy). Fallback ל-AI autopsy רק אם אין ב-cache.', '🧪 scripts/generate_distractors.cjs — bulk generator עם checkpoint כל 25, אטומי, resumable, --dry-run/--limit/--topic/--force. מהקופסה מחולל "Wrong because: X. Would be correct if: Y." לכל מסיח.', 'sw.js מטמין את data/distractors.json עם אסטרטגיית cache-first — UX offline מלא.'],
'9.66': ['☁️ אינדיקטור סנכרון חדש בכותרת: 🟢 Synced / 🟡 Backup stale / 💾 Local only / 🔴 Offline / ☁️ Syncing… / ⚠️ Sync failed. לחיצה על ה-pill פותחת דיאלוג סטטוס עם device ID ותאריך הגיבוי האחרון.', '🔌 מאזיני online/offline מעדכנים את ה-pill אוטומטית כשהחיבור משתנה.', '🕒 S._lastCloudSync נשמר כל פעם שגיבוי לענן מצליח — כך ה-pill יודע להציג "stale" אחרי 24 שעות ללא גיבוי.', '📥 Export Progress משודרג: שם קובץ כולל תאריך (shlav-a-progress-YYYY-MM-DD.json) ומטא-דאטה משובצת (_meta עם גרסה, device ID, מונה שאלות, רצף) — importProgress נשאר תואם לאחור כי הוא מסנן ב-whitelist.'],
'9.65': ['⏱ Time-to-answer signal: לוח ההסבר מציג עכשיו כמה שניות לקחת לשאלה הזו בהשוואה לחציון של הנושא (או לחציון האישי שלך כשאין מספיק נתונים לנושא). ירוק = מהיר, כתום = בממוצע, אדום = איטי מ-1.5x החציון.', 'פילטר "⏱️ Slow" מראה עכשיו את מספר השאלות בהן הממוצע שלך גבוה מ-60 שניות (slowQuestionCount) — קל יותר לדעת אם יש לך על מה לעבוד.', 'עזרי API חדשים: topicMedianTime(ti), globalMedianTime(), slowQuestionCount() — חשופים לבדיקות ולשכבות UI עתידיות.'],
'9.64': ['📚 קישור דו-כיווני Hazzard/Harrison ברמת השאלה (לא רק ברמת הנושא כמו עד כה). כל שאלה ב-data/questions.json ממופה עכשיו לפרק Hazzard + פרק Harrison הטובים ביותר דרך `data/question_chapters.json` (3,406 שאלות תויגו ע"י scripts/tag_chapters.cjs — 40 נושאים × מפה ידנית + 30 overrides ספציפיים למחלות).', 'UI: אחרי תשובה שגויה מוצגים עכשיו שני כפתורי פרק (Hazzard ו-Harrison) במקום אחד; קיימים גם בקוראי הפרקים עם "Drill all N" שממלא pool ישירות מ-QCHAPS.', 'פילטרים חדשים: filt="haz-ch" ו-filt="har-ch" עם topicFilt=chNum — תרגול כל השאלות הממופות לפרק ספציפי.'],
'9.63': ['UX: "Why did I get it wrong?" (📚 👓 ⚖️ 🤦) כבר לא חוסם את כפתור "הבאה" — הפך לאופציונלי. בסוויט הקודם הפכנו את "How sure are you" לאופציונלי; עכשיו גם שורת ה-why-wrong שלמטה אופציונלית.', 'טסט חדש: topicRefCoverage — מוודא שכל entry ב-TOPIC_REF מצביע לפרק שקיים ב-data/hazzard_chapters.json, ושכל onclick שקורא ל-openHazzardChapter מגיע דרך libSec=haz-pdf (מונע את הבאג של 9.62 שהגיע ל-libSec=harrison).', 'Pre-push hook חדש: `scripts/git-hooks/pre-push` מריץ את שני בודקי innerHTML לפני כל push. התקנה ב-`npm run hooks:install`.'],
'9.62': ['UX: "How sure are you?" (😬 🤔 😎) כבר לא חוסם את כפתור בדוק — הפך לאופציונלי. אפשר עדיין ללחוץ על אחת האמוג\'ים, אבל לא חייבים.', 'תיקון: כפתור "Read: Hazzard Ch X — you\'re weak here" מנווט עכשיו ישירות לפרק הספציפי (נפתח Hazzard chapter viewer עם התוכן) במקום לפתוח את הסקציה הלא-נכונה (Harrison) של מדף הספרייה'],
'9.61': ['📝 85 הסברים חדשים נכתבו לשאלות עם שדה e ריק (Claude Sonnet 4.5, פורמט סטנדרטי: התשובה הנכונה / למה נכונה / למה אחרות שגויות / נקודת מפתח לקשיש)', 'סטנדרטיזציית תגיות מבחן לפורמט קנוני YYYY-Mon: יוני 21→2021-Jun, יוני 23→2023-Jun, יוני 25→2025-Jun, מאי 24→2024-May, ספט 24→2024-Sep, 2023-ב→2023-Sep', '2025-א (65 שאלות ייחודיות) סווג: 41 וינייטות→2025-Jun, 24 תיאוריה→Hazzard-suppl; 24 דופליקטים ישירים עם יוני 25 הוסרו', 'מיגרציית localStorage אוטומטית עם סנטינל __tagMigrationV1 — לא מאבדים נתוני משתמש קיימים', 'פילטר רב-בחירה לשנות מבחן (UI הופץ מ-Pnimit) — ניתן לסמן כמה שנים יחד, ספירה לכל שנה, שורה נפרדת ממקורות תוכן', 'בדיקות רגרסיה חדשות (regressionGuards.test.js, 42 בדיקות) — תופסות mojibake, duplicates, שבר שאלות, תגיות לא מזוהות, סנכרון גרסת SW', 'סה"כ שאלות: 3,406 (מ-3,430 — 24 דופליקטים הוסרו)'],
'9.60': ['🚨 11 שאלות של יוני 23 (בסיס) תוקנו — c שגוי לפי מפתח התשובות הרשמי המעודכן של הר"י', 'שיעור שגיאות: 11/137 = 8% (טוב משמעותית מ-מאי 24 שהיה 61%) — מעיד שהייבוא של יוני 23 תקין ביסודו אבל עם שגיאות נקודתיות', 'תיקונים: Q12 הרפס זוסטר פנים "מעקב"→"ACYCLOVIR 800", Q24 DM+אלצהיימר A1C 11% "אינסולין קצר"→"אינסולין ארוך", Q36 BPH אי-שליטה "ציסטוסקופיה"→"UA+קולטורה", Q56 Lancet 2020 "חבלת ראש"→"ירידה בשמיעה", Q70 ADA 2022 "הפסקת סטטינים"→"APIDRA→SITAGLIPTIN"', 'עוד: Q81 MMSE discrepancy "שונות בין בודקים"→"LBD fluctuations", Q112 FUO "ביופסיית כבד"→"ביופסיית עורק טמפורלי", Q122 hypoxia "hypoventilation"→"V/Q mismatch", Q131 LFTs cholestatic "סרולוגיה hep"→"US כבד/מרה", Q145 metabolic alkalosis "כליה"→"FUROSEMIDE", Q147 Li+Na 155 "nDI"→"ירידה בשתיה"', '🔍 ממצא משני: idx 1393 מכיל Q105+Q106 מאוחדות (באג ייבוא) — לא תוקן, דורש פירוק ידני. Q106 חסרה מהריפו.', '10 מ-150 שאלות הבסיס חסרות (רובן תמונה-תלויות): Q5, Q67, Q101, Q109, Q125, Q139, Q148 ועוד'],
'9.59': ['🚨 82 שאלות של מאי 24 (בסיס) תוקנו — c שגוי ב-132/150 שאלות שתויגו שגוי כ-"ספט 24"', 'מקור: PDF רשמי של מפתח התשובות המעודכן של הר"י (פרסום 138, מאי 2024) — 10 שינויים מהמפתח המקורי', 'אבחנה: 81 שאלות עם תשובה שלא תואמת לא את המפתח המקורי ולא המעודכן — באג נתונים אמיתי, לא drift של מפתח', 'דוגמאות: Q1 DPP "יעילות שווה"→"שינוי אורחות חיים עדיף", Q9 עצירות "BISACODYL"→"PEG", Q40 שפעת/RSV "OSELTAMIVIR"→"פחות אשפוזים ב-RSV"', 'כל תיקון תועד ב-e עם מעבר האותיות (למשל "א → ב") ומקור רשמי', 'שגיאות ברות זיהוי: Q100 outdated (מפתח עודכן מ-ג ל-ד), 81 אחרות פשוט שגויות במקור'],
'9.58': ['🚨 53 שאלות של ספט24 Al תוקנו — תשובה שגויה במפתח התשובות המקורי (הרוב תחת תגית "מאי 24")', 'האבחנה: השוואה למפתח התשובות הרשמי המעודכן של הר"י חשפה שגיאות נרחבות בתשובות הנכונות', 'דוגמאות: Q1 מניעת נפילות "ויטמין D"→"התאמת הבית", Q8 נגע עור חדש בגיל 90 "סטרואיד"→"ביופסיה", Q11 בחילה רפרקטורית "Lactulose"→"Haloperidol"', 'הסברים שהגנו על התשובה השגויה קיבלו אזהרה (⚠️) עם התשובה הנכונה ומקור', 'שאלה חסרה Q43 (סרקופניה/חלבון, Hazzard ch49) נוספה', '+1 שאלה, סה"כ 3,422'],
'9.57': ['🎯 16 שאלות-רפאים ב-יוני 25 תוקנו — שדה num היה שגוי ב-כולן; זוהה והוקצה מחדש דרך התאמת סט-אפשרויות מול ה-PDF', '5 מתוך 7 "פערים אמיתיים" (Q20, Q47, Q74, Q112, Q115) נסגרו בעזרת התיקון הזה', 'idx=1274 נבנה מחדש מגרסה נקיה ב-2025-א (OCR בלע אפשרות אחת והחליף סדר)', 'idx=643 (ספט 24): c תוקן מ-2 ל-3 (תשובה קלינית נכונה: Mirtazapine לדיכאון בחולה אונקולוגי)', 'פערים נותרים: Q131, Q143 — דורשים c+e ידני'],
'9.56': ['🔧 23 שאלות Jun25 תוקנו — פערים של טקסט מושחת מ-OCR תוקנו באמצעות התאמה לטקסט הנקי ב-2025-א', 'תיקוני פורמט: רווחים חסרים בין מספרים/לטינית לעברית, סוגרים לא נכונים, מיקום סימני שאלה', 'תיקון שגיאות כתיב: Stifness → Stiffness, PVR מידע מלא שוחזר', 'שמירה על c/ti/e/num מהגרסה המקורית — אין שינוי במפתח תשובות'],
'9.54': ['36 תמונות קושרו לשאלות קיימות מ-Supabase (Jun22, Jun23, May24, Sep24, Jun25, 2023-ב) — 3.4% → 4.4% צפיפות תמונות', 'תמונות כוללות: ECG, צילומי CT מוח, רדיולוגיה, פריחות עוריות, כלי הערכה'],
'9.53': ['Tests: extend runtime scope tests to all 5 decomposed render families (renderLibrary, renderCalc, renderQuiz, _rqMain, renderTrack) — catches declared-but-not-top-level function bugs across the whole codebase, not just Library. 76 → 115 migrationWiring tests.'],

// ===== WEEKLY TREND SNAPSHOT =====
function takeWeeklySnapshot(){
  try{
    const now=new Date();
    const weekKey='w_'+now.getFullYear()+'_'+Math.floor((now-new Date(now.getFullYear(),0,0))/(7*864e5));
    const snapshots=lsGet('samega_weekly',{});
    if(snapshots[weekKey])return; // already taken this week
    const tSt=getTopicStats();
    const snap={};
    for(let i=0;i<40;i++){const s=tSt[i]||{ok:0,no:0,tot:0};snap[i]=s.tot>0?Math.round(s.ok/s.tot*100):null;}
    snapshots[weekKey]={date:now.toISOString(),acc:snap};
    const keys=Object.keys(snapshots).sort();
    if(keys.length>52)delete snapshots[keys[0]];
    lsSet('samega_weekly',snapshots);
  }catch(e){}
}
function getTopicTrend(ti){
  try{
    const snapshots=lsGet('samega_weekly',{});
    const keys=Object.keys(snapshots).sort();
    if(keys.length<2)return null;
    const prev=snapshots[keys[keys.length-2]].acc[ti];
    const curr=snapshots[keys[keys.length-1]].acc[ti];
    if(prev===null||curr===null)return null;
    return curr-prev; // positive = improving
  }catch(e){return null;}
}

const AI_PROXY='https://toranot.netlify.app/api/claude';
const AI_SECRET='shlav-a-mega-2026';
// Per-call AbortController (was singleton in v10.38.1; cancelled in-flight peers,
// breaking bulk explainWithAI). Concurrent callers no longer cancel each other.
async function callAI(messages,maxTokens=400,model='sonnet'){
  const _ctrl=new AbortController();
  const signal=_ctrl.signal;
  // 30s safety timeout (proxy typical 3s, rare 10s+ on cold start)
  const _timeoutId=setTimeout(function(){_ctrl.abort();},30000);
// Model alias map for direct API fallback
const modelMap={sonnet:'claude-sonnet-4-6',opus:'claude-opus-4-6',haiku:'claude-haiku-4-5-20251001'};
// Translate a fetch Response or thrown error into a user-friendly message.
// Keeps the short string format callers already rely on ("API NNN") while
// prepending a specific hint so the UI can surface why a call failed.
function _aiErrFromStatus(status){
  if(status===401||status===403)return'API '+status+' — invalid API key';
  if(status===429)return'API 429 — rate limited, try again in a moment';
  if(status>=500&&status<600)return'API '+status+' — service unavailable';
  return'API '+status;
}
try{
try{
const pr=await fetch(AI_PROXY,{
method:'POST',
headers:{'Content-Type':'application/json','x-api-secret':AI_SECRET},
body:JSON.stringify({model,max_tokens:maxTokens,messages}),
signal
});
if(pr.ok){const d=await pr.json();return d.content?.[0]?.text||'';}
console.warn('Proxy status:',pr.status);
}catch(e){
if(e&&e.name==='AbortError')throw e;
console.warn('Proxy:',e.message);
}
// Fallback to personal API key with correct model name
const apiKey=getApiKey();
if(!apiKey)throw new Error('no_key');
const fullModel=modelMap[model]||model;
let r;
try{
r=await fetch('https://api.anthropic.com/v1/messages',{
method:'POST',
headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
body:JSON.stringify({model:fullModel,max_tokens:maxTokens,messages}),
signal
});
}catch(e){
if(e&&e.name==='AbortError')throw e;
throw new Error('Network error — check your connection');
}
if(!r.ok)throw new Error(_aiErrFromStatus(r.status));
const d=await r.json();
return d.content?.[0]?.text||'';
}finally{clearTimeout(_timeoutId);}
}

// ===== WRONG ANSWER REPORTS → SUPABASE =====
async function saveAnswerReport(qIdx, userReason, aiVerdict){
try{
const q=QZ[qIdx];
await fetch(SUPA_URL+'/rest/v1/answer_reports',{
method:'POST',
headers:{'apikey':SUPA_ANON,'Authorization':'Bearer '+SUPA_ANON,'Content-Type':'application/json','Prefer':'return=minimal'},
body:JSON.stringify({app:'geriatrics',question_idx:qIdx,question_text:(q.q||'').slice(0,200),current_answer:q.c,reported_answer:(userReason||'').slice(0,50),user_reason:userReason||'',ai_verdict:aiVerdict||'',device_id:_sbDeviceId()})
});
}catch(e){console.warn('Report save failed:',e.message);}
}

// PWA + Background Sync + Daily Notification (update logic in src/sw-update.js)
// Daily-review notification is opt-in via ⚙️ Settings in the More tab.
// No permission is requested on load; the scheduler checks S.notifOptIn +
// Notification.permission=granted before posting to the SW each day.
initSWUpdate(APP_VERSION).then(function(reg){
if(!reg)return;
function scheduleDailyNotification(){
const now=new Date();
const target=new Date(now);
target.setHours(7,0,0,0);
if(now>=target)target.setDate(target.getDate()+1);
const delay=target-now;
setTimeout(()=>{
if(S.notifOptIn&&typeof Notification!=='undefined'&&Notification.permission==='granted'){
const dueN=getDueQuestions().length;
if(dueN>0&&reg.active){
reg.active.postMessage({type:'schedule-notification',dueCount:dueN});
}
}
scheduleDailyNotification();// Reschedule for next day
},delay);
}
scheduleDailyNotification();
}).catch(()=>{});

// Delegated click handler for shell-level data-action buttons
document.body.addEventListener('click',function(e){
var btn=e.target.closest('[data-action]');
if(!btn)return;
switch(btn.dataset.action){
case 'toggle-study':toggleStudyMode();break;
case 'toggle-dark':toggleDark();break;
case 'show-help':showHelp();break;
case 'apply-update':applyUpdate();break;
case 'dismiss-update':dismissUpdateBanner();break;
case 'close-overlay':var ov=btn.closest('[id$="-overlay"]');if(ov)ov.remove();break;
}
});

_dataPromise.then(()=>{renderTabs();render();updateSyncPill();}).catch((e)=>{console.error('Boot failed:',e);document.body.innerHTML='<div style="padding:2em;text-align:center;color:#ef4444"><h2>Failed to load app data</h2><p>'+sanitize(String(e&&e.message||e))+'</p><button onclick="location.reload()">Retry</button></div>';});
</script>
