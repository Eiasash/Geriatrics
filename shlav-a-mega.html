ial Network Scale screens social isolation. Economic assessment: food insecurity screening important. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Comprehensive Geriatric Assessment (CGA) is a multidisciplinary, multi-domain evaluation targeting functional status, medical conditions, psychological factors, and social circumstances. CGA differs from routine medical evaluation by systematically evaluating: (1) FUNCTIONAL DOMAIN: ADLs (eating, dressing, bathing, toileting, grooming, transferring, continence) scored 0-6; IADLs (medications, finances, transportation, shopping, meal prep, housework, laundry, phone) scored 0-8; Katz ADL Index, Lawton IADL Scale standard instruments. (2) MEDICAL DOMAIN: complete inventory of diagnoses, medications (critical: deprescribing review), preventive health status, immunization history. (3) MENTAL STATUS: MMSE (30 point scale; <24 suggests cognitive impairment), Montreal Cognitive Assessment (MoCA), Clock Drawing Test, Mini-Cog. Depression screening: Geriatric Depression Scale (GDS-15), PHQ-9. (4) SOCIAL/ENVIRONMENTAL: living situation, social support, transportation, housing safety, financial resources, caregiver burden. (5) SENSORY: vision screening (Snellen, visual fields), hearing assessment (whisper test, Weber, Rinne). CGA domains scored systematically to identify: medical problems requiring treatment, medications requiring discontinuation, functional deficits requiring rehabilitation, psychosocial issues requiring intervention, environmental hazards. CGA improves outcomes: reduces mortality 13%, readmissions 15%, functional decline prevention, improves medication appropriateness. Setting: inpatient (acute medical unit, rehabilitation), outpatient (geriatric clinics), community. Time: 45-90 minutes. Key advantage: IDENTIFIES REVERSIBLE CAUSES of functional decline. Gold standard for complicated older adults (multimorbidity, polypharmacy, cognitive impairment, functional limitations). CGA reveals iatrogenic conditions: medications causing falls, delirium, incontinence. Team composition: physician, nurse, social worker, physical therapist, occupational therapist."},{"id":3,"topic":"Frailty & Sarcopenia","ch":"Hazzard Ch 42","notes":"FRIED PHENOTYPE: ≥3/5 = frail: unintentional weight loss >4.5kg/yr, self-reported exhaustion, low physical activity (<383 kcal/wk men), slow walking speed (<0.8m/s), weak grip (M<27/F<16kg). 1-2 = pre-frail (REVERSIBLE with exercise + nutrition). CFS (Clinical Frailty Scale) 1-9: rapid bedside assessment. VES-13: Vulnerable Elders Survey. Frailty ≠ disability ≠ comorbidity — overlap but distinct constructs (key exam distinction). SARCOPENIA (EWGSOP2 2019): SARC-F screen → grip strength (case-finding) → DXA/BIA muscle mass (confirmation) → gait speed <0.8m/s or SPPB ≤8 (severity). Tx: resistance exercise 2-3x/wk + protein 1.0-1.2g/kg/day + vitamin D. No approved pharmacotherapy. Type II (fast-twitch) fibers lost preferentially. Mediterranean diet shown to reduce frailty incidence. Advance care planning should be discussed when frailty identified. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: FRAILTY is a geriatric syndrome representing a state of decreased physiologic reserve with vulnerability to adverse health outcomes. Fried Frailty Criteria (5 components): (1) Unintentional weight loss ≥5% in prior year, (2) Exhaustion/fatigue (self-reported, confirmed by grip strength testing), (3) Weakness: grip strength <25th percentile adjusted for BMI/gender, (4) Slow gait speed: <25th percentile (typically <0.8 m/s), (5) Low physical activity: lowest quintile. Robust (0 criteria), Pre-frail (1-2), Frail (≥3). Prevalence: 7-12% of 65+ population; increases dramatically after 80 years. Frailty Index approach: cumulative deficit model measuring >30 health variables; scores >0.25 indicate frailty. Clinical Frailty Scale (CFS) 1-9: simpler bedside assessment. Consequences: 4-fold increased fall risk, hospitalization, disability progression. SARCOPENIA is specific loss of skeletal muscle mass and strength. European Working Group consensus: (1) Reduced muscle strength (grip strength <27 kg men, <16 kg women; leg strength decline), (2) Reduced muscle quantity/quality (DXA, CT, bioelectrical impedance), (3) Reduced physical performance (gait speed <1 m/s, SPPB <8, TUG >12 sec). Age-related muscle loss: 3-8% loss per decade after age 30; accelerates after 60. Mechanisms: reduced satellite cell function, anabolic resistance (impaired mTOR signaling), increased inflammation, denervation, hormonal decline (testosterone, growth hormone). Protein requirement increases from RDA 0.8 g/kg to 1.2 g/kg in older adults. Consequences of sarcopenia: mobility limitation, falls, disability, mortality (2-3x higher). Overlap: sarcopenia often coexists with obesity (sarcopenic obesity) - worst prognosis. Intervention: resistance exercise (most effective), protein supplementation (especially if <1.2 g/kg), vitamin D (if deficient), testosterone (controversial, limited evidence). Myostatin inhibitors in development."},{"id":4,"topic":"Falls & Balance","ch":"Hazzard Ch 43","notes":"Leading cause of injury death in elderly. Multifactorial: intrinsic (gait disorder, visual impairment, cognitive decline, orthostatic hypotension, peripheral neuropathy, medications) + extrinsic (rugs, lighting, stairs, footwear, pets). TUG ≥12s = fall risk. Orthostatic BP: ≥20 systolic or ≥10 diastolic drop after 3min standing. STEADI protocol (CDC): Screen → Assess → Intervene. Interventions: exercise (Tai Chi strongest evidence, SOE=A), vitamin D if deficient, medication reduction (benzos, diuretics, alpha-blockers, sedative-hypnotics), home safety modification, vision correction. HIT toolkit (health IT + nursing) reduces hospital falls (RCT, SOE=A, GRS). Hip protectors in nursing homes: reduce fracture but compliance poor. ED-based PT+pharmacy intervention reduced revisits at 6mo. Walking stick on CONTRALATERAL side. Intrinsic fall factors: disequilibrium, visual deficits, orthostatic hypotension, dementia, Parkinson's, deconditioning, medications (Hazzard Fig 15-5). \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Falls are the leading cause of unintentional injury death in older adults; 1 in 4 adults 65+ fall annually; 10% cause serious injury (fracture, head injury). Fall-related costs: $50 billion annually (2015 dollars), rising. Consequences: fracture (hip 1.5% fall incidence, wrist/vertebra), head injury (15-20% of falls), reduced mobility, deconditioning, loss of independence, death. Post-fall syndrome: fear of falling, activity restriction, further deconditioning. Intrinsic risk factors: weakness (quadriceps, hip extensors), gait/balance impairment (narrow base, slow speed, stride variability), cognitive impairment (delirium, dementia increase 2-fold), orthostatic hypotension (drop ≥20 mmHg systolic or ≥10 diastolic), medication use (benzodiazepines, antipsychotics, anticholinergics, opioids, SSRIs), sensory loss (vision, proprioception, vestibular), foot problems. Extrinsic risk factors: environmental hazards (poor lighting, clutter, loose rugs, stairs), footwear. SPPB (Short Physical Performance Battery): measures gait speed, balance (standing, semi-tandem, tandem), chair stand ability; score <9 predicts disability. TUG (Timed Up & Go): >14 sec = high fall risk. Assessment: fall history, circumstances, functional status, medication review (deprescribe high-risk agents), orthostatic vitals, visual/hearing assessment, gait/balance exam, feet/footwear assessment, home safety evaluation. Prevention: strength training (resistance exercise 2-3x/week, reduces fall risk 17%), balance training (Tai Chi effective), medication review, vision correction, vitamin D supplementation (if deficient), home modifications, hip protectors (modest evidence). Fall risk assessment tools: STRATIFY, MORSE, St. Thomas Risk Assessment Tool. Multifactorial interventions most effective. Post-fall management: evaluate for fracture, head injury; assess for postraumatic syndrome."},{"id":5,"topic":"Delirium","ch":"Hazzard Ch 58","notes":"CAM: (1) acute onset/fluctuating + (2) inattention + (3) disorganized thinking OR (4) altered consciousness. Need 1+2 plus 3 or 4. Sensitivity 94-100%, specificity 90-95%. Hypoactive MORE COMMON, worse prognosis, missed in 70%. HELP protocol: 6 protocols (cognition reorientation, sleep hygiene, early mobilization, vision aids, hearing aids, hydration) → 40% delirium reduction (Inouye RCT). 4AT/bCAM better in ED. Risk: predisposing (dementia, age>70, functional impairment, sensory deficits, comorbidity, male) × precipitating (surgery, medications, infection, metabolic, restraints). Donepezil does NOT prevent postop delirium (SOE=A). Rivastigmine also ineffective and potentially harmful (SOE=B). Haloperidol prophylaxis: does not prevent delirium but reduces severity/duration in hip fracture patients (SOE=A). Physical restraints are INDEPENDENT risk factor for delirium (SOE=B). Delirium after minor insult → suspect underlying undiagnosed dementia. Prevalence: ED 6-38%, hospital 10-50%, ICU ~75%. Remove urinary catheter early → reduces delirium cascade (SOE=A). \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Delirium is acute onset (hours to days) fluctuating disturbance of consciousness, attention, cognition, perception. CAM (Confusion Assessment Method) criteria: (1) ACUTE ONSET AND FLUCTUATING COURSE (essential) + (2) INATTENTION (essential) + (3) EITHER disorganized thinking OR altered level of consciousness. Sensitivity 94%, specificity 89% for delirium diagnosis. Prevalence: 15-20% on general medical wards, up to 80% in ICU. Subtypes: Hyperactive (agitation, combativeness, hallucinations - 25%), Hypoactive (lethargy, apathy, reduced responsiveness - 50%), Mixed (50%). Hypoactive often missed (mortality 3x higher). Pathophysiology: cholinergic deficiency (acetylcholine ↓), dopaminergic excess, neuroinflammation (cytokines), altered metabolism. Common precipitants: infection (UTI most common, pneumonia), hypoxia, medication (anticholinergics, opioids, benzodiazepines, corticosteroids), metabolic (hyponatremia, hyperglycemia, renal failure), pain, dehydration, immobility, urinary retention, constipation, sleep deprivation, PRN psychoactive drugs. Risk factors: age >70, cognitive impairment, serious illness, polypharmacy, sensory impairment. DELIRIUM PREVENTION: ADAPT Protocol (ACOVE Delirium Assessment Protocol) - orienting interventions, sleep hygiene, early mobilization, minimize medications, early detection infection. Mortality: in-hospital mortality 5-15%; persistent cognitive impairment 6 months in survivors. Prognosis: 20-50% have persistent cognitive impairment; baseline cognition predicts recovery. Management: Identify/treat precipitants (>90% cases have reversible cause). Avoid antipsychotics if possible; if necessary, minimize dose/duration. Non-pharmacologic interventions: reorientation, sleep support, family presence, structured activities. Screening: CAM ICU (for intubated), 3D-CAM (in ED), monthly cognitive screening in long-term care."},{"id":6,"topic":"Dementia","ch":"Hazzard Ch 56-60, Lancet 2020","notes":"AD 60-80%: insidious onset, episodic memory first, hippocampal atrophy, amyloid plaques + neurofibrillary tangles. APOE4 = major genetic risk. APP on chromosome 21 = familial/Down syndrome AD. Vascular: stepwise decline, focal neuro signs, white matter changes. DLB (McKeith 2017): core features = fluctuating cognition + visual hallucinations + spontaneous parkinsonism + REM behavior disorder (polysomnography confirms loss of REM atonia). Supportive: severe neuroleptic sensitivity, reduced dopamine transporter on imaging. Systemic delusions are NOT a core feature. FTD: personality/behavior (bvFTD) or language (PPA), young onset, Pick bodies. Lancet 2020 Commission: 12 modifiable risk factors account for 40% of dementias — HEARING LOSS is #1 midlife factor. Others: less education, hypertension, obesity, smoking, depression, physical inactivity, diabetes, excessive alcohol, TBI, air pollution, social isolation. Workup: TSH, B12, folate, CBC, BMP, brain imaging (MRI preferred). CDR ≥1 → driving assessment. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Dementia is chronic progressive cognitive decline affecting ≥2 domains (memory, language, visuospatial, executive function, praxis) sufficiently severe to interfere with ADLs; NOT normal aging. Prevalence: 6.9 million Americans (5-7% of 65+, rises to 35-50% by 90+); globally 50 million with projection to 152 million by 2050. TYPES: (1) ALZHEIMER DISEASE (60-80% of cases) - amnestic presentation, pathology = amyloid-beta plaques + tau tangles, CSF biomarkers (↓Aβ42, ↑p-tau, ↑t-tau), MRI shows hippocampal atrophy. Decline rate: 3-8 years median survival, faster if late-onset. (2) VASCULAR DEMENTIA (15-25%) - stepwise decline, vascular risk factors (HTN, DM, smoking), infarcts on MRI, executive/gait dysfunction prominent. (3) LEWY BODY DEMENTIA (5-10%) - visual hallucinations (early), parkinsonism, REM sleep behavior disorder, fluctuating cognition, lewy bodies (alpha-synuclein aggregates). More medication-sensitive (neuroleptics dangerous). (4) FRONTOTEMPORAL DEMENTIA (5%) - behavioral/personality changes (FTD-bvFTD), language difficulties (PPA), early age onset (45-60 years), tau/TDP-43 pathology. (5) MIXED PATHOLOGY (25-30%) - combination of AD + vascular + Lewy. Diagnostic criteria: history, cognitive testing (MMSE, MoCA, CDR), MRI/CT to exclude structural lesions, labs (B12, TSH, RPR). Biomarkers: amyloid-beta-42, phosphorylated tau, total tau in CSF; PET imaging (amyloid, tau); blood biomarkers (pTau181, pTau217). Stages: Mild (early memory loss, preserved ADL), Moderate (prominent cognitive decline, behavioral/psychiatric symptoms, ADL support needed), Severe (no verbal communication, complete ADL dependence, require 24-hour care). Complications: behavioral/psychiatric symptoms (agitation, aggression, wandering, sexual disinhibition), depression (30%), psychosis (10-15%). Management: Cholinesterase inhibitors (donepezil, rivastigmine, galantamine) slow decline 6-12 months in mild-moderate; memantine (NMDA antagonist) in moderate-severe. Reduce caregiver burden (major predictor of institutionalization). Advance care planning, legal documents early. Antipsychotics (black box warning): increase mortality 1.5-1.7x, stroke risk, use only for severe behavioral symptoms not responding to non-pharmacologic interventions."},{"id":7,"topic":"Depression & Mood","ch":"Hazzard Ch 60,66","notes":"Prevalence 1-5% major depression in community elderly, 10-12% in hospital/NH. GDS-15: ≥5 = positive screen (yes/no format, avoids somatic symptoms that confound in elderly). PHQ-9 also validated. Pseudodementia: cognitive impairment that REVERSES with depression treatment — patients tend to answer 'I don't know' (vs confabulation in true dementia). SSRIs first-line: sertraline, escitalopram (good safety profile). Avoid TCAs (anticholinergic). Paroxetine: highest anticholinergic burden among SSRIs — Beers listed. Mirtazapine: good if insomnia + weight loss (sedating + appetite stimulating). Bupropion: LOWEST hyponatremia risk. SSRI hyponatremia: SIADH mechanism, risk highest in first weeks, monitor Na in first month. ECT: safe and highly effective in refractory elderly depression, fastest onset of action. Psychotherapy (CBT, IPT): effective, patient preference matters (GRS exam Q). Late-life depression associated with increased dementia risk. Suicide risk higher in elderly men, especially widowed/isolated. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Major Depressive Disorder in older adults: 5-10% prevalence in community; higher in hospitalized (15-25%), post-stroke (30%), post-MI (40%). Often missed: \"masked depression\" with somatic complaints (pain, fatigue, GI symptoms) without obvious mood complaints. DSM-5 criteria: ≥5 symptoms in 2-week period, MUST include depressed mood OR anhedonia: sleep (insomnia/hypersomnia), interest loss, guilt, energy loss, concentration difficulty, appetite change, psychomotor agitation/retardation, fatigue, death thoughts. Geriatric Depression Scale (GDS-15): score ≥5 suggests depression; short, specific for older adults (avoids somatic items). PHQ-9: scores 5-9 mild, 10-14 moderate, 15-19 moderately severe, ≥20 severe. Risk factors: medical comorbidity (CHF, stroke, Parkinson's, cancer), cognitive impairment, functional disability, bereavement, social isolation, medication side effects (beta-blockers, corticosteroids, interferon, sedating agents), chronic pain. Consequences: increased mortality (cardiac mortality 2.3x post-MI), disability, functional decline, reduced treatment adherence, suicidality. Older adults have highest suicide rates: men 85+ = 43/100,000 (vs 11/100,000 general population); male gender and access to means (firearms) significant risk factors. PSYCHOSIS IN LATE LIFE: depression with psychotic features 10-15% of older adults with depression; psychotic symptoms increase mortality, disability. Delusions content: poverty (poverty delusions), nihilistic (body part decay), somatic. Treatment: SSRIs first-line (citalopram max 20 mg/day, sertraline preferred over others due to fewer interactions); avoid tricyclic antidepressants (anticholinergic, cardiac). Response rate 60-70%; may require 8-12 weeks. Augmentation: bupropion (activating, good with apathy/fatigue), low-dose aripiprazole, T3 supplementation. ECT: excellent response even in medically ill/frail (most effective treatment); use for severe, psychotic, suicidal depression. Psychotherapy: CBT, interpersonal therapy effective. Prevention: screening tool in primary care, identify risk factors, social engagement, physical activity, treat medical comorbidities."},{"id":8,"topic":"Polypharmacy & Beers","ch":"Hazzard Ch 22","notes":"Polypharmacy: ≥5 medications. Associated with falls, delirium, hospitalization, mortality. Beers 2023 PIMs: long-acting benzos, anticholinergics (diphenhydramine, oxybutynin, chlorpromazine, paroxetine), chronic NSAIDs (GI/renal/CV), sliding-scale insulin alone, megestrol (thrombosis, minimal benefit), doxazosin (orthostatic), metoclopramide (EPS/TD, max 12wk), glyburide (prolonged hypoglycemia), nifedipine IR (reflex tachycardia, hypotension). STOPP/START 2: STOPP PPI>8wk, duplicate classes, long-acting sulfonylureas in CKD. START statin post-MI, ACEi/ARB HFrEF, Ca+vitD osteoporosis, anticoag AF CHA₂DS₂-VASc≥2. PRESCRIBING CASCADE classic: Donepezil → incontinence → Fesoterodine (anticholinergic opposing cholinesterase inhibitor). Other cascades: HCTZ→gout→allopurinol, amlodipine→edema→furosemide. Scott deprescribing algorithm. EQUiPPED: ED medication safety program. PK aging: ↓CrCl (Cr 1.0 in 75yo 55kg woman = CrCl 27ml/min!), ↓Phase I hepatic metabolism (CYP450 oxidation), Phase II (conjugation) preserved, ↑Vd lipophilic drugs, ↓albumin → ↑free drug. START LOW GO SLOW."},{"id":9,"topic":"Nutrition & Malnutrition","ch":"Hazzard Ch 46","notes":"MNA (Mini Nutritional Assessment): ≤11 = malnourished, 12-23.5 = at risk. Screen with MNA-SF (6 items). Pre-albumin (transthyretin): half-life 2 days, better acute marker than albumin (21 days). Malnutrition risk: social isolation, depression, dysphagia, polypharmacy (metformin → anorexia, PPIs → B12/Mg/Ca malabsorption), dental problems, poverty, functional impairment. Protein needs: 1.0-1.2g/kg/day in elderly (higher than young adults). Vitamin D: widespread deficiency, supplement 800-1000 IU/day; <25ng/mL associated with 4-fold fall risk post hip fracture (SOE=B). B12 deficiency: common due to atrophic gastritis, check methylmalonic acid (more sensitive than B12 level). Refeeding syndrome: watch phosphate, K, Mg when refeeding malnourished. Obesity paradox: mild overweight (BMI 25-30) may be protective in elderly. NG/PEG: does NOT improve outcomes in advanced dementia (Mitchell, SOE=A). Caloric needs: ~25 kcal/kg/day. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Malnutrition in older adults: 5-10% community-dwelling, 20-50% hospitalized, 30-65% nursing home residents. Definition: inadequate intake of calories, protein, micronutrients (B12, folate, vitamin D, zinc). Risk factors: poor appetite (medication side effect, depression, altered taste/smell, early satiety), difficulty chewing/swallowing, GI disorders (atrophic gastritis, celiac), cognitive impairment (forgets to eat), social isolation, poverty, medication-nutrient interactions. PROTEIN REQUIREMENTS: RDA 0.8 g/kg insufficient; older adults need 1.0-1.2 g/kg BW daily (vs 0.8 for younger adults); sarcopenia prevention requires 1.2-1.5 g/kg; renal disease (CKD 3b-5) requires modification but protein not contraindicated. Anabolic resistance: older adults require higher leucine threshold (~2.6 g per meal) to trigger mTOR activation. Caloric needs: 25-30 kcal/kg/day (lower than younger due to reduced activity, metabolism). MALNUTRITION SCREENING: DETERMINE (Diet, Energy, Regular meds, Eating ability, Teeth/dentures, Needing foods supplementation, Economic hardship, Reduced social contact) - risk assessment tool. Mini Nutritional Assessment (MNA): comprehensive tool; score <17 = malnourished, 17-23.5 = at risk. Unintentional weight loss ≥5% in 1 month or ≥10% in 6 months = RED FLAG. MICRONUTRIENT DEFICIENCIES: (1) Vitamin D - 40-60% deficient (25-OH vitamin D <20 ng/mL); weakness, falls, fractures; target 20-30 ng/mL; supplementation 600-2000 IU daily, or 50,000 IU weekly if deficient. (2) Vitamin B12 - 15-20% deficiency in 65+; pernicious anemia (intrinsic factor loss), bacterial overgrowth, metformin/PPI use; symptoms delayed (years); neuropathy, myelopathy, cognitive changes irreversible if prolonged. (3) Folate - homocysteine elevation increases stroke/dementia risk. (4) Zinc - impaired wound healing, immune dysfunction, taste disturbance (hypogeusia). (5) Iron - anemia evaluation needed (may indicate occult malignancy). Dysphagia: affects 15-30% of community-dwelling 65+, up to 60% hospitalized; causes aspiration, pneumonia, nutritional decline. Enteral nutrition: tube feeding only when oral intake impossible and prognosis >3 months; aspiration risk persists even with tubes. Parenteral nutrition: rarely indicated in older adults (high infection risk, poor quality of life). Management: assess/treat cause, optimize food environment, assist with feeding if needed, supplement protein/calories, monitor weight monthly, medication review (check for appetite suppressants), dental evaluation, speech therapy for swallowing assessment."},{"id":10,"topic":"Pressure Injuries","ch":"Hazzard Ch 51","notes":"NPUAP staging: I = intact skin, non-blanchable redness. II = partial thickness (blister/shallow). III = full thickness into subcut, no bone visible. IV = full thickness exposing bone/tendon/muscle. Unstageable = obscured by slough/eschar. Deep tissue injury = intact skin with purple/maroon discoloration. Kennedy terminal ulcer: develops as patient dying — NOT a care failure. Braden scale: sensory perception + moisture + activity + mobility + nutrition + friction/shear; ≤12 = high risk. Prevention: specialized foam mattress better than standard hospital mattress (SOE=B), repositioning q2h, nutrition with protein + micronutrients (SOE=B), manage incontinence/moisture. Dressings: hydrocolloid for minimal exudate non-infected stage III (SOE=B); alginate for moderate-heavy exudate (absorbs to form gel); transparent film for friction stage I-II; foam for moderate exudate. Wet-to-dry NEVER recommended (damages granulation, painful). Silver dressings for infected wounds. Vacuum-assisted closure (VAC) for exposed bone with purulent drainage. Stage IV healing: months to YEARS. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Pressure injuries (formerly called pressure ulcers/decubitus ulcers) affect 2-28% of hospitalized elderly patients and up to 15% of long-term care residents. Risk factors include immobility (primary), altered consciousness, incontinence, moisture, malnutrition, advanced age, and low albumin. Pathophysiology involves pressure exceeding capillary closing pressure (32 mmHg) for sustained periods, leading to tissue ischemia and necrosis. The National Pressure Injury Advisory Panel (NPIAP) staging: Stage 1 = non-blanching erythema, Stage 2 = partial thickness loss, Stage 3 = full-thickness loss, Stage 4 = full-thickness with muscle/bone involvement. Prevention is paramount: pressure redistribution (turning q2h), skin care, nutrition optimization, moisture management, and mobility promotion reduce incidence by 50%. Risk assessment tools (Braden Scale score <19 indicates high risk) should guide intervention. Treatment depends on stage: Stage 1-2 can heal with conservative management; Stages 3-4 require specialized wound care and may need plastic surgery consultation. Nutritional support (protein 1.25-1.5 g/kg, vitamin C, zinc) accelerates healing."},{"id":11,"topic":"Urinary Incontinence","ch":"Hazzard Ch 38","notes":"Types: STRESS (cough/sneeze → immediate leakage; positive standing cough test, highly specific SOE=A), URGE (can't hold, detrusor overactivity), OVERFLOW (retention, weak stream, incomplete emptying), FUNCTIONAL (mobility/cognition barriers). Mixed stress+urge very common in elderly women. TRANSIENT causes (DIAPPERS): Delirium, Infection, Atrophic vaginitis, Pharmaceuticals, Psychological, Excessive urine output, Restricted mobility, Stool impaction. First-line ALL types: behavioral therapy + Kegel pelvic floor exercises (SOE=A for stress/mixed). Freeze-and-squeeze for urgency. Bladder diary essential. Oral conjugated estrogen WORSENS incontinence (SOE=A) — vaginal topical estrogen may help. Oxybutynin: high ACB, Beers listed, can worsen cognition and cause urinary retention if overflow component. DHIC (Detrusor Hyperactivity with Impaired Contractility): common in elderly — need urodynamics before prostatectomy in men with neurological disease. Post-void residual >200ml → evaluate overflow. ASB: do NOT treat unless pre-urologic procedure (SOE=A). Mirabegron (beta-3 agonist): alternative to anticholinergics with fewer cognitive effects. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Urinary incontinence affects 11-34% of older men and 17-55% of older women; it's underdiagnosed because patients consider it normal aging. The USPSTF recommends annual screening with two questions: (1) Lost urine and gotten wet in the past year? (2) Happened on at least 6 separate days? Positive responses indicate 79% prevalence in women, 76% in men. Types: stress incontinence (45%, sudden loss with activity/cough/sneeze), urge incontinence (25%, sudden urgency), mixed (20%), overflow (10%, due to retention), functional (altered mobility/cognition). The 3IQ questionnaire reliably distinguishes stress vs. urge types. Workup includes urinalysis/urine culture, post-void residual (PVR >100 mL suggests retention), and sometimes cystometry. First-line treatments: stress = pelvic floor exercises (60% cure rate), pessary, or mid-urethral sling; urge = behavioral modification, anticholinergics (oxybutynin 2.5-5 mg TID; caution: cognitive impairment risk), beta-3 agonists (mirabegron). Older adults with urge incontinence may benefit from timed voiding (every 2-3 hours). Incontinence is a major nursing home placement factor and associates with depression."},{"id":12,"topic":"Constipation","ch":"Hazzard Ch 49","notes":"Common: up to 50% in NH residents. Causes: low fiber, dehydration, medications (opioids, anticholinergics, calcium channel blockers, calcium supplements, iron), immobility, hypothyroidism, depression, Parkinson's, diabetes (autonomic neuropathy). Drug mechanisms (HIGH-YIELD exam topic): Lactulose = disaccharide fermented by colonic bacteria → osmotic effect. Bisacodyl (Laxadin) = stimulant via myenteric plexus activation. Senna = stimulant acting directly on colon. PEG/Macrogol (Normalax) = osmotic, retains water in lumen. Psyllium/Methylcellulose = bulk-forming, absorb water. Docusate = stool softener (modest evidence). Opioid-induced constipation: methylnaltrexone (peripheral mu-antagonist, doesn't cross BBB). Red flags requiring workup: NEW onset, weight loss, rectal bleeding, iron deficiency anemia, family hx colon CA → colonoscopy. Bristol Stool Chart: types 1-2 = constipation, 3-4 = normal. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Constipation affects 15-30% of community-dwelling and 50% of institutionalized elderly. Definition: <3 bowel movements per week, hard stools, straining, or incomplete evacuation. Multifactorial causes in older adults: decreased gut motility (aging), medications (opioids, anticholinergics, calcium channel blockers), dehydration, low fiber intake (<15 g/day), reduced mobility, inadequate colonic sensation, and neurological conditions (Parkinson's, diabetes). Medications are culprit in ~50% of cases. Workup: colonoscopy if red flags (acute change, anemia, heme-positive stool, age >50 without prior screening). First-line management: increase fiber to 25-35 g/day gradually (risk of bloating), fluid intake to 1.5-2L/day, physical activity, and timed toileting after meals (leverages gastrocolic reflex). Osmotic laxatives (polyethylene glycol 17-34 g daily, lactulose 15-30 mL) preferred over stimulant laxatives. Stool softeners (docusate) ineffective alone. Linaclotide/lubiprostone for chronic cases. Digital disimpaction may be needed if fecal impaction develops. Opioid-induced constipation requires prophylaxis with naloxone-oxycodone formulation or methylnaltrexone."},{"id":13,"topic":"Sleep Disorders","ch":"Hazzard Ch 44","notes":"Normal aging: ↓slow-wave (N3) sleep, ↓REM proportion, more awakenings, earlier bedtime (advanced phase). Ventrolateral preoptic nucleus neurons lost during aging → sleep fragmentation. Insomnia: CBT-I is FIRST-LINE (SOE=A) — sleep hygiene, stimulus control, sleep restriction, cognitive restructuring. Avoid benzodiazepines (Beers: falls, confusion, fractures, paradoxical agitation). Zolpidem: also Beers (complex sleep behaviors). Melatonin: evidence for sleep onset difficulty; can help RBD in Parkinson's; NO withdrawal syndrome on stopping; benzos INCREASE endogenous melatonin so combination not beneficial. Ramelteon (melatonin receptor agonist): only modest benefit, mainly sleep onset. REM Behavior Disorder (RBD): acting out dreams during REM, loss of normal REM atonia. Confirm with polysomnography. Strong predictor of future synucleinopathy (Parkinson's, DLB). SSRIs/SNRIs can cause or worsen RBD. OSA: underdiagnosed in elderly, ↑CV risk. STOP-BANG screen (≥3 = high risk). CPAP treatment. Central sleep apnea more common in elderly with HF. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Sleep disorders are highly prevalent in older adults (25-50%) and significantly impact quality of life, cognition, and mortality. Primary sleep disorders: insomnia (difficulty initiating/maintaining sleep, affects 25-40% of elderly), sleep apnea (obstructive sleep apnea in 10-15% of men, 5% of women, associated with HTN, stroke, MI), restless leg syndrome (5-10%), and REM sleep behavior disorder (often precedes neurodegenerative disease). Age-related changes: decreased slow-wave sleep, fragmented sleep architecture, advanced sleep phase (earlier bedtime/wake). Secondary causes common: sleep apnea, periodic leg movements, medication side effects (SSRIs, stimulants), psychiatric conditions, pain, nocturia. Non-pharmacological first-line: sleep hygiene (consistent schedule, cool/dark room), exercise (but not near bedtime), limit caffeine/alcohol, cognitive-behavioral therapy for insomnia (CBT-I) is most effective with 70-80% improvement. Pharmacological: melatonin (1-3 mg, weak evidence), trazodone avoided (anticholinergic effects, orthostasis), benzodiazepines contraindicated (delirium, falls, dependence risk). Ramelteon (melatonin agonist) or low-dose doxepin preferred if medications needed. CPAP is standard for OSA; oral appliances for mild-moderate cases. Board pearl: short-acting BZs increase fall risk by 50% in elderly; cognitive consequences persist after discontinuation."},{"id":14,"topic":"Pain Management","ch":"Hazzard Ch 69","notes":"WHO ladder: Step 1 (acetaminophen, NSAIDs), Step 2 (weak opioids — tramadol, codeine), Step 3 (strong opioids — morphine, oxycodone, fentanyl). Acetaminophen: first-line non-opioid, max 2g/day in elderly (reduced hepatic clearance). NSAIDs: avoid if possible (GI bleeding, AKI, CV events, HTN exacerbation, HF); topical NSAIDs preferred over systemic (comparable efficacy for OA with less systemic toxicity). NEVER use meperidine (normeperidine metabolite → seizures, Beers). Gabapentin: first-line for neuropathic pain, start 100-300mg, titrate to 900-3600mg/day; side effects: confusion, drowsiness, gait impairment especially in elderly. Pregabalin: same mechanism, better GI absorption. Duloxetine: SNRI, effective for neuropathic and musculoskeletal pain. Amitriptyline: effective but HIGH anticholinergic burden → avoid in elderly. Opioids: start low with immediate-release, titrate slowly, always prescribe bowel regimen. Alzheimer's patients receive LESS opioids despite similar pain levels (SOE=B, GRS). Assessment in cognitively impaired: PAINAD, Faces Pain Scale. Multimodal approach always preferred. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Chronic pain affects 25-50% of community-dwelling and up to 80% of institutionalized elderly; frequently undertreated due to concerns about opioid side effects and addiction risk. Pain assessment should include pain severity (0-10 scale), location, characteristics, timing, and functional impact. Common sources: arthritis (45%), back pain (25%), neuropathy, malignancy. Non-pharmacological first-line: physical/occupational therapy, exercise (especially aquatic), cognitive-behavioral therapy, acupuncture, massage, mindfulness. Pharmacological approach: Step 1 = acetaminophen 650-1000 mg Q6H (max 3-4 g/day; caution with liver disease), NSAIDs for inflammatory pain (limit duration <2 weeks due to GI/renal/cardiac risk, especially age >75), topical agents (lidocaine patch, capsaicin cream). Step 2 = weak opioids (tramadol 50-100 mg Q6H) or combined analgesics. Step 3 = strong opioids (morphine, oxycodone) at lowest effective dose, with laxatives (PEG, naloxone-oxycodone) and reassessment for efficacy/harms q3-6 months. Adjuvants: gabapentin (300-1200 mg TID) for neuropathy, SNRIs (duloxetine 30-60 mg daily) for chronic pain and depression. Monitoring includes urine drug screen, pain/function outcomes, and addiction screening (OARRS registry). Regional approaches (nerve blocks, spinal infusions) for refractory pain."},{"id":15,"topic":"Osteoporosis","ch":"Hazzard Ch 54","notes":"Diagnose: T-score ≤-2.5 at hip/spine OR fragility fracture OR FRAX ≥3% hip / ≥20% major osteoporotic. FRAX works WITHOUT BMD (AUC 0.88 vs 0.86 with BMD — GRS key fact). DXA: gold standard, screen women ≥65, men ≥70, younger if risk factors. Bisphosphonates: first-line; oral alendronate/risedronate CI in esophagitis/reflux → switch to denosumab or IV zoledronic acid. IV zoledronic acid: CI if CrCl<35 (nephrotoxicity). Denosumab (anti-RANKL monoclonal Ab): SAFE in CKD (key advantage, SOE=A), q6mo subQ injection. CRITICAL: REBOUND vertebral fractures if denosumab stopped — must transition to bisphosphonate. Drug holiday: 5yr oral / 3yr IV bisphosphonate. Teriparatide (PTH analog): for severe osteoporosis, max 2yr. Romosozumab: anti-sclerostin, rapid BMD gains but CV signal. Ca 1200mg + vitD 800-1000 IU/day always. GnRH agonists (leuprolide for prostate CA) → accelerated bone loss → start bisphosphonate if high fracture risk (SOE=A). Raloxifene (SERM): reduces vertebral fracture but ↑DVT risk. Vitamin D <25ng/mL post hip fracture → 4-fold increased fall risk in next year (SOE=B). \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Osteoporosis affects 1 in 3 women and 1 in 5 men age >50, with annual hip fracture incidence of 200,000 in the U.S. Pathophysiology: accelerated bone loss due to decreased estrogen (women), reduced osteoblast function, vitamin D deficiency (25(OH)D <20 ng/mL), and increased osteoclast activity. DEXA T-score diagnostic: normal >-1, osteopenia -1 to -2.5, osteoporosis <-2.5 (fracture risk doubles for each 1 SD decrease). FRAX (WHO Fracture Risk Assessment Tool) calculates 10-year hip and major osteoporotic fracture risk; intervention indicated if 10-year hip fracture risk >3% or major fracture risk >20%. Risk factors: age, female sex, low BMI (<20), smoking, alcohol, corticosteroid use (>7.5 mg/day), hyperparathyroidism, rheumatoid arthritis. First-line: vitamin D (1000-2000 IU daily, maintain 25(OH)D >30 ng/mL), calcium (1000-1200 mg daily), weight-bearing exercise. Pharmacotherapy: bisphosphonates (alendronate 70 mg weekly, risedronate 35 mg weekly) - most used, reduce hip fracture risk by 30%; risk of atypical femoral fractures after >5 years (need 2-year drug holiday). Alternatives: denosumab (monoclonal antibody, RANKL inhibitor, SC Q6 months), teriparatide (PTH analog, daily injection, for severe osteoporosis). Monitoring: repeat DEXA q2 years; treatment holidays after 5-10 years based on persistence of osteoporosis/risk."},{"id":16,"topic":"Osteoarthritis","ch":"Hazzard Ch 52","notes":"Most common joint disease in elderly. Hand OA: heat/cold therapy evidence-based (SOE). Knee OA: weight loss + exercise are primary interventions. Topical NSAIDs (diclofenac gel): preferred over systemic NSAIDs (similar efficacy, less systemic toxicity). Intra-articular corticosteroids: relief up to ~2 months, limited to 3-4 injections/year. Arthroscopic debridement/lavage: NOT recommended (no better than sham surgery). Total joint replacement: for severe refractory OA with significant disability. Walking stick on CONTRALATERAL (opposite) side to affected joint — reduces joint loading. TENS: some evidence for hand OA. Duloxetine: SNRI approved for chronic musculoskeletal pain including OA. Avoid chronic oral NSAIDs in elderly. Glucosamine/chondroitin: conflicting evidence, not strongly recommended. Intra-articular hyaluronic acid: modest benefit, insurance coverage varies. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Osteoarthritis (OA) is the most common form of arthritis in older adults, affecting 10-15% of population over 60, with prevalence rising to 35%+ in those >75 years. Pathophysiology: progressive loss of articular cartilage, subchondral bone changes, osteophyte formation, and synovial inflammation. Risk factors: age, female sex (especially knee/hand), obesity (BMI >30 increases knee OA risk 2-3 fold), prior joint injury, muscle weakness, joint malalignment (varus/valgus). Clinical presentation: joint pain worsening with use/activity, morning stiffness <30 minutes, crepitus, reduced range of motion, worst in weight-bearing joints (knee, hip, spine). Diagnosis is clinical; X-rays confirm with Kellgren-Lawrence grading. First-line management: weight loss (10 lb loss reduces knee OA pain by 50%), physical/occupational therapy, exercise (strength and aerobic). Pharmacological: acetaminophen 650-1000 mg Q6H (equivalent to NSAIDs in many trials), NSAIDs for inflammatory component (naproxen 500 mg BID preferred due to cardiovascular profile; use PPI co-therapy in age >65). Topical NSAIDs (diclofenac cream) effective for hand/knee OA. Intra-articular corticosteroid injections (triamcinolone 20-40 mg) provide 3-12 week relief; max 3-4/year per joint. Hyaluronic acid injections questionable benefit. Advanced cases: joint replacement (hip/knee) highly successful with 95%+ patient satisfaction; osteotomy for younger patients with malalignment."},{"id":17,"topic":"Cardiovascular Disease","ch":"Hazzard Ch 73-74","notes":"Normal aging: ↑aortic impedance, ↑pulse pressure (systolic rises, diastolic falls), LV hypertrophy, mitral annular calcification, aortic valve sclerosis/calcification. LEFT axis deviation on ECG with aging (NOT right axis). Myocardial fibrosis increases stiffness → diastolic dysfunction common. ACS in elderly: more atypical presentations (dyspnea, confusion, fatigue rather than classic chest pain). PVD: smoking cessation beneficial even at 78yo (exam pearl). Claudication: supervised exercise training first-line. Walk-through-pain program. Cilostazol for symptom relief (CI in HF). Angioplasty for short-segment occlusion if conservative fails. Revascularization for critical limb ischemia. Statin benefit: persists in elderly, NNT reasonable even >75yo for secondary prevention. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Cardiovascular disease is the leading cause of morbidity and mortality in older adults. Age-related cardiovascular changes: arterial stiffness (increased pulse pressure), left ventricular hypertrophy (diastolic dysfunction), prolonged diastolic filling time, impaired baroreceptor reflex (orthostatic hypotension risk), and reduced exercise tolerance. Coronary artery disease prevalence increases from 4% at age 60 to 16% at age 80. Risk factors (same as younger but modified treatment): hypertension (present in 60% of age >65), dyslipidemia (treat with statins; ASCVD risk calculator guides intensity), smoking, diabetes (prevalence 15-20%), obesity, family history. Atypical presentations in older adults: MI may present with dyspnea, syncope, confusion, or fatigue rather than chest pain; 30% have silent MI. Workup: EKG (baseline essential), troponin (high-sensitivity assays), exercise stress test (limited by mobility), or coronary CT/angiography. Treatment principles: aggressive cardiovascular risk reduction. For stable CAD: aspirin 81 mg daily, statin (high-intensity if ASCVD), beta-blocker if prior MI/HF (target HR 60-100 bpm), ACE-I/ARB for HTN/LV dysfunction. For ACS: dual antiplatelet therapy (aspirin + P2Y12 inhibitor), anticoagulation, revascularization (PCI preferred to CABG in age >75). Beta-blockers improve outcomes post-MI; target BP <130/80 (individualize in oldest-old). Drug-drug interactions common; monitor renal function for dosing adjustments."},{"id":18,"topic":"Heart Failure","ch":"Hazzard Ch 73,76","notes":"HFrEF (EF≤40%): quadruple therapy = ACEi/ARNI + beta-blocker (carvedilol preferred > propranolol — Beers) + MRA (spironolactone/eplerenone, monitor K+) + SGLT2i (empagliflozin/dapagliflozin). Influenza vaccine reduces mortality in HF (SOE). Digoxin: reduces hospitalizations but NOT mortality. HFpEF (EF>50%): SGLT2i (EMPEROR-Preserved, DELIVER trials). Echo: primary diagnostic tool for HF classification. Fluid restriction 1.5-2L/day. Na restriction <2g/day. Cardiac rehab beneficial even in elderly. Avoid: NSAIDs (fluid retention, ↓renal flow), thiazolidinediones (fluid retention), verapamil/diltiazem in HFrEF (negative inotropy). PADUA score for VTE risk in hospitalized medical patients — highest with active cancer + recent surgery + immobility. BNP/NT-proBNP: rule-out values age-adjusted (higher cutoffs in elderly). \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Heart failure (HF) affects 10% of adults age >75 and is the leading cause of hospitalization in older adults. Pathophysiology: reduced ejection fraction (HFrEF, LVEF <40%, ~50% of cases) vs. preserved EF (HFpEF, LVEF >50%, ~50% of cases, more common in older women, associated with HTN). HFpEF characterized by diastolic dysfunction, elevated filling pressures, normal systolic function. Clinical presentation: dyspnea on exertion, orthopnea, paroxysmal nocturnal dyspnea, edema, fatigue, reduced exercise tolerance. Older adults often present atypically: weakness, cognitive impairment, anorexia. Diagnosis: BNP/NT-proBNP >100 ng/L supports HF (natriuretic peptides increase with age, gender differences exist). Echocardiography confirms EF and phenotype. Risk factors: coronary disease (70%), hypertension (75%), atrial fibrillation (50% comorbidity). HFrEF management: ACE-I (target dose lisinopril 10 mg daily) or ARB, beta-blocers (carvedilol, metoprolol succinate, bisoprolol; target HR 50-60 bpm), aldosterone antagonist (spironolactone 12.5-25 mg if K+ <5.0). ARNI (sacubitril/valsartan) replaces ACE-I; SGLT2 inhibitors (dapagliflozin, empagliflozin) reduce hospitalizations by 25%. HFpEF has no mortality-reducing therapy; diuretics for symptoms, strict BP control. ICD indicated if LVEF <35% despite optimal medical therapy. CRT considered if wide QRS (>120 ms) and low EF. Prognosis: 5-year mortality 45-50% even with optimal therapy; end-of-life planning essential."},{"id":19,"topic":"Hypertension","ch":"Hazzard Ch 79","notes":"SPRINT: SBP<120 in ≥75y reduces CV events AND mortality (25% RR reduction), including those with CKD. HYVET: treating HTN in >80y reduces stroke 30%, HF 64%, all-cause mortality 21%. Individualize for frail — aggressive targets may cause orthostatic falls. Orthostatic BP screening MANDATORY at every visit. First-line: thiazide-like (chlorthalidone > HCTZ), CCB (amlodipine), ACEi/ARB. HCTZ actually BENEFICIAL for osteoporosis (↑calcium retention) — do NOT avoid in osteoporotic patient. Doxazosin: Beers listed (orthostatic hypotension). Hypertensive emergency (organ damage): target ↓MAP 25% in first hour, then to 160/110 over 2-24h. IV nitroprusside or labetalol. ACEi preferred with proteinuria. Resistant HTN: rule out secondary causes, medication non-adherence, white coat effect, OSA. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Hypertension affects 65% of older adults age 65-74 and 80% of those >75 years. Blood pressure increases with age due to arterial stiffness and reduced baroreceptor sensitivity. Definition (ACC/AHA 2017): normal <120/<80, elevated 120-129/<80, stage 1 HTN 130-139/80-89, stage 2 HTN ≥140/90. Out-of-office BP monitoring (home BP or ambulatory) preferred for diagnosis to avoid white-coat effect. Systolic HTN predominates in older adults; isolated systolic HTN (SBP ≥160, DBP <90) common, carries high cardiovascular risk. Target BP: evidence-based targets are individualized; ACCORD BP trial showed SBP <120 reduces stroke/MI by 24% but increases adverse events. Current recommendations: target <130/80 for most, <140/90 acceptable for frail older adults; maintain DBP >65 to avoid end-organ hypoperfusion (J-curve risk). Hypertensive urgency/emergency: SBP ≥180 with symptoms (chest pain, dyspnea, neuro changes, seizure) requires hospitalization; urgent management (not emergency) needed if SBP >180 without symptoms. Non-pharmacological: sodium restriction to 1.5-2.3 g/day (DASH diet), weight loss (10 kg loss reduces SBP 5-20 mmHg), exercise 150 min/week, limit alcohol, stress reduction. Pharmacological first-line: thiazide-type diuretics (HCTZ 12.5-25 mg, chlorthalidone 12.5-25 mg preferred due to longer half-life), ACE-I/ARB, calcium channel blockers (amlodipine 5-10 mg). Beta-blockers not first-line unless CAD/post-MI/AF. Avoid rapid BP lowering (risk of stroke). Polypharmacy common; combination pills improve adherence. Goal: achieve target BP on 2-3 agents; add agents sequentially every 4-12 weeks. Monitor for orthostatic hypotension, electrolytes, renal function. Medication side effects: thiazides (hypokalemia, hyperuricemia), ACE-I (persistent dry cough, hyperkalemia), CCBs (ankle edema, reflex tachycardia)."},{"id":20,"topic":"Stroke","ch":"Hazzard Ch 62, Harrison's","notes":"Territory syndromes: MCA = contralateral hemiplegia + sensory loss, APHASIA if dominant hemisphere (LEFT), homonymous hemianopia CONTRALATERAL, neglect if non-dominant. ACA = leg weakness > arm, personality changes (abulia, apathy), urinary incontinence, grasp reflex. PCA = visual field defects (homonymous hemianopia), memory impairment, alexia without agraphia. Vertebrobasilar = diplopia, vertigo, dysphagia, crossed signs. ABCD2 score (TIA→CVA risk 2d-90d): Age≥60(1) + BP≥140/90(1) + Clinical features (speech only=1, unilateral weakness=2) + Duration (10-59min=1, ≥60min=2) + Diabetes(1). Score ≥4 = high risk (>4% at 2 days). tPA: within 4.5h of symptom onset, check contraindications. Thrombectomy: up to 24h for large vessel occlusion with salvageable tissue. Secondary prevention: antiplatelets (aspirin + short-term clopidogrel for minor stroke/TIA), statins, BP control, AF anticoagulation (DOACs preferred). \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Acute ischemic stroke in older adults (>80 years) differs significantly from younger populations. The incidence increases exponentially with age, affecting 6-10% of elderly. Thrombolytic therapy (IV-tPA) remains effective in older adults if given within 4.5 hours of onset, with no upper age limit for treatment. The NINDS criteria apply equally regardless of age, though older patients may have more comorbidities affecting candidacy. Risk stratification uses NIHSS score (higher scores = worse prognosis); scores >25 indicate severe stroke. Atrial fibrillation is the most common cause of cardioembolic stroke in elderly, present in 50% of acute strokes in those >80 years. Anticoagulation for AF-related stroke is indicated with DOACs (apixaban, dabigatran, edoxaban, rivaroxaban) or warfarin (INR 2-3). Early mobilization within 24-48 hours improves outcomes even in very elderly. Post-stroke rehabilitation should address cognitive impairment, depression (present in 30-50% post-stroke), and swallowing dysfunction. Polypharmacy complicates management; deprescribe medications that don't align with post-stroke goals of care. Secondary stroke prevention uses aspirin (81-325 mg daily) unless cardioembolic source identified."},{"id":21,"topic":"COPD & Pulmonary","ch":"Hazzard Ch 80-81","notes":"FEV1/FVC <0.7 may OVERDIAGNOSE COPD in elderly — use lower limit of normal (LLN). Residual Volume (RV) INCREASES with aging (air trapping from loss of elastic recoil). FVC, FEV1, DLCO all decrease. GOLD staging by FEV1 post-bronchodilator. LAMA (tiotropium) for moderate-severe. LAMA+LABA for persistent symptoms. ICS added only if eosinophils >300 + frequent exacerbations. O2 therapy indications: PaO2 ≤55mmHg or SpO2 ≤88% at rest; OR PaO2 55-59 with cor pulmonale (edema, P pulmonale on ECG) or polycythemia (Hct>55%). Pulmonary rehab: highly effective for dyspnea, exercise tolerance, QoL. IPF (Idiopathic Pulmonary Fibrosis): HRCT shows UIP pattern (honeycombing), restrictive physiology (↓TLC, ↓FVC, ↓FEV1, ↓DLCO), clubbing present. Antifibrotics: pirfenidone, nintedanib slow progression. Aspiration pneumonia: common in elderly with dysphagia/dementia — assess swallowing. CAP in elderly: atypical presentation (confusion, falls, no fever). \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Chronic obstructive pulmonary disease prevalence in elderly exceeds 15% in those >65 years. Spirometry criteria unchanged with age: FEV1/FVC ratio <0.70 confirms obstruction; GOLD staging based on post-bronchodilator FEV1 (>80%=GOLD 1, 50-79%=GOLD 2, 30-49%=GOLD 3, <30%=GOLD 4). Geriatric-specific considerations include increased medication side effects and drug interactions. Inhaler technique deteriorates with cognitive decline and arthritis; consider spacers and simpler devices. Exacerbations in elderly frequently precipitate hospitalization and functional decline. Acute exacerbation management: systemic corticosteroids (prednisone 40-50 mg daily x 5-7 days), broad-spectrum antibiotics if purulent sputum, oxygen titration to maintain SpO2 88-92% (avoid hyperoxia which increases mortality). COPD vaccination: influenza annually, PPSV23 once (or 2 doses if age >65 at first dose), PCV20 or PCV15+PPSV23 per current guidelines. Pulmonary rehabilitation improves exercise capacity and dyspnea in elderly; participation correlates with better outcomes than pharmacotherapy alone. Long-term oxygen therapy (>15 h/day) improves survival in hypoxemia (PaO2 <55 mmHg or SaO2 <88%)."},{"id":22,"topic":"Diabetes Mellitus","ch":"Hazzard Ch 99, ADA","notes":"HbA1c targets: <7% healthy with long life expectancy, 7.5-8% complex/intermediate health, 8-8.5% very complex/frail (VA/DoD: 8-9% nursing home/limited life). Macrovascular benefit of intensive control takes ~8 YEARS to manifest → futile in limited life expectancy. ACCORD: intensive (A1c<6%) = EXCESS MORTALITY in T2DM — study stopped early. Metformin: first-line BUT CI if CrCl<30ml/min (lactic acidosis risk) AND causes anorexia/weight loss in thin elderly. Hold 48h pre-op/contrast. Glipizide preferred over glyburide (shorter half-life, no active metabolites → less prolonged hypoglycemia). SGLT2 inhibitors: CV+renal benefit (empagliflozin EMPA-REG, dapagliflozin DAPA-HF/DAPA-CKD). Watch: UTI, euglycemic DKA, volume depletion. GLP-1 RA: Semaglutide (Ozempic) reduces CV events BUT increases retinopathy risk. DPP4 inhibitors: NOT more effective than metformin for glycemic control. Fingerstick monitoring NOT useful in stable non-insulin T2DM (SOE=B, GRS). Fenofibrate retards diabetic retinopathy progression (SOE=B, GRS). Perioperative: hold metformin 48h, sulfonylureas day of surgery, basal insulin at 50% dose. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Type 2 diabetes mellitus affects 20-30% of adults >65 years; prevalence even higher in institutionalized elderly (30-50%). Diagnostic criteria unchanged with age: fasting glucose ≥126 mg/dL, 2-h glucose ≥200 mg/dL on OGTT, random glucose ≥200 mg/dL with symptoms, or HbA1c ≥6.5%. Geriatric-specific targets: HbA1c goal 7-8% for most elderly, up to 8-9% in those with limited life expectancy, frailty, or multiple comorbidities; goals <7% for healthy, functional older adults with long life expectancy. Hypoglycemia risk increases with age due to impaired counter-regulatory response and renal impairment; sulfonylureas and insulin carry highest risk. Metformin dose adjustment critical: avoid if eGFR <30 mL/min, use caution if 30-45 mL/min. SGLT2 inhibitors provide cardiovascular and renal benefits (empagliflozin, canagliflozin); caution with genital infections and DKA risk. GLP-1 RAs (semaglutide, dulaglutide) reduce cardiovascular events; beneficial for weight, BP, and renal protection. DPP-4 inhibitors (sitagliptin) safe with renal impairment but less cardioprotective. Avoid DPP-4 inhibitors if HF with reduced EF. Insulin requirements often decrease with age due to declining renal function; long-acting basal insulin (glargine, degludec) preferred to frequent injections. Monitor for complications: annual foot exams, microalbumin screening, ophthalmology referral, cardiovascular assessment."},{"id":23,"topic":"Thyroid Disorders","ch":"Hazzard Ch 98","notes":"Subclinical hypothyroidism: TSH>10 → treat. TSH 4.5-10 → treat if symptomatic, positive TPO antibodies, or goiter. Start levothyroxine LOW (25-50mcg, lower if cardiac disease) and titrate. Myxedema coma: IV levothyroxine + IV hydrocortisone (rule out adrenal insufficiency before giving T4 alone). Subclinical hyperthyroidism: ↑AF risk, ↑bone loss. Treat if persistent TSH<0.1. Amiodarone thyrotoxicosis: Type 1 (underlying thyroid disease, excess iodine → thionamides) vs Type 2 (destructive thyroiditis → steroids). Type 1+2 mixed common. Euthyroid sick syndrome: low T3, normal or low TSH, low-normal T4 — do NOT treat (reflects severity of acute illness). Apathetic thyrotoxicosis in elderly: depression, weight loss, AF, weakness WITHOUT classic hyperactivity signs → check TSH in any elderly with unexplained AF, weight loss, or apathy. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Thyroid disease prevalence: hypothyroidism in 5-10% of older adults, hyperthyroidism in 0.5-3%. Age-related changes complicate diagnosis: TSH increases slightly with age (upper limit of normal may be 4.5-5.0 mIU/L in elderly vs 2.5 in younger); free T4 and free T3 decrease. Subclinical hypothyroidism (elevated TSH, normal free T4) present in 10-15% of elderly; controversial whether to treat, but consider treatment if TSH >10 or symptomatic. Overt hypothyroidism management: levothyroxine dose 1.6 mcg/kg/day (often 50-75 mcg starting dose in elderly); increase by 25 mcg every 4-6 weeks to target TSH 0.5-3.0 mIU/L. Monitor TSH 6-8 weeks after any dose change; once stable, check annually. Absorption affected by: calcium, iron, PPIs, and other medications; administer levothyroxine alone, 30-60 minutes before food or other meds. Elderly more sensitive to thyroid replacement; over-replacement causes AF (10% atrial fibrillation risk with TSH <0.1) and accelerated osteoporosis. Primary hyperthyroidism (Graves disease, toxic nodule, thyroiditis): TSH suppressed, free T4 elevated. Graves disease in elderly often presents subtly (apathy, AF, HF exacerbation) rather than typical hyperactivity. Beta-blockers control symptoms (propranolol 10-20 mg TID). Antithyroid drugs: PTU or methimazole, with PTU preferred in elderly due to less hepatotoxicity. Radioactive iodine effective, especially for toxic nodule. Thyroid cancer in elderly: differentiated thyroid cancer has excellent prognosis even with age; aggressive treatment recommended in fit elderly."},{"id":24,"topic":"Chronic Kidney Disease","ch":"Hazzard Ch 82","notes":"Aging kidney: ↑afferent arteriolar resistance, ↓efferent resistance. Nephrosclerosis → cortical thinning. ~2/3 of population shows declining GFR with age (~0.75-1 ml/min/year after 40). EXAM TRAP: Serum Cr 1.0 does NOT equal normal in elderly — always calculate CrCl (Cockcroft-Gault) or eGFR (CKD-EPI). Proteinuria >200mg/24h is NEVER normal at any age. Drug dosing: critical to adjust for renal function — aminoglycosides (tubular damage, NOT glomerular; can occur up to 1 WEEK after stopping; depends on drug LEVELS), vancomycin, digoxin, allopurinol, DOACs, metformin (CI CrCl<30), nitrofurantoin (ineffective CrCl<30). ACEi/ARB: first-line for proteinuria/DM nephropathy, tolerate Cr rise up to 30%, monitor K+. Anemia of CKD: EPO when Hb<10g/dL, target 10-11.5 (not >13 — CHOIR/TREAT trials). Contrast nephropathy prevention: IV hydration pre/post. Refer nephrology: eGFR<30 or rapid decline. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Chronic kidney disease (CKD) prevalence: stage 3 or worse in 30-40% of those >70 years; stage 5 (eGFR <15) in 2-3%. Age-related decline in GFR: normal aging causes ~1 mL/min/year GFR decline after age 30; however, eGFR may overestimate decline in very elderly due to reduced muscle mass. CKD stages: 1 (GFR >90), 2 (60-89), 3a (45-59), 3b (30-44), 4 (15-29), 5 (<15 mL/min/1.73m2). Elderly with CKD have high cardiovascular mortality risk; renin-angiotensin system inhibition (ACE-I or ARB) slows progression if albuminuria present, even if HTN absent. Target SBP <120 mmHg (SPRINT trial, though results debated in CKD; individualize based on tolerance and adverse effects). Anemia screening: Hgb <13.5 g/dL (men) or <12 g/dL (women) warrants investigation. ESA use controversial in CKD; consider if Hgb <10 AND symptomatic; target Hgb 9-11 g/dL to avoid thrombotic complications. Iron supplementation: IV iron (ferric carboxymaltose) preferred over oral in CKD stage 4-5 due to GI side effects. Phosphate management: restrict dietary phosphate, use binders (calcium carbonate, sevelamer, lanthanum) if phosphate >5.5 mg/dL. PTH target: 35-70 pg/mL in stage 3-4; >150 pg/mL suggests secondary hyperparathyroidism requiring active vitamin D or calcimimetics. Magnesium, potassium, acid-base management critical. Medication dose adjustment: many drugs renally cleared (metformin, NSAIDs, aminoglycosides, ACE-I, ARB, SGLT2i, GLP1-RA). Nephrology referral when eGFR <30 or rapid decline."},{"id":25,"topic":"Anemia","ch":"Hazzard Ch 77,94","notes":"Anemia in elderly: NOT normal aging — always investigate. Iron deficiency anemia: low iron, HIGH transferrin (TIBC), LOW ferritin; evaluate for GI blood loss (colonoscopy if no obvious source). Anemia of chronic disease/inflammation: low iron, LOW transferrin, HIGH ferritin (acute phase reactant); treat underlying cause. EXAM KEY: ferritin elevated + low iron + low transferrin = chronic disease, NOT iron deficiency — iron supplementation won't help, need to treat underlying condition +/- EPO. MDS (myelodysplastic syndrome): suspect if unexplained cytopenia + dysplastic features; confirm with bone marrow biopsy. B12 deficiency: elevated methylmalonic acid (most sensitive marker), macrocytosis may be absent; common due to atrophic gastritis, PPI use, metformin. Treat IM B12 or high-dose oral (1000-2000mcg/day PO is equivalent to IM for most patients). Folate deficiency: megaloblastic, check RBC folate (more reliable than serum). Combined deficiencies common. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Anemia definition in elderly: Hgb <13 g/dL (men), <12 g/dL (women); prevalence 10-20% in community-dwelling, up to 50% in hospitalized elderly. Iron deficiency anemia most common cause (30-40% of cases); chronic GI bleeding common source. Investigation: peripheral smear, reticulocyte count, iron studies (ferritin <30 mcg/L, TSAT <16%), TIBC. Macrocytic anemia: vitamin B12 and folate deficiency; B12 <200 pg/mL diagnostic; methylmalonic acid and homocysteine elevated in B12 deficiency. Pernicious anemia from intrinsic factor antibodies common in elderly; diagnosis by Schilling test or intrinsic factor antibodies; treatment with IM B12 1000 mcg monthly indefinitely. Folate deficiency from poor diet; serum folate <4 ng/mL, RBC folate abnormal. Normocytic anemia: hemolysis (elevated reticulocyte count, elevated LDH, low haptoglobin), bone marrow disorders (MDS in 20-30% of elderly with anemia), chronic disease anemia. Anemia of inflammation (CKD, cancer, infection, autoimmune disease): ferritin elevated, iron studies show low iron despite adequate stores. ESA use in CKD anemia: erythropoiesis-stimulating agents increase thrombotic risk; use only if Hgb <10 and symptomatic. Blood transfusion: restrictive strategy (transfuse if Hgb <7-8 g/dL) preferred in stable elderly; higher threshold in acute MI, angina, or major surgery. Transfusion-related iron overload risk; consider phlebotomy or chelation if chronic transfusion required. Functional iron deficiency in CKD: consider IV iron even with normal serum iron if TSAT <20-25%."},{"id":26,"topic":"Cancer & Oncology","ch":"Hazzard Ch 88-92","notes":"Cancer-infection associations (EXAM FAVORITE): AML → Pneumocystis jirovecii pneumonia. Colon carcinoma → Streptococcus bovis bacteremia (ALWAYS scope after S. bovis). Multiple myeloma → encapsulated organisms (S. pneumoniae). Hodgkin's lymphoma → cell-mediated immunity defects (TB, fungi, viruses). Tumor lysis syndrome (post-chemo, especially AML): hyperPHOSPHATEMIA, hyperKALEMIA, hyperURICEMIA, hypOCALCEMIA — NOT hyperglycemia, NOT hypercalcemia. Prevent with hydration + allopurinol/rasburicase. Screening: colonoscopy benefit diminishes >75y with comorbidities (life expectancy <10yr). PSA screening: controversial in elderly, shared decision-making. Mammography: uncertain benefit >75y. CGA before cancer treatment improves outcomes. Prostate CA with bone metastases (age 97, functional): LHRH agonist is appropriate treatment (GRS/exam). Typhlitis: neutropenic cecal inflammation in chemo patients (classically 5-FU) — NOT appendicitis. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Cancer incidence rises exponentially with age; median age at diagnosis 66 years. Elderly represent 50% of new cancer diagnoses but only 13% of clinical trial participants, creating evidence gap. Five most common cancers in elderly: prostate (25%), lung (13%), colon (12%), breast (12%), bladder (6%). Screening recommendations shift with age: colorectal screening generally stop at 75-85 years or if <10 year life expectancy; PSA screening controversial in elderly (individualize, consider stopping >75 years or if high comorbidity); breast cancer screening continue to 75-85 if previously screened, good health, no prior breast cancer; lung cancer screening (low-dose CT) in 55-74 year-old smokers. Treatment considerations: chronological age alone not criterion; functional status and comorbidities determine tolerance. Comprehensive geriatric assessment predicts chemotherapy toxicity better than age. Chemotherapy in elderly: dose reduction common; monitor closely for neutropenia (infection risk especially in those >75), thrombocytopenia, mucositis, cardiac toxicity (anthracyclines, trastuzumab). Immunotherapy (checkpoint inhibitors) increasingly used in elderly; autoimmune complications (myositis, endocrinopathy, pneumonitis) more severe in older adults. Radiation therapy: generally well-tolerated but fatigue significant; proton therapy reducing normal tissue toxicity. Surgery: perioperative risk stratified by functional status and cardiopulmonary reserve; palliative surgery appropriate for symptom control. Hormone therapy (tamoxifen, aromatase inhibitors, GnRH agonists) used across age spectrum; aromatase inhibitors preferred over tamoxifen in postmenopausal elderly due to lower thrombotic risk. Palliative approach: early integration improves outcomes and reduces futile interventions; discuss goals of care before treatment decisions."},{"id":27,"topic":"Infections","ch":"Hazzard Ch 104-108, SZMC DAG","notes":"Immunosenescence: ↓neutrophil CHEMOTAXIS (NOT ↓phagocytosis — phagocytosis preserved), ↓naive T cells, ↑memory T cells (but less diverse), inflammaging (↑baseline IL-6, TNF-α, CRP). Atypical presentation: confusion/delirium instead of fever, functional decline, falls, anorexia. ASB (asymptomatic bacteriuria): do NOT treat in elderly (SOE=A) — exception: pre-urologic procedure. UTI first-line elderly women: nitrofurantoin 5 days (NOT cipro as first-line). Phosphomycin (Monurol) for uncomplicated UTI. Nitrofurantoin: AVOID if CrCl<30 (ineffective + pulmonary toxicity). CAP community: Augmentin for mild outpatient; Cefuroxime + Azithromycin for atypical coverage. Aminoglycoside nephrotoxicity: TUBULAR damage (not glomerular), can appear up to 1 WEEK after stopping treatment, depends on LEVELS not just dose. C. difficile: suspect after antibiotics + diarrhea; test toxin; treat with oral vancomycin or fidaxomicin (not metronidazole first-line anymore). Vaccines: PCV20 or PCV15+PPSV23 for pneumococcus, annual influenza, shingrix for herpes zoster (even if prior zoster or prior zostavax). \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Infection accounts for 25% of hospital admissions in elderly; immune senescence increases susceptibility and severity. Fever response blunted: 20-30% of serious infections present without fever; absence of fever does not exclude infection. Typical presentations atypical in elderly: pneumonia may present as confusion or falls, not cough; UTI as delirium not dysuria; sepsis as hypotension and confusion without tachycardia. Bacterial infections: Streptococcus pneumoniae, Staphylococcus aureus (including MRSA), gram-negative bacteria (E. coli, Klebsiella, Pseudomonas). Pneumonia in elderly: CAP empirical therapy fluoroquinolone (levofloxacin 750 mg daily) or ceftriaxone + azithromycin; duration 5-7 days if non-severe; consider atypical coverage (Legionella, Chlamydia). UTI: bacteriuria is normal in elderly without symptoms; treat only if symptomatic or pregnant. Asymptomatic bacteriuria: screening not recommended except in pregnancy and before urologic procedures. C. difficile infection: epidemic due to fluoroquinolone use in elderly; fidaxomicin preferred over vancomycin for initial non-fulminant CDI; metronidazole no longer recommended. Fungal infections: Candida albicans oral thrush common with oral corticosteroids or antibiotics; fluconazole 100-200 mg daily x 7-14 days. Influenza vaccination annually, even if prior infection; split virus or high-dose vaccine improves response. Pneumococcal vaccination: PPSV23, PCV15/PCV20 per current CDC recommendations (updated 2024); prior PPSV23 recipients need additional PCV vaccination. Tuberculosis: reactivation risk higher in immunosuppressed; latent TB screening and INH prophylaxis if positive. Herpes zoster: incidence 10 per 1000/year in those >60 years; post-herpetic neuralgia in 30-50% of those >70 years; recombinant zoster vaccine (Shingrix) recommended for all ≥50 years."},{"id":28,"topic":"Palliative Care","ch":"Hazzard Ch 67-69, Mitchell","notes":"Palliative care ≠ only end-of-life — appropriate at any stage of serious illness alongside curative treatment. WHO pain ladder (no meperidine ever). Dyspnea: low-dose morphine (2.5-5mg PO), fan therapy, O2 if hypoxic. Nausea refractory to ondansetron + metoclopramide: try haloperidol; if passing gas → constipation may be cause → lactulose. Death rattle: glycopyrrolate or hyoscine (anticholinergic — dries secretions). Mitchell advanced dementia (NEJM 2009): most common complications = eating problems (86%) and infections (53%) in 18-month follow-up. NG/PEG does NOT improve outcomes (doesn't prevent aspiration, doesn't prolong survival, doesn't improve comfort, SOE=A). Prognosis <6 months criteria: FAST 7C + complications (aspiration PNA, pyelonephritis, sepsis, pressure ulcers stage 3-4, recurrent fever post-antibiotics) + albumin <2.5g/dL. Hospice eligibility: ≤6mo prognosis. NURSE framework for empathic communication: Name, Understand, Respect, Support, Explore. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Palliative care is person-centered care addressing physical, psychological, social, and spiritual needs; appropriate at any disease stage, concurrent with curative treatment. Goals-of-care conversations essential; use frameworks like Serious Illness Conversation Guide. Life expectancy estimation: tools available but rough; physicians often overestimate by 2-4x. Prognosis by diagnosis: cancer median 6-12 months once metastatic; dementia 8-10 years from diagnosis; heart failure 5-10 years; COPD 5-10 years. Palliative approach indicators: frequent hospital admissions, functional decline, progressive disease despite optimal therapy, patient/family request. Advance directives: living will specifies treatments (CPR, intubation, feeding tubes) wanted/unwanted; healthcare proxy designates surrogate decision-maker. POLST (Physician Orders for Life-Sustaining Treatment): medical order addressing resuscitation, level of care intensity (full, limited, comfort); portable across settings. Pain management: WHO ladder (non-opioid, then weak opioid, then strong opioid); titrate to effect. Opioid dosing in elderly: start low (morphine 5-10 mg q4h PO), titrate slowly due to altered pharmacokinetics and increased sensitivity; watch for respiratory depression, constipation, delirium. Constipation: prophylaxis with stool softener + osmotic laxative (miralax, lactulose) essential with opioid use. Dyspnea: opioids reduce perception of breathlessness; oxygen only if hypoxic and symptomatic. Nausea: 5-HT3 antagonist (ondansetron) or metoclopramide; avoid antidopaminergics in dementia. Delirium in palliative phase: non-pharmacologic interventions (reorientation, familiar objects, minimal procedures); haloperidol or risperidone if agitation dangerous, but minimize sedation at end-of-life. Withdrawal vs terminal sedation: withdrawal is discontinuing life-sustaining therapy (acceptable); terminal sedation is pharmacologic sedation to relieve suffering (ethical if aligned with wishes). Hospice: appropriate when prognosis <6 months; admission doesn't preclude active symptom management; most patients die at home on hospice."},{"id":29,"topic":"Ethics","ch":"Hazzard Ch 72","notes":"Four principles: autonomy (patient self-determination), beneficence (do good), non-maleficence (do no harm), justice (fair distribution). Decision-making capacity: understand the information + appreciate how it applies to their situation + reason about options + express a consistent choice. Capacity ≠ competency (legal determination by court). Capacity is decision-specific and may fluctuate. Futility: no consensus definition — quantitative (<1% chance) vs qualitative (won't achieve patient's goals). Rationing: Israel COVID-19 ad hoc committee prioritized by BIOLOGICAL age + function + comorbidity burden, NOT chronological age alone. Informed consent: must explain in patient's language/level, include risks/benefits/alternatives. Truth-telling: patient's right even if family disagrees (autonomy). Research ethics: extra protections for cognitively impaired (proxy consent, assent). Surrogate decision-making: substituted judgment (what would patient want) > best interest standard. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Medical ethics in geriatrics grounded in four principles: autonomy (respect for person's decisions), beneficence (act in patient's best interest), non-maleficence (do no harm), justice (fair allocation of resources). Informed consent requires: disclosure of diagnosis/prognosis/options/benefits/risks/alternatives, understanding by patient, voluntary agreement. Capacity assessment: understanding, appreciation, reasoning, expressing choice. Cognitive impairment doesn't automatically negate capacity; specific assessment for each decision needed. Substituted judgment: surrogate decides as patient would if able; requires clear, convincing evidence of patient's wishes. Best interest standard: used when patient's wishes unknown; consider what reasonable person in situation would choose. Shared decision-making: optimal approach; clinician provides expertise, patient provides values/preferences. Beneficence vs autonomy conflict: respect autonomy even if clinician disagrees with patient's choice. Physician-assisted death (medical aid in dying): legal in some jurisdictions; requires careful assessment, documentation, multiple physician evaluation. Withholding vs withdrawing life support: ethically equivalent; both permissible if aligned with patient wishes or best interests. Resource allocation: fair distribution when resources limited; age alone not basis for triage. Polypharmacy and deprescribing: ethical obligation to minimize inappropriate medications; avoid prolonging dying if contrary to patient wishes. Disclosure of medical errors: ethical (and increasingly legal) requirement. Conflict of interest: financial incentives for test/treatment ordering problematic; transparency essential."},{"id":30,"topic":"Elder Abuse","ch":"Hazzard Ch 48","notes":"Types: physical, emotional/psychological, financial exploitation, neglect (by others), self-neglect (most common form reported to APS), sexual, abandonment. Prevalence: up to 10% of community elderly experience some form annually, but only 1 in 14 cases reported. Risk factors: caregiver stress/burnout, social isolation, cognitive impairment, dependency, substance abuse (caregiver or patient), caregiver mental illness, shared living situation. Screen: privately without caregiver present. Senior Aid Tool: ED screening instrument (sensitive, reasonably specific). Red flags: unexplained injuries/bruises in various stages, fear of caregiver, malnutrition despite adequate resources, poor hygiene, missed appointments, unusual financial activity, caregiver refusing to leave room. Self-neglect risk factors: age>75, lower SES. Israel: MANDATORY reporting to authorities. Adult Protective Services: can petition court for guardianship if patient lacks capacity. Team-based approach: social work + nursing + physician + law enforcement. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Elder abuse affects 2-10% of community-dwelling elderly; up to 50% in long-term care. Five types: physical abuse (10-15%), psychological abuse (10%), sexual abuse (1-2%), financial exploitation (5%), neglect (most common, 10-20%). Risk factors: cognitive impairment, depression, social isolation, dependence on caregiver, previous abuse, substance abuse by caregiver. Screening: Ask Screening Tool (Older Adult Abuse [KAER]: Are you safe? Has anyone touched you without permission? Are you frightened? Economically exploited?). Red flags: unexplained injuries, bruising in patterns, poor hygiene despite ability, fearfulness around caregiver, medication discrepancies, missing money/items, depression, delays in seeking care. Mandatory reporting laws: vary by state; most include healthcare providers as mandated reporters to Adult Protective Services. Documentation: detailed, non-judgmental documentation essential for legal proceedings; include location, pattern, victim's explanation, witness statements. Assessment: private conversation away from suspected abuser; screen for depression (50% of abuse victims), PTSD; medical exam for injuries. Interventions: safety planning (go-bag with documents, emergency contact), referral to social work, legal (restraining order, guardianship if necessary), financial institution alerts. Cultural sensitivity: honor cultural practices while protecting from harm; interpret words, not intent. Institutional abuse: facility staff abuse, restraint use, medication misuse. Long-term care regulations: minimum staffing ratios, background checks, incident reporting. Consequences of untreated abuse: increased morbidity, mortality, functional decline, caregiver burnout (ironically, abuse-stressed caregivers need support too)."},{"id":31,"topic":"Fitness to Drive","ch":"Hazzard, Takanah 12b","notes":"CDR ≥1 → formal driving assessment required (SOE=A). Patient self-rating of driving ability is NOT useful for identifying unsafe drivers (SOE=A, GRS). MMSE alone insufficient for driving decisions. AMA Physician's Guide to Assessing and Counseling Older Drivers: comprehensive functional battery. Trail Making Test Part B: sensitive for driving-relevant executive function. Report to מרב״ד (Medical Center for Road Safety), NOT to employer. Takanah 12b (Israeli regulation): mandatory reporting to licensing authority when physician determines patient poses IMMEDIATE DANGER on road. Vision requirements: corrected acuity <6/12 in better eye. Recurrent symptomatic hypoglycemia. Uncontrolled epilepsy. Severe Parkinson's with motor fluctuations. Sedating medications: must warn patient AND document. Physician liability if failure to report leads to accident. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Driving ability declines with age and medical conditions; 15-20% of those >70 years have functional limitations affecting driving. Assessment tools: Clock Drawing Test (CDT) screens for cognitive impairment (abnormal if >2 minutes or 4+ errors); Montreal Cognitive Assessment (MoCA) or Mini-Cog; Useful Field of View (UFOV) tests processing speed and divided attention. Conditions affecting driving: dementia (early stage: can drive, reassess 6 months; moderate: generally not safe; severe: definitely unsafe), Parkinson disease (tremor, rigidity less impairing than bradykinesia/postural instability), stroke (attention, visual field defects, motor control), cardiac arrhythmias (syncope risk), hypertension (if severe), diabetes (hypoglycemia unawareness dangerous), sleep apnea (excessive daytime somnolence), depression (concentration), medications (sedatives, anticholinergics). Vision requirements: 20/40 corrected vision, visual field >120 degrees, contrast sensitivity. Medications affecting driving: benzodiazepines (sedation, impaired reaction time), opioids (drowsiness, impaired judgment), anticholinergics (confusion, blurred vision), SSRIs (initially sedating), stimulants (may improve attention in ADHD). Functional driving assessment: occupational therapist-administered behind-wheel evaluation gold standard; identifies specific deficits and compensatory strategies. Physician role: assess capacity, counsel on risks, discuss alternatives (public transit, medical transport, community rides), document discussions. Legal considerations: duty to warn (varies by state); if unsafe, report to DMV (protects confidentiality); may need to report to patient and family. Alternative transportation: ride-sharing services, public transportation, senior centers, volunteer driver programs. Advanced age alone not basis for restriction; individualize based on functional ability."},{"id":32,"topic":"Guardianship","ch":"Israeli Law, Hazzard Ch 26","notes":"Legal Capacity and Guardianship Law (Israel): when person cannot make decisions for themselves. Types: guardian for person (health/daily decisions), property (financial), or both. Temporary or permanent court appointment. Medical opinion required. LEAST RESTRICTIVE alternative must be tried first. Continuing POA (ייפוי כוח מתמשך): appointed while person still competent, activated when capacity lost. PREFERRED over guardianship (l
