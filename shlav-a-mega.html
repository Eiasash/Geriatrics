ess restrictive, respects autonomy). Activated when: patient loses decision-making capacity (e.g., delirium during sepsis requiring emergency surgery). NOT activated when: patient is competent even if elderly/hard-of-hearing/disagrees with family. תשוש נפש (cognitively impaired for placement): patient walks around, gets lost, can't find way back → MEETS criteria. NOT: cooperative patient who agrees to institutional placement. NOT: acute delirium (reversible — treat first, then reassess). \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Guardianship is court-imposed legal arrangement where guardian makes decisions for incapacitated person (ward) who cannot make decisions. Types: full guardianship (all decisions), limited guardianship (specific decisions), conservatorship (finances only), power of attorney (voluntary, pre-incapacity). Capacity for purposes of guardianship: ability to understand health/safety decisions, appreciate consequences, express wishes, use logical reasoning. Standard of proof: clear and convincing evidence of incapacity (higher than preponderance, lower than beyond reasonable doubt). Procedures: petition to probate court, legal notice to alleged incapacitated person, right to attorney, hearing before judge, testimony about capacity. Alternatives to guardianship (preferred if possible): durable power of attorney (patient appoints agent while still capable), HIPAA authorization (allows healthcare information sharing), joint bank account, representative payee for Social Security. Rights of ward: still entitled to medical care, representation, due process, least restrictive alternative. Duties of guardian: act in ward's best interest, avoid conflicts of interest, make regular accountings to court, respect ward's preferences and values when known. Drawbacks: expensive ($2000-5000 court costs plus ongoing fees), invasive (public proceedings), irreversible, all-or-nothing (except limited guardianship). Abuse risk: some guardians exploit wards financially. Review: periodic court review required (varies by state); guardianship should terminate if capacity restored. Ethical considerations: respect autonomy even with cognitive impairment; least restrictive alternative preferred; shared decision-making when possible."},{"id":33,"topic":"Patient Rights Law","ch":"חוק זכויות החולה 1996","notes":"Core rights: Informed consent (explain diagnosis, options, risks, benefits in patient's language/comprehension level). Right to refuse ANY treatment — even life-saving — if competent (MUST document). Right to privacy and medical confidentiality (exceptions: legal requirement, public health). Right to access full medical records. Right to second opinion. Emergency exception: if patient incapacitated + life-threatening delay → treat without explicit consent (implied consent doctrine). Family CANNOT override a competent patient's wishes — even if family disagrees, patient's autonomy prevails. Minor's consent: generally parents consent, but minor can consent independently for certain conditions. Mental health: special protections under separate legislation. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Patient rights framework: dignity, privacy, autonomy, respect, access to care, grievance procedures. HIPAA (Health Insurance Portability and Accountability Act): federal law protecting health information privacy. Patient Selfetermination Act (PSDA) 1990: mandates healthcare facilities offer advance directives and discuss end-of-life preferences; applies to hospitals, nursing homes, hospice, HMOs. State laws vary significantly: consent laws, right-to-refuse-treatment, right-to-die statutes. Informed consent: right to full disclosure before treatment; exceptions in emergency when consent impossible. Right to refuse treatment: competent patient can refuse any treatment, even lifesaving; applies to transfusion (important in Jehovah's Witnesses), experimental drugs, surgery. Incompetent patient: surrogate must refuse based on substituted judgment (what patient would want) or best interests (what is objectively best). Confidentiality: physician-patient privilege legal in most states; exceptions include child/elder abuse, threats of serious harm, communicable disease. ADA (Americans with Disabilities Act): requires reasonable accommodations for disabilities; applies to healthcare access. Fair Housing Act: governs residential settings; applies to assisted living, memory care. Long-term care regulations: residents have rights to competent care, dignity, respect, freedom from abuse/restraint, participation in care decisions. Institutional review: ombudsman advocates for residents in long-term care; available to investigate complaints. Sexual rights of elderly: nursing home residents have right to sexual expression and privacy. Grievance procedures: required in all healthcare settings; must be expeditious, non-retaliation. Medical records access: patient right to inspect and copy medical records; right to request amendments and addendums. Billing rights: right to understand charges, request itemization, dispute billing errors. Advance directive validity: requirements vary by state (e.g., witness requirements, notarization); out-of-state directives may not be recognized; recommend addressing same-state validity in advance directive."},{"id":34,"topic":"Advance Directives","ch":"חוק החולה הנוטה למות 2005","notes":"Dying Patient Act (2005): applies when life expectancy ≤6 months and illness is irreversible. Patient can be declared 'dying' (נוטה למות) by two physicians. Withholding NEW treatment: permitted per patient's wishes or advance directive. Withdrawing ONGOING treatment: MORE RESTRICTED — timer mechanism for continuous treatments (e.g., ventilator set to cycle off and be re-evaluated). Advance directives (הנחיות מקדימות): must be in writing, witnessed by 2 witnesses, valid 5 years, renewable. Can appoint proxy decision-maker. Pain management: MUST provide adequate analgesia even if may hasten death (double effect doctrine — intention is symptom relief, not death). Cannot actively hasten death (euthanasia illegal in Israel). Palliative sedation: permitted for refractory symptoms at end of life. Physician-assisted suicide: not legal in Israel. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Advance Directive: legal document in which person (while competent) expresses wishes about future medical care if unable to communicate. Two main components: Living Will (specifies treatments wanted/unwanted) and Healthcare Power of Attorney/Proxy (designates surrogate). Living Will addresses: CPR, intubation, feeding tubes, mechanical ventilation, dialysis, antibiotics, comfort care only. Components of valid advance directive: (1) written document, (2) patient signature, (3) signed/dated, (4) witnessed (requirements vary by state; some require notarization), (5) clear, unambiguous language. POLST (Physician Orders for Life-Sustaining Treatment) form: medical order (not just document); signed by physician and patient; portable across settings; addresses resuscitation status (full resuscitation/limited interventions/comfort measures), level of care (full treatment/limited acute/palliative). Differences from advance directive: POLST is actionable physician order, advance directive is statement of wishes (physician must write orders based on it). Healthcare proxy: designated person (must accept role) to make medical decisions if patient unable. Proxy selection considerations: knows patient's values, willing to advocate, available, not conflicted. Discussion before crisis: ideally done when patient healthy and thinking clearly; enables clarification of wishes. Updated regularly: circumstances change; review annually or if major life event. Completion: many forms available (state-specific); discuss with family and healthcare provider; copy to all clinicians; consider wallet card with key directives; some states have registry. Limitations: cannot request illegal activity or hastening death (except in jurisdictions with medical aid in dying); cannot override surrogate decision-making authority (once incapacitated). Revocation: patient can always change/revoke advance directive; can override it verbally if still competent. Non-compliance: if physician unwilling to honor advance directive, obligation to inform patient and assist transfer to willing physician. Conflicts: if living will and proxy disagree, proxy's interpretation typically prevails."},{"id":35,"topic":"Community & Long-Term Care","ch":"Hazzard Ch 16-17, Brookdale","notes":"Models: home care (most preferred by patients), adult day centers (social + medical monitoring + respite), assisted living, nursing homes (skilled nursing + rehabilitation). Hospital-at-home: substitute for acute hospital admission — shown to reduce costs + improve quality (SOE=A, Hazzard). CAPABLE program (OT + nurse + handyperson): reduces disability and inpatient costs. MIND at Home: dementia care coordination with community health workers — reduces costs. Preventive home visits: identify hidden risks in community-dwelling elderly. Israeli system: Kupat Holim provides primary care, Bituach Leumi (social security) for nursing/home care benefits. Geriatrician assessment required for home services eligibility in age ≥90 (Israeli policy). COVID-19: devastating impact on nursing homes — highlighted need for infection control, staffing, telehealth, advance care planning in LTC facilities. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Long-term care (LTC) settings: independent living (no care services), assisted living (ADLs help), intermediate care (daily nursing), skilled nursing facility (SNF, Medicare-covered rehab), continuing care retirement communities (CCRC, all levels in one location). Continuum approach: match level of care to functional/cognitive status; transitions as needs change. Home care: professional (nursing, PT/OT, aide services) and informal (family); most elderly prefer aging-in-place. Program of All-Inclusive Care for Elderly (PACE): integrated managed care serving frail elderly; enrollment criteria typically age >55, Medicaid/Medicare eligible, nursing home level of care needs; all services (medical, social, transportation) provided. Assessments in LTC: Minimum Data Set (MDS) required in nursing homes; functional status (ADLs/IADLs), cognitive status, behavioral symptoms, medical conditions. Care planning: multidisciplinary team (physician, RN, social worker, family) develops individualized plan. Staffing requirements: vary by state; nursing home minimum 1:4 RN to resident ratio, varies for aides. Quality indicators: infection rates, hospital readmission, antipsychotic use, restraint use, pressure ulcers, pain management, care processes (medications, assessments). CMS surveying: annual unannounced surveys, state-specific surveyors; violations result in fines, mandatory corrections, potential loss of certification. Transitions of care: discharge planning, medication reconciliation, communication between settings critical; high readmission risk first 30 days post-discharge. Advance directives in LTC: must be addressed on admission; facility must honor resident wishes. Rehabilitation potential: not all LTC is permanent; some residents discharged home after recovery. Social aspects: visiting, activities programming, spiritual care important to quality of life. Cost: nursing home ~$100,000/year (varies regionally); many bankrupted by LTC costs; Medicaid covers only after assets depleted; long-term care insurance rare."},{"id":36,"topic":"Rehabilitation","ch":"Hazzard, Israeli Rehab Criteria","notes":"FIM (Functional Independence Measure): 18 items (13 motor + 5 cognitive), score 18-126. Motor FIM gain = primary outcome measure. Required for Israeli rehabilitation admission criteria (אמות מידה). Rehab eligibility: must have rehabilitation potential, medical stability, ability to participate (tolerate ~3h/day therapy), identified goals. Hip fracture: surgery within 48h, early mobilization day 1 postop with weight-bearing as tolerated (do NOT restrict to partial weight-bearing — evidence does not support delayed mobilization, SOE=B). Orthogeriatric co-management: fewer complications, shorter stays, lower costs, improved function (SOE=A). Stroke: early rehab (within 24-48h when stable) improves outcomes. Cardiac rehab: beneficial even in elderly with HF. Deconditioning: early mobilization in hospital prevents — hospital-acquired disability is common and preventable. Walking aids: cane on OPPOSITE side of pathology. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Rehabilitation goal: maximize functional independence and quality of life after illness/injury. Indications: stroke, hip fracture, cardiac event, pulmonary disease, joint replacement, amputation, spinal cord injury, general deconditioning. Setting: inpatient (hospital, rehabilitation facility), outpatient (clinic, home-based). Functional assessment: ADLs (bathing, dressing, toileting, feeding, continence, mobility), IADLs (cooking, laundry, finances, medication management), ambulation, cognition. FIM (Functional Independence Measure) scale: rates 18 domains from 1 (total assistance) to 7 (complete independence). Post-acute care timing: acute rehabilitation facility (ARF) for intensive therapy (3+ hours daily), skilled nursing facility (SNF) for moderate therapy, home health/outpatient for lower-intensity. Physical therapy: strengthening, balance, gait training, assistive device training (walker, cane, wheelchair); addresses fall prevention. Occupational therapy: ADL/IADL training, adaptive equipment, home modifications (grab bars, ramps, accessible bathroom). Speech/language pathology: swallowing assessment (dysphagia), speech therapy if aphasia/dysarthria. Psychological support: depression common post-stroke/MI/amputation (20-30% develop major depression); early intervention improves outcomes. Cognitive rehabilitation: memory strategies, problem-solving, executive function training; benefit limited in dementia. Cardiac rehabilitation: supervised exercise, education, risk factor modification post-MI/revascularization; improves outcomes and reduces mortality by 20%. Pulmonary rehabilitation: exercise training, breathing techniques, disease education; improves dyspnea and exercise tolerance even in COPD. Neuroplasticity: brain's ability to rewire after stroke; optimal window 3-6 months but improvement possible years out with intensive therapy. Prognosis: depends on severity, age, cognition, comorbidities, motivation; elderly achieve functional gains similar to younger if adequate rehabilitation provided. Discharge planning: assess safety, arrange equipment/home services, caregiver training, follow-up. Return to work: many elderly not employed; focus on ADLs/community reintegration instead."},{"id":37,"topic":"Vision & Hearing","ch":"Hazzard Ch 33-34","notes":"Presbycusis (age-related hearing loss): HIGH-frequency loss first → difficulty distinguishing consonants. Words with high-frequency sounds (like 'גלידה' with hard 'ג') harder to hear than low-frequency words ('שלום'). Screening: whispered voice test at 2 feet, audiometry. Hearing aids: underutilized despite proven benefit for communication, cognition, social engagement. Lancet 2020 Commission: HEARING LOSS = #1 modifiable midlife risk factor for dementia. AMD (age-related macular degeneration): leading cause of irreversible vision loss >65y. Dry (atrophic): 90% of cases, gradual central vision loss, drusen. Wet (neovascular): anti-VEGF injections (ranibizumab, bevacizumab, aflibercept). Cataracts: most common cause of reversible visual impairment; surgery highly effective, can be done under local anesthesia. Glaucoma: screen IOP + optic disc; open-angle most common; treat with prostaglandin analogs (latanoprost). Low vision rehabilitation: magnifiers, contrast enhancement, lighting optimization. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Vision changes with aging: presbyopia (decline in accommodation) by age 50 makes reading difficult without glasses; reduced pupil size reduces retinal illumination by 2-3x at age 60 vs 20; increased lens yellowing reduces blue color perception. Cataracts: cloudiness of lens; affects 50% by age 65, 75% by age 85; causes progressive blurring, glare, reduced night vision; treatment is surgery when visually significant; artificial intraocular lens now standard. Glaucoma: elevated intraocular pressure (>21 mmHg) damages optic nerve; affects 3-4% of those >60 years; often asymptomatic until significant vision loss (silent thief of sight); screening with tonometry, optic nerve appearance; treatment with prostaglandin analogs (latanoprost), beta-blockers (timolol), carbonic anhydrase inhibitors (dorzolamide), alpha-agonists, oral agents if drops fail; goal is IOP reduction by 20-30%. Age-related macular degeneration (AMD): leading cause of blindness in elderly >65; affects central vision. Dry AMD (80%): drusen deposits; loss of photoreceptors; no treatment proven effective, though zinc/antioxidants sometimes recommended. Wet AMD (20%): choroidal neovascularization; worse prognosis; anti-VEGF injections (bevacizumab, ranibizumab, aflibercept) mainstay; monthly injections. Diabetic retinopathy: affects 1/3 of diabetics; screening with dilated eye exam annually; treatment with laser, anti-VEGF, vitrectomy if macular edema/proliferation. Visual impairment impact: falls (3x increased risk), depression, cognitive decline, driving cessation, reduced independence. Hearing loss affects 65% of those >70 years; conductive hearing loss (cerumen impaction, otosclerosis) often correctable; sensorineural hearing loss (noise exposure, aging, genetics) usually irreversible. Age-related hearing loss (presbycusis): bilateral symmetrical high-frequency loss; often associated with tinnitus; leads to social isolation if untreated. Screening: simple question 'Do you feel you have a hearing problem?'; Whisper Test or Weber/Rinne examination; formal audiometry if impairment suspected. Cerumen impaction: extremely common; simple removal (curette, irrigation) improves hearing dramatically. Hearing aids: appropriate if pure-tone average >30 dB; newer devices have directional microphones, telecoils, Bluetooth; acceptance rates ~20% due to stigma, cost, difficulty with insertion/battery changes in arthritic hands. Cochlear implant: for severe-to-profound bilateral hearing loss not helped by aids; surgery with good outcomes in selected elderly. Communication strategies: face patient, speak clearly (don't shout), reduce background noise, written communication if needed. Hearing loss and cognitive impairment: hearing loss associated with accelerated cognitive decline; hearing aid use may slow progression."},{"id":38,"topic":"Perioperative Care","ch":"Hazzard Ch 28, Washington Manual","notes":"CGA pre-op improves cancer surgery outcomes. Hip fracture: surgery within 48h — delay in otherwise stable patients worsens outcomes (SOE=B). Unnecessary preoperative cardiac testing may itself be an independent risk factor for complications in hip fracture (delays surgery). ACC/AHA 2014 periop guidelines: continue beta-blockers if already taking (SOE=B), do NOT start on day of surgery. Pre-op: Revised Cardiac Risk Index (Lee index). Dementia DOUBLES post-op delirium risk (56% vs 26%, GRS). Diabetes doubles perioperative complications. Delirium prevention: HELP protocol, avoid anticholinergics, early catheter removal, family presence, sleep hygiene. DVT prophylaxis: mandatory (LMWH or fondaparinux). Medication management: hold metformin 48h pre-op, sulfonylureas morning of, basal insulin at 50% dose, hold ACEi/ARB morning of surgery (hypotension risk under anesthesia). DES stent: maintain dual antiplatelet per cardiology guidance (minimum 6-12mo). Hypothermia prevention: forced-air warming. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Preoperative evaluation: comprehensive history/physical focusing on cardiac (CAD, arrhythmia, HF), pulmonary (COPD, OSA, aspiration risk), metabolic (diabetes, renal disease). Cardiac risk: estimate with revised cardiac risk index (RCRI); major predictors include CAD, HF, cerebrovascular disease, diabetes, renal disease; surgery type matters (vascular surgery highest risk). Testing: EKG if age >65 or cardiac risk factors; further testing (stress test, echo) only if abnormal findings or high-risk surgery planned. Medications pre-op: continue beta-blockers, ACE-I/ARB, statins perioperatively; hold anticoagulants per guidelines (warfarin 3-5 days pre-op, DOACs 24-48 h pre-op, aspirin usually continued); metformin hold day of surgery if significant renal impairment or volume contrast planned; NSAIDs avoided. Anesthesia: type chosen by anesthesiologist; regional (spinal, epidural) reduces delirium risk compared to general anesthesia in some studies; spinal anesthesia contraindicated if thrombocytopenia, coagulopathy, or bacteremia. Antibiotic prophylaxis: cefazolin (gram-positive coverage) 1-2g IV at induction; redose if >2 hours surgery; d/c within 24h post-op (48h for cardiac surgery). DVT prophylaxis: mechanical (sequential compression devices, early mobilization) and/or pharmacologic (enoxaparin SC, warfarin, fondaparinux, rivaroxaban) depending on surgery type and bleeding risk. Glucose control: target 140-180 mg/dL; tight control (<110) increases hypoglycemia risk; insulin infusion often used in hospital. Delirium prevention: modifiable risk factors include avoiding benzodiazepines (use anticholinergic instead), optimizing oxygenation, maintaining sleep-wake cycle, early mobilization, minimizing medications, addressing pain. Delirium incidence: 10-15% post-op in general surgery, 50% post-op in major vascular surgery; worse prognosis if prolonged. Pain management: multimodal analgesia (regional block, opioid, non-opioid); caution with opioids due to respiratory depression, constipation, delirium risk. Complications: pneumonia (incentive spirometry, early mobilization reduce risk), ileus (oral intake as tolerated), infection, bleeding, thromboembolic disease. Discharge planning: assess functional status, arrange rehabilitation if needed, ensure medication reconciliation, VTE prophylaxis at discharge if appropriate."},{"id":39,"topic":"Geriatric Emergency Medicine","ch":"Hazzard Ch 15","notes":"Atypical presentations: MI without chest pain (up to 40% in >75y), infection without fever, appendicitis without classic RLQ pain, PE without tachycardia. Delirium as presenting complaint for UTI, pneumonia, MI, medication toxicity, constipation. Polypharmacy: common cause of ED visits (adverse drug events). Falls: #1 injury-related ED visit in elderly. Screening tools: CAM/4AT for delirium, ISAR (Identification of Seniors at Risk) for adverse outcomes. EQUiPPED protocol: pharmacist + physician education reduces Beers-listed prescribing in ED. Beers criteria: may have different risk-benefit in short-term ED prescriptions vs chronic use. Disposition: CGA-based ED assessment reduces readmissions. Observation units useful for elderly with syncope, HF exacerbation, chest pain rule-out. Typhlitis: neutropenic cecal inflammation in chemo patients (5-FU classic) — presents like appendicitis but requires medical (not surgical) management. Senior Aid Tool: ED screening for elder abuse. \n\n📖 HAZZARD\'S 8e BOARD PEARLS: Geriatric emergency presentations: atypical; serious illness may present subtly without classic symptoms. Delirium: most common acute alteration in mental status in ED; assess with CAM-ICU or 4AT score; causes include infection (UTI, pneumonia), medication (anticholinergics, benzodiazepines, opioids), metabolic (hyponatremia, hypoxia, hypoglycemia), stroke, MI. Falls: 25% of community-dwelling elderly fall annually; 50% of nursing home residents fall; risk factors include weakness, balance disorder, cognitive impairment, medications (psychotropics, antihypertensives), home hazards. Syncope: 48% of elderly with syncope are due to orthostatic hypotension, 20% cardiac (arrhythmia, aortic stenosis, MI), 10% seizure, remainder unclear; workup includes orthostatic vital signs, EKG, troponin if concerning features. Acute coronary syndrome: atypical presentations common (dyspnea, confusion, syncope without chest pain); troponin more sensitive than EKG; aggressive antiplatelet therapy/anticoagulation appropriate even in very elderly if fit. Sepsis: diagnostic challenge; criteria (qSOFA score) less specific in elderly; inflammatory markers elevated even with minor infection; aggressive early antibiotics, fluid resuscitation, vasopressors if needed. Stroke/TIA: thrombolytic therapy window 4.5 h for IV-tPA; mechanical thrombectomy up to 24h if core mismatch; time-dependent; CT scan to rule out hemorrhage. Acute kidney injury: causes include dehydration, nephrotoxic medications (NSAIDs, ACE-I), contrast exposure, sepsis; prerenal AKI improves with hydration; intrinsic AKI requires renal-protective measures; postrenal AKI requires decompression. Medication errors: common in ED; elderly on multiple drugs at baseline; polypharmacy complicates treatment; avoid anticholinergics, benzodiazepines if possible. Disposition: admission vs discharge depends on functional status, living situation, support system; early palliative medicine consultation appropriate if trajectory decline. Avoiding unnecessary admission: brief observation unit appropriate for some presentations; clear safety plan essential if discharged."}];
const DRUGS=[{"name":"Oxybutynin","heb":"דיטרופן","acb":3,"beers":true,"cat":"Anticholinergic/Bladder","risk":"Cognitive decline, delirium, falls, constipation, urinary retention. Opposes donepezil."},{"name":"Diphenhydramine","heb":"","acb":3,"beers":true,"cat":"Antihistamine","risk":"Sedation, delirium, falls, anticholinergic toxicity"},{"name":"Amitriptyline","heb":"אלאטרול","acb":3,"beers":true,"cat":"TCA","risk":"Strong anticholinergic, cardiac conduction, orthostatic hypotension, sedation"},{"name":"Chlorpromazine","heb":"לרגקטיל","acb":3,"beers":true,"cat":"Antipsychotic","risk":"High anticholinergic, sedation, orthostatic, EPS"},{"name":"Paroxetine","heb":"פקסט","acb":2,"beers":true,"cat":"SSRI","risk":"Most anticholinergic SSRI. Hyponatremia, drug interactions (CYP2D6)"},{"name":"Olanzapine","heb":"זיפרקסה","acb":3,"beers":false,"cat":"Antipsychotic","risk":"STRONGEST anticholinergic among common antipsychotics. Weight gain, metabolic syndrome"},{"name":"Diazepam","heb":"וליום","acb":1,"beers":true,"cat":"Benzodiazepine","risk":"Long-acting. Falls, sedation, cognitive impairment, paradoxical agitation"},{"name":"Zolpidem","heb":"סטילנוקס","acb":0,"beers":true,"cat":"Sedative-hypnotic","risk":"Falls, confusion, complex sleep behaviors, fractures"},{"name":"Temazepam","heb":"נורמיסון","acb":1,"beers":true,"cat":"Benzodiazepine","risk":"Falls, sedation, next-day impairment"},{"name":"Glyburide","heb":"גלי-ב","acb":0,"beers":true,"cat":"Sulfonylurea","risk":"Prolonged hypoglycemia (long half-life, active metabolites). Use glipizide instead"},{"name":"Megestrol","heb":"מגייס","acb":0,"beers":true,"cat":"Progestational","risk":"Thrombotic events, minimal appetite benefit, fluid retention, adrenal suppression"},{"name":"Doxazosin","heb":"קדקס","acb":0,"beers":true,"cat":"Alpha-blocker","risk":"Orthostatic hypotension → falls. Not first-line for HTN"},{"name":"Metoclopramide","heb":"פראמין","acb":0,"beers":true,"cat":"Prokinetic","risk":"EPS, tardive dyskinesia (risk increases with duration). Max 12 weeks"},{"name":"Sliding-scale insulin","heb":"","acb":0,"beers":true,"cat":"Insulin","risk":"Reactive dosing without proactive management. Hypoglycemia risk"},{"name":"Meperidine","heb":"דמרול","acb":0,"beers":true,"cat":"Opioid","risk":"Neurotoxic metabolite (normeperidine) → seizures. NEVER use in elderly"},{"name":"Donepezil","heb":"אריספט","acb":0,"beers":false,"cat":"Cholinesterase inhibitor","risk":"GI side effects (take with food, NOT on empty stomach). Does NOT prevent postop delirium"},{"name":"Haloperidol","heb":"הלדול","acb":1,"beers":false,"cat":"Antipsychotic","risk":"EPS, QTc prolongation. Lower anticholinergic than olanzapine"},{"name":"Quetiapine","heb":"סרוקוול","acb":1,"beers":false,"cat":"Antipsychotic","risk":"Sedation, orthostatic, metabolic. Moderate anticholinergic"},{"name":"Risperidone","heb":"ריספרדל","acb":0,"beers":false,"cat":"Antipsychotic","risk":"EPS at higher doses, orthostatic. Low anticholinergic"},{"name":"Metformin","heb":"גלוקופאג","acb":0,"beers":false,"cat":"Biguanide","risk":"CI if CrCl<30. Lactic acidosis rare. Causes anorexia/weight loss in thin elderly. Hold 48h pre-op"},{"name":"Alendronate","heb":"פוסלן","acb":0,"beers":false,"cat":"Bisphosphonate","risk":"Esophagitis (take upright with water). CI in reflux esophagitis → use denosumab"},{"name":"Apixaban","heb":"אליקוויס","acb":0,"beers":false,"cat":"DOAC","risk":"Safest DOAC in CKD. CI with mechanical valves. Dose reduce if ≥2: age≥80, weight≤60kg, Cr≥1.5"},{"name":"Sertraline","heb":"לוסטרל","acb":0,"beers":false,"cat":"SSRI","risk":"Hyponatremia risk (like all SSRIs). Generally safe in elderly. Low anticholinergic"},{"name":"Bupropion","heb":"ולבוטרין","acb":0,"beers":false,"cat":"Antidepressant","risk":"LOWEST hyponatremia risk among antidepressants. Seizure risk at high doses. Activating"},{"name":"Mirtazapine","heb":"רמרון","acb":1,"beers":false,"cat":"Antidepressant","risk":"Sedation (good if insomnia), weight gain (good if anorexic). Monitor metabolic"},{"name":"Nitrofurantoin","heb":"מקרודנטין","acb":0,"beers":true,"cat":"Antibiotic","risk":"Avoid if CrCl<30: pulmonary toxicity, peripheral neuropathy, hepatotoxicity"},{"name":"Nifedipine IR","heb":"נפידיפין","acb":0,"beers":true,"cat":"CCB (short-acting)","risk":"Reflex tachycardia, hypotension, risk of CV events. Use long-acting formulations instead"},{"name":"Cyclobenzaprine","heb":"","acb":2,"beers":true,"cat":"Muscle relaxant","risk":"Anticholinergic, sedation, falls, ineffective for spasticity in elderly. Avoid >2 weeks"},{"name":"Methocarbamol","heb":"","acb":1,"beers":true,"cat":"Muscle relaxant","risk":"Sedation, dizziness, falls. Limited efficacy. Avoid in elderly"},{"name":"Promethazine","heb":"פנרגן","acb":3,"beers":true,"cat":"Antihistamine (1st gen)","risk":"Strong anticholinergic, sedation, EPS, falls, delirium. Avoid in elderly"},

{name:"Prazosin",heb:"פרזוסין",beers:true,acb:0,cat:"Alpha-blocker",risk:"Orthostatic hypotension, syncope, falls. Beers: avoid as antihypertensive. High first-dose syncope risk."},

{name:"Carisoprodol",heb:"קריסופרודול",beers:true,acb:0,cat:"Muscle Relaxant",risk:"Sedation, dependence potential, anticholinergic effects. Metabolized to meprobamate (anxiolytic). Beers: avoid."},
{name:"Trimethobenzamide",heb:"טרימתובנזמיד",beers:true,acb:0,cat:"Antiemetic",risk:"Extrapyramidal effects, limited efficacy. Beers: avoid. One of least effective antiemetics."},
{name:"Ibuprofen",heb:"איבופרופן",beers:true,acb:0,cat:"NSAID",risk:"GI bleeding (3-4x risk in elderly), AKI, HTN, HF exacerbation. Avoid with anticoagulants, CKD, HF. Max 5 days if used."},
{name:"Ferrous Sulfate >325mg",heb:"ברזל גופרתי",beers:true,acb:0,cat:"Supplement",risk:"Constipation, nausea. Doses >325mg/day do not increase absorption but increase side effects. Beers: avoid high doses."},
{name:"Nitrazepam",heb:"ניטרזפם",beers:true,acb:0,cat:"Benzodiazepine",risk:"Long-acting benzo. Falls, fractures, cognitive impairment, delirium. Beers: avoid all benzos in elderly."},
{name:"Chlordiazepoxide",heb:"כלורדיאזפוקסיד",beers:true,acb:0,cat:"Benzodiazepine",risk:"Long half-life (24-48h). Accumulation in elderly, prolonged sedation, falls. Beers: avoid."},
{name:"Trihexyphenidyl",heb:"טריהקסיפנידיל",beers:true,acb:3,cat:"Anticholinergic",risk:"Strong anticholinergic for Parkinson's. Confusion, hallucinations, urinary retention, constipation. ACB=3. Avoid in elderly."},
{name:"Benztropine",heb:"בנזטרופין",beers:true,acb:3,cat:"Anticholinergic",risk:"Anticholinergic for EPS. Cognitive impairment, urinary retention, constipation. ACB=3. Beers: avoid. Use lower risk alternatives."},
{name:"Desipramine",heb:"דסיפרמין",beers:true,acb:1,cat:"TCA",risk:"Less anticholinergic than amitriptyline but still risky: orthostatic hypotension, cardiac conduction delays. Beers: avoid."},
{name:"Nortriptyline",heb:"נורטריפטילין",beers:true,acb:1,cat:"TCA",risk:"Secondary amine TCA — less anticholinergic but still: orthostatic hypotension, QT prolongation. Beers: avoid. SNRI preferred."},
{name:"Insulin (sliding scale only)",heb:"אינסולין מדרג",beers:true,acb:0,cat:"Antidiabetic",risk:"Sliding scale alone = poor glycemic control + hypoglycemia risk. Beers: avoid without basal insulin. A1c targets should be relaxed in frail elderly."},
{name:"Propoxyphene",heb:"פרופוקסיפן",beers:true,acb:0,cat:"Opioid",risk:"Withdrawn in many countries. Cardiac toxicity, seizures, minimal analgesic benefit. Beers: avoid. Use paracetamol or low-dose opioids instead."},
{name:"Pentazocine",heb:"פנטזוצין",beers:true,acb:0,cat:"Opioid",risk:"Mixed agonist-antagonist. CNS effects including confusion, hallucinations. Beers: avoid."},
{name:"Ticlopidine",heb:"טיקלופידין",beers:true,acb:0,cat:"Antiplatelet",risk:"Safer alternatives exist (clopidogrel). Neutropenia, TTP risk. Beers: avoid."},
{name:"Tolterodine",heb:"טולטרודין",beers:true,acb:3,cat:"Anticholinergic",risk:"Anticholinergic for OAB. Dry mouth, constipation, confusion in elderly. ACB=3. Consider mirabegron as alternative."},
{name:"Solifenacin",heb:"סוליפנצין",beers:true,acb:3,cat:"Anticholinergic",risk:"Antimuscarinic for OAB. Cognitive effects, constipation, dry mouth. ACB=3. Beers: avoid if possible."}

const FLASH=[{"f":"CAM Criteria (4 features)","b":"1) Acute onset/fluctuating 2) Inattention 3) Disorganized thinking 4) Altered consciousness. Need 1+2 plus 3 or 4. Sensitivity 94-100%"},{"f":"Fried Frailty Phenotype","b":"≥3/5: weight loss >4.5kg, exhaustion, low activity, slow gait <0.8m/s, weak grip M<27/F<16. Pre-frail (1-2) is REVERSIBLE"},{"f":"HELP Protocol — 6 targets","b":"Cognitive impairment, Sleep deprivation, Immobility, Visual impairment, Hearing impairment, Dehydration. Reduces delirium 40%"},{"f":"HbA1c targets by frailty","b":"Healthy: <7%. Complex: 7.5-8%. Frail/limited life: 8-8.5% (VA/DoD: 8-9% NH). Macrovascular benefit takes 8 YEARS"},{"f":"ACCORD trial key finding","b":"Intensive glycemic control (A1c<6%) caused EXCESS MORTALITY. Study stopped early. Don't over-treat elderly diabetes"},{"f":"Beers — Prescribing Cascade","b":"Donepezil → urinary incontinence → Fesoterodine (anticholinergic opposing cholinesterase inhibitor!)"},{"f":"CrCl trap","b":"Cr 1.0 in 75yo 55kg woman = CrCl only 27ml/min by Cockcroft-Gault. NEVER rely on serum Cr alone in elderly"},{"f":"FRAX key fact","b":"Can predict fracture risk WITHOUT BMD (AUC 0.88 vs 0.86 with). Treat if hip ≥3% or major ≥20%"},{"f":"Denosumab — key advantage + risk","b":"SAFE in CKD (unlike bisphosphonates). BUT: REBOUND vertebral fractures if stopped. Anti-RANKL monoclonal Ab"},{"f":"DLB Core Features (McKeith)","b":"Fluctuating cognition + Visual hallucinations + Spontaneous parkinsonism + REM behavior disorder. Systemic delusions NOT core"},{"f":"Mitchell — Advanced Dementia Complications","b":"Most common: eating problems + infections. NG/PEG does NOT improve outcomes. Prognosis <6mo: FAST 7C + complications"},{"f":"Lancet 2020 — #1 midlife risk for dementia","b":"HEARING LOSS is the most significant modifiable midlife risk factor for dementia"},{"f":"CDR and Driving","b":"CDR ≥1 → formal driving assessment (SOE=A). Self-rating NOT useful (SOE=A). Report to מרב״ד"},{"f":"Hip Fracture — Delirium Risk","b":"Dementia DOUBLES delirium risk (56% vs 26%). Time ER→OR is only significant predictor in dementia patients"},{"f":"SPRINT HTN Target","b":"SBP <120 in ≥75y reduces CV events and mortality. But individualize for frail (falls risk from overtreatment)"},{"f":"HFrEF Quad Therapy","b":"ACEi/ARNI + Beta-blocker + MRA + SGLT2i. Carvedilol preferred over propranolol. Digoxin ↓hospitalization but NOT mortality"},{"f":"DOACs vs Warfarin in AF","b":"DOACs preferred (lower ICH). Apixaban safest in CKD. MECHANICAL VALVE = warfarin ONLY. Severe mitral stenosis = warfarin"},{"f":"Pressure Ulcer Staging (NPUAP)","b":"I: non-blanchable redness. II: blister/shallow. III: into subcut. IV: bone/tendon visible. Unstageable: eschar covers"},{"f":"Pressure Ulcer Dressings","b":"Hydrocolloid: minimal exudate stage III. Alginate: moderate-heavy exudate. Transparent film: friction stage I-II. Wet-to-dry: NEVER"},{"f":"Braden Scale","b":"Pressure injury risk. ≤12 = high risk. Prevention: specialized foam mattress (SOE=B), q2h repositioning, nutrition"},{"f":"Urinary Incontinence — First Line","b":"Behavioral therapy + Kegel exercises (SOE=A). Freeze-and-squeeze for urgency. Oral estrogen WORSENS incontinence (SOE=A)"},{"f":"Immunosenescence Key Changes","b":"↓Neutrophil chemotaxis (NOT ↓phagocytosis). ↓Naive T cells. ↑Memory T cells. ↓T cell diversity. Inflammaging (↑baseline cytokines)"},{"f":"Dying Patient Act (Israel 2005)","b":"≤6mo life expectancy. Withholding OK. Withdrawing restricted (timer). Advance directives 5yr. Double effect OK. No euthanasia"},{"f":"Continuing POA (ייפוי כוח מתמשך)","b":"Preferred over guardianship. Activated when capacity lost (e.g., delirium in sepsis). NOT when patient competent but hard-of-hearing"},{"f":"FIM Score","b":"18 items (13 motor + 5 cognitive). Score 18-126. Required for Israeli rehab admission criteria. Motor FIM gain = primary outcome"},{"f":"Residual Volume and Aging","b":"RV INCREASES with aging (air trapping). FVC, FEV1, DLCO all decrease. FEV1/FVC ratio may OVERDIAGNOSE COPD in elderly — use LLN"},{"f":"ABCD2 Score (TIA→CVA risk)","b":"Age≥60(1) + BP≥140/90(1) + Clinical(speech 1, weakness 2) + Duration(10-59m=1, ≥60m=2) + Diabetes(1). ≥4 = high risk"},{"f":"Tumor Lysis Syndrome","b":"Post-chemo (esp AML): ↑Phosphate, ↑Potassium, ↑Uric acid, ↓Calcium. NOT hypercalcemia or hyperglycemia"},{"f":"Cancer-Infection Associations","b":"AML→Pneumocystis. Colon CA→Strep bovis. Multiple myeloma→encapsulated organisms. Hodgkin's→cell-mediated defects"},{"f":"Aminoglycoside Nephrotoxicity","b":"TUBULAR damage (not glomerular). Can appear up to 1 WEEK after stopping. Depends on drug LEVELS, not dose alone"},{"f":"Aortic Stenosis — Pulse Pressure","b":"As AS progresses, pulse pressure NARROWS (not widens). LVH on ECG common. Severe = echo q6-12mo. Surgery when symptomatic"},{"f":"Olanzapine — Key ACB Fact","b":"STRONGEST anticholinergic effect among common antipsychotics. Stronger than haloperidol, quetiapine, risperidone"},{"f":"Melatonin Facts","b":"Helps sleep onset. Can help RBD in Parkinson's. NO withdrawal syndrome. Benzos increase endogenous melatonin → don't combine"},{"f":"Presbycusis Pattern","b":"HIGH-frequency loss first → difficulty with consonants. 'גלידה' (ג sound) harder than 'שלום' (lower frequencies)"},{"f":"GDS-15 Cutoff","b":"≥5 = positive screen for depression. GDS-15 is the standard geriatric depression screening tool"},{"f":"MNA Cutoff","b":"≤11 = malnourished. Mini Nutritional Assessment. Pre-albumin better than albumin for acute nutritional changes"},{"f":"COVID Triage Criteria (Israel)","b":"Prioritized by BIOLOGICAL age + function + comorbidity burden. NOT chronological age alone"},{"f":"תשוש נפש Definition","b":"Patient who walks but loses way, can't return = meets criteria. NOT: cooperative patient agreeing to placement. NOT: acute delirium"},{"f":"Walking Stick — Which Side?","b":"CONTRALATERAL (opposite) side to pathology. Reduces joint loading on affected side"},{"f":"Why are DOACs preferred over warfarin in elderly AF?","b":"Lower intracranial hemorrhage risk, no routine INR monitoring, fewer drug/food interactions. Apixaban preferred in CKD (safe to GFR 25). Exception: mechanical valves and severe mitral stenosis require warfarin."},{"f":"SGLT2 inhibitor mechanism and geriatric benefits","b":"Block sodium-glucose cotransporter-2 in proximal tubule → glucosuria, BP↓, weight↓. In HFrEF reduce hospitalization/mortality independent of diabetes. Caution: genital mycotic infections, volume depletion."},{"f":"Bisphosphonate mechanism of action","b":"Inhibit osteoclast farnesyl pyrophosphate synthase (mevalonate pathway) → osteoclast apoptosis → reduced bone resorption. Oral: upright 30min post-dose. IV zoledronic acid avoids GI side effects."},{"f":"Cholinesterase inhibitors: mechanism and limits","b":"Inhibit acetylcholinesterase → ↑synaptic ACh. Modest benefit in Alzheimer's (ADAS-cog ~2.5pts). NO disease-modifying effect. SE: bradycardia, nausea, urinary incontinence — prescribing cascade with anticholinergics."},{"f":"Melatonin receptor agonists vs. benzodiazepines for elderly insomnia","b":"Melatonin/ramelteon act on MT1/MT2 → circadian phase shift; no dependence, no falls risk. Benzos potentiate GABA-A → tolerance, rebound insomnia, and doubled fall/fracture risk in elderly."},{"f":"Israel Patient Rights Law (1996) — key provisions","b":"Rights to: information, informed consent, privacy, dignity, continuity of care. Competent patient may refuse ANY treatment. Minors ≥14 may consent to certain treatments. Physician must document refusal."},{"f":"Advance Directives (הנחיות מקדימות) — requirements","b":"Under Dying Patient Act 2005: written, signed, witnessed by physician + one witness. Valid 5 years (renewable). Applies when ≤6mo prognosis AND patient loses capacity. Appoints healthcare proxy (ממנה)."},{"f":"Guardianship vs. Continuing POA in Israel","b":"Guardianship requires court appointment — last resort. Continuing POA (ייפוי כוח מתמשך, 2016 law) is pre-planned, activates upon capacity loss, covers medical+financial+personal. Always prefer POA."},{"f":"Israel Mandatory Reporting of Elder Abuse","b":"Healthcare workers, social workers MANDATED to report suspected abuse/neglect of adults to social services, even without patient consent. Failure to report is criminal. Covers physical, emotional, financial, sexual abuse."},{"f":"Israel Dying Patient Act — withholding vs. withdrawing","b":"Withholding new treatment permitted with consent. Withdrawing ongoing continuous treatment restricted — requires ethical committee + timer mechanism. Double-effect (opioids for comfort) legally permitted. Euthanasia PROHIBITED."},{"f":"MoCA cutoff for cognitive impairment","b":"≤25/30 = cognitive impairment. +1 point if ≤12yr education. Sensitivity ~90% for MCI. Scores 18–25: MCI range; <18: moderate–severe."},{"f":"MMSE cutoffs by severity","b":"26–30: normal. 21–25: mild. 11–20: moderate. ≤10: severe. Add 1pt for <9yr schooling. Less sensitive than MoCA for early MCI (~70% sensitivity)."},{"f":"MNA cutoffs for malnutrition","b":"Full MNA: ≤17 malnourished; 17–23.5 at risk; ≥24 normal. MNA-SF ≤11 triggers full assessment. Pre-albumin more sensitive than albumin for acute malnutrition."},{"f":"Braden Scale risk levels","b":"≤12 HIGH risk (foam mattress + q2h repositioning). 13–14 moderate. 15–18 mild. ≥19 no risk. 6 subscales: sensory, moisture, activity, mobility, nutrition, friction/shear."},{"f":"FRAX treatment thresholds","b":"Treat if 10yr probability: major osteoporotic ≥20% OR hip fracture ≥3%. Can calculate WITHOUT BMD. Adjust for fall risk and prior fragility fractures."},{"f":"CHA₂DS₂-VASc anticoagulation thresholds","b":"Males ≥2 → anticoagulate, 1 → consider. Females ≥3 → anticoagulate, 2 → consider. Age≥75 = 2pts, 65–74 = 1pt. Score 0(M)/1(F) = low risk."},{"f":"CURB-65 management thresholds","b":"0–1: outpatient. 2: short inpatient/supervised. ≥3: inpatient, 4–5 consider ICU. Components: Confusion, Urea>7, RR≥30, BP<90/60, Age≥65."},{"f":"4AT delirium screening cutoff","b":"≥4/12 = delirium probable. 1–3 = possible cognitive impairment. 0 = unlikely. Components: Alertness, AMT4, Attention (months backward), Acute onset. Takes <2min."},{"f":"TUG test fall risk thresholds","b":"<10sec: normal. 10–19sec: moderate risk. ≥20sec: high fall risk, needs PT. ≥30sec: dependent for most ADLs. Use alongside Tinetti balance scale."},{"f":"Norton Scale for pressure injury risk","b":"5 subscales: physical condition, mental condition, activity, mobility, incontinence. Score 5–20; ≤14 = at risk, ≤12 = high risk. Used more in Israeli practice; Braden used internationally."},
{"f":"Define the 5 components of Fried Frailty Criteria","b":"1) Unintentional weight loss ≥5% in prior year, 2) Exhaustion/fatigue, 3) Weakness (grip strength <25th percentile), 4) Slow gait speed (<0.8 m/s), 5) Low physical activity. ≥3 criteria = frail; 1-2 = pre-frail; 0 = robust."},
{"f":"What are the 4 essential CAM criteria for delirium diagnosis?","b":"1) ACUTE onset AND FLUCTUATING course (ESSENTIAL), 2) INATTENTION (ESSENTIAL), 3) EITHER disorganized thinking OR altered consciousness. Sensitivity 94%, specificity 89%."},
{"f":"What is the protein requirement for older adults to prevent sarcopenia?","b":"1.2-1.5 g/kg body weight daily (vs RDA 0.8 g/kg for younger adults). Leucine threshold ~2.6 g per meal needed for mTOR activation."},
{"f":"Name 3 high-yield Beers Criteria medications to AVOID in older adults","b":"1) Long-acting benzodiazepines (diazepam, flurazepam), 2) Anticholinergics (diphenhydramine, benztropine, atropine), 3) Chronic opioids without indication. All increase falls, delirium, mortality."},
{"f":"What is the Mini-Cog test and what score suggests cognitive impairment?","b":"Rapid 3-minute screening: 3-item recall + Clock Drawing Test. Score ≤2 on recall (regardless of clock) OR 0-2 recall + abnormal clock = cognitive impairment. Sensitivity 99% for dementia."},
{"f":"Define the difference between hypoactive and hyperactive delirium","b":"Hyperactive (25%): agitation, combativeness, hallucinations. Hypoactive (50%): lethargy, apathy, reduced responsiveness. Hypoactive often MISSED but has 3x HIGHER MORTALITY."},
{"f":"What is the expected rate of telomere shortening with aging?","b":"~50-200 base pairs per year of telomere shortening. Hayflick limit ~50 cell divisions before replicative senescence in vitro."},
{"f":"What are the DSM-5 criteria for Major Depressive Disorder in older adults?","b":"≥5 symptoms in ≥2 weeks including MANDATORY depressed mood OR anhedonia + at least 4 of: sleep, interest loss, guilt, energy loss, concentration, appetite, psychomotor changes, fatigue, death thoughts."},
{"f":"What are the vitamin D target levels and recommended supplementation for older adults?","b":"Target 25-OH vitamin D 20-30 ng/mL. Prevent deficiency with 600-2000 IU daily; if deficient, treat with 50,000 IU weekly until replete."},
{"f":"What domains does Comprehensive Geriatric Assessment (CGA) evaluate?","b":"5 domains: 1) Functional (ADL/IADL), 2) Medical (diagnoses, medications, preventive care), 3) Mental (cognition, mood, delirium), 4) Social/environmental (living situation, support, safety), 5) Sensory (vision, hearing)."},
{"f":"What is the prevalence of dementia and name 3 major types","b":"5-7% of 65+ (rising to 35-50% by age 90+). Types: 1) Alzheimer Disease (60-80%), 2) Vascular dementia (15-25%), 3) Lewy Body (5-10%), 4) Frontotemporal (5%)."},
{"f":"What increases fall risk in older adults? List 5 major intrinsic factors","b":"1) Weakness (quadriceps, hip extensors), 2) Gait/balance impairment, 3) Cognitive impairment, 4) Orthostatic hypotension, 5) High-risk medications (benzos, antipsychotics, opioids). Add: sensory loss, foot problems."},
{"f":"Define sarcopenia diagnostic criteria (EWGSOP consensus)","b":"Reduced muscle strength (grip <27 kg men, <16 kg women) + Reduced muscle quantity/quality (imaging) + Reduced physical performance (gait <1 m/s, SPPB <8, TUG >12 sec)."},
{"f":"What is unintentional weight loss as a marker of malnutrition?","b":"RED FLAGS: ≥5% loss in 1 month OR ≥10% loss in 6 months. Present in 20-50% of hospitalized older adults. Indicates need for nutritional assessment/intervention."},
{"f":"What is the SPPB (Short Physical Performance Battery) and what score indicates high risk?","b":"Measures: gait speed, balance (standing/semi-tandem/tandem), chair stand. Score <9 predicts disability and ADL decline. >14 seconds on Timed Up & Go (TUG) = high fall risk."},
{"f":"What is the anticholinergic burden concept and clinical significance?","b":"Multiple anticholinergic medications (diphenhydramine, benztropine, atropine, tricyclics) have cumulative effects. Burden ≥3 agents associated with INCREASED DEMENTIA RISK; avoid combinations; assess with anticholinergic cognitive burden scale."},
{"f":"Name the life expectancy at age 65 in the United States","b":"~19 additional years at age 65 (women ~21 years, men ~17 years). Maximum documented lifespan ~122 years."},
{"f":"What are the 4 major demographic shifts in aging populations?","b":"1) Increasing number/proportion of older adults (65+ now 16% of US), 2) Fastest-growing segment is 85+ years (oldest-old), 3) Sex disparity (2:1 female:male at 85+), 4) Increased racial/ethnic diversity with health disparities."},
{"f":"What medication interactions are HIGH-RISK in older adults?","b":"1) Opioid + benzodiazepine (respiratory depression, overdose death), 2) Warfarin + NSAIDs (bleeding), 3) ACE-I + K-sparing diuretics (hyperkalemia), 4) SSRIs + NSAIDs (GI bleed), 5) Digoxin + NSAIDs (renal failure)."},
{"f":"What is the pathophysiology of delirium?","b":"Cholinergic deficiency (acetylcholine ↓) + dopaminergic excess + neuroinflammation (IL-6, TNF-alpha) + altered cerebral metabolism. Triggered by infection, medications, metabolic derangement, pain, hypoxia."},
{"f":"What is the prevalence of urinary incontinence in older women and men, and what is the screening gold standard?","b":"Women 17-55%, men 11-34%. Screening gold standard: 2 questions - (1) Lost urine in past year? (2) ≥6 separate days? Sensitivity 79% women, 76% men. Use 3IQ to distinguish stress vs. urge type."},
{"f":"Name the 4 pressure injury stages and their key characteristics.","b":"Stage 1: Non-blanching erythema. Stage 2: Partial-thickness skin loss. Stage 3: Full-thickness loss. Stage 4: Full-thickness with muscle/bone involvement. Prevention (turning q2h, nutrition) reduces incidence 50%."},
{"f":"What vitamin D level is target for osteoporosis prevention, and what is the FRAX score that indicates treatment need?","b":"Target 25(OH)D ≥30 ng/mL. FRAX 10-year fracture risk: treat if hip fracture risk >3% OR major osteoporotic fracture risk >20%."},
{"f":"What are the two main phenotypes of heart failure in older adults and their prevalence?","b":"HFrEF (LVEF <40%) ~50% of cases. HFpEF (LVEF >50%) ~50%, more common in older women, associated with hypertension and diastolic dysfunction."},
{"f":"List the three first-line non-pharmacological interventions for chronic pain in older adults.","b":"Physical/occupational therapy, exercise (especially aquatic), and cognitive-behavioral therapy (CBT). Acupuncture, massage, mindfulness also effective."},
{"f":"What is the acetaminophen maximum daily dose in older adults, and why must it be carefully monitored?","b":"Max 3-4 g/day (often reduced to 3 g/day in older/frail patients or those with liver disease/alcohol use). Exceeding increases hepatotoxicity risk, especially in combination with other acetaminophen-containing products."},
{"f":"What is the most common cause of constipation in older adults on medications, and name the drug class responsible.","b":"Opioids (~50% of medication-induced cases cause constipation). Also: anticholinergics, calcium channel blockers. Prophylaxis needed: naloxone-oxycodone formulation or laxatives (PEG preferred)."},
{"f":"Name the two most common primary sleep disorders in older adults and their prevalence.","b":"Insomnia (25-40% prevalence) and obstructive sleep apnea (10-15% men, 5% women). OSA associated with HTN, stroke, MI risk; untreated increases mortality."},
{"f":"What is the mechanism of osteoarthritis and the Kellgren-Lawrence grading system significance?","b":"OA: progressive cartilage loss, subchondral bone changes, osteophytes, synovial inflammation. X-ray Kellgren-Lawrence grades 0-4 confirm diagnosis and track progression; grade 3-4 = candidate for joint replacement."},
{"f":"In older adults with CAD, what is the typical presentation difference from younger patients?","b":"Atypical presentations in ~30%: dyspnea, syncope, confusion, fatigue rather than chest pain. Silent MI occurs in ~30%; high troponin sensitivity needed for diagnosis."},
{"f":"What is the target blood pressure for most older adults, and what is the concern with excessive lowering?","b":"Target <130/80 mmHg (individualizable to <140/90 for frail; maintain DBP >65). Excessive lowering causes J-curve: increased stroke/MI risk from end-organ hypoperfusion."},
{"f":"How much does weight loss reduce knee osteoarthritis pain, and what is the threshold BMI for OA risk?","b":"10 lb weight loss reduces knee OA pain by 50%. BMI >30 increases knee OA risk 2-3 fold compared to normal weight."},
{"f":"What medication adjustments are needed for pain management in older adults with renal impairment?","b":"Reduce doses/interval: avoid NSAIDs if eGFR <30; adjust opioid dosing (reduced clearance); avoid gabapentin if eGFR <30 (increased toxicity); acetaminophen safe but monitor total daily intake."},
{"f":"Name the most common cause of secondary hypertension in older adults.","b":"Chronic kidney disease (eGFR <60) is most common; also: primary aldosteronism, obstructive sleep apnea, white-coat HTN. Always check urine protein/creatinine ratio and renal function."},
{"f":"What is the maximal DEXA T-score criterion for osteoporosis diagnosis?","b":"Osteoporosis = T-score <-2.5 SD below young adult mean. Osteopenia = -1 to -2.5. Normal >-1. Fracture risk doubles for each 1 SD decrease in T-score."},
{"f":"Describe the mechanism and treatment of opioid-induced constipation (OIC).","b":"Mechanism: mu-receptor agonism in GI tract causes decreased motility, increased water absorption. Prevention first-line: prophylactic laxatives (PEG, osmotic). If inadequate, use methylnaltrexone (opioid antagonist, peripheral only) or switch to naloxone-oxycodone formulation."},
{"f":"What pharmacological agent is contraindicated for insomnia in older adults and why?","b":"Benzodiazepines contraindicated: increase delirium (50% higher risk), falls/fractures (50% risk increase), dependence, withdrawal syndrome. Cognitive consequences persist post-discontinuation for months."},
{"f":"What is the prevalence of osteoporosis in men vs. women age >50, and which fractures are most common?","b":"Women 1 in 3, men 1 in 5 age >50. Hip (most morbid, ~20% mortality within 1 year), vertebral (silent, cumulative kyphosis), wrist fractures most common. Hip fracture incidence 200,000/year in U.S."},
{"f":"Name three atypical presentations of heart failure in older adults.","b":"Weakness, fatigue, cognitive impairment, anorexia, reduced exercise tolerance (vs. typical dyspnea/orthopnea in younger). May present as delirium or fall without classic HF symptoms."},
{"f":"What is the Braden Scale score cutoff for high pressure injury risk, and what does it assess?","b":"Braden score <19 indicates HIGH risk. Assesses: sensory perception, moisture, activity, mobility, nutrition, friction/shear. Score 15-18 = at-risk; <15 = high-risk; need intensive prevention."},
{"f":"What is the thrombolytic time window for IV-tPA in acute ischemic stroke, and is there an upper age limit?","b":"4.5 hours from symptom onset. NO upper age limit - elderly patients should be treated the same as younger patients if other criteria met. Most common cardioembolic cause in >80 year-olds is atrial fibrillation (present in ~50% of strokes in this age group)."},
{"f":"Name the post-stroke complication that affects 30-50% of elderly stroke survivors and impacts rehabilitation.","b":"Depression. Post-stroke depression affects 30-50% of survivors, impairs recovery, increases mortality, and should be screened for and treated with SSRIs or other antidepressants during rehabilitation."},
{"f":"What is the target blood pressure after ischemic stroke in an elderly patient, and what is the key deprescribing consideration?","b":"Target SBP <130/80 mmHg (cautiously lowered over days, not immediately). Deprescribe medications not aligned with post-stroke goals - reduce pill burden, improve adherence, and minimize drug interactions common in elderly polypharmacy."},
{"f":"Define GOLD Stage 4 COPD and list a key vaccination for elderly COPD patients.","b":"FEV1 <30% predicted post-bronchodilator = GOLD 4 (very severe). Key vaccination: PCV20 or PCV15 followed by PPSV23 per current CDC guidelines; influenza vaccine annually."},
{"f":"What is the target SpO2 range in elderly with COPD exacerbation, and why is hyperoxia problematic?","b":"Target SpO2 88-92%. Hyperoxia (SpO2 >94%) increases mortality risk by suppressing hypoxic respiratory drive and causing CO2 retention (respiratory acidosis) in CO2-retaining patients."},
{"f":"An elderly patient with COPD is prescribed prednisone 50 mg daily for exacerbation. What is the typical duration?","b":"5-7 days total duration. Longer courses provide no additional benefit and increase steroid side effects (hyperglycemia, osteoporosis, insomnia) in elderly who may have multiple comorbidities."},
{"f":"What is the recommended HbA1c target for a healthy, functionally independent elderly patient vs. one with limited life expectancy?","b":"Healthy elderly: HbA1c 7-8%; limited life expectancy/frail/multiple comorbidities: HbA1c 8-9%. Individualize; avoid hypoglycemia at all costs in elderly due to impaired counter-regulatory response."},
{"f":"Name the diabetes medication most commonly associated with metformin lactic acidosis in elderly and the eGFR cutoff for avoidance.","b":"Metformin lactic acidosis risk increases with eGFR <30 mL/min; avoid in this group. Avoid if eGFR 30-45 mL/min as well (use caution). Renal function decline with age is common; check eGFR regularly."},
{"f":"List one cardiovascular and one renal benefit of SGLT2 inhibitors in elderly diabetics.","b":"Cardiovascular: reduce MI/heart failure hospitalization. Renal: slow progression of albuminuria and decline in GFR. Also weight loss and BP reduction; caution with genital infections and euglycemic DKA."},
{"f":"What is the approximate increase in normal TSH upper limit with age, and when should TSH be rechecked after levothyroxine dose change?","b":"TSH upper limit rises from ~2.5 mIU/L in young adults to ~4.5-5.0 mIU/L in elderly. Recheck TSH 6-8 weeks after any levothyroxine dose change; thereafter check annually once stable. Avoid over-replacement (TSH <0.1) which causes AFib and osteoporosis."},
{"f":"An elderly patient on levothyroxine has elevated TSH despite good adherence. What two medication interactions should be checked?","b":"Calcium and iron supplements reduce levothyroxine absorption; must be taken 30-60 minutes before levothyroxine. PPIs also reduce absorption. Space medications appropriately."},
{"f":"Describe the atypical presentation of Graves disease in elderly and name the initial symptom-control medication.","b":"Atypical: apathy, atrial fibrillation, heart failure exacerbation rather than classic hyperactivity/tremor/heat intolerance. Initial control: propranolol 10-20 mg TID for symptomatic relief while awaiting antithyroid drug effect (PTU or methimazole)."},
{"f":"In an elderly patient with hypertension and albuminuria, what is the target systolic blood pressure and what medication class is first-line?","b":"Target SBP <120 mmHg (per some guidelines, though individualize). First-line: ACE inhibitor or ARB - both slow progression if albuminuria present, even if normotensive (BP benefit is secondary to renal protective effect)."},
{"f":"An 82-year-old has eGFR 32 mL/min and phosphate 6.2 mg/dL. What class of phosphate binder should be preferred and why?","b":"Sevelamer or lanthanum preferred over calcium carbonate because elderly with CKD stage 4 are at risk for vascular calcification. Calcium-based binders increase this risk; non-calcium binders safer though more expensive."},
{"f":"What anemia target hemoglobin is recommended for an elderly patient with CKD on ESA (erythropoiesis-stimulating agent)?","b":"Target Hgb 9-11 g/dL (NOT higher). Higher targets increase risk of thrombotic events (stroke, MI, DVT) without improving survival. Use ESA only if Hgb <10 AND symptomatic (fatigue, dyspnea)."},
{"f":"Name the three values that confirm iron deficiency anemia and the ferritin threshold below which iron deficiency is likely.","b":"Iron studies: ferritin <30 mcg/L, transferrin saturation (TSAT) <16%, serum iron low. Ferritin <30 mcg/L strongly suggests iron deficiency (though ferritin can be falsely elevated as acute phase reactant in inflammation)."},
{"f":"An elderly patient with pernicious anemia is diagnosed by Schilling test or intrinsic factor antibody positivity. What is the lifelong treatment?","b":"IM cyanocobalamin (vitamin B12) 1000 mcg monthly indefinitely. Cannot absorb oral B12 due to lack of intrinsic factor. Monthly monitoring unnecessary once stable; annual B12 level sufficient to confirm adequacy."},
{"f":"In an elderly patient with Hgb 7.5 g/dL who is stable and asymptomatic, should transfusion be given?","b":"No - restrictive transfusion strategy (transfuse if Hgb <7-8 in stable patients) associated with better outcomes than liberal strategy. Higher threshold (~9) only for acute MI, unstable angina, major active bleeding, or major surgery. Each unit RBC carries infection risk, immune complications, iron overload risk."},
{"f":"At what age do most guidelines recommend stopping colorectal cancer screening, and what screening continues in very elderly?","b":"Stop at age 75-85 or if life expectancy <10 years. Prostate cancer screening individualized (generally stop >75 or with high comorbidity burden); breast cancer screening continues to 75-85 if previously screened and in good health."},
{"f":"Name the toxicity most commonly dose-limiting in chemotherapy in elderly, and what test predicts tolerance better than chronological age.","b":"Neutropenia/infection is often dose-limiting in elderly (especially >75 years). Comprehensive Geriatric Assessment (CGA) predicts chemotherapy toxicity better than age alone; includes functional status, cognition, comorbidities, polypharmacy, nutrition."},
{"f":"List two classes of cancer treatment with increased autoimmune complications in elderly.","b":"Checkpoint inhibitors (anti-PD-1, anti-CTLA-4): autoimmune complications (myositis, pneumonitis, endocrinopathy, colitis) more severe. Hormone therapy in some elderly: thromboembolic risk with tamoxifen; aromatase inhibitors preferred for postmenopausal women due to lower VTE risk."},
{"f":"Name the percentage of serious infections in elderly that present WITHOUT fever, and name one atypical presentation.","b":"20-30% of serious infections in elderly present without fever. Atypical presentations: pneumonia presents as confusion or falls (not cough); UTI as delirium (not dysuria); sepsis as hypotension and confusion (not tachycardia)."},
{"f":"Should asymptomatic bacteriuria be treated in a 75-year-old community-dwelling woman?","b":"NO - asymptomatic bacteriuria should NOT be treated in non-pregnant, non-urologic patients. Treatment increases resistance without improving outcomes. Only treat if symptomatic UTI or pregnant."},
{"f":"What is the first-line antibiotic for community-acquired pneumonia in elderly, and what is the typical duration?","b":"Respiratory fluoroquinolone (levofloxacin 750 mg daily) monotherapy is appropriate for outpatient CAP. Duration 5-7 days for non-severe (shorter duration adequate). Severe CAP: ceftriaxone + azithromycin (covers atypicals). Monitor for C. difficile with fluoroquinolones."},
{"f":"Distinguish between withdrawal of life support and terminal sedation - are they ethically different?","b":"Ethically equivalent - both permissible if aligned with patient wishes/best interests. Withdrawal: discontinuing life-sustaining therapy (e.g., extubating, stopping dialysis). Terminal sedation: pharmacologic sedation to relieve suffering at end-of-life. Both are appropriate when properly aligned with goals."},
{"f":"Name the opioid dose typically used as starting point in elderly palliative care and why low starting dose is essential.","b":"Morphine 5-10 mg PO q4h (or 2-5 mg IV if acute severe pain). Low starting dose crucial because elderly have altered pharmacokinetics (reduced metabolism, increased sensitivity), increased risk of respiratory depression, constipation, and delirium with standard doses."},
{"f":"An elderly patient with dementia in palliative care becomes agitated at night. What is the recommended non-pharmacologic intervention?","b":"Reorientation, familiar objects, consistent caregiver, minimal procedures, addressing pain. Minimize antipsychotics/sedatives if possible (associated with increased mortality in dementia). If pharmacologic needed: low-dose haloperidol or risperidone, but sparingly."},
{"f":"Define substituted judgment vs. best interest standard in surrogate medical decision-making.","b":"Substituted judgment: surrogate decides what patient would want if able (requires clear, convincing evidence of patient's prior wishes). Best interest: surrogate decides objectively what is best for patient when wishes unknown (what reasonable person in situation would choose). Most ethical when patient's wishes known; best interest used when not."},
{"f":"An elderly patient with capacity refuses life-saving treatment you believe is medically necessary. What is your ethical obligation?","b":"Respect patient autonomy even if you disagree with their choice (autonomy trumps beneficence). Ensure informed consent (disclosure, understanding, voluntary agreement), offer alternatives, document thoroughly. If you cannot respect their wishes, assist with transfer to willing provider."},
{"f":"What is the primary ethical principle guiding deprescribing in elderly, and what unintended harm might polypharmacy cause?","b":"Primary principle: non-maleficence (do no harm) - remove medications when harms outweigh benefits. Polypharmacy harms: adverse drug interactions, falls (anticholinergics, sedatives), confusion (anticholinergics), electrolyte abnormalities, poor adherence, cost burden, medication errors with cognitive impairment."},
{"f":"List three risk factors for elder abuse and name one red flag for physical abuse.","b":"Risk factors: cognitive impairment, depression, social isolation, dependence on caregiver, previous trauma history. Red flags: unexplained injuries, bruising in patterns (hand marks, loop marks), poor hygiene despite ability, fearfulness around caregiver, medication/financial discrepancies, delays in seeking care."},
{"f":"Is mandatory reporting of suspected elder abuse required of healthcare providers, and who is the reporting agency?","b":"YES - healthcare providers are mandated reporters in most states. Report to Adult Protective Services (APS) or law enforcement. Requirement applies even if patient denies abuse; suspected abuse sufficient to trigger mandatory report. Confidentiality protected in most cases."},
{"f":"Name one intervention for an elderly abuse victim demonstrating safety planning, and how does the approach differ for institutional abuse?","b":"Safety planning: go-bag with documents (ID, insurance, finances), emergency contacts, discharge planning with social work, referral to domestic violence resources. Institutional abuse: facility staff must report to facility administration AND state authorities; residents have right to be free from restraint/abuse per regulations; ombudsman advocates for residents."},
{"f":"Name two cognitive screening tools used to assess driving fitness in elderly and one test of visual field requirement.","b":"Cognitive: Clock Drawing Test (CDT - abnormal if >2 min or 4+ errors), Montreal Cognitive Assessment (MoCA), Useful Field of View (UFOV - tests processing speed). Vision: visual field ≥120 degrees required; 20/40 corrected vision minimum; contrast sensitivity important for night driving."},
{"f":"An elderly patient on benzodiazepines asks about driving. What is your recommendation and what alternative medications/management?","b":"AVOID DRIVING - benzodiazepines impair reaction time and judgment. Recommend public transit, medical transport, volunteer drivers. Consider deprescribing benzo (gradual taper) and substituting non-sedating alternatives (SSRI for anxiety, low-dose buspirone). Occupational therapy driving evaluation if boundary unclear."},
{"f":"What is the role of occupational therapist in driving evaluation for elderly with mild cognitive impairment?","b":"OT administers behind-the-wheel functional driving assessment (gold standard). Identifies specific deficits (visual, motor, cognitive) and compensatory strategies (larger mirrors, hand controls, explicit directions). Provides objective data for physician discussion of driving safety/alternatives."},
{"f":"Name two alternatives to full guardianship that respect autonomy, and which one allows medical information access?","b":"Durable power of attorney (patient appoints agent while competent; less expensive, quicker), HIPAA authorization (allows healthcare info sharing without full guardianship), joint bank account (for finances). HIPAA authorization specifically allows medical information access without guardianship."},
{"f":"What is the standard of proof required to establish guardianship, and name one way it differs from criminal conviction.","b":"Clear and convincing evidence (higher than preponderance of evidence but lower than beyond reasonable doubt). Different from criminal: no automatic right to jury trial, burden on petitioner (not prosecution), civil proceeding (not criminal), court-appointed attorney may be required but not always."},
{"f":"Name one duty of a guardian and one reason why periodic court review is important.","b":"Duty: act in ward's best interest, avoid conflicts of interest, make regular court accountings, respect ward's known preferences. Review important because: capacity may improve (guardianship can terminate if restored), prevents guardian abuse/neglect, ensures continued necessity."},
{"f":"Define informed consent and name the three elements required for valid consent.","b":"Informed consent: patient's voluntary agreement to treatment after full disclosure. Elements: (1) disclosure of diagnosis, prognosis, options, benefits/risks, alternatives; (2) patient understanding (assess understanding, not just providing info); (3) voluntary agreement without coercion."},
{"f":"What federal law requires healthcare facilities to inform patients of advance directives, and what is the primary patient right it protects?","b":"Patient Self-Determination Act (PSDA) 1990 requires disclosure of advance directives at admission to hospitals, nursing homes, hospice, HMOs. Protects right of autonomy - patients' right to control their own medical decisions, including refusing life-sustaining treatment."},
{"f":"Can a physician legally withhold information about a patient's diagnosis based on family request to 'not tell them'?","b":"NO - confidentiality protects patient information from being shared with unauthorized parties, but it doesn't authorize physicians to withhold information FROM the patient. Patient has right to their medical information and diagnosis (with rare exceptions like therapeutic privilege)."},
{"f":"Name the two main components of an advance directive and describe one scenario where each is used.","b":"Living Will: specifies treatments wanted/unwanted; used when patient in vegetative state (feeding tube decision). Healthcare Power of Attorney: designates surrogate; used for unexpected decisions not covered by living will (surrogate interprets wishes in new situations)."},
{"f":"What is a POLST form and how does it differ from an advance directive?","b":"POLST (Physician Orders for Life-Sustaining Treatment): actionable medical order signed by physician AND patient; portable across settings. Advance directive: legal document expressing wishes but not a direct order. POLST used acutely by EMS/healthcare providers; advance directive interpreted by surrogate to write POLST-type orders."},
{"f":"An elderly patient on hospice previously wrote advance directive refusing all interventions but now (while still competent) asks for antibiotics for pneumonia. What should be done?","b":"Respect current wishes - a competent patient can ALWAYS change/revoke their advance directive, even verbally. Provide antibiotics if patient requests, even if contradicts written directive. Competent patient's current wishes supersede prior written wishes."},
{"f":"Name three levels of long-term care settings from least to most intensive care.","b":"Independent living (no care services) → Assisted living (ADL help, no daily nursing) → Skilled nursing facility (SNF, daily nursing, Medicare-covered rehab) / Intermediate care (similar to SNF). All within continuum; transitions as functional status changes."},
{"f":"What is PACE (Program of All-Inclusive Care for Elderly) and what must patient meet to be eligible?","b":"PACE: integrated managed care serving frail elderly; all services (medical, social, transportation) provided in one system. Eligibility: typically age >55, Medicaid/Medicare dual eligible (or Medicaid only), nursing home level of care needs, able to live in community."},
{"f":"Name the key assessment tool used in nursing homes for care planning and quality monitoring.","b":"Minimum Data Set (MDS) - required assessment in all nursing homes. Documents functional status (ADLs/IADLs), cognitive status (MMSE), behavioral/mood symptoms, medical conditions, medications. Used for care planning and CMS quality indicators (infections, hospital admissions, antipsychotic use, pressure ulcers)."},
{"f":"Define the two key rehabilitation functional outcome measures - ADL and IADL - and give one example of each.","b":"ADL (Activities of Daily Living): basic self-care; examples: bathing, dressing, toileting, feeding, continence, ambulation. IADL (Instrumental ADL): higher-level functioning; examples: cooking, laundry, financial management, medication management, shopping."},
{"f":"Name the FIM (Functional Independence Measure) scale range and what score indicates complete independence vs. total dependence.","b":"FIM scale 1-7 per domain: 1=total assistance needed, 7=complete independence. Scores 5-7 indicate supervision needed or independence; scores 1-3 indicate dependence. Used to track functional progress during rehabilitation."},
{"f":"What is the optimal timing window for maximal neuroplasticity after stroke, and when should rehabilitation continue?","b":"3-6 months post-stroke is optimal window for intensive rehabilitation. However, brain plasticity continues beyond this (up to years post-stroke with intensive therapy). Continued therapy shows functional gains even in chronic phase; don't abandon elderly after initial window."},
{"f":"At what age does presbyopia typically develop and what is the mechanism?","b":"Age 50 approximately. Mechanism: loss of accommodation due to lens stiffness and ciliary muscle weakening with age. Causes difficulty reading without glasses, especially in dim light (also due to reduced pupil size reducing retinal illumination)."},
{"f":"Name the standard treatment for visually significant cataracts and what is now routinely implanted to restore vision.","b":"Surgical removal of cloudy lens (phacoemulsification). Now standard: artificial intraocular lens (IOL) implanted replacing natural lens - restores vision completely in most cases. Cataract surgery very safe and effective even in very elderly."},
{"f":"What is the mechanism of action of prostaglandin analogs in glaucoma and what is the treatment goal?","b":"Mechanism: increase uveoscleral outflow of aqueous humor (active at ciliary muscle level), reducing IOP. Goal: reduce IOP by 20-30% to slow optic nerve damage and prevent/slow vision loss. Screening IOP >21 mmHg and optic nerve appearance critical; condition silent until advanced."},
{"f":"What is the revised cardiac risk index (RCRI) for estimating cardiac risk pre-operatively, and name three major predictors.","b":"RCRI stratifies cardiac risk for non-cardiac surgery. Major predictors: CAD, HF, cerebrovascular disease, diabetes, renal disease (Cr >2). Each adds risk; further testing if >2 predictors or high-risk surgery (vascular, major abdominal)."},
{"f":"Name two modifiable risk factors for post-operative delirium in elderly and one medication class to avoid.","b":"Modifiable RF: benzodiazepines (avoid - use anticholinergic instead if needed), poor oxygenation, sleep disruption, immobility, polypharmacy. Avoid: benzodiazepines (increase delirium), anticholinergics if possible (though may be necessary for anesthesia), but minimize post-op exposure."},
{"f":"What is the target glucose range intra-operatively and post-operatively in elderly diabetics, and why is tight control avoided?","b":"Target glucose 140-180 mg/dL perioperatively. Tight control (<110 mg/dL) increases hypoglycemia risk, which is dangerous in elderly (impaired counter-regulation, can cause stroke/MI). Modest hyperglycemia acceptable for safety."},
{"f":"Name two clinical scales used to diagnose delirium in the ED and what is the most common ED cause in elderly.","b":"CAM-ICU (Confusion Assessment Method) or 4AT Score. Most common causes: infection (UTI, pneumonia), medication (anticholinergics, benzos, opioids), metabolic (hyponatremia, hypoxia, hypoglycemia). Assess for these before attributing to dementia."},
{"f":"An 80-year-old with no chest pain presents with dyspnea and confusion; EKG shows ST depressions. What is the diagnosis and treatment consideration?","b":"Acute MI with atypical presentation (no chest pain). Troponin will be elevated. Treat aggressively: dual antiplatelet therapy (aspirin + P2Y12 inhibitor), anticoagulation, consider PCI/thrombolytics. Age alone not contraindication; assess fitness and discuss risks/benefits."},
{"f":"What is the qSOFA (Quick Sequential Organ Failure Assessment) score, and why is it less specific in elderly with sepsis?","b":"qSOFA: altered mental status (1 pt) + SBP ≤100 (1 pt) + RR ≥22 (1 pt); score ≥2 suggests high mortality risk. Less specific in elderly: baseline cognitive impairment (confounds altered mental status), chronic hypotension normal (SBP <100 less concerning), chronic lung disease (RR elevated baseline). Aggregate data (lactate, inflammatory markers) essential."}];
