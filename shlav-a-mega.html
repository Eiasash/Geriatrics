<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">

<style>
*{box-sizing:border-box;margin:0;padding:0}
.skip-link{position:absolute;left:-9999px;top:0;z-index:999;padding:8px 16px;background:rgb(var(--sky));color:#fff;font-weight:700;font-size:13px;border-radius:0 0 8px 0;text-decoration:none}.skip-link:focus{left:0}
:root{--sky:59 130 246;--em:16 185 129;--sl8:30 41 59;--red:239 68 68;--amb:245 158 11}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#1e293b;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.heb{font-family:'Heebo',sans-serif;direction:rtl;text-align:right;unicode-bidi:plaintext}
button{cursor:pointer;border:none;background:none;font:inherit}
input,textarea,select{font:inherit}
.hdr{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:10px 16px;position:sticky;top:0;z-index:40}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:-.5px}
.hdr p{font-size:10px;color:#94a3b8;margin-top:1px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.06);padding-bottom:max(4px,env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:0 0 auto;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 6px 6px;transition:.15s;font-size:10px;font-weight:600}
.tabs button.on{color:rgb(var(--sky))}
.tabs button:not(.on){color:#64748b}
.tabs .ic{font-size:18px}
.ct{max-width:640px;margin:0 auto;padding:12px 12px 80px}
.card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;margin-bottom:10px}
.pill{display:inline-block;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;transition:.15s;cursor:pointer}
.pill.on{background:rgb(var(--sky));color:#fff;box-shadow:0 2px 6px rgba(59,130,246,.25)}
.pill:not(.on){background:#fff;color:#64748b;border:1px solid #e2e8f0}
.qo{width:100%;text-align:right;padding:12px 14px;border-radius:12px;border:2px solid #e2e8f0;font-size:12px;line-height:1.6;transition:.15s;margin-bottom:6px;font-family:'Heebo',sans-serif;display:block}
.qo:not(.lk):hover{border-color:#bae6fd;background:#f0f9ff}
.qo.sel{border-color:rgb(var(--sky));background:#eff6ff}
.qo.ok{border-color:rgb(var(--em));background:#ecfdf5;color:#065f46}
.qo.no{border-color:rgb(var(--red));background:#fef2f2;color:#991b1b}
.qo.dim{border-color:#f1f5f9;color:#cbd5e1}
.btn{padding:7px 18px;border-radius:12px;font-size:12px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;justify-content:center;min-height:44px}
.btn:disabled{opacity:.35}
:focus-visible{outline:3px solid rgb(var(--sky));outline-offset:2px;border-radius:4px}
.btn-p{background:rgb(var(--sky));color:#fff}
.btn-d{background:rgb(var(--sl8));color:#fff}
.btn-g{background:rgb(var(--em));color:#fff}
.btn-o{background:#f1f5f9;color:#475569}
.ab{max-height:0;overflow:hidden;transition:max-height .3s ease}.ab.op{max-height:5000px}
.acc-h{width:100%;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;text-align:left;transition:.1s;min-height:44px;color:inherit}
.acc-h:hover{background:#f8fafc}
.acc-ic{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.acc-ar{font-size:10px;color:#94a3b8;transition:transform .2s}
.acc-ar.op{transform:rotate(180deg)}
.stats{display:flex;gap:6px;margin-bottom:12px}
.stat{flex:1;background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:10px 8px;text-align:center}
.stat .n{font-size:20px;font-weight:700}
.stat .l{font-size:9px;color:#64748b;text-transform:uppercase;font-weight:600;letter-spacing:.5px;margin-top:2px}
.fc{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:24px 20px;min-height:180px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;transition:.2s;user-select:none}
.fc:active{transform:scale(.98)}
.search-box{width:100%;border:1px solid #e2e8f0;border-radius:12px;padding:8px 12px;font-size:12px;margin-bottom:12px}
.search-box:focus{outline:none;border-color:rgb(var(--sky));box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.timer{font-variant-numeric:tabular-nums;font-family:'Inter',monospace}
.ck{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;border:1px solid #e2e8f0;font-size:11px;cursor:pointer;margin-bottom:5px}
.ck:hover{background:#f8fafc}
.ck.done span{text-decoration:line-through;color:#94a3b8}
.topic{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;font-size:11px;cursor:pointer;transition:.1s}
.topic:hover{background:#f1f5f9}
.topic.done{background:#ecfdf5;border:1px solid #a7f3d0}
.drug-row{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:11px}
.drug-row:last-child{border:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.badge-r{background:#fef2f2;color:#dc2626}
.badge-y{background:#fffbeb;color:#d97706}
.badge-g{background:#ecfdf5;color:#059669}
.calc-in{width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;margin-bottom:8px}
.calc-in:focus{outline:none;border-color:rgb(var(--sky))}
.sec-t{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:3px}
.sec-s{font-size:10px;color:#64748b;margin-bottom:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
@media(min-width:768px){.ct{padding:20px 16px 88px;max-width:800px}.tabs button{min-width:64px;font-size:11px}.hdr h1{font-size:18px}}
@media(min-width:1024px){.ct{max-width:900px}.card{padding:16px}}
.dark{background:#0f172a;color:#e2e8f0}
.dark .card{background:#1e293b;border-color:#334155}
.dark .hdr{background:linear-gradient(135deg,#020617,#0f172a)}
.dark .tabs{background:#1e293b;border-color:#334155}
.dark .tabs button:not(.on){color:#94a3b8}
.dark .skip-link{background:#3b82f6}
.dark .pill:not(.on){background:#1e293b;color:#94a3b8;border-color:#334155}
.dark .qo{border-color:#334155;color:#e2e8f0}
.dark .qo:not(.lk):hover{border-color:#1d4ed8;background:#172554}
.dark .qo.sel{border-color:rgb(var(--sky));background:#1e3a5f}
.dark .qo.dim{border-color:#334155;color:#64748b}
.dark .search-box{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .stat{background:#1e293b;border-color:#334155}
.dark .fc{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .acc-h:hover{background:#1e293b}
.dark .calc-in{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .ck{border-color:#334155;color:#e2e8f0}
.dark .drug-row{border-color:#334155}
.drug-cat{font-size:10px;color:#64748b}.drug-risk{font-size:10px;color:#475569;margin-top:2px}
.dark .drug-cat{color:#94a3b8 !important}.dark .drug-risk{color:#94a3b8 !important}
.dark .topic{color:#e2e8f0}
.dark .topic.done{background:#064e3b;border-color:#059669}
.dark .sec-t{color:#f1f5f9}
.dark .sec-s{color:#94a3b8}
.dark .btn-o{background:#334155;color:#e2e8f0}
.dm-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;padding:4px;opacity:.7}
@keyframes fadeIn{from{opacity:.6}to{opacity:1}}
.fade-in{animation:fadeIn .15s ease}
.tabs button{min-height:44px}
.qo{min-height:44px;display:flex;align-items:center}
.ck{min-height:44px}
.topic{min-height:44px}
.pill{min-height:32px;display:inline-flex;align-items:center}
.btn:active{transform:scale(.96)}
.qo:active:not(.lk){transform:scale(.99)}
.stat .l{font-size:10px}
.badge{font-size:10px}
.hdr p{font-size:11px}
.progress-bar{height:3px;background:#e2e8f0;border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-bar .fill{height:100%;background:rgb(var(--sky));border-radius:2px;transition:width .3s ease}
.dark .progress-bar{background:#334155}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:20px;padding:24px;max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
body.dark .modal-box{background:#1e293b;color:#e2e8f0}
.dark .qo.ok{border-color:rgb(var(--em));background:#064e3b;color:#a7f3d0}
.dark .qo.no{border-color:rgb(var(--red));background:#450a0a;color:#fca5a5}
.dark .qo.dim{border-color:#334155;color:#64748b}
.dark .drug-row{border-color:#334155;color:#e2e8f0}
.dark .badge-r{background:#450a0a;color:#fca5a5}
.dark .badge-y{background:#451a03;color:#fde68a}
.dark .badge-g{background:#064e3b;color:#6ee7b7}
.dark .ck:hover{background:#1e293b}
.dark .topic:hover{background:#334155}
.dark .osce-scenario{background:#1e293b !important;border-color:#334155 !important}
.dark .calc-result{background:#1e293b !important}
.dark a{color:#60a5fa}
.explain-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;font-size:11px;line-height:1.7;color:#166534}
.dark .explain-box{background:#064e3b !important;border-color:#059669 !important;color:#a7f3d0 !important}
.explain-box-q{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:11px;line-height:1.7;color:#92400e;margin-top:10px;padding:10px 12px}
.dark .explain-box-q{background:#451a03;border-color:#92400e;color:#fcd34d}
.explain-src{font-size:10px;color:#059669;border-top:1px solid #bbf7d0;padding-top:4px;margin-top:6px}
.dark .explain-src{color:#6ee7b7 !important;border-top-color:#065f46 !important}
.explain-correct{color:#64748b;font-style:italic}
.dark .explain-correct{color:#86efac !important}
.explain-pearl{background:#fef3c7;border-radius:8px;padding:8px 10px;margin-top:6px;font-weight:600;color:#78350f}
.dark .explain-pearl{background:#292400;color:#fde68a !important}
/* Explanation formatter */
.expl-p{font-size:12px;line-height:1.9;margin-bottom:9px;direction:rtl}
.expl-ans{font-size:12px;line-height:1.9;margin:5px 0;padding:5px 10px 5px 6px;border-radius:5px;direction:rtl;border-right:3px solid #d97706}
.expl-ans-ok{border-right-color:#16a34a;background:rgba(22,163,74,.07)}
.expl-ans-no{border-right-color:#94a3b8;opacity:.88}
.dark .expl-ans{border-right-color:#92400e}
.dark .expl-ans-ok{border-right-color:#22c55e;background:rgba(34,197,94,.07)}
.dark .expl-ans-no{border-right-color:#475569;opacity:.9}
.expl-pearl{margin-top:10px;padding:7px 10px;border-radius:6px;border:1px solid rgba(0,0,0,.12);direction:rtl}
.dark .expl-pearl{border-color:rgba(255,255,255,.12)}
.expl-pearl-lbl{font-weight:700;font-size:11px;display:block;margin-bottom:4px}
.dark .tag-topic{background:#064e3b !important;color:#6ee7b7 !important}
.dark .tag-year{background:#1e3a5f !important;color:#93c5fd !important}

/* Font size control */
:root{--qfont:14px}
.heb{font-size:var(--qfont) !important}
p.heb, .qo{font-size:var(--qfont) !important}
/* Question annotation */
.q-note-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:8px 10px;margin-top:8px;font-size:11px;width:100%;color:#1e293b}
.q-note-box:focus{outline:none;border-color:#f59e0b}
.dark .q-note-box{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .q-note-box:focus{border-color:#64748b}
.dark .q-note-box::placeholder{color:#475569}
/* Search highlight */
mark{background:#fef08a;color:#1e293b;border-radius:3px;padding:0 2px}
.dark mark{background:#713f12;color:#fef9c3}
/* Heatmap */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:8px 0}
.hm-cell{aspect-ratio:1;border-radius:3px;background:#f1f5f9}
.dark .hm-cell{background:#1e293b}
.hm-0{background:#f1f5f9}.hm-1{background:#bae6fd}.hm-2{background:#38bdf8}.hm-3{background:#0284c7}.hm-4{background:#0369a1}
.dark .hm-0{background:#1e293b}.dark .hm-1{background:#0c4a6e}.dark .hm-2{background:#075985}.dark .hm-3{background:#0369a1}.dark .hm-4{background:#0ea5e9}
/* Mastered badge */
.mastered-badge{background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
/* Offline / install banners */
.top-banner{padding:6px 12px;font-size:11px;font-weight:600;text-align:center;position:sticky;top:48px;z-index:39}
.banner-offline{background:#fef2f2;color:#dc2626;border-bottom:1px solid #fecaca}
.banner-install{background:#eff6ff;color:#1d4ed8;border-bottom:1px solid #bfdbfe;display:flex;justify-content:space-between;align-items:center;padding:6px 12px}
/* Font size controls */
.font-ctrl{display:flex;align-items:center;gap:4px;margin-left:auto}
.font-btn{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.15);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.font-btn:hover{background:rgba(255,255,255,0.25)}
/* Confetti */
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:confetti-fall 3s ease-in forwards;pointer-events:none;z-index:9999}
@media print{
  .tabs,.hdr,.dm-btn,.btn,.pill,.font-ctrl,.share-btn,.drug-toggle-btn,.drug-xref,
  .chat-input-row,.chat-disclaimer,.chat-starter,button:not(.acc-h){display:none !important}
  .ct{padding:0;max-width:100%}
  .card{break-inside:avoid;border:1px solid #ccc;margin-bottom:8px;box-shadow:none}
  .ab{max-height:none !important}
  .stat,.stats{break-inside:avoid}
  body{background:#fff!important;color:#000!important;font-size:11pt}
  .note-p,.note-sec-hdr{color:#000!important}
  .explain-box,.explain-box-q{border:1px solid #999!important;color:#000!important;background:#f9f9f9!important}
  .acc-ar{display:none}
  h1:after{content:' — Study Notes';font-size:10pt;font-weight:400;color:#666}
  @page{margin:1.5cm}
}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.share-btn{font-size:13px;padding:2px 6px;opacity:.5;cursor:pointer;border:none;background:none}
.share-btn:hover{opacity:1}
.empty{text-align:center;padding:32px 16px;color:#94a3b8;font-size:12px;line-height:1.7}

body.dark{background:#0f172a;color:#e2e8f0}
body.dark .card{background:#1e293b;border-color:#334155}
body.dark .hdr{background:linear-gradient(135deg,#000,#0f172a)}
body.dark .tabs{background:#1e293b;border-color:#334155}
body.dark .tabs button:not(.on){color:#94a3b8}

body.dark .qo:not(.lk):hover{border-color:#475569;background:#1e293b}

body.dark .qo.ok{background:#064e3b;border-color:#065f46;color:#a7f3d0}

body.dark .qo.dim{border-color:#334155;color:#64748b}

body.dark select{background:#1e293b;color:#e2e8f0}

body.dark .fc{background:#1e293b;border-color:#334155;color:#e2e8f0}

body.dark .topic.done{background:#064e3b;border-color:#065f46}

body.dark .stat{background:#1e293b;border-color:#334155}
body.dark .sec-t{color:#f1f5f9}
body.dark .drug-row{border-color:#334155;color:#e2e8f0}
body.dark .osce-card{border-color:#334155;color:#e2e8f0}
body.dark .osce-card:hover{border-color:#475569}

/* Study Notes structured formatting */
.note-sec-hdr{font-weight:700;color:#0f172a;margin-top:18px;margin-bottom:5px;font-size:13px;padding-bottom:5px;border-bottom:2px solid #e2e8f0;letter-spacing:.01em}
body.dark .note-sec-hdr{color:#7dd3fc;border-bottom-color:#334155}
.note-p{font-size:13px;line-height:2;color:#1e293b;margin-bottom:10px}
body.dark .note-p{color:#cbd5e1}
.note-pearl{border-left:3px solid #94a3b8;padding:6px 14px 6px 16px;margin:16px 0}
body.dark .note-pearl{border-left-color:#475569}
.note-pearl-sub{font-weight:700;font-size:12px;margin:10px 0 3px;color:#0f172a}
body.dark .note-pearl-sub{color:#7dd3fc}
.note-pearl-p{font-size:13px;line-height:1.9;margin:3px 0 6px;color:#1e293b}
body.dark .note-pearl-p{color:#cbd5e1}
.note-ul{margin:3px 0 8px 18px;padding:0;list-style:disc}
.note-ul li{font-size:12px;line-height:1.8;margin-bottom:3px;color:#1e293b}
body.dark .note-ul li{color:#cbd5e1}
.note-src{display:inline-block;background:#eff6ff;color:#1d4ed8;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:14px}
body.dark .note-src{background:#172554;color:#93c5fd}
.note-sep{border-top:1px solid #e2e8f0;margin-top:16px;padding-top:12px}
body.dark .note-sep{border-top-color:#334155}

/* Review tab: badge & prose classes */
.rev-badge-ch{background:#eff6ff;color:#1d4ed8;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
.rev-badge-topic{background:#f0fdf4;color:#166534;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px}
.rev-badge-rep{background:#fffbeb;color:#d97706;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid #fde68a}
.rev-sub{font-size:11px;color:#64748b}
.rev-next-info{font-size:11px;color:#94a3b8}
.rev-ans-info{font-size:11px;color:#64748b;align-self:center;margin-left:4px}
body.dark .rev-badge-ch{background:#172554;color:#93c5fd}
body.dark .rev-badge-topic{background:#064e3b;color:#6ee7b7}
body.dark .rev-badge-rep{background:#451a03;color:#fcd34d;border-color:#92400e}
body.dark .rev-sub{color:#94a3b8}
body.dark .rev-next-info{color:#94a3b8}
body.dark .rev-ans-info{color:#94a3b8}

/* Chat tab */
.chat-msg-user{background:#dbeafe;color:#1e3a8a;padding:8px 12px;border-radius:12px 12px 0 12px;margin:4px 0 4px 40px;font-size:12px}
.chat-msg-ai{background:#f0fdf4;color:#166534;padding:8px 12px;border-radius:12px 12px 12px 0;margin:4px 40px 4px 0;font-size:12px;white-space:pre-wrap}
body.dark .chat-msg-user{background:#1e3a5f;color:#bfdbfe}
body.dark .chat-msg-ai{background:#0f2d1a;color:#86efac}

const SUPA_URL='YOUR_SUPABASE_URL';
const SUPA_KEY='YOUR_SUPABASE_ANON_KEY';
let _supa=null;
function _getSupaClient(){
  if(_supa)return _supa;
  const url=localStorage.getItem('supa_url')||SUPA_URL;
  const key=localStorage.getItem('supa_key')||SUPA_KEY;
  try{
    if(window.supabase&&url!=='YOUR_SUPABASE_URL'){
      _supa=window.supabase.createClient(url,key);
    }
  }catch(e){console.warn('Supabase init failed',e);}
  return _supa;
}
function getCloudUserId(){
  let uid=localStorage.getItem('samega_uid');
  if(!uid){uid=crypto.randomUUID();localStorage.setItem('samega_uid',uid);}
  return uid;
}
async function backupData(){
  const client=_getSupaClient();
  if(!client){showToast('⚠️ Supabase not configured — add URL/key in settings',4000);return;}
  const uid=getCloudUserId();
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k)data[k]=localStorage.getItem(k);
  }
  const btn=document.getElementById('supa-bk-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Backing up...';}
  try{
    const {error}=await client.from('progress_state').upsert({user_id:uid,data,updated_at:new Date().toISOString()},{onConflict:'user_id'});
    if(error)throw error;
    showToast('✅ Backup complete! Synced to cloud.',3000);
  }catch(e){showToast('❌ Backup failed: '+e.message,5000);}
  if(btn){btn.disabled=false;btn.textContent='☁️ Backup to Cloud';}
}
async function restoreData(){
  const client=_getSupaClient();
  if(!client){showToast('⚠️ Supabase not configured',4000);return;}
  const uid=getCloudUserId();
  if(!confirm('Restore from cloud? This will OVERWRITE your current local progress.'))return;
  const btn=document.getElementById('supa-rs-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Restoring...';}
  try{
    const {data,error}=await client.from('progress_state').select('data').eq('user_id',uid).single();
    if(error)throw error;
    if(!data||!data.data){showToast('⚠️ No backup found for this device',4000);return;}
    const savedUid=localStorage.getItem('samega_uid');
    localStorage.clear();
    Object.entries(data.data).forEach(([k,v])=>localStorage.setItem(k,v));
    if(savedUid)localStorage.setItem('samega_uid',savedUid);
    showToast('✅ Restored from cloud! Reloading...',2000);
    setTimeout(()=>location.reload(),2000);
  }catch(e){showToast('❌ Restore failed: '+e.message,5000);}
  if(btn){btn.disabled=false;btn.textContent='📥 Restore from Cloud';}
}

function highlightTerms(text, term){
  if(!term||term.length<2)return text;

let _exCache=Object.assign({"428": {"text": "✅ נכון (B): קריטריוני Fried מחייבים 3 מתוך 5 רכיבים לאבחנת שבריריות: ירידה במשקל, אחיזה חלשה, מהירות הליכה איטית, עייפות ופעילות פיזית נמוכה. המטופל מציג 4 מתוך 5 קריטריונים - קושי בהליכה (מהירות איטית), אחיזה חלשה (לא מצליח להרים סל), עייפות לאחר מעברים ופעילות פיזית נמוכה.\n\n❌ A: מציגה רק 3 קריטריונים (ירידת משקל של 2 ק\"ג בשנה אינה עומדת בסף של 4.5 ק\"ג או 5% ממשקל הגוף).\n\n❌ C: מציגה רק 2 קריטריונים - עייפות וירידת משקל, אך האחיזה תקינה (מסוגלת להרים סל קניות).\n\n❌ D: מציג פעילות גבוהה (הולך למועדון יומית) ללא ירידת משקל, רק הצורך בעזרה בקניות אינו מספיק לאבחנה.\n\n📌 פנינת מבחן: קריטריוני Fried דורשים 3 מתוך 5 רכיבים (ירידת משקל >4.5 ק\"ג/שנה, אחיזה חלשה, הליכה איטית, עייפות, פעילות נמוכה) לאבחנת שבריריות.\n\n📖 מקור: Hazzard's Ch 20 Frailty & Sarcopenia", "src": "Hazzard's Ch 20 (Frailty & Sarcopenia)", "ts": 1775590951076}, "430": {"text": "✅ נכון (A): בדליריום מתרחשת האטה גלובלית של פעילות המוח עקב הפרעה מטבולית או דלקתית המשפיעה על תפקוד הקורטקס בצורה נרחבת. ה-EEG מראה האטה של קצב הגלים הבסיסיים (מ-8-13 Hz ל-4-7 Hz) עם שמירה יחסית על גלי אלפא, מה שמשקף את ההפרעה הדיפוזית בפעילות הנוירונלית.\n\n❌ B: ספייקים פוקאליים מאפיינים אפילפסיה או נגע מוקדי במוח, לא את ההפרעה הגלובלית של דליריום.\n\n❌ C: גלים מחודדים באונה הטמפוראלית מציינים פתולוגיה מקומית כמו אנצפליטיס הרפס או נגע ממוקד.\n\n❌ D: גלים ביפאזים וטריפאזים הם ממצא אופייני לאנצפלופתיה הפטית או למחלת קרויצפלד-יעקב.\n\n📌 פנינת מבחן: דליריום גורם להאטה גלובלית ב-EEG עם שמירה על גלי אלפא, בניגוד לממצאים פוקאליים באפילפסיה או בנגעים מוקדיים.\n\n📖 מקור: Hazzard's Ch 58 Delirium", "src": "Hazzard's Ch 58 (Delirium)", "ts": 1775590964338}, "432": {"text": "✅ נכון (B): נגע חדש בגיל 90 מחייב הערכה היסטופתולוגית מיידית לשלילת ממאירות, במיוחד קרצינומה של תאי הבסיס או קרצינומה של תאי קשקש. ביופסיה על ידי פלסטיקאי מאפשרת גם אבחנה וגם טיפול בו-זמנית במידת הצורך.\n\n❌ A: צריבה עם חנקן נעשית רק לאחר אישור היסטופתולוגי של נגע שפיר, ולא כטיפול ראשוני בנגע לא מאובחן.\n\n❌ C: משחה עם סטרואידים עלולה להסתיר תהליך ממאיר ולעכב את האבחנה הנכונה של הנגע החדש.\n\n❌ D: מעקב של 3 חודשים בנגע חדש בגיל 90 מהווה דחייה מסוכנת של אבחנה פוטנציאלית של ממאירות עורית.\n\n📌 פנינת מבחן: כל נגע עור חדש בגיל מתקדם מחייב ביופסיה לשלילת ממאירות לפני כל שיקול טיפולי אחר.\n\n📖 מקור: Hazzard's Ch 13 Pharmacology & Beers", "src": "Hazzard's Ch 13 (Pharmacology & Beers)", "ts": 1775590976070}, "433": {"text": "✅ נכון (A): במקרה של אלצהיימר המתחיל לפני גיל 65 עם דפוס משפחתי חזק (אם בגיל 68, דוד בגיל 61), הגן השכיח ביותר שגורם לצורה המשפחתית הוא PSEN1 (Presenilin 1), האחראי על כ-80% מהמקרים של Early-Onset Familial Alzheimer's Disease. הגן משפיע על עיבוד חלבון APP ועל ייצור האמילואיד.\n\n❌ B: רק 5-10% מכלל מקרי Early-Onset Alzheimer מוסברים על ידי מוטציות גנטיות ידועות (PSEN1, PSEN2, APP).\n\n❌ C: הטרוזיגוטיות לAPOE ε4 מעלה את הסיכון פי 3-4, אך לא מגיעה לסיכוי של מעל 50% לפיתוח המחלה.\n\n❌ D: מוטציות בגן MAPT קשורות ל-Frontotemporal Dementia ולא למחלת אלצהיימר, והן לא משפיעות על קצב ההתדרדרות באלצהיימר.\n\n📌 פנינת מבחן: PSEN1 הוא הגן השכיח ביותר באלצהיימר משפחתי מוקדם עם התחלה לפני גיל 65.\n\n📖 מקור: Hazzard's Ch 59 Dementia", "src": "Hazzard's Ch 59 (Dementia)", "ts": 1775590987560}, "435": {"text": "✅ נכון (A): דולוקסטין הוא SNRI המאושר לטיפול בכאב נוירופתי וכאב שרירי-שלדי כרוני, ובמקביל מטפל בדיכאון הקשור לאבל. במינון 30 מ\"ג ליום הוא בטוח לקשישים ומתאים במיוחד למטופלת זו שסובלת מכאב דיסקופתיה וירידה במצב הרוח.\n\n❌ B: פנטניל הוא אופיואיד חזק המיועד לכאב סרטני או כאב כרוני חמור, ולא מהווה קו טיפול ראשון בכאב דיסקופתיה.\n\n❌ C: פרגבלין במינון 300 מ\"ג ליום הוא מינון גבוה יחסית לקשישים ועלול לגרום לסחרחורת ונפילות.\n\n❌ D: אסציטלופרם מטפל בדיכאון בלבד אך אינו יעיל לטיפול בכאב נוירופתי או שרירי-שלדי.\n\n📌 פנינת מבחן: דולוקסטין הוא הבחירה הראשונה בקשישים עם כאב כרוני ודיכאון בשל יעילותו הכפולה.\n\n📖 מקור: Hazzard's Ch 58 Delirium", "src": "Hazzard's Ch 58 (Delirium)", "ts": 1775591000136}, "436": {"text": "✅ נכון (D): דמנציה פרונטוטמפורלית מאופיינת באובדן אמפתיה כתסמין מוקדם ובולט עקב נזק לקורטקס הפרונטלי הממונה על פונקציות ביצועיות והתנהגות חברתית. החולים מפתחים אדישות רגשית, חוסר יכולת לזהות רגשות אחרים וחוסר התחשבות חברתית.\n\n❌ A: במחלת אלצהיימר האמפתיה נשמרת יחסית בשלבים המוקדמים והבעיה העיקרית היא בזיכרון.\n\n❌ B: בדמנציה וסקולרית התסמינים תלויים במיקום הפגיעה הוסקולרית ולא בהכרח כוללים אובדן אמפתיה.\n\n❌ C: בדמנציה עם גופי לוי התסמינים הבולטים הם הזיות ויזואליות, תנודות קוגניטיביות ותסמיני פרקינסוניזם.\n\n📌 פנינת מבחן: אובדן אמפתיה מוקדם הוא סימן פתוגנומוני לדמנציה פרונטוטמפורלית.\n\n📖 מקור: Hazzard's Ch 59 Dementia", "src": "Hazzard's Ch 59 (Dementia)", "ts": 1775591012099}, "438": {"text": "✅ נכון (C): היצרות המסתם האאורטלי גורמת להפרעה בתפקוד הטסיות כתוצאה מפגיעה מכנית בטסיות בעת מעברן דרך המסתם המצומצם והמסויד. הזרימה הטורבולנטית והמהירות הגבוהה דרך הפתח הצר פוגעות בממברנה של הטסיות ובתפקוד הצבירה שלהן.\n\n❌ A: חסם עלייתי חדרי אינו סיבוך של היצרות אאורטלית אלא של פתולוגיה במערכת ההולכה החשמלית של הלב.\n\n❌ B: השטחה של המיקרווילי היא סיבוך של מחלות מעיים דלקתיות ואינה קשורה להיצרות המסתם האאורטלי.\n\n❌ D: עליה ברמות VON WILLEBRAND FACTOR אינה הסיבוך הישיר - למעשה יש ירידה ברמות המולטימרים הגדולים של vWF.\n\n📌 פנינת מבחן: היצרות אאורטלית חמורה גורמת לפגיעה מכנית בטסיות עקב הזרימה הטורבולנטית דרך המסתם הצר.\n\n📖 מקור: Hazzard's Ch 13 Pharmacology & Beers", "src": "Hazzard's Ch 13 (Pharmacology & Beers)", "ts": 1775591023211}, "440": {"text": "✅ נכון (B): המטופלת עונה על כל ארבעת קריטריוני CAM - שינוי חד במצב המנטלי עם דפוס תנודתי (ישנונית ביום, אי שקט בלילה), הפרעה בקשב (נרדמת תוך כדי משפטים), חשיבה לא מאורגנת (אינה מצליחה במשימות פשוטות כמו איות שם לאחור), ושינוי ברמת התודעה (ישנונית יתר). ה-UTI מהווה הטריגר הקלאסי לדליריום בקשישים עם דמנציה רקע.\n\n❌ A: המצב הוא כרוני (חודשים) ללא שינוי חד או תנודתיות, מתאים יותר לדמנציה מתקדמת עם הפרעות התנהגות.\n\n❌ C: השינויים הקוגניטיביים הם יציבים ואינם תנודתיים מאז האירוע המוחי, מתאימים לפגיעה קוגניטיבית וסקולרית קבועה.\n\n❌ D: המטופל מראה התנהגות לא שיתופית אך ללא עדות לשינוי חד במצב המנטלי או הפרעה בקשב.\n\n📌 פנינת מבחן: דליריום מחייב שינוי חד במצב המנטלי עם דפוס תנודתי בנוסף להפרעה בקשב.\n\n📖 מקור: Hazzard's Ch 58 Delirium", "src": "Hazzard's Ch 58 (Delirium)", "ts": 1775591036762}, "443": {"text": "✅ נכון (C): הפחתת לחץ ומעקב היא הטיפול הראשוני המומלץ בפצעי לחץ בשלב מוקדם (שלב 1-2), כאשר הסרת הגורם הפתוגני (לחץ מתמשך) והמעקב הקפדני מאפשרים ריפוי ספונטני של הרקמה. גישה זו מונעת התערבויות מיותרות ומאפשרת הערכה של קצב ההחלמה הטבעי.\n\n❌ A: הטריה כירורגית מיועדת לפצעי לחץ מתקדמים עם רקמה נמקית או זיהום עמוק, ולא נדרשת בשלבים מוקדמים.\n\n❌ B: אנטיביוטיקה סיסטמית רחבת טווח מיועדת רק לפצעים עם סימני זיהום סיסטמי או צלוליטיס, ולא לטיפול מונע.\n\n❌ D: גרב אלסטית עלולה להגביר את הלחץ המקומי ולהחמיר את הפצע במקום לטפל בו.\n\n📌 פנינת מבחן: הטיפול הראשוני בפצעי לחץ מוקדמים הוא תמיד הסרת הלחץ ולא התערבות אגרסיבית.\n\n📖 מקור: Hazzard's Ch 13 Pharmacology & Beers", "src": "Hazzard's Ch 13 (Pharmacology & Beers)", "ts": 1775591048578}, "446": {"text": "✅ נכון (C): במטופל עם דמנציה בדרגת חומרה בינונית הזקוק לכריתת גפה דחופה, כאשר קיים יפוי כח מתמשך שלא הופעל, יש להפעיל את תוקף יפוי הכח באופן מיידי ולקבל הסכמה ממיופה הכח. זהו הליך המאפשר קבלת החלטה רפואית דחופה כאשר המטופל אינו כשיר לתת הסכמה מדעת.\n\n❌ A: הנחיות מקדימות רלוונטיות רק למצבים של חולה נוטה למות ולא לניתוח כריתה בחולה יציב.\n\n❌ B: אין הליך של חתימת 3 רופאים לכריתה ללא הסכמה בחוק הישראלי.\n\n❌ D: מינוי אפוטרופוס הוא הליך ארוך שאינו מתאים למצב דחוף הדורש כריתה בימים הקרובים.\n\n📌 פנינת מבחן: יפוי כח מתמשך קיים מאפשר קבלת הסכמה מיידית למטופל לא כשיר.\n\n📖 מקור: חוק החולה הנוטה למות, תשס\"ה-2005", "src": "Israeli Law – Dying Patient Act 2005", "ts": 1775591058276}, "450": {"text": "✅ נכון (A): Hydrocolloids כגון Granuflex מתאימים לפצעים עם אקסודט מינימלי עד בינוני, יוצרים סביבה לחה המעודדת ריפוי והם אוקלוסיביים למחצה המאפשרים חילופי גזים. הם מושלמים לפצעים שטחיים עד עמוקים בינוניים במצב נקי ללא זיהום פעיל.\n\n❌ B: Hydrogels מיועדים לפצעים יבשים או עם נקרוזיס, לא לפצעים עם רמת לחות נורמלית.\n\n❌ C: Alginates מתאימים לפצעים עם אקסודט רב עד כבד ולא לפצעים עם הפרשה מועטה.\n\n❌ D: Hydrofibers מיועדים לפצעים עם אקסודט כבד או זיהום, לא למצב הפצע המוצג.\n\n📌 פנינת מבחן: Hydrocolloids הם הבחירה הראשונה לפצעים נקיים עם אקסודט מינימלי-בינוני הדורשים סביבה לחה לריפוי.\n\n📖 מקור: Hazzard's Ch 13 Pharmacology & Beers", "src": "Hazzard's Ch 13 (Pharmacology & Beers)", "ts": 1775591069160}, "453": {"text": "✅ נכון (D): היפואלבומינמיה עם רמת אלבומין של 2.2 גרם/דציליטר או פחות היא קריטריון פרוגנוסטי מבוסס במחקרים של Mitchell לתוחלת חיים קצרה מ-6 חודשים בדמנציה מתקדמת. האלבומין משקף את המצב התזונתי והתפקודי הכללי ומנבא תמותה גבוהה בחולים במצב FAST 7C.\n\n❌ A: פצעי לחץ דרגה 2 אינם מהווים קריטריון פרוגנוסטי מבוסס לתוחלת חיים קצרה מ-6 חודשים במודל של Mitchell.\n\n❌ B: צלוליטיס הוא זיהום חריף שאינו נכלל בקריטריונים הפרוגנוסטיים ארוכי הטווח לתוחלת חיים בדמנציה מתקדמת.\n\n❌ C: בשלב FAST 7C כבר קיים ירידה קוגניטיבית מקסימלית, ו-MMSE אינו מהווה קריטריון פרוגנוסטי נוסף בשלב זה.\n\n📌 פנינת מבחן: אלבומין ≤2.2 גרם/דציליטר הוא קריטריון פרוגנוסטי מרכזי לתוחלת חיים קצרה בדמנציה מתקדמת.\n\n📖 מקור: Hazzard's Ch 59 (Dementia)", "src": "Hazzard's Ch 59 (Dementia)", "ts": 1775591079731}, "456": {"text": "✅ נכון (A): שאלון SARC-F כולל 5 רכיבים: Strength (כוח), Assistance in walking (עזרה בהליכה), Rise from a chair (קימה מכיסא), Climb stairs (עליה במדרגות), ו-Falls (נפילות). נפילות הן רכיב מרכזי בהערכת סרקופניה מכיוון שחולשת שרירים מגבירה את הסיכון לאי יציבות ונפילות.\n\n❌ B: השאלון שואל על עליה במדרגות ולא על ירידה במדרגות.\n\n❌ C: השאלון בודק קימה מכיסא ולא מעברים במיטה.\n\n❌ D: SARC-F הוא שאלון תפקודי ואינו כולל בדיקות הדמיה או מעבדה כמו צפיפות עצם.\n\n📌 פנינת מבחן: SARC-F כולל 5 רכיבים תפקודיים כולל נפילות, ואינו דורש בדיקות מעבדה או הדמיה.\n\n📖 מקור: Hazzard's Ch 20 (Frailty & Sarcopenia)", "src": "Hazzard's Ch 20 (Frailty & Sarcopenia)", "ts": 1775591088847}, "457": {"text": "✅ נכון (B): פמפיגואיד בולוזי הוא המחלה האוטואימונית השכיחה ביותר בקרב מבוגרים מעל גיל 60, המתאפיינת בשלפוחיות מוצקות על רקע דלקתי אורטיקרי עם גרד עז ללא מעורבות ריריות. המחלה נגרמת מנוגדנים נגד BP180 ו-BP230 באזור הממברנה הבזאלית, היוצרים פיצול תת-אפידרמלי והשלפוחיות המוצקות האופייניות.\n\n❌ A: פמפיגוס פוליאצאוס מתאפיין בשלפוחיות רדודות שמתפרצות מיד ויוצרות קרום ללא המראה האורטיקרי האופייני.\n\n❌ C: פמפיגוס וולגריס כולל תמיד מעורבות ריריות משמעותית (פה, איברי מין) שאינה מתוארת כאן.\n\n❌ D: פמפיגוס פרה-נאופלסטי כולל מעורבות ריריות קשה וקשור למחלה אונקולוגית פעילה שאינה מוזכרת.\n\n📌 פנינת מבחן: פמפיגואיד בולוזי הוא האבחנה העיקרית בשלפוחיות מוצקות עם רקע אורטיקרי ללא מעורבות ריריות בקשישים.\n\n📖 מקור: Hazzard's Ch 13 Dermatologic Changes and Disorders", "src": "Hazzard's Ch 13 (Pharmacology & Beers)", "ts": 1775591102296}, "458": {"text": "✅ נכון (C): בהיצרות אאורטלית קשה א-תסמינית נדרש מעקב אקו הדוק פעמיים בשנה בשל הסיכון הגבוה להתקדמות מהירה למצב תסמיני ומוות לבבי פתאומי. החמרה המהירה של הפונקציה החדרית השמאלית והתפתחות לחץ אטריאלי שמאלי גבוה מחייבים זיהוי מוקדם.\n\n❌ A: היצרות קלה דורשת מעקב קבוע כל 3-5 שנים גם ללא תסמינים על מנת לזהות התקדמות.\n\n❌ B: היצרות בינונית דורשת מעקב תכוף יותר - כל 1-2 שנים ולא כל חמש שנים.\n\n❌ D: תדירות המעקב חייבת להיקבע על פי חומרת ההיצרות ולא להיות אחידה לכל החולים.\n\n📌 פנינת מבחן: היצרות אאורטלית קשה א-תסמינית מחייבת מעקב אקו פעמיים בשנה עקב סיכון גבוה להתדרדרות מהירה.\n\n📖 מקור: Hazzard's Ch 13 Pharmacology & Beers", "src": "Hazzard's Ch 13 (Pharmacology & Beers)", "ts": 1775591113331}},JSON.parse(localStorage.getItem(EX_LS)||'{}'));

async function explainWithAI(qIdx){
  const key=getApiKey();
  if(!key){
    const k=prompt('הכנס Anthropic API Key (יישמר מקומית בדפדפן):','');
    if(!k)return;setApiKey(k);
  }
  if(_exCache[qIdx]){renderExplainBox(qIdx,_exCache[qIdx]);return;}

  if(box)box.innerHTML='<div style="color:#64748b;font-size:11px">⏳ שואל את קלוד...</div>';
  const q=QZ[qIdx];
  const src=HAZZARD_MAP[q.ti]||'Hazzardʼs Geriatric Medicine 8e';
  const opts=q.o.map((o,i)=>` ${String.fromCharCode(65+i)}. ${o}`).join('\n');
  const correctLetter=String.fromCharCode(65+q.c);
  const correctText=q.o[q.c];
  const wrongOpts=q.o.map((o,i)=>i!==q.c?`${String.fromCharCode(65+i)}. ${o}`:'').filter(Boolean).join('\n');
  const prompt=`You are a senior geriatrician explaining a Shlav A (Israeli IMA geriatrics board exam) question.

ANSWER KEY: The correct answer is DEFINITIVELY Option ${correctLetter}: "${correctText}"
This is from the official IMA answer key — do NOT question it. Build your explanation around it.

QUESTION (Hebrew): ${q.q}

ALL OPTIONS:
${opts}

WRONG OPTIONS TO DESTROY:
${wrongOpts}

PRIMARY SOURCE: ${src}

Explain in Hebrew. Use this EXACT format — no preamble, start immediately:
✅ נכון (${correctLetter}): [WHY this answer is correct — mechanism, evidence, threshold, guideline. 2-3 sentences. Be specific.]

${q.o.map((o,i)=>i===q.c?'':` ❌ ${String.fromCharCode(65+i)}: [exact reason this is wrong — one specific sentence]`).filter(Boolean).join('\n')}

📌 פנינת מבחן: [one sentence, exam-extractable rule, starts with the key fact]

📖 מקור: [Hazzard's Ch X title / Harrison's Ch Y title / Article name — cite the specific chapter from P005-2026 that contains the supporting evidence]

Rules: Hebrew only. Clinical mechanism, not vague. If answer seems counterintuitive, explain why it is still correct per guidelines.`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-6',max_tokens:800,messages:[{role:'user',content:prompt}]})
    });
    if(!resp.ok){
      const e=await resp.json().catch(()=>({}));
      if(resp.status===401||resp.status===403){localStorage.removeItem('samega_apikey');throw new Error('API key invalid — cleared. Tap Explain again to enter a new key.');}
      throw new Error(e.error?.message||('HTTP '+resp.status));
    }
    const data=await resp.json();
    const text=data.content[0].text;
    _exCache[qIdx]={text,src,ts:Date.now()};saveExCache();
    renderExplainBox(qIdx,_exCache[qIdx]);
  }catch(e){
    const offline=!navigator.onLine||e.message.includes('Failed to fetch');
    if(box)box.innerHTML=`<div style="color:#dc2626;font-size:11px">${offline?'📡 אין חיבור':'❌ '+(sanitize(e.message))}</div>`;
  }
}

function renderExplainBox(qIdx,entry){
  const box=document.getElementById('ex-box-'+qIdx);
  if(!box)return;
  const lines=entry.text.split('\n').filter(l=>l.trim());
  const html=lines.map(l=>{
    if(l.startsWith('✅'))return`<div style="background:#dcfce7;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-weight:600">${sanitize(l)}</div>`;
    if(l.startsWith('❌'))return`<div style="color:#991b1b;padding:3px 0">${sanitize(l)}</div>`;
    if(l.startsWith('📌'))return`<div class="explain-pearl">${sanitize(l)}</div>`;
    if(l.startsWith('📖'))return`<div class="explain-src">${sanitize(l)}</div>`;
    return`<div style="padding:2px 0">${sanitize(l)}</div>`;
  }).join('');
  box.innerHTML=html;
}

function srScore(qIdx,correct){
const key=_srKey(qIdx);
if(!S.sr[key])S.sr[key]={ef:2.5,n:0,next:0};
const s=S.sr[key];
const q=correct?4:1;
s.ef=Math.max(1.3,s.ef+(.1-(5-q)*(.08+(5-q)*.02)));
s.n=correct?s.n+1:0;
const days=s.n<=1?1:s.n===2?3:Math.round((s.n-1)*s.ef);
s.next=Date.now()+days*86400000;
save();
}

let examCfg={n:60,t:60};
let examStats={byTopic:{},times:[],startTs:0,qTs:0};
let showExamConfig=false,showExamResults=false;
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
function buildPool(){
if(filt==='weak'){
const ts=getTopicStats();
const weakTopics=TOPICS.map((_,i)=>({i,s:ts[i]||{ok:0,no:0,tot:0}})).filter(p=>p.s.tot>=3).sort((a,b)=>{const pa=a.s.tot?a.s.ok/a.s.tot:0,pb=b.s.tot?b.s.ok/b.s.tot:0;return pa-pb;}).slice(0,10).map(p=>p.i);
if(weakTopics.length===0){pool=QZ.map((_,i)=>i);}else{pool=QZ.map((_,i)=>i).filter(i=>weakTopics.includes(QZ[i].ti));}
shuffle(pool);qi=0;return;}
if(filt==='due'){pool=getDueQuestions();qi=0;return;}

pool=[];
const due=getDueQuestions();
if(filt==='due'){pool=due.length?due:[];}
else if(filt==='topic'&&topicFilt>=0){QZ.forEach((q,i)=>{if(q.ti===topicFilt)pool.push(i)});}
else{QZ.forEach((q,i)=>{if(filt==='all'||q.t.includes(filt))pool.push(i)});}
shuffle(pool);qi=0;sel=null;ans=false;
}
// buildPool() deferred to initApp()

const WEAK_THRESH=0.6, WEAK_MIN=2;
function selectWeakTopics(){
  const ts=getTopicStats();
  const weak=TOPICS.map((_,i)=>i).filter(i=>{const s=ts[i];return s&&s.tot>=WEAK_MIN&&s.ok/s.tot<WEAK_THRESH;});
  selectedTopics=new Set(weak.length?weak:TOPICS.map((_,i)=>i));
  render();
}
function startTopicPractice(){
  if(!selectedTopics.size)return;
  pool=[];
  QZ.forEach((q,i)=>{if(selectedTopics.has(q.ti))pool.push(i);});
  shuffle(pool);
  qi=0;sel=null;ans=false;
  filt='all';topicFilt=-1;
  showTopicPicker=false;
  render();
}

function setFilt(f){filt=f;topicFilt=-1;buildPool();render()}
function setTopicFilt(ti){filt='topic';topicFilt=ti;buildPool();render()}
function pick(i){if(ans)return;sel=i;render()}
function check(){
if(sel===null)return;ans=true;teachBackState=null;
const q=QZ[pool[qi]];
const ti_=q.ti;
if(examMode){
  if(!examStats.byTopic[ti_])examStats.byTopic[ti_]={ok:0,no:0,wrong:[]};
  if(sel===q.c)examStats.byTopic[ti_].ok++;
  else{examStats.byTopic[ti_].no++;if(!examStats.byTopic[ti_].wrong)examStats.byTopic[ti_].wrong=[];examStats.byTopic[ti_].wrong.push(pool[qi]);}
  srScore(pool[qi],sel===q.c);
  examStats.times.push(Date.now()-examStats.qTs);
}else{
  if(sel===q.c){S.qOk++;srScore(pool[qi],true);if(ti_>=0){if(!S.tpOk[ti_])S.tpOk[ti_]=0;S.tpOk[ti_]++;}}
  else{S.qNo++;srScore(pool[qi],false);if(ti_>=0){if(!S.tpNo[ti_])S.tpNo[ti_]=0;S.tpNo[ti_]++;}}
}
const dk=(new Date()).toISOString().slice(0,10);if(!S.dailyLog)S.dailyLog={};S.dailyLog[dk]=true;
const _elapsed=Date.now()-_qStartTime;
if(_elapsed>500&&_elapsed<120000){
  if(!S.qTimes)S.qTimes={};
  const _ti=String(q.ti);
  if(!S.qTimes[_ti])S.qTimes[_ti]={sum:0,n:0};
  S.qTimes[_ti].sum+=_elapsed;
  S.qTimes[_ti].n++;
}
save();render();
if(examMode)examAnswers[qi]={sel,ans};
}
function next(){
if(examMode&&qi+1>=pool.length){endExam();return;}
qi++;if(qi>=pool.length)qi=0;sel=null;ans=false;teachBackState=null;
if(examMode){examStats.qTs=Date.now();if(examAnswers[qi]){sel=examAnswers[qi].sel??null;ans=examAnswers[qi].ans??false;}}
render();
}
function showAnswerHardFail(){
if(ans)return;
const q=QZ[pool[qi]];
sel=q.c;ans=true;teachBackState=null;
if(!examMode){
  S.qNo++;
  if(q.ti>=0){if(!S.tpNo[q.ti])S.tpNo[q.ti]=0;S.tpNo[q.ti]++;}
  const key=_srKey(pool[qi]);
  if(!S.sr[key])S.sr[key]={ef:2.5,n:0,next:0};
  S.sr[key].ef=Math.max(1.3,(S.sr[key].ef||2.5)-0.3);
  S.sr[key].n=0;
  S.sr[key].next=Date.now();
  const dk=(new Date()).toISOString().slice(0,10);if(!S.dailyLog)S.dailyLog={};S.dailyLog[dk]=true;
}
save();render();
}
function toggleBk(){S.bk[pool[qi]]=!S.bk[pool[qi]];save();render();}
function assignBkFolder(qIdx){
  const existing=[...new Set(Object.values(S.bkFolders).filter(Boolean))];
  const opts=existing.length?existing.join(', ')+' (or type new name)':'Type a folder name';
  const name=prompt('Assign to folder:\n'+opts);
  if(name===null)return;
  if(!name.trim()){delete S.bkFolders[qIdx];save();render();return;}
  S.bkFolders[qIdx]=name.trim();save();render();
}

// ===== EXAM MODE =====
let teachBackState=null;
async function gradeTeachBack(qIdx, userExplanation){
  teachBackState='grading'; render();
  const q=QZ[qIdx];
  const correctOption=q.o[q.c];
  const apiKey=getApiKey();
  if(!apiKey){teachBackState={score:null,feedback:'\u{1F4A1} Add API key for AI grading'};render();return;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:200,
        messages:[{role:'user',content:`You are grading a medical student's teach-back explanation.\nQuestion: ${q.q}\nCorrect answer: ${correctOption}\nStudent explanation: ${userExplanation}\n\nGrade on a scale of 1-3:\n1 = Incorrect/incomplete understanding\n2 = Partial understanding  \n3 = Correct and complete\n\nReply with ONLY: {"score": N, "feedback": "one sentence in Hebrew"}`}]
      })
    });
    const data=await res.json();
    const txt=data.content?.[0]?.text||'';
    const parsed=JSON.parse(txt.match(/{.*}/s)?.[0]||'{}');
    teachBackState={score:parsed.score||1, feedback:parsed.feedback||'No feedback'};
  }catch(e){teachBackState={score:null,feedback:'\u05E9\u05D2\u05D9\u05D0\u05D4: '+e.message};}
  render();
}

function startExamConfig(){showExamConfig=true;render();}
function launchExam(){
  showExamConfig=false;
  examMode=true;
  const ts=getTopicStats();
  const weakTi=TOPICS.map((_,i)=>i).filter(i=>{const s=ts[i];return s&&s.tot>=3&&s.ok/s.tot<0.7;});
  let wPool=[],rPool=[];
  if(weakTi.length>0){
    const weakSet=new Set(weakTi);
    QZ.forEach((_,i)=>{if(weakSet.has(QZ[i].ti))wPool.push(i);else rPool.push(i);});
    shuffle(wPool);shuffle(rPool);
    const wN=Math.min(Math.round(examCfg.n*0.7),wPool.length);
    const rN=Math.min(examCfg.n-wN,rPool.length);
    pool=[...wPool.slice(0,wN),...rPool.slice(0,rN)];
    shuffle(pool);
  }else{
    pool=QZ.map((_,i)=>i);shuffle(pool);
  }
  pool=pool.slice(0,examCfg.n);
  examFlagged=new Set();examAnswers=new Array(pool.length).fill(null).map(()=>({sel:null,ans:false}));showExamReview=false;
  qi=0;sel=null;ans=false;
  examSec=examCfg.t*60;
  examStats={byTopic:{},times:[],startTs:Date.now(),qTs:Date.now()};
  if(examTimer)clearInterval(examTimer);
  examTimer=setInterval(()=>{
    examSec--;
    if(examSec<=0){endExam();return;}
    const el=document.getElementById('etimer');
    if(el){el.textContent=fmtT(examSec);if(examSec<=300)el.style.color='#ef4444';}
  },1000);
  render();
}
function endExam(){
  clearInterval(examTimer);examTimer=null;examMode=false;
  let ok=0,answered=0;
  Object.values(examStats.byTopic).forEach(t=>{ok+=t.ok;answered+=t.ok+(t.no||0);});
  const tot=answered||pool.length;
  const pct=Math.round(ok/tot*100)||0;
  const elapsed=Math.round((Date.now()-examStats.startTs)/1000);
  if(!S.examHistory)S.examHistory=[];
  S.examHistory.unshift({date:new Date().toISOString().slice(0,10),n:tot,ok,pct,elapsed,cfg:{...examCfg}});
  if(S.examHistory.length>10)S.examHistory.pop();
  save();
  // collect wrong answer indices for re-drill
  window._examWrongPool = [];
  Object.entries(examStats.byTopic).forEach(([ti, s]) => {
    if(s.wrong) s.wrong.forEach(idx => window._examWrongPool.push(idx));
  });
  showExamResults=true;render();
}
function fmtT(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return(h?h+':':'')+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0')}
function jumpToQ(idx){
  if(idx<0||idx>=pool.length)return;
  if(examMode)examAnswers[qi]={sel,ans};
  qi=idx;sel=examAnswers[idx]?.sel??null;ans=examAnswers[idx]?.ans??false;
  showExamReview=false;
  render();
}
function toggleExamFlag(){
  if(examFlagged.has(qi))examFlagged.delete(qi);else examFlagged.add(qi);
  render();
}

function renderExamReviewScreen(){
  let h=`<div class="sec-t">📋 Exam Review</div>`;
  h+=`<div style="font-size:11px;color:#64748b;margin-bottom:12px">Click a number to return to that question. Submit when ready.</div>`;
  h+=`<div style="display:flex;gap:6px;font-size:10px;margin-bottom:12px;flex-wrap:wrap">
  <span style="background:#94a3b8;color:#fff;padding:2px 8px;border-radius:6px">Gray = Answered</span>
  <span style="background:#ef4444;color:#fff;padding:2px 8px;border-radius:6px">Red = Unanswered</span>
  <span style="background:#f59e0b;color:#fff;padding:2px 8px;border-radius:6px">Yellow = Flagged</span></div>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-bottom:16px">`;
  for(let i=0;i<pool.length;i++){
    const a=examAnswers[i];
    const answered=a&&a.ans;
    const flagged=examFlagged.has(i);
    const isCurrent=i===qi;
    let bg=answered?'#94a3b8':'#ef4444';
    if(flagged)bg='#f59e0b';
    const border=isCurrent?'2px solid #1d4ed8':'2px solid transparent';
    h+=`<button onclick="jumpToQ(${i})" style="aspect-ratio:1;border-radius:6px;background:${bg};color:#fff;font-size:11px;font-weight:700;border:${border};cursor:pointer">${i+1}</button>`;
  }
  h+=`</div>`;
  const unanswered=pool.filter((_,i)=>!examAnswers[i]?.ans).length;
  const flaggedN=examFlagged.size;
  if(unanswered>0)h+=`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:10px 12px;font-size:11px;margin-bottom:10px">⚠️ ${unanswered} question(s) unanswered</div>`;
  if(flaggedN>0)h+=`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:11px;margin-bottom:10px">🚩 ${flaggedN} question(s) flagged for review</div>`;
  h+=`<div style="display:flex;gap:8px">
  <button class="btn btn-p" style="flex:1" onclick="showExamReview=false;render()">↩ Back to Exam</button>
  <button class="btn" style="background:#dc2626;color:#fff;flex:1" onclick="showExamReview=false;endExam()">Submit & Grade</button>
  </div>`;
  return h;
}

let openNote=null;

function _formatNoteHtml(text){
  const BOLD_TERMS=['MMSE','MoCA','CAM','CDR','FAST','GDS','MNA','TUG','Beers','STOPP','START','ACB','ADL','IADL','FIM','CGA','FRAX','eGFR','HbA1c','COPD','HFrEF','HFpEF','ABCD2','PADUA','CURB-65','4AT','PAINAD','SARC-F','EWGSOP','SM-2'];
  const paras=text.split(/\n+/).map(p=>p.trim()).filter(p=>p.length>0);
  let html='';
  function applyBold(t){
    BOLD_TERMS.forEach(tm=>{const re=new RegExp('(?<![\\w-])'+tm.replace(/-/g,'\\-')+'(?![\\w-])','g');t=t.replace(re,`<b>${tm}</b>`);});
    return t.replace(/\b([A-Z][A-Z0-9\-]{2,})\b/g,`<b>$1</b>`);
  }
  let pearlBuf=[];
  function flushPearl(){
    if(!pearlBuf.length)return;
    // raw text, not yet sanitized/bolded
    let raw=pearlBuf.join(' ').replace(/^📖\s*/,'').replace(/HAZZARD[^\s]*\s+\d+[eE]\s+BOARD\s+PEARLS\s*:\s*/i,'');
    html+='<div class="note-pearl">';
    if(/\(\d+\)\s+[A-Z]/.test(raw)){
      // Split on numbered subsections
      const parts=raw.split(/(?=\(\d+\)\s+[A-Z])/);
      // Intro sentence before (1)
      const intro=parts[0]&&!parts[0].match(/^\(\d+\)/)?parts.shift().trim():'';
      if(intro)html+=`<p class="note-pearl-p">${applyBold(sanitize(intro))}</p>`;
      parts.forEach(part=>{
        part=part.trim();if(!part)return;
        const m=part.match(/^\((\d+)\)\s+([^:(]{2,50}?):\s*([\s\S]*)/);
        if(m){
          html+=`<div class="note-pearl-sub">${sanitize(m[1]+'. '+m[2].trim())}</div>`;
          const items=m[3].trim().replace(/\.\s*$/,'').split(/;\s+/).filter(s=>s.trim().length>3);
          if(items.length>1){html+='<ul class="note-ul">'+items.map(it=>`<li>${applyBold(sanitize(it.trim()))}</li>`).join('')+'</ul>';}
          else{html+=`<p class="note-pearl-p">${applyBold(sanitize(m[3].trim()))}</p>`;}
        }else if(part.length>5){html+=`<p class="note-pearl-p">${applyBold(sanitize(part))}</p>`;}
      });
    }else{
      // Try inline ". CONCEPT: content" headers
      const inParts=raw.split(/\.\s+(?=[A-Z][A-Za-z][A-Za-z\s\(\)\/\-]{2,40}:\s)/);
      if(inParts.length>1){
        // Intro before first concept header
        const intro=inParts[0].trim();
        if(intro.length>5){
          const iItems=intro.split(/;\s+/).filter(s=>s.trim().length>3);
          if(iItems.length>2){html+='<ul class="note-ul">'+iItems.map(it=>`<li>${applyBold(sanitize(it.trim()))}</li>`).join('')+'</ul>';}
          else{html+=`<p class="note-pearl-p">${applyBold(sanitize(intro))}</p>`;}
        }
        inParts.slice(1).forEach(part=>{
          const m=part.match(/^([A-Z][A-Za-z\s\(\)\/\-]{2,40}?):\s*([\s\S]*)/);
          if(m){
            html+=`<div class="note-pearl-sub">${sanitize(m[1].trim())}</div>`;
            const content=m[2].trim().replace(/\.\s*$/,'');
            const items=content.split(/;\s+/).filter(s=>s.trim().length>3);
            if(items.length>1){html+='<ul class="note-ul">'+items.map(it=>`<li>${applyBold(sanitize(it.trim()))}</li>`).join('')+'</ul>';}
            else{html+=`<p class="note-pearl-p">${applyBold(sanitize(content))}</p>`;}
          }else{html+=`<p class="note-pearl-p">${applyBold(sanitize(part.trim()))}</p>`;}
        });
      }else{
        // No detectable structure — split on semicolons
        const items=raw.split(/;\s+/).filter(s=>s.trim().length>3);
        if(items.length>2){html+='<ul class="note-ul">'+items.map(it=>`<li>${applyBold(sanitize(it.trim()))}</li>`).join('')+'</ul>';}
        else{html+=`<p class="note-pearl-p">${applyBold(sanitize(raw))}</p>`;}
      }
    }
    html+='</div>';pearlBuf=[];
  }
  paras.forEach(p=>{
    const s=sanitize(p);
    if(s.startsWith('📖')||s.includes('BOARD PEARLS')){pearlBuf.push(p);return;}
    flushPearl();
    const hdrMatch=s.match(/^([A-Za-z\u05d0-\u05ea][A-Za-z\u05d0-\u05ea\s\-\/]{1,35}?):/);
    let hdrHtml='',bodyText=s;
    if(hdrMatch){hdrHtml=hdrMatch[1];bodyText=s.slice(hdrMatch[0].length).trim();}
    bodyText=applyBold(bodyText);
    if(hdrHtml){html+=`<div class="note-sec-hdr">${sanitize(hdrHtml)}</div>`;if(bodyText)html+=`<p class="note-p">${bodyText}</p>`;}
    else{html+=`<p class="note-p">${bodyText}</p>`;}
  });
  flushPearl();
  return html;
}
function _formatExplanationHtml(text){
  if(!text)return'';
  function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function bold(t){return t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');}
  const paras=text.split(/\n\n+/).map(p=>p.trim()).filter(Boolean);
  let html='';
  for(const p of paras){
    // Pearl section
    if(/פנינה קלינית/.test(p)){
      const content=bold(esc(p).replace(/\*?\*?💡?\s*פנינה קלינית\s*[:*\s]*/,'').trim());
      html+=`<div class="expl-pearl"><span class="expl-pearl-lbl">💡 פנינה קלינית</span>${content}</div>`;
      continue;
    }
    // Correct answer paragraph
    if(/ה?תשובה.*נכונה/.test(p)||(/תשובה/.test(p)&&/הנכונה/.test(p))){
      html+=`<div class="expl-ans expl-ans-ok">${bold(esc(p))}</div>`;
      continue;
    }
    // Wrong answer paragraph
    if(/תשובה/.test(p)&&/שגוי/.test(p)){
      html+=`<div class="expl-ans expl-ans-no">${bold(esc(p))}</div>`;
      continue;
    }
    // Any other answer-labelled paragraph
    if(/^\*?\*?ה?תשובה\s+[A-Dא-ד]/.test(p)||/^ה?תשובה\s+[A-Dא-ד]/.test(p)){
      const isOk=/נכונה/.test(p);
      html+=`<div class="expl-ans ${isOk?'expl-ans-ok':'expl-ans-no'}">${bold(esc(p))}</div>`;
      continue;
    }
    // Intro / regular paragraph
    html+=`<div class="expl-p">${bold(esc(p))}</div>`;
  }
  return html;
}

const LTN_DAYS=[0,1,2,4,8,16]; // box 1-5: days until next review
function ltnBox(idx){return (S.ltn[idx]||{}).box||1;}
function ltnDue(idx){const d=(S.ltn[idx]||{}).next||0;return Date.now()>=d;}
function ltnCorrect(idx){
  const cur=ltnBox(idx);const newBox=Math.min(5,cur+1);
  S.ltn[idx]={box:newBox,next:Date.now()+LTN_DAYS[newBox]*86400000};
  S.fcFlip=false;save();render();
}
function ltnWrong(idx){
  S.ltn[idx]={box:1,next:Date.now()};
  S.fcFlip=false;save();render();
}
function ltnDueCards(){return FLASH.map((_,i)=>i).filter(i=>ltnDue(i));}

function getDrugQuestions(drugName){
  const dn=drugName.toLowerCase();
  return QZ.reduce((acc,q,i)=>{
    const haystack=((q.q||'')+' '+(q.a||'')+(q.o?q.o.join(' '):'')).toLowerCase();
    if(haystack.includes(dn))acc.push(i);
    return acc;

pts.forEach(o=>{const val=o.match(/\((\d+)\)/)[1];h+=`<option value="${val}"${v===val?' selected':''}>${o}</option>`;});
h+=`</select></div>`;
}else{
const on=calcVals[k]||0;
h+=`<label style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8fafc;font-size:11px;cursor:pointer">

return h;
}

let srchQ='';
let srchTopic=-1;
let srchStatus='all'; // 'all'|'unanswered'|'incorrect'|'bookmarked'
let srchSort='relevance'; // 'relevance'|'topic'|'accuracy'

function gotoQ(idx){tab='quiz';const ti=QZ[idx]?QZ[idx].ti:-1;const related=QZ.map((_,i)=>i).filter(i=>QZ[i].ti===ti);pool=related.length>1?[idx,...related.filter(i=>i!==idx)]:[idx];qi=0;sel=null;ans=false;filt='topic';topicFilt=ti;renderTabs();render();window.scrollTo({top:0});}

function _srchMatchStatus(i){
  if(srchStatus==='all')return true;
  if(srchStatus==='unanswered')return !S.sr[i];
  if(srchStatus==='incorrect')return !!(S.sr[i]&&S.sr[i].n===0);// n===0 means last answer was wrong (SR streak reset)
  if(srchStatus==='bookmarked')return !!S.bk[i];
  return true;
}
function _srchSort(arr){
  if(srchSort==='topic')return[...arr].sort((a,b)=>QZ[a].ti-QZ[b].ti);
  if(srchSort==='accuracy'){
    return[...arr].sort((a,b)=>{
      const efA=S.sr[a]?S.sr[a].ef:Infinity;// unanswered sorts last
      const efB=S.sr[b]?S.sr[b].ef:Infinity;
      return efA-efB; // lowest easiness factor = lowest accuracy first
    });
  }
  return arr;
}

function renderSearch(){
let h=`<div class="sec-t">🔍 Search</div><div class="sec-s">Search across all ${QZ.length} questions + ${NOTES.length} study notes + ${DRUGS.length} drugs</div>`;

// Filter row

TOPICS.forEach((t,i)=>{h+=`<option value="${i}" ${srchTopic===i?'selected':''}>${sanitize(t)}</option>`;});
h+=`</select>`;

h+=`<span class="pill${srchStatus==='unanswered'?' on':''}" onclick="srchStatus='unanswered';render()">Unanswered</span>`;

// Sort row
h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px">`;

const hasActiveFilter=(srchStatus!=='all'||srchTopic!==-1);

if(showQuestions){
const q=srchQ.length>=2?srchQ.toLowerCase():null;
// Text filter questions — use inverted index when available
let qRes=[];
if(q&&_searchIdx.size>0){
  const terms=q.split(/\s+/).filter(w=>w.length>2);
  if(terms.length>0){
    // intersect candidate sets for each term
    let candidates=null;
    terms.forEach(term=>{
      const matches=new Set();
      _searchIdx.forEach((idxList,word)=>{if(word.includes(term))idxList.forEach(i=>matches.add(i));});
      candidates=candidates===null?matches:new Set([...candidates].filter(x=>matches.has(x)));
    });
    qRes=[...(candidates||new Set())];
    // fallback: also include questions matching full query string directly (handles short words missed by index)
    QZ.forEach((item,i)=>{if(!candidates||!candidates.has(i)){if(item.q.toLowerCase().includes(q)||item.o.some(o=>o.toLowerCase().includes(q)))qRes.push(i);}});
  } else {
    QZ.forEach((item,i)=>{if(item.q.toLowerCase().includes(q)||item.o.some(o=>o.toLowerCase().includes(q)))qRes.push(i);});
  }
} else {
  QZ.forEach((item,i)=>{

  });
}
// Apply status + topic filters
qRes=qRes.filter(i=>_srchMatchStatus(i));
qRes=qRes.filter(i=>srchTopic===-1||QZ[i].ti===srchTopic);
// Sort
qRes=_srchSort(qRes);

// Text filter notes + drugs (text only, no status/topic/sort)
const nRes=q?NOTES.filter(n=>n.topic.toLowerCase().includes(q)||n.notes.toLowerCase().includes(q)):[];

if(nRes.length){

nRes.forEach(n=>{h+=`<div class="card" style="padding:10px"><div style="font-weight:700;font-size:11px">${sanitize(n.topic)}</div><div style="font-size:10px;color:#475569;margin-top:4px;line-height:1.6">${sanitize(n.notes.substring(0,200))}...</div></div>`;});
}
if(dRes.length){
h+=`<div style="font-weight:700;font-size:12px;margin:8px 0 6px">💊 Drugs</div>`;
dRes.forEach(d=>{h+=`<div class="card" style="padding:10px"><span style="font-weight:700;font-size:11px">${sanitize(d.name)}</span> ${d.beers?'<span class="badge badge-r">BEERS</span>':''}<div class="drug-risk">${sanitize(d.risk)}</div></div>`;});
}
if(qRes.length){
h+=`<div style="font-weight:700;font-size:12px;margin:8px 0 6px">📝 Questions (${Math.min(qRes.length,15)} shown)</div>`;
qRes.slice(0,15).forEach(i=>{
  const sr=S.sr[i];const bk=S.bk[i];
  const accBadge=sr?`<span class="badge" style="background:#f0fdf4;color:#166534;margin-left:2px">ef ${sr.ef.toFixed(1)}</span>`:'';
  const bkBadge=bk?'🔖 ':'';
  const _dv=S.diff[String(i)];
  const _dc=_dv==='easy'?'#22c55e':_dv==='medium'?'#eab308':_dv==='hard'?'#ef4444':null;
  const diffBadge=_dc?`<span class="diff-badge" style="background:${_dc}">${_dv==='easy'?'קל':_dv==='medium'?'בינוני':'קשה'}</span>`:'';
  h+=`<div class="card heb" dir="rtl" style="padding:10px;font-size:11px;line-height:1.5;cursor:pointer" onclick="gotoQ(${i})"><span class="badge" style="background:#eff6ff;color:#1d4ed8">${sanitize(QZ[i].t)}</span> <span style="color:#1d4ed8;font-size:9px;margin-right:4px">↗ Quiz</span>${accBadge}${diffBadge} ${bkBadge}${sanitize(QZ[i].q.substring(0,150))}...</div>`;
});
}else{
h+=`<div style="font-size:11px;color:#94a3b8;padding:12px 0;text-align:center">No questions match the selected filters.</div>`;
}
}
return h;
}

if(h>=1)return`in ${h}h`;
return'soon';
}

  const filtered = LAW_DOCS.filter(d => {
    const matchCat = lawCat === 'All' || d.cat === lawCat;
    const matchSearch = !lawSearch || d.title.includes(lawSearch) ||
      d.points.some(p => p.h.includes(lawSearch) || p.body.includes(lawSearch));
    return matchCat && matchSearch;
  });

  let h = `<div class="sec-t">⚖️ Israeli Law</div>
  <div class="sec-s">13 מסמכים • קריטי לבחינה</div>`;

  // Search
  h += `<input class="search-box" id="lawsrch" placeholder="חיפוש במסמכי חוק..." value="${sanitize(lawSearch)}"
    oninput="lawSearch=this.value;lawOpen=null;render();">`;

  // Category filter
  h += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">`;
  LAW_CATS.forEach(c => {
    const count = c === 'All' ? LAW_DOCS.length : LAW_DOCS.filter(d => d.cat === c).length;
    h += `<span class="pill ${lawCat===c?'on':''}" onclick="lawCat='${c}';lawOpen=null;render()">${c} (${count})</span>`;
  });
  h += `</div>`;

  if (!filtered.length) {
    h += `<div class="card" style="padding:24px;text-align:center;color:#94a3b8">אין תוצאות</div>`;
    return h;
  }

  filtered.forEach(doc => {
    const isOpen = lawOpen === doc.id;
    h += `<div class="card" style="margin-bottom:10px;overflow:hidden">`;
    h += `<button class="acc-h" onclick="lawOpen=lawOpen==='${doc.id}'?null:'${doc.id}';render()">
      <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
        <span style="font-size:20px">${doc.icon}</span>
        <div style="min-width:0">
          <div class="heb" style="font-weight:700;font-size:12px;line-height:1.4;text-align:right">${sanitize(doc.title)}</div>
          <div style="display:flex;gap:5px;margin-top:3px">
            <span style="background:#eff6ff;color:#1d4ed8;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px">${doc.cat}</span>
            ${doc.exam ? '<span style="background:#fef2f2;color:#dc2626;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px">🎯 בחינה</span>' : ''}
          </div>
        </div>
      </div>
      <span class="acc-ar ${isOpen ? 'op' : ''}">▼</span>
    </button>`;

    if (isOpen) {
      h += `<div style="padding:0 14px 14px">`;
      doc.points.forEach(pt => {
        h += `<div style="margin-bottom:12px">
          <div style="font-weight:700;font-size:11px;color:rgb(var(--sky));margin-bottom:4px;border-bottom:1px solid #e2e8f0;padding-bottom:3px">${sanitize(pt.h)}</div>
          <div class="heb" style="font-size:11px;line-height:1.7;white-space:pre-line;direction:rtl;text-align:right">${sanitize(pt.body)}</div>
        </div>`;
      });
      // Quick quiz link
      const relatedTopics = {
        'hng': [28,34], 'peg': [28], 'yikuach': [32,33,34], 'mkbl': [32,33],
        'siud': [35], 'hatarut': [30], 'nehiga': [31], 'shikum': [36], 'apot': [32]
      };
      const tIdxs = relatedTopics[doc.id] || [];
      if (tIdxs.length) {
        h += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9">
          <div style="font-size:10px;color:#64748b;margin-bottom:6px">שאלות קשורות:</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">`;
        tIdxs.forEach(ti => {
          if (TOPICS[ti]) {
            h += `<button onclick="setTopicFilt(${ti});go('quiz')" class="pill" style="font-size:10px;padding:3px 8px">${sanitize(TOPICS[ti])}</button>`;
          }
        });
        h += `</div></div>`;
      }
      h += `</div>`;
    }
    h += `</div>`;
  });

  // Exam tip card
  h += `<div class="card" style="padding:14px;border-left:3px solid rgb(var(--sky));margin-top:4px">
    <div style="font-weight:700;font-size:11px;margin-bottom:6px">💡 טיפ לבחינה — היררכיית סמכות</div>
    <div class="heb" style="font-size:11px;line-height:1.7;direction:rtl;text-align:right">
      ייפוי כוח מתמשך → הנחיות מקדימות → מקבל החלטות זמני → בית משפט (אפוטרופוס)<br>
      <b>מלכודת:</b> 3 רופאים = חירום בלבד. מקבל החלטות זמני = דחוף (לא חירום).
    </div>
  </div>`;

  return h;
}

let ssMode = 'stopp'; // 'stopp' | 'start'
let ssSec = 'All';
let ssSearch = '';

function renderStoppStart() {
  const data = ssMode === 'stopp' ? STOPP_START.stopp : STOPP_START.start;
  const secs = ['All', ...data.map(s => s.sec)];

  let h = `<div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="btn ${ssMode==='stopp'?'btn-d':'btn-o'}" style="flex:1;font-size:11px" onclick="ssMode='stopp';ssSec='All';render()">🚫 STOPP</button>
    <button class="btn ${ssMode==='start'?'btn-g':'btn-o'}" style="flex:1;font-size:11px" onclick="ssMode='start';ssSec='All';render()">✅ START</button>
  </div>`;

  h += `<input class="search-box" id="sssrch" placeholder="${ssMode==='stopp'?'Search STOPP criteria...':'Search START criteria...'}" value="${sanitize(ssSearch)}" oninput="ssSearch=this.value;render()">`;

  h += `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">`;
  secs.forEach(s => {
    const sec = data.find(d => d.sec === s);
    h += `<span class="pill ${ssSec===s?'on':''}" style="font-size:10px" onclick="ssSec='${s}';render()">${s==='All'?'All':s+' '+sec?.title}</span>`;
  });
  h += `</div>`;

  let count = 0;
  data.forEach(sec => {
    if (ssSec !== 'All' && ssSec !== sec.sec) return;
    const items = sec.items.filter(it => !ssSearch || it.toLowerCase().includes(ssSearch.toLowerCase()));
    if (!items.length) return;
    h += `<div class="card" style="margin-bottom:10px;overflow:hidden">
      <div style="padding:10px 14px 6px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px">
        <span style="background:${ssMode==='stopp'?'#fef2f2':'#ecfdf5'};color:${ssMode==='stopp'?'#dc2626':'#059669'};font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px">${sec.sec}</span>
        <span style="font-weight:700;font-size:12px">${sec.title}</span>
        <span style="color:#94a3b8;font-size:10px;margin-left:auto">${items.length} criteria</span>
      </div>
      <div style="padding:8px 14px">`;
    items.forEach((item, i) => {
      count++;
      h += `<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f8fafc;font-size:11px;line-height:1.5">
        <span style="color:${ssMode==='stopp'?'#dc2626':'#059669'};font-weight:700;flex-shrink:0">${ssMode==='stopp'?'✗':'✓'}</span>
        <span>${sanitize(item)}</span>
      </div>`;
    });
    h += `</div></div>`;
  });

  if (!count) h += `<div class="card" style="padding:24px;text-align:center;color:#94a3b8">No criteria match.</div>`;
  return h;
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const text=(input?input.value:'').trim();
  if(!text||chatLoading)return;
  const key=getApiKey();
  if(!key){
    const k=prompt('הכנס Anthropic API Key (יישמר מקומית בדפדפן):','');
    if(!k)return;
    setApiKey(k);
  }
  S.chat.push({role:'user',text});
  chatLoading=true;
  save();render();
  // Scroll to bottom
  setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
  // Build messages array (last 10), ensure starts with 'user', exclude errors
  let history=S.chat.slice(-10);
  if(history.length>0&&history[0].role!=='user')history=history.slice(1);
  const messages=history
    .filter(m=>m.role==='user'||m.role==='assistant')
    .map(m=>({role:m.role,content:m.text}));
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-6',max_tokens:1024,system:CHAT_SYSTEM,messages})
    });
    if(!resp.ok){
      const e=await resp.json().catch(()=>({}));
      if(resp.status===401||resp.status===403){localStorage.removeItem('samega_apikey');throw new Error('API key invalid — cleared. Enter a new key on next send.');}
      throw new Error(e.error?.message||('HTTP '+resp.status));
    }
    const data=await resp.json();
    const reply=data.content[0].text;
    S.chat.push({role:'assistant',text:reply});
  }catch(e){
    const offline=!navigator.onLine||e.message==='offline'||e.message.includes('Failed to fetch');
    S.chat.push({role:'error',text:offline?'📡 אין חיבור לאינטרנט — נסה שוב כשתתחבר':'❌ '+e.message});
  }
  // Trim to 20 messages (10 pairs)
  if(S.chat.length>20)S.chat=S.chat.slice(S.chat.length-20);
  chatLoading=false;
  save();render();
  setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

function sendChatStarter(text){

function fcRate(q){// q: 0=again, 1=hard, 2=easy

}

function exportWeaknesses(){
const date=new Date().toISOString().slice(0,10);
const lines=[];
lines.push('# Shlav A — Final Review: Weakness Export');
lines.push('Generated: '+date);
lines.push('');
// Group by topic
const byTopic={};
// 1. High-failure SM-2: items with n=0 (failed) or ef < 2.0
Object.entries(S.sr).forEach(([key,sr])=>{
  if(sr.n===0||sr.ef<2.0){
    const idx=_keyToIdx(key);
    if(idx<0||idx>=QZ.length)return;
    const q=QZ[idx];const ti=q.ti>=0?TOPICS[q.ti]:'Other';
    if(!byTopic[ti])byTopic[ti]=[];
    byTopic[ti].push({q,idx,reason:'SM-2 failures: EF='+sr.ef.toFixed(1)+', streak='+sr.n});
  }
});
// 2. Active bookmarks
Object.entries(S.bk).filter(([k,v])=>v).forEach(([k])=>{
  const q=QZ[k];if(!q)return;
  const ti=q.ti>=0?TOPICS[q.ti]:'Other';
  if(!byTopic[ti])byTopic[ti]=[];
  // avoid duplicate
  if(!byTopic[ti].find(x=>x.idx===parseInt(k))){
    byTopic[ti].push({q,idx:parseInt(k),reason:'Bookmarked'});
  }
});
// 3. Short intervals (due within 3 days) 
const soon=Date.now()+3*86400000;
Object.entries(S.sr).forEach(([key,sr])=>{
  if(sr.next<=soon&&sr.n<=1){
    const idx=_keyToIdx(key);
    if(idx<0||idx>=QZ.length)return;
    const q=QZ[idx];const ti=q.ti>=0?TOPICS[q.ti]:'Other';
    if(!byTopic[ti])byTopic[ti]=[];
    if(!byTopic[ti].find(x=>x.idx===idx)){
      byTopic[ti].push({q,idx,reason:'Due soon (interval≤3d)'});
    }
  }
});
if(!Object.keys(byTopic).length){
  alert('No weakness data found. Answer more questions first!');return;
}
Object.keys(byTopic).sort().forEach(topic=>{
  lines.push('## '+topic);
  lines.push('');
  byTopic[topic].forEach(item=>{
    const q=item.q;
    lines.push('> '+item.reason);
    lines.push('');
    lines.push('**Q:** '+q.q);
    lines.push('');
    q.o.forEach((o,i)=>{
      lines.push((i===q.c?'- ✅ ':'- ❌ ')+o);
    });
    const ex=_exCache[item.idx];
    if(ex&&ex.text){
      lines.push('');
      lines.push('**Explanation:** '+(ex.text||'').split(String.fromCharCode(10)).join(' ').trim());
    }
    lines.push('');
    lines.push('---');
    lines.push('');
  });
});
const md=lines.join(String.fromCharCode(10));
const blob=new Blob([md],{type:'text/markdown'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='final_review-'+date+'.md';a.click();
}

(function(){function updClock(){const d=new Date(),dy=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],mn=['January','February','March','April','May','June','July','August','September','October','November','December'],n=d.getDate(),ord=n>3&&n<21?'th':([,'st','nd','rd'][n%10]||'th'),h=String(d.getHours()).padStart(2,'0'),m=String(d.getMinutes()).padStart(2,'0'),ds=document.getElementById('date-span');if(ds)ds.textContent=dy[d.getDay()]+' '+n+ord+' '+mn[d.getMonth()]+' '+d.getFullYear()+' · '+h+':'+m;}updClock();setInterval(updClock,60000);})();
